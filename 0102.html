<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>唯識之旅 ． 輪迴矩陣</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #9fdfc8; 
            --bg-deep: #030303;
        }

        body { 
            margin: 0; background: var(--bg-deep); color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; overflow-x: hidden; user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* 頂部導航 */
        .top-bar {
            width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(3,3,3,0.9), transparent); z-index: 100; position: fixed; top: 0;
        }
        .nav-btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.4); 
            color: var(--gold); padding: 8px 16px; border-radius: 25px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; 
            display: flex; align-items: center; gap: 6px; cursor: pointer; backdrop-filter: blur(5px); transition: 0.3s;
        }
        .nav-btn:active { background: rgba(212,175,55,0.2); border-color: var(--solid-gold); transform: scale(0.95); }

        /* 標題區 */
        .header-title {
            margin-top: 80px; text-align: center; z-index: 10;
        }
        .header-title h1 {
            color: var(--gold); font-size: 1.6rem; letter-spacing: 6px; margin: 0; font-weight: normal; text-shadow: 0 0 15px rgba(212,175,55,0.5);
        }
        .header-title p { color: rgba(255,255,255,0.5); font-size: 0.85rem; letter-spacing: 3px; margin-top: 10px; }

        /* 核心 SVG 矩陣畫布 */
        .matrix-container {
            position: relative; width: 100%; max-width: 500px; height: 600px; margin-top: 20px;
        }

        svg { width: 100%; height: 100%; overflow: visible; }

        /* 動畫定義 */
        .pulse-slow { animation: pulse 4s infinite alternate ease-in-out; }
        .pulse-fast { animation: pulse 2s infinite alternate ease-in-out; }
        @keyframes pulse { 0% { opacity: 0.4; filter: drop-shadow(0 0 2px var(--gold)); } 100% { opacity: 1; filter: drop-shadow(0 0 15px var(--solid-gold)); } }

        .data-flow {
            stroke-dasharray: 4 8; animation: flow 20s linear infinite;
        }
        @keyframes flow { to { stroke-dashoffset: -1000; } }
        
        .bypass-flow {
            stroke-dasharray: 6 12; animation: flow-fast 8s linear infinite; filter: drop-shadow(0 0 8px var(--gold));
        }
        @keyframes flow-fast { to { stroke-dashoffset: -500; } }

        /* 資訊卡片區 (等待注入您的法理) */
        .info-panel {
            width: 90%; max-width: 600px; background: rgba(15, 15, 18, 0.8); border: 1px solid rgba(212,175,55,0.3);
            border-radius: 16px; padding: 25px; margin-bottom: 50px; z-index: 10;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }
        .info-title { color: var(--solid-gold); font-size: 1.1rem; letter-spacing: 2px; font-weight: bold; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .info-text { color: #ccc; font-size: 0.95rem; line-height: 1.8; text-align: justify; }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="nav-btn" onclick="window.location.href='index.html'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            歸向彌陀
        </div>
        <div class="nav-btn" onclick="window.location.href='huayan.html'">
            華嚴世界
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        </div>
    </div>

    <div class="header-title">
        <h1>唯識之旅 ‧ 輪迴矩陣</h1>
        <p>探索科學與心識的終極奧祕</p>
    </div>

    <div class="matrix-container">
        <svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="body-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="rgba(159,223,200,0.8)" />
                    <stop offset="100%" stop-color="rgba(159,223,200,0)" />
                </linearGradient>
                <linearGradient id="gold-grad" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="rgba(212,175,55,0)" />
                    <stop offset="100%" stop-color="rgba(212,175,55,0.9)" />
                </linearGradient>
                <pattern id="hex-grid" width="40" height="69.282" patternUnits="userSpaceOnUse">
                    <path d="M40 17.32l-20 11.547L0 17.32V-5.774l20-11.547L40-5.774V17.32zm0 46.188l-20 11.548-20-11.548V40.414L20 28.867l20 11.547v23.094z" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
                </pattern>
            </defs>

            <rect x="0" y="0" width="400" height="300" fill="url(#hex-grid)" />

            <g transform="translate(200, 550)">
                <path d="M-60 0 C-60 -50, -40 -120, 0 -150 C40 -120, 60 -50, 60 0" fill="none" stroke="url(#body-grad)" stroke-width="1.5" opacity="0.6"/>
                <path d="M-30 -110 C-30 -160, -20 -190, 0 -200 C20 -190, 30 -160, 30 -110" fill="none" stroke="rgba(159,223,200,0.4)" stroke-width="1"/>
                
                <circle cx="0" cy="-170" r="3" fill="#fff" class="pulse-fast" /> <circle cx="-12" cy="-150" r="2.5" fill="var(--cyan)" /> <circle cx="12" cy="-145" r="2" fill="var(--cyan)" /> <path d="M0 -170 L-12 -150 L12 -145 Z" fill="none" stroke="rgba(159,223,200,0.5)" stroke-width="0.5"/>
                
                <text x="-45" y="-165" fill="rgba(159,223,200,0.8)" font-size="10" letter-spacing="1">前六識載體</text>
            </g>

            <path d="M200 350 C180 280, 220 200, 200 120" fill="none" stroke="rgba(212,175,55,0.6)" stroke-width="1.5" class="data-flow"/>
            <path d="M200 350 C230 250, 170 180, 200 120" fill="none" stroke="rgba(212,175,55,0.3)" stroke-width="1" class="data-flow" style="animation-duration: 15s;"/>
            <text x="215" y="250" fill="rgba(212,175,55,0.8)" font-size="10" letter-spacing="2">第七識 (傳輸與執著)</text>

            <g transform="translate(200, 120)">
                <circle cx="0" cy="0" r="25" fill="none" stroke="var(--solid-gold)" stroke-width="1" class="pulse-slow"/>
                <circle cx="0" cy="0" r="15" fill="rgba(212,175,55,0.1)" stroke="var(--gold)" stroke-width="1.5" stroke-dasharray="2 4"/>
                <circle cx="0" cy="0" r="4" fill="#fff" filter="drop-shadow(0 0 10px var(--gold))"/>
                
                <path d="M0 -25 L0 -60 M22 -12 L50 -30 M-22 -12 L-50 -30 M22 12 L50 30 M-22 12 L-50 30" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
                <circle cx="0" cy="-60" r="2" fill="#888"/><circle cx="50" cy="-30" r="2" fill="#888"/><circle cx="-50" cy="-30" r="2" fill="#888"/>
                
                <text x="-65" y="-35" fill="var(--gold)" font-size="11" letter-spacing="2">第八阿賴耶識</text>
                <text x="-50" y="-80" fill="rgba(255,255,255,0.5)" font-size="9" letter-spacing="4">宇宙量子記憶矩陣</text>
            </g>

            <path d="M200 350 Q 350 250 320 80" fill="none" stroke="var(--gold)" stroke-width="2" class="bypass-flow"/>
            
            <g transform="translate(320, 80)">
                <circle cx="0" cy="0" r="8" fill="#fff" filter="drop-shadow(0 0 15px #fff) drop-shadow(0 0 30px var(--solid-gold))"/>
                <path d="M0 -15 L0 15 M-15 0 L15 0" stroke="#fff" stroke-width="1" opacity="0.8"/>
                <text x="-25" y="-20" fill="#fff" font-size="11" font-weight="bold" letter-spacing="2" filter="drop-shadow(0 0 5px var(--solid-gold))">極樂中繼站</text>
            </g>

        </svg>
    </div>

    <div class="info-panel">
        <div class="info-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            科學實相與輪迴之謎
        </div>
        <div class="info-text">
            (總工程師，這裡是保留給您注入法理的空間。我們將在這裡，以最嚴謹、謙卑且深邃的文字，將大腦科學、量子矩陣、阿賴耶識與極樂淨土的奧祕娓娓道來。請您開示您的終極解讀！)
        </div>
    </div>

</body>
</html>
