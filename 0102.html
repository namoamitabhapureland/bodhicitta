<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>唯識之旅 ． 輪迴之謎</title>
    <style>
        body {
            margin: 0; background-color: #030303; color: #f3e5ab;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        
        /* 頂部導航 */
        .top-nav {
            width: 100%; padding: 20px 0; text-align: center;
            border-bottom: 1px solid rgba(212,175,55,0.15);
            background: linear-gradient(180deg, rgba(20,15,5,0.8) 0%, rgba(3,3,3,1) 100%);
            position: relative; z-index: 10;
        }
        .nav-title {
            font-size: 1.2rem; letter-spacing: 5px; color: #d4af37;
            text-shadow: 0 0 10px rgba(212,175,55,0.4);
        }

        /* 核心矩陣動畫區 */
        .matrix-container {
            width: 100%; max-width: 400px; padding: 40px 20px 20px;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* 法理經文展示區 */
        .dharma-panel {
            width: 85%; max-width: 500px; margin-top: 10px;
            padding: 25px; border-radius: 15px;
            background: rgba(212,175,55,0.03);
            border: 1px solid rgba(212,175,55,0.2);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            position: relative; overflow: hidden;
        }
        .layer-title {
            font-size: 1.1rem; color: #d4af37; letter-spacing: 2px;
            margin-bottom: 15px; border-bottom: 1px dashed rgba(212,175,55,0.3);
            padding-bottom: 8px; text-align: center;
        }
        .layer-text {
            font-size: 0.9rem; color: rgba(255,255,255,0.7); line-height: 1.8;
            letter-spacing: 1px; text-align: justify; margin-bottom: 20px;
        }

        /* 返回按鈕 */
        .back-btn {
            margin: 40px 0; padding: 12px 35px; border: 1px solid rgba(212,175,55,0.5);
            border-radius: 30px; color: #f3e5ab; cursor: pointer; text-decoration: none;
            font-size: 0.95rem; letter-spacing: 3px; transition: 0.3s;
            background: linear-gradient(135deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0) 100%);
        }
        .back-btn:active { 
            background: rgba(212,175,55,0.25); transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-title">唯識之旅 ． 輪迴矩陣</div>
    </div>

    <div class="matrix-container">
        <svg viewBox="0 0 200 200" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f3e5ab"/>
                    <stop offset="50%" stop-color="#d4af37"/>
                    <stop offset="100%" stop-color="#b8860b"/>
                </linearGradient>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <g stroke="rgba(212,175,55,0.15)" stroke-width="0.8" fill="none">
                <path d="M 100 25 L 40 80 L 100 135 L 160 80 Z" />
                <path d="M 100 25 L 100 135" />
                <path d="M 40 80 L 160 80" />
                <circle cx="100" cy="25" r="2" fill="#d4af37"/>
                <circle cx="40" cy="80" r="2" fill="#d4af37"/>
                <circle cx="160" cy="80" r="2" fill="#d4af37"/>
                <circle cx="100" cy="135" r="2" fill="#d4af37"/>
            </g>

            <circle cx="100" cy="100" r="85" fill="none" stroke="url(#goldGrad)" stroke-width="1.2" stroke-dasharray="4 8" opacity="0.6">
                <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="40s" repeatCount="indefinite"/>
            </circle>
            <circle cx="100" cy="100" r="75" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="0.5"/>

            <g transform="translate(0, 15)">
                <circle cx="100" cy="45" r="12" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" filter="url(#glow)"/>
                <path d="M 100 57 C 100 57, 85 70, 75 95 C 65 120, 55 130, 55 130 L 145 130 C 145 130, 135 120, 125 95 C 115 70, 100 57, 100 57 Z" fill="none" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.9"/>
                <path d="M 85 75 L 100 110 L 115 75" fill="none" stroke="rgba(212,175,55,0.4)" stroke-width="1"/>
                <path d="M 50 130 Q 100 150 150 130 Q 100 135 50 130 Z" fill="url(#goldGrad)" opacity="0.2"/>
                
                <circle cx="100" cy="95" r="14" fill="none" stroke="#d4af37" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.8">
                    <animateTransform attributeName="transform" type="rotate" from="360 100 95" to="0 100 95" dur="15s" repeatCount="indefinite"/>
                </circle>
                <circle cx="100" cy="95" r="3.5" fill="#fff" filter="url(#glow)">
                    <animate attributeName="r" values="3.5; 5; 3.5" dur="4s" repeatCount="indefinite" ease="ease-in-out"/>
                </circle>
            </g>
        </svg>
    </div>

    <div class="dharma-panel">
        <div class="layer-title">【 第一重 ． 載體重置 】</div>
        <div class="layer-text">
            褪去碳基六根之渴，鑄就無漏金剛之身。<br>
            物理慾望斷絕，生存焦慮歸零。彌陀以願力切斷造業之源，此乃不墮惡道之硬體基石。
        </div>

        <div class="layer-title">【 第二重 ． 雲端連線 】</div>
        <div class="layer-text">
            阿賴耶識全息展開，宿命他心毫無隱藏。<br>
            累世記憶與萬千我執瞬間甦醒，怨親債主同在矩陣。若未於娑婆預習清淨，意識何以承受此等龐大業力數據之衝擊？
        </div>
        
        <div class="layer-title" style="color: #fff; text-shadow: 0 0 10px #d4af37;">【 終極防護 ． 不退轉 】</div>
        <div class="layer-text" style="color: #f3e5ab;">
            （加密區域：待總工程師輸入後續核心法理，系統將自動啟動金剛鎖掩蓋此區段。唯有資糧具足者，方可解碼親證。）
        </div>
    </div>

    <a href="index.html" class="back-btn">返回 ． 彌陀系統</a>

</body>
</html>
