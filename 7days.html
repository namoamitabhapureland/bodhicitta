<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>普賢六牙 ． 實修圓滿</title>
    <style>
        :root {
            --bg-deep: #010103;
            --gold-light: #f3e5ab;
            --gold-solid: #d4af37;
            --cyan: #8ba89c;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, var(--bg-deep) 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100dvh; width: 100vw; overflow: hidden; color: #fff;
        }

        /* ---------------- 星空背景 ---------------- */
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(circle at 50% 30%, transparent 10%, rgba(1, 1, 3, 0.95) 100%); }

        /* ---------------- 底部仙氣白霧 ---------------- */
        #mist-layer {
            position: absolute; bottom: -10%; left: -10%; width: 120%; height: 60%;
            z-index: 15; pointer-events: none; mix-blend-mode: screen; overflow: hidden;
        }
        .mist-cloud {
            position: absolute; filter: blur(35px); border-radius: 50%;
            animation: drift-mist 15s infinite alternate ease-in-out;
        }
        .mist-1 { width: 900px; height: 450px; left: -10%; bottom: -20px; background: radial-gradient(ellipse, rgba(212,175,55,0.2) 0%, transparent 70%); animation-duration: 18s; }
        .mist-2 { width: 1000px; height: 500px; right: -10%; bottom: -50px; background: radial-gradient(ellipse, rgba(196,113,237,0.15) 0%, transparent 70%); animation-duration: 22s; animation-delay: -5s; }
        .mist-3 { width: 800px; height: 400px; left: 15%; bottom: 10px; background: radial-gradient(ellipse, rgba(0,242,254,0.15) 0%, transparent 70%); animation-duration: 16s; animation-delay: -2s; }
        .mist-4 { width: 950px; height: 450px; right: 10%; bottom: -30px; background: radial-gradient(ellipse, rgba(255,126,179,0.15) 0%, transparent 70%); animation-duration: 20s; animation-delay: -8s; }
        .mist-5 { width: 700px; height: 350px; left: 35%; bottom: 0px; background: radial-gradient(ellipse, rgba(255,255,255,0.2) 0%, transparent 70%); animation-duration: 14s; animation-delay: -10s; }
        
        @keyframes drift-mist { 
            0% { transform: translateX(-30px) translateY(10px) scale(1); opacity: 0.6; } 
            100% { transform: translateX(30px) translateY(-10px) scale(1.1); opacity: 1; } 
        }

        /* ---------------- 頂部導航 ---------------- */
        .nav-top {
            width: 90%; max-width: 480px; z-index: 20;
            display: flex; justify-content: space-between; align-items: center;
            margin-top: max(20px, env(safe-area-inset-top)); padding: 12px 20px;
            background: rgba(5, 5, 8, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212,175,55,0.2); border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .nav-btn { display: flex; align-items: center; gap: 8px; color: var(--gold-light); font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; }
        .nav-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.5; fill: none; }
        .nav-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }

        /* ---------------- 七日圓滿星軌 ---------------- */
        .tracker-container {
            z-index: 20; margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .tracker-title { color: var(--gold-light); font-size: 0.85rem; letter-spacing: 4px; text-shadow: 0 0 10px var(--gold-solid); font-weight: bold; }
        .tracker-circles { display: flex; gap: 10px; align-items: center; }
        
        .track-circle {
            width: 34px; height: 34px; border-radius: 50%;
            border: 1px solid rgba(212,175,55,0.4);
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.5); transition: 0.4s;
        }
        .track-circle svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.2); transition: 0.4s; }

        .track-circle.lit {
            border-color: #fff;
            background: rgba(212,175,55,0.25);
            box-shadow: 0 0 15px var(--gold-solid), inset 0 0 10px var(--gold-solid);
        }
        .track-circle.lit svg {
            fill: #fff;
            filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 10px var(--gold-solid));
        }

        /* ---------------- 任務容器與框架 ---------------- */
        .task-container {
            position: relative; z-index: 10; margin-top: 2vh;
            width: 95%; max-width: 450px; aspect-ratio: 3 / 4;
            display: flex; justify-content: center; align-items: center;
        }

        .tusks-frame {
            position: absolute; inset: 0; width: 100%; height: 100%;
            overflow: visible; filter: drop-shadow(0 0 25px rgba(212,175,55,0.6));
            animation: breathe-frame 3s infinite alternate ease-in-out;
        }

        @keyframes breathe-frame {
            0% { filter: drop-shadow(0 0 15px rgba(212,175,55,0.4)); }
            100% { filter: drop-shadow(0 0 40px var(--gold-solid)) drop-shadow(0 0 20px #fff); }
        }

        /* 共用裝飾細線 */
        .tusk-inner-line {
            fill: none;
            stroke: var(--gold-light);
            stroke-width: 1.5;
            opacity: 0.95;
        }

        /* ---------------- 任務內容區塊 (延遲顯示) ---------------- */
        .task-content {
            position: relative; z-index: 20;
            text-align: center; width: 70%;
            background: rgba(5, 5, 10, 0.85); 
            border: 1px solid rgba(212,175,55,0.6);
            border-radius: 20px; padding: 35px 20px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: inset 0 0 30px rgba(212,175,55,0.15), 0 15px 40px rgba(0,0,0,0.9);
            
            opacity: 0; 
            transform: scale(0.9) translateY(20px);
            pointer-events: none;
            transition: opacity 1.5s ease-out, transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .task-content.show {
            opacity: 1; transform: scale(1) translateY(0); pointer-events: auto;
        }

        .task-subtitle { color: var(--cyan); font-size: 0.8rem; letter-spacing: 4px; margin-bottom: 15px; }
        .task-title {
            color: var(--gold-light); font-size: 1.3rem; font-weight: bold; letter-spacing: 6px;
            text-shadow: 0 0 15px rgba(212,175,55,0.8); margin-bottom: 20px;
            border-bottom: 1px dashed rgba(212,175,55,0.4); padding-bottom: 15px;
        }
        .task-desc { color: #eee; font-size: 0.95rem; line-height: 2.2; letter-spacing: 2px; text-align: justify; text-align-last: center; }

    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <!-- ✨ 底部加深的純金漸層：讓白金線條更銳利 ✨ -->
            <linearGradient id="tusk-gold" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#8a6518" stop-opacity="0.95"/>  <!-- 深燙金，襯托高光 -->
                <stop offset="35%" stop-color="#d4af37" stop-opacity="0.95"/> <!-- 飽和純金 -->
                <stop offset="70%" stop-color="#f3e5ab" stop-opacity="1"/>    <!-- 亮金 -->
                <stop offset="100%" stop-color="#fffde7" stop-opacity="1"/>   <!-- 白金尖端 -->
            </linearGradient>

            <!-- 統一黃金象牙範本 -->
            <g id="single-tusk">
                <path fill="url(#tusk-gold)" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M 20,400 C 10,250 80,100 200,40 C 110,130 80,240 70,400 Q 45,410 20,400 Z" />
                <path class="tusk-inner-line" d="M 35,395 C 30,280 80,150 170,60" />
                <path class="tusk-inner-line" d="M 50,395 C 45,300 80,200 130,110" />
                <path fill="none" stroke="var(--gold-light)" stroke-width="2.5" stroke-linecap="round" d="M 15,380 Q 45,395 73,380" />
                <path fill="none" stroke="var(--gold-light)" stroke-width="2.5" stroke-linecap="round" d="M 20,400 Q 45,415 70,400" />
            </g>
        </defs>
    </svg>

    <!-- 繽紛星空 -->
    <canvas id="starCanvas"></canvas>
    <div id="vignette"></div>

    <!-- 底部白霧 -->
    <div id="mist-layer">
        <div class="mist-cloud mist-1"></div>
        <div class="mist-cloud mist-2"></div>
        <div class="mist-cloud mist-3"></div>
        <div class="mist-cloud mist-4"></div>
        <div class="mist-cloud mist-5"></div>
    </div>

    <!-- 頂部導航 -->
    <div class="nav-top">
        <div class="nav-btn"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg> 歸返天梯</div>
        <div class="nav-divider"></div>
        <div class="nav-btn"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20V14"></path></svg> 歷史大數據</div>
    </div>

    <!-- 七日星軌 -->
    <div class="tracker-container">
        <div class="tracker-title">【 六度圓滿 ． 華藏印心 】</div>
        <div class="tracker-circles">
            <div class="track-circle lit"><svg viewBox="0 0 24 24"><path d="M6 19 C5 10 11 3 19 2 C13 7 10 13 10 19 Q8 20 6 19 Z"/></svg></div>
            <div class="track-circle lit"><svg viewBox="0 0 24 24"><path d="M6 19 C5 10 11 3 19 2 C13 7 10 13 10 19 Q8 20 6 19 Z"/></svg></div>
            <div class="track-circle lit"><svg viewBox="0 0 24 24"><path d="M6 19 C5 10 11 3 19 2 C13 7 10 13 10 19 Q8 20 6 19 Z"/></svg></div>
            <div class="track-circle lit"><svg viewBox="0 0 24 24"><path d="M6 19 C5 10 11 3 19 2 C13 7 10 13 10 19 Q8 20 6 19 Z"/></svg></div>
            <div class="track-circle lit"><svg viewBox="0 0 24 24"><path d="M6 19 C5 10 11 3 19 2 C13 7 10 13 10 19 Q8 20 6 19 Z"/></svg></div>
            <div class="track-circle lit"><svg viewBox="0 0 24 24"><path d="M6 19 C5 10 11 3 19 2 C13 7 10 13 10 19 Q8 20 6 19 Z"/></svg></div>
            <div class="track-circle lit">
                <svg viewBox="0 0 24 24">
                    <path d="M12 3 C9 9 7 13 12 19 C17 13 15 9 12 3 Z M12 19 C6 17 2 11 7 9 C9 9 10 14 12 19 Z M12 19 C18 17 22 11 17 9 C15 9 14 14 12 19 Z"/>
                    <path d="M7 21 Q12 23 17 21" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- 任務容器 -->
    <div class="task-container">
        <!-- 全金統一六牙 -->
        <svg class="tusks-frame" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid meet">
            <!-- 左側三牙 -->
            <g id="left-tusks">
                <use href="#single-tusk" x="-30" y="20" transform="scale(1)" />
                <use href="#single-tusk" x="30" y="100" transform="scale(0.85)" />
                <use href="#single-tusk" x="90" y="200" transform="scale(0.7)" />
            </g>
            <!-- 右側三牙 -->
            <g id="right-tusks" transform="scale(-1, 1) translate(-400, 0)">
                <use href="#single-tusk" x="-30" y="20" transform="scale(1)" />
                <use href="#single-tusk" x="30" y="100" transform="scale(0.85)" />
                <use href="#single-tusk" x="90" y="200" transform="scale(0.7)" />
            </g>
        </svg>

        <!-- 任務內容 (延遲顯示) -->
        <div class="task-content" id="task-box">
            <div class="task-subtitle">普賢十願 ． 圓滿日</div>
            <div class="task-title">普皆迴向</div>
            <div class="task-desc">
                七日精進，功不唐捐。<br><br>
                願將此週所修之一切功德，皆悉迴向盡法界、虛空界，一切眾生。<br><br>
                <span style="color:var(--gold-light); font-weight:bold; font-size: 0.85rem;">【請長按底部印心 ． 領取千點資糧】</span>
            </div>
        </div>
    </div>

<script>
    // 延遲浮現任務框
    window.addEventListener('load', () => {
        setTimeout(() => { document.getElementById('task-box').classList.add('show'); }, 2500);
    });

    // 繽紛星空引擎
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [];

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();

    const STAR_COLORS = ['#f3e5ab', '#ffffff', '#00f2fe', '#ff7eb3', '#c471ed', '#43e97b', '#d4af37'];
    for (let i = 0; i < 350; i++) { 
        let color = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
        stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: color, s: Math.random() * 2 + 1 });
    }

    function renderStars() {
        ctx.fillStyle = 'rgba(2, 2, 4, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= 1; 
            if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; } 
            let sc = 400 / (400 + s.z);
            let px = (width / 2) + s.x * sc; let py = (height / 2) + s.y * sc;
            ctx.beginPath(); ctx.arc(px, py, s.s * sc, 0, Math.PI * 2);
            ctx.fillStyle = s.color; ctx.globalAlpha = Math.min(1, sc * 3); ctx.fill(); ctx.globalAlpha = 1;
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }
    renderStars();
</script>
</body>
</html>
