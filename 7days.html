<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>普賢六牙 ． 實修圓滿</title>
    <style>
        :root {
            --bg-deep: #010103;
            --gold-light: #f3e5ab;
            --gold-solid: #d4af37;
            --cyan: #8ba89c;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, var(--bg-deep) 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100dvh; width: 100vw; overflow: hidden; color: #fff;
        }

        /* ---------------- 星空與白霧 ---------------- */
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(circle at 50% 30%, transparent 10%, rgba(1, 1, 3, 0.95) 100%); }

        #mist-layer {
            position: absolute; bottom: -10%; left: -10%; width: 120%; height: 60%;
            z-index: 15; pointer-events: none; mix-blend-mode: screen; overflow: hidden;
        }
        .mist-cloud { position: absolute; filter: blur(35px); border-radius: 50%; animation: drift-mist 15s infinite alternate ease-in-out; }
        .mist-1 { width: 900px; height: 450px; left: -10%; bottom: -20px; background: radial-gradient(ellipse, rgba(212,175,55,0.2) 0%, transparent 70%); animation-duration: 18s; }
        .mist-2 { width: 1000px; height: 500px; right: -10%; bottom: -50px; background: radial-gradient(ellipse, rgba(196,113,237,0.15) 0%, transparent 70%); animation-duration: 22s; animation-delay: -5s; }
        .mist-3 { width: 800px; height: 400px; left: 15%; bottom: 10px; background: radial-gradient(ellipse, rgba(0,242,254,0.15) 0%, transparent 70%); animation-duration: 16s; animation-delay: -2s; }
        .mist-4 { width: 950px; height: 450px; right: 10%; bottom: -30px; background: radial-gradient(ellipse, rgba(255,126,179,0.15) 0%, transparent 70%); animation-duration: 20s; animation-delay: -8s; }
        .mist-5 { width: 700px; height: 350px; left: 35%; bottom: 0px; background: radial-gradient(ellipse, rgba(255,255,255,0.2) 0%, transparent 70%); animation-duration: 14s; animation-delay: -10s; }
        @keyframes drift-mist { 0% { transform: translateX(-30px) translateY(10px) scale(1); opacity: 0.6; } 100% { transform: translateX(30px) translateY(-10px) scale(1.1); opacity: 1; } }

        /* ---------------- 頂部導航 ---------------- */
        .nav-top {
            width: 90%; max-width: 480px; z-index: 20;
            display: flex; justify-content: space-between; align-items: center;
            margin-top: max(20px, env(safe-area-inset-top)); padding: 12px 20px;
            background: rgba(5, 5, 8, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212,175,55,0.2); border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .nav-btn { display: flex; align-items: center; gap: 8px; color: var(--gold-light); font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; }
        .nav-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.5; fill: none; }
        .nav-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }

        /* ---------------- 七日圓滿星軌 ---------------- */
        .tracker-container { z-index: 20; margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .tracker-title { color: var(--gold-light); font-size: 0.85rem; letter-spacing: 4px; text-shadow: 0 0 10px var(--gold-solid); font-weight: bold; }
        .tracker-circles { display: flex; gap: 10px; align-items: center; }
        
        .track-circle {
            width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(212,175,55,0.4);
            display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); transition: 0.4s;
        }
        .track-circle svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.2); transition: 0.4s; }
        .track-circle.lit { border-color: #fff; background: rgba(212,175,55,0.25); box-shadow: 0 0 10px var(--gold-solid), inset 0 0 8px var(--gold-solid); }
        .track-circle.lit svg { fill: #fff; filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 10px var(--gold-solid)); }

        /* ---------------- 任務框架與內容 ---------------- */
        .task-container {
            position: relative; z-index: 10; margin-top: 2vh;
            width: 95%; max-width: 450px; aspect-ratio: 3 / 4;
            display: flex; justify-content: center; align-items: center;
        }
        .tusks-frame {
            position: absolute; inset: 0; width: 100%; height: 100%;
            overflow: visible; filter: drop-shadow(0 0 25px rgba(212,175,55,0.6));
            animation: breathe-frame 3s infinite alternate ease-in-out;
        }
        @keyframes breathe-frame {
            0% { filter: drop-shadow(0 0 15px rgba(212,175,55,0.4)); }
            100% { filter: drop-shadow(0 0 35px var(--gold-solid)) drop-shadow(0 0 15px #fff); }
        }
        .tusk-inner-line { fill: none; stroke: var(--gold-light); stroke-width: 1.5; opacity: 0.95; }

        .task-content {
            position: relative; z-index: 20; text-align: center; width: 75%;
            background: rgba(5, 5, 10, 0.85); border: 1px solid rgba(212,175,55,0.6);
            border-radius: 20px; padding: 25px 20px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: inset 0 0 30px rgba(212,175,55,0.15), 0 15px 40px rgba(0,0,0,0.9);
            opacity: 0; transform: scale(0.9) translateY(20px); pointer-events: none;
            transition: opacity 1.5s ease-out, transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .task-content.show { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
        .task-subtitle { color: var(--cyan); font-size: 0.8rem; letter-spacing: 4px; margin-bottom: 12px; }
        .task-title {
            color: var(--gold-light); font-size: 1.2rem; font-weight: bold; letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(212,175,55,0.8); margin-bottom: 15px;
            border-bottom: 1px dashed rgba(212,175,55,0.4); padding-bottom: 12px;
        }
        .task-desc { color: #eee; font-size: 0.9rem; line-height: 2; letter-spacing: 1px; text-align: justify; text-align-last: center; }

        /* ---------------- 底部印心法陣與資糧棒 (大智補回) ---------------- */
        .action-zone {
            z-index: 20; position: absolute; bottom: 5%; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            opacity: 0; transition: opacity 1.5s 1s; /* 跟隨任務框後浮現 */
            pointer-events: none;
        }
        .action-zone.show { opacity: 1; pointer-events: auto; }
        
        .seal-btn {
            position: relative; width: 90px; height: 90px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .seal-bg { position: absolute; inset: 0; border: 1px dashed rgba(212,175,55,0.4); border-radius: 50%; animation: slow-spin 10s linear infinite; }
        .seal-progress { position: absolute; inset: -4px; transform: rotate(-90deg); pointer-events: none; }
        .seal-core { 
            position: absolute; width: 44px; height: 44px; border-radius: 50%;
            background: radial-gradient(circle, var(--gold-light) 0%, var(--gold-solid) 100%);
            box-shadow: 0 0 15px var(--gold-solid); transition: 0.3s;
        }
        .seal-text { position: absolute; bottom: -25px; color: var(--cyan); font-size: 0.7rem; letter-spacing: 3px; transition: 0.3s; white-space: nowrap; }
        .seal-btn:active .seal-core { transform: scale(0.85); filter: brightness(1.3) drop-shadow(0 0 25px #fff); }

        .pool-wrap { width: 70%; max-width: 300px; text-align: center; margin-top: 15px; }
        .pool-label { font-size: 0.7rem; color: var(--gold-light); letter-spacing: 2px; margin-bottom: 6px; opacity: 0.8; }
        .pool-bar-bg { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .pool-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #d4af37, #fffde7, #d4af37); background-size: 200% 100%; animation: flow 3s linear infinite; transition: width 1s; }

        @keyframes slow-spin { 100% { transform: rotate(360deg); } }
        @keyframes flow { 100% { background-position: 200% 0; } }

        /* ---------------- 大數據雙環 Modal ---------------- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.4s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .data-panel {
            background: rgba(10,10,15,0.9); border: 1px solid rgba(212,175,55,0.4);
            border-radius: 20px; padding: 30px; width: 85%; max-width: 350px; text-align: center;
            box-shadow: 0 0 40px rgba(212,175,55,0.2);
        }
        .data-title { color: var(--gold-light); font-size: 1.1rem; letter-spacing: 4px; margin-bottom: 25px; border-bottom: 1px dashed rgba(212,175,55,0.3); padding-bottom: 10px;}
        .rings-container { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px;}
        .ring-box { position: relative; width: 100px; height: 100px; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .ring-svg { position: absolute; inset: 0; transform: rotate(-90deg); width: 100%; height: 100%; }
        .ring-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
        .ring-fill { fill: none; stroke: url(#g-gold); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1.5s ease-out; }
        .ring-num { font-size: 1.2rem; color: #fff; font-weight: bold; text-shadow: 0 0 10px var(--gold-solid); }
        .ring-lbl { font-size: 0.65rem; color: var(--cyan); letter-spacing: 2px; margin-top: 5px; }
        .close-btn { margin-top: 20px; padding: 8px 20px; background: transparent; border: 1px solid var(--gold-solid); color: var(--gold-light); border-radius: 10px; cursor: pointer; letter-spacing: 2px; }

    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <linearGradient id="tusk-gold" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#8a6518" stop-opacity="0.95"/>
                <stop offset="35%" stop-color="#d4af37" stop-opacity="0.95"/>
                <stop offset="70%" stop-color="#f3e5ab" stop-opacity="1"/>
                <stop offset="100%" stop-color="#fffde7" stop-opacity="1"/>
            </linearGradient>
            <linearGradient id="g-gold" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f3e5ab"/><stop offset="100%" stop-color="#d4af37"/>
            </linearGradient>
            <g id="single-tusk">
                <path fill="url(#tusk-gold)" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M 20,400 C 10,250 80,100 200,40 C 110,130 80,240 70,400 Q 45,410 20,400 Z" />
                <path class="tusk-inner-line" d="M 35,395 C 30,280 80,150 170,60" />
                <path class="tusk-inner-line" d="M 50,395 C 45,300 80,200 130,110" />
                <path fill="none" stroke="var(--gold-light)" stroke-width="2.5" stroke-linecap="round" d="M 15,380 Q 45,395 73,380" />
                <path fill="none" stroke="var(--gold-light)" stroke-width="2.5" stroke-linecap="round" d="M 20,400 Q 45,415 70,400" />
            </g>
        </defs>
    </svg>

    <canvas id="starCanvas"></canvas>
    <div id="vignette"></div>

    <div id="mist-layer">
        <div class="mist-cloud mist-1"></div><div class="mist-cloud mist-2"></div>
        <div class="mist-cloud mist-3"></div><div class="mist-cloud mist-4"></div><div class="mist-cloud mist-5"></div>
    </div>

    <!-- 頂部導航 -->
    <div class="nav-top">
        <div class="nav-btn" onclick="alert('跳轉回第一頁琉璃天梯')"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg> 歸返天梯</div>
        <div class="nav-divider"></div>
        <div class="nav-btn" onclick="openDataModal()"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20V14"></path></svg> 歷史大數據</div>
    </div>

    <!-- 七日星軌 (由 JS 動態生成亮燈狀態) -->
    <div class="tracker-container">
        <div class="tracker-title" id="ui-week-title">【 普賢十願 ． 行願軌跡 】</div>
        <div class="tracker-circles" id="ui-trackers">
            <!-- JS 注入 -->
        </div>
    </div>

    <div class="task-container">
        <svg class="tusks-frame" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid meet">
            <g id="left-tusks">
                <use href="#single-tusk" x="-30" y="20" transform="scale(1)" />
                <use href="#single-tusk" x="30" y="100" transform="scale(0.85)" />
                <use href="#single-tusk" x="90" y="200" transform="scale(0.7)" />
            </g>
            <g id="right-tusks" transform="scale(-1, 1) translate(-400, 0)">
                <use href="#single-tusk" x="-30" y="20" transform="scale(1)" />
                <use href="#single-tusk" x="30" y="100" transform="scale(0.85)" />
                <use href="#single-tusk" x="90" y="200" transform="scale(0.7)" />
            </g>
        </svg>

        <!-- 任務內容 -->
        <div class="task-content" id="task-box">
            <div class="task-subtitle" id="ui-task-sub">讀取中...</div>
            <div class="task-title" id="ui-task-title">讀取中...</div>
            <div class="task-desc" id="ui-task-desc">法界連線中，請稍候...</div>
        </div>
    </div>

    <!-- 底部印心區 (大智補回) -->
    <div class="action-zone" id="action-zone">
        <div class="seal-btn" id="seal-btn">
            <div class="seal-bg"></div>
            <svg class="seal-progress" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
                <circle id="progress-circle" cx="50" cy="50" r="46" fill="none" stroke="url(#g-gold)" stroke-width="4" stroke-dasharray="289" stroke-dashoffset="289" stroke-linecap="round"/>
            </svg>
            <div class="seal-core"></div>
            <div class="seal-text" id="seal-text">長按契印 ． 圓滿今日</div>
        </div>
        <div class="pool-wrap">
            <div class="pool-label" id="ui-pool-text">法界暫存資糧 : 0 / 1000</div>
            <div class="pool-bar-bg"><div class="pool-bar-fill" id="ui-pool-bar"></div></div>
        </div>
    </div>

    <!-- 大數據視窗 -->
    <div class="modal-overlay" id="dataModal">
        <div class="data-panel">
            <div class="data-title">十方結緣 ‧ 歷史軌跡</div>
            <div class="rings-container">
                <!-- 歲星環 -->
                <div class="ring-box">
                    <svg class="ring-svg" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" class="ring-bg"/>
                        <circle cx="50" cy="50" r="40" class="ring-fill" id="ring-365" stroke-dasharray="251.2" stroke-dashoffset="251.2"/>
                    </svg>
                    <div class="ring-num" id="ui-num-365">0</div>
                    <div class="ring-lbl">歲星環 (天)</div>
                </div>
                <!-- 蓮花環 -->
                <div class="ring-box">
                    <svg class="ring-svg" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" class="ring-bg"/>
                        <circle cx="50" cy="50" r="40" class="ring-fill" id="ring-108" stroke-dasharray="251.2" stroke-dashoffset="251.2"/>
                    </svg>
                    <div class="ring-num" id="ui-num-108">0</div>
                    <div class="ring-lbl">劫波環 (年)</div>
                </div>
            </div>
            <button class="close-btn" onclick="closeDataModal()">合十收攝</button>
        </div>
    </div>

<script>
    // ================= 普賢十願題庫 (大智先擬定兩題範例，後續可擴充) =================
    const VOWS_DB = [
        { title: "禮敬諸佛", desc: "今日請於心中，對所遇見之三人暗自合十禮敬。<br>視一切眾生皆具如來智慧德相，不起慢心。" },
        { title: "稱讚如來", desc: "今日請真誠地讚美一位身邊的人。<br>不帶目的、純粹欣賞他人的善與美，即是稱讚自性如來。" },
        { title: "廣修供養", desc: "今日請行一件無相佈施（如捐款、施食、微笑）。<br>付出後絕不向人提及，讓善行純粹無染。" },
        { title: "懺悔業障", desc: "今日臨睡前，請靜坐三分鐘。<br>回想今日是否有心念偏差，並於心中至誠懺悔，清淨身心。" },
        { title: "隨喜功德", desc: "今日見到他人得利或受表揚時。<br>請在心中默念『善哉』，隨喜其福報，斷除嫉妒之根。" },
        { title: "請轉法輪", desc: "今日請分享一句讓您感動的法語或善知識給一位朋友。<br>用智慧的語言，點亮他人心中的明燈。" },
        { title: "請佛住世", desc: "今日請主動關心一位長輩或長者。<br>願一切具德長者健康安泰，常作世間慈悲的典範。" },
        { title: "常隨佛學", desc: "今日請撥出十分鐘，專注閱讀一段經文或善書。<br>不求速解，只求心領神會，與佛菩薩的智慧印心。" },
        { title: "恆順眾生", desc: "今日請在一次意見分歧中，放下己見，傾聽並順從他人的意願。<br>降伏我執，體會無我的柔和。" },
        { title: "普皆迴向", desc: "七日精進，功不唐捐。<br>願將此週所修之一切功德，皆悉迴向盡法界、虛空界，一切眾生。" }
    ];

    // ================= 本地資料庫狀態機 (State Machine) =================
    const DB_KEY = 'PureLand_Mission_V1';
    let db = JSON.parse(localStorage.getItem(DB_KEY));
    let todayStr = new Date().toDateString();

    if (!db) {
        db = {
            startDate: Date.now(),
            lastLogin: todayStr,
            weekRecord: [false, false, false, false, false, false, false], // 7天的達成狀態
            poolPoints: 0,
            totalDays365: 0,
            totalYears108: 0
        };
    }

    // 計算今天是「修行的第幾天」
    let daysPassed = Math.floor((Date.now() - db.startDate) / (1000 * 60 * 60 * 24));
    let currentVowIndex = Math.floor(daysPassed / 7) % 10; // 0~9 循環十願
    let currentDayOfWeek = daysPassed % 7; // 0~6 代表週一到週日

    // 跨日邏輯：如果日期變了，檢查是否需要跨週結算
    if (db.lastLogin !== todayStr) {
        let lastLoginDaysPassed = Math.floor((new Date(db.lastLogin).getTime() - db.startDate) / (1000 * 60 * 60 * 24));
        let lastLoginWeek = Math.floor(lastLoginDaysPassed / 7);
        let currentWeek = Math.floor(daysPassed / 7);

        // 如果跨週了，進行上一週的「結算」
        if (currentWeek > lastLoginWeek) {
            let successCount = db.weekRecord.filter(Boolean).length;
            if (successCount === 7) {
                db.poolPoints += 1000; // 完美全亮
            } else {
                db.poolPoints += (successCount * 100); // 殘缺結算
            }
            
            // 滿千匯出邏輯 (這裡假設對接主系統，我們先歸零並提示)
            if (db.poolPoints >= 1000) {
                alert(`法界感應！\n您累積的 ${db.poolPoints} 點資糧已匯回主道場！`);
                // 這裡可以寫入主系統的 localstorage: 主系統DB.points += db.poolPoints
                db.poolPoints = 0; 
            }

            // 清空新一週的紀錄
            db.weekRecord = [false, false, false, false, false, false, false];
        }
        db.lastLogin = todayStr;
        saveDB();
    }

    function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

    // ================= 畫面渲染與 UI 更新 =================
    function updateUI() {
        // 1. 渲染任務文字
        let vowData = (currentDayOfWeek === 6) ? VOWS_DB[9] : VOWS_DB[currentVowIndex]; // 第7天強制顯示普皆迴向
        document.getElementById('ui-task-sub').innerText = `普賢十願 ． 第 ${currentVowIndex + 1} 願 ． 軌跡 ${currentDayOfWeek + 1}/7`;
        document.getElementById('ui-task-title').innerText = vowData.title;
        document.getElementById('ui-task-desc').innerHTML = vowData.desc;

        // 2. 渲染星軌 (1~6 牙，第7蓮花)
        let trackersHTML = '';
        for (let i = 0; i < 7; i++) {
            let isLit = db.weekRecord[i] ? 'lit' : '';
            let svgIcon = i === 6 
                ? `<svg viewBox="0 0 24 24"><path d="M12 3 C9 9 7 13 12 19 C17 13 15 9 12 3 Z M12 19 C6 17 2 11 7 9 C9 9 10 14 12 19 Z M12 19 C18 17 22 11 17 9 C15 9 14 14 12 19 Z"/><path d="M7 21 Q12 23 17 21" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>` // 蓮花
                : `<svg viewBox="0 0 24 24"><path d="M6 19 C5 10 11 3 19 2 C13 7 10 13 10 19 Q8 20 6 19 Z"/></svg>`; // 象牙
            trackersHTML += `<div class="track-circle ${isLit}">${svgIcon}</div>`;
        }
        document.getElementById('ui-trackers').innerHTML = trackersHTML;

        // 3. 渲染資糧棒
        document.getElementById('ui-pool-text').innerText = `法界暫存資糧 : ${db.poolPoints} / 1000`;
        document.getElementById('ui-pool-bar').style.width = `${(db.poolPoints / 1000) * 100}%`;

        // 4. 判斷今日是否已完成，改變按鈕狀態
        let btnText = document.getElementById('seal-text');
        if (db.weekRecord[currentDayOfWeek]) {
            btnText.innerText = "【 今日行願已圓滿 】";
            btnText.style.color = "var(--gold-solid)";
            document.getElementById('progress-circle').style.strokeDashoffset = 0;
        } else {
            btnText.innerText = "長按契印 ． 圓滿今日";
            btnText.style.color = "var(--cyan)";
            document.getElementById('progress-circle').style.strokeDashoffset = 289;
        }
    }

    // ================= 延遲顯示特效 =================
    window.addEventListener('load', () => {
        updateUI();
        setTimeout(() => { 
            document.getElementById('task-box').classList.add('show'); 
            document.getElementById('action-zone').classList.add('show');
        }, 2500);
    });

    // ================= 長按印心邏輯 =================
    const btn = document.getElementById('seal-btn');
    const progCircle = document.getElementById('progress-circle');
    const hintText = document.getElementById('seal-text');
    let reqAnimId, startTime;
    const DURATION = 2000; // 2秒長按

    function drawProgress(timestamp) {
        if (!startTime) startTime = timestamp;
        let elapsed = timestamp - startTime;
        let pct = Math.min(elapsed / DURATION, 1);
        progCircle.style.strokeDashoffset = 289 - (289 * pct);
        
        if (pct < 1) { reqAnimId = requestAnimationFrame(drawProgress); } 
        else { completeTodayTask(); }
    }

    function startPress(e) {
        if (db.weekRecord[currentDayOfWeek]) return; // 今日已完成
        e.preventDefault();
        hintText.innerText = "能量注入中..."; hintText.style.color = "#fff";
        startTime = null;
        reqAnimId = requestAnimationFrame(drawProgress);
    }

    function cancelPress() {
        if (db.weekRecord[currentDayOfWeek]) return;
        cancelAnimationFrame(reqAnimId);
        progCircle.style.strokeDashoffset = 289;
        hintText.innerText = "長按契印 ． 圓滿今日"; hintText.style.color = "var(--cyan)";
    }

    function completeTodayTask() {
        if (db.weekRecord[currentDayOfWeek]) return;
        
        // 寫入資料庫
        db.weekRecord[currentDayOfWeek] = true;
        
        // 歲星大數據增加 (只加一次)
        db.totalDays365++;
        if (db.totalDays365 >= 365) {
            db.totalDays365 = 0;
            db.totalYears108++; // 蓮花歲數+1
            alert("法喜充滿！您已修滿 365 日，劫波蓮花歲數 + 1！");
        }
        
        saveDB();
        updateUI();
        
        // 小小法喜特效 (可接引導音效)
        const core = document.querySelector('.seal-core');
        core.style.transform = "scale(1.5)";
        core.style.opacity = "0";
        setTimeout(() => { core.style.transform = "scale(1)"; core.style.opacity = "1"; }, 500);
    }

    btn.addEventListener('mousedown', startPress);
    btn.addEventListener('touchstart', startPress, {passive: false});
    window.addEventListener('mouseup', cancelPress);
    window.addEventListener('touchend', cancelPress);

    // ================= 大數據雙環視窗 =================
    function openDataModal() {
        document.getElementById('dataModal').classList.add('active');
        document.getElementById('ui-num-365').innerText = db.totalDays365;
        document.getElementById('ui-num-108').innerText = db.totalYears108;
        
        // 圓環周長為 2 * PI * 40 = 251.2
        setTimeout(() => {
            let pct365 = Math.min(db.totalDays365 / 365, 1);
            let pct108 = Math.min(db.totalYears108 / 108, 1);
            document.getElementById('ring-365').style.strokeDashoffset = 251.2 - (251.2 * pct365);
            document.getElementById('ring-108').style.strokeDashoffset = 251.2 - (251.2 * pct108);
        }, 100);
    }

    function closeDataModal() {
        document.getElementById('dataModal').classList.remove('active');
        document.getElementById('ring-365').style.strokeDashoffset = 251.2;
        document.getElementById('ring-108').style.strokeDashoffset = 251.2;
    }

    // ================= 星空引擎 =================
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [];
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();
    const STAR_COLORS = ['#f3e5ab', '#ffffff', '#00f2fe', '#ff7eb3', '#c471ed', '#43e97b', '#d4af37'];
    for (let i = 0; i < 250; i++) { 
        let color = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
        stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: color, s: Math.random() * 2 + 1 });
    }
    function renderStars() {
        ctx.fillStyle = 'rgba(2, 2, 4, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= 1.5; 
            if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; } 
            let sc = 400 / (400 + s.z);
            let px = (width / 2) + s.x * sc; let py = (height / 2) + s.y * sc;
            ctx.beginPath(); ctx.arc(px, py, s.s * sc, 0, Math.PI * 2);
            ctx.fillStyle = s.color; ctx.globalAlpha = Math.min(1, sc * 3); ctx.fill(); ctx.globalAlpha = 1;
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }
    renderStars();
</script>
</body>
</html>
