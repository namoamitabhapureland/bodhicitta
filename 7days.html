<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>普賢六牙 ． 十願任務框</title>
    <style>
        :root {
            --bg-deep: #010103;
            --gold-light: #f3e5ab;
            --gold-solid: #d4af37;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, var(--bg-deep) 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; justify-content: center; align-items: center;
            height: 100dvh; width: 100vw; overflow: hidden; color: #fff;
        }

        /* ---------------- 星空背景 ---------------- */
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

        /* ---------------- 任務容器 ---------------- */
        .task-container {
            position: relative; z-index: 10;
            width: 90%; max-width: 420px; aspect-ratio: 3 / 4;
            display: flex; justify-content: center; align-items: center;
        }

        /* ---------------- 六牙 SVG 框架 ---------------- */
        .tusks-frame {
            position: absolute; inset: 0; width: 100%; height: 100%;
            overflow: visible; filter: drop-shadow(0 0 8px rgba(212,175,55,0.4));
        }

        /* 象牙線條風格 (致敬您的合十手印) */
        .tusk-line {
            fill: rgba(255,255,255,0.01); /* 極致微弱的實體感 */
            stroke: var(--gold-light);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.5s ease;
        }
        
        /* 象牙內部裝飾細線 */
        .tusk-inner-line {
            fill: none;
            stroke: var(--gold-solid);
            stroke-width: 1;
            opacity: 0.6;
        }

        /* ---------------- 中央文字區塊 ---------------- */
        .task-content {
            position: relative; z-index: 20;
            text-align: center; width: 65%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(212,175,55,0.15);
            border-radius: 20px; padding: 30px 20px;
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 20px rgba(212,175,55,0.05);
        }

        .task-subtitle {
            color: #8ba89c; font-size: 0.75rem; letter-spacing: 4px; margin-bottom: 15px;
        }
        .task-title {
            color: var(--gold-light); font-size: 1.25rem; font-weight: bold; letter-spacing: 6px;
            text-shadow: 0 0 15px rgba(212,175,55,0.6); margin-bottom: 20px;
            border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 15px;
        }
        .task-desc {
            color: #ddd; font-size: 0.95rem; line-height: 2; letter-spacing: 2px;
            text-align: justify; text-align-last: center;
        }

    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <div class="task-container">
        <!-- 普賢六牙 SVG 框架 -->
        <!-- ViewBox 寬 400, 高 500 -->
        <svg class="tusks-frame" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid meet">
            <defs>
                <!-- 象牙的共用路徑 (尖端朝右上，根部在左下) -->
                <!-- 利用三次貝茲曲線(C)拉出完美弦月弧度 -->
                <g id="single-tusk">
                    <!-- 象牙外廓 -->
                    <path class="tusk-line" d="M 20,400 C 10,250 80,100 200,40 C 110,130 80,240 70,400 Q 45,410 20,400 Z" />
                    <!-- 象牙紋理細線 -->
                    <path class="tusk-inner-line" d="M 35,395 C 30,280 80,150 170,60" />
                    <path class="tusk-inner-line" d="M 50,395 C 45,300 80,200 130,110" />
                    <!-- 根部金環裝飾 -->
                    <path class="tusk-line" d="M 15,380 Q 45,395 73,380" stroke-width="1.5"/>
                    <path class="tusk-line" d="M 20,400 Q 45,415 70,400" stroke-width="1.5"/>
                </g>
            </defs>

            <!-- ================= 左側三牙 (六度之前三) ================= -->
            <g id="left-tusks">
                <!-- 大象牙 (佈施) -->
                <use href="#single-tusk" x="-30" y="20" transform="scale(1)" />
                <!-- 中象牙 (持戒) -->
                <use href="#single-tusk" x="30" y="100" transform="scale(0.85)" />
                <!-- 小象牙 (忍辱) -->
                <use href="#single-tusk" x="90" y="200" transform="scale(0.7)" />
            </g>

            <!-- ================= 右側三牙 (六度之後三) ================= -->
            <!-- 利用 scale(-1, 1) 水平翻轉，並平移到底 -->
            <g id="right-tusks" transform="scale(-1, 1) translate(-400, 0)">
                <!-- 大象牙 (精進) -->
                <use href="#single-tusk" x="-30" y="20" transform="scale(1)" />
                <!-- 中象牙 (禪定) -->
                <use href="#single-tusk" x="30" y="100" transform="scale(0.85)" />
                <!-- 小象牙 (般若) -->
                <use href="#single-tusk" x="90" y="200" transform="scale(0.7)" />
            </g>
        </svg>

        <!-- 任務內容 -->
        <div class="task-content">
            <div class="task-subtitle">普賢十願 ． 第一願</div>
            <div class="task-title">禮敬諸佛</div>
            <div class="task-desc">
                今日請於心中，對所遇見之三人，暗自合十禮敬。<br><br>
                視一切眾生皆具如來智慧德相，不起慢心。
            </div>
        </div>
    </div>

<script>
    // 簡單星空背景
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [];
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();
    for (let i = 0; i < 150; i++) { stars.push({ x: Math.random() * 2000, y: Math.random() * 2000, z: Math.random() * 2000, s: Math.random() * 1.5 + 0.5 }); }
    function renderStars() {
        ctx.fillStyle = 'rgba(2, 2, 3, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= 0.5; if (s.z <= 0) { s.z = 2000; s.x = Math.random() * 2000; s.y = Math.random() * 2000; }
            let sc = 400 / (400 + s.z);
            ctx.beginPath(); ctx.arc((width/2) + (s.x-1000)*sc, (height/2) + (s.y-1000)*sc, s.s*sc, 0, Math.PI*2);
            ctx.fillStyle = `rgba(243,229,171, ${Math.min(1, sc * 2)})`; ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }
    renderStars();
</script>
</body>
</html>
