<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>信根法幣 ． 金剛鍛造室</title>
    <style>
        body {
            background: #080705; /* 極深褐黑 */
            color: #C1A583; /* 琥珀流金 */
            font-family: "PingFang TC", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; margin: 0;
            overflow: hidden; letter-spacing: 4px;
        }

        /* 琉璃朦朧背景 */
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(193, 165, 131, 0.05) 0%, transparent 70%);
            animation: rotate 60s linear infinite; z-index: -1;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 透明金框按鈕 */
        .btn-vajra {
            background: transparent;
            border: 1px solid rgba(193, 165, 131, 0.4);
            color: #C1A583;
            padding: 20px 60px;
            font-size: 1.1rem;
            border-radius: 2px;
            cursor: pointer;
            transition: 0.5s;
            backdrop-filter: blur(5px);
        }

        .btn-vajra:active {
            background: rgba(193, 165, 131, 0.1);
            border-color: rgba(193, 165, 131, 1);
            box-shadow: 0 0 30px rgba(193, 165, 131, 0.2);
        }

        #coin-svg {
            filter: drop-shadow(0 0 10px rgba(193, 165, 131, 0.3));
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .forging-status {
            margin-top: 30px; font-size: 0.8rem; color: #968E86;
            text-align: center; height: 20px;
        }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 50px;">
        <h1 style="font-weight: 200; font-size: 1.5rem;">一 萬 聲 ． 信 根 法 幣</h1>
        <div style="width: 50px; height: 1px; background: #C1A583; margin: 20px auto; opacity: 0.5;"></div>
    </div>

    <svg id="coin-svg" width="300" height="300" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="48" fill="none" stroke="#C1A583" stroke-width="0.2" opacity="0.3"/>
        
        <g id="petals-group"></g>
        
        <circle cx="50" cy="50" r="1.5" fill="#C1A583"/>
        
        <circle cx="50" cy="50" r="44" fill="none" stroke="#C1A583" stroke-width="0.1" stroke-dasharray="0.5 1.5" opacity="0.5"/>
    </svg>

    <div class="forging-status" id="status">— 凝神攝心，長按啟動鍛造 —</div>

    <div style="margin-top: 50px;">
        <button class="btn-vajra" id="forge-btn" onpointerdown="startForging()" onpointerup="stopForging()">
            持 咒 鍛 造
        </button>
    </div>

    <script>
        let interval;
        let progress = 0;
        
        function startForging() {
            document.getElementById('status').innerText = "金剛力場注入中...";
            interval = setInterval(() => {
                progress += 0.5;
                updateSVG(progress);
                if (progress >= 100) {
                    clearInterval(interval);
                    document.getElementById('status').innerText = "鍛造完成 ． 善根成就";
                    // 這裡執行領取證書與法幣的最終邏輯
                }
            }, 50);
        }

        function stopForging() {
            clearInterval(interval);
            if (progress < 100) {
                document.getElementById('status').innerText = "心力中斷 ． 能量散逸";
                progress = 0; // 或者緩慢衰減
                updateSVG(0);
            }
        }

        function updateSVG(p) {
            const group = document.getElementById('petals-group');
            group.innerHTML = '';
            // 隨進度增加「識」的顯現
            const count = Math.floor(p / 5) + 8; 
            for(let i=0; i<count; i++) {
                const angle = (i / count) * 360;
                const petal = `<path d="M50 50 Q50 30 55 25 T50 15 T45 25 Q50 30 50 50" 
                                    fill="none" stroke="#C1A583" stroke-width="0.3" 
                                    transform="rotate(${angle} 50 50)" opacity="${p/100}"/>`;
                group.innerHTML += petal;
            }
            document.getElementById('coin-svg').style.transform = `rotate(${p}deg)`;
        }
    </script>
</body>
</html>
