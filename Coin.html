<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>信根法幣 ． 金剛鍛造室</title>
    <style>
        :root {
            --bg-slate: #080705; 
            --gold-bright: #f3e5ab; 
            --gold-solid: #d4af37; 
            --jade-muted: #8ba89c; 
            --text-main: #d0d0d0;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(212, 175, 55, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 20px; background: var(--bg-slate); color: var(--text-main); 
            font-family: -apple-system, "PingFang TC", sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* --- 返回按鈕 --- */
        .back-btn {
            align-self: flex-start; margin-bottom: 20px; color: var(--gold-bright);
            text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
            background: var(--glass-bg); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--glass-border);
        }

        /* --- 標題區域 --- */
        .lab-header { width: 100%; max-width: 600px; text-align: center; margin-bottom: 30px; }
        .lab-title { font-size: 1.4rem; letter-spacing: 8px; color: var(--gold-bright); font-weight: 300; }

        /* --- 模組容器 --- */
        .forge-section {
            width: 100%; max-width: 600px; background: var(--glass-bg); 
            border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 30px; margin-bottom: 25px; backdrop-filter: blur(15px);
        }

        /* --- 輸入與引導 --- */
        .input-group { margin-bottom: 30px; text-align: center; }
        .styled-input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 15px; color: var(--gold-bright); font-size: 1.1rem;
            text-align: center; outline: none; letter-spacing: 3px;
        }
        .edu-text { font-size: 0.9rem; line-height: 1.8; color: var(--text-main); text-align: justify; opacity: 0.8; margin-top: 15px; }

        /* --- 鍛造核心 (SVG) --- */
        .svg-container { width: 100%; text-align: center; padding: 20px 0; }
        #coin-svg { width: 220px; height: 220px; filter: drop-shadow(0 0 15px rgba(212,175,55,0.2)); }
        
        /* 鍛造進度圈 */
        #progress-ring { transition: stroke-dashoffset 0.1s linear; }

        /* --- 震動按鈕 --- */
        .vajra-btn {
            width: 100%; padding: 22px; border-radius: 20px; border: 1px solid var(--gold-solid); 
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(212,175,55,0.05)); 
            color: var(--gold-bright); font-weight: bold; letter-spacing: 5px; cursor: pointer;
            user-select: none; -webkit-user-select: none;
        }
        .vajra-btn:active { background: rgba(212,175,55,0.1); }

        /* --- 列印證書區域 (預設隱藏) --- */
        #cert-print-area { 
            display: none; width: 100%; max-width: 500px; padding: 40px; 
            background: #fff; color: #1a1c1e; text-align: center; border: 1px solid #d4af37;
        }
        .hash-split-box { 
            font-family: monospace; font-size: 0.75rem; background: #f5f2ef; 
            padding: 15px; border-radius: 10px; margin-top: 25px; word-break: break-all;
            line-height: 1.6; border-left: 3px solid var(--gold-solid);
        }

        @media print {
            body * { display: none !important; }
            #cert-print-area, #cert-print-area * { display: block !important; }
            #cert-print-area { border: none; margin: 0; width: 100%; }
        }

        .shaking { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, -1px); } }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">回道場</a>

    <header class="lab-header">
        <div class="lab-title">信根法幣 ． 金剛鍛造</div>
    </header>

    <section class="forge-section">
        <div class="input-group">
            <div style="font-size: 0.8rem; color: var(--gold-solid); margin-bottom: 12px; letter-spacing: 2px;">第一步 ． 攝受名號</div>
            <input type="text" id="user-name" class="styled-input" placeholder="請輸入行者名號">
            <div class="edu-text">
                此名號將作為「定力雜湊」之種子。一萬聲念佛紀錄，是對自性淨土的承諾。鍛造過程需凝聚神識，不可中斷。
            </div>
        </div>
    </section>

    <section class="forge-section" style="text-align: center;">
        <div class="svg-container" id="svg-wrap">
            <svg id="coin-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="48" fill="none" stroke="var(--gold-solid)" stroke-width="0.2" opacity="0.2"/>
                
                <g id="lotus-core" fill="none" stroke="var(--gold-bright)" stroke-width="0.8">
                    <path d="M50 50 C50 35 40 25 50 10 C60 25 50 35 50 50" opacity="0.6"/>
                    <path d="M50 50 C35 50 25 40 10 50 C25 60 35 50 50 50" opacity="0.6"/>
                    <path d="M50 50 C50 65 60 75 50 90 C40 75 50 65 50 50" opacity="0.6"/>
                    <path d="M50 50 C65 50 75 60 90 50 C75 40 65 50 50 50" opacity="0.6"/>
                    <circle cx="50" cy="50" r="4" fill="var(--gold-bright)"/>
                </g>

                <circle id="progress-ring" cx="50" cy="50" r="45" fill="none" stroke="var(--gold-bright)" 
                        stroke-width="1.5" stroke-dasharray="283" stroke-dashoffset="283" 
                        transform="rotate(-90 50 50)"/>
            </svg>
        </div>

        <div id="forge-status" style="font-size: 0.85rem; margin-bottom: 25px; color: var(--jade-muted); letter-spacing: 2px;">
            — 請填寫名號後，長按啟動鍛造 —
        </div>

        <button class="vajra-btn" id="forge-trigger" onpointerdown="startForge()" onpointerup="stopForge()" onpointerleave="stopForge()">
            凝 神 鍛 造 (100秒)
        </button>
    </section>

    <div id="cert-print-area">
        <div style="border: 2px solid #d4af37; padding: 40px; position: relative;">
            <div style="font-size: 0.7rem; color: #888; letter-spacing: 5px;">AMITABHA PURE LAND SYSTEM</div>
            <h1 style="letter-spacing: 12px; color: #d4af37; margin: 30px 0;">信 根 法 幣</h1>
            
            <div style="font-size: 1.2rem; margin: 20px 0;">行者名號：<span id="print-name" style="font-weight: bold;"></span></div>
            <p style="font-size: 0.9rem; line-height: 1.8;">
                茲證明行者已圓滿萬聲念佛紀錄，<br>成就十信位資糧，特頒此證，永誌不忘。
            </p>

            <div style="margin: 30px 0;">
                <svg width="120" height="120" viewBox="0 0 100 100">
                    <path d="M50 50 C50 35 40 25 50 10 C60 25 50 35 50 50" fill="none" stroke="#d4af37" stroke-width="1"/>
                    <path d="M50 50 C35 50 25 40 10 50 C25 60 35 50 50 50" fill="none" stroke="#d4af37" stroke-width="1"/>
                    <path d="M50 50 C50 65 60 75 50 90 C40 75 50 65 50 50" fill="none" stroke="#d4af37" stroke-width="1"/>
                    <path d="M50 50 C65 50 75 60 90 50 C75 40 65 50 50 50" fill="none" stroke="#d4af37" stroke-width="1"/>
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#d4af37" stroke-width="0.5" stroke-dasharray="2 2"/>
                </svg>
            </div>

            <div class="hash-split-box">
                <div style="font-size: 0.6rem; color: #888; margin-bottom: 5px;">定力驗證雜湊 (Samadhi Hash)</div>
                <div id="hash-p1"></div>
                <div id="hash-p2"></div>
            </div>

            <div style="margin-top: 40px; font-size: 0.7rem; color: #aaa; letter-spacing: 2px;">
                二 零 二 六 ． 淨 息 流 ． 功 德 自 證
            </div>
        </div>
    </div>

    <script>
        let forgeTimer;
        let progress = 0;
        const totalDuration = 1000; // 1000個單位 = 100秒 (每100ms增加1)

        async function generateHash(name) {
            const msgBuffer = new TextEncoder().encode(name + Date.now());
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
        }

        function startForge() {
            const name = document.getElementById('user-name').value.trim();
            if(!name) { alert("請先攝受名號，方能鍛造。"); return; }
            
            const status = document.getElementById('forge-status');
            const ring = document.getElementById('progress-ring');
            const wrap = document.getElementById('svg-wrap');
            const btn = document.getElementById('forge-trigger');

            btn.innerText = "能量共振中...";
            wrap.classList.add('shaking');

            forgeTimer = setInterval(() => {
                progress += 1;
                ring.style.strokeDashoffset = 283 - (283 * (progress / totalDuration));
                
                // 強力震動反饋
                if (navigator.vibrate) navigator.vibrate(60);
                
                status.innerText = `定力凝聚：${Math.floor(progress / 10)}%`;

                if (progress >= totalDuration) {
                    clearInterval(forgeTimer);
                    completeForge(name);
                }
            }, 100); 
        }

        function stopForge() {
            clearInterval(forgeTimer);
            const wrap = document.getElementById('svg-wrap');
            const btn = document.getElementById('forge-trigger');
            wrap.classList.remove('shaking');
            if (progress < totalDuration) {
                progress = 0;
                document.getElementById('progress-ring').style.strokeDashoffset = 283;
                document.getElementById('forge-status').innerText = "心力中斷 ． 歸於平靜";
                btn.innerText = "持 咒 鍛 造";
            }
        }

        async function completeForge(name) {
            const status = document.getElementById('forge-status');
            status.style.color = "var(--gold-bright)";
            status.innerText = "信根圓滿 ． 法幣成證";
            
            const fullHash = await generateHash(name);
            // 分兩段，每段 32 字元，確保不破格
            document.getElementById('hash-p1').innerText = fullHash.substring(0, 32);
            document.getElementById('hash-p2').innerText = fullHash.substring(32);
            document.getElementById('print-name').innerText = name;

            const btn = document.getElementById('forge-trigger');
            btn.innerText = "領 取 法 幣 證 書";
            btn.onpointerdown = null; 
            btn.onclick = () => window.print();
        }
    </script>
</body>
</html>
