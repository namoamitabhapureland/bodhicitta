<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨息流 ． 金剛方便藏</title>
    <style>
        :root {
            --bg-slate: #1a1c1e; 
            --gold-bright: #f3e5ab; 
            --gold-solid: #d4af37; 
            --jade-muted: #8ba89c; 
            --text-main: #d0d0d0;
            --text-dim: #888888;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 20px; background: var(--bg-slate); color: var(--text-main); 
            font-family: -apple-system, "PingFang TC", sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* --- 頂部導航 --- */
        .lab-header {
            width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border);
        }
        .home-link { cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .home-link:hover { opacity: 1; }

        /* --- 鍛造模組 --- */
        .forge-section {
            width: 100%; max-width: 600px; background: var(--glass-bg); 
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 25px; margin-bottom: 30px; backdrop-filter: blur(10px);
            text-align: center;
        }

        /* 能量環 SVG */
        .svg-container { width: 100%; text-align: center; padding: 20px 0; }
        #energy-ring { max-width: 200px; filter: drop-shadow(0 0 15px rgba(212,175,55,0.2)); }

        /* 長按按鈕 */
        .vajra-btn {
            width: 100%; padding: 25px; border-radius: 20px; border: 1px solid var(--gold-solid); 
            background: rgba(212,175,55,0.05); color: var(--gold-bright); 
            font-weight: bold; letter-spacing: 6px; cursor: pointer; transition: 0.5s;
            user-select: none; -webkit-user-select: none;
        }
        .vajra-btn.active { background: rgba(212,175,55,0.2); box-shadow: 0 0 40px rgba(212,175,55,0.3); }

        /* --- 列印證書 (預設隱藏) --- */
        #cert-print-area { 
            display: none; width: 100%; max-width: 500px; padding: 50px; 
            border: 1px solid var(--gold-solid); background: #fff; color: #1a1c1e;
            text-align: center; position: relative;
        }
        .hash-split { 
            font-family: monospace; font-size: 0.8rem; line-height: 1.5; 
            background: #f9f9f9; padding: 15px; border-radius: 8px; margin-top: 20px;
            word-break: break-all;
        }

        @media print {
            body * { display: none !important; }
            #cert-print-area, #cert-print-area * { display: block !important; }
            #cert-print-area { margin: 0; border: none; width: 100%; }
        }

        .shaking { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(0,0); } 50% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, 0); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <header class="lab-header">
        <div class="home-link" onclick="location.href='index.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--gold-bright)" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </div>
        <div style="color: var(--gold-bright); letter-spacing: 4px; font-weight: bold;">金剛方便藏</div>
        <div style="width: 24px;"></div>
    </header>

    <section class="forge-section" id="main-forge">
        <div style="color: var(--jade-muted); font-size: 0.8rem; margin-bottom: 20px; letter-spacing: 2px;">
            一萬聲後 ． 凝神自證
        </div>
        
        <div class="svg-container" id="svg-wrap">
            <svg id="energy-ring" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="var(--gold-solid)" stroke-width="0.5" opacity="0.2"/>
                <g id="lotus-core" stroke="var(--gold-bright)" stroke-width="1" fill="none">
                    <path d="M50 50 Q50 30 55 25 T50 10 T45 25 Q50 30 50 50" opacity="0.5" />
                    <circle cx="50" cy="50" r="3" fill="var(--gold-bright)"/>
                </g>
                <circle id="progress-circle" cx="50" cy="50" r="45" fill="none" stroke="var(--gold-bright)" stroke-width="1.5" stroke-dasharray="283" stroke-dashoffset="283" transform="rotate(-90 50 50)"/>
            </svg>
        </div>

        <div id="forge-status" style="font-size: 0.85rem; margin-bottom: 30px; color: var(--text-dim);">
            — 需長按以啟動能量碰撞 —
        </div>

        <button class="vajra-btn" id="forge-trigger" onpointerdown="startForge()" onpointerup="stopForge()" onpointerleave="stopForge()">
            持 咒 鍛 造
        </button>
    </section>

    <div id="cert-print-area">
        <div style="border: 2px solid #d4af37; padding: 40px;">
            <h1 style="letter-spacing: 10px; color: #d4af37;">信 根 法 幣</h1>
            <p style="margin: 20px 0;">行者：<span id="print-name">妙依</span></p>
            <div style="margin: 30px 0;">
                <svg width="100" height="100" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="40" fill="none" stroke="#d4af37" stroke-width="0.5"/>
                    <path d="M50 20 L50 80 M20 50 L80 50" stroke="#d4af37" stroke-width="1"/>
                </svg>
            </div>
            <p style="font-size: 0.9rem;">成就功德：一萬聲念佛紀錄</p>
            
            <div class="hash-split">
                <div id="hash-p1"></div>
                <div id="hash-p2"></div>
            </div>
            
            <div style="margin-top: 50px; font-size: 0.7rem; color: #888;">
                淨息流 ． 彌陀淨土系統 ． 2026
            </div>
        </div>
        <p class="no-print" style="margin-top: 20px; color: #888; font-size: 0.8rem;">( 建議使用相片紙列印並封存 )</p>
    </div>

    <script>
        let forgeTimer;
        let progress = 0;
        const totalDuration = 100; // 模擬長時間鍛造
        
        function startForge() {
            const btn = document.getElementById('forge-trigger');
            const status = document.getElementById('forge-status');
            const circle = document.getElementById('progress-circle');
            const wrap = document.getElementById('svg-wrap');
            
            btn.classList.add('active');
            wrap.classList.add('shaking');
            status.innerText = "能量共振中...";
            
            forgeTimer = setInterval(() => {
                progress += 1;
                circle.style.strokeDashoffset = 283 - (283 * (progress / totalDuration));
                
                // 震動反饋
                if (navigator.vibrate) navigator.vibrate(50);
                
                if (progress >= totalDuration) {
                    clearInterval(forgeTimer);
                    completeForge();
                }
            }, 100); // 10秒達成 (測試用，正式可改長)
        }

        function stopForge() {
            clearInterval(forgeTimer);
            const btn = document.getElementById('forge-trigger');
            const wrap = document.getElementById('svg-wrap');
            btn.classList.remove('active');
            wrap.classList.remove('shaking');
            if (progress < totalDuration) {
                progress = 0;
                document.getElementById('progress-circle').style.strokeDashoffset = 283;
                document.getElementById('forge-status').innerText = "心力中斷 ． 能量散逸";
            }
        }

        function completeForge() {
            document.getElementById('forge-status').style.color = "var(--jade-muted)";
            document.getElementById('forge-status').innerText = "鍛造圓滿 ． 功德自證";
            
            // 生成模擬 Hash 並分段
            const fullHash = "8A3FDE09CC12BD8E98D4AFA001283942009AEF3103729103C1A583BBA89C5850";
            document.getElementById('hash-p1').innerText = fullHash.substring(0, 32);
            document.getElementById('hash-p2').innerText = fullHash.substring(32);
            
            document.getElementById('forge-trigger').innerText = "領 取 法 幣";
            document.getElementById('forge-trigger').onclick = () => {
                window.print();
            };
        }
    </script>
</body>
</html>
