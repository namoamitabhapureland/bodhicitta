<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一真法界 ‧ 菩提契印系統</title>
    <style>
        :root {
            --bg: #020203;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background: var(--bg);
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            color: #fff; height: 100dvh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 星空背景簡化版 */
        #bg-canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

        #deck {
            position: relative; width: 100%; height: 400px;
            display: flex; justify-content: center; align-items: flex-end;
            z-index: 10; perspective: 1000px;
        }

        .card {
            position: absolute; width: 220px; height: 220px;
            cursor: pointer; transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform;
        }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.is-active { transform: scale(1.2) translateY(-100px) !important; z-index: 100 !important; }
        .card.is-flipped .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute; inset: 0; border-radius: 50%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(212, 175, 55, 0.1);
            overflow: hidden;
        }

        .card-back { background: linear-gradient(145deg, #0f1215, #020203); }
        .card-front { background: #050505; transform: rotateY(180deg); padding: 20px; }

        /* SVG 晶石裝飾 */
        .crystal-container { width: 100%; height: 100%; position: absolute; inset: 0; }
        .seed-label { font-size: 0.8rem; color: var(--gold); letter-spacing: 4px; margin-top: 10px; z-index: 5; }

        /* 介面文案 */
        #ui-hint { position: absolute; bottom: 10%; color: var(--cyan); font-size: 0.85rem; letter-spacing: 2px; z-index: 20; }
        
        /* 扇形位置 */
        .pos-0 { transform: rotateZ(-15deg) translateX(-160px) translateY(40px); }
        .pos-1 { transform: rotateZ(-7deg) translateX(-80px) translateY(10px); }
        .pos-2 { transform: rotateZ(0deg) translateX(0px); }
        .pos-3 { transform: rotateZ(7deg) translateX(80px) translateY(10px); }
        .pos-4 { transform: rotateZ(15deg) translateX(160px) translateY(40px); }

    </style>
</head>
<body onclick="resetCards()">

<canvas id="bg-canvas"></canvas>

<div id="deck"></div>

<div id="ui-hint">觀想位階 ‧ 啟動契印</div>

<script>
    // 妙依居士 ‧ 一真法界位階資料
    const RANKS = [
        { title: '十信位', color: '#87CEFA' },
        { title: '十住位', color: '#E6E6FA' },
        { title: '十行位', color: '#98FB98' },
        { title: '十迴向', color: '#FFB7C5' },
        { title: '十地位', color: '#FFD700' }
    ];

    // 初始化背景
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    for(let i=0; i<100; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.5});
    function draw() {
        ctx.fillStyle = '#020203'; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); });
        requestAnimationFrame(draw);
    }
    draw();

    // 生成卡片
    const deck = document.getElementById('deck');
    RANKS.forEach((rank, i) => {
        const card = document.createElement('div');
        card.className = `card pos-${i}`;
        card.onclick = (e) => { e.stopPropagation(); toggleCard(i); };
        
        card.innerHTML = `
            <div class="card-inner">
                <div class="card-back card-face">
                    <div style="font-size:0.7rem; color:rgba(212,175,55,0.5); letter-spacing:2px;">IMMORTAL</div>
                    <div style="width:40px; height:1px; background:var(--solid-gold); margin:10px 0; opacity:0.3;"></div>
                    <div style="font-size:0.9rem; color:var(--gold); letter-spacing:3px;">${rank.title}</div>
                </div>
                <div class="card-front card-face">
                    <div class="crystal-container">${drawCrystals(rank.color)}</div>
                    <div class="seed-label">${rank.title}</div>
                    <div style="font-size:0.6rem; color:#666; margin-top:5px; letter-spacing:1px;">BODHICITTA</div>
                </div>
            </div>
        `;
        deck.appendChild(card);
    });

    // SVG 晶石陣列繪製 (10顆)
    function drawCrystals(baseColor) {
        let crystals = '';
        for (let i = 0; i < 10; i++) {
            const angle = (i * 36) * (Math.PI / 180);
            const radius = 70;
            const x = 110 + Math.cos(angle) * radius;
            const y = 110 + Math.sin(angle) * radius;
            const scale = 0.6 + (i % 3) * 0.2;
            const rot = i * 45;
            
            crystals += `
                <g transform="translate(${x}, ${y}) scale(${scale}) rotate(${rot})">
                    <polygon points="0,-15 12,0 0,18 -12,0" fill="${baseColor}" opacity="0.8" />
                    <polygon points="0,-15 12,0 0,0" fill="rgba(255,255,255,0.4)" />
                    <polygon points="-12,0 0,18 0,0" fill="rgba(0,0,0,0.2)" />
                </g>`;
        }
        
        return `
        <svg viewBox="0 0 220 220" width="220" height="220">
            <defs>
                <radialGradient id="seed-glow"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="${baseColor}" stop-opacity="0"/></radialGradient>
            </defs>
            <circle cx="110" cy="110" r="105" fill="none" stroke="${baseColor}" stroke-opacity="0.1" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="25" fill="url(#seed-glow)" opacity="0.6" />
            <g>${crystals}</g>
            <circle cx="110" cy="110" r="3" fill="#fff" />
        </svg>`;
    }

    function toggleCard(idx) {
        const cards = document.querySelectorAll('.card');
        const target = cards[idx];
        const isActive = target.classList.contains('is-active');

        resetCards();

        if (!isActive) {
            target.classList.add('is-active');
            setTimeout(() => target.classList.add('is-flipped'), 100);
        }
    }

    function resetCards() {
        document.querySelectorAll('.card').forEach(c => {
            c.classList.remove('is-active');
            c.classList.remove('is-flipped');
        });
    }

</script>
</body>
</html>
