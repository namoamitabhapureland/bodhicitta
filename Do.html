<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"><title>一真法界 ． 同心曼陀羅</title><style>:root{--gold:#f3e5ab;--solid-gold:#d4af37;--cyan:#8ba89c;--bg-deep:#020203}body{margin:0;padding:0;height:100vh;height:100dvh;overflow:hidden;background:radial-gradient(circle at 50% 50%,#0a0e14 0%,var(--bg-deep) 100%);color:#fff;font-family:"PingFang TC","Microsoft JhengHei",sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none}canvas{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}.top-nav-btn{position:absolute;top:20px;left:20px;background:rgba(0,0,0,0.5);border:1px solid rgba(212,175,55,0.3);color:var(--gold);padding:8px 16px;border-radius:20px;font-size:0.85rem;font-weight:bold;letter-spacing:1px;display:flex;align-items:center;gap:6px;z-index:1000;cursor:pointer;backdrop-filter:blur(5px);transition:opacity 0.8s,transform 0.3s}.top-nav-btn:active{transform:scale(0.95);background:rgba(212,175,55,0.2)}#mandala-container{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);width:360px;height:360px;z-index:10;opacity:0;transition:opacity 2s ease-in-out;pointer-events:none}.mandala-ring{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid rgba(255,255,255,0.03);transform:translate(-50%,-50%);display:flex;justify-content:center;align-items:center}.mandala-ring.is-pulsing{animation:ring-pulse 1.5s ease-out}@keyframes ring-pulse{0%{box-shadow:0 0 0 var(--ring-color),inset 0 0 0 var(--ring-color);border-color:var(--ring-color)}50%{box-shadow:0 0 30px var(--ring-color),inset 0 0 30px var(--ring-color);border-color:rgba(255,255,255,0.8)}100%{box-shadow:0 0 10px var(--ring-color),inset 0 0 10px var(--ring-color);border-color:rgba(255,255,255,0.1)}}.crystal-wrapper{position:absolute;transform-origin:center;transition:all 0.5s ease;filter:grayscale(1) brightness(0.2);opacity:0.15}.crystal-wrapper.is-lit{filter:grayscale(0) brightness(1.2);opacity:1}#immortal-seed{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:24px;height:24px;border-radius:50%;background:radial-gradient(circle,#fff 10%,#ffe 30%,var(--gold) 60%,var(--solid-gold) 100%);box-shadow:0 0 20px var(--solid-gold);opacity:0;z-index:100;transition:all 1s cubic-bezier(0.2,0.8,0.2,1)}.seed-heartbeat{animation:heartbeat-pulse 1.4s infinite cubic-bezier(0.2,0.8,0.4,1)}@keyframes heartbeat-pulse{0%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 20px var(--gold)}50%{transform:translate(-50%,-50%) scale(1.3);box-shadow:0 0 50px var(--gold),0 0 80px #fff}100%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 20px var(--gold)}}#golden-flash{position:fixed;inset:0;background:radial-gradient(circle,#fff 0%,#f3e5ab 40%,#d4af37 100%);mix-blend-mode:screen;opacity:0;z-index:99998;pointer-events:none;transition:opacity 0.5s ease-out}#cert-ui{position:absolute;bottom:5%;left:50%;transform:translateX(-50%) translateY(50px);width:88%;max-width:360px;z-index:200;opacity:0;pointer-events:none;transition:opacity 2s ease,transform 2s cubic-bezier(0.2,0.8,0.2,1);background:linear-gradient(135deg,rgba(12,15,14,0.9),rgba(2,3,2,0.98));border:1px solid rgba(212,175,55,0.35);border-radius:20px;padding:25px 20px;box-shadow:0 20px 60px rgba(0,0,0,0.9);backdrop-filter:blur(15px);display:flex;flex-direction:column;align-items:center}#cert-ui.is-visible{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}.cert-header{color:rgba(243,229,171,0.8);font-size:0.85rem;letter-spacing:6px;margin-bottom:15px;font-weight:bold}.cert-name-label{color:var(--cyan);font-size:0.65rem;letter-spacing:4px;margin-bottom:6px;text-transform:uppercase}.cert-name{color:var(--gold);font-size:1.35rem;font-weight:bold;letter-spacing:4px;text-shadow:0 0 12px rgba(212,175,55,0.6);margin-bottom:15px;border-bottom:1px solid rgba(212,175,55,0.2);padding-bottom:15px;width:100%;text-align:center}.cert-desc-title{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;color:var(--gold);font-size:0.9rem;letter-spacing:2px;font-weight:bold;text-shadow:0 0 8px rgba(212,175,55,0.4)}.cert-desc{color:#ddd;font-size:0.8rem;line-height:1.9;letter-spacing:1.5px;text-align:center;margin-bottom:20px}.cert-desc span.highlight{color:var(--solid-gold);font-weight:bold}.btn-claim{width:100%;padding:12px 0;border-radius:25px;border:1px solid var(--solid-gold);background:linear-gradient(135deg,rgba(212,175,55,0.2),rgba(0,0,0,0.8));color:var(--gold);font-size:0.8rem;font-weight:bold;letter-spacing:2px;cursor:pointer;box-shadow:0 0 20px rgba(212,175,55,0.15);transition:all 0.3s}.btn-claim:active{transform:scale(0.95);background:rgba(212,175,55,0.4)}#page-curtain{position:fixed;inset:0;background:#000;z-index:9999999;pointer-events:none;transition:opacity 1.5s;opacity:1}</style></head><body><div id="page-curtain"></div><div class="top-nav-btn" onclick="goHome('index.html')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> 歸返</div><svg style="position:absolute;width:0;height:0"><defs><linearGradient id="f-light" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.85"/><stop offset="100%" stop-color="#fff" stop-opacity="0.2"/></linearGradient><linearGradient id="f-dark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#000" stop-opacity="0.1"/><stop offset="100%" stop-color="#000" stop-opacity="0.5"/></linearGradient><g id="crystal-model"><polygon points="50,15 35,45 50,55" fill="url(#f-light)"/><polygon points="35,45 50,85 50,55" fill="url(#f-dark)"/><polygon points="50,15 65,45 50,55" fill="url(#f-dark)"/><polygon points="65,45 50,85 50,55" fill="url(#f-light)"/><polyline points="50,15 35,45 50,85 65,45 50,15" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1" stroke-linejoin="round"/><polyline points="35,45 50,55 65,45" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1" stroke-linejoin="round"/></g><linearGradient id="g-0" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f7fa"/><stop offset="100%" stop-color="#4dd0e1"/></linearGradient><linearGradient id="g-1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f3e5f5"/><stop offset="100%" stop-color="#ba68c8"/></linearGradient><linearGradient id="g-2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e3f2fd"/><stop offset="100%" stop-color="#2196f3"/></linearGradient><linearGradient id="g-3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#b2ebf2"/><stop offset="50%" stop-color="#f8bbd0"/><stop offset="100%" stop-color="#fff9c4"/></linearGradient><linearGradient id="g-4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff59d"/><stop offset="100%" stop-color="#ffb300"/></linearGradient><g id="lotus-petal"><path d="M12 2C16 8 18 14 12 22C6 14 8 8 12 2Z"/></g></defs></svg><canvas id="realmCanvas"></canvas><div id="golden-flash"></div><div id="mandala-container"></div><div id="immortal-seed"></div><div id="cert-ui"><div class="cert-header">✦ 菩提契印 ✦</div><div class="cert-name-wrap"><div class="cert-name-label">行 者</div><div class="cert-name" id="cert-name-insert">無 名</div></div><div class="cert-desc" id="cert-text-body"></div><button class="btn-claim" onclick="claimCertificate()">歡喜功德 ． 歸返道場</button></div><script>const sleep=ms=>new Promise(r=>setTimeout(r,ms));let audioCtx;function initA(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}function pDing(f,t='sine',d=0.3){initA();let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.setValueAtTime(f,audioCtx.currentTime);g.gain.setValueAtTime(0,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0.4,audioCtx.currentTime+0.05);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}function pGather(){initA();let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(108,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(864,audioCtx.currentTime+3.0);g.gain.setValueAtTime(0.01,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0.5,audioCtx.currentTime+1.5);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+3.0);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+3.0)}const cv=document.getElementById('realmCanvas'),cx=cv.getContext('2d');let w,h,pts=[],isG=true;function rs(){w=window.innerWidth;h=window.innerHeight;cv.width=w;cv.height=h}window.addEventListener('resize',rs);rs();function initP(){for(let i=0;i<400;i++){let a=Math.random()*Math.PI*2,r=Math.random()*800+200;pts.push({x:w/2+Math.cos(a)*r,y:h/2+Math.sin(a)*r,s:Math.random()*2+1,sp:Math.random()*0.05+0.02,hu:Math.random()*60+180})}}function drwP(){if(!isG)return;cx.fillStyle='rgba(10,14,20,0.4)';cx.fillRect(0,0,w,h);cx.globalCompositeOperation='screen';let cX=w/2,cY=h/2;pts.forEach(p=>{p.x+=(cX-p.x)*p.sp;p.y+=(cY-p.y)*p.sp;p.sp*=1.05;cx.beginPath();cx.arc(p.x,p.y,p.s,0,Math.PI*2);cx.fillStyle=`hsla(${p.hu},80%,70%,0.8)`;cx.fill()});cx.globalCompositeOperation='source-over';requestAnimationFrame(drwP)}const RDAT=[{k:'rank_10',r:45,sc:0.28,c:'#4dd0e1',g:'url(#g-0)',t:90,tt:'十信功圓',d:'已成就信、念、精進等菩提心要。<br>今邁入「初住位」，首重<span class="highlight">「布施」</span>度有情。'},{k:'rank_abiding_10',r:75,sc:0.38,c:'#ba68c8',g:'url(#g-1)',t:1000,tt:'十住功成',d:'生如來家，安住真如本性。<br>今邁入「初行位」，側重<span class="highlight">「持戒」</span>嚴飾菩提。'},{k:'rank_practice_10',r:105,sc:0.48,c:'#2196f3',g:'url(#g-2)',t:1100,tt:'十行圓滿',d:'於一切法中，行無相真實行。<br>今邁入「初迴向位」，以<span class="highlight">「忍辱精進」</span>悲智雙運。'},{k:'rank_dedication_10',r:135,sc:0.58,c:'#f8bbd0',g:'url(#g-3)',t:11100,tt:'迴向功圓',d:'三處迴向，心無所住而生其心。<br>今登「歡喜地」，以<span class="highlight">「禪定」</span>破除無明。'},{k:'rank_ground_10',r:175,sc:0.75,c:'#ffb300',g:'url(#g-4)',t:111100,tt:'十地行圓',d:'福慧兩足，等覺妙覺在望。<br>以<span class="highlight">「般若」</span>徹照萬法皆空，無功用行，普度十方。'}];let db;try{db=JSON.parse(localStorage.getItem('PX_V15.0'))||{}}catch(e){db={}}const ms=db.milestones||{},cD=(db.points||0)/100;let aRI=-1;function bldM(){const ctr=document.getElementById('mandala-container');RDAT.forEach((r,x)=>{const ac=ms[r.k]===true;if(cD>=r.t&&!ac&&aRI===-1)aRI=x;let htm=`<div class="mandala-ring" id="ring-${x}" style="width:${r.r*2}px;height:${r.r*2}px;--ring-color:${r.c};">`;for(let i=0;i<10;i++){let a=i*36*(Math.PI/180),cx=r.r*Math.cos(a),cy=r.r*Math.sin(a),rd=i*36+90,sC=ac?'is-lit':'';htm+=`<div class="crystal-wrapper cry-${x}-${i} ${sC}" style="left:calc(50% + ${cx}px);top:calc(50% + ${cy}px);transform:translate(-50%,-50%) rotate(${rd}deg) scale(${r.sc});${ac?`filter:grayscale(0) brightness(1.2) drop-shadow(0 0 6px ${r.c});opacity:1`:''}"><svg viewBox="0 0 100 100" width="100" height="100" style="overflow:visible;"><polygon points="50,15 35,45 50,85 65,45" fill="${r.g}" opacity="0.9"/><use href="#crystal-model"/></svg></div>`}htm+=`</div>`;ctr.innerHTML+=htm})}async function runC(){initP();drwP();pGather();document.getElementById('page-curtain').style.opacity='0';await sleep(2800);isG=false;cx.clearRect(0,0,w,h);const fl=document.getElementById('golden-flash');fl.style.opacity='1';pDing(864,'triangle',2.0);const sd=document.getElementById('immortal-seed');sd.style.opacity='1';sd.style.transform='translate(-50%,-50%) scale(1)';sd.classList.add('seed-heartbeat');await sleep(300);fl.style.opacity='0';await sleep(1000);bldM();document.getElementById('mandala-container').style.opacity='1';await sleep(1500);if(aRI!==-1){const tR=RDAT[aRI];for(let i=0;i<10;i++){await sleep(300);const c=document.querySelector(`.cry-${aRI}-${i}`);c.style.filter=`grayscale(0) brightness(1.2) drop-shadow(0 0 8px ${tR.c})`;c.style.opacity='1';pDing(800+i*50)}await sleep(500);document.getElementById(`ring-${aRI}`).classList.add('is-pulsing');pDing(1200,'sine',1.5);sd.style.boxShadow='0 0 50px #fff, 0 0 100px var(--solid-gold)';sd.style.transform='translate(-50%,-50%) scale(1.5)';await sleep(500);sd.style.transform='translate(-50%,-50%) scale(1)';sd.style.boxShadow='';document.getElementById('cert-name-insert').innerText=db.name||"無 名";document.getElementById('cert-text-body').innerHTML=`<div class="cert-desc-title"><svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>${tR.tt}<svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg></div>${tR.d}`;document.getElementById('cert-ui').classList.add('is-visible')}}function goHome(u){document.getElementById('page-curtain').style.opacity='1';setTimeout(()=>window.location.href=u,800)}function claimCertificate(){document.getElementById('cert-ui').classList.remove('is-visible');document.getElementById('page-curtain').style.opacity='1';if(aRI!==-1){if(!db.milestones)db.milestones={};db.milestones[RDAT[aRI].k]=true;localStorage.setItem('PX_V15.0',JSON.stringify(db))}setTimeout(()=>window.location.href='index.html',800)}window.addEventListener('click',initA,{once:true});window.addEventListener('touchstart',initA,{once:true,passive:true});window.addEventListener('load',runC);</script></body></html>
