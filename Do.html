<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自性金蓮 ． 境界色彩還原測試</title>
    <style>
        :root { 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --bg-deep: #020203; 
        }
        
        body { 
            margin: 0; padding: 0; height: 100vh; height: 100dvh; 
            overflow: hidden; 
            background: radial-gradient(circle at 50% 50%, #111518 0%, var(--bg-deep) 100%); 
            color: #fff; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 宇宙微光 */
        .center-glow {
            position: absolute; width: 320px; height: 320px;
            background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 0;
            animation: pulse-glow 4s infinite alternate;
        }
        @keyframes pulse-glow { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.1); opacity: 1; } }

        /* 證書 UI 框架 */
        #cert-ui {
            width: 88%; max-width: 380px; z-index: 10;
            background: linear-gradient(135deg, rgba(15,15,10,0.85), rgba(0,0,0,0.9));
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px; padding: 40px 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column; align-items: center;
            transition: all 1s ease;
        }

        .cert-header { color: var(--gold); font-size: 0.9rem; letter-spacing: 6px; margin-bottom: 30px; font-weight: bold; }

        /* 🌸 蓮花容器 */
        #lotus-box {
            width: 180px; height: 180px; margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .lotus-spin { animation: slow-spin 40s linear infinite; }
        @keyframes slow-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ✨ 核心動畫 ✨ */
        .draw-petal {
            stroke-dasharray: 1000; stroke-dashoffset: 1000; fill-opacity: 0; 
            animation: dash-draw 3s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.5s, color-fade 3s ease forwards 2.5s; 
        }
        .draw-vein {
            stroke-dasharray: 500; stroke-dashoffset: 500;
            animation: dash-draw 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards 1s;
        }
        @keyframes dash-draw { to { stroke-dashoffset: 0; } }
        @keyframes color-fade { to { fill-opacity: 0.8; } } /* 保持琉璃半透明 */

        /* 文字區 */
        .rank-name { color: var(--gold); font-size: 1.4rem; font-weight: bold; letter-spacing: 4px; margin-bottom: 10px; transition: 0.5s; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
        .rank-desc { color: #ccc; font-size: 0.85rem; letter-spacing: 2px; transition: 0.5s; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        /* 底部控制列 */
        .controls { position: absolute; bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; z-index: 20; }
        .demo-btn { padding: 8px 12px; font-size: 0.8rem; border-radius: 20px; border: 1px solid rgba(212,175,55,0.4); background: rgba(0,0,0,0.7); color: var(--gold); cursor: pointer; transition: 0.3s; }
        .demo-btn:hover { background: rgba(212,175,55,0.2); }
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <radialGradient id="grad-100k" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff" />
                <stop offset="60%" stop-color="#e1bee7" />
                <stop offset="100%" stop-color="#ba68c8" />
            </radialGradient>
            
            <radialGradient id="grad-500k" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff" />
                <stop offset="50%" stop-color="#e0f7fa" />
                <stop offset="100%" stop-color="#4dd0e1" />
            </radialGradient>
            
            <radialGradient id="grad-1m" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="70%" stop-color="#f5f5f5" />
                <stop offset="100%" stop-color="#e0e0e0" />
            </radialGradient>
            
            <radialGradient id="grad-10m" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fffde7" />
                <stop offset="60%" stop-color="#ffe082" />
                <stop offset="100%" stop-color="#ffca28" />
            </radialGradient>
            
            <radialGradient id="grad-100m" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="40%" stop-color="#fff59d" />
                <stop offset="100%" stop-color="#ffb300" />
            </radialGradient>
        </defs>
    </svg>

    <div class="center-glow"></div>

    <div id="cert-ui">
        <div class="cert-header">✦ 菩提契印 ✦</div>
        
        <div id="lotus-box"></div>

        <div class="rank-name" id="rank-name">請選擇境界</div>
        <div class="rank-desc" id="rank-desc">...</div>
    </div>

    <div class="controls">
        <button class="demo-btn" onclick="playAnimation('grad-100k', '紫金霞光', '蓮池海會 ． 霞光初現', 'rgba(186, 104, 200, 0.4)', false)">10萬(紫金)</button>
        <button class="demo-btn" onclick="playAnimation('grad-500k', '晨曦玉露', '不退轉菩薩 ． 如露清涼', 'rgba(77, 208, 225, 0.4)', false)">50萬(玉露)</button>
        <button class="demo-btn" onclick="playAnimation('grad-1m', '月魄銀輝', '無相念佛 ． 湛藍如月', 'rgba(224, 224, 224, 0.4)', false)">100萬(銀輝)</button>
        <button class="demo-btn" onclick="playAnimation('grad-10m', '玄黃凝脂', '念佛三昧 ． 定力如山', 'rgba(255, 202, 40, 0.4)', false)">1千萬(玄黃)</button>
        <button class="demo-btn" onclick="playAnimation('grad-100m', '大圓滿耀金', '圓滿成佛 ． 金剛不壞', 'rgba(255, 179, 0, 0.6)', true)">1億(耀金)</button>
    </div>

    <script>
        function playAnimation(gradId, rName, rDesc, glowColor, isMaxLevel) {
            const box = document.getElementById('lotus-box');
            document.getElementById('rank-name').innerText = rName;
            document.getElementById('rank-desc').innerText = rDesc;
            
            // 卡片邊緣微光
            let cardShadow = isMaxLevel ? 
                `0 20px 60px rgba(0,0,0,0.9), inset 0 0 50px rgba(255,255,255,0.2)` : 
                `0 20px 60px rgba(0,0,0,0.9), inset 0 0 30px ${glowColor}`;
            document.getElementById('cert-ui').style.boxShadow = cardShadow;

            // 清空重繪
            box.innerHTML = '';
            
            setTimeout(() => {
                let fill = `url(#${gradId})`;
                // 🌟 完全對應您的邏輯：1億大圓滿使用白色描邊，其餘使用淡金
                let stroke = isMaxLevel ? "#ffffff" : "rgba(243,229,171,0.6)"; 
                let dropShadow = isMaxLevel ? 
                    "drop-shadow(0 0 18px rgba(212,175,55,0.8)) drop-shadow(0 0 40px rgba(212,175,55,0.4))" : 
                    `drop-shadow(0 0 15px ${glowColor})`;

                let layers = 3;
                let svg = `<svg class="lotus-spin" viewBox="-150 -150 300 300" style="width:100%;height:100%;overflow:visible; filter:${dropShadow}">`;

                for (let l = layers; l > 0; l--) {
                    const sc = 0.44 + l * 0.28;
                    const n = (l === layers) ? 8 : 6;
                    const rotOffset = l * 22.5; 
                    for (let i = 0; i < n; i++) {
                        const rot = i * (360/n) + rotOffset;
                        const s = 112 * sc;
                        const pth = `M 0 0 C ${s*.44} ${-s*.07} ${s*.54} ${-s*.62} 0 ${-s} C ${-s*.54} ${-s*.62} ${-s*.44} ${-s*.07} 0 0`;
                        const vein = `M 0 ${-s*.08} Q 0 ${-s*.55} 0 ${-s*.88}`;
                        
                        svg += `<g transform="rotate(${rot})">
                            <path class="draw-petal" d="${pth}" fill="${fill}" stroke="${stroke}" stroke-width="${isMaxLevel ? 1.5 : 1.2}" />
                            <path class="draw-vein" d="${vein}" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
                        </g>`;
                    }
                }

                const cr = 16;
                svg += `<circle cx="0" cy="0" r="${cr}" fill="${fill}" stroke="${stroke}" stroke-width="1.2" style="opacity:0; animation: color-fade 2s ease forwards 4s;"/>`;
                for (let s = 0; s < 10; s++) {
                    const sa = (s * 36) * Math.PI / 180;
                    const sr = cr + 10;
                    const ex = (sr * Math.cos(sa)).toFixed(1);
                    const ey = (sr * Math.sin(sa)).toFixed(1);
                    svg += `
                    <g style="opacity:0; animation: color-fade 2s ease forwards 4.5s;">
                        <circle cx="${ex}" cy="${ey}" r="3" fill="${fill}" />
                        <line x1="${(cr*.6*Math.cos(sa)).toFixed(1)}" y1="${(cr*.6*Math.sin(sa)).toFixed(1)}" x2="${ex}" y2="${ey}" stroke="${stroke}" stroke-width="0.8"/>
                    </g>`;
                }
                
                svg += `</svg>`;
                box.innerHTML = svg;
            }, 50);
        }
    </script>
</body>
</html>
