<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>立體寶石法旨測試</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --cyan: #8ba89c; 
            --bg-deep: #050608;
        }
        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; 
            /* 背景回歸深邃，僅在中央透出微光，無縫接軌星空 */
            background: radial-gradient(circle at 50% 50%, #1a2228 0%, #050608 70%);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; justify-content: center; align-items: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        #cert-ui {
            width: 88%; max-width: 380px;
            background: linear-gradient(135deg, rgba(20, 25, 24, 0.85), rgba(5, 6, 5, 0.95));
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 24px; padding: 40px 25px 30px 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9), inset 0 0 25px rgba(243,229,171,0.05);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.8s ease;
            position: relative;
        }

        #cert-ui::before {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; height: 100%; border-radius: 24px;
            background: radial-gradient(circle at 50% 15%, rgba(212,175,55,0.15) 0%, transparent 60%);
            pointer-events: none; z-index: -1;
        }

        .cert-header {
            color: rgba(243,229,171,0.7); font-size: 0.85rem; letter-spacing: 6px; 
            margin-bottom: 30px; font-weight: bold; text-transform: uppercase;
        }

        .gem-container {
            width: 160px; height: 160px; margin-bottom: 25px;
            position: relative; display: flex; justify-content: center; align-items: center;
        }
        
        .gem-svg {
            position: absolute; width: 100%; height: 100%;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            filter: drop-shadow(0 0 12px rgba(255,255,255,0.15));
        }

        .cert-name-wrap { text-align: center; margin-bottom: 20px; width: 100%; border-bottom: 1px solid rgba(212,175,55,0.15); padding-bottom: 20px; }
        .cert-name-label { color: var(--cyan); font-size: 0.75rem; letter-spacing: 4px; margin-bottom: 8px; }
        .cert-name { color: var(--gold); font-size: 1.5rem; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 10px rgba(212,175,55,0.4); }

        .cert-desc {
            color: #ccc; font-size: 0.85rem; line-height: 2.2; letter-spacing: 1.5px; text-align: center;
            margin-bottom: 30px; min-height: 110px;
        }
        .cert-desc span.highlight { color: var(--gold); font-weight: bold; }

        .cert-actions { display: flex; width: 100%; gap: 15px; transition: opacity 0.5s; }
        
        .btn-claim {
            flex: 1; padding: 14px 0; border-radius: 30px; border: 1px solid rgba(212,175,55,0.4);
            background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(0,0,0,0.8));
            color: var(--gold); font-size: 0.9rem; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-claim:active { transform: scale(0.95); background: rgba(212,175,55,0.3); }

        .btn-screenshot {
            display: flex; align-items: center; justify-content: center;
            width: 48px; height: 48px; border-radius: 50%; border: 1px solid rgba(139,168,156,0.3);
            background: rgba(255,255,255,0.05); color: var(--cyan); cursor: pointer; transition: all 0.3s;
        }
        .btn-screenshot:active { transform: scale(0.9); background: rgba(139,168,156,0.2); }
        .btn-screenshot svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.5; }

        .test-controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 1000; transition: opacity 0.5s;
        }
        .test-btn {
            padding: 8px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5);
            color: #ddd; font-size: 0.8rem; cursor: pointer; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
        <defs>
            <linearGradient id="facet-light" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.85"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
            <linearGradient id="facet-dark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#000" stop-opacity="0.1"/><stop offset="100%" stop-color="#000" stop-opacity="0.4"/></linearGradient>
            
            <linearGradient id="c-cyan" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f7fa"/><stop offset="100%" stop-color="#80deea"/></linearGradient>
            <linearGradient id="c-pink" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fce4ec"/><stop offset="100%" stop-color="#f48fb1"/></linearGradient>
            <linearGradient id="c-purple" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f3e5f5"/><stop offset="100%" stop-color="#ce93d8"/></linearGradient>
            <linearGradient id="c-gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fffde7"/><stop offset="100%" stop-color="#ffd54f"/></linearGradient>
            <linearGradient id="c-blue" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e3f2fd"/><stop offset="100%" stop-color="#90caf9"/></linearGradient>

            <g id="crystal-shape">
                <polygon points="50,10 20,40 50,48" fill="url(#facet-light)" />
                <polygon points="20,40 50,95 50,48" fill="url(#facet-dark)" />
                <polygon points="50,10 80,40 50,48" fill="url(#facet-dark)" />
                <polygon points="80,40 50,95 50,48" fill="url(#facet-light)" />
                <polyline points="50,10 20,40 50,95 80,40 50,10" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="0.8" stroke-linejoin="round"/>
                <polyline points="20,40 50,48 80,40" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="0.8" stroke-linejoin="round"/>
                <line x1="50" y1="10" x2="50" y2="95" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
            </g>

            <g id="nine-gems">
                <g transform="translate(62, 5) scale(0.25) rotate(25 50 50)"><polygon points="50,10 20,40 50,95 80,40" fill="url(#c-gold)" /><use href="#crystal-shape" /></g>
                <g transform="translate(73, 28) scale(0.2) rotate(60 50 50)"><polygon points="50,10 20,40 50,95 80,40" fill="url(#c-pink)" /><use href="#crystal-shape" /></g>
                <g transform="translate(60, 62) scale(0.22) rotate(15 50 50)"><polygon points="50,10 20,40 50,95 80,40" fill="url(#c-purple)" /><use href="#crystal-shape" /></g>
                <g transform="translate(43, 76) scale(0.18) rotate(10 50 50)"><polygon points="50,10 20,40 50,95 80,40" fill="url(#c-blue)" /><use href="#crystal-shape" /></g>
                <g transform="translate(18, 65) scale(0.25) rotate(-30 50 50)"><polygon points="50,10 20,40 50,95 80,40" fill="url(#c-gold)" /><use href="#crystal-shape" /></g>
                <g transform="translate(6, 40) scale(0.16) rotate(45 50 50)"><polygon points="50,10 20,40 50,95 80,40" fill="url(#c-cyan)" /><use href="#crystal-shape" /></g>
                <g transform="translate(12, 12) scale(0.23) rotate(-20 50 50)"><polygon points="50,10 20,40 50,95 80,40" fill="url(#c-pink)" /><use href="#crystal-shape" /></g>
                <g transform="translate(36, 0) scale(0.18) rotate(-10 50 50)"><polygon points="50,10 20,40 50,95 80,40" fill="url(#c-blue)" /><use href="#crystal-shape" /></g>
                <g transform="translate(54, 18) scale(0.12) rotate(-40 50 50)"><polygon points="50,10 20,40 50,95 80,40" fill="url(#c-cyan)" /><use href="#crystal-shape" /></g>
            </g>
        </defs>
    </svg>

    <div id="cert-ui">
        <div class="cert-header" id="cert-title">✦ 十信法旨 ✦</div>
        
        <div class="gem-container">
            <svg id="svg-faith" class="gem-svg" viewBox="0 0 100 100" style="opacity: 1;">
                <use href="#nine-gems" />
                <g transform="translate(22, 22) scale(0.56)">
                    <polygon points="50,10 20,40 50,95 80,40" fill="url(#c-cyan)" />
                    <use href="#crystal-shape" />
                </g>
            </svg>

            <svg id="svg-abode" class="gem-svg" viewBox="0 0 100 100" style="opacity: 0; transform: scale(0.8);">
                <use href="#nine-gems" />
                <g transform="translate(22, 22) scale(0.56)">
                    <polygon points="50,10 20,40 50,95 80,40" fill="url(#c-purple)" />
                    <use href="#crystal-shape" />
                </g>
            </svg>

            <svg id="svg-practice" class="gem-svg" viewBox="0 0 100 100" style="opacity: 0; transform: scale(0.8);">
                <use href="#nine-gems" />
                <g transform="translate(22, 22) scale(0.56)">
                    <polygon points="50,10 20,40 50,95 80,40" fill="url(#c-gold)" />
                    <use href="#crystal-shape" />
                </g>
            </svg>
        </div>

        <div class="cert-name-wrap">
            <div class="cert-name-label">行 者</div>
            <div class="cert-name">無 名</div>
        </div>

        <div class="cert-desc" id="cert-text">
            百日梵行，十信功圓。<br>
            已成就信、念、精進等菩提心要。<br>
            菩薩行起，今邁入「初住位」，<br>
            當預修六度，首重<span class="highlight">「布施」</span>，<br>
            以捨對治慳貪，廣度有情。
        </div>

        <div class="cert-actions" id="cert-actions">
            <button class="btn-claim" onclick="alert('實裝時將跳轉回首頁')">領受法益並歸返</button>
            <button class="btn-screenshot" onclick="startScreenshotMode()" title="儲存證書 (截圖模式)">
                <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </button>
        </div>
    </div>

    <div class="test-controls" id="test-controls">
        <button class="test-btn" onclick="showGem('faith', '✦ 十信法旨 ✦', '百日梵行，十信功圓。<br>已成就信、念、精進等菩提心要。<br>菩薩行起，今邁入「初住位」，<br>當預修六度，首重<span class=\'highlight\'>「布施」</span>，<br>以捨對治慳貪，廣度有情。')">十信</button>
        <button class="test-btn" onclick="showGem('abode', '✦ 十住法旨 ✦', '千日堅守，十住功成。<br>生如來家，安住真如本性。<br>菩薩行深，今邁入「初行位」，<br>當勤修六度，側重<span class=\'highlight\'>「持戒」</span>，<br>以清淨梵行，嚴飾菩提，不捨有情。')">十住</button>
        <button class="test-btn" onclick="showGem('practice', '✦ 十行法旨 ✦', '萬日踐履，十行圓滿。<br>於一切法中，行無相真實行。<br>大乘心廣，今邁入「初迴向位」，<br>當以「忍辱」與「精進」為基，<br>迴事向理，迴自向他，悲智雙運。')">十行</button>
    </div>

    <script>
        function startScreenshotMode() {
            document.getElementById('cert-actions').style.opacity = '0';
            document.getElementById('test-controls').style.opacity = '0';
            setTimeout(() => {
                window.addEventListener('click', restoreUI);
                window.addEventListener('touchstart', restoreUI, { passive: true });
            }, 300);
        }

        function restoreUI() {
            document.getElementById('cert-actions').style.opacity = '1';
            document.getElementById('test-controls').style.opacity = '1';
            window.removeEventListener('click', restoreUI);
            window.removeEventListener('touchstart', restoreUI);
        }

        function showGem(id, title, text) {
            document.getElementById('cert-title').innerText = title;
            ['faith', 'abode', 'practice'].forEach(gid => {
                const el = document.getElementById('svg-' + gid);
                if (gid === id) {
                    el.style.opacity = '1'; el.style.transform = 'scale(1)';
                } else {
                    el.style.opacity = '0'; el.style.transform = 'scale(0.8)';
                }
            });
            document.getElementById('cert-text').innerHTML = text;
        }
    </script>
</body>
</html>
