<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自性金蓮 ． 視覺動畫測試</title>
    <style>
        :root { 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --bg-deep: #020203; 
        }
        
        body { 
            margin: 0; padding: 0; height: 100vh; height: 100dvh; 
            overflow: hidden; 
            background: radial-gradient(circle at 50% 50%, #111518 0%, var(--bg-deep) 100%); 
            color: #fff; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 宇宙光點 */
        .center-glow {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 0;
            animation: pulse-glow 4s infinite alternate;
        }
        @keyframes pulse-glow { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.2); opacity: 1; } }

        /* 證書 UI 框架 */
        #cert-ui {
            width: 88%; max-width: 380px; z-index: 10;
            background: linear-gradient(135deg, rgba(15,15,10,0.85), rgba(0,0,0,0.9));
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px; padding: 40px 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column; align-items: center;
            transition: all 1s ease;
        }

        .cert-header { color: var(--gold); font-size: 0.9rem; letter-spacing: 6px; margin-bottom: 30px; font-weight: bold; }

        /* 🌸 蓮花容器 */
        #lotus-box {
            width: 180px; height: 180px; margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        /* 蓮花自轉 */
        .lotus-spin { 
            animation: slow-spin 40s linear infinite; 
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.4));
        }
        @keyframes slow-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ✨ 核心動畫：線條描繪與色彩淡入 ✨ */
        .draw-petal {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            fill-opacity: 0; /* 初始完全透明 */
            animation: 
                dash-draw 3s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.5s, /* 0.5秒後開始畫線，持續3秒 */
                color-fade 3s ease forwards 2.5s; /* 2.5秒時開始注入琉璃色彩，持續3秒 */
        }
        
        .draw-vein {
            stroke-dasharray: 500;
            stroke-dashoffset: 500;
            animation: dash-draw 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards 1s;
        }

        @keyframes dash-draw { to { stroke-dashoffset: 0; } }
        @keyframes color-fade { to { fill-opacity: 0.75; } } /* 保持半透明琉璃感 */

        /* 文字區 */
        .rank-name { color: var(--gold); font-size: 1.4rem; font-weight: bold; letter-spacing: 4px; margin-bottom: 10px; transition: 0.5s; }
        .rank-desc { color: #ccc; font-size: 0.85rem; letter-spacing: 2px; transition: 0.5s; }

        /* 控制按鈕 */
        .controls { position: absolute; bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; z-index: 20; }
        .demo-btn { padding: 8px 12px; font-size: 0.8rem; border-radius: 20px; border: 1px solid rgba(212,175,55,0.4); background: rgba(0,0,0,0.7); color: var(--gold); cursor: pointer; transition: 0.3s; }
        .demo-btn:hover { background: rgba(212,175,55,0.2); }
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <radialGradient id="grad-purple" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#f3e5f5" />
                <stop offset="100%" stop-color="#ce93d8" />
            </radialGradient>
            <radialGradient id="grad-blue" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#e0f7fa" />
                <stop offset="100%" stop-color="#81d4fa" />
            </radialGradient>
            <radialGradient id="grad-pink" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fce4ec" />
                <stop offset="100%" stop-color="#f48fb1" />
            </radialGradient>
            <radialGradient id="grad-multi" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#b2ebf2" /> <stop offset="50%" stop-color="#f8bbd0" /> <stop offset="100%" stop-color="#fff9c4" /> </radialGradient>
            <radialGradient id="grad-gold" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fffde7" />
                <stop offset="100%" stop-color="#ffd54f" />
            </radialGradient>
        </defs>
    </svg>

    <div class="center-glow"></div>

    <div id="cert-ui">
        <div class="cert-header">✦ 菩提契印 ✦</div>
        
        <div id="lotus-box"></div>

        <div class="rank-name" id="rank-name">請選擇境界</div>
        <div class="rank-desc" id="rank-desc">...</div>
    </div>

    <div class="controls">
        <button class="demo-btn" onclick="playAnimation('grad-purple', '蓮池海會', '淡紫琉璃 ． 霞光初現', 'rgba(206, 147, 216, 0.6)')">10萬 (淡紫)</button>
        <button class="demo-btn" onclick="playAnimation('grad-blue', '不退轉菩薩', '青藍玉露 ． 永不退轉', 'rgba(129, 212, 250, 0.6)')">50萬 (淡藍)</button>
        <button class="demo-btn" onclick="playAnimation('grad-pink', '無相念佛', '粉櫻湛然 ． 心佛合一', 'rgba(244, 143, 177, 0.6)')">100萬 (粉紅)</button>
        <button class="demo-btn" onclick="playAnimation('grad-multi', '念佛三昧', '彩色斑斕 ． 入深三昧', 'rgba(248, 187, 208, 0.6)')">1千萬 (彩色)</button>
        <button class="demo-btn" onclick="playAnimation('grad-gold', '圓滿成佛', '大圓滿耀金 ． 金剛不壞', 'rgba(255, 213, 79, 0.8)')">1億 (耀金)</button>
    </div>

    <script>
        function playAnimation(gradId, rName, rDesc, glowColor) {
            const box = document.getElementById('lotus-box');
            document.getElementById('rank-name').innerText = rName;
            document.getElementById('rank-desc').innerText = rDesc;
            
            // 讓整個卡片發出對應顏色的微光
            document.getElementById('cert-ui').style.boxShadow = `0 20px 60px rgba(0,0,0,0.9), inset 0 0 40px ${glowColor}`;

            // 先清空，確保動畫重新觸發
            box.innerHTML = '';
            
            // 短暫延遲後注入 SVG (確保瀏覽器重新讀取 CSS 動畫)
            setTimeout(() => {
                let fill = `url(#${gradId})`;
                let stroke = "rgba(243,229,171,0.8)"; // 金色描邊
                let layers = 3;

                // 使用您精美的多層貝茲曲線演算法
                let svg = `<svg class="lotus-spin" viewBox="-150 -150 300 300" style="width:100%;height:100%;overflow:visible;">`;

                for (let l = layers; l > 0; l--) {
                    const sc = 0.44 + l * 0.28;
                    const n = (l === layers) ? 8 : 6;
                    const rotOffset = l * 22.5; 
                    for (let i = 0; i < n; i++) {
                        const rot = i * (360/n) + rotOffset;
                        const s = 112 * sc;
                        // 花瓣路徑
                        const pth = `M 0 0 C ${s*.44} ${-s*.07} ${s*.54} ${-s*.62} 0 ${-s} C ${-s*.54} ${-s*.62} ${-s*.44} ${-s*.07} 0 0`;
                        // 花脈路徑
                        const vein = `M 0 ${-s*.08} Q 0 ${-s*.55} 0 ${-s*.88}`;
                        
                        svg += `<g transform="rotate(${rot})">
                            <path class="draw-petal" d="${pth}" fill="${fill}" stroke="${stroke}" stroke-width="1.2" />
                            <path class="draw-vein" d="${vein}" fill="none" stroke="rgba(243,229,171,0.4)" stroke-width="0.8"/>
                        </g>`;
                    }
                }

                // 中心蓮蓬 (延遲顯示)
                const cr = 16;
                svg += `<circle cx="0" cy="0" r="${cr}" fill="${fill}" stroke="${stroke}" stroke-width="1.2" style="opacity:0; animation: color-fade 2s ease forwards 4s;"/>`;
                
                // 花蕊
                for (let s = 0; s < 10; s++) {
                    const sa = (s * 36) * Math.PI / 180;
                    const sr = cr + 10;
                    const ex = (sr * Math.cos(sa)).toFixed(1);
                    const ey = (sr * Math.sin(sa)).toFixed(1);
                    svg += `
                    <g style="opacity:0; animation: color-fade 2s ease forwards 4.5s;">
                        <circle cx="${ex}" cy="${ey}" r="3" fill="${fill}" />
                        <line x1="${(cr*.6*Math.cos(sa)).toFixed(1)}" y1="${(cr*.6*Math.sin(sa)).toFixed(1)}" x2="${ex}" y2="${ey}" stroke="${stroke}" stroke-width="0.8"/>
                    </g>`;
                }
                
                svg += `</svg>`;
                box.innerHTML = svg;
            }, 50);
        }

        // 初始不顯示蓮花，等待行者點擊
    </script>
</body>
</html>
