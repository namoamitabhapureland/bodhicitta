<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自性金蓮 ． 念佛契印</title>
    <style>
        :root { 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --bg-deep: #020203; 
        }
        
        body { 
            margin: 0; padding: 0; 
            height: 100vh; height: 100dvh; 
            overflow: hidden; 
            background: radial-gradient(circle at 50% 50%, #111518 0%, var(--bg-deep) 100%); 
            color: #fff; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 宇宙星空背景 */
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* 宇宙中心微光 */
        .center-glow {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 2;
            animation: pulse-glow 4s infinite alternate;
        }
        @keyframes pulse-glow { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.2); opacity: 1; } }

        /* 🌟 證書卡片：懸浮琉璃質感 */
        #cert-ui {
            width: 88%; max-width: 380px; z-index: 10;
            background: linear-gradient(135deg, rgba(15,15,10,0.85), rgba(0,0,0,0.9));
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px; padding: 35px 20px 25px 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; transform: translateY(20px);
            transition: all 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .cert-header { 
            color: var(--gold); font-size: 0.9rem; letter-spacing: 6px; 
            margin-bottom: 20px; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.3);
        }

        /* 🌸 蓮花容器 */
        #lotus-box {
            width: 170px; height: 170px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .lotus-spin { animation: slow-spin 60s linear infinite; }
        @keyframes slow-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ✨ 核心動畫：線條描繪與色彩淡入 ✨ */
        .draw-petal {
            stroke-dasharray: 1000; stroke-dashoffset: 1000; fill-opacity: 0; 
            animation: dash-draw 3s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.5s, color-fade 3s ease forwards 2.5s; 
        }
        .draw-vein {
            stroke-dasharray: 500; stroke-dashoffset: 500;
            animation: dash-draw 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards 1s;
        }

        @keyframes dash-draw { to { stroke-dashoffset: 0; } }
        @keyframes color-fade { to { fill-opacity: 0.8; } } 

        /* 內容區 */
        .cert-name-wrap { text-align: center; margin-bottom: 15px; width: 100%; border-bottom: 1px solid rgba(212,175,55,0.15); padding-bottom: 15px; }
        .cert-label { color: var(--cyan); font-size: 0.7rem; letter-spacing: 4px; margin-bottom: 6px; text-transform: uppercase; }
        .cert-user { color: var(--gold); font-size: 1.4rem; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 12px rgba(212,175,55,0.5); }

        .cert-desc {
            color: #ccc; font-size: 0.85rem; line-height: 2.0; letter-spacing: 1.2px; text-align: center;
            margin-bottom: 25px; min-height: 90px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .cert-desc b { color: var(--solid-gold); font-size: 1.05rem; }

        /* 操作按鈕區 */
        .cert-actions { display: flex; width: 100%; gap: 12px; }
        
        .btn-confirm {
            flex: 1; padding: 13px 0; border-radius: 30px; border: 1px solid var(--solid-gold);
            background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(0,0,0,0.8));
            color: var(--gold); font-size: 0.85rem; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s; box-shadow: 0 0 15px rgba(212,175,55,0.1);
        }
        .btn-confirm:active { transform: scale(0.95); background: rgba(212,175,55,0.3); }

        .btn-screenshot {
            display: flex; align-items: center; justify-content: center;
            width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(139,168,156,0.4);
            background: rgba(255,255,255,0.03); color: var(--cyan); cursor: pointer; transition: all 0.3s;
        }
        .btn-screenshot:active { transform: scale(0.9); background: rgba(139,168,156,0.2); }
        .btn-screenshot svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.5; }

        /* 測試控制按鈕 (正式上線可隱藏) */
        .controls { position: absolute; bottom: 15px; display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; width: 95%; z-index: 20; }
        .demo-btn { padding: 6px 10px; font-size: 0.75rem; border-radius: 15px; border: 1px solid rgba(212,175,55,0.4); background: rgba(0,0,0,0.7); color: var(--gold); cursor: pointer; transition: 0.3s; }
        .demo-btn:hover { background: rgba(212,175,55,0.3); }

        /* 幕布過場 */
        #page-curtain { position: fixed; inset: 0; background: #000; z-index: 999999; pointer-events: none; transition: opacity 1s; opacity: 1; }
    </style>
</head>
<body>
    
    <div id="page-curtain"></div>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <radialGradient id="grad-100k" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#f3e5f5" />
                <stop offset="100%" stop-color="#ce93d8" />
            </radialGradient>
            <radialGradient id="grad-500k" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#e0f7fa" />
                <stop offset="100%" stop-color="#81d4fa" />
            </radialGradient>
            <radialGradient id="grad-1m" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="100%" stop-color="#b0bec5" />
            </radialGradient>
            <radialGradient id="grad-10m" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff9c4" />
                <stop offset="100%" stop-color="#ffb300" />
            </radialGradient>
            <radialGradient id="grad-100m" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fffde7" />
                <stop offset="100%" stop-color="#ffd54f" />
            </radialGradient>
        </defs>
    </svg>

    <canvas id="starCanvas"></canvas>
    <div class="center-glow"></div>

    <div id="cert-ui">
        <div class="cert-header" id="cert-title">✦ 蓮池海會 契印 ✦</div>
        
        <div id="lotus-box"></div>

        <div class="cert-name-wrap">
            <div class="cert-label">行 者</div>
            <div class="cert-user" id="user-name">無 名</div>
        </div>

        <div class="cert-desc" id="cert-desc">
            累積念佛已達 <b>100,000</b> 聲。<br>
            初入蓮池，霞光環繞。<br>
            諸上善人同聚一處，共修淨業。
        </div>

        <div class="cert-actions" id="cert-actions">
            <button class="btn-confirm" onclick="returnToSystem()">歡喜功德 ． 返回系統</button>
            <button class="btn-screenshot" onclick="toggleScreenshot()" title="截圖留印">
                <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </button>
        </div>
    </div>

    <div class="controls" id="controls">
        <button class="demo-btn" onclick="playLotusAnim(100000)">10萬(紫金)</button>
        <button class="demo-btn" onclick="playLotusAnim(500000)">50萬(玉露)</button>
        <button class="demo-btn" onclick="playLotusAnim(1000000)">100萬(銀輝)</button>
        <button class="demo-btn" onclick="playLotusAnim(10000000)">1千萬(玄黃)</button>
        <button class="demo-btn" onclick="playLotusAnim(100000000)">1億(耀金)</button>
    </div>

    <script>
        // 🌟 1. 星空背景引擎
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        for (let i = 0; i < 200; i++) {
            stars.push({ x: (Math.random()-0.5)*2000, y: (Math.random()-0.5)*2000, z: Math.random()*1000, speed: Math.random()*2+0.5 });
        }

        function drawStars() {
            ctx.fillStyle = 'rgba(2, 2, 3, 0.3)'; ctx.fillRect(0,0,width,height);
            ctx.globalCompositeOperation = 'screen';
            stars.forEach(s => {
                s.z -= s.speed; if(s.z <= 0) s.z = 1000;
                let sc = 200/(200+s.z), sx = width/2 + s.x*sc, sy = height/2 + s.y*sc;
                ctx.beginPath(); ctx.arc(sx, sy, 1.5*sc, 0, Math.PI*2); 
                ctx.fillStyle = `rgba(243,229,171,${sc*1.5})`; ctx.fill();
            });
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // 🌟 2. 金蓮動畫生成器
        function playLotusAnim(totalNian) {
            const box = document.getElementById('lotus-box');
            const certUI = document.getElementById('cert-ui');
            const titleEl = document.getElementById('cert-title');
            const descEl = document.getElementById('cert-desc');

            // 資料對應表
            let config = { title: '', desc: '', grad: '', glow: 'rgba(212,175,55,0.1)', shadow: '0 30px 60px rgba(0,0,0,0.8)' };
            
            if (totalNian >= 100000000) {
                config = { title: '圓滿成佛', desc: '萬德圓滿，金剛不壞，大放光明。', grad: 'grad-100m', glow: 'rgba(255,213,79,0.5)', shadow: '0 0 80px rgba(212,175,55,0.4)' };
            } else if (totalNian >= 10000000) {
                config = { title: '念佛三昧', desc: '入深三昧，大地玄黃，定力如山。', grad: 'grad-10m', glow: 'rgba(255,179,0,0.4)' };
            } else if (totalNian >= 1000000) {
                config = { title: '無相念佛', desc: '心佛合一，湛藍如月，照徹大千。', grad: 'grad-1m', glow: 'rgba(224,224,224,0.4)' };
            } else if (totalNian >= 500000) {
                config = { title: '不退轉菩薩', desc: '淨業初成，如露清涼，永不退轉。', grad: 'grad-500k', glow: 'rgba(129,212,250,0.4)' };
            } else {
                config = { title: '蓮池海會', desc: '初入蓮池，霞光環繞。<br>諸上善人同聚一處，共修淨業。', grad: 'grad-100k', glow: 'rgba(206,147,216,0.4)' };
            }

            // 更新文字與發光
            titleEl.innerText = `✦ ${config.title} 契印 ✦`;
            descEl.innerHTML = `累積念佛已達 <b>${totalNian.toLocaleString()}</b> 聲。<br>${config.desc}`;
            certUI.style.boxShadow = `${config.shadow || '0 30px 60px rgba(0,0,0,0.8)'}, inset 0 0 40px ${config.glow}`;

            // 清空並重繪 SVG 動畫
            box.innerHTML = '';
            certUI.style.opacity = '0';
            certUI.style.transform = 'translateY(20px)';

            setTimeout(() => {
                let fill = `url(#${config.grad})`;
                let stroke = totalNian >= 100000000 ? "#fff" : "rgba(243,229,171,0.8)";
                let dropGlow = totalNian >= 100000000 ? "drop-shadow(0 0 15px rgba(212,175,55,0.8))" : "drop-shadow(0 0 10px rgba(0,0,0,0.5))";

                let svg = `<svg class="lotus-spin" viewBox="-150 -150 300 300" style="width:100%;height:100%;overflow:visible; filter:${dropGlow};">`;

                let layers = 3;
                for (let l = layers; l > 0; l--) {
                    const sc = 0.44 + l * 0.28;
                    const n = (l === layers) ? 8 : 6;
                    const rotOffset = l * 22.5; 
                    for (let i = 0; i < n; i++) {
                        const rot = i * (360/n) + rotOffset;
                        const s = 112 * sc;
                        const pth = `M 0 0 C ${s*.44} ${-s*.07} ${s*.54} ${-s*.62} 0 ${-s} C ${-s*.54} ${-s*.62} ${-s*.44} ${-s*.07} 0 0`;
                        const vein = `M 0 ${-s*.08} Q 0 ${-s*.55} 0 ${-s*.88}`;
                        
                        svg += `<g transform="rotate(${rot})">
                            <path class="draw-petal" d="${pth}" fill="${fill}" stroke="${stroke}" stroke-width="1.2" />
                            <path class="draw-vein" d="${vein}" fill="none" stroke="rgba(243,229,171,0.4)" stroke-width="0.8"/>
                        </g>`;
                    }
                }

                const cr = 16;
                svg += `<circle cx="0" cy="0" r="${cr}" fill="${fill}" stroke="${stroke}" stroke-width="1.2" style="opacity:0; animation: color-fade 2s ease forwards 4s;"/>`;
                for (let s = 0; s < 10; s++) {
                    const sa = (s * 36) * Math.PI / 180;
                    const sr = cr + 10;
                    const ex = (sr * Math.cos(sa)).toFixed(1);
                    const ey = (sr * Math.sin(sa)).toFixed(1);
                    svg += `<g style="opacity:0; animation: color-fade 2s ease forwards 4.5s;">
                        <circle cx="${ex}" cy="${ey}" r="3" fill="${fill}" />
                        <line x1="${(cr*.6*Math.cos(sa)).toFixed(1)}" y1="${(cr*.6*Math.sin(sa)).toFixed(1)}" x2="${ex}" y2="${ey}" stroke="${stroke}" stroke-width="0.8"/>
                    </g>`;
                }
                
                svg += `</svg>`;
                box.innerHTML = svg;

                // 顯示卡片
                certUI.style.opacity = '1';
                certUI.style.transform = 'translateY(0)';
            }, 100);
        }

        // 🌟 3. 初始化與實機串接
        window.onload = () => {
            setTimeout(() => { document.getElementById('page-curtain').style.opacity = '0'; }, 300);

            // 讀取主系統資料
            let db; try { db = JSON.parse(localStorage.getItem('PX_V15.0')) || {}; } catch(e) { db = {}; }
            document.getElementById('user-name').innerText = db.name || "妙 依";
            let total = db.totalNian || 0;
            
            // 判斷當前最高階位
            let targetNian = 100000; // 預設展示 10萬
            if(total >= 100000000) targetNian = 100000000;
            else if(total >= 10000000) targetNian = 10000000;
            else if(total >= 1000000) targetNian = 1000000;
            else if(total >= 500000) targetNian = 500000;
            else if(total >= 100000) targetNian = 100000;

            // 執行對應的蓮花動畫
            playLotusAnim(targetNian);
        };

        // 🌟 4. 按鈕互動
        function returnToSystem() {
            document.getElementById('page-curtain').style.opacity = '1';
            
            // 將已閱印記寫入資料庫
            let db = JSON.parse(localStorage.getItem('PX_V15.0')) || {};
            if(!db.milestones) db.milestones = {};
            
            let total = db.totalNian || 0;
            if(total >= 100000000) db.milestones['nian_100M'] = true;
            else if(total >= 10000000) db.milestones['nian_10M'] = true;
            else if(total >= 1000000) db.milestones['nian_1M'] = true;
            else if(total >= 500000) db.milestones['nian_500k'] = true;
            else if(total >= 100000) db.milestones['nian_100k'] = true;
            
            localStorage.setItem('PX_V15.0', JSON.stringify(db));

            setTimeout(() => { window.location.href = 'index.html'; }, 800);
        }

        function toggleScreenshot() {
            const controls = document.getElementById('controls');
            const actions = document.getElementById('cert-actions');
            controls.style.opacity = '0'; actions.style.opacity = '0';
            
            const restore = () => {
                controls.style.opacity = '1'; actions.style.opacity = '1';
                window.removeEventListener('click', restore);
                window.removeEventListener('touchstart', restore);
            };
            setTimeout(() => {
                window.addEventListener('click', restore);
                window.addEventListener('touchstart', restore, {passive: true});
                setTimeout(restore, 5000);
            }, 100);
        }
    </script>
</body>
</html>
