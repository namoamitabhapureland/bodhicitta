<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>一真法界 ． 同心曼陀羅</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --bg-deep: #020203;
        }

        body {
            margin: 0; padding: 0;
            height: 100vh; height: 100dvh;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, var(--bg-deep) 100%);
            color: #fff; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none;
        }

        /* 粒子畫布 */
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* 左上角歸返按鈕 */
        .top-nav-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); 
            padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; 
            display: flex; align-items: center; gap: 6px; z-index: 1000; cursor: pointer; 
            backdrop-filter: blur(5px); transition: opacity 0.8s, transform 0.3s;
        }
        .top-nav-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.2); }

        /* 🌟 同心圓壇城容器 (絕對置中，並緩慢自轉) */
        #mandala-container {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 380px; height: 380px;
            z-index: 10;
            opacity: 0; /* 等待種子歸位後浮現 */
            transition: opacity 2s ease-in-out;
            pointer-events: none;
            animation: slow-spin 60s linear infinite; /* 整個法印緩慢旋轉 */
        }
        @keyframes slow-spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* 單一圓軌 */
        .mandala-ring {
            position: absolute;
            top: 50%; left: 50%;
            border-radius: 50%;
            border: 1px dashed rgba(212,175,55,0.2); /* 虛線軌道，更具科技與法界感 */
            transform: translate(-50%, -50%);
            transition: all 1s ease;
        }

        /* 軌道已解鎖的常亮狀態 */
        .mandala-ring.is-achieved {
            border: 2px solid var(--ring-color);
            box-shadow: 0 0 15px var(--ring-color), inset 0 0 15px var(--ring-color);
        }

        /* 軌道正在共鳴的發光特效 */
        .mandala-ring.is-pulsing {
            animation: ring-pulse 1.5s ease-out;
        }
        @keyframes ring-pulse {
            0% { box-shadow: 0 0 0px var(--ring-color), inset 0 0 0px var(--ring-color); border-color: var(--ring-color); }
            50% { box-shadow: 0 0 40px var(--ring-color), inset 0 0 40px var(--ring-color); border-color: rgba(255,255,255,0.9); }
            100% { box-shadow: 0 0 15px var(--ring-color), inset 0 0 15px var(--ring-color); border-color: var(--ring-color); }
        }

        /* 晶石定位與狀態 */
        .crystal-wrapper {
            position: absolute;
            transform-origin: center;
            transition: all 0.8s ease;
            filter: grayscale(0.8) brightness(0.5); /* 🌟 修正：讓未解鎖的晶石更清晰可見 */
            opacity: 0.5; 
        }
        .crystal-wrapper.is-lit {
            filter: grayscale(0) brightness(1.2); 
            opacity: 1;
        }

        /* 🌟 中央金剛種子 (獨立於容器外，不跟著旋轉) */
        #immortal-seed {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 24px; height: 24px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 10%, #ffe 30%, var(--gold) 60%, var(--solid-gold) 100%);
            box-shadow: 0 0 20px var(--solid-gold);
            opacity: 0; z-index: 100;
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .seed-heartbeat {
            animation: heartbeat-pulse 1.4s infinite cubic-bezier(0.2, 0.8, 0.4, 1);
        }
        @keyframes heartbeat-pulse { 
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px var(--gold); } 
            50% { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 50px var(--gold), 0 0 80px #fff; } 
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px var(--gold); } 
        }

        #golden-flash { position: fixed; inset: 0; background: radial-gradient(circle, #ffffff 0%, #f3e5ab 40%, #d4af37 100%); mix-blend-mode: screen; opacity: 0; z-index: 99998; pointer-events: none; transition: opacity 0.5s ease-out; }

        /* 狀態文字 (未達標時顯示) */
        #profound-text { 
            position: absolute; top: 12%; width: 100%; color: var(--gold); 
            font-size: 1.05rem; letter-spacing: 5px; word-spacing: 8px; opacity: 0; 
            transition: opacity 2s ease; text-align: center; text-shadow: 0 0 15px var(--solid-gold), 0 0 3px #fff; 
            line-height: 2.0; font-weight: 300; z-index: 100; pointer-events: none; 
        }

        /* 🌟 證書 UI (固定在下方) */
        #cert-ui {
            position: absolute;
            bottom: 5%; left: 50%;
            transform: translateX(-50%) translateY(50px);
            width: 88%; max-width: 360px;
            z-index: 200; opacity: 0; pointer-events: none;
            transition: opacity 2s ease, transform 2s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: linear-gradient(135deg, rgba(12, 15, 14, 0.95), rgba(2, 3, 2, 0.98));
            border: 1px solid rgba(212, 175, 55, 0.35);
            border-radius: 20px; padding: 25px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column; align-items: center;
        }
        #cert-ui.is-visible { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }

        .cert-header { color: rgba(243,229,171,0.8); font-size: 0.85rem; letter-spacing: 6px; margin-bottom: 15px; font-weight: bold; }
        .cert-name-label { color: var(--cyan); font-size: 0.65rem; letter-spacing: 4px; margin-bottom: 6px; text-transform: uppercase;}
        .cert-name { color: var(--gold); font-size: 1.35rem; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 12px rgba(212,175,55,0.6); margin-bottom: 15px; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 15px; width: 100%; text-align: center;}
        
        .cert-desc-title { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; color: var(--gold); font-size: 0.9rem; letter-spacing: 2px; font-weight: bold; text-shadow: 0 0 8px rgba(212,175,55,0.4); }
        .cert-desc { color: #ddd; font-size: 0.8rem; line-height: 1.9; letter-spacing: 1.5px; text-align: center; margin-bottom: 20px; }
        .cert-desc span.highlight { color: var(--solid-gold); font-weight: bold; }

        .btn-claim {
            width: 100%; padding: 12px 0; border-radius: 25px;
            border: 1px solid var(--solid-gold); 
            background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(0,0,0,0.8)); 
            color: var(--gold); font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; 
            cursor: pointer; transition: all 0.3s; 
        }
        .btn-claim:active { transform: scale(0.95); background: rgba(212,175,55,0.4); }
        #page-curtain { position: fixed; inset: 0; background: #000; z-index: 9999999; pointer-events: none; transition: opacity 1.5s; opacity: 1; }
    </style>
</head>
<body>

    <div id="page-curtain"></div>

    <div class="top-nav-btn" onclick="goHome('index.html')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        歸返系統
    </div>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <linearGradient id="f-light" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.85"/><stop offset="100%" stop-color="#fff" stop-opacity="0.2"/></linearGradient>
            <linearGradient id="f-dark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#000" stop-opacity="0.1"/><stop offset="100%" stop-color="#000" stop-opacity="0.5"/></linearGradient>
            <linearGradient id="grad-0" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f7fa"/><stop offset="100%" stop-color="#4dd0e1"/></linearGradient> <linearGradient id="grad-1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f3e5f5"/><stop offset="100%" stop-color="#ba68c8"/></linearGradient> <linearGradient id="grad-2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e3f2fd"/><stop offset="100%" stop-color="#2196f3"/></linearGradient> <linearGradient id="grad-3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#b2ebf2"/><stop offset="50%" stop-color="#f8bbd0"/><stop offset="100%" stop-color="#fff9c4"/></linearGradient> <linearGradient id="grad-4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff59d"/><stop offset="100%" stop-color="#ffb300"/></linearGradient> <g id="lotus-petal"><path d="M12 2C16 8 18 14 12 22C6 14 8 8 12 2Z"/></g>
        </defs>
    </svg>

    <canvas id="realmCanvas"></canvas>
    
    <div id="profound-text"></div>
    <div id="golden-flash"></div>
    <div id="mandala-container"></div>
    <div id="immortal-seed"></div>

    <div id="cert-ui">
        <div class="cert-header">✦ 菩提契印 ✦</div>
        <div class="cert-name-wrap">
            <div class="cert-name-label">行 者</div>
            <div class="cert-name" id="cert-name-insert">無 名</div>
        </div>
        <div class="cert-desc" id="cert-text-body"></div>
        <button class="btn-claim" onclick="claimCertificate()">歡喜功德 ． 歸返系統</button>
    </div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        // 🌟 音效系統
        let audioCtx;
        function initAudio() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playDing(freq, type='sine', duration=0.3) {
            initAudio();
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function playGatherSound() {
            initAudio();
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(108, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(864, audioCtx.currentTime + 3.0);
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 1.5); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 3.0);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 3.0);
        }

        // 🌟 粒子系統 (萬法歸一)
        const canvas = document.getElementById('realmCanvas'); const ctx = canvas.getContext('2d');
        let width, height, particles = []; let isGathering = true;
        
        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        function initParticles() {
            for(let i=0; i<400; i++) {
                let angle = Math.random() * Math.PI * 2;
                let radius = Math.random() * 800 + 200; 
                particles.push({
                    x: width/2 + Math.cos(angle) * radius,
                    y: height/2 + Math.sin(angle) * radius,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.05 + 0.02,
                    hue: Math.random() * 60 + 180 
                });
            }
        }

        function drawParticles() {
            if(!isGathering) return;
            ctx.fillStyle = 'rgba(10, 14, 20, 0.4)'; ctx.fillRect(0,0,width,height);
            ctx.globalCompositeOperation = 'screen';
            
            // 修正粒子匯聚的中心點，對齊 top: 45% 的種子位置
            let centerX = width/2; let centerY = height * 0.45;
            particles.forEach(p => {
                p.x += (centerX - p.x) * p.speed;
                p.y += (centerY - p.y) * p.speed;
                p.speed *= 1.05; 
                
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fillStyle = `hsla(${p.hue}, 80%, 70%, 0.8)`;
                ctx.fill();
            });
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(drawParticles);
        }

        // 🌟 定義 5 重法界同心圓數據
        const RINGS_DATA = [
            { key: 'rank_10', radius: 45, scale: 0.28, color: '#4dd0e1', grad: 'url(#grad-0)', targetDays: 90, 
              title: '十信功圓', desc: '已成就信、念、精進等菩提心要。<br>今邁入「初住位」，首重<span class="highlight">「布施」</span>度有情。' },
            { key: 'rank_abiding_10', radius: 80, scale: 0.38, color: '#ba68c8', grad: 'url(#grad-1)', targetDays: 1000, 
              title: '十住功成', desc: '生如來家，安住真如本性。<br>今邁入「初行位」，側重<span class="highlight">「持戒」</span>嚴飾菩提。' },
            { key: 'rank_practice_10', radius: 115, scale: 0.48, color: '#2196f3', grad: 'url(#grad-2)', targetDays: 1100, 
              title: '十行圓滿', desc: '於一切法中，行無相真實行。<br>今邁入「初迴向位」，以<span class="highlight">「忍辱精進」</span>悲智雙運。' },
            { key: 'rank_dedication_10', radius: 150, scale: 0.58, color: '#f8bbd0', grad: 'url(#grad-3)', targetDays: 11100, 
              title: '迴向功圓', desc: '三處迴向，心無所住而生其心。<br>今登「歡喜地」，以<span class="highlight">「禪定」</span>破除無明。' },
            { key: 'rank_ground_10', radius: 190, scale: 0.75, color: '#ffb300', grad: 'url(#grad-4)', targetDays: 111100, 
              title: '十地行圓', desc: '福慧兩足，等覺妙覺在望。<br>以<span class="highlight">「般若」</span>徹照萬法皆空，無功用行，普度十方。' }
        ];

        let db; try { db = JSON.parse(localStorage.getItem('PX_V15.0')) || {}; } catch(e) { db = {}; }
        const milestones = db.milestones || {};
        const currentDays = (db.points || 0) / 100;
        let activeRingIndex = -1;

        // 🌟 構建同心圓
        function buildMandala() {
            const container = document.getElementById('mandala-container');
            let allRingsHTML = '';
            
            RINGS_DATA.forEach((ring, idx) => {
                const alreadyClaimed = milestones[ring.key] === true;
                if (currentDays >= ring.targetDays && !alreadyClaimed && activeRingIndex === -1) {
                    activeRingIndex = idx;
                }

                let ringState = alreadyClaimed ? 'is-achieved' : '';
                let ringHTML = `<div class="mandala-ring ${ringState}" id="ring-${idx}" style="width: ${ring.radius*2}px; height: ${ring.radius*2}px; --ring-color: ${ring.color};">`;
                
                // 每一圈 10 顆晶石 (手繪多邊形確保兼容)
                for(let i=0; i<10; i++) {
                    let angle = i * 36 * (Math.PI / 180);
                    let cx = ring.radius * Math.cos(angle);
                    let cy = ring.radius * Math.sin(angle);
                    let rotDeg = i * 36 + 90; // 尖端朝外
                    
                    let stateClass = alreadyClaimed ? 'is-lit' : '';
                    let glowFilter = alreadyClaimed ? `drop-shadow(0 0 10px ${ring.color})` : '';

                    ringHTML += `
                        <div class="crystal-wrapper crystal-${idx}-${i} ${stateClass}" 
                             style="left: calc(50% + ${cx}px); top: calc(50% + ${cy}px); 
                                    transform: translate(-50%, -50%) rotate(${rotDeg}deg) scale(${ring.scale});
                                    ${alreadyClaimed ? `filter: grayscale(0) brightness(1.2) ${glowFilter}; opacity: 1;` : ''}">
                            <svg viewBox="0 0 100 100" width="100" height="100" style="overflow:visible;">
                                <polygon points="50,15 35,45 50,85 65,45" fill="${ring.grad}" opacity="0.9"/>
                                <polygon points="50,15 35,45 50,55" fill="url(#f-light)"/>
                                <polygon points="35,45 50,85 50,55" fill="url(#f-dark)"/>
                                <polygon points="50,15 65,45 50,55" fill="url(#f-dark)"/>
                                <polygon points="65,45 50,85 50,55" fill="url(#f-light)"/>
                                <polyline points="50,15 35,45 50,85 65,45 50,15" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
                                <polyline points="35,45 50,55 65,45" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
                            </svg>
                        </div>
                    `;
                }
                ringHTML += `</div>`;
                allRingsHTML += ringHTML;
            });
            container.innerHTML = allRingsHTML;
        }

        // 🌟 主儀式流程
        async function runCeremony() {
            // 1. 狂暴收攝
            initParticles();
            drawParticles();
            playGatherSound();
            document.getElementById('page-curtain').style.opacity = '0';
            
            await sleep(2800); 

            // 2. 金光一閃，種子現身
            isGathering = false;
            ctx.clearRect(0,0,width,height); 
            
            const flash = document.getElementById('golden-flash');
            flash.style.opacity = '1';
            playDing(864, 'triangle', 2.0); 
            
            const seed = document.getElementById('immortal-seed');
            seed.style.opacity = '1';
            seed.style.transform = 'translate(-50%, -50%) scale(1)';
            seed.classList.add('seed-heartbeat');

            await sleep(300);
            flash.style.opacity = '0';
            
            await sleep(1000);

            // 3. 同心圓法印浮現
            buildMandala();
            document.getElementById('mandala-container').style.opacity = '1';
            
            await sleep(1500);

            // 4. 點亮儀式判斷
            if (activeRingIndex !== -1) {
                // 【有新達成的成就】
                const targetRingData = RINGS_DATA[activeRingIndex];
                
                // 順時針點亮 10 顆
                for(let i=0; i<10; i++) {
                    await sleep(300); 
                    const cry = document.querySelector(`.crystal-${activeRingIndex}-${i}`);
                    cry.classList.add('is-lit');
                    cry.style.filter = `grayscale(0) brightness(1.2) drop-shadow(0 0 10px ${targetRingData.color})`;
                    cry.style.opacity = '1';
                    playDing(800 + i*50); 
                }

                await sleep(500);

                // 軌道共鳴脈衝
                const ringEl = document.getElementById(`ring-${activeRingIndex}`);
                ringEl.classList.add('is-achieved', 'is-pulsing');
                playDing(1200, 'sine', 1.5);
                
                // 種子強光爆發
                seed.style.boxShadow = '0 0 50px #fff, 0 0 100px var(--solid-gold)';
                seed.style.transform = 'translate(-50%, -50%) scale(1.5)';
                await sleep(500);
                seed.style.transform = 'translate(-50%, -50%) scale(1)';
                seed.style.boxShadow = ''; 
                
                // 5. 證書浮現
                document.getElementById('cert-name-insert').innerText = db.name || "無 名";
                document.getElementById('cert-text-body').innerHTML = `
                    <div class="cert-desc-title"><svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>${targetRingData.title}<svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg></div>
                    ${targetRingData.desc}
                `;
                
                document.getElementById('cert-ui').classList.add('is-visible');
                
            } else {
                // 🌟 【沒有新成就：只看不踢人】
                // 顯示功德未滿的文字，並讓行者自己決定何時按左上角離開
                const textEl = document.getElementById('profound-text');
                textEl.innerHTML = "菩提沉睡 ． 功德未滿<br><span style='font-size:0.75rem; color:var(--cyan); letter-spacing:2px;'>請持續精進，累積法界資糧</span>";
                textEl.style.opacity = '1';
            }
        }

        function goHome(targetUrl) {
            document.getElementById('page-curtain').style.opacity = '1';
            setTimeout(() => { window.location.href = targetUrl; }, 800);
        }

        function claimCertificate() {
            document.getElementById('cert-ui').classList.remove('is-visible');
            document.getElementById('page-curtain').style.opacity = '1';
            
            if (activeRingIndex !== -1) {
                if (!db.milestones) db.milestones = {};
                db.milestones[RINGS_DATA[activeRingIndex].key] = true;
                localStorage.setItem('PX_V15.0', JSON.stringify(db));
            }
            
            setTimeout(() => { window.location.href = 'index.html'; }, 800);
        }

        window.addEventListener('click', initAudio, {once: true});
        window.addEventListener('touchstart', initAudio, {once: true, passive: true});
        window.addEventListener('load', runCeremony);
    </script>
</body>
</html>
