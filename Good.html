<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>八識迷城 ． 終極實裝版</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: #010103; color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
        }

        /* ---------------- 虛空瞬光 ---------------- */
        #void-flash { position: absolute; inset: 0; pointer-events: none; opacity: 0; z-index: 999; transition: opacity 0.8s ease-out, box-shadow 0.8s ease-out; }
        .flash-gold { box-shadow: inset 0 0 150px rgba(212, 175, 55, 0.85); opacity: 1 !important; }
        .flash-red { box-shadow: inset 0 0 180px rgba(139, 0, 0, 0.95); opacity: 1 !important; }

        /* ---------------- 星空引擎 ---------------- */
        canvas { display: block; position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(circle at center, transparent 10%, rgba(1, 1, 3, 0.98) 100%); }

        /* ---------------- 頂部能量光弦 ---------------- */
        #energy-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 4px; z-index: 100; background: rgba(255,255,255,0.03); opacity: 0; transition: opacity 0.5s; }
        #energy-bar { height: 100%; width: 100%; background: linear-gradient(90deg, transparent, #e8cf82 20%, #d4af37 50%, #e8cf82 80%, transparent); box-shadow: 0 0 20px rgba(212, 175, 55, 0.8); transform-origin: left; }
        .critical-time { background: linear-gradient(90deg, transparent, #ff4444 20%, #8b0000 50%, #ff4444 80%, transparent) !important; animation: breatheRed 0.5s infinite alternate; }
        @keyframes breatheRed { from { box-shadow: 0 0 10px rgba(139,0,0,0.8); } to { box-shadow: 0 0 30px rgba(255,0,0,1); } }

        /* ---------------- 左上角：回道場 ---------------- */
        #btn-back {
            position: absolute; top: calc(max(25px, env(safe-area-inset-top, 25px))); left: 25px; z-index: 100;
            color: #8ba89c; font-size: 0.85rem; letter-spacing: 3px;
            cursor: pointer; display: flex; align-items: center; gap: 10px; opacity: 0.6; transition: all 0.4s ease;
        }
        #btn-back:hover, #btn-back:active { opacity: 1; transform: translateX(-5px); color: #d4af37; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        #btn-back svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.5; transition: stroke 0.3s; }

        /* ---------------- 右下角：資料庫雙星芒統計 ---------------- */
        #stats-container {
            position: absolute; bottom: calc(max(25px, env(safe-area-inset-bottom, 25px))); right: 25px; z-index: 100;
            display: flex; flex-direction: column; gap: 18px; align-items: flex-end; opacity: 0.7; pointer-events: none;
        }
        .stat-item { display: flex; align-items: center; gap: 12px; color: #8ba89c; font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; }
        .stat-icon { width: 28px; height: 28px; }
        #ui-tier-icon { filter: drop-shadow(0 0 8px rgba(212,175,55,0.3)); }
        
        .tier-seed-pulse { animation: tierSeedBreathe 2s infinite alternate ease-in-out; transform-origin: center; }
        @keyframes tierSeedBreathe { 0% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.1); filter: blur(0.5px); } }

        /* ---------------- 法門場景 ---------------- */
        #door-scene { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 460px; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; cursor: pointer; pointer-events: auto; }
        #door-scene.zooming { transition: transform 1.8s cubic-bezier(0.6, 0.05, 0.1, 1), opacity 1.2s; transform: translate(-50%, -50%) scale(10); opacity: 0; pointer-events: none; }
        
        .door-frame-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 11; pointer-events: none; filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.2)); }
        
        #door-panel-container { position: absolute; top: 15px; left: 15px; right: 15px; bottom: 0; z-index: 12; display: flex; overflow: hidden; justify-content: center; pointer-events: none; border-radius: 125px 125px 0 0; }
        
        .door-panel { width: 50%; height: 100%; transition: transform 1.5s cubic-bezier(0.5, 0, 0.1, 1); position: relative; overflow: hidden; }
        
        .door-panel::before { 
            content: ''; position: absolute; inset: 0; 
            background: radial-gradient(circle at center, rgba(243, 229, 171, 0.25) 0%, rgba(212, 175, 55, 0.05) 80%);
            backdrop-filter: blur(5px);
            border-bottom: 0.8px solid rgba(243, 229, 171, 0.3);
            animation: doorBreathe 4s infinite alternate ease-in-out;
            transition: all 0.3s;
        }
        @keyframes doorBreathe { 0% { opacity: 0.85; filter: brightness(0.95); } 100% { opacity: 1; filter: brightness(1.2); } }

        .door-smoke {
            position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%);
            width: 480px; height: 120px; z-index: 13; pointer-events: none;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.35) 0%, rgba(212,175,55,0.15) 50%, transparent 85%);
            filter: blur(12px); animation: smokeDrift 6s infinite alternate ease-in-out;
        }

        .door-left { border-radius: 125px 0 0 0; }
        .door-left::before { border-right: 1px solid rgba(255,255,255,0.6); box-shadow: 2px 0 15px rgba(212,175,55,0.4); }
        .door-right { border-radius: 0 125px 0 0; }
        .door-right::before { border-left: 1px solid rgba(255,255,255,0.6); box-shadow: -2px 0 15px rgba(212,175,55,0.4); }
        
        .lotus-seal { position: absolute; top: 50%; transform: translateY(-50%); width: 140px; height: 140px; z-index: 15; pointer-events: none; }
        .door-left .lotus-seal { right: -70px; } 
        .door-right .lotus-seal { left: -70px; } 

        #door-scene.opening .door-left { transform: translateX(-100%); }
        #door-scene.opening .door-right { transform: translateX(100%); }

        #door-hint { position: absolute; top: -60px; width: 100%; text-align: center; color: #f3e5ab; font-size: 1rem; letter-spacing: 6px; animation: pulseGlow 2.5s infinite alternate; font-weight: 300; transition: all 0.5s; }
        @keyframes pulseGlow { 0% { opacity: 0.5; text-shadow: 0 0 10px rgba(212,175,55,0.3); } 100% { opacity: 1; text-shadow: 0 0 25px rgba(243,229,171,0.8), 0 0 40px #fff; } }

        /* ---------------- 題庫玉簡 ---------------- */
        #q-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%) scale(0.92); width: 92%; max-width: 540px; background: linear-gradient(145deg, rgba(15, 20, 25, 0.95), rgba(5, 8, 10, 0.98)); backdrop-filter: blur(25px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 40px 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(139, 168, 156, 0.05); opacity: 0; pointer-events: none; transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1); z-index: 50; }
        #q-panel.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        
        .karma-dot { position: absolute; top: 20px; right: 20px; width: 8px; height: 8px; background: #ff4444; border-radius: 50%; display: none; box-shadow: 0 0 15px #ff0000, 0 0 30px #8b0000; animation: pulseKarma 1.2s infinite alternate; }
        @keyframes pulseKarma { from { opacity: 0.4; transform: scale(0.8); } to { opacity: 1; transform: scale(1.3); } }

        #q-level { color: #8ba89c; font-size: 0.8rem; letter-spacing: 5px; margin-bottom: 20px; text-align: center; border-bottom: 1px solid rgba(139,168,156,0.15); padding-bottom: 20px; position: relative; text-transform: uppercase; }
        #voice-hint { color: #d4af37; font-size: 0.7rem; letter-spacing: 3px; position: absolute; right: 0; top: 0; animation: pulse 1.5s infinite alternate; opacity: 0.8;}
        
        #q-text { color: #f3e5ab; font-size: 1.15rem; letter-spacing: 2px; line-height: 1.9; text-align: justify; margin-bottom: 35px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); font-weight: 300; }

        .option-btn { width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(139,168,156,0.15); border-radius: 12px; padding: 18px 20px; margin-bottom: 12px; color: #b0c4de; font-size: 0.95rem; letter-spacing: 1.5px; line-height: 1.6; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); text-align: left; display: flex; align-items: flex-start; gap: 15px; position: relative; overflow: hidden; }
        .option-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.1), transparent); transition: 0.5s; }
        .option-btn:hover::before { left: 100%; }
        .option-btn:active { transform: scale(0.97); background: rgba(212,175,55,0.08); border-color: rgba(212,175,55,0.5); color: #fff; box-shadow: 0 0 20px rgba(212,175,55,0.1); }
        
        .opt-dot { width: 16px; height: 16px; border: 1.5px solid rgba(139,168,156,0.4); border-radius: 50%; flex-shrink: 0; margin-top: 4px; transition: 0.3s; position: relative; }
        .option-btn:active .opt-dot { border-color: #d4af37; background: rgba(212,175,55,0.5); box-shadow: 0 0 10px #d4af37; }

        #cert-content { display: none; text-align: center; flex-direction: column; align-items: center; animation: fadeIn 1s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .sword-container { width: 120px; height: 260px; margin: 20px auto; filter: drop-shadow(0 0 30px rgba(212,175,55,0.6)); display: none; animation: floatSword 4s infinite ease-in-out; }
        @keyframes floatSword { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* ---------------- 究竟圓滿：燙金結業證書 ---------------- */
        .grand-cert {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #050505, #0a0a0a);
            border: 1.5px solid rgba(212,175,55,0.6); border-radius: 12px;
            padding: 50px 30px; position: relative; overflow: hidden;
            box-shadow: 0 0 50px rgba(212,175,55,0.15), inset 0 0 40px rgba(212,175,55,0.1);
            animation: fadeInCert 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            margin-bottom: 25px;
        }
        @keyframes fadeInCert { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .cert-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 220px; opacity: 0.04; pointer-events: none; }
        .cert-seal {
            position: absolute; bottom: 25px; right: 25px;
            width: 45px; height: 45px; border: 2px solid #8b0000; border-radius: 4px;
            color: #8b0000; font-size: 0.9rem; font-weight: bold; font-family: "KaiTi", "Microsoft JhengHei", serif;
            display: flex; align-items: center; justify-content: center; text-align: center;
            line-height: 1.1; opacity: 0.8; filter: drop-shadow(0 0 5px rgba(139,0,0,0.3));
            transform: rotate(-8deg); letter-spacing: 1px;
        }
        .cert-title { color: #d4af37; font-size: 1.6rem; letter-spacing: 10px; margin-bottom: 25px; font-weight: 300; text-shadow: 0 0 20px rgba(212,175,55,0.5); position: relative; z-index: 2; margin-left: 10px; }
        .cert-text { color: #e8cf82; font-size: 1.05rem; line-height: 2.2; letter-spacing: 4px; text-align: center; position: relative; z-index: 2; font-weight: 300; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }

        .btn-main { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212,175,55,0.6); color: #f3e5ab; padding: 14px 35px; border-radius: 30px; font-size: 0.9rem; letter-spacing: 5px; cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); display: block; margin: 30px auto 0 auto; backdrop-filter: blur(5px); }
        .btn-main:hover { background: rgba(212,175,55,0.15); box-shadow: 0 0 25px rgba(212,175,55,0.3); }
        .btn-main:active { transform: scale(0.92); }
        
        .btn-danger { border-color: rgba(255, 68, 68, 0.6); color: #ffaaaa; background: rgba(139,0,0,0.15); }
        .btn-danger:hover { background: rgba(139,0,0,0.3); box-shadow: 0 0 30px rgba(255,68,68,0.4); }

        @keyframes pulse { 0% { opacity: 0.3; } 100% { opacity: 1; } }
        .svg-full { width: 100%; height: 100%; display: block; overflow: visible; }
    </style>
</head>
<body>

    <div id="void-flash"></div>

    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
        <defs>
            <linearGradient id="gold-frame" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
                <stop offset="30%" stop-color="#d4af37" stop-opacity="1"/>
                <stop offset="70%" stop-color="#b8860b" stop-opacity="1"/>
                <stop offset="100%" stop-color="#5c400a" stop-opacity="0.9"/>
            </linearGradient>
            <linearGradient id="gold-bright" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="1"/><stop offset="50%" stop-color="#f3e5ab" stop-opacity="1"/><stop offset="100%" stop-color="#d4af37" stop-opacity="1"/></linearGradient>
            <linearGradient id="gold-dark" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#5c400a"/><stop offset="50%" stop-color="#b8860b"/><stop offset="100%" stop-color="#5c400a"/></linearGradient>
            <linearGradient id="cyan-glass" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.8"/><stop offset="50%" stop-color="#00838f" stop-opacity="0.6"/><stop offset="100%" stop-color="#004d40" stop-opacity="0.9"/></linearGradient>
            <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="sword-glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
    </svg>

    <template id="lotus-seal-svg">
        <svg viewBox="0 0 140 140" class="svg-full" filter="drop-shadow(0 0 15px rgba(212,175,55,0.6))">
            <circle cx="70" cy="70" r="60" fill="none" stroke="rgba(243,229,171,0.5)" stroke-width="1.5" stroke-dasharray="2 6"/>
            <circle cx="70" cy="70" r="42" fill="none" stroke="rgba(212,175,55,0.8)" stroke-width="1.2"/>
            <circle cx="70" cy="70" r="10" fill="url(#gold-bright)" filter="url(#glow)"/>
            <g stroke="url(#gold-bright)" stroke-width="1">
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(255, 183, 197, 0.15)" />
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(174, 221, 243, 0.15)" transform="rotate(45 70 70)" />
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(168, 230, 207, 0.15)" transform="rotate(90 70 70)" />
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(255, 139, 148, 0.15)" transform="rotate(135 70 70)" />
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(204, 174, 243, 0.15)" transform="rotate(180 70 70)" />
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(174, 243, 221, 0.15)" transform="rotate(225 70 70)" />
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(255, 204, 153, 0.15)" transform="rotate(270 70 70)" />
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(235, 243, 174, 0.15)" transform="rotate(315 70 70)" />
            </g>
        </svg>
    </template>

    <canvas id="starCanvas"></canvas>
    <div id="vignette"></div>
    <div id="energy-wrap"><div id="energy-bar"></div></div>

    <div id="btn-back" onclick="returnToDaochang()">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        歸返道場
    </div>

    <div id="stats-container">
        <div class="stat-item">
            <span id="ui-total-q">破迷 0 題</span>
            <svg class="stat-icon" viewBox="0 0 50 50">
                <polygon points="25,2 48,25 25,48 2,25" fill="none" stroke="#8ba89c" stroke-width="1.5"/>
                <polygon points="25,8 42,25 25,42 8,25" fill="rgba(139,168,156,0.1)" stroke="#8ba89c" stroke-width="0.5" stroke-dasharray="2 2"/>
                <circle cx="25" cy="25" r="4" fill="#8ba89c" filter="url(#glow)"/>
            </svg>
        </div>
        <div class="stat-item">
            <span id="ui-tier">初信</span>
            <svg class="stat-icon" viewBox="0 0 50 50" id="ui-tier-icon">
                <circle cx="25" cy="25" r="22" fill="none" stroke="#8ba89c" stroke-width="1.5" stroke-dasharray="3 5"/>
                <circle cx="25" cy="25" r="4" fill="#8ba89c" class="tier-seed-pulse" filter="url(#glow)"/>
            </svg>
        </div>
    </div>

    <div id="door-scene" onclick="triggerDoor()">
        <div id="door-hint">輕觸入陣</div>
        <svg class="door-frame-svg" viewBox="0 0 280 460" preserveAspectRatio="none">
            <path d="M10 460 L 10 140 C 10 60, 70 10, 140 10 C 210 10, 270 60, 270 140 L 270 460 L 250 460 L 250 140 C 250 75, 195 30, 140 30 C 85 30, 30 75, 30 140 L 30 460 Z" fill="url(#gold-frame)"/>
            <path d="M15 460 L 15 140 C 15 65, 75 15, 140 15 C 205 15, 265 65, 265 140 L 265 460" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.6"/>
        </svg>
        
        <div class="door-smoke"></div>

        <div id="door-panel-container">
            <div class="door-panel door-left"><div class="lotus-seal"></div></div>
            <div class="door-panel door-right"><div class="lotus-seal"></div></div>
        </div>
    </div>

    <div id="q-panel">
        <div class="karma-dot" id="karma-dot"></div>
        <div id="q-level"><span id="stage-text">陣法載入中</span> <span id="voice-hint"></span></div>
        
        <div id="question-content">
            <div id="q-text"></div>
            <div id="q-options"></div>
        </div>

        <div id="cert-content">
            <div class="sword-container" id="sword-svg">
                <svg viewBox="0 0 100 240" class="svg-full">
                    <polygon points="50,5 75,70 50,190 25,70" fill="url(#cyan-glass)" stroke="url(#gold-bright)" stroke-width="1.2"/>
                    <polygon points="50,5 50,190 25,70" fill="rgba(255,255,255,0.25)"/> 
                    <line x1="50" y1="5" x2="50" y2="190" stroke="#fff" stroke-width="2" filter="url(#sword-glow)"/> 
                    <polygon points="15,180 85,180 65,200 35,200" fill="url(#gold-frame)"/>
                    <polygon points="50,180 85,180 65,200 50,200" fill="rgba(0,0,0,0.3)"/> 
                    <rect x="43" y="200" width="14" height="30" fill="url(#gold-dark)"/>
                    <polygon points="50,230 65,240 50,250 35,240" fill="url(#gold-bright)" filter="url(#glow)"/>
                </svg>
            </div>
            <div id="cert-text" style="color:#a8c2b5; line-height:2; margin-top:20px; font-size:0.95rem; text-align:center;"></div>
        </div>

        <div id="grand-cert" class="grand-cert">
            <svg class="cert-watermark" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#d4af37" stroke-width="1.5"/>
                <circle cx="50" cy="50" r="10" fill="none" stroke="#d4af37" stroke-width="1.5"/>
                <path d="M50 10 L50 90 M10 50 L90 50 M21.7 21.7 L78.3 78.3 M21.7 78.3 L78.3 21.7" stroke="#d4af37" stroke-width="1.5"/>
            </svg>
            <div class="cert-title">般若智印</div>
            <div class="cert-text">歷經重重魔考 ． 破迷開悟<br>資糧悉皆具足 ． 般若華開<br>特授此印 ． 永為道根</div>
            <div class="cert-seal">法界<br>樞紐</div>
        </div>

        <div id="action-btns" style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top:25px; width: 100%;"></div>
    </div>

<script>
    const sealTemplate = document.getElementById('lotus-seal-svg').innerHTML;
    document.querySelectorAll('.lotus-seal').forEach(el => el.innerHTML = sealTemplate);

    let db = { points: 0, totalCorrect: 0, lastMatrixDate: "", tempBag: 0, treasures: { sword: 0 } };
    try { 
        const local = JSON.parse(localStorage.getItem('PX_V15.0'));
        if (local && typeof local === 'object') { 
            db = { ...db, ...local }; 
            if(db.tempBag === undefined) db.tempBag = 0;
            if(!db.treasures) db.treasures = {sword:0}; 
        }
    } catch(e) {}

    const todayStr = new Date().toDateString();
    let hasPlayedToday = (db.lastMatrixDate === todayStr);

    function updateStatsUI() {
        document.getElementById('ui-total-q').innerText = `破迷 ${db.totalCorrect} 題`;
        
        let tierText = "初信", color = "#8ba89c";
        const tierIcon = document.getElementById('ui-tier-icon');
        
        if (db.points >= 200 && db.points < 600) { 
            tierText = "深信"; color = "#a8c2b5"; 
            tierIcon.innerHTML = `<circle cx="25" cy="25" r="22" fill="none" stroke="${color}" stroke-width="1.5"/><circle cx="25" cy="25" r="6" fill="${color}" filter="url(#glow)"/><circle cx="25" cy="25" r="2" fill="#fff"/>`;
        } else if (db.points >= 600) { 
            tierText = "般若"; color = "#d4af37"; 
            tierIcon.innerHTML = `<circle cx="25" cy="25" r="22" fill="none" stroke="${color}" stroke-width="1.5" filter="url(#glow)"/><path d="M25 15 C28 20, 28 22, 25 25 C22 22, 22 20, 25 15" fill="${color}" transform="rotate(0 25 25)"/><path d="M25 15 C28 20, 28 22, 25 25 C22 22, 22 20, 25 15" fill="${color}" transform="rotate(90 25 25)"/><path d="M25 15 C28 20, 28 22, 25 25 C22 22, 22 20, 25 15" fill="${color}" transform="rotate(180 25 25)"/><path d="M25 15 C28 20, 28 22, 25 25 C22 22, 22 20, 25 15" fill="${color}" transform="rotate(270 25 25)"/><circle cx="25" cy="25" r="4" fill="#fff" filter="url(#glow)"/>`;
        } else {
            tierIcon.innerHTML = `<circle cx="25" cy="25" r="22" fill="none" stroke="${color}" stroke-width="1.5" stroke-dasharray="3 5"/><circle cx="25" cy="25" r="4" fill="${color}" class="tier-seed-pulse" filter="url(#glow)"/>`;
        }
        
        document.getElementById('ui-tier').innerText = tierText;
        document.getElementById('ui-tier').style.color = color;
        
        if (hasPlayedToday) {
            document.getElementById('door-hint').innerText = "一念微細 ． 明日再來";
            document.getElementById('door-hint').style.color = "#8b0000";
            document.getElementById('door-hint').style.animation = "none";
            document.getElementById('door-hint').style.textShadow = "0 0 15px rgba(139,0,0,0.8)";
        }
    }
    updateStatsUI();

    const DEMO_TOTAL_Q = 2; 

    const questionBank = [
        { 
            level: "第一重 ． 破迷", time: 15, isKarma: true,
            text: "娑婆信仰浩如煙海。我們娑婆世界佛教的本師教主是誰？", 
            options: [
                { text: "阿彌陀佛", isCorrect: false }, { text: "釋迦牟尼佛", isCorrect: true },
                { text: "彌勒菩薩", isCorrect: false }, { text: "觀世音菩薩", isCorrect: false }
            ] 
        },
        { 
            level: "第二重 ． 正法", time: 15, isKarma: false,
            text: "關於大乘行者之發菩提心，何者最契合實相？", 
            options: [
                { text: "廣修布施供養，祈求自身來世生於善道。", isCorrect: false },
                { text: "視世間如火宅，深厭生死，急求解脫入於涅槃。", isCorrect: false },
                { text: "雖知眾生本空，然悲願不捨，於無相中廣行六度。", isCorrect: true },
                { text: "了達萬法皆空，既無生死可出，故安住於無所作為。", isCorrect: false }
            ] 
        }
    ];

    const bossQuestion = {
        level: "第十一重 ． 隱藏魔考", time: 15,
        text: "極樂與娑婆，若以一真法界觀之，實相為何？",
        options: [
            { text: "淨土乃為根器愚鈍者所設之幻城。", isCorrect: false },
            { text: "極樂與娑婆皆為實有，故須厭離此土欣求彼土。", isCorrect: false },
            { text: "全妄即真。極樂不離自心，以唯心淨土接引唯心眾生。", isCorrect: true },
            { text: "必須仰賴彌陀神力，於心外建立一淨土供安立。", isCorrect: false }
        ]
    };

    let currentStage = 0; let correctCount = 0; let isProcessing = false;
    let timerId = null, criticalTimerId = null;

    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [], warpSpeed = 1;
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();
    for (let i = 0; i < 300; i++) stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: Math.random() > 0.5 ? '#8ba89c' : '#f3e5ab' });
    function renderStars() {
        ctx.fillStyle = 'rgba(1, 1, 3, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(star => {
            star.z -= warpSpeed;
            if (star.z <= 0) { star.z = 2000; star.x = (Math.random() - 0.5) * 2000; star.y = (Math.random() - 0.5) * 2000; }
            else if (star.z > 2000) star.z = 0;
            let scale = 400 / (400 + star.z);
            ctx.beginPath(); ctx.arc((width / 2) + star.x * scale, (height / 2) + star.y * scale, Math.max(0.5, 2 * scale), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '139,168,156'}, ${Math.min(1, scale * 2)})`; ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }
    renderStars();

    function initMatrix() { loadQuestion(0); }

    function flashEffect(type) {
        const vf = document.getElementById('void-flash');
        vf.className = type === 'gold' ? 'flash-gold' : 'flash-red';
        setTimeout(() => { vf.className = ''; }, 800);
    }

    function loadQuestion(index, isBoss = false) {
        const q = isBoss ? bossQuestion : questionBank[index];
        document.getElementById('karma-dot').style.display = (q.isKarma && !isBoss) ? 'block' : 'none';
        document.getElementById('stage-text').innerText = q.level;
        document.getElementById('q-text').innerText = q.text;
        document.getElementById('action-btns').innerHTML = ''; 
        
        const optsDiv = document.getElementById('q-options');
        optsDiv.innerHTML = '';
        
        let shuffled = [...q.options].sort(() => Math.random() - 0.5);
        shuffled.forEach(opt => {
            const btn = document.createElement('div'); btn.className = 'option-btn';
            btn.innerHTML = `<div class="opt-dot"></div><div>${opt.text}</div>`;
            btn.onclick = () => processAnswer(opt.isCorrect, isBoss);
            optsDiv.appendChild(btn);
        });
    }

    function triggerDoor() {
        if (isProcessing) return;
        if (hasPlayedToday) { flashEffect('red'); return; }
        
        isProcessing = true; 
        document.getElementById('door-hint').style.display = 'none';

        if ('speechSynthesis' in window) {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
        }

        const scene = document.getElementById('door-scene');
        scene.classList.add('opening');
        setTimeout(() => { warpSpeed = 12; scene.classList.add('zooming'); }, 400);
        setTimeout(() => { 
            warpSpeed = 1; 
            document.getElementById('q-panel').classList.add('show');
            const currentQ = (currentStage === DEMO_TOTAL_Q) ? bossQuestion : questionBank[currentStage];
            readVoiceAndStartTimer(currentQ.text, currentQ.time);
            isProcessing = false; 
        }, 1600); 
    }

    function readVoiceAndStartTimer(text, seconds) {
        const wrap = document.getElementById('energy-wrap');
        const bar = document.getElementById('energy-bar');
        const voiceHint = document.getElementById('voice-hint');
        
        wrap.style.opacity = 1; 
        bar.style.transition = 'none'; bar.style.transform = 'scaleX(1)';
        bar.classList.remove('critical-time');
        
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            let msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW'; msg.rate = 1.1; 
            
            msg.onstart = () => { voiceHint.innerText = '導讀中...'; };
            
            msg.onend = () => {
                voiceHint.innerText = '';
                startActualTimer(seconds);
            };
            msg.onerror = () => { voiceHint.innerText = ''; startActualTimer(seconds); }; 
            
            window.speechSynthesis.speak(msg);
            setTimeout(() => { if(voiceHint.innerText !== '') { voiceHint.innerText = ''; startActualTimer(seconds); } }, 15000);
        } else {
            setTimeout(() => startActualTimer(seconds), 3000);
        }
    }

    function startActualTimer(seconds) {
        const bar = document.getElementById('energy-bar');
        void bar.offsetWidth;
        bar.style.transition = `transform ${seconds}s linear`;
        bar.style.transform = 'scaleX(0)';

        criticalTimerId = setTimeout(() => { bar.classList.add('critical-time'); }, Math.max(0, seconds - 4) * 1000); 
        timerId = setTimeout(() => { handleFatalFailure(); }, seconds * 1000);
    }

    function processAnswer(isCorrect, isBoss) {
        if (isProcessing) return;
        isProcessing = true; 
        
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        clearTimeout(timerId); clearTimeout(criticalTimerId);
        document.getElementById('voice-hint').innerText = '';
        document.getElementById('energy-wrap').style.opacity = 0;
        document.getElementById('q-panel').classList.remove('show');

        if (isCorrect) {
            if (!isBoss) correctCount++;
            flashEffect('gold');
            setTimeout(() => { if (isBoss) { showSettlement(true, true); } else { nextStage(); } }, 1000);
        } else {
            flashEffect('red');
            if (isBoss) {
                setTimeout(() => { showSettlement(true, false); }, 1500);
            } else {
                handleFatalFailure();
            }
        }
    }

    /* ---------------- 無情說法：答錯即鎖定 ---------------- */
    function handleFatalFailure() {
        flashEffect('red');
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        clearTimeout(timerId); clearTimeout(criticalTimerId);
        
        db.lastMatrixDate = todayStr;
        localStorage.setItem('PX_V15.0', JSON.stringify(db));
        hasPlayedToday = true;
        
        document.getElementById('q-panel').classList.remove('show');
        document.getElementById('voice-hint').innerText = '';
        document.getElementById('energy-wrap').style.opacity = 0;
        
        const scene = document.getElementById('door-scene');
        scene.style.transition = 'transform 1.5s, opacity 1.5s';
        scene.classList.remove('opening', 'zooming');
        
        const hint = document.getElementById('door-hint');
        hint.innerText = "一念微細 ． 明日再來";
        hint.style.color = "#8b0000";
        hint.style.textShadow = "0 0 15px rgba(139,0,0,0.8)";
        hint.style.animation = "none";
        hint.style.display = 'block';
        
        warpSpeed = -15; 
        let shake = setInterval(() => { document.body.style.transform = `translate(${(Math.random()-0.5)*10}px, ${(Math.random()-0.5)*10}px)`; }, 50);
        
        setTimeout(() => {
            clearInterval(shake); document.body.style.transform = 'translate(0,0)';
            warpSpeed = 1;
            setTimeout(() => { returnToDaochang(); }, 800);
        }, 1500);
    }

    function nextStage() {
        currentStage++;
        const scene = document.getElementById('door-scene');
        scene.style.transition = 'none'; scene.classList.remove('zooming', 'opening');
        void scene.offsetWidth; 
        scene.style.transition = 'transform 1.8s cubic-bezier(0.6, 0.05, 0.1, 1), opacity 1.2s';
        
        if (currentStage >= DEMO_TOTAL_Q) {
            if (correctCount === DEMO_TOTAL_Q) { setTimeout(promptBossQuestion, 500); } 
            else { showSettlement(false, false); }
        } else {
            document.getElementById('door-hint').style.display = 'block';
            loadQuestion(currentStage);
            isProcessing = false; 
        }
    }

    function promptBossQuestion() {
        warpSpeed = 3;
        document.getElementById('karma-dot').style.display = 'none';
        document.getElementById('stage-text').innerText = "般若圓滿 ． 結界異動";
        document.getElementById('stage-text').style.color = "#d4af37";
        document.getElementById('question-content').style.display = 'block';
        document.getElementById('cert-content').style.display = 'none';
        document.getElementById('grand-cert').style.display = 'none';
        
        document.getElementById('q-options').innerHTML = '';
        document.getElementById('q-text').innerHTML = `<div style="text-align:center; color:#ff8888; font-size:1.15rem; line-height:2; text-shadow: 0 0 10px rgba(255,0,0,0.3); font-weight: 300;">行者，您已連續答對十題。<br>法界深處，<span style="font-weight:bold;">【第十一重魔考】</span>已然浮現。<br>此題玄奧，錯亦不扣分。<br><br><span style="color:#d4af37; font-size:1.25rem; letter-spacing: 5px;">是否接受最終問心？</span></div>`;
        
        document.getElementById('action-btns').innerHTML = `
            <div style="display:flex; gap:15px; width:100%; justify-content:center;">
                <button class="btn-main btn-danger" style="margin:0;" onclick="startBoss()">直面魔考</button>
                <button class="btn-main" style="margin:0; border-color:rgba(139,168,156,0.5); color:#8ba89c;" onclick="declineBoss()">見好就收</button>
            </div>
        `;
        document.getElementById('q-panel').classList.add('show');
        isProcessing = false; 
    }

    function startBoss() {
        if (isProcessing) return; isProcessing = true;
        document.getElementById('q-panel').classList.remove('show');
        setTimeout(() => {
            warpSpeed = 10; 
            document.getElementById('stage-text').style.color = "#ff4444";
            loadQuestion(0, true);
            document.getElementById('q-panel').classList.add('show');
            readVoiceAndStartTimer(bossQuestion.text, bossQuestion.time);
            isProcessing = false; 
        }, 1000);
    }

    function declineBoss() {
        if (isProcessing) return; isProcessing = true;
        document.getElementById('q-panel').classList.remove('show');
        setTimeout(() => { showSettlement(true, false); }, 500);
    }

    /* ---------------- 資糧暫存與究竟圓滿結算 ---------------- */
    function showSettlement(isPerfect, passedBoss) {
        warpSpeed = 0.2; 
        document.getElementById('question-content').style.display = 'none';
        document.getElementById('karma-dot').style.display = 'none';
        
        document.getElementById('stage-text').innerText = "問心圓滿 ． 資糧結集";
        document.getElementById('stage-text').style.color = "#8ba89c";
        
        let basePoints = 10 + (correctCount * 4);
        let finalPoints = passedBoss ? basePoints + 10 : basePoints;
        
        db.tempBag += finalPoints;
        db.totalCorrect += correctCount;
        if (isPerfect) db.treasures.sword += 1;
        db.lastMatrixDate = todayStr;
        
        localStorage.setItem('PX_V15.0', JSON.stringify(db));

        if ((db.points + db.tempBag) >= 600) {
            document.getElementById('cert-content').style.display = 'none';
            document.getElementById('grand-cert').style.display = 'flex';
        } else {
            document.getElementById('cert-content').style.display = 'flex';
            document.getElementById('grand-cert').style.display = 'none';
            
            let html = `今日參陣，獲取基礎 10 分<br>答對 <span style="color:#fff;">${correctCount}</span> 題，獲取 <span style="color:#fff;">${correctCount * 4}</span> 分<br>`;
            if (passedBoss) html += `<span style="color:#ff8888;">第十一重魔考突破，額外 +10 分</span><br>`;
            html += `<br><span style="color:#d4af37; font-size:1.8rem; font-weight:bold; text-shadow:0 0 25px rgba(212,175,55,0.6); letter-spacing: 4px;">本次共得：${finalPoints} 分</span>`;

            if (isPerfect) {
                document.getElementById('sword-svg').style.display = 'block';
                html += `<br><br><span style="color:#f3e5ab; font-size:0.95rem; letter-spacing: 2px;">般若圓滿！<br>法界特賜【幾何慧劍】一尊，已收入多寶閣。</span>`;
            }
            document.getElementById('cert-text').innerHTML = html;
        }
        
        const actionDiv = document.getElementById('action-btns');
        if (db.tempBag >= 100) {
            actionDiv.innerHTML = `<button class="btn-main" style="margin:0;" onclick="syncToMain()">資糧結集 ． 匯入主系統</button>`;
        } else {
            actionDiv.innerHTML = `
                <div style="color:#8ba89c; font-size:0.85rem; letter-spacing:2px;">資糧累積中 ． 尚未具足 (${db.tempBag}/100)</div>
                <button class="btn-main" style="border-color:rgba(139,168,156,0.3); color:#8ba89c; margin:0;" onclick="returnToDaochang()">關閉陣法</button>
            `;
        }

        document.getElementById('q-panel').classList.add('show');
    }

    function syncToMain() {
        if (isProcessing) return; isProcessing = true;
        
        db.points += db.tempBag;
        db.tempBag = 0;
        
        localStorage.setItem('PX_V15.0', JSON.stringify(db));
        updateStatsUI();
        
        document.getElementById('q-panel').classList.remove('show');
        flashEffect('gold');
        
        setTimeout(() => { returnToDaochang(); }, 1500);
    }

    function returnToDaochang() {
        location.reload(); 
    }

    initMatrix();
</script>
</body>
</html>
