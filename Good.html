<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>八識迷城 ． 破門問心</title>
    <style>
        :root {
            --bg-deep: #010103;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --danger: #8b0000;
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100vh;
        }

        /* 3D 星河畫布 */
        canvas { display: block; position: absolute; inset: 0; z-index: 1; }

        /* 幽暗暈影與反噬遮罩 */
        #vignette {
            position: absolute; inset: 0; z-index: 2; pointer-events: none;
            background: radial-gradient(circle at center, transparent 20%, rgba(1, 1, 3, 0.95) 100%);
            transition: background 0.5s ease;
        }

        /* 啟動屏障 */
        .start-screen {
            position: fixed; inset: 0; background: rgba(1, 1, 3, 0.95); z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s;
        }
        .start-title {
            color: var(--gold); font-size: 1.5rem; letter-spacing: 8px; font-weight: bold;
            margin-bottom: 40px; text-shadow: 0 0 20px rgba(212,175,55,0.6);
        }
        .btn-main {
            background: transparent; border: 1px solid var(--solid-gold);
            color: var(--gold); padding: 12px 35px; border-radius: 30px; font-size: 1rem;
            letter-spacing: 4px; cursor: pointer; transition: 0.3s; box-shadow: inset 0 0 10px rgba(212,175,55,0.1);
        }
        .btn-main:active { transform: scale(0.95); background: rgba(212,175,55,0.2); box-shadow: 0 0 20px rgba(212,175,55,0.5); }

        /* --- 法門 3D 容器 --- */
        .door-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 350px; z-index: 10; perspective: 1200px;
            display: none; opacity: 0; transition: opacity 0.8s, transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* 門框美學 */
        .door-frame {
            position: absolute; inset: 0; border: 4px solid #333; border-bottom: none;
            border-radius: 120px 120px 0 0; box-shadow: 0 0 30px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
        }
        .door-frame.lv1 { border-color: #555; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .door-frame.lv2 { border-color: var(--cyan); box-shadow: 0 0 30px rgba(139,168,156,0.3); }
        .door-frame.lv3 { border-color: var(--solid-gold); box-shadow: 0 0 40px rgba(212,175,55,0.4); }

        /* 左右兩片門扉 */
        .door-panel {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: linear-gradient(135deg, #111, #050505);
            border: 1px solid rgba(255,255,255,0.1); transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .door-panel.left { left: 0; border-radius: 120px 0 0 0; transform-origin: left; border-right: 1px solid #000; }
        .door-panel.right { right: 0; border-radius: 0 120px 0 0; transform-origin: right; border-left: 1px solid #333; }

        .door-frame.lv2 .door-panel { background: rgba(10,20,15,0.9); border-color: rgba(139,168,156,0.4); }
        .door-frame.lv3 .door-panel { background: linear-gradient(135deg, rgba(30,25,10,0.95), #000); border-color: rgba(212,175,55,0.5); }

        /* 推門互動提示 */
        .door-hint {
            position: absolute; top: -50px; width: 100%; text-align: center;
            color: var(--gold); font-size: 0.9rem; letter-spacing: 4px; animation: pulse 2s infinite alternate;
        }

        /* 門開啟的動畫狀態 */
        .door-container.opening .door-panel.left { transform: rotateY(-110deg); }
        .door-container.opening .door-panel.right { transform: rotateY(110deg); }
        .door-container.zooming { transform: translate(-50%, -50%) scale(10); opacity: 0; }

        /* --- HUD 介面 (考題與沙漏) --- */
        .hud-layer {
            position: absolute; inset: 0; z-index: 50; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 美學倒數計時 */
        .timer-container {
            position: absolute; top: 8%; display: flex; flex-direction: column; align-items: center;
            opacity: 0; transform: translateY(-20px); transition: 0.5s;
        }
        .timer-circle {
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--solid-gold);
            display: flex; justify-content: center; align-items: center;
            color: var(--gold); font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 15px var(--solid-gold);
            box-shadow: inset 0 0 15px rgba(212,175,55,0.2), 0 0 20px rgba(212,175,55,0.3);
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
        }
        .timer-container.danger .timer-circle {
            border-color: var(--danger); color: #ff6666; text-shadow: 0 0 15px var(--danger);
            box-shadow: inset 0 0 20px rgba(139,0,0,0.5), 0 0 30px rgba(139,0,0,0.6); animation: shake 0.5s infinite;
        }

        /* 題目玉簡 */
        .question-panel {
            width: 88%; max-width: 480px; background: rgba(5, 8, 5, 0.85); backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px;
            padding: 30px 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.05);
            opacity: 0; transform: translateY(30px) scale(0.95); transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .question-panel.show { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        
        .q-level { color: var(--cyan); font-size: 0.85rem; letter-spacing: 4px; margin-bottom: 15px; text-align: center; }
        .q-text { color: var(--gold); font-size: 1.05rem; letter-spacing: 2px; line-height: 1.8; text-align: justify; text-shadow: 0 0 10px rgba(212,175,55,0.2); margin-bottom: 25px; border-bottom: 1px solid rgba(139,168,156,0.3); padding-bottom: 20px; }

        .option-btn {
            width: 100%; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(139,168,156,0.3);
            border-radius: 12px; padding: 15px 20px; margin-bottom: 12px;
            color: #d0d0d0; font-size: 0.95rem; letter-spacing: 1px; line-height: 1.6;
            text-align: justify; cursor: pointer; transition: all 0.3s; display: flex; align-items: flex-start; gap: 15px;
        }
        .option-btn:active { transform: scale(0.98); background: rgba(212,175,55,0.15); border-color: var(--solid-gold); }
        .opt-icon { width: 20px; height: 20px; flex-shrink: 0; stroke: rgba(139,168,156,0.6); fill: none; stroke-width: 1.5; margin-top: 2px;}

        /* 系統提示 */
        .toast-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 1.5rem; letter-spacing: 8px; font-weight: bold; text-align: center;
            opacity: 0; z-index: 100; pointer-events: none; transition: opacity 0.5s; width: 100%;
        }
        .flash-overlay { position: absolute; inset: 0; z-index: 90; pointer-events: none; opacity: 0; transition: opacity 0.5s; background: rgba(243,229,171,0.9); }

        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
    </style>
</head>
<body>

    <div class="start-screen" id="start-screen">
        <div class="start-title">八識迷城 ． 破門問心</div>
        <button class="btn-main" onclick="startMatrix()">推開法界</button>
    </div>

    <canvas id="starCanvas"></canvas>
    <div id="vignette"></div>
    <div class="flash-overlay" id="flash-screen"></div>

    <div class="door-container" id="door-container" onclick="openDoor()">
        <div class="door-hint">輕觸推門</div>
        <div class="door-frame" id="door-frame">
            <div class="door-panel left"></div>
            <div class="door-panel right"></div>
        </div>
    </div>

    <div class="hud-layer">
        <div class="timer-container" id="timer-container">
            <div class="timer-circle" id="timer-text">--</div>
        </div>

        <div class="question-panel" id="q-panel">
            <div class="q-level" id="q-level">第一重</div>
            <div class="q-text" id="q-text">加載中...</div>
            <div id="q-options"></div>
        </div>
    </div>

    <div class="toast-msg" id="toast"></div>

<script>
    // ================= 星河引擎 (Starfield) =================
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let stars = [];
    const FOV = 400;
    let baseSpeed = 2;   // 預設緩慢前進
    let warpSpeed = 2;   // 動態加速倍率

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
    }
    window.addEventListener('resize', resize); resize();

    function initStars() {
        stars = [];
        for (let i = 0; i < 500; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 2000,
                y: (Math.random() - 0.5) * 2000,
                z: Math.random() * 2000,
                color: Math.random() > 0.5 ? '#9fdfc8' : '#f3e5ab'
            });
        }
    }

    function renderStars() {
        ctx.fillStyle = 'rgba(1, 1, 3, 0.4)'; // 殘影
        ctx.fillRect(0, 0, width, height);

        ctx.globalCompositeOperation = 'screen';
        stars.forEach(star => {
            star.z -= (baseSpeed * warpSpeed);
            if (star.z <= 0) { star.z = 2000; star.x = (Math.random() - 0.5) * 2000; star.y = (Math.random() - 0.5) * 2000; }
            
            let scale = FOV / (FOV + star.z);
            let sx = (width / 2) + star.x * scale;
            let sy = (height / 2) + star.y * scale;
            let alpha = Math.min(1, scale * 2);
            let radius = Math.max(0.5, 2.5 * scale);

            ctx.beginPath(); ctx.arc(sx, sy, radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '139,168,156'}, ${alpha})`;
            ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(renderStars);
    }
    initStars(); renderStars();

    // ================= 題庫與邏輯 =================
    const stages = [
        {
            level: "第一重 ． 破迷啟信",
            doorLv: "lv1",
            timeLimit: 0, // 送分題無倒數
            text: "娑婆信仰浩如煙海。若欲探尋解脫生死之本源，以法界觀之，何者或為正信佛教之核心？",
            options: [
                { text: "祈求具備大威德之神明，賜予庇護與感官之安樂。", isCorrect: false },
                { text: "了知因果，依循覺者所揭示之空性與緣起，自求解脫。", isCorrect: true }
            ]
        },
        {
            level: "第二重 ． 尋根溯源",
            doorLv: "lv2",
            timeLimit: 30,
            text: "世有行者，好談大乘之玄妙，卻輕忽南傳四聖諦之教法。於法脈流轉中，此二者之關係或作何解？",
            options: [
                { text: "大乘乃究竟唯一真理，小乘或為焦芽敗種，無須理會。", isCorrect: false },
                { text: "四聖諦宛若佛法深根，菩提心為其華葉。無根則華無以存。", isCorrect: true }
            ]
        },
        {
            level: "第三重 ． 淨土實相",
            doorLv: "lv3",
            timeLimit: 20, // 困難題，時間極短
            text: "極樂世界拔除三毒，無有苦樂激盪。對於未曾深思空性之凡夫，若驟然登入此境，其最初體驗或許為何？",
            options: [
                { text: "於黃金七寶中，獲得永無止境之感官滿足與狂喜。", isCorrect: false },
                { text: "面臨失去世俗刺激之不適應。彼處實為強迫直面空性之適應艙。", isCorrect: true }
            ]
        }
    ];

    let currentStage = 0;
    let timerInterval = null;
    let timeLeft = 0;
    let sysUtterances = [];

    // 啟動陣法
    function startMatrix() {
        document.getElementById('start-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('start-screen').style.display = 'none', 800);
        
        if (window.speechSynthesis) {
            let u = new SpeechSynthesisUtterance(""); u.volume = 0; window.speechSynthesis.speak(u);
        }
        
        // 星河加速推進，隨後顯化第一道門
        warpSpeed = 8;
        setTimeout(() => {
            warpSpeed = 2; // 減速
            spawnDoor(currentStage);
        }, 1500);
    }

    function speakText(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-TW'; u.rate = 0.85;
        
        let isAndroid = /Android/i.test(navigator.userAgent);
        if (isAndroid) {
            sysUtterances.push(u);
            let voices = window.speechSynthesis.getVoices();
            let zhVoice = voices.find(v => v.lang === 'zh-TW' && v.name.includes('Google')) || voices.find(v => v.lang.includes('zh'));
            if (zhVoice) u.voice = zhVoice;
            u.onend = () => { sysUtterances = sysUtterances.filter(item => item !== u); };
            setTimeout(() => window.speechSynthesis.speak(u), 150);
        } else {
            window.speechSynthesis.speak(u);
        }
    }

    // 顯化法門
    function spawnDoor(index) {
        if (index >= stages.length) {
            showMsg("不退轉 ． 陣法圓滿", true);
            setTimeout(() => location.reload(), 4000);
            return;
        }

        const doorContainer = document.getElementById('door-container');
        const doorFrame = document.getElementById('door-frame');
        
        // 設定門的美學階級
        doorFrame.className = `door-frame ${stages[index].doorLv}`;
        
        // 門浮現
        doorContainer.style.display = 'flex';
        doorContainer.classList.remove('opening', 'zooming');
        setTimeout(() => {
            doorContainer.style.opacity = 1;
        }, 50);
    }

    // 推開法門 (穿透動畫)
    function openDoor() {
        const doorContainer = document.getElementById('door-container');
        doorContainer.style.pointerEvents = 'none'; // 防連點
        
        // 1. 門扉打開
        doorContainer.classList.add('opening');
        
        // 2. 星河極速衝刺 & 視角穿透
        setTimeout(() => {
            warpSpeed = 15; // 進入超空間
            doorContainer.classList.add('zooming');
        }, 400);

        // 3. 穿透完畢，星河減速，顯化題目
        setTimeout(() => {
            doorContainer.style.display = 'none';
            doorContainer.style.pointerEvents = 'auto';
            warpSpeed = 1; // 懸停感
            showQuestion(currentStage);
        }, 1200);
    }

    // 顯化玉簡與沙漏
    function showQuestion(index) {
        const stageData = stages[index];
        const panel = document.getElementById('q-panel');
        const optsContainer = document.getElementById('q-options');
        
        document.getElementById('q-level').innerText = stageData.level;
        document.getElementById('q-text').innerText = stageData.text;
        optsContainer.innerHTML = '';
        
        let shuffled = [...stageData.options].sort(() => Math.random() - 0.5);
        shuffled.forEach(opt => {
            const btn = document.createElement('div'); btn.className = 'option-btn';
            btn.innerHTML = `<svg class="opt-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg><span>${opt.text}</span>`;
            btn.onclick = () => checkAnswer(opt.isCorrect);
            optsContainer.appendChild(btn);
        });

        panel.classList.add('show');
        speakText(stageData.text);

        // 無常沙漏
        clearInterval(timerInterval);
        const timerContainer = document.getElementById('timer-container');
        const timerText = document.getElementById('timer-text');
        timerContainer.classList.remove('danger');

        if (stageData.timeLimit > 0) {
            timeLeft = stageData.timeLimit;
            timerText.innerText = timeLeft;
            timerContainer.style.opacity = 1;
            timerContainer.style.transform = 'translateY(0)';

            timerInterval = setInterval(() => {
                timeLeft--;
                timerText.innerText = timeLeft;
                if (timeLeft <= 5) timerContainer.classList.add('danger'); // 逼近底線，發紅震動
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleFail("無常到來 ． 陣法重置");
                }
            }, 1000);
        } else {
            timerContainer.style.opacity = 0;
            timerContainer.style.transform = 'translateY(-20px)';
        }
    }

    // 業力審判
    function checkAnswer(isCorrect) {
        clearInterval(timerInterval);
        window.speechSynthesis.cancel();
        document.getElementById('q-panel').classList.remove('show');
        document.getElementById('timer-container').style.opacity = 0;

        if (isCorrect) {
            showMsg("破迷開悟 ． 琉璃光現", true);
            warpSpeed = 8; // 飛向下一個階段
            setTimeout(() => {
                currentStage++; warpSpeed = 2;
                spawnDoor(currentStage);
            }, 1500);
        } else {
            handleFail("一念無明 ． 業力反噬");
        }
    }

    function handleFail(msg) {
        document.getElementById('q-panel').classList.remove('show');
        document.getElementById('timer-container').style.opacity = 0;
        
        const vignette = document.getElementById('vignette');
        const flash = document.getElementById('flash-screen');
        
        // 恐怖血紅氛圍 + 螢幕震顫
        vignette.style.background = 'radial-gradient(circle at center, transparent 10%, rgba(50, 0, 0, 0.98) 100%)';
        flash.style.background = 'rgba(139,0,0,0.5)'; flash.style.opacity = 1;
        warpSpeed = -10; // 業力倒抽 (星河倒退飛)
        
        let shake = setInterval(() => {
            document.body.style.transform = `translate(${(Math.random()-0.5)*20}px, ${(Math.random()-0.5)*20}px)`;
        }, 50);

        showMsg(msg, false);

        setTimeout(() => {
            clearInterval(shake); document.body.style.transform = 'translate(0,0)';
            flash.style.opacity = 0;
            vignette.style.background = 'radial-gradient(circle at center, transparent 20%, rgba(1, 1, 3, 0.95) 100%)';
            warpSpeed = 2; // 恢復正常
            spawnDoor(currentStage); // 重新面對同一扇門
        }, 2500);
    }

    function showMsg(text, isSuccess) {
        const toast = document.getElementById('toast');
        const flash = document.getElementById('flash-screen');
        toast.innerText = text;
        
        if (isSuccess) {
            toast.style.color = "var(--gold)"; toast.style.textShadow = "0 0 20px var(--solid-gold)";
            flash.style.background = "rgba(243,229,171,0.8)"; flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, 600);
        } else {
            toast.style.color = "var(--danger)"; toast.style.textShadow = "0 0 20px #ff0000";
        }
        
        toast.style.opacity = 1;
        setTimeout(() => toast.style.opacity = 0, 2000);
    }
</script>
</body>
</html>
