<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九十九分 ． 智慧金剛門</title>
    <style>
        body { 
            margin: 0; background: #010103; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
        }
        .door-container {
            width: 280px; height: 460px;
            filter: drop-shadow(0 0 40px rgba(212,175,55,0.15));
        }
        svg { width: 100%; height: 100%; overflow: visible; }
    </style>
</head>
<body>

    <div class="door-container">
        <svg viewBox="0 0 280 460">
            <defs>
                <linearGradient id="gold-bright" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
                    <stop offset="40%" stop-color="#f3e5ab" stop-opacity="1"/>
                    <stop offset="80%" stop-color="#d4af37" stop-opacity="1"/>
                    <stop offset="100%" stop-color="#8b6508" stop-opacity="0.9"/>
                </linearGradient>
                <linearGradient id="gold-dark" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#d4af37" stop-opacity="0.6"/>
                    <stop offset="100%" stop-color="#8b6508" stop-opacity="0.2"/>
                </linearGradient>
                <linearGradient id="glass-cyan" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.15"/>
                    <stop offset="50%" stop-color="#8ba89c" stop-opacity="0.05"/>
                    <stop offset="100%" stop-color="#004d40" stop-opacity="0.2"/>
                </linearGradient>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="2" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
            </defs>

            <rect x="25" y="25" width="230" height="410" fill="url(#glass-cyan)"/>
            
            <rect x="35" y="35" width="210" height="390" fill="rgba(212,175,55,0.03)" stroke="none"/>
            <rect x="45" y="45" width="190" height="370" fill="rgba(212,175,55,0.05)" stroke="none"/>

            <rect x="25" y="25" width="230" height="410" fill="none" stroke="url(#gold-bright)" stroke-width="2"/>
            <rect x="35" y="35" width="210" height="390" fill="none" stroke="url(#gold-dark)" stroke-width="1"/>
            <rect x="45" y="45" width="190" height="370" fill="none" stroke="url(#gold-bright)" stroke-width="0.5" opacity="0.6"/>

            <g stroke="url(#gold-bright)" stroke-width="1" opacity="0.7">
                <line x1="10" y1="65" x2="270" y2="65" />
                <line x1="10" y1="395" x2="270" y2="395" />
                <line x1="65" y1="10" x2="65" y2="450" />
                <line x1="215" y1="10" x2="215" y2="450" />
            </g>

            <circle cx="25" cy="25" r="3" fill="#fff" filter="url(#glow)"/>
            <circle cx="255" cy="25" r="3" fill="#fff" filter="url(#glow)"/>
            <circle cx="25" cy="435" r="3" fill="#fff" filter="url(#glow)"/>
            <circle cx="255" cy="435" r="3" fill="#fff" filter="url(#glow)"/>

            <line x1="140" y1="25" x2="140" y2="435" stroke="url(#gold-bright)" stroke-width="1.5" opacity="0.9"/>
            <line x1="140" y1="45" x2="140" y2="415" stroke="#fff" stroke-width="0.5" filter="url(#glow)"/>

            <g transform="translate(140, 230)">
                <circle cx="0" cy="0" r="42" fill="#010103" stroke="url(#gold-bright)" stroke-width="1.5"/>
                <circle cx="0" cy="0" r="35" fill="rgba(212,175,55,0.08)" stroke="url(#gold-dark)" stroke-width="1"/>
                
                <g stroke="url(#gold-bright)" stroke-width="1" fill="none" opacity="0.8">
                    <polygon points="0,-25 5,-8 25,0 5,8 0,25 -5,8 -25,0 -5,-8"/>
                    <polygon points="0,-25 5,-8 25,0 5,8 0,25 -5,8 -25,0 -5,-8" transform="rotate(45)"/>
                </g>

                <circle cx="0" cy="0" r="12" fill="url(#gold-dark)" stroke="url(#gold-bright)" stroke-width="1.5"/>
                <circle cx="0" cy="0" r="4" fill="#fff" filter="url(#glow)"/>

                <line x1="0" y1="-42" x2="0" y2="42" stroke="#010103" stroke-width="2"/>
                <line x1="0" y1="-42" x2="0" y2="42" stroke="url(#gold-bright)" stroke-width="0.5" opacity="0.5"/>
            </g>
        </svg>
    </div>

</body>
</html>
