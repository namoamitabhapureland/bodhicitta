<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧拱門 ． 物理邏輯校準</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: #010103; color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
        }

        /* ---------------- 星空引擎底層 ---------------- */
        canvas { display: block; position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #vignette {
            position: absolute; inset: 0; z-index: 2; pointer-events: none;
            background: radial-gradient(circle at center, transparent 10%, rgba(1, 1, 3, 0.98) 100%);
        }

        /* ---------------- 智慧位階圖騰 (右上角，隨點數變色) ---------------- */
        #wisdom-tier {
            position: absolute; top: 25px; right: 25px; width: 40px; height: 40px; z-index: 100;
            filter: drop-shadow(0 0 10px rgba(139,168,156,0.6));
            transition: 1s;
        }

        /* ---------------- 法門場景 (拱門絕對置中) ---------------- */
        #door-scene {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 260px; height: 420px; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            cursor: pointer; pointer-events: auto;
        }
        
        /* 穿透特效 */
        #door-scene.zooming { transition: transform 1.5s cubic-bezier(0.5, 0, 0.2, 1), opacity 0.8s; transform: translate(-50%, -50%) scale(8); opacity: 0; pointer-events: none; }

        /* 門框本體 (莊嚴拱形) */
        #door-frame {
            position: absolute; inset: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: flex-end;
        }
        
        /* 左門扉與右門扉 (純淨的琉璃金門片) */
        .door-panel {
            width: 50%; height: 100%; 
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .door-left { transform-origin: center; border-radius: 130px 0 0 0; }
        .door-right { transform-origin: center; border-radius: 0 130px 0 0; }

        /* 滑開而非推開動畫 (Slide Open) */
        #door-scene.opening .door-left { transform: translateX(-100%); background: rgba(212,175,55,0.05); }
        #door-scene.opening .door-right { transform: translateX(100%); background: rgba(212,175,55,0.05); }

        .door-hint {
            position: absolute; top: -40px; width: 100%; text-align: center;
            color: var(--gold); font-size: 0.95rem; letter-spacing: 4px; 
            animation: pulse 2s infinite alternate; text-shadow: 0 0 15px rgba(212,175,55,0.6);
        }

        /* ---------------- 題目圖層 (玉簡上移，視覺黃金區) ---------------- */
        #q-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%) scale(0.9);
            width: 90%; max-width: 480px; background: rgba(5, 8, 5, 0.9); backdrop-filter: blur(15px);
            border: 1px solid rgba(139, 168, 156, 0.4); border-radius: 20px;
            padding: 35px 25px; box-shadow: 0 0 50px rgba(0,0,0,0.9);
            opacity: 0; pointer-events: none; transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 50;
        }
        #q-panel.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        
        .q-level { color: #8ba89c; font-size: 0.9rem; letter-spacing: 4px; margin-bottom: 20px; text-align: center; border-bottom: 1px dashed rgba(139,168,156,0.3); padding-bottom: 15px; }
        .q-text { color: #f3e5ab; font-size: 1.1rem; letter-spacing: 2px; line-height: 1.8; text-align: justify; margin-bottom: 30px; text-shadow: 0 0 10px rgba(212,175,55,0.2); }

        .option-btn {
            width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(139,168,156,0.3);
            border-radius: 12px; padding: 18px 20px; margin-bottom: 15px;
            color: #d0d0d0; font-size: 1rem; letter-spacing: 1px; line-height: 1.6;
            cursor: pointer; transition: all 0.3s; text-align: left;
        }
        .option-btn:active { transform: scale(0.98); background: rgba(212,175,55,0.15); border-color: #d4af37; color: #fff; }

        /* ---------------- 系統提示與結算 ---------------- */
        .toast-msg {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 1.5rem; letter-spacing: 8px; font-weight: bold; text-align: center;
            opacity: 0; z-index: 100; pointer-events: none; transition: opacity 0.5s; width: 100%;
        }

        .btn-main {
            background: rgba(212, 175, 55, 0.1); border: 1px solid #d4af37; color: #f3e5ab; 
            padding: 15px 40px; border-radius: 30px; font-size: 1rem; letter-spacing: 4px; 
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px rgba(212,175,55,0.2); margin-top: 20px;
        }
        .btn-main:active { transform: scale(0.95); background: rgba(212,175,55,0.3); }

        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }
        .svg-full { width: 100%; height: 100%; display: block; overflow: visible; }
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0; pointer-events: none; left: -9999px;">
        <defs>
            <linearGradient id="gold-bright" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="40%" stop-color="#f3e5ab" stop-opacity="1"/><stop offset="80%" stop-color="#d4af37" stop-opacity="1"/><stop offset="100%" stop-color="#8b6508" stop-opacity="0.9"/>
            </linearGradient>
            <linearGradient id="cyan-glass" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.2"/><stop offset="50%" stop-color="#8ba89c" stop-opacity="0.1"/><stop offset="100%" stop-color="#004d40" stop-opacity="0.3"/>
            </linearGradient>
            <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
    </svg>

    <canvas id="starCanvas"></canvas>
    <div id="vignette"></div>

    <svg id="wisdom-tier" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="none" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="15 8" opacity="0.6"/>
        <g stroke="#d0d0d0" stroke-width="2" fill="none" opacity="0.8">
            <polygon points="50,20 56,38 75,32 68,50 80,65 62,68 50,85 38,68 20,65 32,50 25,32 44,38"/>
        </g>
        <circle cx="50" cy="50" r="8" fill="#fff" filter="url(#glow)"/>
    </svg>

    <div id="door-scene" onclick="openDoor()">
        <div class="door-hint">輕觸入陣</div>
        
        <svg class="door-frame" viewBox="0 0 260 420" preserveAspectRatio="none" style="position: absolute; inset: 0; width: 100%; height: 100%; z-index: 11; pointer-events: none;">
            <path d="M10 420 L 10 130 C 10 50, 65 10, 130 10 C 195 10, 250 50, 250 130 L 250 420 L 235 420 L 235 130 C 235 65, 185 25, 130 25 C 75 25, 25 65, 25 130 L 25 420 Z" fill="url(#gold-bright)"/>
            <line x1="130" y1="25" x2="130" y2="420" stroke="#fff" stroke-width="1.5" opacity="0.5" filter="url(#glow)"/>
        </svg>

        <div id="door-panel-container" style="position: absolute; inset: 0; width: 100%; height: 100%; z-index: 12; display: flex; overflow: hidden; justify-content: center; pointer-events: none;">
            <div class="door-panel door-left">
                <svg class="svg-full" viewBox="0 0 130 420" preserveAspectRatio="none">
                    <path d="M25 130 C 25 65, 75 25, 130 25 L 130 420 L 25 420 Z" fill="url(#cyan-glass)"/>
                    <path d="M35 130 C 35 75, 80 35, 130 35 L 130 415 L 35 415 Z" fill="none" stroke="url(#gold-bright)" stroke-width="0.8" opacity="0.4"/>
                </svg>
            </div>

            <div class="door-panel door-right">
                <svg class="svg-full" viewBox="0 0 130 420" preserveAspectRatio="none">
                    <path d="M0 25 C 55 25, 105 65, 105 130 L 105 420 L 0 420 Z" fill="url(#cyan-glass)"/>
                    <path d="M0 35 C 50 35, 95 75, 95 130 L 95 415 L 0 415 Z" fill="none" stroke="url(#gold-bright)" stroke-width="0.8" opacity="0.4"/>
                </svg>
            </div>
        </div>
    </div>

    <div id="q-panel">
        <div class="q-level" id="q-level">第一重 ． 破迷啟信</div>
        <div class="q-text" id="q-text">娑婆信仰浩如煙海。若欲探尋解脫生死之本源，以法界觀之，何者或為正信佛教之核心？</div>
        <div id="q-options">
            </div>
        
        <div id="cert-area" style="display: none; text-align: center; margin-top: 20px;">
            <button class="btn-main" onclick="returnToDaochang()">資糧已存 ． 回歸道場</button>
        </div>
    </div>

    <div class="toast-msg" id="toast"></div>

<script>
    // ================= 1. 題庫與核心邏輯 (每日與位階) =================
    const questionBank = [
        { id: "Q001", level: "第一重", text: "娑婆信仰浩如煙海。若欲探尋解脫生死之本源，何者或為佛教之核心？", options: [{ text: "祈求威德無邊之神明赐予安樂。", isCorrect: false }, { text: "了知因果自求解脫。", isCorrect: true }] },
        { id: "Q002", level: "第二重", text: "若一切虛妄，菩薩為何廣修萬行？", options: [{ text: "積累求安樂福報。", isCorrect: false }, { text: "真空妙有，救渡有情。", isCorrect: true }] },
        // ... (未來您親自貼入 10 題)
    ];

    let completedQuestions = []; // 從資料庫讀取
    let currentStage = 0; let totalNian = 0; let nianGoal = 10;
    let earnedPoints = 0;

    // 位階顏色演算
    const tierColors = {
        初信: { c: "#d0d0d0", shadow: "rgba(255,255,255,0.6)" },
        深信: { c: "#8ba89c", shadow: "rgba(139,168,156,0.6)" },
        般若: { c: "#d4af37", shadow: "rgba(212,175,55,0.6)" },
    };

    function updateWisdomTier(points) {
        let tier = "初信";
        if (points >= 100) tier = "深信"; if (points >= 500) tier = "般若";
        
        const tierObj = document.getElementById('wisdom-tier');
        const color = tierColors[tier];
        tierObj.style.filter = `drop-shadow(0 0 15px ${color.shadow})`;
        tierObj.querySelectorAll('circle, polygon').forEach(el => {
            if (el.getAttribute('fill') === 'none') el.style.stroke = color.c;
            else if (el.getAttribute('fill') !== '#fff') el.style.fill = color.c;
        });
    }

    // ================= 2. 穩固的星空引擎 =================
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let stars = [];
    let warpSpeed = 1;

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();

    function initStars() {
        stars = [];
        for (let i = 0; i < 300; i++) {
            stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: Math.random() > 0.5 ? '#8ba89c' : '#f3e5ab' });
        }
    }

    function renderStars() {
        ctx.fillStyle = 'rgba(1, 1, 3, 0.4)'; ctx.fillRect(0, 0, width, height);
        ctx.globalCompositeOperation = 'screen';
        stars.forEach(star => {
            star.z -= warpSpeed;
            if (star.z <= 0) { star.z = 2000; star.x = (Math.random() - 0.5) * 2000; star.y = (Math.random() - 0.5) * 2000; }
            else if (star.z > 2000) { star.z = 0; }
            
            let scale = 400 / (400 + star.z);
            let sx = (width / 2) + star.x * scale; let sy = (height / 2) + star.y * scale;
            ctx.beginPath(); ctx.arc(sx, sy, Math.max(0.5, 2 * scale), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '139,168,156'}, ${Math.min(1, scale * 2)})`; ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(renderStars);
    }
    initStars(); renderStars();

    // ================= 3. 核心互動流程 =================
    
    // 初始化每日陣法
    function initMatrix() {
        // 大智將從題庫中洗牌抽出 10 題 (此處演示僅載入前 2 題)
        loadStageData(0);
        
        // 對接主系統點數邏輯
        let db;
        try { db = JSON.parse(localStorage.getItem('PX_V15.0')); } catch(e) {}
        if (!db) db = { points: 0, totalNian: 0 };
        updateWisdomTier(db.points);
    }

    // 載入關卡 DOM
    function loadStageData(index) {
        if (index >= questionBank.length) { showFinalCert(); return; } // 全部答完 (演示)
        
        const stageData = questionBank[index];
        document.getElementById('q-level').innerText = `${stageData.level} ． 智慧濾網`;
        document.getElementById('q-text').innerText = stageData.text;
        
        const optsContainer = document.getElementById('q-options');
        optsContainer.innerHTML = '';
        
        // 洗牌選項
        let shuffled = [...stageData.options].sort(() => Math.random() - 0.5);
        shuffled.forEach(opt => {
            const btn = document.createElement('div'); btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => handleAnswer(opt.isCorrect);
            optsContainer.appendChild(btn);
        });
    }

    // 點擊開門，啟動動畫
    function openDoor() {
        const doorScene = document.getElementById('door-scene');
        document.getElementById('door-hint').style.display = 'none';
        doorScene.style.pointerEvents = 'none'; // 防連點
        
        // 1. 雙門「滑開」動畫 (Slide Open)
        doorScene.classList.add('opening');
        
        // 2. 星河加速，視角穿透門框
        setTimeout(() => {
            warpSpeed = 15; 
            doorScene.classList.add('zooming');
        }, 500);

        // 3. 穿透後，星河平緩，浮現題目
        setTimeout(() => {
            warpSpeed = 1; 
            document.getElementById('q-panel').classList.add('show');
        }, 1500);
    }

    // 處理作答
    function handleAnswer(isCorrect) {
        document.getElementById('q-panel').classList.remove('show');
        const doorScene = document.getElementById('door-scene');

        if (isCorrect) {
            earnedPoints += 4; // 答對加 4 分
            showMsg("契合法理 ． 琉璃光現", true);
            
            // 答對的題目「涅槃」(ID寫入completedQuestions)，明日不再出
            // ... (未來這裡將寫入 completedQuestions 邏輯)
        } else {
            showMsg("一念無明 ． 業力重置", false);
        }
        
        // 演示：這裡大智直接退回門框，不演示「答完一題進一道門」，確保氛圍正確
        setTimeout(() => {
            currentStage++;
            doorScene.style.transition = 'none'; // 瞬間重置
            doorScene.classList.remove('zooming', 'opening');
            document.getElementById('door-hint').style.display = 'block';
            
            // 強制重繪
            void doorScene.offsetWidth; 
            doorScene.style.transition = 'transform 1.5s cubic-bezier(0.5, 0, 0.2, 1), opacity 0.8s';
            
            // 載入演示結束 (因為只有2題)
            if (currentStage >= 2) { showFinalCert(); }
            else { doorScene.style.pointerEvents = 'auto'; }
        }, 2500);
    }

    // 系統提示
    function showMsg(text, isSuccess) {
        const toast = document.getElementById('toast');
        toast.innerText = text;
        
        if (isSuccess) {
            toast.style.color = "#d4af37"; toast.style.textShadow = "0 0 15px rgba(212,175,55,0.6)";
        } else {
            toast.style.color = "#ff4444"; toast.style.textShadow = "0 0 15px #ff0000";
        }
        
        toast.style.opacity = 1;
        setTimeout(() => toast.style.opacity = 0, 2000);
    }

    // 演示結束結算 (真實系統中會是每日 10 題)
    function showFinalCert() {
        // 參加獎 10 分 + 答對題數得分 (此演示earnedPoints為0-8)
        let totalDailyPoints = 10 + earnedPoints;
        
        document.getElementById('q-level').innerText = "問心圓滿 ． 資糧結算";
        document.getElementById('q-text').innerHTML = `<div style="text-align:center;">今日問心圓滿。<br>獲取參加獎 10 分 + 作答資糧。<br>總般若資糧：<br><span style="color:#d4af37; font-size:1.5rem; font-weight:bold; text-shadow:0 0 15px var(--solid-gold);">+${totalDailyPoints} 點</span></div>`;
        document.getElementById('q-options').innerHTML = '';
        document.getElementById('cert-area').style.display = 'block';
        document.getElementById('q-panel').classList.add('show');
    }

    function returnToDaochang() {
        // 安全寫入 PX_V15.0 點數邏輯
        showMsg("點數已安全存入主系統...", true);
        // window.location.href = 'index.html?screen=3';
    }

    // 啟動系統
    initMatrix();

</script>
</body>
</html>
