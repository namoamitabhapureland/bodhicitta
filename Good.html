<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>法界金門 ． 視覺校準</title>
    <style>
        body { background: #010103; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .door-wrapper { width: 280px; height: 450px; filter: drop-shadow(0 0 30px rgba(212,175,55,0.2)); }
    </style>
</head>
<body>

    <div class="door-wrapper">
        <svg viewBox="0 0 200 320" width="100%" height="100%">
            <defs>
                <linearGradient id="gold-frame" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
                    <stop offset="30%" stop-color="#f3e5ab" stop-opacity="0.8"/>
                    <stop offset="70%" stop-color="#d4af37" stop-opacity="0.9"/>
                    <stop offset="100%" stop-color="#8b6508" stop-opacity="0.8"/>
                </linearGradient>
                <linearGradient id="glass-cyan" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.8"/>
                    <stop offset="100%" stop-color="#004d40" stop-opacity="0.6"/>
                </linearGradient>
                <linearGradient id="glass-dark" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#010103" stop-opacity="0.95"/>
                    <stop offset="100%" stop-color="#1a1225" stop-opacity="0.8"/>
                </linearGradient>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <path d="M20 120 C 20 50, 60 20, 100 20 C 140 20, 180 50, 180 120 L 180 300 L 20 300 Z" fill="#000"/>

            <path d="M10 120 C 10 40, 60 10, 100 10 C 140 10, 190 40, 190 120 L 190 310 L 175 310 L 175 120 C 175 55, 135 25, 100 25 C 65 25, 25 55, 25 120 L 25 310 L 10 310 Z" fill="url(#gold-frame)"/>
            
            <path d="M20 120 C 20 50, 60 20, 100 20 C 140 20, 180 50, 180 120 L 180 310 L 175 310 L 175 120 C 175 55, 135 25, 100 25 C 65 25, 25 55, 25 120 L 25 310 L 20 310 Z" fill="#111" opacity="0.6"/>

            <g id="left-door">
                <path d="M25 120 C 25 55, 65 25, 100 25 L 100 310 L 25 310 Z" fill="url(#glass-dark)" stroke="url(#gold-frame)" stroke-width="1.5"/>
                <path d="M30 120 C 30 65, 60 35, 95 30 L 95 305 L 30 305 Z" fill="url(#glass-cyan)" opacity="0.3"/>
                <line x1="25" y1="120" x2="100" y2="120" stroke="url(#gold-frame)" stroke-width="0.8" opacity="0.5"/>
                <line x1="25" y1="215" x2="100" y2="215" stroke="url(#gold-frame)" stroke-width="0.8" opacity="0.5"/>
                <circle cx="62.5" cy="167.5" r="20" fill="none" stroke="url(#gold-frame)" stroke-width="0.8" opacity="0.4"/>
                <polygon points="62.5,147.5 82.5,167.5 62.5,187.5 42.5,167.5" fill="rgba(212,175,55,0.1)" stroke="url(#gold-frame)" stroke-width="0.5"/>
                <circle cx="85" cy="167.5" r="6" fill="#000" stroke="url(#gold-frame)" stroke-width="2"/>
                <circle cx="85" cy="167.5" r="2" fill="#fff" filter="url(#glow)"/>
            </g>

            <g id="right-door">
                <path d="M175 120 C 175 55, 135 25, 100 25 L 100 310 L 175 310 Z" fill="url(#glass-dark)" stroke="url(#gold-frame)" stroke-width="1.5"/>
                <path d="M170 120 C 170 65, 140 35, 105 30 L 105 305 L 170 305 Z" fill="url(#glass-cyan)" opacity="0.3"/>
                <line x1="175" y1="120" x2="100" y2="120" stroke="url(#gold-frame)" stroke-width="0.8" opacity="0.5"/>
                <line x1="175" y1="215" x2="100" y2="215" stroke="url(#gold-frame)" stroke-width="0.8" opacity="0.5"/>
                <circle cx="137.5" cy="167.5" r="20" fill="none" stroke="url(#gold-frame)" stroke-width="0.8" opacity="0.4"/>
                <polygon points="137.5,147.5 157.5,167.5 137.5,187.5 117.5,167.5" fill="rgba(212,175,55,0.1)" stroke="url(#gold-frame)" stroke-width="0.5"/>
                <circle cx="115" cy="167.5" r="6" fill="#000" stroke="url(#gold-frame)" stroke-width="2"/>
                <circle cx="115" cy="167.5" r="2" fill="#fff" filter="url(#glow)"/>
            </g>

            <line x1="100" y1="25" x2="100" y2="310" stroke="#fff" stroke-width="1.5" opacity="0.8" filter="url(#glow)"/>
        </svg>
    </div>

</body>
</html>
