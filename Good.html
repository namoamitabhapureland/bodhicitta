<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>八識迷城 ． 業力分岔</title>
    <style>
        :root {
            --bg-deep: #010103;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --danger: #8b0000;
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100vh;
            perspective: 1200px;
        }

        /* 3D 星河底層 */
        canvas { display: block; position: absolute; inset: 0; z-index: 1; }

        /* 幽暗暈影與業力反噬遮罩 */
        #vignette {
            position: absolute; inset: 0; z-index: 2; pointer-events: none;
            background: radial-gradient(circle at center, transparent 15%, rgba(1, 1, 3, 0.95) 100%);
            transition: background 0.6s ease;
        }

        /* 啟動屏障 */
        .start-screen {
            position: fixed; inset: 0; background: rgba(1, 1, 3, 0.98); z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s;
        }
        .start-title {
            color: var(--gold); font-size: 1.4rem; letter-spacing: 8px; font-weight: bold;
            margin-bottom: 40px; text-shadow: 0 0 20px rgba(212,175,55,0.6);
        }
        .btn-main {
            background: transparent; border: 1px solid var(--solid-gold);
            color: var(--gold); padding: 12px 35px; border-radius: 30px; font-size: 1rem;
            letter-spacing: 4px; cursor: pointer; transition: 0.3s; box-shadow: inset 0 0 10px rgba(212,175,55,0.1);
        }
        .btn-main:active { transform: scale(0.95); background: rgba(212,175,55,0.2); box-shadow: 0 0 20px rgba(212,175,55,0.5); }

        /* 般若光軌 (右上角能量棒) */
        .prajna-track {
            position: absolute; top: 25px; right: 25px; width: 100px; height: 6px;
            background: rgba(255,255,255,0.1); border-radius: 4px; z-index: 100;
            border: 1px solid rgba(212,175,55,0.3); overflow: hidden;
        }
        .prajna-fill {
            height: 100%; width: 0%; background: linear-gradient(90deg, var(--cyan), var(--solid-gold));
            box-shadow: 0 0 10px var(--solid-gold); transition: width 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .prajna-text {
            position: absolute; top: 10px; right: 25px; color: var(--cyan); font-size: 0.7rem; letter-spacing: 2px; z-index: 100;
        }

        /* HUD 介面 (考題與沙漏) */
        .hud-layer {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 90%; max-width: 480px;
            z-index: 50; pointer-events: none; display: flex; flex-direction: column; align-items: center;
        }

        /* 燃燒沙漏 (頂部計時線) */
        .timer-bar-wrap {
            width: 100%; height: 3px; background: rgba(255,255,255,0.05); margin-bottom: 20px;
            opacity: 0; transition: opacity 0.5s;
        }
        .timer-bar {
            height: 100%; width: 100%; background: linear-gradient(90deg, var(--danger), var(--solid-gold));
            box-shadow: 0 0 15px var(--solid-gold); transform-origin: left;
        }

        /* 題目玉簡 */
        .question-panel {
            width: 100%; background: rgba(5, 8, 5, 0.85); backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 15px;
            padding: 25px 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.05);
            opacity: 0; transform: translateY(-20px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .question-panel.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        
        .q-level { color: var(--cyan); font-size: 0.8rem; letter-spacing: 4px; margin-bottom: 12px; text-align: center; border-bottom: 1px solid rgba(139,168,156,0.3); padding-bottom: 10px;}
        .q-text { color: var(--gold); font-size: 1.05rem; letter-spacing: 2px; line-height: 1.8; text-align: justify; text-shadow: 0 0 10px rgba(212,175,55,0.2); }

        /* 3D 法門容器 */
        .scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transform-style: preserve-3d; z-index: 10;
        }

        /* 法門本體美學 (拱門造型) */
        .door-wrapper {
            position: absolute; left: 50%; top: 55%; transform-style: preserve-3d;
            width: 160px; height: 300px; margin-left: -80px; margin-top: -100px;
            cursor: pointer; pointer-events: auto; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .door-wrapper:active { transform: scale3d(0.95, 0.95, 1) !important; }

        .door {
            position: absolute; inset: 0; transform-origin: left; transform-style: preserve-3d;
            border-radius: 80px 80px 0 0; border: 2px solid var(--solid-gold); border-bottom: none;
            background: rgba(10, 15, 12, 0.8); backdrop-filter: blur(8px);
            box-shadow: inset 0 0 30px rgba(212,175,55,0.1), 0 0 20px rgba(0,0,0,0.8);
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), background 0.5s;
        }

        /* 門上選項文字 */
        .door-text {
            position: absolute; top: 50px; left: 15px; right: 15px; text-align: center;
            color: #d0d0d0; font-size: 0.95rem; letter-spacing: 1px; line-height: 1.6;
            text-shadow: 0 0 10px #000; pointer-events: none; transition: 0.3s;
        }
        .door-wrapper:hover .door-text { color: var(--gold); }

        /* 門框立體層次 (內框) */
        .door::before {
            content: ''; position: absolute; inset: 10px; border-radius: 70px 70px 0 0;
            border: 1px dashed rgba(212,175,55,0.6); pointer-events: none;
        }

        /* 各難度門的色彩與材質變化 */
        .door.lv1 { border-color: #888; background: rgba(20,20,20,0.9); box-shadow: inset 0 0 20px rgba(255,255,255,0.05); }
        .door.lv1::before { border-color: rgba(255,255,255,0.3); }
        
        .door.lv2 { border-color: var(--cyan); background: rgba(5,20,15,0.85); box-shadow: inset 0 0 30px rgba(139,168,156,0.2); }
        .door.lv2::before { border-color: rgba(139,168,156,0.6); }

        .door.lv3 { border-color: var(--solid-gold); background: linear-gradient(135deg, rgba(40,30,5,0.9), rgba(5,5,5,0.95)); box-shadow: inset 0 0 40px rgba(212,175,55,0.3); }
        .door.lv3::before { border-color: var(--gold); }

        /* 門打開的狀態 */
        .door-wrapper.opening .door { transform: rotateY(-105deg); background: rgba(212,175,55,0.1); }
        .door-wrapper.zooming { transition: transform 1.5s cubic-bezier(0.5, 0, 0.2, 1); opacity: 0; }

        /* 系統提示 */
        .toast-msg {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            font-size: 1.4rem; letter-spacing: 8px; font-weight: bold; text-align: center;
            opacity: 0; z-index: 100; pointer-events: none; transition: opacity 0.5s; width: 100%;
        }
        .flash-overlay { position: absolute; inset: 0; z-index: 90; pointer-events: none; opacity: 0; transition: opacity 0.5s; background: rgba(243,229,171,0.9); }

        /* 結算畫面 */
        .cert-modal {
            width: 85%; max-width: 400px; background: rgba(5, 8, 5, 0.95); backdrop-filter: blur(15px);
            border: 1px solid var(--solid-gold); border-radius: 20px; padding: 35px 20px;
            box-shadow: 0 0 50px rgba(212,175,55,0.15); text-align: center;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%); opacity: 0; pointer-events: none; transition: all 0.8s; z-index: 80;
        }
        .cert-modal.show { transform: translate(-50%, -50%); opacity: 1; pointer-events: auto; }

    </style>
</head>
<body>

    <div class="start-screen" id="start-screen">
        <div class="start-title">八識迷城 ． 業力分岔</div>
        <button class="btn-main" onclick="startMatrix()">踏入幻陣</button>
    </div>

    <div class="prajna-text">般若資糧</div>
    <div class="prajna-track"><div class="prajna-fill" id="prajna-fill"></div></div>

    <canvas id="starCanvas"></canvas>
    <div id="vignette"></div>
    <div class="flash-overlay" id="flash-screen"></div>

    <div class="hud-layer">
        <div class="timer-bar-wrap" id="timer-wrap"><div class="timer-bar" id="timer-bar"></div></div>
        <div class="question-panel" id="q-panel">
            <div class="q-level" id="q-level">入陣</div>
            <div class="q-text" id="q-text">加載中...</div>
        </div>
    </div>

    <div class="scene" id="scene"></div>
    <div class="toast-msg" id="toast"></div>

    <div class="cert-modal" id="cert-modal">
        <svg width="100" height="100" viewBox="0 0 100 100" style="filter:drop-shadow(0 0 15px rgba(212,175,55,0.6)); margin-bottom:20px;">
            <path d="M50 85 C 80 70, 90 40, 75 25 C 65 40, 55 60, 50 85" fill="none" stroke="var(--gold)" stroke-width="2"/>
            <path d="M50 85 C 20 70, 10 40, 25 25 C 35 40, 45 60, 50 85" fill="none" stroke="var(--gold)" stroke-width="2"/>
            <path d="M50 85 C 65 50, 65 20, 50 10 C 35 20, 35 50, 50 85" fill="rgba(212,175,55,0.1)" stroke="var(--solid-gold)" stroke-width="2"/>
        </svg>
        <div style="color:var(--gold); font-size:1.2rem; letter-spacing:4px; font-weight:bold; margin-bottom:15px;">問心圓滿 ． 資糧匯入</div>
        <div style="color:var(--cyan); font-size:0.9rem; line-height:1.8; letter-spacing:1px; margin-bottom:25px;" id="cert-desc">
            本次破迷，獲取般若點數。<br>願行者解行並進，同歸極樂。
        </div>
        <button class="btn-main" onclick="returnToMainSystem()">回歸道場</button>
    </div>

<script>
    // ================= 核心題庫模組 (分離式設計) =================
    const questionBank = [
        {
            level: "第一重 ． 入陣初門",
            doorLv: "lv1",
            timeLimit: 0,
            text: "此乃八識迷城之唯一入口。行者若欲探尋生死解脫之密碼，須推開此門，直面內心。",
            options: [
                { text: "了知無常，推門入陣", isCorrect: true } // 單一門設計
            ]
        },
        {
            level: "第二重 ． 破迷啟信",
            doorLv: "lv2",
            timeLimit: 45,
            text: "娑婆信仰浩如煙海。若探求輪迴解脫之本源，以法界觀之，何者或為佛教之根本特徵？",
            options: [
                { text: "祈求威德無邊之神明，賜予永生庇護。", isCorrect: false },
                { text: "了知因果，依循覺者所揭示之空性自求解脫。", isCorrect: true }
            ]
        },
        {
            level: "第三重 ． 淨土實相",
            doorLv: "lv3",
            timeLimit: 30,
            text: "極樂世界拔除三毒。對於未曾深思空性之凡夫，若驟然登入此無有苦樂激盪之境，其最初體驗或許為何？",
            options: [
                { text: "於黃金七寶中，獲得永無止境之感官滿足與狂喜。", isCorrect: false },
                { text: "面臨失去世俗刺激之不適應。彼處實為強迫直面空性之適應艙。", isCorrect: true }
            ]
        }
    ];

    // ================= 系統與資料庫變數 =================
    let currentStage = 0;
    let correctCount = 0;
    let timerInterval = null;
    let isTransitioning = false;
    let sysUtterances = [];

    // 主系統資料庫對接
    let db;
    try {
        db = JSON.parse(localStorage.getItem('PX_V15.0'));
        if (!db || typeof db !== 'object') db = null;
    } catch(e) {}
    if (!db) db = { points: 0, totalNian: 0 };

    // ================= 星河引擎 (Warp Drive) =================
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let stars = [];
    const FOV = 400;
    let warpSpeed = 1;

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
    }
    window.addEventListener('resize', resize); resize();

    function initStars() {
        stars = [];
        for (let i = 0; i < 400; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000,
                color: Math.random() > 0.5 ? '#8ba89c' : '#f3e5ab'
            });
        }
    }

    function renderStars() {
        ctx.fillStyle = 'rgba(1, 1, 3, 0.4)'; 
        ctx.fillRect(0, 0, width, height);

        ctx.globalCompositeOperation = 'screen';
        stars.forEach(star => {
            star.z -= warpSpeed;
            if (star.z <= 0) { star.z = 2000; star.x = (Math.random() - 0.5) * 2000; star.y = (Math.random() - 0.5) * 2000; }
            else if (star.z > 2000) { star.z = 0; } // 業力倒退時的處理
            
            let scale = FOV / (FOV + star.z);
            let sx = (width / 2) + star.x * scale; let sy = (height / 2) + star.y * scale;
            let alpha = Math.min(1, scale * 2);

            ctx.beginPath(); ctx.arc(sx, sy, Math.max(0.5, 2 * scale), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '139,168,156'}, ${alpha})`;
            ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(renderStars);
    }
    initStars(); renderStars();

    // ================= 語音與流程啟動 =================
    function startMatrix() {
        document.getElementById('start-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('start-screen').style.display = 'none', 800);
        
        if (window.speechSynthesis) {
            let u = new SpeechSynthesisUtterance(""); u.volume = 0; window.speechSynthesis.speak(u);
        }
        
        warpSpeed = 6;
        setTimeout(() => { warpSpeed = 1; buildStage(0); }, 1500);
    }

    function speakText(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-TW'; u.rate = 0.85;
        
        let isAndroid = /Android/i.test(navigator.userAgent);
        if (isAndroid) {
            sysUtterances.push(u);
            let voices = window.speechSynthesis.getVoices();
            let zhVoice = voices.find(v => v.lang === 'zh-TW' && v.name.includes('Google')) || voices.find(v => v.lang.includes('zh'));
            if (zhVoice) u.voice = zhVoice;
            u.onend = () => { sysUtterances = sysUtterances.filter(item => item !== u); };
            setTimeout(() => window.speechSynthesis.speak(u), 150);
        } else { window.speechSynthesis.speak(u); }
    }

    // ================= 陣法生成邏輯 =================
    function buildStage(index) {
        if (index >= questionBank.length) { finishMatrix(); return; }
        
        isTransitioning = false;
        const stageData = questionBank[index];
        
        // 顯示題目玉簡
        document.getElementById('q-level').innerText = stageData.level;
        document.getElementById('q-text').innerText = stageData.text;
        document.getElementById('q-panel').classList.add('show');
        speakText(stageData.text);

        // 生成法門 (手機直立版：最多兩扇門，並排於 3D 空間)
        const scene = document.getElementById('scene');
        scene.innerHTML = '';
        
        let optCount = stageData.options.length;
        let shuffledOpts = [...stageData.options].sort(() => Math.random() - 0.5);

        shuffledOpts.forEach((opt, i) => {
            let wrapper = document.createElement('div');
            wrapper.className = 'door-wrapper';
            
            // 判斷單門或雙門佈局
            let transX = 0;
            let rotY = 0;
            if (optCount === 2) {
                transX = i === 0 ? -120 : 120; // 左右分開
                rotY = i === 0 ? 15 : -15;     // 微微向內傾斜，形成環繞感
            }

            wrapper.style.transform = `translate(-50%, -50%) translateZ(-150px) translateX(${transX}px) rotateY(${rotY}deg)`;

            let door = document.createElement('div');
            door.className = `door ${stageData.doorLv}`;
            door.innerHTML = `<div class="door-text">${opt.text}</div>`;
            
            wrapper.appendChild(door);
            wrapper.onclick = () => handleDoorClick(opt.isCorrect, wrapper, door);
            scene.appendChild(wrapper);
        });

        // 沙漏倒數
        clearInterval(timerInterval);
        const timerWrap = document.getElementById('timer-wrap');
        const timerBar = document.getElementById('timer-bar');
        
        if (stageData.timeLimit > 0) {
            timerWrap.style.opacity = 1;
            timerBar.style.transition = 'none'; timerBar.style.transform = 'scaleX(1)';
            
            setTimeout(() => {
                timerBar.style.transition = `transform ${stageData.timeLimit}s linear`;
                timerBar.style.transform = 'scaleX(0)';
            }, 50);

            timerInterval = setTimeout(() => { handleFail("無常逼迫 ． 陣法重置"); }, stageData.timeLimit * 1000);
        } else {
            timerWrap.style.opacity = 0;
        }
    }

    // ================= 業力抉擇 =================
    function handleDoorClick(isCorrect, wrapperEl, doorEl) {
        if(isTransitioning) return;
        isTransitioning = true;
        clearInterval(timerInterval);
        window.speechSynthesis.cancel();

        document.getElementById('q-panel').classList.remove('show');
        document.getElementById('timer-wrap').style.opacity = 0;
        
        // 門打開動畫
        wrapperEl.classList.add('opening');
        
        setTimeout(() => {
            if (isCorrect) {
                correctCount++;
                updatePrajnaTrack();
                showMsg("契合法理 ． 琉璃光現", true);
                
                // 視角穿透動畫
                warpSpeed = 15; 
                wrapperEl.style.transform = wrapperEl.style.transform.replace('translateZ(-150px)', 'translateZ(600px)');
                wrapperEl.classList.add('zooming');
                
                setTimeout(() => { warpSpeed = 1; currentStage++; buildStage(currentStage); }, 1500);
            } else {
                handleFail("一念無明 ． 業力反噬");
            }
        }, 500); // 等待門打開一半再結算
    }

    function handleFail(msgText) {
        isTransitioning = true;
        window.speechSynthesis.cancel();
        document.getElementById('q-panel').classList.remove('show');
        document.getElementById('timer-wrap').style.opacity = 0;

        const vignette = document.getElementById('vignette');
        const flash = document.getElementById('flash-screen');
        
        // 恐怖反噬氛圍
        vignette.style.background = 'radial-gradient(circle at center, transparent 10%, rgba(40, 0, 0, 0.98) 100%)';
        flash.style.background = 'rgba(139,0,0,0.4)'; flash.style.opacity = 1;
        warpSpeed = -15; // 星河倒抽
        
        let shake = setInterval(() => {
            document.body.style.transform = `translate(${(Math.random()-0.5)*15}px, ${(Math.random()-0.5)*15}px)`;
        }, 50);

        showMsg(msgText, false);

        setTimeout(() => {
            clearInterval(shake); document.body.style.transform = 'translate(0,0)';
            flash.style.opacity = 0;
            vignette.style.background = 'radial-gradient(circle at center, transparent 15%, rgba(1, 1, 3, 0.95) 100%)';
            warpSpeed = 1; 
            
            // 業力重置，退回此題重來 (或依需求改為退回第一題)
            buildStage(currentStage); 
        }, 2500);
    }

    function updatePrajnaTrack() {
        let totalQ = questionBank.length;
        let percentage = (correctCount / totalQ) * 100;
        document.getElementById('prajna-fill').style.width = `${percentage}%`;
    }

    function showMsg(text, isSuccess) {
        const toast = document.getElementById('toast');
        const flash = document.getElementById('flash-screen');
        toast.innerText = text;
        
        if (isSuccess) {
            toast.style.color = "var(--gold)"; toast.style.textShadow = "0 0 20px var(--solid-gold)";
            flash.style.background = "rgba(243,229,171,0.9)"; flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, 600);
        } else {
            toast.style.color = "var(--danger)"; toast.style.textShadow = "0 0 20px #ff0000";
        }
        
        toast.style.opacity = 1;
        setTimeout(() => toast.style.opacity = 0, 2000);
    }

    // ================= 終局與資糧結算 =================
    function finishMatrix() {
        document.getElementById('scene').innerHTML = '';
        
        // 結算點數
        let earnedPoints = correctCount * 10; 
        db.points += earnedPoints;
        localStorage.setItem('PX_V15.0', JSON.stringify(db));

        document.getElementById('cert-desc').innerHTML = `本次破迷，獲取般若資糧：<span style="color:var(--gold); font-weight:bold;">+${earnedPoints} 點</span>。<br>願行者解行並進，同歸極樂。`;
        document.getElementById('cert-modal').classList.add('show');
        
        speakText("問心圓滿，資糧匯入。願行者解行並進，同歸極樂。");
    }

    function returnToMainSystem() {
        // 返回主系統的代碼，可根據實際路徑調整
        window.location.href = 'index.html?screen=3';
    }

</script>
</body>
</html>
