<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧拱門 ． 物理邏輯校準</title>
    <style>
        body { 
            margin: 0; background: #010103; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
        }
        .door-container {
            width: 280px; height: 460px;
            filter: drop-shadow(0 0 40px rgba(212,175,55,0.15));
        }
        svg { width: 100%; height: 100%; overflow: visible; }
    </style>
</head>
<body>

    <div class="door-container">
        <svg viewBox="0 0 280 460">
            <defs>
                <linearGradient id="gold-bright" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
                    <stop offset="30%" stop-color="#f3e5ab" stop-opacity="1"/>
                    <stop offset="70%" stop-color="#d4af37" stop-opacity="1"/>
                    <stop offset="100%" stop-color="#8b6508" stop-opacity="0.9"/>
                </linearGradient>
                <linearGradient id="gold-shimmer" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#d4af37" stop-opacity="0.6"/>
                    <stop offset="100%" stop-color="#8b6508" stop-opacity="0.2"/>
                </linearGradient>
                <linearGradient id="liuli-glass" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.2"/>
                    <stop offset="50%" stop-color="#8ba89c" stop-opacity="0.1"/>
                    <stop offset="100%" stop-color="#004d40" stop-opacity="0.3"/>
                </linearGradient>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="2.5" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
            </defs>

            <path d="M25 435 L 25 125 A 115 100 0 0 1 255 125 L 255 435 Z" fill="#000"/>

            <path d="M10 440 L 10 120 C 10 40, 60 10, 100 10 C 140 10, 190 40, 190 120 L 190 440 L 175 440 L 175 120 C 175 55, 135 25, 100 25 C 65 25, 25 55, 25 120 L 25 440 L 10 440 Z" fill="url(#gold-bright)"/>
            
            <path d="M25 435 L 25 125 A 115 100 0 0 1 255 125 L 255 435 L 250 435 L 250 125 A 110 95 0 0 0 30 125 L 30 435 L 25 435 Z" fill="#111" opacity="0.6"/>

            <g id="left-door">
                <path d="M25 435 L 25 125 A 115 100 0 0 1 140 125 L 140 435 L 25 435 Z" fill="url(#liuli-glass)"/>
                
                <path d="M35 430 L 35 125 A 105 90 0 0 1 140 125 L 140 430 L 35 430 Z" fill="none" stroke="url(#gold-shimmer)" stroke-width="1.5" opacity="0.6"/>
                <path d="M45 425 L 45 125 A 95 80 0 0 1 140 125 L 140 425 L 45 425 Z" fill="none" stroke="url(#gold-bright)" stroke-width="0.5" opacity="0.4"/>

                <line x1="25" y1="125" x2="140" y2="125" stroke="url(#gold-bright)" stroke-width="1" opacity="0.5"/>
                <line x1="25" y1="215" x2="140" y2="215" stroke="url(#gold-bright)" stroke-width="1" opacity="0.5"/>
                <circle cx="62.5" cy="170" r="22" fill="none" stroke="url(#gold-bright)" stroke-width="0.8" opacity="0.3"/>
                <polygon points="62.5,150 82.5,170 62.5,190 42.5,170" fill="rgba(212,175,55,0.1)" stroke="url(#gold-bright)" stroke-width="0.5"/>
            </g>

            <g id="right-door">
                <path d="M255 435 L 255 125 A 115 100 0 0 0 140 125 L 140 435 L 255 435 Z" fill="url(#liuli-glass)"/>
                
                <path d="M245 430 L 245 125 A 105 90 0 0 0 140 125 L 140 430 L 245 430 Z" fill="none" stroke="url(#gold-shimmer)" stroke-width="1.5" opacity="0.6"/>
                <path d="M235 425 L 235 125 A 95 80 0 0 0 140 125 L 140 425 L 235 425 Z" fill="none" stroke="url(#gold-bright)" stroke-width="0.5" opacity="0.4"/>

                <line x1="255" y1="125" x2="140" y2="125" stroke="url(#gold-bright)" stroke-width="1" opacity="0.5"/>
                <line x1="255" y1="215" x2="140" y2="215" stroke="url(#gold-bright)" stroke-width="1" opacity="0.5"/>
                <circle cx="217.5" cy="170" r="22" fill="none" stroke="url(#gold-bright)" stroke-width="0.8" opacity="0.3"/>
                <polygon points="217.5,150 237.5,170 217.5,190 197.5,170" fill="rgba(212,175,55,0.1)" stroke="url(#gold-bright)" stroke-width="0.5"/>
            </g>

            <line x1="140" y1="25" x2="140" y2="435" stroke="#fff" stroke-width="1.5" opacity="0.8" filter="url(#glow)"/>

            <g transform="translate(140, 230)">
                <circle cx="0" cy="0" r="42" fill="#010103" stroke="url(#gold-bright)" stroke-width="1.5"/>
                
                <circle cx="0" cy="0" r="35" fill="rgba(212,175,55,0.08)" stroke="url(#gold-shimmer)" stroke-width="1"/>
                
                <g stroke="url(#gold-bright)" stroke-width="1" fill="none" opacity="0.8">
                    <path d="M 0 -25 Q 5 -15 25 0 Q 5 15 0 25 Q -5 15 -25 0 Q -5 -15 0 -25 Z" fill="rgba(212,175,55,0.05)"/>
                    <circle cx="0" cy="0" r="18" fill="none" stroke-width="1.5" stroke-dasharray="10 5" opacity="0.5"/>
                </g>

                <circle cx="0" cy="0" r="12" fill="url(#gold-shimmer)" stroke="url(#gold-bright)" stroke-width="1.5"/>
                <circle cx="0" cy="0" r="4" fill="#fff" filter="url(#glow)"/>

                <line x1="0" y1="-42" x2="0" y2="42" stroke="#010103" stroke-width="2"/>
                <line x1="0" y1="-42" x2="0" y2="42" stroke="url(#gold-bright)" stroke-width="0.5" opacity="0.5"/>
            </g>
        </svg>
    </div>

</body>
</html>
