<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>琉璃多寶閣 ． 悲願化城</title>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: #010103; overflow: hidden; font-family: "PingFang TC", "Microsoft JhengHei", serif; color: #f3e5ab; touch-action: manipulation; }
        
        #bg { position: absolute; inset: 0; z-index: 0; background: radial-gradient(circle at 50% 30%, #1a1225 0%, #010103 80%); }
        
        #indra-bg { position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: 0; transition: opacity 2s; background-image: repeating-radial-gradient(circle at 50% 50%, transparent 0, rgba(156, 39, 176, 0.03) 2px, transparent 6px), radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 70%); animation: slow-spin 180s linear infinite; }
        @keyframes slow-spin { from { transform: rotate(0deg) scale(1.5); } to { transform: rotate(360deg) scale(1.5); } }

        header { position: relative; z-index: 10; padding: 40px 20px 20px; text-align: center; border-bottom: 1px solid rgba(243, 229, 171, 0.1); background: rgba(1,1,3,0.5); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center;}
        .header-title { font-size: 1.2rem; letter-spacing: 8px; text-shadow: 0 0 15px rgba(243, 229, 171, 0.5); flex: 1; text-align: center;}
        .header-btn { font-size: 0.85rem; color: #8ba89c; cursor: pointer; letter-spacing: 2px; padding: 5px 10px; border: 1px solid transparent; transition: 0.3s; }
        .header-btn:active { border-color: rgba(139,168,156,0.5); border-radius: 15px; }

        /* --- 網格佈局 --- */
        #treasure-grid { 
            position: relative; z-index: 10; height: calc(100vh - 120px); overflow-y: auto; 
            padding: 20px 15px 120px 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; align-content: start; scrollbar-width: none;
        }
        
        .t-cell { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(139, 168, 156, 0.3); border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            position: relative; cursor: pointer; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5); padding: 15px 10px; min-height: 220px; 
        }
        .t-cell::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 50%); pointer-events: none; border-radius: 12px; }
        
        .t-cell.selected { border-color: #f3e5ab; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(212, 175, 55, 0.2); transform: translateY(-5px); }
        
        /* ✨ 願力共鳴引導 */
        @keyframes breathe-gold { 0% { box-shadow: inset 0 0 10px rgba(212,175,55,0.1), 0 0 5px rgba(212,175,55,0.1); border-color: rgba(212,175,55,0.3); } 100% { box-shadow: inset 0 0 25px rgba(212,175,55,0.5), 0 0 15px rgba(212,175,55,0.4); border-color: rgba(212,175,55,0.8); } }
        .t-cell.resonance { animation: breathe-gold 2.5s infinite alternate; }

        /* 一般琉璃空龕 */
        .t-cell.locked { background: rgba(255, 255, 255, 0.01); border: 1px dashed rgba(139, 168, 156, 0.2); box-shadow: none; cursor: help; }
        .t-cell.locked .t-svg { filter: opacity(0.12) drop-shadow(0 0 5px rgba(255,255,255,0.3)); transform: scale(0.95); animation: none; }
        .t-cell.locked .t-name { color: #555; text-shadow: none; }
        .t-cell.locked .t-tag { color: #444; border-color: #333; background: transparent; }
        .t-cell.locked .t-lvl { color: #666; font-size: 0.7rem; }

        /* ✨ 終極大獎的神秘燙金鎖定狀態 */
        .t-cell.ultimate-locked { background: rgba(212, 175, 55, 0.02); border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.05); }
        .t-cell.ultimate-locked .t-svg { filter: none; opacity: 1; transform: scale(1); animation: float 4s infinite ease-in-out; }
        .t-cell.ultimate-locked .t-name { color: #d4af37; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .t-cell.ultimate-locked .t-tag { color: #d4af37; border-color: #d4af37; background: rgba(212,175,55,0.1); }
        .t-cell.ultimate-locked .t-lvl { color: #8ba89c; }

        .t-svg { width: 100%; height: 90px; filter: drop-shadow(0 0 10px rgba(243, 229, 171, 0.3)); animation: float 4s infinite ease-in-out; display: flex; align-items: center; justify-content: center; position: relative; }
        .t-svg svg { width: auto; height: 100%; overflow: visible; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.6)); } }
        
        .t-info { margin-top: 15px; text-align: center; width: 100%; }
        .t-name { font-size: 0.95rem; letter-spacing: 2px; color: #fff; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .t-lvl { font-size: 0.75rem; color: #d4af37; letter-spacing: 1px; margin-bottom: 5px; }
        .t-tag { font-size: 0.65rem; color: #8ba89c; display: inline-block; border: 1px solid rgba(139,168,156,0.4); padding: 2px 6px; border-radius: 8px; background: rgba(139, 168, 156, 0.1); white-space: nowrap;}

        footer { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 20; padding: 20px; background: rgba(1,1,3,0.85); backdrop-filter: blur(15px); border-top: 1px solid rgba(243, 229, 171, 0.2); display: flex; justify-content: space-around; gap: 15px; }
        .action-btn { flex: 1; padding: 15px 0; border-radius: 30px; border: 1px solid rgba(243, 229, 171, 0.4); background: rgba(212, 175, 55, 0.1); color: #f3e5ab; font-size: 0.9rem; letter-spacing: 4px; cursor: pointer; transition: all 0.3s; opacity: 0.3; pointer-events: none; }
        .action-btn.active { opacity: 1; pointer-events: auto; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        /* === 彈出視窗 === */
        #modal-overlay { position: fixed; inset: 0; background: rgba(1, 1, 3, 0.85); backdrop-filter: blur(10px); z-index: 60; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
        #modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-box { width: 85%; max-width: 360px; max-height: 85vh; overflow-y: auto; background: rgba(21, 13, 31, 0.95); border: 1px solid rgba(243, 229, 171, 0.4); border-radius: 12px; padding: 30px 25px; box-shadow: 0 0 40px rgba(212, 175, 55, 0.1); transform: translateY(20px); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); scrollbar-width: none;}
        #modal-overlay.show .modal-box { transform: translateY(0); }
        
        .modal-title { text-align: center; color: #fff; font-size: 1.1rem; letter-spacing: 4px; margin-bottom: 15px; text-shadow: 0 0 15px rgba(243, 229, 171, 0.5); }
        .modal-desc { color: #8ba89c; font-size: 0.85rem; letter-spacing: 2px; line-height: 1.6; margin-bottom: 20px; text-align: center; }
        
        #dedicate-input-wrap { display: none; margin-bottom: 20px; width: 100%; }
        #dedicate-target { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #d4af37; border-radius: 8px; color: #fff; padding: 12px; font-size: 0.95rem; text-align: center; outline: none; letter-spacing: 2px; box-shadow: inset 0 0 10px rgba(212,175,55,0.1); transition: 0.3s; }
        #dedicate-target:focus { box-shadow: inset 0 0 15px rgba(212,175,55,0.3), 0 0 10px rgba(212,175,55,0.3); }

        .modal-warning { color: #ef5350; font-size: 0.75rem; letter-spacing: 1px; text-align: center; margin-bottom: 20px; background: rgba(239, 83, 80, 0.1); padding: 8px; border-radius: 5px; border: 1px solid rgba(239, 83, 80, 0.3); display: none; }
        
        .checkbox-container { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; cursor: pointer; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid rgba(139, 168, 156, 0.2); }
        .checkbox-box { width: 22px; height: 22px; border: 1px solid #f3e5ab; border-radius: 4px; flex-shrink: 0; display: flex; justify-content: center; align-items: center; transition: all 0.2s; }
        .checkbox-box.checked { background: rgba(212, 175, 55, 0.5); box-shadow: 0 0 10px rgba(243, 229, 171, 0.5); }
        .checkbox-box.checked::after { content: '✓'; color: #fff; font-size: 14px; }
        .checkbox-text { font-size: 0.8rem; color: #e0e0e0; letter-spacing: 1px; line-height: 1.5; }

        .modal-confirm-btn { width: 100%; padding: 12px; border-radius: 25px; border: 1px solid rgba(243, 229, 171, 0.2); background: transparent; color: rgba(243, 229, 171, 0.4); font-size: 0.9rem; letter-spacing: 4px; transition: all 0.3s; pointer-events: none; }
        .modal-confirm-btn.ready { background: rgba(212, 175, 55, 0.2); border-color: rgba(243, 229, 171, 0.8); color: #f3e5ab; pointer-events: auto; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        .modal-close { position: absolute; top: 15px; right: 20px; color: #8ba89c; font-size: 1.2rem; cursor: pointer; z-index: 10; }

        .voice-btn { margin: 15px auto 0; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; color: var(--gold); border: 1px solid rgba(212,175,55,0.4); padding: 8px 15px; border-radius: 20px; width: fit-content; font-size: 0.8rem; transition: 0.3s; }
        .voice-btn:active { background: rgba(212,175,55,0.2); }

        #dev-panel { margin-top: 15px; border-top: 1px dashed #555; padding-top: 15px; display: none; text-align: center; }
        .dev-btn { padding: 6px 12px; border: none; border-radius: 5px; font-size: 0.8rem; margin: 0 5px; cursor: pointer; }
        .dev-btn.success { background: rgba(76, 175, 80, 0.3); border: 1px solid #4CAF50; color: #fff; }
        .dev-btn.fail { background: rgba(244, 67, 54, 0.3); border: 1px solid #F44336; color: #fff; }

        /* 動畫與 Toast */
        #anim-overlay { position: fixed; inset: 0; background: #010103; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 1s; }
        #anim-overlay.show { opacity: 1; pointer-events: auto; }
        .anim-text { color: #fff; font-size: 1.1rem; letter-spacing: 4px; line-height: 2; text-align: center; text-shadow: 0 0 20px rgba(243, 229, 171, 0.5); opacity: 0; transition: opacity 1.5s; padding: 0 30px; position: relative; z-index: 5;}
        .anim-subtext { color: #8ba89c; font-size: 0.85rem; letter-spacing: 4px; margin-top: 30px; opacity: 0; transition: opacity 1s; }
        .anim-flash { position: absolute; inset: 0; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(212,175,55,0) 70%); opacity: 0; pointer-events: none; transition: opacity 1s; }
        
        .engrave-name { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #d4af37; font-size: 1.4rem; letter-spacing: 5px; font-weight: bold; text-shadow: 0 0 20px #fff, 0 0 10px #d4af37; z-index: 10; opacity: 0; white-space: nowrap; animation: engrave-in 1s forwards; }
        @keyframes engrave-in { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

        #toast { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(21, 13, 31, 0.95); border: 1px solid #d4af37; color: #f3e5ab; padding: 15px 25px; border-radius: 12px; font-size: 0.85rem; letter-spacing: 2px; text-align: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.4s; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); width: 80%; line-height: 1.6; }
        #toast.show { opacity: 1; }
        
        .global-defs { position: absolute; width: 0; height: 0; pointer-events: none; left: -9999px; }
    </style>
</head>
<body>

    <svg class="global-defs">
        <defs>
            <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9" /><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6" /><stop offset="100%" stop-color="#d4af37" stop-opacity="0.2" /></linearGradient>
            <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
            <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.1"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.7"/></linearGradient>
            <linearGradient id="facet-cyan" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.9"/><stop offset="100%" stop-color="#00838f" stop-opacity="0.4"/></linearGradient>
            <linearGradient id="facet-rose" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="100%" stop-color="#c2185b" stop-opacity="0.5"/></linearGradient>
            <linearGradient id="rainbow-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="25%" stop-color="#e0f7fa" stop-opacity="0.7"/><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6"/><stop offset="75%" stop-color="#fce4ec" stop-opacity="0.7"/><stop offset="100%" stop-color="#9c27b0" stop-opacity="0.4"/></linearGradient>
        </defs>
    </svg>

    <div id="bg"></div>
    <div id="indra-bg"></div> 

    <header>
        <div class="header-btn" onclick="window.location.href='index.html?screen=3'">← 退居</div>
        <div class="header-title">琉璃多寶閣</div>
        <div class="header-btn" onclick="openInfoModal()">法界真義</div>
    </header>

    <div id="treasure-grid"></div>

    <footer>
        <button class="action-btn" id="btn-dedicate" onclick="openDedicateModal()">起用護念</button>
        <button class="action-btn" id="btn-merge" onclick="openMergeModal()">願力交織</button>
    </footer>

    <div id="toast"></div>

    <div id="modal-overlay">
        <div class="modal-box">
            <div class="modal-close" onclick="closeModal()">✕</div>
            <div class="modal-title" id="m-title">標題</div>
            
            <div id="m-content-wrap">
                <div class="modal-desc" id="m-desc">描述</div>
                
                <div id="dedicate-input-wrap">
                    <input type="text" id="dedicate-target" placeholder="請輸入護念對象 (姓名/事件)" autocomplete="off">
                </div>

                <div class="modal-warning" id="m-warning">警告</div>
                
                <div class="checkbox-container" id="m-check-wrap" onclick="toggleCheckbox()">
                    <div class="checkbox-box" id="m-checkbox"></div>
                    <div class="checkbox-text" id="m-check-text">內容</div>
                </div>
            </div>

            <div id="m-info-wrap" style="display: none; text-align: justify; color: #aaa; font-size: 0.9rem; line-height: 1.8; letter-spacing: 1px;">
                《法華經》有云：「化城喻」。行者向極樂寶所之途，路險且長。佛憫眾生疲倦，或可化作一城以暫息。<br><br>
                此多寶閣，即為入世之化城。閣中法相，皆為隨順引導行者發起「別迴向」之慈悲方便，以護念身邊親友之苦。<br><br>
                然須謹記：法相本空，借假修真。<span style="color:#d4af37;">祈勿生起搜集、貪愛之俗念。</span>相滅願生，每一次的歸零，皆是無相佈施。最終，一切功德仍須匯入主系統，導歸極樂。
                
                <div class="voice-btn" onclick="playInfoVoice()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                    聆聽真義
                </div>
            </div>
            
            <button class="modal-confirm-btn" id="m-confirm-btn" onclick="executeAction()">啟動</button>

            <div id="dev-panel">
                <div style="font-size: 0.7rem; color: #8ba89c; margin-bottom: 8px; letter-spacing: 2px;">【開發者測試模式】</div>
                <button class="dev-btn success" onclick="executeAction(true)">強制顯化</button>
                <button class="dev-btn fail" onclick="executeAction(false)">強制歸零</button>
            </div>
        </div>
    </div>

    <div id="anim-overlay" onclick="closeAnim()">
        <div class="anim-flash" id="anim-flash"></div>
        <div id="anim-svg-container" style="width: 150px; height: 150px; margin-bottom: 40px; opacity: 0; transition: opacity 1s; position: relative; z-index: 5;"></div>
        <div class="anim-text" id="anim-text"></div>
        <div class="anim-subtext" id="anim-subtext">輕觸畫面 ． 歸位</div>
    </div>

    <script>
        window.sysUtterances = [];
        function speak(t, r = 0.85) {
            if (!window.speechSynthesis) return; 
            window.speechSynthesis.cancel(); 
            let isAndroid = /Android/i.test(navigator.userAgent);
            let textToSpeak = isAndroid ? t : t.replace(/阿/g, 'ㄚ');
            const m = new SpeechSynthesisUtterance(textToSpeak);
            m.lang = 'zh-TW'; m.rate = r; 
            if (isAndroid) {
                window.sysUtterances.push(m);
                let voices = window.speechSynthesis.getVoices();
                if (voices.length > 0) {
                    let zhVoice = voices.find(v => v.lang === 'zh-TW' && v.name.includes('Google')) || voices.find(v => v.lang.includes('zh'));
                    if (zhVoice) m.voice = zhVoice;
                }
                m.onend = function() { window.sysUtterances = window.sysUtterances.filter(u => u !== m); };
                setTimeout(() => { window.speechSynthesis.speak(m); }, 150);
            } else {
                setTimeout(() => { window.speechSynthesis.speak(m); }, 50);
            }
        }

        let db;
        try {
            db = JSON.parse(localStorage.getItem('PX_V15.0'));
            if (!db || typeof db !== 'object') db = null;
        } catch(e) {}
        
        // 為了測試，預設放入基礎法相。行者可測試交織。
        if (!db || !db.treasures) {
            db = { treasures: { sword: 3, vase: 2, jewel: 1, lotus_lamp: 0, dharma_wheel: 0, white_lotus: 0, indra_net: 0 } };
        }
        let inventory = db.treasures;
        
        function saveDB() {
            if(localStorage.getItem('PX_V15.0')) {
                let realDb = JSON.parse(localStorage.getItem('PX_V15.0'));
                realDb.treasures = inventory;
                localStorage.setItem('PX_V15.0', JSON.stringify(realDb));
            }
        }

        if (inventory.indra_net > 0) {
            setTimeout(() => { document.getElementById('indra-bg').style.opacity = '1'; }, 500);
        }

        // 神秘燙金梵種 (未解鎖的因陀羅網)
        const mysterySeedSvg = `<svg viewBox="0 0 100 150"><g transform="translate(0, 15)"><circle cx="50" cy="60" r="35" fill="none" stroke="#d4af37" stroke-width="0.8" stroke-dasharray="4 8" opacity="0.6"><animateTransform attributeName="transform" type="rotate" from="0 50 60" to="360 50 60" dur="40s" repeatCount="indefinite"/></circle><circle cx="50" cy="60" r="25" fill="none" stroke="#f3e5ab" stroke-width="0.5" stroke-dasharray="10 5" opacity="0.4"><animateTransform attributeName="transform" type="rotate" from="360 50 60" to="0 50 60" dur="30s" repeatCount="indefinite"/></circle><circle cx="50" cy="60" r="4" fill="#fff" filter="drop-shadow(0 0 12px #d4af37)"><animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/></circle><path d="M50 40 L53 57 L70 60 L53 63 L50 80 L47 63 L30 60 L47 57 Z" fill="rgba(212,175,55,0.15)" stroke="#d4af37" stroke-width="0.6"/></g></svg>`;

        // ✨ 雙層文案 + 3D 切面琉璃法相 (全更新)
        const allTreasures = [
            { 
                id: "sword", type: "basic", name: "幾何慧劍", tag: "開智慧", formula: "實修顯化", 
                desc: "【斷煩惱障，身心清涼】<br><br><span style='color:#8ba89c; font-size:0.85rem;'>保佑念佛專心，家事雜事不煩心。</span>",
                svg: `<svg viewBox="0 0 100 150"><g transform="translate(0, 5)"><polygon points="50,10 56,40 50,105 44,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="50,10 56,40 50,105" fill="url(#facet-cyan)" opacity="0.8"/><polygon points="50,10 44,40 50,105" fill="url(#facet-dark)" opacity="0.6"/><polygon points="35,100 65,100 55,110 45,110" fill="url(#pure-glass)" stroke="#d4af37" stroke-width="0.8"/><polygon points="46,110 54,110 52,135 48,135" fill="url(#facet-dark)"/><polygon points="50,135 56,142 50,148 44,142" fill="url(#facet-light)" stroke="#f3e5ab" stroke-width="1"/><circle cx="50" cy="105" r="4" fill="#fff" filter="drop-shadow(0 0 8px #e0f7fa)"/></g></svg>` 
            },
            {

        function renderGrid() {
            const grid = document.getElementById('treasure-grid');
            grid.innerHTML = '';
            
            let resonatingItems = [];
            if (selectedItems.length === 1) {
                const id1 = selectedItems[0];
                allTreasures.forEach(t => {
                    if (t.id !== id1 && inventory[t.id] > 0) {
                        const pairKey1 = id1 + '+' + t.id;
                        const pairKey2 = t.id + '+' + id1;
                        if (mergeRecipes[pairKey1] || mergeRecipes[pairKey2]) resonatingItems.push(t.id);
                    }
                });
            }

            allTreasures.forEach(item => {
                const level = inventory[item.id] || 0;
                const isLocked = level === 0;
                const isSelected = selectedItems.includes(item.id);
                const isResonating = resonatingItems.includes(item.id);
                
                const cell = document.createElement('div');
                if (isLocked) {
                    if (item.id === 'indra_net') {
                        cell.className = 't-cell ultimate-locked';
                        cell.onclick = () => showToast(`【不可思議】<br>此乃導歸極樂之終極境界，需無盡願力交織方能顯化。`);
                        cell.innerHTML = `<div class="t-svg">${mysterySeedSvg}</div><div class="t-info"><div class="t-name">重重無盡</div><div class="t-lvl">待緣而顯</div><span class="t-tag">【至高境界】</span></div>`;
                    } else {
                        cell.className = 't-cell locked';
                        cell.onclick = () => showToast(`【法界暗格】<br>${item.formula}。`);
                        cell.innerHTML = `<div class="t-svg">${item.svg}</div><div class="t-info"><div class="t-name">琉璃空龕</div><div class="t-lvl">因緣未具</div><span class="t-tag">靜默安住</span></div>`;
                    }
                } else {
                    let classes = 't-cell';
                    if (isSelected) classes += ' selected';
                    else if (isResonating) classes += ' resonance';

                    cell.className = classes;
                    if (item.id === 'indra_net') {
                        cell.onclick = () => {
                            showToast(`【重重無盡】<br>此乃導歸極樂之橋樑，常駐加持，祈願移步大迴向。`);
                            setTimeout(() => { window.location.href = 'index.html?screen=4'; }, 2000);
                        };
                        cell.innerHTML = `<div class="t-svg">${item.svg}</div><div class="t-info"><div class="t-name" style="color:#d4af37;">${item.name}</div><div class="t-lvl">常駐結界</div><span class="t-tag">【${item.tag}</span></div>`;
                    } else {
                        cell.onclick = () => toggleSelect(item.id);
                        cell.innerHTML = `<div class="t-svg">${item.svg}</div><div class="t-info"><div class="t-name">${item.name}</div><div class="t-lvl">結緣：${level} 尊</div><span class="t-tag">【${item.tag}】</span></div>`;
                    }
                }
                grid.appendChild(cell);
            });
            updateButtons();
        }

        function toggleSelect(id) {
            const index = selectedItems.indexOf(id);
            if (index > -1) selectedItems.splice(index, 1);
            else {
                if (selectedItems.length < 2) selectedItems.push(id);
                else { selectedItems.shift(); selectedItems.push(id); }
            }
            renderGrid();
        }

        function updateButtons() {
            document.getElementById('btn-dedicate').className = `action-btn ${selectedItems.length === 1 ? 'active' : ''}`;
            document.getElementById('btn-merge').className = `action-btn ${selectedItems.length === 2 ? 'active' : ''}`;
        }

        let toastTimer;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerHTML = msg; toast.classList.add('show');
            clearTimeout(toastTimer); toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);

        function toggleCheckbox() {
            isChecked = !isChecked;
            if (isChecked) { mCheckBtn.classList.add('checked'); mConfirmBtn.classList.add('ready'); } 
            else { mCheckBtn.classList.remove('checked'); mConfirmBtn.classList.remove('ready'); }
        }

        function closeModal() {
            modal.classList.remove('show');
            isChecked = false; mCheckBtn.classList.remove('checked'); mConfirmBtn.classList.remove('ready');
            mWarning.style.display = 'none'; devPanel.style.display = 'none'; dedicateInputWrap.style.display = 'none';
            mContentWrap.style.display = 'block'; mInfoWrap.style.display = 'none'; mConfirmBtn.style.display = 'block';

        }

        function openDedicateModal() {
            currentAction = 'dedicate';
            const item = allTreasures.find(i => i.id === selectedItems[0]);
            let reqText = item.type === 'basic' ? "靜心禁語一刻鐘<br>行微小佈施或利他<br>至誠念佛一千五百遍" : "靜心禁語三小時<br>行無相佈施一次<br>至誠念佛三千遍";

        function openMergeModal() {
            currentAction = 'merge';
            const id1 = selectedItems[0]; const id2 = selectedItems[1];
            const pairKey = [id1, id2].sort().join('+');
            currentMergeTarget = mergeRecipes[pairKey];
            
            if (!currentMergeTarget) {
                showToast("【因緣不契】<br>此二法相無法交織，請參閱暗格提示。"); return;
            }

            const targetItem = allTreasures.find(i => i.id === currentMergeTarget);
            const lv1 = inventory[id1]; const lv2 = inventory[id2];
            currentMergeProb = Math.min(100, (lv1 + lv2) * 10);
            
            let probColor = currentMergeProb === 100 ? "#d4af37" : "#ef5350";
            let probDesc = currentMergeProb === 100 ? "因緣圓滿，必定顯化" : "因緣尚淺，或可繼續積累";

            document.getElementById('m-title').innerText = "【 願力交織 ． 實修前置 】";
            // ✨ 交織預覽時，顯示目標的雙層文案
            document.getElementById('m-desc').innerHTML = `預見法相：<b>${targetItem.name}</b><br><div style="margin-top:10px; font-size:0.8rem;">${targetItem.desc}</div><br>當前契合度：<span style="color:${probColor}; font-weight:bold; font-size:1.1rem;">${currentMergeProb}%</span><br>(${probDesc})`;
            
            mWarning.style.display = 'block';
            mWarning.innerHTML = "⚠️ 嚴格戒律：交織一旦啟動，無論成敗，投入之兩尊法相將<b>強制歸零</b>。失敗則化作微塵，無相佈施迴向法界。祈勿落入試錯之貪念。";
            
            document.getElementById('m-check-text').innerHTML = "我已如實完成：<br>．至誠默唸佛號（或心咒）一百遍。";
            mConfirmBtn.innerText = "甘受無常 ． 啟動交織";
            
            devPanel.style.display = 'block';
            modal.classList.add('show');
        }

        function createDustParticles(container, colorStr) {
            const rect = container.getBoundingClientRect();
            for(let i=0; i<50; i++) {
                let dust = document.createElement('div'); 
                dust.style.position = 'fixed'; dust.style.background = colorStr;
                dust.style.borderRadius = '50%'; dust.style.pointerEvents = 'none';
                dust.style.filter = `drop-shadow(0 0 8px ${colorStr})`; dust.style.zIndex = '9999';
                dust.style.left = rect.left + rect.width/2 + 'px'; 
                dust.style.top = rect.top + rect.height/2 + 'px';
                let size = Math.random() * 4 + 2; dust.style.width = size + 'px'; dust.style.height = size + 'px';
                document.body.appendChild(dust); 
                
                dust.animate([
                    { opacity: 1, transform: `translate(0, 0) scale(1)` },
                    { opacity: 0, transform: `translate(${(Math.random() - 0.5) * 250}px, ${-(Math.random() * 300 + 50)}px) scale(0)` }
                ], { duration: 3500, easing: 'ease-out', fill: 'forwards' });

                setTimeout(() => dust.remove(), 3600);
            }
        }

        function executeAction(forceResult = null) {
            if (forceResult === null && !isChecked) return; 
            
            let targetName = "十方眾生";
            if (currentAction === 'dedicate') {
                if(dedicateTarget.value.trim() === '') {
                    showToast("請輸入護念對象"); return;
                }
                targetName = dedicateTarget.value.trim();
            }

            closeModal();
            const animOverlay = document.getElementById('anim-overlay');
            const animText = document.getElementById('anim-text');
            const animSvg = document.getElementById('anim-svg-container');
            
            animOverlay.classList.add('show');
            document.getElementById('anim-flash').style.opacity = '1';
            animText.style.opacity = '0'; animSvg.style.opacity = '0'; document.getElementById('anim-subtext').style.opacity = '0';

            setTimeout(() => {
                document.getElementById('anim-flash').style.opacity = '0'; 
                
                if (currentAction === 'dedicate') {
                    inventory[selectedItems[0]] -= 1;
                    const usedItem = allTreasures.find(i => i.id === selectedItems[0]);
                    
                    animSvg.innerHTML = usedItem.svg + `<div class="engrave-name">${targetName}</div>`; 
                    animSvg.style.opacity = '1';
                    
                    setTimeout(() => {
                        animSvg.style.opacity = '0'; 
                        createDustParticles(animSvg, '#d4af37'); 
                        speak("相滅願生，功德迴施。祈願" + targetName + "，平安順遂。", 0.8);
                        animText.innerHTML = `【 相滅願生 ． 功德迴施 】<br><span style='color:#d4af37; font-size:1.4rem;'>祈願 ${targetName}</span><br><span style='font-size:0.9rem; color:#8ba89c;'>平安順遂，業障消除</span>`;
                        animText.style.opacity = '1';
                    }, 1800); 
                    
                } else if (currentAction === 'merge') {
                    let isSuccess = false;
                    if (forceResult !== null) { isSuccess = forceResult; } 
                    else { isSuccess = (Math.random() * 100) < currentMergeProb; }
                    
                    inventory[selectedItems[0]] = 0;
                    inventory[selectedItems[1]] = 0;
                    
                    if (isSuccess) {
                        inventory[currentMergeTarget] = (inventory[currentMergeTarget] || 0) + 1;
                        const targetObj = allTreasures.find(i => i.id === currentMergeTarget);
                        
                        // ✨ 終極大獎的朝聖跳轉邏輯

                            setTimeout(() => {
                                window.location.href = 'immortal-scene.html'; 
                            }, 3500);
                            return; 
                        }

                            animSvg.innerHTML = targetObj.svg; animSvg.style.opacity = '1';
                            speak("因緣具足，法相顯化", 0.8);

                        }
                    } else {
                        animSvg.innerHTML = '';
                        createDustParticles(animSvg, '#8ba89c'); 
                        speak("因緣未具，化作微塵，無相迴向法界", 0.8);

            }, 800);
        }

        function closeAnim() {
            if (document.getElementById('anim-subtext').style.opacity === '1') {
                document.getElementById('anim-overlay').classList.remove('show');
                selectedItems = [];
                if (inventory.indra_net > 0) {
                    document.getElementById('indra-bg').style.opacity = '1';
                }
                renderGrid(); 
            }
        }

        renderGrid();
    </script>
</body>
</html>
