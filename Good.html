<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>琉璃多寶閣 ． 實修除錯版</title>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: #010103; overflow: hidden; font-family: "PingFang TC", "Microsoft JhengHei", serif; color: #f3e5ab; touch-action: manipulation; }
        
        #bg { position: absolute; inset: 0; z-index: 0; background: radial-gradient(circle at 50% 30%, #1a1225 0%, #010103 80%); }

        header { position: relative; z-index: 10; padding: 40px 20px 20px; text-align: center; border-bottom: 1px solid rgba(243, 229, 171, 0.1); background: rgba(1,1,3,0.5); backdrop-filter: blur(10px); }
        .header-title { font-size: 1.2rem; letter-spacing: 8px; text-shadow: 0 0 15px rgba(243, 229, 171, 0.5); }
        #btn-back { position: absolute; left: 20px; top: 40px; font-size: 0.9rem; color: #8ba89c; cursor: pointer; letter-spacing: 2px; }

        /* --- 修正重疊 Bug 的網格佈局 --- */
        #treasure-grid { 
            position: relative; z-index: 10; height: calc(100vh - 120px); overflow-y: auto; 
            padding: 20px 15px 120px 15px; /* 底部留白避免被按鈕擋住 */
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; align-content: start; 
        }
        
        .t-cell { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(139, 168, 156, 0.3); border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            position: relative; cursor: pointer; transition: all 0.3s ease; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5); padding: 15px 10px; min-height: 220px; /* 捨棄固定比例，改用最小高度 */
        }
        .t-cell::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 50%); pointer-events: none; }
        .t-cell.selected { border-color: #f3e5ab; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(212, 175, 55, 0.2); transform: translateY(-5px); }
        
        .t-cell.locked { border-color: rgba(255, 255, 255, 0.05); background: rgba(0,0,0,0.3); box-shadow: none; cursor: help; }
        .t-cell.locked .t-svg { filter: grayscale(100%) brightness(20%) opacity(0.6); animation: none; transform: scale(0.9); }
        .t-cell.locked .t-name { color: #555; text-shadow: none; }
        .t-cell.locked .t-tag { color: #444; border-color: #333; background: transparent; }
        .t-cell.locked .t-lvl { color: #666; font-size: 0.7rem; }

        /* 固定 SVG 高度，確保不溢出 */
        .t-svg { width: 100%; height: 90px; filter: drop-shadow(0 0 10px rgba(243, 229, 171, 0.3)); animation: float 4s infinite ease-in-out; display: flex; align-items: center; justify-content: center; }
        .t-svg svg { width: auto; height: 100%; overflow: visible; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.6)); } }
        
        .t-info { margin-top: 15px; text-align: center; width: 100%; }
        .t-name { font-size: 0.95rem; letter-spacing: 2px; color: #fff; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .t-lvl { font-size: 0.75rem; color: #d4af37; letter-spacing: 1px; margin-bottom: 5px; }
        .t-tag { font-size: 0.65rem; color: #8ba89c; display: inline-block; border: 1px solid rgba(139,168,156,0.4); padding: 2px 6px; border-radius: 8px; background: rgba(139, 168, 156, 0.1); white-space: nowrap;}

        footer { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 20; padding: 20px; background: rgba(1,1,3,0.85); backdrop-filter: blur(15px); border-top: 1px solid rgba(243, 229, 171, 0.2); display: flex; justify-content: space-around; gap: 15px; }
        .action-btn { flex: 1; padding: 15px 0; border-radius: 30px; border: 1px solid rgba(243, 229, 171, 0.4); background: rgba(212, 175, 55, 0.1); color: #f3e5ab; font-size: 0.9rem; letter-spacing: 4px; cursor: pointer; transition: all 0.3s; opacity: 0.3; pointer-events: none; }
        .action-btn.active { opacity: 1; pointer-events: auto; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        /* === 彈出視窗 === */
        #modal-overlay { position: fixed; inset: 0; background: rgba(1, 1, 3, 0.85); backdrop-filter: blur(10px); z-index: 60; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
        #modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-box { width: 85%; max-width: 340px; background: rgba(21, 13, 31, 0.95); border: 1px solid rgba(243, 229, 171, 0.4); border-radius: 12px; padding: 30px 25px; box-shadow: 0 0 40px rgba(212, 175, 55, 0.1); transform: translateY(20px); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        #modal-overlay.show .modal-box { transform: translateY(0); }
        
        .modal-title { text-align: center; color: #fff; font-size: 1.1rem; letter-spacing: 4px; margin-bottom: 15px; text-shadow: 0 0 15px rgba(243, 229, 171, 0.5); }
        .modal-desc { color: #8ba89c; font-size: 0.85rem; letter-spacing: 2px; line-height: 1.6; margin-bottom: 20px; text-align: center; }
        .modal-warning { color: #ef5350; font-size: 0.75rem; letter-spacing: 1px; text-align: center; margin-bottom: 20px; background: rgba(239, 83, 80, 0.1); padding: 8px; border-radius: 5px; border: 1px solid rgba(239, 83, 80, 0.3); display: none; }
        
        .checkbox-container { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; cursor: pointer; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid rgba(139, 168, 156, 0.2); }
        .checkbox-box { width: 22px; height: 22px; border: 1px solid #f3e5ab; border-radius: 4px; flex-shrink: 0; display: flex; justify-content: center; align-items: center; transition: all 0.2s; }
        .checkbox-box.checked { background: rgba(212, 175, 55, 0.5); box-shadow: 0 0 10px rgba(243, 229, 171, 0.5); }
        .checkbox-box.checked::after { content: '✓'; color: #fff; font-size: 14px; }
        .checkbox-text { font-size: 0.8rem; color: #e0e0e0; letter-spacing: 1px; line-height: 1.5; }

        .modal-confirm-btn { width: 100%; padding: 12px; border-radius: 25px; border: 1px solid rgba(243, 229, 171, 0.2); background: transparent; color: rgba(243, 229, 171, 0.4); font-size: 0.9rem; letter-spacing: 4px; transition: all 0.3s; pointer-events: none; }
        .modal-confirm-btn.ready { background: rgba(212, 175, 55, 0.2); border-color: rgba(243, 229, 171, 0.8); color: #f3e5ab; pointer-events: auto; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        .modal-close { position: absolute; top: 15px; right: 20px; color: #8ba89c; font-size: 1.2rem; cursor: pointer; }

        /* === 工程師測試面板 === */
        #dev-panel { margin-top: 15px; border-top: 1px dashed #555; padding-top: 15px; display: none; text-align: center; }
        .dev-btn { padding: 6px 12px; border: none; border-radius: 5px; font-size: 0.8rem; margin: 0 5px; cursor: pointer; }
        .dev-btn.success { background: rgba(76, 175, 80, 0.3); border: 1px solid #4CAF50; color: #fff; }
        .dev-btn.fail { background: rgba(244, 67, 54, 0.3); border: 1px solid #F44336; color: #fff; }

        /* 動畫與 Toast */
        #anim-overlay { position: fixed; inset: 0; background: #010103; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 1s; }
        #anim-overlay.show { opacity: 1; pointer-events: auto; }
        .anim-text { color: #fff; font-size: 1rem; letter-spacing: 4px; line-height: 2; text-align: center; text-shadow: 0 0 20px rgba(243, 229, 171, 0.5); opacity: 0; transition: opacity 1.5s; padding: 0 30px; }
        .anim-subtext { color: #8ba89c; font-size: 0.85rem; letter-spacing: 4px; margin-top: 20px; opacity: 0; transition: opacity 1s; }
        .anim-flash { position: absolute; inset: 0; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(212,175,55,0) 70%); opacity: 0; pointer-events: none; transition: opacity 1s; }
        #toast { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(21, 13, 31, 0.95); border: 1px solid #d4af37; color: #f3e5ab; padding: 15px 25px; border-radius: 12px; font-size: 0.85rem; letter-spacing: 2px; text-align: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.4s; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); width: 80%; line-height: 1.6; }
        #toast.show { opacity: 1; }
        
        .global-defs { position: absolute; width: 0; height: 0; pointer-events: none; left: -9999px; }
    </style>
</head>
<body>

    <svg class="global-defs">
        <defs>
            <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9" /><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6" /><stop offset="100%" stop-color="#d4af37" stop-opacity="0.2" /></linearGradient>
            <linearGradient id="glass-gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.7"/><stop offset="100%" stop-color="#d4af37" stop-opacity="0.3"/></linearGradient>
            <linearGradient id="glass-cyan" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="50%" stop-color="#e0f7fa" stop-opacity="0.6"/><stop offset="100%" stop-color="#8ba89c" stop-opacity="0.3"/></linearGradient>
            <linearGradient id="glass-rose" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="50%" stop-color="#fce4ec" stop-opacity="0.6"/><stop offset="100%" stop-color="#f48fb1" stop-opacity="0.3"/></linearGradient>
            <radialGradient id="glass-purple-glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fff" stop-opacity="1"/><stop offset="30%" stop-color="#e1bee7" stop-opacity="0.6"/><stop offset="100%" stop-color="#9c27b0" stop-opacity="0"/></radialGradient>
            <radialGradient id="net-glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fff" stop-opacity="1" /><stop offset="30%" stop-color="#e0f7fa" stop-opacity="0.6" /><stop offset="60%" stop-color="#fce4ec" stop-opacity="0.4" /><stop offset="85%" stop-color="#f3e5ab" stop-opacity="0.2" /><stop offset="100%" stop-color="#9c27b0" stop-opacity="0" /></radialGradient>
            <g id="petal-gold"><path d="M50 75 L42 50 L50 25 L58 50 Z" fill="rgba(212, 175, 55, 0.25)" stroke="#f3e5ab" stroke-width="0.3" /><path d="M50 75 L46 55 L50 35 L54 55 Z" fill="rgba(255, 255, 255, 0.4)" stroke="#fff" stroke-width="0.2" /></g>
            <g id="petal-cyan"><path d="M50 75 L42 50 L50 25 L58 50 Z" fill="rgba(139, 168, 156, 0.25)" stroke="#e0f7fa" stroke-width="0.3" /><path d="M50 75 L46 55 L50 35 L54 55 Z" fill="rgba(255, 255, 255, 0.4)" stroke="#fff" stroke-width="0.2" /></g>
            <g id="petal-rose"><path d="M50 75 L42 50 L50 25 L58 50 Z" fill="rgba(244, 143, 177, 0.2)" stroke="#fce4ec" stroke-width="0.3" /><path d="M50 75 L46 55 L50 35 L54 55 Z" fill="rgba(255, 255, 255, 0.4)" stroke="#fff" stroke-width="0.2" /></g>
            <g id="petal-purple"><path d="M50 75 L42 50 L50 25 L58 50 Z" fill="rgba(156, 39, 176, 0.15)" stroke="#e1bee7" stroke-width="0.3" /><path d="M50 75 L46 55 L50 35 L54 55 Z" fill="rgba(255, 255, 255, 0.4)" stroke="#fff" stroke-width="0.2" /></g>
        </defs>
    </svg>

    <div id="bg"></div>
    <header>
        <div id="btn-back" onclick="alert('返回星空首頁')">← 星海</div>
        <div class="header-title">琉璃多寶閣</div>
    </header>

    <div id="treasure-grid"></div>

    <footer>
        <button class="action-btn" id="btn-dedicate" onclick="openDedicateModal()">祈福迴向</button>
        <button class="action-btn" id="btn-merge" onclick="openMergeModal()">願力交織</button>
    </footer>

    <div id="toast"></div>

    <div id="modal-overlay">
        <div class="modal-box">
            <div class="modal-close" onclick="closeModal()">✕</div>
            <div class="modal-title" id="m-title">標題</div>
            <div class="modal-desc" id="m-desc">描述</div>
            <div class="modal-warning" id="m-warning">警告</div>
            
            <div class="checkbox-container" onclick="toggleCheckbox()">
                <div class="checkbox-box" id="m-checkbox"></div>
                <div class="checkbox-text" id="m-check-text">內容</div>
            </div>
            
            <button class="modal-confirm-btn" id="m-confirm-btn" onclick="executeAction()">啟動</button>

            <div id="dev-panel">
                <div style="font-size: 0.7rem; color: #8ba89c; margin-bottom: 8px; letter-spacing: 2px;">【開發者測試模式】</div>
                <button class="dev-btn success" onclick="executeAction(true)">強制必定成功</button>
                <button class="dev-btn fail" onclick="executeAction(false)">強制必定失敗</button>
            </div>
        </div>
    </div>

    <div id="anim-overlay" onclick="closeAnim()">
        <div class="anim-flash" id="anim-flash"></div>
        <div id="anim-svg-container" style="width: 150px; height: 150px; margin-bottom: 40px; opacity: 0; transition: opacity 1s;"></div>
        <div class="anim-text" id="anim-text"></div>
        <div class="anim-subtext" id="anim-subtext">輕觸畫面 ． 歸位</div>
    </div>

    <script>
        const allTreasures = [
            { id: "sword", type: "basic", name: "幾何慧劍", tag: "破迷 ‧ 決斷", formula: "基礎掉落", svg: `<svg viewBox="0 0 100 150"><g><rect x="49.5" y="10" width="1" height="120" fill="#fff" opacity="0.8" /><path d="M50 10 L60 40 L50 50 L40 40 Z" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.5" /><path d="M50 50 L65 90 L50 100 L35 90 Z" fill="rgba(243, 229, 171, 0.2)" stroke="#f3e5ab" stroke-width="0.4" /><path d="M50 50 L55 92 L50 98 L45 92 Z" fill="rgba(255, 255, 255, 0.5)" stroke="none" /><path d="M25 100 L50 90 L75 100 L50 110 Z" fill="rgba(212, 175, 55, 0.3)" stroke="#f3e5ab" stroke-width="0.6" /><path d="M46 110 L54 110 L52 135 L48 135 Z" fill="rgba(243, 229, 171, 0.2)" stroke="#f3e5ab" stroke-width="0.5" /><polygon points="50,135 55,140 50,145 45,140" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.5" /></g></svg>` },
            { id: "vase", type: "basic", name: "琉璃淨瓶", tag: "療癒 ‧ 息災", formula: "基礎掉落", svg: `<svg viewBox="0 0 100 150"><g><path d="M45 30 L55 30 L55 50 L75 100 L65 130 L35 130 L25 100 L45 50 Z" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.5"/><path d="M45 50 L55 50 L75 100 L25 100 Z" fill="rgba(243, 229, 171, 0.15)" stroke="#fff" stroke-width="0.3"/><polygon points="45,30 55,30 50,10" fill="rgba(255,255,255,0.6)" stroke="#f3e5ab" stroke-width="0.3"/><ellipse cx="50" cy="130" rx="15" ry="4" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.5"/></g></svg>` },
            { id: "jewel", type: "basic", name: "多面寶珠", tag: "滿願 ‧ 增上", formula: "基礎掉落", svg: `<svg viewBox="0 0 100 150"><g transform="translate(0, 15)"><polygon points="50,20 85,60 50,120 15,60" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.6"/><polygon points="50,20 65,60 50,120 35,60" fill="rgba(255,255,255,0.3)" stroke="#fff" stroke-width="0.4"/><polygon points="35,60 65,60 50,120" fill="rgba(212, 175, 55, 0.2)" stroke="none"/><circle cx="50" cy="60" r="5" fill="#fff" filter="drop-shadow(0 0 8px #fff)"/></g></svg>` },
            { id: "lotus_lamp", type: "advanced", name: "金剛蓮華燈", tag: "破迷 ‧ 息災", formula: "需以【慧劍】與【淨瓶】交織", svg: `<svg viewBox="0 0 100 150"><g transform="scale(1.1) translate(-5, 5)"><polygon points="35,115 65,115 55,135 45,135" fill="rgba(212, 175, 55, 0.3)" stroke="#f3e5ab" stroke-width="0.5"/><polygon points="40,110 60,110 65,115 35,115" fill="rgba(255, 255, 255, 0.4)" stroke="none"/><polygon points="50,115 40,80 50,45 60,80" fill="url(#glass-cyan)" stroke="#8ba89c" stroke-width="0.5"/><polygon points="50,115 45,80 50,55 55,80" fill="rgba(255, 255, 255, 0.5)" stroke="none"/><path d="M50 20 L55 55 L50 90 L45 55 Z" fill="url(#glass-gold)" stroke="#fff" stroke-width="0.6"/><polygon points="50,45 57,65 50,80 43,65" fill="url(#glass-gold)" stroke="#fff" stroke-width="0.4"/><circle cx="50" cy="65" r="8" fill="#fff" filter="drop-shadow(0 0 15px #f3e5ab)"/><circle cx="50" cy="55" r="30" fill="none" stroke="rgba(224, 247, 250, 0.2)" stroke-width="1" stroke-dasharray="2 4"/></g></svg>` },
            { id: "dharma_wheel", type: "advanced", name: "八吉祥法輪", tag: "決斷 ‧ 轉運", formula: "需以【慧劍】與【寶珠】交織", svg: `<svg viewBox="0 0 100 150"><g transform="scale(1.15) translate(-8, -5)"><polygon points="45,110 55,110 60,120 40,120" fill="rgba(243, 229, 171, 0.15)" stroke="#f3e5ab" stroke-width="0.4"/><path d="M50 20 L75 30 L85 55 L75 80 L50 90 L25 80 L15 55 L25 30 Z" fill="rgba(212, 175, 55, 0.1)" stroke="#f3e5ab" stroke-width="0.5"/><circle cx="50" cy="55" r="30" fill="none" stroke="rgba(243, 229, 171, 0.3)" stroke-width="1.2" stroke-dasharray="2 4"/><path d="M50 20 L55 55 L50 90 L45 55 Z" fill="url(#glass-gold)" stroke="#fff" stroke-width="0.4"/><path d="M15 55 L50 50 L85 55 L50 60 Z" fill="url(#glass-gold)" stroke="#fff" stroke-width="0.4"/><path d="M25 30 L50 55 L75 80 L50 55" fill="rgba(255,255,255,0.2)" stroke="#f3e5ab" stroke-width="0.3"/><path d="M75 30 L50 55 L25 80 L50 55" fill="rgba(255,255,255,0.2)" stroke="#f3e5ab" stroke-width="0.3"/><polygon points="50,45 65,65 50,85 35,65" fill="url(#glass-rose)" stroke="#fff" stroke-width="0.6" filter="drop-shadow(0 0 10px rgba(255,255,255,0.8))"/><polygon points="50,45 57,65 50,85 43,65" fill="rgba(255,255,255,0.5)" stroke="none"/></g></svg>` },
            { id: "white_lotus", type: "advanced", name: "甘露白蓮華", tag: "療癒 ‧ 福壽", formula: "需以【淨瓶】與【寶珠】交織", svg: `<svg viewBox="0 0 100 150"><g transform="scale(1.1) translate(-5, 10)"><circle cx="50" cy="65" r="45" fill="radial-gradient(circle, rgba(224,247,250,0.1) 0%, rgba(224,247,250,0) 70%)" stroke="none"/><polygon points="50,20 75,55 50,90 25,55" fill="url(#glass-cyan)" stroke="#8ba89c" stroke-width="0.5"/><polygon points="50,40 85,70 50,95 15,70" fill="rgba(255,255,255,0.2)" stroke="#f3e5ab" stroke-width="0.4"/><polygon points="50,25 70,55 50,85 30,55 L50 25 Z" fill="url(#glass-rose)" stroke="#fff" stroke-width="0.6"/><circle cx="50" cy="65" r="8" fill="#fff" filter="drop-shadow(0 0 10px rgba(255,255,255,0.8))"/><circle cx="50" cy="65" r="40" fill="url(#glass-purple-glow)" opacity="0.6" stroke="none"/><circle cx="35" cy="50" r="3" fill="#e0f7fa" opacity="0.8"/><circle cx="65" cy="50" r="3" fill="#e0f7fa" opacity="0.8"/><circle cx="50" cy="30" r="2" fill="#fff" opacity="0.9"/></g></svg>` },
            { id: "indra_net", type: "ultimate", name: "蓮華因陀羅網", tag: "重重無盡", formula: "需任意【兩尊大法寶】交織", svg: `<svg viewBox="0 0 100 150"><g transform="scale(1.1) translate(-5, -5)"><circle cx="50" cy="75" r="50" fill="url(#net-glow)" opacity="0.6" filter="blur(4px)" /><g stroke="rgba(224, 247, 250, 0.4)" stroke-width="0.2"><polygon points="50,25 85.35,39.65 85.35,75 85.35,110.35 50,125 14.65,110.35 14.65,75 14.65,39.65" fill="none" stroke-width="0.5" /><polygon points="50,25 85.35,75 50,125 14.65,75" fill="none" stroke-dasharray="1,1.5" /><polygon points="85.35,39.65 85.35,110.35 14.65,110.35 14.65,39.65" fill="none" stroke-dasharray="1,1.5" /></g><use href="#petal-gold" transform="rotate(0 50 75)" /><use href="#petal-cyan" transform="rotate(45 50 75)" /><use href="#petal-rose" transform="rotate(90 50 75)" /><use href="#petal-purple" transform="rotate(135 50 75)" /><use href="#petal-gold" transform="rotate(180 50 75)" /><use href="#petal-cyan" transform="rotate(225 50 75)" /><use href="#petal-rose" transform="rotate(270 50 75)" /><use href="#petal-purple" transform="rotate(315 50 75)" /><circle cx="50" cy="25" r="2" fill="#fff" /><circle cx="85.35" cy="39.65" r="2" fill="#e0f7fa" /><circle cx="85.35" cy="75" r="2" fill="#fce4ec" /><circle cx="85.35" cy="110.35" r="2" fill="#f3e5ab" /><circle cx="50" cy="125" r="2" fill="#e1bee7" /><circle cx="14.65" cy="110.35" r="2" fill="#fce4ec" /><circle cx="14.65" cy="75" r="2" fill="#e0f7fa" /><circle cx="14.65" cy="39.65" r="2" fill="#f3e5ab" /><circle cx="50" cy="75" r="6" fill="#fff" filter="drop-shadow(0 0 10px #fff)" /><polygon points="50,66 54,75 50,84 46,75" fill="#f3e5ab" /></g></svg>` }
        ];

        const mergeRecipes = {
            "sword+vase": "lotus_lamp", "jewel+sword": "dharma_wheel", "jewel+vase": "white_lotus",
            "dharma_wheel+lotus_lamp": "indra_net", "lotus_lamp+white_lotus": "indra_net", "dharma_wheel+white_lotus": "indra_net"
        };

        // 預設給您 Lv.3 和 Lv.2 來測試交織
        let inventory = { sword: 3, vase: 2, jewel: 1, lotus_lamp: 0, dharma_wheel: 0, white_lotus: 0, indra_net: 0 };
        let selectedItems = []; 
        let currentAction = ''; 
        let currentMergeTarget = '';
        let currentMergeProb = 0;

        function renderGrid() {
            const grid = document.getElementById('treasure-grid');
            grid.innerHTML = '';
            
            allTreasures.forEach(item => {
                const level = inventory[item.id] || 0;
                const isLocked = level === 0;
                const isSelected = selectedItems.includes(item.id);
                
                const cell = document.createElement('div');
                if (isLocked) {
                    cell.className = 't-cell locked';
                    cell.onclick = () => showToast(`【法界暗格】<br>${item.formula}方能顯化。`);
                    cell.innerHTML = `<div class="t-svg">${item.svg}</div><div class="t-info"><div class="t-name">？？？</div><div class="t-lvl">因緣未具</div><span class="t-tag">尚未顯化</span></div>`;
                } else {
                    cell.className = `t-cell ${isSelected ? 'selected' : ''}`;
                    cell.onclick = () => toggleSelect(item.id);
                    cell.innerHTML = `<div class="t-svg">${item.svg}</div><div class="t-info"><div class="t-name">${item.name}</div><div class="t-lvl">Lv.${level} (庫存)</div><span class="t-tag">【${item.tag}】</span></div>`;
                }
                grid.appendChild(cell);
            });
            updateButtons();
        }

        function toggleSelect(id) {
            const index = selectedItems.indexOf(id);
            if (index > -1) selectedItems.splice(index, 1);
            else {
                if (selectedItems.length < 2) selectedItems.push(id);
                else { selectedItems.shift(); selectedItems.push(id); }
            }
            renderGrid();
        }

        function updateButtons() {
            document.getElementById('btn-dedicate').className = `action-btn ${selectedItems.length === 1 ? 'active' : ''}`;
            document.getElementById('btn-merge').className = `action-btn ${selectedItems.length === 2 ? 'active' : ''}`;
        }

        let toastTimer;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerHTML = msg; toast.classList.add('show');
            clearTimeout(toastTimer); toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        const modal = document.getElementById('modal-overlay');
        const mCheckBtn = document.getElementById('m-checkbox');
        const mConfirmBtn = document.getElementById('m-confirm-btn');
        const mWarning = document.getElementById('m-warning');
        const devPanel = document.getElementById('dev-panel');
        let isChecked = false;

        function toggleCheckbox() {
            isChecked = !isChecked;
            if (isChecked) { mCheckBtn.classList.add('checked'); mConfirmBtn.classList.add('ready'); } 
            else { mCheckBtn.classList.remove('checked'); mConfirmBtn.classList.remove('ready'); }
        }

        function closeModal() {
            modal.classList.remove('show');
            isChecked = false; mCheckBtn.classList.remove('checked'); mConfirmBtn.classList.remove('ready');
            mWarning.style.display = 'none'; devPanel.style.display = 'none';
        }

        function openDedicateModal() {
            currentAction = 'dedicate';
            const item = allTreasures.find(i => i.id === selectedItems[0]);
            let reqText = item.type === 'basic' ? "靜心禁語一刻鐘<br>行微小佈施一次<br>至誠念佛一千五百遍" : "靜心禁語三小時<br>行無相佈施一次<br>至誠念佛三千遍";

            document.getElementById('m-title').innerText = "【 祈福迴向 ． 實修前置 】";
            document.getElementById('m-desc').innerText = `欲調用此「${item.name}」之願力，請先圓滿今日之實修，方能至誠感應。`;
            document.getElementById('m-check-text').innerHTML = `我已如實完成下方一項或全部願行：<br>${reqText}`;
            mConfirmBtn.innerText = "實修圓滿 ． 至誠迴向";
            modal.classList.add('show');
        }

        function openMergeModal() {
            currentAction = 'merge';
            const id1 = selectedItems[0]; const id2 = selectedItems[1];
            const pairKey = [id1, id2].sort().join('+');
            currentMergeTarget = mergeRecipes[pairKey];
            
            if (!currentMergeTarget) {
                showToast("【因緣不契】<br>此二法寶無法交織，請參閱圖鑑暗格提示。"); return;
            }

            const lv1 = inventory[id1]; const lv2 = inventory[id2];
            currentMergeProb = Math.min(100, (lv1 + lv2) * 10);
            
            let probColor = currentMergeProb === 100 ? "#d4af37" : "#ef5350";
            let probDesc = currentMergeProb === 100 ? "因緣圓滿，必定顯化" : "因緣尚淺，建議繼續積累";

            document.getElementById('m-title').innerText = "【 願力交織 ． 實修前置 】";
            document.getElementById('m-desc').innerHTML = `當前契合度：<span style="color:${probColor}; font-weight:bold; font-size:1.1rem;">${currentMergeProb}%</span><br>(${probDesc})`;
            
            mWarning.style.display = 'block';
            mWarning.innerHTML = "⚠️ 警告：和合一旦啟動，無論成敗，投入之兩尊法寶將<b>全數歸零</b>。失敗則化作無相佈施，迴向法界。";
            
            document.getElementById('m-check-text').innerHTML = "我已如實完成：<br>．至誠默唸佛號（或心咒）一百遍。";
            mConfirmBtn.innerText = "明白代價 ． 啟動和合";
            
            // 顯示工程師測試面板
            devPanel.style.display = 'block';
            
            modal.classList.add('show');
        }

        // 參數 forceResult 用於工程師強制測試 (true: 必成, false: 必敗, null: 機率)
        function executeAction(forceResult = null) {
            // 如果是點擊下方正常按鈕，但沒打勾，不給過
            if (forceResult === null && !isChecked) return; 
            
            closeModal();
            const animOverlay = document.getElementById('anim-overlay');
            const animText = document.getElementById('anim-text');
            const animSvg = document.getElementById('anim-svg-container');
            
            animOverlay.classList.add('show');
            document.getElementById('anim-flash').style.opacity = '1';
            animText.style.opacity = '0'; animSvg.style.opacity = '0'; document.getElementById('anim-subtext').style.opacity = '0';

            setTimeout(() => {
                document.getElementById('anim-flash').style.opacity = '0'; 
                
                if (currentAction === 'dedicate') {
                    inventory[selectedItems[0]] -= 1;
                    animSvg.innerHTML = '';
                    animText.innerHTML = "願以此功德，普及於一切。<br>祈願順遂安康，業障消除。<br>我等與眾生，皆共成佛道。";
                    animText.style.opacity = '1';
                    
                } else if (currentAction === 'merge') {
                    // 判斷成功與否 (支援工程師強制結果)
                    let isSuccess = false;
                    if (forceResult !== null) {
                        isSuccess = forceResult; // 工程師強制
                    } else {
                        isSuccess = (Math.random() * 100) < currentMergeProb; // 正常機率
                    }
                    
                    // 【殘酷核心】：梭哈歸零！
                    inventory[selectedItems[0]] = 0;
                    inventory[selectedItems[1]] = 0;
                    
                    if (isSuccess) {
                        inventory[currentMergeTarget] = (inventory[currentMergeTarget] || 0) + 1;
                        const targetObj = allTreasures.find(i => i.id === currentMergeTarget);
                        animSvg.innerHTML = targetObj.svg; animSvg.style.opacity = '1';
                        animText.innerHTML = `【 因緣具足 ． ${targetObj.name}顯化 】<br><span style='font-size:0.8rem; color:#f3e5ab;'>十方願力交織，能量擴容增上。</span>`;
                    } else {
                        animSvg.innerHTML = '';
                        animText.innerHTML = "【 因緣未具 ． 化作微塵 】<br><span style='font-size:0.8rem; color:#8ba89c;'>您梭哈之願力已全數化作無相大佈施，迴向十方法界。</span>";
                    }
                    animText.style.opacity = '1';
                }
                
                setTimeout(() => { document.getElementById('anim-subtext').style.opacity = '1'; }, 1500);
            }, 800);
        }

        function closeAnim() {
            if (document.getElementById('anim-text').style.opacity === '1') {
                document.getElementById('anim-overlay').classList.remove('show');
                selectedItems = [];
                renderGrid(); // 重新渲染，您會看到被扣除的法寶變成暗格
            }
        }

        renderGrid();
    </script>
</body>
</html>
