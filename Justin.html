<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系統 ． 法界回饋 (一真法界)</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; --bg-deep: #000; }
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: var(--bg-deep); color: #fff; display: flex; justify-content: center; align-items: center; -webkit-tap-highlight-color: transparent; user-select: none; perspective: 2000px; }

        #ctrl-btn { position: absolute; z-index: 9999; font-family: "PingFang TC", "Microsoft JhengHei", serif; padding: 15px 40px; border: 1px solid var(--solid-gold); border-radius: 40px; color: var(--gold); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); font-size: 1.1rem; letter-spacing: 5px; cursor: pointer; transition: 0.3s; }

        /* --- 0 與 1 的演化 CSS --- */
        #meditation-dot { position: absolute; width: 12px; height: 12px; background: var(--gold); border-radius: 50% !important; box-shadow: 0 0 25px var(--gold), 0 0 60px var(--solid-gold), 0 0 120px rgba(212,175,55,0.8), 0 0 180px rgba(212,175,55,0.4); opacity: 0; transform: scale(0.5); transition: opacity 2s ease; z-index: 10; }
        .breathing { animation: dot-breath 4s infinite alternate ease-in-out; }
        @keyframes dot-breath { 0% { transform: scale(0.6); filter: brightness(0.7); } 100% { transform: scale(1.4); filter: brightness(1.3); } }

        #infinite-light { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(243,229,171,0.9) 40%, rgba(212,175,55,0.8) 100%); mix-blend-mode: screen; opacity: 0; pointer-events: none; transition: opacity 3s cubic-bezier(0.25, 0.1, 0.25, 1); z-index: 20; }

        #ring-0 { position: absolute; width: 40vmin; height: 40vmin; border-radius: 50%; border: 2px solid rgba(243,229,171,0.8); box-shadow: 0 0 75px rgba(212,175,55,0.7), inset 0 0 45px rgba(212,175,55,0.4); opacity: 0; transform: scale(0.5); z-index: 15; will-change: transform, opacity; }

        #pillar-1 { position: absolute; width: 4px; height: 50vmin; background: linear-gradient(to top, rgba(255,255,255,0.4) 0%, rgba(212,175,55,0.9) 40%, rgba(184,134,11,1) 75%, rgba(100,50,0,0.9) 100%); box-shadow: 0 0 40px rgba(212,175,55,1), 0 0 90px rgba(184,134,11,0.8), inset 0 0 10px rgba(212,175,55,0.5); border-radius: 2px; opacity: 0; transform: scale(0.5); z-index: 15; will-change: transform, opacity; }
        .tier-dot { position: absolute; left: 50%; background: rgba(243,229,171,0.5); border-radius: 50%; box-shadow: 0 0 8px rgba(212,175,55,0.6); transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1); }

        /* --- 華嚴大世界 CSS (初始隱藏) --- */
        #huayan-world { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; opacity: 0; display: none; transition: opacity 4s ease-in; z-index: 5; }
        .vairocana-light { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.08) 0%, rgba(212,175,55,0.02) 40%, transparent 80%); animation: divine-breath 12s infinite alternate ease-in-out; pointer-events: none; }
        @keyframes divine-breath { 0% { opacity: 0.5; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }
        #universe-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-style: preserve-3d; transform: rotateX(75deg) scale(0.85); will-change: transform; }
        #lotus-ocean { position: absolute; top: 65%; left: 50%; width: 0; height: 0; transform-style: preserve-3d; will-change: transform; animation: slow-spin 60s infinite linear; }
        @keyframes slow-spin { 0% { transform: rotateZ(0deg); } 100% { transform: rotateZ(360deg); } }
        .svg-glow { position: absolute; width: 1200px; height: 1200px; left: -600px; top: -600px; filter: drop-shadow(0 0 15px rgba(212,175,55,0.15)); }
        .ocean-dot-animated { transform-origin: center; animation: ocean-breathe 6s infinite alternate ease-in-out; }
        @keyframes ocean-breathe { 0% { transform: scale(1.4); opacity: 0.3; } 100% { transform: scale(4.0); opacity: 0.9; filter: drop-shadow(0 0 20px rgba(255,255,255,0.9)); } }
        #standing-lotus, #world-tower, .petal-3d, .tier-layer { position: absolute; transform-style: preserve-3d; }
        .petal-svg { width: 100%; height: 100%; overflow: visible; }
        .central-beam { position: absolute; top: 0; left: -1px; width: 2px; height: 550px; background: linear-gradient(to bottom, rgba(255,255,255,0.8) 0%, rgba(212,175,55,0.8) 30%, rgba(139,168,156,0.3) 100%); box-shadow: 0 0 20px rgba(212,175,55,0.5); transform-origin: top center; transform: rotateX(90deg); }
        .tier-disk { position: absolute; border-radius: 50%; border-width: 1.5px; }

        /* --- 昇華金光與菩提心重現 CSS --- */
        #golden-flash { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(243,229,171,0.95) 30%, rgba(212,175,55,0.8) 100%); mix-blend-mode: screen; opacity: 0; z-index: 99998; pointer-events: none; transition: opacity 0.4s ease-out; }
        @keyframes camera-shake { 0% { transform: translate(0, 0) rotate(0deg); } 10% { transform: translate(-30px, -30px) rotate(-3deg); } 20% { transform: translate(30px, 30px) rotate(3deg); } 30% { transform: translate(-20px, 20px) rotate(-2deg); } 40% { transform: translate(20px, -20px) rotate(2deg); } 50% { transform: translate(-10px, -10px) rotate(-1deg); } 60% { transform: translate(10px, 10px) rotate(1deg); } 100% { transform: translate(0, 0) rotate(0deg); } }
        .shake-active { animation: camera-shake 0.6s cubic-bezier(.36,.07,.19,.97) both; }

        #immortal-scene { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; background: #000; }
        #immortal-dot { width: 12px; height: 12px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 25px var(--gold), 0 0 60px var(--solid-gold); opacity: 0; transition: opacity 3s ease; }
        #profound-text { margin-top: 50px; color: var(--gold); font-size: 1.1rem; letter-spacing: 8px; opacity: 0; transition: opacity 4s ease; text-shadow: 0 0 15px var(--solid-gold); text-align: center; line-height: 2.5; }
    </style>
</head>
<body>

    <button id="ctrl-btn" onclick="startDharmaFeedback()">一念迴光 ． 啟動法界</button>

    <div id="meditation-dot"></div>
    <div id="infinite-light"></div>
    <div id="ring-0"></div>
    <div id="pillar-1"></div>

    <div id="huayan-world">
        <div class="vairocana-light"></div>
        <div id="universe-container">
            <div id="lotus-ocean">
                <svg class="svg-glow" viewBox="0 0 200 200" id="ocean-svg" xmlns="http://www.w3.org/2000/svg">
                    <g id="ocean-rings"></g>
                    <g id="ocean-dots"></g>
                    <g id="geometric-mandala"></g>
                </svg>
                <div id="standing-lotus"></div>
                <div id="world-tower"><div class="central-beam"></div></div>
            </div>
        </div>
    </div>

    <div id="golden-flash"></div>
    <div id="immortal-scene">
        <div id="immortal-dot"></div>
        <div id="profound-text">菩提之心 ． 歷劫不滅<br>一真法界 ． 本自如如</div>
    </div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
        const gold = "rgba(212,175,55,"; const cyan = "rgba(139,168,156,";

        // ==========================================
        // 模組初始化：建造華嚴世界的 3D 結構
        // ==========================================
        function initHuayanStructure() {
            // 香水海圓環與星點
            const oceanRings = document.getElementById('ocean-rings');
            const geometricMandala = document.getElementById('geometric-mandala');
            const oceanDots = document.getElementById('ocean-dots');
            for(let i = 1; i <= 10; i++) {
                let radius = i * 9.5; let opacity = 1 - (i * 0.08); 
                let circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", "100"); circle.setAttribute("cy", "100"); circle.setAttribute("r", radius);
                circle.setAttribute("fill", "none"); circle.setAttribute("stroke", i % 2 === 0 ? `${cyan}${opacity})` : `${gold}${opacity})`);
                circle.setAttribute("stroke-width", "0.3"); circle.setAttribute("stroke-dasharray", i % 3 === 0 ? "2 8" : "none"); 
                oceanRings.appendChild(circle);
            }
            const tenOceanColors = ['255,235,160', '160,230,255', '255,200,220', '180,240,190', '220,190,240', '255,250,220', '170,250,230', '255,215,170', '200,210,255', '240,255,210'];
            for(let i = 0; i < 10; i++) {
                let angle = (Math.PI * 2 / 10) * i - (Math.PI / 2); let radius = 85.5; 
                let cx = 100 + Math.cos(angle) * radius; let cy = 100 + Math.sin(angle) * radius;
                let cRGB = tenOceanColors[i];
                let dotGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                dotGroup.classList.add("ocean-dot-animated"); dotGroup.style.transformOrigin = `${cx}px ${cy}px`; dotGroup.style.animationDelay = `${i * 0.5}s`;
                let glow = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                glow.setAttribute("cx", cx); glow.setAttribute("cy", cy); glow.setAttribute("r", "4.5"); glow.setAttribute("fill", `rgba(${cRGB},0.2)`); glow.setAttribute("stroke", `rgba(${cRGB},0.6)`); glow.setAttribute("stroke-width", "0.5");
                let dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                dot.setAttribute("cx", cx); dot.setAttribute("cy", cy); dot.setAttribute("r", "1.5"); dot.setAttribute("fill", "#fff");
                dotGroup.appendChild(glow); dotGroup.appendChild(dot); oceanDots.appendChild(dotGroup);
            }

            // 立體大蓮花
            const standingLotus = document.getElementById('standing-lotus');
            function create3DPetal(angle, tiltX, gradientId, w, h, strokeOpacity) {
                let petal = document.createElement('div'); petal.className = 'petal-3d';
                petal.style.transform = `rotateZ(${angle}deg) rotateX(${tiltX}deg)`;
                petal.style.width = `${w}px`; petal.style.height = `${h}px`; petal.style.left = `-${w/2}px`; 
                petal.style.bottom = '0'; petal.style.transformOrigin = 'bottom center';
                petal.innerHTML = `<svg viewBox="0 0 120 320" class="petal-svg" preserveAspectRatio="none"><defs><linearGradient id="g1" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(212,175,55, 0.9)" /><stop offset="60%" stop-color="rgba(255,255,255, 0.4)" /><stop offset="100%" stop-color="transparent" /></linearGradient></defs><path d="M 60 320 C 60 320, 0 180, 0 80 C 0 30, 60 0, 60 0 C 60 0, 120 30, 120 80 C 120 180, 60 320, 60 320 Z" fill="url(#g1)" stroke="rgba(212,175,55,${strokeOpacity})" stroke-width="1.2"/></svg>`;
                return petal;
            }
            for(let i=0; i<10; i++) standingLotus.appendChild(create3DPetal(i * 36, -28, 'g1', 120, 280, 0.25));
            for(let i=0; i<10; i++) standingLotus.appendChild(create3DPetal((i * 36) + 18, -40, 'g1', 100, 210, 0.4));

            // 世界塔層級
            const tower = document.getElementById('world-tower');
            for(let i = 0; i < 20; i++) {
                let level = i + 1; let zHeight = level * 25; let radius = 20 + (level * 12); 
                let tierGroup = document.createElement('div'); tierGroup.className = 'tier-layer'; tierGroup.style.transform = `translateZ(${zHeight}px)`;
                let disk = document.createElement('div'); disk.className = 'tier-disk';
                disk.style.width = `${radius * 2}px`; disk.style.height = `${radius * 2}px`; disk.style.left = `-${radius}px`; disk.style.top = `-${radius}px`;  
                disk.style.borderColor = `rgba(230,200,100, 0.5)`; disk.style.backgroundColor = `rgba(230,200,100, 0.15)`; 
                tierGroup.appendChild(disk); tower.appendChild(tierGroup);
            }
        }

        function initPillar1Tiers() {
            const pillar = document.getElementById('pillar-1');
            pillar.innerHTML = ''; 
            for(let i = 0; i < 20; i++) {
                let d = document.createElement('div'); d.className = 'tier-dot';
                let pos = 100 - (i * (100 / 19)); let size = 1 + (i * (4 / 19)); 
                d.style.top = `calc(${pos}% - ${size/2}px)`; d.style.width = `${size}px`; d.style.height = `${size}px`; d.style.transform = `translateX(-50%)`; 
                pillar.appendChild(d);
            }
        }

        async function surgeEnergy() {
            const dots = document.querySelectorAll('#pillar-1 .tier-dot');
            for(let i = 0; i < 20; i++) {
                let d = dots[i]; 
                d.style.background = '#fff'; d.style.boxShadow = '0 0 10px #fff, 0 0 20px #d4af37'; d.style.transform = `translateX(-50%) scale(1.5)`;
                setTimeout(() => { d.style.transform = `translateX(-50%) scale(1)`; d.style.background = 'rgba(243,229,171,0.6)'; d.style.boxShadow = '0 0 5px #d4af37'; }, 400);
                await sleep(200); 
            }
        }

        // ==========================================
        // 核心時間軸：住、壞、空、重生
        // ==========================================
        async function startDharmaFeedback() {
            document.getElementById('ctrl-btn').style.display = 'none';
            initPillar1Tiers();
            initHuayanStructure();

            const dot = document.getElementById('meditation-dot');
            const light = document.getElementById('infinite-light');
            const ring = document.getElementById('ring-0');
            const pillar = document.getElementById('pillar-1');
            const huayanWorld = document.getElementById('huayan-world');

            // --- 階段 1：0 的演化 ---
            await sleep(1500);
            dot.style.opacity = '1'; dot.classList.add('breathing');
            await sleep(5000); 
            dot.classList.remove('breathing'); light.style.opacity = '1';
            await sleep(3000); 
            light.style.opacity = '0'; dot.style.opacity = '0';
            
            ring.style.transition = 'transform 4.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 3s ease';
            ring.style.opacity = '1'; ring.style.transform = 'scale(1.5)';
            await sleep(4500); 
            for(let i = 0; i < 5; i++) {
                ring.style.transition = 'transform 0.15s ease-out'; ring.style.transform = 'scale(1.6)'; await sleep(150);
                ring.style.transition = 'transform 0.3s ease-in'; ring.style.transform = 'scale(1.5)'; await sleep(400);
            }
            await sleep(800); 
            ring.style.transition = 'transform 3s cubic-bezier(0.5, 0, 0.8, 0.2), opacity 2.5s ease';
            ring.style.transform = 'scale(0.02)'; ring.style.opacity = '0';
            await sleep(3500); // 留白黑暗

            // --- 階段 2：1 的演化 ---
            pillar.style.transition = 'transform 4.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 3s ease';
            pillar.style.opacity = '1'; pillar.style.transform = 'scale(1.5)';
            await sleep(3500); 
            await surgeEnergy();
            await sleep(2000);
            pillar.style.transition = 'transform 3.5s cubic-bezier(0.5, 0, 0.8, 0.2), opacity 3s ease';
            pillar.style.transform = 'scale(0.02)'; pillar.style.opacity = '0';
            await sleep(4000); // 完全回歸純黑

            // --- 階段 3：0 與 1 融合化現華嚴世界 (住) ---
            huayanWorld.style.display = 'block';
            await sleep(100);
            huayanWorld.style.opacity = '1';
            // 讓行者沉浸觀想 10 秒鐘
            await sleep(10000); 

            // --- 階段 4：金光昇華 (壞) ---
            document.body.classList.add('shake-active');
            const goldenFlash = document.getElementById('golden-flash');
            goldenFlash.style.opacity = '1'; 

            // 華嚴圖形曝光消融
            const allPieces = document.querySelectorAll('.petal-3d, .tier-layer, .ocean-dot-animated, .central-beam, .svg-glow');
            allPieces.forEach(piece => {
                piece.style.transition = 'all 1.5s cubic-bezier(0.25, 0.1, 0.25, 1)';
                piece.style.opacity = '0'; piece.style.filter = 'brightness(3) drop-shadow(0 0 50px #d4af37)'; piece.style.transform += ' scale(1.15)'; 
            });

            // 金粉飛昇
            const centerX = window.innerWidth / 2; const centerY = window.innerHeight * 0.6; 
            for(let i = 0; i < 150; i++) {
                let dust = document.createElement('div'); 
                dust.style.position = 'fixed'; dust.style.background = Math.random() > 0.3 ? 'var(--gold)' : '#fff';
                dust.style.borderRadius = '50%'; dust.style.pointerEvents = 'none'; dust.style.filter = 'drop-shadow(0 0 15px var(--solid-gold))'; dust.style.zIndex = '99999'; 
                dust.style.left = centerX + (Math.random() - 0.5) * window.innerWidth * 0.9 + 'px'; 
                dust.style.top = centerY + (Math.random() - 0.5) * window.innerHeight * 0.6 + 'px';
                let size = Math.random() * 5 + 2; dust.style.width = size + 'px'; dust.style.height = size + 'px';
                document.body.appendChild(dust); 
                dust.animate([
                    { opacity: 1, transform: `translate(0, 0) scale(1)` },
                    { opacity: 0, transform: `translate(${(Math.random() - 0.5) * 400}px, ${-(Math.random() * 700 + 300)}px) scale(0)` }
                ], { duration: Math.random() * 3000 + 2000, easing: 'ease-out', fill: 'forwards' });
                setTimeout(() => dust.remove(), 5100);
            }

            // --- 階段 5：純黑虛空 (空) ---
            await sleep(600);
            document.body.classList.remove('shake-active');
            goldenFlash.style.transition = 'opacity 2.5s ease-in'; goldenFlash.style.opacity = '0';
            await sleep(3000);
            huayanWorld.style.display = 'none'; 

            // --- 階段 6：菩提心重生與跳轉 ---
            const immortalScene = document.getElementById('immortal-scene');
            const immortalDot = document.getElementById('immortal-dot');
            const profoundText = document.getElementById('profound-text');
            
            immortalScene.style.display = 'flex'; 
            await sleep(1500); 
            immortalDot.style.opacity = '1'; // 菩提心亮起
            await sleep(3500);
            profoundText.style.opacity = '1'; // 玄語浮現
            
            await sleep(7000); // 留給行者最後的參悟時間
            
            // 💡 最終跳轉：請將此處改為您原本華嚴世界的網址
            // window.location.href = 'index.html'; 
            console.log("【法界回饋圓滿】準備跳轉回主畫面...");
        }
    </script>
</body>
</html>
