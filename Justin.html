<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系統 ． 一真法界 (圓滿回饋)</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; }
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; user-select: none; perspective: 2000px; font-family: "PingFang TC", serif; }

        /* ======= 1. 菩提明點：強烈心跳律動 ======= */
        #meditation-dot {
            position: absolute; width: 14px; height: 14px; background: var(--gold); border-radius: 50%;
            box-shadow: 0 0 30px var(--gold), 0 0 80px var(--solid-gold);
            opacity: 0; z-index: 100;
        }
        .heartbeat { animation: heart-throb 1.2s infinite cubic-bezier(0.1, 0.9, 0.2, 1); }
        @keyframes heart-throb {
            0% { transform: scale(0.7); filter: brightness(0.8); box-shadow: 0 0 20px var(--solid-gold); }
            15% { transform: scale(1.6); filter: brightness(1.5); box-shadow: 0 0 100px var(--gold), 0 0 150px var(--solid-gold); }
            40% { transform: scale(1.2); filter: brightness(1.2); }
            100% { transform: scale(0.7); filter: brightness(0.8); }
        }

        /* ======= 2. 演化 0：幾何生長 ======= */
        #ring-0 {
            position: absolute; width: 45vmin; height: 45vmin; border-radius: 50%;
            border: 2px solid rgba(243,229,171,0.8); box-shadow: 0 0 60px var(--solid-gold);
            opacity: 0; transform: scale(0.1); z-index: 50; display: flex; justify-content: center; align-items: center;
        }
        #growth-svg {
            position: absolute; width: 1000px; height: 1000px; opacity: 0;
            filter: drop-shadow(0 0 12px var(--solid-gold));
        }
        .draw-path { 
            stroke-dasharray: 1000; stroke-dashoffset: 1000; 
            animation: draw-action 5s forwards ease-in-out;
        }
        @keyframes draw-action { to { stroke-dashoffset: 0; } }

        /* ======= 3. 華嚴大世界：完整復原 (初始隱藏) ======= */
        #huayan-world { position: absolute; width: 100vw; height: 100vh; opacity: 0; display: none; z-index: 10; transition: opacity 3s ease; }
        #universe-container { position: absolute; width: 100%; height: 100%; transform-style: preserve-3d; transform: rotateX(75deg) scale(0.9); }
        #lotus-ocean { position: absolute; top: 65%; left: 50%; transform-style: preserve-3d; animation: slow-spin 80s infinite linear; }
        @keyframes slow-spin { from { transform: rotateZ(0deg); } to { transform: rotateZ(360deg); } }

        /* ======= 4. 昇華粒子系統 ======= */
        #golden-flash { position: absolute; width: 100vw; height: 100vh; background: #fff; mix-blend-mode: screen; opacity: 0; z-index: 1000; pointer-events: none; }
        .seed-particle { position: fixed; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 999; filter: blur(1px); }

        /* 終極重生場景 */
        #immortal-scene { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        #profound-text { margin-top: 50px; color: var(--gold); font-size: 1.2rem; letter-spacing: 12px; opacity: 0; transition: opacity 4s; text-align: center; line-height: 2.5; text-shadow: 0 0 15px var(--solid-gold); }
    </style>
</head>
<body>

    <div id="meditation-dot"></div>
    <div id="ring-0">
        <svg id="growth-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <g id="draw-layer" fill="none" stroke-width="0.6"></g>
        </svg>
    </div>

    <div id="huayan-world">
        <div id="universe-container">
            <div id="lotus-ocean">
                <svg id="ocean-base" style="position:absolute; width:1200px; height:1200px; left:-600px; top:-600px;"></svg>
                <div id="standing-lotus"></div>
                <div id="world-tower"></div>
            </div>
        </div>
    </div>

    <div id="golden-flash"></div>
    <div id="immortal-scene">
        <div id="final-dot" class="heartbeat" style="width:12px; height:12px; background:var(--gold); border-radius:50%;"></div>
        <div id="profound-text">菩提之心 ． 歷劫不滅<br>一真法界 ． 本自如如</div>
    </div>

    <script>
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // 輔助：繪製幾何蓮花路徑
        function createFlowerPath(radius, count, color) {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            for(let i=0; i<count; i++) {
                const angle = (360/count) * i;
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const d = `M100 ${100-radius} C ${100+radius*0.5} ${100-radius*0.2}, ${100+radius*0.5} ${100+radius*0.2}, 100 ${100+radius} C ${100-radius*0.5} ${100+radius*0.2}, ${100-radius*0.5} ${100-radius*0.2}, 100 ${100-radius}`;
                path.setAttribute("d", d); path.setAttribute("stroke", color);
                path.classList.add("draw-path");
                path.setAttribute("transform", `rotate(${angle} 100 100)`);
                g.appendChild(path);
            }
            return g;
        }

        async function startDharmaFeedback() {
            const dot = document.getElementById('meditation-dot');
            const ring = document.getElementById('ring-0');
            const svgDraw = document.getElementById('draw-layer');
            const svgContainer = document.getElementById('growth-svg');

            // --- 第一步：明點心跳亮起 ---
            await sleep(1500);
            dot.style.opacity = '1';
            dot.classList.add('heartbeat');
            await sleep(6000);

            // --- 第二步：演化 0 與 幾何長出 ---
            dot.style.opacity = '0';
            ring.style.transition = 'transform 4s ease-out, opacity 2s ease';
            ring.style.opacity = '1';
            ring.style.transform = 'scale(1)'; // 緩慢放大
            await sleep(4000);

            // 開始 5 秒心跳與畫畫生長
            svgContainer.style.opacity = '1';
            svgDraw.appendChild(createFlowerPath(80, 12, 'rgba(139,168,156,0.6)'));
            svgDraw.appendChild(createFlowerPath(50, 10, 'rgba(212,175,55,0.8)'));
            
            for(let i=0; i<5; i++) {
                ring.style.transition = 'transform 0.2s ease-out';
                ring.style.transform = 'scale(1.1)';
                await sleep(250);
                ring.style.transition = 'transform 0.5s ease-in';
                ring.style.transform = 'scale(1)';
                await sleep(750);
            }

            // 0 收攝
            ring.style.transition = 'transform 2s cubic-bezier(0.5,0,1,0.5), opacity 1.5s';
            ring.style.transform = 'scale(0.01)'; ring.style.opacity = '0';
            await sleep(2500);

            // --- 第三步：華嚴大世界化現 (省略建構細節，直接進入住) ---
            buildHuayan(); // 內部初始化
            const world = document.getElementById('huayan-world');
            world.style.display = 'block';
            await sleep(100); world.style.opacity = '1';
            await sleep(10000); // 觀想

            // --- 第四步：大量昇華 (無震動) ---
            const flash = document.getElementById('golden-flash');
            flash.style.opacity = '1';
            
            // 萬法化作微塵向上噴發
            for(let i=0; i<400; i++) {
                createSeed();
            }

            // 世界消融
            world.style.transition = 'filter 2s, opacity 3s';
            world.style.filter = 'brightness(5) blur(10px)';
            world.style.opacity = '0';
            
            await sleep(1500);
            flash.style.transition = 'opacity 4s'; flash.style.opacity = '0';
            await sleep(4000);

            // --- 第五步：歸真 (重生) ---
            const scene = document.getElementById('immortal-scene');
            scene.style.display = 'flex';
            await sleep(2000);
            document.getElementById('profound-text').style.opacity = '1';
            await sleep(8000);
            
            // 跳轉
            // window.location.href = "your_main_page.html";
        }

        function createSeed() {
            const s = document.createElement('div');
            s.className = 'seed-particle';
            const size = Math.random() * 4 + 1;
            s.style.width = size + 'px'; s.style.height = size + 'px';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = (Math.random() * 50 + 60) + 'vh';
            document.body.appendChild(s);
            s.animate([
                { transform: 'translateY(0) scale(1)', opacity: 1 },
                { transform: `translate(${(Math.random()-0.5)*200}px, -120vh) scale(0)`, opacity: 0 }
            ], { duration: 3000 + Math.random()*3000, easing: 'ease-out' }).onfinish = () => s.remove();
        }

        function buildHuayan() {
            // 這裡置入與主頁面完全相同的 3D 結構代碼
            const tower = document.getElementById('world-tower');
            for(let i=0; i<20; i++) {
                const div = document.createElement('div');
                div.style.cssText = `position:absolute; transform:translateZ(${(i+1)*25}px); width:${(i+1)*30}px; height:${(i+1)*30}px; border:1px solid rgba(212,175,55,0.3); border-radius:50%; left:-${(i+1)*15}px; top:-${(i+1)*15}px;`;
                tower.appendChild(div);
            }
        }

        window.onload = startDharmaFeedback;
    </script>
</body>
</html>
