<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系統 ． 法界回饋 (一真法界)</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; --bg-deep: #000; }
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: var(--bg-deep); color: #fff; display: flex; justify-content: center; align-items: center; -webkit-tap-highlight-color: transparent; user-select: none; perspective: 2000px; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }

        /* ======= A. 0 與 1 演化 CSS (回歸您最新的代碼) ======= */
        #meditation-dot { position: absolute; width: 12px; height: 12px; background: var(--gold); border-radius: 50% !important; box-shadow: 0 0 25px var(--gold), 0 0 60px var(--solid-gold), 0 0 120px rgba(212,175,55,0.8), 0 0 180px rgba(212,175,55,0.4); opacity: 0; transform: scale(0.5); z-index: 10; }
        /* 第一步修正：加上光暈與跳動的呼吸 CSS */
        .breathing { animation: dot-breath-glow 4s infinite alternate ease-in-out; }
        @keyframes dot-breath-glow {
            0% { transform: scale(0.8); box-shadow: 0 0 20px rgba(212,175,55,0.5), 0 0 40px rgba(212,175,55,0.2); filter: brightness(0.8); }
            100% { transform: scale(1.4) translateY(-10px); box-shadow: 0 0 50px rgba(243,229,171,1), 0 0 100px rgba(212,175,55,0.6); filter: brightness(1.3); }
        }

        #infinite-light { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(243,229,171,0.9) 40%, rgba(212,175,55,0.8) 100%); mix-blend-mode: screen; opacity: 0; pointer-events: none; transition: opacity 3s cubic-bezier(0.25, 0.1, 0.25, 1); z-index: 20; }
        #ring-0 { position: absolute; width: 40vmin; height: 40vmin; border-radius: 50%; opacity: 0; transform: scale(0.5); z-index: 15; will-change: transform, opacity; display: flex; justify-content: center; align-items: center; overflow: visible; }
        /* 💡 0 生長過程的 SVG 框線，預設透明 */
        #geometric-growth { position: absolute; width: 1200px; height: 1200px; left: -600px; top: -600px; opacity: 0; filter: drop-shadow(0 0 15px rgba(212,175,55,0.15)); }

        #pillar-1 { position: absolute; width: 4px; height: 50vmin; background: linear-gradient(to top, rgba(255,255,255,0.4) 0%, rgba(212,175,55,0.9) 40%, rgba(184,134,11,1) 75%, rgba(100,50,0,0.9) 100%); box-shadow: 0 0 40px rgba(212,175,55,1), 0 0 90px rgba(184,134,11,0.8), inset 0 0 10px rgba(212,175,55,0.5); border-radius: 2px; opacity: 0; transform: scale(0.5); z-index: 15; will-change: transform, opacity; }
        .tier-dot { position: absolute; left: 50%; background: rgba(243,229,171,0.5); border-radius: 50%; box-shadow: 0 0 8px rgba(212,175,55,0.6); transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1); }

        /* ======= B. 華嚴大世界 3D 模組 (徹底復原 Turn 10 莊嚴版，初始隱藏) ======= */
        #huayan-world { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; opacity: 0; display: none; transition: opacity 4s ease-in; z-index: 5; }
        .vairocana-light { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.08) 0%, rgba(212,175,55,0.02) 40%, transparent 80%); animation: divine-breath 12s infinite alternate ease-in-out; pointer-events: none; }
        @keyframes divine-breath { 0% { opacity: 0.5; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }
        #universe-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-style: preserve-3d; transform: rotateX(75deg) scale(0.85); will-change: transform; }
        #lotus-ocean { position: absolute; top: 65%; left: 50%; width: 0; height: 0; transform-style: preserve-3d; will-change: transform; animation: slow-spin 60s infinite linear; }
        @keyframes slow-spin { 0% { transform: rotateZ(0deg); } 100% { transform: rotateZ(360deg); } }
        .full-svg-glow { position: absolute; width: 1200px; height: 1200px; left: -600px; top: -600px; filter: drop-shadow(0 0 15px rgba(212,175,55,0.15)); }
        .ocean-dot-animated { transform-origin: center; animation: ocean-breathe 6s infinite alternate ease-in-out; }
        @keyframes ocean-breathe { 0% { transform: scale(1.4); opacity: 0.3; } 100% { transform: scale(4.0); opacity: 0.9; filter: drop-shadow(0 0 20px rgba(255,255,255,0.9)); } }
        /* 香水海文字：莊嚴文字框 */
        .sea-label { font-size: 6px; fill: rgba(243,229,171,0.9); letter-spacing: 3px; font-weight: bold; text-shadow: 0 0 8px #000, 0 0 10px rgba(212,175,55,0.9); animation: text-pulse 4s infinite alternate ease-in-out; }
        @keyframes text-pulse { 0% { opacity: 0.4; } 100% { opacity: 1; filter: drop-shadow(0 0 5px var(--gold)); } }
        /* 立體千葉蓮花 */
        #standing-lotus { position: absolute; top: 0; left: 0; transform-style: preserve-3d; z-index: 2; }
        .petal-3d { position: absolute; bottom: 0; transform-origin: bottom center; transform-style: preserve-3d; pointer-events: none; }
        .petal-svg { width: 100%; height: 100%; overflow: visible; }
        /* 20 重世界塔 */
        #world-tower { position: absolute; top: 0; left: 0; width: 0; height: 0; transform-style: preserve-3d; z-index: 10; }
        .central-beam { position: absolute; top: 0; left: -1px; width: 2px; height: 550px; background: linear-gradient(to bottom, rgba(255,255,255,0.8) 0%, rgba(212,175,55,0.8) 30%, rgba(139,168,156,0.3) 100%); box-shadow: 0 0 20px rgba(212,175,55,0.5); transform-origin: top center; transform: rotateX(90deg); pointer-events: none; }
        .tier-layer { position: absolute; top: 0; left: 0; transform-style: preserve-3d; pointer-events: none; }
        .tier-disk { position: absolute; border-radius: 50%; border-width: 1.5px; border-style: solid; border-color: rgba(230,200,100, 0.5); background-color: rgba(230,200,100, 0.15); transform-style: preserve-3d; }

        /* ======= C. 終極昇華與菩提心重生 CSS ======= */
        #golden-flash { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(243,229,171,0.95) 30%, rgba(212,175,55,0.8) 100%); mix-blend-mode: screen; opacity: 0; z-index: 99998; pointer-events: none; transition: opacity 0.4s ease-out; }
        
        #immortal-scene { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; background: #000; }
        /* 最後重生的菩提小圓點 (加上呼吸發光效果) */
        #immortal-dot { width: 12px; height: 12px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 25px var(--gold), 0 0 60px var(--solid-gold); opacity: 0; transition: opacity 3s ease; animation: immortal-breath 4s infinite alternate ease-in-out; }
        @keyframes immortal-breath { from { transform: scale(1); filter: brightness(1); } to { transform: scale(1.2); filter: brightness(1.3); } }
        /* 玄而又玄的字幕 */
        #profound-text { margin-top: 60px; color: var(--gold); font-size: 1.2rem; letter-spacing: 10px; opacity: 0; transition: opacity 4s ease; text-shadow: 0 0 15px var(--solid-gold); text-align: center; line-height: 2.5; font-weight: bold; }
    </style>
</head>
<body>

    <div id="meditation-dot"></div>
    <div id="infinite-light"></div>
    <div id="ring-0">
        <svg viewBox="0 0 200 200" id="geometric-growth" xmlns="http://www.w3.org/2000/svg">
            <g id="growth-mandala"></g>
        </svg>
    </div>
    <div id="pillar-1"></div>

    <div id="huayan-world">
        <div class="vairocana-light"></div>
        <div id="universe-container">
            <div id="lotus-ocean">
                <svg class="full-svg-glow" viewBox="0 0 200 200" id="ocean-svg" xmlns="http://www.w3.org/2000/svg">
                    <g id="ocean-rings"></g>
                    <g id="ocean-dots"></g>
                    <g id="base-mandala"></g>
                </svg>
                <div id="standing-lotus"></div>
                <div id="world-tower"><div class="central-beam"></div></div>
            </div>
        </div>
    </div>

    <div id="golden-flash"></div>
    <div id="immortal-scene">
        <div id="immortal-dot"></div>
        <div id="profound-text">菩提之心 ． 歷劫不滅<br>一真法界 ． 玄之又玄</div>
    </div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
        const goldL = "rgba(212,175,55,"; const cyanL = "rgba(139,168,156,";

        // ==========================================
        // 模組一：0 與 1 演化與初始化 (您的邏輯)
        // ==========================================
        function initPillar1Tiers() {
            const pillar = document.getElementById('pillar-1');
            pillar.innerHTML = ''; 
            for(let i = 0; i < 20; i++) {
                let d = document.createElement('div'); d.className = 'tier-dot';
                let pos = 100 - (i * (100 / 19)); let size = 1 + (i * (4 / 19)); 
                d.style.top = `calc(${pos}% - ${size/2}px)`; d.style.width = `${size}px`; d.style.height = `${size}px`; d.style.transform = `translateX(-50%)`; 
                pillar.appendChild(d);
            }
        }
        async function surgeEnergy() {
            const dots = document.querySelectorAll('#pillar-1 .tier-dot');
            for(let i = 0; i < 20; i++) {
                let d = dots[i]; d.style.background = '#fff'; d.style.boxShadow = '0 0 10px #fff, 0 0 20px #d4af37'; d.style.transform = `translateX(-50%) scale(1.5)`;
                setTimeout(() => { d.style.transform = `translateX(-50%) scale(1)`; d.style.background = 'rgba(243,229,171,0.6)'; d.style.boxShadow = '0 0 5px #d4af37'; }, 400);
                await sleep(200); 
            }
        }
        // 公用函數：繪製復原的幾何框線
        function drawGeometricPath(radius, count) {
            let g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            for(let j=0; j<count; j++) {
                let angle = (360 / count) * j;
                let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                let d = `M100 ${100-radius} C ${100+radius*0.4} ${100-radius*0.4}, ${100+radius*0.4} ${100+radius*0.4}, 100 ${100+radius} C ${100-radius*0.4} ${100+radius*0.4}, ${100-radius*0.4} ${100-radius*0.4}, 100 ${100-radius}`;
                path.setAttribute("d", d); path.setAttribute("transform", `rotate(${angle} 100 100)`); g.appendChild(path);
            } return g;
        }

        // ==========================================
        // 模組二：完整的華嚴大世界 3D 結構 (徹底復原 Turn 10，初始顯示)
        // ==========================================
        function buildFullHuayanWorld() {
            // 香水海圓環與星點與底座蓮花磚 (Geometric)
            const oceanRings = document.getElementById('ocean-rings');
            const geometricMandala = document.getElementById('base-mandala');
            const oceanDots = document.getElementById('ocean-dots');
            for(let i = 1; i <= 10; i++) {
                let radius = i * 9.5; let opacity = 1 - (i * 0.08); 
                let circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", "100"); circle.setAttribute("cy", "100"); circle.setAttribute("r", radius);
                circle.setAttribute("fill", "none"); circle.setAttribute("stroke", i % 2 === 0 ? `${cyanL}${opacity})` : `${goldL}${opacity})`);
                circle.setAttribute("stroke-width", "0.3"); circle.setAttribute("stroke-dasharray", i % 3 === 0 ? "2 8" : "none"); 
                oceanRings.appendChild(circle);
            }
            const tenOceanColors = ['255,235,160', '160,230,255', '255,200,220', '180,240,190', '220,190,240', '255,250,220', '170,250,230', '255,215,170', '200,210,255', '240,255,210'];
            for(let i = 0; i < 10; i++) {
                let angle = (Math.PI * 2 / 10) * i - (Math.PI / 2); let radius = 85.5; 
                let cx = 100 + Math.cos(angle) * radius; let cy = 100 + Math.sin(angle) * radius;
                let cRGB = tenOceanColors[i];
                let dotGroup = document.createElementNS("http://www.w3.org/2000/svg", "g"); dotGroup.classList.add("ocean-dot-animated"); dotGroup.style.transformOrigin = `${cx}px ${cy}px`; dotGroup.style.animationDelay = `${i * 0.5}s`;
                let glow = document.createElementNS("http://www.w3.org/2000/svg", "circle"); glow.setAttribute("cx", cx); glow.setAttribute("cy", cy); glow.setAttribute("r", "4.5"); glow.setAttribute("fill", `rgba(${cRGB},0.2)`); glow.setAttribute("stroke", `rgba(${cRGB},0.6)`); glow.setAttribute("stroke-width", "0.5");
                let dot = document.createElementNS("http://www.w3.org/2000/svg", "circle"); dot.setAttribute("cx", cx); dot.setAttribute("cy", cy); dot.setAttribute("r", "1.5"); dot.setAttribute("fill", "#fff");
                dotGroup.appendChild(glow); dotGroup.appendChild(dot); oceanDots.appendChild(dotGroup);
                if(i === 0) { // 文字
                    let text = document.createElementNS("http://www.w3.org/2000/svg", "text"); text.setAttribute("x", cx + 8); text.setAttribute("y", cy + 4); text.setAttribute("class", "sea-label"); text.textContent = "香水海"; dotGroup.appendChild(text); 
                }
            }
            // 💡 復原：底座蓮花磚幾何圖形框線 (使用 drawGeometricPath)
            geometricMandala.setAttribute("fill", "none"); geometricMandala.setAttribute("stroke-width", "0.5");
            let layer1 = drawGeometricPath(85, 10); layer1.setAttribute("stroke", `${cyanL}0.25)`); geometricMandala.appendChild(layer1);
            let layer2 = drawGeometricPath(55, 10); layer2.setAttribute("stroke", `${goldL}0.35)`); geometricMandala.appendChild(layer2);
            let layer3 = drawGeometricPath(30, 10); layer3.setAttribute("stroke", `${goldL}0.6)`); geometricMandala.appendChild(layer3);

            // 立體大蓮花 (復原 Turn 10，千葉層次)
            const standingLotus = document.getElementById('standing-lotus');
            function create3DPetal(angle, tiltX, w, h, opacityStop1, opacityStop2, strokeOp) {
                let petal = document.createElement('div'); petal.className = 'petal-3d';
                petal.style.transform = `rotateZ(${angle}deg) rotateX(${tiltX}deg)`; petal.style.width = `${w}px`; petal.style.height = `${h}px`; petal.style.left = `-${w/2}px`; petal.style.bottom = '0'; petal.style.transformOrigin = 'bottom center';
                petal.innerHTML = `<svg viewBox="0 0 120 320" class="petal-svg" preserveAspectRatio="none"><defs><linearGradient id="fadeG${angle}${w}" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(212,175,55, ${opacityStop1})" /><stop offset="60%" stop-color="rgba(243,229,171, ${opacityStop2})" /><stop offset="100%" stop-color="transparent" /></linearGradient></defs><path d="M 60 320 C 60 320, 0 180, 0 80 C 0 30, 60 0, 60 0 C 60 0, 120 30, 120 80 C 120 180, 60 320, 60 320 Z" fill="url(#fadeG${angle}${w})" stroke="rgba(212,175,55,${strokeOp})" stroke-width="1.2"/></svg>`;
                return petal;
            }
            for(let i=0; i<20; i++) standingLotus.appendChild(create3DPetal(i * 18, -20, 150, 380, 0.7, 0.3, 0.15));
            for(let i=0; i<10; i++) standingLotus.appendChild(create3DPetal((i * 36) + 18, -28, 120, 280, 0.9, 0.4, 0.25));
            for(let i=0; i<10; i++) standingLotus.appendChild(create3DPetal(i * 36, -40, 100, 210, 0.9, 0.4, 0.4));
            for(let i=0; i<10; i++) standingLotus.appendChild(create3DPetal((i * 36) + 18, -58, 60, 130, 0.9, 0.6, 0.7));

            // 世界塔 (復原 20 重)
            const tower = document.getElementById('world-tower');
            for(let i = 0; i < 20; i++) {
                let level = i + 1; let zHeight = level * 25; let radius = 20 + (level * 12); 
                let tierGroup = document.createElement('div'); tierGroup.className = 'tier-layer'; tierGroup.style.transform = `translateZ(${zHeight}px)`;
                let disk = document.createElement('div'); disk.className = 'tier-disk';
                disk.style.width = `${radius * 2}px`; disk.style.height = `${radius * 2}px`; disk.style.left = `-${radius}px`; disk.style.top = `-${radius}px`;  
                disk.style.borderColor = `rgba(230,200,100, 0.5)`; disk.style.backgroundColor = `rgba(230,200,100, 0.15)`; 
                if(i%2==0)disk.style.borderStyle = 'dashed'; // 點綴 dashed
                tierGroup.appendChild(disk); tower.appendChild(tierGroup);
            }
        }

        // ==========================================
        // 核心自動化時間軸：成、住、壞、空、重生
        // ==========================================
        async function runFeedbackDharmaEngine() {
            // 初始化
            buildFullHuayanWorld();
            initPillar1Tiers();

            const dot = document.getElementById('meditation-dot');
            const light = document.getElementById('infinite-light');
            const ring = document.getElementById('ring-0');
            const geometricGrowth = document.getElementById('growth-mandala');
            const geometricGrowthDiv = document.getElementById('geometric-growth');
            const pillar = document.getElementById('pillar-1');
            const huayanWorld = document.getElementById('huayan-world');

            // --- A-成 (0 與 1 的演化) ---
            await sleep(2000); // 極黑沉澱

            // 第 1 步修正：菩提小圓點亮起、呼吸並跳動
            dot.style.opacity = '1'; 
            dot.classList.add('breathing'); 
            await sleep(6000); 

            // 彌陀無量光爆發
            dot.classList.remove('breathing'); light.style.opacity = '1';
            await sleep(3000); 

            // 演化 0 (空)
            light.style.opacity = '0'; dot.style.opacity = '0';
            
            // 第 2 步修正：0 跳動 5 秒，生長幾何蓮花框線
            geometricGrowth.setAttribute("fill", "none"); geometricGrowth.setAttribute("stroke-width", "0.6");
            let grow1 = drawGeometricPath(85, 10); grow1.setAttribute("stroke", `${cyanL}0.2)`); geometricGrowth.appendChild(grow1);
            let grow2 = drawGeometricPath(55, 10); grow2.setAttribute("stroke", `${goldL}0.3)`); geometricGrowth.appendChild(grow2);
            let grow3 = drawGeometricPath(30, 10); grow3.setAttribute("stroke", `${goldL}0.5)`); geometricGrowth.appendChild(grow3);
            
            ring.style.transition = 'transform 5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 3s ease';
            ring.style.opacity = '1'; ring.style.transform = 'scale(1.5)';
            // 幾何框線同步浮現
            geometricGrowthDiv.style.transition = 'opacity 5s ease-in'; geometricGrowthDiv.style.opacity = '1';

            // 跳動 5 下 (對應 5 秒)
            for(let i = 0; i < 5; i++) {
                ring.style.transition = 'transform 0.2s ease-out'; ring.style.transform = 'scale(1.6)'; await sleep(200);
                ring.style.transition = 'transform 0.4s ease-in'; ring.style.transform = 'scale(1.5)'; await sleep(800);
            }
            await sleep(500); 

            // 0 收攝寂滅
            ring.style.transition = 'transform 3s cubic-bezier(0.5, 0, 0.8, 0.2), opacity 2.5s ease';
            ring.style.transform = 'scale(0.02)'; ring.style.opacity = '0';
            await sleep(3500); // 完全寂靜

            // 演化 1 (行)
            pillar.style.transition = 'transform 4.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 3s ease';
            pillar.style.opacity = '1'; pillar.style.transform = 'scale(1.5)';
            await sleep(3500); 
            await surgeEnergy(); // 能量攀升
            await sleep(2000);
            pillar.style.transition = 'transform 3.5s cubic-bezier(0.5, 0, 0.8, 0.2), opacity 3s ease';
            pillar.style.transform = 'scale(0.02)'; pillar.style.opacity = '0';
            await sleep(4000); // 完全歸於寂滅 (0+1 融合)

            // --- B-住 (融合化現完整的華嚴世界) ---
            huayanWorld.style.display = 'block';
            await sleep(100);
            huayanWorld.style.opacity = '1';
            
            // ✨ 極致觀想沉浸 10 秒 ✨
            await sleep(10000); 

            // --- C-壞與空 (金光昇華：大量的融化，不晃動) ---
            // 第 4 步修正：不要震動
            // document.body.classList.add('shake-active'); // 移除

            const goldenFlash = document.getElementById('golden-flash');
            goldenFlash.style.opacity = '1'; // 瞬間注滿銀幕金光

            // 華嚴圖案曝光消融，從底部開始
            const allPieces = document.querySelectorAll('.petal-3d, .tier-layer, .ocean-dot-animated, .sea-label, .central-beam, .full-svg-glow');
            
            // 將圖形依照大略的底部到頂部 Z 軸排序，進行次第消融
            const sortedPieces = Array.from(allPieces).sort((a, b) => {
                let zA = a.style.transform ? parseInt(a.style.transform.match(/translateZ\((\d+)px\)/)?.[1] || 0) : 0;
                let zB = b.style.transform ? parseInt(b.style.transform.match(/translateZ\((\d+)px\)/)?.[1] || 0) : 0;
                return zA - zB;
            });

            // 💡 底部向上次第融化昇華不見 (brightness 吞噬 + 化成點)
            sortedPieces.forEach((piece, index) => {
                setTimeout(() => {
                    // 第 4 步修正：化成點、昇華、亮度極大化吞噬
                    piece.style.transition = 'opacity 1.8s ease, filter 1s ease, transform 2s ease-in';
                    piece.style.filter = 'brightness(5) blur(1px) drop-shadow(0 0 50px #fff)'; 
                    piece.style.opacity = '0';
                    piece.style.transform += ' scale(0.9) translateY(-100px)'; // 向上昇華感
                }, index * 20); // 次第延遲，造成底部向上的效果
            });

            // 大迴向飛昇金粉 (加強煙燻向上薰陶效果)
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight * 0.7; // 從更下方噴發

            for(let i = 0; i < 200; i++) {
                let dust = document.createElement('div'); 
                dust.style.position = 'fixed'; 
                dust.style.background = Math.random() > 0.3 ? 'var(--gold)' : '#fff';
                dust.style.borderRadius = '50%'; dust.style.pointerEvents = 'none';
                dust.style.filter = 'drop-shadow(0 0 10px var(--solid-gold))'; dust.style.zIndex = '99999';
                
                // 更廣泛的底部散布
                let startX = centerX + (Math.random() - 0.5) * window.innerWidth * 1.2; 
                let startY = centerY + (Math.random() - 0.5) * window.innerHeight * 0.4;
                dust.style.left = startX + 'px'; 
                dust.style.top = startY + 'px';
                
                let size = Math.random() * 4 + 1.5; dust.style.width = size + 'px'; dust.style.height = size + 'px';
                document.body.appendChild(dust); 
                
                // ✨ 燻陶往上升效果 (更細膩、更向上)
                dust.animate([
                    { opacity: 1, transform: `translate(0, 0) scale(1)` },
                    { opacity: 0, transform: `translate(${(Math.random() - 0.5) * 200}px, ${-(Math.random() * 900 + 400)}px) scale(0)` }
                ], { 
                    duration: Math.random() * 3000 + 2500, // 緩慢上升
                    easing: 'ease-out', 
                    fill: 'forwards' 
                });
                setTimeout(() => dust.remove(), 5600);
            }

            // 結束震盪 (原本就移除了shake，這裡保持)
            await sleep(1000);
            goldenFlash.style.transition = 'opacity 3.5s ease-in'; // 金光慢慢退去
            goldenFlash.style.opacity = '0';
            
            await sleep(3500); // 等待消融完畢
            huayanWorld.style.display = 'none'; // 淨空

            // --- C-重生 (菩提心歷劫不滅) ---
            const immortalScene = document.getElementById('immortal-scene');
            const immortalDot = document.getElementById('immortal-dot');
            const profoundText = document.getElementById('profound-text');
            
            immortalScene.style.display = 'flex'; // 進入重生場景
            await sleep(2000); 
            
            immortalDot.style.opacity = '1'; // 最初的菩提小圓點亮起
            await sleep(4000);
            profoundText.style.opacity = '1'; // 字幕浮現

            // 留給行者最後的觀想與參悟時間
            await sleep(8000);
            
            // 💡 第 3 步跳轉修正：回歸原本的華嚴世界頁面
            console.log("【一真法界回饋圓滿】自動跳轉回主畫面 (菩提心永不滅)");
            // window.location.href = 'index.html'; // 這裡填寫您的華嚴世界的 URL
        }

        // 當所有元素載入完成，啟動引擎
        window.addEventListener('load', runFeedbackDharmaEngine);

    </script>
