<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系統 ． 一真法界 (圓滿回饋)</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; --bg-deep: #000; }
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: var(--bg-deep); color: #fff; display: flex; justify-content: center; align-items: center; -webkit-tap-highlight-color: transparent; user-select: none; perspective: 2000px; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }

        /* ======= 1 & 5. 菩提明點：純金 + 停留跳動 ======= */
        .bodhi-seed {
            position: absolute; width: 14px; height: 14px; background: var(--gold); border-radius: 50%; z-index: 100; opacity: 0;
        }
        .intense-pulse { animation: pure-light 4s forwards; }
        @keyframes pure-light {
            0% { transform: scale(0.5); opacity: 0; box-shadow: 0 0 10px var(--gold); }
            10% { transform: scale(1.6); opacity: 1; box-shadow: 0 0 40px var(--gold), 0 0 100px var(--solid-gold); }
            25% { transform: scale(1.3); box-shadow: 0 0 20px var(--gold), 0 0 50px var(--solid-gold); }
            40% { transform: scale(1.8); box-shadow: 0 0 60px var(--gold), 0 0 120px var(--solid-gold), 0 0 150px #fff; }
            55% { transform: scale(1.3); box-shadow: 0 0 20px var(--gold), 0 0 50px var(--solid-gold); }
            70% { transform: scale(1.8); box-shadow: 0 0 60px var(--gold), 0 0 120px var(--solid-gold), 0 0 150px #fff; }
            85% { transform: scale(1.6); opacity: 1; box-shadow: 0 0 40px var(--gold), 0 0 100px var(--solid-gold); }
            100% { transform: scale(0.5); opacity: 0; box-shadow: 0 0 10px var(--gold); }
        }

        #infinite-light { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(243,229,171,0.9) 40%, rgba(212,175,55,0.8) 100%); mix-blend-mode: screen; opacity: 0; pointer-events: none; transition: opacity 3s; z-index: 20; }

        /* ======= 2. 0 的神聖光暈與幾何畫布 ======= */
        #ring-0 {
            position: absolute; width: 40vmin; height: 40vmin; border-radius: 50%;
            border: 2px solid rgba(243,229,171,0.8);
            box-shadow: 0 0 75px rgba(212,175,55,0.7), inset 0 0 45px rgba(212,175,55,0.5);
            opacity: 0; transform: scale(0.5); z-index: 15; will-change: transform, opacity;
        }
        #growth-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0;
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.6));
        }
        .draw-path {
            stroke-dasharray: 1000; stroke-dashoffset: 1000; fill-opacity: 0;
            animation: stroke-draw 5s forwards linear, color-fade 2s 3s forwards ease-in;
        }
        @keyframes stroke-draw { to { stroke-dashoffset: 0; } }
        @keyframes color-fade { to { fill-opacity: 1; } }

        /* ======= 3. 行菩提 1 ======= */
        #pillar-1 {
            position: absolute; width: 6px; height: 50vmin; 
            background: linear-gradient(to top, rgba(255,255,255,0.6) 0%, rgba(212,175,55,1) 40%, rgba(184,134,11,1) 75%, rgba(100,50,0,0.9) 100%); 
            box-shadow: 0 0 50px var(--solid-gold), 0 0 100px rgba(212,175,55,1), 0 0 200px rgba(255,255,255,0.5), inset 0 0 15px #fff; 
            border-radius: 3px; opacity: 0; transform: scale(0.5); z-index: 15; will-change: transform, opacity;
        }
        .tier-dot { position: absolute; left: 50%; background: rgba(243,229,171,0.5); border-radius: 50%; box-shadow: 0 0 8px rgba(212,175,55,0.6); transition: all 0.5s; }

        /* ======= 華嚴大世界 3D ======= */
        #huayan-world { position: absolute; inset: 0; opacity: 0; display: none; transition: opacity 4s; z-index: 5; }
        .vairocana-light { position: absolute; inset: 0; background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.08) 0%, rgba(212,175,55,0.02) 40%, transparent 80%); animation: divine-breath 12s infinite alternate ease-in-out; pointer-events: none; }
        @keyframes divine-breath { 0% { opacity: 0.5; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }
        #universe-container { position: absolute; inset: 0; transform-style: preserve-3d; transform: rotateX(75deg) scale(0.85); will-change: transform; }
        #lotus-ocean { position: absolute; top: 65%; left: 50%; transform-style: preserve-3d; animation: slow-spin 60s infinite linear; }
        @keyframes slow-spin { from { transform: rotateZ(0deg); } to { transform: rotateZ(360deg); } }
        .full-svg-glow { position: absolute; width: 1200px; height: 1200px; left: -600px; top: -600px; filter: drop-shadow(0 0 15px rgba(212,175,55,0.15)); }
        .ocean-dot-animated { transform-origin: center; animation: ocean-breathe 6s infinite alternate ease-in-out; }
        @keyframes ocean-breathe { 0% { transform: scale(1.4); opacity: 0.3; } 100% { transform: scale(4.0); opacity: 0.9; filter: drop-shadow(0 0 20px rgba(255,255,255,0.9)); } }
        .sea-label { font-size: 6px; fill: rgba(243,229,171,0.9); letter-spacing: 3px; font-weight: bold; text-shadow: 0 0 8px #000, 0 0 10px rgba(212,175,55,0.9); animation: text-pulse 4s infinite alternate ease-in-out; }
        @keyframes text-pulse { 0% { opacity: 0.4; } 100% { opacity: 1; filter: drop-shadow(0 0 5px var(--gold)); } }
        #standing-lotus { position: absolute; top: 0; left: 0; transform-style: preserve-3d; z-index: 2; }
        .petal-3d { position: absolute; bottom: 0; transform-origin: bottom center; transform-style: preserve-3d; pointer-events: none; }
        .petal-svg { width: 100%; height: 100%; overflow: visible; }
        #world-tower { position: absolute; top: 0; left: 0; transform-style: preserve-3d; z-index: 10; }
        .central-beam { position: absolute; top: 0; left: -1px; width: 2px; height: 550px; background: linear-gradient(to bottom, rgba(255,255,255,0.8) 0%, rgba(212,175,55,0.8) 30%, rgba(139,168,156,0.3) 100%); box-shadow: 0 0 20px rgba(212,175,55,0.5); transform-origin: top center; transform: rotateX(90deg); pointer-events: none; }
        .tier-layer { position: absolute; top: 0; left: 0; transform-style: preserve-3d; pointer-events: none; }
        .tier-disk { position: absolute; border-radius: 50%; border-width: 1.5px; border-style: solid; border-color: rgba(230,200,100, 0.5); background-color: rgba(230,200,100, 0.15); transform-style: preserve-3d; }

        /* ======= 4. 終極昇華：極致純黑無極限吞噬 + 滿版雙閃金光 ======= */
        #infinite-black-hole {
            position: fixed; top: 50%; left: 50%; 
            width: 5vh; height: 5vh; margin-top: -2.5vh; margin-left: -2.5vh;
            border-radius: 50%; z-index: 9990; pointer-events: none; 
            /* 💡 純黑，無框，無漸層 */
            background: #000; 
            transform: scale(0);
        }
        /* 💡 1秒內極速放大到無限大 (300倍保證覆蓋所有螢幕邊界) */
        .swallow-infinite { animation: expand-to-void 1s forwards cubic-bezier(0.8, 0, 0.2, 1); }
        @keyframes expand-to-void {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(300); opacity: 1; } 
        }
        
        #golden-flash { position: fixed; inset: 0; background: rgba(255, 235, 160, 1); mix-blend-mode: screen; opacity: 0; z-index: 99998; pointer-events: none; }
        .seed-particle { position: fixed; background: var(--gold); border-radius: 50%; pointer-events: none; filter: drop-shadow(0 0 6px #fff); z-index: 99999; }

        /* ======= 重生 ======= */
        #immortal-scene { position: fixed; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; background: #000; }
        #profound-text { margin-top: 60px; color: var(--gold); font-size: 1.2rem; letter-spacing: 12px; opacity: 0; transition: opacity 4s; text-shadow: 0 0 15px var(--solid-gold); text-align: center; line-height: 2.5; font-weight: bold; }
    </style>
</head>
<body>

    <div id="bodhi-dot" class="bodhi-seed"></div>
    <div id="infinite-light"></div>
    
    <div id="ring-0">
        <svg id="growth-canvas" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <g id="draw-layer" stroke-width="0.8"></g>
        </svg>
    </div>
    
    <div id="pillar-1"></div>

    <div id="huayan-world">
        <div class="vairocana-light"></div>
        <div id="universe-container">
            <div id="lotus-ocean">
                <svg class="full-svg-glow" viewBox="0 0 200 200" id="ocean-svg" xmlns="http://www.w3.org/2000/svg">
                    <g id="ocean-rings"></g>
                    <g id="ocean-dots"></g>
                    <g id="base-mandala"></g>
                </svg>
                <div id="standing-lotus"></div>
                <div id="world-tower"><div class="central-beam"></div></div>
            </div>
        </div>
    </div>

    <div id="infinite-black-hole"></div>

    <div id="golden-flash"></div>
    <div id="immortal-scene">
        <div id="immortal-dot" class="bodhi-seed"></div>
        <div id="profound-text">菩提之心 ． 歷劫不滅<br>一真法界 ． 本自如如</div>
    </div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
        const goldL = "rgba(212,175,55,"; const cyanL = "rgba(139,168,156,";

        // ==========================================
        // 核心：畫筆生長邏輯
        // ==========================================
        function addGrowthPath(radius, count, strokeColor, fillColor) {
            const layer = document.getElementById('draw-layer');
            let g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            for(let j=0; j<count; j++) {
                let angle = (360 / count) * j;
                let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                let d = `M100 ${100-radius} C ${100+radius*0.5} ${100-radius*0.3}, ${100+radius*0.5} ${100+radius*0.3}, 100 ${100+radius} C ${100-radius*0.5} ${100+radius*0.3}, ${100-radius*0.5} ${100-radius*0.3}, 100 ${100-radius}`;
                path.setAttribute("d", d); 
                path.setAttribute("transform", `rotate(${angle} 100 100)`);
                path.setAttribute("stroke", strokeColor);
                path.setAttribute("fill", fillColor); 
                path.classList.add("draw-path");
                g.appendChild(path);
            } 
            layer.appendChild(g);
        }

        // ==========================================
        // 構建華嚴大世界 
        // ==========================================
        function buildFullHuayanWorld() {
            const oceanRings = document.getElementById('ocean-rings');
            const geometricMandala = document.getElementById('base-mandala');
            const oceanDots = document.getElementById('ocean-dots');
            for(let i = 1; i <= 10; i++) {
                let radius = i * 9.5; let opacity = 1 - (i * 0.08); 
                let circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", "100"); circle.setAttribute("cy", "100"); circle.setAttribute("r", radius);
                circle.setAttribute("fill", "none"); circle.setAttribute("stroke", i % 2 === 0 ? `${cyanL}${opacity})` : `${goldL}${opacity})`);
                circle.setAttribute("stroke-width", "0.3"); circle.setAttribute("stroke-dasharray", i % 3 === 0 ? "2 8" : "none"); 
                oceanRings.appendChild(circle);
            }
            const tenOceanColors = ['255,235,160', '160,230,255', '255,200,220', '180,240,190', '220,190,240', '255,250,220', '170,250,230', '255,215,170', '200,210,255', '240,255,210'];
            for(let i = 0; i < 10; i++) {
                let angle = (Math.PI * 2 / 10) * i - (Math.PI / 2); let radius = 85.5; 
                let cx = 100 + Math.cos(angle) * radius; let cy = 100 + Math.sin(angle) * radius;
                let cRGB = tenOceanColors[i];
                let dotGroup = document.createElementNS("http://www.w3.org/2000/svg", "g"); dotGroup.classList.add("ocean-dot-animated"); dotGroup.style.transformOrigin = `${cx}px ${cy}px`; dotGroup.style.animationDelay = `${i * 0.5}s`;
                let glow = document.createElementNS("http://www.w3.org/2000/svg", "circle"); glow.setAttribute("cx", cx); glow.setAttribute("cy", cy); glow.setAttribute("r", "4.5"); glow.setAttribute("fill", `rgba(${cRGB},0.2)`); glow.setAttribute("stroke", `rgba(${cRGB},0.6)`); glow.setAttribute("stroke-width", "0.5");
                let dot = document.createElementNS("http://www.w3.org/2000/svg", "circle"); dot.setAttribute("cx", cx); dot.setAttribute("cy", cy); dot.setAttribute("r", "1.5"); dot.setAttribute("fill", "#fff");
                dotGroup.appendChild(glow); dotGroup.appendChild(dot); oceanDots.appendChild(dotGroup);
                if(i === 0) { let text = document.createElementNS("http://www.w3.org/2000/svg", "text"); text.setAttribute("x", cx + 8); text.setAttribute("y", cy + 4); text.setAttribute("class", "sea-label"); text.textContent = "香水海"; dotGroup.appendChild(text); }
            }
            
            geometricMandala.setAttribute("fill", "none"); geometricMandala.setAttribute("stroke-width", "0.5");
            const drawStatic = (r, cnt, col) => {
                let g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                for(let j=0; j<cnt; j++) { let angle = (360/cnt)*j; let path = document.createElementNS("http://www.w3.org/2000/svg", "path"); path.setAttribute("d", `M100 ${100-r} C ${100+r*0.4} ${100-r*0.4}, ${100+r*0.4} ${100+r*0.4}, 100 ${100+r} C ${100-r*0.4} ${100+r*0.4}, ${100-r*0.4} ${100-r*0.4}, 100 ${100-r}`); path.setAttribute("transform", `rotate(${angle} 100 100)`); path.setAttribute("stroke", col); g.appendChild(path); } return g;
            };
            geometricMandala.appendChild(drawStatic(85, 10, `${cyanL}0.25)`));
            geometricMandala.appendChild(drawStatic(55, 10, `${goldL}0.35)`));
            geometricMandala.appendChild(drawStatic(30, 10, `${goldL}0.6)`));

            const standingLotus = document.getElementById('standing-lotus');
            function create3DPetal(angle, tiltX, w, h, opacityStop1, opacityStop2, strokeOp) {
                let petal = document.createElement('div'); petal.className = 'petal-3d';
                petal.style.transform = `rotateZ(${angle}deg) rotateX(${tiltX}deg)`; petal.style.width = `${w}px`; petal.style.height = `${h}px`; petal.style.left = `-${w/2}px`; 
                petal.innerHTML = `<svg viewBox="0 0 120 320" class="petal-svg" preserveAspectRatio="none"><defs><linearGradient id="fadeG${angle}${w}" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(212,175,55, ${opacityStop1})" /><stop offset="60%" stop-color="rgba(243,229,171, ${opacityStop2})" /><stop offset="100%" stop-color="transparent" /></linearGradient></defs><path d="M 60 320 C 60 320, 0 180, 0 80 C 0 30, 60 0, 60 0 C 60 0, 120 30, 120 80 C 120 180, 60 320, 60 320 Z" fill="url(#fadeG${angle}${w})" stroke="rgba(212,175,55,${strokeOp})" stroke-width="1.2"/></svg>`;
                return petal;
            }
            for(let i=0; i<20; i++) standingLotus.appendChild(create3DPetal(i * 18, -20, 150, 380, 0.7, 0.3, 0.15));
            for(let i=0; i<10; i++) standingLotus.appendChild(create3DPetal((i * 36) + 18, -28, 120, 280, 0.9, 0.4, 0.25));
            for(let i=0; i<10; i++) standingLotus.appendChild(create3DPetal(i * 36, -40, 100, 210, 0.9, 0.4, 0.4));
            for(let i=0; i<10; i++) standingLotus.appendChild(create3DPetal((i * 36) + 18, -58, 60, 130, 0.9, 0.6, 0.7));

            const tower = document.getElementById('world-tower');
            for(let i = 0; i < 20; i++) {
                let level = i + 1; let zHeight = level * 25; let radius = 20 + (level * 12); 
                let tierGroup = document.createElement('div'); tierGroup.className = 'tier-layer'; tierGroup.style.transform = `translateZ(${zHeight}px)`;
                let disk = document.createElement('div'); disk.className = 'tier-disk';
                disk.style.width = `${radius * 2}px`; disk.style.height = `${radius * 2}px`; disk.style.left = `-${radius}px`; disk.style.top = `-${radius}px`;  
                disk.style.borderColor = `rgba(230,200,100, 0.5)`; disk.style.backgroundColor = `rgba(230,200,100, 0.15)`; 
                if(i%2==0)disk.style.borderStyle = 'dashed'; 
                tierGroup.appendChild(disk); tower.appendChild(tierGroup);
            }
        }

        function initPillar1Tiers() {
            const pillar = document.getElementById('pillar-1'); pillar.innerHTML = ''; 
            for(let i = 0; i < 20; i++) {
                let d = document.createElement('div'); d.className = 'tier-dot';
                let pos = 100 - (i * (100 / 19)); let size = 1 + (i * (4 / 19)); 
                d.style.top = `calc(${pos}% - ${size/2}px)`; d.style.width = `${size}px`; d.style.height = `${size}px`; d.style.transform = `translateX(-50%)`; 
                pillar.appendChild(d);
            }
        }
        async function surgeEnergy() {
            const dots = document.querySelectorAll('#pillar-1 .tier-dot');
            for(let i = 0; i < 20; i++) {
                let d = dots[i]; d.style.background = '#fff'; d.style.boxShadow = '0 0 10px #fff, 0 0 20px #d4af37'; d.style.transform = `translateX(-50%) scale(1.5)`;
                setTimeout(() => { d.style.transform = `translateX(-50%) scale(1)`; d.style.background = 'rgba(243,229,171,0.6)'; d.style.boxShadow = '0 0 5px #d4af37'; }, 400);
                await sleep(200); 
            }
        }

        // ==========================================
        // 終極全自動引擎
        // ==========================================
        async function runFeedbackDharmaEngine() {
            buildFullHuayanWorld();
            initPillar1Tiers();

            const dot = document.getElementById('bodhi-dot');
            const light = document.getElementById('infinite-light');
            const ring = document.getElementById('ring-0');
            const canvas = document.getElementById('growth-canvas');
            const pillar = document.getElementById('pillar-1');
            const huayanWorld = document.getElementById('huayan-world');

            // --- 1. 菩提心律動 ---
            await sleep(1500);
            dot.classList.add('intense-pulse');
            await sleep(4000); 

            // 無量光爆發
            dot.classList.remove('intense-pulse'); light.style.opacity = '1';
            await sleep(3000); 
            light.style.opacity = '0'; 
            
            // --- 2. 0 的緩慢出現 ---
            ring.style.transition = 'transform 6s ease-out, opacity 3s ease';
            ring.style.opacity = '1'; 
            ring.style.transform = 'scale(1.2)'; 
            await sleep(6000); 

            // --- 3. 0 的 5 秒心跳與「幾何上色生長」 ---
            canvas.style.opacity = '1';
            addGrowthPath(95, 12, `${cyanL}0.8)`, `${cyanL}0.15)`);
            addGrowthPath(65, 10, `${goldL}0.9)`, `${goldL}0.2)`);
            addGrowthPath(35, 10, `rgba(255,255,255,0.8)`, `rgba(255,255,255,0.3)`);
            
            for(let i = 0; i < 5; i++) {
                ring.style.transition = 'transform 0.15s cubic-bezier(0.1, 0.9, 0.2, 1)'; 
                ring.style.transform = 'scale(1.35)'; 
                await sleep(150);
                ring.style.transition = 'transform 0.85s ease-in'; 
                ring.style.transform = 'scale(1.2)'; 
                await sleep(850);
            }

            ring.style.transition = 'transform 2.5s cubic-bezier(0.5, 0, 1, 0.2), opacity 2s ease';
            ring.style.transform = 'scale(0.01)'; ring.style.opacity = '0';
            await sleep(3000); 

            // --- 4. 1 的演化 ---
            pillar.style.transition = 'transform 4s ease-out, opacity 2s ease';
            pillar.style.opacity = '1'; pillar.style.transform = 'scale(1.5)';
            await sleep(3000); 
            await surgeEnergy();
            await sleep(1500);
            pillar.style.transition = 'transform 3s cubic-bezier(0.5, 0, 0.8, 0.2), opacity 2s ease';
            pillar.style.transform = 'scale(0.01)'; pillar.style.opacity = '0';
            await sleep(3500); 

            // --- 5. 住：華嚴大世界 ---
            huayanWorld.style.display = 'block';
            await sleep(100); huayanWorld.style.opacity = '1';
            await sleep(10000); 

            // --- 6. 壞與空：純黑極速吞噬 + 滿版雙閃金光 ---
            
            // 💡 噴發 500 顆種子
            for(let i = 0; i < 500; i++) {
                let dust = document.createElement('div'); 
                dust.className = 'seed-particle';
                dust.style.background = Math.random() > 0.4 ? 'var(--gold)' : '#fff';
                let startX = Math.random() * window.innerWidth; 
                let startY = window.innerHeight * 0.9 - Math.random() * window.innerHeight * 0.5; 
                dust.style.left = startX + 'px'; dust.style.top = startY + 'px';
                let size = Math.random() * 4 + 1.5; dust.style.width = size + 'px'; dust.style.height = size + 'px';
                document.body.appendChild(dust); 
                
                dust.animate([
                    { opacity: 1, transform: `translate(0, 0) scale(${Math.random() + 0.5})` },
                    { opacity: 0, transform: `translate(${(Math.random() - 0.5) * 150}px, -${Math.random() * 800 + 400}px) scale(0)` }
                ], { duration: Math.random() * 4000 + 2000, easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)', fill: 'forwards' });
                setTimeout(() => dust.remove(), 6500);
            }

            await sleep(800); // 讓種子先飛起一會兒

            // 💡 純黑洞極速爆發，無金框，無極限放大吃掉畫面
            const blackHole = document.getElementById('infinite-black-hole');
            blackHole.classList.add('swallow-infinite');

            // 等待黑洞 1 秒內覆蓋整個銀幕
            await sleep(1000); 

            // 趁畫面被純黑覆蓋，將背後的華嚴世界淨空
            huayanWorld.style.display = 'none'; 
            
            // 在純黑虛空中，行者只見滿天種子飛昇，沉澱感受寂滅
            await sleep(1500); 
            
            const goldenFlash = document.getElementById('golden-flash');
            
            // 💡 第一次短促強光劈開黑暗
            goldenFlash.style.transition = 'opacity 0.1s ease-out'; goldenFlash.style.opacity = '1'; 
            await sleep(150); 
            goldenFlash.style.transition = 'opacity 0.2s ease-in'; goldenFlash.style.opacity = '0';
            await sleep(250); 

            // 💡 第二次滿版強光
            goldenFlash.style.transition = 'opacity 0.1s ease-out'; goldenFlash.style.opacity = '1'; 
            await sleep(150);
            
            // 💡 金光緩慢退去，真正歸於虛空
            goldenFlash.style.transition = 'opacity 4s ease-in'; goldenFlash.style.opacity = '0';
            await sleep(4500); 

            // --- 7. 重生：不滅的菩提心 (同步步驟 1) ---
            const immortalScene = document.getElementById('immortal-scene');
            const immortalDot = document.getElementById('immortal-dot');
