<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏法界 ‧ 莊嚴無相向量金身</title>
    <style>
        :root {
            --bg-deep: #010103; 
            --gold-bright: #ffec8b;
            --gold-main: #d4af37;
            --gold-dark: #8b6508;
            --glow-color: rgba(255, 236, 139, 0.5);
        }
        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            background-image: radial-gradient(circle at 50% 40%, #1a1505 0%, #010103 70%);
            color: #fff; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; touch-action: none; user-select: none;
        }
        
        #buddha-container {
            width: 100%;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 5vh;
        }

        svg {
            width: 100%;
            max-width: 600px; /* 控制比例，使其修長莊嚴 */
            height: 100%;
        }

        /* 頂禮專用的微光呼吸 */
        .holy-glow {
            filter: drop-shadow(0 0 15px var(--glow-color));
            animation: breathGlow 4s infinite alternate ease-in-out;
        }
        @keyframes breathGlow {
            0% { filter: drop-shadow(0 0 10px rgba(255,236,139,0.3)); transform: translateY(0px); }
            100% { filter: drop-shadow(0 0 25px rgba(255,236,139,0.7)); transform: translateY(-3px); }
        }

        /* 底部 UI */
        #ui-layer {
            height: 15vh;
            text-align: center;
            z-index: 10;
        }
        .hint-text {
            color: var(--gold-bright); font-size: 0.9rem; letter-spacing: 4px; 
            margin-bottom: 10px; opacity: 0.8;
        }
        .title-text {
            color: var(--gold-main); font-size: 1.3rem; font-weight: bold; letter-spacing: 6px;
            text-shadow: 0 0 15px rgba(212,175,55,0.8);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="buddha-container">
        <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="cylinderGold" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#553300" />
                    <stop offset="15%" stop-color="#f3e5ab" />
                    <stop offset="45%" stop-color="#b8860b" />
                    <stop offset="50%" stop-color="#8b6508" />
                    <stop offset="80%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="#442200" />
                </linearGradient>

                <linearGradient id="smoothGold" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#aa7700" />
                    <stop offset="50%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="#664400" />
                </linearGradient>

                <linearGradient id="petalGold" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="#442200" />
                    <stop offset="40%" stop-color="#d4af37" />
                    <stop offset="100%" stop-color="#fff8dc" />
                </linearGradient>

                <g id="sharp-petal">
                    <path d="M 0 0 Q 25 -40 0 -100 Q -25 -40 0 0 Z" fill="url(#petalGold)" stroke="#fff8dc" stroke-width="1.5" stroke-linejoin="miter"/>
                </g>
                <g id="sharp-petal-side">
                    <path d="M 0 0 Q 20 -30 15 -70 Q -10 -30 0 0 Z" fill="url(#petalGold)" stroke="#fff8dc" stroke-width="1"/>
                </g>
            </defs>

            <circle cx="500" cy="400" r="280" fill="radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%)" />

            <g class="holy-glow">
                
                <path d="M 410 280 C 410 260, 590 260, 590 280 L 590 750 C 590 770, 410 770, 410 750 Z" fill="url(#cylinderGold)" />

                <g fill="none" stroke="#fff8dc" stroke-width="2" opacity="0.7">
                    <path d="M 410 330 Q 500 360 590 330" />
                    <path d="M 410 400 Q 500 440 590 400" />
                    <path d="M 410 470 Q 500 520 590 470" />
                    <path d="M 410 540 Q 500 600 590 540" />
                    <path d="M 410 610 Q 500 680 590 610" />
                    <path d="M 410 680 Q 500 760 590 680" />
                </g>
                <path d="M 425 270 L 425 760" stroke="#fff" stroke-width="1.5" opacity="0.5" fill="none"/>
                <path d="M 575 270 L 575 760" stroke="#fff" stroke-width="1.5" opacity="0.5" fill="none"/>

                <path d="M 395 290 C 370 330, 370 500, 395 560 C 410 550, 420 520, 405 500 L 410 290 Z" fill="url(#smoothGold)" />
                <circle cx="395" cy="565" r="10" fill="url(#smoothGold)" /> <path d="M 605 290 C 630 330, 640 450, 610 500 C 590 510, 570 480, 585 460 L 590 290 Z" fill="url(#smoothGold)" />
                <circle cx="598" cy="495" r="12" fill="url(#smoothGold)" /> <rect x="475" y="240" width="50" height="35" fill="url(#cylinderGold)" />
                <path d="M 475 270 Q 500 280 525 270" fill="none" stroke="#8b6508" stroke-width="3"/> <ellipse cx="460" cy="215" rx="5" ry="18" fill="url(#smoothGold)" />
                <circle cx="460" cy="235" r="4" fill="#d4af37" />
                <ellipse cx="540" cy="215" rx="5" ry="18" fill="url(#smoothGold)" />
                <circle cx="540" cy="235" r="4" fill="#d4af37" />

                <ellipse cx="500" cy="185" rx="42" ry="60" fill="url(#smoothGold)" />

                <path d="M 480 135 C 480 100, 520 100, 520 135 Z" fill="url(#smoothGold)" />
                <circle cx="500" cy="110" r="5" fill="#221100" />

            </g>

            <g id="lotus-base" transform="translate(0, 800)">
                <path d="M 350 20 L 650 20 L 630 35 L 370 35 Z" fill="#b8860b" stroke="#fff8dc" stroke-width="1"/>
                <ellipse cx="500" cy="20" rx="150" ry="8" fill="#553300" stroke="#d4af37" stroke-width="2"/>
                <path d="M 480 35 L 520 35 L 500 50 Z" fill="#fff8dc" />

                <ellipse cx="500" cy="-35" rx="90" ry="15" fill="#331a00" stroke="#d4af37" stroke-width="1.5"/>

                <use href="#sharp-petal" x="500" y="-25" transform="rotate(-60 500 -25)" />
                <use href="#sharp-petal" x="500" y="-25" transform="rotate(60 500 -25)" />
                <use href="#sharp-petal" x="500" y="-25" transform="rotate(-40 500 -25)" />
                <use href="#sharp-petal" x="500" y="-25" transform="rotate(40 500 -25)" />

                <use href="#sharp-petal" x="500" y="-15" transform="scale(0.9) rotate(-25 555 -15)" />
                <use href="#sharp-petal" x="500" y="-15" transform="scale(0.9) rotate(25 555 -15)" />

                <use href="#sharp-petal-side" x="420" y="-5" transform="rotate(-15 420 -5)" />
                <use href="#sharp-petal-side" x="580" y="-5" transform="scale(-1, 1) translate(-1160, 0) rotate(-15 580 -5)" />

                <use href="#sharp-petal" x="500" y="-5" transform="scale(0.85) rotate(0 588 -5)" />
            </g>

        </svg>
    </div>
    
    <div id="ui-layer">
        <div class="hint-text">輕 按 合 十</div>
        <div class="title-text">常 寂 光 ‧ 彌 陀 金 身</div>
    </div>

</body>
</html>
