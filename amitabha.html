<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏法界 ‧ 站立接引無相金身</title>
    <style>
        :root {
            --bg-deep: #010103; 
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --cyan: #8ba89c;
        }
        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            background-image: radial-gradient(circle at 50% 50%, #1a1505 0%, #010103 80%);
            color: #fff; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; touch-action: none; user-select: none;
        }
        
        /* 讓 SVG 自適應螢幕大小 */
        #buddha-container {
            width: 100%;
            height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            max-width: 800px;
            height: 100%;
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.2));
        }

        /* 佛光呼吸動畫 */
        .halo-breath {
            transform-origin: center;
            animation: breathGlow 6s infinite alternate ease-in-out;
        }
        @keyframes breathGlow {
            0% { transform: scale(0.95); opacity: 0.5; }
            100% { transform: scale(1.05); opacity: 0.8; }
        }

        /* 蓮花座微光 */
        .lotus-glow {
            filter: drop-shadow(0 0 8px rgba(243,229,171,0.4));
        }

        /* 底部 UI 介面 */
        #ui-layer {
            height: 15vh;
            text-align: center;
            z-index: 10;
        }
        .hint-text {
            color: var(--gold-light); font-size: 0.85rem; letter-spacing: 3px; 
            margin-bottom: 8px; opacity: 0.8;
        }
        .title-text {
            color: var(--gold); font-size: 1.2rem; font-weight: bold; letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(212,175,55,0.6);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="buddha-container">
        <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="metalGold" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#8b6508" />
                    <stop offset="20%" stop-color="#daa520" />
                    <stop offset="40%" stop-color="#fff8dc" /> <stop offset="65%" stop-color="#d4af37" />
                    <stop offset="85%" stop-color="#b8860b" />
                    <stop offset="100%" stop-color="#553300" />
                </linearGradient>

                <linearGradient id="brightGold" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#daa520" />
                    <stop offset="50%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="#8b6508" />
                </linearGradient>

                <linearGradient id="robeLine" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="rgba(255,248,220,0.3)" />
                    <stop offset="50%" stop-color="rgba(255,255,255,0.9)" />
                    <stop offset="100%" stop-color="rgba(218,165,32,0.3)" />
                </linearGradient>

                <radialGradient id="petalGold" cx="50%" cy="100%" r="100%">
                    <stop offset="0%" stop-color="#fff8dc" />
                    <stop offset="60%" stop-color="#d4af37" />
                    <stop offset="100%" stop-color="#8b6508" />
                </radialGradient>

                <radialGradient id="haloGlow" cx="50%" cy="40%" r="50%">
                    <stop offset="0%" stop-color="rgba(255,235,180,0.25)" />
                    <stop offset="40%" stop-color="rgba(212,175,55,0.1)" />
                    <stop offset="100%" stop-color="rgba(0,0,0,0)" />
                </radialGradient>

                <g id="lotus-petal">
                    <path d="M 0 0 C -25 -40, -35 -80, 0 -130 C 35 -80, 25 -40, 0 0 Z" fill="url(#petalGold)" stroke="#fff8dc" stroke-width="1.5" stroke-opacity="0.6"/>
                </g>
            </defs>

            <circle cx="500" cy="400" r="380" fill="url(#haloGlow)" class="halo-breath" />
            <circle cx="500" cy="300" r="180" fill="url(#haloGlow)" class="halo-breath" style="animation-delay: -3s;" />

            <g id="buddha-figure">
                
                <ellipse cx="465" cy="815" rx="18" ry="10" fill="url(#metalGold)" />
                <ellipse cx="535" cy="815" rx="18" ry="10" fill="url(#metalGold)" />

                <path d="M 430 300 C 400 350, 420 700, 415 810 L 585 810 C 580 700, 600 350, 570 300 C 550 250, 450 250, 430 300 Z" fill="url(#metalGold)" />

                <path d="M 565 300 C 595 320, 610 380, 605 450 C 600 500, 570 510, 550 490 C 530 470, 540 450, 560 440 L 575 350 Z" fill="url(#brightGold)" />
                <circle cx="545" cy="485" r="12" fill="url(#brightGold)" /> <path d="M 435 300 C 405 320, 395 420, 400 550 C 402 600, 420 620, 435 600 C 445 580, 430 560, 425 540 L 415 350 Z" fill="url(#brightGold)" />
                <ellipse cx="440" cy="605" rx="10" ry="15" fill="url(#brightGold)" transform="rotate(-15 440 605)" /> <rect x="480" y="220" width="40" height="30" rx="10" fill="url(#metalGold)" />

                <ellipse cx="500" cy="180" rx="38" ry="52" fill="url(#brightGold)" />

                <circle cx="500" cy="125" r="16" fill="url(#metalGold)" />
                <circle cx="500" cy="110" r="6" fill="url(#brightGold)" /> <g fill="none" stroke="url(#robeLine)" stroke-linecap="round">
                    <path d="M 445 320 Q 500 390 555 330" stroke-width="3" />
                    <path d="M 440 360 Q 500 440 560 370" stroke-width="3.5" />
                    <path d="M 435 410 Q 500 500 555 420" stroke-width="4" />
                    <path d="M 432 460 Q 500 560 565 470" stroke-width="4" />
                    <path d="M 428 520 Q 500 630 572 530" stroke-width="4.5" />
                    <path d="M 425 580 Q 500 700 575 590" stroke-width="4.5" />
                    <path d="M 422 640 Q 500 770 578 650" stroke-width="5" />
                    <path d="M 420 700 Q 500 840 580 710" stroke-width="5" />
                    <path d="M 455 300 Q 430 550 445 800" stroke-width="2" opacity="0.6" />
                    <path d="M 545 300 Q 570 550 555 800" stroke-width="2" opacity="0.6" />
                </g>

            </g>

            <g id="lotus-base" transform="translate(0, 810)" class="lotus-glow">
                
                <ellipse cx="500" cy="30" rx="140" ry="25" fill="#553300" stroke="#d4af37" stroke-width="2" />
                <ellipse cx="500" cy="15" rx="135" ry="20" fill="url(#metalGold)" />
                <ellipse cx="500" cy="5" rx="120" ry="12" fill="#221100" opacity="0.3" /> <use href="#lotus-petal" x="500" y="30" transform="rotate(-65 500 30)" />
                <use href="#lotus-petal" x="500" y="30" transform="rotate(65 500 30)" />
                <use href="#lotus-petal" x="500" y="30" transform="rotate(-45 500 30)" />
                <use href="#lotus-petal" x="500" y="30" transform="rotate(45 500 30)" />

                <use href="#lotus-petal" x="500" y="45" transform="scale(0.9) rotate(-30 555 50)" />
                <use href="#lotus-petal" x="500" y="45" transform="scale(0.9) rotate(30 555 50)" />
                <use href="#lotus-petal" x="500" y="45" transform="scale(0.9) rotate(-15 555 50)" />
                <use href="#lotus-petal" x="500" y="45" transform="scale(0.9) rotate(15 555 50)" />

                <use href="#lotus-petal" x="500" y="55" transform="scale(0.85) rotate(0 588 64)" />
                
                <path d="M 400 35 Q 500 70 600 35 L 580 65 Q 500 80 420 65 Z" fill="url(#metalGold)" />
                <rect x="420" y="65" width="160" height="10" rx="5" fill="#8b6508" />

            </g>

        </svg>
    </div>
    
    <div id="ui-layer">
        <div class="hint-text">莊嚴淨土 ． 萬法唯心 ． 絕對無相</div>
        <div class="title-text">常寂光 ‧ 站立金身</div>
    </div>

</body>
</html>
