<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖三 ‧ 垂耳法相與無相金身</title>
    <style>
        :root {
            /* 妳的黑曜金法界底色 */
            --bg-deep: #010103; 
            --gold-main: #d4af37;
            --glow-color: rgba(255, 235, 139, 0.4);
        }
        body { 
            margin: 0; 
            /* 背景改為黑色，準備襯托未來的金光 */
            background-color: var(--bg-deep); 
            display: flex; 
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            overflow: hidden; 
        }
        svg {
            width: 100%;
            max-width: 600px;
            height: auto;
        }
        
        /* 柔和的金光呼吸動畫 */
        .holy-glow {
            filter: drop-shadow(0 0 10px var(--glow-color));
            animation: breathGlow 5s infinite alternate ease-in-out;
        }

        @keyframes breathGlow {
            0% { filter: drop-shadow(0 0 5px rgba(255,235,139,0.2)); }
            100% { filter: drop-shadow(0 0 18px rgba(255,235,139,0.7)); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
        
        <rect x="180" y="850" width="640" height="50" fill="#000000" stroke="#ffffff" stroke-width="2" />
        <rect x="220" y="810" width="560" height="40" fill="#000000" stroke="#ffffff" stroke-width="2" />
        
        <path d="
            M 180 840 
            L 170 750 
            C 200 700, 280 680, 350 700 
            C 320 660, 310 560, 330 480 
            C 350 400, 390 370, 450 370 
            C 430 370, 410 370, 420 370 
            C 350 370, 350 320, 350 280 
            C 350 240, 380 200, 485 180 
            C 485 160, 515 160, 515 180 
            C 610 180, 650 200, 650 260 
            C 650 320, 610 350, 580 370 
            C 610 370, 650 400, 670 480 
            C 690 560, 680 660, 650 700 
            C 720 680, 800 700, 830 750 
            L 820 840 
            Z
        " fill="#000000" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" />

        <path d="M 800 780 Q 650 790 500 800" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
        <path d="M 200 780 Q 350 800 500 820" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />

        <g class="holy-glow" fill="var(--gold-main)" font-family="'PingFang TC', serif" text-anchor="middle" font-size="28px" letter-spacing="4px" transform="translate(500, 930)">
            <text>華藏法界 ‧ 無相金身輪廓</text>
            <text dy="35px" font-size="20px" letter-spacing="3px">常寂光 ‧ 平面金身</text>
        </g>
    </svg>

</body>
</html>
