
 

 
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿彌陀佛常寂光金身 ． 莊嚴數位道場</title>
    <style>
        :root {
            /* 莊嚴色譜 */
            --gold-light: #fbeeb7; /* 佛身亮部 */
            --gold-main: #d4af37;  /* 佛身主色 */
            --gold-dark: #a87f1a;  /* 佛身暗部 */
            --pure-gold: #ffec8b;  /* 高光點 */
            --fire: #ff6a00;       /* 燈火色 */
            --cyan-glow: #8ba89c;  /* 原始碼中蓮花的琉璃青光 */
            --bg-deep: #010103;     /* 常寂光背景（近黑） */
            --text-main: #d0d0d0;
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; user-select: none;
        }

        /* 背景：常寂光寂滅相 */
        #changjiguang-bg {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 40%, rgba(212,175,55,0.08) 0%, rgba(0,0,0,1) 70%);
            animation: infinite alternate silent-breath 15s ease-in-out;
            z-index: -1;
        }
        @keyframes silent-breath { 0% { opacity: 0.7; } 100% { opacity: 1; } }

        /* 道場容器 */
        #dojo-container {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            perspective: 2000px; /* 3D 視角 */
        }

        /* SVG 金身與寶座 */
        #buddha-svg {
            width: 90vmin; height: 90vmin; /* 依據螢幕大小自適應 */
            filter: drop-shadow(0 0 20px rgba(212,175,55,0.3));
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); /* 用於頂禮動畫 */
            transform-origin: center 80%;
        }

        /* --- SVG 內部的 CSS 動化 --- */
        
        /* 法身呼吸（無相之相的脈動） */
        .buddha-body { animation: body-glow 8s infinite alternate ease-in-out; }
        @keyframes body-glow { 0% { filter: drop-shadow(0 0 10px rgba(255,236,139,0.3)); } 100% { filter: drop-shadow(0 0 25px rgba(255,236,139,0.6)); } }

        /* 摩尼燈火動畫 */
        .lamp-flame { opacity: 0; transform-origin: center bottom; transition: opacity 0.5s; }
        .lamp-flame.lit { opacity: 1; animation: flame-flicker 0.2s infinite alternate; }
        @keyframes flame-flicker { 0% { transform: scale(1); filter: blur(1px) brightness(1); } 100% { transform: scale(1.05) scaleY(1.1); filter: blur(1.2px) brightness(1.2); } }

        /* 寶香繚繞動畫 */
        .incense-smoke { opacity: 0; transition: opacity 1s; pointer-events: none; }
        .incense-smoke.active { opacity: 0.6; animation: smoke-rise 6s infinite linear; }
        @keyframes smoke-rise { 0% { transform: translateY(0) scaleX(1); opacity: 0; } 15% { opacity: 0.6; } 80% { opacity: 0; } 100% { transform: translateY(-100px) scaleX(1.5); opacity: 0; } }

        /* 琉璃青光（延續原始碼美學） */
        .cyan-petal-glow { stop-color: var(--cyan-glow); animation: cyan-pulse 4s infinite alternate; }
        @keyframes cyan-pulse { 0% { stop-opacity: 0.2; } 100% { stop-opacity: 0.5; } }

        /* --- UI 修持面板 --- */
        #ui-panel {
            position: absolute; bottom: 5%; width: 90%; max-width: 500px;
            display: flex; justify-content: space-around; gap: 10px;
            background: rgba(5,5,10,0.7); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 30px; border: 1px solid rgba(212,175,55,0.3);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 100;
        }

        .shuchi-btn {
            background: rgba(15,15,15,0.8); border: 1px solid rgba(212,175,55,0.5); color: var(--gold-light);
            padding: 12px 20px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .shuchi-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.2); }
        .shuchi-btn.active { border-color: var(--pure-gold); box-shadow: 0 0 10px var(--gold-dark); color: #fff; }
        .btn-icon { width: 16px; height: 16px; fill: currentColor; }

        /* 提示文字 */
        #hint-text { position: absolute; top: 10%; color: rgba(212,175,55,0.6); font-size: 0.8rem; letter-spacing: 3px; text-align: center; width: 100%; pointer-events: none; }

    </style>
</head>
<body oncontextmenu="return false;">

    <div id="changjiguang-bg"></div>

    <div id="dojo-container">
        <div id="hint-text">莊嚴淨土 ． 萬法唯心 ． 靜心觀想 ． 360°全息(模擬)</div>
        
        <svg id="buddha-svg" viewBox="0 0 1000 1000" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)">
            <defs>
                /* --- 金身漸層定義 --- */
                <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="var(--gold-light)" />
                    <stop offset="50%" stop-color="var(--gold-main)" />
                    <stop offset="100%" stop-color="var(--gold-dark)" />
                </linearGradient>
                <radialGradient id="highLightGrad" cx="50%" cy="40%" r="50%">
                    <stop offset="0%" stop-color="var(--pure-gold)" stop-opacity="0.8" />
                    <stop offset="100%" stop-color="var(--pure-gold)" stop-opacity="0" />
                </radialGradient>
                
                /* --- 原始碼美學：琉璃青 Grad --- */
                <linearGradient id="cyanPetalGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="var(--gold-dark)" stop-opacity="0.8"/>
                    <stop offset="50%" class="cyan-petal-glow" stop-opacity="0.4"/>
                    <stop offset="100%" stop-color="transparent" />
                </linearGradient>

                /* --- 濾鏡定義 --- */
                <filter id="glow">
                    <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/>
                    </merge>
                </filter>
            </defs>

            <g id="full-model-transform">

                <g id="lotus-throne" transform="translate(500, 750)">
                    <g id="petals">
                        <script>
                            // 動態生成蓮花瓣，保持原始碼的「二十重」意象
                            const g_petals = document.getElementById('petals');
                            for(let i=0; i<16; i++) {
                                let angle = i * (360/16);
                                let d = `M 0 -20 C 30 -60, 60 -60, 0 -180 C -60 -60, -30 -60, 0 -20 Z`;
                                let p = document.createElementNS("[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)", "path");
                                p.setAttribute("d", d);
                                p.setAttribute("transform", `rotate(${angle}) scale(1.3)`);
                                p.setAttribute("fill", "url(#cyanPetalGrad)");
                                p.setAttribute("stroke", "rgba(212,175,55,0.2)");
                                g_petals.appendChild(p);
                            }
                            for(let i=0; i<8; i++) {
                                let angle = (i * (360/8)) + 22.5;
                                let d = `M 0 -10 C 20 -40, 40 -40, 0 -130 C -40 -40, -20 -40, 0 -10 Z`;
                                let p = document.createElementNS("[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)", "path");
                                p.setAttribute("d", d);
                                p.setAttribute("transform", `rotate(${angle}) scale(1.1)`);
                                p.setAttribute("fill", "url(#goldGrad)");
                                p.setAttribute("stroke", "rgba(212,175,55,0.4)");
                                g_petals.appendChild(p);
                            }
                        </script>
                    </g>
                    <ellipse cx="0" cy="0" rx="200" ry="40" fill="var(--gold-dark)" stroke="var(--gold-main)" stroke-width="2" filter="url(#glow)"/>
                </g>

                <g id="buddha-body-group" transform="translate(500, 720)" class="buddha-body" filter="url(#glow)">
                    
                    <path d="M -220 0 C -250 -40, -180 -90, -80 -100 L 80 -100 C 180 -90, 250 -40, 220 0 Z" fill="url(#goldGrad)" stroke="var(--gold-dark)"/>
                    
                    <path d="M -160 -100 C -180 -250, -150 -350, -100 -400 C -80 -420, 80 -420, 100 -400 C 150 -350, 180 -250, 160 -100 L -160 -100 Z" fill="url(#goldGrad)" stroke="var(--gold-dark)"/>
                    
                    <g transform="translate(0, -450)">
                        <ellipse cx="0" cy="0" rx="90" ry="110" fill="url(#goldGrad)" stroke="var(--gold-dark)"/>
                        <ellipse cx="0" cy="-100" rx="40" ry="30" fill="url(#goldGrad)" stroke="var(--gold-dark)"/>
                        
                        <ellipse cx="0" cy="-10" rx="60" ry="80" fill="url(#highLightGrad)" pointer-events="none"/>
                    </g>
                    
                    <g transform="translate(0, -150)" fill="url(#goldGrad)" stroke="var(--gold-dark)">
                        <path d="M -60 0 C -90 10, -90 40, -60 50 L 60 50 C 90 40, 90 10, 60 0 L -60 0 Z"/>
                        <path d="M -20 0 C -30 -15, -15 -35, 0 -40 C 15 -35, 30 -15, 20 0 Z" fill="var(--pure-gold)" opacity="0.6"/>
                    </g>
                </g>

                <g id="offerings" transform="translate(500, 850)">
                    
                    <g transform="translate(-180, 0)">
                        <path d="M -30 20 L 30 20 L 10 70 L -10 70 Z" fill="var(--gold-dark)" stroke="var(--gold-main)"/>
                        <ellipse cx="0" cy="15" rx="5" ry="8" fill="#fff" filter="url(#glow)"/>
                        <path id="lamp-flame" class="lamp-flame" d="M 0 10 C 10 -5, 10 -25, 0 -35 C -10 -25, -10 -5, 0 10 Z" fill="var(--fire)" filter="url(#glow)"/>
                    </g>
                    
                    <g transform="translate(0, 10)">
                        <path d="M -50 0 C -60 20, -40 50, 0 55 C 40 50, 60 20, 50 0 Z" fill="var(-- gold-dark)" stroke="var(--gold-main)"/>
                        <rect x="-60" y="-10" width="120" height="15" rx="7" fill="var(--gold-main)" stroke="var(--gold-dark)"/>
                        <script>
                            // 生成3條繚繞的香煙路徑
                            const smokeG = document.createElementNS("[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)", "g");
                            smokeG.setAttribute("class", "incense-smoke smoke-layer");
                            smokeG.setAttribute("id", "incense-smoke");
                            
                            for(let i=0; i<3; i++) {
                                let path = document.createElementNS("[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)", "path");
                                // 貝茲曲線產生繚繞感
                                let d = `M ${-10 + i*10} -10 C ${-30 + i*10} -40, ${30 + i*10} -70, 0 -100`;
                                path.setAttribute("d", d);
                                path.setAttribute("stroke", "#fff");
                                path.setAttribute("stroke-width", "2");
                                path.setAttribute("fill", "none");
                                path.setAttribute("filter", "url(#glow)");
                                smokeG.appendChild(path);
                            }
                            document.getElementById('offerings').insertBefore(smokeG, document.getElementById('offerings').firstChild);
                        </script>
                    </g>
                </g>
            </g>
        </svg>

        <div id="ui-panel">
            <button class="shuchi-btn" onclick="actProstration()">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L16 19v-5.5l5 2.5z"/></svg>
                至誠頂禮
            </button>
            <button id="btn-light" class="shuchi-btn" onclick="toggleLight()">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 2C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.85 11.1l-.85.6V16h-4v-2.3l-.85-.6C7.8 12.16 7 10.63 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.63-.8 3.16-2.15 4.1z"/></svg>
                佛前點燈
            </button>
            <button id="btn-incense" class="shuchi-btn" onclick="toggleIncense()">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M17 16l-4-4V8.82c1.35-.49 2.18-1.78 1.93-3.21-.22-1.25-1.28-2.22-2.54-2.34-1.63-.16-3.01 1.05-3.08 2.6-.04.91.41 1.72 1.1 2.19V12l-4 4-1.41-1.41L2 17.17V21h3.83l2.58-2.59L7 17l1.41 1.41L12 15l3.59 3.59L17 17z"/></svg>
                至心上香
            </button>
        </div>
    </div>

<script>
    // --- 修持功能邏輯 ---

    const buddhaSvg = document.getElementById('buddha-svg');
    const fullModelG = document.getElementById('full-model-transform');
    const flame = document.getElementById('lamp-flame');
    const smoke = document.getElementById('incense-smoke');
    const btnLight = document.getElementById('btn-light');
    const btnIncense = document.getElementById('btn-incense');

    // 1. 至誠頂禮 (模擬3D視角下跪，重心下移、放大)
    let isProstrating = false;
    function actProstration() {
        if(isProstrating) return;
        isProstrating = true;
        // 放大倍率、往下平移、旋轉視角、呼吸頻率增加（觀想至誠）
        buddhaSvg.style.transform = `translateY(30vmin) scale(2.2) rotateX(30deg)`;
        
        // 原始碼呼吸動畫加強
        const bodyElement = document.querySelector('.buddha-body');
        bodyElement.style.animationDuration = '2s'; 

        setTimeout(() => {
            // 復原
            buddhaSvg.style.transform = `translateY(0) scale(1) rotateX(0deg)`;
            bodyElement.style.animationDuration = '8s';
            setTimeout(()=>{ isProstrating = false; }, 1500); // 動畫完成後解鎖
        }, 3000); 
    }

    // 2. 佛前點燈
    let isLightLit = false;
    function toggleLight() {
        isLightLit = !isLightLit;
        if(isLightLit) {
            flame.classList.add('lit');
            btnLight.classList.add('active');
        } else {
            flame.classList.remove('lit');
            btnLight.classList.remove('active');
        }
    }

    // 3. 至心上香
    let isIncenseActive = false;
    function toggleIncense() {
        isIncenseActive = !isIncenseActive;
        if(isIncenseActive) {
            smoke.classList.add('active');
            btnIncense.classList.add('active');
        } else {
            smoke.classList.remove('active');
            btnIncense.classList.remove('active');
        }
    }

    // --- 模擬 360 度全息（純數學 JS 計算） ---
    let width, height;
    let angleY = 0; // 當前水平旋轉角度
    let isDragging = false;
    let lastMouseX = 0;

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
    }
    window.addEventListener('resize', resize); resize();

    // 觸控/滑鼠互動：撥動金身（與原始碼「撥動星盤」邏輯一致，但作用於旋轉模型）
    function onDown(e) { isDragging = true; lastMouseX = e.touches ? e.touches[0].clientX : e.clientX; }
    function onMove(e) {
        if (!isDragging) return;
        let curX = e.touches ? e.touches[0].clientX : e.clientX;
        let deltaX = curX - lastMouseX;
        
        angleY += deltaX * 0.5; // 旋轉角度，乘以係數
        
        // 將 3D 旋轉效果應用於全體模型 ( 模擬全息 )
        // 注意：SVG 的 transform-origin 需要在 JS 中精確控制或在 SVG 中定義
        fullModelG.setAttribute("transform-origin", "500 700"); 
        
        // 模擬真正的 3D 旋轉（ 需要在向量投影上計算，這裡使用 scaleX 和 skewY 作為極簡幾何模擬 ）
        // 如果需要真正的矩陣計算，大智需要引入額外的投影運算代碼。
        let scaleX = Math.cos(angleY * Math.PI / 180);
        let skewY = Math.sin(angleY * Math.PI / 180) * 5; // 產生微小的垂直位移，增強立體感

        fullModelG.setAttribute("transform", `scale(${1 - Math.abs(scaleX)*0.05}) translate(${skewY*2}, ${Math.abs(skewY)}) rotateY(${angleY})`);
        
        // Neat 的做法：將 angleY 直接用於 SVG 的 rotateY (如果瀏覽器支援 SVG 3D transform)
        // 否則，這裡需要將全體模型視為粒子雲進行矩陣乘法運算（如同原始碼中的粒子系統）。
        // 為保持 SVG 代碼簡潔，這裡暫時採取最極簡的 CSS 3D 模擬。
        fullModelG.style.transform = `rotateY(${angleY}deg)`;
        fullModelG.style.transformStyle = "preserve-3d";

        lastMouseX = curX;
    }
    function onUp() { isDragging = false; }

    document.addEventListener('pointerdown', onDown);
    document.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);

    // 道場靜止時，佛身緩慢自轉（觀想常寂光如如不動又普照十方）
    function autoRotate() {
        if(!isDragging && !isProstrating) {
            angleY += 0.05; // 極慢的自轉
            fullModelG.style.transform = `rotateY(${angleY}deg)`;
            fullModelG.style.transformStyle = "preserve-3d";
        }
        requestAnimationFrame(autoRotate);
    }
    autoRotate();

</script>
</body>
</html>
