<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏法界 ‧ 低首合十無相金身</title>
    <style>
        :root {
            /* 保持純淨的黑曜金底色 */
            --bg-deep: #010103; 
            --gold-bright: #ffec8b;
            --gold-main: #d4af37;
            --glow-color: rgba(255, 236, 139, 0.4);
        }
        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            background-image: radial-gradient(circle at 50% 40%, #1a1505 0%, #010103 80%);
            color: #fff; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; touch-action: none; user-select: none;
        }
        
        #buddha-container {
            width: 100%;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 2vh;
        }

        svg {
            width: 100%;
            max-width: 600px;
            height: 100%;
        }

        .holy-glow {
            filter: drop-shadow(0 0 12px var(--glow-color));
            animation: breathGlow 4.5s infinite alternate ease-in-out;
        }
        @keyframes breathGlow {
            0% { filter: drop-shadow(0 0 8px rgba(255,236,139,0.2)); transform: translateY(0px); }
            100% { filter: drop-shadow(0 0 20px rgba(255,236,139,0.5)); transform: translateY(-5px); }
        }

        .lotus-glow {
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.4));
        }

        #ui-layer {
            height: 15vh;
            text-align: center;
            z-index: 10;
        }
        .hint-text {
            color: var(--gold-bright); font-size: 0.9rem; letter-spacing: 4px; 
            margin-bottom: 10px; opacity: 0.8;
        }
        .title-text {
            color: var(--gold-main); font-size: 1.35rem; font-weight: bold; letter-spacing: 6px;
            text-shadow: 0 0 15px rgba(212,175,55,0.7);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="buddha-container">
        <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="goldBody" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#4a3511" />
                    <stop offset="25%" stop-color="#c59b3d" />
                    <stop offset="50%" stop-color="#ffffff" />
                    <stop offset="75%" stop-color="#c59b3d" />
                    <stop offset="100%" stop-color="#312208" />
                </linearGradient>

                <linearGradient id="goldPetal" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="#312208" />
                    <stop offset="40%" stop-color="#c59b3d" />
                    <stop offset="100%" stop-color="#ffebb5" />
                </linearGradient>

                <g id="petal">
                    <path d="M 0 0 C 30 -40, 50 -100, 0 -150 C -50 -100, -30 -40, 0 0 Z" 
                          fill="url(#goldPetal)" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" />
                    <path d="M 0 -15 L 0 -135" stroke="#ffffff" stroke-width="1.5" opacity="0.6" />
                </g>
            </defs>

            <g opacity="0.8">
                <circle cx="500" cy="380" r="440" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
                <circle cx="500" cy="380" r="360" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.7"/>
                <circle cx="500" cy="380" r="280" fill="none" stroke="#ffebb5" stroke-width="2" opacity="0.9"/>
                <circle cx="500" cy="380" r="200" fill="none" stroke="#ffffff" stroke-width="2.5" />
            </g>

            <circle cx="500" cy="180" r="115" fill="none" stroke="#ffdf70" stroke-width="6" filter="drop-shadow(0 0 15px rgba(255,223,112,0.6))" />

            <g class="holy-glow" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round">
                
                <path d="M 460 460 Q 500 500 540 460 Q 525 650 515 760 L 485 760 Q 475 650 460 460 Z" fill="url(#goldBody)" />

                <path d="M 410 300 
                         C 330 350, 350 520, 450 520 
                         L 500 400 
                         L 550 520 
                         C 650 520, 670 350, 590 300 
                         C 550 250, 450 250, 410 300 Z" fill="url(#goldBody)" />
                
                <path d="M 450 520 L 500 470 L 550 520" fill="none" stroke="#ffffff" stroke-width="2" />
                <line x1="500" y1="400" x2="500" y2="470" stroke="#ffffff" stroke-width="2" />

                <path d="M 455 180 
                         C 455 120, 545 120, 545 180 
                         C 545 240, 510 290, 500 290 
                         C 490 290, 455 240, 455 180 Z" fill="url(#goldBody)" />
                
                <path d="M 482 125 C 482 100, 518 100, 518 125 Z" fill="url(#goldBody)" />
                <circle cx="500" cy="105" r="14" fill="url(#goldBody)" />
            </g>

            <g id="lotus-base" transform="translate(0, 770)" class="lotus-glow">
                <ellipse cx="500" cy="30" rx="160" ry="25" fill="#1a1103" stroke="#d4af37" stroke-width="2" />

                <g transform="translate(500, 15)">
                    <use href="#petal" transform="rotate(-75) scale(0.9)" />
                    <use href="#petal" transform="rotate(-55) scale(0.95)" />
                    <use href="#petal" transform="rotate(-35)" />
                    <use href="#petal" transform="rotate(-15)" />
                    <use href="#petal" transform="rotate(15)" />
                    <use href="#petal" transform="rotate(35)" />
                    <use href="#petal" transform="rotate(55) scale(0.95)" />
                    <use href="#petal" transform="rotate(75) scale(0.9)" />
                </g>

                <g transform="translate(500, 30)">
                    <use href="#petal" transform="rotate(-45) scale(0.85)" />
                    <use href="#petal" transform="rotate(-25) scale(0.9)" />
                    <use href="#petal" transform="rotate(0) scale(0.95)" />
                    <use href="#petal" transform="rotate(25) scale(0.9)" />
                    <use href="#petal" transform="rotate(45) scale(0.85)" />
                </g>

                <g transform="translate(500, 45)">
                    <use href="#petal" transform="rotate(-15) scale(0.8)" />
                    <use href="#petal" transform="rotate(15) scale(0.8)" />
                </g>
                
                <path d="M 360 40 Q 500 90 640 40 Q 500 130 360 40 Z" fill="url(#goldBody)" stroke="#ffffff" stroke-width="2"/>
            </g>
        </svg>
    </div>
    
    <div id="ui-layer">
        <div class="hint-text">輕 按 合 十</div>
        <div class="title-text">常寂光 ‧ 平面金身</div>
    </div>

</body>
</html>
