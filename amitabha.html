<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏法界 ‧ 無相金線身</title>
    <style>
        :root {
            /* 妳的黑曜金法界底色 */
            --bg-deep: #010103; 
            --gold-light: #ffeb8b;
            --glow-color: rgba(255, 235, 139, 0.4);
        }
        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            background-image: radial-gradient(circle at 50% 50%, #151208 0%, #010103 80%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; touch-action: none; user-select: none;
        }
        
        #buddha-container {
            width: 100%;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            max-width: 600px;
            height: 100%;
        }

        /* 柔和的金光呼吸動畫 */
        .holy-glow {
            filter: drop-shadow(0 0 10px var(--glow-color));
            animation: breathGlow 4s infinite alternate ease-in-out;
        }

        @keyframes breathGlow {
            0% { filter: drop-shadow(0 0 5px rgba(255,235,139,0.2)); }
            100% { filter: drop-shadow(0 0 18px rgba(255,235,139,0.7)); }
        }
        
        /* 點綴的極簡星空 */
        .stars { fill: #fff; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="buddha-container">
        <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
            
            <g class="stars">
                <circle cx="150" cy="200" r="1.5" opacity="0.6"/>
                <circle cx="300" cy="150" r="1" opacity="0.3"/>
                <circle cx="800" cy="200" r="2" opacity="0.5"/>
                <circle cx="850" cy="450" r="1" opacity="0.4"/>
                <circle cx="150" cy="650" r="1.5" opacity="0.7"/>
                <circle cx="200" cy="850" r="1" opacity="0.5"/>
                <circle cx="850" cy="850" r="1.5" opacity="0.6"/>
                <circle cx="900" cy="650" r="1" opacity="0.4"/>
            </g>

            <path class="holy-glow" fill="none" stroke="var(--gold-light)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
                d="
                    M 180 800 
                    C 80 780, 150 670, 270 680 
                    C 260 540, 280 430, 355 380 
                    C 345 340, 375 350, 375 300 
                    C 375 230, 415 200, 460 200 
                    C 460 160, 540 160, 540 200 
                    C 585 200, 625 230, 625 300 
                    C 625 350, 655 340, 645 380 
                    C 720 430, 740 540, 730 680 
                    C 850 670, 920 780, 820 800 
                    C 650 815, 350 785, 180 800 Z
                " />
        </svg>
    </div>

</body>
</html>
