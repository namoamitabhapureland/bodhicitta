<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>常寂光 ‧ 金線無相坐身</title>
    <style>
        :root {
            --bg-deep: #010103; 
            --gold-main: #d4af37;
            --gold-light: #ffeb8b;
            --glow-color: rgba(212, 175, 55, 0.5);
        }
        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            /* 模擬妳系統中的宇宙星空黑曜底色 */
            background-image: radial-gradient(circle at 50% 50%, #151208 0%, #010103 80%);
            color: #fff; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; touch-action: none; user-select: none;
        }
        
        #buddha-container {
            width: 100%;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            max-width: 600px;
            height: 100%;
            /* 賦予整個 SVG 柔和的呼吸金光 */
            filter: drop-shadow(0 0 10px var(--glow-color));
            animation: breathGlow 5s infinite alternate ease-in-out;
        }

        @keyframes breathGlow {
            0% { filter: drop-shadow(0 0 5px rgba(255,235,139,0.2)); transform: scale(1); }
            100% { filter: drop-shadow(0 0 18px rgba(255,235,139,0.6)); transform: scale(1.02); }
        }

        #ui-layer {
            height: 15vh;
            text-align: center;
            z-index: 10;
        }
        .hint-text {
            color: var(--gold-light); font-size: 0.9rem; letter-spacing: 4px; 
            margin-bottom: 10px; opacity: 0.8;
        }
        .title-text {
            color: var(--gold-main); font-size: 1.35rem; font-weight: bold; letter-spacing: 6px;
            text-shadow: 0 0 10px rgba(212,175,55,0.7);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="buddha-container">
        <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="8" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>

            <circle cx="500" cy="350" r="280" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="2" />
            <circle cx="500" cy="350" r="220" fill="none" stroke="rgba(255,235,139,0.4)" stroke-width="1.5" />
            
            <circle cx="500" cy="220" r="100" fill="none" stroke="#ffeb8b" stroke-width="2" filter="url(#goldGlow)" opacity="0.8"/>

            <g fill="none" stroke="#d4af37" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" filter="url(#goldGlow)">
                
                <path d="
                    M 500 120
                    C 515 120, 520 140, 500 150
                    C 530 150, 545 180, 540 230
                    C 535 250, 545 270, 550 280
                    C 600 300, 650 350, 670 450
                    C 680 500, 680 550, 660 620
                    C 740 630, 800 660, 830 710
                    C 850 740, 830 780, 770 780
                    L 230 780
                    C 170 780, 150 740, 170 710
                    C 200 660, 260 630, 340 620
                    C 320 550, 320 500, 330 450
                    C 350 350, 400 300, 450 280
                    C 455 270, 465 250, 460 230
                    C 455 180, 470 150, 500 150
                " />

                <line x1="180" y1="800" x2="820" y2="800" stroke-width="3" opacity="0.7"/>
                <line x1="220" y1="820" x2="780" y2="820" stroke-width="2" opacity="0.4"/>
            </g>

            <g fill="none" stroke="#ffeb8b" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" filter="url(#goldGlow)">
                
                <path d="M 370 580 C 420 600, 450 560, 480 520" />
                <path d="M 630 580 C 580 600, 550 560, 520 520" />

                <path d="M 480 520 C 470 450, 485 380, 500 320 C 515 380, 530 450, 520 520 Z" />

                <line x1="500" y1="320" x2="500" y2="510" stroke-width="2" opacity="0.8"/>
                <path d="M 490 460 Q 500 450 510 460" stroke-width="2" />
                <path d="M 485 420 Q 500 410 515 420" stroke-width="1.5" opacity="0.6"/>
                
                <path d="M 495 480 C 505 480, 515 490, 510 500" stroke-width="2"/>
            </g>

        </svg>
    </div>
    
    <div id="ui-layer">
        <div class="hint-text">輕 按 合 十</div>
        <div class="title-text">常寂光 ‧ 金線無相身</div>
    </div>

</body>
</html>
