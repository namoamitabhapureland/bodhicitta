<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏法界 ‧ 360° 立體音波金身</title>
    <style>
        :root {
            --bg-deep: #010103; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
        }
        body { 
            margin: 0; background: var(--bg-deep); color: #fff; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            overflow: hidden; touch-action: none; user-select: none;
        }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
        
        #ui-layer {
            position: absolute; bottom: 8%; width: 100%; text-align: center; z-index: 10; pointer-events: none;
        }
        .hint-text {
            color: var(--gold); font-size: 0.85rem; letter-spacing: 3px; 
            text-shadow: 0 0 10px rgba(212,175,55,0.8); margin-bottom: 15px;
        }
        .title-text {
            color: var(--cyan); font-size: 1.1rem; font-weight: bold; letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(139,168,156,0.8);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <canvas id="buddhaCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="hint-text">360° 全息滑動 ． 沿用第九重矩陣延伸</div>
        <div class="title-text">法界音波 ‧ 莊嚴金身</div>
    </div>

<script>
    const canvas = document.getElementById('buddhaCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    
    // 3D 視角控制
    let angleX = 0.1; 
    let angleY = 0;   
    let isDragging = false, lastX = 0, lastY = 0;
    const FOV = 450;
    let time = 0;

    let realmParticles = []; 

    function resize() { 
        width = window.innerWidth; height = window.innerHeight; 
        canvas.width = width; canvas.height = height; 
    }
    window.addEventListener('resize', resize); resize();

    function project3D(x, y, z) {
        let cosX = Math.cos(angleX), sinX = Math.sin(angleX);
        let cosY = Math.cos(angleY), sinY = Math.sin(angleY);
        
        let y1 = y * cosX - z * sinX;
        let z1 = y * sinX + z * cosX;
        let x2 = x * cosY - z1 * sinY;
        let z2 = x * sinY + z1 * cosY;
        
        if (z2 < -FOV + 50) return null; 
        let scale = FOV / (FOV + z2); 
        return { px: (width / 2) + x2 * scale, py: (height / 2) - y1 * scale + 30, scale: scale, pz: z2 };
    }

    // ==========================================
    // 核心亮點：定義佛像的「輪廓方程式」
    // 代入您的 Y 軸，計算出該層圓環的半徑 R
    // ==========================================
    function getBuddhaRadius(y) {
        // y 範圍從頂部 -120 到 底部 +80
        
        // 1. 肉髻 (Ushnisha)
        if (y < -100) { 
            let t = (y + 120) / 20; // 0~1
            if (t < 0 || t > 1) return 0;
            return 12 * 2 * Math.sqrt(t * (1 - t)); // 完美的半圓方程式
        } 
        // 2. 頭顱 (Head)
        else if (y < -60) { 
            let t = (y + 100) / 40;
            if (t < 0 || t > 1) return 0;
            return 28 * 2 * Math.sqrt(t * (1 - t));
        } 
        // 3. 頸部 (Neck)
        else if (y < -45) { 
            return 16;
        } 
        // 4. 身軀與寬肩 (Torso & Shoulders)
        else if (y < 40) { 
            let t = (y + 45) / 85; 
            if (t < 0.2) {
                // 從脖子迅速往外擴展成寬肩
                let st = t / 0.2;
                return 16 + (40 - 16) * Math.sin(st * Math.PI / 2);
            } else {
                // 從肩膀往下收斂至腰部
                let st = (t - 0.2) / 0.8;
                return 40 - 8 * st; // 腰部寬度約 32
            }
        } 
        // 5. 結跏趺坐底座 (Crossed Legs)
        else if (y <= 80) { 
            let t = (y - 40) / 40; 
            // 雙腿向外極大延伸，形成穩定的三角形基底
            return 32 + 85 * Math.pow(t, 0.6); // 底部最大半徑達 117
        }
        return 0;
    }

    // ==========================================
    // 繼承您的第九重矩陣：層層堆疊圓環
    // ==========================================
    function initBuddhaMatrix() {
        realmParticles = [];
        let layers = 90; // 提高層數，讓佛身更細緻
        let segments = 120; // 每一層圓環的粒子數
        
        for(let l = 0; l < layers; l++) {
            // Y 軸從頂部 -120 到 底部 80
            let yBase = -120 + (l / layers) * 200; 
            
            // 呼叫輪廓方程式取得該層半徑
            let radiusBase = getBuddhaRadius(yBase);
            
            // 如果該層有半徑，才產生粒子 (跳過空隙)
            if (radiusBase > 2) {
                for(let i = 0; i < segments; i++) {
                    let theta = (i / segments) * Math.PI * 2;
                    // 顏色交錯：一層亮金，一層暗金，產生法衣的層次感
                    let isHighlight = (l % 3 === 0); 
                    
                    realmParticles.push({ 
                        y: yBase, 
                        bR: radiusBase, 
                        th: theta, 
                        l: l,
                        hl: isHighlight
                    });
                }
            }
        }
        
        // 底部加上蓮花座點綴 (沿用矩陣邏輯)
        for(let l = 0; l < 5; l++) {
            let rBase = 125 + l * 12;
            for(let i=0; i<150; i++){
                realmParticles.push({ y: 85 + l*3, bR: rBase, th: (i/150)*Math.PI*2, l: l+100, hl: false, type: 'lotus' });
            }
        }
    }

    function render() {
        ctx.fillStyle = 'rgba(1, 1, 3, 0.65)'; 
        ctx.fillRect(0, 0, width, height);
        time += 0.015;

        if (!isDragging) angleY += 0.005; // 如法界般緩慢旋轉

        let projected = [];

        realmParticles.forEach(p => {
            // ==========================================
            // 完美套用您的第九重波浪公式
            // 讓立體金身「活」起來，擁有空間聲波的震動感
            // ==========================================
            let wave = 0;
            if (p.type === 'lotus') {
                wave = Math.sin(p.th * 12 + time * 2) * 5; // 蓮花波浪
            } else {
                // 為了不讓佛像變形太嚴重，波浪幅度與該層半徑成正比
                let amp = p.bR * 0.04; 
                let f1 = 8; 
                // 律動結合了時間、角度與層數
                wave = amp * Math.sin(f1 * p.th + time * 2 + p.l * 0.1); 
            }
            
            let r = p.bR + wave; // 基礎輪廓半徑 + 聲波律動

            // 圓柱座標轉 3D 直角座標
            let wx = r * Math.cos(p.th + time * 0.1); 
            let wz = r * Math.sin(p.th + time * 0.1); 
            let wy = p.y + Math.sin(time + p.l * 0.05) * 1.5; // Y軸微弱呼吸

            let proj = project3D(wx, wy, wz);
            if (proj) {
                // 根據是否為 Highlight 決定顏色亮度
                let col = p.type === 'lotus' ? 'rgba(139,168,156,0.8)' : 
                          (p.hl ? 'rgba(243,229,171,0.9)' : 'rgba(212,175,55,0.4)');
                let size = p.hl ? 1.5 : 1.0;

                projected.push({ x: proj.px, y: proj.py, z: proj.pz, sc: proj.scale, c: col, s: size, hl: p.hl });
            }
        });

        // 依照深度排序 (Z-buffer)，呈現真正的立體前後遮擋
        projected.sort((a, b) => b.z - a.z);

        ctx.globalCompositeOperation = 'screen';
        projected.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0.1, p.s * p.sc), 0, Math.PI * 2);
            ctx.fillStyle = p.c;
            
            if (p.hl) {
                ctx.shadowBlur = 8 * p.sc;
                ctx.shadowColor = '#d4af37';
            } else {
                ctx.shadowBlur = 0;
            }
            ctx.fill();
        });
        ctx.shadowBlur = 0;
        ctx.globalCompositeOperation = 'source-over';

        requestAnimationFrame(render);
    }

    function onDown(e) { isDragging = true; lastX = e.touches ? e.touches[0].clientX : e.clientX; lastY = e.touches ? e.touches[0].clientY : e.clientY; }
    function onMove(e) { 
        if (!isDragging) return; 
        let curX = e.touches ? e.touches[0].clientX : e.clientX; 
        let curY = e.touches ? e.touches[0].clientY : e.clientY; 
        angleY += (curX - lastX) * 0.01; 
        angleX += (curY - lastY) * 0.01; 
        angleX = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, angleX)); 
        lastX = curX; lastY = curY; 
    }
    function onUp() { isDragging = false; }
    
    canvas.addEventListener('pointerdown', onDown); 
    canvas.addEventListener('pointermove', onMove); 
    window.addEventListener('pointerup', onUp); 
    canvas.addEventListener('pointercancel', onUp);

    initBuddhaMatrix();
    render();

</script>
</body>
</html>
