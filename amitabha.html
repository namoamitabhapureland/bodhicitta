<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏法界 ‧ 偏袒右肩無相金身</title>
    <style>
        :root {
            --bg-deep: #010103; 
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --cyan: #8ba89c;
        }
        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            background-image: radial-gradient(circle at 50% 50%, #1a1505 0%, #010103 80%);
            color: #fff; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; touch-action: none; user-select: none;
        }
        
        #buddha-container {
            width: 100%;
            height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            max-width: 900px; /* 將佛像整体放大 */
            height: 100%;
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.2));
        }

        /* 佛光呼吸動畫 */
        .halo-breath {
            transform-origin: center;
            animation: breathGlow 6s infinite alternate ease-in-out;
        }
        @keyframes breathGlow {
            0% { transform: scale(0.95); opacity: 0.5; }
            100% { transform: scale(1.05); opacity: 0.8; }
        }

        /* 蓮花座微光 */
        .lotus-glow {
            filter: drop-shadow(0 0 10px rgba(243,229,171,0.5));
        }

        /* 底部 UI 介面 */
        #ui-layer {
            height: 15vh;
            text-align: center;
            z-index: 10;
        }
        .hint-text {
            color: var(--gold-light); font-size: 0.85rem; letter-spacing: 3px; 
            margin-bottom: 8px; opacity: 0.8;
        }
        .title-text {
            color: var(--gold); font-size: 1.25rem; font-weight: bold; letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(212,175,55,0.6);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="buddha-container">
        <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="metalGold" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#775505" />
                    <stop offset="15%" stop-color="#daa520" />
                    <stop offset="40%" stop-color="#ffffff" /> <stop offset="60%" stop-color="#d4af37" />
                    <stop offset="80%" stop-color="#8b6508" />
                    <stop offset="100%" stop-color="#442200" />
                </linearGradient>

                <linearGradient id="skinGold" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#daa520" />
                    <stop offset="50%" stop-color="#fff8dc" /> <stop offset="100%" stop-color="#8b6508" />
                </linearGradient>

                <linearGradient id="robeLine" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="rgba(255,248,220,0.3)" />
                    <stop offset="50%" stop-color="rgba(255,255,255,0.9)" />
                    <stop offset="100%" stop-color="rgba(218,165,32,0.3)" />
                </linearGradient>

                <radialGradient id="petalGold" cx="50%" cy="100%" r="100%">
                    <stop offset="0%" stop-color="#fff8dc" />
                    <stop offset="60%" stop-color="#d4af37" />
                    <stop offset="100%" stop-color="#8b6508" />
                </radialGradient>

                <radialGradient id="haloGlow" cx="50%" cy="40%" r="50%">
                    <stop offset="0%" stop-color="rgba(255,235,180,0.25)" />
                    <stop offset="40%" stop-color="rgba(212,175,55,0.1)" />
                    <stop offset="100%" stop-color="rgba(0,0,0,0)" />
                </radialGradient>

                <g id="lotus-petal">
                    <path d="M 0 0 C -30 -50, -45 -100, 0 -160 C 45 -100, 30 -50, 0 0 Z" fill="url(#petalGold)" stroke="#fff8dc" stroke-width="1.2" stroke-opacity="0.5"/>
                </g>
            </defs>

            <g id="whole-model" transform="scale(1.2) translate(-80, -80)">

            <circle cx="500" cy="400" r="380" fill="url(#haloGlow)" class="halo-breath" />

            <g id="buddha-figure">
                
                <ellipse cx="465" cy="815" rx="18" ry="10" fill="url(#skinGold)" />
                <ellipse cx="535" cy="815" rx="18" ry="10" fill="url(#skinGold)" />

                <path d="M 430 250 C 400 300, 410 700, 415 810 L 585 810 C 590 700, 600 300, 570 250 Z" fill="none" id="bodyBaseLine"/>

                <path d="M 500 230 C 510 240, 520 250, 530 250 C 555 250, 580 290, 570 250 L 585 810 L 500 810 Z" fill="url(#skinGold)" stroke="#442200" stroke-width="0.5"/>
                
                <path d="M 500 230 C 490 240, 480 250, 470 250 C 445 250, 420 290, 430 250 L 415 810 L 500 810 Z" fill="url(#metalGold)" stroke="var(--gold)" stroke-width="0.5"/>

                <path d="M 565 250 C 595 270, 610 330, 605 400 C 600 450, 570 460, 550 440 C 530 420, 540 400, 560 390 L 575 300 Z" fill="url(#skinGold)" />
                <circle cx="545" cy="435" r="12" fill="url(#skinGold)" /> <path d="M 435 250 C 405 270, 395 370, 400 500 C 402 550, 420 570, 435 550 C 445 530, 430 510, 425 490 L 415 300 Z" fill="url(#skinGold)" />
                <ellipse cx="440" cy="555" rx="10" ry="15" fill="url(#skinGold)" transform="rotate(-15 440 555)" /> <path d="M 500 130 A 38 52 0 1 0 500 234 L 500 230 Z" fill="url(#skinGold)" stroke="#442200" stroke-width="0.5" id="headAndNeck" />
                
                <path d="M 462 165 C 458 175, 455 190, 458 200 C 460 210, 470 215, 480 210" fill="none" stroke="#442200" stroke-width="2" id="earLeft" />
                <path d="M 538 165 C 542 175, 545 190, 542 200 C 540 210, 530 215, 520 210" fill="none" stroke="#442200" stroke-width="2" id="earRight" />
                <circle cx="458" cy="205" r="6" fill="url(#skinGold)" stroke="#442200" /> <circle cx="542" cy="205" r="6" fill="url(#skinGold)" stroke="#442200" /> <ellipse cx="500" cy="180" rx="38" ry="52" fill="url(#skinGold)" />

                <circle cx="500" cy="125" r="16" fill="url(#metalGold)" stroke="#d4af37" />
                <circle cx="500" cy="110" r="6" fill="url(#brightGold)" filter="drop-shadow(0 0 5px var(--pure-gold))" /> <g fill="none" stroke="url(#robeLine)" stroke-linecap="round">
                    <path d="M 490 250 Q 520 260 550 250" stroke-width="3" opacity="0.8" />
                    <path d="M 480 260 Q 520 275 555 260" stroke-width="2.5" opacity="0.6" />
                    <path d="M 470 270 Q 520 290 560 270" stroke-width="2" opacity="0.4" />
                    <path d="M 470 300 L 460 800" stroke-width="1.5" opacity="0.3" />
                    <path d="M 485 300 L 475 800" stroke-width="1" opacity="0.2" />
                    <path d="M 515 300 L 525 800" stroke-width="1.5" opacity="0.3" />
                    <path d="M 530 300 L 540 800" stroke-width="1" opacity="0.2" />
                </g>

            </g>

            <g id="lotus-base" transform="translate(0, 810)" class="lotus-glow">
                
                <ellipse cx="500" cy="30" rx="140" ry="25" fill="#553300" stroke="#d4af37" stroke-width="2" />
                <ellipse cx="500" cy="15" rx="135" ry="20" fill="url(#metalGold)" />
                <ellipse cx="500" cy="5" rx="120" ry="12" fill="#221100" opacity="0.3" />
                <script>
                    // 動態生成蓮蓬花蕊點點
                    const g_base = document.getElementById('lotus-base');
                    const platformArea = g_base.querySelectorAll('ellipse')[2];
                    for(let i=0; i<30; i++) {
                        let dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        dot.setAttribute("cx", 500 + (Math.random()-0.5)*200);
                        dot.setAttribute("cy", 5 + (Math.random()-0.5)*15);
                        dot.setAttribute("r", 1); dot.setAttribute("fill", "#fff");
                        dot.setAttribute("opacity", 0.1); g_base.appendChild(dot);
                    }
                </script>

                <g id="petals-down" transform="scale(0.95) translate(26, 30)">
                    <use href="#lotus-petal" x="500" y="30" transform="rotate(-65 500 30)" />
                    <use href="#lotus-petal" x="500" y="30" transform="rotate(65 500 30)" />
                    <use href="#lotus-petal" x="500" y="30" transform="rotate(-45 500 30)" />
                    <use href="#lotus-petal" x="500" y="30" transform="rotate(45 500 30)" />
                </g>

                <g id="petals-up-mid" transform="scale(0.9) translate(55, 45)">
                    <use href="#lotus-petal" x="500" y="45" transform="rotate(-30 500 45)" />
                    <use href="#lotus-petal" x="500" y="45" transform="rotate(30 500 45)" />
                    <use href="#lotus-petal" x="500" y="45" transform="rotate(-15 500 45)" />
                    <use href="#lotus-petal" x="500" y="45" transform="rotate(15 500 45)" />
                </g>

                <g id="petals-front" transform="scale(0.85) translate(88, 55)">
                    <use href="#lotus-petal" x="500" y="55" transform="rotate(0 500 55)" />
                </g>
                
                <path d="M 400 35 Q 500 70 600 35 L 580 65 Q 500 80 420 65 Z" fill="url(#metalGold)" stroke="#d4af37" stroke-width="1" />
                <rect x="420" y="65" width="160" height="10" rx="5" fill="#8b6508" stroke="#daa520" stroke-width="0.5"/>

            </g>

            </g> </svg>
    </div>
    
    <div id="ui-layer">
        <div class="hint-text">莊嚴淨土 ． 萬法唯心 ． 偏袒右肩無相</div>
        <div class="title-text">常寂光 ‧ 平面金身</div>
    </div>

</body>
</html>
