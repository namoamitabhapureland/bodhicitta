<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏法界 ‧ 絕對無相向量金身</title>
    <style>
        :root {
            --bg-deep: #010103; 
            --gold-bright: #ffec8b;
            --gold-main: #d4af37;
            --gold-dark: #8b6508;
            --glow-color: rgba(255, 236, 139, 0.5);
        }
        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            background-image: radial-gradient(circle at 50% 40%, #1a1505 0%, #010103 70%);
            color: #fff; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; touch-action: none; user-select: none;
        }
        
        #buddha-container {
            width: 100%;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 5vh;
        }

        svg {
            width: 100%;
            max-width: 600px; /* 控制比例，使其修長莊嚴 */
            height: 100%;
        }

        /* 呼吸動畫 */
        .holy-glow {
            filter: drop-shadow(0 0 15px var(--glow-color));
            animation: breathGlow 4s infinite alternate ease-in-out;
        }
        @keyframes breathGlow {
            0% { filter: drop-shadow(0 0 10px rgba(255,236,139,0.3)); transform: translateY(0px); }
            100% { filter: drop-shadow(0 0 25px rgba(255,236,139,0.7)); transform: translateY(-3px); }
        }

        /* 蓮花座微光 */
        .lotus-glow {
            filter: drop-shadow(0 0 10px var(--glow-color));
        }

        /* 底部 UI */
        #ui-layer {
            height: 15vh;
            text-align: center;
            z-index: 10;
        }
        .hint-text {
            color: var(--gold-bright); font-size: 0.9rem; letter-spacing: 4px; 
            margin-bottom: 10px; opacity: 0.8;
        }
        .title-text {
            color: var(--gold-main); font-size: 1.3rem; font-weight: bold; letter-spacing: 6px;
            text-shadow: 0 0 15px rgba(212,175,55,0.8);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="buddha-container">
        <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="cylinderGold" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#553300" />
                    <stop offset="15%" stop-color="#f3e5ab" />
                    <stop offset="45%" stop-color="#b8860b" />
                    <stop offset="50%" stop-color="#8b6508" />
                    <stop offset="80%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="#442200" />
                </linearGradient>

                <linearGradient id="smoothGold" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#aa7700" />
                    <stop offset="50%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="#664400" />
                </linearGradient>

                <linearGradient id="petalGold" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="#442200" />
                    <stop offset="40%" stop-color="#d4af37" />
                    <stop offset="100%" stop-color="#fff8dc" />
                </linearGradient>

                <g id="sharp-petal">
                    <path d="M 0 0 Q 35 -40, 0 -130 Q -35 -40, 0 0 Z" fill="url(#petalGold)" stroke="#fff8dc" stroke-width="1.5" stroke-linejoin="miter"/>
                    <path d="M 0 -10 Q 15 -45, 0 -95 Q -15 -45, 0 -10 Z" fill="none" stroke="#fbeeb7" stroke-width="0.8" opacity="0.6"/>
                </g>
                <g id="sharp-petal-side">
                    <path d="M 0 0 Q 30 -30, 20 -100 Q -15 -30, 0 0 Z" fill="url(#petalGold)" stroke="#fff8dc" stroke-width="1.2"/>
                    <path d="M 0 -10 Q 15 -35, 8 -75 Q -8 -35, 0 -10 Z" fill="none" stroke="#fbeeb7" stroke-width="0.6" opacity="0.5"/>
                </g>

                <radialGradient id="highLightGrad" cx="50%" cy="40%" r="50%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
                    <stop offset="100%" stop-color="#fff8dc" stop-opacity="0" />
                </radialGradient>
            </defs>

            <circle cx="500" cy="400" r="380" fill="radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%)" />
            <circle cx="500" cy="300" r="180" fill="radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%)" style="animation: silent-breath 6s infinite alternate;" />
            @keyframes silent-breath { 0% { opacity: 0.6; } 100% { opacity: 1; } }

            <g class="holy-glow">
                
                <path d="M 430 240 Q 450 240, 470 240 Q 500 240, 500 240 M 500 240 Q 500 240, 530 240 Q 550 240, 570 240 M 570 240 L 570 260 M 430 260 L 430 240" fill="#daa520"/>
                
                <path d="M 430 260 C 430 240, 570 240, 570 260 L 585 810 C 585 830, 415 830, 415 810 Z" fill="url(#cylinderGold)" />
                <path d="M 430 260 L 570 260 L 585 810 L 415 810 Z" fill="url(#cylinderGold)" />

                <g fill="none" stroke="#fff8dc" stroke-width="1.5" opacity="0.6" stroke-linecap="round">
                    <path d="M 450 260 L 440 810" />
                    <path d="M 550 260 L 560 810" />
                </g>

                <path d="M 410 260 C 375 300, 370 500, 395 560 C 410 550, 420 520, 405 500 L 410 260 Z" fill="url(#smoothGold)" stroke="#d4af37" stroke-width="0.5"/>
                <path d="M 590 260 C 625 300, 630 450, 600 500 C 580 510, 560 480, 575 460 L 580 260 Z" fill="url(#smoothGold)" stroke="#d4af37" stroke-width="0.5"/>
                <rect x="475" y="220" width="50" height="30" fill="url(#cylinderGold)" stroke="#d4af37" stroke-width="1" />
                <path d="M 475 230 Q 500 240 525 230 Q 500 240 475 230Z" fill="none" stroke="#fff8dc" stroke-width="2" opacity="0.6"/>

                <ellipse cx="460" cy="190" rx="6" ry="18" fill="url(#smoothGold)" stroke="#daa520" stroke-width="0.5"/>
                <ellipse cx="540" cy="190" rx="6" ry="18" fill="url(#smoothGold)" stroke="#daa520" stroke-width="0.5"/>
                <circle cx="460" cy="205" r="5" fill="#daa520" /> <circle cx="540" cy="205" r="5" fill="#daa520" /> <ellipse cx="500" cy="160" rx="42" ry="62" fill="url(#smoothGold)" />
                <ellipse cx="500" cy="150" rx="25" ry="40" fill="url(#highLightGrad)" pointer-events="none"/> <path d="M 480 110 C 480 75, 520 75, 520 110 Z" fill="url(#smoothGold)" stroke="#daa520" stroke-width="1"/>
                <circle cx="500" cy="85" r="7" fill="#221100" filter="drop-shadow(0 0 5px var(--glow-color))"/>

            </g>

            <g id="lotus-base" transform="translate(0, 810) scale(1.1) translate(0, 0)" class="lotus-glow">
                
                <ellipse cx="500" cy="30" rx="140" ry="25" fill="#553300" stroke="#d4af37" stroke-width="2" />
                <ellipse cx="500" cy="15" rx="135" ry="20" fill="url(#metalGold)" stroke="#fff8dc" stroke-width="1"/>
                <ellipse cx="500" cy="5" rx="120" ry="12" fill="#221100" opacity="0.3" /> <g transform="translate(500, 30)">
                    <use href="#sharp-petal" transform="rotate(-65)" />
                    <use href="#sharp-petal" transform="rotate(-40)" />
                    <use href="#sharp-petal" transform="rotate(-20)" />
                    <use href="#sharp-petal" transform="rotate(0)" />
                    <use href="#sharp-petal" transform="rotate(20)" />
                    <use href="#sharp-petal" transform="rotate(40)" />
                    <use href="#sharp-petal" transform="rotate(65)" />
                </g>

                <g transform="translate(500, 45) scale(0.9)">
                    <use href="#sharp-petal" transform="rotate(-30)" />
                    <use href="#sharp-petal" transform="rotate(-15)" />
                    <use href="#sharp-petal" transform="rotate(0)" />
                    <use href="#sharp-petal" transform="rotate(15)" />
                    <use href="#sharp-petal" transform="rotate(30)" />
                </g>

                <g transform="translate(500, 20) scale(0.9)">
                    <use href="#sharp-petal-side" transform="rotate(-15) translate(-150, 0)" />
                    <use href="#sharp-petal-side" transform="scale(-1, 1) translate(-150, 0) rotate(-15) translate(-1160, 0)" />
                </g>

                <g transform="translate(500, 55) scale(0.85)">
                    <use href="#sharp-petal" transform="rotate(0)" />
                </g>
                
                <path d="M 400 35 Q 500 70 600 35 L 580 65 Q 500 80 420 65 Z" fill="url(#metalGold)" stroke="#d4af37" stroke-width="1" />
                <rect x="420" y="65" width="160" height="10" rx="5" fill="#8b6508" stroke="#daa520" stroke-width="0.5"/>

            </g>

        </svg>
    </div>
    
    <div id="ui-layer">
        <div class="hint-text">莊嚴淨土 ． 萬法唯心 ． 絕對無相</div>
        <div class="title-text">常寂光 ‧ 平面金身</div>
    </div>

</body>
</html>
