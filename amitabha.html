<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏法界 ‧ 合十無相金身</title>
    <style>
        :root {
            --bg-deep: #010103; 
            --gold-bright: #ffec8b;
            --gold-main: #d4af37;
            --gold-dark: #8b6508;
            --glow-color: rgba(255, 236, 139, 0.5);
        }
        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            background-image: radial-gradient(circle at 50% 40%, #1a1505 0%, #010103 70%);
            color: #fff; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; touch-action: none; user-select: none;
        }
        
        #buddha-container {
            width: 100%;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 5vh;
        }

        svg {
            width: 100%;
            max-width: 600px; /* 控制修長莊嚴的比例 */
            height: 100%;
        }

        /* 呼吸動畫 */
        .holy-glow {
            filter: drop-shadow(0 0 15px var(--glow-color));
            animation: breathGlow 4s infinite alternate ease-in-out;
        }
        @keyframes breathGlow {
            0% { filter: drop-shadow(0 0 10px rgba(255,236,139,0.3)); transform: translateY(0px); }
            100% { filter: drop-shadow(0 0 25px rgba(255,236,139,0.6)); transform: translateY(-4px); }
        }

        .lotus-glow {
            filter: drop-shadow(0 0 12px rgba(212,175,55,0.5));
        }

        /* 底部 UI */
        #ui-layer {
            height: 15vh;
            text-align: center;
            z-index: 10;
        }
        .hint-text {
            color: var(--gold-bright); font-size: 0.9rem; letter-spacing: 4px; 
            margin-bottom: 10px; opacity: 0.8;
        }
        .title-text {
            color: var(--gold-main); font-size: 1.3rem; font-weight: bold; letter-spacing: 6px;
            text-shadow: 0 0 15px rgba(212,175,55,0.8);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="buddha-container">
        <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="bodyGold" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#442200" />
                    <stop offset="20%" stop-color="#f3e5ab" />
                    <stop offset="45%" stop-color="#b8860b" />
                    <stop offset="55%" stop-color="#8b6508" />
                    <stop offset="85%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="#331a00" />
                </linearGradient>

                <linearGradient id="smoothGold" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#8b6508" />
                    <stop offset="50%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="#553300" />
                </linearGradient>

                <linearGradient id="petalGold" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="#331a00" />
                    <stop offset="50%" stop-color="#d4af37" />
                    <stop offset="100%" stop-color="#fff8dc" />
                </linearGradient>

                <g id="sharp-petal">
                    <path d="M 0 0 Q 30 -40, 0 -110 Q -30 -40, 0 0 Z" fill="url(#petalGold)" stroke="#fff8dc" stroke-width="1.5" stroke-linejoin="miter"/>
                    <path d="M 0 -10 Q 12 -40, 0 -85 Q -12 -40, 0 -10 Z" fill="none" stroke="#fbeeb7" stroke-width="0.8" opacity="0.6"/>
                </g>
                <g id="sharp-petal-side">
                    <path d="M 0 0 Q 25 -30, 15 -80 Q -10 -30, 0 0 Z" fill="url(#petalGold)" stroke="#fff8dc" stroke-width="1"/>
                </g>
            </defs>

            <circle cx="500" cy="380" r="320" fill="none" stroke="rgba(212,175,55,0.4)" stroke-width="2" />
            <circle cx="500" cy="380" r="260" fill="none" stroke="rgba(212,175,55,0.6)" stroke-width="1.5" />
            <circle cx="500" cy="380" r="200" fill="radial-gradient(circle, rgba(255,236,139,0.2) 0%, transparent 70%)" />

            <g class="holy-glow">
                
                <path d="M 478 220 C 478 240, 485 250, 500 250 C 515 250, 522 240, 522 220 Z" fill="url(#bodyGold)" />
                <path d="M 482 235 Q 500 245 518 235" fill="none" stroke="#fff8dc" stroke-width="1.5" opacity="0.6"/> <ellipse cx="465" cy="195" rx="5" ry="16" fill="url(#smoothGold)" />
                <ellipse cx="535" cy="195" rx="5" ry="16" fill="url(#smoothGold)" />

                <ellipse cx="500" cy="170" rx="38" ry="55" fill="url(#smoothGold)" />
                
                <path d="M 482 125 C 482 95, 518 95, 518 125 Z" fill="url(#smoothGold)" />
                <circle cx="500" cy="100" r="6" fill="#f3e5ab" filter="drop-shadow(0 0 5px #fff)"/>

                <path d="M 420 270 
                         C 420 250, 580 250, 580 270 
                         L 550 780 
                         C 550 800, 450 800, 450 780 Z" 
                      fill="url(#bodyGold)" />

                <path d="M 410 270 C 375 320, 390 470, 430 500 C 445 480, 450 450, 435 430 L 415 270 Z" fill="url(#smoothGold)" />
                <path d="M 590 270 C 625 320, 610 470, 570 500 C 555 480, 550 450, 565 430 L 585 270 Z" fill="url(#smoothGold)" />
                
                <path d="M 425 480 L 490 400 C 500 410, 500 420, 490 430 L 440 505 Z" fill="url(#smoothGold)" />
                <path d="M 575 480 L 510 400 C 500 410, 500 420, 510 430 L 560 505 Z" fill="url(#smoothGold)" />
                
                <path d="M 500 350 L 485 410 C 490 420, 510 420, 515 410 Z" fill="url(#smoothGold)" stroke="#fff8dc" stroke-width="1"/>

            </g>

            <g id="lotus-base" transform="translate(0, 770)" class="lotus-glow">
                
                <ellipse cx="500" cy="20" rx="120" ry="20" fill="#331a00" stroke="#d4af37" stroke-width="1.5" />
                <ellipse cx="500" cy="10" rx="115" ry="15" fill="url(#bodyGold)" />
                
                <g transform="translate(500, 20)">
                    <use href="#sharp-petal" transform="rotate(-70)" />
                    <use href="#sharp-petal" transform="rotate(-45)" />
                    <use href="#sharp-petal" transform="rotate(-20)" />
                    <use href="#sharp-petal" transform="rotate(20)" />
                    <use href="#sharp-petal" transform="rotate(45)" />
                    <use href="#sharp-petal" transform="rotate(70)" />
                </g>

                <g transform="translate(500, 30) scale(0.95)">
                    <use href="#sharp-petal" transform="rotate(-30)" />
                    <use href="#sharp-petal" transform="rotate(-15)" />
                    <use href="#sharp-petal" transform="rotate(15)" />
                    <use href="#sharp-petal" transform="rotate(30)" />
                </g>

                <g transform="translate(500, 10) scale(0.9)">
                    <use href="#sharp-petal-side" transform="rotate(-20) translate(-130, 0)" />
                    <use href="#sharp-petal-side" transform="scale(-1, 1) translate(-130, 0) rotate(-20) translate(-1160, 0)" />
                </g>

                <g transform="translate(500, 40) scale(0.9)">
                    <use href="#sharp-petal" transform="rotate(0)" />
                </g>
                
                <path d="M 420 25 Q 500 50 580 25 L 560 45 Q 500 60 440 45 Z" fill="url(#bodyGold)" />
                
            </g>

        </svg>
    </div>
    
    <div id="ui-layer">
        <div class="hint-text">輕 按 合 十</div>
        <div class="title-text">常寂光 ‧ 彌陀金身</div>
    </div>

</body>
</html>
