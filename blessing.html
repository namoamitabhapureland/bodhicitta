<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心念密室 ． 覺知連線與深度祈福</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #050505; color: #f3e5ab;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* 沉浸式星空/矩陣背景 */
        .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background-image: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0));
            background-repeat: repeat; background-size: 200px 200px; opacity: 0.3;
            animation: twinkle 5s infinite linear;
        }
        @keyframes twinkle { 0% {opacity: 0.2;} 50% {opacity: 0.5;} 100% {opacity: 0.2;} }

        .container {
            position: relative; z-index: 10; width: 90%; max-width: 500px;
            background: rgba(10, 10, 10, 0.8); border: 1px solid rgba(212,175,55,0.3);
            border-radius: 15px; padding: 30px; box-shadow: 0 0 30px rgba(0,0,0,0.9);
            text-align: center; backdrop-filter: blur(5px);
        }

        h2 { color: #d4af37; letter-spacing: 3px; border-bottom: 1px dashed rgba(212,175,55,0.4); padding-bottom: 15px; font-weight: normal; }
        p { color: rgba(255,255,255,0.8); line-height: 1.8; font-size: 0.95rem; letter-spacing: 1px; }

        /* 步驟區塊隱藏/顯示 */
        .step { display: none; animation: fadeIn 1s forwards; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 輸入與勾選框 */
        input[type="text"] {
            width: 90%; padding: 12px; margin: 15px 0; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(212,175,55,0.5); color: #fff; border-radius: 5px; text-align: center;
        }
        .quest-box {
            background: rgba(212,175,55,0.05); border: 1px solid rgba(212,175,55,0.2);
            padding: 15px; border-radius: 8px; margin: 20px 0; text-align: left;
        }
        .checkbox-label { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; color: #d4af37; font-size: 0.9rem;}

        /* 長按按鈕與進度條 */
        .btn {
            background: transparent; border: 1px solid #d4af37; color: #d4af37;
            padding: 12px 25px; border-radius: 8px; cursor: pointer; letter-spacing: 2px;
            transition: 0.3s; position: relative; overflow: hidden; margin-top: 15px; font-size: 1rem;
        }
        .btn:disabled { border-color: #555; color: #555; cursor: not-allowed; }
        
        .hold-btn { width: 100%; height: 50px; user-select: none; }
        .progress-bar {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%;
            background: rgba(212,175,55,0.3); z-index: -1; transition: width 0.1s linear;
        }

        /* 籤詩與光球 */
        .oracle-card {
            background: linear-gradient(145deg, rgba(212,175,55,0.1), rgba(0,0,0,0.8));
            border: 1px solid #d4af37; padding: 25px; border-radius: 10px; margin: 20px 0;
            box-shadow: 0 0 20px rgba(212,175,55,0.2);
        }
        .oracle-title { font-size: 1.1rem; color: #fff; margin-bottom: 15px; }
        
        .light-orb {
            width: 60px; height: 60px; background: radial-gradient(circle, #fff 10%, #d4af37 50%, transparent 80%);
            border-radius: 50%; margin: 20px auto; filter: blur(2px);
            animation: pulse 3s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); opacity: 0.7; } to { transform: scale(1.3); opacity: 1; box-shadow: 0 0 30px #d4af37; } }
        
        .orb-expand { animation: expandUniverse 2s forwards; }
        @keyframes expandUniverse { 0% { transform: scale(1); } 100% { transform: scale(50); opacity: 0; } }

        .back-link { position: absolute; top: 20px; left: 20px; color: #d4af37; text-decoration: none; z-index: 20; font-size: 0.9rem;}
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← 返回娑婆大廳</a>
    <div class="stars"></div>

    <div class="container">
        
        <div id="step1" class="step active">
            <h2>心念發射站</h2>
            <p>您當下正遭遇何種無常？<br>請將焦慮或祈願化作文字，凝聚於此。</p>
            <input type="text" id="wishInput" placeholder="例如：為家人祈求平安 / 對未來感到迷惘">
            <button class="btn" onclick="nextStep(2)">凝聚心念</button>
        </div>

        <div id="step2" class="step">
            <h2>覺知攔截</h2>
            <p style="color: #ff6b6b;">系統叩問：您現在的焦慮，是否因為害怕失去什麼？</p>
            
            <div class="quest-box">
                <p style="margin-top:0; color:#fff;">【 請求連線前置任務 】</p>
                <p style="font-size: 0.8rem; color: rgba(255,255,255,0.6);">沒有實際改變自身頻率的行動，法界無法與您對接。請擇一完成：</p>
                <label class="checkbox-label">
                    <input type="checkbox" id="questCheck" onchange="checkQuest()">
                    <span>我已如實完成以下其一：<br>1. 靜心禁語十分鐘<br>2. 進行一次微小佈施<br>3. 誦念佛號平息心緒</span>
                </label>
            </div>

            <p style="font-size: 0.8rem; color: #aaa;">※ 警告：非不得已，請勿隨意呼叫系統算力。</p>
            <button id="holdBtn" class="btn hold-btn" disabled>
                <div id="progressBar" class="progress-bar"></div>
                長按 3 秒啟動連線
            </button>
        </div>

        <div id="step3" class="step">
            <h2>連線成功 ． 系統回傳</h2>
            <div class="light-orb"></div>
            <div class="oracle-card">
                <div class="oracle-title" id="oracleTitle">【 讀取中... 】</div>
                <div id="oracleText" style="color: rgba(255,255,255,0.8); line-height: 1.6; text-align: justify;"></div>
            </div>
            <p style="font-size: 0.85rem; color: #aaa;">此為法界給予您當下載體的視角切換代碼。</p>
            <button class="btn" onclick="nextStep(4)">將此覺知進行大迴向</button>
        </div>

        <div id="step4" class="step">
            <h2>法界擴散</h2>
            <p>一滴水如何不乾涸？唯有投入大海。<br>您的祈願與覺知，已化作千百道光芒共享於法界。</p>
            <div class="light-orb" id="finalOrb"></div>
            <p style="margin-top: 30px; font-size: 0.9rem;">任務完成，防護網已重新啟動。</p>
            <button class="btn" onclick="window.location.href='index.html'">登出密室 ． 返回大廳</button>
        </div>

    </div>

    <script>
        // 覺知籤詩資料庫 (無吉凶，皆是視角切換)
        const oracles = [
            { title: "【 劇本更新 ． 覺知當下 】", text: "眼前之困境，皆是阿賴耶識中舊數據之釋放。勿將此身當作唯一的真實，您只是在體驗這個角色。看破劇本的起伏，演好當下的任務。" },
            { title: "【 資源調度 ． 利他則豐 】", text: "世間資源皆是幻象中的工具，為私利而求，猶如水中撈月；若發菩提心為利他而用，法界資源自然為您調度。請將今日所求之一切，迴向給更多需要的載體。" },
            { title: "【 隨緣定頻 ． 不退轉 】", text: "無需恐懼未知的無常，這套系統允許所有的試錯。只要心存善念，暗處的善知識與菩薩網路，終會在下一個節點與您相遇。您的方向沒有偏離。" },
            { title: "【 系統重置 ． 萬法皆空 】", text: "執著於得失，徒耗載體算力。放下即是最高效的除錯，將焦慮清空，重啟清淨的連線。世界如鏡，您若平靜，法界便給予您平靜。" }
        ];

        // 步驟切換邏輯
        function nextStep(step) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            
            if(step === 3) {
                // 隨機抽取籤詩
                let randomOracle = oracles[Math.floor(Math.random() * oracles.length)];
                document.getElementById('oracleTitle').innerText = randomOracle.title;
                document.getElementById('oracleText').innerText = randomOracle.text;
            }
            if(step === 4) {
                // 觸發光球擴散動畫
                setTimeout(() => {
                    document.getElementById('finalOrb').classList.add('orb-expand');
                }, 500);
            }
        }

        // 任務勾選檢核
        function checkQuest() {
            const isChecked = document.getElementById('questCheck').checked;
            const holdBtn = document.getElementById('holdBtn');
            holdBtn.disabled = !isChecked;
            if(!isChecked) holdBtn.style.borderColor = '#555';
            else holdBtn.style.borderColor = '#d4af37';
        }

        // 3秒長按邏輯
        const holdBtn = document.getElementById('holdBtn');
        const progressBar = document.getElementById('progressBar');
        let pressTimer;
        let progress = 0;
        let progressInterval;

        function startPress(e) {
            if(holdBtn.disabled) return;
            e.preventDefault();
            progress = 0;
            progressBar.style.width = '0%';
            
            progressInterval = setInterval(() => {
                progress += 3.33; // 約 3 秒滿 100%
                progressBar.style.width = progress + '%';
                if(progress >= 100) {
                    clearInterval(progressInterval);
                    nextStep(3); // 長按成功，進入籤詩頁
                }
            }, 100);
        }

        function cancelPress() {
            clearInterval(progressInterval);
            progress = 0;
            progressBar.style.width = '0%';
        }

        // 支援手機觸控與電腦滑鼠
        holdBtn.addEventListener('mousedown', startPress);
        holdBtn.addEventListener('mouseup', cancelPress);
        holdBtn.addEventListener('mouseleave', cancelPress);
        holdBtn.addEventListener('touchstart', startPress, {passive: false});
        holdBtn.addEventListener('touchend', cancelPress);
    </script>

</body>
</html>
