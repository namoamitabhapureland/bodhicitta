<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心念密室 ． 覺知連線與深度祈福</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #020202; color: #f3e5ab;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* 深邃虛空背景 */
        .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%); opacity: 0.6;
        }

        .container {
            position: relative; z-index: 10; width: 90%; max-width: 550px;
            background: rgba(5, 5, 5, 0.9); 
            border: 1.5px solid rgba(212,175,55,0.3); /* 金屬蝕刻邊框 */
            border-radius: 20px; padding: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 0 15px rgba(212,175,55,0.1) inset;
            text-align: center; backdrop-filter: blur(8px);
            animation: containerEntry 1.2s ease-out;
        }
        @keyframes containerEntry { from {opacity: 0; transform: scale(0.9) translateY(20px);} to {opacity: 1; transform: scale(1) translateY(0);} }

        /* 燙金風格標題 */
        h2 { 
            font-size: 1.4rem; color: #fff; letter-spacing: 5px; font-weight: normal; margin-top: 0;
            text-shadow: 0 0 10px rgba(212,175,55,0.8), 0 2px 2px rgba(0,0,0,0.8);
            border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 20px; margin-bottom: 25px;
        }
        p { color: rgba(255,255,255,0.75); line-height: 1.9; font-size: 0.95rem; letter-spacing: 1.5px; text-align: justify; text-align-last: center;}

        /* === 最高品質 ． 實心燙金樣式定義 === */
        :root {
            --gold-grad: linear-gradient(180deg, #FFD700 0%, #D4AF37 40%, #B8860B 60%, #D4AF37 80%, #8B6508 100%);
            --etching-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.3) inset;
        }

        /* 步驟區塊隱藏/顯示 */
        .step { display: none; }
        .step.active { display: block; animation: stepFadeIn 0.8s forwards; }
        @keyframes stepFadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 實心燙金輸入框 */
        input[type="text"] {
            width: 100%; box-sizing: border-box; padding: 18px; margin: 25px 0; 
            background: rgba(0,0,0,0.6);
            border: 1px solid #D4AF37; /* 實心金框 */
            color: #fff; border-radius: 12px; text-align: center; font-size: 1rem; letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5) inset; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { box-shadow: 0 0 15px rgba(212,175,55,0.4) inset, 0 0 10px rgba(212,175,55,0.3); }

        /* 前置任務對話框 (蝕刻風格) */
        .quest-box {
            background: rgba(10, 10, 10, 0.8); border: 1px solid rgba(212,175,55,0.25);
            padding: 25px; border-radius: 15px; margin: 30px 0; text-align: left;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7) inset;
        }
        .quest-title { font-size: 1rem; color: #fff; margin-top:0; margin-bottom: 15px; text-align:center; letter-spacing: 2px; text-shadow: 0 0 5px rgba(212,175,55,0.5);}
        .checkbox-label { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; color: #d4af37; font-size: 0.9rem; line-height: 1.7;}
        input[type="checkbox"] { accent-color: #D4AF37; width: 16px; height: 16px; margin-top: 3px; cursor: pointer;}

        /* === 實心燙金向量按鈕核心 (高品質) === */
        .gold-stamping-btn {
            width: 100%; height: 60px; border: none; border-radius: 12px; margin-top: 20px;
            background: var(--gold-grad); color: rgba(0,0,0,0.85);
            font-size: 1.1rem; letter-spacing: 3px; font-family: "PingFang TC", serif;
            box-shadow: var(--etching-shadow); text-shadow: 0 1px 1px rgba(255,255,255,0.4);
            cursor: pointer; transition: 0.3s ease; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .gold-stamping-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.4), var(--etching-shadow); }
        .gold-stamping-btn:active:not(:disabled) { transform: translateY(1px); filter: brightness(0.9); }
        .gold-stamping-btn:disabled { background: linear-gradient(180deg, #555, #333); color: #777; box-shadow: none; cursor: not-allowed; opacity: 0.6;}

        /* 長按進度條 (燙金光芒) */
        .progress-bar {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%;
            background: rgba(255,255,255,0.3); z-index: 1; transition: width 0.1s linear;
        }

        /* === 裊裊法香煙霧動畫 (粒子系統) === */
        #incense-smoke-container {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 200px; pointer-events: none; z-index: 5; display: none;
        }
        .smoke-particle {
            position: absolute; bottom: 0; left: 50%; background: #fff;
            border-radius: 50%; opacity: 0; filter: blur(5px);
        }
        @keyframes smokeRise {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            10% { opacity: 0.3; }
            50% { transform: translate(-70%, -100px) scale(1.5); opacity: 0.15; }
            80% { transform: translate(-30%, -160px) scale(2); opacity: 0.05; }
            100% { transform: translate(-50%, -200px) scale(2.5); opacity: 0; }
        }

        /* 籤詩與光球樣式升級 */
        .oracle-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.9), rgba(5,5,5,1));
            border: 1px solid #d4af37; padding: 30px; border-radius: 15px; margin: 30px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 15px rgba(212,175,55,0.1) inset;
        }
        .light-orb {
            width: 70px; height: 70px; background: radial-gradient(circle, #fff 10%, #d4af37 50%, transparent 80%);
            border-radius: 50%; margin: 25px auto; filter: blur(2px); animation: pulse 3s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.2); opacity: 1; box-shadow: 0 0 40px #d4af37; } }
        .orb-expand { animation: expandUniverse 2.5s forwards ease-in; }
        @keyframes expandUniverse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(60); opacity: 0; } }

        .back-link { position: absolute; top: 25px; left: 25px; color: rgba(212,175,55,0.7); text-decoration: none; z-index: 20; font-size: 0.9rem; letter-spacing: 1px;}
        .back-link:hover { color: #fff; text-shadow: 0 0 5px #d4af37; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← 返回娑婆大廳</a>
    <div class="stars"></div>

    <div id="incense-smoke-container"></div>

    <div class="container">
        
        <div id="step1" class="step active">
            <h2>心念發射站</h2>
            <p>您當下正遭遇何種無常卡關？<br>請將焦慮或祈願化作文字，凝聚於此。</p>
            <input type="text" id="wishInput" placeholder="請輸入... 例如：對未來感到迷惘">
            <button class="gold-stamping-btn" onclick="nextStep(2)">凝聚心念</button>
        </div>

        <div id="step2" class="step" style="position:relative;">
            <h2>覺知攔截</h2>
            <p style="color: #ff8e8e; text-align:center; text-align-last: center;">系統叩問：您當下的焦慮與所求，<br>是否因為害怕失去什麼？</p>
            
            <div class="quest-box">
                <p class="quest-title">【 請求連線前置願行 】</p>
                <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top:0; margin-bottom: 15px;">沒有付出行動改變當下頻率，法界無法對接。請擇一如實完成：</p>
                <label class="checkbox-label">
                    <input type="checkbox" id="questCheck" onchange="checkQuest()">
                    <span>我已如實完成以下其一願行：<br>1. 靜心禁語十分鐘<br>2. 行一次佈施(財/法/無畏)<br>3. 誦念佛號三百遍平息心緒</span>
                </label>
            </div>

            <p style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">※ 警告：非不得已，請勿隨意呼叫系統算力。</p>
            
            <button id="holdBtn" class="gold-stamping-btn" disabled style="height: 60px;">
                <div id="progressBar" class="progress-bar"></div>
                <span style="z-index: 2; position:relative;">長按 3 秒啟動連線</span>
            </button>
        </div>

        <div id="step3" class="step">
            <h2>連線成功 ． 系統回傳</h2>
            <div class="light-orb"></div>
            <div class="oracle-card">
                <div id="oracleTitle" style="font-size: 1.2rem; color: #fff; margin-bottom: 20px; text-align:center; text-shadow: 0 0 5px #d4af37;">【 讀取中... 】</div>
                <div id="oracleText" style="color: rgba(255,255,255,0.85); line-height: 1.8; text-align: justify; letter-spacing: 1px;"></div>
            </div>
            <p style="font-size: 0.85rem; color: #aaa; margin-bottom: 25px;">此為法界給予您當下載體的視角切換代碼，請靜心參悟。</p>
            <button class="gold-stamping-btn" onclick="nextStep(4)">將此覺知進行大迴向</button>
        </div>

        <div id="step4" class="step">
            <h2>法界擴散 ． 願力普施</h2>
            <p>一滴水如何不乾涸？唯有投入大海。<br>您的祈願與覺知，已化作千百道光芒共享於法界。</p>
            <div class="light-orb" id="finalOrb"></div>
            <p style="margin-top: 40px; font-size: 0.9rem; color: #d4af37;">任務圓滿，防護網已重新啟動。</p>
            <button class="gold-stamping-btn" onclick="window.location.href='index.html'">登出密室 ． 返回大廳</button>
        </div>

    </div>

    <script>
        // === 籤詩資料庫升級 (更符合佛法修說法) ===
        const oracles = [
            { title: "【 劇本更新 ． 觀無常 】", text: "眼前之困境與得失，皆是阿賴耶識中舊有幻象數據之釋放。萬法皆幻，唯覺不迷。勿將此暫時的角色當作真實的自己。看破戲夢劇本，安住當下任務，便是解脫。" },
            { title: "【 資源調度 ． 菩提行 】", text: "世間資源皆是幻象中的工具，為私利而求，猶如水中撈月，終不可得；若發大菩提心為利他而用，法界資源自然為您調度。將今日所求之一切，迴向給更多苦難眾生，頻率方能無限放大。" },
            { title: "【 隨緣定頻 ． 不退轉 】", text: "無需恐懼未知的無常風暴，這套極樂系統擁有絕對的容錯與保護機制。只要心存善念，利他願力不失，暗處的善知識網路與諸佛菩薩，終會在下一個因緣節點與您相遇。您的方向沒有偏離。" },
            { title: "【 系統重置 ． 歸零心 】", text: "執著於過去或未來的成敗，徒耗載體寶貴的算力與能量。放下即是最高效的除錯，將焦慮清空，重啟清淨的連線。心淨則國土淨，世界如鏡，您若安定，法界便給予您無盡的安定。" }
        ];

        // 步驟切換邏輯
        function nextStep(step) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            
            if(step === 3) {
                // 隨機抽取籤詩
                let randomOracle = oracles[Math.floor(Math.random() * oracles.length)];
                document.getElementById('oracleTitle').innerText = randomOracle.title;
                document.getElementById('oracleText').innerText = randomOracle.text;
            }
            if(step === 4) {
                // 觸發光球擴散動畫
                setTimeout(() => {
                    document.getElementById('finalOrb').classList.add('orb-expand');
                }, 500);
            }
        }

        // 任務勾選檢核
        function checkQuest() {
            const isChecked = document.getElementById('questCheck').checked;
            document.getElementById('holdBtn').disabled = !isChecked;
        }

        // === 香煙繚繞動畫邏輯 ===
        const smokeContainer = document.getElementById('incense-smoke-container');
        let smokeParticles = [];

        function createSmokeParticle() {
            const particle = document.createElement('div');
            particle.className = 'smoke-particle';
            // 隨機大小與位置
            const size = Math.random() * 20 + 10;
            const startX = Math.random() * 40 + 30; // 30% - 70% 範圍
            
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = startX + '%';
            
            // 隨機動畫時間
            const duration = Math.random() * 2 + 3; // 3s - 5s
            particle.style.animation = `smokeRise ${duration}s ease-out forwards`;
            
            smokeContainer.appendChild(particle);
            
            // 動態結束後移除粒子
            setTimeout(() => {
                particle.remove();
            }, duration * 1000);
        }

        let smokeInterval;
        function startSmoke() {
            smokeContainer.style.display = 'block';
            smokeInterval = setInterval(createSmokeParticle, 150); // 每150ms建立一個
        }
        function stopSmoke() {
            clearInterval(smokeInterval);
            // 讓剩餘粒子飄完，不立即清空
            setTimeout(() => {
                if(progress < 100) smokeContainer.style.display = 'none';
            }, 2000);
        }

        // === 3秒長按邏輯 (整合煙霧動畫) ===
        const holdBtn = document.getElementById('holdBtn');
        const progressBar = document.getElementById('progressBar');
        let progress = 0;
        let progressInterval;

        function startPress(e) {
            if(holdBtn.disabled) return;
            e.preventDefault();
            progress = 0;
            progressBar.style.width = '0%';
            
            // 啟動香煙繚繞動畫
            startSmoke();
            
            progressInterval = setInterval(() => {
                progress += 3.33; // 約 3 秒滿 100%
                progressBar.style.width = progress + '%';
                if(progress >= 100) {
                    clearInterval(progressInterval);
                    stopSmoke(); // 停止生成新粒子
                    nextStep(3); // 長按成功，進入籤詩頁
                }
            }, 100);
        }

        function cancelPress() {
            if(progress < 100) { // 如果還沒跑完就放開
                clearInterval(progressInterval);
                progress = 0;
                progressBar.style.width = '0%';
                stopSmoke(); // 停止煙霧
            }
        }

        // 支援手機觸控與電腦滑鼠
        holdBtn.addEventListener('mousedown', startPress);
        holdBtn.addEventListener('mouseup', cancelPress);
        holdBtn.addEventListener('mouseleave', cancelPress);
        holdBtn.addEventListener('touchstart', startPress, {passive: false});
        holdBtn.addEventListener('touchend', cancelPress);
    </script>

</body>
</html>
