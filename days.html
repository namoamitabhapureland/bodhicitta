<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>無相懺 ． 琉璃洗心</title>
    <style>
        :root { --bg: #000; --gold: #f3e5ab; --cyan: #8ba89c; }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); font-family: "PingFang TC", serif; overflow: hidden; touch-action: none; width: 100vw; height: 100dvh; color: #fff; overscroll-behavior: none; }

        /* 畫布層 */
        canvas { position: absolute; inset: 0; }
        #starCanvas { z-index: 1; }
        #waterCanvas { z-index: 2; pointer-events: none; } /* 恢復原始水的層級與透明度 */

        /* 1. 大光球吞噬過場 */
        #burst-light { 
            position: fixed; top: 50%; left: 50%; width: 5px; height: 5px; border-radius: 50%; 
            background: #fff; box-shadow: 0 0 100px 80px #fff, 0 0 250px 150px var(--gold); 
            transform: translate(-50%, -50%) scale(0); opacity: 0; z-index: 9999; pointer-events: none; 
            transition: transform 1.2s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.8s; 
        }

        /* PAGE 1: 啟程 (無返回鍵) */
        #page-1 { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .p1-title { color: var(--gold); font-size: 1.6rem; letter-spacing: 12px; font-weight: bold; text-shadow: 0 0 25px rgba(212,175,55,0.8); margin-bottom: 20px; }
        .p1-sub { color: #888; font-size: 0.9rem; letter-spacing: 5px; animation: breath 2s infinite alternate; }
        @keyframes breath { from { opacity: 0.2; } to { opacity: 1; } }

        /* PAGE 2: 四眼與洗心 */
        #page-2 { position: absolute; inset: 0; z-index: 20; display: none; }
        
        /* 返回鍵與狀態 (僅在第二頁) */
        .back-btn { position: absolute; top: 20px; left: 20px; z-index: 1000; color: var(--gold); display: flex; align-items: center; gap: 8px; cursor: pointer; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3); backdrop-filter: blur(5px); font-size: 0.9rem; }
        .back-btn:active { transform: scale(0.95); }
        #status-panel { position: absolute; top: 75px; left: 5%; width: 90%; max-width: 320px; border-left: 2px solid var(--cyan); padding: 10px 20px; z-index: 100; pointer-events: none; }
        .s-title { font-size: 1.1rem; font-weight: bold; color: var(--cyan); letter-spacing: 2px; text-shadow: 0 2px 6px #000; }

        /* ================= 核心：四個會呼吸旋轉放光的覺照之眼 ================= */
        #eyes-layer { position: absolute; inset: 0; z-index: 30; pointer-events: none; }
        .eye-container {
            position: absolute; cursor: pointer; pointer-events: auto;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; justify-content: center; align-items: center;
        }
        .eye-svg {
            width: 100%; height: 100%; color: inherit;
            animation: spin-breathe 6s infinite alternate ease-in-out;
        }
        .eye-container:active { transform: scale(0.85); }
        .eye-container.hidden { opacity: 0; transform: scale(0) rotate(180deg); pointer-events: none; }
        
        #eye-0 { width: 55px; height: 55px; top: 25%; left: 25%; color: #8ba89c; animation: float-y 4s ease-in-out infinite alternate; filter: drop-shadow(0 0 15px #8ba89c); }
        #eye-0 .eye-svg { animation-duration: 7s; }
        
        #eye-1 { width: 85px; height: 85px; top: 40%; right: 18%; color: #f3e5ab; animation: float-y 5s ease-in-out infinite alternate-reverse; filter: drop-shadow(0 0 20px #f3e5ab); }
        #eye-1 .eye-svg { animation-duration: 9s; animation-direction: alternate-reverse; }
        
        #eye-2 { width: 65px; height: 65px; bottom: 25%; left: 30%; color: #ff9a9e; animation: float-y 6s ease-in-out infinite alternate; filter: drop-shadow(0 0 15px #ff9a9e); }
        #eye-2 .eye-svg { animation-duration: 8s; }
        
        #eye-3 { width: 100px; height: 100px; bottom: 35%; right: 35%; color: #ffffff; animation: float-y 4.5s ease-in-out infinite alternate-reverse; filter: drop-shadow(0 0 25px #ffffff); }
        #eye-3 .eye-svg { animation-duration: 10s; animation-direction: alternate-reverse; }

        @keyframes float-y { 0% { margin-top: 0px; } 100% { margin-top: -30px; } }
        @keyframes spin-breathe {
            0% { transform: rotate(-15deg) scale(0.85); filter: brightness(0.8); }
            100% { transform: rotate(15deg) scale(1.15); filter: brightness(1.5); }
        }

        /* ================= 洗心卡片 ================= */
        #card-wrap { position: absolute; inset: 0; z-index: 100; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .g-card { 
            position: absolute; width: 280px; height: 420px; 
            background: linear-gradient(135deg, rgba(20,25,30,0.9), rgba(5,10,15,0.98)); 
            border-radius: 30px; padding: 35px; border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            box-shadow: 0 40px 80px rgba(0,0,0,1), inset 0 0 30px rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transform: scale(0.3) translateY(200px); 
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .g-card.active { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
        
        /* 整張卡片昇華消融特效 */
        .g-card.sublimate { 
            filter: blur(25px) brightness(2.5); opacity: 0; 
            transform: translateY(-200px) scale(1.3); 
            transition: all 1.5s cubic-bezier(0.25, 0.1, 0.25, 1); 
            pointer-events: none; 
        }

        .neon-box { position: absolute; inset: 0; border-radius: 30px; padding: 2.5px; background: linear-gradient(135deg, var(--c1), var(--c2), var(--c3), var(--c1)); background-size: 200% 200%; -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; animation: n-flow 4s linear infinite; }
        @keyframes n-flow { 0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; } }

        .c-inner { text-align: center; width: 100%; opacity: 0; transition: opacity 0.6s 0.4s; }
        .active .c-inner { opacity: 1; }
        .c-type { color: rgba(255,255,255,0.4); font-size: 0.75rem; letter-spacing: 6px; margin-bottom: 25px; font-weight: bold; }
        .c-title { color: #fff; font-size: 1.5rem; font-weight: bold; letter-spacing: 4px; margin-bottom: 30px; }
        .c-desc { color: #ccc; font-size: 1rem; line-height: 2.2; text-align: justify; text-align-last: center; }

        /* ================= 洗滌控制按鈕 ================= */
        #wash-zone { position: absolute; bottom: 8%; width: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; transition: 0.8s; z-index: 200; }
        #wash-zone.show { opacity: 1; pointer-events: auto; }
        .w-btn { width: 85px; height: 85px; border-radius: 50%; position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .w-core { width: 32px; height: 32px; border-radius: 50%; background: #fff; box-shadow: 0 0 25px #fff, 0 0 50px var(--cyan); transition: 0.4s; }
        .w-btn:active .w-core { transform: scale(0.85); filter: brightness(1.5); }
        .w-prog { position: absolute; inset: -5px; transform: rotate(-90deg); pointer-events: none; }
        .w-txt { margin-top: 15px; font-size: 0.85rem; color: var(--cyan); letter-spacing: 3px; font-weight: bold; }

        .dust { position: fixed; border-radius: 50%; pointer-events: none; mix-blend-mode: screen; z-index: 9999; }
        #final-msg { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 2s; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

    <canvas id="starCanvas"></canvas>
    <canvas id="waterCanvas"></canvas>
    
    <!-- 大光球吞噬過場 -->
    <div id="burst-light"></div>

    <!-- 頁面 1: 啟程 (無返回鍵) -->
    <div id="page-1" onclick="handleBurst()">
        <div class="p1-title">琉璃洗心 ． 照心鏡</div>
        <div class="p1-sub">輕觸水面 ． 覺照入陣</div>
    </div>

    <!-- 頁面 2: 四眼浮水、飛出卡片 -->
    <div id="page-2">
        <div class="back-btn" onclick="location.href='index.html?screen=3'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            返回道場
        </div>
        
        <div id="status-panel">
            <div class="s-title">四眼覺照 ． 塵垢昇華</div>
            <!-- 說明文字已移除 -->
        </div>

        <!-- 水面上的四枚覺眼 (統一樣式 SVG) -->
        <div id="eyes-layer">
            <div class="eye-container" id="eye-0" onclick="popCard(0)">
                <svg class="eye-svg" viewBox="0 0 100 100"><path d="M10,50 Q50,10 90,50 Q50,90 10,50 Z" fill="none" stroke="currentColor" stroke-width="4"/><circle cx="50" cy="50" r="18" fill="currentColor"/></svg>
            </div>
            <div class="eye-container" id="eye-1" onclick="popCard(1)">
                <svg class="eye-svg" viewBox="0 0 100 100"><path d="M10,50 Q50,10 90,50 Q50,90 10,50 Z" fill="none" stroke="currentColor" stroke-width="4"/><circle cx="50" cy="50" r="18" fill="currentColor"/></svg>
            </div>
            <div class="eye-container" id="eye-2" onclick="popCard(2)">
                <svg class="eye-svg" viewBox="0 0 100 100"><path d="M10,50 Q50,10 90,50 Q50,90 10,50 Z" fill="none" stroke="currentColor" stroke-width="4"/><circle cx="50" cy="50" r="18" fill="currentColor"/></svg>
            </div>
            <div class="eye-container" id="eye-3" onclick="popCard(3)">
                <svg class="eye-svg" viewBox="0 0 100 100"><path d="M10,50 Q50,10 90,50 Q50,90 10,50 Z" fill="none" stroke="currentColor" stroke-width="4"/><circle cx="50" cy="50" r="18" fill="currentColor"/></svg>
            </div>
        </div>

        <!-- 字卡共用容器 -->
        <div id="card-wrap">
            <div class="g-card" id="main-card">
                <div class="neon-box" id="ui-neon"></div>
                <div class="c-inner" id="c-inner">
                    <div class="c-type" id="ui-type"></div>
                    <div class="c-title" id="ui-title"></div>
                    <div class="c-desc" id="ui-desc"></div>
                </div>
            </div>
        </div>

        <div id="wash-zone">
            <div class="w-btn" id="w-btn">
                <svg class="w-prog" width="95" height="95"><circle id="prog-circle" cx="47.5" cy="47.5" r="44" fill="none" stroke="#fff" stroke-width="4" stroke-dasharray="277" stroke-dashoffset="277" stroke-linecap="round"/></svg>
                <div class="w-core"></div>
            </div>
            <div class="w-txt">長按洗滌 ． 塵垢昇華</div>
        </div>

        <div id="final-msg">
            <div style="color:var(--gold); font-size:1.6rem; letter-spacing:10px; font-weight:bold; margin-bottom:20px;">清淨無礙</div>
            <div style="color:#aaa; font-size:1rem; letter-spacing:3px;">心若琉璃 ． 法界自明</div>
        </div>
    </div>

<script>
    // --- 1. 彩色星空 ---
    const sCvs = document.getElementById('starCanvas'), sCtx = sCvs.getContext('2d');
    let sw, sh, stars = [];
    const CLRS = ['#f3e5ab', '#ffffff', '#89CFF0', '#C9A0DC', '#ff9a9e'];
    function resS() { sw=sCvs.width=window.innerWidth; sh=sCvs.height=window.innerHeight; }
    window.addEventListener('resize', resS); resS();
    for(let i=0; i<250; i++) stars.push({ x:Math.random()*2000-1000, y:Math.random()*2000-1000, z:Math.random()*2000, c:CLRS[i%5], s:Math.random()*1.5+0.5 });
    function drawS() {
        sCtx.fillStyle='#000'; sCtx.fillRect(0,0,sw,sh);
        stars.forEach(s=>{
            s.z -= 0.6; if(s.z<=0) s.z=2000;
            let sc=400/(400+s.z); sCtx.beginPath(); sCtx.arc(sw/2+s.x*sc, sh/2+s.y*sc, s.s*sc*1.5, 0, Math.PI*2);
            sCtx.fillStyle=s.c; sCtx.globalAlpha=Math.min(1, sc*2.5); sCtx.fill();
        }); requestAnimationFrame(drawS);
    } drawS();

    // --- 2. 恢復您稱讚的彩色波浪八功德水 ---
    const wCvs = document.getElementById('waterCanvas'), wCtx = wCvs.getContext('2d');
    let ww, wh, wTime=0;
    function resW() { ww=wCvs.width=window.innerWidth; wh=wCvs.height=window.innerHeight; }
    window.addEventListener('resize', resW); resW();
    function drawW() {
        wCtx.clearRect(0,0,ww,wh);
        wTime += 0.005;

        for (let i = 0; i < 3; i++) {
            wCtx.beginPath();
            let shift = i * 2;
            let grad = wCtx.createLinearGradient(0, 0, ww, wh);
            // 隨時間變化的彩色漸層 (青色系與金色系交織)
            let hue1 = Math.sin(wTime) * 30 + 190; 
            let hue2 = Math.cos(wTime) * 30 + 45;  
            grad.addColorStop(0, `hsla(${hue1}, 70%, 20%, 0.4)`);
            grad.addColorStop(0.5, `hsla(${hue2}, 60%, 30%, 0.3)`);
            grad.addColorStop(1, `hsla(${hue1 + 40}, 80%, 15%, 0.5)`);
            
            wCtx.fillStyle = grad;

            // 繪製立體晃動感
            for (let x = 0; x <= ww; x += 5) {
                let y = Math.sin(x * 0.005 + wTime + shift) * 40 
                      + Math.sin(x * 0.01 - wTime * 2) * 20 
                      + (wh * 0.6) 
                      + Math.cos(wTime + i) * 30;
                if (x === 0) wCtx.moveTo(x, y); else wCtx.lineTo(x, y);
            }
            wCtx.lineTo(ww, wh); wCtx.lineTo(0, wh); wCtx.fill();
        }
        
        // 頂部琉璃反光
        wCtx.globalCompositeOperation = 'screen';
        wCtx.fillStyle = 'rgba(255,255,255,0.05)';
        wCtx.beginPath();
        wCtx.ellipse(ww/2, wh*0.5, ww*0.8, wh*0.2, 0, 0, Math.PI*2);
        wCtx.fill();
        wCtx.globalCompositeOperation = 'source-over';

        requestAnimationFrame(drawW);
    } drawW();

    // --- 3. 邏輯庫 ---
    const DB = [
        { t: "語業之垢", h: "妄語惡言", d: "今日是否曾因情緒或利益，以言語傷人、抱怨、誇大其詞，或於背後說人是非？", c: "--c1:#89CFF0;--c2:#48CAE4;--c3:#00B4D8" },
        { t: "意業之垢", h: "瞋恚結怨", d: "今日是否曾因外境不順或他人冒犯，於心中生起怒火，甚至懷忿不捨，遲遲不願放下？", c: "--c1:#f3e5ab;--c2:#d4af37;--c3:#ffb703" },
        { t: "意業之垢", h: "傲慢自讚", d: "今日是否曾於心中暗自比較，覺得他人不如自己，甚至為了面子而自讚毀他？", c: "--c1:#ff9a9e;--c2:#fbc2eb;--c3:#a18cd1" },
        { t: "身業之垢", h: "貪吝不捨", d: "今日是否在應當付出資源或幫助他人時，生起慳吝之心，不願給予方便？", c: "--c1:#e0e0e0;--c2:#ffffff;--c3:#cfd9df" }
    ];
    let activeIdx = -1, cardsLeft = DB.length;

    function handleBurst() {
        const b = document.getElementById('burst-light');
        b.style.opacity = '1';
        b.style.transform = 'translate(-50%, -50%) scale(150)'; // 極速膨脹吞噬
        
        setTimeout(() => {
            document.getElementById('page-1').style.display = 'none';
            document.getElementById('page-2').style.display = 'block';
            b.style.opacity = '0';
        }, 1000);
    }

    function popCard(idx) {
        if(activeIdx !== -1) return; // 鎖定操作
        activeIdx = idx;
        const card = document.getElementById('main-card');
        const eye = document.getElementById(`eye-${idx}`);
        
        // 點擊後眼睛消失
        eye.classList.add('hidden'); 
        
        // 載入資料
        document.getElementById('ui-type').innerText = DB[idx].t;
        document.getElementById('ui-title').innerText = DB[idx].h;
        document.getElementById('ui-desc').innerText = DB[idx].d;
        document.getElementById('ui-neon').style.cssText = DB[idx].c;
        
        // 卡片飛出
        card.classList.remove('sublimate');
        card.classList.add('active'); 
        
        setTimeout(() => document.getElementById('wash-zone').classList.add('show'), 1000);
    }

    // --- 4. 洗滌與全卡消融 ---
    const wBtn = document.getElementById('w-btn'), prog = document.getElementById('prog-circle');
    let timer, startT;

    function onDown(e) {
        if(activeIdx === -1) return;
        e.preventDefault(); startT = Date.now();
        timer = setInterval(() => {
            let p = Math.min((Date.now() - startT) / 1800, 1);
            prog.style.strokeDashoffset = 277 - (277 * p);
            if(p >= 1) finish();
        }, 30);
    }
    function onUp() { clearInterval(timer); prog.style.strokeDashoffset = 277; }

    function finish() {
        clearInterval(timer);
        const card = document.getElementById('main-card');
        
        // 整張卡片觸發昇華 CSS
        card.classList.remove('active');
        card.classList.add('sublimate'); 
        
        genDust(); // 發射實體光塵
        document.getElementById('wash-zone').classList.remove('show');
        
        setTimeout(() => {
            activeIdx = -1; 
            cardsLeft--;
            prog.style.strokeDashoffset = 277;
            
            // 檢查是否圓滿
            if(cardsLeft === 0) {
                setTimeout(() => {
                    document.getElementById('final-msg').style.opacity = '1';
                    setTimeout(() => location.href='index.html?screen=3', 4000);
                }, 800);
            }
        }, 1500);
    }

    function genDust() {
        const rc = document.getElementById('main-card').getBoundingClientRect();
        for(let i=0; i<60; i++) {
            let d = document.createElement('div'); d.className = 'dust';
            d.style.left = rc.left + Math.random()*rc.width + 'px'; d.style.top = rc.top + Math.random()*rc.height + 'px';
            let s = Math.random()*8 + 2; d.style.width = s+'px'; d.style.height = s+'px';
            d.style.background = CLRS[Math.floor(Math.random()*4)]; d.style.boxShadow = `0 0 15px ${d.style.background}`;
            document.body.appendChild(d);
            
            d.animate([
                {opacity: 1, transform: 'translate(0,0) scale(1)'}, 
                {opacity: 0, transform: `translate(${(Math.random()-0.5)*200}px, -400px) scale(0)`}
            ], {duration: 2500 + Math.random()*1000, easing: 'ease-out', fill: 'forwards'});
            setTimeout(() => d.remove(), 3600);
        }
    }

    wBtn.addEventListener('mousedown', onDwn); wBtn.addEventListener('touchstart', onDwn, {passive:false});
    window.addEventListener('mouseup', onUp); window.addEventListener('touchend', onUp);
</script>
</body>
</html>
