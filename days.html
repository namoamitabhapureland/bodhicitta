<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>如意寶幢 ． 契印預覽</title>
    <style>
        body {
            background: #020203;
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, #020203 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            gap: 60px;
        }
        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .label {
            color: #f3e5ab;
            letter-spacing: 5px;
            font-size: 0.85rem;
            text-shadow: 0 0 10px rgba(212,175,55,0.4);
        }
        .jewel-box {
            width: 140px;
            height: 140px;
            position: relative;
        }
        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }
        
        /* 狀態 1：未點亮 (預設星空背景中的隱藏狀態) */
        .unlit {
            opacity: 0.15;
            filter: drop-shadow(0 0 2px rgba(212,175,55,0.3));
            transition: 1s;
        }
        .unlit:hover {
            opacity: 0.4;
        }

        /* 狀態 2：已點亮 (達成任務後的狀態，自帶懸浮呼吸與光暈) */
        .lit {
            opacity: 1;
            animation: float-jewel 4s infinite alternate ease-in-out;
        }
        
        @keyframes float-jewel {
            0% { 
                transform: translateY(0) scale(1); 
                filter: drop-shadow(0 0 15px rgba(212,175,55,0.4)); 
            }
            100% { 
                transform: translateY(-12px) scale(1.05); 
                filter: drop-shadow(0 0 35px rgba(212,175,55,0.9)) drop-shadow(0 0 10px #fff); 
            }
        }
    </style>
</head>
<body>

    <!-- 漸層與向量定義區 (移植自您的主系統) -->
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
        <defs>
            <linearGradient id="f-light" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="#fff" stop-opacity="0.1"/>
            </linearGradient>
            <linearGradient id="g-gold" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fff8dc"/>
                <stop offset="50%" stop-color="#f3e5ab"/>
                <stop offset="100%" stop-color="#d4af37"/>
            </linearGradient>
            
            <!-- 如意寶 (Cintamani) 幾何向量 -->
            <g id="cintamani-shape">
                <!-- 1. 底座：簡化版金剛托座 -->
                <path d="M 30,82 L 70,82 L 60,92 L 40,92 Z" fill="url(#g-gold)" opacity="0.9"/>
                <path d="M 25,82 Q 50,95 75,82" fill="none" stroke="url(#g-gold)" stroke-width="2"/>
                <path d="M 35,92 L 65,92" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
                
                <!-- 2. 寶珠本體：水滴狀外框 -->
                <path d="M 50,12 C 85,45 85,78 50,78 C 15,78 15,45 50,12 Z" 
                      fill="rgba(212,175,55,0.06)" stroke="url(#g-gold)" stroke-width="2.5"/>
                
                <!-- 3. 寶珠內核：高光玻璃質感 -->
                <path d="M 50,26 C 70,50 70,72 50,72 C 30,72 30,50 50,26 Z" 
                      fill="url(#f-light)" opacity="0.85"/>
                
                <!-- 4. 法焰飾紋：寶珠頂端的經典火焰弧線 -->
                <path d="M 50,12 Q 62,24 50,34" fill="none" stroke="#f3e5ab" stroke-width="1.5" opacity="0.9"/>
                <path d="M 50,12 Q 38,24 50,34" fill="none" stroke="#f3e5ab" stroke-width="1.5" opacity="0.9"/>
                
                <!-- 5. 表面星芒折射 -->
                <path d="M 40,42 L 44,46 M 60,42 L 56,46" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
            </g>
        </defs>
    </svg>

    <!-- 預覽區塊 -->
    <div class="preview-container">
        <div class="label">未點亮 ． 潛藏星空</div>
        <div class="jewel-box">
            <svg class="unlit" viewBox="0 0 100 100"><use href="#cintamani-shape"/></svg>
        </div>
    </div>

    <div class="preview-container">
        <div class="label">已契印 ． 步步生光</div>
        <div class="jewel-box">
            <svg class="lit" viewBox="0 0 100 100"><use href="#cintamani-shape"/></svg>
        </div>
    </div>

</body>
</html>
