<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>普賢行願 ． 菩提心室</title>
    <style>
        :root {
            --bg-deep: #010103; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
        }

        /* ---------------- 星空引擎 ---------------- */
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(circle at center, transparent 10%, rgba(1, 1, 3, 0.95) 100%); }

        /* ---------------- 頂部導航 ---------------- */
        .top-nav { position: absolute; top: 0; width: 100%; padding: calc(max(20px, env(safe-area-inset-top, 20px))) 20px 20px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .btn-nav { background: rgba(255,255,255,0.03); border: 1px solid rgba(139,168,156,0.3); color: var(--cyan); padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px); display: flex; align-items: center; gap: 6px;}
        .btn-nav:active { background: rgba(139,168,156,0.15); transform: scale(0.95); }
        .btn-gold { border-color: rgba(212,175,55,0.4); color: var(--gold); }

        /* ---------------- 通天琉璃光柱 (大能量棒) ---------------- */
        #pillar-container { position: absolute; top: 0; bottom: 0; left: 50%; transform: translateX(-50%); width: 120px; z-index: 5; pointer-events: none; display: flex; align-items: flex-end; justify-content: center; }
        #pillar-core { 
            width: 100%; height: 0%; /* 高度由 JS 控制 (0% 到 100%) */
            background: linear-gradient(to top, rgba(0, 229, 255, 0.1), rgba(212, 175, 55, 0.4), rgba(255, 255, 255, 0.8));
            filter: drop-shadow(0 0 20px rgba(212,175,55,0.6));
            transition: height 1.5s cubic-bezier(0.2, 0.8, 0.2, 1), filter 1s;
            position: relative;
        }
        /* 光柱底座光暈 */
        #pillar-base { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); width: 200px; height: 40px; background: radial-gradient(ellipse, rgba(212,175,55,0.4) 0%, transparent 70%); filter: blur(5px); }

        /* ---------------- 題庫玉簡面板 ---------------- */
        #q-panel { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 450px; background: linear-gradient(145deg, rgba(15, 20, 25, 0.85), rgba(5, 8, 10, 0.95)); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 40px 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 50; text-align: center; }
        
        .accumulate-text { color: var(--cyan); font-size: 0.75rem; letter-spacing: 4px; margin-bottom: 20px; text-transform: uppercase; }
        #q-title { color: var(--gold); font-size: 1.15rem; letter-spacing: 5px; margin-bottom: 20px; text-shadow: 0 0 15px rgba(212,175,55,0.4); font-weight: 300; border-bottom: 1px solid rgba(212,175,55,0.15); padding-bottom: 15px; }
        #q-text { color: #e0e0e0; font-size: 0.95rem; line-height: 2.2; letter-spacing: 2px; text-align: justify; text-align-last: center; font-weight: 300; min-height: 100px; }

        /* ---------------- 長按印心按鈕 ---------------- */
        #seal-wrap { position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%); width: 110px; height: 110px; z-index: 60; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .seal-bg { position: absolute; inset: 0; border-radius: 50%; border: 1px dashed rgba(212,175,55,0.4); animation: spin 20s linear infinite; }
        .seal-fill { position: absolute; inset: -4px; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--solid-gold); border-right-color: var(--solid-gold); transform: rotate(-45deg); opacity: 0; transition: opacity 0.3s; }
        .seal-icon { position: absolute; width: 60px; height: 60px; filter: drop-shadow(0 0 8px rgba(212,175,55,0.4)); transition: all 0.3s; }
        
        /* 交互狀態 */
        #seal-wrap.pressing .seal-fill { opacity: 1; animation: fillRing 3s linear forwards; }
        #seal-wrap.pressing .seal-icon { filter: drop-shadow(0 0 20px var(--solid-gold)) brightness(1.3); transform: scale(0.95); }
        #seal-wrap.done .seal-bg { border: 1px solid var(--solid-gold); animation: none; box-shadow: 0 0 20px rgba(212,175,55,0.3); }
        #seal-wrap.done .seal-icon { filter: drop-shadow(0 0 15px var(--solid-gold)); }

        #seal-hint { position: absolute; bottom: 6%; left: 10%; right: 10%; text-align: center; font-size: 0.8rem; color: #888; letter-spacing: 3px; transition: 0.5s; z-index: 60; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fillRing { 0% { transform: rotate(-45deg); border-top-color: var(--solid-gold); border-right-color: transparent; border-bottom-color: transparent; border-left-color: transparent; } 25% { border-right-color: var(--solid-gold); border-bottom-color: transparent; border-left-color: transparent; } 50% { border-bottom-color: var(--solid-gold); border-left-color: transparent; } 75% { border-left-color: var(--solid-gold); } 100% { transform: rotate(315deg); border-color: var(--solid-gold); } }

        /* ---------------- 結算/超新星全屏特效 ---------------- */
        #flash-overlay { position: fixed; inset: 0; z-index: 9000; background: radial-gradient(circle, #fff 0%, #f3e5ab 40%, #d4af37 100%); mix-blend-mode: screen; opacity: 0; pointer-events: none; transition: opacity 0.8s; }
        
        /* 系統彈出對話框 */
        .modal-wrap { position: fixed; inset: 0; z-index: 9999; background: rgba(1, 1, 3, 0.85); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.6s ease; }
        .modal-wrap.show { opacity: 1; pointer-events: auto; }
        .modal-box { width: 85%; max-width: 360px; background: linear-gradient(145deg, rgba(15, 20, 25, 0.95), rgba(5, 8, 10, 0.98)); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 16px; padding: 40px 30px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.9); transform: translateY(20px); transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .modal-wrap.show .modal-box { transform: translateY(0); }
        .modal-title { color: #f3e5ab; font-size: 1.2rem; letter-spacing: 5px; margin-bottom: 20px; text-shadow: 0 0 15px rgba(212, 175, 55, 0.6); border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 15px; font-weight: bold; }
        .modal-text { color: #8ba89c; font-size: 0.95rem; letter-spacing: 2px; line-height: 2.2; margin-bottom: 30px; font-weight: 300; }
        
        .btn-main { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212,175,55,0.4); color: #f3e5ab; padding: 12px 30px; border-radius: 25px; font-size: 0.85rem; letter-spacing: 4px; cursor: pointer; transition: all 0.4s; display: block; margin: 0 auto; width: 100%;}
        .btn-main:active { transform: scale(0.95); background: rgba(212,175,55,0.2); }
    </style>
</head>
<body>

    <!-- 星空背景 -->
    <canvas id="starCanvas"></canvas>
    <div id="vignette"></div>

    <div class="top-nav">
        <div class="btn-nav" onclick="window.location.href='index.html?screen=3'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            歸返
        </div>
        <div class="btn-nav btn-gold" id="bag-ui">行願池：0/1000</div>
    </div>

    <!-- 通天琉璃光柱 -->
    <div id="pillar-container">
        <div id="pillar-base"></div>
        <div id="pillar-core"></div>
    </div>

    <!-- 題庫面板 -->
    <div id="q-panel">
        <div class="accumulate-text">累計行願 ． 第 <span id="days-ui" style="color:var(--gold); font-weight:bold; font-size:1rem;">0</span> 日</div>
        <div id="q-title">【 讀取中 】</div>
        <div id="q-text">...</div>
    </div>

    <!-- 長按印心 -->
    <div id="seal-wrap">
        <div class="seal-bg"></div>
        <div class="seal-fill"></div>
        <svg class="seal-icon" viewBox="0 0 100 100">
            <!-- 菩提手印 SVG -->
            <polygon points="50,10 65,40 95,45 70,65 80,95 50,80 20,95 30,65 5,45 35,40" fill="none" stroke="rgba(243,229,171,0.5)" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="50" cy="50" r="18" fill="none" stroke="#d4af37" stroke-width="2" stroke-dasharray="4 4"/>
            <circle cx="50" cy="50" r="8" fill="#f3e5ab"/>
        </svg>
    </div>
    <div id="seal-hint">長按印心 ． 觀照自性</div>

    <!-- 結算對話框 -->
    <div id="flash-overlay"></div>
    <div class="modal-wrap" id="sys-modal">
        <div class="modal-box">
            <div class="modal-title" id="m-title">標題</div>
            <div class="modal-text" id="m-text">內容</div>
            <button class="btn-main" onclick="closeModal()">歡喜信受</button>
        </div>
    </div>

<script>
    // ==========================================
    // 星空引擎 (Star Engine)
    // ==========================================
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [], warpSpeed = 1;

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();

    for (let i = 0; i < 200; i++) {
        stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: Math.random() > 0.5 ? '#8ba89c' : '#f3e5ab' });
    }

    function renderStars() {
        ctx.fillStyle = 'rgba(1, 1, 3, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(star => {
            star.z -= warpSpeed;
            if (star.z <= 0) { star.z = 2000; star.x = (Math.random() - 0.5) * 2000; star.y = (Math.random() - 0.5) * 2000; } 
            let scale = 400 / (400 + star.z);
            ctx.beginPath(); ctx.arc((width / 2) + star.x * scale, (height / 2) + star.y * scale, Math.max(0.5, 2 * scale), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '139,168,156'}, ${Math.min(1, scale * 2)})`; ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }
    renderStars();

    // ==========================================
    // 資料庫與純淨邏輯
    // ==========================================
    const STORAGE_KEY = 'PX_V15.0';
    let db = {};
    try { db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { db = {}; }
    
    // 初始化所需變數
    db.points = db.points || 0;
    db.vowDays = db.vowDays || 0; // 累計天數，沒有斷連懲罰
    db.vowTempBag = db.vowTempBag || 0; // 暫存池，滿 1000 送回主系統
    db.vowLastDate = db.vowLastDate || "";
    
    function saveDB() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

    const todayStr = new Date().toDateString();
    let isDoneToday = (db.vowLastDate === todayStr);

    // 普賢問心題庫 (輪播展示)
    const vowQuestions = [
        { t: "一者禮敬諸佛 ． 降伏傲慢", q: "今日若遇見愚痴或蠻橫之人，我心中第一時間生起的是厭惡，還是悲憫其受業力牽引，並以敬未來佛之心包容？" },
        { t: "二者稱讚如來 ． 破除我執", q: "今日當我的意見被否定時，那一瞬間的慍怒，是為了維護真理，還是純粹為了保護『自我』的顏面？" },
        { t: "三者廣修供養 ． 無相佈施", q: "今日我是否吝於對身邊親近的人，給予一句真誠的讚美、一個柔和的眼神，或默默為他們承擔一份勞怨？" },
        { t: "四者懺悔業障 ． 覺照自心", q: "今日之中，我是不是又把生活的不順遂歸咎於外在的環境與他人，而忘記了這一切皆是自心業力的顯影？" }
    ];

    // ==========================================
    // UI 初始化與光柱高度
    // ==========================================
    function updatePillar() {
        const core = document.getElementById('pillar-core');
        // 計算暫存池進度 (0 到 1000 點)
        let pct = (db.vowTempBag / 1000) * 100;
        core.style.height = `${Math.min(100, Math.max(0, pct))}%`;
        
        // 隨著高度改變光柱亮度
        if(pct >= 80) core.style.filter = "drop-shadow(0 0 40px #d4af37) brightness(1.5)";
        else core.style.filter = "drop-shadow(0 0 20px rgba(212,175,55,0.6))";
    }

    function initUI() {
        document.getElementById('days-ui').innerText = db.vowDays;
        document.getElementById('bag-ui').innerText = `行願池：${db.vowTempBag}/1000`;
        updatePillar();

        const sealWrap = document.getElementById('seal-wrap');
        const sealHint = document.getElementById('seal-hint');

        if (isDoneToday) {
            document.getElementById('q-title').innerText = "【 今日已圓滿 】";
            document.getElementById('q-text').innerHTML = "<span style='color:var(--cyan);'>菩提心已發，普賢行已立。<br>功德已匯入，請明日再來。</span>";
            sealWrap.classList.add('done');
            sealWrap.style.pointerEvents = 'none';
            sealHint.innerText = "明日再續 ． 菩提道業";
        } else {
            let qIndex = db.vowDays % vowQuestions.length;
            document.getElementById('q-title').innerText = `【 ${vowQuestions[qIndex].t} 】`;
            document.getElementById('q-text').innerText = vowQuestions[qIndex].q;
            bindSealEvents();
        }
    }

    // ==========================================
    // 核心互動：長按印心 (3秒)
    // ==========================================
    let pressTimer;
    let isPressing = false;
    let randomEvent = null;

    function bindSealEvents() {
        const btn = document.getElementById('seal-wrap');
        
        const startPress = (e) => {
            if (e.type !== 'mousedown' && e.type !== 'touchstart') return;
            e.preventDefault();
            isPressing = true;
            warpSpeed = 8; // 星空加速
            btn.classList.add('pressing');
            document.getElementById('seal-hint').innerText = "注心觀照中...";
            
            // 決定隨機事件 (引導行為，不干擾分數)
            let rand = Math.random();
            if (rand < 0.1) randomEvent = 'bad'; // 10% 業相浮現
            else if (rand < 0.2) randomEvent = 'good'; // 10% 善根感應
            else randomEvent = 'normal';

            pressTimer = setTimeout(() => {
                completeVow();
            }, 3000); // 3 秒長按
        };

        const cancelPress = () => {
            if (!isPressing) return;
            clearTimeout(pressTimer);
            isPressing = false;
            warpSpeed = 1;
            btn.classList.remove('pressing');
            document.getElementById('seal-hint').innerText = "長按印心 ． 觀照自性";
        };

        btn.addEventListener('mousedown', startPress);
        btn.addEventListener('touchstart', startPress, {passive: false});
        window.addEventListener('mouseup', cancelPress);
        window.addEventListener('touchend', cancelPress);
        btn.addEventListener('mouseleave', cancelPress);
    }

    // ==========================================
    // 圓滿結算與千點匯入
    // ==========================================
    function completeVow() {
        isPressing = false;
        isDoneToday = true;
        warpSpeed = 1;
        
        // 核心數學：永遠只加 100 點到暫存池
        db.vowLastDate = todayStr;
        db.vowDays++;
        db.vowTempBag += 100;
        
        let isSyncing = false;
        
        // 檢查是否滿 1000 點自動匯回主系統
        if (db.vowTempBag >= 1000) {
            db.points += 1000;
            db.vowTempBag -= 1000;
            isSyncing = true;
        }

        saveDB();
        updatePillar();

        // 視覺回饋
        const btn = document.getElementById('seal-wrap');
        btn.classList.remove('pressing');
        btn.classList.add('done');
        btn.style.pointerEvents = 'none';
        document.getElementById('seal-hint').innerText = "明日再續 ． 菩提道業";
        
        if (isSyncing) {
            // 千點匯入的超大特效
            const flash = document.getElementById('flash-overlay');
            flash.style.opacity = '1';
            setTimeout(() => { flash.style.opacity = '0'; }, 800);
            
            showModal("【 圓滿 ． 千點資糧匯入 】", "<span style='color:var(--solid-gold); font-size:1.1rem; font-weight:bold;'>十日行願，功不唐捐。</span><br><br>光柱已臻圓滿，<span style='color:#fff'>1000</span> 點資糧已化作流光，自動匯入主系統。光柱重置，祈願行者繼續精進。");
        } else {
            // 一般每日結算 + 事件引導
            let msg = `今日反思已圓滿，<span style='color:var(--solid-gold);'>100</span> 點注入光柱。<br><br>`;
            
            if (randomEvent === 'bad') {
                msg += "<span style='color:#ff8888;'>【業相浮現】</span><br>今日觀照中，隱見無明業相。祈請行者退返主系統，至誠念佛 1000 聲以化解。";
            } else if (randomEvent === 'good') {
                msg += "<span style='color:var(--cyan);'>【善根感應】</span><br>一念清淨，諸佛歡喜。願此法喜伴隨您今日的生活。";
            } else {
                msg += "菩提心已發，普賢行已立。";
            }
            
            showModal("【 今日問心圓滿 】", msg);
        }
        
        // 更新 UI 文字
        document.getElementById('days-ui').innerText = db.vowDays;
        document.getElementById('bag-ui').innerText = `行願池：${db.vowTempBag}/1000`;
        document.getElementById('q-title').innerText = "【 今日已圓滿 】";
        document.getElementById('q-text').innerHTML = "<span style='color:var(--cyan);'>菩提心已發，普賢行已立。<br>功德已注入光柱。</span>";
    }

    // 系統對話框
    function showModal(title, text) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-text').innerHTML = text;
        document.getElementById('sys-modal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('sys-modal').classList.remove('show');
    }

    initUI();
</script>
</body>
</html>
