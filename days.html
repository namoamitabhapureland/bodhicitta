<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微縮星辰寶幢 ． 佈局測試</title>
    <style>
        :root {
            --gold-light: #f3e5ab;
            --gold-solid: #d4af37;
        }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, #020203 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; width: 100vw; height: 100dvh; color: #fff;
        }

        /* 模擬主系統 UI (幫助您比對相對位置) */
        .mock-ui { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        .mock-title { margin-top: 15%; color: var(--gold-light); font-size: 0.9rem; letter-spacing: 4px; }
        .mock-box { margin-top: 5%; width: 85%; max-width: 340px; height: 40vh; border: 1px solid rgba(212,175,55,0.4); border-radius: 20px; background: rgba(5,5,10,0.8); display: flex; justify-content: center; align-items: center; color: rgba(255,255,255,0.3); letter-spacing: 2px;}
        .mock-seal { margin-top: 8%; width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold-solid); background: radial-gradient(circle, #fff 10%, var(--gold-solid) 80%); }
        .mock-text { margin-top: 5%; font-size: 0.7rem; color: var(--gold-light); letter-spacing: 2px; }

        /* ================= 微縮寶幢 ． 星辰佈局 (對應您的紅圈) ================= */
        #constellation-layer { position: absolute; inset: 0; z-index: 20; pointer-events: none; }
        
        .banner-jewel {
            position: absolute;
            width: 25px; height: 42px; /* 縮小如星辰 */
            pointer-events: auto; cursor: pointer;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        /* 狀態 1：平常透明隱藏 (僅留極淡的線條) */
        .banner-unlit {
            opacity: 0.1; /* 非常透明，不干擾畫面 */
            filter: grayscale(100%);
        }
        
        /* 狀態 2：達標點亮 (帶有專屬色彩與輕微呼吸) */
        .banner-lit {
            opacity: 0.95;
            animation: star-breathe 3s infinite alternate ease-in-out;
        }
        .banner-jewel:active { transform: scale(0.85); }
        @keyframes star-breathe { 0% { transform: translateY(0); } 100% { transform: translateY(-4px); } }

        /* 四個角落的準確座標與四種專屬顏色變數 */
        /* 70日：左上 (真金) */
        #banner-70 { top: 14%; left: 10%; 
            --f1: #FFF8DC; --f2: #F3E5AB; --f3: #D4AF37; --bd: #AA7900; --bs: #5C4000; --rb: #FFF; 
        }
        #banner-70.banner-lit { filter: drop-shadow(0 0 8px rgba(212,175,55,0.8)); }

        /* 700日：右上 (青琉璃) */
        #banner-700 { top: 14%; right: 10%; 
            --f1: #E0FBFC; --f2: #98C1D9; --f3: #48CAE4; --bd: #2A9D8F; --bs: #1D3557; --rb: #FFF; 
        }
        #banner-700.banner-lit { filter: drop-shadow(0 0 8px rgba(42,157,143,0.8)); }

        /* 7000日：左下 (赤火) */
        #banner-7000 { bottom: 10%; left: 15%; 
            --f1: #F4A261; --f2: #E76F51; --f3: #C1121F; --bd: #780000; --bs: #370617; --rb: #FDFCDC; 
        }
        #banner-7000.banner-lit { filter: drop-shadow(0 0 8px rgba(193,18,31,0.8)); }

        /* 70000日：右下 (白金) */
        #banner-70000 { bottom: 10%; right: 15%; 
            --f1: #FFFFFF; --f2: #FDFCDC; --f3: #E0E1DD; --bd: #F3E5AB; --bs: #D4AF37; --rb: #FFFFFF; 
        }
        #banner-70000.banner-lit { filter: drop-shadow(0 0 10px rgba(255,255,255,0.9)); }

        /* ================= 契印證書 彈框 ================= */
        .cert-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 10000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .cert-overlay.show { opacity: 1; pointer-events: auto; }
        .cert-box { background: linear-gradient(180deg, rgba(20,20,20,0.95) 0%, rgba(5,5,5,0.98) 100%); border: 1px solid rgba(212,175,55,0.4); border-radius: 20px; width: 85%; max-width: 360px; padding: 40px 25px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(212,175,55,0.1); transform: translateY(30px) scale(0.95); transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .cert-overlay.show .cert-box { transform: translateY(0) scale(1); }
        
        .cert-header { color: var(--gold-light); font-size: 0.9rem; letter-spacing: 6px; margin-bottom: 25px; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .cert-svg-wrap { width: 90px; height: 150px; margin: 0 auto 25px auto; animation: cert-float 3s infinite alternate; }
        .cert-svg-wrap svg { width: 100%; height: 100%; overflow: visible; }
        @keyframes cert-float { 0% { transform: translateY(0); } 100% { transform: translateY(-8px); } }

        .cert-user { color: #aaa; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 10px; }
        .cert-name { color: var(--gold-solid); font-size: 1.3rem; font-weight: bold; letter-spacing: 5px; margin-bottom: 25px; text-shadow: 0 0 15px rgba(212,175,55,0.6); }
        .cert-divider { width: 60%; height: 1px; background: radial-gradient(circle, rgba(212,175,55,0.6) 0%, transparent 100%); margin: 0 auto 20px auto; }
        .cert-desc { color: #ddd; font-size: 0.9rem; line-height: 2; letter-spacing: 1.5px; margin-bottom: 35px; }

        .cert-btn { background: transparent; color: var(--gold-light); border: 1px solid rgba(212,175,55,0.5); padding: 12px 35px; border-radius: 30px; letter-spacing: 3px; font-size: 0.9rem; cursor: pointer; transition: 0.3s; outline: none; }
        .cert-btn:active { background: rgba(212,175,55,0.2); transform: scale(0.95); }
    </style>
</head>
<body>

    <!-- 支援 CSS 變數的動態寶幢 SVG -->
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
        <defs>
            <g id="dynamic-banner">
                <!-- 1. 頂端真火 -->
                <path d="M60,10 Q65,25 60,35 Q55,25 60,10" fill="var(--f1, #E76F51)"/>
                <path d="M60,18 Q62,26 60,30 Q58,26 60,18" fill="var(--f2, #F4A261)"/>
                <!-- 2. 法焰層疊 -->
                <path d="M60,25 C78,35 88,55 78,75 C68,55 63,55 60,62 C57,55 52,55 42,75 C32,55 42,35 60,25 Z" fill="var(--f3, #2A9D8F)"/>
                <path d="M60,40 C85,50 100,75 88,95 C78,75 68,75 60,82 C52,75 42,75 32,95 C20,75 35,50 60,40 Z" fill="var(--bd, #E9C46A)"/>
                <path d="M60,55 C95,65 112,95 100,115 C88,95 72,95 60,105 C48,95 32,95 20,115 C8,95 25,65 60,55 Z" fill="var(--bs, #C1121F)"/>
                <!-- 3. 底部托葉 -->
                <path d="M60,75 C105,85 125,120 108,145 C92,120 75,118 60,130 C45,118 28,120 12,145 C-5,120 15,85 60,75 Z" fill="var(--bd, #1D3557)"/>
                <!-- 4. 飄帶與墜飾 -->
                <path d="M38,100 C15,120 10,155 25,175 C38,195 12,185 5,160 C-2,135 18,110 38,100 Z" fill="var(--rb, #FDFCDC)"/>
                <path d="M82,100 C105,120 110,155 95,175 C82,195 108,185 115,160 C122,135 102,110 82,100 Z" fill="var(--rb, #FDFCDC)"/>
                <path d="M60,128 C70,140 70,155 60,165 C50,155 50,140 60,128 Z" fill="var(--f3, #2A9D8F)"/>
                <circle cx="60" cy="172" r="5" fill="var(--f2, #E9C46A)"/>
                <path d="M60,177 Q65,185 60,195 Q55,185 60,177" fill="var(--f1, #C1121F)"/>
                <!-- 5. 燙金描邊 -->
                <g fill="none" stroke="#F3E5AB" stroke-width="1.5" opacity="0.6">
                    <path d="M60,25 C78,35 88,55 78,75"/><path d="M60,40 C85,50 100,75 88,95"/>
                    <path d="M60,55 C95,65 112,95 100,115"/><path d="M60,75 C105,85 125,120 108,145"/>
                    <path d="M60,25 C42,35 32,55 42,75"/><path d="M60,40 C35,50 20,75 32,95"/>
                    <path d="M60,55 C25,65 8,95 20,115"/><path d="M60,75 C15,85 -5,120 12,145"/>
                </g>
            </g>
        </defs>
    </svg>

    <!-- 模擬主系統介面 -->
    <div class="mock-ui">
        <div class="mock-title">【 普賢十願 ． 行願軌跡 】</div>
        <div class="mock-box">模擬中央巨大的任務法語框</div>
        <div class="mock-seal"></div>
        <div class="mock-text">【 今日行願已圓滿 】</div>
        <!-- 點擊此按鈕可測試「未達標時的透明隱形狀態」 -->
        <button style="margin-top:20px; padding:5px 10px; background:#333; color:#fff; border:none; border-radius:5px;" onclick="toggleVisibility()">切換 點亮/透明 狀態</button>
    </div>

    <!-- 星辰寶幢圖層 (精準對齊您的四個紅圈) -->
    <div id="constellation-layer">
        <svg class="banner-jewel banner-lit" id="banner-70" viewBox="0 0 120 200" onclick="openCert(70)"><use href="#dynamic-banner"/></svg>
        <svg class="banner-jewel banner-lit" id="banner-700" viewBox="0 0 120 200" onclick="openCert(700)"><use href="#dynamic-banner"/></svg>
        <svg class="banner-jewel banner-lit" id="banner-7000" viewBox="0 0 120 200" onclick="openCert(7000)"><use href="#dynamic-banner"/></svg>
        <svg class="banner-jewel banner-lit" id="banner-70000" viewBox="0 0 120 200" onclick="openCert(70000)"><use href="#dynamic-banner"/></svg>
    </div>

    <!-- 契印證書彈框 -->
    <div class="cert-overlay" id="cert-modal">
        <div class="cert-box">
            <div class="cert-header" id="cert-title">✦ 菩提契印 ✦</div>
            <!-- 證書內的寶幢，顏色會隨點擊動態變化 -->
            <div class="cert-svg-wrap" id="cert-glow">
                <svg id="cert-svg" viewBox="0 0 120 200"><use href="#dynamic-banner"/></svg>
            </div>
            <div class="cert-user">行 者</div>
            <div class="cert-name">妙 依</div>
            <div class="cert-divider"></div>
            <div class="cert-desc" id="cert-text">...</div>
            <button class="cert-btn" onclick="closeCert()">歡喜功德 ． 締結契印</button>
        </div>
    </div>

<script>
    const CERT_DATA = {
        70: { 
            title: "✦ 初地 ． 歡喜契印 ✦", 
            glow: "drop-shadow(0 0 25px rgba(233,196,106,0.8))",
            text: "已圓滿七十日普賢行願。<br>初發心成，真金寶幢於星空初現。<br>願此生步步生蓮，永不退轉。",
            cssVars: "--f1: #FFF8DC; --f2: #F3E5AB; --f3: #D4AF37; --bd: #AA7900; --bs: #5C4000; --rb: #FFF;"
        },
        700: { 
            title: "✦ 遠行 ． 琉璃契印 ✦", 
            glow: "drop-shadow(0 0 35px rgba(42,157,143,0.8))",
            text: "歷經七百日大願薰修。<br>煩惱漸除，青琉璃寶幢高懸法界。<br>願身心清淨，內外明徹。",
            cssVars: "--f1: #E0FBFC; --f2: #98C1D9; --f3: #48CAE4; --bd: #2A9D8F; --bs: #1D3557; --rb: #FFF;"
        },
        7000: { 
            title: "✦ 善慧 ． 妙法契印 ✦", 
            glow: "drop-shadow(0 0 45px rgba(193,18,31,0.8))",
            text: "七千日行願，不疲不厭。<br>赤紅寶幢燃起三昧真火。<br>願大悲拔苦，普度一切有情。",
            cssVars: "--f1: #F4A261; --f2: #E76F51; --f3: #C1121F; --bd: #780000; --bs: #370617; --rb: #FDFCDC;"
        },
        70000: { 
            title: "✦ 等覺 ． 圓滿契印 ✦", 
            glow: "drop-shadow(0 0 60px #fff) drop-shadow(0 0 15px #E9C46A)",
            text: "盡未來際，行願無盡。<br>七萬日功德化為無上白金佛光。<br>法界授記，十方如來同聲讚歎。",
            cssVars: "--f1: #FFFFFF; --f2: #FDFCDC; --f3: #E0E1DD; --bd: #F3E5AB; --bs: #D4AF37; --rb: #FFFFFF;"
        }
    };

    function openCert(tier) {
        // 更新文字
        document.getElementById('cert-title').innerText = CERT_DATA[tier].title;
        document.getElementById('cert-text').innerHTML = CERT_DATA[tier].text;
        
        // 將證書上的寶幢替換為對應的顏色與光暈
        document.getElementById('cert-glow').style.filter = CERT_DATA[tier].glow;
        document.getElementById('cert-svg').style.cssText = CERT_DATA[tier].cssVars;
        
        document.getElementById('cert-modal').classList.add('show');
    }

    function closeCert() { document.getElementById('cert-modal').classList.remove('show'); }

    // 測試按鈕用：模擬未達標時的透明隱形狀態
    let isLit = true;
    function toggleVisibility() {
        isLit = !isLit;
        const jewels = document.querySelectorAll('.banner-jewel');
        jewels.forEach(j => {
            if(isLit) { j.classList.add('banner-lit'); j.classList.remove('banner-unlit'); } 
            else { j.classList.remove('banner-lit'); j.classList.add('banner-unlit'); }
        });
    }
</script>
</body>
</html>
