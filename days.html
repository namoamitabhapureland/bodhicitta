<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>普賢行願 ． 十階天梯</title>
    <style>
        :root {
            --bg-deep: #010103;
            --solid-gold: #d4af37;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: var(--bg-deep); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
            display: flex; justify-content: center; align-items: center;
        }

        /* ---------------- 星空引擎 ---------------- */
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(circle at 50% 30%, transparent 10%, rgba(1, 1, 3, 0.95) 100%); }

        /* ---------------- 天梯容器與 SVG ---------------- */
        #stair-container {
            position: absolute; inset: 0; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px;
        }

        #stair-svg {
            width: 100%; max-width: 600px; height: 100%; max-height: 900px;
            overflow: visible; transform-origin: 50% 18%; /* 縮放中心點對準頂端的菩提心 */
            transition: transform 1.8s cubic-bezier(0.6, 0.05, 0.1, 1), opacity 1.5s ease-in;
        }

        /* 飛越過場動畫 */
        #stair-svg.warp-drive {
            transform: scale(25) translateY(10%);
            opacity: 0;
            pointer-events: none;
        }

        /* 階梯的毛玻璃與光影質感 */
        .step-top { stroke: rgba(255,255,255,0.7); stroke-width: 1px; transition: all 0.5s; }
        .step-front { stroke: rgba(255,255,255,0.3); stroke-width: 1px; transition: all 0.5s; }
        
        /* 鎖定的階梯（未走到） */
        .step-locked .step-top { fill-opacity: 0.1; stroke: rgba(255,255,255,0.2); }
        .step-locked .step-front { fill-opacity: 0.05; stroke: rgba(255,255,255,0.1); }

        /* 已完成的階梯 */
        .step-done .step-top { fill-opacity: 0.4; }
        .step-done .step-front { fill-opacity: 0.2; }

        /* 當前閃爍的階梯 (Current) */
        .step-current { cursor: pointer; }
        .step-current .step-top { 
            fill-opacity: 0.8; stroke: #fff; stroke-width: 2px;
            filter: drop-shadow(0 0 15px currentColor);
            animation: breathe-step 2s infinite alternate ease-in-out;
        }
        .step-current .step-front { fill-opacity: 0.5; stroke: #fff; }
        
        @keyframes breathe-step {
            0% { filter: drop-shadow(0 0 10px currentColor) brightness(1); }
            100% { filter: drop-shadow(0 0 30px currentColor) brightness(1.4); }
        }

        /* ---------------- 頂端菩提心 ---------------- */
        #bodhi-heart {
            transform-origin: center;
            animation: heart-beat 3s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 20px var(--solid-gold));
        }
        @keyframes heart-beat {
            0% { transform: scale(0.9); filter: drop-shadow(0 0 15px var(--solid-gold)); opacity: 0.8; }
            100% { transform: scale(1.15); filter: drop-shadow(0 0 40px #fff) drop-shadow(0 0 20px var(--solid-gold)); opacity: 1; }
        }

        /* ---------------- UI 文字 ---------------- */
        #ui-layer {
            position: absolute; top: 10%; width: 100%; text-align: center; z-index: 20;
            transition: opacity 0.5s; pointer-events: none;
        }
        .main-title { color: #fff; font-size: 1.2rem; letter-spacing: 8px; font-weight: 300; text-shadow: 0 0 20px rgba(255,255,255,0.6); margin-bottom: 10px; }
        .sub-title { color: #8ba89c; font-size: 0.85rem; letter-spacing: 4px; }

        /* ---------------- 第二頁模擬 (過場後顯示) ---------------- */
        #screen-2 {
            position: absolute; inset: 0; z-index: 30; display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 1s 1s; /* 延遲1秒淡入 */
        }
        #screen-2.show { opacity: 1; pointer-events: auto; }
        
        .s2-box {
            width: 85%; max-width: 400px; padding: 40px 30px; border-radius: 20px; text-align: center;
            background: linear-gradient(145deg, rgba(15, 20, 25, 0.85), rgba(5, 8, 10, 0.95));
            border: 1px solid rgba(212, 175, 55, 0.4); box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.1);
            backdrop-filter: blur(15px);
        }
        .s2-title { color: var(--solid-gold); font-size: 1.3rem; letter-spacing: 6px; margin-bottom: 20px; font-weight: bold; text-shadow: 0 0 15px rgba(212,175,55,0.5); }
        .s2-text { color: #e0e0e0; font-size: 0.95rem; line-height: 2; letter-spacing: 2px; }

        /* 白金閃光 */
        #flash-overlay { position: fixed; inset: 0; background: #fff; opacity: 0; z-index: 9999; pointer-events: none; transition: opacity 0.8s; }
    </style>
</head>
<body>

    <!-- 星空背景 -->
    <canvas id="starCanvas"></canvas>
    <div id="vignette"></div>

    <!-- UI 標題 -->
    <div id="ui-layer">
        <div class="main-title">十信滿願 ． 步步生蓮</div>
        <div class="sub-title">請踏上今日之階</div>
    </div>

    <!-- 核心：十階立體天梯 -->
    <div id="stair-container">
        <svg id="stair-svg" viewBox="0 0 400 650">
            <!-- 菩提心 (頂端) -->
            <g id="bodhi-heart" transform="translate(200, 110)">
                <!-- 放射光芒 -->
                <circle cx="0" cy="0" r="30" fill="none" stroke="#f3e5ab" stroke-width="1" stroke-dasharray="2 6" opacity="0.8"/>
                <!-- 蓮心幾何 -->
                <path d="M 0 -25 C 20 -5, 25 15, 0 30 C -25 15, -20 -5, 0 -25 Z" fill="rgba(255,255,255,0.9)" stroke="#d4af37" stroke-width="2"/>
                <circle cx="0" cy="5" r="5" fill="#d4af37"/>
            </g>

            <!-- 階梯將由 JS 動態生成，確保數學精準 -->
            <g id="steps-group"></g>
        </svg>
    </div>

    <!-- 第二幕：過場後的模擬畫面 -->
    <div id="screen-2">
        <div class="s2-box">
            <div class="s2-title">【 菩提心室 】</div>
            <div class="s2-text">
                行者，您已穿透法界屏障。<br><br>
                此處將連接您的煥彩光柱與<br>「長按印心」集氣陣法。<br><br>
                <span style="color:#8ba89c; font-size:0.8rem;">( 視覺起承轉合演練完畢 )</span>
            </div>
            <button onclick="location.reload()" style="margin-top:30px; padding: 10px 25px; border-radius: 20px; background:transparent; border: 1px solid #8ba89c; color:#8ba89c; letter-spacing:2px; cursor:pointer;">重置展現</button>
        </div>
    </div>

    <div id="flash-overlay"></div>

<script>
    // ==========================================
    // 1. 星空引擎 (Star Engine)
    // ==========================================
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [], warpSpeed = 0.5;

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();

    for (let i = 0; i < 250; i++) {
        let c = Math.random() > 0.6 ? '#f3e5ab' : (Math.random() > 0.5 ? '#00f2fe' : '#c471ed');
        stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: c, size: Math.random() * 1.5 + 0.5 });
    }

    function renderStars() {
        ctx.fillStyle = 'rgba(1, 1, 3, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= warpSpeed;
            if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; } 
            let scale = 400 / (400 + s.z);
            let px = (width / 2) + s.x * scale;
            let py = (height / 2) + s.y * scale;
            ctx.beginPath(); ctx.arc(px, py, Math.max(0.1, s.size * scale * (warpSpeed > 2 ? 3 : 1)), 0, Math.PI * 2);
            ctx.fillStyle = s.color; ctx.globalAlpha = Math.min(1, scale * 2); ctx.fill(); ctx.globalAlpha = 1;
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }
    renderStars();

    // ==========================================
    // 2. SVG 立體透視階梯生成器
    // ==========================================
    const stepsGroup = document.getElementById('steps-group');
    
    // 預先計算好的 10 階透視數學座標 (Width, Bottom Y, Front Height)
    const STAIR_MATH = [
        { w: 350, y: 620, h: 35 }, // 第 1 階 (最底、最寬)
        { w: 305, y: 550, h: 30 }, // 第 2 階
        { w: 265, y: 488, h: 26 }, // 第 3 階
        { w: 230, y: 433, h: 22 }, // 第 4 階
        { w: 200, y: 385, h: 19 }, // 第 5 階
        { w: 175, y: 343, h: 16 }, // 第 6 階
        { w: 155, y: 306, h: 14 }, // 第 7 階
        { w: 138, y: 274, h: 12 }, // 第 8 階
        { w: 124, y: 246, h: 10 }, // 第 9 階
        { w: 112, y: 222, h: 9 }   // 第 10 階 (最頂、最窄，接向菩提心)
    ];

    // 絕美琉璃煥彩漸層 (深空紫 -> 琉璃青 -> 玫瑰粉 -> 佛性真金)
    const STAIR_COLORS = [
        '#4a00e0', // 1
        '#8e2de2', // 2
        '#c471ed', // 3
        '#ff7eb3', // 4
        '#f64f59', // 5
        '#00f2fe', // 6
        '#4facfe', // 7
        '#43e97b', // 8
        '#fee140', // 9
        '#d4af37'  // 10
    ];

    let currentDay = 4; // 假設行者今天是第 4 天

    function buildStairs() {
        let html = '';
        const centerX = 200;

        for (let i = 0; i < 10; i++) {
            let s = STAIR_MATH[i];
            let nextY = (i === 9) ? 195 : STAIR_MATH[i+1].y; // 頂面延伸到下一階的底部
            let nextW = (i === 9) ? 102 : STAIR_MATH[i+1].w;
            
            let color = STAIR_COLORS[i];
            
            // 狀態判斷
            let stateClass = '';
            let clickAttr = '';
            if (i + 1 < currentDay) stateClass = 'step-done';
            else if (i + 1 === currentDay) {
                stateClass = 'step-current';
                clickAttr = 'onclick="triggerWarp()"'; // 只有當前階梯可點擊
            }
            else stateClass = 'step-locked';

            // SVG Polygon 座標計算
            // 正面 (Front Face)
            let frontPts = `
                ${centerX - s.w/2}, ${s.y} 
                ${centerX + s.w/2}, ${s.y} 
                ${centerX + s.w/2}, ${s.y - s.h} 
                ${centerX - s.w/2}, ${s.y - s.h}
            `;
            
            // 頂面 (Top Face) - 連接當前階的頂部與下一階的底部
            let topPts = `
                ${centerX - s.w/2}, ${s.y - s.h} 
                ${centerX + s.w/2}, ${s.y - s.h} 
                ${centerX + nextW/2}, ${nextY} 
                ${centerX - nextW/2}, ${nextY}
            `;

            html += `
                <g class="stair-step ${stateClass}" style="color: ${color};" ${clickAttr}>
                    <!-- 頂面 (受光面) -->
                    <polygon class="step-top" points="${topPts}" fill="${color}" />
                    <!-- 正面 (背光面) -->
                    <polygon class="step-front" points="${frontPts}" fill="${color}" />
                </g>
            `;
        }
        stepsGroup.innerHTML = html;
    }
    buildStairs();

    // ==========================================
    // 3. 飛越天梯，衝入菩提心 (Warp Animation)
    // ==========================================
    function triggerWarp() {
        // 1. 星空引擎極限加速 (Warp Speed)
        warpSpeed = 35;

        // 2. 隱藏 UI 文字
        document.getElementById('ui-layer').style.opacity = '0';

        // 3. 階梯 SVG 整體放大並衝向鏡頭
        const stairSvg = document.getElementById('stair-svg');
        stairSvg.classList.add('warp-drive');

        // 4. 閃光白屏過渡
        setTimeout(() => {
            const flash = document.getElementById('flash-overlay');
            flash.style.opacity = '1';
            warpSpeed = 1; // 星空恢復平靜
            
            // 5. 切換到第二幕 (光柱心室)
            setTimeout(() => {
                flash.style.opacity = '0';
                document.getElementById('stair-container').style.display = 'none';
                document.getElementById('screen-2').classList.add('show');
            }, 800);
            
        }, 1200); // 階梯放大動畫持續時間
    }

</script>
</body>
</html>
