<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>七日行願 ． 琉璃天梯</title>
    <style>
        :root {
            --bg-deep: #010103; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, var(--bg-deep) 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
            display: flex; justify-content: center; align-items: center;
        }

        /* ---------------- 星空引擎 ---------------- */
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(circle at 50% 30%, transparent 10%, rgba(1, 1, 3, 0.95) 100%); }

        /* ---------------- 穿越容器與 SVG ---------------- */
        #stair-container {
            position: absolute; inset: 0; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            perspective: 1200px;
        }

        #stair-svg {
            width: 100%; max-width: 560px; height: 100%; max-height: 800px;
            overflow: visible; 
            /* 縮放中心點精準對齊第 7 階頂端的 Portal (X:460, Y:190) */
            transform-origin: 82% 23%; 
            transition: transform 2.2s cubic-bezier(0.6, 0.05, 0.1, 1), opacity 1.8s ease-in;
        }

        /* 星際穿越過場動畫 */
        #stair-svg.warp-drive {
            transform: scale(25) translateY(5%);
            opacity: 0; pointer-events: none;
        }

        /* ---------------- 階梯的玻璃材質與金屬線框 ---------------- */
        .stair-step { 
            stroke: #d4af37; /* 金色邊框 */
            stroke-linejoin: round; transition: all 0.5s; 
        }
        .step-top { stroke-width: 1.5px; }
        .step-front { stroke-width: 1px; }
        
        /* 未解鎖的階梯 */
        .step-locked .step-top { fill-opacity: 0.15; stroke: rgba(212,175,55,0.3); }
        .step-locked .step-front { fill-opacity: 0.1; stroke: rgba(212,175,55,0.15); }

        /* 已完成的階梯 */
        .step-done .step-top { fill-opacity: 0.5; stroke: rgba(212,175,55,0.7); }
        .step-done .step-front { fill-opacity: 0.3; stroke: rgba(212,175,55,0.4); }

        /* 當前發光的階梯 (Current) */
        .step-current { cursor: pointer; }
        .step-current .step-top { 
            fill-opacity: 0.9; stroke: #fff; stroke-width: 2.5px;
            animation: breathe-gold 2s infinite alternate ease-in-out;
        }
        .step-current .step-front { fill-opacity: 0.7; stroke: #f3e5ab; stroke-width: 1.5px; }
        
        @keyframes breathe-gold {
            0% { filter: drop-shadow(0 0 10px rgba(212,175,55,0.8)) brightness(1); }
            100% { filter: drop-shadow(0 0 30px #f3e5ab) drop-shadow(0 0 45px #d4af37) brightness(1.3); }
        }

        /* ---------------- 頂端菩提心 (純 SVG 完美重現) ---------------- */
        #svg-immortal-seed {
            animation: svg-hb-pulse 1.5s infinite cubic-bezier(0.2, 0.8, 0.4, 1);
        }
        @keyframes svg-hb-pulse { 
            0% { transform: scale(1); filter: drop-shadow(0 0 15px var(--solid-gold)); } 
            50% { transform: scale(1.2); filter: drop-shadow(0 0 30px var(--gold)) drop-shadow(0 0 45px #fff); } 
            100% { transform: scale(1); filter: drop-shadow(0 0 15px var(--solid-gold)); } 
        }

        /* ---------------- UI 文字 ---------------- */
        #ui-layer {
            position: absolute; top: 10%; width: 100%; text-align: center; z-index: 20;
            transition: opacity 0.5s; pointer-events: none;
        }
        .main-title { color: var(--gold); font-size: 1.25rem; letter-spacing: 8px; font-weight: bold; text-shadow: 0 0 20px rgba(212,175,55,0.6); margin-bottom: 12px; }
        .sub-title { color: var(--cyan); font-size: 0.85rem; letter-spacing: 5px; }

        /* 白金閃光過渡 */
        #flash-overlay { position: fixed; inset: 0; background: radial-gradient(circle, #fff 0%, #f3e5ab 50%, transparent 100%); opacity: 0; z-index: 9999; pointer-events: none; transition: opacity 0.8s; mix-blend-mode: screen; }
    </style>
</head>
<body>

    <!-- SVG 漸層庫與濾鏡 -->
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
        <defs>
            <!-- 菩提心專用漸層 (原汁原味) -->
            <radialGradient id="seedGrad" cx="50%" cy="50%" r="50%">
                <stop offset="10%" stop-color="#fff"/>
                <stop offset="30%" stop-color="#ffffe0"/>
                <stop offset="60%" stop-color="#f3e5ab"/>
                <stop offset="100%" stop-color="#d4af37"/>
            </radialGradient>
            
            <!-- 發光濾鏡 -->
            <filter id="seedGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="8" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>

            <filter id="portalBlur" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="15" />
            </filter>

            <!-- 階梯面暗部與亮部混合 -->
            <linearGradient id="f-light" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.6"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
            <linearGradient id="f-dark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#000" stop-opacity="0.1"/><stop offset="100%" stop-color="#000" stop-opacity="0.5"/></linearGradient>
            
            <!-- 繽紛七彩色階 (Pastel Gradient Colors) -->
            <linearGradient id="g-0" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c471ed"/><stop offset="100%" stop-color="#f64f59"/></linearGradient>
            <linearGradient id="g-1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff7eb3"/><stop offset="100%" stop-color="#ff758c"/></linearGradient>
            <linearGradient id="g-2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00f2fe"/><stop offset="100%" stop-color="#4facfe"/></linearGradient>
            <linearGradient id="g-3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4dd0e1"/><stop offset="100%" stop-color="#2196f3"/></linearGradient>
            <linearGradient id="g-4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#81c784"/><stop offset="100%" stop-color="#2e7d32"/></linearGradient>
            <linearGradient id="g-5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffb300"/><stop offset="100%" stop-color="#f57f17"/></linearGradient>
            <linearGradient id="g-6" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37"/><stop offset="100%" stop-color="#f3e5ab"/></linearGradient>
        </defs>
    </svg>

    <!-- 星空背景 -->
    <canvas id="starCanvas"></canvas>
    <div id="vignette"></div>

    <!-- UI 標題 -->
    <div id="ui-layer">
        <div class="main-title">七日行願 ． 步步生蓮</div>
        <div class="sub-title" id="day-hint">點擊發光之法階入陣</div>
    </div>

    <!-- 核心：完美融合的 SVG 容器 -->
    <div id="stair-container">
        <!-- 依照您的要求，設定 ViewBox 為 0 0 560 800 -->
        <svg id="stair-svg" viewBox="0 0 560 800">
            
            <!-- JS 動態生成 7 階階梯 -->
            <g id="steps-group"></g>

            <!-- 模糊結界 (Blurry Portal Effect) 位於頂端 -->
            <g transform="translate(460, 190)">
                <ellipse cx="0" cy="0" rx="55" ry="20" fill="rgba(212,175,55,0.25)" filter="url(#portalBlur)"/>
                <ellipse cx="0" cy="0" r="18" fill="rgba(255,255,255,0.5)" filter="url(#portalBlur)"/>
            </g>

            <!-- 菩提心 (Bodhi Heart) 懸浮於 Portal 之上 -->
            <g transform="translate(460, 175)" style="transform-origin: 460px 175px;">
                <circle id="svg-immortal-seed" cx="0" cy="0" r="14" fill="url(#seedGrad)" filter="url(#seedGlow)"/>
            </g>
        </svg>
    </div>

    <!-- 白金閃光 -->
    <div id="flash-overlay"></div>

<script>
    // ================= 星空引擎 =================
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [], warpSpeed = 1;

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();

    for (let i = 0; i < 200; i++) {
        let color = Math.random() > 0.8 ? '#f3e5ab' : (Math.random() > 0.5 ? '#8ba89c' : '#ffffff');
        stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: color, s: Math.random() * 1.5 + 0.5 });
    }

    function renderStars() {
        ctx.fillStyle = 'rgba(2, 2, 3, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= warpSpeed;
            if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; } 
            let sc = 400 / (400 + s.z);
            let px = (width / 2) + s.x * sc; let py = (height / 2) + s.y * sc;
            ctx.beginPath(); ctx.arc(px, py, Math.max(0.1, s.size * sc * (warpSpeed > 2 ? 4 : 1)), 0, Math.PI * 2);
            ctx.fillStyle = s.color; ctx.globalAlpha = Math.min(1, sc * 2); ctx.fill(); ctx.globalAlpha = 1;
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }
    renderStars();

    // ================= 完美數學弧線 7 階天梯生成 =================
    const stepsGroup = document.getElementById('steps-group');
    
    // 依據您的推演邏輯，大智精算出的 8 個 Anchor 點 (包含頂端結界底座)
    // xl: 左側X, xr: 右側X, y: 底部Y, h: 正面高度
    const ANCHORS = [
        { xl: 80,    xr: 400,   y: 750, h: 45 }, // 第 1 階
        { xl: 135,   xr: 405,   y: 640, h: 40 }, // 第 2 階
        { xl: 192.5, xr: 417.5, y: 540, h: 35 }, // 第 3 階
        { xl: 252.5, xr: 437.5, y: 450, h: 30 }, // 第 4 階
        { xl: 310,   xr: 460,   y: 370, h: 26 }, // 第 5 階
        { xl: 360,   xr: 480,   y: 300, h: 22 }, // 第 6 階
        { xl: 397.5, xr: 492.5, y: 240, h: 18 }, // 第 7 階
        { xl: 422.5, xr: 497.5, y: 190, h: 0  }  // 頂部結界平台 (h=0)
    ];

    const GRADIENTS = ['url(#g-0)', 'url(#g-1)', 'url(#g-2)', 'url(#g-3)', 'url(#g-4)', 'url(#g-5)', 'url(#g-6)'];

    let currentDay = 4; // 設定今天是第 4 天（藍色發光，可透過 localStorage 動態改寫）

    function buildStairs() {
        let html = '';
        // 畫出 7 階 (i=0 到 i=6)
        for (let i = 0; i < 7; i++) {
            let curr = ANCHORS[i];
            let next = ANCHORS[i+1];
            let gradColor = GRADIENTS[i];
            
            // 狀態與點擊判定
            let stateClass = '';
            let clickAttr = '';
            if (i + 1 < currentDay) stateClass = 'step-done';
            else if (i + 1 === currentDay) {
                stateClass = 'step-current';
                clickAttr = 'onclick="triggerWarp()"';
            }
            else stateClass = 'step-locked';

            // 1. 正面 (Front Face) - 左下到右下，右上到左上
            let frontPts = `
                ${curr.xl},${curr.y} 
                ${curr.xr},${curr.y} 
                ${curr.xr},${curr.y - curr.h} 
                ${curr.xl},${curr.y - curr.h}
            `;
            
            // 2. 頂面 (Top Face) - 從當前正面的頂部，連到下一階的底部
            let topPts = `
                ${curr.xl},${curr.y - curr.h} 
                ${curr.xr},${curr.y - curr.h} 
                ${next.xr},${next.y} 
                ${next.xl},${next.y}
            `;

            html += `
                <g class="stair-step ${stateClass}" ${clickAttr}>
                    <!-- 正面 -->
                    <polygon class="step-front" points="${frontPts}" fill="${gradColor}" />
                    <polygon class="step-front" points="${frontPts}" fill="url(#f-dark)" opacity="0.4"/>
                    <!-- 頂面 -->
                    <polygon class="step-top" points="${topPts}" fill="${gradColor}" />
                    <polygon class="step-top" points="${topPts}" fill="url(#f-light)" opacity="0.6"/>
                </g>
            `;
        }
        stepsGroup.innerHTML = html;
        document.getElementById('day-hint').innerText = `請踏上第 ${currentDay} 日之法階`;
    }
    buildStairs();

    // ================= 星際穿越特效 =================
    function triggerWarp() {
        // 1. 星空引擎極速
        warpSpeed = 40;
        document.getElementById('ui-layer').style.opacity = '0';
        
        // 2. 菩提心劇烈發光
        const seed = document.getElementById('svg-immortal-seed');
        seed.style.filter = "url(#seedGlow) drop-shadow(0 0 40px #fff)";
        seed.style.animationDuration = "0.5s";

        // 3. SVG 容器衝向鏡頭 (中心點已設為菩提心座標)
        document.getElementById('stair-svg').classList.add('warp-drive');

        // 4. 白金閃光過渡
        setTimeout(() => {
            const flash = document.getElementById('flash-overlay');
            flash.style.opacity = '1';
            
            setTimeout(() => {
                alert("【過場震撼演示完畢】\n此處白光將無縫銜接至『第二頁：煥彩能量柱與印心陣法』！");
                location.reload(); 
            }, 1000);
            
        }, 1200); 
    }

</script>
</body>
</html>
