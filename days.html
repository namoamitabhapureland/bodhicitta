<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>無相懺 ． 琉璃洗心</title>
    <style>
        :root { --bg: #000; --gold: #f3e5ab; --cyan: #8ba89c; }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); font-family: "PingFang TC", serif; overflow: hidden; touch-action: none; width: 100vw; height: 100dvh; color: #fff; }

        /* UI 殼：承襲主系統美學 */
        .back-btn { position: absolute; top: 20px; left: 20px; z-index: 1000; color: var(--gold); display: flex; align-items: center; gap: 8px; cursor: pointer; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3); backdrop-filter: blur(5px); font-size: 0.9rem; }
        #status-panel { position: absolute; top: 70px; left: 5%; width: 90%; max-width: 320px; border-left: 2px solid var(--cyan); padding: 10px 20px; z-index: 100; pointer-events: none; opacity: 0; transition: 1.5s; }
        .s-title { font-size: 1.1rem; font-weight: bold; color: var(--cyan); letter-spacing: 2px; margin-bottom: 5px; }
        .s-desc { font-size: 0.8rem; color: #bbb; line-height: 1.6; }

        /* 畫布：八功德水 */
        canvas { position: absolute; inset: 0; z-index: 1; }

        /* 過場光球 */
        #warp-light { position: fixed; inset: 0; background: #fff; z-index: 9999; opacity: 0; pointer-events: none; }

        /* 第一頁文字 */
        #p1-ui { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .p1-title { color: var(--gold); font-size: 1.5rem; letter-spacing: 10px; font-weight: bold; text-shadow: 0 0 20px rgba(212,175,55,0.8); margin-bottom: 15px; }
        .p1-sub { color: #888; font-size: 0.85rem; letter-spacing: 5px; animation: breath 2s infinite alternate; }
        @keyframes breath { from { opacity: 0.3; } to { opacity: 1; } }

        /* 第二頁：卡片層 */
        #page-2 { position: absolute; inset: 0; z-index: 20; display: none; }
        .g-card { 
            position: absolute; width: 260px; height: 380px; left: 50%; top: 45%; margin: -190px 0 0 -130px; 
            background: rgba(255,255,255,0.05); border-radius: 24px; padding: 30px;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 1s cubic-bezier(0.15, 0.85, 0.35, 1); cursor: pointer;
        }
        
        /* 漂浮態 (無字) */
        .floating { transform: scale(0.4) rotateX(60deg) translateY(200px); opacity: 0.8; z-index: 5; }
        /* 飛出態 (顯字) */
        .active-card { transform: scale(1) rotateX(0deg) translateY(0); opacity: 1; z-index: 100; cursor: default; }
        .shatter { opacity: 0; transform: scale(1.2) translateY(-100px); filter: brightness(2) blur(10px); pointer-events: none; }

        .n-border { position: absolute; inset: 0; border-radius: 24px; padding: 2px; background: linear-gradient(135deg, var(--c1), var(--c2), var(--c3)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; animation: flow 4s linear infinite; }
        @keyframes flow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        .c-inner { opacity: 0; text-align: center; transition: 0.8s 0.5s; }
        .active-card .c-inner { opacity: 1; }
        .c-type { color: rgba(255,255,255,0.4); font-size: 0.7rem; letter-spacing: 4px; margin-bottom: 15px; font-weight: bold; }
        .c-title { color: #fff; font-size: 1.3rem; font-weight: bold; letter-spacing: 3px; margin-bottom: 25px; }
        .c-desc { color: #ccc; font-size: 0.9rem; line-height: 2; text-align: justify; }

        /* 洗滌按鈕 */
        #wash-zone { position: absolute; bottom: 8%; width: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: 0.5s; pointer-events: none; z-index: 200; }
        #wash-zone.show { opacity: 1; pointer-events: auto; }
        .w-btn { width: 80px; height: 80px; border-radius: 50%; border: 1.5px dashed rgba(255,255,255,0.4); position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .w-core { width: 30px; height: 30px; border-radius: 50%; background: #fff; box-shadow: 0 0 20px #fff; }
        .w-prog { position: absolute; inset: -5px; transform: rotate(-90deg); }
        .w-text { margin-top: 15px; font-size: 0.75rem; color: var(--cyan); letter-spacing: 3px; }

        #end-msg { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 2s; text-align: center; }
    </style>
</head>
<body>

    <div class="back-btn" onclick="location.href='index.html?screen=3'">返回道場</div>

    <div id="status-panel">
        <div class="s-title">無相懺 ． 琉璃洗心</div>
        <div class="s-desc">「罪從心起將心懺，心若滅時罪亦亡。」<br>洗滌塵垢，復本清明。</div>
    </div>

    <canvas id="waterCanvas"></canvas>
    <div id="warp-light"></div>

    <div id="page-1" onclick="toPage2()">
        <div id="p1-ui">
            <div class="p1-title">八功德水 ． 照心</div>
            <div class="p1-sub">輕觸水面入陣</div>
        </div>
    </div>

    <div id="page-2">
        <div id="card-layer"></div>
        <div id="wash-zone">
            <div class="w-btn" id="w-btn">
                <svg class="w-prog" width="90" height="90"><circle id="prog-c" cx="45" cy="45" r="42" fill="none" stroke="#fff" stroke-width="3" stroke-dasharray="264" stroke-dashoffset="264" stroke-linecap="round"/></svg>
                <div class="w-core"></div>
            </div>
            <div class="w-text">長按洗滌 ． 塵垢昇華</div>
        </div>
        <div id="end-msg">
            <div style="color:var(--gold); font-size:1.5rem; letter-spacing:8px; margin-bottom:20px;">心垢消融</div>
            <div style="color:#aaa; font-size:0.9rem; letter-spacing:2px;">心若無塵 ． 法界自明</div>
        </div>
    </div>

<script>
    // --- 核心：彩色流體水波渲染 ---
    const canvas = document.getElementById('waterCanvas'), ctx = canvas.getContext('2d');
    let w, h, time = 0;
    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // 模擬彩色功德水：使用多個重疊的色彩頻譜
    function drawWater() {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
        time += 0.005;

        for (let i = 0; i < 3; i++) { // 三層波浪疊加
            ctx.beginPath();
            let shift = i * 2;
            let grad = ctx.createLinearGradient(0, 0, w, h);
            // 隨時間變化的彩色漸層
            let hue1 = Math.sin(time) * 30 + 190; // 青色系
            let hue2 = Math.cos(time) * 30 + 45;  // 金色系
            grad.addColorStop(0, `hsla(${hue1}, 70%, 20%, 0.4)`);
            grad.addColorStop(0.5, `hsla(${hue2}, 60%, 30%, 0.3)`);
            grad.addColorStop(1, `hsla(${hue1 + 40}, 80%, 15%, 0.5)`);
            
            ctx.fillStyle = grad;

            // 繪製立體晃動感：使用多重正弦波
            for (let x = 0; x <= w; x += 5) {
                let y = Math.sin(x * 0.005 + time + shift) * 40 
                      + Math.sin(x * 0.01 - time * 2) * 20 
                      + (h * 0.6) 
                      + Math.cos(time + i) * 30;
                if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.fill();
        }
        
        // 頂部反光：增加琉璃感
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.beginPath();
        ctx.ellipse(w/2, h*0.5, w*0.8, h*0.2, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';

        requestAnimationFrame(drawWater);
    }
    drawWater();

    // --- 機制：卡片庫與邏輯 ---
    const DB = [
        { t: "語業之垢", h: "妄語惡言", d: "今日是否曾因情緒，以言語傷人、抱怨、誇大其詞，或說人是非？", c: "--c1:#ff9a9e;--c2:#fecfef;--c3:#fccb90" },
        { t: "意業之垢", h: "瞋恚結怨", d: "今日是否曾因外境不順，於心中生起怒火，懷忿不捨，遲遲不願放下？", c: "--c1:#a18cd1;--c2:#fbc2eb;--c3:#e0c3fc" },
        { t: "意業之垢", h: "傲慢自讚", d: "今日是否曾於心中暗自比較，覺得他人不如自己，甚至為了面子自讚毀他？", c: "--c1:#f6d365;--c2:#fda085;--c3:#f3e5ab" },
        { t: "身業之垢", h: "貪吝不捨", d: "今日是否在應當付出或助人時，生起慳吝之心，不願給予方便？", c: "--c1:#84fab0;--c2:#8fd3f4;--c3:#8ba89c" },
        { t: "意業之垢", h: "懈怠散亂", d: "今日是否耽溺於無意義的娛樂，荒廢了定課，任由時光虛度？", c: "--c1:#cfd9df;--c2:#e2ebf0;--c3:#ffffff" }
    ];
    let cardsLeft = DB.length, activeIdx = -1;

    function toPage2() {
        const light = document.getElementById('warp-light');
        light.style.opacity = '1';
        setTimeout(() => {
            document.getElementById('page-1').style.display = 'none';
            document.getElementById('page-2').style.display = 'block';
            document.getElementById('status-panel').style.opacity = '1';
            initCards();
            light.style.opacity = '0';
            light.style.transition = '2s';
        }, 300);
    }

    function initCards() {
        const layer = document.getElementById('card-layer');
        layer.innerHTML = DB.map((x, i) => `
            <div class="g-card floating" id="c-${i}" onclick="zoomCard(${i})">
                <div class="n-border" style="${x.c}"></div>
                <div class="c-inner">
                    <div class="c-type">${x.t}</div>
                    <div class="c-title">${x.h}</div>
                    <div class="c-desc">${x.d}</div>
                </div>
            </div>
        `).join('');
        // 隨機錯開漂浮位置
        DB.forEach((_, i) => {
            const c = document.getElementById(`c-${i}`);
            c.style.left = (30 + Math.random() * 40) + '%';
            c.style.top = (40 + Math.random() * 20) + '%';
        });
    }

    function zoomCard(i) {
        if (activeIdx !== -1) return;
        activeIdx = i;
        const c = document.getElementById(`c-${i}`);
        c.className = 'g-card active-card';
        c.style.left = '50%'; c.style.top = '45%';
        document.getElementById('wash-zone').classList.add('show');
    }

    // --- 長按洗滌邏輯 ---
    const wBtn = document.getElementById('w-btn'), prog = document.getElementById('prog-c');
    let timer, startT;

    function onDown(e) {
        if (activeIdx === -1) return;
        e.preventDefault();
        startT = Date.now();
        timer = setInterval(() => {
            let p = Math.min((Date.now() - startT) / 2000, 1);
            prog.style.strokeDashoffset = 264 - (264 * p);
            if (p >= 1) complete();
        }, 30);
    }

    function onUp() { clearInterval(timer); prog.style.strokeDashoffset = 264; }

    function complete() {
        clearInterval(timer);
        const c = document.getElementById(`c-${activeIdx}`);
        c.classList.add('shat');
        document.getElementById('wash-zone').classList.remove('show');
        
        setTimeout(() => {
            c.remove();
            activeIdx = -1; cardsLeft--;
            if (cardsLeft <= 0) {
                document.getElementById('end-msg').style.opacity = '1';
                setTimeout(() => location.href='index.html?screen=3', 4000);
            }
        }, 1000);
    }

    wBtn.addEventListener('mousedown', onDown); wBtn.addEventListener('touchstart', onDown);
    window.addEventListener('mouseup', onUp); window.addEventListener('touchend', onUp);
</script>
</body>
</html>
