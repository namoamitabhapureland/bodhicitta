<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7日菩提心階梯</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at 70% 30%, #1a1e36, #000000);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
    }

    .staircase-container {
        width: 100%;
        max-width: 600px;
        height: auto;
    }

    svg {
        width: 100%;
        height: 100%;
        display: block;
    }

    /* 階梯互動效果 */
    .step-group {
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .step-tread {
        opacity: 0.5;
        transition: opacity 0.3s ease;
    }

    .step-front {
        opacity: 0.7;
        transition: opacity 0.3s ease;
    }

    /* 點亮後的狀態 */
    .step-group.active .step-tread {
        opacity: 0.95;
        filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.6));
    }

    .step-group.active .step-front {
        opacity: 1;
    }

    /* 菩提心呼吸動畫 */
    @keyframes breathe {
        0%, 100% { 
            transform: scale(1); 
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6)); 
        }
        50% { 
            transform: scale(1.15); 
            filter: drop-shadow(0 0 30px rgba(255, 255, 100, 1)); 
        }
    }

    .bodhi-heart {
        transform-origin: 445px 200px;
        animation: breathe 4s ease-in-out infinite;
    }
</style>
</head>
<body>

<div class="staircase-container">
    <svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- 模糊濾鏡：用於最上方的門 -->
            <filter id="portalBlur" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="15" />
            </filter>

            <!-- 門的發光漸層 -->
            <radialGradient id="portalGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
                <stop offset="50%" stop-color="#fffacd" stop-opacity="0.8" />
                <stop offset="100%" stop-color="#ffd700" stop-opacity="0" />
            </radialGradient>

            <!-- 七色淡色漸層 (Pastel Gradients) -->
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffc6ce" />
                <stop offset="100%" stop-color="#ff9ea8" />
            </linearGradient>
            <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffe4c4" />
                <stop offset="100%" stop-color="#ffcba4" />
            </linearGradient>
            <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fffacd" />
                <stop offset="100%" stop-color="#ffeb73" />
            </linearGradient>
            <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#d4edda" />
                <stop offset="100%" stop-color="#a3d9b1" />
            </linearGradient>
            <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#d1ecf1" />
                <stop offset="100%" stop-color="#9ad3de" />
            </linearGradient>
            <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#e2d9f3" />
                <stop offset="100%" stop-color="#c1a7e2" />
            </linearGradient>
            <linearGradient id="grad7" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f3d9f1" />
                <stop offset="100%" stop-color="#e2a7dd" />
            </linearGradient>
        </defs>

        <!-- 星空背景 (純向量繪製) -->
        <g fill="#ffffff" opacity="0.6">
            <circle cx="100" cy="150" r="1.5" />
            <circle cx="250" cy="80" r="2" opacity="0.9" />
            <circle cx="480" cy="50" r="1" />
            <circle cx="550" cy="250" r="1.5" />
            <circle cx="80" cy="350" r="2" />
            <circle cx="180" cy="450" r="1" />
            <circle cx="520" cy="550" r="2" opacity="0.8" />
            <circle cx="60" cy="650" r="1.5" />
            <circle cx="560" cy="750" r="1" />
        </g>

        <!-- 頂端的模糊門 -->
        <ellipse cx="445" cy="200" rx="80" ry="120" fill="url(#portalGrad)" filter="url(#portalBlur)" />

        <!-- 發亮的菩提心 -->
        <path class="bodhi-heart" 
              d="M445,215 A18,18 0 0,0 409,215 C409,245 445,265 445,265 C445,265 481,245 481,215 A18,18 0 0,0 445,215 Z" 
              fill="#FFD700" stroke="#FFF" stroke-width="2"/>

        <!-- 3D 階梯群組 (由上至下繪製以確保圖層正確覆蓋，但邏輯是從下往上) -->
        
        <!-- Day 7 (Top) -->
        <g class="step-group" data-day="6">
            <polygon class="step-tread" points="400,250 490,250 460,320 360,320" fill="url(#grad7)" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
            <polygon class="step-front" points="360,320 460,320 460,350 360,350" fill="url(#grad7)" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
        </g>

        <!-- Day 6 -->
        <g class="step-group" data-day="5">
            <polygon class="step-tread" points="360,320 460,320 440,390 320,390" fill="url(#grad6)" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
            <polygon class="step-front" points="320,390 440,390 440,420 320,420" fill="url(#grad6)" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
        </g>

        <!-- Day 5 -->
        <g class="step-group" data-day="4">
            <polygon class="step-tread" points="320,390 440,390 430,460 280,460" fill="url(#grad5)" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
            <polygon class="step-front" points="280,460 430,460 430,490 280,490" fill="url(#grad5)" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
        </g>

        <!-- Day 4 -->
        <g class="step-group" data-day="3">
            <polygon class="step-tread" points="280,460 430,460 430,530 230,530" fill="url(#grad4)" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
            <polygon class="step-front" points="230,530 430,530 430,560 230,560" fill="url(#grad4)" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
        </g>

        <!-- Day 3 -->
        <g class="step-group" data-day="2">
            <polygon class="step-tread" points="230,530 430,530 440,600 180,600" fill="url(#grad3)" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
            <polygon class="step-front" points="180,600 440,600 440,630 180,630" fill="url(#grad3)" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
        </g>

        <!-- Day 2 -->
        <g class="step-group" data-day="1">
            <polygon class="step-tread" points="180,600 440,600 460,670 130,670" fill="url(#grad2)" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
            <polygon class="step-front" points="130,670 460,670 460,700 130,700" fill="url(#grad2)" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
        </g>

        <!-- Day 1 (Bottom) -->
        <g class="step-group" data-day="0">
            <polygon class="step-tread" points="130,670 460,670 480,740 80,740" fill="url(#grad1)" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
            <polygon class="step-front" points="80,740 480,740 480,770 80,770" fill="url(#grad1)" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
        </g>
    </svg>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // 從下到上取得所有階梯，將 NodeList 轉為 Array 並反轉，讓 Day 1 成為陣列索引 0
        const stepElements = Array.from(document.querySelectorAll('.step-group')).reverse();
        
        // 讀取 localStorage 狀態，預設為 7 天皆未完成 (false)
        const storageKey = 'bodhicitta_7day_progress';
        let progress = JSON.parse(localStorage.getItem(storageKey)) || Array(7).fill(false);

        // 初始化階梯發亮狀態
        stepElements.forEach((step, index) => {
            if (progress[index]) {
                step.classList.add('active');
            }

            // 綁定點擊事件
            step.addEventListener('click', () => {
                const isActive = step.classList.toggle('active');
                progress[index] = isActive;
                
                // 儲存回 localStorage
                localStorage.setItem(storageKey, JSON.stringify(progress));
            });
        });
    });
</script>
</body>
</html>
