<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>琉璃洗心 ． 無相懺</title>
    <style>
        :root {
            --bg-deep: #020203; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; 
            --gold-light: #f3e5ab; 
        }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, var(--bg-deep) 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
            display: flex; justify-content: center; align-items: center; color: #fff;
        }

        /* 背景星空與霧氣 (完全保留您的低熵美學) */
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(circle at 50% 30%, transparent 10%, rgba(1, 1, 3, 0.95) 100%); }
        #mist-layer { position: absolute; bottom: -10%; left: -10%; width: 120%; height: 60%; z-index: 5; pointer-events: none; mix-blend-mode: screen; overflow: hidden; }
        .mist-cloud { position: absolute; border-radius: 50%; animation: drift-mist 15s infinite alternate ease-in-out; will-change: transform, opacity; transform: translateZ(0); }
        .mist-1 { width: 1000px; height: 500px; left: -10%; bottom: -50px; background: radial-gradient(ellipse, rgba(139,168,156,0.2) 0%, transparent 70%); animation-duration: 18s; }
        .mist-2 { width: 1200px; height: 600px; right: -15%; bottom: -100px; background: radial-gradient(ellipse, rgba(0,242,254,0.15) 0%, transparent 70%); animation-duration: 22s; animation-delay: -5s; }
        @keyframes drift-mist { 0% { transform: translateX(-40px) translateY(10px) scale(1); opacity: 0.6; } 100% { transform: translateX(40px) translateY(-10px) scale(1.1); opacity: 1; } }
        #flash-overlay { position: fixed; inset: 0; background: radial-gradient(circle, #fff 0%, #e0f7fa 50%, transparent 100%); opacity: 0; z-index: 9999; pointer-events: none; transition: opacity 0.8s; mix-blend-mode: screen; }

        /* ================= PAGE 1: 漣漪入陣 ================= */
        #page-1 { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; cursor: pointer; }
        .title-p1 { color: var(--cyan); font-size: 1.2rem; letter-spacing: 6px; font-weight: bold; text-shadow: 0 0 20px rgba(139,168,156,0.6); margin-bottom: 30px; transition: opacity 0.5s; z-index: 20;}
        .subtitle-p1 { color: #888; font-size: 0.8rem; letter-spacing: 4px; transition: 0.5s; z-index: 20;}

        #water-surface { position: absolute; inset: 0; z-index: 10; display: flex; justify-content: center; align-items: center; }
        .ripple { position: absolute; border-radius: 50%; border: 2px solid rgba(139,168,156,0.6); box-shadow: 0 0 20px rgba(139,168,156,0.4), inset 0 0 20px rgba(139,168,156,0.2); transform: scale(0); opacity: 1; animation: ripple-expand 2.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; pointer-events: none;}
        @keyframes ripple-expand { 0% { transform: scale(0); opacity: 1; border-width: 4px; } 100% { transform: scale(20); opacity: 0; border-width: 0px; } }
        
        .warp-sink { animation: sink-drive 1.5s cubic-bezier(0.6, 0.05, 0.1, 1) forwards; }
        @keyframes sink-drive { 0% { transform: scale(1) translateY(0); filter: blur(0px); opacity: 1; } 100% { transform: scale(4) translateY(-20%); filter: blur(10px); opacity: 0; } }

        /* ================= PAGE 2: 洗心介面 ================= */
        #page-2 { position: absolute; inset: 0; z-index: 10; display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; }
        
        /* 頂部導航 (保留) */
        .nav-top { width: 90%; max-width: 480px; z-index: 20; display: flex; justify-content: space-between; align-items: center; margin-top: max(20px, env(safe-area-inset-top)); padding: 12px 20px; background: rgba(5, 5, 8, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(139,168,156,0.2); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .nav-btn { display: flex; align-items: center; gap: 8px; color: var(--cyan); font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .nav-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.5; fill: none; }
        .nav-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }

        /* 進度指示器 */
        .tracker-container { z-index: 20; margin-top: 30px; display: flex; gap: 15px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.4s; }
        .dot.active { background: var(--cyan); box-shadow: 0 0 10px var(--cyan); transform: scale(1.5); }
        .dot.done { background: rgba(212,175,55,0.6); }

        /* 琉璃字卡 (核心) */
        #card-container { position: relative; z-index: 10; margin-top: 8vh; width: 85%; max-width: 360px; aspect-ratio: 3 / 4; display: flex; justify-content: center; align-items: center; perspective: 1000px; }
        
        .glass-card { 
            position: absolute; width: 100%; height: 100%; 
            background: linear-gradient(135deg, rgba(15,20,25,0.85), rgba(5,8,10,0.95)); 
            border-radius: 24px; padding: 35px 25px; 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.05); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transform: translateY(30px) rotateX(10deg); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            overflow: hidden;
        }
        .glass-card.show { opacity: 1; transform: translateY(0) rotateX(0deg); }
        .glass-card.shatter { filter: blur(5px) brightness(1.5); opacity: 0; transform: scale(1.1) translateY(-20px); }

        /* 霓虹色彩框 */
        .neon-border { position: absolute; inset: 0; border-radius: 24px; padding: 2px; background: linear-gradient(135deg, var(--c1, #89CFF0), var(--c2, #C9A0DC), var(--c3, #FDF5D3)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0.5; animation: border-flow 4s linear infinite; transition: opacity 0.5s; }
        @keyframes border-flow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        .card-type { color: rgba(255,255,255,0.5); font-size: 0.75rem; letter-spacing: 5px; margin-bottom: 20px; text-transform: uppercase; }
        .card-title { color: #fff; font-size: 1.4rem; font-weight: bold; letter-spacing: 4px; margin-bottom: 25px; text-shadow: 0 0 15px rgba(255,255,255,0.4); }
        .card-desc { color: #ccc; font-size: 0.95rem; line-height: 2; letter-spacing: 1px; text-align: justify; text-align-last: center; }

        /* 洗滌按鈕區 */
        .action-zone { z-index: 20; position: absolute; bottom: 8%; width: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: opacity 1s; pointer-events: none; }
        .action-zone.show { opacity: 1; pointer-events: auto; }
        
        .wash-btn { position: relative; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .wash-bg { position: absolute; inset: 0; border: 1.5px dashed rgba(139,168,156,0.5); border-radius: 50%; animation: spin 8s linear infinite; }
        .wash-progress { position: absolute; top: -5px; left: -5px; width: 90px; height: 90px; transform: rotate(-90deg); pointer-events: none; }
        
        .wash-core { width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle, #fff 0%, var(--cyan) 100%); box-shadow: 0 0 15px var(--cyan); transition: 0.3s; pointer-events: none; }
        .wash-btn:active .wash-core { transform: scale(0.8); box-shadow: 0 0 25px #fff; }
        
        .wash-text { position: absolute; bottom: -30px; color: var(--cyan); font-size: 0.75rem; letter-spacing: 3px; white-space: nowrap; transition: 0.3s; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 昇華粒子 */
        .sublime-dust { position: fixed; border-radius: 50%; pointer-events: none; mix-blend-mode: screen; z-index: 9999; }
    </style>
</head>
<body oncontextmenu="return false;">

    <canvas id="starCanvas"></canvas>
    <div id="vignette"></div>
    <div id="mist-layer">
        <div class="mist-cloud mist-1"></div><div class="mist-cloud mist-2"></div>
    </div>
    <div id="flash-overlay"></div>

    <!-- PAGE 1: 入陣 -->
    <div id="page-1" onclick="executeEntryWarp(event)">
        <div id="water-surface"></div>
        <div class="title-p1" id="p1-t1">法界清涼 ． 洗滌塵勞</div>
        <div class="subtitle-p1" id="p1-t2">請輕觸水面入陣</div>
    </div>

    <!-- PAGE 2: 洗心介面 -->
    <div id="page-2">
        <div class="nav-top">
            <div class="nav-btn" onclick="location.reload()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回道場</div>
            <div class="nav-divider"></div>
            <div class="nav-btn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg> 法理溯源</div>
        </div>

        <div class="tracker-container" id="card-trackers">
            <!-- JS 動態生成 5 顆圓點 -->
        </div>

        <div id="card-container">
            <!-- JS 動態抽卡生成 -->
        </div>

        <div class="action-zone" id="action-zone">
            <div class="wash-btn" id="wash-btn">
                <div class="wash-bg"></div>
                <svg class="wash-progress" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="4"/>
                    <circle id="progress-circle" cx="50" cy="50" r="46" fill="none" stroke="#fff" stroke-width="4" stroke-dasharray="289" stroke-dashoffset="289" stroke-linecap="round"/>
                </svg>
                <div class="wash-core"></div>
                <div class="wash-text" id="wash-text">長按洗滌 ． 塵垢昇華</div>
            </div>
        </div>
    </div>

<script>
    // --- 星空背景 (保留您的代碼) ---
    const canvas = document.getElementById('starCanvas'); const ctx = canvas.getContext('2d');
    let width, height, stars = [], warpSpeed = 0.5, starScale = 1; 
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();
    const STAR_COLORS = ['#8ba89c', '#ffffff', '#e0f7fa', '#b2dfdb'];
    for (let i = 0; i < 200; i++) { stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)], s: Math.random() * 2 + 1 }); }
    function renderStars() {
        ctx.fillStyle = 'rgba(2, 2, 4, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= warpSpeed; if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; } 
            let sc = 400 / (400 + s.z); ctx.beginPath(); 
            ctx.arc((width / 2) + s.x * sc, (height / 2) + s.y * sc, s.s * sc * starScale, 0, Math.PI * 2);
            ctx.fillStyle = s.color; ctx.globalAlpha = Math.min(1, sc * 2.5); ctx.fill(); ctx.globalAlpha = 1;
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }
    renderStars();

    // --- 階段一：漣漪入陣 ---
    let hasEntered = false;
    function executeEntryWarp(e) {
        if(hasEntered) return; hasEntered = true;
        
        // 產生漣漪
        let ripple = document.createElement('div');
        ripple.className = 'ripple';
        ripple.style.left = e.clientX + 'px'; ripple.style.top = e.clientY + 'px';
        document.getElementById('water-surface').appendChild(ripple);

        // 文字隱藏與下沉動畫
        document.getElementById('p1-t1').style.opacity = '0';
        document.getElementById('p1-t2').style.opacity = '0';
        document.getElementById('page-1').classList.add('warp-sink');

        // 星空加速
        warpSpeed = 15; starScale = 3;

        setTimeout(() => {
            document.getElementById('flash-overlay').style.opacity = '1';
            setTimeout(() => { 
                document.getElementById('page-1').style.display = 'none'; 
                document.getElementById('page-2').style.display = 'flex';
                initCards();
                document.getElementById('flash-overlay').style.opacity = '0';
                
                setTimeout(() => { 
                    document.getElementById('card-0').classList.add('show');
                    document.getElementById('action-zone').classList.add('show');
                    let calmInterval = setInterval(() => {
                        warpSpeed += (0.5 - warpSpeed) * 0.05; starScale += (1 - starScale) * 0.05; 
                        if (Math.abs(warpSpeed - 0.5) < 0.1) { warpSpeed = 0.5; starScale = 1; clearInterval(calmInterval); }
                    }, 30);
                }, 800);
            }, 800);
        }, 800);
    }

    // --- 階段二：字卡邏輯 ---
    const DIRT_DB = [
        { type: "口業之垢", title: "妄語惡言", desc: "今日是否曾因情緒或利益，以言語傷人、抱怨、誇大其詞，或於背後說人是非？", color: "--c1: #ff9a9e; --c2: #fecfef; --c3: #fccb90" },
        { type: "意業之垢", title: "瞋恚結怨", desc: "今日是否曾因外境不順或他人冒犯，於心中生起怒火，甚至懷忿不捨，遲遲不願放下？", color: "--c1: #a18cd1; --c2: #fbc2eb; --c3: #e0c3fc" },
        { type: "意業之垢", title: "傲慢自讚", desc: "今日是否曾於心中暗自比較，覺得他人不如自己，甚至為了面子而自讚毀他？", color: "--c1: #f6d365; --c2: #fda085; --c3: #f3e5ab" },
        { type: "身業之垢", title: "貪吝不捨", desc: "今日是否在面對他人求助，或應當付出資源時，生起慳吝之心，不願給予方便？", color: "--c1: #84fab0; --c2: #8fd3f4; --c3: #8ba89c" },
        { type: "意業之垢", title: "懈怠散亂", desc: "今日是否耽溺於無意義的世俗娛樂與閒談，荒廢了定課，任由時光虛度？", color: "--c1: #cfd9df; --c2: #e2ebf0; --c3: #ffffff" }
    ];

    let currentCardIndex = 0;
    const totalCards = DIRT_DB.length;

    function initCards() {
        let trackersHtml = '';
        let cardsHtml = '';
        DIRT_DB.forEach((item, i) => {
            trackersHtml += `<div class="dot ${i===0?'active':''}" id="dot-${i}"></div>`;
            cardsHtml += `
            <div class="glass-card" id="card-${i}">
                <div class="neon-border" style="${item.color}"></div>
                <div class="card-type">${item.type}</div>
                <div class="card-title">${item.title}</div>
                <div class="card-desc">${item.desc}</div>
            </div>`;
        });
        document.getElementById('card-trackers').innerHTML = trackersHtml;
        document.getElementById('card-container').innerHTML = cardsHtml;
    }

    // --- 長按洗滌與昇華粒子 ---
    const btn = document.getElementById('wash-btn'); 
    const progCircle = document.getElementById('progress-circle'); 
    const hintText = document.getElementById('wash-text');
    let reqAnimId, startTime, DURATION = 2000;

    function createSublimeDust() {
        const card = document.getElementById(`card-${currentCardIndex}`);
        const rect = card.getBoundingClientRect();
        for(let i=0; i<40; i++) {
            let dust = document.createElement('div'); dust.className = 'sublime-dust';
            dust.style.left = rect.left + Math.random() * rect.width + 'px'; 
            dust.style.top = rect.top + Math.random() * rect.height + 'px';
            let size = Math.random() * 6 + 2; dust.style.width = size + 'px'; dust.style.height = size + 'px';
            
            // 粒子顏色隨機取金白青
            const colors = ['#fff', '#f3e5ab', '#8ba89c'];
            dust.style.background = colors[Math.floor(Math.random() * colors.length)];
            dust.style.boxShadow = `0 0 10px ${dust.style.background}`;
            
            document.body.appendChild(dust); 
            
            // 向上昇華動畫
            dust.animate([
                { opacity: 1, transform: `translate(0, 0) scale(1)` },
                { opacity: 0, transform: `translate(${(Math.random() - 0.5) * 100}px, -${Math.random() * 200 + 100}px) scale(0)` }
            ], { duration: 2500 + Math.random()*1000, easing: 'ease-out', fill: 'forwards' });

            setTimeout(() => dust.remove(), 3500);
        }
    }

    function drawProgress(timestamp) {
        if (!startTime) startTime = timestamp; let pct = Math.min((timestamp - startTime) / DURATION, 1);
        progCircle.style.strokeDashoffset = 289 - (289 * pct);
        
        // 卡片霓虹框加速閃爍
        document.querySelector(`#card-${currentCardIndex} .neon-border`).style.opacity = 0.5 + (pct * 0.5);

        if (pct < 1) reqAnimId = requestAnimationFrame(drawProgress); else completeWash();
    }

    function startPress(e) { 
        if(currentCardIndex >= totalCards) return;
        e.preventDefault(); hintText.innerText = "法水洗滌中..."; hintText.style.color = "#fff"; 
        if (reqAnimId) cancelAnimationFrame(reqAnimId);
        startTime = null; reqAnimId = requestAnimationFrame(drawProgress); 
    }

    function cancelPress() { 
        if(currentCardIndex >= totalCards) return;
        cancelAnimationFrame(reqAnimId); progCircle.style.strokeDashoffset = 289; 
        hintText.innerText = "長按洗滌 ． 塵垢昇華"; hintText.style.color = "var(--cyan)"; 
        document.querySelector(`#card-${currentCardIndex} .neon-border`).style.opacity = 0.5;
    }
    
    function completeWash() {
        cancelAnimationFrame(reqAnimId);
        
        // 1. 卡片碎裂昇華特效
        const currentCard = document.getElementById(`card-${currentCardIndex}`);
        currentCard.classList.add('shatter');
        createSublimeDust();
        
        // 2. 圓點更新
        document.getElementById(`dot-${currentCardIndex}`).classList.remove('active');
        document.getElementById(`dot-${currentCardIndex}`).classList.add('done');

        currentCardIndex++;
        progCircle.style.strokeDashoffset = 289;
        hintText.innerText = "長按洗滌 ． 塵垢昇華"; hintText.style.color = "var(--cyan)";

        if (currentCardIndex < totalCards) {
            // 顯示下一張
            setTimeout(() => {
                document.getElementById(`dot-${currentCardIndex}`).classList.add('active');
                document.getElementById(`card-${currentCardIndex}`).classList.add('show');
            }, 600);
        } else {
            // 洗滌圓滿
            document.getElementById('action-zone').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('card-container').innerHTML = `
                <div style="text-align:center; animation: fadeIn 2s;">
                    <div style="color:var(--gold); font-size:1.5rem; letter-spacing:8px; margin-bottom:20px;">心垢消融</div>
                    <div style="color:#aaa; font-size:0.9rem; line-height:2; letter-spacing:2px;">心若無塵 ． 法界自明<br>今日布薩圓滿 ． 歸返清淨</div>
                </div>
                `;
            }, 1000);
        }
    }

    btn.addEventListener('mousedown', startPress); btn.addEventListener('touchstart', startPress, {passive: false});
    window.addEventListener('mouseup', cancelPress); window.addEventListener('touchend', cancelPress); window.addEventListener('mouseleave', cancelPress); btn.addEventListener('touchcancel', cancelPress);

</script>
</body>
</html>
