<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶幢契印 ． 底部資糧區佈局</title>
    <style>
        :root {
            --gold-light: #f3e5ab;
            --gold-solid: #d4af37;
            --cyan: #8ba89c;
        }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, #020203 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            height: 100vh; overflow: hidden; color: #fff; padding-bottom: 8vh;
        }

        /* 模擬契印按鈕 (作為相對位置參考) */
        .mock-seal-btn {
            width: 90px; height: 90px; border-radius: 50%;
            border: 1px dashed rgba(212,175,55,0.4);
            background: radial-gradient(circle, #fff 10%, var(--gold-solid) 80%);
            margin-bottom: 25px;
        }
        .mock-seal-text {
            color: var(--gold-solid); font-size: 0.8rem; letter-spacing: 3px; font-weight: bold;
            margin-bottom: 15px;
        }

        /* ================= 底部資糧區塊 (包含寶幢與文字) ================= */
        .pool-wrap { 
            width: 85%; max-width: 340px; text-align: center; 
        }

        /* 新增：寶幢與文字的橫向排列容器 */
        .pool-header-row {
            display: flex; justify-content: center; align-items: flex-end;
            gap: 8px; /* 寶幢與文字之間的間距 */
            margin-bottom: 8px;
        }

        .pool-label { 
            font-size: 0.75rem; color: var(--gold-light); letter-spacing: 2px; 
            opacity: 0.8; padding-bottom: 2px; /* 微調文字高度對齊寶幢底部 */
            white-space: nowrap;
        }

        /* 能量棒 */
        .pool-bar-bg { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .pool-bar-fill { height: 100%; width: 50%; background: linear-gradient(90deg, #D4AF37, #89CFF0); }

        /* ================= 寶幢樣式設定 ================= */
        .banner-jewel {
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        /* 尺寸設定：中寶幢 (與文字相仿) / 小寶幢 (略小) */
        .banner-md { width: 12px; height: 20px; }
        .banner-sm { width: 10px; height: 16px; margin-bottom: 1px; /* 稍微墊高一點點對齊 */ }

        /* 狀態 1：透明隱藏 */
        .banner-unlit {
            opacity: 0.15;
            filter: grayscale(100%);
        }
        
        /* 狀態 2：點亮呼吸 */
        .banner-lit {
            opacity: 0.95;
            animation: star-breathe 3s infinite alternate ease-in-out;
        }
        .banner-jewel:active { transform: scale(0.85); }
        @keyframes star-breathe { 0% { transform: translateY(0); } 100% { transform: translateY(-3px); } }

        /* 四階寶幢顏色設定 (CSS 變數) */
        /* 左小 (70日 真金) */
        #banner-70 { --f1: #FFF8DC; --f2: #F3E5AB; --f3: #D4AF37; --bd: #AA7900; --bs: #5C4000; --rb: #FFF; animation-delay: 0s; }
        #banner-70.banner-lit { filter: drop-shadow(0 0 6px rgba(212,175,55,0.8)); }

        /* 右小 (700日 青琉璃) */
        #banner-700 { --f1: #E0FBFC; --f2: #98C1D9; --f3: #48CAE4; --bd: #2A9D8F; --bs: #1D3557; --rb: #FFF; animation-delay: -1s; }
        #banner-700.banner-lit { filter: drop-shadow(0 0 6px rgba(42,157,143,0.8)); }

        /* 左中 (7000日 赤火) */
        #banner-7000 { --f1: #F4A261; --f2: #E76F51; --f3: #C1121F; --bd: #780000; --bs: #370617; --rb: #FDFCDC; animation-delay: -2s; }
        #banner-7000.banner-lit { filter: drop-shadow(0 0 8px rgba(193,18,31,0.8)); }

        /* 右中 (70000日 白金) */
        #banner-70000 { --f1: #FFFFFF; --f2: #FDFCDC; --f3: #E0E1DD; --bd: #F3E5AB; --bs: #D4AF37; --rb: #FFFFFF; animation-delay: -3s; }
        #banner-70000.banner-lit { filter: drop-shadow(0 0 10px rgba(255,255,255,0.9)); }

        /* ================= 契印證書 彈框 ================= */
        .cert-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 10000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.5s; }
        .cert-overlay.show { opacity: 1; pointer-events: auto; }
        .cert-box { background: linear-gradient(180deg, rgba(20,20,20,0.95) 0%, rgba(5,5,5,0.98) 100%); border: 1px solid rgba(212,175,55,0.4); border-radius: 20px; width: 85%; max-width: 360px; padding: 40px 25px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.9); transform: translateY(30px) scale(0.95); transition: 0.5s; }
        .cert-overlay.show .cert-box { transform: translateY(0) scale(1); }
        .cert-header { color: var(--gold-light); font-size: 0.9rem; letter-spacing: 6px; margin-bottom: 25px; }
        .cert-svg-wrap { width: 90px; height: 150px; margin: 0 auto 25px auto; animation: cert-float 3s infinite alternate; }
        .cert-svg-wrap svg { width: 100%; height: 100%; overflow: visible; }
        @keyframes cert-float { 0% { transform: translateY(0); } 100% { transform: translateY(-8px); } }
        .cert-name { color: var(--gold-solid); font-size: 1.3rem; font-weight: bold; letter-spacing: 5px; margin: 10px 0 25px 0; }
        .cert-divider { width: 60%; height: 1px; background: radial-gradient(circle, rgba(212,175,55,0.6) 0%, transparent 100%); margin: 0 auto 20px auto; }
        .cert-desc { color: #ddd; font-size: 0.9rem; line-height: 2; letter-spacing: 1.5px; margin-bottom: 35px; }
        .cert-btn { background: transparent; color: var(--gold-light); border: 1px solid rgba(212,175,55,0.5); padding: 12px 35px; border-radius: 30px; letter-spacing: 3px; font-size: 0.9rem; cursor: pointer; transition: 0.3s; }
        .cert-btn:active { background: rgba(212,175,55,0.2); transform: scale(0.95); }
    </style>
</head>
<body>

    <!-- 支援 CSS 變數的 SVG 寶幢定義 -->
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
        <defs>
            <g id="dynamic-banner">
                <path d="M60,10 Q65,25 60,35 Q55,25 60,10" fill="var(--f1, #E76F51)"/>
                <path d="M60,18 Q62,26 60,30 Q58,26 60,18" fill="var(--f2, #F4A261)"/>
                <path d="M60,25 C78,35 88,55 78,75 C68,55 63,55 60,62 C57,55 52,55 42,75 C32,55 42,35 60,25 Z" fill="var(--f3, #2A9D8F)"/>
                <path d="M60,40 C85,50 100,75 88,95 C78,75 68,75 60,82 C52,75 42,75 32,95 C20,75 35,50 60,40 Z" fill="var(--bd, #E9C46A)"/>
                <path d="M60,55 C95,65 112,95 100,115 C88,95 72,95 60,105 C48,95 32,95 20,115 C8,95 25,65 60,55 Z" fill="var(--bs, #C1121F)"/>
                <path d="M60,75 C105,85 125,120 108,145 C92,120 75,118 60,130 C45,118 28,120 12,145 C-5,120 15,85 60,75 Z" fill="var(--bd, #1D3557)"/>
                <path d="M38,100 C15,120 10,155 25,175 C38,195 12,185 5,160 C-2,135 18,110 38,100 Z" fill="var(--rb, #FDFCDC)"/>
                <path d="M82,100 C105,120 110,155 95,175 C82,195 108,185 115,160 C122,135 102,110 82,100 Z" fill="var(--rb, #FDFCDC)"/>
                <path d="M60,128 C70,140 70,155 60,165 C50,155 50,140 60,128 Z" fill="var(--f3, #2A9D8F)"/>
                <circle cx="60" cy="172" r="5" fill="var(--f2, #E9C46A)"/>
                <path d="M60,177 Q65,185 60,195 Q55,185 60,177" fill="var(--f1, #C1121F)"/>
                <g fill="none" stroke="#F3E5AB" stroke-width="2" opacity="0.8">
                    <path d="M60,25 C78,35 88,55 78,75"/><path d="M60,40 C85,50 100,75 88,95"/>
                    <path d="M60,55 C95,65 112,95 100,115"/><path d="M60,75 C105,85 125,120 108,145"/>
                    <path d="M60,25 C42,35 32,55 42,75"/><path d="M60,40 C35,50 20,75 32,95"/>
                    <path d="M60,55 C25,65 8,95 20,115"/><path d="M60,75 C15,85 -5,120 12,145"/>
                </g>
            </g>
        </defs>
    </svg>

    <!-- 測試按鈕，放在最上方避免干擾 -->
    <button style="position:absolute; top:20px; padding:8px 16px; background:rgba(212,175,55,0.2); color:#fff; border:1px solid #d4af37; border-radius:5px; z-index:999;" onclick="toggleVisibility()">切換 點亮/未點亮 (預設全亮測試)</button>

    <!-- 模擬契印與文字 -->
    <div class="mock-seal-btn"></div>
    <div class="mock-seal-text">【 今日行願已圓滿 】</div>

    <!-- ===== 重點：底部資糧區塊的全新佈局 ===== -->
    <div class="pool-wrap">
        <!-- 將寶幢與文字水平排列 -->
        <div class="pool-header-row">
            <!-- 左小 (70) -->
            <svg class="banner-jewel banner-sm banner-lit" id="banner-70" viewBox="0 0 120 200" onclick="openCert(70)"><use href="#dynamic-banner"/></svg>
            <!-- 左中 (7000) -->
            <svg class="banner-jewel banner-md banner-lit" id="banner-7000" viewBox="0 0 120 200" onclick="openCert(7000)"><use href="#dynamic-banner"/></svg>
            
            <!-- 原本的文字 -->
            <div class="pool-label" style="margin: 0 4px;">法界暫存資糧 : 500 / 1000</div>
            
            <!-- 右中 (70000) -->
            <svg class="banner-jewel banner-md banner-lit" id="banner-70000" viewBox="0 0 120 200" onclick="openCert(70000)"><use href="#dynamic-banner"/></svg>
            <!-- 右小 (700) -->
            <svg class="banner-jewel banner-sm banner-lit" id="banner-700" viewBox="0 0 120 200" onclick="openCert(700)"><use href="#dynamic-banner"/></svg>
        </div>
        
        <!-- 能量棒 -->
        <div class="pool-bar-bg"><div class="pool-bar-fill"></div></div>
    </div>

    <!-- 契印證書彈框 (與之前相同) -->
    <div class="cert-overlay" id="cert-modal">
        <div class="cert-box">
            <div class="cert-header" id="cert-title">✦ 菩提契印 ✦</div>
            <div class="cert-svg-wrap" id="cert-glow"><svg id="cert-svg" viewBox="0 0 120 200"><use href="#dynamic-banner"/></svg></div>
            <div style="color: #aaa; font-size: 0.8rem; letter-spacing: 3px;">行 者</div>
            <div class="cert-name">妙 依</div>
            <div class="cert-divider"></div>
            <div class="cert-desc" id="cert-text">...</div>
            <button class="cert-btn" onclick="closeCert()">歡喜功德 ． 締結契印</button>
        </div>
    </div>

<script>
    const CERT_DATA = {
        70: { title: "✦ 初地 ． 歡喜契印 ✦", glow: "drop-shadow(0 0 25px rgba(233,196,106,0.8))", text: "已圓滿七十日普賢行願。<br>初發心成，真金寶幢於星空初現。<br>願此生步步生蓮，永不退轉。", cssVars: "--f1: #FFF8DC; --f2: #F3E5AB; --f3: #D4AF37; --bd: #AA7900; --bs: #5C4000; --rb: #FFF;" },
        700: { title: "✦ 遠行 ． 琉璃契印 ✦", glow: "drop-shadow(0 0 35px rgba(42,157,143,0.8))", text: "歷經七百日大願薰修。<br>煩惱漸除，青琉璃寶幢高懸法界。<br>願身心清淨，內外明徹。", cssVars: "--f1: #E0FBFC; --f2: #98C1D9; --f3: #48CAE4; --bd: #2A9D8F; --bs: #1D3557; --rb: #FFF;" },
        7000: { title: "✦ 善慧 ． 妙法契印 ✦", glow: "drop-shadow(0 0 45px rgba(193,18,31,0.8))", text: "七千日行願，不疲不厭。<br>赤紅寶幢燃起三昧真火。<br>願大悲拔苦，普度一切有情。", cssVars: "--f1: #F4A261; --f2: #E76F51; --f3: #C1121F; --bd: #780000; --bs: #370617; --rb: #FDFCDC;" },
        70000: { title: "✦ 等覺 ． 圓滿契印 ✦", glow: "drop-shadow(0 0 60px #fff) drop-shadow(0 0 15px #E9C46A)", text: "盡未來際，行願無盡。<br>七萬日功德化為無上白金佛光。<br>法界授記，十方如來同聲讚歎。", cssVars: "--f1: #FFFFFF; --f2: #FDFCDC; --f3: #E0E1DD; --bd: #F3E5AB; --bs: #D4AF37; --rb: #FFFFFF;" }
    };

    function openCert(tier) {
        document.getElementById('cert-title').innerText = CERT_DATA[tier].title;
        document.getElementById('cert-text').innerHTML = CERT_DATA[tier].text;
        document.getElementById('cert-glow').style.filter = CERT_DATA[tier].glow;
        document.getElementById('cert-svg').style.cssText = CERT_DATA[tier].cssVars;
        document.getElementById('cert-modal').classList.add('show');
    }

    function closeCert() { document.getElementById('cert-modal').classList.remove('show'); }

    // 確實修復了切換按鈕功能
    let isLit = true;
    function toggleVisibility() {
        isLit = !isLit;
        const jewels = document.querySelectorAll('.banner-jewel');
        jewels.forEach(j => {
            if(isLit) { 
                j.classList.add('banner-lit'); j.classList.remove('banner-unlit'); 
            } else { 
                j.classList.remove('banner-lit'); j.classList.add('banner-unlit'); 
            }
        });
    }
</script>
</body>
</html>
