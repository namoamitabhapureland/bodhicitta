<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>八關齋戒 ． 一日一夜</title>
    <style>
        :root { --bg-deep: #020203; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, var(--bg-deep) 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh; color: #fff; overscroll-behavior: none;
        }

        /* 黑幕轉場 */
        #page-transition-curtain { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 999999; opacity: 0; pointer-events: none; transition: opacity 0.8s ease-in-out; }

        /* 畫布層 */
        canvas { position: absolute; inset: 0; }
        #starCanvas { z-index: 1; pointer-events: none; }
        #waterCanvas { z-index: 2; mix-blend-mode: screen; opacity: 0.85; pointer-events: none; }
        #rainCanvas { z-index: 9998; pointer-events: none; opacity: 0; transition: opacity 1.5s; mix-blend-mode: screen; }

        #flash-overlay { position: fixed; inset: 0; background: radial-gradient(circle, #fff 0%, #e0f7fa 50%, transparent 100%); opacity: 0; z-index: 9999; pointer-events: none; transition: opacity 0.8s; mix-blend-mode: screen; }

        /* ================= PAGE 1: 漣漪入陣 ================= */
        #page-1 { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; cursor: pointer; }
        .p1-title { color: var(--gold); font-size: 1.6rem; letter-spacing: 12px; font-weight: bold; text-shadow: 0 0 25px rgba(212,175,55,0.8); margin-bottom: 20px; transition: opacity 0.5s; z-index: 20; }
        .p1-sub { color: #888; font-size: 0.9rem; letter-spacing: 5px; animation: breath 2s infinite alternate; transition: opacity 0.5s; z-index: 20; }
        @keyframes breath { from { opacity: 0.2; } to { opacity: 1; } }

        #water-surface { position: absolute; inset: 0; z-index: 10; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .ripple { position: absolute; border-radius: 50%; border: 2px solid rgba(243,229,171,0.8); box-shadow: 0 0 30px rgba(243,229,171,0.6), inset 0 0 20px rgba(243,229,171,0.4); transform: scale(0); opacity: 1; animation: ripple-expand 2.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; pointer-events: none; }
        @keyframes ripple-expand { 0% { transform: scale(0); opacity: 1; border-width: 4px; } 100% { transform: scale(25); opacity: 0; border-width: 0px; } }
        
        .warp-sink { animation: sink-drive 1.5s cubic-bezier(0.6, 0.05, 0.1, 1) forwards; }
        @keyframes sink-drive { 0% { transform: scale(1) translateY(0); filter: blur(0px); opacity: 1; } 100% { transform: scale(4) translateY(-20%); filter: blur(10px); opacity: 0; } }

        /* ================= PAGE 2: 道場主介面 ================= */
        #page-2 { position: absolute; inset: 0; z-index: 20; display: none; }
        
        .back-btn { position: absolute; top: 20px; left: 20px; z-index: 1000; color: var(--gold); display: flex; align-items: center; gap: 8px; cursor: pointer; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3); backdrop-filter: blur(5px); font-size: 0.9rem; }
        .back-btn:active { transform: scale(0.95); }

        /* 核心：發光呼吸與位置 */
        #meditator-layer { position: absolute; inset: 0; z-index: 30; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        .meditator-container {
            width: 320px; height: 320px; cursor: pointer; pointer-events: auto; margin-top: 20px; 
            animation: breathe-scale 5s ease-in-out infinite alternate;
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .meditator-svg { width: 100%; height: 100%; }
        .meditator-container:active { transform: scale(0.95) !important; animation: none; filter: brightness(1.5); }
        @keyframes breathe-scale { 
            0% { transform: translateY(0px) scale(0.95); filter: drop-shadow(0 0 15px rgba(243,229,171,0.3)); } 
            100% { transform: translateY(-15px) scale(1.03); filter: drop-shadow(0 0 35px rgba(243,229,171,0.8)); } 
        }
        .hint-text { margin-top: 15px; color: var(--gold); font-size: 0.85rem; letter-spacing: 5px; opacity: 0.7; animation: breath 2s infinite alternate; pointer-events: none; }

        /* ================= 儀軌閱讀次第彈框 (動態切換) ================= */
        #rules-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 9999; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.6s; }
        #rules-modal.show { opacity: 1; pointer-events: auto; }
        .modal-content { width: 90%; max-width: 420px; max-height: 80vh; background: linear-gradient(135deg, rgba(20,25,30,0.95), rgba(5,10,15,0.98)); border: 1px solid rgba(212,175,55,0.5); border-radius: 20px; padding: 30px 20px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.9); position: relative; }
        
        .modal-header { text-align: center; color: var(--gold); font-size: 1.3rem; letter-spacing: 4px; font-weight: bold; margin-bottom: 20px; border-bottom: 1px dashed rgba(212,175,55,0.3); padding-bottom: 15px; }
        .step-container { overflow-y: auto; padding: 10px; flex-grow: 1; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .step-text { color: #ddd; font-size: 0.95rem; line-height: 2; text-align: justify; letter-spacing: 1px; width: 100%; }
        
        /* 姓名輸入框 */
        .name-input { background: rgba(0,0,0,0.5); border: 1px solid var(--solid-gold); color: var(--gold); text-align: center; font-size: 1rem; padding: 8px; border-radius: 10px; width: 150px; outline: none; margin: 15px 0; letter-spacing: 2px; }
        .name-input::placeholder { color: rgba(243,229,171,0.3); }

        .agree-btn { background: rgba(212,175,55,0.15); border: 1px solid var(--solid-gold); color: var(--gold); padding: 12px 0; border-radius: 30px; text-align: center; font-weight: bold; letter-spacing: 4px; cursor: pointer; transition: 0.3s; width: 100%; }
        .agree-btn:active { transform: scale(0.96); background: rgba(212,175,55,0.3); }
        .close-btn { position: absolute; top: 15px; right: 15px; color: #888; font-size: 1.5rem; cursor: pointer; z-index: 10; }

        /* ================= 倒數計時狀態 UI ================= */
        #timer-layer { position: absolute; inset: 0; z-index: 40; display: none; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        .timer-title { color: var(--cyan); font-size: 1rem; letter-spacing: 6px; margin-bottom: 20px; opacity: 0.8; }
        .timer-clock { color: #fff; font-size: 3.5rem; font-weight: bold; letter-spacing: 4px; font-variant-numeric: tabular-nums; text-shadow: 0 0 20px rgba(255,255,255,0.4); margin-bottom: 40px; }
        .leave-hint { color: #888; font-size: 0.8rem; letter-spacing: 2px; line-height: 1.8; text-align: center; max-width: 80%; }
        .drop-btn { position: absolute; bottom: 5%; color: #555; font-size: 0.75rem; letter-spacing: 2px; border-bottom: 1px dashed #444; pointer-events: auto; cursor: pointer; padding-bottom: 2px; }

        /* ================= 圓滿契印證書 (參照您提供的截圖美學) ================= */
        .cert-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 10000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s; }
        .cert-overlay.show { opacity: 1; pointer-events: auto; }
        .cert-box { background: linear-gradient(180deg, rgba(20,20,20,0.95) 0%, rgba(5,5,5,0.98) 100%); border: 1px solid rgba(212,175,55,0.4); border-radius: 20px; width: 85%; max-width: 360px; padding: 40px 25px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.9); transform: translateY(20px) scale(0.95); transition: 0.4s; }
        .cert-overlay.show .cert-box { transform: translateY(0) scale(1); }
        
        .cert-header { color: var(--gold); font-size: 1rem; letter-spacing: 6px; margin-bottom: 20px; font-weight: bold; }
        .cert-icon { width: 80px; height: 80px; margin: 0 auto 20px auto; filter: drop-shadow(0 0 15px var(--gold)); animation: cert-float 3s infinite alternate; }
        @keyframes cert-float { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
        
        .cert-label { color: #aaa; font-size: 0.8rem; letter-spacing: 4px; margin-bottom: 5px; }
        .cert-name { color: var(--gold-solid); font-size: 1.4rem; font-weight: bold; letter-spacing: 5px; margin-bottom: 20px; }
        
        .cert-reward { color: var(--cyan); font-size: 0.85rem; letter-spacing: 2px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px radial-gradient(circle, rgba(212,175,55,0.6) 0%, transparent 100%); }
        .cert-desc { color: #ddd; font-size: 0.85rem; line-height: 2; letter-spacing: 1.5px; margin-bottom: 30px; text-align: justify; text-align-last: center; }
        
        .cert-btn { background: transparent; color: var(--gold); border: 1px solid rgba(212,175,55,0.5); padding: 12px 30px; border-radius: 30px; letter-spacing: 3px; font-size: 0.9rem; cursor: pointer; transition: 0.3s; outline: none; width: 100%; }
        .cert-btn:active { background: rgba(212,175,55,0.2); transform: scale(0.95); }

    </style>
</head>
<body oncontextmenu="return false;">

    <div id="page-transition-curtain"></div>

    <canvas id="starCanvas"></canvas>
    <canvas id="waterCanvas"></canvas>
    <canvas id="rainCanvas"></canvas>
    <div id="flash-overlay"></div>

    <!-- 頁面 1: 啟程 -->
    <div id="page-1" onclick="executeEntryWarp(event)">
        <div id="water-surface"></div>
        <div class="p1-title" id="p1-t1">八關齋戒</div>
        <div class="p1-sub" id="p1-t2">輕觸水面 ． 發心入陣</div>
    </div>

    <!-- 頁面 2: 道場主介面 -->
    <div id="page-2">
        <div class="back-btn" onclick="returnToMainHall()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>歸返系統
        </div>

        <!-- 核心：行者與蓮花 (純淨無雜線版本) -->
        <div id="meditator-layer">
            <div class="meditator-container" id="meditator-btn" onclick="triggerRitual()">
                <svg viewBox="0 0 200 200" class="meditator-svg">
                    <defs>
                        <linearGradient id="goldGrad" x1="50%" y1="0%" x2="50%" y2="100%">
                            <stop offset="0%" stop-color="#ffffff" />
                            <stop offset="40%" stop-color="#fdf5d3" />
                            <stop offset="100%" stop-color="#d4af37" />
                        </linearGradient>
                        <linearGradient id="hotGoldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#fdf5d3" />
                            <stop offset="50%" stop-color="#d4af37" />
                            <stop offset="100%" stop-color="#8c6d12" />
                        </linearGradient>
                        <linearGradient id="darkHotGoldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#d4af37" />
                            <stop offset="100%" stop-color="#5c4300" />
                        </linearGradient>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
                        </filter>

                        <!-- 縮小並使用雙重框線的蓮花瓣 (無三條雜線) -->
                        <g id="petal">
                            <path d="M 0,0 C -24,-4 -28,-28 0,-45 C 28,-28 24,-4 0,0 Z" fill="url(#hotGoldGrad)" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round"/>
                            <path d="M 0,-6 C -15,-9 -18,-22 0,-36 C 18,-22 15,-9 0,-6 Z" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.85"/>
                        </g>
                        <g id="petal-back">
                            <path d="M 0,0 C -24,-4 -28,-28 0,-45 C 28,-28 24,-4 0,0 Z" fill="url(#darkHotGoldGrad)" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
                            <path d="M 0,-6 C -15,-9 -18,-22 0,-36 C 18,-22 15,-9 0,-6 Z" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
                        </g>
                    </defs>

                    <!-- 1. 後方 4 瓣 -->
                    <g filter="url(#glow)">
                        <use href="#petal-back" transform="translate(60, 138) scale(0.9) rotate(-35)" />
                        <use href="#petal-back" transform="translate(140, 138) scale(0.9) rotate(35)" />
                        <use href="#petal-back" transform="translate(80, 132) scale(0.95) rotate(-15)" />
                        <use href="#petal-back" transform="translate(120, 132) scale(0.95) rotate(15)" />
                    </g>
                    <!-- 2. 行者剪影 -->
                    <g fill="url(#goldGrad)" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)">
                        <path d="M 100 24 C 114 24, 114 52, 105 56 C 125 65, 130 80, 130 100 C 130 115, 125 120, 130 130 C 135 138, 145 138, 155 138 C 130 148, 70 148, 45 138 C 55 138, 65 138, 70 130 C 75 120, 70 115, 70 100 C 70 80, 75 65, 95 56 C 86 52, 86 24, 100 24 Z" />
                    </g>
                    <path d="M 122 75 C 105 95, 105 120, 80 134" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.9" filter="url(#glow)"/>
                    <!-- 3. 前方 5 瓣 -->
                    <g filter="url(#glow)">
                        <use href="#petal" transform="translate(42, 148) scale(0.9) rotate(-55)" />
                        <use href="#petal" transform="translate(158, 148) scale(0.9) rotate(55)" />
                        <use href="#petal" transform="translate(70, 156) scale(1) rotate(-28)" />
                        <use href="#petal" transform="translate(130, 156) scale(1) rotate(28)" />
                        <use href="#petal" transform="translate(100, 162) scale(1.1) rotate(0)" />
                    </g>
                </svg>
            </div>
            <div class="hint-text" id="meditator-hint">點擊行者 ． 閱覽儀軌</div>
        </div>

        <!-- 儀軌閱讀彈框 (動態生成) -->
        <div id="rules-modal">
            <div class="modal-content">
                <div class="close-btn" onclick="closeRules()">×</div>
                <div class="modal-header" id="step-title">標題</div>
                <div class="step-container" id="step-content">
                    <!-- JS 將注入內容 -->
                </div>
                <button class="agree-btn" id="step-btn" onclick="nextStep()">下一步</button>
            </div>
        </div>

        <!-- 倒數計時狀態 UI -->
        <div id="timer-layer">
            <div class="timer-title">持戒清淨中</div>
            <div class="timer-clock" id="timer-display">24:00:00</div>
            <div class="leave-hint">您可安心關閉網頁<br>淨土已在心中，願您善護念。</div>
            <div class="drop-btn" onclick="dropPrecepts()">捨戒 (中斷計時)</div>
        </div>
    </div>

    <!-- 圓滿迴向證書 Modal -->
    <div class="cert-overlay" id="cert-modal">
        <div class="cert-box">
            <div class="cert-header">✦ 菩提契印 ✦</div>
            <!-- 蓮花 Icon -->
            <svg class="cert-icon" viewBox="0 0 100 100">
                <path d="M50,20 C35,40 20,45 20,60 C20,75 40,80 50,90 C60,80 80,75 80,60 C80,45 65,40 50,20 Z" fill="url(#hotGoldGrad)" stroke="#fff" stroke-width="2"/>
            </svg>
            <div class="cert-label">行 者</div>
            <div class="cert-name" id="cert-display-name">妙 依</div>
            <div class="cert-reward">迴 向 功 德</div>
            <div class="cert-desc">
                一日一夜清淨梵行，功德不可思議。<br>
                「以此受持八關齋戒之功德，迴向西方極樂世界。願命終之時，蒙阿彌陀佛接引，九品蓮華為父母。」
            </div>
            <button class="cert-btn" onclick="completeAndReturn()">歡喜功德 ． 獲 600 資糧</button>
        </div>
    </div>

<script>
    // ================= 資料庫與初始化 =================
    const DB_KEY = 'PX_V15.0';
    let mainDb = JSON.parse(localStorage.getItem(DB_KEY));
    if (!mainDb) mainDb = { points: 0, userName: '' };
    if (!mainDb.eightPrecepts) mainDb.eightPrecepts = { active: false, startTime: null };

    // ================= 儀軌腳本資料 =================
    let currentStep = 0;
    const ritualSteps = [
        {
            title: "彌陀淨土 ． 八關齋戒",
            content: `此為在家居士種出世善根之方便法門。以一日一夜為期，關閉八種惡道之門，受持清淨梵行。<br><br><span style="color:var(--gold);">「若有眾生，一日一夜持八戒齋... 威儀無缺，以此功德，迴向願求生極樂國。... 行者自見坐蓮華上，生於西方極樂世界。」<br>——《觀無量壽經》</span>`,
            btn: "我已了知 ． 發心受持"
        },
        {
            title: "第一 ． 懺悔清淨",
            content: `法水洗心，須先滌除宿垢。請於心中至誠默念，清淨身、口、意三業。<br><br>請確認法名 / 姓名：<br><input type="text" class="name-input" id="nameInput" placeholder="請輸入姓名" value="${mainDb.userName || ''}" oninput="updateName(this.value)"><br><br>「弟子 <span class="d-name" style="color:var(--gold);">${mainDb.userName || '___'}</span>，隨順世尊教誨。若我無始以來，於身口意三業，所造一切不善諸惡，今日至心發露，誠心懺悔。願罪垢消除，身心清淨。」`,
            btn: "至誠懺悔 ． 進入三皈"
        },
        {
            title: "第二 ． 三皈得體",
            content: `戒體源於三寶加持。請至心宣讀，從此刻起至明日此時，歸命佛法僧三寶。<br><br>「弟子 <span class="d-name" style="color:var(--gold);">${mainDb.userName || '___'}</span>，從今時起，乃至明日日出。<br>至心歸依佛，兩足勝尊。<br>至心歸依法，離欲勝尊。<br>至心歸依僧，調伏勝尊。」<br><span style="font-size:0.8rem; color:#888;">（建議於心中至誠默念三遍）</span>`,
            btn: "歸命三寶 ． 宣示戒相"
        },
        {
            title: "第三 ． 宣示戒相",
            content: `如諸佛菩薩盡形壽受持清淨戒，我今日一日一夜，亦如是受持：<br><br>
            <div style="text-align:left; font-size:0.85rem; line-height:1.8;">
            1. <b>不殺生：</b>護念有情，不存傷害之念。<br>
            2. <b>不偷盜：</b>潔身自愛，不取非份之物。<br>
            3. <b>不淫：</b>清淨梵行，斷絕一切性行為。<br>
            4. <b>不妄語：</b>誠實柔和，不說謊不惡口。<br>
            5. <b>不飲酒：</b>護持神智，不飲麻醉之物。<br>
            6. <b>不著香華鬘：</b>卸下虛飾，不塗香水化妝。<br>
            7. <b>不歌舞觀聽：</b>攝心向內，不觀世俗娛樂。<br>
            8. <b>不坐高廣大床：</b>減離貪著，不貪圖舒適。<br>
            9. <b>不非時食 (持齋)：</b>過午之後不再進食，僅飲清水或無渣流質。請斟酌體力。
            </div>`,
            btn: "誓願遵守 ． 啟動戒期"
        }
    ];

    function updateName(val) {
        mainDb.userName = val;
        localStorage.setItem(DB_KEY, JSON.stringify(mainDb));
        document.querySelectorAll('.d-name').forEach(el => el.innerText = val || '___');
    }

    function renderStep() {
        const step = ritualSteps[currentStep];
        document.getElementById('step-title').innerText = step.title;
        document.getElementById('step-content').innerHTML = `<div class="step-text">${step.content}</div>`;
        document.getElementById('step-btn').innerText = step.btn;
    }

    function nextStep() {
        if (currentStep < ritualSteps.length - 1) {
            currentStep++;
            renderStep();
        } else {
            startPrecepts(); // 進入 24 小時
        }
    }

    // ================= 洗滌法雨與彈框觸發 =================
    const rCvs = document.getElementById('rainCanvas'), rCtx = rCvs.getContext('2d');
    let rw, rh, drops = [], raining = false;
    function initRain() {
        rw = rCvs.width = window.innerWidth; rh = rCvs.height = window.innerHeight;
        drops = [];
        for(let i=0; i<300; i++) drops.push({x: Math.random()*rw, y: Math.random()*rh, v: Math.random()*15+15, l: Math.random()*25+15});
    }
    window.addEventListener('resize', () => { if(raining) initRain(); });
    
    function drawRain() {
        if(!raining) return;
        rCtx.clearRect(0,0,rw,rh);
        rCtx.strokeStyle = 'rgba(255,255,255,0.35)'; rCtx.lineWidth = 1.5; rCtx.beginPath();
        drops.forEach(d => {
            rCtx.moveTo(d.x, d.y); rCtx.lineTo(d.x - d.v*0.1, d.y + d.v); 
            d.y += d.v; d.x -= d.v*0.1;
            if(d.y > rh) { d.y = -d.l; d.x = Math.random()*rw; }
        });
        rCtx.stroke();
        requestAnimationFrame(drawRain);
    }

    function triggerRitual() {
        // 防止重複點擊
        document.getElementById('meditator-btn').style.pointerEvents = 'none';
        
        // 1. 降下法雨
        raining = true; initRain(); drawRain(); 
        document.getElementById('rainCanvas').style.opacity = '1';
        
        // 2. 雨停，出經卷
        setTimeout(() => {
            document.getElementById('rainCanvas').style.opacity = '0';
            setTimeout(() => { raining = false; }, 1500);
            
            currentStep = 0; renderStep();
            document.getElementById('rules-modal').classList.add('show');
            document.getElementById('meditator-btn').style.pointerEvents = 'auto';
        }, 2000);
    }

    function closeRules() { document.getElementById('rules-modal').classList.remove('show'); }

    // ================= 24小時倒數邏輯 =================
    const TOTAL_MS = 24 * 60 * 60 * 1000; 
    let timerInterval;

    function startPrecepts() {
        closeRules();
        mainDb.eightPrecepts.active = true;
        mainDb.eightPrecepts.startTime = Date.now();
        localStorage.setItem(DB_KEY, JSON.stringify(mainDb));
        
        applyActiveUI();
        runTimer();
    }

    function checkStatus() {
        if (mainDb.eightPrecepts && mainDb.eightPrecepts.active) {
            applyActiveUI();
            runTimer();
        }
    }

    function applyActiveUI() {
        document.getElementById('meditator-hint').style.display = 'none';
        const med = document.querySelector('.meditator-container');
        med.style.transform = 'scale(0.5) translateY(-200px)'; 
        med.style.opacity = '0.3';
        med.style.pointerEvents = 'none'; 
        med.style.animation = 'none';
        document.getElementById('timer-layer').style.display = 'flex';
    }

    function runTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!mainDb.eightPrecepts.active) return clearInterval(timerInterval);
            
            const elapsed = Date.now() - mainDb.eightPrecepts.startTime;
            const remain = TOTAL_MS - elapsed;
            
            if (remain <= 0) {
                clearInterval(timerInterval);
                document.getElementById('timer-display').innerText = "00:00:00";
                showSuccess();
            } else {
                let h = Math.floor(remain / (1000 * 60 * 60));
                let m = Math.floor((remain % (1000 * 60 * 60)) / (1000 * 60));
                let s = Math.floor((remain % (1000 * 60)) / 1000);
                document.getElementById('timer-display').innerText = 
                    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
            }
        }, 1000);
    }

    function dropPrecepts() {
        if(confirm("確定要捨戒中斷計時嗎？法界回饋：請以身心健康為重，無須罣礙。")) {
            mainDb.eightPrecepts.active = false;
            mainDb.eightPrecepts.startTime = null;
            localStorage.setItem(DB_KEY, JSON.stringify(mainDb));
            location.reload();
        }
    }

    // ================= 圓滿結算與轉場 =================
    function showSuccess() {
        document.getElementById('cert-display-name').innerText = mainDb.userName || '法界行者';
        document.getElementById('cert-modal').classList.add('show');
        genDust();
    }

    function completeAndReturn() {
        // 結算 600 資糧
        mainDb.points = (mainDb.points || 0) + 600;
        mainDb.eightPrecepts.active = false;
        mainDb.eightPrecepts.startTime = null;
        localStorage.setItem(DB_KEY, JSON.stringify(mainDb));

        // 黑幕轉場回主系統
        document.getElementById('page-transition-curtain').style.opacity = '1';
        setTimeout(() => { window.location.href = 'index.html?screen=3'; }, 800);
    }

    function returnToMainHall() {
        document.getElementById('page-transition-curtain').style.opacity = '1';
        setTimeout(() => { window.location.href = 'index.html?screen=3'; }, 800);
    }

    function genDust() {
        for(let i=0; i<80; i++) {
            let d = document.createElement('div'); d.className = 'dust';
            d.style.left = (window.innerWidth/2) + (Math.random()-0.5)*300 + 'px'; 
            d.style.top = (window.innerHeight/2) + (Math.random()-0.5)*300 + 'px';
            let s = Math.random()*8 + 2; d.style.width = s+'px'; d.style.height = s+'px';
            const DUST_CLRS = ['#f3e5ab', '#ffffff', '#89CFF0', '#ff9a9e'];
            d.style.background = DUST_CLRS[Math.floor(Math.random()*4)]; d.style.boxShadow = `0 0 15px ${d.style.background}`;
            document.body.appendChild(d);
            d.animate([{opacity: 1, transform: 'translate(0,0) scale(1)'}, {opacity: 0, transform: `translate(${(Math.random()-0.5)*300}px, -500px) scale(0)`}], {duration: 3000 + Math.random()*1500, easing: 'ease-out', fill: 'forwards'});
            setTimeout(() => d.remove(), 4600);
        }
    }

    // --- 星空與推進引擎 (星空不覆蓋水面，增加多色彩與大小) ---
    const canvas = document.getElementById('starCanvas'); const ctx = canvas.getContext('2d');
    let width, height, stars = [], warpSpeed = 0.5, starScale = 1; 
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();
    
    const STAR_COLORS = ['#8ba89c', '#ffffff', '#f3e5ab', '#ff9a9e', '#b2dfdb', '#C9A0DC', '#ffeb3b'];
    for (let i = 0; i < 250; i++) { stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)], s: Math.random() * 2.5 + 0.5 }); }
    
    function renderStars() {
        ctx.fillStyle = 'rgba(2, 2, 4, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= warpSpeed; if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; } 
            let sc = 400 / (400 + s.z); 
            let drawY = (height / 2) + s.y * sc;
            if (drawY > height * 0.55) return; // 不畫在水面
            ctx.beginPath(); ctx.arc((width / 2) + s.x * sc, drawY, s.s * sc * starScale, 0, Math.PI * 2);
            ctx.fillStyle = s.color; ctx.globalAlpha = Math.min(1, sc * 2.5); ctx.fill(); ctx.globalAlpha = 1;
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }
    renderStars();

    // --- 淡藍/粉/金的明亮法水 ---
    const wCvs = document.getElementById('waterCanvas'), wCtx = wCvs.getContext('2d');
    let ww, wh, wTime=0;
    function resW() { ww=wCvs.width=window.innerWidth; wh=wCvs.height=window.innerHeight; }
    window.addEventListener('resize', resW); resW();
    const waterThemes = [ { h: 195, s: 80, l: 65 }, { h: 340, s: 80, l: 70 }, { h: 45,  s: 90, l: 65 } ];
    function drawW() {
        wCtx.clearRect(0,0,ww,wh); wTime += 0.005;
        for (let i = 0; i < 3; i++) {
            wCtx.beginPath(); let shift = i * 2;
            let grad = wCtx.createLinearGradient(0, wh*0.3, 0, wh);
            let t = waterThemes[i];
            grad.addColorStop(0, `hsla(${t.h}, ${t.s}%, ${t.l}%, 0.15)`);
            grad.addColorStop(0.5, `hsla(${t.h}, ${t.s}%, ${t.l}%, 0.45)`);
            grad.addColorStop(1, `hsla(${t.h}, ${t.s}%, ${t.l}%, 0.8)`);
            wCtx.fillStyle = grad;
            for (let x = 0; x <= ww; x += 5) {
                let y = Math.sin(x * 0.005 + wTime + shift) * 40 + Math.sin(x * 0.01 - wTime * 2) * 20 + (wh * 0.6) + Math.cos(wTime + i) * 30;
                if (x === 0) wCtx.moveTo(x, y); else wCtx.lineTo(x, y);
            }
            wCtx.lineTo(ww, wh); wCtx.lineTo(0, wh); wCtx.fill();
        }
        wCtx.globalCompositeOperation = 'screen'; wCtx.fillStyle = 'rgba(255,255,255,0.08)'; wCtx.beginPath(); wCtx.ellipse(ww/2, wh*0.5, ww*0.8, wh*0.2, 0, 0, Math.PI*2); wCtx.fill(); wCtx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(drawW);
    } drawW();

    // --- 漣漪與極速下沉爆發過場 ---
    let hasEntered = false;
    function executeEntryWarp(e) {
        if(hasEntered) return; hasEntered = true;
        let ripple = document.createElement('div'); ripple.className = 'ripple';
        ripple.style.left = e.clientX + 'px'; ripple.style.top = e.clientY + 'px';
        document.getElementById('water-surface').appendChild(ripple);
        document.getElementById('p1-t1').style.opacity = '0'; document.getElementById('p1-t2').style.opacity = '0';
        document.getElementById('page-1').classList.add('warp-sink');
        warpSpeed = 15; starScale = 3;

        setTimeout(() => {
            document.getElementById('flash-overlay').style.opacity = '1';
            setTimeout(() => { 
                document.getElementById('page-1').style.display = 'none'; 
                document.getElementById('page-2').style.display = 'block';
                checkStatus(); 
                document.getElementById('flash-overlay').style.opacity = '0';
                let calmInterval = setInterval(() => {
                    warpSpeed += (0.5 - warpSpeed) * 0.05; starScale += (1 - starScale) * 0.05; 
                    if (Math.abs(warpSpeed - 0.5) < 0.1) { warpSpeed = 0.5; starScale = 1; clearInterval(calmInterval); }
                }, 30);
            }, 800);
        }, 800);
    }
</script>
