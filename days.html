<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>七重行願 ． 琉璃天梯</title>
    <style>
        :root {
            --bg-deep: #020203; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, var(--bg-deep) 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
            display: flex; justify-content: center; align-items: center;
        }

        /* ---------------- 星空背景 ---------------- */
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(circle at 50% 30%, transparent 10%, rgba(1, 1, 3, 0.95) 100%); }

        /* ---------------- 底部仙氣白霧 ---------------- */
        #mist-layer {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40%;
            z-index: 15; pointer-events: none; overflow: hidden; mix-blend-mode: screen;
        }
        .mist-cloud {
            position: absolute; bottom: -50px;
            background: radial-gradient(ellipse, rgba(255,255,255,0.2) 0%, rgba(180,220,255,0.05) 40%, transparent 70%);
            filter: blur(25px); border-radius: 50%;
            animation: drift-mist 12s infinite alternate ease-in-out;
        }
        .mist-1 { width: 800px; height: 350px; left: -200px; animation-duration: 14s; }
        .mist-2 { width: 900px; height: 400px; right: -250px; animation-duration: 18s; animation-delay: -5s; }
        .mist-3 { width: 600px; height: 300px; left: 15%; bottom: -80px; animation-duration: 10s; animation-delay: -2s; }
        @keyframes drift-mist { 0% { transform: translateX(-40px) scale(1); opacity: 0.5; } 100% { transform: translateX(40px) scale(1.1); opacity: 0.9; } }

        /* ---------------- 穿越容器 ---------------- */
        #warp-container {
            position: absolute; inset: 0; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            perspective: 1200px;
        }
        .warp-inner {
            position: relative; width: 100%; max-width: 600px; height: 100%; max-height: 900px;
            /* 縮放中心精準對齊菩提心 (X:415, Y:245) -> 415/600=69.16%, 245/900=27.22% */
            transform-origin: 69.16% 27.22%; 
            transition: transform 2.2s cubic-bezier(0.6, 0.05, 0.1, 1), opacity 1.8s ease-in;
        }
        .warp-inner.warp-drive { transform: scale(25) translateY(10%); opacity: 0; pointer-events: none; }

        /* ---------------- SVG 天梯 (純金漸層 + 線框發光) ---------------- */
        #stair-svg { width: 100%; height: 100%; overflow: visible; filter: drop-shadow(0 0 20px rgba(212,175,55,0.1)); }

        .stair-step { 
            stroke: #d4af37; /* 金色發光線框 */
            stroke-linejoin: round; transition: all 0.6s; cursor: pointer; 
        }
        .step-top { stroke-width: 1.5px; transition: all 0.6s; }
        .step-front { stroke-width: 1.5px; transition: all 0.6s; }
        .step-side { stroke-width: 1.5px; transition: all 0.6s; }
        
        /* 【未點亮】的階梯：半透明黃金玻璃感 */
        .step-locked .step-top { fill-opacity: 0.15; stroke: rgba(212,175,55,0.4); }
        .step-locked .step-front { fill-opacity: 0.1; stroke: rgba(212,175,55,0.2); }
        .step-locked .step-side { fill-opacity: 0.05; stroke: rgba(212,175,55,0.15); }

        /* 【已點亮】的階梯：全亮純金 + 發光金框呼吸 */
        .step-lit .step-top { 
            fill-opacity: 0.85; stroke: #fff; stroke-width: 2.5px;
            animation: breathe-gold 3s infinite alternate ease-in-out;
        }
        .step-lit .step-front { fill-opacity: 0.7; stroke: #f3e5ab; stroke-width: 1.5px; }
        .step-lit .step-side { fill-opacity: 0.5; stroke: #d4af37; }

        .stair-step:hover { filter: drop-shadow(0 0 20px rgba(255,255,255,0.5)) brightness(1.25); }

        @keyframes breathe-gold {
            0% { filter: drop-shadow(0 0 10px rgba(212,175,55,0.6)) brightness(1); }
            100% { filter: drop-shadow(0 0 30px rgba(243,229,171,0.9)) drop-shadow(0 0 15px #fff) brightness(1.3); }
        }

        /* ---------------- 菩提心 (原封不動) ---------------- */
        #immortal-seed { 
            position: absolute; 
            /* 精準對齊天梯頂端拱門中心 (X:415, Y:245) */
            left: 69.16%; top: 27.22%; 
            transform: translate(-50%, -50%) scale(1); 
            width: 28px; height: 28px; border-radius: 50%; 
            background: radial-gradient(circle, #fff 10%, #ffe 30%, var(--gold) 60%, var(--solid-gold) 100%); 
            box-shadow: 0 0 var(--seed-glow) var(--solid-gold); 
            opacity: 1; z-index: 100; 
            animation: hb-pulse 1.5s infinite cubic-bezier(0.2, 0.8, 0.4, 1);
        }
        @keyframes hb-pulse { 
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px var(--gold); } 
            50% { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 40px var(--gold), 0 0 60px #fff; } 
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px var(--gold); } 
        }

        /* ---------------- 作弊測試面板 (Cheat UI) ---------------- */
        #cheat-panel {
            position: absolute; top: 20px; left: 20px; z-index: 9999;
            background: rgba(0,0,0,0.7); border: 1px solid rgba(212,175,55,0.5); border-radius: 12px;
            padding: 15px; backdrop-filter: blur(10px); display: flex; flex-direction: column; gap: 10px;
        }
        .cheat-title { color: var(--gold); font-size: 0.8rem; letter-spacing: 2px; text-align: center; border-bottom: 1px dashed rgba(212,175,55,0.3); padding-bottom: 5px; }
        .day-toggles { display: flex; gap: 5px; }
        .day-btn { width: 30px; height: 30px; border-radius: 5px; background: rgba(255,255,255,0.1); border: 1px solid #666; color: #aaa; cursor: pointer; transition: 0.3s; }
        .day-btn.active { background: rgba(212,175,55,0.3); border-color: var(--solid-gold); color: #fff; box-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .play-demo-btn { background: linear-gradient(90deg, rgba(212,175,55,0.2), rgba(0,0,0,0.8)); color: var(--gold); border: 1px solid var(--solid-gold); padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; letter-spacing: 2px; }

        /* ---------------- UI 文字 ---------------- */
        #ui-layer { position: absolute; top: 10%; width: 100%; text-align: center; z-index: 20; transition: opacity 0.5s; pointer-events: none; }
        .main-title { color: var(--gold); font-size: 1.3rem; letter-spacing: 8px; font-weight: bold; text-shadow: 0 0 20px rgba(212,175,55,0.8); margin-bottom: 12px; }
        .sub-title { color: var(--cyan); font-size: 0.85rem; letter-spacing: 5px; text-shadow: 0 0 10px rgba(139,168,156,0.5); }
        
        #flash-overlay { position: fixed; inset: 0; background: radial-gradient(circle, #fff 0%, #f3e5ab 50%, transparent 100%); opacity: 0; z-index: 9999; pointer-events: none; transition: opacity 0.8s; mix-blend-mode: screen; }
    </style>
</head>
<body>

    <!-- SVG 漸層庫 -->
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
        <defs>
            <!-- 拱門發光濾鏡 -->
            <filter id="arch-glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="6" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>

            <!-- 側面陰影與亮部 -->
            <linearGradient id="f-light" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.7"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
            <linearGradient id="f-dark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#000" stop-opacity="0.1"/><stop offset="100%" stop-color="#000" stop-opacity="0.6"/></linearGradient>
            
            <!-- ✨ 統一純金漸層 ✨ -->
            <linearGradient id="g-gold" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fff8dc"/>
                <stop offset="50%" stop-color="#f3e5ab"/>
                <stop offset="100%" stop-color="#d4af37"/>
            </linearGradient>
        </defs>
    </svg>

    <!-- 繽紛強烈星空 -->
    <canvas id="starCanvas"></canvas>
    <div id="vignette"></div>

    <!-- 底部白霧仙氣 -->
    <div id="mist-layer">
        <div class="mist-cloud mist-1"></div>
        <div class="mist-cloud mist-2"></div>
        <div class="mist-cloud mist-3"></div>
    </div>

    <!-- UI 標題 -->
    <div id="ui-layer">
        <div class="main-title">七日行願 ． 步步生蓮</div>
        <div class="sub-title" id="day-hint">點擊亮起之法階入陣</div>
    </div>

    <!-- 作弊測試面板 -->
    <div id="cheat-panel">
        <div class="cheat-title">【邏輯測試面板】</div>
        <div style="font-size: 0.7rem; color: #8ba89c;">切換每日是否來報到：</div>
        <div class="day-toggles" id="toggle-container">
            <!-- JS 動態生成按鈕 -->
        </div>
        <button class="play-demo-btn" onclick="playProgressDemo()">▶️ 播放七日點亮動畫</button>
    </div>

    <!-- 穿越容器 -->
    <div id="warp-container">
        <div class="warp-inner" id="warp-inner">
            
            <svg id="stair-svg" viewBox="0 0 600 900">
                <!-- ✨ 頂端模糊細金剛拱門 (完美接地) ✨ -->
                <!-- 拱門向下平移至 Y=290，寬度 ±35，完美對齊第 7 階的寬度 (450-380=70) -->
                <g id="arch-group" transform="translate(415, 290)">
                    <!-- 底層模糊光暈 (極度細緻不搶戲) -->
                    <path d="M -35 0 L -35 -45 A 35 50 0 0 1 35 -45 L 35 0" fill="rgba(212,175,55,0.03)" stroke="#d4af37" stroke-width="1.5" filter="url(#arch-glow)" opacity="0.5"/>
                    <!-- 內層極細金線 (不強調門的實體，僅作結界暗示) -->
                    <path d="M -35 0 L -35 -45 A 35 50 0 0 1 35 -45 L 35 0" fill="none" stroke="#f3e5ab" stroke-width="0.8" opacity="0.4"/>
                </g>

                <!-- 七階純金天梯 -->
                <g id="steps-group"></g>
            </svg>

            <!-- 菩提心 (完美置於拱門中心) -->
            <div id="immortal-seed" class="seed-heartbeat"></div>

        </div>
    </div>

    <div id="flash-overlay"></div>

<script>
    // ================= 強烈繽紛星空引擎 =================
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [], warpSpeed = 1;

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();

    // 保持高飽和繽紛星空
    const STAR_COLORS = ['#f3e5ab', '#ffffff', '#00f2fe', '#ff7eb3', '#c471ed', '#43e97b', '#d4af37'];
    for (let i = 0; i < 350; i++) { 
        let color = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
        stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: color, s: Math.random() * 2 + 1 });
    }

    function renderStars() {
        ctx.fillStyle = 'rgba(2, 2, 4, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= warpSpeed;
            if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; } 
            let sc = 400 / (400 + s.z);
            let px = (width / 2) + s.x * sc; let py = (height / 2) + s.y * sc;
            ctx.beginPath(); ctx.arc(px, py, s.s * sc * (warpSpeed > 2 ? 4 : 1), 0, Math.PI * 2);
            // 提高星光透明度
            ctx.fillStyle = s.color; ctx.globalAlpha = Math.min(1, sc * 3); ctx.fill(); ctx.globalAlpha = 1;
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }
    renderStars();

    // ================= 完美大彎道 3D 透視座標 =================
    const ANCHORS = [
        { xl: 30,  xr: 370, y: 800, h: 45 }, // 第 1 階
        { xl: 115, xr: 405, y: 675, h: 40 }, // 第 2 階
        { xl: 190, xr: 435, y: 570, h: 35 }, // 第 3 階
        { xl: 255, xr: 460, y: 485, h: 30 }, // 第 4 階 
        { xl: 305, xr: 475, y: 415, h: 25 }, // 第 5 階
        { xl: 340, xr: 480, y: 360, h: 20 }, // 第 6 階
        { xl: 380, xr: 450, y: 290, h: 15 }, // 第 7 階 (頂部寬度=70, 中心X=415, 底部Y=290)
        { xl: 390, xr: 440, y: 275, h: 0  }  // 結界延伸
    ];

    // ================= 七日點燈邏輯 =================
    // True: 有來 (全亮) / False: 沒來 (鏤空透明)
    let cycleState = [true, false, true, true, false, false, false]; 
    let isDemoRunning = false;

    function buildStairs() {
        const stepsGroup = document.getElementById('steps-group');
        let html = '';
        let hasAnyLit = false;

        for (let i = 0; i < 7; i++) {
            let curr = ANCHORS[i];
            let next = ANCHORS[i+1];
            let isLit = cycleState[i];
            
            let stateClass = isLit ? 'step-lit' : 'step-locked';
            let clickAttr = isLit ? 'onclick="triggerWarp()"' : '';
            if (isLit) hasAnyLit = true;

            let leftPts = `${curr.xl},${curr.y} ${curr.xl},${curr.y - curr.h} ${next.xl},${next.y} ${next.xl},${next.y + curr.h * 0.8}`;
            let rightPts = `${curr.xr},${curr.y} ${curr.xr},${curr.y - curr.h} ${next.xr},${next.y} ${next.xr},${next.y + curr.h * 0.8}`;
            let frontPts = `${curr.xl},${curr.y} ${curr.xr},${curr.y} ${curr.xr},${curr.y - curr.h} ${curr.xl},${curr.y - curr.h}`;
            let topPts = `${curr.xl},${curr.y - curr.h} ${curr.xr},${curr.y - curr.h} ${next.xr},${next.y} ${next.xl},${next.y}`;

            html += `
                <g class="stair-step ${stateClass}" ${clickAttr}>
                    <!-- 完美填滿的側牆 -->
                    <polygon class="step-side" points="${leftPts}" fill="url(#g-gold)" />
                    <polygon class="step-side" points="${leftPts}" fill="url(#f-dark)" opacity="0.6"/>
                    <polygon class="step-side" points="${rightPts}" fill="url(#g-gold)" />
                    <polygon class="step-side" points="${rightPts}" fill="url(#f-dark)" opacity="0.6"/>
                    
                    <!-- 正面 -->
                    <polygon class="step-front" points="${frontPts}" fill="url(#g-gold)" />
                    <polygon class="step-front" points="${frontPts}" fill="url(#f-dark)" opacity="0.3"/>
                    
                    <!-- 頂面 -->
                    <polygon class="step-top" points="${topPts}" fill="url(#g-gold)" />
                    <polygon class="step-top" points="${topPts}" fill="url(#f-light)" opacity="0.5"/>
                </g>
            `;
        }
        stepsGroup.innerHTML = html;
        document.getElementById('day-hint').innerText = hasAnyLit ? "點擊亮起之法階入陣" : "今日尚未點亮行願";
    }

    // ================= 作弊面板 UI =================
    function initCheatUI() {
        const container = document.getElementById('toggle-container');
        container.innerHTML = '';
        for (let i = 0; i < 7; i++) {
            let btn = document.createElement('button');
            btn.className = `day-btn ${cycleState[i] ? 'active' : ''}`;
            btn.innerText = i + 1;
            btn.onclick = () => {
                if (isDemoRunning) return;
                cycleState[i] = !cycleState[i];
                btn.className = `day-btn ${cycleState[i] ? 'active' : ''}`;
                buildStairs();
            };
            container.appendChild(btn);
        }
    }

    function updateCheatUI() {
        const btns = document.querySelectorAll('.day-btn');
        btns.forEach((btn, i) => {
            btn.className = `day-btn ${cycleState[i] ? 'active' : ''}`;
        });
    }

    // 播放 1~7 階逐漸點亮動畫
    function playProgressDemo() {
        if (isDemoRunning) return;
        isDemoRunning = true;
        
        // 先全部熄滅
        cycleState = [false, false, false, false, false, false, false];
        buildStairs(); updateCheatUI();

        let currentStep = 0;
        let interval = setInterval(() => {
            cycleState[currentStep] = true;
            buildStairs(); updateCheatUI();
            
            currentStep++;
            if (currentStep >= 7) {
                clearInterval(interval);
                isDemoRunning = false;
            }
        }, 600); // 每 0.6 秒亮一階
    }

    // 初始化
    initCheatUI();
    buildStairs();

    // ================= 星際穿越特效 =================
    function triggerWarp() {
        warpSpeed = 40; 
        document.getElementById('ui-layer').style.opacity = '0';
        document.getElementById('cheat-panel').style.opacity = '0';
        
        // 菩提心極限脈動
        const seed = document.getElementById('immortal-seed');
        seed.style.filter = "drop-shadow(0 0 80px #fff)";
        seed.style.animationDuration = "0.3s";

        // 容器衝刺放大
        document.getElementById('warp-inner').classList.add('warp-drive');

        setTimeout(() => {
            document.getElementById('flash-overlay').style.opacity = '1';
            setTimeout(() => { 
                alert("【視覺展示完畢】\n此處將無縫銜接至『第二頁：煥彩能量柱與印心陣法』！");
                location.reload(); 
            }, 1000);
        }, 1200); 
    }

</script>
</body>
</html>
