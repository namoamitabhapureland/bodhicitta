<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大數據 ． 法器收藏室測試</title>
    <style>
        :root { --gold-light: #f3e5ab; --gold-solid: #d4af37; --text-gold: #f3e5ab; }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, #020203 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: #fff;
        }

        /* 測試用呼叫按鈕 */
        .open-btn { background: rgba(212,175,55,0.15); color: var(--gold-light); border: 1px solid var(--gold-solid); padding: 15px 40px; border-radius: 30px; letter-spacing: 4px; font-size: 1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        .open-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.3); }

        /* ================= 擴建後的大數據 Modal (收藏室) ================= */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 9999; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        /* 稍微加寬，容納四尊寶幢 */
        .data-card { width: 92%; max-width: 420px; border: 1px solid rgba(212,175,55,0.42); border-radius: 20px; padding: 30px 25px; box-shadow: 0 10px 55px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.1); background: linear-gradient(180deg, rgba(20,20,20,0.95) 0%, rgba(5,5,5,0.98) 100%); }
        
        .data-title { color: var(--gold-solid); font-size: 1.1rem; letter-spacing: 5px; text-align: center; margin-bottom: 5px; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
        .data-sub { text-align: center; font-size: 11px; color: var(--text-gold); margin-bottom: 25px; letter-spacing: 2px; opacity: 0.6; }

        /* --- 全新：收藏室供桌佈局 --- */
        .trophy-shelf {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 35px; padding-bottom: 15px;
            border-bottom: 1px dashed rgba(212,175,55,0.3); /* 供桌底線 */
        }
        .trophy-item { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 25%; }
        .trophy-label { font-size: 0.65rem; color: rgba(243,229,171,0.6); letter-spacing: 1.5px; }

        /* ================= 寶幢樣式 (統一尺寸，整齊劃一) ================= */
        .banner-jewel { width: 28px; height: 48px; cursor: pointer; transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); transform-origin: bottom center; }
        .banner-unlit { opacity: 0.15; filter: grayscale(100%); }
        .banner-lit { opacity: 0.95; animation: star-breathe 3s infinite alternate ease-in-out; }
        .banner-jewel:active { transform: scale(0.85); }
        @keyframes star-breathe { 0% { transform: scale(1); } 100% { transform: scale(1.08); filter: brightness(1.2); } }

        /* 4階專屬顏色 (7, 70, 700, 7000) */
        #banner-7 { --f1: #FFB703; --f2: #FB8500; --f3: #E85D04; --bd: #9D0208; --bs: #370617; --rb: #FFF; animation-delay: 0s; }
        #banner-7.banner-lit { filter: drop-shadow(0 0 8px rgba(251,133,0,0.8)); }

        #banner-70 { --f1: #FFF8DC; --f2: #F3E5AB; --f3: #D4AF37; --bd: #AA7900; --bs: #5C4000; --rb: #FFF; animation-delay: -1s; }
        #banner-70.banner-lit { filter: drop-shadow(0 0 8px rgba(212,175,55,0.8)); }

        #banner-700 { --f1: #E0FBFC; --f2: #98C1D9; --f3: #48CAE4; --bd: #2A9D8F; --bs: #1D3557; --rb: #FFF; animation-delay: -2s; }
        #banner-700.banner-lit { filter: drop-shadow(0 0 8px rgba(42,157,143,0.8)); }

        #banner-7000 { --f1: #F4A261; --f2: #E76F51; --f3: #C1121F; --bd: #780000; --bs: #370617; --rb: #FDFCDC; animation-delay: -3s; }
        #banner-7000.banner-lit { filter: drop-shadow(0 0 10px rgba(193,18,31,0.8)); }

        /* 舊有大數據能量棒 (簡化樣式用以展示) */
        .glass-energy-bar { width: 100%; margin: 8px 0 30px 0; position: relative; }
        .bar-track { width: 100%; height: 10px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.09); border-radius: 10px; }
        .bar-fill { height: 100%; width: 50%; background: linear-gradient(90deg, rgba(212,175,55,0.5), #d4af37); border-radius: 10px; }
        .close-btn { width: 100%; padding: 12px; margin-top: 5px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #aaa; border-radius: 15px; cursor: pointer; letter-spacing: 4px; transition: 0.3s; }
        .close-btn:active { background: rgba(212,175,55,0.2); color: var(--gold-light); border-color: var(--gold-solid); }

        /* ================= 契印證書 彈框 (Z-index 超越大數據面板) ================= */
        .cert-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 10000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s; }
        .cert-overlay.show { opacity: 1; pointer-events: auto; }
        .cert-box { background: linear-gradient(180deg, rgba(20,20,20,0.95) 0%, rgba(5,5,5,0.98) 100%); border: 1px solid rgba(212,175,55,0.4); border-radius: 20px; width: 85%; max-width: 360px; padding: 40px 25px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.9); transform: translateY(20px) scale(0.95); transition: 0.4s; }
        .cert-overlay.show .cert-box { transform: translateY(0) scale(1); }
        .cert-header { color: var(--gold-light); font-size: 0.9rem; letter-spacing: 6px; margin-bottom: 25px; }
        .cert-svg-wrap { width: 90px; height: 150px; margin: 0 auto 25px auto; animation: cert-float 3s infinite alternate; }
        .cert-svg-wrap svg { width: 100%; height: 100%; overflow: visible; }
        @keyframes cert-float { 0% { transform: translateY(0); } 100% { transform: translateY(-8px); } }
        .cert-name { color: var(--gold-solid); font-size: 1.3rem; font-weight: bold; letter-spacing: 5px; margin: 10px 0 25px 0; }
        .cert-divider { width: 60%; height: 1px; background: radial-gradient(circle, rgba(212,175,55,0.6) 0%, transparent 100%); margin: 0 auto 20px auto; }
        .cert-desc { color: #ddd; font-size: 0.85rem; line-height: 2; letter-spacing: 1.5px; margin-bottom: 35px; }
        .cert-btn { background: transparent; color: var(--gold-light); border: 1px solid rgba(212,175,55,0.5); padding: 12px 35px; border-radius: 30px; letter-spacing: 3px; font-size: 0.9rem; cursor: pointer; transition: 0.3s; }
        .cert-btn:active { background: rgba(212,175,55,0.2); transform: scale(0.95); }

        /* 測試面板 */
        .test-panel { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; font-size: 0.7rem; display: flex; flex-direction: column; gap: 5px;}
        .test-panel button { padding: 5px; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- SVG 定義 -->
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
        <defs>
            <g id="dynamic-banner">
                <path d="M60,10 Q65,25 60,35 Q55,25 60,10" fill="var(--f1, #E76F51)"/>
                <path d="M60,18 Q62,26 60,30 Q58,26 60,18" fill="var(--f2, #F4A261)"/>
                <path d="M60,25 C78,35 88,55 78,75 C68,55 63,55 60,62 C57,55 52,55 42,75 C32,55 42,35 60,25 Z" fill="var(--f3, #2A9D8F)"/>
                <path d="M60,40 C85,50 100,75 88,95 C78,75 68,75 60,82 C52,75 42,75 32,95 C20,75 35,50 60,40 Z" fill="var(--bd, #E9C46A)"/>
                <path d="M60,55 C95,65 112,95 100,115 C88,95 72,95 60,105 C48,95 32,95 20,115 C8,95 25,65 60,55 Z" fill="var(--bs, #C1121F)"/>
                <path d="M60,75 C105,85 125,120 108,145 C92,120 75,118 60,130 C45,118 28,120 12,145 C-5,120 15,85 60,75 Z" fill="var(--bd, #1D3557)"/>
                <path d="M38,100 C15,120 10,155 25,175 C38,195 12,185 5,160 C-2,135 18,110 38,100 Z" fill="var(--rb, #FDFCDC)"/>
                <path d="M82,100 C105,120 110,155 95,175 C82,195 108,185 115,160 C122,135 102,110 82,100 Z" fill="var(--rb, #FDFCDC)"/>
                <path d="M60,128 C70,140 70,155 60,165 C50,155 50,140 60,128 Z" fill="var(--f3, #2A9D8F)"/>
                <circle cx="60" cy="172" r="5" fill="var(--f2, #E9C46A)"/>
                <path d="M60,177 Q65,185 60,195 Q55,185 60,177" fill="var(--f1, #C1121F)"/>
                <g fill="none" stroke="#F3E5AB" stroke-width="2" opacity="0.8">
                    <path d="M60,25 C78,35 88,55 78,75"/><path d="M60,40 C85,50 100,75 88,95"/>
                    <path d="M60,55 C95,65 112,95 100,115"/><path d="M60,75 C105,85 125,120 108,145"/>
                    <path d="M60,25 C42,35 32,55 42,75"/><path d="M60,40 C35,50 20,75 32,95"/>
                    <path d="M60,55 C25,65 8,95 20,115"/><path d="M60,75 C15,85 -5,120 12,145"/>
                </g>
            </g>
        </defs>
    </svg>

    <!-- 開啟大數據面版的按鈕 -->
    <button class="open-btn" onclick="openDataModal()">開啟歷史大數據</button>

    <div class="test-panel">
        <div style="color:var(--gold-light); margin-bottom:5px;">模擬行者天數：</div>
        <button onclick="setDays(5)">5 天 (全暗)</button>
        <button onclick="setDays(10)">10 天 (亮1)</button>
        <button onclick="setDays(80)">80 天 (亮2)</button>
        <button onclick="setDays(800)">800 天 (亮3)</button>
        <button onclick="setDays(8000)">8000 天 (全亮)</button>
    </div>

    <!-- 大數據 Modal (收藏室) -->
    <div class="modal-overlay" id="dataModal">
        <div class="data-card" onclick="event.stopPropagation()">
            <div class="data-title">十方結緣 ‧ 歷史軌跡</div>
            <div class="data-sub">(合本願與諸佛之畢生大數據)</div>

            <!-- 專屬供桌：四階寶幢並列 -->
            <div class="trophy-shelf">
                <div class="trophy-item">
                    <svg class="banner-jewel banner-unlit" id="banner-7" viewBox="0 0 120 200" onclick="openCert(7)"><use href="#dynamic-banner"/></svg>
                    <div class="trophy-label">7 日</div>
                </div>
                <div class="trophy-item">
                    <svg class="banner-jewel banner-unlit" id="banner-70" viewBox="0 0 120 200" onclick="openCert(70)"><use href="#dynamic-banner"/></svg>
                    <div class="trophy-label">70 日</div>
                </div>
                <div class="trophy-item">
                    <svg class="banner-jewel banner-unlit" id="banner-700" viewBox="0 0 120 200" onclick="openCert(700)"><use href="#dynamic-banner"/></svg>
                    <div class="trophy-label">700 日</div>
                </div>
                <div class="trophy-item">
                    <svg class="banner-jewel banner-unlit" id="banner-7000" viewBox="0 0 120 200" onclick="openCert(7000)"><use href="#dynamic-banner"/></svg>
                    <div class="trophy-label">7千日</div>
                </div>
            </div>

            <!-- 原有的進度條 -->
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span style="font-size:13px; color:var(--gold-light); letter-spacing:2px;">歲星軌跡 (日)</span>
                <span style="font-size:14px; font-weight:bold;" id="ui-txt-365">180</span>
            </div>
            <div class="glass-energy-bar"><div class="bar-track"><div class="bar-fill"></div></div></div>
            
            <button class="close-btn" onclick="closeDataModal()">合十收攝</button>
        </div>
    </div>

    <!-- 契印證書 彈框 -->
    <div class="cert-overlay" id="cert-modal">
        <div class="cert-box">
            <div class="cert-header" id="cert-title">✦ 菩提契印 ✦</div>
            <div class="cert-svg-wrap" id="cert-glow"><svg id="cert-svg" viewBox="0 0 120 200"><use href="#dynamic-banner"/></svg></div>
            <div style="color: #aaa; font-size: 0.8rem; letter-spacing: 3px;">行 者</div>
            <div class="cert-name">妙 依</div>
            <div class="cert-divider"></div>
            <div class="cert-desc" id="cert-text">...</div>
            <button class="cert-btn" onclick="closeCert()">歡喜功德 ． 締結契印</button>
        </div>
    </div>

<script>
    // 證書資料庫 (加入 7日，隱藏 70000日)
    const CERT_DATA = {
        7: { title: "✦ 初心 ． 發心契印 ✦", glow: "drop-shadow(0 0 25px rgba(251,133,0,0.8))", text: "初發菩提，已行七日。<br>橘紅微光破除無明黑闇。<br>願此一念，相續不斷。", cssVars: "--f1: #FFB703; --f2: #FB8500; --f3: #E85D04; --bd: #9D0208; --bs: #370617; --rb: #FFF;" },
        70: { title: "✦ 歡喜 ． 初地契印 ✦", glow: "drop-shadow(0 0 25px rgba(233,196,106,0.8))", text: "已圓滿七十日普賢行願。<br>真金寶幢於法界初現。<br>願此生步步生蓮，永不退轉。", cssVars: "--f1: #FFF8DC; --f2: #F3E5AB; --f3: #D4AF37; --bd: #AA7900; --bs: #5C4000; --rb: #FFF;" },
        700: { title: "✦ 遠行 ． 琉璃契印 ✦", glow: "drop-shadow(0 0 35px rgba(42,157,143,0.8))", text: "歷經七百日大願薰修。<br>煩惱漸除，青琉璃寶幢高懸法界。<br>願身心清淨，內外明徹。", cssVars: "--f1: #E0FBFC; --f2: #98C1D9; --f3: #48CAE4; --bd: #2A9D8F; --bs: #1D3557; --rb: #FFF;" },
        7000: { title: "✦ 善慧 ． 妙法契印 ✦", glow: "drop-shadow(0 0 45px rgba(193,18,31,0.8))", text: "七千日行願，不疲不厭。<br>赤紅寶幢燃起三昧真火。<br>願大悲拔苦，普度一切有情。", cssVars: "--f1: #F4A261; --f2: #E76F51; --f3: #C1121F; --bd: #780000; --bs: #370617; --rb: #FDFCDC;" }
    };

    let simulatedDays = 0;

    function setDays(days) {
        simulatedDays = days;
        document.getElementById('ui-txt-365').innerText = days;
        
        // 判斷並點亮對應寶幢
        toggleJewel('banner-7', days >= 7);
        toggleJewel('banner-70', days >= 70);
        toggleJewel('banner-700', days >= 700);
        toggleJewel('banner-7000', days >= 7000);
    }

    function toggleJewel(id, isLit) {
        const el = document.getElementById(id);
        if (isLit) { el.classList.add('banner-lit'); el.classList.remove('banner-unlit'); } 
        else { el.classList.remove('banner-lit'); el.classList.add('banner-unlit'); }
    }

    function openDataModal() { document.getElementById('dataModal').classList.add('active'); }
    function closeDataModal() { document.getElementById('dataModal').classList.remove('active'); }

    function openCert(tier) {
        if (simulatedDays < tier) return; // 未達標點擊無效
        document.getElementById('cert-title').innerText = CERT_DATA[tier].title;
        document.getElementById('cert-text').innerHTML = CERT_DATA[tier].text;
        document.getElementById('cert-glow').style.filter = CERT_DATA[tier].glow;
        document.getElementById('cert-svg').style.cssText = CERT_DATA[tier].cssVars;
        document.getElementById('cert-modal').classList.add('show');
    }
    function closeCert() { document.getElementById('cert-modal').classList.remove('show'); }

    // 初始化狀態
    setDays(0);
</script>
</body>
</html>
