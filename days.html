<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <title>普賢行願 ． 菩提心室</title>
    <style>
        :root {
            --bg-deep: #010103; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
        }

        /* ---------------- 星空引擎與背景 ---------------- */
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #bg-halo { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(circle at 50% 40%, rgba(212,175,55,0.08) 0%, transparent 60%); }

        /* ---------------- 頂部導航 ---------------- */
        header { position: relative; z-index: 100; padding: calc(max(30px, env(safe-area-inset-top, 20px))) 20px 20px 20px; display: flex; justify-content: space-between; align-items: center; width: 100%; background: linear-gradient(180deg, rgba(1,1,3,0.9) 0%, transparent 100%); }
        .btn-nav { background: rgba(255,255,255,0.03); border: 1px solid rgba(139,168,156,0.3); color: var(--cyan); padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px); display: flex; align-items: center; gap: 6px;}
        .btn-nav:active { background: rgba(139,168,156,0.15); transform: scale(0.95); }
        .btn-gold { border-color: rgba(212,175,55,0.4); color: var(--gold); }

        /* ---------------- 通天琉璃法柱 (SVG 大能量棒) ---------------- */
        #pillar-container { position: absolute; top: 15%; bottom: 15%; left: 50%; transform: translateX(-50%); width: 140px; z-index: 5; pointer-events: none; display: flex; justify-content: center; }
        .pillar-svg { width: 100%; height: 100%; overflow: visible; filter: drop-shadow(0 0 20px rgba(212,175,55,0.1)); }
        #pillar-glow { transition: all 1s ease-out; }
        .pillar-pulse { animation: pillarBreathe 4s infinite alternate ease-in-out; }
        @keyframes pillarBreathe { 0% { filter: drop-shadow(0 0 15px rgba(212,175,55,0.4)) brightness(1); } 100% { filter: drop-shadow(0 0 35px rgba(212,175,55,0.8)) brightness(1.3); } }

        /* ---------------- 題庫玉簡面板 ---------------- */
        #q-panel { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 88%; max-width: 450px; background: linear-gradient(145deg, rgba(15, 20, 25, 0.85), rgba(5, 8, 10, 0.95)); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 20px; padding: 40px 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.05); z-index: 50; text-align: center; }
        
        .accumulate-text { color: var(--cyan); font-size: 0.75rem; letter-spacing: 4px; margin-bottom: 20px; text-transform: uppercase; }
        #q-title { color: var(--gold); font-size: 1.15rem; letter-spacing: 5px; margin-bottom: 20px; text-shadow: 0 0 15px rgba(212,175,55,0.4); font-weight: 300; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 15px; }
        #q-text { color: #e0e0e0; font-size: 0.95rem; line-height: 2.2; letter-spacing: 2px; text-align: justify; text-align-last: center; font-weight: 300; min-height: 120px; }

        /* ---------------- 長按印心法陣 ---------------- */
        #seal-wrap { position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); width: 120px; height: 120px; z-index: 60; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .seal-bg-svg { position: absolute; inset: 0; width: 100%; height: 100%; animation: slow-spin 20s linear infinite; opacity: 0.5; }
        .seal-progress-svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); filter: drop-shadow(0 0 10px #d4af37); pointer-events: none; }
        .seal-icon { position: absolute; width: 60px; height: 60px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.4)); transition: all 0.3s; }
        
        /* 交互狀態 */
        #seal-wrap.pressing .seal-icon { filter: drop-shadow(0 0 25px var(--solid-gold)) brightness(1.4); transform: scale(0.9); }
        #seal-wrap.done .seal-bg-svg { animation: none; filter: drop-shadow(0 0 20px rgba(212,175,55,0.5)); opacity: 1; }
        #seal-wrap.done .seal-icon { filter: drop-shadow(0 0 15px var(--solid-gold)); }

        #seal-hint { position: absolute; bottom: 3%; width: 100%; text-align: center; font-size: 0.8rem; color: #8ba89c; letter-spacing: 4px; transition: 0.5s; z-index: 60; }
        @keyframes slow-spin { 100% { transform: rotate(360deg); } }

        /* ---------------- 結算與全屏特效 ---------------- */
        #flash-overlay { position: fixed; inset: 0; z-index: 9000; background: radial-gradient(circle, #fff 0%, #f3e5ab 40%, #d4af37 100%); mix-blend-mode: screen; opacity: 0; pointer-events: none; transition: opacity 0.8s; }
        
        /* 系統彈出對話框 */
        .modal-wrap { position: fixed; inset: 0; z-index: 9999; background: rgba(1, 1, 3, 0.85); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.6s ease; }
        .modal-wrap.show { opacity: 1; pointer-events: auto; }
        .modal-box { width: 85%; max-width: 360px; background: linear-gradient(145deg, rgba(15, 20, 25, 0.95), rgba(5, 8, 10, 0.98)); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 16px; padding: 40px 30px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.05); transform: translateY(20px); transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .modal-wrap.show .modal-box { transform: translateY(0); }
        .modal-title { color: #f3e5ab; font-size: 1.2rem; letter-spacing: 5px; margin-bottom: 20px; text-shadow: 0 0 15px rgba(212, 175, 55, 0.6); border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 15px; font-weight: bold; }
        .modal-text { color: #8ba89c; font-size: 0.95rem; letter-spacing: 2px; line-height: 2.2; margin-bottom: 30px; font-weight: 300; }
        
        .btn-main { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212,175,55,0.4); color: #f3e5ab; padding: 12px 30px; border-radius: 25px; font-size: 0.9rem; letter-spacing: 4px; cursor: pointer; transition: all 0.4s; display: block; margin: 0 auto; width: 100%; box-shadow: inset 0 0 10px rgba(212,175,55,0.1); }
        .btn-main:active { transform: scale(0.95); background: rgba(212,175,55,0.2); }

        /* ---------------- 多寶閣 (完美復刻) ---------------- */
        #treasury-overlay { position: fixed; inset: 0; z-index: 8000; background: #010103; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.6s ease; }
        #treasury-overlay.show { opacity: 1; pointer-events: auto; }
        #treasure-grid { flex: 1; overflow-y: auto; padding: 20px 15px 120px 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; align-content: start; scrollbar-width: none; }
        
        .t-cell { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; min-height: 220px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); position: relative; }
        .t-cell::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 50%); pointer-events: none; border-radius: 12px; }
        .t-cell.locked { background: rgba(255, 255, 255, 0.02); border: 1px dashed rgba(139, 168, 156, 0.3); box-shadow: inset 0 0 15px rgba(139,168,156,0.1); filter: grayscale(1); opacity: 0.6; }
        .t-cell.ultimate { border-color: #d4af37; box-shadow: inset 0 0 30px rgba(212, 175, 55, 0.15), 0 0 15px rgba(212,175,55,0.2); }
        
        .t-svg { width: 100%; height: 90px; filter: drop-shadow(0 0 10px rgba(243, 229, 171, 0.3)); animation: float 4s infinite ease-in-out; display: flex; align-items: center; justify-content: center; }
        .t-svg svg { width: auto; height: 100%; overflow: visible; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.6)); } }
        
        .t-info { margin-top: 15px; text-align: center; width: 100%; }
        .t-name { font-size: 0.95rem; letter-spacing: 2px; color: #fff; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .t-lvl { font-size: 0.75rem; color: #d4af37; letter-spacing: 1px; margin-bottom: 8px; }
        .t-tag { font-size: 0.65rem; color: #8ba89c; border: 1px solid rgba(139,168,156,0.4); padding: 2px 8px; border-radius: 8px; background: rgba(139, 168, 156, 0.1); }
    </style>
</head>
<body>

    <!-- 全局 SVG 定義 (復刻多寶閣的極致漸層) -->
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
        <defs>
            <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9" /><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6" /><stop offset="100%" stop-color="#d4af37" stop-opacity="0.2" /></linearGradient>
            <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
            <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.8"/></linearGradient>
            <linearGradient id="facet-cyan" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.9"/><stop offset="100%" stop-color="#00838f" stop-opacity="0.5"/></linearGradient>
            <linearGradient id="rainbow-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="25%" stop-color="#e0f7fa" stop-opacity="0.7"/><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6"/><stop offset="75%" stop-color="#fce4ec" stop-opacity="0.7"/><stop offset="100%" stop-color="#9c27b0" stop-opacity="0.4"/></linearGradient>
            <!-- 光柱專用漸層 -->
            <linearGradient id="pillar-grad" x1="0%" y1="100%" x2="0%" y2="0%">
                <stop offset="0%" stop-color="#00838f" stop-opacity="0.6"/>
                <stop offset="50%" stop-color="#d4af37" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#fff" stop-opacity="1"/>
            </linearGradient>
        </defs>
    </svg>

    <!-- 星空背景 -->
    <canvas id="starCanvas"></canvas>
    <div id="bg-halo"></div>

    <header>
        <div class="btn-nav" onclick="window.location.href='index.html?screen=3'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            歸返
        </div>
        <div class="btn-nav btn-gold" onclick="toggleTreasury(true)">多寶閣</div>
    </header>

    <!-- 通天琉璃法柱 (SVG 能量棒) -->
    <div id="pillar-container">
        <svg class="pillar-svg" viewBox="0 0 100 400" preserveAspectRatio="none">
            <!-- 底層外框 -->
            <polygon points="50,10 80,30 80,380 50,400 20,380 20,30" fill="rgba(0,0,0,0.4)" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
            <!-- 裝飾刻度線 -->
            <g stroke="rgba(255,255,255,0.15)" stroke-width="1">
                <line x1="25" y1="100" x2="75" y2="100"/><line x1="25" y1="200" x2="75" y2="200"/><line x1="25" y1="300" x2="75" y2="300"/>
            </g>
            <!-- 動態填滿遮罩 -->
            <defs>
                <clipPath id="pillar-mask">
                    <rect x="0" id="pillar-clip-rect" y="400" width="100" height="0" />
                </clipPath>
            </defs>
            <!-- 能量光體 -->
            <g clip-path="url(#pillar-mask)" id="pillar-glow">
                <polygon points="50,10 80,30 80,380 50,400 20,380 20,30" fill="url(#pillar-grad)"/>
                <polygon points="50,10 80,30 50,400 20,30" fill="url(#facet-light)" opacity="0.4"/>
            </g>
            <!-- 頂部與底部金剛罩 -->
            <polygon points="50,0 85,25 85,35 50,55 15,35 15,25" fill="url(#facet-dark)" stroke="#d4af37" stroke-width="1"/>
            <polygon points="50,345 85,365 85,375 50,400 15,375 15,365" fill="url(#facet-dark)" stroke="#d4af37" stroke-width="1"/>
        </svg>
    </div>

    <!-- 題庫面板 -->
    <div id="q-panel">
        <div class="accumulate-text">累計行願 ． 第 <span id="days-ui" style="color:var(--gold); font-weight:bold; font-size:1.1rem;">0</span> 日</div>
        <div id="q-title">【 讀取中 】</div>
        <div id="q-text">...</div>
        <div style="font-size:0.75rem; color:#8ba89c; margin-top:20px; letter-spacing:2px;" id="bag-ui">光柱資糧：0 / 1000</div>
    </div>

    <!-- 長按印心陣法 -->
    <div id="seal-wrap">
        <svg class="seal-bg-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(212,175,55,0.3)" stroke-width="1" stroke-dasharray="4 6"/>
            <polygon points="50,5 90,50 50,95 10,50" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
        </svg>
        <svg class="seal-progress-svg" viewBox="0 0 100 100">
            <circle id="seal-progress" cx="50" cy="50" r="46" fill="none" stroke="#d4af37" stroke-width="3" stroke-dasharray="289" stroke-dashoffset="289" stroke-linecap="round"/>
        </svg>
        <svg class="seal-icon" viewBox="0 0 100 100">
            <!-- 菩提手印/金剛杵 -->
            <polygon points="50,15 65,45 50,75 35,45" fill="url(#facet-light)" stroke="#d4af37" stroke-width="1"/>
            <polygon points="50,15 65,45 50,75" fill="url(#facet-dark)" opacity="0.8"/>
            <circle cx="50" cy="45" r="8" fill="url(#pure-glass)" stroke="#fff" stroke-width="1.5" filter="drop-shadow(0 0 5px #d4af37)"/>
        </svg>
    </div>
    <div id="seal-hint">長按印心 ． 匯聚資糧</div>

    <!-- 多寶閣 Overlay -->
    <div id="treasury-overlay">
        <header style="background:rgba(1,1,3,0.85); border-bottom: 1px solid rgba(212,175,55,0.2);">
            <div class="btn-nav" onclick="toggleTreasury(false)">← 返回心室</div>
            <div style="color:var(--gold); font-size:1.1rem; letter-spacing:4px; font-weight:bold;">行願收藏室</div>
            <div style="width:70px;"></div>
        </header>
        <div id="treasure-grid">
            <!-- JS 動態生成 -->
        </div>
    </div>

    <!-- 結算特效與對話框 -->
    <div id="flash-overlay"></div>
    <div class="modal-wrap" id="sys-modal">
        <div class="modal-box">
            <div class="modal-title" id="m-title">標題</div>
            <div class="modal-text" id="m-text">內容</div>
            <button class="btn-main" onclick="closeModal()">歡喜信受</button>
        </div>
    </div>

<script>
    // ==========================================
    // 星空引擎 (Star Engine)
    // ==========================================
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [], warpSpeed = 1;

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();

    for (let i = 0; i < 200; i++) {
        stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: Math.random() > 0.5 ? '#8ba89c' : '#f3e5ab' });
    }

    function renderStars() {
        ctx.fillStyle = 'rgba(1, 1, 3, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(star => {
            star.z -= warpSpeed;
            if (star.z <= 0) { star.z = 2000; star.x = (Math.random() - 0.5) * 2000; star.y = (Math.random() - 0.5) * 2000; } 
            let scale = 400 / (400 + star.z);
            ctx.beginPath(); ctx.arc((width / 2) + star.x * scale, (height / 2) + star.y * scale, Math.max(0.5, 2 * scale), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '139,168,156'}, ${Math.min(1, scale * 2)})`; ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }
    renderStars();

    // ==========================================
    // 資料庫與純淨邏輯
    // ==========================================
    const STORAGE_KEY = 'PX_V15.0';
    let db = {};
    try { db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { db = {}; }
    
    // 初始化所需變數
    db.points = db.points || 0;
    db.vowDays = db.vowDays || 0; // 累計天數
    db.vowTempBag = db.vowTempBag || 0; // 暫存池，固定 +100，滿 1000 送回主系統
    db.vowLastDate = db.vowLastDate || "";
    db.vowArtifacts = db.vowArtifacts || []; // 存放已解鎖寶物 ID
    
    function saveDB() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

    const todayStr = new Date().toDateString();
    let isDoneToday = (db.vowLastDate === todayStr);

    // 普賢問心題庫 (365天輪播示範)
    const vowQuestions = [
        { t: "一者禮敬諸佛 ． 降伏傲慢", q: "今日若遇見愚痴或蠻橫之人，我心中生起的是厭惡，還是悲憫其受業力牽引，並以敬未來佛之心包容？" },
        { t: "二者稱讚如來 ． 破除我執", q: "今日當我的意見被否定時，那一瞬間的慍怒，是為了維護真理，還是純粹為了保護『自我』的顏面？" },
        { t: "三者廣修供養 ． 無相佈施", q: "今日我是否吝於對身邊親近的人，給予一句真誠的讚美、一個柔和的眼神，或默默為他們承擔一份勞怨？" },
        { t: "四者懺悔業障 ． 覺照自心", q: "今日之中，我是不是又把生活的不順遂歸咎於外在的環境與他人，而忘記了這一切皆是自心業力的顯影？" }
    ];

    // 五重法器 SVG 定義 (極致美學)
    const ARTIFACTS = [
        { id: 'art_1', req: 365, name: '琉璃光種', tag: '初心破塵', svg: `<svg viewBox="0 0 100 150"><g transform="translate(0, 25)"><circle cx="50" cy="50" r="25" fill="url(#facet-cyan)" opacity="0.8" stroke="#fff" stroke-width="1"/><path d="M50 15 C 65 30, 65 70, 50 85 C 35 70, 35 30, 50 15 Z" fill="url(#pure-glass)" stroke="#d4af37" stroke-width="1.5"/><circle cx="50" cy="50" r="8" fill="#fff" filter="drop-shadow(0 0 10px #d4af37)"/></g></svg>` },
        { id: 'art_5', req: 1825, name: '淨水寶瓶', tag: '定力初成', svg: `<svg viewBox="0 0 100 150"><g transform="translate(0, 10)"><polygon points="45,20 55,20 60,40 40,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="40,40 60,40 75,90 25,90" fill="url(#facet-cyan)" opacity="0.9" stroke="#fff" stroke-width="0.5"/><polygon points="25,90 75,90 60,120 40,120" fill="url(#facet-light)" stroke="#f3e5ab" stroke-width="0.5"/><polygon points="50,90 75,90 60,120 50,120" fill="url(#facet-dark)" opacity="0.7"/></g></svg>` },
        { id: 'art_10', req: 3650, name: '金剛法輪', tag: '願海同頻', svg: `<svg viewBox="0 0 100 150"><g transform="translate(0, 25)"><circle cx="50" cy="50" r="35" fill="rgba(212,175,55,0.1)" stroke="url(#facet-light)" stroke-width="2"/><g stroke="#fff" stroke-width="1.5"><line x1="50" y1="15" x2="50" y2="85"/><line x1="15" y1="50" x2="85" y2="50"/><line x1="25" y1="25" x2="75" y2="75"/><line x1="25" y1="75" x2="75" y2="25"/></g><circle cx="50" cy="50" r="12" fill="url(#facet-dark)" stroke="#d4af37" stroke-width="2"/><circle cx="50" cy="50" r="4" fill="#fff"/></g></svg>` },
        { id: 'art_15', req: 5475, name: '摩尼寶珠', tag: '悲智雙運', svg: `<svg viewBox="0 0 100 150"><g transform="translate(0, 25)"><polygon points="50,10 80,40 50,55 20,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="20,40 50,55 50,100" fill="url(#rainbow-glass)" opacity="0.9" stroke="#fff" stroke-width="0.5"/><polygon points="80,40 50,55 50,100" fill="url(#facet-dark)" opacity="0.8" stroke="#fff" stroke-width="0.5"/></g></svg>` },
        { id: 'art_108', req: 39420, name: '大日金蓮', tag: '華藏一如', svg: `<svg viewBox="0 0 100 150"><g transform="translate(0, 20)"><circle cx="50" cy="55" r="45" fill="url(#pure-glass)" opacity="0.3" filter="blur(2px)"/><path d="M50 5 C 75 35, 85 75, 50 95 C 15 75, 25 35, 50 5 Z" fill="url(#facet-light)" stroke="#fff" stroke-width="1"/><path d="M50 5 C 65 35, 75 75, 50 95" fill="url(#facet-dark)" opacity="0.6"/><path d="M50 25 C 65 45, 70 75, 50 85 C 30 75, 35 45, 50 25 Z" fill="url(#facet-dark)" stroke="#d4af37" stroke-width="1"/><circle cx="50" cy="65" r="8" fill="#fff" filter="drop-shadow(0 0 15px #d4af37)"/></g></svg>` }
    ];

    // ==========================================
    // UI 初始化與光柱高度
    // ==========================================
    function updatePillar() {
        const clipRect = document.getElementById('pillar-clip-rect');
        const glow = document.getElementById('pillar-glow');
        
        let pct = (db.vowTempBag / 1000); // 0 到 1
        let fillHeight = pct * 340; // 光柱實際高度約 340px
        let yPos = 380 - fillHeight; 
        
        clipRect.setAttribute('y', yPos);
        clipRect.setAttribute('height', fillHeight);
        
        if(pct >= 0.8) glow.classList.add('pillar-pulse');
        else glow.classList.remove('pillar-pulse');
    }

    function initUI() {
        document.getElementById('days-ui').innerText = db.vowDays;
        document.getElementById('bag-ui').innerText = `光柱資糧：${db.vowTempBag} / 1000`;
        updatePillar();

        const sealWrap = document.getElementById('seal-wrap');
        const sealHint = document.getElementById('seal-hint');

        if (isDoneToday) {
            document.getElementById('q-title').innerText = "【 今日已圓滿 】";
            document.getElementById('q-text').innerHTML = "<span style='color:var(--cyan);'>菩提心已發，普賢行已立。<br>功德已注入光柱，請明日再來。</span>";
            sealWrap.classList.add('done');
            sealWrap.style.pointerEvents = 'none';
            sealHint.innerText = "明日再續 ． 菩提道業";
            document.getElementById('seal-progress').style.strokeDashoffset = '0';
        } else {
            let qIndex = db.vowDays % vowQuestions.length;
            document.getElementById('q-title').innerText = `【 ${vowQuestions[qIndex].t} 】`;
            document.getElementById('q-text').innerText = vowQuestions[qIndex].q;
            bindSealEvents();
        }
    }

    // ==========================================
    // 核心互動：長按印心 SVG 進度條
    // ==========================================
    let reqAnimId;
    let pressStartTime;
    const PRESS_DURATION = 3000; // 3秒

    function bindSealEvents() {
        const btn = document.getElementById('seal-wrap');
        const progressCircle = document.getElementById('seal-progress');
        
        const drawProgress = (timestamp) => {
            let elapsed = timestamp - pressStartTime;
            let pct = Math.min(elapsed / PRESS_DURATION, 1);
            
            // 289 是 circle 的 stroke-dasharray ( 2 * PI * 46 )
            progressCircle.style.strokeDashoffset = 289 - (289 * pct);
            
            if (pct < 1) {
                reqAnimId = requestAnimationFrame(drawProgress);
            } else {
                completeVow();
            }
        };

        const startPress = (e) => {
            if (e.type !== 'mousedown' && e.type !== 'touchstart') return;
            e.preventDefault();
            warpSpeed = 8; // 星空加速
            btn.classList.add('pressing');
            document.getElementById('seal-hint').innerText = "注心觀照中...";
            
            pressStartTime = performance.now();
            reqAnimId = requestAnimationFrame(drawProgress);
        };

        const cancelPress = () => {
            if (btn.classList.contains('done')) return;
            cancelAnimationFrame(reqAnimId);
            warpSpeed = 1;
            btn.classList.remove('pressing');
            progressCircle.style.strokeDashoffset = '289'; // 恢復歸零
            document.getElementById('seal-hint').innerText = "長按印心 ． 匯聚資糧";
        };

        btn.addEventListener('mousedown', startPress);
        btn.addEventListener('touchstart', startPress, {passive: false});
        window.addEventListener('mouseup', cancelPress);
        window.addEventListener('touchend', cancelPress);
        btn.addEventListener('mouseleave', cancelPress);
    }

    // ==========================================
    // 圓滿結算與千點匯入
    // ==========================================
    function completeVow() {
        isDoneToday = true;
        warpSpeed = 1;
        
        // 核心數學：永遠只加 100 點到暫存池
        db.vowLastDate = todayStr;
        db.vowDays++;
        db.vowTempBag += 100;
        
        let isSyncing = false;
        let artifactUnlocked = null;

        // 檢查 1000 點自動匯回
        if (db.vowTempBag >= 1000) {
            db.points += 1000;
            db.vowTempBag -= 1000;
            isSyncing = true;
        }

        // 檢查成就解鎖
        ARTIFACTS.forEach(art => {
            if (db.vowDays >= art.req && !db.vowArtifacts.includes(art.id)) {
                db.vowArtifacts.push(art.id);
                artifactUnlocked = art;
            }
        });

        saveDB();
        updatePillar();

        // 視覺回饋
        const btn = document.getElementById('seal-wrap');
        btn.classList.remove('pressing');
        btn.classList.add('done');
        btn.style.pointerEvents = 'none';
        document.getElementById('seal-progress').style.strokeDashoffset = '0';
        document.getElementById('seal-hint').innerText = "明日再續 ． 菩提道業";
        
        // 隨機事件引導 (只改文字，不干擾分數)
        let rand = Math.random();
        let eventMsg = "";
        if (rand < 0.1) eventMsg = "<br><br><span style='color:#ff8888;'>【業相浮現】</span><br>觀照中隱見無明。祈請退返主系統，至誠念佛 1000 聲化解。";
        else if (rand < 0.2) eventMsg = "<br><br><span style='color:var(--cyan);'>【善根感應】</span><br>一念清淨，天華供養。願此法喜伴隨您今日的生活。";

        if (artifactUnlocked) {
            // 成就解鎖全螢幕特效
            const flash = document.getElementById('flash-overlay');
            flash.style.opacity = '1';
            setTimeout(() => { flash.style.opacity = '0'; }, 1000);
            
            showModal("【 恆常行願 ． 法相顯化 】", `<span style='color:var(--solid-gold); font-size:1.1rem; font-weight:bold;'>行願相繼 ${db.vowDays} 日</span><br><br>時光淬鍊，定慧初成。法界化現【<span style='color:#fff'>${artifactUnlocked.name}</span>】存入多寶閣，為行者菩提道上之不滅印記。`);
        } else if (isSyncing) {
            // 千點匯入特效
            const flash = document.getElementById('flash-overlay');
            flash.style.opacity = '1';
            setTimeout(() => { flash.style.opacity = '0'; }, 800);
            
            showModal("【 圓滿 ． 千點資糧匯入 】", "<span style='color:var(--solid-gold); font-size:1.1rem; font-weight:bold;'>十日行願，功不唐捐。</span><br><br>光柱已臻圓滿，<span style='color:#fff'>1000</span> 點資糧化作流光自動匯入主系統。光柱重置，祈願繼續精進。" + eventMsg);
        } else {
            showModal("【 今日問心圓滿 】", `反思圓滿，<span style='color:var(--solid-gold);'>100</span> 點注入光柱。` + eventMsg);
        }
        
        // 更新 UI
        document.getElementById('days-ui').innerText = db.vowDays;
        document.getElementById('bag-ui').innerText = `光柱資糧：${db.vowTempBag} / 1000`;
        document.getElementById('q-title').innerText = "【 今日已圓滿 】";
        document.getElementById('q-text').innerHTML = "<span style='color:var(--cyan);'>菩提心已發，普賢行已立。<br>功德已注入光柱。</span>";
    }

    // ==========================================
    // 多寶閣邏輯
    // ==========================================
    function toggleTreasury(show) {
        const overlay = document.getElementById('treasury-overlay');
        if (show) {
            renderTreasury();
            overlay.classList.add('show');
        } else {
            overlay.classList.remove('show');
        }
    }

    function renderTreasury() {
        const grid = document.getElementById('treasure-grid');
        grid.innerHTML = '';

        ARTIFACTS.forEach(art => {
            const isUnlocked = db.vowArtifacts.includes(art.id);
            const cell = document.createElement('div');
            
            if (isUnlocked) {
                cell.className = art.id === 'art_108' ? 't-cell ultimate' : 't-cell';
                cell.innerHTML = `
                    <div class="t-svg">${art.svg}</div>
                    <div class="t-info">
                        <div class="t-name" style="color:${art.id === 'art_108' ? '#d4af37' : '#fff'}">${art.name}</div>
                        <div class="t-lvl">達成：需滿 ${art.req} 日</div>
                        <span class="t-tag">【${art.tag}】</span>
                    </div>
                `;
            } else {
                cell.className = 't-cell locked';
                cell.innerHTML = `
                    <div class="t-svg">${art.svg}</div>
                    <div class="t-info">
                        <div class="t-name" style="color:#8ba89c;">琉璃空龕</div>
                        <div class="t-lvl">機緣未到</div>
                        <span class="t-tag" style="border-color:rgba(139,168,156,0.3); color:#8ba89c; background:rgba(139,168,156,0.1);">需滿 ${art.req} 日</span>
                    </div>
                `;
            }
            grid.appendChild(cell);
        });
    }

    // 系統對話框
    function showModal(title, text) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-text').innerHTML = text;
        document.getElementById('sys-modal').classList.add('show');
    }
    function closeModal() { document.getElementById('sys-modal').classList.remove('show'); }

    initUI();
</script>
