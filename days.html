<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>七重行願 ． 琉璃天梯</title>
    <style>
        :root {
            --bg-deep: #020203; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, var(--bg-deep) 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
            display: flex; justify-content: center; align-items: center;
        }

        /* ---------------- 星空背景 (取自您的代碼) ---------------- */
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

        /* ---------------- 全局 SVG 漸層 (取自您的多寶閣) ---------------- */
        .global-defs { position: absolute; width: 0; height: 0; pointer-events: none; }

        /* ---------------- 天梯容器與 SVG ---------------- */
        #stair-container {
            position: absolute; inset: 0; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px;
        }

        #stair-svg {
            width: 100%; max-width: 500px; height: 100%; max-height: 850px;
            overflow: visible; transform-origin: 65% 25%; /* 縮放中心點對準頂端的菩提心 */
            transition: transform 2s cubic-bezier(0.6, 0.05, 0.1, 1), opacity 1.5s ease-in;
        }

        /* 飛越過場動畫 */
        #stair-svg.warp-drive { transform: scale(25) translateY(15%); opacity: 0; pointer-events: none; }

        /* 階梯的玻璃材質與狀態 */
        .stair-step { transition: filter 0.3s; }
        .step-top { stroke: rgba(255,255,255,0.8); stroke-width: 1.5px; stroke-linejoin: round; transition: all 0.5s; }
        .step-front { stroke: rgba(255,255,255,0.4); stroke-width: 1px; stroke-linejoin: round; transition: all 0.5s; }
        .step-side { stroke: rgba(255,255,255,0.2); stroke-width: 1px; stroke-linejoin: round; transition: all 0.5s; }
        
        /* 鎖定的階梯（未走到） */
        .step-locked .step-top { fill-opacity: 0.15; stroke: rgba(255,255,255,0.2); }
        .step-locked .step-front { fill-opacity: 0.1; stroke: rgba(255,255,255,0.1); }
        .step-locked .step-side { fill-opacity: 0.05; stroke: rgba(255,255,255,0.05); }

        /* 已完成的階梯 */
        .step-done .step-top { fill-opacity: 0.5; }
        .step-done .step-front { fill-opacity: 0.3; }
        .step-done .step-side { fill-opacity: 0.2; }

        /* 當前閃爍的階梯 (Current) */
        .step-current { cursor: pointer; }
        .step-current .step-top { 
            fill-opacity: 0.9; stroke: #fff; stroke-width: 2.5px;
            animation: breathe-step 2s infinite alternate ease-in-out;
        }
        .step-current .step-front { fill-opacity: 0.7; stroke: #fff; stroke-width: 1.5px; }
        .step-current .step-side { fill-opacity: 0.5; }
        
        @keyframes breathe-step {
            0% { filter: drop-shadow(0 0 10px currentColor) brightness(1); }
            100% { filter: drop-shadow(0 0 30px currentColor) brightness(1.4); }
        }

        /* ---------------- 頂端菩提心 (取自您的華嚴位階) ---------------- */
        #bodhi-heart-group {
            transform-origin: center;
            animation: hb-pulse 2s infinite cubic-bezier(0.2, 0.8, 0.4, 1);
        }
        #immortal-seed {
            fill: url(#seed-grad);
        }
        @keyframes hb-pulse { 
            0% { transform: scale(1); filter: drop-shadow(0 0 20px var(--gold)); } 
            50% { transform: scale(1.2); filter: drop-shadow(0 0 40px var(--gold)) drop-shadow(0 0 60px #fff); } 
            100% { transform: scale(1); filter: drop-shadow(0 0 20px var(--gold)); } 
        }

        /* ---------------- UI 文字 ---------------- */
        #ui-layer {
            position: absolute; top: 12%; width: 100%; text-align: center; z-index: 20;
            transition: opacity 0.5s; pointer-events: none;
        }
        .main-title { color: var(--gold); font-size: 1.25rem; letter-spacing: 8px; font-weight: bold; text-shadow: 0 0 20px rgba(212,175,55,0.6); margin-bottom: 12px; }
        .sub-title { color: var(--cyan); font-size: 0.85rem; letter-spacing: 5px; }

        /* 白金閃光 */
        #flash-overlay { position: fixed; inset: 0; background: radial-gradient(circle, #fff 0%, #f3e5ab 50%, transparent 100%); opacity: 0; z-index: 9999; pointer-events: none; transition: opacity 0.8s; mix-blend-mode: screen; }

    </style>
</head>
<body>

    <!-- 植入您的漸層庫 -->
    <svg class="global-defs">
        <defs>
            <linearGradient id="f-light" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.85"/><stop offset="100%" stop-color="#fff" stop-opacity="0.2"/></linearGradient>
            <linearGradient id="f-dark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#000" stop-opacity="0.1"/><stop offset="100%" stop-color="#000" stop-opacity="0.5"/></linearGradient>
            <!-- 七彩色階 -->
            <linearGradient id="g-0" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ba68c8"/><stop offset="100%" stop-color="#f3e5f5"/></linearGradient>
            <linearGradient id="g-1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f48fb1"/><stop offset="100%" stop-color="#fce4ec"/></linearGradient>
            <linearGradient id="g-2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4dd0e1"/><stop offset="100%" stop-color="#e0f7fa"/></linearGradient>
            <linearGradient id="g-3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2196f3"/><stop offset="100%" stop-color="#e3f2fd"/></linearGradient>
            <linearGradient id="g-4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#81c784"/><stop offset="100%" stop-color="#e8f5e9"/></linearGradient>
            <linearGradient id="g-5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffb300"/><stop offset="100%" stop-color="#fff59d"/></linearGradient>
            <linearGradient id="g-6" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37"/><stop offset="100%" stop-color="#f3e5ab"/></linearGradient>
            
            <radialGradient id="seed-grad" cx="50%" cy="50%" r="50%">
                <stop offset="10%" stop-color="#fff"/><stop offset="30%" stop-color="#ffe"/><stop offset="60%" stop-color="#f3e5ab"/><stop offset="100%" stop-color="#d4af37"/>
            </radialGradient>
        </defs>
    </svg>

    <!-- 星空背景 -->
    <canvas id="starCanvas"></canvas>
    <div id="vignette"></div>

    <!-- UI 標題 -->
    <div id="ui-layer">
        <div class="main-title">七日行願 ． 步步生蓮</div>
        <div class="sub-title">點擊發光之法階入陣</div>
    </div>

    <!-- 核心：七階弧線琉璃天梯 -->
    <div id="stair-container">
        <svg id="stair-svg" viewBox="0 0 500 800">
            <!-- 階梯將由 JS 動態生成 -->
            <g id="steps-group"></g>

            <!-- 菩提心 (頂端第 7 階之上) -->
            <!-- 座標精準對齊第 7 階的中心點上方 -->
            <g id="bodhi-heart-group" transform="translate(325, 230)">
                <!-- 放射光芒 -->
                <circle cx="0" cy="0" r="35" fill="none" stroke="#f3e5ab" stroke-width="1.5" stroke-dasharray="3 8" opacity="0.8"/>
                <circle cx="0" cy="0" r="22" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
                <!-- 菩提種子 -->
                <circle id="immortal-seed" cx="0" cy="0" r="12" />
            </g>
        </svg>
    </div>

    <!-- 白金閃光 -->
    <div id="flash-overlay"></div>

<script>
    // ==========================================
    // 1. 星空引擎 (取自您的代碼)
    // ==========================================
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [], warpSpeed = 1;

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();

    for (let i = 0; i < 200; i++) {
        let cType = Math.random();
        let color = cType > 0.8 ? '243,229,171' : (cType > 0.5 ? '139,168,156' : '255,255,255');
        stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: color, s: Math.random() * 1.5 + 0.5 });
    }

    function renderStars() {
        ctx.fillStyle = 'rgba(2, 2, 3, 0.5)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= warpSpeed;
            if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; } 
            let sc = 400 / (400 + s.z);
            let px = (width / 2) + s.x * sc;
            let py = (height / 2) + s.y * sc;
            ctx.beginPath(); ctx.arc(px, py, s.s * sc * (warpSpeed > 2 ? 4 : 1), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${s.color}, ${Math.min(1, sc * 2)})`; ctx.fill(); 
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }
    renderStars();

    // ==========================================
    // 2. SVG 七階弧線透視階梯生成器
    // ==========================================
    const stepsGroup = document.getElementById('steps-group');
    
    // 手工精算 7 階弧線透視座標 (X偏左下至右上)
    // cx: 中心X, y: 底部Y, w: 寬度, h: 正面高度
    const STAIR_MATH = [
        { cx: 160, y: 720, w: 320, h: 35 }, // 第 1 階 (最底、偏左)
        { cx: 200, y: 630, w: 280, h: 30 }, // 第 2 階
        { cx: 240, y: 550, w: 240, h: 26 }, // 第 3 階
        { cx: 275, y: 475, w: 200, h: 22 }, // 第 4 階
        { cx: 300, y: 405, w: 165, h: 18 }, // 第 5 階
        { cx: 315, y: 340, w: 135, h: 15 }, // 第 6 階
        { cx: 325, y: 280, w: 110, h: 12 }  // 第 7 階 (最頂、偏右、接向菩提心)
    ];

    // 對應 7 天的 7 種琉璃漸層 (呼叫您的 <linearGradient>)
    const STAIR_COLORS = ['#ba68c8', '#f48fb1', '#4dd0e1', '#2196f3', '#81c784', '#ffb300', '#d4af37'];
    const GRADIENTS = ['url(#g-0)', 'url(#g-1)', 'url(#g-2)', 'url(#g-3)', 'url(#g-4)', 'url(#g-5)', 'url(#g-6)'];

    let currentDay = 4; // 假設今天是第 4 天（藍色階梯發光）

    function buildStairs() {
        let html = '';

        for (let i = 0; i < 7; i++) {
            let s = STAIR_MATH[i];
            
            // 下一階的底部，用來連接當前階的頂部深度
            let nextY = (i === 6) ? 245 : STAIR_MATH[i+1].y; 
            let nextW = (i === 6) ? 80 : STAIR_MATH[i+1].w;
            let nextCx = (i === 6) ? 330 : STAIR_MATH[i+1].cx;
            
            let baseColor = STAIR_COLORS[i];
            let gradColor = GRADIENTS[i];
            
            // 狀態判斷
            let stateClass = '';
            let clickAttr = '';
            if (i + 1 < currentDay) stateClass = 'step-done';
            else if (i + 1 === currentDay) {
                stateClass = 'step-current';
                clickAttr = 'onclick="triggerWarp()"'; // 只有當前階梯可點擊
            }
            else stateClass = 'step-locked';

            // SVG Polygon 座標計算
            // 1. 正面 (Front Face)
            let frontPts = `
                ${s.cx - s.w/2}, ${s.y} 
                ${s.cx + s.w/2}, ${s.y} 
                ${s.cx + s.w/2}, ${s.y - s.h} 
                ${s.cx - s.w/2}, ${s.y - s.h}
            `;
            
            // 2. 頂面 (Top Face) - 從正面頂部連到下一階的底部
            let topPts = `
                ${s.cx - s.w/2}, ${s.y - s.h} 
                ${s.cx + s.w/2}, ${s.y - s.h} 
                ${nextCx + nextW/2}, ${nextY} 
                ${nextCx - nextW/2}, ${nextY}
            `;

            // 3. 左側面 (Side Face) - 補足弧線轉彎產生的厚度立體感
            let sidePts = `
                ${s.cx - s.w/2}, ${s.y}
                ${s.cx - s.w/2}, ${s.y - s.h}
                ${nextCx - nextW/2}, ${nextY}
                ${nextCx - nextW/2}, ${nextY + s.h*0.8}
            `;

            html += `
                <g class="stair-step ${stateClass}" style="color: ${baseColor};" ${clickAttr}>
                    <!-- 側面 (用 facet-dark 加深) -->
                    <polygon class="step-side" points="${sidePts}" fill="url(#f-dark)" />
                    <!-- 正面 (背光面) -->
                    <polygon class="step-front" points="${frontPts}" fill="${gradColor}" />
                    <polygon class="step-front" points="${frontPts}" fill="url(#f-dark)" opacity="0.3"/>
                    <!-- 頂面 (受光面) -->
                    <polygon class="step-top" points="${topPts}" fill="${gradColor}" />
                    <polygon class="step-top" points="${topPts}" fill="url(#f-light)" opacity="0.5"/>
                </g>
            `;
        }
        stepsGroup.innerHTML = html;
    }
    buildStairs();

    // ==========================================
    // 3. 飛越天梯，衝入菩提心 (Warp Animation)
    // ==========================================
    function triggerWarp() {
        // 1. 星空引擎極限加速
        warpSpeed = 40;

        // 2. 隱藏 UI 文字
        document.getElementById('ui-layer').style.opacity = '0';

        // 3. 階梯 SVG 衝向鏡頭
        const stairSvg = document.getElementById('stair-svg');
        stairSvg.classList.add('warp-drive');

        // 4. 菩提心劇烈發光
        const heart = document.getElementById('immortal-seed');
        heart.style.filter = "drop-shadow(0 0 100px #fff)";

        // 5. 閃光白屏過渡 (準備銜接第二幕)
        setTimeout(() => {
            const flash = document.getElementById('flash-overlay');
            flash.style.opacity = '1';
            
            setTimeout(() => {
                alert("【視覺展示完畢】\n此處白光將無縫銜接至『集氣任務第二頁』！");
                location.reload(); // 展示用，重置畫面
            }, 1000);
            
        }, 1200); 
    }

</script>
</body>
</html>
