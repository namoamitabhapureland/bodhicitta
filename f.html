<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華藏法性引擎 ． 第九層測試</title>
    <style>
        :root { 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
            --bg-deep: #010103; 
        }
        body { 
            margin: 0; 
            background: var(--bg-deep); 
            color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; 
        }
        .scene { 
            position: relative; width: 350px; height: 350px; 
            display: flex; justify-content: center; align-items: center;
        }
        /* 琉璃光暈濾鏡 */
        svg { 
            width: 100%; height: 100%; 
            filter: drop-shadow(0 0 20px rgba(212,175,55,0.25)); 
        }
        .info { 
            margin-top: 40px; text-align: center; letter-spacing: 2px; 
        }
        .title { 
            color: var(--gold); font-size: 1.2rem; font-weight: bold; 
            text-shadow: 0 0 10px rgba(212,175,55,0.5); 
        }
        .desc { 
            font-size: 0.85rem; color: var(--cyan); margin-top: 8px; opacity: 0.8;
        }
        /* 極低熵的自轉與呼吸動畫 */
        @keyframes breath-spin { 
            0% { transform: rotate(0deg) scale(0.95); opacity: 0.8; } 
            50% { transform: rotate(18deg) scale(1.05); opacity: 1; filter: drop-shadow(0 0 30px rgba(243,229,171,0.4)); } 
            100% { transform: rotate(36deg) scale(0.95); opacity: 0.8; } 
        }
        .animated-layer { 
            transform-origin: center; 
            animation: breath-spin 12s ease-in-out infinite alternate; 
        }
    </style>
</head>
<body>

    <div class="scene">
        <svg id="world-canvas" viewBox="0 0 200 200"></svg>
    </div>
    
    <div class="info">
        <div class="title">第九重 ． 出妙音聲世界</div>
        <div class="desc">純數學運算 ‧ 資訊波形疊加 ‧ 無版權手繪感</div>
    </div>

    <script>
        /**
         * 華嚴法性幾何生成引擎 (Dharmadhatu Engine)
         * 核心理念：不用任何圖片，純靠底層數學參數，生成帶有手繪溫度的立體法界。
         */
        const DharmadhatuEngine = (() => {
            
            // 隨機擾動值，讓完美的數學線條產生微小的「手繪感」
            const HANDRAWN_ENTROPY = 0.5; 

            // 將座標陣列轉換為 SVG Path 語法
            const generatePath = (points) => {
                if (!points || points.length === 0) return "";
                let d = `M ${points[0].x},${points[0].y}`;
                for (let i = 1; i < points.length; i++) {
                    // 加入微小擾動
                    const hdx = (Math.random() - 0.5) * HANDRAWN_ENTROPY;
                    const hdy = (Math.random() - 0.5) * HANDRAWN_ENTROPY;
                    d += ` L ${points[i].x + hdx},${points[i].y + hdy}`;
                }
                d += " Z";
                return d;
            };

            // 生成第九層：波形疊加曼陀羅
            const createLayer9SoundVibration = () => {
                const center = 100; 
                const baseRadius = 65;
                const segments = 360; // 圓周切分 360 個點，使線條滑順
                const pathData = [];

                // 【法理運算核心】
                // 設定三個不同頻率的波，疊加在一起
                // f: 頻率 (決定有幾個花瓣/波峰)
                // a: 振幅 (決定波峰的深度)
                const harmonics = [ 
                    { f: 8, a: 12 },   // 主結構：八葉蓮華波形
                    { f: 24, a: 3 },   // 次結構：邊緣細碎的微波
                    { f: 72, a: 0.8 }  // 微結構：模擬能量震動的毛邊
                ];

                for (let i = 0; i < segments; i++) {
                    const angle = (Math.PI * 2 / segments) * i;
                    let currentRadius = baseRadius;
                    
                    // 迴圈疊加所有頻率的波長
                    harmonics.forEach(h => {
                        currentRadius += h.a * Math.sin(h.f * angle);
                    });

                    // 極座標轉直角座標 (三角函數定位)
                    const x = center + currentRadius * Math.cos(angle);
                    const y = center + currentRadius * Math.sin(angle);
                    pathData.push({ x, y });
                }

                // 將座標點轉化為 SVG 路徑
                const pathD = generatePath(pathData);

                // 生成外層 SVG 節點
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("class", "animated-layer");
                
                // 組合內部的立體光影層
                g.innerHTML = `
                    <defs>
                        <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    </defs>
                    
                    <path d="${pathD}" fill="rgba(212,175,55, 0.05)" stroke="none" />
                    
                    <path d="${pathD}" fill="none" stroke="rgba(243,229,171, 0.7)" stroke-width="0.8" stroke-linejoin="round" filter="url(#glow)"/>
                    
                    <path d="${pathD}" fill="none" stroke="rgba(139,168,156, 0.6)" stroke-width="0.5" transform="scale(0.65) translate(54, 54)"/>
                    
                    <circle cx="100" cy="100" r="3" fill="#fff" filter="drop-shadow(0 0 5px #fff)"/>
                `;
                
                // 點綴星塵 (在波峰處放置光點)
                pathData.forEach((p, idx) => {
                    // 每 45 個點(剛好是波峰位置)放一顆光點
                    if (idx % 45 === 0) {
                        g.innerHTML += `<circle cx="${p.x}" cy="${p.y}" r="1" fill="#f3e5ab" opacity="0.8"/>`;
                    }
                });

                return g;
            };

            return { createL9: createLayer9SoundVibration };
        })();

        // 啟動引擎，將生成的法性圖形注入畫布
        window.onload = () => {
            const canvas = document.getElementById('world-canvas');
            const layer9SVG = DharmadhatuEngine.createL9();
            canvas.appendChild(layer9SVG);
        };
    </script>
</body>
</html>
