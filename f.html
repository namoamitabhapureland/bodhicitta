<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>合十 · 透明玻璃手 (正面立體版)</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  background:#010103;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:"PingFang TC", "Hiragino Sans GB", serif;
  overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
}

#starBg { position:fixed; inset:0; z-index:0; pointer-events:none; }

.scene {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center;
  cursor:pointer;
}
.scene:active .hands-svg { transform: scale(0.95); }
.hands-svg { overflow:visible; display:block; transition:transform 0.14s cubic-bezier(0.4,0,0.2,1); }

.caption {
  margin-top:18px;
  color:rgba(212,175,55,0.58);
  font-size:13px;
  letter-spacing:7px;
  text-shadow:0 0 20px rgba(212,175,55,0.50);
  pointer-events:none;
}

.particle {
  position:fixed; width:5px; height:5px; border-radius:50%;
  background:rgba(243,229,171,0.92);
  pointer-events:none; z-index:9999;
  box-shadow:0 0 6px #d4af37, 0 0 16px rgba(255,255,255,0.75);
}
</style>
</head>
<body>

<canvas id="starBg"></canvas>

<div class="scene" id="handsBtn">

  <svg class="hands-svg"
       id="prayer-svg"
       viewBox="0 0 200 305"
       width="200" height="305"
       xmlns="http://www.w3.org/2000/svg"
       style="overflow:visible;">
    <defs>
      <linearGradient id="gl-left" x1="0%" y1="5%" x2="100%" y2="90%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.75)"/>
        <stop offset="22%"  stop-color="rgba(255,255,255,0.35)"/>
        <stop offset="58%"  stop-color="rgba(235,215,175,0.15)"/>
        <stop offset="100%" stop-color="rgba(212,175,55,0.05)"/>
      </linearGradient>
      
      <linearGradient id="gl-right" x1="100%" y1="5%" x2="0%" y2="90%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.35)"/>
        <stop offset="38%"  stop-color="rgba(255,255,255,0.12)"/>
        <stop offset="100%" stop-color="rgba(212,175,55,0.03)"/>
      </linearGradient>
      
      <linearGradient id="gl-tip" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.95)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>
      
      <linearGradient id="gl-wrist" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"   stop-color="rgba(212,175,55,0.04)"/>
        <stop offset="100%" stop-color="rgba(212,175,55,0.30)"/>
      </linearGradient>

      <radialGradient id="gr-inner" cx="50%" cy="50%" r="42%">
        <stop offset="0%"   stop-color="rgba(255,225,130,0.28)"/>
        <stop offset="100%" stop-color="rgba(212,175,55,0)"/>
      </radialGradient>

      <radialGradient id="gr-aura" cx="50%" cy="53%" r="50%">
        <stop offset="0%"   stop-color="rgba(255,228,140,0.52)"/>
        <stop offset="45%"  stop-color="rgba(212,175,55,0.20)"/>
        <stop offset="100%" stop-color="rgba(212,175,55,0)"/>
      </radialGradient>

      <radialGradient id="gr-burst" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="rgba(255,252,235,1.0)"/>
        <stop offset="28%"  stop-color="rgba(255,220,100,0.90)"/>
        <stop offset="65%"  stop-color="rgba(212,175,55,0.42)"/>
        <stop offset="100%" stop-color="rgba(212,175,55,0)"/>
      </radialGradient>

      <filter id="f-edge" x="-55%" y="-22%" width="210%" height="144%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
        <feComposite in="SourceGraphic" in2="b" operator="over"/>
      </filter>

      <clipPath id="cl-hand">
        <path id="main-shape" d="
          M 100 15
          Q 95 60 75 140
          Q 50 240 40 280
          C 35 310 165 310 160 280
          Q 150 240 125 140
          Q 105 60 100 15 Z
        "/>
      </clipPath>
    </defs>

    <ellipse id="aura-el" cx="100" cy="160" rx="85" ry="104" fill="url(#gr-aura)"/>
    <ellipse id="burst-el" cx="100" cy="158" rx="0" ry="0" fill="url(#gr-burst)" opacity="0"/>

    <use href="#main-shape" fill="none" stroke="rgba(212,175,55,0.72)" stroke-width="3.5" filter="url(#f-edge)"/>

    <g clip-path="url(#cl-hand)">
      <rect x="0" y="0" width="100" height="305" fill="url(#gl-left)"/>
      <rect x="100" y="0" width="100" height="305" fill="url(#gl-right)"/>
    </g>

    <g clip-path="url(#cl-hand)">
      <ellipse cx="100" cy="160" rx="55" ry="110" fill="url(#gr-inner)"/>
      <rect x="0" y="200" width="200" height="105" fill="url(#gl-wrist)" opacity="0.85"/>
    </g>

    <path d="
      M 95 130
      C 95 120 82 125 78 135
      C 65 170 58 220 58 250
      C 58 270 70 280 80 275
      C 95 265 98 200 97 140 Z
    " fill="url(#gl-left)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
    
    <path d="
      M 105 130
      C 105 120 118 125 122 135
      C 135 170 142 220 142 250
      C 142 270 130 280 120 275
      C 105 265 102 200 103 140 Z
    " fill="url(#gl-right)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>

    <path d="M 85 65 Q 92 68 100 65" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
    <path d="M 115 65 Q 108 68 100 65" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/>
    <path d="M 80 105 Q 90 108 100 105" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
    <path d="M 120 105 Q 110 108 100 105" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>
    <path d="M 72 195 Q 82 190 92 195" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
    <path d="M 128 195 Q 118 190 108 195" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>

    <line x1="100" y1="15" x2="100" y2="128" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round"/>
    <line x1="100" y1="130" x2="100" y2="290" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="3,4"/>

    <use href="#main-shape" fill="none" stroke="rgba(212,175,55,0.52)" stroke-width="1.4"/>
    <path d="M 100 15 Q 95 60 75 140 Q 50 240 40 280" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" stroke-linecap="round"/>

    <ellipse cx="100" cy="15" rx="4.5" ry="11" fill="url(#gl-tip)" opacity="0.95"/>
  </svg>

  <div class="caption">合 十</div>
</div>

<script>
// 背景星空
const cvs = document.getElementById('starBg');
const ctx = cvs.getContext('2d');
let stars = [];

function initStars() {
  cvs.width  = window.innerWidth;
  cvs.height = window.innerHeight;
  stars = Array.from({ length: 130 }, () => ({
    x:  Math.random() * cvs.width,
    y:  Math.random() * cvs.height,
    r:  Math.random() * 1.8 + 0.4,
    sp: Math.random() * 0.0016 + 0.0005,
    ph: Math.random() * Math.PI * 2
  }));
}
function drawStars() {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  const t = Date.now();
  stars.forEach(s => {
    ctx.globalAlpha = 0.12 + Math.abs(Math.sin(t * s.sp + s.ph)) * 0.76;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize', initStars);
initStars();
drawStars();

// 呼吸動畫
const auraEl = document.getElementById('aura-el');
let breathT = 0;

function breathe() {
  breathT += 0.013;
  const sinV = Math.sin(breathT);
  const scale  = 0.80 + sinV * 0.20;
  const auraOp = 0.42 + sinV * 0.33;

  auraEl.setAttribute('rx', 85 * scale);
  auraEl.setAttribute('ry', 104 * scale);
  auraEl.setAttribute('opacity', auraOp);

  requestAnimationFrame(breathe);
}
breathe();

// 點擊粒子特效
const burstEl = document.getElementById('burst-el');
let busy = false;

function doBurst(cx, cy) {
  if (busy) return;
  busy = true;

  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    document.body.appendChild(p);

    const ang  = Math.random() * Math.PI * 2;
    const dist = 55 + Math.random() * 105;
    const tx   = Math.cos(ang) * dist;
    const ty   = Math.sin(ang) * dist;
    const dur  = 620 + Math.random() * 380;

    p.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${tx}px,${ty}px) scale(0.15)`, opacity: 0 }
    ], { duration: dur, easing: 'ease-out' }).onfinish = () => p.remove();
  }

  let t0 = null;
  const dur = 580;

  function frame(ts) {
    if (!t0) t0 = ts;
    const progress = Math.min((ts - t0) / dur, 1);
    const eased    = 1 - Math.pow(1 - progress, 2.8);

    burstEl.setAttribute('rx', eased * 130);
    burstEl.setAttribute('ry', eased * 158);

    const opacity = progress < 0.20
      ? progress * 4.5
      : Math.max(0, 1 - (progress - 0.20) * 1.26);
    burstEl.setAttribute('opacity', opacity);

    if (progress < 1) {
      requestAnimationFrame(frame);
    } else {
      burstEl.setAttribute('opacity', 0);
      busy = false;
    }
  }
  requestAnimationFrame(frame);
}

const btn = document.getElementById('handsBtn');
btn.addEventListener('click', e => doBurst(e.clientX, e.clientY));
btn.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  doBurst(t.clientX, t.clientY);
}, { passive: false });
</script>
</body>
</html>
