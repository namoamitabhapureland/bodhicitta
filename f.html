<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏莊嚴世界海 ． 二十重矩陣 (終極完整版)</title>
    <style>
        :root {
            --bg-deep: #010103; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
            --silver: #e0e0e0;
            --fire: #a83232;
            --text-main: #d0d0d0;
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; overscroll-behavior: none; user-select: none;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            color: var(--gold); text-decoration: none; font-size: 0.95rem; font-weight: bold;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3);
            backdrop-filter: blur(5px); transition: all 0.3s;
        }
        .back-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.2); }

        #status-panel {
            position: absolute; top: 70px; left: 5%; width: 90%; max-width: 340px;
            background: rgba(5,5,10,0.6); backdrop-filter: blur(10px);
            border-left: 3px solid rgba(212,175,55,0.8); 
            padding: 15px 20px; z-index: 100; transition: border-color 0.8s; pointer-events: none;
            border-radius: 0 15px 15px 0; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .status-title { font-size: 1.15rem; font-weight: bold; color: var(--gold); letter-spacing: 2px; margin-bottom: 6px; text-shadow: 0 0 10px rgba(0,0,0,0.8); transition: color 0.8s;}
        .status-buddha { font-size: 0.9rem; color: #fff; font-weight: bold; letter-spacing: 1px; margin-bottom: 8px; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .status-shape { font-size: 0.75rem; color: var(--cyan); letter-spacing: 1px; margin-bottom: 8px; border: 1px solid rgba(139,168,156,0.5); display: inline-block; padding: 3px 10px; border-radius: 12px; background: rgba(139,168,156,0.1); }
        .status-desc { font-size: 0.85rem; color: #ddd; line-height: 1.6; letter-spacing: 1px; }

        .matrix-section { position: absolute; inset: 0; background: #000; overflow: hidden; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

        .ui-layer { position: absolute; bottom: 5%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; gap: 15px; }
        #drag-hint { color:rgba(212,175,55,0.8); font-size:0.75rem; letter-spacing:2px; margin-bottom: 5px; text-shadow: 0 0 5px #000; }

        .realm-picker-container {
            width: 100%; overflow-x: auto; scroll-snap-type: x mandatory;
            display: flex; gap: 12px; padding: 10px 50%;
            scrollbar-width: none; -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
        }
        .realm-picker-container::-webkit-scrollbar { display: none; }

        .realm-item {
            flex: 0 0 auto; scroll-snap-align: center;
            background: rgba(15,15,15,0.8); border: 1px solid rgba(255,255,255,0.2); 
            color: #888; padding: 12px 25px; border-radius: 30px; font-size: 0.95rem; font-weight: bold; letter-spacing: 1.5px;
            cursor: pointer; backdrop-filter: blur(10px); transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .realm-item .r-num { font-size: 0.65rem; opacity: 0.6; letter-spacing: 1px; }
        
        .realm-item.active { transform: scale(1.1); background: rgba(20,20,20,0.95); border-color: var(--solid-gold); color: var(--gold); box-shadow: 0 5px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(212,175,55,0.2); }
        .realm-item.active.cyan-mode { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 5px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(139,168,156,0.2); }
        .realm-item.active.silver-mode { border-color: var(--silver); color: var(--silver); box-shadow: 0 5px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(224,224,224,0.2); }
        .realm-item.active.fire-mode { border-color: var(--fire); color: #ff8a8a; box-shadow: 0 5px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(168,50,50,0.2); }

        #theory-btn { 
            width: 85%; max-width: 320px; justify-content: center;
            background: linear-gradient(135deg, rgba(5,10,15,0.9), rgba(5,5,5,0.95)); 
            border: 1px solid rgba(139,168,156,0.6); color: var(--cyan);
            padding: 12px 20px; border-radius: 30px; font-size: 0.9rem; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        #theory-btn:active { transform: scale(0.95); }

        /* 玉簡抽屜 */
        #theory-drawer { position: fixed; bottom: 0; left: 0; width: 100vw; height: 85vh; background: rgba(5, 5, 8, 0.96); backdrop-filter: blur(20px); border-top: 1.5px solid rgba(212,175,55,0.4); border-radius: 25px 25px 0 0; transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 2000; overflow-y: auto; padding: 0 0 80px 0; touch-action: pan-y; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
        #theory-drawer.open { transform: translateY(0); }
        .drawer-header { position: sticky; top: 0; background: linear-gradient(to bottom, rgba(5,5,8,1), rgba(5,5,8,0.95)); padding: 15px; text-align: center; z-index: 10; border-bottom: 1px solid rgba(139,168,156,0.2); }
        .close-bar { width: 40px; height: 4px; background: rgba(212,175,55,0.4); border-radius: 2px; margin: 0 auto 10px; cursor: pointer; }
        .theory-container { padding: 30px 7% 20px; max-width: 720px; margin: 0 auto; }
        .main-title { color: var(--gold); font-size: 1.5rem; letter-spacing: 3px; text-align: center; margin-bottom: 50px; text-shadow: 0 0 15px rgba(212,175,55,0.3); }
        .main-title::after { content: ''; display: block; width: 50px; height: 1.5px; background: linear-gradient(90deg, transparent, var(--solid-gold), transparent); margin: 15px auto 0; }
        .paragraph { font-size: 0.95rem; color: #ccc; line-height: 1.9; letter-spacing: 1px; text-align: justify; margin-bottom: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="back-btn" onclick="window.location.href='index.html?screen=3'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        回道場
    </div>

    <div id="status-panel">
        <div class="status-title" id="s-title">系統啟動中</div>
        <div class="status-buddha" id="s-buddha"></div>
        <div class="status-shape" id="s-shape"></div>
        <div class="status-desc" id="s-desc">讀取法界矩陣...</div>
    </div>

    <section class="matrix-section">
        <canvas id="realmCanvas"></canvas>
        <div class="ui-layer" id="ui-layer">
            <div id="drag-hint">360° 全息滑動 ． 撥動星軌切換維度</div>
            <div class="realm-picker-container" id="picker-container"></div>
            <button id="theory-btn" onclick="openTheoryDrawer()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                探究華藏法義
            </button>
        </div>
    </section>

    <div id="theory-drawer">
        <div class="drawer-header" onclick="closeTheoryDrawer()"><div class="close-bar"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding: 0 5px;">
                <div style="color:var(--cyan); font-size:0.85rem; letter-spacing:2px; font-weight:bold; cursor:pointer;" onclick="closeTheoryDrawer()">收起法卷</div>
                <div id="tts-btn" onclick="event.stopPropagation(); toggleTheoryAudio()" style="color:var(--gold); font-size:0.85rem; font-weight:bold; cursor:pointer; display:flex; align-items:center; gap:6px; background:rgba(212,175,55,0.15); padding: 6px 12px; border-radius:20px; border: 1px solid rgba(212,175,55,0.4);">
                    <svg id="tts-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                    <span id="tts-text">聆聽法音</span>
                </div>
            </div>
        </div>
        <div class="theory-container" id="theory-content-box">
            <h1 class="main-title" id="theory-title">華藏大世界</h1>
            <p class="paragraph" id="theory-desc">載入中...</p>
        </div>
    </div>

<script>
    // ================= 1. 20重法界資料庫 =================
    const RealmMatrix = [
        { id: 1, name: "最勝光曜", buddha: "微塵數諸佛", shape: "廣大", theme: "gold", desc: "布滿金剛與摩尼寶光。" },
        { id: 2, name: "種種香蓮華妙莊嚴", buddha: "普照十方熾然光明佛", shape: "蓮華", theme: "cyan", desc: "由各種妙香與摩尼寶所組成。" },
        { id: 3, name: "一切寶莊嚴普照光", buddha: "師子吼雲音佛", shape: "寶月", theme: "silver", desc: "光明遍照一切法界。" },
        { id: 4, name: "種種光明華莊嚴", buddha: "普照法界虛空雲佛", shape: "種種華", theme: "gold", desc: "有無量色彩的光明網。" },
        { id: 5, name: "普放妙華光", buddha: "普喜無量功德佛", shape: "摩尼王", theme: "cyan", desc: "常放妙華光雲。" },
        { id: 6, name: "淨妙光明", buddha: "無垢功德遍照佛", shape: "寶壇", theme: "silver", desc: "清淨無礙的光明之海。" },
        { id: 7, name: "眾華莊嚴", buddha: "華雲幢佛", shape: "華旋", theme: "cyan", desc: "由無量華雲重重圍繞。" },
        { id: 8, name: "出生威德", buddha: "清淨日光明佛", shape: "半月", theme: "gold", desc: "出生一切威德之光。" },
        { id: 9, name: "出妙音聲", buddha: "師子光佛", shape: "梵篋", theme: "gold", desc: "常演說微妙清淨法音。" },
        { id: 10, name: "金剛幢", buddha: "普照法界金剛雲佛", shape: "金剛幢", theme: "silver", desc: "堅固不可摧毀。" },
        { id: 11, name: "恆出帝青寶光明", buddha: "福德雲大海佛", shape: "帝青寶", theme: "cyan", desc: "恆現深藍色寶光。" },
        { id: 12, name: "光明照曜", buddha: "清淨華雲佛", shape: "寶冠", theme: "gold", desc: "光明層疊交織。" },
        { id: 13, name: "娑婆與極樂", buddha: "毗盧遮那如來", shape: "平正", theme: "cyan", desc: "唯一混合痛苦與覺醒的層級。" },
        { id: 14, name: "寂靜功德", buddha: "遍法界勝音佛", shape: "寶帶", theme: "silver", desc: "功德力使一切寂靜。" },
        { id: 15, name: "光明普照", buddha: "普照法界法海雲佛", shape: "蓮華", theme: "gold", desc: "無量光明普照一切。" },
        { id: 16, name: "妙圓滿光明", buddha: "普勝智光明佛", shape: "圓滿", theme: "cyan", desc: "一切圓滿無缺。" },
        { id: 17, name: "眾妙清淨光明", buddha: "普照法界智雲佛", shape: "妙好", theme: "fire", desc: "清淨無染。" },
        { id: 18, name: "色相大光明", buddha: "普門光明雲佛", shape: "摩尼網", theme: "silver", desc: "呈現一切色相。" },
        { id: 19, name: "普照法界", buddha: "普照虛空智光明佛", shape: "法界", theme: "gold", desc: "智慧光明遍及。" },
        { id: 20, name: "妙寶燄", buddha: "福德普勝智光明佛", shape: "寶燄", theme: "fire", desc: "最上層，光芒如寶燄。" }
    ];

    let currentRealmIndex = 12; // 預設第13重 (Index 12)

    // ================= 2. UI 導航 =================
    const pickerContainer = document.getElementById('picker-container');
    function initPicker() {
        RealmMatrix.forEach((realm, index) => {
            let btn = document.createElement('div');
            btn.className = `realm-item ${realm.theme}-mode`;
            btn.id = `picker-${index}`;
            btn.innerHTML = `<span class="r-num">TIER ${realm.id}</span><span>${realm.name}</span>`;
            btn.onclick = () => { selectRealm(index); btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); };
            pickerContainer.appendChild(btn);
        });
    }

    function selectRealm(index) {
        if(currentRealmIndex === index && document.getElementById(`picker-${index}`).classList.contains('active')) return;
        currentRealmIndex = index;
        let data = RealmMatrix[index];

        document.querySelectorAll('.realm-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`picker-${index}`).classList.add('active');

        document.getElementById('s-title').innerText = `第${data.id}重 ． ${data.name}`;
        document.getElementById('s-buddha').innerText = `[教主] ${data.buddha}`;
        document.getElementById('s-shape').innerText = `形狀：${data.shape}`;
        document.getElementById('s-desc').innerHTML = data.desc;
        document.getElementById('theory-title').innerText = `第${data.id}重 ． ${data.name}`;
        document.getElementById('theory-desc').innerHTML = `本層為華藏世界海之第${data.id}重。<br><br>【教主】${data.buddha}<br>【國土形狀】呈現${data.shape}之相。<br>【法界體性】${data.desc}`;

        let baseColor = data.theme === 'gold' ? '#f3e5ab' : (data.theme === 'cyan' ? '#8ba89c' : (data.theme === 'silver' ? '#e0e0e0' : '#ff8a8a'));
        let borderColor = data.theme === 'gold' ? 'rgba(212,175,55,0.8)' : (data.theme === 'cyan' ? 'rgba(139,168,156,0.8)' : (data.theme === 'silver' ? 'rgba(224,224,224,0.8)' : 'rgba(168,50,50,0.8)'));
        
        document.getElementById('s-title').style.color = baseColor; 
        document.getElementById('s-shape').style.color = baseColor; 
        document.getElementById('s-shape').style.borderColor = baseColor;
        document.getElementById('status-panel').style.borderLeftColor = borderColor;

        angleX = 0.3; angleY = 0; 
        initParticleEngines(); 
    }

    // ================= 3. 3D 核心與 20 重幾何生成 =================
    const canvas = document.getElementById('realmCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, time = 0, stars = [], realmParticles = [];
    let angleX = 0.3, angleY = 0, isDragging = false, lastMouseX = 0, lastMouseY = 0;
    const FOV = 400; 

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();

    function project3D(x, y, z) {
        let cosX = Math.cos(angleX), sinX = Math.sin(angleX), cosY = Math.cos(angleY), sinY = Math.sin(angleY);
        let y1 = y*cosX - z*sinX, z1 = y*sinX + z*cosX;
        let x2 = x*cosY - z1*sinY, z2 = x*sinY + z1*cosY;
        if(z2 < -FOV+50) return null;
        let scale = FOV / (FOV + z2 + 100); 
        return { px: (width/2) + x2*scale, py: (height/2) - y1*scale - 50, scale: scale, pz: z2 };
    }

    // 💡 確保所有粒子只使用 p.x, p.y, p.z 儲存基礎座標，不再混用 baseX！
    function initParticleEngines() {
        if(stars.length === 0) {
            for (let i = 0; i < 500; i++) stars.push({ x: (Math.random()-0.5)*3000, y: (Math.random()-0.5)*3000, z: Math.random()*2000, speed: Math.random()*2+0.5, color: Math.random()>0.5 ? '#8ba89c' : '#f3e5ab', size: Math.random()*1.5 + 0.5 });
        }
        realmParticles = [];
        let id = RealmMatrix[currentRealmIndex].id;

        if (id === 1) { // 1. 廣大寶網 (斐波那契球)
            let N = 800, R = 180, goldenAngle = Math.PI * (3 - Math.sqrt(5)); 
            for(let i=0; i<N; i++) {
                let y = 1 - (i / (N - 1)) * 2, radius = Math.sqrt(1 - y*y), theta = goldenAngle * i;
                realmParticles.push({ x: Math.cos(theta)*radius*R, y: y*R, z: Math.sin(theta)*radius*R, seed: Math.random()*Math.PI*2, type: 'mani' });
            }
        }
        else if (id === 2) { // 2. 香蓮華
            for (let l = 0; l < 4; l++) {
                let pCount = [6, 8, 10, 12][l], rOut = 40 + l * 25, hUp = 20 + l * 20;  
                for (let p = 0; p < pCount; p++) {
                    let aC = (Math.PI * 2 / pCount) * p + (l * 0.3); 
                    for (let t = 0; t <= 1; t += 0.1) { 
                        for (let w = -1; w <= 1; w += 0.4) { 
                            let pW = Math.sin(t * Math.PI) * (15 + l * 5), cR = t * rOut, cY = -t * hUp + (w * w * 12); 
                            realmParticles.push({ x: cR * Math.cos(aC) - (w * pW) * Math.sin(aC), y: cY + 40, z: cR * Math.sin(aC) + (w * pW) * Math.cos(aC), type: 'lotus', l: l, t: t });
                        }
                    }
                }
            }
            for(let i=0; i<300; i++) realmParticles.push({ x: (Math.random()-0.5)*300, y: Math.random()*200-50, z: (Math.random()-0.5)*300, type: 'aroma', sy: Math.random()*0.8+0.3, seed: Math.random()*Math.PI*2 });
        }
        else if (id === 3) { // 3. 寶月 (全息網格)
            for(let b = 1; b < 16; b++) {
                let phi = (Math.PI / 16) * b;
                for(let s = 0; s < 32; s++) {
                    let theta = (Math.PI * 2 / 32) * s;
                    realmParticles.push({ x: 130 * Math.sin(phi) * Math.cos(theta), y: 130 * Math.cos(phi), z: 130 * Math.sin(phi) * Math.sin(theta), theta: theta, phi: phi, type: 'grid' });
                }
            }
            for(let i = 0; i < 150; i++) {
                let t = Math.random() * Math.PI * 2, p = Math.acos((Math.random() * 2) - 1), r = Math.random() * 50; 
                realmParticles.push({ x: r*Math.sin(p)*Math.cos(t), y: r*Math.cos(p), z: r*Math.sin(p)*Math.sin(t), speed: Math.random()*0.05+0.02, type: 'core' });
            }
        }
        else if (id === 4) { // 4. 光明華網
            for(let l = 1; l <= 6; l++) {
                let rL = l * 25, yO = Math.sin(l * 0.5) * 20;
                for(let p = 0; p < 12; p++) {
                    let ang = (Math.PI * 2 / 12) * p + (l * 0.2); 
                    for(let t = 0; t <= 1; t += 0.15) { 
                        realmParticles.push({ x: rL * t * Math.cos(ang), y: yO * t - (t * t * 40), z: rL * t * Math.sin(ang), l: l, p: p, t: t, type: 'net' });
                    }
                }
            }
        }
        else if (id === 5) { // 5. 摩尼王 (尖銳有機球)
            for(let i=0; i<800; i++) {
                let t = Math.random() * Math.PI * 2, p = Math.acos((Math.random() * 2) - 1);
                let r = 110 + 30 * Math.sin(t * 4) * Math.cos(p * 4); // 尖刺感
                realmParticles.push({ x: r*Math.sin(p)*Math.cos(t), y: r*Math.cos(p), z: r*Math.sin(p)*Math.sin(t), seed: Math.random()*Math.PI*2 });
            }
        }
        else if (id === 6) { // 6. 寶壇 (同心立體階梯)
            for(let l=0; l<6; l++) {
                let r = 140 - l*20, y = l*25 - 50;
                for(let i=0; i<120; i++) {
                    let a = (i/120)*Math.PI*2;
                    realmParticles.push({ x: r*Math.cos(a), y: y, z: r*Math.sin(a), l: l });
                }
            }
        }
        else if (id === 7) { // 7. 華旋 (壯闊雙螺旋星系)
            for(let i=0; i<1200; i++) {
                let t = i / 1200, a = t * Math.PI * 15, r = t * 160;
                // 兩條螺旋臂
                realmParticles.push({ x: r*Math.cos(a), y: (Math.random()-0.5)*30, z: r*Math.sin(a), type:'arm1' });
                realmParticles.push({ x: r*Math.cos(a+Math.PI), y: (Math.random()-0.5)*30, z: r*Math.sin(a+Math.PI), type:'arm2' });
            }
        }
        else if (id === 8) { // 8. 半月 (切面發光半球)
            for(let i=0; i<600; i++) {
                let t = Math.random() * Math.PI, p = Math.acos((Math.random() * 2) - 1);
                realmParticles.push({ x: 140*Math.sin(p)*Math.cos(t), y: 140*Math.sin(p)*Math.sin(t), z: 140*Math.cos(p) });
            }
        }
        else if (id === 9) { // 9. 梵篋 (長方體音匣)
            let w = 120, h = 40, d = 160; 
            for(let x = -w; x <= w; x += 15) {
                for(let y = -h; y <= h; y += 15) {
                    for(let z = -d; z <= d; z += 15) {
                        if(Math.abs(x) === w || Math.abs(y) === h || Math.abs(z) === d) realmParticles.push({ x, y, z });
                    }
                }
            }
        }
        else if (id === 10) { // 10. 金剛幢 (銳利六角柱)
            for(let y = -150; y <= 150; y += 10) {
                for(let s = 0; s <= 6; s++) {
                    let a = (s / 6) * Math.PI * 2;
                    realmParticles.push({ x: 60 * Math.cos(a), y: y, z: 60 * Math.sin(a) });
                }
            }
        }
        else if (id === 11) { // 11. 帝青寶 (八面結晶體)
            for(let i=0; i<800; i++) {
                let t = Math.random()*Math.PI*2, p = Math.random()*Math.PI;
                let x = 140 * Math.pow(Math.abs(Math.cos(p)), 0.5) * Math.sign(Math.cos(p)) * Math.cos(t);
                let y = 140 * Math.pow(Math.abs(Math.sin(p)), 0.5) * Math.sign(Math.sin(p)) * Math.sin(t);
                realmParticles.push({ x, y, z: 140*Math.cos(t) });
            }
        }
        else if (id === 12) { // 12. 寶冠 (交織皇冠網)
            for(let i=0; i<800; i++) {
                let t = i/800, a = t * Math.PI * 2, r = 100 + Math.sin(t * 12) * 30;
                realmParticles.push({ x: r*Math.cos(a), y: Math.cos(t*12)*40 - 40, z: r*Math.sin(a) });
            }
        }
        else if (id === 13) { // 13. 娑婆極樂雙星
            for(let i = 0; i < 300; i++) {
                let t = Math.random() * Math.PI * 2, p = Math.acos(Math.random()*2 - 1), r = Math.random() * 50 + 10;
                realmParticles.push({ x: r*Math.sin(p)*Math.cos(t), y: r*Math.cos(p), z: r*Math.sin(p)*Math.sin(t), s: Math.random()*2+1, type: 'saha' });
                t = Math.random() * Math.PI * 2; p = Math.acos(Math.random()*2 - 1); r = Math.random() * 50 + 10;
                realmParticles.push({ x: r*Math.sin(p)*Math.cos(t), y: r*Math.cos(p), z: r*Math.sin(p)*Math.sin(t), s: Math.random()*2+1, type: 'pure' });
            }
        }
        else if (id === 14) { // 14. 寶帶 (莫比烏斯環)
            for(let i=0; i<800; i++) {
                let t = (i/800) * Math.PI * 2;
                let x = (100 + 40 * Math.cos(t/2)) * Math.cos(t);
                let y = (100 + 40 * Math.cos(t/2)) * Math.sin(t);
                realmParticles.push({ x, y, z: 40 * Math.sin(t/2) });
            }
        }
        else if (id === 15) { // 15. 光明普照 (極速放射狀)
            for(let i=0; i<1000; i++) {
                let t = Math.random()*Math.PI*2, p = Math.acos((Math.random() * 2) - 1);
                realmParticles.push({ x: Math.sin(p)*Math.cos(t), y: Math.cos(p), z: Math.sin(p)*Math.sin(t), rMax: Math.random()*200 });
            }
        }
        else if (id === 16) { // 16. 妙圓滿 (絕對完美的靜態球點)
            for(let i=0; i<1000; i++) {
                let p = Math.acos(1 - 2*i/1000), t = Math.PI * (1 + Math.sqrt(5)) * i;
                realmParticles.push({ x: 140*Math.sin(p)*Math.cos(t), y: 140*Math.cos(p), z: 140*Math.sin(p)*Math.sin(t) });
            }
        }
        else if (id === 17) { // 17. 眾妙清淨 (三個正交立體圓環)
            for(let i=0; i<300; i++) {
                let a = (i/300)*Math.PI*2;
                realmParticles.push({ x: 130*Math.cos(a), y: 130*Math.sin(a), z: 0 }); // X-Y
                realmParticles.push({ x: 130*Math.cos(a), y: 0, z: 130*Math.sin(a) }); // X-Z
                realmParticles.push({ x: 0, y: 130*Math.cos(a), z: 130*Math.sin(a) }); // Y-Z
            }
        }
        else if (id === 18) { // 18. 色相摩尼網 (3D隨機晶格)
            for(let i=0; i<800; i++) {
                realmParticles.push({ x: (Math.random()-0.5)*260, y: (Math.random()-0.5)*260, z: (Math.random()-0.5)*260, hue: Math.random()*360 });
            }
        }
        else if (id === 19) { // 19. 普照法界 (立體圓環 Torus)
            for(let i=0; i<800; i++) {
                let u = Math.random()*Math.PI*2, v = Math.random()*Math.PI*2;
                let x = (100 + 40*Math.cos(v)) * Math.cos(u), y = (100 + 40*Math.cos(v)) * Math.sin(u);
                realmParticles.push({ x, y, z: 40 * Math.sin(v) });
            }
        }
        else if (id === 20) { // 20. 妙寶燄 (有機火光與穿梭生物)
            for(let i=0; i<1200; i++) {
                let t = Math.random()*Math.PI*2, p = Math.acos((Math.random()*2)-1);
                let noise = Math.sin(t*6)*20 + Math.cos(p*4)*25;
                let isC = Math.random()>0.85; 
                realmParticles.push({ x: 0, y: 0, z: 0, baseR: 80+noise+Math.random()*15, t: t, p: p, isC: isC, oS: isC?Math.random()*0.08+0.03:0, hue: 30+Math.random()*40, s: isC?Math.random()*3+2:Math.random()*1.5+0.5 });
            }
        }
    }

    // ================= 4. 全局物理變換與光影渲染 =================
    function renderWorld() {
        let projected = [];
        let data = RealmMatrix[currentRealmIndex];
        let id = data.id;
        
        let baseR = data.theme === 'gold' ? 243 : (data.theme === 'cyan' ? 139 : (data.theme === 'silver' ? 224 : 255));
        let baseG = data.theme === 'gold' ? 229 : (data.theme === 'cyan' ? 168 : (data.theme === 'silver' ? 224 : 100));
        let baseB = data.theme === 'gold' ? 171 : (data.theme === 'cyan' ? 156 : (data.theme === 'silver' ? 224 : 100));
        let glowHex = data.theme === 'gold' ? '#d4af37' : (data.theme === 'cyan' ? '#8ba89c' : (data.theme === 'silver' ? '#e0e0e0' : '#ff5555'));

        if(!isDragging && id !== 9 && id !== 13) angleY += 0.003; 
        if(!isDragging && id === 9) { angleY += 0.005; angleX = Math.sin(time*0.5)*0.3; } // 箱子翻轉

        realmParticles.forEach(p => {
            let wx = p.x, wy = p.y, wz = p.z;
            let a = 0.6, c = `rgba(${baseR},${baseG},${baseB},`, s = 1.5, glowC = glowHex, isGlow = true;

            // 🌟 每個世界的專屬時間變換矩陣 🌟
            if (id === 1) {
                let breath = 1 + Math.sin(time*1.5 + p.seed)*0.03;
                wx *= breath; wy *= breath; wz *= breath;
                let isBright = Math.sin(time*4 + p.seed) > 0.85; 
                a = isBright ? 0.95 : 0.3; c = isBright ? 'rgba(255,255,255,' : c; glowC = isBright ? '#fff' : glowC; isGlow = isBright; s = isBright ? 2.5 : 1.2;
            }
            else if (id === 2) {
                if (p.type === 'lotus') {
                    let breath = 1 + Math.sin(time*2 + p.l)*0.06*p.t;
                    wx *= breath; wy += Math.sin(time*1.5)*5; wz *= breath;
                    a = 0.15 + (p.t*0.6); isGlow = p.t > 0.8; s = 1.2;
                } else {
                    wy -= p.sy; if (wy < -200) wy = 150; p.y = wy; // 更新粒子高度
                    wx += Math.sin(wy*0.02 + time + p.seed)*20; wz += Math.cos(wy*0.02 + time + p.seed)*20;
                    a = (Math.sin(time*3 + p.seed)+1)/2 * 0.7; c = 'rgba(243,229,171,'; glowC = '#f3e5ab'; s = 2.0;
                }
            }
            else if (id === 3) {
                if (p.type === 'grid') {
                    let wave = 1 + Math.sin(time*3 + p.theta*4 + p.phi*2)*0.05;
                    wx *= wave; wy *= wave; wz *= wave; a = 0.2 + Math.sin(p.phi)*0.7; s = 1.5;
                } else {
                    let pulseR = 1 + Math.sin(time*5 + p.speed*100)*0.5; let rotA = time * p.speed * 10;
                    wx = (p.x*Math.cos(rotA) - p.z*Math.sin(rotA)) * pulseR;
                    wz = (p.x*Math.sin(rotA) + p.z*Math.cos(rotA)) * pulseR;
                    wy *= pulseR; a = 0.9; c = 'rgba(255,255,255,'; glowC = '#fff'; s = 2.5;
                }
            }
            else if (id === 4) {
                let breath = 1 + Math.sin(time*2 + p.l)*0.1;
                wx *= breath; wy *= breath; wz *= breath;
                let hue = (p.l*40 + p.p*20 + time*30) % 360;
                a = 0.3 + p.t*0.6; c = `hsla(${hue}, 80%, 60%,`; glowC = `hsl(${hue}, 80%, 60%)`; s = 1.8;
            }
            else if (id === 5) {
                let breath = 1 + Math.sin(time*3 + p.seed)*0.05;
                wx *= breath; wy *= breath; wz *= breath; a = 0.7; s = 2;
            }
            else if (id === 6) {
                let rot = time * (p.l % 2 === 0 ? 0.5 : -0.5); // 不同層反向旋轉
                wx = p.x*Math.cos(rot) - p.z*Math.sin(rot);
                wz = p.x*Math.sin(rot) + p.z*Math.cos(rot);
                a = 0.5 + (5-p.l)*0.1; s = 2;
            }
            else if (id === 7) {
                let rot = time * 2; // 星系整體高速旋轉
                wx = p.x*Math.cos(rot) - p.z*Math.sin(rot);
                wz = p.x*Math.sin(rot) + p.z*Math.cos(rot);
                let hue = p.type === 'arm1' ? 180 : 30; // 藍金雙旋
                c = `hsla(${hue}, 80%, 60%,`; glowC = `hsl(${hue}, 80%, 60%)`; a = 0.6; s = 1.5;
            }
            else if (id === 8 || id === 10 || id === 11 || id === 12 || id === 16 || id === 17 || id === 19) {
                let breath = 1 + Math.sin(time*2)*0.05; 
                wx *= breath; wy *= breath; wz *= breath; a = 0.7;
            }
            else if (id === 9) {
                let wave = Math.sin(p.x*0.05 + time*3)*Math.cos(p.z*0.05 + time*2)*15;
                wy += (Math.abs(p.y) < 40 ? wave : 0); a = 0.6;
            }
            else if (id === 13) {
                let ob = time * 0.8;
                let cx = 120 * Math.cos(p.type==='saha' ? ob : ob+Math.PI);
                let cz = 120 * Math.sin(p.type==='saha' ? ob : ob+Math.PI);
                wx += cx; wy += Math.sin(time*2 + (p.type==='saha'?0:Math.PI))*20; wz += cz;
                a = p.type==='saha' ? 0.8 : 0.9; c = p.type==='saha'?'rgba(139,168,156,':'rgba(243,229,171,'; 
                glowC = p.type==='saha'?'#8ba89c':'#d4af37'; s = p.s;
            }
            else if (id === 14) {
                // 讓莫比烏斯環像絲帶一樣流動
                wx = (100 + 40*Math.cos(p.x/10 + time*2))*Math.cos(p.x/10);
                wy = (100 + 40*Math.cos(p.x/10 + time*2))*Math.sin(p.x/10);
                wz = 40*Math.sin(p.x/10 + time*2);
            }
            else if (id === 15) {
                let pulse = (time * 80 + p.rMax) % 200; let ratio = pulse / 200;
                wx *= ratio; wy *= ratio; wz *= ratio; a = 1 - ratio; s = 2;
            }
            else if (id === 18) {
                let hue = (p.hue + time * 50) % 360;
                c = `hsla(${hue}, 70%, 60%,`; glowC = `hsl(${hue}, 70%, 60%)`; a = 0.6; s = 2.5;
            }
            else if (id === 20) {
                if(p.isC) { p.t += p.oS; p.p += p.oS * 0.5; }
                let breath = 1 + Math.sin(time*3 + p.t)*0.1; let r = p.baseR * breath;
                wx = r*Math.sin(p.p)*Math.cos(p.t); wy = r*Math.cos(p.p) - 20; wz = r*Math.sin(p.p)*Math.sin(p.t);
                a = p.isC ? 0.95 : 0.4 + Math.sin(time*5 + p.t)*0.3;
                let hue = p.isC ? 60 : p.hue; let lgt = p.isC ? 80 : 60;
                c = `hsla(${hue}, 100%, ${lgt}%,`; glowC = `hsl(${hue}, 100%, ${lgt}%)`; s = p.s;
            }

            // --- 統一投影與收集 ---
            let proj = project3D(wx, wy, wz);
            if(proj) {
                projected.push({ x: proj.px, y: proj.py, z: proj.pz, sc: proj.scale, a: a, c: c, s: s, isGlow: isGlow, glowC: glowC });
            }
        });

        // 第 13 重補畫中央連結光柱
        if(id === 13) {
            let cx1 = 120*Math.cos(time*0.8), cz1 = 120*Math.sin(time*0.8);
            let cx2 = 120*Math.cos(time*0.8+Math.PI), cz2 = 120*Math.sin(time*0.8+Math.PI);
            let p1 = project3D(cx1, Math.sin(time*2)*20, cz1); let p2 = project3D(cx2, Math.sin(time*2+Math.PI)*20, cz2);
            if(p1 && p2) { ctx.beginPath(); ctx.moveTo(p1.px, p1.py); ctx.lineTo(p2.px, p2.py); ctx.strokeStyle = `rgba(212,175,55,0.2)`; ctx.lineWidth = 2*p1.scale; ctx.stroke(); }
        }

        // --- 統一渲染輸出 ---
        projected.sort((a,b) => b.z - a.z);
        ctx.globalCompositeOperation = 'screen';
        projected.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s * p.sc, 0, Math.PI*2);
            ctx.fillStyle = p.c.includes('hsla') ? p.c + p.a + ')' : p.c + p.a + ')';
            if(p.isGlow) { ctx.shadowBlur = 10 * p.sc; ctx.shadowColor = p.glowC; } else { ctx.shadowBlur = 0; }
            ctx.fill();
        });
        ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';
    }

    function animate() {
        ctx.fillStyle = 'rgba(1, 1, 3, 0.6)';
        ctx.fillRect(0, 0, width, height);
        time += 0.015;

        ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= s.speed; if (s.z <= 0) { s.z = 2000; s.x = (Math.random()-0.5)*3000; s.y = (Math.random()-0.5)*3000; }
            let sc = FOV / (FOV + s.z); let sx = (width/2) + s.x*sc; let sy = (height/2) + s.y*sc - 50;
            ctx.beginPath(); ctx.arc(sx, sy, Math.max(0.1, s.size*sc), 0, Math.PI*2);
            ctx.fillStyle = s.color === '#f3e5ab' ? `rgba(243,229,171, ${Math.min(1, sc*2)})` : `rgba(139,168,156, ${Math.min(1, sc*2)})`; ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over';

        renderWorld();
        requestAnimationFrame(animate);
    }

    // 觸控與語音模組 (保持不變)
    function onDown(e) { if(e.target.closest('.ui-layer') || e.target.closest('#theory-drawer')) return; isDragging = true; lastMouseX = e.touches?e.touches[0].clientX:e.clientX; lastMouseY = e.touches?e.touches[0].clientY:e.clientY; }
    function onMove(e) { if (!isDragging) return; let curX = e.touches?e.touches[0].clientX:e.clientX; let curY = e.touches?e.touches[0].clientY:e.clientY; angleY += (curX-lastMouseX)*0.01; angleX += (curY-lastMouseY)*0.01; angleX = Math.max(-Math.PI/2, Math.min(Math.PI/2, angleX)); lastMouseX=curX; lastMouseY=curY; }
    function onUp() { isDragging = false; }
    canvas.addEventListener('pointerdown', onDown); canvas.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp); canvas.addEventListener('pointercancel', onUp);
    
    function openTheoryDrawer() { document.getElementById('theory-drawer').classList.add('open'); }
    function closeTheoryDrawer() { document.getElementById('theory-drawer').classList.remove('open'); }
    document.getElementById('theory-drawer').addEventListener('pointerdown', (e) => e.stopPropagation());
    
    let isPlayingTheory = false; let theoryUtterance = null; window.sysUtterances = []; 
    function toggleTheoryAudio() {
        if (!window.speechSynthesis) return; const btnText = document.getElementById('tts-text'), btnIcon = document.getElementById('tts-icon');
        if (isPlayingTheory) { window.speechSynthesis.cancel(); isPlayingTheory = false; btnText.innerText = "聆聽法音"; btnIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>';
        } else {
            let textToRead = Array.from(document.querySelectorAll('#theory-content-box .main-title, #theory-content-box .paragraph')).map(n => n.textContent.trim()).join('。');
            let isAndroid = /Android/i.test(navigator.userAgent); textToRead = isAndroid ? textToRead : textToRead.replace(/阿/g, 'ㄚ');
            theoryUtterance = new SpeechSynthesisUtterance(textToRead); theoryUtterance.lang = 'zh-TW'; theoryUtterance.rate = 0.85; 
            if (isAndroid) { window.sysUtterances.push(theoryUtterance); let voices = window.speechSynthesis.getVoices(); if (voices.length > 0) { let zhVoice = voices.find(v => v.lang === 'zh-TW' && v.name.includes('Google')) || voices.find(v => v.lang.includes('zh')); if (zhVoice) theoryUtterance.voice = zhVoice; } }
            theoryUtterance.onend = () => { isPlayingTheory = false; btnText.innerText = "聆聽法音"; btnIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>'; if(isAndroid) window.sysUtterances = window.sysUtterances.filter(u => u !== theoryUtterance); };
            setTimeout(() => { window.speechSynthesis.speak(theoryUtterance); }, isAndroid ? 150 : 50); isPlayingTheory = true; btnText.innerText = "停止聆聽"; btnIcon.innerHTML = '<rect x="6" y="6" width="12" height="12"></rect>';
        }
    }
    const originalCloseTheoryDrawer = closeTheoryDrawer; closeTheoryDrawer = function() { if (isPlayingTheory) toggleTheoryAudio(); originalCloseTheoryDrawer(); }

    // 啟動
    initPicker(); selectRealm(currentRealmIndex); 
    setTimeout(() => { document.getElementById(`picker-${currentRealmIndex}`).scrollIntoView({ inline: 'center' }); }, 100);
    animate();
</script>
