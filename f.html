<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏法性引擎 ． 第九層 3D 立體版</title>
    <style>
        :root { 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
            --bg-deep: #010103; 
        }
        body { 
            margin: 0; background: var(--bg-deep); color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            overflow: hidden; touch-action: none;
        }

        /* 3D 宇宙容器 */
        #universe {
            position: absolute; inset: 0;
            display: flex; justify-content: center; align-items: center;
            perspective: 1200px; /* 創造景深 */
        }

        /* 3D 場景樞紐 */
        #scene-3d {
            position: relative; width: 0; height: 0;
            transform-style: preserve-3d;
            transform: rotateX(60deg) rotateZ(0deg); /* 初始俯角 */
        }

        /* 每一層音波的 3D 定位層 */
        .wave-layer {
            position: absolute;
            top: -150px; left: -150px;
            width: 300px; height: 300px;
            transform-style: preserve-3d;
        }

        svg { width: 100%; height: 100%; overflow: visible; }

        .info { 
            position: absolute; bottom: 10%; width: 100%; 
            text-align: center; letter-spacing: 2px; pointer-events: none;
        }
        .title { color: var(--gold); font-size: 1.2rem; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .desc { font-size: 0.85rem; color: var(--cyan); margin-top: 8px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="universe">
        <div id="scene-3d">
            </div>
    </div>
    
    <div class="info">
        <div class="title">第九重 ． 妙音聲世界 (3D 立體態)</div>
        <div class="desc">Z軸堆疊 ‧ 空間聲波矩陣 ‧ 任意旋轉視角</div>
    </div>

    <script>
        const Engine3D = (() => {
            const HANDRAWN_ENTROPY = 0.5; 

            const generatePath = (points) => {
                if (!points || points.length === 0) return "";
                let d = `M ${points[0].x},${points[0].y}`;
                for (let i = 1; i < points.length; i++) {
                    const hdx = (Math.random() - 0.5) * HANDRAWN_ENTROPY;
                    const hdy = (Math.random() - 0.5) * HANDRAWN_ENTROPY;
                    d += ` L ${points[i].x + hdx},${points[i].y + hdy}`;
                }
                d += " Z";
                return d;
            };

            // 在 3D 空間中建立立體的波形塔
            const build3DSoundMandala = (container) => {
                const center = 150; 
                const segments = 180; 
                const layersCount = 12; // Z軸總共疊加 12 層

                for (let layer = 0; layer < layersCount; layer++) {
                    // 計算每一層在 Z 軸的高度 (由下往上)
                    const zHeight = layer * 15; 
                    
                    // 計算每一層的基礎半徑 (形成一個類似塔或水滴的立體輪廓)
                    // 使用 Math.sin 創造出中間寬、上下窄的立體弧線
                    const progress = layer / (layersCount - 1); // 0 到 1
                    const baseRadius = 100 * Math.sin(progress * Math.PI) + 20; 

                    const pathData = [];
                    // 隨 Z 軸高度變化的頻率與振幅，讓音波有「向上盤旋」的立體錯覺
                    const f1 = 8; 
                    const a1 = 10 * Math.sin(progress * Math.PI); 
                    const f2 = 24; 
                    const a2 = 2;

                    for (let i = 0; i < segments; i++) {
                        // 讓每一層稍微錯開一個角度，形成螺旋上升的 3D 感
                        const angleOffset = layer * 0.15; 
                        const angle = (Math.PI * 2 / segments) * i;
                        
                        let r = baseRadius + a1 * Math.sin(f1 * (angle + angleOffset)) + a2 * Math.sin(f2 * angle);
                        const x = center + r * Math.cos(angle);
                        const y = center + r * Math.sin(angle);
                        pathData.push({ x, y });
                    }

                    const pathD = generatePath(pathData);

                    // 建立 3D 層容器
                    const divLayer = document.createElement('div');
                    divLayer.className = 'wave-layer';
                    // ✨ 關鍵：使用 translateZ 將這一層推入 3D 空間 ✨
                    divLayer.style.transform = `translateZ(${zHeight}px)`;

                    // 越往上，顏色越亮，模擬頂部發光
                    const opacity = 0.3 + (layer / layersCount) * 0.6;
                    
                    divLayer.innerHTML = `
                        <svg viewBox="0 0 300 300">
                            <defs>
                                <filter id="glow-${layer}"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                            </defs>
                            <path d="${pathD}" fill="rgba(212,175,55,0.03)" />
                            <path d="${pathD}" fill="none" stroke="rgba(243,229,171,${opacity})" stroke-width="1" filter="url(#glow-${layer})"/>
                        </svg>
                    `;
                    container.appendChild(divLayer);
                }

                // 塔頂加上一顆發光的摩尼珠
                const topJewel = document.createElement('div');
                topJewel.className = 'wave-layer';
                topJewel.style.transform = `translateZ(${layersCount * 15 + 10}px)`;
                topJewel.innerHTML = `<svg viewBox="0 0 300 300"><circle cx="150" cy="150" r="4" fill="#fff" filter="drop-shadow(0 0 10px #fff)"/></svg>`;
                container.appendChild(topJewel);
            };

            return { build3D: build3DSoundMandala };
        })();

        // 初始化
        const scene = document.getElementById('scene-3d');
        Engine3D.build3D(scene);

        // ---------------- 3D 全息滑動互動 ----------------
        let isDragging = false; 
        let startX, startY;
        let rotZ = 0; 
        let rotX = 60; // 初始俯視角度

        // 自動緩慢自轉
        function animate() {
            if (!isDragging) {
                rotZ += 0.2;
                scene.style.transform = `rotateX(${rotX}deg) rotateZ(${rotZ}deg)`;
            }
            requestAnimationFrame(animate);
        }
        animate();

        document.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX || e.touches[0].clientX;
            startY = e.clientY || e.touches[0].clientY;
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            let dx = x - startX; 
            let dy = y - startY;

            rotZ += dx * 0.5; // 水平滑動控制 Z 軸旋轉
            rotX -= dy * 0.5; // 垂直滑動控制 X 軸俯仰

            // 限制俯仰角度，避免翻轉過頭
            if (rotX > 85) rotX = 85; 
            if (rotX < 10) rotX = 10; 

            scene.style.transform = `rotateX(${rotX}deg) rotateZ(${rotZ}deg)`;
            
            startX = x; 
            startY = y;
        });

        document.addEventListener('pointerup', () => { isDragging = false; });
        document.addEventListener('pointercancel', () => { isDragging = false; });

    </script>
</body>
</html>
