<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>菩提淨室 ‧ 一億聲法相圖鑑</title>
    <style>
        body { background: #010103; color: #fff; font-family: "PingFang TC", sans-serif; padding: 30px; display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; }
        .header-title { width: 100%; text-align: center; color: #d4af37; font-size: 24px; letter-spacing: 5px; margin-bottom: 20px; font-weight: bold; }
        .card { background: #111; border: 1px solid rgba(212,175,55,0.3); border-radius: 18px; padding: 20px; width: 240px; text-align: center; display: flex; flex-direction: column; align-items: center; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }
        .stage { width: 200px; height: 200px; display: flex; justify-content: center; align-items: center; position: relative; margin-bottom: 15px; }
        .seed { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px #fff; z-index: 10; }
        .title { color: #d4af37; font-size: 18px; font-weight: bold; margin-bottom: 8px; letter-spacing: 2px; }
        .pts { color: #9fdfc8; font-size: 13px; letter-spacing: 1px; }
        .desc { color: #888; font-size: 11px; margin-top: 8px; letter-spacing: 1px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="header-title">蓮花生長法相圖鑑 (總資糧刻度)</div>

<svg style="position:absolute;width:0;height:0;" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad-10"    x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(255,255,255,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.1)"/></linearGradient>
        <linearGradient id="grad-50"    x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#f8bbd0" stop-opacity=".9"/><stop offset="100%" stop-color="#fce4ec" stop-opacity=".4"/></linearGradient>
        <linearGradient id="grad-100"   x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(212,175,55,.9)"/><stop offset="100%" stop-color="rgba(255,255,255,.2)"/></linearGradient>
        <linearGradient id="grad-300"   x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#80deea"/><stop offset="100%" stop-color="#e0f7fa" stop-opacity=".3"/></linearGradient>
        <linearGradient id="grad-500"   x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#a5d6a7"/><stop offset="100%" stop-color="#e8f5e9" stop-opacity=".3"/></linearGradient>
        <linearGradient id="grad-700"   x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ce93d8"/><stop offset="100%" stop-color="#f3e5f5" stop-opacity=".3"/></linearGradient>
        <linearGradient id="grad-900"   x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ffcc80"/><stop offset="100%" stop-color="#fff3e0" stop-opacity=".3"/></linearGradient>
        <linearGradient id="grad-1000"  x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ff9a9e" stop-opacity=".9"/><stop offset="50%" stop-color="#fad0c4" stop-opacity=".8"/><stop offset="100%" stop-color="#a1c4fd" stop-opacity=".7"/></linearGradient>
        <linearGradient id="grad-5000"  x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#84fab0" stop-opacity=".8"/><stop offset="100%" stop-color="#8fd3f4" stop-opacity=".6"/></linearGradient>
        <linearGradient id="grad-10000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#a18cd1" stop-opacity=".9"/><stop offset="100%" stop-color="#fbc2eb" stop-opacity=".7"/></linearGradient>
        <linearGradient id="grad-15000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ffecd2" stop-opacity=".9"/><stop offset="100%" stop-color="#fcb69f" stop-opacity=".7"/></linearGradient>
        <linearGradient id="grad-20000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#e2ebf0" stop-opacity=".9"/><stop offset="100%" stop-color="#cfd9df" stop-opacity=".6"/></linearGradient>
        <linearGradient id="grad-25000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#f6d365" stop-opacity=".9"/><stop offset="100%" stop-color="#fda085" stop-opacity=".8"/></linearGradient>
        <linearGradient id="grad-30000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#D4AF37" stop-opacity="1"/><stop offset="50%" stop-color="#FFD700" stop-opacity=".9"/><stop offset="100%" stop-color="#fff" stop-opacity="1"/></linearGradient>
    </defs>
</svg>

<script>
    // 模擬 14 階的總菩提點數 (p) 測試門檻
    const testPoints = [
        0, 50, 100, 1000, 5000, 10000, 50000, 
        100000, 500000, 1000000, 5000000, 10000000, 50000000, 100000000
    ];

    function getLotusData(p) {
        if (p < 10) return { svg: '<div class="seed"></div>', name: '初發菩提', glow: 'none', desc: '純粹明點' };

        let layers = 1, fill = "url(#grad-10)", stroke = "rgba(255,255,255,0.45)", glow = "none", rTxt = "初發菩提", desc = "清白底色";

        // ✨ 史詩真實門檻判定邏輯
        if(p >= 50)        { fill = "url(#grad-50)"; rTxt = "清淨萌芽"; desc = "淡粉微光，結出花心"; }
        if(p >= 100)       { layers = 2; fill = "url(#grad-100)"; stroke = "rgba(212,175,55,0.55)"; rTxt = "聖潔初金"; desc = "展開雙層花瓣"; }
        if(p >= 1000)      { fill = "url(#grad-300)"; rTxt = "琉璃水月"; desc = "水藍色澤"; }
        if(p >= 5000)      { fill = "url(#grad-500)"; rTxt = "翡翠玉葉"; desc = "翠綠生機"; }
        if(p >= 10000)     { fill = "url(#grad-700)"; rTxt = "紫檀雲靄"; desc = "解鎖：內層護法花瓣生出"; }
        if(p >= 50000)     { fill = "url(#grad-900)"; rTxt = "琥珀流光"; desc = "橘金交織"; }
        if(p >= 100000)    { fill = "url(#grad-1000)"; stroke = "rgba(255,255,255,0.38)"; rTxt = "初心幻彩"; desc = "花心半徑擴大"; }
        if(p >= 500000)    { fill = "url(#grad-5000)"; rTxt = "青淨琉璃"; desc = "青綠螢光"; }
        if(p >= 1000000)   { fill = "url(#grad-10000)"; rTxt = "紫金霞光"; desc = "解鎖：花心最大化、花蕊增為12根"; }
        if(p >= 5000000)   { fill = "url(#grad-15000)"; rTxt = "晨曦玉露"; desc = "溫潤暖金"; }
        if(p >= 10000000)  { fill = "url(#grad-20000)"; rTxt = "月魄銀輝"; desc = "銀白冷光"; }
        if(p >= 50000000)  { fill = "url(#grad-25000)"; rTxt = "玄黃凝脂"; desc = "赤金霞光"; }
        if(p >= 100000000) { fill = "url(#grad-30000)"; stroke = "#fff"; rTxt = "大圓滿耀金"; glow = "drop-shadow(0 0 20px rgba(255,255,255,0.6)) drop-shadow(0 0 60px rgba(212,175,55,0.5))"; desc = "終極型態：雙重發光金輪"; }

        let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-150 -150 300 300" style="width:100%;height:100%;overflow:visible;">`;

        for (let l = layers; l > 0; l--) {
            const sc = 0.44 + l * 0.28;
            const n  = (l === layers) ? 8 : 6;
            const rotOffset = l * 22.5 + p * 0.012; 
            for (let i = 0; i < n; i++) {
                const rot = i * (360/n) + rotOffset;
                const s   = 112 * sc;
                const pth = `M 0 0 C ${s*.44} ${-s*.07} ${s*.54} ${-s*.62} 0 ${-s} C ${-s*.54} ${-s*.62} ${-s*.44} ${-s*.07} 0 0`;
                const vein = `M 0 ${-s*.08} Q 0 ${-s*.55} 0 ${-s*.88}`;
                svg += `<g transform="rotate(${rot})">
                    <path d="${pth}" fill="${fill}" stroke="${stroke}" stroke-width="0.9" opacity="0.93"/>
                    <path d="${vein}" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
                </g>`;
            }
        }
        
        // 內瓣解鎖 (1萬點)
        if (p >= 10000) {
            const innerSz = 112 * 0.38;
            for (let i = 0; i < 6; i++) {
                const rot = i * 60 + 18 + p * 0.018; 
                const pth = `M 0 0 C ${innerSz*.35} ${-innerSz*.08} ${innerSz*.3} ${-innerSz*.7} 0 ${-innerSz} C ${-innerSz*.3} ${-innerSz*.7} ${-innerSz*.35} ${-innerSz*.08} 0 0`;
                svg += `<g transform="rotate(${rot})"><path d="${pth}" fill="${fill}" stroke="${stroke}" stroke-width="0.7" opacity="0.85"/></g>`;
            }
        }
        
        // 花心與金剛蕊解鎖與升級
        if (p >= 50) {
            const cr = p >= 1000000 ? 20 : p >= 100000 ? 16 : 12;
            svg += `<circle cx="0" cy="0" r="${cr}" fill="${fill}" stroke="${stroke}" stroke-width="1.2" opacity="0.96"/>`;
            if (p >= 100) {
                const stamens = p >= 1000000 ? 12 : 8;
                for (let s = 0; s < stamens; s++) {
                    const sa = (s * (360/stamens)) * Math.PI / 180;
                    const sr = cr + 9;
                    const ex = (sr * Math.cos(sa)).toFixed(1);
                    const ey = (sr * Math.sin(sa)).toFixed(1);
                    svg += `<circle cx="${ex}" cy="${ey}" r="2.8" fill="${fill}" opacity="0.82"/>
                    <line x1="${(cr*.6*Math.cos(sa)).toFixed(1)}" y1="${(cr*.6*Math.sin(sa)).toFixed(1)}" x2="${ex}" y2="${ey}" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>`;
                }
            }
            svg += `<circle cx="-${cr*.18}" cy="-${cr*.22}" r="${cr*.28}" fill="rgba(255,255,255,0.38)"/>`;
        }
        
        svg += `</svg>`;
        return { svg: svg, name: rTxt, glow: glow, desc: desc };
    }

    // 渲染卡片
    testPoints.forEach(p => {
        let data = getLotusData(p);
        document.body.innerHTML += `
            <div class="card">
                <div class="title">${data.name}</div>
                <div class="pts">${p.toLocaleString()} 點</div>
                <div class="desc">${data.desc}</div>
                <div class="stage" style="filter: ${data.glow};">
                    ${data.svg}
                </div>
            </div>`;
    });
</script>
</body>
</html>
