<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>神聖蓮花 ‧ 演化實驗室</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --bg: #050505; }
        body { margin: 0; padding: 20px; background: var(--bg); color: #eee; font-family: "PingFang TC", serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h2 { color: var(--gold); font-size: 1.2rem; letter-spacing: 4px; margin-bottom: 5px; text-shadow: 0 0 10px rgba(212,175,55,0.4); text-align: center;}
        .sub { color: #888; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 30px; text-align: center;}
        
        /* 蓮花展示區 (加上了呼吸動畫) */
        .showcase {
            width: 300px; height: 300px; margin-bottom: 30px;
            display: flex; justify-content: center; align-items: center;
            border: 1px dashed rgba(212,175,55,0.3); border-radius: 50%;
            animation: breath 5s infinite ease-in-out;
        }
        @keyframes breath {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 25px rgba(255,255,255,0.4)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); }
        }

        /* 控制面板 */
        .panel { width: 100%; max-width: 400px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(212,175,55,0.2); margin-bottom: 20px;}
        .panel-title { color: var(--solid-gold); font-size: 0.9rem; margin-bottom: 10px; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 5px; letter-spacing: 2px;}
        
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
        button { 
            background: rgba(0,0,0,0.5); color: #aaa; border: 1px solid #444; 
            padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s;
            font-size: 0.8rem; letter-spacing: 1px; flex: 1 1 calc(33% - 8px);
        }
        button.active { background: rgba(212,175,55,0.2); color: var(--gold); border-color: var(--solid-gold); box-shadow: 0 0 10px rgba(212,175,55,0.3); }
        
        #status-text { text-align: center; color: #fff; font-size: 1.1rem; letter-spacing: 2px; margin-top: 10px; text-shadow: 0 0 10px var(--solid-gold); font-weight: bold;}
    </style>
</head>
<body>

    <h2>雙軌蓮花 ‧ 演化實驗室</h2>
    <p class="sub">背景觀資糧 ‧ 花瓣觀念佛</p>

    <div class="showcase" id="lotus-container"></div>
    <div id="status-text">信位 ‧ 初發心 (0聲)</div>

    <div class="panel">
        <div class="panel-title">軌道一：資糧位階 (改變顏色與底座)</div>
        <div class="btn-group" id="rank-btns">
            <button class="active" onclick="setRank('Faith', '信位')">信 (青琉璃)</button>
            <button onclick="setRank('Abiding', '住位')">住 (粉琉璃)</button>
            <button onclick="setRank('Practice', '行位')">行 (紫金光)</button>
            <button onclick="setRank('Dedication', '迴向')">迴 (幻彩光)</button>
            <button onclick="setRank('Bhumi', '地位')">地 (大日金)</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">軌道二：累積念佛 (改變花瓣層數，前期長得快)</div>
        <div class="btn-group" id="nian-btns">
            <button class="active" onclick="setNian(0, '初發心')">0 聲 (2層)</button>
            <button onclick="setNian(10, '十念圓滿')">10 聲 (3層)</button>
            <button onclick="setNian(500, '一念清淨')">500 聲 (4層)</button>
            <button onclick="setNian(5000, '淨念相繼')">5千聲 (5層)</button>
            <button onclick="setNian(10000, '信願具足')">1萬聲 (6層)</button>
            <button onclick="setNian(100000, '蓮池海會')">10萬聲 (7層)</button>
            <button onclick="setNian(500000, '不退轉菩薩')">50萬聲 (8層)</button>
            <button onclick="setNian(1000000, '無相念佛')">100萬聲 (9層)</button>
            <button onclick="setNian(10000000, '念佛三昧')">1千萬聲 (10層)</button>
            <button onclick="setNian(100000000, '圓滿成佛')" style="flex: 1 1 100%; border-color:#d4af37; color:#d4af37;">1億聲 (11層終極盛放)</button>
        </div>
    </div>

<script>
// 儲存當前狀態
let currentRankKey = 'Faith';
let currentRankName = '信位';
let currentNian = 0;
let currentNianName = '初發心';

// ════════ 終極雙軌演算法 (可直接拷貝回主系統) ════════
function getLotusSVG(rankType, nianCount = 0) {
    // ── 1. 解析資糧位階 (決定顏色) ──
    const colorMap = {
        'Faith': { t: '#ffffff', m: '#8ba89c', b: '#1e382d' },
        'Abiding': { t: '#ffffff', m: '#f48fb1', b: '#880e4f' },
        'Practice': { t: '#f3e5f5', m: '#ce93d8', b: '#4a148c' },
        'Dedication': { t: '#fff8e1', m: '#ffb74d', b: '#e65100' },
        'Bhumi': { t: '#fff8d6', m: '#d4af37', b: '#5c400a' }
    };
    let c = colorMap[rankType] || colorMap['Faith'];

    // ── 2. 解析念佛累積 (決定花瓣層數，強化前期變化) ──
    let layers = 2; 
    let coreGlow = 1;
    
    if (nianCount >= 100000000) { layers = 11; coreGlow = 3.5; }      // 1億：11層 (終極)
    else if (nianCount >= 10000000) { layers = 10; coreGlow = 2.5; } // 1千萬：10層
    else if (nianCount >= 1000000) { layers = 9; coreGlow = 2; }     // 100萬：9層
    else if (nianCount >= 500000) { layers = 8; coreGlow = 1.8; }    // 50萬：8層
    else if (nianCount >= 100000) { layers = 7; coreGlow = 1.5; }    // 10萬：7層
    else if (nianCount >= 10000) { layers = 6; coreGlow = 1.2; }     // 1萬：6層
    else if (nianCount >= 5000) { layers = 5; coreGlow = 1.1; }      // 5千：5層
    else if (nianCount >= 500) { layers = 4; coreGlow = 1.0; }       // 5百：4層
    else if (nianCount >= 10) { layers = 3; coreGlow = 0.8; }        // 10聲：3層
    else { layers = 2; coreGlow = 0.5; }                             // 0聲：2層含苞

    // ── 3. 定義區 (SVG 漸層與濾鏡) ──
    const sharedDefs = `
    <defs>
        <linearGradient id="bg-grad-lv1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#eafff8"/><stop offset="100%" stop-color="#349b7d"/></linearGradient>
        <linearGradient id="bg-grad-lv5" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="35%" stop-color="#ffdf00"/><stop offset="100%" stop-color="#d2691e"/></linearGradient>
        <radialGradient id="bg-rg-pure" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffffff"/><stop offset="30%" stop-color="#fff8dc"/><stop offset="100%" stop-color="#d4af37"/></radialGradient>
        <linearGradient id="bg-lg-metal" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffeba8"/><stop offset="50%" stop-color="#d4af37"/><stop offset="100%" stop-color="#8a6d1c"/></linearGradient>
        <filter id="bg-glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        
        <linearGradient id="enLotusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="${c.t}" stop-opacity="0.95"/>
            <stop offset="50%" stop-color="${c.m}" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="${c.b}" stop-opacity="0.95"/>
        </linearGradient>
        <radialGradient id="enCoreGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fff"/><stop offset="40%" stop-color="${c.m}"/><stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <path id="enPetal" d="M 50 50 C 39 25, 41 9, 50 2 C 59 9, 61 25, 50 50 Z" fill="url(#enLotusGrad)" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
    </defs>`;

    // ── 4. 繪製背景陣法 ──
    const voidBg = `<circle cx="50" cy="50" r="42" fill="rgba(10,5,0,0.8)"><animate attributeName="r" values="41;43;41" dur="6s" repeatCount="indefinite"/></circle>`;
    let bgContent = '';

    if (rankType === 'Faith') {
        bgContent = `<g opacity="0.8"><ellipse cx="50" cy="50" rx="36" ry="12" fill="none" stroke="url(#bg-grad-lv1)" stroke-width="1.5"><animate attributeName="rx" values="20;40;20" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/></ellipse><ellipse cx="50" cy="50" rx="20" ry="6" fill="none" stroke="url(#bg-rg-pure)" stroke-width="1.5" filter="url(#bg-glow)"/></g>`;
    } else if (rankType === 'Abiding') {
        bgContent = `<g opacity="0.85"><polygon points="50,15 80,32 80,68 50,85 20,68 20,32" fill="url(#bg-rg-pure)" opacity="0.15" filter="url(#bg-glow)"/><polygon points="50,24 68,34 68,66 50,76 32,66 32,34" fill="none" stroke="url(#bg-lg-metal)" stroke-width="1.5"/></g>`;
    } else if (rankType === 'Practice') {
        let spokes = ''; for(let i=0; i<12; i++) { spokes += `<line x1="50" y1="50" x2="50" y2="18" transform="rotate(${i*30} 50 50)" stroke="url(#bg-lg-metal)" stroke-width="1.5"/>`; }
        bgContent = `<g opacity="0.5" filter="url(#bg-glow)"><animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite"/><circle cx="50" cy="50" r="32" fill="none" stroke="url(#bg-lg-metal)" stroke-width="2"/><circle cx="50" cy="50" r="26" fill="none" stroke="url(#bg-lg-metal)" stroke-width="0.5" stroke-dasharray="2 4"/>${spokes}</g>`;
    } else if (rankType === 'Dedication') {
        bgContent = `<g opacity="0.6" stroke="#f472b6" fill="none" stroke-width="1.2" filter="url(#bg-glow)"><animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="30s" repeatCount="indefinite"/><rect x="20" y="20" width="60" height="60" transform="rotate(0 50 50)"/><rect x="20" y="20" width="60" height="60" transform="rotate(30 50 50)"/><rect x="20" y="20" width="60" height="60" transform="rotate(60 50 50)"/><circle cx="50" cy="50" r="38" stroke-dasharray="4 4" stroke-width="0.8"/></g>`;
    } else if (rankType === 'Bhumi') {
        let rays = ''; for(let i=0; i<16; i++) { rays += `<path d="M50 50 Q 65 30 50 10 Q 35 30 50 50" fill="none" stroke="url(#bg-grad-lv5)" stroke-width="1" opacity="0.7" transform="rotate(${i*22.5} 50 50)"/>`; }
        bgContent = `<g opacity="0.8"><circle cx="50" cy="50" r="42" fill="none" stroke="url(#bg-rg-pure)" stroke-width="1.5" stroke-dasharray="2 6"/><g filter="url(#bg-glow)"><animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="45s" repeatCount="indefinite"/>${rays}</g></g>`;
    }

    // ── 5. 繪製前景神聖蓮花 ──
    let lotusContent = `<g><animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="120s" repeatCount="indefinite"/>`;

    // 縮放演算法：最大支持 11 層花瓣不破格！
    for (let l = layers; l > 0; l--) {
        const scale = 0.15 + (l * 0.075); // 精密縮放比，容納11層
        const offset = (l % 2 === 0) ? 22.5 : 0;
        for (let i = 0; i < 8; i++) {
            const angle = i * 45 + offset;
            const opacity = Math.min(1, 0.5 + (l * 0.05));
            lotusContent += `<use href="#enPetal" transform="rotate(${angle} 50 50) scale(${scale}) translate(${(1-scale)*50/scale} ${(1-scale)*50/scale})" opacity="${opacity}"/>`;
        }
    }
    
    const coreRadius = 2 + (layers * 0.5) * coreGlow;
    lotusContent += `</g><circle cx="50" cy="50" r="${coreRadius}" fill="url(#enCoreGlow)"><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/></circle>`;

    return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%; overflow:visible;">
        ${sharedDefs}
        ${voidBg}
        ${bgContent}
        ${lotusContent}
    </svg>`;
}

// ════════ UI 互動邏輯 ════════
function updateDisplay() {
    document.getElementById('lotus-container').innerHTML = getLotusSVG(currentRankKey, currentNian);
    document.getElementById('status-text').innerText = `${currentRankName} ‧ ${currentNianName}`;
}

function setRank(key, name) {
    currentRankKey = key; currentRankName = name;
    document.querySelectorAll('#rank-btns button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    updateDisplay();
}

function setNian(count, name) {
    currentNian = count; currentNianName = name;
    document.querySelectorAll('#nian-btns button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    updateDisplay();
}

// 初始化
updateDisplay();
</script>
</body>
</html>
