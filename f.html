<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不退轉天數蓮花 示範頁面</title>
<style>
    /* 模擬您 App 的暗色低熵背景 */
    body {
        background-color: #050505;
        color: #fff;
        font-family: "PingFang TC", "Heiti TC", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    /* 模擬主畫面 320px 的念佛區域 */
    .chant-zone {
        width: 320px;
        height: 320px;
        position: relative;
        /* 增加一個淡淡的金色光圈背景，模擬金色進度環的範圍 */
        border: 1px solid rgba(212,175,55,0.1);
        border-radius: 50%;
        box-shadow: 0 0 20px rgba(212,175,55,0.05);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* 裝載新蓮花的容器 */
    #center-lotus-container {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        /* 確保隔離版蓮花能 100% 舒展 */
        overflow: visible; 
    }

    /* 模擬 0/10 的數字與呼吸起動畫 */
    .lotus-breath {
        animation: lotusBreath 4s ease-in-out infinite;
    }
    @keyframes lotusBreath {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50% { transform: scale(1.02); opacity: 1; }
    }

    /* 控制面板樣式 */
    .controls {
        margin-top: 40px;
        background: rgba(255,255,255,0.05);
        padding: 20px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.1);
        text-align: center;
        z-index: 100;
    }
    input {
        background: #111;
        border: 1px solid #var(--gold);
        color: var(--gold);
        padding: 10px;
        font-size: 18px;
        border-radius: 6px;
        width: 120px;
        text-align: center;
    }
    .stage-info {
        margin-top: 15px;
        color: rgba(255,255,255,0.7);
        font-size: 14px;
        line-height: 1.6;
    }
    :root {
        --gold: #d4af37;
    }
</style>
</head>
<body>

    <div class="chant-zone">
        <div id="center-lotus-container" class="lotus-breath">
            </div>
    </div>

    <div class="controls">
        <label style="color:var(--gold);">模擬總修行天數 (db.points/100):</label><br><br>
        <input type="number" id="daysInput" value="10" min="0" step="10"> 天<br>
        <div class="stage-info" id="stageInfo"></div>
    </div>

<script>
    /**
     * 🌟 隔離版：天數蓮花生成引擎 ( getDaysLotusSVG )
     * 大重點：所有 SVG 內部的 ID 都加上了 "cl-" 前綴，
     * 嚴格防護 SVG 名稱空間汙染 (Namespace Collision)。
     */
    function getDaysLotusSVG(totalDays) {
        // --- 1. 定義您的十二階不退轉法色演進 ---
        const stages = [
            { d: 30000, name: "無量光壽", desc: "法身無相，花瓣透明，呼吸強光", c: {t:"#fff", m:"#fff", b:"#fff", o: 0.1}, l: 5, g: 5.0 },
            { d: 10000, name: "摩尼寶光", desc: "一生奉獻，幻彩色澤", c: {t:"#fff", m:"#f8badd", b:"#b0e0e6", o: 0.7}, l: 5, g: 3.5 },
            { d: 1000,  name: "萬佛金剛", desc: "千日三昧，堅固不退", c: {t:"#fff", m:"#fff3e0", b:"#d4af37", o: 0.8}, l: 5, g: 2.5 },
            { d: 500,   name: "大日純金", desc: "突破五百，五層完全綻放", c: {t:"#fff8d6", m:"#d4af37", b:"#5c400a", o: 0.9}, l: 5, g: 1.8 },
            { d: 350,   name: "琉璃赤金", desc: "將滿一年，念佛成片", c: {t:"#fff3e0", m:"#ffb74d", b:"#e65100", o: 0.9}, l: 4, g: 1.5 },
            { d: 300,   name: "玄黃琥珀", desc: "打破界限，心包太虛", c: {t:"#fff8e1", m:"#ffa726", b:"#e65100", o: 0.8}, l: 4, g: 1.3 },
            { d: 250,   name: "紫金霞光", desc: "定力中成，莊嚴紫光", c: {t:"#f3e5f5", m:"#ce93d8", b:"#4a148c", o: 0.8}, l: 4, g: 1.2 },
            { d: 200,   name: "幽邃蒼藍", desc: "心如止水，琉璃深藍", c: {t:"#e3f2fd", m:"#64b5f6", b:#1e382d, o: 0.8}, l: 3, g: 1.1 }, // 修正 c 為 #1e382d
            { d: 150,   name: "紅蓮業火", desc: "轉化煩惱，色彩轉深", c: {t:"#ffebee", m:"#ef5350", b:#1e382d, o: 0.8}, l: 3, g: 1.0 }, // 修正 c 為 #1e382d
            { d: 100,   name: "粉櫻初綻", desc: "百日築基，長出第三層瓣", c: {t:"#fff", m:"#f48fb1", b:#1e382d, o: 0.8}, l: 3, g: 1.0 }, // 修正 c 為 #1e382d
            { d: 50,    name: "青翠水月", desc: "道心微潤，青玉色澤", c: {t:"#fff", m:"#8ba89c", b:#1e382d, o: 0.8}, l: 2, g: 0.9 }, // 修正 c 為 #1e382d
            { d: 10,    name: "白玉雪蓮", desc: "初發心，清淨無染", c: {t:"#fff", m:"#f5f5f5", b:#1e382d, o: 0.8}, l: 2, g: 0.9 }, // 修正 c 為 #1e382d
            { d: 0,     name: "種子萌芽", desc: "修行伊始", c: {t:"#fff", m:#1e382d, b:#1e382d, o: 0.5}, l: 1, g: 0.8 } // 修正 c 為 #1e382d
        ];

        // --- 2. 尋找對應階段 ---
        let s = stages[stages.length - 1]; // 預設為最後一階
        for (let i = 0; i < stages.length; i++) {
            if (totalDays >= stages[i].d) { s = stages[i]; break; }
        }

        // --- 3. 更新示範頁面的文字資訊 ---
        const info = document.getElementById('stageInfo');
        if(info) info.innerHTML = `🌟 當前果色：<b style="color:#d4af37">${s.name}</b> (${totalDays}天)<br>${s.desc}`;

        // --- 4. 產出 SVG (隔離版) ---
        return `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%; overflow:visible;">
            <defs>
                <linearGradient id="cl-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="${s.c.t}" stop-opacity="0.95"/>
                    <stop offset="50%" stop-color="${s.c.m}" stop-opacity="${s.c.o}"/>
                    <stop offset="100%" stop-color="${s.c.b}" stop-opacity="0.95"/>
                </linearGradient>
                <radialGradient id="cl-core" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fff"/>
                    <stop offset="40%" stop-color="${s.c.m}"/>
                    <stop offset="100%" stop-color="transparent"/>
                </radialGradient>
                <path id="cl-petal" d="M 50 50 C 39 25, 41 9, 50 2 C 59 9, 61 25, 50 50 Z" fill="url(#cl-grad)" stroke="rgba(255,255,255,0.4)" stroke-width="0.3"/>
            </defs>

            <circle cx="50" cy="50" r="45" fill="rgba(5,5,5,0.6)"/>
            
            <circle cx="50" cy="50" r="38" fill="none" stroke="${s.c.m}" stroke-width="0.5" stroke-dasharray="1 4" opacity="0.5">
                <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="40s" repeatCount="indefinite"/>
            </circle>

            <g filter="drop-shadow(0 0 4px rgba(0,0,0,0.5))">
                <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="120s" repeatCount="indefinite"/>`;

        // 遞迴生成花瓣層
        for (let l = s.l; l > 0; l--) {
            const sc = 0.35 + (l * 0.12); // 縮放
            const off = (l % 2 === 0) ? 22.5 : 0; // 交錯角度
            for (let i = 0; i < 8; i++) {
                const angle = i * 45 + off;
                const op = Math.min(1, 0.7 + (l * 0.05));
                // ⚠️ 呼叫隔離的 cl-petal
                svgHtml += `<use href="#cl-petal" transform="rotate(${angle} 50 50) scale(${sc}) translate(${(1-sc)*50/sc} ${(1-sc)*50/sc})" opacity="${op}"/>`;
            }
        }
        
        // 4. 摩尼寶珠蓮心 (光芒強度 s.g)
        svgHtml += `
            </g>
            <circle cx="50" cy="50" r="${3 + (s.l * 0.5) * s.g}" fill="url(#cl-core)">
                <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
            </circle>
        </svg>`;

        return svgHtml;
    }

    // --- 示範頁面交互邏輯 ---
    const input = document.getElementById('daysInput');
    const container = document.getElementById('center-lotus-container');

    function updateDemo() {
        const days = parseInt(input.value) || 0;
        // 將生成的新蓮花注入沙盒容器
        container.innerHTML = getDaysLotusSVG(days);
    }

    // 監聽輸入變化
    input.addEventListener('input', updateDemo);

    // 初始渲染
    updateDemo();

</script>
</body>
</html>
