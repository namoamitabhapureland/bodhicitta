<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>華藏莊嚴世界海 ． 二十重矩陣母版</title>
    <style>
        :root {
            --bg-deep: #010103; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
            --silver: #e0e0e0;
            --fire: #a83232;
            --text-main: #d0d0d0;
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; overscroll-behavior: none; user-select: none;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            color: var(--gold); text-decoration: none; font-size: 0.95rem; font-weight: bold;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3);
            backdrop-filter: blur(5px); transition: all 0.3s;
        }
        .back-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.2); }

        /* ================= 左上角狀態面板 ================= */
        #status-panel {
            position: absolute; top: 70px; left: 5%; width: 90%; max-width: 340px;
            background: transparent; border-left: 2px solid rgba(212,175,55,0.8); 
            padding: 10px 20px; z-index: 100; transition: border-color 0.8s; pointer-events: none;
        }
        .status-title { font-size: 1.15rem; font-weight: bold; color: var(--gold); letter-spacing: 2px; margin-bottom: 6px; text-shadow: 0 2px 6px rgba(0,0,0,0.9); transition: color 0.8s;}
        .status-buddha { font-size: 0.95rem; color: #fff; font-weight: bold; letter-spacing: 1px; margin-bottom: 8px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .status-shape { font-size: 0.75rem; color: var(--cyan); letter-spacing: 1px; margin-bottom: 6px; border: 1px solid rgba(139,168,156,0.5); display: inline-block; padding: 2px 8px; border-radius: 12px; background: rgba(139,168,156,0.1); }
        .status-desc { font-size: 0.85rem; color: #bbb; line-height: 1.6; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }

        /* ================= 3D 畫布 ================= */
        .matrix-section { position: absolute; inset: 0; background: #000; overflow: hidden; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

        /* ================= 底部 UI 與導航列 ================= */
        .ui-layer { position: absolute; bottom: 5%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; gap: 15px; }
        #drag-hint { color:rgba(212,175,55,0.6); font-size:0.75rem; letter-spacing:2px; margin-bottom: 5px; text-shadow: 0 0 5px #000; }

        /* 橫向無極滾輪 */
        .realm-picker-container {
            width: 100%; overflow-x: auto; scroll-snap-type: x mandatory;
            display: flex; gap: 12px; padding: 10px 50%;
            scrollbar-width: none; -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
        }
        .realm-picker-container::-webkit-scrollbar { display: none; }

        .realm-item {
            flex: 0 0 auto; scroll-snap-align: center;
            background: rgba(15,15,15,0.8); border: 1px solid rgba(255,255,255,0.2); 
            color: #888; padding: 10px 20px; border-radius: 30px; font-size: 0.9rem; font-weight: bold; letter-spacing: 1.5px;
            cursor: pointer; backdrop-filter: blur(10px); transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .realm-item .r-num { font-size: 0.6rem; opacity: 0.6; letter-spacing: 1px; }
        
        .realm-item.active { transform: scale(1.1); background: rgba(20,20,20,0.95); border-color: var(--solid-gold); color: var(--gold); box-shadow: 0 5px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(212,175,55,0.2); }
        .realm-item.active.cyan-mode { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 5px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(139,168,156,0.2); }
        .realm-item.active.silver-mode { border-color: var(--silver); color: var(--silver); box-shadow: 0 5px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(224,224,224,0.2); }
        .realm-item.active.fire-mode { border-color: var(--fire); color: #ff8a8a; box-shadow: 0 5px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(168,50,50,0.2); }

        #theory-btn { 
            width: 85%; max-width: 320px; justify-content: center;
            background: linear-gradient(135deg, rgba(5,10,15,0.9), rgba(5,5,5,0.95)); 
            border: 1px solid rgba(139,168,156,0.6); color: var(--cyan);
            padding: 12px 20px; border-radius: 30px; font-size: 0.9rem; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        #theory-btn:active { transform: scale(0.95); }

        /* ================= 玉簡抽屜 ================= */
        #theory-drawer { position: fixed; bottom: 0; left: 0; width: 100vw; height: 85vh; background: rgba(5, 5, 8, 0.96); backdrop-filter: blur(20px); border-top: 1.5px solid rgba(212,175,55,0.4); border-radius: 25px 25px 0 0; transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 2000; overflow-y: auto; padding: 0 0 80px 0; touch-action: pan-y; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
        #theory-drawer.open { transform: translateY(0); }
        .drawer-header { position: sticky; top: 0; background: linear-gradient(to bottom, rgba(5,5,8,1), rgba(5,5,8,0.95)); padding: 15px; text-align: center; z-index: 10; border-bottom: 1px solid rgba(139,168,156,0.2); }
        .close-bar { width: 40px; height: 4px; background: rgba(212,175,55,0.4); border-radius: 2px; margin: 0 auto 10px; cursor: pointer; }
        .theory-container { padding: 30px 7% 20px; max-width: 720px; margin: 0 auto; }
        .main-title { color: var(--gold); font-size: 1.5rem; letter-spacing: 3px; text-align: center; margin-bottom: 50px; text-shadow: 0 0 15px rgba(212,175,55,0.3); }
        .main-title::after { content: ''; display: block; width: 50px; height: 1.5px; background: linear-gradient(90deg, transparent, var(--solid-gold), transparent); margin: 15px auto 0; }
        .paragraph { font-size: 0.95rem; color: #ccc; line-height: 1.9; letter-spacing: 1px; text-align: justify; margin-bottom: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="back-btn" onclick="window.location.href='index.html?screen=3'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        回道場
    </div>

    <div id="status-panel">
        <div class="status-title" id="s-title">系統啟動中</div>
        <div class="status-buddha" id="s-buddha"></div>
        <div class="status-shape" id="s-shape"></div>
        <div class="status-desc" id="s-desc">讀取法界矩陣...</div>
    </div>

    <section class="matrix-section">
        <canvas id="realmCanvas"></canvas>
        <div class="ui-layer" id="ui-layer">
            <div id="drag-hint">360° 全息滑動 ． 撥動星盤切換維度</div>
            <div class="realm-picker-container" id="picker-container"></div>
            <button id="theory-btn" onclick="openTheoryDrawer()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                探究華藏二十重法義
            </button>
        </div>
    </section>

    <div id="theory-drawer">
        <div class="drawer-header" onclick="closeTheoryDrawer()"><div class="close-bar"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding: 0 5px;">
                <div style="color:var(--cyan); font-size:0.85rem; letter-spacing:2px; font-weight:bold; cursor:pointer;" onclick="closeTheoryDrawer()">收起法卷</div>
                <div id="tts-btn" onclick="event.stopPropagation(); toggleTheoryAudio()" style="color:var(--gold); font-size:0.85rem; font-weight:bold; cursor:pointer; display:flex; align-items:center; gap:6px; background:rgba(212,175,55,0.15); padding: 6px 12px; border-radius:20px; border: 1px solid rgba(212,175,55,0.4);">
                    <svg id="tts-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                    <span id="tts-text">聆聽法音</span>
                </div>
            </div>
        </div>
        <div class="theory-container" id="theory-content-box">
            <h1 class="main-title">華藏大世界 ． 二十重維度</h1>
            <p class="paragraph" id="theory-desc">法界浩瀚，二十重世界千變萬化，皆是無極光法身之清淨流露。</p>
        </div>
    </div>

<script>
    // ================= 1. 20重法界核心資料庫 =================
    const RealmMatrix = [
        { id: 1, name: "最勝光遍照", buddha: "微塵數諸佛", shape: "廣大", theme: "gold", desc: "布滿金剛與摩尼寶光。" },
        { id: 2, name: "種種香蓮華", buddha: "普照十方熾然光明佛", shape: "蓮華", theme: "cyan", desc: "由各種妙香與摩尼寶所組成。" },
        { id: 3, name: "一切寶莊嚴", buddha: "師子吼雲音佛", shape: "寶月", theme: "silver", desc: "光明遍照一切法界。" },
        { id: 4, name: "種種光明華", buddha: "普照法界虛空雲佛", shape: "種種華", theme: "gold", desc: "有無量色彩的光明網。" },
        { id: 5, name: "普放妙華光", buddha: "普喜無量功德佛", shape: "摩尼王", theme: "cyan", desc: "常放妙華光雲。" },
        { id: 6, name: "淨妙光明", buddha: "無垢功德遍照佛", shape: "寶壇", theme: "silver", desc: "清淨無礙的光明之海。" },
        { id: 7, name: "眾華莊嚴", buddha: "華雲幢佛", shape: "華旋", theme: "cyan", desc: "由無量華雲重重圍繞。" },
        { id: 8, name: "出生威德", buddha: "清淨日光明佛", shape: "半月", theme: "gold", desc: "出生一切威德之光。" },
        { id: 9, name: "出妙音聲", buddha: "師子光佛", shape: "梵篋", theme: "gold", desc: "常演說微妙清淨法音。" },
        { id: 10, name: "金剛幢", buddha: "普照法界金剛雲佛", shape: "金剛幢", theme: "silver", desc: "堅固不可摧毀。" },
        { id: 11, name: "恆出帝青寶", buddha: "福德雲大海佛", shape: "帝青寶", theme: "cyan", desc: "恆現深藍色寶光。" },
        { id: 12, name: "光明照曜", buddha: "清淨華雲佛", shape: "寶冠", theme: "gold", desc: "光明層疊交織。" },
        { id: 13, name: "娑婆與極樂", buddha: "毗盧遮那如來", shape: "平正", theme: "cyan", desc: "唯一混合痛苦與覺醒的層級。" },
        { id: 14, name: "寂靜功德", buddha: "遍法界勝音佛", shape: "寶帶", theme: "silver", desc: "功德力使一切寂靜。" },
        { id: 15, name: "光明普照", buddha: "普照法界法海雲佛", shape: "蓮華", theme: "gold", desc: "無量光明普照一切。" },
        { id: 16, name: "妙圓滿光明", buddha: "普勝智光明佛", shape: "圓滿", theme: "cyan", desc: "一切圓滿無缺。" },
        { id: 17, name: "眾妙清淨光明", buddha: "普照法界智雲佛", shape: "妙好", theme: "fire", desc: "清淨無染。" },
        { id: 18, name: "色相大光明", buddha: "普門光明雲佛", shape: "摩尼網", theme: "silver", desc: "呈現一切色相。" },
        { id: 19, name: "普照法界", buddha: "普照虛空智光明佛", shape: "法界", theme: "gold", desc: "智慧光明遍及。" },
        { id: 20, name: "妙寶燄", buddha: "福德普勝智光明佛", shape: "寶燄", theme: "fire", desc: "最上層，極致光芒與純意志形態。" }
    ];

    let currentRealmIndex = 19; // 預設啟動第20重 (index 19)

    // ================= 2. UI 導航切換邏輯 =================
    const pickerContainer = document.getElementById('picker-container');
    
    function initPicker() {
        RealmMatrix.forEach((realm, index) => {
            let btn = document.createElement('div');
            btn.className = `realm-item ${realm.theme}-mode`;
            btn.id = `picker-${index}`;
            btn.innerHTML = `<span class="r-num">TIER ${realm.id}</span><span>${realm.name}</span>`;
            btn.onclick = () => { selectRealm(index); btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); };
            pickerContainer.appendChild(btn);
        });
    }

    function selectRealm(index) {
        if(currentRealmIndex === index && document.getElementById(`picker-${index}`).classList.contains('active')) return;
        currentRealmIndex = index;
        let data = RealmMatrix[index];

        document.querySelectorAll('.realm-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`picker-${index}`).classList.add('active');

        let pTitle = document.getElementById('s-title'); let pBuddha = document.getElementById('s-buddha');
        let pShape = document.getElementById('s-shape'); let pDesc = document.getElementById('s-desc');
        let panel = document.getElementById('status-panel');

        pTitle.innerText = `第${data.id}重 ． ${data.name}`;
        pBuddha.innerText = `[教主] ${data.buddha}`;
        pShape.innerText = `形狀：${data.shape}`;
        pDesc.innerHTML = data.desc;
        
        // 更新玉簡內容
        document.getElementById('theory-desc').innerHTML = `本層為第${data.id}重「${data.name}」。教主為${data.buddha}，其國土形狀呈現${data.shape}。<br><br>${data.desc}`;

        let baseColor = data.theme === 'gold' ? '#f3e5ab' : (data.theme === 'cyan' ? '#8ba89c' : (data.theme === 'silver' ? '#e0e0e0' : '#ff8a8a'));
        let borderColor = data.theme === 'gold' ? 'rgba(212,175,55,0.8)' : (data.theme === 'cyan' ? 'rgba(139,168,156,0.8)' : (data.theme === 'silver' ? 'rgba(224,224,224,0.8)' : 'rgba(168,50,50,0.8)'));
        
        pTitle.style.color = baseColor; pShape.style.color = baseColor; pShape.style.borderColor = baseColor;
        panel.style.borderLeftColor = borderColor;

        angleX = 0.3; angleY = 0; // 重置視角
        initParticleEngines(); // 重建幾何
    }

    // ================= 3. 3D 畫布引擎核心 =================
    const canvas = document.getElementById('realmCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let time = 0; let stars = []; let realmParticles = [];
    let angleX = 0.3, angleY = 0; let isDragging = false; let lastMouseX = 0, lastMouseY = 0;
    const FOV = 400; 

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();

    function project3D(x, y, z) {
        let cosX = Math.cos(angleX), sinX = Math.sin(angleX), cosY = Math.cos(angleY), sinY = Math.sin(angleY);
        let y1 = y*cosX - z*sinX, z1 = y*sinX + z*cosX;
        let x2 = x*cosY - z1*sinY, z2 = x*sinY + z1*cosY;
        if(z2 < -FOV+50) return null;
        let scale = FOV / (FOV + z2 + 100); 
        return { x: (width/2) + x2*scale, y: (height/2) - y1*scale - 50, scale: scale, z: z2 };
    }

    // =========================================================================
    // 🟢 模組化插入點：所有新開發的世界幾何生成代碼，請加在下方的 switch 判斷內
    // =========================================================================
    function initParticleEngines() {
        if(stars.length === 0) {
            for (let i = 0; i < 500; i++) {
                stars.push({ x: (Math.random()-0.5)*3000, y: (Math.random()-0.5)*3000, z: Math.random()*2000, speed: Math.random()*2+0.5, color: Math.random()>0.5 ? '#8ba89c' : '#f3e5ab', size: Math.random()*1.5 + 0.5 });
            }
        }
        realmParticles = [];
        let id = RealmMatrix[currentRealmIndex].id;

        if (id === 3) {
            let radius = 120;
            for(let i=0; i<600; i++) {
                let theta = Math.random() * Math.PI * 2; let phi = Math.acos((Math.random() * 2) - 1);
                realmParticles.push({ x: radius * Math.sin(phi) * Math.cos(theta), y: radius * Math.sin(phi) * Math.sin(theta), z: radius * Math.cos(phi), type: 'sphere' });
            }
        } 
        else if (id === 8) {
            let radius = 140;
            for(let i=0; i<500; i++) {
                let theta = Math.random() * Math.PI; let phi = Math.acos((Math.random() * 2) - 1);
                realmParticles.push({ x: radius * Math.sin(phi) * Math.cos(theta), y: radius * Math.sin(phi) * Math.sin(theta), z: radius * Math.cos(phi), type: 'half-moon' });
            }
        }
        else if (id === 9) {
            let w = 120, h = 40, d = 160; 
            for(let x = -w; x <= w; x += 15) {
                for(let y = -h; y <= h; y += 15) {
                    for(let z = -d; z <= d; z += 15) {
                        if(Math.abs(x) === w || Math.abs(y) === h || Math.abs(z) === d) {
                            realmParticles.push({ bx: x, by: y, bz: z, type: 'box' });
                        }
                    }
                }
            }
        }
        else if (id === 10) {
            let height = 300, radius = 60, sides = 6;
            for(let y = -height/2; y <= height/2; y += 10) {
                for(let s = 0; s <= sides; s++) {
                    let angle = (s / sides) * Math.PI * 2;
                    realmParticles.push({ x: radius * Math.cos(angle), y: y, z: radius * Math.sin(angle), type: 'prism' });
                }
            }
        }
        else if (id === 13) {
            for(let i = 0; i < 300; i++) {
                let theta = Math.random() * Math.PI * 2; let phi = Math.acos(Math.random()*2 - 1); let r = Math.random() * 60 + 20;
                realmParticles.push({ x: r*Math.sin(phi)*Math.cos(theta), y: r*Math.cos(phi), z: r*Math.sin(phi)*Math.sin(theta), size: Math.random()*2+1, type: 'r13Saha' });
                theta = Math.random() * Math.PI * 2; phi = Math.acos(Math.random()*2 - 1); r = Math.random() * 60 + 20;
                realmParticles.push({ x: r*Math.sin(phi)*Math.cos(theta), y: r*Math.cos(phi), z: r*Math.sin(phi)*Math.sin(theta), size: Math.random()*2+1, type: 'r13Pure' });
            }
        }
        else if (id === 20) {
            let coreR = 80;
            for(let i=0; i<1200; i++) {
                let theta = Math.random() * Math.PI * 2; let phi = Math.acos((Math.random() * 2) - 1);
                let flameNoise = Math.sin(theta * 6) * 20 + Math.cos(phi * 4) * 25;
                let r = coreR + flameNoise + Math.random() * 15;
                let isCreature = Math.random() > 0.85; 
                let orbitSpeed = isCreature ? Math.random() * 0.08 + 0.03 : 0;
                realmParticles.push({ baseR: r, theta: theta, phi: phi, type: 'flame', isCreature: isCreature, oSpeed: orbitSpeed, hue: 30 + Math.random() * 40, s: isCreature ? Math.random() * 3 + 2 : Math.random() * 1.5 + 0.5 });
            }
        }
                // 🟢 【第 1 重：最勝光遍照 (黃金螺旋廣大寶網)】
        else if (id === 1) {
            let N = 800; // 象徵微塵數諸佛
            let R = 180; // 廣大的法界半徑
            let goldenAngle = Math.PI * (3 - Math.sqrt(5)); // 宇宙黃金角
            
            for(let i=0; i<N; i++) {
                // 黃金螺旋立體分佈算法
                let y = 1 - (i / (N - 1)) * 2; 
                let radius = Math.sqrt(1 - y*y);
                let theta = goldenAngle * i;
                
                let px = Math.cos(theta) * radius * R;
                let py = y * R;
                let pz = Math.sin(theta) * radius * R;
                
                realmParticles.push({
                    baseX: px, baseY: py, baseZ: pz,
                    offsetSeed: Math.random() * Math.PI * 2, // 獨立閃爍種子
                    type: 'mani'
                });
            }
        }
        // 🟢 【第 2 重：種種香蓮華 (立體呼吸蓮花與螺旋香雲)】
        else if (id === 2) {
            // 1. 生成立體蓮花花瓣 (4層)
            const petalLayers = 4;
            const petalsPerLayer = [6, 8, 10, 12];
            for (let l = 0; l < petalLayers; l++) {
                let pCount = petalsPerLayer[l];
                let radiusOut = 40 + l * 25; // 每一層向外擴張
                let heightUp = 20 + l * 20;  // 花瓣高度
                
                for (let p = 0; p < pCount; p++) {
                    let angleCenter = (Math.PI * 2 / pCount) * p + (l * 0.3); // 每層錯開角度
                    // 繪製單片花瓣的網格點
                    for (let t = 0; t <= 1; t += 0.1) { // 從根部(0)到尖端(1)
                        for (let w = -1; w <= 1; w += 0.4) { // 花瓣橫向寬度
                            let petalWidth = Math.sin(t * Math.PI) * (15 + l * 5); // 橢圓形：中間寬，兩頭尖
                            let currentR = t * radiusOut;
                            let currentY = -t * heightUp + (w * w * 12); // 向上生長並帶有立體內凹弧度

                            // 繞 Y 軸旋轉到對應的花瓣位置
                            let px = currentR * Math.cos(angleCenter) - (w * petalWidth) * Math.sin(angleCenter);
                            let pz = currentR * Math.sin(angleCenter) + (w * petalWidth) * Math.cos(angleCenter);

                            realmParticles.push({
                                baseX: px, baseY: currentY + 40, baseZ: pz, // +40 讓整朵蓮花往下沉一點對齊視角
                                type: 'lotus', layer: l, t: t 
                            });
                        }
                    }
                }
            }

            // 2. 生成香氣微塵 (摩尼香雲)
            for(let i=0; i<300; i++) {
                realmParticles.push({
                    baseX: (Math.random() - 0.5) * 300,
                    baseY: Math.random() * 200 - 50,
                    baseZ: (Math.random() - 0.5) * 300,
                    type: 'aroma',
                    speedY: Math.random() * 0.8 + 0.3,
                    offsetSeed: Math.random() * Math.PI * 2
                });
            }
        }

        // 👇 未來世界的代碼插入點 👇
        // else if (id === 2) { 
        //    // 預留給【種種香蓮華】
        // }
        // 👆 未來世界的代碼插入點 👆
        
        // 🟢 通用動態佔位符 (若該層尚未實作專屬演算法，則顯示多邊旋轉曼陀羅)
        else {
            const sides = (id % 5) + 3; const rings = 6;
            for(let r=1; r<=rings; r++) {
                let radius = r * 30; let pts = sides * r * 3;
                for(let i=0; i<pts; i++) {
                    let theta = (i / pts) * Math.PI * 2;
                    realmParticles.push({ theta: theta, radius: radius, layer: r, type: 'generic', sides: sides });
                }
            }
        }
    }

    // =========================================================================
    // 🟢 模組化插入點：所有新開發的世界視覺渲染代碼，請加在下方的 if-else 內
    // =========================================================================
    function renderWorld() {
        let projected = [];
        let data = RealmMatrix[currentRealmIndex];
        let baseColor = data.theme === 'gold' ? '212,175,55' : (data.theme === 'cyan' ? '139,168,156' : (data.theme === 'silver' ? '224,224,224' : '168,50,50'));
        let id = data.id;

        if(id === 9) {
            if(!isDragging) { angleY += 0.005; angleX = Math.sin(time*0.5)*0.3; } 
            realmParticles.forEach(p => {
                let wave = Math.sin(p.bx * 0.05 + time*3) * Math.cos(p.bz * 0.05 + time*2) * 15;
                let y = p.by + (Math.abs(p.by) < 40 ? wave : 0); 
                let proj = project3D(p.bx, y, p.bz);
                if(proj) projected.push({ ...proj, a: 0.6, c: `rgba(${baseColor},`, isGlow: true });
            });
        }
        else if(id === 13) {
            let orbitSpeed = time * 0.8;
            let cx1 = 120 * Math.cos(orbitSpeed), cz1 = 120 * Math.sin(orbitSpeed);
            let cx2 = 120 * Math.cos(orbitSpeed + Math.PI), cz2 = 120 * Math.sin(orbitSpeed + Math.PI);
            let p1 = project3D(cx1, Math.sin(time*2)*20, cz1); let p2 = project3D(cx2, Math.sin(time*2 + Math.PI)*20, cz2);
            if(p1 && p2) { ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.strokeStyle = `rgba(212,175,55,0.2)`; ctx.lineWidth = 2 * p1.scale; ctx.stroke(); }
            realmParticles.forEach(p => {
                let proj;
                if(p.type === 'r13Saha') { proj = project3D(p.x + cx1, p.y + Math.sin(time*2)*20, p.z + cz1); if(proj) projected.push({ ...proj, c: 'rgba(139,168,156,', a:0.8, s: p.size, isSaha: true }); }
                else { proj = project3D(p.x + cx2, p.y + Math.sin(time*2 + Math.PI)*20, p.z + cz2); if(proj) projected.push({ ...proj, c: 'rgba(243,229,171,', a:0.9, s: p.size, isSaha: false }); }
            });
        }
        else if (id === 20) {
            if(!isDragging) { angleY += 0.005; angleX = 0.2 + Math.sin(time*0.5)*0.1; }
            realmParticles.forEach(p => {
                if(p.isCreature) { p.theta += p.oSpeed; p.phi += p.oSpeed * 0.5; }
                let breath = 1 + Math.sin(time * 3 + p.theta) * 0.1;
                let r = p.baseR * breath;
                let x = r * Math.sin(p.phi) * Math.cos(p.theta); let y = r * Math.cos(p.phi) - 20; let z = r * Math.sin(p.phi) * Math.sin(p.theta);
                let proj = project3D(x, y, z);
                if(proj) {
                    let a = p.isCreature ? 0.95 : 0.4 + Math.sin(time * 5 + p.theta) * 0.3;
                    let c = p.isCreature ? `hsla(60, 100%, 80%, ${a})` : `hsla(${p.hue}, 90%, 60%, ${a})`;
                    projected.push({ x: proj.x, y: proj.y, z: proj.z, sc: proj.scale, a: a, c: c, isGlow: true, s: p.s * (p.isCreature ? 1.8 : 1) });
                }
            });
        }
        else if (id === 3 || id === 8 || id === 10) {
            if(!isDragging) angleY += 0.003;
            realmParticles.forEach(p => {
                let breath = 1 + Math.sin(time * 2) * 0.05; 
                let proj = project3D(p.x * breath, p.y * breath, p.z * breath);
                if(proj) projected.push({ ...proj, a: 0.7, c: `rgba(${baseColor},`, isGlow: true });
            });
        }
                // 【1: 最勝光遍照】(微塵數摩尼寶光閃耀)
        else if (id === 1) {
            // 宏大且沉穩的自轉
            if(!isDragging) { angleY += 0.002; angleX = Math.sin(time*0.3)*0.1; } 
            
            realmParticles.forEach(p => {
                // 每一顆摩尼寶珠都有微小的呼吸擴張感
                let breath = 1 + Math.sin(time * 1.5 + p.offsetSeed) * 0.03;
                let x = p.baseX * breath;
                let y = p.baseY * breath;
                let z = p.baseZ * breath;

                let proj = project3D(x, y, z);
                if(proj) {
                    // 閃爍邏輯：隨機爆發強光，模擬金剛與摩尼寶光
                    let sparkle = Math.sin(time * 4 + p.offsetSeed);
                    let isBright = sparkle > 0.85; 
                    
                    // 越近越亮，發光時透明度極高
                    let a = isBright ? 0.95 : 0.3 + (proj.scale * 0.4);
                    
                    // 寶光以純白與真金交織
                    let color = isBright ? 'rgba(255,255,255,' : `rgba(243,229,171,`;
                    
                    projected.push({ 
                        x: proj.x, y: proj.y, z: proj.z, sc: proj.scale, 
                        a: a, c: color, 
                        isGlow: isBright, // 只有閃耀時才開啟高強度光暈，節省效能
                        s: isBright ? 2.5 : 1.2 
                    });
                }
            });
        }
        // 【2: 種種香蓮華】(琉璃蓮瓣開合，黃金香氣升騰)
        else if (id === 2) {
            // 視角緩慢盤旋俯瞰
            if(!isDragging) { angleY += 0.003; angleX = 0.3 + Math.sin(time*0.4)*0.1; } 
            
            realmParticles.forEach(p => {
                if (p.type === 'lotus') {
                    // 花瓣輕微呼吸開合 (利用 layer 與 t 產生波浪感)
                    let breath = 1 + Math.sin(time * 2 + p.layer) * 0.06 * p.t;
                    let x = p.baseX * breath;
                    let y = p.baseY + Math.sin(time * 1.5) * 5; // 整朵蓮花輕微上下浮動
                    let z = p.baseZ * breath;

                    let proj = project3D(x, y, z);
                    if(proj) {
                        // 越靠近花瓣尖端 (p.t 接近 1)，透明度越高且發光
                        let a = 0.15 + (p.t * 0.6); 
                        projected.push({ 
                            x: proj.x, y: proj.y, z: proj.z, sc: proj.scale, 
                            a: a, c: `rgba(139,168,156,`, // 琉璃青主題色
                            isGlow: p.t > 0.8, // 尖端開啟光暈
                            s: 1.2 
                        });
                    }
                } 
                else if (p.type === 'aroma') {
                    // 香氣裊裊上升
                    p.baseY -= p.speedY;
                    if (p.baseY < -200) p.baseY = 150; // 飄到頂端後從底部重生
                    
                    // 螺旋上升方程式
                    let spiralX = p.baseX + Math.sin(p.baseY * 0.02 + time + p.offsetSeed) * 20;
                    let spiralZ = p.baseZ + Math.cos(p.baseY * 0.02 + time + p.offsetSeed) * 20;

                    let proj = project3D(spiralX, p.baseY, spiralZ);
                    if(proj) {
                        // 摩尼寶香氣忽明忽暗
                        let a = (Math.sin(time * 3 + p.offsetSeed) + 1) / 2 * 0.7;
                        projected.push({ 
                            x: proj.x, y: proj.y, z: proj.z, sc: proj.scale, 
                            a: a, c: `rgba(243,229,171,`, // 黃金摩尼色
                            isGlow: true, 
                            s: 2.0 
                        });
                    }
                }
            });
        }

        // 👇 未來世界的渲染插入點 👇
        // else if (id === 2) { 
        //    // 預留給【種種香蓮華】
        // }
        // 👆 未來世界的渲染插入點 👆
        
        else {
            if(!isDragging) angleY -= 0.002;
            realmParticles.forEach(p => {
                let modAngle = p.theta % (Math.PI * 2 / p.sides);
                let polygonR = p.radius / Math.cos(modAngle - (Math.PI / p.sides));
                let breath = Math.sin(time * 2 + p.layer * 0.5) * 10;
                let x = (polygonR + breath) * Math.cos(p.theta + time * 0.2 * (p.layer%2===0?1:-1));
                let z = (polygonR + breath) * Math.sin(p.theta + time * 0.2 * (p.layer%2===0?1:-1));
                let y = Math.sin(time + p.theta*3) * 30;
                let proj = project3D(x, y, z);
                if(proj) projected.push({ ...proj, a: 0.4 + (p.layer/8)*0.6, c: `rgba(${baseColor},`, isGlow: true });
            });
        }

        // 統一繪製輸出
        projected.sort((a,b) => b.z - a.z);
        ctx.globalCompositeOperation = 'screen';
        projected.forEach(p => {
            let s = p.s ? p.s : 1.5;
            ctx.beginPath(); ctx.arc(p.x, p.y, s * p.sc, 0, Math.PI*2);
            // 處理 HSLA 與 RGBA 的字串相容
            ctx.fillStyle = p.c.includes('hsla') ? p.c : `${p.c}${p.a})`;
            if(p.isGlow || p.type === 'r13Pure') { 
                ctx.shadowBlur = 8 * p.sc; 
                ctx.shadowColor = p.c.includes('hsla') ? p.c : p.c.replace(',','').replace('rgba(','#'); 
            } else { ctx.shadowBlur = 0; }
            ctx.fill();
        });
        ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';
    }

    function animate() {
        ctx.fillStyle = 'rgba(1, 1, 3, 0.5)';
        ctx.fillRect(0, 0, width, height);
        time += 0.015;

        // 共用星空
        ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= s.speed; if (s.z <= 0) { s.z = 2000; s.x = (Math.random()-0.5)*3000; s.y = (Math.random()-0.5)*3000; }
            let sc = FOV / (FOV + s.z); let sx = (width/2) + s.x*sc; let sy = (height/2) + s.y*sc - 50;
            ctx.beginPath(); ctx.arc(sx, sy, Math.max(0.1, s.size*sc), 0, Math.PI*2);
            ctx.fillStyle = s.color === '#f3e5ab' ? `rgba(243,229,171, ${Math.min(1, sc*2)})` : `rgba(139,168,156, ${Math.min(1, sc*2)})`; ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over';

        renderWorld();
        requestAnimationFrame(animate);
    }

    // 觸控互動
    function onDown(e) { if(e.target.closest('.ui-layer') || e.target.closest('#theory-drawer')) return; isDragging = true; lastMouseX = e.touches?e.touches[0].clientX:e.clientX; lastMouseY = e.touches?e.touches[0].clientY:e.clientY; }
    function onMove(e) { if (!isDragging) return; let curX = e.touches?e.touches[0].clientX:e.clientX; let curY = e.touches?e.touches[0].clientY:e.clientY; angleY += (curX-lastMouseX)*0.01; angleX += (curY-lastMouseY)*0.01; angleX = Math.max(-Math.PI/2, Math.min(Math.PI/2, angleX)); lastMouseX=curX; lastMouseY=curY; }
    function onUp() { isDragging = false; }
    canvas.addEventListener('mousedown', onDown); canvas.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
    canvas.addEventListener('touchstart', onDown, {passive: true}); canvas.addEventListener('touchmove', onMove, {passive: true}); window.addEventListener('touchend', onUp);

    // 玉簡抽屜與語音
    function openTheoryDrawer() { document.getElementById('theory-drawer').classList.add('open'); }
    function closeTheoryDrawer() { document.getElementById('theory-drawer').classList.remove('open'); }
    document.getElementById('theory-drawer').addEventListener('pointerdown', (e) => e.stopPropagation());
    
    let isPlayingTheory = false; let theoryUtterance = null; window.sysUtterances = []; 
    function toggleTheoryAudio() {
        if (!window.speechSynthesis) return;
        const btnText = document.getElementById('tts-text'); const btnIcon = document.getElementById('tts-icon');
        if (isPlayingTheory) {
            window.speechSynthesis.cancel(); isPlayingTheory = false; btnText.innerText = "聆聽法音";
            btnIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>';
        } else {
            let textToRead = Array.from(document.querySelectorAll('#theory-content-box .main-title, #theory-content-box .paragraph')).map(n => n.textContent.trim()).join('。');
            let isAndroid = /Android/i.test(navigator.userAgent);
            textToRead = isAndroid ? textToRead : textToRead.replace(/阿/g, 'ㄚ');
            
            theoryUtterance = new SpeechSynthesisUtterance(textToRead); theoryUtterance.lang = 'zh-TW'; theoryUtterance.rate = 0.85; 
            if (isAndroid) {
                window.sysUtterances.push(theoryUtterance);
                let voices = window.speechSynthesis.getVoices();
                if (voices.length > 0) {
                    let zhVoice = voices.find(v => v.lang === 'zh-TW' && v.name.includes('Google')) || voices.find(v => v.lang.includes('zh'));
                    if (zhVoice) theoryUtterance.voice = zhVoice;
                }
            }
            theoryUtterance.onend = () => {
                isPlayingTheory = false; btnText.innerText = "聆聽法音";
                btnIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>';
                if(isAndroid) window.sysUtterances = window.sysUtterances.filter(u => u !== theoryUtterance);
            };
            setTimeout(() => { window.speechSynthesis.speak(theoryUtterance); }, isAndroid ? 150 : 50);
            isPlayingTheory = true; btnText.innerText = "停止聆聽"; btnIcon.innerHTML = '<rect x="6" y="6" width="12" height="12"></rect>';
        }
    }
    const originalCloseTheoryDrawer = closeTheoryDrawer;
    closeTheoryDrawer = function() { if (isPlayingTheory) toggleTheoryAudio(); originalCloseTheoryDrawer(); }

    // 啟動系統
    initPicker(); selectRealm(currentRealmIndex); 
    setTimeout(() => { document.getElementById(`picker-${currentRealmIndex}`).scrollIntoView({ inline: 'center' }); }, 100);
    animate();
</script>
