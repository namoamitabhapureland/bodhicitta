<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>彌陀淨土系統 ‧ 首頁合十</title>
<style>
:root {
  --bg-deep: #010204;
  --gold: #f3e5ab;
  --solid-gold: #d4af37;
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg-deep);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: "PingFang TC", "Microsoft JhengHei", serif;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

#starBg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

.scene {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer;
}

/* 契合主系統的呼吸浮動感 */
.hands-wrap {
  animation: float 4s ease-in-out infinite;
  position: relative;
}

@keyframes float {
  0% { transform: translateY(0px); filter: drop-shadow(0 5px 15px rgba(212,175,55,0.05)); }
  50% { transform: translateY(-8px); filter: drop-shadow(0 15px 30px rgba(212,175,55,0.25)); }
  100% { transform: translateY(0px); filter: drop-shadow(0 5px 15px rgba(212,175,55,0.05)); }
}

.scene:active .hands-wrap { transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
.hands-svg { 
  overflow: visible; display: block; 
  transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.caption {
  margin-top: 30px;
  color: var(--gold);
  font-size: 1.15rem;
  font-weight: 500;
  letter-spacing: 12px;
  text-shadow: 0 0 15px rgba(212,175,55,0.6);
  pointer-events: none;
  margin-left: 12px; 
}

/* 粒子光效 */
.particle {
  position: fixed; width: 3px; height: 3px; border-radius: 50%;
  background: #fff;
  pointer-events: none; z-index: 9999;
  box-shadow: 0 0 8px var(--gold), 0 0 12px var(--solid-gold);
}
</style>
</head>
<body>

<canvas id="starBg"></canvas>

<div class="scene" id="handsBtn">
  <div class="hands-wrap">
    <svg class="hands-svg" viewBox="0 0 200 320" width="180" height="288" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="glass-base" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="rgba(243, 229, 171, 0.35)"/>
          <stop offset="50%" stop-color="rgba(212, 175, 55, 0.20)"/>
          <stop offset="100%" stop-color="rgba(212, 175, 55, 0.08)"/>
        </linearGradient>

        <radialGradient id="burst-glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
          <stop offset="30%" stop-color="rgba(212,175,55,0.6)"/>
          <stop offset="100%" stop-color="rgba(212,175,55,0)"/>
        </radialGradient>

        <filter id="mist-blur" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="12" />
        </filter>

        <path id="swirl1" d="M 10 0 A 10 10 0 0 1 -10 0 A 7.5 7.5 0 0 1 5 0 A 4 4 0 0 1 -3 0 A 1.5 1.5 0 0 1 0 0" stroke="var(--solid-gold)" fill="none" stroke-linecap="round" stroke-width="1.2"/>
        <path id="swirl2" d="M -8 0 A 8 8 0 0 0 8 0 A 5.5 5.5 0 0 0 -3 0 A 3 3 0 0 0 3 0 A 1.5 1.5 0 0 0 0 0" stroke="var(--solid-gold)" fill="none" stroke-linecap="round" stroke-width="1.2"/>
      </defs>

      <ellipse id="burst-el" cx="100" cy="180" rx="0" ry="0" fill="url(#burst-glow)" opacity="0"/>

      <path id="hand-silhouette" d="
        M 100 25 
        C 97 18, 93 20, 92 30 
        L 62 165 
        C 58 190, 55 230, 65 280 
        Q 100 290 135 280 
        C 145 230, 142 190, 138 165 
        L 108 30 
        C 107 20, 103 18, 100 25 Z" 
        fill="url(#glass-base)" 
        stroke="var(--solid-gold)" stroke-width="1.5" stroke-linejoin="round"/>

      <path d="M 96 23 C 98 25, 98 32, 94 34" stroke="var(--solid-gold)" stroke-width="1" fill="none" />
      <path d="M 104 23 C 102 25, 102 32, 106 34" stroke="var(--solid-gold)" stroke-width="1" fill="none" />

      <path d="M 100 25 L 100 160" stroke="var(--solid-gold)" stroke-width="1.5" stroke-linecap="round" fill="none" />
      
      <path d="M 136 175 C 125 155, 110 152, 102 155" stroke="rgba(212,175,55,0.8)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

      <path d="M 63 170 C 80 155, 95 152, 112 158 C 118 160, 120 170, 115 175 C 95 188, 75 198, 63 215 Z" 
            fill="var(--bg-deep)" />
            
      <path d="M 63 170 C 80 155, 95 152, 112 158 C 118 160, 120 170, 115 175 C 95 188, 75 198, 63 215 Z" 
            fill="url(#glass-base)" />
            
      <path d="M 63 170 C 80 155, 95 152, 112 158 C 118 160, 120 170, 115 175 C 95 188, 75 198, 63 215" 
            stroke="var(--solid-gold)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
            
      <path d="M 103 162 C 109 159, 113 161, 113 166 C 109 169, 103 167, 103 162 Z" 
            stroke="var(--solid-gold)" stroke-width="1" fill="none" />

      <path d="M 105 182 Q 125 218 138 210" stroke="var(--solid-gold)" stroke-width="1.5" stroke-linecap="round" fill="none" />

      <g id="cloud-pedestal">
        <path d="M 40 270 Q 70 290 100 280 T 160 270" stroke="rgba(212,175,55,0.5)" fill="none" stroke-width="1" stroke-linecap="round"/>
        <path d="M 55 285 Q 80 305 110 295 T 145 285" stroke="rgba(212,175,55,0.3)" fill="none" stroke-width="0.8" stroke-linecap="round"/>

        <use href="#swirl1" transform="translate(100, 275) scale(1.5) rotate(0)"/>
        <use href="#swirl2" transform="translate(80, 272) scale(1.2) rotate(-30)"/>
        <use href="#swirl1" transform="translate(120, 272) scale(1.3) rotate(45)"/>
        <use href="#swirl2" transform="translate(60, 265) scale(0.9) rotate(-70)"/>
        <use href="#swirl1" transform="translate(140, 265) scale(1.0) rotate(80)"/>
        <use href="#swirl1" transform="translate(90, 290) scale(1.1) rotate(110)"/>
        <use href="#swirl2" transform="translate(112, 288) scale(0.9) rotate(-120)"/>
        <use href="#swirl2" transform="translate(100, 300) scale(0.7) rotate(90)"/>
        <use href="#swirl1" transform="translate(45, 276) scale(0.7) rotate(20)"/>
        <use href="#swirl2" transform="translate(155, 276) scale(0.75) rotate(-50)"/>
        <use href="#swirl2" transform="translate(70, 285) scale(0.85) rotate(-160)"/>
        <use href="#swirl1" transform="translate(130, 284) scale(0.8) rotate(150)"/>
      </g>

      <g filter="url(#mist-blur)" style="pointer-events: none;">
        <ellipse cx="60" cy="280" rx="60" ry="25" fill="rgba(243,229,171,0.25)">
          <animate attributeName="cx" values="50; 70; 50" dur="8s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0.4; 0.8; 0.4" dur="6s" repeatCount="indefinite" />
        </ellipse>
        <ellipse cx="140" cy="275" rx="60" ry="25" fill="rgba(139,168,156,0.25)">
          <animate attributeName="cx" values="150; 130; 150" dur="10s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0.4; 0.8; 0.4" dur="7s" repeatCount="indefinite" />
        </ellipse>
        <ellipse cx="100" cy="300" rx="80" ry="30" fill="rgba(212,175,55,0.2)">
          <animate attributeName="cy" values="305; 295; 305" dur="7s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0.4; 0.7; 0.4" dur="9s" repeatCount="indefinite" />
        </ellipse>
        <ellipse cx="100" cy="245" rx="50" ry="20" fill="rgba(255,255,255,0.15)">
          <animate attributeName="cx" values="110; 90; 110" dur="9s" repeatCount="indefinite" />
          <animate attributeName="cy" values="248; 240; 248" dur="8s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0.3; 0.6; 0.3" dur="5s" repeatCount="indefinite" />
        </ellipse>
      </g>

    </svg>
  </div>
  <div class="caption">合 十</div>
</div>

<script>
// ═══════════════════════════════════
// 星空背景 
// ═══════════════════════════════════
const cvs = document.getElementById('starBg');
const ctx = cvs.getContext('2d');
let stars = [];

function initStars() {
  cvs.width  = window.innerWidth;
  cvs.height = window.innerHeight;
  stars = Array.from({ length: 150 }, () => ({
    x:  Math.random() * cvs.width,
    y:  Math.random() * cvs.height,
    r:  Math.random() * 1.5 + 0.5,
    sp: Math.random() * 0.002 + 0.0005,
    ph: Math.random() * Math.PI * 2
  }));
}
function drawStars() {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  const t = Date.now();
  stars.forEach(s => {
    ctx.globalAlpha = 0.15 + Math.abs(Math.sin(t * s.sp + s.ph)) * 0.6;
    ctx.fillStyle = '#f3e5ab'; // 柔和香檳金
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize', initStars);
initStars();
drawStars();

// ═══════════════════════════════════
// 點擊爆發金光粒子特效
// ═══════════════════════════════════
const burstEl = document.getElementById('burst-el');
let busy = false;

function doBurst(cx, cy) {
  if (busy) return;
  busy = true;

  // 粒子噴射
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    document.body.appendChild(p);

    const ang  = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 120;
    const tx   = Math.cos(ang) * dist;
    const ty   = Math.sin(ang) * dist;
    const dur  = 800 + Math.random() * 400;

    p.animate([
      { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
      { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
    ], { duration: dur, easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)' }).onfinish = () => p.remove();
  }

  // 掌心光芒擴散
  let t0 = null;
  const dur = 600;

  function frame(ts) {
    if (!t0) t0 = ts;
    const progress = Math.min((ts - t0) / dur, 1);
    const eased = 1 - Math.pow(1 - progress, 3);

    burstEl.setAttribute('rx', eased * 140);
    burstEl.setAttribute('ry', eased * 160);

    const opacity = progress < 0.2 
      ? progress * 5 
      : Math.max(0, 1 - (progress - 0.2) * 1.25);
    burstEl.setAttribute('opacity', opacity * 0.8);

    if (progress < 1) {
      requestAnimationFrame(frame);
    } else {
      burstEl.setAttribute('opacity', 0);
      busy = false;
      
      // 動畫結束後跳轉至主系統
      setTimeout(() => { window.location.href = 'index.html'; }, 200);
    }
  }
  requestAnimationFrame(frame);
}

const btn = document.getElementById('handsBtn');
btn.addEventListener('click', e => doBurst(e.clientX, e.clientY));
btn.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  doBurst(t.clientX, t.clientY);
}, { passive: false });
</script>
</body>
</html>
