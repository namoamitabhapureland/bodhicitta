<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大迴向按鈕 ‧ 蓮瓣陣列測試</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
        }

        /* 模擬深邃的星空背景，以測試毛玻璃透視效果 */
        body {
            margin: 0; 
            background: radial-gradient(circle at 50% 30%, #1a1225 0%, #010103 80%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; gap: 50px; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }
        
        .label { color: #8ba89c; font-size: 0.85rem; letter-spacing: 2px; margin-bottom: -30px; text-shadow: 0 0 5px #000; }

        /* ✨ 懸浮大迴向按鈕核心 CSS ✨ */
        .btn-dedi-fixed {
            width: 90vw; max-width: 400px; 
            height: 68px; /* 固定高度以容納底部花瓣 */
            background: rgba(10, 12, 10, 0.75); /* 極深的高級透明黑 */
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212,175,55,0.4);
            border-top: 1px solid rgba(243,229,171,0.6); /* 頂部邊緣高光，增加立體感 */
            border-radius: 34px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9), 0 0 20px rgba(212,175,55,0.3), inset 0 0 15px rgba(212,175,55,0.1);
            cursor: pointer; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative; overflow: hidden; /* 確保花瓣不會超出圓角 */
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 15px; /* 將文字推向上方 */
        }
        
        .btn-dedi-fixed:active {
            transform: translateY(4px) scale(0.98);
            box-shadow: 0 5px 15px rgba(0,0,0,0.9), 0 0 30px rgba(212,175,55,0.5);
            border-color: var(--solid-gold);
        }
        
        /* 懸浮的純金大願文字 */
        .dedi-text {
            color: var(--gold); font-size: 1.1rem; font-weight: bold; letter-spacing: 4px;
            text-shadow: 0 0 12px rgba(243,229,171,0.6); z-index: 10;
        }
        
        /* 橫向蓮花瓣能量棒的容器 */
        .dedi-svg-base {
            position: absolute; bottom: -1px; left: 0; width: 100%; height: 32px;
            z-index: 5; pointer-events: none;
        }
        .dedi-svg-base svg { width: 100%; height: 100%; display: block; }
        
    </style>
</head>
<body>

    <div class="label">【十方琉璃 彩色版】</div>
    
    <div class="btn-dedi-fixed">
        <span class="dedi-text">大迴向 ． 導歸極樂</span>
        <div class="dedi-svg-base">
            <svg viewBox="0 0 100 25" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="glowBase1" x1="0%" y1="100%" x2="0%" y2="0%">
                        <stop offset="0%" stop-color="#d4af37" stop-opacity="0.6"/>
                        <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
                    </linearGradient>
                </defs>
                <rect x="0" y="22" width="100" height="3" fill="url(#glowBase1)"/>
                
                <polygon points="30,25 0,20 10,13 25,20" fill="rgba(156,39,176,0.3)" stroke="#e1bee7" stroke-width="0.3"/>
                <polygon points="70,25 100,20 90,13 75,20" fill="rgba(156,39,176,0.3)" stroke="#e1bee7" stroke-width="0.3"/>
                
                <polygon points="42,25 20,16 28,9 40,17" fill="rgba(139,168,156,0.4)" stroke="#a8e6cf" stroke-width="0.3"/>
                <polygon points="58,25 80,16 72,9 60,17" fill="rgba(139,168,156,0.4)" stroke="#a8e6cf" stroke-width="0.3"/>
                
                <polygon points="47,25 35,11 41,5 47,14" fill="rgba(244,143,177,0.4)" stroke="#ff8b94" stroke-width="0.4"/>
                <polygon points="53,25 65,11 59,5 53,14" fill="rgba(244,143,177,0.4)" stroke="#ff8b94" stroke-width="0.4"/>
                
                <polygon points="50,25 45,9 50,1 55,9" fill="rgba(243,229,171,0.6)" stroke="var(--gold)" stroke-width="0.5" filter="drop-shadow(0 0 2px rgba(243,229,171,0.8))"/>
            </svg>
        </div>
    </div>

    <div class="label">【純淨金線 無色版】</div>

    <div class="btn-dedi-fixed">
        <span class="dedi-text">大迴向 ． 導歸極樂</span>
        <div class="dedi-svg-base">
            <svg viewBox="0 0 100 25" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="glowBase2" x1="0%" y1="100%" x2="0%" y2="0%">
                        <stop offset="0%" stop-color="#d4af37" stop-opacity="0.6"/>
                        <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
                    </linearGradient>
                </defs>
                <rect x="0" y="22" width="100" height="3" fill="url(#glowBase2)"/>
                
                <polygon points="30,25 0,20 10,13 25,20" fill="rgba(212,175,55,0.1)" stroke="var(--solid-gold)" stroke-width="0.3"/>
                <polygon points="70,25 100,20 90,13 75,20" fill="rgba(212,175,55,0.1)" stroke="var(--solid-gold)" stroke-width="0.3"/>
                <polygon points="42,25 20,16 28,9 40,17" fill="rgba(212,175,55,0.2)" stroke="var(--solid-gold)" stroke-width="0.3"/>
                <polygon points="58,25 80,16 72,9 60,17" fill="rgba(212,175,55,0.2)" stroke="var(--solid-gold)" stroke-width="0.3"/>
                <polygon points="47,25 35,11 41,5 47,14" fill="rgba(243,229,171,0.3)" stroke="var(--gold)" stroke-width="0.4"/>
                <polygon points="53,25 65,11 59,5 53,14" fill="rgba(243,229,171,0.3)" stroke="var(--gold)" stroke-width="0.4"/>
                <polygon points="50,25 45,9 50,1 55,9" fill="rgba(243,229,171,0.6)" stroke="var(--gold)" stroke-width="0.5" filter="drop-shadow(0 0 2px rgba(243,229,171,0.8))"/>
            </svg>
        </div>
    </div>

</body>
</html>
