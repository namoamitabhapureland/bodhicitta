<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>神聖蓮花 ‧ 融合示範頁</title>
<style>
:root {
  --gold: #f3e5ab;
  --solid-gold: #d4af37;
  --cyan: #9fdfc8;
  --bg: #050505;
}
/* 終極防護：阻斷 iPhone 雙擊放大與選取反白 */
* { 
  box-sizing: border-box; margin: 0; padding: 0; 
  -webkit-tap-highlight-color: transparent; 
  touch-action: manipulation; 
}
body {
  background: var(--bg); color: #eee; font-family: "PingFang TC", serif;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
  -webkit-user-select: none; user-select: none;
}

h2 { color: var(--gold); font-size: 1.1rem; letter-spacing: 6px; font-weight: normal; margin-bottom: 8px; text-align: center; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
.sub { color: #888; font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 40px; text-align: center; }

/* ── 念佛主圓 ── */
.circle-wrap {
  position: relative; width: 300px; height: 300px; margin: 0 auto;
  cursor: pointer; display: flex; justify-content: center; align-items: center;
}

/* 會呼吸的中心蓮花容器 */
#lotus-container {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 240px; height: 240px; z-index: 1;
  transition: filter 0.3s, transform 0.1s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.lotus-pulse { transform: translate(-50%, -50%) scale(1.08) !important; filter: drop-shadow(0 0 25px #fff) !important; }

/* 外圈進度環 SVG */
#outer-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

/* 念佛數字 */
#nian-count {
  position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%);
  font-size: 2.8rem; font-weight: bold; color: var(--gold); letter-spacing: 4px;
  text-shadow: 0 0 15px rgba(212,175,55,0.4); white-space: nowrap; z-index: 10;
}

/* 點擊爆發金光幕 */
#burst-overlay {
  position: fixed; inset: 0; z-index: 9998; pointer-events: none; opacity: 0;
  background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(243,229,171,0.9) 30%, rgba(212,175,55,0.7) 60%, transparent 100%);
  mix-blend-mode: screen; transition: opacity 1.5s ease-out;
}

/* 粒子與花雨特效 */
.gold-dust { position: fixed; background: var(--gold); border-radius: 50%; pointer-events: none; animation: dust-fall 1.2s ease-out forwards; z-index: 9999; }
@keyframes dust-fall { 0% { opacity: 1; transform: scale(1) translate(0,0); } 100% { opacity: 0; transform: scale(0) translate(var(--dx), var(--dy)); } }

.petal-rain { position: fixed; top: -30px; pointer-events: none; z-index: 9999; animation: petal-fall linear forwards; }
@keyframes petal-fall { 0% { transform: translateY(0) rotate(0deg) scale(0.6); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 0.8; } 100% { transform: translateY(110vh) rotate(720deg) scale(1.1); opacity: 0; } }

/* 控制欄 */
.controls { margin-top: 100px; width: 90%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; }
.rank-selector { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.rank-btn { padding: 8px 15px; border: 1px solid rgba(212,175,55,0.3); border-radius: 20px; color: #888; font-size: 0.8rem; letter-spacing: 1px; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.03); }
.rank-btn.active { border-color: var(--solid-gold); color: var(--gold); background: rgba(212,175,55,0.15); box-shadow: 0 0 10px rgba(212,175,55,0.2); }
</style>
</head>
<body>

<h2>統一蓮花 ‧ 演算法</h2>
<p class="sub">拔除線框 ‧ 層層綻放的琉璃大千</p>

<div class="circle-wrap" id="circle-wrap">
  <div id="lotus-container"></div>

  <svg id="outer-svg" viewBox="0 0 300 300">
    <circle cx="150" cy="150" r="140" fill="none" stroke="rgba(212,175,55,0.1)" stroke-width="1.5"/>
    <circle id="progress-arc" cx="150" cy="150" r="140" fill="none" stroke="var(--solid-gold)" stroke-width="3" stroke-dasharray="880" stroke-dashoffset="880" stroke-linecap="round" transform="rotate(-90 150 150)" style="transition: stroke-dashoffset 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); filter: drop-shadow(0 0 6px var(--solid-gold));"/>
  </svg>
  <div id="nian-count">0 / 10</div>
</div>

<div id="burst-overlay"></div>

<div class="controls">
  <div class="rank-selector">
    <div class="rank-btn active" onclick="setPreview('信', 1)">初信(青)</div>
    <div class="rank-btn" onclick="setPreview('住', 4)">四住(粉)</div>
    <div class="rank-btn" onclick="setPreview('行', 6)">六行(紫)</div>
    <div class="rank-btn" onclick="setPreview('迴', 8)">八迴(幻彩)</div>
    <div class="rank-btn" onclick="setPreview('地', 10)">十地(金)</div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  神聖蓮花演算法 (Skin) - 對應五大境界與10個Level
// ════════════════════════════════════════════════
function getUnifiedLotusSVG(rankType, level) {
    // 1. 色彩體系映射表
    const colorMap = {
        '信': { top: '#ffffff', mid: '#8ba89c', bot: '#1e382d' }, // 青琉璃
        '住': { top: '#ffffff', mid: '#f48fb1', bot: '#880e4f' }, // 粉琉璃
        '行': { top: '#f3e5f5', mid: '#ce93d8', bot: '#4a148c' }, // 紫琉璃
        '迴': { top: '#fff8e1', mid: '#ffb74d', bot: '#e65100' }, // 幻彩橘
        '地': { top: '#fff8d6', mid: '#d4af37', bot: '#5c400a' }  // 大日金
    };
    
    let c = colorMap[rankType] || colorMap['信'];
    
    // 2. 層數邏輯：Level 1~10 映射為 2~6 層花瓣
    let layers = Math.min(6, Math.max(2, Math.floor(level / 2) + 2)); 
    
    // 3. SVG 定義區 (漸層與光暈)
    let svgHtml = `
        <svg viewBox="0 0 400 400" style="width:100%; height:100%; overflow:visible; filter: drop-shadow(0 0 15px ${c.mid});">
            <defs>
                <linearGradient id="lotusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="${c.top}" stop-opacity="0.9"/>
                    <stop offset="50%" stop-color="${c.mid}" stop-opacity="0.7"/>
                    <stop offset="100%" stop-color="${c.bot}" stop-opacity="0.9"/>
                </linearGradient>
                <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fff"/>
                    <stop offset="40%" stop-color="${c.mid}"/>
                    <stop offset="100%" stop-color="transparent"/>
                </radialGradient>
                <g id="master-petal">
                    <path d="M 200 200 C 150 90, 160 30, 200 0 C 240 30, 250 90, 200 200 Z" 
                          fill="url(#lotusGrad)" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
                </g>
            </defs>
            
            <circle cx="200" cy="200" r="140" fill="none" stroke="${c.mid}" stroke-width="0.8" stroke-dasharray="2 8" opacity="0.5">
                <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="40s" repeatCount="indefinite"/>
            </circle>
            
            <g>
                <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="120s" repeatCount="indefinite"/>
    `;

    // 4. 層疊渲染 (由外而內，越內層越小)
    for (let l = layers; l > 0; l--) {
        const scale = 0.35 + (l * 0.12); // 花瓣縮放比例
        const offsetAngle = (l % 2 === 0) ? 22.5 : 0; // 內外層交錯 22.5 度
        
        for (let i = 0; i < 8; i++) {
            const angle = i * 45 + offsetAngle;
            svgHtml += `<use href="#master-petal" transform="rotate(${angle} 200 200) scale(${scale}) translate(${(1-scale)*200/scale} ${(1-scale)*200/scale})"/>`;
        }
    }

    // 5. 蓮心明點
    svgHtml += `
            </g>
            <circle cx="200" cy="200" r="${15 + level}" fill="url(#coreGlow)">
                <animate attributeName="opacity" values="0.7; 1; 0.7" dur="3s" repeatCount="indefinite"/>
            </circle>
        </svg>`;

    return svgHtml;
}

// ════════════════════════════════════════════════
//  互動引擎
// ════════════════════════════════════════════════
let nianCount = 0;

function updateRankDisplay(rank, lv) {
    const container = document.getElementById('lotus-container');
    container.innerHTML = getUnifiedLotusSVG(rank, lv);
}

// 十念法點擊邏輯
function handleNian(e) {
    if (nianCount >= 10) return;
    
    nianCount++;
    
    // 1. 光環前進
    const arc = document.getElementById('progress-arc');
    const total = 880; 
    arc.style.strokeDashoffset = total - (nianCount / 10) * total;
    
    // 2. 蓮花脈衝與金粉
    const lotus = document.getElementById('lotus-container');
    lotus.classList.add('lotus-pulse');
    setTimeout(() => lotus.classList.remove('lotus-pulse'), 150);
    spawnDust(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2);

    document.getElementById('nian-count').textContent = `${nianCount} / 10`;

    // 3. 十念爆發
    if (nianCount === 10) {
        setTimeout(() => {
            triggerBurst();
            setTimeout(() => {
                nianCount = 0;
                arc.style.strokeDashoffset = total;
                document.getElementById('nian-count').textContent = '0 / 10';
            }, 3000);
        }, 300);
    }
}

// 強制接管 iOS 觸控，徹底消滅雙擊放大
const wrap = document.getElementById('circle-wrap');
wrap.addEventListener('touchstart', function(e) { e.preventDefault(); handleNian(e.touches[0]); }, { passive: false });
wrap.addEventListener('mousedown', function(e) { e.preventDefault(); handleNian(e); });

// 特效：金塵粒子
function spawnDust(x, y) {
    for (let i = 0; i < 10; i++) {
        const d = document.createElement('div'); d.className = 'gold-dust';
        const size = Math.random() * 4 + 2;
        d.style.cssText = `left:${x}px; top:${y}px; width:${size}px; height:${size}px; --dx:${(Math.random()-0.5)*150}px; --dy:${(Math.random()-0.5)*150}px;`;
        document.body.appendChild(d); setTimeout(() => d.remove(), 1200);
    }
}

// 特效：十念爆發花雨
function triggerBurst() {
    const overlay = document.getElementById('burst-overlay');
    overlay.style.opacity = '1'; setTimeout(() => { overlay.style.opacity = '0'; }, 1000);

    for (let i = 0; i < 25; i++) {
        setTimeout(() => {
            const p = document.createElement('div'); p.className = 'petal-rain';
            const size = Math.random() * 15 + 10;
            p.style.cssText = `left:${Math.random()*95}vw; width:${size}px; height:${size}px; animation-duration:${Math.random()*4+4}s;`;
            p.innerHTML = `<svg viewBox="0 0 100 100"><path d="M50 10 C 65 30, 75 60, 50 85 C 25 60, 35 30, 50 10" fill="rgba(243,229,171,0.8)" filter="drop-shadow(0 0 5px #d4af37)"/></svg>`;
            document.body.appendChild(p); setTimeout(() => p.remove(), 9000);
        }, Math.random() * 1500);
    }
}

// 預覽切換按鈕
function setPreview(rank, lv) {
    document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    updateRankDisplay(rank, lv);
    nianCount = 0; 
    document.getElementById('progress-arc').style.strokeDashoffset = 880;
    document.getElementById('nian-count').textContent = '0 / 10';
}

// 初始化
updateRankDisplay('信', 1);

</script>
</body>
</html>
