<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>合十 · 透明玻璃手</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  background:#010103;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:"PingFang TC", "Hiragino Sans GB", serif;
  overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
}

/* ── Star canvas behind everything ── */
#starBg { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* ── Clickable scene wrapper ── */
.scene {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center;
  cursor:pointer;
}
.scene:active .hands-svg { transform: scale(0.95); }
.hands-svg { overflow:visible; display:block; transition:transform 0.14s cubic-bezier(0.4,0,0.2,1); }

/* ── Caption below ── */
.caption {
  margin-top:18px;
  color:rgba(212,175,55,0.58);
  font-size:13px;
  letter-spacing:7px;
  text-shadow:0 0 20px rgba(212,175,55,0.50);
  pointer-events:none;
}

/* ── Gold particle that flies on click ── */
.particle {
  position:fixed; width:5px; height:5px; border-radius:50%;
  background:rgba(243,229,171,0.92);
  pointer-events:none; z-index:9999;
  box-shadow:0 0 6px #d4af37, 0 0 16px rgba(255,255,255,0.75);
}
</style>
</head>
<body>

<canvas id="starBg"></canvas>

<div class="scene" id="handsBtn">

  <svg class="hands-svg"
       id="prayer-svg"
       viewBox="0 0 200 305"
       width="200" height="305"
       xmlns="http://www.w3.org/2000/svg"
       style="overflow:visible;">
    <defs>
      <linearGradient id="gl-left" x1="0%" y1="5%" x2="100%" y2="90%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.65)"/>
        <stop offset="22%"  stop-color="rgba(255,255,255,0.28)"/>
        <stop offset="58%"  stop-color="rgba(235,215,175,0.12)"/>
        <stop offset="100%" stop-color="rgba(212,175,55,0.04)"/>
      </linearGradient>
      
      <linearGradient id="gl-right" x1="100%" y1="5%" x2="0%" y2="90%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.28)"/>
        <stop offset="38%"  stop-color="rgba(255,255,255,0.08)"/>
        <stop offset="100%" stop-color="rgba(212,175,55,0.02)"/>
      </linearGradient>
      
      <linearGradient id="gl-tip" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.95)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>
      
      <linearGradient id="gl-wrist" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"   stop-color="rgba(212,175,55,0.04)"/>
        <stop offset="100%" stop-color="rgba(212,175,55,0.30)"/>
      </linearGradient>

      <radialGradient id="gr-inner" cx="50%" cy="45%" r="42%">
        <stop offset="0%"   stop-color="rgba(255,225,130,0.24)"/>
        <stop offset="100%" stop-color="rgba(212,175,55,0)"/>
      </radialGradient>

      <radialGradient id="gr-aura" cx="50%" cy="53%" r="50%">
        <stop offset="0%"   stop-color="rgba(255,228,140,0.52)"/>
        <stop offset="45%"  stop-color="rgba(212,175,55,0.20)"/>
        <stop offset="100%" stop-color="rgba(212,175,55,0)"/>
      </radialGradient>

      <radialGradient id="gr-burst" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="rgba(255,252,235,1.0)"/>
        <stop offset="28%"  stop-color="rgba(255,220,100,0.90)"/>
        <stop offset="65%"  stop-color="rgba(212,175,55,0.42)"/>
        <stop offset="100%" stop-color="rgba(212,175,55,0)"/>
      </radialGradient>

      <filter id="f-edge" x="-55%" y="-22%" width="210%" height="144%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
        <feComposite in="SourceGraphic" in2="b" operator="over"/>
      </filter>
      <filter id="f-soft" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="b"/>
        <feComposite in="SourceGraphic" in2="b" operator="over"/>
      </filter>

      <clipPath id="cl-hand">
        <path id="main-shape" d="
          M 100 20
          C 97 20 94 25 93 35
          C 89 60 88 62 87 65
          C 85 75 83 95 82 100
          C 79 110 75 130 74 135
          C 65 160 62 180 60 195
          C 58 215 45 260 35 305
          L 165 305
          C 155 260 142 215 140 195
          C 138 180 135 160 126 135
          C 125 130 121 110 118 100
          C 117 95 115 75 113 65
          C 112 62 111 60 107 35
          C 106 25 103 20 100 20 Z
        "/>
      </clipPath>
    </defs>

    <ellipse id="aura-el" cx="100" cy="160" rx="85" ry="104" fill="url(#gr-aura)"/>

    <ellipse id="burst-el" cx="100" cy="158" rx="0" ry="0" fill="url(#gr-burst)" opacity="0"/>

    <use href="#main-shape" fill="none" stroke="rgba(212,175,55,0.72)" stroke-width="3.5" filter="url(#f-edge)"/>

    <g clip-path="url(#cl-hand)">
      <rect x="0" y="0" width="100" height="305" fill="url(#gl-left)"/>
      <rect x="100" y="0" width="100" height="305" fill="url(#gl-right)"/>
    </g>

    <g clip-path="url(#cl-hand)">
      <ellipse cx="100" cy="140" rx="55" ry="110" fill="url(#gr-inner)"/>
    </g>

    <g clip-path="url(#cl-hand)">
      <rect x="0" y="200" width="200" height="105" fill="url(#gl-wrist)" opacity="0.85"/>
    </g>

    <path d="M 60 190 C 70 170 80 145 90 130 C 93 125 90 122 86 128 C 76 142 63 165 54 185 Z" 
          fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="0.8" filter="url(#f-soft)"/>
    <path d="M 60 190 C 70 170 80 145 90 130" 
          fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.2" stroke-linecap="round"/>
    
    <path d="M 140 190 C 130 170 120 145 110 130 C 107 125 110 122 114 128 C 124 142 137 165 146 185 Z" 
          fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" filter="url(#f-soft)"/>
    <path d="M 140 190 C 130 170 120 145 110 130" 
          fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" stroke-linecap="round"/>

    <path d="M 87 65 Q 100 72 113 65" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M 82 100 Q 100 110 118 100" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M 74 135 Q 100 148 126 135" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.9" stroke-linecap="round"/>
    
    <path d="M 60 195 C 45 230 38 270 30 305" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.2" stroke-dasharray="3,4" stroke-linecap="round"/>
    <path d="M 140 195 C 155 230 162 270 170 305" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.2" stroke-dasharray="3,4" stroke-linecap="round"/>

    <path d="M 100 20 L 100 305" stroke="rgba(255,255,255,0.35)" stroke-width="1.1" stroke-dasharray="2,6" stroke-linecap="round"/>

    <use href="#main-shape" fill="none" stroke="rgba(212,175,55,0.52)" stroke-width="1.4"/>

    <path d="M 100 20 C 97 20 94 25 93 35 C 89 60 88 62 87 65 C 85 75 83 95 82 100"
          fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 82 100 C 79 110 75 130 74 135 C 65 160 62 180 60 195"
          fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.2" stroke-linecap="round"/>

    <ellipse cx="100" cy="18" rx="4.5" ry="11" fill="url(#gl-tip)" opacity="0.95"/>

    <line x1="100" y1="20" x2="100" y2="155" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round"/>
    <line x1="100" y1="20" x2="100" y2="220" stroke="rgba(255,255,255,0.15)" stroke-width="3.5" stroke-linecap="round"/>
  </svg>

  <div class="caption">合 十</div>
</div>

<script>
// ═══════════════════════════════════
//  Star background
// ═══════════════════════════════════
const cvs = document.getElementById('starBg');
const ctx = cvs.getContext('2d');
let stars = [];

function initStars() {
  cvs.width  = window.innerWidth;
  cvs.height = window.innerHeight;
  stars = Array.from({ length: 130 }, () => ({
    x:  Math.random() * cvs.width,
    y:  Math.random() * cvs.height,
    r:  Math.random() * 1.8 + 0.4,
    sp: Math.random() * 0.0016 + 0.0005,
    ph: Math.random() * Math.PI * 2
  }));
}
function drawStars() {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  const t = Date.now();
  stars.forEach(s => {
    ctx.globalAlpha = 0.12 + Math.abs(Math.sin(t * s.sp + s.ph)) * 0.76;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize', initStars);
initStars();
drawStars();

// ═══════════════════════════════════
//  Breathing animation
// ═══════════════════════════════════
const auraEl = document.getElementById('aura-el');
let breathT = 0;

function breathe() {
  breathT += 0.013;
  const sinV = Math.sin(breathT);
  const scale  = 0.80 + sinV * 0.20;
  const auraOp = 0.42 + sinV * 0.33;

  auraEl.setAttribute('rx', 85 * scale);
  auraEl.setAttribute('ry', 104 * scale);
  auraEl.setAttribute('opacity', auraOp);

  requestAnimationFrame(breathe);
}
breathe();

// ═══════════════════════════════════
//  Click / Tap burst + particles
// ═══════════════════════════════════
const burstEl = document.getElementById('burst-el');
let busy = false;

function doBurst(cx, cy) {
  if (busy) return;
  busy = true;

  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    document.body.appendChild(p);

    const ang  = Math.random() * Math.PI * 2;
    const dist = 55 + Math.random() * 105;
    const tx   = Math.cos(ang) * dist;
    const ty   = Math.sin(ang) * dist;
    const dur  = 620 + Math.random() * 380;

    p.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${tx}px,${ty}px) scale(0.15)`, opacity: 0 }
    ], { duration: dur, easing: 'ease-out' }).onfinish = () => p.remove();
  }

  let t0 = null;
  const dur = 580;

  function frame(ts) {
    if (!t0) t0 = ts;
    const progress = Math.min((ts - t0) / dur, 1);
    const eased    = 1 - Math.pow(1 - progress, 2.8);

    burstEl.setAttribute('rx', eased * 130);
    burstEl.setAttribute('ry', eased * 158);

    const opacity = progress < 0.20
      ? progress * 4.5
      : Math.max(0, 1 - (progress - 0.20) * 1.26);
    burstEl.setAttribute('opacity', opacity);

    if (progress < 1) {
      requestAnimationFrame(frame);
    } else {
      burstEl.setAttribute('opacity', 0);
      busy = false;
    }
  }
  requestAnimationFrame(frame);
}

const btn = document.getElementById('handsBtn');
btn.addEventListener('click', e => doBurst(e.clientX, e.clientY));
btn.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  doBurst(t.clientX, t.clientY);
}, { passive: false });
</script>
</body>
</html>
