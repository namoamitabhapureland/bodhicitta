<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>彌陀淨土系統 ‧ 首頁合十</title>
<style>
:root {
  --bg-deep: #010204;
  --gold: #f3e5ab;
  --solid-gold: #d4af37;
  --glass-border: rgba(212, 175, 55, 0.4);
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg-deep);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: "PingFang TC", "Microsoft JhengHei", serif;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

#starBg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

.scene {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer;
}

/* 契合主系統的呼吸浮動感 */
.hands-wrap {
  animation: float 4s ease-in-out infinite;
  position: relative;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px); filter: drop-shadow(0 10px 20px rgba(212,175,55,0.15)); }
  100% { transform: translateY(0px); }
}

.scene:active .hands-svg { transform: scale(0.96); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
.hands-svg { 
  overflow: visible; display: block; 
  transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  filter: drop-shadow(0 0 15px rgba(212,175,55,0.1));
}

.caption {
  margin-top: 25px;
  color: var(--gold);
  font-size: 1.15rem;
  font-weight: 500;
  letter-spacing: 12px;
  text-shadow: 0 0 15px rgba(212,175,55,0.6);
  pointer-events: none;
  margin-left: 12px; /* 修正 letter-spacing 造成的視覺偏移 */
}

/* 粒子光效 */
.particle {
  position: fixed; width: 4px; height: 4px; border-radius: 50%;
  background: #fff;
  pointer-events: none; z-index: 9999;
  box-shadow: 0 0 8px var(--gold), 0 0 15px var(--solid-gold);
}
</style>
</head>
<body>

<canvas id="starBg"></canvas>

<div class="scene" id="handsBtn">
  <div class="hands-wrap">
    <svg class="hands-svg" viewBox="0 0 200 320" width="180" height="288" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="glass-left" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
          <stop offset="50%" stop-color="rgba(212,175,55,0.08)"/>
          <stop offset="100%" stop-color="rgba(212,175,55,0.02)"/>
        </linearGradient>
        
        <linearGradient id="glass-right" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
          <stop offset="60%" stop-color="rgba(212,175,55,0.05)"/>
          <stop offset="100%" stop-color="rgba(212,175,55,0.01)"/>
        </linearGradient>

        <radialGradient id="palm-glow" cx="50%" cy="60%" r="40%">
          <stop offset="0%" stop-color="rgba(243,229,171,0.25)"/>
          <stop offset="100%" stop-color="rgba(212,175,55,0)"/>
        </radialGradient>

        <radialGradient id="burst-glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
          <stop offset="30%" stop-color="rgba(212,175,55,0.6)"/>
          <stop offset="100%" stop-color="rgba(212,175,55,0)"/>
        </radialGradient>
      </defs>

      <ellipse id="burst-el" cx="100" cy="160" rx="0" ry="0" fill="url(#burst-glow)" opacity="0"/>
      <ellipse cx="100" cy="180" rx="60" ry="80" fill="url(#palm-glow)"/>

      <path d="M 100 20 
               C 88 25, 76 65, 72 105 
               C 65 160, 48 190, 45 230 
               C 42 270, 65 295, 85 300 
               C 95 302, 100 300, 100 300 Z" 
            fill="url(#glass-left)" />
            
      <path d="M 100 20 
               C 112 25, 124 65, 128 105 
               C 135 160, 152 190, 155 230 
               C 158 270, 135 295, 115 300 
               C 105 302, 100 300, 100 300 Z" 
            fill="url(#glass-right)" />

      <g fill="none" stroke="var(--solid-gold)" stroke-linecap="round" stroke-linejoin="round">
        
        <path d="M 100 20 C 88 25, 76 65, 72 105 C 65 160, 48 190, 45 230 C 42 270, 65 295, 85 300 Q 95 302, 100 300" stroke-width="1.5" stroke="rgba(212,175,55,0.7)"/>
        <path d="M 100 20 C 112 25, 124 65, 128 105 C 135 160, 152 190, 155 230 C 158 270, 135 295, 115 300 Q 105 302, 100 300" stroke-width="1.5" stroke="rgba(212,175,55,0.7)"/>

        <line x1="100" y1="20" x2="100" y2="120" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" />
        <line x1="100" y1="120" x2="100" y2="295" stroke="rgba(212,175,55,0.4)" stroke-width="1" />

        <path d="M 100 20 C 93 25, 86 65, 85 105" stroke-width="1.2" stroke="rgba(255,255,255,0.5)"/>
        <path d="M 100 20 C 107 25, 114 65, 115 105" stroke-width="1.2" stroke="rgba(255,255,255,0.5)"/>

        <path d="M 100 115 C 90 115, 80 135, 80 160 C 80 175, 88 190, 100 200" stroke-width="1.5" stroke="rgba(212,175,55,0.85)"/>
        <path d="M 100 115 C 95 125, 93 140, 96 155" stroke-width="0.8" stroke="rgba(255,255,255,0.3)"/> <path d="M 100 115 C 110 115, 120 135, 120 160 C 120 175, 112 190, 100 200" stroke-width="1.5" stroke="rgba(212,175,55,0.85)"/>
        <path d="M 100 115 C 105 125, 107 140, 104 155" stroke-width="0.8" stroke="rgba(255,255,255,0.3)"/> <path d="M 72 105 C 65 130, 60 150, 65 180" stroke-width="1" stroke="rgba(212,175,55,0.3)"/>
        <path d="M 128 105 C 135 130, 140 150, 135 180" stroke-width="1" stroke="rgba(212,175,55,0.3)"/>

        <path d="M 68 260 Q 85 270, 100 265" stroke-width="1.2" stroke="rgba(212,175,55,0.6)"/>
        <path d="M 132 260 Q 115 270, 100 265" stroke-width="1.2" stroke="rgba(212,175,55,0.6)"/>
        
        <path d="M 75 278 Q 88 285, 100 282" stroke-width="0.8" stroke="rgba(212,175,55,0.4)"/>
        <path d="M 125 278 Q 112 285, 100 282" stroke-width="0.8" stroke="rgba(212,175,55,0.4)"/>

      </g>
    </svg>
  </div>
  <div class="caption">合 十</div>
</div>

<script>
// ═══════════════════════════════════
// 星空背景 
// ═══════════════════════════════════
const cvs = document.getElementById('starBg');
const ctx = cvs.getContext('2d');
let stars = [];

function initStars() {
  cvs.width  = window.innerWidth;
  cvs.height = window.innerHeight;
  stars = Array.from({ length: 150 }, () => ({
    x:  Math.random() * cvs.width,
    y:  Math.random() * cvs.height,
    r:  Math.random() * 1.5 + 0.5,
    sp: Math.random() * 0.002 + 0.0005,
    ph: Math.random() * Math.PI * 2
  }));
}
function drawStars() {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  const t = Date.now();
  stars.forEach(s => {
    ctx.globalAlpha = 0.15 + Math.abs(Math.sin(t * s.sp + s.ph)) * 0.6;
    ctx.fillStyle = '#f3e5ab'; // 使用柔和的香檳金星光
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize', initStars);
initStars();
drawStars();

// ═══════════════════════════════════
// 點擊爆發金光粒子特效
// ═══════════════════════════════════
const burstEl = document.getElementById('burst-el');
let busy = false;

function doBurst(cx, cy) {
  if (busy) return;
  busy = true;

  // 粒子噴射
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    document.body.appendChild(p);

    const ang  = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 120;
    const tx   = Math.cos(ang) * dist;
    const ty   = Math.sin(ang) * dist;
    const dur  = 800 + Math.random() * 400;

    p.animate([
      { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
      { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
    ], { duration: dur, easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)' }).onfinish = () => p.remove();
  }

  // 掌心光芒擴散
  let t0 = null;
  const dur = 600;

  function frame(ts) {
    if (!t0) t0 = ts;
    const progress = Math.min((ts - t0) / dur, 1);
    const eased = 1 - Math.pow(1 - progress, 3);

    burstEl.setAttribute('rx', eased * 150);
    burstEl.setAttribute('ry', eased * 180);

    const opacity = progress < 0.2 
      ? progress * 5 
      : Math.max(0, 1 - (progress - 0.2) * 1.25);
    burstEl.setAttribute('opacity', opacity * 0.8);

    if (progress < 1) {
      requestAnimationFrame(frame);
    } else {
      burstEl.setAttribute('opacity', 0);
      busy = false;
      
      // 這裡可以接上跳轉進入主系統的邏輯
      // setTimeout(() => { window.location.href = 'index.html'; }, 200);
    }
  }
  requestAnimationFrame(frame);
}

const btn = document.getElementById('handsBtn');
btn.addEventListener('click', e => doBurst(e.clientX, e.clientY));
btn.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  doBurst(t.clientX, t.clientY);
}, { passive: false });
</script>
</body>
</html>
