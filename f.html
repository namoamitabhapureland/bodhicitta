<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>彌陀淨土 ‧ 視覺演化實驗室</title>
    <style>
        body {
            margin: 0; background: #050505; color: #eee;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        /* 模擬系統左上角 UI */
        .top-ui-mockup {
            width: 90%; max-width: 400px; margin-top: 20px;
            padding: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212,175,55,0.2); border-radius: 10px;
        }
        #rank-title {
            font-size: 1.1rem; font-weight: bold;
            display: flex; align-items: center; white-space: nowrap;
        }
        
        /* 中央展示區 */
        .lotus-display {
            width: 300px; height: 300px; margin: 40px 0;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* 控制面板 */
        .panel {
            width: 90%; max-width: 500px; background: #111; padding: 20px;
            border-radius: 15px; border: 1px solid #333; margin-bottom: 20px;
        }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        button {
            background: #222; color: #ccc; border: 1px solid #444;
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
        }
        button.active { background: rgba(212,175,55,0.2); color: #f3e5ab; border-color: #d4af37; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #888; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="top-ui-mockup">
        <div id="rank-title"></div>
        <div style="font-size: 0.8rem; color: #888; margin-top: 5px;">Practitioner: Miao Yi</div>
    </div>

    <div class="lotus-display" id="big-seed"></div>

    <div class="panel">
        <label>切換資糧位階 (改變顏色與小法徽)</label>
        <div class="btn-group" id="rank-btns">
            <button class="active" onclick="updateTest('Faith', '1st Faith Level')">信位 (Faith)</button>
            <button onclick="updateTest('Abiding', '10th Abiding Level')">住位 (Abiding)</button>
            <button onclick="updateTest('Practice', 'Practice Level')">行位 (Practice)</button>
            <button onclick="updateTest('Dedication', 'Dedication Level')">迴向 (Dedication)</button>
            <button onclick="updateTest('Bhumi', '10th Bhumi Bodhisattva')">地位 (Bhumi)</button>
        </div>

        <label>切換累積念佛 (改變花瓣層數 2-8 層)</label>
        <div class="btn-group" id="nian-btns">
            <button class="active" onclick="updateNian(0, '初始')">0 (2層)</button>
            <button onclick="updateNian(10, '十念')">10 (3層)</button>
            <button onclick="updateNian(500, '一念')">500 (4層)</button>
            <button onclick="updateNian(10000, '萬念')">1萬 (5層)</button>
            <button onclick="updateNian(1000000, '百萬')">100萬 (6層)</button>
            <button onclick="updateNian(10000000, '千萬')">1000萬 (7層)</button>
            <button onclick="updateNian(100000000, '一億')">1億 (8層圓滿)</button>
        </div>
    </div>

<script>
// --- 核心引擎 1: 法徽生成 ---
function getRankBadgeSVG(rankName) {
    // 依據字串決定圖騰
    if (rankName.includes('Faith') || rankName.includes('信')) {
        return `<svg viewBox="0 0 24 24" width="16" height="16" style="margin-right:8px;"><circle cx="12" cy="12" r="5" fill="#8ba89c" /><circle cx="12" cy="12" r="9" fill="none" stroke="#8ba89c" stroke-width="1.5" stroke-dasharray="2 3" /></svg>`;
    } else if (rankName.includes('Abiding') || rankName.includes('住')) {
        return `<svg viewBox="0 0 24 24" width="16" height="16" style="margin-right:8px;"><rect x="7" y="7" width="10" height="10" rx="2" fill="#f48fb1" /><rect x="3" y="3" width="18" height="18" rx="4" fill="none" stroke="#f48fb1" stroke-width="1.5" /></svg>`;
    } else if (rankName.includes('Practice') || rankName.includes('行')) {
        return `<svg viewBox="0 0 24 24" width="16" height="16" style="margin-right:8px;"><polygon points="12,2 14.5,9.5 22,12 14.5,14.5 12,22 9.5,14.5 2,12 9.5,9.5" fill="#ce93d8"/></svg>`;
    } else if (rankName.includes('Dedication') || rankName.includes('迴')) {
        return `<svg viewBox="0 0 24 24" width="16" height="16" style="margin-right:8px;"><path d="M12 2 L22 12 L12 22 L2 12 Z" fill="none" stroke="#ffb74d" stroke-width="2"/><circle cx="12" cy="12" r="4" fill="#ffb74d"/></svg>`;
    } else {
        return `<svg viewBox="0 0 24 24" width="16" height="16" style="margin-right:8px;"><circle cx="12" cy="12" r="9" fill="none" stroke="#d4af37" stroke-width="2"/><circle cx="12" cy="12" r="4" fill="#d4af37"/><path d="M12 2v3 M12 19v3 M2 12h3 M19 12h3" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/></svg>`;
    }
}

// --- 核心引擎 2: 莊嚴蓮花生成 ---
function getLotusSVG(rankType, nianCount = 0) {
    const colorMap = {
        'Faith': { t: '#ffffff', m: '#8ba89c', b: '#1e382d', c: '#8ba89c' },
        'Abiding': { t: '#ffffff', m: '#f48fb1', b: '#880e4f', c: '#f48fb1' },
        'Practice': { t: '#f3e5f5', m: '#ce93d8', b: '#4a148c', c: '#ce93d8' },
        'Dedication': { t: '#fff8e1', m: '#ffb74d', b: '#e65100', c: '#ffb74d' },
        'Bhumi': { t: '#fff8d6', m: '#d4af37', b: '#5c400a', c: '#d4af37' }
    };
    let c = colorMap[rankType] || colorMap['Faith'];

    // 層數演算法 (2-8層)
    let layers = 2;
    let coreGlow = 1;
    if (nianCount >= 100000000) { layers = 8; coreGlow = 3.5; }
    else if (nianCount >= 10000000) { layers = 7; coreGlow = 2.5; }
    else if (nianCount >= 1000000) { layers = 6; coreGlow = 2.0; }
    else if (nianCount >= 100000) { layers = 5; coreGlow = 1.6; }
    else if (nianCount >= 10000) { layers = 4; coreGlow = 1.3; }
    else if (nianCount >= 10) { layers = 3; coreGlow = 1.1; }
    else { layers = 2; coreGlow = 0.9; }

    return `
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%; overflow:visible;">
        <defs>
            <linearGradient id="enLotusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="${c.t}" stop-opacity="0.95"/>
                <stop offset="50%" stop-color="${c.m}" stop-opacity="0.85"/>
                <stop offset="100%" stop-color="${c.b}" stop-opacity="0.95"/>
            </linearGradient>
            <radialGradient id="enCoreGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff"/><stop offset="40%" stop-color="${c.m}"/><stop offset="100%" stop-color="transparent"/>
            </radialGradient>
            <path id="enPetal" d="M 50 50 C 35 20, 42 5, 50 2 C 58 5, 65 20, 50 50 Z" fill="url(#enLotusGrad)" stroke="rgba(255,255,255,0.4)" stroke-width="0.4"/>
        </defs>
        <g>
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="150s" repeatCount="indefinite"/>
            <g>
                <animateTransform attributeName="transform" type="scale" values="0.97;1.03;0.97" dur="6s" repeatCount="indefinite" additive="sum" />
                ${Array.from({length: layers}, (_, l) => {
                    const level = layers - l;
                    const scale = 0.28 + (level * 0.09);
                    const offset = (level % 2 === 0) ? 22.5 : 0;
                    return Array.from({length: 8}, (_, i) => {
                        const angle = i * 45 + offset;
                        return `<use href="#enPetal" transform="rotate(${angle} 50 50) scale(${scale}) translate(${(1-scale)*50/scale} ${(1-scale)*50/scale})" opacity="${0.5 + (level*0.06)}"/>`;
                    }).join('');
                }).join('')}
            </g>
        </g>
        <circle cx="50" cy="50" r="${2 + (layers * 0.5) * coreGlow}" fill="url(#enCoreGlow)" filter="blur(1px)">
            <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
        </circle>
    </svg>`;
}

// --- 示範頁面互動邏輯 ---
let curRank = 'Faith';
let curTitle = '1st Faith Level';
let curNian = 0;

const colorRef = { 'Faith': '#8ba89c', 'Abiding': '#f48fb1', 'Practice': '#ce93d8', 'Dedication': '#ffb74d', 'Bhumi': '#d4af37' };

function updateTest(rank, title) {
    curRank = rank; curTitle = title;
    render();
    document.querySelectorAll('#rank-btns button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

function updateNian(count) {
    curNian = count;
    render();
    document.querySelectorAll('#nian-btns button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

function render() {
    // 渲染標題區 (法徽 + 文字)
    const titleEl = document.getElementById('rank-title');
    titleEl.style.color = colorRef[curRank];
    titleEl.innerHTML = getRankBadgeSVG(curTitle) + `<span>${curTitle}</span>`;
    
    // 渲染中央大蓮花
    document.getElementById('big-seed').innerHTML = getLotusSVG(curRank, curNian);
}

// 初始化
render();
</script>
</body>
</html>
