<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不退轉天數蓮花 正確對照頁面</title>
<style>
    /* 模擬您 App 的暗色低熵背景 */
    body {
        background-color: #050505;
        color: #fff;
        font-family: "PingFang TC", "Heiti TC", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    /* 模擬主畫面 320px 的念佛區域 */
    .chant-zone {
        width: 320px;
        height: 320px;
        position: relative;
        /* 金色光圈背景 */
        border: 1px solid rgba(212,175,55,0.1);
        border-radius: 50%;
        box-shadow: 0 0 20px rgba(212,175,55,0.05);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* 裝載新蓮花的容器 */
    #center-lotus-container {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        overflow: visible; 
    }

    /* 模擬呼吸起動畫 */
    .lotus-breath {
        animation: lotusBreath 4s ease-in-out infinite;
    }
    @keyframes lotusBreath {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50% { transform: scale(1.02); opacity: 1; }
    }

    /* 控制面板樣式 */
    .controls {
        margin-top: 40px;
        background: rgba(255,255,255,0.05);
        padding: 20px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.1);
        text-align: center;
        z-index: 100;
    }
    input {
        background: #111;
        border: 1px solid #d4af37;
        color: #d4af37;
        padding: 10px;
        font-size: 18px;
        border-radius: 6px;
        width: 120px;
        text-align: center;
    }
    .stage-info {
        margin-top: 15px;
        color: rgba(255,255,255,0.7);
        font-size: 14px;
        line-height: 1.6;
    }
</style>
</head>
<body>

    <div class="chant-zone">
        <div id="center-lotus-container" class="lotus-breath">
            </div>
    </div>

    <div class="controls">
        <label style="color:#d4af37;">模擬總修行天數 (db.points/100):</label><br><br>
        <input type="number" id="daysInput" value="10" min="0" step="10"> 天<br>
        <div class="stage-info" id="stageInfo"></div>
    </div>

<script>
    /**
     * 🌟 【修正版】天數蓮花生成引擎 ( getDaysLotusSVG )
     * 大重點：修正了上一次的變數未定義Bug，並確保 ID 加上 "cl-" 前綴.
     */
    function getDaysLotusSVG(totalDays) {
        
                // --- 1. 【驚艷版】十二階不退轉法色演進 (全面拋棄黑灰，起步即絕美) ---
        const stages = [
            // 終極：極致發光的耀眼純金
            { d: 30000, name: "無量金光", desc: "法界極致，耀眼純金發光", c: {t:"#ffffff", m:"#ffeb3b", b:"#ff8f00", o: 1.0}, l: 5, g: 6.0 },
            // 幻彩：金、粉、粉藍的極致交織
            { d: 10000, name: "摩尼幻彩", desc: "幻彩色澤，金粉交織", c: {t:"#ffffff", m:"#ff80ab", b:"#00e5ff", o: 0.85}, l: 5, g: 4.0 },
            // 白金：極度高貴的璀璨白金
            { d: 1000,  name: "萬佛金剛", desc: "白金璀璨，不退轉心", c: {t:"#ffffff", m:"#fff9c4", b:"#fbc02d", o: 0.9}, l: 5, g: 3.0 },
            // 純金：標準的耀眼金蓮
            { d: 500,   name: "大日純金", desc: "五層圓滿，純金綻放", c: {t:"#fffde7", m:"#fdd835", b:"#f57f17", o: 0.9}, l: 5, g: 2.2 },
            // 300~350：紅黃紫交輝，晚霞般的壯麗
            { d: 350,   name: "紫金交輝", desc: "將滿一年，紫金祥瑞", c: {t:"#f3e5f5", m:"#ab47bc", b:"#fbc02d", o: 0.9}, l: 5, g: 1.8 },
            { d: 300,   name: "赤焰紅蓮", desc: "心包太虛，熱烈如火", c: {t:"#ffebee", m:"#e53935", b:"#b71c1c", o: 0.9}, l: 4, g: 1.6 },
            { d: 250,   name: "彩雲金蓮", desc: "定力中成，橘金晚霞", c: {t:"#fff3e0", m:"#ffb74d", b:"#e65100", o: 0.9}, l: 4, g: 1.5 },
            // 150~200：仙氣飄飄的冷色系幻彩 (紫/藍)
            { d: 200,   name: "幻海琉璃", desc: "心如止水，通透湛藍", c: {t:"#e1f5fe", m:"#29b6f6", b:"#0277bd", o: 0.9}, l: 4, g: 1.4 },
            { d: 150,   name: "紫霞仙光", desc: "轉化煩惱，紫光氤氳", c: {t:"#f3e5f5", m:"#ba68c8", b:"#7b1fa2", o: 0.9}, l: 4, g: 1.3 },
            // 0~100 前期絕美留客：粉紅、粉藍、玫瑰金 (直接 3 層起跳，不稀疏)
            { d: 100,   name: "法悅粉櫻", desc: "百日築基，法喜充滿", c: {t:"#fce4ec", m:"#f06292", b:"#c2185b", o: 0.9}, l: 3, g: 1.2 },
            { d: 50,    name: "琉璃水玉", desc: "道心微潤，青綠幻彩", c: {t:"#e0f7fa", m:"#4dd0e1", b:"#00838f", o: 0.9}, l: 3, g: 1.1 },
            { d: 10,    name: "珍珠幻彩", desc: "十日初成，珍珠透白", c: {t:"#ffffff", m:"#cbf0f8", b:"#f8bbd0", o: 0.9}, l: 3, g: 1.0 },
            { d: 0,     name: "晨曦玫瑰", desc: "初發心，柔美玫瑰金", c: {t:"#ffffff", m:"#ffb7b2", b:"#e2858e", o: 0.9}, l: 3, g: 0.9 }
        ];

        // --- 2. 尋找對應階段 ---
        let s = stages[stages.length - 1]; 
        for (let i = 0; i < stages.length; i++) {
            if (totalDays >= stages[i].d) { s = stages[i]; break; }
        }

        // --- 3. 更新示範頁面的文字資訊 ---
        const info = document.getElementById('stageInfo');
        if(info) info.innerHTML = `🌟 當前果色：<b style="color:#d4af37">${s.name}</b> (${totalDays}天)<br>${s.desc}`;

        // --- 4. 【修正】正式拼接 SVG 字串 ---
        // 先定義一個變數來裝字串
        let svgHtml = `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%; overflow:visible;">
            <defs>
                <linearGradient id="cl-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="${s.c.t}" stop-opacity="0.95"/>
                    <stop offset="50%" stop-color="${s.c.m}" stop-opacity="${s.c.o}"/>
                    <stop offset="100%" stop-color="${s.c.b}" stop-opacity="0.95"/>
                </linearGradient>
                <radialGradient id="cl-core" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fff"/><stop offset="40%" stop-color="${s.c.m}"/><stop offset="100%" stop-color="transparent"/>
                </radialGradient>
                <path id="cl-petal" d="M 50 50 C 39 25, 41 9, 50 2 C 59 9, 61 25, 50 50 Z" fill="url(#cl-grad)" stroke="rgba(255,255,255,0.4)" stroke-width="0.3"/>
            </defs>
            <circle cx="50" cy="50" r="45" fill="rgba(5,5,5,0.6)"/>
            <circle cx="50" cy="50" r="38" fill="none" stroke="${s.c.m}" stroke-width="0.5" stroke-dasharray="1 4" opacity="0.5">
                <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="40s" repeatCount="indefinite"/>
            </circle>
            <g filter="drop-shadow(0 0 4px rgba(0,0,0,0.5))">
                <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="120s" repeatCount="indefinite"/>`;

        // 遞迴生成花瓣層
        for (let l = s.l; l > 0; l--) {
            const sc = 0.35 + (l * 0.12); 
            const off = (l % 2 === 0) ? 22.5 : 0; 
            for (let i = 0; i < 8; i++) {
                const angle = i * 45 + off;
                const op = Math.min(1, 0.7 + (l * 0.05));
                // ⚠️ 呼叫隔離的 cl-petal
                svgHtml += `<use href="#cl-petal" transform="rotate(${angle} 50 50) scale(${sc}) translate(${(1-sc)*50/sc} ${(1-sc)*50/sc})" opacity="${op}"/>`;
            }
        }
        
        // 4. 摩尼寶珠蓮心 (光芒強度 s.g)
        svgHtml += `
            </g>
            <circle cx="50" cy="50" r="${3 + (s.l * 0.5) * s.g}" fill="url(#cl-core)">
                <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
            </circle>
        </svg>`;

        // 【修正】回傳拼接好的完整字串
        return svgHtml;
    }

    // --- 示範頁面交互邏輯 ---
    const input = document.getElementById('daysInput');
    const container = document.getElementById('center-lotus-container');

    function updateDemo() {
        // 大智再次跪求：請確認 parseInt(input.value) 拿得到天數
        const days = parseInt(input.value);
        if(!days && days !== 0) {
            container.innerHTML = "<div>輸入錯誤</div>";
            return;
        }
        // 將生成的新蓮花注入沙盒容器
        container.innerHTML = getDaysLotusSVG(days);
    }

    // 監聽輸入變化
    input.addEventListener('input', updateDemo);

    // 初始渲染
    updateDemo();

</script>
</body>
</html>
