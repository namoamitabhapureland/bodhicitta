<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Hua-tsang Adorned World Sea ． 20-Tier Matrix (Ultimate Edition)</title>
    <style>
        :root {
            --bg-deep: #010103; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
            --silver: #e0e0e0;
            --fire: #a83232;
            --text-main: #d0d0d0;
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; touch-action: none; overscroll-behavior: none; user-select: none;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            color: var(--gold); text-decoration: none; font-size: 0.95rem; font-weight: bold;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3);
            backdrop-filter: blur(5px); transition: all 0.3s;
        }
        .back-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.2); }

        #status-panel {
            position: absolute; top: 70px; left: 5%; width: 90%; max-width: 340px;
            background: rgba(5,5,10,0.6); backdrop-filter: blur(10px);
            border-left: 3px solid rgba(212,175,55,0.8); 
            padding: 15px 20px; z-index: 100; transition: border-color 0.8s; pointer-events: none;
            border-radius: 0 15px 15px 0; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
        .status-title { font-size: 1.05rem; font-weight: bold; color: var(--gold); letter-spacing: 1px; text-shadow: 0 0 10px rgba(0,0,0,0.8); transition: color 0.8s; margin: 0; line-height: 1.3; }
        .status-buddha { font-size: 0.9rem; color: #fff; font-weight: bold; letter-spacing: 1px; margin-bottom: 8px; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .status-shape { font-size: 0.75rem; color: var(--cyan); letter-spacing: 1px; border: 1px solid rgba(139,168,156,0.5); padding: 3px 10px; border-radius: 12px; background: rgba(139,168,156,0.1); margin: 0; white-space: nowrap; flex-shrink: 0; }
        .status-desc { font-size: 0.85rem; color: #ddd; line-height: 1.6; letter-spacing: 1px; }

        .matrix-section { position: absolute; inset: 0; background: #000; overflow: hidden; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

        .ui-layer { position: absolute; bottom: 5%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; gap: 15px; }
        #drag-hint { color:rgba(212,175,55,0.8); font-size:0.75rem; letter-spacing:2px; margin-bottom: 5px; text-shadow: 0 0 5px #000; }

        .realm-picker-container {
            width: 100%; overflow-x: auto; scroll-snap-type: x mandatory;
            display: flex; gap: 12px; padding: 10px 50%;
            scrollbar-width: none; -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
        }
        .realm-picker-container::-webkit-scrollbar { display: none; }

        .realm-item {
            flex: 0 0 auto; scroll-snap-align: center;
            width: 200px; min-height: 75px; 
            justify-content: center; text-align: center; 
            background: rgba(15,15,15,0.8); border: 1px solid rgba(255,255,255,0.2); 
            color: #888; padding: 10px 15px; border-radius: 25px; font-size: 0.95rem; font-weight: bold; letter-spacing: 1.5px;
            cursor: pointer; backdrop-filter: blur(10px); transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            white-space: pre-wrap; line-height: 1.3;
        }

        .realm-item .r-num { font-size: 0.65rem; opacity: 0.6; letter-spacing: 1px; }
        
        .realm-item.active { transform: scale(1.1); background: rgba(20,20,20,0.95); border-color: var(--solid-gold); color: var(--gold); box-shadow: 0 5px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(212,175,55,0.2); }
        .realm-item.active.cyan-mode { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 5px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(139,168,156,0.2); }
        .realm-item.active.silver-mode { border-color: var(--silver); color: var(--silver); box-shadow: 0 5px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(224,224,224,0.2); }
        .realm-item.active.fire-mode { border-color: var(--fire); color: #ff8a8a; box-shadow: 0 5px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(168,50,50,0.2); }

        #theory-btn { 
            width: 85%; max-width: 320px; justify-content: center;
            background: linear-gradient(135deg, rgba(5,10,15,0.9), rgba(5,5,5,0.95)); 
            border: 1px solid rgba(139,168,156,0.6); color: var(--cyan);
            padding: 12px 20px; border-radius: 30px; font-size: 0.9rem; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        #theory-btn:active { transform: scale(0.95); }

        #theory-drawer { position: fixed; bottom: 0; left: 0; width: 100vw; height: 85vh; background: rgba(5, 5, 8, 0.96); backdrop-filter: blur(20px); border-top: 1.5px solid rgba(212,175,55,0.4); border-radius: 25px 25px 0 0; transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 2000; overflow-y: auto; padding: 0 0 80px 0; touch-action: pan-y; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
        #theory-drawer.open { transform: translateY(0); }
        .drawer-header { position: sticky; top: 0; background: linear-gradient(to bottom, rgba(5,5,8,1), rgba(5,5,8,0.95)); padding: 15px; text-align: center; z-index: 10; border-bottom: 1px solid rgba(139,168,156,0.2); }
        .close-bar { width: 40px; height: 4px; background: rgba(212,175,55,0.4); border-radius: 2px; margin: 0 auto 10px; cursor: pointer; }
        .theory-container { padding: 30px 7% 20px; max-width: 720px; margin: 0 auto; }
        .main-title { color: var(--gold); font-size: 1.5rem; letter-spacing: 3px; text-align: center; margin-bottom: 50px; text-shadow: 0 0 15px rgba(212,175,55,0.3); }
        .main-title::after { content: ''; display: block; width: 50px; height: 1.5px; background: linear-gradient(90deg, transparent, var(--solid-gold), transparent); margin: 15px auto 0; }
                .paragraph { 
            font-size: 0.95rem; color: #ccc; line-height: 1.9; letter-spacing: 0.5px; 
            text-align: justify; /* 左右平齊 */
            -webkit-hyphens: auto; hyphens: auto; /* 開啟字典級的單字斷行 (-) */
            word-wrap: break-word; margin-bottom: 20px; 
        }
        
        .quote-box {
            margin-top: 30px; padding: 15px 20px;
            background: linear-gradient(to right, rgba(212,175,55,0.1), transparent);
            border-left: 3px solid var(--solid-gold); border-radius: 0 10px 10px 0;
            color: #e0e0e0; font-size: 0.95rem; line-height: 1.8; letter-spacing: 0.5px; 
            text-align: justify; -webkit-hyphens: auto; hyphens: auto; /* 同樣開啟字典級斷行 */
        }

        .quote-author { color: var(--gold); font-weight: bold; margin-bottom: 8px; display: block; font-size: 0.85rem; letter-spacing: 2px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="back-btn" onclick="window.location.href='index_en.html?screen=3'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Pure Land
    </div>
    
    <div id="status-panel">
        <div class="title-row">
            <div class="status-title" id="s-title">System Initializing</div>
            <div class="status-shape" id="s-shape"></div>
        </div>
        <div class="status-buddha" id="s-buddha"></div>
        <div class="status-desc" id="s-desc">Loading Matrix...</div>
    </div>

    <section class="matrix-section">
        <canvas id="realmCanvas"></canvas>
        <div class="ui-layer" id="ui-layer">
            <div id="drag-hint">360° Holographic Pan ． Swipe to Switch Tiers</div>
            <div class="realm-picker-container" id="picker-container"></div>
            <button id="theory-btn" onclick="openTheoryDrawer()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                Explore Dharma Essence
            </button>
        </div>
    </section>

    <div id="theory-drawer">
        <div class="drawer-header" onclick="closeTheoryDrawer()"><div class="close-bar"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding: 0 5px;">
                <div style="color:var(--cyan); font-size:0.85rem; letter-spacing:2px; font-weight:bold; cursor:pointer;" onclick="closeTheoryDrawer()">Close Scroll</div>
                <div id="tts-btn" onclick="event.stopPropagation(); toggleTheoryAudio()" style="color:var(--gold); font-size:0.85rem; font-weight:bold; cursor:pointer; display:flex; align-items:center; gap:6px; background:rgba(212,175,55,0.15); padding: 6px 12px; border-radius:20px; border: 1px solid rgba(212,175,55,0.4);">
                    <svg id="tts-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                    <span id="tts-text">Listen to Dharma</span>
                </div>
            </div>
        </div>
        <div class="theory-container" id="theory-content-box">
            <h1 class="main-title" id="theory-title">Hua-tsang Great World</h1>
            <p class="paragraph" id="theory-desc">Loading...</p>
        </div>
    </div>

<script>
        // ================= 1. 20-Tier Realm Database (With UI shortName) =================
    const RealmMatrix = [
        { id: 1, shortName: "Supreme Light", name: "Supreme Luminous Light", buddha: "Countless Buddhas", shape: "Vastness", theme: "gold", desc: "[Essence] Ultimate jeweled adornment, free from decay.<br>[Beings] Pure and flawless, sharing infinite compassion.", quote: { author: "Master Qingliang", text: "An ocean of dust-mote realms, intersecting and perfectly fused. The broad and the narrow exist without obstruction." } },
        { id: 2, shortName: "Fragrant Lotus", name: "Fragrant Lotus Adornment", buddha: "Radiant Light", shape: "Lotus", theme: "cyan", desc: "[Essence] Wondrous fragrance condenses, rhythmic energies flow.<br>[Beings] Born neither from womb nor egg, manifesting from flowers.", quote: { author: "Avatamsaka", text: "Vairocana Buddha sits upon the thousand-petaled great lotus terrace. The Dharma body is the root of all existence." } },
        { id: 3, shortName: "Jewel Adornment", name: "All-Jewel Adornment Light", buddha: "Lion Roar Cloud", shape: "Jewel Moon", theme: "silver", desc: "[Essence] Intersecting light and shadows, functioning like a grand illusion.<br>[Beings] Form follows intention, gathering without hindrance.", quote: { author: "Master Fazang", text: "Gold is the sole essence; the various forms of the lion are but provisional names. The underlying essence is one." } },
        { id: 4, shortName: "Luminous Flower", name: "Luminous Flower Adornment", buddha: "Dharma Void Cloud", shape: "Flowers", theme: "gold", desc: "[Essence] Pure radiant light, entirely free from stagnation.<br>[Beings] Communicating through light, understanding without words." },
        { id: 5, shortName: "Wondrous Light", name: "Radiating Wondrous Light", buddha: "Universal Joy", shape: "Mani King", theme: "cyan", desc: "[Essence] Overlapping flower realms, the utmost aesthetic adornment.<br>[Beings] Sustained by adornments, rejoicing in wondrous forms." },
        { id: 6, shortName: "Pure Light", name: "Pure Wondrous Light", buddha: "Stainless Merit", shape: "Jewel Altar", theme: "silver", desc: "[Essence] Blazing jeweled flames, boundlessly pure.<br>[Beings] Endowed with majestic virtue, turning sage in a single thought.", quote: { author: "Master Qingliang", text: "A pure mind is the Hua-tsang realm itself; compassion and wisdom are its true adornments." } },
        { id: 7, shortName: "Flower Multitude", name: "Multitude of Flowers", buddha: "Flower Banner", shape: "Spiral", theme: "cyan", desc: "[Essence] Overflowing radiance, endlessly rippling waves.<br>[Beings] Realizing emptiness through observing form.", quote: { author: "Master Qingliang", text: "Principle transforms according to phenomena, unfolding the endless dependent origination of the one and the many." } },
        { id: 8, shortName: "Arising Virtue", name: "Arising Majestic Virtue", buddha: "Pure Sun Light", shape: "Half Moon", theme: "gold", desc: "[Essence] Majestic light extends afar, illuminating the deep profoundness.<br>[Beings] Lifespans are eternal, wisdom never extinguishes.", quote: { author: "Avatamsaka", text: "The bodies of all Buddhas are but one single Dharma body. The names are skillful means established for different capacities." } },
        { id: 9, shortName: "Wondrous Sounds", name: "Manifesting Sounds", buddha: "Lion Light", shape: "Scroll", theme: "gold", desc: "[Essence] Formless and shapeless, constructed by the vibration of sounds.<br>[Beings] Transcending visual perception, performing Buddha's work via audio.", quote: { author: "Li Tongxuan", text: "The void of the ten directions is my single volume of sutra." } },
        { id: 10, shortName: "Vajra Banner", name: "Vajra Banner", buddha: "Vajra Cloud", shape: "Vajra", theme: "silver", desc: "[Essence] Indestructible and firm, structured like the vajra mind.<br>[Beings] Unshakable in concentration, immune to demonic forces." },
        { id: 11, shortName: "Indigo Jewel", name: "Constant Indigo Light", buddha: "Merit Ocean", shape: "Indigo", theme: "cyan", desc: "[Essence] Profoundly deep, emitting a specific lazuli cyan frequency.<br>[Beings] Contemplating the subtle, reflecting the source." },
        { id: 12, shortName: "Brilliant Light", name: "Brilliant Illumination", buddha: "Pure Flower", shape: "Crown", theme: "gold", desc: "[Essence] Overlapping intersecting nets, connected like Indra's pearls.<br>[Beings] The one and the many mutually embrace.", quote: { author: "Master Qingliang", text: "Phenomena interpenetrate phenomena, like the meshes of a net intersecting, light reflecting light." } },
        { id: 13, shortName: "Saha & Sukhavati", name: "Saha & Sukhavati", buddha: "Vairocana", shape: "Even", theme: "cyan", desc: "[Essence] Purity and defilement share the same source; suffering and joy intermingle.<br>[Beings] The nexus of compassion and wisdom.", quote: { author: "Li Tongxuan", text: "Entering the Dharma realm without leaving the secular world, and establishing the pure land without abandoning the five turbidities." } },
        { id: 14, shortName: "Tranquil Merit", name: "Tranquil Merit", buddha: "Supreme Sound", shape: "Ribbon", theme: "silver", desc: "[Essence] Cool and sheltering, cutting off all worldly noise.<br>[Beings] Transcending words, silently merging with true suchness." },
        { id: 15, shortName: "Universal Light", name: "Universal Radiant Light", buddha: "Dharma Ocean", shape: "Lotus", theme: "gold", desc: "[Essence] A bright lamp hung high, illuminating every dark corner.<br>[Beings] Inherent nature radiates light, acting as guiding nodes.", quote: { author: "Li Tongxuan", text: "All sentient beings are within the ocean of the Buddhas' fruition, like water in a bottle." } },
        { id: 16, shortName: "Perfect Light", name: "Wondrous Perfect Light", buddha: "Supreme Wisdom", shape: "Round", theme: "cyan", desc: "[Essence] Pervading the ten directions, lacking nothing.<br>[Beings] Outflows exhausted, eternally resting in great nirvana.", quote: { author: "Master Qingliang", text: "When a single mote of dust is lifted, the entire earth is contained within it." } },
        { id: 17, shortName: "Pure Light", name: "All-Wondrous Pure Light", buddha: "Wisdom Cloud", shape: "Wondrous", theme: "fire", desc: "[Essence] Crimson light shining brilliantly, pure and transcending.<br>[Beings] Blazing with great compassion, vowing to uplift the sunken." },
        { id: 18, shortName: "Manifest Form", name: "Manifest Form Light", buddha: "Universal Gate", shape: "Net", theme: "silver", desc: "[Essence] Observing lands within a dust mote.<br>[Beings] Extremely subtle in physical form, wandering the boundless realm." },
        { id: 19, shortName: "Dharma Realm", name: "Illuminating Dharma Realm", buddha: "Void Wisdom", shape: "Realm", theme: "gold", desc: "[Essence] True suchness pervades everywhere, having no fixed location.<br>[Beings] Perfectly integrated and thoroughly awakened.", quote: { author: "Li Tongxuan", text: "The past, present, and future never depart from the current thought." } },
        { id: 20, shortName: "Jeweled Flame", name: "Wondrous Jeweled Flame", buddha: "Supreme Wisdom", shape: "Flame", theme: "fire", desc: "[Essence] Accumulation of wondrous jeweled flames, supreme and limitless.<br>[Beings] Sustaining only pure vows, creating adornments.", quote: { author: "Li Tongxuan", text: "If one realizes that all is mind-only, then the Hua-tsang realm is boundless." } }
    ];

    let currentRealmIndex = 12;

    const PastelColors = [
        { hsl: "350, 100%, 85%", hex: "#FFB7C5" }, 
        { hsl: "120, 100%, 85%", hex: "#98FB98" }, 
        { hsl: "210, 100%, 85%", hex: "#87CEFA" }, 
        { hsl: "30, 100%, 80%", hex: "#FFDAB9" },  
        { hsl: "0, 0%, 80%", hex: "#D3D3D3" },     
        { hsl: "270, 100%, 85%", hex: "#E6E6FA" }  
    ];
    function getRandomPastel() { return PastelColors[Math.floor(Math.random()*PastelColors.length)]; }

    const pickerContainer = document.getElementById('picker-container');
    function initPicker() {
        RealmMatrix.forEach((realm, index) => {
            let btn = document.createElement('div');
            btn.className = `realm-item ${realm.theme}-mode`;
            btn.id = `picker-${index}`;
            btn.innerHTML = `<span class="r-num">TIER ${realm.id}</span><span>${realm.shortName}</span>`;

            btn.onclick = () => { selectRealm(index); btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); };
            pickerContainer.appendChild(btn);
        });
    }

    function selectRealm(index) {
        if(currentRealmIndex === index && document.getElementById(`picker-${index}`).classList.contains('active')) return;
        currentRealmIndex = index;
        let data = RealmMatrix[index];

        document.querySelectorAll('.realm-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`picker-${index}`).classList.add('active');

                // UI 面板顯示短名 (shortName) 以防跑版
        document.getElementById('s-title').innerText = `Tier ${data.id} ． ${data.shortName}`;
        document.getElementById('s-buddha').innerText = `[Buddha] ${data.buddha}`;
        document.getElementById('s-shape').innerText = `Shape: ${data.shape}`;
        document.getElementById('s-desc').innerHTML = data.desc;
        
        // 玉簡內部顯示完整全名 (name) 展現莊嚴
        document.getElementById('theory-title').innerText = `Tier ${data.id} ． ${data.name}`;
        
        let theoryHTML = `This is Tier ${data.id} of the Hua-tsang World Ocean.<br><br>[Buddha] ${data.buddha}<br>[Shape] Manifests as ${data.shape}.<br>${data.desc}`;

        if (data.quote) {
            theoryHTML += `<div class="quote-box"><span class="quote-author">[${data.quote.author}]</span>${data.quote.text}</div>`;
        }
        
        document.getElementById('theory-desc').innerHTML = theoryHTML;

        let themeColor = data.theme;
        if(data.id === 16) themeColor = 'gold'; 

        let baseColor = themeColor === 'gold' ? '#f3e5ab' : (themeColor === 'cyan' ? '#8ba89c' : (themeColor === 'silver' ? '#e0e0e0' : '#ff8a8a'));
        let borderColor = themeColor === 'gold' ? 'rgba(212,175,55,0.8)' : (themeColor === 'cyan' ? 'rgba(139,168,156,0.8)' : (themeColor === 'silver' ? 'rgba(224,224,224,0.8)' : 'rgba(168,50,50,0.8)'));
        
        document.getElementById('s-title').style.color = baseColor; 
        document.getElementById('s-shape').style.color = baseColor; 
        document.getElementById('s-shape').style.borderColor = baseColor;
        document.getElementById('status-panel').style.borderLeftColor = borderColor;

        angleX = 0.3; angleY = 0; 
        initParticleEngines(); 
    }

    const canvas = document.getElementById('realmCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, time = 0, stars = [], realmParticles = [];
    let angleX = 0.3, angleY = 0, isDragging = false, lastMouseX = 0, lastMouseY = 0;
    const FOV = 400; 

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();

    function project3D(x, y, z) {
        let cosX = Math.cos(angleX), sinX = Math.sin(angleX), cosY = Math.cos(angleY), sinY = Math.sin(angleY);
        let y1 = y*cosX - z*sinX, z1 = y*sinX + z*cosX;
        let x2 = x*cosY - z1*sinY, z2 = x*sinY + z1*cosY;
        if(z2 < -FOV+50) return null;
        let scale = FOV / (FOV + z2 + 100); 
        return { px: (width/2) + x2*scale, py: (height/2) - y1*scale + 20, scale: scale, pz: z2 };
    }

    function initParticleEngines() {
        if(stars.length === 0) {
            for (let i = 0; i < 1000; i++) {
                let starSize = Math.random() > 0.8 ? Math.random() * 2.5 + 1.5 : Math.random() * 1.2 + 0.3;
                stars.push({ x: (Math.random()-0.5)*3000, y: (Math.random()-0.5)*3000, z: Math.random()*2000, speed: Math.random()*2+0.5, color: Math.random()>0.5 ? '#8ba89c' : '#f3e5ab', size: starSize });
            }
        }
        realmParticles = [];
        let id = RealmMatrix[currentRealmIndex].id;

        function addColorfulParticle(x, y, z, extra = {}) {
            let pastel = getRandomPastel();
            realmParticles.push({ x, y, z, ...extra, col: pastel });
        }

        if (id === 1) { 
            let N = 800, R = 180, goldenAngle = Math.PI * (3 - Math.sqrt(5)); 
            for(let i=0; i<N; i++) {
                let y = 1 - (i / (N - 1)) * 2, radius = Math.sqrt(1 - y*y), theta = goldenAngle * i;
                addColorfulParticle(Math.cos(theta)*radius*R, y*R, Math.sin(theta)*radius*R, { seed: Math.random()*Math.PI*2, type: 'mani' });
            }
        }
        else if (id === 2) { 
            for (let l = 0; l < 4; l++) {
                let pCount = [6, 8, 10, 12][l], rOut = 40 + l * 25, hUp = 20 + l * 20;  
                for (let p = 0; p < pCount; p++) {
                    let aC = (Math.PI * 2 / pCount) * p + (l * 0.3); 
                    for (let t = 0; t <= 1; t += 0.1) { 
                        for (let w = -1; w <= 1; w += 0.4) { 
                            let pW = Math.sin(t * Math.PI) * (15 + l * 5), cR = t * rOut, cY = -t * hUp + (w * w * 12); 
                            realmParticles.push({ x: cR * Math.cos(aC) - (w * pW) * Math.sin(aC), y: cY + 40, z: cR * Math.sin(aC) + (w * pW) * Math.cos(aC), type: 'lotus', l: l, t: t, col: {hsl: "139, 168, 156"} }); 
                        }
                    }
                }

    function renderWorld() {

        stars.forEach(s => {
            s.z -= s.speed; if (s.z <= 0) { s.z = 2000; s.x = (Math.random()-0.5)*3000; s.y = (Math.random()-0.5)*3000; }
            let sc = FOV / (FOV + s.z); let sx = (width/2) + s.x*sc; let sy = (height/2) + s.y*sc - 50;
            ctx.beginPath(); ctx.arc(sx, sy, Math.max(0.1, s.size*sc), 0, Math.PI*2);
            ctx.fillStyle = s.color === '#f3e5ab' ? `rgba(255,183,197, ${Math.min(1, sc*2)})` : `rgba(135,206,250, ${Math.min(1, sc*2)})`; ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over';

        renderWorld(); requestAnimationFrame(animate);
    }

    function onDown(e) { if(e.target.closest('.ui-layer') || e.target.closest('#theory-drawer')) return; isDragging = true; lastMouseX = e.touches?e.touches[0].clientX:e.clientX; lastMouseY = e.touches?e.touches[0].clientY:e.clientY; }
    function onMove(e) { if (!isDragging) return; let curX = e.touches?e.touches[0].clientX:e.clientX; let curY = e.touches?e.touches[0].clientY:e.clientY; angleY += (curX-lastMouseX)*0.01; angleX += (curY-lastMouseY)*0.01; angleX = Math.max(-Math.PI/2, Math.min(Math.PI/2, angleX)); lastMouseX=curX; lastMouseY=curY; }
    function onUp() { isDragging = false; }
    canvas.addEventListener('pointerdown', onDown); canvas.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp); canvas.addEventListener('pointercancel', onUp);
    
    function openTheoryDrawer() { document.getElementById('theory-drawer').classList.add('open'); }
    function closeTheoryDrawer() { document.getElementById('theory-drawer').classList.remove('open'); }
    document.getElementById('theory-drawer').addEventListener('pointerdown', (e) => e.stopPropagation());
    
    let isPlayingTheory = false; let theoryUtterance = null; window.sysUtterances = []; 
    function toggleTheoryAudio() {
        if (!window.speechSynthesis) return; const btnText = document.getElementById('tts-text'), btnIcon = document.getElementById('tts-icon');
        if (isPlayingTheory) { window.speechSynthesis.cancel(); isPlayingTheory = false; btnText.innerText = "Listen to Dharma"; btnIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>';
        } else {
            let textToRead = Array.from(document.querySelectorAll('#theory-content-box .main-title, #theory-content-box .paragraph')).map(n => n.textContent.trim()).join('. ');
            let isAndroid = /Android/i.test(navigator.userAgent); 
            theoryUtterance = new SpeechSynthesisUtterance(textToRead); theoryUtterance.lang = 'en-US'; theoryUtterance.rate = 0.85; 
            if (isAndroid) { window.sysUtterances.push(theoryUtterance); let voices = window.speechSynthesis.getVoices(); if (voices.length > 0) { let enVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google')) || voices.find(v => v.lang.includes('en')); if (enVoice) theoryUtterance.voice = enVoice; } }
            theoryUtterance.onend = () => { isPlayingTheory = false; btnText.innerText = "Listen to Dharma"; btnIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>'; if(isAndroid) window.sysUtterances = window.sysUtterances.filter(u => u !== theoryUtterance); };
            setTimeout(() => { window.speechSynthesis.speak(theoryUtterance); }, isAndroid ? 150 : 50); isPlayingTheory = true; btnText.innerText = "Stop Listening"; btnIcon.innerHTML = '<rect x="6" y="6" width="12" height="12"></rect>';
        }
    }
    const originalCloseTheoryDrawer = closeTheoryDrawer; closeTheoryDrawer = function() { if (isPlayingTheory) toggleTheoryAudio(); originalCloseTheoryDrawer(); }

    initPicker(); selectRealm(currentRealmIndex); 
    setTimeout(() => { document.getElementById(`picker-${currentRealmIndex}`).scrollIntoView({ inline: 'center' }); }, 100);
    animate();
</script>
