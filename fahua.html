<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>法華密碼 ． 一佛乘寶塔 (建構中)</title>
    <style>
        body {
            margin: 0; background-color: #030303; color: #f3e5ab;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; text-align: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .icon { 
            margin-bottom: 25px; opacity: 0.85; 
            animation: pulse 3s infinite alternate ease-in-out;
        }
        @keyframes pulse {
            0% { filter: drop-shadow(0 0 5px rgba(212,175,55,0.3)); transform: scale(0.95); }
            100% { filter: drop-shadow(0 0 20px rgba(212,175,55,0.7)); transform: scale(1.05); }
        }
        .title { 
            font-size: 1.5rem; letter-spacing: 4px; color: #d4af37; 
            margin-bottom: 15px; text-shadow: 0 0 10px rgba(212,175,55,0.3);
        }
        .subtitle { 
            font-size: 0.95rem; letter-spacing: 2px; color: rgba(255,255,255,0.6); 
            line-height: 2; margin-bottom: 45px;
        }
        .back-btn {
            padding: 14px 35px; border: 1px solid rgba(212,175,55,0.5);
            border-radius: 30px; color: #f3e5ab; cursor: pointer; text-decoration: none;
            font-size: 0.95rem; letter-spacing: 2px; transition: 0.3s;
            background: linear-gradient(135deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0) 100%);
            backdrop-filter: blur(5px);
        }
        .back-btn:active { 
            background: rgba(212,175,55,0.25); transform: scale(0.95); border-color: #d4af37;
        }
    </style>
</head>
<body>

    <svg class="icon" width="65" height="65" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="fahua-gold" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#f3e5ab"/>
                <stop offset="60%" stop-color="#d4af37"/>
                <stop offset="100%" stop-color="#8b3a3a"/>
            </linearGradient>
        </defs>
        <circle cx="12" cy="12" r="10" fill="none" stroke="url(#fahua-gold)" stroke-width="1.2" opacity="0.6"/>
        <path d="M6 16 Q 12 22 18 16" fill="none" stroke="#8b3a3a" stroke-width="1.5"/>
        <polygon points="12 4 8 16 16 16" fill="none" stroke="url(#fahua-gold)" stroke-width="1.5"/>
        <line x1="10" y1="10" x2="14" y2="10" stroke="url(#fahua-gold)" stroke-width="1.5"/>
        <line x1="9" y1="13" x2="15" y2="13" stroke="url(#fahua-gold)" stroke-width="1.5"/>
        <circle cx="12" cy="14" r="1.5" fill="#f3e5ab"/>
    </svg>

    <div class="title">法界藍圖 展開中...</div>
    
    <div class="subtitle">
        法華密碼 ． 一佛乘寶塔<br>
        <span style="font-size: 0.8rem; color: rgba(255,255,255,0.4); letter-spacing: 1px;">此法寶尚待因緣具足。<br>請行者持續累積修行資糧。</span>
    </div>

    <a href="index.html?screen=3" class="back-btn">返回 ． 彌陀淨土系統</a>

</body>
</html>
