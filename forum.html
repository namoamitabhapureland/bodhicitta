<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>菩提客棧 ． Lotus Forum</title>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang');
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        if (lang === 'en') {
            manifestLink.href = 'manifest_en.json';
        } else {
            manifestLink.href = 'manifest.json';
        }
        document.head.appendChild(manifestLink);
    </script>

    <style>
        :root {
            --bg: #020205; --card: rgba(18, 22, 28, 0.98);
            --gold: #D4AF37; --gold-br: #FFD700;
            --border: rgba(212, 175, 55, 0.2);
            --text: #E0E0E0; --cyan: #78909c;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: "PingFang TC", "Noto Sans TC", serif;
            overflow-x: hidden; line-height: 1.8; -webkit-tap-highlight-color: transparent;
        }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -2;
        }
        .realm-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 800px; height: 800px; z-index: -1; opacity: 0.12; pointer-events: none;
        }
        .realm-inner { transform-origin: center; animation: rotateRealm 100s linear infinite; }
        @keyframes rotateRealm { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 100; display: flex; align-items: center;
        }
        .btn-back {
            background: rgba(20, 20, 20, 0.8); border: 1px solid var(--border);
            color: var(--gold); padding: 8px 16px; border-radius: 20px;
            font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 6px;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .btn-back:active { transform: scale(0.95); background: var(--gold); color: #000; }

        .container { max-width: 800px; margin: 0 auto; padding: 80px 20px 60px 20px; position: relative; }

        .header { text-align: center; margin-bottom: 25px; }
        .lotus-wrapper { display: inline-block; animation: breathe 5s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

        .guide-box {
            background: linear-gradient(145deg, rgba(20,25,22,0.8), rgba(5,8,5,0.9));
            border: 1px solid rgba(212,175,55,0.3); border-radius: 15px; 
            padding: 18px 20px; margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 0 15px rgba(139,168,156,0.05);
            display: flex; align-items: flex-start; gap: 15px; backdrop-filter: blur(5px);
        }
        .guide-icon { width: 24px; height: 24px; flex-shrink: 0; filter: drop-shadow(0 0 5px rgba(212,175,55,0.4)); stroke: var(--gold); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-top: 2px; }
        .guide-text { color: #ccc; font-size: 0.85rem; line-height: 1.6; letter-spacing: 1px; text-align: justify; margin: 0; }
        .guide-highlight { color: var(--gold); font-weight: bold; }

        .interaction-panel {
            background: var(--card); border: 1px solid var(--border);
            padding: 25px; border-radius: 20px; margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .custom-field {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333;
            color: var(--gold-br); padding: 16px; margin-bottom: 15px;
            box-sizing: border-box; outline: none; font-size: 0.95rem; border-radius: 12px;
            transition: 0.3s;
        }
        .custom-field:focus { border-color: var(--gold); }

        .btn-post {
            background: linear-gradient(135deg, #D4AF37 0%, #8A6D3B 100%); width: 100%;
            color: #000; border: none; padding: 12px; border-radius: 12px;
            cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
        }
        .btn-post:active { transform: translateY(2px); box-shadow: 0 0 15px var(--gold); }
        .btn-post:disabled { opacity: 0.7; cursor: not-allowed; }

        .post-card {
            background: var(--card); border: 1px solid var(--border);
            margin-bottom: 30px; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .post-header {
            background: rgba(212,175,55,0.05); padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--gold);
            border-bottom: 1px solid rgba(212,175,55,0.1);
        }
        .post-body { padding: 25px 20px; font-size: 1.05rem; line-height: 1.8; word-break: break-word; }

        .pure-link { color: var(--gold-br); text-decoration: underline; font-size: 0.9rem; cursor: pointer; }
        .yt-btn {
            display: inline-block; padding: 6px 18px; border: 1px solid var(--cyan); color: var(--cyan);
            border-radius: 20px; font-size: 0.8rem; cursor: pointer; margin: 10px 0; transition: 0.3s;
        }
        .yt-btn:hover { border-color: var(--gold); color: var(--gold); }
        .yt-player { display: none; margin-top: 15px; width: 320px; max-width: 100%; height: 180px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }

        .action-wrap { padding: 15px 20px; background: rgba(0,0,0,0.3); border-top: 1px solid #222; }
        .reply-input {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #444; color: #eee;
            padding: 12px 15px; border-radius: 10px; font-size: 0.9rem; outline: none; margin-bottom: 12px;
            box-sizing: border-box; transition: 0.3s;
        }
        .reply-input:focus { border-color: var(--gold); }
        .reply-input:disabled { opacity: 0.5; }
        
        .reaction-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn-act {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(212,175,55,0.2); color: #AAA;
            padding: 8px 0; border-radius: 8px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: 0.3s;
        }
        .btn-act:active { transform: scale(0.95); border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.1); }
        .btn-act svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .act-zh { font-size: 0.75rem; letter-spacing: 1px; font-weight: bold; }

        .reply-item { padding: 10px 20px; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; align-items: flex-start; gap: 8px; }

        .btn-delete {
            background: transparent; border: 1px solid transparent;
            color: #ff6b6b; padding: 4px 8px; border-radius: 8px; font-size: 0.75rem;
            cursor: pointer; transition: 0.3s; margin-left: 10px;
        }
        .btn-delete:hover { background: rgba(255, 107, 107, 0.1); border-color: rgba(255, 107, 107, 0.3); }

        .btn-report {
            background: transparent; border: 1px solid transparent;
            color: var(--cyan); padding: 4px 8px; border-radius: 8px; font-size: 0.75rem;
            cursor: pointer; transition: 0.3s; margin-left: 5px;
            display: flex; align-items: center; gap: 4px;
        }
        .btn-report:hover { color: #ff9eb5; background: rgba(255, 158, 181, 0.05); border-color: rgba(255, 158, 181, 0.2); }
        .btn-report svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

        /* 系統美學提示框 (Alert / Confirm) */
        .glass-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px);
            z-index: 1000; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .glass-overlay.show { opacity: 1; }
        .glass-box {
            background: rgba(18, 22, 28, 0.95); border: 1px solid var(--border);
            padding: 30px 25px; border-radius: 20px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 20px rgba(212,175,55,0.05); max-width: 80%; width: 320px;
            transform: translateY(20px); transition: transform 0.3s ease;
        }
        .glass-overlay.show .glass-box { transform: translateY(0); }
        .glass-text { color: var(--gold-br); font-size: 1.05rem; margin-bottom: 25px; line-height: 1.6; font-weight: 300; letter-spacing: 1px; }
        .glass-btn {
            background: linear-gradient(135deg, #D4AF37 0%, #8A6D3B 100%);
            color: #000; border: none; padding: 10px 30px; border-radius: 12px;
            font-size: 0.9rem; font-weight: bold; cursor: pointer; letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.2s; min-width: 100px;
        }
        .glass-btn:active { transform: translateY(2px); }
        .glass-btn-cancel {
            background: transparent; color: #aaa; border: 1px solid #555; box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="glass-overlay" id="pure-alert">
        <div class="glass-box">
            <div class="glass-text" id="pure-alert-msg"></div>
            <button class="glass-btn" onclick="closeAlert()">確 定</button>
        </div>
    </div>

    <div class="glass-overlay" id="pure-confirm">
        <div class="glass-box">
            <div class="glass-text" id="pure-confirm-msg"></div>
            <div style="display:flex; justify-content:center; gap:15px;">
                <button class="glass-btn glass-btn-cancel" id="btn-confirm-cancel" onclick="closeConfirm(false)">取 消</button>
                <button class="glass-btn" id="btn-confirm-ok" onclick="closeConfirm(true)">確 定</button>
            </div>
        </div>
    </div>

    <div class="top-nav">
        <button class="btn-back" onclick="history.back()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            <div style="display:flex; flex-direction:column; align-items:flex-start;">
                <span id="nav-back-text" style="line-height:1.2; font-weight:bold;">返回</span>
                <span id="nav-back-sub" style="font-size:0.6rem; line-height:1; opacity:0.7;">Return</span>
            </div>
        </button>
    </div>

    <div class="stars"></div>
    <div class="realm-bg">
        <svg viewBox="0 0 200 200">
            <g class="realm-inner" fill="none" stroke="rgba(212,175,55,0.4)" stroke-width="0.5">
                <circle cx="100" cy="100" r="90" stroke-dasharray="4 8"/>
                <circle cx="100" cy="100" r="70"/>
                <rect x="60" y="60" width="80" height="80" transform="rotate(45 100 100)"/>
                <circle cx="100" cy="100" r="40" stroke-dasharray="2 4"/>
            </g>
        </svg>
    </div>

    <div class="container">
        <header class="header">
            <div class="lotus-wrapper">
                <svg width="100" height="100" viewBox="0 0 100 100">
                    <defs>
                        <radialGradient id="lotusGold" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#FFF8D6"/><stop offset="100%" stop-color="#D4AF37"/>
                        </radialGradient>
                    </defs>
                    <g transform="translate(50,55) scale(0.6)">
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(0)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(45)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(90)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(135)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(180)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(225)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(270)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(315)"/>
                    </g>
                </svg>
            </div>
            
            <h1 style="color:var(--gold-br); margin-top:5px; margin-bottom:5px; display:flex; flex-direction:column; align-items:center;">
                <span id="site-title-main" style="letter-spacing:6px; font-weight:300; font-size:1.8rem;">菩提客棧</span>
                <span id="site-title-sub" style="font-size:0.8rem; letter-spacing:3px; opacity:0.8; font-weight:normal; margin-top:5px;">Lotus Forum</span>
            </h1>
            <div id="site-desc" style="color:var(--cyan); letter-spacing:2px; font-size:0.85rem; margin-top:10px;">蓮友清淨交流 · Global Community</div>
        </header>

        <div class="guide-box">
            <svg class="guide-icon" viewBox="0 0 24 24">
                <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/>
                <circle cx="12" cy="10" r="3" fill="rgba(212,175,55,0.2)"/>
            </svg>
            <p class="guide-text" id="forum-guide-text">
                歡迎來到菩提客棧。於此方寸之間，發言請務必隨順娑婆世間法。本客棧法度高度自由，然萬法皆不出「成、住、壞、空」之流轉。為減法界之熵，順應因緣輪迴之理，本道場特設「七日一循環」之制。凡結緣法語，七日後皆自動化為虛無，與天地同歸寂靜；且為保清淨，至多僅留存<span class="guide-highlight">最新五十篇</span>法喜心得。<br><br>
                <span style="color:var(--cyan);">若欲回覆或互動，請先於下方填妥法號。</span>
            </p>
        </div>

        <div class="interaction-panel">
            <input type="text" id="nn" class="custom-field" placeholder="法號 / Name (Optional)">
            <textarea id="mm" class="custom-field" rows="4" placeholder="在此分享法喜心得... / Share your thoughts here..."></textarea>
            
            <button class="btn-post" id="post-btn">
                <span id="btn-post-main" style="font-size: 1.05rem; letter-spacing: 4px; font-weight: bold;">結緣發布</span>
                <span id="btn-post-sub" style="font-size: 0.7rem; letter-spacing: 1px; font-weight: normal; opacity: 0.8;">Post Message</span>
            </button>
        </div>

        <div id="board"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // --- 介面語系切換 ---
        if (lang === 'en') {
            document.getElementById('nav-back-text').innerText = "Back";
            document.getElementById('nav-back-sub').innerText = "返回";
            document.getElementById('site-title-main').innerText = "Lotus Forum";
            document.getElementById('site-title-sub').innerText = "菩提客棧";
            document.getElementById('site-desc').innerText = "Global Community · 蓮友清淨交流";
            document.getElementById('nn').placeholder = "Name / 法號 (Optional)";
            document.getElementById('mm').placeholder = "Share your thoughts here... / 在此分享法喜心得...";
            document.getElementById('btn-post-main').innerText = "Post Message";
            document.getElementById('btn-post-sub').innerText = "結緣發布";
            
            document.getElementById('forum-guide-text').innerHTML = "Welcome to the Lotus Forum. Please observe the dharma of the Saha world. Here, you experience absolute freedom, mirroring the cosmic cycle of Formation, Existence, Destruction, and Emptiness. To reduce worldly entropy and embrace Samsara, our realm operates on a '7-Day Cycle.' All messages naturally return to the void after seven days, retaining only the <span class='guide-highlight'>latest 50 echoes</span> of joy to maintain harmony.<br><br><span style='color:var(--cyan);'>To reply or interact, please enter your name below first.</span>";
            
            document.getElementById('btn-confirm-cancel').innerText = "Cancel";
            document.getElementById('btn-confirm-ok').innerText = "Confirm";
        }

        // --- 美學 Alert 提示框 ---
        function showAlert(msg) {
            document.getElementById('pure-alert-msg').innerHTML = msg.replace(/\n/g, '<br>');
            const overlay = document.getElementById('pure-alert');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('show'), 10);
        }
        function closeAlert() {
            const overlay = document.getElementById('pure-alert');
            overlay.classList.remove('show');
            setTimeout(() => overlay.style.display = 'none', 300);
        }

        // --- 美學 Confirm 確認框 ---
        let pendingConfirmCallback = null;
        function showConfirm(msg, callback) {
            document.getElementById('pure-confirm-msg').innerHTML = msg.replace(/\n/g, '<br>');
            const overlay = document.getElementById('pure-confirm');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('show'), 10);
            pendingConfirmCallback = callback;
        }
        function closeConfirm(result) {
            const overlay = document.getElementById('pure-confirm');
            overlay.classList.remove('show');
            setTimeout(() => {
                overlay.style.display = 'none';
                if (pendingConfirmCallback) pendingConfirmCallback(result);
                pendingConfirmCallback = null;
            }, 300);
        }

        const cfg = {
            apiKey: "AIzaSyCtttGd8yvbcEq17P75cnh52Pxgcc5ak_4",
            authDomain: "pureland-system.firebaseapp.com",
            databaseURL: "https://pureland-system-default-rtdb.firebaseio.com",
            projectId: "pureland-system"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(cfg);
        }
        
        const dbRef = firebase.database();
        const ref = dbRef.ref('posts_clean_v9');
        
        // 【新增防洗機制】將假身分存入 localStorage，避免重整狂洗檢舉
        let currentUserUid = localStorage.getItem('lotus_guest_uid');
        if (!currentUserUid) {
            currentUserUid = "guest_" + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('lotus_guest_uid', currentUserUid);
        }

        let isBoardLoaded = false;

        let localDB = null;
        try {
            const dbKey = (lang === 'en') ? 'PX_EN_V15.0' : 'PX_V15.0';
            localDB = JSON.parse(localStorage.getItem(dbKey));
        } catch(e) {
            console.log("未找到本機修行紀錄");
        }

        const userRank = (localDB && localDB.currentRank) ? localDB.currentRank : (lang === 'en' ? 'Wanderer' : '雲遊行者');
        const userNian = (localDB && localDB.totalNian) ? localDB.totalNian : 0;
        const defaultPostName = (lang === 'en') ? 'Practitioner' : '十方善信';
        const defaultReplyName = (lang === 'en') ? 'User' : '行者 / User';

        const savedName = localStorage.getItem('lotus_forum_name');
        if (savedName) {
            document.getElementById('nn').value = savedName;
        }

        firebase.auth().signInAnonymously().catch((error) => console.warn("匿名登入異常:", error));

        function cleanOldPosts() {
            const sevenDaysAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
            ref.orderByChild('t').endAt(sevenDaysAgo).once('value', snap => {
                if (snap.exists()) {
                    snap.forEach(childSnap => {
                        childSnap.ref.remove().catch(err => console.error("清理異常:", err));
                    });
                }
            });
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUserUid = user.uid; // 如果有成功連上，就覆蓋掉 localStorage 的假身分
                cleanOldPosts(); 
            }
            if (!isBoardLoaded) { 
                loadBoard(); 
                isBoardLoaded = true; 
            }
        });

        function parse(str) {
            let s = str.replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m]));
            const yt = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})(?:[^\s]*)/gi;
            s = s.replace(yt, (m, id) => {
                return `<br><div class="yt-btn" onclick="this.nextSibling.style.display='block';this.style.display='none'">[ 啟動影音結界 / Play Video ]</div><div class="yt-player"><iframe width="320" height="180" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe></div>`;
            });
            const img = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi;
            s = s.replace(img, u => `<br><a href="${u}" target="_blank" class="pure-link">[ 點擊觀看圖寶 / View Image ]</a><br>`);
            return s.replace(/\n/g, "<br>");
        }

        function getRankType(rankName) {
            if (!rankName) return '信';
            if (rankName.includes('地') || rankName.includes('Bhumi')) return '地';
            if (rankName.includes('迴') || rankName.includes('Dedication')) return '迴';
            if (rankName.includes('行') || rankName.includes('Practice')) return '行';
            if (rankName.includes('住') || rankName.includes('Abiding')) return '住';
            return '信';
        }

        function getLotusSVG(rankType, nianCount = 0, overrideLevel = null) {
            const sharedDefs = `
                <defs>
                <linearGradient id="grad-lv1" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#eafff8"/><stop offset="100%" stop-color="#349b7d"/>
                </linearGradient>
                <linearGradient id="grad-lv2" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#ff9eb5"/>
                </linearGradient>
                <linearGradient id="grad-lv3" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#fffeea"/><stop offset="100%" stop-color="#d4af37"/>
                </linearGradient>
                <linearGradient id="grad-lv4" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#ffeaee"/><stop offset="100%" stop-color="#c1121f"/>
                </linearGradient>
                <linearGradient id="grad-lv5" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#ffffff"/><stop offset="35%" stop-color="#ffdf00"/><stop offset="100%" stop-color="#d2691e"/>
                </linearGradient>
                <radialGradient id="rg-pure" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#ffffff"/><stop offset="30%" stop-color="#fff8dc"/><stop offset="100%" stop-color="#d4af37"/>
                </radialGradient>
                <linearGradient id="lg-metal" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ffeba8"/><stop offset="50%" stop-color="#d4af37"/><stop offset="100%" stop-color="#8a6d1c"/>
                </linearGradient>
                <radialGradient id="rg-void" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#111111" stop-opacity="0.95"/><stop offset="70%" stop-color="#0a0500" stop-opacity="0.8"/><stop offset="100%" stop-color="#000000" stop-opacity="0"/>
                </radialGradient>
                <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
                    <feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="4.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                </defs>
            `;

            const voidBg = `
                <circle cx="50" cy="50" r="42" fill="url(#rg-void)">
                <animate attributeName="r" values="41;43;41" dur="6s" repeatCount="indefinite"/>
                </circle>
            `;

            let bgContent = '';
            if (rankType === '信' || rankType === 'Faith') {
                bgContent = `<g opacity="0.8"><ellipse cx="50" cy="72" rx="30" ry="8" fill="none" stroke="url(#grad-lv1)" stroke-width="1.5"><animate attributeName="rx" values="15;35;15" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0;0.8" dur="4s" repeatCount="indefinite"/></ellipse><ellipse cx="50" cy="72" rx="18" ry="4" fill="none" stroke="url(#rg-pure)" stroke-width="1.5" filter="url(#glow-soft)"/></g>`;
            } else if (rankType === '住' || rankType === 'Abiding') {
                bgContent = `<g opacity="0.85"><path d="M 50 15 L 68 72 L 32 72 Z" fill="url(#rg-pure)" opacity="0.15" filter="url(#glow-soft)"/><polygon points="25,78 75,78 70,72 30,72" fill="url(#lg-metal)"/><rect x="22" y="78" width="56" height="3" fill="#ffffff" opacity="0.6"/></g>`;
            } else if (rankType === '行' || rankType === 'Practice') {
                let spokes = '';
                for(let i=0; i<12; i++) { spokes += `<line x1="50" y1="45" x2="50" y2="18" transform="rotate(${i*30} 50 45)" stroke="url(#lg-metal)" stroke-width="1.5"/>`; }
                bgContent = `<g opacity="0.5" filter="url(#glow-soft)"><animateTransform attributeName="transform" type="rotate" from="0 50 45" to="360 50 45" dur="20s" repeatCount="indefinite"/><circle cx="50" cy="45" r="28" fill="none" stroke="url(#lg-metal)" stroke-width="2"/><circle cx="50" cy="45" r="24" fill="none" stroke="url(#lg-metal)" stroke-width="0.5" stroke-dasharray="2 4"/>${spokes}</g>`;
            } else if (rankType === '迴' || rankType === 'Dedication') {
                bgContent = `<g opacity="0.6" stroke="#f472b6" fill="none" stroke-width="1.2" filter="url(#glow-soft)"><animateTransform attributeName="transform" type="rotate" from="360 50 45" to="0 50 45" dur="30s" repeatCount="indefinite"/><rect x="24" y="19" width="52" height="52" transform="rotate(0 50 45)"/><rect x="24" y="19" width="52" height="52" transform="rotate(30 50 45)"/><rect x="24" y="19" width="52" height="52" transform="rotate(60 50 45)"/><circle cx="50" cy="45" r="32" stroke-dasharray="4 4" stroke-width="0.8"/></g>`;
            } else if (rankType === '地' || rankType === 'Bhumi') {
                let rays = '';
                for(let i=0; i<16; i++) { rays += `<path d="M50 45 Q 65 25 50 15 Q 35 25 50 45" fill="none" stroke="url(#grad-lv1)" stroke-width="1" opacity="0.7" transform="rotate(${i*22.5} 50 45)"/>`; }
                bgContent = `<g opacity="0.8"><circle cx="50" cy="45" r="36" fill="none" stroke="url(#rg-pure)" stroke-width="1.5" stroke-dasharray="2 6"/><g filter="url(#glow-soft)"><animateTransform attributeName="transform" type="rotate" from="0 50 45" to="360 50 45" dur="45s" repeatCount="indefinite"/>${rays}</g></g>`;
            }

            let nLevel = 1;
            if (overrideLevel !== null) { nLevel = Math.min(overrideLevel, 5); } else {
                if (nianCount >= 10000000) nLevel = 5;       
                else if (nianCount >= 1000000) nLevel = 4;   
                else if (nianCount >= 100000) nLevel = 3;    
                else if (nianCount >= 10000) nLevel = 2;     
                else nLevel = 1;                             
            }

            let mColor = `url(#grad-lv${nLevel})`;
            let cColor = `url(#grad-lv${Math.min(nLevel + 1, 5)})`; 
            let petals = '';
            let pairs = nLevel + 1; 

            for (let i = pairs; i >= 1; i--) {
                let r = i / pairs; let spread = r * 36; let drop = r * 15; let tipY = 25 + drop; 
                petals += `<path d="M50 74 C ${50 - spread*0.6} 65, ${50 - spread} 50, ${50 - spread} ${tipY} C ${50 - spread*0.4} ${tipY+15}, 45 68, 50 74" fill="${cColor}" opacity="0.6" filter="url(#glow-soft)"/>`;
                petals += `<path d="M50 74 C ${50 + spread*0.6} 65, ${50 + spread} 50, ${50 + spread} ${tipY} C ${50 + spread*0.4} ${tipY+15}, 55 68, 50 74" fill="${cColor}" opacity="0.6" filter="url(#glow-soft)"/>`;
            }

            for (let i = pairs - 1; i >= 1; i--) {
                let r = i / (pairs - 1); let spread = r * 28; let drop = r * 12; let tipY = 32 + drop; 
                petals += `<path d="M50 76 C ${50 - spread*0.5} 68, ${50 - spread} 55, ${50 - spread} ${tipY} C ${50 - spread*0.4} ${tipY+12}, 47 70, 50 76" fill="${mColor}" opacity="0.95" filter="url(#glow-soft)"/>`;
                petals += `<path d="M50 76 C ${50 + spread*0.5} 68, ${50 + spread} 55, ${50 + spread} ${tipY} C ${50 + spread*0.4} ${tipY+12}, 53 70, 50 76" fill="${mColor}" opacity="0.95" filter="url(#glow-soft)"/>`;
            }

            petals += `<path d="M50 77 C 43 60, 44 42, 50 28 C 56 42, 57 60, 50 77" fill="${cColor}" filter="url(#glow-gold)"/>`;
            const core = `<circle cx="50" cy="70" r="${3 + nLevel}" fill="#ffffff" filter="url(#glow-strong)"><animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/></circle>`;

            return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${sharedDefs}${voidBg}${bgContent}<g><animateTransform attributeName="transform" type="translate" values="0,2; 0,-1.5; 0,2" dur="4s" repeatCount="indefinite"/>${petals}${core}</g></svg>`;
        }

        function getFormattedIcon(rankName, nianCount) {
            if (!rankName) return '';
            let rawSvg = getLotusSVG(getRankType(rankName), nianCount);
            return rawSvg.replace(/<svg[^>]*>/, '<svg viewBox="0 0 100 100" width="20" height="20" style="margin-right:6px; filter: drop-shadow(0 0 3px rgba(212,175,55,0.4));">');
        }

        document.getElementById('post-btn').onclick = () => {
            // 發文前檢查念佛數是否達標
            if (userNian < 100) {
                const nianAlertMsg = (lang === 'en') ? "Requires 100 chants to post!" : "需累積滿 100 聲佛號方可發文結緣喔！\nRequires 100 chants to post!";
                return showAlert(nianAlertMsg);
            }

            const m = document.getElementById('mm').value.trim();
            const rawName = document.getElementById('nn').value.trim();
            const n = rawName || defaultPostName;
            
            const alertMsg = (lang === 'en') ? "Please enter text!" : "請先填寫心得內容喔！\nPlease enter text!";
            if(!m) return showAlert(alertMsg);
            
            const btn = document.getElementById('post-btn');
            const originalBtnHTML = btn.innerHTML;
            btn.disabled = true;
            
            const loadingText = (lang === 'en') ? "Sending..." : "傳送中...";
            btn.innerHTML = `<span style="font-size: 1.05rem; letter-spacing: 4px; font-weight: bold;">${loadingText}</span>`;
            
            ref.push({ 
                n: n, m: m, t: Date.now(), uid: currentUserUid, rank: userRank, nian: userNian
            }).then(() => {
                document.getElementById('mm').value = "";
                if (rawName) localStorage.setItem('lotus_forum_name', rawName);
            }).catch(err => {
                const failMsg = (lang === 'en') ? "Failed! Check your network." : "發佈失敗！可能是網路不穩";
                showAlert(failMsg + "\n(Error: " + err.message + ")");
            }).finally(() => {
                btn.disabled = false;
                btn.innerHTML = originalBtnHTML;
            });
        };

        function loadBoard() {
            ref.limitToLast(50).off('value'); 
            
            ref.limitToLast(50).on('value', snap => {
                const b = document.getElementById('board'); b.innerHTML = "";
                const data = snap.val(); if(!data) return;
                
                Object.keys(data).reverse().forEach(id => {
                    const item = data[id];
                    
                    // 計算檢舉數，超過3人檢舉自動隱藏
                    const reportCount = item.reports ? Object.keys(item.reports).length : 0;
                    if (reportCount >= 3) return; 

                    let rs = "";
                    if(item.rs) {
                        Object.values(item.rs).forEach(r => {
                            let sym = "";
                            if(r.ty === 'gassho') sym = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><path d="M12 3 C12 3, 7 9, 7 15 C7 18, 9 21, 12 21 C15 21, 17 18, 17 15 C17 9, 12 3, 12 3 Z" fill="rgba(212,175,55,0.1)"/><path d="M12 21 L12 10" stroke-opacity="0.4"/></svg>`; 
                            if(r.ty === 'praise') sym = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><path d="M12 2 L14.5 9.5 L22 12 L14.5 14.5 L12 22 L9.5 14.5 L2 12 L9.5 9.5 Z" fill="rgba(212,175,55,0.15)"/><circle cx="12" cy="12" r="2.5" fill="var(--gold)"/></svg>`; 
                            if(r.ty === 'flower') sym = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="1.5"><path d="M12 22 C12 22, 5 15, 5 10 C5 6, 12 2, 12 2 C12 2, 19 6, 19 10 C19 15, 12 22, 12 22 Z" fill="rgba(139,168,156,0.1)"/><path d="M12 22 C12 22, 9 16, 9 11 C9 8, 12 4, 12 4 C12 4, 15 8, 15 11 C15 16, 12 22, 12 22 Z" fill="rgba(139,168,156,0.2)"/></svg>`; 
                            if(r.ty === 'chant')  sym = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><circle cx="12" cy="10" r="7.5" stroke-dasharray="3 3" opacity="0.7"/><circle cx="12" cy="20" r="2.5" fill="var(--gold)"/><path d="M12 17.5 L12 18.5" opacity="0.5"/></svg>`; 
                            
                            const replyIcon = getFormattedIcon(r.rank, r.nian || 0);
                            const replyRankDisplay = r.rank ? `<span style="display:flex; align-items:center; color:var(--cyan); font-size:0.75rem; margin-left:8px; opacity:0.9;">${replyIcon}[ ${r.rank} · ${r.nian || 0} ]</span>` : '';
                            
                            rs += `<div class="reply-item"><span style="display:flex; align-items:center; justify-content:center; margin-top:2px;">${sym}</span><div><div style="display:flex; align-items:center; flex-wrap:wrap;"><span style="color:var(--gold); font-size:0.85rem; font-weight:bold;">${r.u}</span>${replyRankDisplay}</div><span style="color:#ddd;">${r.m}</span></div></div>`;
                        });
                    }

                    let userActionHTML = "";
                    if (currentUserUid && item.uid === currentUserUid && !currentUserUid.startsWith('guest_')) {
                        const delText = (lang === 'en') ? "Del" : "刪除";
                        userActionHTML += `<button class="btn-delete" onclick="delPost('${id}')">${delText}</button>`;
                    }

                    // 檢舉按鈕
                    const reportText = (lang === 'en') ? "Report" : "檢舉";
                    userActionHTML += `
                        <button class="btn-report" onclick="reportPost('${id}')">
                            <svg viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
                            ${reportText}
                        </button>`;

                    const mainIcon = getFormattedIcon(item.rank, item.nian || 0);
                    const rankDisplay = item.rank ? `<span style="display:flex; align-items:center; color:var(--cyan); font-size:0.75rem; margin-left:8px; opacity:0.9;">${mainIcon}[ ${item.rank} · ${item.nian || 0} ]</span>` : '';

                    const card = document.createElement('div');
                    card.className = 'post-card';
                    
                    const replyPlaceholder = (lang === 'en') ? "Write a reply... (Max 20 chars)" : "寫下共鳴... (限20字) / Reply...";
                    const gasshoText = (lang === 'en') ? "Gassho" : "合十";
                    const praiseText = (lang === 'en') ? "Praise" : "讚歎";
                    const flowerText = (lang === 'en') ? "Offer" : "供花";
                    const chantText = (lang === 'en') ? "Chant" : "念佛";

                    card.innerHTML = `
                        <div class="post-header">
                            <div style="display:flex; align-items:center; flex-wrap:wrap;">
                                <span style="font-weight:bold;">[ ${item.n} ]</span>
                                ${rankDisplay}
                            </div>
                            <div style="display:flex; align-items:center;">
                                <span style="margin-right:10px; opacity:0.7;">${new Date(item.t).toLocaleString()}</span>
                                ${userActionHTML}
                            </div>
                        </div>
                        <div class="post-body">${parse(item.m)}</div>
                        <div class="re-list">${rs}</div>
                        
                        <div class="action-wrap">
                            <input type="text" id="i-${id}" class="reply-input" placeholder="${replyPlaceholder}" maxlength="20">
                            
                            <div class="reaction-grid">
                                <button class="btn-act" onclick="re('${id}','gassho')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><path d="M12 3 C12 3, 7 9, 7 15 C7 18, 9 21, 12 21 C15 21, 17 18, 17 15 C17 9, 12 3, 12 3 Z" fill="rgba(212,175,55,0.05)"/><path d="M12 21 L12 10" stroke-opacity="0.4"/></svg>
                                    <span class="act-zh">${gasshoText}</span>
                                </button>
                                <button class="btn-act" onclick="re('${id}','praise')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><path d="M12 2 L14.5 9.5 L22 12 L14.5 14.5 L12 22 L9.5 14.5 L2 12 L9.5 9.5 Z" fill="rgba(212,175,55,0.05)"/><circle cx="12" cy="12" r="2.5" fill="var(--gold)"/></svg>
                                    <span class="act-zh">${praiseText}</span>
                                </button>
                                <button class="btn-act" onclick="re('${id}','flower')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="1.5"><path d="M12 22 C12 22, 5 15, 5 10 C5 6, 12 2, 12 2 C12 2, 19 6, 19 10 C19 15, 12 22, 12 22 Z" fill="rgba(139,168,156,0.05)"/><path d="M12 22 C12 22, 9 16, 9 11 C9 8, 12 4, 12 4 C12 4, 15 8, 15 11 C15 16, 12 22, 12 22 Z" fill="rgba(139,168,156,0.15)"/></svg>
                                    <span class="act-zh">${flowerText}</span>
                                </button>
                                <button class="btn-act" onclick="re('${id}','chant')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><circle cx="12" cy="10" r="7.5" stroke-dasharray="3 3" opacity="0.7"/><circle cx="12" cy="20" r="2.5" fill="var(--gold)"/><path d="M12 17.5 L12 18.5" opacity="0.5"/></svg>
                                    <span class="act-zh">${chantText}</span>
                                </button>
                            </div>
                        </div>
                    `;
                    b.appendChild(card);
                });
            });
        }

        window.re = (id, ty) => {
            const inputField = document.getElementById(`i-${id}`);
            const m = inputField.value.trim();
            const alertMsg = (lang === 'en') ? "Please enter text!" : "請先寫下您的共鳴喔！\nPlease enter text!";
            if(!m) return showAlert(alertMsg);
            
            if(m.length > 20) {
                const lenAlertMsg = (lang === 'en') ? "Max 20 characters allowed." : "留言請保持簡潔，字數限制為 20 字以內喔！";
                return showAlert(lenAlertMsg);
            }
            
            const rawName = document.getElementById('nn').value.trim();
            const n = rawName || defaultReplyName; 
            inputField.disabled = true;

            ref.child(id).child('rs').push({ 
                u: n, m: m, ty: ty, rank: userRank, nian: userNian
            }).then(() => {
                inputField.value = ""; 
                if (rawName) localStorage.setItem('lotus_forum_name', rawName); 
            }).catch(err => {
                const failMsg = (lang === 'en') ? "Failed! Check your network." : "互動失敗！可能是網路不穩，或字數超過限制。";
                showAlert(failMsg + "\n(Error: " + err.message + ")");
            }).finally(() => {
                inputField.disabled = false;
            });
        };

        window.delPost = (id) => {
            const confirmMsg = (lang === 'en') ? "Are you sure you want to delete this post?" : "確定要刪除這篇結緣留言嗎？";
            showConfirm(confirmMsg, (result) => {
                if(result) {
                    ref.child(id).remove().catch(err => {
                        const failMsg = (lang === 'en') ? "Failed to delete!" : "刪除失敗！權限不足或連線異常。";
                        showAlert(failMsg + "\n(Error: " + err.message + ")");
                    });
                }
            });
        };

        // 【修改邏輯】貫徹秒發免等待，允許直接呼叫檢舉
        window.reportPost = (id) => {
            const confirmMsg = (lang === 'en') ? "Report this post as inappropriate?\nIt will be hidden if multiple users report it." : "確認檢舉此篇內容為不當言論？\n若達一定人數將自動隱藏。";
            
            showConfirm(confirmMsg, (result) => {
                if (result) {
                    ref.child(id).child('reports').child(currentUserUid).set(true)
                    .then(() => {
                        showAlert((lang === 'en') ? "Reported successfully." : "檢舉成功！感謝您協助維護客棧清淨。");
                    })
                    .catch(err => {
                        showAlert("檢舉失敗 / Report failed:\n" + err.message);
                    });
                }
            });
        };
    </script>
</body>
</html>
