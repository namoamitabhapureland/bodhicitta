<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>菩提客棧 ． Lotus Forum</title>
    
    <script>
        // 讀取網址列的參數
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang');
        
        // 建立 link 標籤
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        
        if (lang === 'en') {
            manifestLink.href = 'manifest_en.json';
        } else {
            manifestLink.href = 'manifest.json';
        }
        
        document.head.appendChild(manifestLink);
    </script>

    <style>
        :root {
            --bg: #020205; --card: rgba(18, 22, 28, 0.98);
            --gold: #D4AF37; --gold-br: #FFD700;
            --border: rgba(212, 175, 55, 0.2);
            --text: #E0E0E0; --cyan: #78909c;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: "PingFang TC", "Noto Sans TC", serif;
            overflow-x: hidden; line-height: 1.8; -webkit-tap-highlight-color: transparent;
        }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -2;
        }
        .realm-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 800px; height: 800px; z-index: -1; opacity: 0.12; pointer-events: none;
        }
        .realm-inner { transform-origin: center; animation: rotateRealm 100s linear infinite; }
        @keyframes rotateRealm { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 100; display: flex; align-items: center;
        }
        .btn-back {
            background: rgba(20, 20, 20, 0.8); border: 1px solid var(--border);
            color: var(--gold); padding: 8px 16px; border-radius: 20px;
            font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 6px;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .btn-back:active { transform: scale(0.95); background: var(--gold); color: #000; }

        .container { max-width: 800px; margin: 0 auto; padding: 80px 20px 60px 20px; position: relative; }

        .header { text-align: center; margin-bottom: 40px; }
        .lotus-wrapper { display: inline-block; animation: breathe 5s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

        .interaction-panel {
            background: var(--card); border: 1px solid var(--border);
            padding: 25px; border-radius: 20px; margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .custom-field {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333;
            color: var(--gold-br); padding: 16px; margin-bottom: 15px;
            box-sizing: border-box; outline: none; font-size: 0.95rem; border-radius: 12px;
            transition: 0.3s;
        }
        .custom-field:focus { border-color: var(--gold); }

        .btn-post {
            background: linear-gradient(135deg, #D4AF37 0%, #8A6D3B 100%); width: 100%;
            color: #000; border: none; padding: 12px; border-radius: 12px;
            cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
        }
        .btn-post:active { transform: translateY(2px); box-shadow: 0 0 15px var(--gold); }
        .btn-post:disabled { opacity: 0.7; cursor: not-allowed; }

        .post-card {
            background: var(--card); border: 1px solid var(--border);
            margin-bottom: 30px; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .post-header {
            background: rgba(212,175,55,0.05); padding: 12px 20px;
            display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--gold);
            border-bottom: 1px solid rgba(212,175,55,0.1);
        }
        .post-body { padding: 25px 20px; font-size: 1.05rem; line-height: 1.8; word-break: break-word; }

        .pure-link { color: var(--gold-br); text-decoration: underline; font-size: 0.9rem; cursor: pointer; }
        .yt-btn {
            display: inline-block; padding: 6px 18px; border: 1px solid var(--cyan); color: var(--cyan);
            border-radius: 20px; font-size: 0.8rem; cursor: pointer; margin: 10px 0; transition: 0.3s;
        }
        .yt-btn:hover { border-color: var(--gold); color: var(--gold); }
        .yt-player { display: none; margin-top: 15px; width: 320px; max-width: 100%; height: 180px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }

        .action-wrap { padding: 15px 20px; background: rgba(0,0,0,0.3); border-top: 1px solid #222; }
        .reply-input {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #444; color: #eee;
            padding: 12px 15px; border-radius: 10px; font-size: 0.9rem; outline: none; margin-bottom: 12px;
            box-sizing: border-box; transition: 0.3s;
        }
        .reply-input:focus { border-color: var(--gold); }
        .reply-input:disabled { opacity: 0.5; }
        
        .reaction-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn-act {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(212,175,55,0.2); color: #AAA;
            padding: 8px 0; border-radius: 8px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: 0.3s;
        }
        .btn-act:active { transform: scale(0.95); border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.1); }
        .btn-act svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .act-zh { font-size: 0.75rem; letter-spacing: 1px; font-weight: bold; }
        .act-en { font-size: 0.55rem; opacity: 0.6; letter-spacing: 0.5px; }

        .reply-item { padding: 10px 20px; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; align-items: flex-start; gap: 8px; }

        .btn-delete {
            background: rgba(255, 50, 50, 0.1); border: 1px solid rgba(255, 50, 50, 0.3);
            color: #ff6b6b; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem;
            cursor: pointer; transition: 0.3s; margin-left: 10px;
        }
        .btn-delete:hover { background: rgba(255, 50, 50, 0.2); border-color: #ff6b6b; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="btn-back" onclick="history.back()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            <div style="display:flex; flex-direction:column; align-items:flex-start;">
                <span style="line-height:1.2; font-weight:bold;">返回</span>
                <span style="font-size:0.6rem; line-height:1; opacity:0.7;">Return</span>
            </div>
        </button>
    </div>

    <div class="stars"></div>
    <div class="realm-bg">
        <svg viewBox="0 0 200 200">
            <g class="realm-inner" fill="none" stroke="rgba(212,175,55,0.4)" stroke-width="0.5">
                <circle cx="100" cy="100" r="90" stroke-dasharray="4 8"/>
                <circle cx="100" cy="100" r="70"/>
                <rect x="60" y="60" width="80" height="80" transform="rotate(45 100 100)"/>
                <circle cx="100" cy="100" r="40" stroke-dasharray="2 4"/>
            </g>
        </svg>
    </div>

    <div class="container">
        <header class="header">
            <div class="lotus-wrapper">
                <svg width="100" height="100" viewBox="0 0 100 100">
                    <defs>
                        <radialGradient id="lotusGold" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#FFF8D6"/><stop offset="100%" stop-color="#D4AF37"/>
                        </radialGradient>
                    </defs>
                    <g transform="translate(50,55) scale(0.6)">
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(0)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(45)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(90)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(135)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(180)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(225)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(270)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(315)"/>
                    </g>
                </svg>
            </div>
            
            <h1 style="color:var(--gold-br); margin-top:5px; margin-bottom:5px; display:flex; flex-direction:column; align-items:center;">
                <span style="letter-spacing:6px; font-weight:300; font-size:1.8rem;">菩提客棧</span>
                <span style="font-size:0.8rem; letter-spacing:3px; opacity:0.8; font-weight:normal; margin-top:5px;">Lotus Forum</span>
            </h1>
            <div style="color:var(--cyan); letter-spacing:2px; font-size:0.85rem; margin-top:10px;">蓮友清淨交流 · Global Community</div>
        </header>

        <div class="interaction-panel">
            <input type="text" id="nn" class="custom-field" placeholder="法號 / Name (Optional)">
            <textarea id="mm" class="custom-field" rows="4" placeholder="在此分享法喜心得... / Share your thoughts here..."></textarea>
            
            <button class="btn-post" id="post-btn">
                <span style="font-size: 1.05rem; letter-spacing: 4px; font-weight: bold;">結緣發布</span>
                <span style="font-size: 0.7rem; letter-spacing: 1px; font-weight: normal; opacity: 0.8;">Post Message</span>
            </button>
        </div>

        <div id="board"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const cfg = {
            apiKey: "AIzaSyCtttGd8yvbcEq17P75cnh52Pxgcc5ak_4",
            authDomain: "pureland-system.firebaseapp.com",
            databaseURL: "https://pureland-system-default-rtdb.firebaseio.com",
            projectId: "pureland-system"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(cfg);
        }
        
        const dbRef = firebase.database();
        const ref = dbRef.ref('posts_clean_v9');
        
        // 預設未取得正式身分證
        let currentUserUid = null;
        let isBoardLoaded = false;

        // 讀取本機資料 (LocalStorage)
        let localDB = null;
        try {
            const dbKey = (lang === 'en') ? 'PX_EN_V15.0' : 'PX_V15.0';
            localDB = JSON.parse(localStorage.getItem(dbKey));
        } catch(e) {
            console.log("未找到本機修行紀錄");
        }

        const userRank = (localDB && localDB.currentRank) ? localDB.currentRank : (lang === 'en' ? 'Wanderer' : '雲遊行者');
        const userNian = (localDB && localDB.totalNian) ? localDB.totalNian : 0;
        const defaultName = (lang === 'en') ? 'Practitioner' : '十方善信';

        // ✨ 優化：載入上次使用的名字
        const savedName = localStorage.getItem('lotus_forum_name');
        if (savedName) {
            document.getElementById('nn').value = savedName;
        }

        // 啟動 Firebase 匿名驗證
        firebase.auth().signInAnonymously().catch((error) => {
            console.warn("匿名登入異常:", error);
        });

        // 監聽登入狀態
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUserUid = user.uid; 
            } else {
                currentUserUid = null;
            }
            
            if (!isBoardLoaded) {
                loadBoard();
                isBoardLoaded = true;
            } else {
                loadBoard(); 
            }
        });

        function parse(str) {
            let s = str.replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m]));
            const yt = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})(?:[^\s]*)/gi;
            s = s.replace(yt, (m, id) => {
                return `<br><div class="yt-btn" onclick="this.nextSibling.style.display='block';this.style.display='none'">[ 啟動影音結界 / Play Video ]</div><div class="yt-player"><iframe width="320" height="180" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe></div>`;
            });
            const img = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi;
            s = s.replace(img, u => `<br><a href="${u}" target="_blank" class="pure-link">[ 點擊觀看圖寶 / View Image ]</a><br>`);
            return s.replace(/\n/g, "<br>");
        }

        // 發文邏輯
        document.getElementById('post-btn').onclick = () => {
            if (!currentUserUid) {
                alert("菩提客棧連線中，請稍候片刻再發布！ / Connecting, please wait...");
                return;
            }

            const m = document.getElementById('mm').value.trim();
            const n = document.getElementById('nn').value.trim() || defaultName;
            if(!m) return;
            
            // ✨ 優化：防止重複點擊
            const btn = document.getElementById('post-btn');
            const originalBtnHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span style="font-size: 1.05rem; letter-spacing: 4px; font-weight: bold;">傳送中...</span>`;
            
            ref.push({ 
                n: n, 
                m: m, 
                t: Date.now(), 
                uid: currentUserUid,
                rank: userRank,
                nian: userNian
            }).then(() => {
                document.getElementById('mm').value = "";
                // ✨ 優化：記住法號
                localStorage.setItem('lotus_forum_name', n);
            }).catch(err => {
                alert("發佈失敗！(錯誤碼: " + err.message + ")");
            }).finally(() => {
                // 恢復按鈕狀態
                btn.disabled = false;
                btn.innerHTML = originalBtnHTML;
            });
        };

        function loadBoard() {
            // ✨ 優化：限制只載入最新的 50 篇，節省流量與提升效能
            ref.limitToLast(50).on('value', snap => {
                const b = document.getElementById('board'); b.innerHTML = "";
                const data = snap.val(); if(!data) return;
                
                Object.keys(data).reverse().forEach(id => {
                    const item = data[id];
                    let rs = "";
                    if(item.rs) {
                        Object.values(item.rs).forEach(r => {
                            let sym = "";
                            if(r.ty === 'gassho') { sym = `<svg width="18" height="18" viewBox="0 0 24 24" fill="#F3E5AB" stroke="#D4AF37" stroke-width="1.5"><path d="M12 22s-5-4.5-5-11.5S12 2 12 2s5 3.5 5 10.5S12 22 12 22z"/><path d="M12 2v20" stroke="#D4AF37" stroke-opacity="0.5"/></svg>`; }
                            if(r.ty === 'praise') { sym = `<svg width="18" height="18" viewBox="0 0 24 24" fill="#FFD700" stroke="#FFA500" stroke-width="1.5"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5Z"/></svg>`; }
                            if(r.ty === 'flower') { sym = `<svg width="18" height="18" viewBox="0 0 24 24" fill="#FFB6C1" stroke="#FF69B4" stroke-width="1.5"><path d="M12 22c0 0 5-6 5-10s-5-8-5-8-5 6-5 8 5 10 5 10z"/><path d="M12 22c0 0 10-4 10-10s-5-4-10 0"/><path d="M12 22c0 0-10-4-10-10s5-4 10 0"/></svg>`; }
                            if(r.ty === 'chant')  { sym = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8BA89C" stroke-width="2.5"><circle cx="12" cy="12" r="8" stroke-dasharray="4 4"/><circle cx="12" cy="22" r="3" fill="#D4AF37" stroke="none"/></svg>`; }
                            
                            // ✨ 修復：正確顯示回覆者的名字、位階與念佛數
                            const replyRankDisplay = r.rank ? `<span style="color:var(--cyan); font-size:0.75rem; margin-left:8px; opacity:0.8;">[ ${r.rank} · ${r.nian || 0} ]</span>` : '';
                            
                            rs += `<div class="reply-item">
                                    <span style="display:flex; align-items:center; justify-content:center; margin-top:2px;">${sym}</span>
                                    <div>
                                        <span style="color:var(--gold); font-size:0.85rem; font-weight:bold;">${r.u}</span>
                                        ${replyRankDisplay}
                                        <br>
                                        <span style="color:#ddd;">${r.m}</span>
                                    </div>
                                   </div>`;
                        });
                    }

                    let deleteBtnHTML = "";
                    if (currentUserUid && item.uid === currentUserUid) {
                        deleteBtnHTML = `<button class="btn-delete" onclick="delPost('${id}')">刪除 / Del</button>`;
                    }

                    const rankDisplay = item.rank ? `<span style="color:var(--cyan); font-size:0.75rem; margin-left:8px; opacity:0.8;">[ ${item.rank} · ${item.nian || 0} ]</span>` : '';

                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <div class="post-header">
                            <div style="display:flex; align-items:center; flex-wrap:wrap;">
                                <span style="font-weight:bold;">[ ${item.n} ]</span>
                                ${rankDisplay}
                                ${deleteBtnHTML}
                            </div>
                            <span>${new Date(item.t).toLocaleString()}</span>
                        </div>
                        <div class="post-body">${parse(item.m)}</div>
                        <div class="re-list">${rs}</div>
                        
                        <div class="action-wrap">
                            <input type="text" id="i-${id}" class="reply-input" placeholder="寫下您的共鳴或祝福... / Reply...">
                            
                            <div class="reaction-grid">
                                <button class="btn-act" onclick="re('${id}','gassho')"><svg viewBox="0 0 24 24"><path d="M12 22s-5-4.5-5-11.5S12 2 12 2s5 3.5 5 10.5S12 22 12 22z"/><path d="M12 2v20" stroke-opacity="0.3"/></svg><span class="act-zh">合十</span><span class="act-en">Gassho</span></button>
                                <button class="btn-act" onclick="re('${id}','praise')"><svg viewBox="0 0 24 24"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5Z"/></svg><span class="act-zh">讚歎</span><span class="act-en">Praise</span></button>
                                <button class="btn-act" onclick="re('${id}','flower')"><svg viewBox="0 0 24 24"><path d="M12 22c0 0 5-6 5-10s-5-8-5-8-5 6-5 8 5 10 5 10z"/><path d="M12 22c0 0 10-4 10-10s-5-4-10 0"/><path d="M12 22c0 0-10-4-10-10s5-4 10 0"/></svg><span class="act-zh">供花</span><span class="act-en">Offer</span></button>
                                <button class="btn-act" onclick="re('${id}','chant')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" stroke-dasharray="4 4"/><circle cx="12" cy="22" r="2" fill="currentColor" stroke="none"/></svg><span class="act-zh">念佛</span><span class="act-en">Chant</span></button>
                            </div>
                        </div>
                    `;
                    b.appendChild(card);
                });
            });
        }

        window.re = (id, ty) => {
            if (!currentUserUid) {
                alert("連線中，請稍候再互動！ / Connecting, please wait...");
                return;
            }

            const inputField = document.getElementById(`i-${id}`);
            const m = inputField.value.trim();
            if(!m) return alert("請先輸入內容喔！ / Please enter text!");
            
            // ✨ 修復：抓取目前輸入的名字與位階
            const n = document.getElementById('nn').value.trim() || defaultName;

            // 暫停輸入框避免連點
            inputField.disabled = true;

            ref.child(id).child('rs').push({ 
                u: n, 
                m: m, 
                ty: ty,
                rank: userRank,
                nian: userNian
            }).then(() => {
                inputField.value = ""; 
                localStorage.setItem('lotus_forum_name', n); // 回覆也順便記憶法號
            }).catch(err => {
                alert("互動失敗！(錯誤碼: " + err.message + ")");
            }).finally(() => {
                // 恢復輸入框
                inputField.disabled = false;
            });
        };

        window.delPost = (id) => {
            if(confirm("確定要刪除這篇結緣留言嗎？ / Are you sure you want to delete this post?")) {
                ref.child(id).remove().catch(err => {
                    alert("刪除失敗！(錯誤碼: " + err.message + ")");
                });
            }
        };
    </script>
</body>
</html>
