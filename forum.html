<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>菩提客棧 ． Lotus Forum</title>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang');
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        if (lang === 'en') {
            manifestLink.href = 'manifest_en.json';
        } else {
            manifestLink.href = 'manifest.json';
        }
        document.head.appendChild(manifestLink);
    </script>

    <style>
        :root {
            --bg: #020205; --card: rgba(18, 22, 28, 0.98);
            --gold: #D4AF37; --gold-br: #FFD700;
            --border: rgba(212, 175, 55, 0.2);
            --text: #E0E0E0; --cyan: #78909c;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: "PingFang TC", "Noto Sans TC", serif;
            overflow-x: hidden; line-height: 1.8; -webkit-tap-highlight-color: transparent;
        }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -2;
        }
        .realm-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 800px; height: 800px; z-index: -1; opacity: 0.12; pointer-events: none;
        }
        .realm-inner { transform-origin: center; animation: rotateRealm 100s linear infinite; }
        @keyframes rotateRealm { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 100; display: flex; align-items: center;
        }
        .btn-back {
            background: rgba(20, 20, 20, 0.8); border: 1px solid var(--border);
            color: var(--gold); padding: 8px 16px; border-radius: 20px;
            font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 6px;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .btn-back:active { transform: scale(0.95); background: var(--gold); color: #000; }

        .container { max-width: 800px; margin: 0 auto; padding: 80px 20px 60px 20px; position: relative; }

        .header { text-align: center; margin-bottom: 25px; }
        .lotus-wrapper { display: inline-block; animation: breathe 5s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

        /* ✨ 新增：優雅的客棧規約說明欄 ✨ */
        .guide-box {
            background: linear-gradient(145deg, rgba(20,25,22,0.8), rgba(5,8,5,0.9));
            border: 1px solid rgba(212,175,55,0.3); border-radius: 15px; 
            padding: 18px 20px; margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 0 15px rgba(139,168,156,0.05);
            display: flex; align-items: flex-start; gap: 15px; backdrop-filter: blur(5px);
        }
        .guide-icon { width: 24px; height: 24px; flex-shrink: 0; filter: drop-shadow(0 0 5px rgba(212,175,55,0.4)); stroke: var(--gold); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-top: 2px; }
        .guide-text { color: #ccc; font-size: 0.85rem; line-height: 1.6; letter-spacing: 1px; text-align: justify; margin: 0; }
        .guide-highlight { color: var(--gold); font-weight: bold; }

        .interaction-panel {
            background: var(--card); border: 1px solid var(--border);
            padding: 25px; border-radius: 20px; margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .custom-field {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333;
            color: var(--gold-br); padding: 16px; margin-bottom: 15px;
            box-sizing: border-box; outline: none; font-size: 0.95rem; border-radius: 12px;
            transition: 0.3s;
        }
        .custom-field:focus { border-color: var(--gold); }

        .btn-post {
            background: linear-gradient(135deg, #D4AF37 0%, #8A6D3B 100%); width: 100%;
            color: #000; border: none; padding: 12px; border-radius: 12px;
            cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
        }
        .btn-post:active { transform: translateY(2px); box-shadow: 0 0 15px var(--gold); }
        .btn-post:disabled { opacity: 0.7; cursor: not-allowed; }

        .post-card {
            background: var(--card); border: 1px solid var(--border);
            margin-bottom: 30px; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .post-header {
            background: rgba(212,175,55,0.05); padding: 12px 20px;
            display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--gold);
            border-bottom: 1px solid rgba(212,175,55,0.1);
        }
        .post-body { padding: 25px 20px; font-size: 1.05rem; line-height: 1.8; word-break: break-word; }

        .pure-link { color: var(--gold-br); text-decoration: underline; font-size: 0.9rem; cursor: pointer; }
        .yt-btn {
            display: inline-block; padding: 6px 18px; border: 1px solid var(--cyan); color: var(--cyan);
            border-radius: 20px; font-size: 0.8rem; cursor: pointer; margin: 10px 0; transition: 0.3s;
        }
        .yt-btn:hover { border-color: var(--gold); color: var(--gold); }
        .yt-player { display: none; margin-top: 15px; width: 320px; max-width: 100%; height: 180px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }

        .action-wrap { padding: 15px 20px; background: rgba(0,0,0,0.3); border-top: 1px solid #222; }
        .reply-input {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #444; color: #eee;
            padding: 12px 15px; border-radius: 10px; font-size: 0.9rem; outline: none; margin-bottom: 12px;
            box-sizing: border-box; transition: 0.3s;
        }
        .reply-input:focus { border-color: var(--gold); }
        .reply-input:disabled { opacity: 0.5; }
        
        .reaction-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn-act {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(212,175,55,0.2); color: #AAA;
            padding: 8px 0; border-radius: 8px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: 0.3s;
        }
        .btn-act:active { transform: scale(0.95); border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.1); }
        .btn-act svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .act-zh { font-size: 0.75rem; letter-spacing: 1px; font-weight: bold; }

        .reply-item { padding: 10px 20px; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; align-items: flex-start; gap: 8px; }

        .btn-delete {
            background: rgba(255, 50, 50, 0.1); border: 1px solid rgba(255, 50, 50, 0.3);
            color: #ff6b6b; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem;
            cursor: pointer; transition: 0.3s; margin-left: 10px;
        }
        .btn-delete:hover { background: rgba(255, 50, 50, 0.2); border-color: #ff6b6b; }

        .glass-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px);
            z-index: 1000; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .glass-overlay.show { opacity: 1; }
        .glass-box {
            background: rgba(18, 22, 28, 0.85); border: 1px solid var(--border);
            padding: 30px 25px; border-radius: 20px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); max-width: 80%; width: 320px;
            transform: translateY(20px); transition: transform 0.3s ease;
        }
        .glass-overlay.show .glass-box { transform: translateY(0); }
        .glass-text { color: var(--gold-br); font-size: 1.05rem; margin-bottom: 25px; line-height: 1.6; font-weight: 300; letter-spacing: 1px; }
        .glass-btn {
            background: linear-gradient(135deg, #D4AF37 0%, #8A6D3B 100%);
            color: #000; border: none; padding: 10px 30px; border-radius: 12px;
            font-size: 0.9rem; font-weight: bold; cursor: pointer; letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.2s;
        }
        .glass-btn:active { transform: translateY(2px); }
    </style>
</head>
<body>

    <div class="top-nav">

    <div class="stars"></div>
    <div class="realm-bg">
        <svg viewBox="0 0 200 200">

    <div class="container">

            <h1 style="color:var(--gold-br); margin-top:5px; margin-bottom:5px; display:flex; flex-direction:column; align-items:center;">

        <div class="guide-box">
            <svg class="guide-icon" viewBox="0 0 24 24">
                <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // --- 介面語系切換 ---
        if (lang === 'en') {
            document.getElementById('nav-back-text').innerText = "Back";
            document.getElementById('nav-back-sub').innerText = "返回";
            document.getElementById('site-title-main').innerText = "Lotus Forum";
            document.getElementById('site-title-sub').innerText = "菩提客棧";
            document.getElementById('site-desc').innerText = "Global Community · 蓮友清淨交流";
            document.getElementById('nn').placeholder = "Name / 法號 (Optional)";
            document.getElementById('mm').placeholder = "Share your thoughts here... / 在此分享法喜心得...";
            document.getElementById('btn-post-main').innerText = "Post Message";
            document.getElementById('btn-post-sub').innerText = "結緣發布";
            
            // ✨ 英文版的客棧規約 ✨
            document.getElementById('forum-guide-text').innerHTML = "Welcome to the Lotus Forum. Feel free to share, keeping your thoughts pure and positive. To maintain harmony and speed, the system gracefully cycles and retains only the <span class='guide-highlight'>latest 50 posts</span>.<br><br><span style='color:var(--cyan);'>To reply or interact, please enter your name below first.</span>";
        }

        function showAlert(msg) {
            document.getElementById('pure-alert-msg').innerHTML = msg.replace(/\n/g, '<br>');
            const overlay = document.getElementById('pure-alert');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('show'), 10);
        }
        function closeAlert() {
            const overlay = document.getElementById('pure-alert');
            overlay.classList.remove('show');
            setTimeout(() => overlay.style.display = 'none', 300);
        }

        const cfg = {
            apiKey: "AIzaSyCtttGd8yvbcEq17P75cnh52Pxgcc5ak_4",
            authDomain: "pureland-system.firebaseapp.com",
            databaseURL: "https://pureland-system-default-rtdb.firebaseio.com",
            projectId: "pureland-system"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(cfg);
        }
        
        const dbRef = firebase.database();
        const ref = dbRef.ref('posts_clean_v9');
        
        let currentUserUid = "guest_" + Math.random().toString(36).substr(2, 9);
        let isBoardLoaded = false;

        let localDB = null;
        try {
            const dbKey = (lang === 'en') ? 'PX_EN_V15.0' : 'PX_V15.0';
            localDB = JSON.parse(localStorage.getItem(dbKey));
        } catch(e) {
            console.log("未找到本機修行紀錄");
        }

        const userRank = (localDB && localDB.currentRank) ? localDB.currentRank : (lang === 'en' ? 'Wanderer' : '雲遊行者');
        const userNian = (localDB && localDB.totalNian) ? localDB.totalNian : 0;
        const defaultPostName = (lang === 'en') ? 'Practitioner' : '十方善信';
        const defaultReplyName = (lang === 'en') ? 'User' : '行者 / User';

        const savedName = localStorage.getItem('lotus_forum_name');
        if (savedName) {
            document.getElementById('nn').value = savedName;
        }

        firebase.auth().signInAnonymously().catch((error) => console.warn("匿名登入異常:", error));

        firebase.auth().onAuthStateChanged((user) => {
            if (user) currentUserUid = user.uid; 
            if (!isBoardLoaded) { loadBoard(); isBoardLoaded = true; } else { loadBoard(); }
        });

        function parse(str) {
            let s = str.replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m]));
            const yt = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})(?:[^\s]*)/gi;
            s = s.replace(yt, (m, id) => {
                return `<br><div class="yt-btn" onclick="this.nextSibling.style.display='block';this.style.display='none'">[ 啟動影音結界 / Play Video ]</div><div class="yt-player"><iframe width="320" height="180" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe></div>`;
            });
            const img = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi;
            s = s.replace(img, u => `<br><a href="${u}" target="_blank" class="pure-link">[ 點擊觀看圖寶 / View Image ]</a><br>`);
            return s.replace(/\n/g, "<br>");
        }

        function getRankType(rankName) {
            if (!rankName) return '信';
            if (rankName.includes('地') || rankName.includes('Bhumi')) return '地';
            if (rankName.includes('迴') || rankName.includes('Dedication')) return '迴';
            if (rankName.includes('行') || rankName.includes('Practice')) return '行';
            if (rankName.includes('住') || rankName.includes('Abiding')) return '住';
            return '信';
        }

        function getLotusSVG(rankType, nianCount = 0) {
            const gold = "#f3e5ab"; const darkGold = "#d4af37";
            
            let defs = `<defs>
                <radialGradient id="pureGold" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
                    <stop offset="30%" stop-color="${gold}" stop-opacity="1"/>
                    <stop offset="100%" stop-color="${darkGold}" stop-opacity="1"/>
                </radialGradient>
                <linearGradient id="metalGold" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#ffeba8"/>
                    <stop offset="50%" stop-color="#d4af37"/>
                    <stop offset="100%" stop-color="#8a6d1c"/>
                </linearGradient>
                <radialGradient id="darkHole" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#000" stop-opacity="0.9"/>
                    <stop offset="65%" stop-color="#0a0a0a" stop-opacity="0.7"/>
                    <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
                </radialGradient>
                <filter id="holyGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="2.5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>`;

            let bgContent = `<circle cx="50" cy="50" r="38" fill="url(#darkHole)"/>`;

            switch(rankType) {
                case '信': 
                    bgContent += `<g opacity="0.85"><ellipse cx="50" cy="72" rx="28" ry="8" fill="none" stroke="#8ba89c" stroke-width="1" opacity="0.4"><animate attributeName="rx" values="15;32;15" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0;0.6" dur="4s" repeatCount="indefinite"/></ellipse><ellipse cx="50" cy="72" rx="16" ry="4" fill="none" stroke="url(#pureGold)" stroke-width="1.5" filter="url(#holyGlow)"/><path d="M 32 68 Q 50 85 68 68" fill="none" stroke="url(#metalGold)" stroke-width="2" opacity="0.8" filter="url(#holyGlow)"/><circle cx="50" cy="72" r="1.5" fill="#fff"/></g>`; 
                    break;
                case '住': 
                    bgContent += `<g fill="url(#metalGold)" opacity="0.85"><polygon points="32,72 68,72 73,78 27,78" /><polygon points="36,68 64,68 68,72 32,72" opacity="0.7"/><rect x="27" y="78" width="46" height="2" fill="#fff" opacity="0.5"/></g>`; 
                    break;
                case '行': 
                    bgContent += `<g stroke="#e0e0e0" opacity="0.7"><circle cx="50" cy="50" r="30" fill="none" stroke-width="1" stroke-dasharray="2 4"/><circle cx="50" cy="50" r="26" fill="none" stroke-width="0.5"/><g stroke-width="1.2">${[...Array(12)].map((_,i) => `<line x1="50" y1="50" x2="50" y2="20" transform="rotate(${i*30} 50 50)"/>`).join('')}</g><animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="30s" repeatCount="indefinite"/></g>`; 
                    break;
                case '迴': 
                    bgContent += `<g stroke="#e6a8d7" fill="none" opacity="0.7"><g stroke-width="1"><rect x="26" y="26" width="48" height="48" transform="rotate(0 50 50)"/><rect x="26" y="26" width="48" height="48" transform="rotate(45 50 50)"/></g><circle cx="50" cy="50" r="34" stroke-width="0.5" stroke-dasharray="3 3"/><animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="40s" repeatCount="indefinite"/></g>`; 
                    break;
                case '地': 
                    bgContent += `<g opacity="0.8"><circle cx="50" cy="50" r="38" fill="none" stroke="url(#pureGold)" stroke-width="0.5" stroke-dasharray="1 5"/>${[...Array(16)].map((_,i) => `<path d="M50 50 Q 68 22 50 12 Q 32 22 50 50" fill="none" stroke="#a8e6cf" stroke-width="0.5" opacity="0.6" transform="rotate(${i*22.5} 50 50)"/>`).join('')}<circle cx="50" cy="50" r="42" fill="none" stroke="#ff8b94" stroke-width="0.3"/><animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="60s" repeatCount="indefinite"/></g><circle cx="50" cy="50" r="1.5" fill="#fff" filter="url(#holyGlow)"><animate attributeName="r" values="1.5;3;1.5" dur="3s" repeatCount="indefinite"/></circle>`; 
                    break;
            }

            let lotusContent = "";
            if (nianCount < 1000) { 
                lotusContent = `<g><circle cx="50" cy="55" r="15" fill="url(#pureGold)" opacity="0.15" filter="url(#holyGlow)"><animate attributeName="r" values="12;18;12" dur="3s" repeatCount="indefinite"/></circle><g filter="url(#holyGlow)"><path d="M50 25 C 65 50, 58 70, 50 72 C 42 70, 35 50, 50 25" fill="url(#metalGold)"/><path d="M50 25 C 55 50, 53 70, 50 72 C 47 70, 45 50, 50 25" fill="url(#pureGold)"/><animateTransform attributeName="transform" type="scale" values="1;1.02;1" dur="3s" repeatCount="indefinite" transform-origin="50 55"/></g></g>`; 
            } 
            else if (nianCount < 10000) { 
                lotusContent = `<g filter="url(#holyGlow)"><path d="M50 68 C 75 50, 75 35, 70 30 C 60 45, 55 60, 50 68" fill="url(#metalGold)"/><path d="M50 68 C 25 50, 25 35, 30 30 C 40 45, 45 60, 50 68" fill="url(#metalGold)"/><path d="M50 28 C 65 48, 58 68, 50 72 C 42 68, 35 48, 50 28" fill="url(#pureGold)"/></g>`; 
            } 
            else if (nianCount < 100000) { 
                lotusContent = `<g filter="url(#holyGlow)" transform="translate(0, -2)"><path d="M50 70 C 80 55, 85 40, 75 35 C 65 50, 55 60, 50 70" fill="url(#metalGold)"/><path d="M50 70 C 20 55, 15 40, 25 35 C 35 50, 45 60, 50 70" fill="url(#metalGold)"/><path d="M50 70 C 65 45, 65 30, 60 25 C 55 45, 52 60, 50 70" fill="url(#pureGold)"/><path d="M50 70 C 35 45, 35 30, 40 25 C 45 45, 48 60, 50 70" fill="url(#pureGold)"/><path d="M50 20 C 62 40, 56 65, 50 72 C 44 65, 38 40, 50 20" fill="#fff"/></g>`; 
            } 
            else { 
                lotusContent = `<g filter="url(#holyGlow)" transform="translate(0, -4)"><path d="M50 75 C 90 65, 95 45, 85 40 C 75 55, 60 65, 50 75" fill="url(#metalGold)"/><path d="M50 75 C 10 65, 5 45, 15 40 C 25 55, 40 65, 50 75" fill="url(#metalGold)"/><path d="M50 73 C 80 50, 80 30, 70 25 C 60 45, 55 60, 50 73" fill="url(#pureGold)"/><path d="M50 73 C 20 50, 20 30, 30 25 C 40 45, 45 60, 50 73" fill="url(#pureGold)"/><path d="M50 72 C 65 40, 65 20, 58 15 C 54 35, 52 55, 50 72" fill="#fff"/><path d="M50 72 C 35 40, 35 20, 42 15 C 46 35, 48 55, 50 72" fill="#fff"/><path d="M50 12 C 60 35, 55 60, 50 70 C 45 60, 40 35, 50 12" fill="url(#pureGold)"/><circle cx="50" cy="55" r="4" fill="#fff" filter="drop-shadow(0 0 5px #fff)"><animate attributeName="r" values="3.5;4.5;3.5" dur="2s" repeatCount="indefinite"/></circle></g>`; 
            }
            return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${defs}${bgContent}${lotusContent}</svg>`;
        }

        function getFormattedIcon(rankName, nianCount) {
            if (!rankName) return '';
            let rawSvg = getLotusSVG(getRankType(rankName), nianCount);
            return rawSvg.replace('<svg ', '<svg width="20" height="20" style="margin-right:6px; filter: drop-shadow(0 0 3px rgba(212,175,55,0.4));" ');
        }

        document.getElementById('post-btn').onclick = () => {
            const m = document.getElementById('mm').value.trim();
            const rawName = document.getElementById('nn').value.trim();
            const n = rawName || defaultPostName;
            
            const alertMsg = (lang === 'en') ? "Please enter text!" : "請先填寫心得內容喔！\nPlease enter text!";
            if(!m) return showAlert(alertMsg);
            
            const btn = document.getElementById('post-btn');
            const originalBtnHTML = btn.innerHTML;
            btn.disabled = true;
            
            const loadingText = (lang === 'en') ? "Sending..." : "傳送中...";
            btn.innerHTML = `<span style="font-size: 1.05rem; letter-spacing: 4px; font-weight: bold;">${loadingText}</span>`;
            
            ref.push({ 
                n: n, 
                m: m, 
                t: Date.now(), 
                uid: currentUserUid,
                rank: userRank,
                nian: userNian
            }).then(() => {
                document.getElementById('mm').value = "";
                if (rawName) localStorage.setItem('lotus_forum_name', rawName);
            }).catch(err => {
                const failMsg = (lang === 'en') ? "Failed! Check your network." : "發佈失敗！可能是網路不穩";
                showAlert(failMsg + "\n(Error: " + err.message + ")");
            }).finally(() => {
                btn.disabled = false;
                btn.innerHTML = originalBtnHTML;
            });
        };

        function loadBoard() {
            ref.limitToLast(50).on('value', snap => {
                const b = document.getElementById('board'); b.innerHTML = "";
                const data = snap.val(); if(!data) return;
                
                Object.keys(data).reverse().forEach(id => {
                    const item = data[id];
                    let rs = "";
                    if(item.rs) {
                        Object.values(item.rs).forEach(r => {
                            let sym = "";
                            // ✨ 新增：零版權純代碼的禪意互動圖騰 ✨
                            if(r.ty === 'gassho') { 
                                sym = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><path d="M12 3 C12 3, 7 9, 7 15 C7 18, 9 21, 12 21 C15 21, 17 18, 17 15 C17 9, 12 3, 12 3 Z" fill="rgba(212,175,55,0.1)"/><path d="M12 21 L12 10" stroke-opacity="0.4"/></svg>`; 
                            }
                            if(r.ty === 'praise') { 
                                sym = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><path d="M12 2 L14.5 9.5 L22 12 L14.5 14.5 L12 22 L9.5 14.5 L2 12 L9.5 9.5 Z" fill="rgba(212,175,55,0.15)"/><circle cx="12" cy="12" r="2.5" fill="var(--gold)"/></svg>`; 
                            }
                            if(r.ty === 'flower') { 
                                sym = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="1.5"><path d="M12 22 C12 22, 5 15, 5 10 C5 6, 12 2, 12 2 C12 2, 19 6, 19 10 C19 15, 12 22, 12 22 Z" fill="rgba(139,168,156,0.1)"/><path d="M12 22 C12 22, 9 16, 9 11 C9 8, 12 4, 12 4 C12 4, 15 8, 15 11 C15 16, 12 22, 12 22 Z" fill="rgba(139,168,156,0.2)"/></svg>`; 
                            }
                            if(r.ty === 'chant')  { 
                                sym = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><circle cx="12" cy="10" r="7.5" stroke-dasharray="3 3" opacity="0.7"/><circle cx="12" cy="20" r="2.5" fill="var(--gold)"/><path d="M12 17.5 L12 18.5" opacity="0.5"/></svg>`; 
                            }
                            
                            const replyIcon = getFormattedIcon(r.rank, r.nian || 0);
                            const replyRankDisplay = r.rank ? `<span style="display:flex; align-items:center; color:var(--cyan); font-size:0.75rem; margin-left:8px; opacity:0.9;">${replyIcon}[ ${r.rank} · ${r.nian || 0} ]</span>` : '';
                            
                            rs += `<div class="reply-item">
                                    <span style="display:flex; align-items:center; justify-content:center; margin-top:2px;">${sym}</span>
                                    <div>
                                        <div style="display:flex; align-items:center; flex-wrap:wrap;">
                                            <span style="color:var(--gold); font-size:0.85rem; font-weight:bold;">${r.u}</span>
                                            ${replyRankDisplay}
                                        </div>
                                        <span style="color:#ddd;">${r.m}</span>
                                    </div>
                                   </div>`;
                        });
                    }

                    let deleteBtnHTML = "";
                    if (currentUserUid && item.uid === currentUserUid && !currentUserUid.startsWith('guest_')) {
                        const delText = (lang === 'en') ? "Del" : "刪除 / Del";
                        deleteBtnHTML = `<button class="btn-delete" onclick="delPost('${id}')">${delText}</button>`;
                    }

                    const mainIcon = getFormattedIcon(item.rank, item.nian || 0);
                    const rankDisplay = item.rank ? `<span style="display:flex; align-items:center; color:var(--cyan); font-size:0.75rem; margin-left:8px; opacity:0.9;">${mainIcon}[ ${item.rank} · ${item.nian || 0} ]</span>` : '';

                    const card = document.createElement('div');
                    card.className = 'post-card';
                    
                    const replyPlaceholder = (lang === 'en') ? "Write a reply..." : "寫下您的共鳴或祝福... / Reply...";
                    const gasshoText = (lang === 'en') ? "Gassho" : "合十";
                    const praiseText = (lang === 'en') ? "Praise" : "讚歎";
                    const flowerText = (lang === 'en') ? "Offer" : "供花";
                    const chantText = (lang === 'en') ? "Chant" : "念佛";

                    // ✨ 新增：按鈕區也換上禪意法器 SVG ✨
                    card.innerHTML = `
                        <div class="post-header">
                            <div style="display:flex; align-items:center; flex-wrap:wrap;">
                                <span style="font-weight:bold;">[ ${item.n} ]</span>
                                ${rankDisplay}
                                ${deleteBtnHTML}
                            </div>
                            <span>${new Date(item.t).toLocaleString()}</span>
                        </div>
                        <div class="post-body">${parse(item.m)}</div>
                        <div class="re-list">${rs}</div>
                        
                        <div class="action-wrap">
                            <input type="text" id="i-${id}" class="reply-input" placeholder="${replyPlaceholder}">
                            
                            <div class="reaction-grid">
                                <button class="btn-act" onclick="re('${id}','gassho')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><path d="M12 3 C12 3, 7 9, 7 15 C7 18, 9 21, 12 21 C15 21, 17 18, 17 15 C17 9, 12 3, 12 3 Z" fill="rgba(212,175,55,0.05)"/><path d="M12 21 L12 10" stroke-opacity="0.4"/></svg>
                                    <span class="act-zh">${gasshoText}</span>
                                </button>
                                <button class="btn-act" onclick="re('${id}','praise')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><path d="M12 2 L14.5 9.5 L22 12 L14.5 14.5 L12 22 L9.5 14.5 L2 12 L9.5 9.5 Z" fill="rgba(212,175,55,0.05)"/><circle cx="12" cy="12" r="2.5" fill="var(--gold)"/></svg>
                                    <span class="act-zh">${praiseText}</span>
                                </button>
                                <button class="btn-act" onclick="re('${id}','flower')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="1.5"><path d="M12 22 C12 22, 5 15, 5 10 C5 6, 12 2, 12 2 C12 2, 19 6, 19 10 C19 15, 12 22, 12 22 Z" fill="rgba(139,168,156,0.05)"/><path d="M12 22 C12 22, 9 16, 9 11 C9 8, 12 4, 12 4 C12 4, 15 8, 15 11 C15 16, 12 22, 12 22 Z" fill="rgba(139,168,156,0.15)"/></svg>
                                    <span class="act-zh">${flowerText}</span>
                                </button>
                                <button class="btn-act" onclick="re('${id}','chant')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><circle cx="12" cy="10" r="7.5" stroke-dasharray="3 3" opacity="0.7"/><circle cx="12" cy="20" r="2.5" fill="var(--gold)"/><path d="M12 17.5 L12 18.5" opacity="0.5"/></svg>
                                    <span class="act-zh">${chantText}</span>
                                </button>
                            </div>
                        </div>
                    `;
                    b.appendChild(card);
                });
            });
        }

        window.re = (id, ty) => {
            const inputField = document.getElementById(`i-${id}`);
            const m = inputField.value.trim();
            const alertMsg = (lang === 'en') ? "Please enter text!" : "請先寫下您的共鳴喔！\nPlease enter text!";
            if(!m) return showAlert(alertMsg);
            
            const rawName = document.getElementById('nn').value.trim();
            const n = rawName || defaultReplyName; 
            
            inputField.disabled = true;

            ref.child(id).child('rs').push({ 
                u: n, 
                m: m, 
                ty: ty,
                rank: userRank,
                nian: userNian
            }).then(() => {
                inputField.value = ""; 
                if (rawName) localStorage.setItem('lotus_forum_name', rawName); 
            }).catch(err => {
                const failMsg = (lang === 'en') ? "Failed! Check your network." : "互動失敗！可能是網路不穩";
                showAlert(failMsg + "\n(Error: " + err.message + ")");
            }).finally(() => {
                inputField.disabled = false;
            });
        };

        window.delPost = (id) => {
            const confirmMsg = (lang === 'en') ? "Are you sure you want to delete this post?" : "確定要刪除這篇結緣留言嗎？ / Are you sure you want to delete this post?";
            if(confirm(confirmMsg)) {
                ref.child(id).remove().catch(err => {
                    const failMsg = (lang === 'en') ? "Failed to delete!" : "刪除失敗！權限不足或連線異常。";
                    showAlert(failMsg + "\n(Error: " + err.message + ")");
                });
            }
        };
    </script>
</body>
</html>
