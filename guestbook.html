<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>妙依園地 ． 數位道場 V4</title>
    <style>
        :root {
            --bg-deep: #020205; 
            --bg-card: rgba(15, 20, 25, 0.92);
            --gold-p: #d4af37; 
            --gold-l: #f3e5ab; 
            --cyan-a: #78909c;
            --ptt-push: #ff4444; 
            --ptt-arrow: #ffff55;
            --border-glass: rgba(212, 175, 55, 0.2);
            --text-main: #e0e0e0;
        }

        body {
            margin: 0; background: var(--bg-deep); color: var(--text-main);
            font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", serif;
            overflow-x: hidden; line-height: 1.8;
        }

        /* 🌟 純向量動態背景：幾何曼陀羅 */
        #zen-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 1000px; height: 1000px; z-index: -1; opacity: 0.12;
            transition: transform 0.1s linear; pointer-events: none;
        }

        .main-container { max-width: 800px; margin: 0 auto; padding: 60px 20px; }

        /* 頁頭美學 */
        .header-box { text-align: center; margin-bottom: 70px; position: relative; }
        .lotus-icon { width: 60px; height: 60px; fill: var(--gold-p); filter: drop-shadow(0 0 12px var(--gold-p)); margin-bottom: 20px; }
        .page-title { font-size: 2.4rem; letter-spacing: 12px; color: var(--gold-p); font-weight: 300; margin: 0; }
        .live-status { display: inline-block; margin-top: 15px; padding: 4px 15px; border: 1px solid var(--cyan-a); color: var(--cyan-a); font-size: 0.8rem; border-radius: 30px; letter-spacing: 2px; }

        /* 交互面板 (留言區) */
        .interaction-card {
            background: var(--bg-card); border: 1px solid var(--border-glass);
            padding: 35px; border-radius: 4px; margin-bottom: 60px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        .custom-input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #333;
            color: var(--gold-l); padding: 14px; margin-bottom: 20px;
            box-sizing: border-box; outline: none; font-size: 1.05rem; transition: 0.3s;
        }
        .custom-input:focus { border-color: var(--gold-p); box-shadow: 0 0 15px rgba(212,175,55,0.15); }

        /* 美麗按鈕介面 */
        .btn-zen {
            background: transparent; border: 1px solid var(--gold-p); color: var(--gold-p);
            padding: 12px 30px; cursor: pointer; transition: 0.4s;
            display: inline-flex; align-items: center; gap: 10px; font-size: 0.95rem; letter-spacing: 2px;
        }
        .btn-zen:hover { background: var(--gold-p); color: #000; box-shadow: 0 0 20px var(--gold-p); }
        .btn-zen svg { width: 18px; height: 18px; fill: currentColor; }

        /* 留言卡片設計 */
        .post-entry {
            background: var(--bg-card); border-left: 4px solid var(--gold-p);
            margin-bottom: 40px; border-radius: 0 8px 8px 0; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .post-meta {
            background: rgba(255,255,255,0.03); padding: 15px 25px;
            display: flex; justify-content: space-between; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .author-name { color: var(--gold-p); font-weight: bold; }
        .post-body { padding: 30px 25px; font-size: 1.15rem; word-wrap: break-word; }

        /* 🌟 自動解析圖片樣式 */
        .auto-image {
            max-width: 100%; border-radius: 6px; margin: 15px 0;
            border: 1px solid var(--border-glass); display: block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        /* 站長模式區塊 */
        .admin-box {
            display: none; padding: 12px 25px; background: rgba(255,0,0,0.05);
            gap: 15px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .admin-reply-content {
            margin: 10px 25px 25px; padding: 20px; background: rgba(212,175,55,0.06);
            border-left: 2px solid var(--gold-p); font-size: 1rem; color: var(--gold-l);
        }

        /* PTT 回應區 */
        .ptt-replies { background: rgba(0,0,0,0.25); padding: 15px 25px; border-top: 1px solid rgba(255,255,255,0.05); }
        .reply-row { font-family: monospace; font-size: 0.95rem; margin-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.02); padding-bottom: 4px; }
        .t-push { color: var(--ptt-push); font-weight: bold; margin-right: 10px; }
        .t-arrow { color: var(--ptt-arrow); font-weight: bold; margin-right: 10px; }

        /* 隱藏觸發器 */
        .secret-trigger { position: fixed; bottom: 15px; right: 15px; opacity: 0.03; cursor: pointer; font-size: 0.7rem; }
        .secret-trigger:hover { opacity: 0.8; color: var(--gold-p); }
    </style>
</head>
<body>

    <svg id="zen-bg" viewBox="0 0 100 100">
        <defs>
            <linearGradient id="zenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:var(--gold-p);stop-opacity:0.6" />
                <stop offset="100%" style="stop-color:var(--cyan-a);stop-opacity:0.1" />
            </linearGradient>
        </defs>
        <g stroke="url(#zenGrad)" fill="none" stroke-width="0.15">
            <script>
                const g = document.currentScript.parentElement;
                for(let i=0; i<36; i++) {
                    g.innerHTML += `<ellipse cx="50" cy="50" rx="46" ry="14" transform="rotate(${i*10} 50 50)" />`;
                }
            </script>
        </g>
    </svg>

    <div class="main-container">
        <header class="header-box">
            <svg class="lotus-icon" viewBox="0 0 24 24">
                <path d="M12,2C12,2 9,7 9,11C9,15 12,19 12,19C12,19 15,15 15,11C15,7 12,2 12,2Z"/>
                <path d="M12,5C12,5 6,8 6,13C6,18 12,22 12,22C12,22 18,18 18,13C18,8 12,5 12,5Z" opacity="0.4"/>
            </svg>
            <h1 class="page-title">妙依論壇</h1>
            <div class="live-status">同行行者：<span id="online-count">1</span> 人 ． 共修中</div>
        </header>

        <div class="interaction-card">
            <input type="text" id="user-id" class="custom-input" placeholder="法號 (預設：匿名行者)">
            <textarea id="user-msg" class="custom-input" rows="5" placeholder="分享法喜心得... (直接貼上圖片網址可自動解析顯示)"></textarea>
            <div style="text-align: right;">
                <button class="btn-zen" id="post-btn">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    發布心得
                </button>
            </div>
        </div>

        <div id="board-feed"></div>
    </div>

    <div class="secret-trigger" onclick="openAdmin()">ADMIN</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // === 1. 初始化 Firebase ===
        const firebaseConfig = {
            apiKey: "AIzaSyCtttGd8yvbcEq17P75cnh52Pxgcc5ak_4",
            authDomain: "pureland-system.firebaseapp.com",
            databaseURL: "https://pureland-system-default-rtdb.firebaseio.com",
            projectId: "pureland-system"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const mainRef = database.ref('forum_v4_master');
        const presenceRef = database.ref('online_presence');

        let isSiteAdmin = false;

        // === 2. 動態背景旋轉 ===
        window.onscroll = () => {
            const scrollRot = window.pageYOffset / 12;
            document.getElementById('zen-bg').style.transform = `translate(-50%, -50%) rotate(${scrollRot}deg)`;
        };

        // === 3. 核心功能：內容解析 (含圖片自動顯示) ===
        function renderText(rawText) {
            // 安全過濾
            let safe = rawText.replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m]));
            // 圖片網址偵測 (jpg, png, gif, webp)
            const imgUrlRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi;
            safe = safe.replace(imgUrlRegex, (url) => `<img src="${url}" class="auto-image" loading="lazy">`);
            // 換行處理
            return safe.replace(/\n/g, "<br>");
        }

        // === 4. 在線人數監測 (Presence System) ===
        const myPoint = presenceRef.push();
        myPoint.onDisconnect().remove();
        myPoint.set(true);
        presenceRef.on('value', snap => {
            document.getElementById('online-count').innerText = snap.numChildren();
        });

        // === 5. 發布心得邏輯 ===
        document.getElementById('post-btn').onclick = () => {
            const author = document.getElementById('user-id').value.trim() || "匿名行者";
            const content = document.getElementById('user-msg').value.trim();
            if(!content) return alert("請輸入心得內容。");

            mainRef.push({
                name: author,
                msg: content,
                time: Date.now()
            });
            document.getElementById('user-msg').value = "";
        };

        // === 6. 資料渲染與更新 ===
        mainRef.on('value', snap => {
            const feed = document.getElementById('board-feed');
            feed.innerHTML = "";
            const data = snap.val();
            if(!data) return;

            Object.keys(data).reverse().forEach(key => {
                const item = data[key];
                const card = document.createElement('div');
                card.className = 'post-entry';
                
                let repliesHtml = "";
                if(item.replies) {
                    Object.values(item.replies).forEach(r => {
                        const tag = r.type === 'push' ? '推' : '→';
                        const tCls = r.type === 'push' ? 't-push' : 't-arrow';
                        repliesHtml += `<div class="reply-row"><span class="${tCls}">${tag}</span><span style="color:var(--cyan-a)">${r.user}</span>: ${r.text}</div>`;
                    });
                }

                let adminNote = item.adminReply ? `<div class="admin-reply-content"><span style="color:var(--gold-p); font-size:0.8rem; font-weight:bold;">[ 站長慈悲回覆 ]</span><br>${item.adminReply}</div>` : "";

                card.innerHTML = `
                    <div class="post-meta">
                        <span class="author-name">${item.name}</span>
                        <span style="color:rgba(255,255,255,0.4)">${new Date(item.time).toLocaleString()}</span>
                    </div>
                    <div class="post-body">${renderText(item.msg)}</div>
                    ${adminNote}
                    <div class="admin-box" style="display:${isSiteAdmin ? 'flex' : 'none'}">
                        <button class="btn-zen" style="font-size:0.7rem; padding:4px 10px;" onclick="replyAsAdmin('${key}')">官方回覆</button>
                        <button class="btn-zen" style="font-size:0.7rem; padding:4px 10px; border-color:#ff4444; color:#ff4444;" onclick="deleteByAdmin('${key}')">刪除</button>
                    </div>
                    <div class="ptt-replies">
                        ${repliesHtml}
                        <div style="display:flex; gap:10px; margin-top:12px;">
                            <input type="text" id="ipt-${key}" style="flex:1; background:rgba(0,0,0,0.5); border:1px solid #444; color:white; padding:6px;" placeholder="回應...">
                            <button class="btn-zen" style="padding:4px 12px; font-size:0.8rem;" onclick="sendReply('${key}','push')">推</button>
                            <button class="btn-zen" style="padding:4px 12px; font-size:0.8rem;" onclick="sendReply('${key}','arrow')">→次</button>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });
        });

        // === 7. 互動子功能 ===
        window.sendReply = (id, type) => {
            const txt = document.getElementById(`ipt-${id}`).value.trim();
            if(!txt) return;
            mainRef.child(id).child('replies').push({ user: '行者', text: txt, type: type });
        };

        window.openAdmin = () => {
            if(prompt("站長驗證密鑰") === "miaoyi2026") {
                isSiteAdmin = true;
                document.querySelectorAll('.admin-box').forEach(el => el.style.display = 'flex');
                alert("站長管理模式已開啟。");
            }
        };

        window.deleteByAdmin = (id) => { if(confirm("確定要移除這筆留言嗎？")) mainRef.child(id).remove(); };
        window.replyAsAdmin = (id) => {
            const note = prompt("請輸入官方回覆內容：");
            if(note) mainRef.child(id).update({ adminReply: note });
        };
    </script>
</body>
</html>
