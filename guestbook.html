<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>清淨淨土 ． 數位道場</title>
    <style>
        :root {
            --bg: #020205; --card: rgba(18, 22, 28, 0.98);
            --gold: #D4AF37; --gold-br: #FFD700;
            --border: rgba(212, 175, 55, 0.2);
            --text: #E0E0E0; --cyan: #78909c;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: "PingFang TC", "Noto Sans TC", serif;
            overflow-x: hidden; line-height: 1.8; -webkit-tap-highlight-color: transparent;
        }

        /* 🌟 背景：星空與法界結界 */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -2;
        }
        .realm-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 800px; height: 800px; z-index: -1; opacity: 0.12; pointer-events: none;
        }
        .realm-inner { transform-origin: center; animation: rotateRealm 100s linear infinite; }
        @keyframes rotateRealm { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container { max-width: 800px; margin: 0 auto; padding: 60px 20px; position: relative; }

        /* 寶蓮燈 Header */
        .header { text-align: center; margin-bottom: 60px; }
        .lotus-wrapper { display: inline-block; animation: breathe 5s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

        /* 圓潤面版 */
        .interaction-panel {
            background: var(--card); border: 1px solid var(--border);
            padding: 35px; border-radius: 25px; margin-bottom: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .custom-field {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333;
            color: var(--gold-br); padding: 16px; margin-bottom: 20px;
            box-sizing: border-box; outline: none; font-size: 1.05rem; border-radius: 15px;
            transition: 0.3s;
        }
        .custom-field:focus { border-color: var(--gold); }

        .btn-post {
            background: linear-gradient(135deg, #D4AF37 0%, #8A6D3B 100%);
            color: #000; border: none; padding: 12px 45px; border-radius: 50px;
            cursor: pointer; font-weight: bold; font-size: 1rem; letter-spacing: 4px;
        }

        /* 留言卡片 */
        .post-card {
            background: var(--card); border: 1px solid var(--border);
            margin-bottom: 45px; border-radius: 25px; overflow: hidden;
        }
        .post-header {
            background: rgba(212,175,55,0.05); padding: 15px 25px;
            display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--gold);
        }
        .post-body { padding: 30px 25px; font-size: 1.2rem; }

        /* 超連結樣式 */
        .pure-link { color: var(--gold-br); text-decoration: underline; font-size: 0.9rem; cursor: pointer; }

        /* YouTube 小螢幕播放器 */
        .yt-btn {
            display: inline-block; padding: 6px 18px; border: 1px solid var(--cyan); color: var(--cyan);
            border-radius: 20px; font-size: 0.8rem; cursor: pointer; margin: 10px 0; transition: 0.3s;
        }
        .yt-btn:hover { border-color: var(--gold); color: var(--gold); }
        .yt-player { display: none; margin-top: 15px; width: 320px; max-width: 100%; height: 180px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }

        /* 回應區與修長膠囊按鈕 */
        .action-row { display: flex; gap: 12px; padding: 15px 25px; background: rgba(0,0,0,0.2); }
        .btn-act {
            background: rgba(255,255,255,0.03); border: 1px solid #444; color: #AAA;
            padding: 6px 18px; border-radius: 30px; cursor: pointer; font-size: 0.85rem;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-act:hover { border-color: var(--gold); color: var(--gold); }
        .btn-act svg { width: 14px; height: 14px; fill: currentColor; }

        .reply-item { padding: 8px 25px; font-family: monospace; font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,0.02); }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="realm-bg">
        <svg viewBox="0 0 200 200">
            <g class="realm-inner" fill="none" stroke="rgba(212,175,55,0.4)" stroke-width="0.5">
                <circle cx="100" cy="100" r="90" stroke-dasharray="4 8"/>
                <circle cx="100" cy="100" r="70"/>
                <rect x="60" y="60" width="80" height="80" transform="rotate(45 100 100)"/>
                <circle cx="100" cy="100" r="40" stroke-dasharray="2 4"/>
            </g>
        </svg>
    </div>

    <div class="container">
        <header class="header">
            <div class="lotus-wrapper">
                <svg width="180" height="180" viewBox="0 0 100 100">
                    <defs>
                        <radialGradient id="lotusGold" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#FFF8D6"/><stop offset="100%" stop-color="#D4AF37"/>
                        </radialGradient>
                    </defs>
                    <g transform="translate(50,55)">
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(0)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(45)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(90)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(135)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(180)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(225)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(270)"/>
                        <path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="url(#lotusGold)" transform="rotate(315)"/>
                        <path d="M0,0 C-10,-20 -5,-40 0,-45 C5,-40 10,-20 0,0" fill="url(#lotusGold)" opacity="0.6" transform="rotate(22.5) scale(0.8)"/>
                        <path d="M0,0 C-10,-20 -5,-40 0,-45 C5,-40 10,-20 0,0" fill="url(#lotusGold)" opacity="0.6" transform="rotate(67.5) scale(0.8)"/>
                        <path d="M0,0 C-10,-20 -5,-40 0,-45 C5,-40 10,-20 0,0" fill="url(#lotusGold)" opacity="0.6" transform="rotate(112.5) scale(0.8)"/>
                        <path d="M0,0 C-10,-20 -5,-40 0,-45 C5,-40 10,-20 0,0" fill="url(#lotusGold)" opacity="0.6" transform="rotate(157.5) scale(0.8)"/>
                        <path d="M0,0 C-10,-20 -5,-40 0,-45 C5,-40 10,-20 0,0" fill="url(#lotusGold)" opacity="0.6" transform="rotate(202.5) scale(0.8)"/>
                        <path d="M0,0 C-10,-20 -5,-40 0,-45 C5,-40 10,-20 0,0" fill="url(#lotusGold)" opacity="0.6" transform="rotate(247.5) scale(0.8)"/>
                        <path d="M0,0 C-10,-20 -5,-40 0,-45 C5,-40 10,-20 0,0" fill="url(#lotusGold)" opacity="0.6" transform="rotate(292.5) scale(0.8)"/>
                        <path d="M0,0 C-10,-20 -5,-40 0,-45 C5,-40 10,-20 0,0" fill="url(#lotusGold)" opacity="0.6" transform="rotate(337.5) scale(0.8)"/>
                    </g>
                    <circle cx="50" cy="55" r="5" fill="#FFF" filter="blur(2px)"/>
                </svg>
            </div>
            <h1 style="color:var(--gold-br); letter-spacing:10px; font-weight:300; margin-top:15px;">清淨淨土</h1>
        </header>

        <div class="interaction-panel">
            <input type="text" id="nn" class="custom-field" placeholder="法號">
            <textarea id="mm" class="custom-field" rows="5" placeholder="分享法喜心得..."></textarea>
            <div style="text-align: right;"><button class="btn-post" id="post-btn">發布心得</button></div>
        </div>

        <div id="board"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const cfg = {
            apiKey: "AIzaSyCtttGd8yvbcEq17P75cnh52Pxgcc5ak_4",
            authDomain: "pureland-system.firebaseapp.com",
            databaseURL: "https://pureland-system-default-rtdb.firebaseio.com",
            projectId: "pureland-system"
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();
        const ref = db.ref('posts_clean_v9');

        function parse(str) {
            let s = str.replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m]));
            
            // 1. YouTube 解析：轉化為小螢幕播放按鈕
            const yt = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})(?:[^\s]*)/gi;
            s = s.replace(yt, (m, id) => {
                return `<br><div class="yt-btn" onclick="this.nextSibling.style.display='block';this.style.display='none'">[ 啟動影音結界 ]</div><div class="yt-player"><iframe width="320" height="180" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe></div>`;
            });

            // 2. 圖片解析：轉化為純文字連結 (避開版權爭議)
            const img = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi;
            s = s.replace(img, u => `<br><a href="${u}" target="_blank" class="pure-link">[ 點擊觀看圖寶 ]</a><br>`);

            return s.replace(/\n/g, "<br>");
        }

        document.getElementById('post-btn').onclick = () => {
            const m = document.getElementById('mm').value.trim();
            const n = document.getElementById('nn').value.trim() || "十方善信";
            if(!m) return;
            ref.push({ n, m, t: Date.now() });
            document.getElementById('mm').value = "";
            ref.once('value', s => { if(s.numChildren()>200) ref.child(Object.keys(s.val())[0]).remove(); });
        };

        ref.on('value', snap => {
            const b = document.getElementById('board'); b.innerHTML = "";
            const data = snap.val(); if(!data) return;
            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                let rs = "";
                if(item.rs) {
                    Object.values(item.rs).forEach(r => {
                        const sym = r.ty === 'h' ? '❤' : '✿';
                        const col = r.ty === 'h' ? '#ff4444' : '#ffff55';
                        rs += `<div class="reply-item"><span style="color:${col};margin-right:10px;">${sym}</span><span style="color:var(--cyan)">${r.u}</span>: ${r.m}</div>`;
                    });
                }
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header"><span>[ 行者 ] ${item.n}</span><span>${new Date(item.t).toLocaleString()}</span></div>
                    <div class="post-body">${parse(item.m)}</div>
                    <div class="action-row">
                        <input type="text" id="i-${id}" style="background:none; border:none; border-bottom:1px solid #444; color:white; font-size:0.85rem; flex:1;" placeholder="回應...">
                        <button class="btn-act" onclick="re('${id}','h')"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>合十</button>
                        <button class="btn-act" onclick="re('${id}','l')"><svg viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-11.5S12 2 12 2s8 3.5 8 10.5S12 22 12 22z"/></svg>讚嘆</button>
                    </div>
                    <div class="re-list">${rs}</div>
                `;
                b.appendChild(card);
            });
        });

        window.re = (id, ty) => {
            const m = document.getElementById(`i-${id}`).value.trim();
            if(!m) return;
            ref.child(id).child('rs').push({ u: '行者', m, ty });
        };
    </script>
</body>
</html>
