<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>清淨淨土 ． 數位道場</title>
    <style>
        :root {
            --bg: #020205; --card: rgba(18, 22, 28, 0.95);
            --gold: #D4AF37; --gold-br: #FFD700;
            --border: rgba(212, 175, 55, 0.25);
            --text: #E0E0E0; --cyan: #78909c;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: "PingFang TC", "Noto Sans TC", serif;
            overflow-x: hidden; line-height: 1.8; -webkit-tap-highlight-color: transparent;
        }

        /* 🌟 背景：星空與緩動法輪 */
        .stars {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -2;
        }
        .realm-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 800px; height: 800px; z-index: -1; opacity: 0.1; pointer-events: none;
        }
        .realm-rotate { transform-origin: center; animation: rot 80s linear infinite; }
        @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }

        /* 功德榜：無表情符號 */
        .merit-bar {
            text-align: center; padding: 15px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            margin-bottom: 40px; color: var(--gold-br); letter-spacing: 4px; font-size: 1.1rem;
            cursor: pointer; background: rgba(212,175,55,0.03); border-radius: 50px;
        }

        .header { text-align: center; margin-bottom: 50px; }
        .lotus-anim { animation: breathe 4s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1); opacity: 1; } }

        /* 圓潤面板 */
        .panel {
            background: var(--card); border: 1px solid var(--border);
            padding: 30px; border-radius: 25px; margin-bottom: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .input-box {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #333;
            color: var(--gold-br); padding: 15px; margin-bottom: 15px;
            box-sizing: border-box; outline: none; border-radius: 15px; font-size: 1rem;
        }

        .btn-main {
            background: linear-gradient(135deg, #D4AF37 0%, #8A6D3B 100%);
            color: #000; border: none; padding: 12px 40px; border-radius: 50px;
            cursor: pointer; font-weight: bold; letter-spacing: 2px;
        }

        /* 留言卡片 */
        .post {
            background: var(--card); border: 1px solid var(--border);
            margin-bottom: 40px; border-radius: 20px; overflow: hidden;
        }
        .post-head { background: rgba(212,175,55,0.05); padding: 12px 20px; display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--gold); }
        .post-body { padding: 25px; font-size: 1.1rem; }

        /* 琉璃馬賽克照片 */
        .img-mosaic {
            max-width: 100%; border-radius: 12px; margin: 15px 0;
            filter: blur(30px); transition: 0.8s ease; cursor: pointer; border: 1px solid var(--border);
        }
        .img-mosaic.reveal { filter: blur(0); }

        /* YouTube 小播放器 */
        .yt-trigger {
            display: inline-block; padding: 6px 18px; border: 1px solid var(--cyan); color: var(--cyan);
            border-radius: 20px; font-size: 0.8rem; cursor: pointer; margin: 10px 0;
        }
        .yt-container { display: none; margin-top: 15px; width: 320px; max-width: 100%; height: 180px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }

        /* 膠囊回應按鈕 */
        .action-bar { display: flex; gap: 12px; padding: 15px 20px; background: rgba(0,0,0,0.2); }
        .btn-mini {
            background: rgba(255,255,255,0.03); border: 1px solid #444; color: #aaa;
            padding: 6px 15px; border-radius: 30px; cursor: pointer; font-size: 0.8rem;
            display: flex; align-items: center; gap: 6px; transition: 0.3s;
        }
        .btn-mini:hover { border-color: var(--gold); color: var(--gold); }
        .btn-mini svg { width: 14px; height: 14px; fill: currentColor; }

        .reply-list { padding: 5px 20px 15px; font-family: monospace; font-size: 0.9rem; }
        .r-item { margin-top: 5px; border-bottom: 1px solid rgba(255,255,255,0.02); padding-bottom: 5px; }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="realm-bg">
        <svg viewBox="0 0 200 200">
            <g class="realm-rotate" fill="none" stroke="rgba(212,175,55,0.4)" stroke-width="0.5">
                <circle cx="100" cy="100" r="90" stroke-dasharray="4 8"/>
                <rect x="60" y="60" width="80" height="80" transform="rotate(45 100 100)"/>
                <circle cx="100" cy="100" r="40" stroke-dasharray="2 4"/>
            </g>
        </svg>
    </div>

    <div class="container">
        <div class="merit-bar" id="m-btn">全站隨喜讚嘆道場功德：<span id="m-count">0</span> 次</div>

        <header class="header">
            <div class="lotus-anim">
                <svg width="160" height="160" viewBox="0 0 100 100">
                    <defs>
                        <radialGradient id="g" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#FFF8D6"/><stop offset="100%" stop-color="#D4AF37"/>
                        </radialGradient>
                    </defs>
                    <g transform="translate(50,50)">
                        <script>
                            const g = document.currentScript.parentElement;
                            for(let i=0; i<12; i++) {
                                g.innerHTML += `<path d="M0,0 C-10,-20 -5,-40 0,-50 C5,-40 10,-20 0,0" fill="url(#g)" opacity="0.7" transform="rotate(${i*30}) scale(0.9)"/>`;
                                g.innerHTML += `<path d="M0,0 C-8,-15 -4,-30 0,-35 C4,-30 8,-15 0,0" fill="#FFD700" transform="rotate(${i*30 + 15}) scale(0.6)"/>`;
                            }
                        </script>
                        <circle r="6" fill="#FFF" filter="blur(2px)"/>
                    </g>
                </svg>
            </div>
            <h1 style="color:var(--gold-br); letter-spacing:8px; font-weight:300; margin-top:10px;">清淨淨土</h1>
        </header>

        <div class="panel">
            <input type="text" id="nn" class="input-box" placeholder="法號 (如：行者某某)">
            <textarea id="mm" class="input-box" rows="4" placeholder="在此分享您的法喜與心得..."></textarea>
            <div style="text-align: right;"><button class="btn-main" id="post-btn">發布心得</button></div>
        </div>

        <div id="board"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const cfg = {
            apiKey: "AIzaSyCtttGd8yvbcEq17P75cnh52Pxgcc5ak_4",
            authDomain: "pureland-system.firebaseapp.com",
            databaseURL: "https://pureland-system-default-rtdb.firebaseio.com",
            projectId: "pureland-system"
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();
        const postsRef = db.ref('posts_v7');
        const meritRef = db.ref('global_merit');

        // 功德榜
        meritRef.on('value', s => document.getElementById('m-count').innerText = s.val() || 0);
        document.getElementById('m-btn').onclick = () => meritRef.transaction(c => (c || 0) + 1);

        // 智慧解析：照片馬賽克 + YouTube 摺疊
        function parse(str) {
            let safe = str.replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m]));
            
            // 解析照片
            const imgRex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi;
            safe = safe.replace(imgRex, u => `<img src="${u}" class="img-mosaic" onclick="this.classList.toggle('reveal')" title="點擊觀照真相">`);

            // 解析 YouTube (摺疊式)
            const ytRex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})[^\s]*/gi;
            safe = safe.replace(ytRex, (m, id) => {
                return `<br><div class="yt-trigger" onclick="this.nextSibling.style.display='block';this.style.display='none'">[ 啟動影音結界 ]</div><div class="yt-container"><iframe width="320" height="180" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe></div>`;
            });

            return safe.replace(/\n/g, "<br>");
        }

        // 發布
        document.getElementById('post-btn').onclick = () => {
            const n = document.getElementById('nn').value.trim() || "十方善信";
            const m = document.getElementById('mm').value.trim();
            if(!m) return;
            postsRef.push({ name: n, body: m, time: Date.now() });
            document.getElementById('mm').value = "";
            // 自動清理過舊留言 (保持 200 條)
            postsRef.once('value', s => { if(s.numChildren() > 200) postsRef.child(Object.keys(s.val())[0]).remove(); });
        };

        // 渲染
        postsRef.on('value', snap => {
            const board = document.getElementById('board');
            board.innerHTML = "";
            const data = snap.val();
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                let reps = "";
                if(item.reps) {
                    Object.values(item.reps).forEach(r => {
                        const sym = r.t === 'h' ? '❤' : '✿';
                        const col = r.t === 'h' ? '#ff4444' : '#ffff55';
                        reps += `<div class="r-item"><span style="color:${col};margin-right:8px;">${sym}</span><span style="color:var(--cyan)">${r.u}</span>: ${r.m}</div>`;
                    });
                }

                const card = document.createElement('div');
                card.className = 'post';
                card.innerHTML = `
                    <div class="post-head"><span>[ 行者 ] ${item.name}</span><span>${new Date(item.time).toLocaleString()}</span></div>
                    <div class="post-body">${parse(item.body)}</div>
                    <div class="action-bar">
                        <input type="text" id="i-${id}" style="background:none; border:none; border-bottom:1px solid #444; color:white; font-size:0.8rem; flex:1;" placeholder="回應...">
                        <button class="btn-mini" onclick="re('${id}','h')"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>合十</button>
                        <button class="btn-mini" onclick="re('${id}','l')"><svg viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-11.5S12 2 12 2s8 3.5 8 10.5S12 22 12 22z"/></svg>讚嘆</button>
                    </div>
                    <div class="reply-list">${reps}</div>
                `;
                board.appendChild(card);
            });
        });

        window.re = (id, t) => {
            const m = document.getElementById(`i-${id}`).value.trim();
            if(!m) return;
            postsRef.child(id).child('reps').push({ u: '行者', m: m, t: t });
        };
    </script>
</body>
</html>
