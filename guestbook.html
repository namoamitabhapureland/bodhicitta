<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>清淨淨土 ． 數位道場</title>
    <style>
        :root {
            --bg: #030307; --card: rgba(15, 18, 22, 0.96);
            --gold: #d4af37; --gold-l: #f3e5ab; --cyan: #607d8b;
            --heart: #ff4444; --lotus: #ffff55; --border: rgba(212, 175, 55, 0.18);
        }
        body {
            margin: 0; background: var(--bg); color: #e0e0e0;
            font-family: "PingFang TC", "Noto Sans TC", serif;
            overflow-x: hidden; line-height: 1.8; -webkit-tap-highlight-color: transparent;
        }

        /* 旋轉法輪背景 */
        #dharma-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 900px; height: 900px; z-index: -1; opacity: 0.06;
            pointer-events: none; transition: transform 0.2s linear;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }

        /* 全站功德榜 */
        .global-stats {
            text-align: center; padding: 10px; background: rgba(212, 175, 55, 0.05);
            border: 1px solid var(--border); border-radius: 50px; margin-bottom: 40px;
            font-size: 0.9rem; color: var(--gold-l); letter-spacing: 2px;
        }

        .header { text-align: center; margin-bottom: 50px; }
        .lotus-icon { width: 90px; height: 90px; fill: var(--gold); filter: drop-shadow(0 0 15px var(--gold)); margin-bottom: 15px; }

        /* 輸入區 */
        .input-panel {
            background: var(--card); border: 1px solid var(--border);
            padding: 30px; border-radius: 8px; margin-bottom: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .field {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #333;
            color: var(--gold-l); padding: 12px; margin-bottom: 15px;
            box-sizing: border-box; outline: none; font-size: 1rem; border-radius: 4px;
        }
        .field:focus { border-color: var(--gold); }

        .btn-post {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 30px; cursor: pointer; transition: 0.4s;
            display: inline-flex; align-items: center; gap: 8px; font-size: 1rem;
        }
        .btn-post:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }

        /* 留言卡片 */
        .post-card {
            background: var(--card); border-left: 3px solid var(--gold);
            margin-bottom: 45px; border-radius: 0 8px 8px 0; overflow: hidden;
        }
        .post-header {
            background: rgba(255,255,255,0.03); padding: 15px 20px;
            display: flex; justify-content: space-between; font-size: 0.85rem;
        }
        .tag-user { color: var(--gold); font-weight: bold; padding: 2px 8px; border: 1px solid var(--border); border-radius: 4px; }
        .post-body { padding: 30px 20px; font-size: 1.15rem; word-break: break-all; }

        /* 琉璃霧化圖片 */
        .mosaic-img {
            max-width: 100%; border-radius: 8px; margin: 15px 0;
            filter: blur(30px); cursor: pointer; transition: 0.8s;
            border: 1px solid var(--border);
        }
        .mosaic-img.reveal { filter: blur(0); }

        /* YouTube 小播放器 */
        .yt-btn {
            background: rgba(255,255,255,0.05); color: var(--cyan); border: 1px solid var(--cyan);
            padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; margin: 10px 0;
        }
        .yt-frame { display: none; margin-top: 15px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; width: 320px; max-width: 100%; height: 180px; }

        /* PTT 互動區 */
        .reply-area { background: rgba(0,0,0,0.3); padding: 15px 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .reply-item { font-family: monospace; font-size: 0.95rem; margin-bottom: 6px; display: flex; align-items: flex-start; }
        .r-tag { font-weight: bold; margin-right: 12px; min-width: 20px; }
        .r-push { color: var(--heart); }
        .r-arrow { color: var(--lotus); }

        /* 向量互動按鈕 */
        .action-row { display: flex; gap: 15px; margin-top: 15px; }
        .btn-act {
            background: transparent; border: 1px solid #444; color: #999;
            padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-act svg { width: 14px; height: 14px; fill: currentColor; }
        .btn-act:hover { border-color: var(--gold); color: var(--gold); }

        /* 管理 */
        .admin-zone { display: none; padding: 10px 20px; background: rgba(255,0,0,0.05); gap: 10px; }
        .trigger { position: fixed; bottom: 10px; right: 10px; opacity: 0.02; cursor: pointer; font-size: 9px; }
    </style>
</head>
<body>

    <svg id="dharma-bg" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" stroke="currentColor" fill="none" stroke-width="1" />
        <circle cx="50" cy="50" r="10" stroke="currentColor" fill="none" stroke-width="1" />
        <g stroke="currentColor" stroke-width="1">
            <line x1="50" y1="4" x2="50" y2="40" /> <line x1="50" y1="60" x2="50" y2="96" />
            <line x1="4" y1="50" x2="40" y2="50" /> <line x1="60" y1="50" x2="96" y2="50" />
            <line x1="17" y1="17" x2="43" y2="43" /> <line x1="57" y1="57" x2="83" y2="83" />
            <line x1="83" y1="17" x2="57" y2="43" /> <line x1="43" y1="57" x2="17" y2="83" />
        </g>
    </svg>

    <div class="container">
        <div class="global-stats">
            🙏 全站隨喜讚嘆道場功德：<span id="g-count">0</span> 次
        </div>

        <header class="header">
            <svg class="lotus-icon" viewBox="0 0 24 24">
                <path d="M12 22s-8-4.5-8-11.5S12 2 12 2s8 3.5 8 10.5S12 22 12 22z" opacity="0.3"/>
                <path d="M12 22s-5-3-5-8.5S12 4 12 4s5 3 5 9.5S12 22 12 22z" opacity="0.6"/>
                <path d="M12 22c0 0-2-2-2-6s2-8 2-8 2 4 2 8-2 6-2 6z"/>
            </svg>
            <h1 style="color:var(--gold); letter-spacing:10px; font-weight:300;">清淨淨土</h1>
            <div style="color:var(--cyan); font-size:0.8rem; margin-top:10px;">線上共修：<span id="live">0</span> 人</div>
        </header>

        <div class="input-panel">
            <input type="text" id="nn" class="field" placeholder="法號 (如：行者某某)">
            <textarea id="mm" class="field" rows="4" placeholder="分享法喜心得..."></textarea>
            <div style="text-align: right;">
                <button class="btn-post" id="post-btn">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg> 發布心得
                </button>
            </div>
        </div>

        <div id="board"></div>
    </div>

    <div class="trigger" onclick="auth()">ADMIN</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const config = {
            apiKey: "AIzaSyCtttGd8yvbcEq17P75cnh52Pxgcc5ak_4",
            authDomain: "pureland-system.firebaseapp.com",
            databaseURL: "https://pureland-system-default-rtdb.firebaseio.com",
            projectId: "pureland-system"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const postsRef = db.ref('pure_board_v5');
        const globalRef = db.ref('global_merit');
        const presenceRef = db.ref('online');

        let isAdm = false;

        // 背景旋轉
        window.onscroll = () => document.getElementById('dharma-bg').style.transform = `translate(-50%, -50%) rotate(${window.pageYOffset/10}deg)`;

        // 全站計數
        globalRef.on('value', s => document.getElementById('g-count').innerText = s.val() || 0);
        document.querySelector('.global-stats').onclick = () => {
            globalRef.transaction(c => (c || 0) + 1);
        };

        // 人數監測
        const p = presenceRef.push(); p.onDisconnect().remove(); p.set(true);
        presenceRef.on('value', s => document.getElementById('live').innerText = s.numChildren());

        // 解析邏輯
        function parse(str) {
            let safe = str.replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m]));
            
            // YouTube (修正 si 尾碼)
            const yt = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})(?:[^\s]*)/gi;
            safe = safe.replace(yt, (m, id) => {
                return `<br><button class="yt-btn" onclick="this.nextSibling.style.display='block'; this.style.display='none'">[ 觀看影音法寶 ]</button><div class="yt-frame"><iframe width="320" height="180" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe></div>`;
            });

            // 圖片霧化
            const img = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi;
            safe = safe.replace(img, u => `<img src="${u}" class="mosaic-img" onclick="this.classList.toggle('reveal')" title="點擊破除虛妄幻象">`);

            return safe.replace(/\n/g, "<br>");
        }

        // 發布
        document.getElementById('post-btn').onclick = () => {
            const n = document.getElementById('nn').value.trim() || "十方善信";
            const m = document.getElementById('mm').value.trim();
            if(!m) return;
            postsRef.push({ name: n, body: m, time: Date.now() });
            document.getElementById('mm').value = "";
            postsRef.once('value', s => { if(s.numChildren() > 200) postsRef.child(Object.keys(s.val())[0]).remove(); });
        };

        // 渲染
        postsRef.on('value', snap => {
            const board = document.getElementById('board');
            board.innerHTML = "";
            const data = snap.val();
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                let reps = "";
                if(item.replies) {
                    Object.values(item.replies).forEach(r => {
                        const t = r.type === 'push' ? 'r-push' : 'r-arrow';
                        const sym = r.type === 'push' ? '❤' : '✿';
                        reps += `<div class="reply-item"><span class="r-tag ${t}">${sym}</span><span style="color:var(--cyan)">${r.user}</span>: ${r.msg}</div>`;
                    });
                }

                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header"><span class="tag-user">[ 行者 ] ${item.name}</span><span>${new Date(item.time).toLocaleString()}</span></div>
                    <div class="post-body">${parse(item.body)}</div>
                    <div class="reply-area">
                        ${reps}
                        <div class="action-row">
                            <input type="text" id="in-${id}" style="background:none; border:none; border-bottom:1px solid #444; color:white; font-size:0.8rem; flex:1;" placeholder="回應心得...">
                            <button class="btn-act" onclick="rep('${id}','push')"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>合掌</button>
                            <button class="btn-act" onclick="rep('${id}','arrow')"><svg viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-11.5S12 2 12 2s8 3.5 8 10.5S12 22 12 22z"/></svg>隨喜</button>
                        </div>
                    </div>
                    <div class="admin-zone" style="display:${isAdm?'flex':'none'}"><button onclick="del('${id}')">刪除</button></div>
                `;
                board.appendChild(card);
            });
        });

        window.rep = (id, t) => {
            const m = document.getElementById(`in-${id}`).value.trim();
            if(!m) return;
            postsRef.child(id).child('replies').push({ user: '行者', msg: m, type: t });
        };
        window.auth = () => { if(prompt("密碼") === "miaoyi2026") { isAdm = true; alert("管理開啟"); } };
        window.del = id => { if(confirm("確定？")) postsRef.child(id).remove(); };
    </script>
</body>
</html>
