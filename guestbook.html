<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>清淨淨土 ． 數位道場</title>
    <style>
        :root {
            --bg: #020205; --card: rgba(18, 22, 28, 0.95);
            --gold: #D4AF37; --gold-bright: #FFD700;
            --border: rgba(212, 175, 55, 0.3);
            --text: #E0E0E0;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: "PingFang TC", "Noto Sans TC", serif;
            overflow-x: hidden; line-height: 1.8;
        }

        /* 🌟 背景：星空與法界結界 */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -2;
        }
        .realm-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 800px; height: 800px; z-index: -1; opacity: 0.15; pointer-events: none;
        }
        .realm-inner { transform-origin: center; animation: rotateRealm 60s linear infinite; }
        @keyframes rotateRealm { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; position: relative; }

        /* 頂部功德林：圓潤顯眼 */
        .global-merit {
            text-align: center; padding: 15px; 
            background: linear-gradient(90deg, rgba(212,175,55,0), rgba(212,175,55,0.1), rgba(212,175,55,0));
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            margin-bottom: 40px; color: var(--gold-bright); letter-spacing: 4px;
            font-size: 1.1rem; text-shadow: 0 0 10px rgba(255,215,0,0.5);
            cursor: pointer; transition: 0.3s;
        }

        /* 寶蓮燈 Header */
        .header { text-align: center; margin-bottom: 50px; }
        .lotus-wrapper { display: inline-block; animation: breathe 4s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.05); filter: brightness(1.2); } }

        /* 圓潤輸入區 */
        .input-panel {
            background: var(--card); border: 1px solid var(--border);
            padding: 35px; border-radius: 24px; margin-bottom: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .field {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #333;
            color: var(--gold-l); padding: 15px; margin-bottom: 20px;
            box-sizing: border-box; outline: none; font-size: 1rem; border-radius: 12px;
            transition: 0.3s;
        }
        .field:focus { border-color: var(--gold); background: rgba(0,0,0,0.5); }

        .btn-post {
            background: linear-gradient(135deg, #D4AF37 0%, #996B11 100%);
            color: #000; border: none; padding: 12px 35px; border-radius: 30px;
            cursor: pointer; font-weight: bold; font-size: 1rem; letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(212,175,55,0.3); transition: 0.4s;
        }
        .btn-post:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212,175,55,0.5); }

        /* 圓潤留言卡片 */
        .post-card {
            background: var(--card); border: 1px solid var(--border);
            margin-bottom: 40px; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .post-header {
            background: rgba(212,175,55,0.05); padding: 15px 25px;
            display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--gold);
        }
        .post-body { padding: 30px 25px; font-size: 1.15rem; word-break: break-all; }

        /* 互動按鈕區 */
        .action-row { display: flex; gap: 15px; padding: 15px 25px; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.05); }
        .btn-act {
            background: rgba(255,255,255,0.05); border: 1px solid #444; color: #BBB;
            padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-act:hover { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.1); }
        .btn-act svg { width: 16px; height: 16px; fill: currentColor; }

        /* 圖片馬賽克 */
        .mosaic-img {
            max-width: 100%; border-radius: 12px; margin: 15px 0;
            filter: blur(25px); transition: 0.8s; cursor: pointer;
        }
        .mosaic-img.reveal { filter: blur(0); }

        /* 推文顯示 */
        .reply-item { padding: 8px 25px; font-size: 0.95rem; font-family: monospace; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .r-tag { font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>

    <div class="stars"></div>
    
    <div class="realm-bg">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <g fill="none" stroke="rgba(212,175,55,0.3)" stroke-width="0.5">
                <circle cx="100" cy="100" r="90" stroke-dasharray="4 8"/> <circle cx="100" cy="100" r="70"/>
                <g class="realm-inner"> 
                    <rect x="50" y="50" width="100" height="100" transform="rotate(45 100 100)"/> 
                    <circle cx="100" cy="100" r="40" stroke-dasharray="2 4"/> 
                </g>
            </g>
        </svg>
    </div>

    <div class="container">
        <div class="global-merit" id="merit-btn">
            🙏 全站隨喜讚嘆道場功德：<span id="g-count">0</span> 次
        </div>

        <header class="header">
            <div class="lotus-wrapper">
                <svg width="180" height="180" viewBox="0 0 400 400">
                    <defs>
                        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FFF8D6"/><stop offset="50%" stop-color="#D4AF37"/><stop offset="100%" stop-color="#5C400A"/>
                        </linearGradient>
                        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                            <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FFD700" flood-opacity="0.6"/>
                        </filter>
                        <g id="petal"><path d="M 200 200 C 160 100, 160 30, 200 0 C 240 30, 240 100, 200 200 Z" fill="url(#goldGrad)" filter="url(#glow)"/></g>
                    </defs>
                    <g transform="scale(0.8) translate(50 50)">
                        <script>
                            const g = document.currentScript.parentElement;
                            for(let i=0; i<16; i++) {
                                g.innerHTML += `<use href="#petal" transform="rotate(${i*22.5} 200 200) scale(0.9)"/>`;
                            }
                        </script>
                    </g>
                    <circle cx="200" cy="200" r="20" fill="#FFF" filter="url(#glow)"/>
                </svg>
            </div>
            <h1 style="color:var(--gold-bright); letter-spacing:10px; font-weight:300; margin-top:10px;">清淨淨土</h1>
        </header>

        <div class="input-panel">
            <input type="text" id="nn" class="field" placeholder="法號 (如：行者某某)">
            <textarea id="mm" class="field" rows="4" placeholder="在此分享您的法喜與心得..."></textarea>
            <div style="text-align: right;">
                <button class="btn-post" id="post-btn">發布心得</button>
            </div>
        </div>

        <div id="board"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const config = {
            apiKey: "AIzaSyCtttGd8yvbcEq17P75cnh52Pxgcc5ak_4",
            authDomain: "pureland-system.firebaseapp.com",
            databaseURL: "https://pureland-system-default-rtdb.firebaseio.com",
            projectId: "pureland-system"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const postsRef = db.ref('pure_v6');
        const globalRef = db.ref('global_merit');

        // 功德計數
        globalRef.on('value', s => document.getElementById('g-count').innerText = s.val() || 0);
        document.getElementById('merit-btn').onclick = () => globalRef.transaction(c => (c || 0) + 1);

        // 解析：圖片馬賽克，YouTube 直接顯示網址不解析
        function parse(str) {
            let safe = str.replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m]));
            // 僅處理圖片
            const img = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi;
            safe = safe.replace(img, u => `<img src="${u}" class="mosaic-img" onclick="this.classList.toggle('reveal')">`);
            return safe.replace(/\n/g, "<br>");
        }

        // 發布
        document.getElementById('post-btn').onclick = () => {
            const n = document.getElementById('nn').value.trim() || "十方善信";
            const m = document.getElementById('mm').value.trim();
            if(!m) return;
            postsRef.push({ name: n, body: m, time: Date.now() });
            document.getElementById('mm').value = "";
            // 自動淨化 200 條
            postsRef.once('value', s => { if(s.numChildren() > 200) postsRef.child(Object.keys(s.val())[0]).remove(); });
        };

        // 渲染
        postsRef.on('value', snap => {
            const board = document.getElementById('board');
            board.innerHTML = "";
            const data = snap.val();
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                let reps = "";
                if(item.replies) {
                    Object.values(item.replies).forEach(r => {
                        const sym = r.type === 'push' ? '🙏' : '✿';
                        const color = r.type === 'push' ? '#FF4444' : '#FFFF55';
                        reps += `<div class="reply-item"><span class="r-tag" style="color:${color}">${sym}</span><span style="color:#78909c">${r.user}</span>: ${r.msg}</div>`;
                    });
                }

                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header"><span>[ 行者 ] ${item.name}</span><span>${new Date(item.time).toLocaleString()}</span></div>
                    <div class="post-body">${parse(item.body)}</div>
                    <div class="action-row">
                        <input type="text" id="in-${id}" style="background:none; border:none; border-bottom:1px solid #444; color:white; font-size:0.85rem; flex:1;" placeholder="回應...">
                        <button class="btn-act" onclick="rep('${id}','push')">
                            <svg viewBox="0 0 24 24"><path d="M12 2c-1.1 0-2 .9-2 2v3.1c0 .5.4.9.9.9h2.2c.5 0 .9-.4.9-.9V4c0-1.1-.9-2-2-2zM4.1 6.5C2.4 8.2 2 10.5 2 12c0 5.5 4.5 10 10 10s10-4.5 10-10c0-1.5-.4-3.8-2.1-5.5-1.1-1.1-2.9-1.1-4 0-.8.8-1 1.9-.7 2.8.1.3.1.6.1.9 0 1.1-.9 2-2 2s-2-.9-2-2c0-.3 0-.6.1-.9.3-.9.1-2-.7-2.8-1.1-1.1-2.9-1.1-4 0z"/></svg> 合十
                        </button>
                        <button class="btn-act" onclick="rep('${id}','praise')">
                            <svg viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-11.5S12 2 12 2s8 3.5 8 10.5S12 22 12 22z"/></svg> 讚嘆
                        </button>
                    </div>
                    <div class="replies-list">${reps}</div>
                `;
                board.appendChild(card);
            });
        });

        window.rep = (id, type) => {
            const m = document.getElementById(`in-${id}`).value.trim();
            if(!m) return;
            postsRef.child(id).child('replies').push({ user: '行者', msg: m, type: type });
        };
    </script>
</body>
</html>
