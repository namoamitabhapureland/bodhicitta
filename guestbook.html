<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妙依園地 ． 行者論壇</title>
    <style>
        :root {
            --bg-deep: #020205; --gold: #f3e5ab; --solid-gold: #d4af37;
            --cyan: #8ba89c; --text-main: #e0e0e0; --glass-border: rgba(212, 175, 55, 0.25);
        }
        body { margin: 0; background: var(--bg-deep); color: var(--text-main); font-family: sans-serif; padding: 20px; }
        .main-container { max-width: 600px; margin: 0 auto; }
        
        /* 留言主卡片 */
        .post-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 20px; margin-bottom: 30px;
        }
        .post-author { color: var(--solid-gold); font-weight: bold; }
        .post-content { margin: 10px 0; line-height: 1.6; }

        /* 推文區塊 (PTT 樣式) */
        .reply-list { border-top: 1px solid rgba(139, 168, 156, 0.2); margin-top: 15px; padding-top: 10px; font-size: 0.9rem; }
        .reply-item { margin-bottom: 5px; }
        .reply-tag { color: var(--solid-gold); margin-right: 5px; }
        .reply-user { color: var(--cyan); font-weight: bold; margin-right: 8px; }
        
        /* 推文輸入框 */
        .reply-input-group { display: flex; gap: 5px; margin-top: 10px; }
        .mini-input { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            color: white; padding: 5px 10px; border-radius: 4px; flex-grow: 1; outline: none;
        }
        .mini-btn { background: var(--solid-gold); border: none; color: black; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="main-container">
        <h2 style="color:var(--solid-gold); text-align:center;">🙏 行者法義分享</h2>
        
        <div style="margin-bottom:40px;">
            <input type="text" id="main-name" class="mini-input" style="width:100%; margin-bottom:10px;" placeholder="您的法號">
            <textarea id="main-content" class="mini-input" style="width:100%; height:80px;" placeholder="分享法喜..."></textarea>
            <button onclick="sendPost()" class="mini-btn" style="width:100%; margin-top:10px; height:40px;">發表文章</button>
        </div>

        <div id="post-list">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 1. 初始化 Firebase (請確保填入你的 Config)
        const firebaseConfig = {
            apiKey: "AIzaSyCtttGd8yvbcEq17P75cnh52Pxgcc5ak_4",
            authDomain: "pureland-system.firebaseapp.com",
            databaseURL: "https://pureland-system-default-rtdb.firebaseio.com",
            projectId: "pureland-system"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const pttRef = database.ref('mini_ptt');

        // 2. 發表新文章
        function sendPost() {
            const name = document.getElementById('main-name').value || "十方善信";
            const text = document.getElementById('main-content').value;
            if(!text) return alert("內容不能為空");
            
            pttRef.push({
                author: name,
                content: text,
                timestamp: Date.now()
            });
            document.getElementById('main-content').value = "";
        }

        // 3. 監聽文章與推文
        pttRef.on('value', (snapshot) => {
            const list = document.getElementById('post-list');
            list.innerHTML = "";
            const data = snapshot.val();
            
            for(let id in data) {
                const post = data[id];
                const card = document.createElement('div');
                card.className = 'post-card';
                
                // 組合推文 HTML
                let repliesHtml = "";
                if(post.replies) {
                    for(let rId in post.replies) {
                        const r = post.replies[rId];
                        repliesHtml += `
                            <div class="reply-item">
                                <span class="reply-tag">推</span>
                                <span class="reply-user">${r.user}:</span>
                                <span>${r.msg}</span>
                            </div>
                        `;
                    }
                }

                card.innerHTML = `
                    <div class="post-author">${post.author}</div>
                    <div class="post-content">${post.content}</div>
                    <div class="reply-list" id="replies-${id}">${repliesHtml}</div>
                    <div class="reply-input-group">
                        <input type="text" class="mini-input" id="input-name-${id}" placeholder="暱稱" style="width:60px;">
                        <input type="text" class="mini-input" id="input-msg-${id}" placeholder="推文...">
                        <button class="mini-btn" onclick="sendReply('${id}')">推</button>
                    </div>
                `;
                list.prepend(card);
            }
        });

        // 4. 送出推文 (PTT 互動的核心)
        function sendReply(postId) {
            const userName = document.getElementById(`input-name-${postId}`).value || "匿名者";
            const userMsg = document.getElementById(`input-msg-${postId}`).value;
            if(!userMsg) return;

            // 🌟 關鍵：將推文 push 到該文章 ID 的 replies 子路徑下
            pttRef.child(postId).child('replies').push({
                user: userName,
                msg: userMsg,
                timestamp: Date.now()
            });
        }
    </script>
</body>
</html>
