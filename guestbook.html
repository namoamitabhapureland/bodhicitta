<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>妙依園地 ． 清淨道場</title>
    <style>
        :root {
            --bg-deep: #020205; --bg-card: rgba(12, 15, 20, 0.95);
            --gold-p: #d4af37; --gold-l: #f3e5ab; --cyan-a: #607d8b;
            --text-main: #e0e0e0; --glass: rgba(212, 175, 55, 0.15);
        }

        body {
            margin: 0; background: var(--bg-deep); color: var(--text-main);
            font-family: "PingFang TC", "Noto Sans TC", serif;
            overflow-x: hidden; line-height: 1.8;
        }

        /* 🌟 背景：緩緩旋轉的八輻法輪 */
        #dharma-wheel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 800px; height: 800px; z-index: -1; opacity: 0.08;
            pointer-events: none; transition: transform 0.2s linear;
        }

        .container { max-width: 780px; margin: 0 auto; padding: 60px 20px; }

        /* 頁頭美學 */
        .header { text-align: center; margin-bottom: 60px; }
        .lotus-svg { width: 80px; height: 80px; fill: var(--gold-p); filter: drop-shadow(0 0 15px var(--gold-p)); margin-bottom: 20px; }
        .title { font-size: 2.2rem; letter-spacing: 12px; color: var(--gold-p); font-weight: 300; margin: 0; }

        /* 留言區面板 */
        .panel {
            background: var(--bg-card); border: 1px solid var(--glass);
            padding: 30px; border-radius: 4px; margin-bottom: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }
        .input-field {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333;
            color: var(--gold-l); padding: 12px; margin-bottom: 15px;
            box-sizing: border-box; outline: none; font-size: 1rem;
        }
        .input-field:focus { border-color: var(--gold-p); }

        /* 按鈕設計 */
        .btn {
            background: transparent; border: 1px solid var(--gold-p); color: var(--gold-p);
            padding: 10px 25px; cursor: pointer; transition: 0.4s; letter-spacing: 2px;
        }
        .btn:hover { background: var(--gold-p); color: #000; box-shadow: 0 0 15px var(--gold-p); }

        /* 留言卡片 */
        .post {
            background: var(--bg-card); border-left: 2px solid var(--gold-p);
            margin-bottom: 35px; border-radius: 0 4px 4px 0;
        }
        .post-info { background: rgba(255,255,255,0.03); padding: 12px 20px; display: flex; justify-content: space-between; font-size: 0.8rem; }
        .post-text { padding: 25px 20px; font-size: 1.1rem; }

        /* 🌟 YouTube 折疊播放器 */
        .yt-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--cyan-a);
            color: var(--cyan-a); padding: 6px 15px; border-radius: 20px;
            font-size: 0.85rem; cursor: pointer; margin: 10px 0; transition: 0.3s;
        }
        .yt-btn:hover { border-color: var(--gold-p); color: var(--gold-p); }
        .yt-wrap { display: none; margin-top: 15px; position: relative; padding-bottom: 56.25%; height: 0; }
        .yt-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 8px; border: 1px solid var(--glass); }

        /* 圖片樣式 */
        .img-item { max-width: 100%; border-radius: 4px; margin: 15px 0; border: 1px solid var(--glass); }

        /* 管理模式 */
        .admin-tool { display: none; padding: 10px 20px; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .trigger { position: fixed; bottom: 10px; right: 10px; opacity: 0.05; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

    <svg id="dharma-wheel" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" stroke="currentColor" fill="none" stroke-width="1.5" />
        <circle cx="50" cy="50" r="8" stroke="currentColor" fill="none" stroke-width="1.5" />
        <g stroke="currentColor" stroke-width="1.5">
            <line x1="50" y1="5" x2="50" y2="42" /> <line x1="50" y1="58" x2="50" y2="95" />
            <line x1="5" y1="50" x2="42" y2="50" /> <line x1="58" y1="50" x2="95" y2="50" />
            <line x1="18.5" y1="18.5" x2="44.3" y2="44.3" /> <line x1="55.7" y1="55.7" x2="81.5" y2="81.5" />
            <line x1="81.5" y1="18.5" x2="55.7" y2="44.3" /> <line x1="44.3" y1="55.7" x2="18.5" y2="81.5" />
        </g>
    </svg>

    <div class="container">
        <header class="header">
            <svg class="lotus-svg" viewBox="0 0 24 24">
                <path d="M12 22s-8-4.5-8-11.5S12 2 12 2s8 3.5 8 10.5S12 22 12 22z" opacity="0.3"/>
                <path d="M12 22s-5-3-5-8.5S12 4 12 4s5 3 5 9.5S12 22 12 22z" opacity="0.6"/>
                <path d="M12 22c0 0-2-2-2-6s2-8 2-8 2 4 2 8-2 6-2 6z"/>
            </svg>
            <h1 class="title">妙依論壇</h1>
            <div style="font-size: 0.8rem; color: var(--cyan-a); margin-top: 10px;">目前在線：<span id="online">0</span> 人</div>
        </header>

        <div class="panel">
            <input type="text" id="nick" class="input-field" placeholder="法號">
            <textarea id="msg" class="input-field" rows="4" placeholder="分享法喜... (可貼圖片或 YouTube 網址)"></textarea>
            <div style="text-align: right;">
                <button class="btn" id="send-btn">發布心得</button>
            </div>
        </div>

        <div id="list"></div>
    </div>

    <div class="trigger" onclick="goAdmin()">ADMIN</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const config = {
            apiKey: "AIzaSyCtttGd8yvbcEq17P75cnh52Pxgcc5ak_4",
            authDomain: "pureland-system.firebaseapp.com",
            databaseURL: "https://pureland-system-default-rtdb.firebaseio.com",
            projectId: "pureland-system"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const ref = db.ref('posts_clean_v1');
        const pres = db.ref('presence');

        let isAdmin = false;

        // 背景旋轉
        window.onscroll = () => {
            document.getElementById('dharma-wheel').style.transform = `translate(-50%, -50%) rotate(${window.pageYOffset/10}deg)`;
        };

        // 在線人數
        const p = pres.push(); p.onDisconnect().remove(); p.set(true);
        pres.on('value', s => document.getElementById('online').innerText = s.numChildren());

        // 智慧解析與 YouTube 按鈕化
        function parseContent(str) {
            let safe = str.replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m]));
            
            // 偵測 YouTube
            const ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/gi;
            safe = safe.replace(ytRegex, (match, id) => {
                return `<br><button class="yt-btn" onclick="this.nextSibling.style.display='block'; this.style.display='none'">[ 觀看影音法寶 ]</button><div class="yt-wrap"><iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe></div>`;
            });

            // 偵測圖片
            const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi;
            safe = safe.replace(imgRegex, url => `<img src="${url}" class="img-item" loading="lazy">`);

            return safe.replace(/\n/g, "<br>");
        }

        // 發布與「自動淨化」邏輯
        document.getElementById('send-btn').onclick = () => {
            const m = document.getElementById('msg').value.trim();
            const n = document.getElementById('nick').value.trim() || "匿名行者";
            if(!m) return;

            // 髒話簡單過濾
            const bad = /幹|靠|操|死/g; 
            const cleanM = m.replace(bad, " [清淨語] ");

            ref.push({ name: n, body: cleanM, time: Date.now() });
            document.getElementById('msg').value = "";

            // 自動維護：超過 200 條時移除最舊的
            ref.once('value', snap => {
                if(snap.numChildren() > 200) {
                    let firstKey = Object.keys(snap.val())[0];
                    ref.child(firstKey).remove();
                }
            });
        };

        // 渲染列表
        ref.on('value', snap => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            const data = snap.val();
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const p = data[id];
                const card = document.createElement('div');
                card.className = 'post';
                card.innerHTML = `
                    <div class="post-info">
                        <span style="color:var(--gold-p)">${p.name}</span>
                        <span>${new Date(p.time).toLocaleString()}</span>
                    </div>
                    <div class="post-text">${parseContent(p.body)}</div>
                    <div class="admin-tool" style="display:${isAdmin?'flex':'none'}">
                        <button class="btn" style="font-size:0.7rem;" onclick="doDel('${id}')">刪除</button>
                    </div>
                `;
                list.appendChild(card);
            });
        });

        window.goAdmin = () => { if(prompt("密鑰") === "miaoyi2026") { isAdmin = true; alert("開啟管理"); } };
        window.doDel = id => { if(confirm("刪除？")) ref.child(id).remove(); };
    </script>
</body>
</html>
