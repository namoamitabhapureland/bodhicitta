<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>妙依園地 ． 法雨留言板</title>
    <style>
        /* === 沿用你的絕美深色金箔設計系統 === */
        :root {
            --bg-deep: #020205;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --text-main: #e0e0e0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.25);
            --glow-gold: rgba(212, 175, 55, 0.4);
        }

        body {
            margin: 0; background: var(--bg-deep); color: var(--text-main);
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            -webkit-tap-highlight-color: transparent; overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* 頂部標題 */
        .header-section {
            padding: 40px 6% 20px; text-align: center; border-bottom: 1px solid rgba(139, 168, 156, 0.2);
            background: linear-gradient(180deg, rgba(2,2,5,1) 0%, rgba(10,15,20,0.5) 100%);
            margin-bottom: 40px;
        }
        .page-title {
            color: var(--solid-gold); font-size: 2rem; letter-spacing: 5px; margin: 0;
            font-weight: normal; text-shadow: 0 0 15px var(--glow-gold);
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .page-subtitle { color: var(--cyan); font-size: 0.95rem; margin-top: 15px; letter-spacing: 2px; }

        /* 主要容器 */
        .main-container { max-width: 760px; margin: 0 auto; padding: 0 6%; }

        /* 玻璃按鈕 */
        .glass-btn {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--cyan); padding: 10px 24px; border-radius: 30px;
            font-size: 0.95rem; letter-spacing: 2px; cursor: pointer;
            backdrop-filter: blur(10px); transition: all 0.4s ease;
            display: inline-flex; align-items: center; gap: 8px; justify-content: center;
        }
        .glass-btn:hover {
            border-color: var(--solid-gold); color: var(--gold);
            box-shadow: 0 0 15px var(--glow-gold); transform: translateY(-2px);
        }
        .glass-btn.active {
            background: rgba(212, 175, 55, 0.15); border-color: var(--solid-gold);
            color: var(--gold); box-shadow: 0 0 20px var(--glow-gold);
        }
        .icon { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.5; }

        /* 互動與輸入區塊 */
        .interaction-panel {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(139, 168, 156, 0.2);
            padding: 30px; border-radius: 16px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .custom-input {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border);
            color: var(--gold); padding: 15px; border-radius: 8px; margin-bottom: 20px;
            font-family: inherit; font-size: 1.05rem; box-sizing: border-box; outline: none;
            transition: all 0.3s;
        }
        .custom-input::placeholder { color: rgba(139, 168, 156, 0.4); letter-spacing: 1px;}
        .custom-input:focus { border-color: var(--solid-gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); background: rgba(0,0,0,0.5); }
        
        .input-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;}

        /* 留言列表與卡片 */
        .comments-header {
            color: var(--cyan); font-size: 1.2rem; letter-spacing: 3px; border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px;
        }
        
        .comment-card {
            background: rgba(10, 15, 20, 0.4); border: 1px solid rgba(139, 168, 156, 0.15);
            border-radius: 12px; padding: 20px; margin-bottom: 20px;
            backdrop-filter: blur(5px); transition: all 0.3s ease;
        }
        .comment-card:hover { border-color: rgba(212, 175, 55, 0.3); background: rgba(20, 20, 25, 0.6); }
        
        .comment-meta { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center;}
        .comment-author { color: var(--solid-gold); font-weight: bold; font-size: 1.05rem; letter-spacing: 1px;}
        .comment-date { color: rgba(139, 168, 156, 0.7); font-size: 0.85rem; letter-spacing: 0.5px;}
        .comment-text { color: var(--text-main); font-size: 1rem; line-height: 1.8; text-align: justify; letter-spacing: 0.5px; margin: 0;}
        
        .empty-state { text-align: center; color: rgba(139, 168, 156, 0.5); padding: 40px 0; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header-section">
        <h1 class="page-title">
            <svg class="icon" style="stroke:var(--solid-gold); width:32px; height:32px;" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            妙依園地 ． 法雨留言
        </h1>
        <div class="page-subtitle">十方善信 交流無礙</div>
    </div>

    <div class="main-container">
        
        <div class="interaction-panel">
            <input type="text" id="db-username" class="custom-input" placeholder="您的法號或暱稱 (留白將顯示為『十方善信』)">
            <textarea id="db-message" class="custom-input" rows="4" placeholder="在此留下您的法喜與心得..." required></textarea>
            
            <div class="input-row">
                <button class="glass-btn" id="db-like-btn">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>
                    隨喜讚嘆道場 (<span id="db-like-count">0</span>)
                </button>

                <button class="glass-btn active" id="db-submit-btn">
                    <svg class="icon" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    送出留言
                </button>
            </div>
        </div>

        <div class="comments-header">
            <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
            法語交流紀錄
        </div>
        
        <div id="db-comments-list">
            <div class="empty-state">正在與雲端連線，讀取法寶中...</div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // === 1. 你的 pureland-system 專屬鑰匙 ===
        const firebaseConfig = {
            apiKey: "AIzaSyCtttGd8yvbcEq17P75cnh52Pxgcc5ak_4",
            authDomain: "pureland-system.firebaseapp.com",
            databaseURL: "https://pureland-system-default-rtdb.firebaseio.com", 
            projectId: "pureland-system",
            storageBucket: "pureland-system.firebasestorage.app",
            messagingSenderId: "931152534296",
            appId: "1:931152534296:web:25b94c40a302b8c25edc6d"
        };
        
        // 初始化 Firebase
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        // === 2. 設定資料庫路徑 ===
        // 我們將這頁的資料獨立放在 'public_board' 這個資料夾下
        const boardRef = database.ref('public_board');
        const commentsList = document.getElementById('db-comments-list');

        // === 3. 監聽讚數變化 ===
        boardRef.child('likes').on('value', (snapshot) => {
            document.getElementById('db-like-count').innerText = snapshot.val() || 0;
        });

        // 按讚按鈕事件
        document.getElementById('db-like-btn').addEventListener('click', () => {
            boardRef.child('likes').transaction((currentLikes) => {
                return (currentLikes || 0) + 1;
            });
        });

        // === 4. 監聽留言載入 ===
        let isFirstLoad = true;
        boardRef.child('comments').on('child_added', (snapshot) => {
            // 清除「讀取中」文字
            if(isFirstLoad) {
                commentsList.innerHTML = '';
                isFirstLoad = false;
            }

            const data = snapshot.val();
            const commentDiv = document.createElement('div');
            commentDiv.className = 'comment-card';
            
            // 優化日期顯示格式 (例如: 2024/05/12 14:30)
            const dateObj = new Date(data.timestamp);
            const dateString = `${dateObj.getFullYear()}/${String(dateObj.getMonth()+1).padStart(2, '0')}/${String(dateObj.getDate()).padStart(2, '0')} ${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}`;

            // 防止 XSS 攻擊的簡單過濾，並將換行符號轉為 <br>
            const safeText = data.text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, '<br>');
            const safeName = data.name.replace(/</g, "&lt;").replace(/>/g, "&gt;");

            commentDiv.innerHTML = `
                <div class="comment-meta">
                    <span class="comment-author">${safeName}</span>
                    <span class="comment-date">${dateString}</span>
                </div>
                <p class="comment-text">${safeText}</p>
            `;
            // 將新留言插在最上方
            commentsList.prepend(commentDiv);
        });

        // 若一秒後仍未載入資料(可能是空的資料庫)，顯示提示
        setTimeout(() => {
            if(isFirstLoad) commentsList.innerHTML = '<div class="empty-state">目前尚無留言，歡迎成為第一位結緣者。</div>';
        }, 1500);

        // === 5. 送出留言事件 ===
        document.getElementById('db-submit-btn').addEventListener('click', () => {
            const btn = document.getElementById('db-submit-btn');
            const nameInput = document.getElementById('db-username').value.trim() || '十方善信';
            const msgInput = document.getElementById('db-message').value.trim();

            if (msgInput === "") {
                alert("請填寫您的法喜與心得！"); 
                document.getElementById('db-message').focus();
                return;
            }

            // 變更按鈕狀態
            const originalContent = btn.innerHTML;
            btn.innerHTML = '傳送中...';
            btn.style.opacity = '0.7';

            // 將資料寫入 Firebase
            boardRef.child('comments').push({
                name: nameInput,
                text: msgInput,
                timestamp: Date.now()
            }).then(() => {
                // 成功後清空輸入框，恢復按鈕
                document.getElementById('db-message').value = '';
                btn.innerHTML = originalContent;
                btn.style.opacity = '1';
            }).catch((err) => {
                alert("傳送失敗！請確認 Firebase 後台的 Realtime Database 規則(Rules) 已設定為 true。");
                console.error(err);
                btn.innerHTML = originalContent;
                btn.style.opacity = '1';
            });
        });
    </script>
</body>
</html>
