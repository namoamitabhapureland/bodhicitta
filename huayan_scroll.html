<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀願海 · 星寰陣法</title>
    <style>
        :root {
            --gold: #d4af37;
            --rim-light: rgba(212, 175, 55, 0.3);
            --void-bg: #050505;
        }

        body, html { margin: 0; padding: 0; background: var(--void-bg); color: white; font-family: "Noto Serif TC", serif; overflow-x: hidden; }

        /* 願海大容器 - 增加高度讓用戶可以滾動觀想 */
        #vow-universe {
            position: relative;
            min-height: 200vh; /* 讓內容有延展空間 */
            background: radial-gradient(circle at center, #1a0505 0%, #050505 80%);
            display: flex; flex-direction: column; align-items: center;
        }

        /* 頂部標題區 */
        .vow-header {
            padding: 100px 20px 40px; text-align: center; z-index: 10;
        }
        .vow-header h1 { font-size: 2.2rem; letter-spacing: 8px; color: var(--gold); margin-bottom: 10px; font-weight: 300; }
        .vow-header p { color: #666; font-size: 0.9rem; letter-spacing: 2px; }

        /* 願位容器：不再擁擠 */
        .vow-constellation {
            position: relative; width: 100%; max-width: 1200px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 40px;
            padding: 60px 20px; z-index: 5;
        }

        /* 願位單元：像星點般的設計 */
        .vow-node {
            width: 120px; height: 120px;
            position: relative; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 願位的光環 */
        .node-circle {
            position: absolute; width: 100%; height: 100%;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 50%;
            transition: all 0.6s;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        /* 願位文字：改為橫書但精緻 */
        .node-text {
            z-index: 2; font-size: 0.9rem; color: #aaa; text-align: center;
            letter-spacing: 1px; transition: 0.4s;
            padding: 0 10px; line-height: 1.4;
        }

        .node-num {
            position: absolute; top: -10px; font-size: 0.6rem; color: #8b0000;
            font-family: serif; letter-spacing: 1px;
        }

        /* 懸浮：綻放佛光 */
        .vow-node:hover { transform: scale(1.15); }
        .vow-node:hover .node-circle {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 0 30px var(--rim-light);
        }
        .vow-node:hover .node-text { color: white; text-shadow: 0 0 10px var(--gold); }

        /* 裝飾性連線（可選） */
        .vow-line {
            position: absolute; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.1), transparent);
            height: 1px; z-index: 1; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="vow-universe">
    <div class="vow-header">
        <h1>彌陀四十八願海</h1>
        <p>每一願，皆是通往極樂的指引</p>
    </div>

    <div class="vow-constellation" id="vow-list">
        </div>
</div>

<script>
    const vows = [
        "國無惡道", "不復更生", "各得真金色", "形色無別", "設有姓名", "宿命通", "天眼通", "天耳通", "他心通", "神足通",
        "遍供諸佛", "定成正覺", "光明無量", "觸光安樂", "壽命無量", "聲聞無數", "諸佛稱嘆", "十念必生", "臨終接引", "欲生果遂",
        "悔過生西", "國無婦女", "厭女轉男", "蓮花化生", "天人禮敬", "聞名得福", "修殊勝行", "國無不善", "住正定聚", "樂如漏盡",
        "不墮惡道", "身悉金色", "形貌端嚴", "成佛迅速", "聞名發心", "永離穢行", "善根增長", "聞名得忍", "具足根缺", "現證不退",
        "國土嚴飾", "照見十方", "寶香普薰", "普等三昧", "定中供佛", "獲陀羅尼", "聞名永離", "獲三法忍", "同生極樂"
    ];

    const listContainer = document.getElementById('vow-list');

    vows.forEach((name, i) => {
        const node = document.createElement('div');
        node.className = 'vow-node';
        
        // 增加一點隨機的位移，讓它看起來更像自然星群，不那麼死板
        const randomShift = (Math.random() - 0.5) * 20;
        node.style.marginTop = `${randomShift}px`;

        node.innerHTML = `
            <div class="node-circle"></div>
            <div class="node-num">${(i+1).toString().padStart(2, '0')}</div>
            <div class="node-text">${name}</div>
        `;

        node.onclick = () => {
            // 這裡連接到您的跳轉或彈窗
            alert(`契入願海：${name}\n此處即將展現您對該願的深刻體悟...`);
        };

        listContainer.appendChild(node);
    });
</script>

</body>
</html>
