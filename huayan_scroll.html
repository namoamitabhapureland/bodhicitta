<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>金蓮大願 - 尖瓣長短層次版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #loading-ui {
            position: absolute; width: 100%; text-align: center;
            top: 45%; color: #d4af37; font-family: serif; letter-spacing: 5px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="loading-ui">妙依，蓮華化生中...</div>

    <script>
        // 1. 初始化環境
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. 光影配置 (展現金色質感)
        const amb = new THREE.AmbientLight(0x442200, 2);
        scene.add(amb);
        const point = new THREE.PointLight(0xffeebb, 2, 1000);
        point.position.set(20, 50, 30);
        scene.add(point);

        // 3. 核心：建立「頂部變尖」的花瓣
        function createSharpPetal(length) {
            const shape = new THREE.Shape();
            const width = length * 0.35; // 根據長度自動調整寬度比例

            shape.moveTo(0, 0); 
            // 往尖端延伸 (貝茲曲線控制點靠近頂點，形成尖頭)
            shape.bezierCurveTo(length * 0.3, width, length * 0.8, width * 0.2, length, 0);
            shape.bezierCurveTo(length * 0.8, -width * 0.2, length * 0.3, -width, 0, 0);

            const settings = { 
                depth: 0.15, 
                bevelEnabled: true, 
                bevelThickness: 0.1, 
                bevelSize: 0.1, 
                bevelSegments: 3 
            };
            return new THREE.ExtrudeGeometry(shape, settings);
        }

        const lotus = new THREE.Group();
        const goldMat = new THREE.MeshStandardMaterial({ 
            color: 0xd4af37, 
            metalness: 0.8, 
            roughness: 0.2,
            emissive: 0x331100,
            side: THREE.DoubleSide
        });

        // 4. 定義三層：[長度, 數量, 翹起角度, 縮放]
        const layerConfigs = [
            { len: 8, count: 12, tilt: -0.15, yOffset: 0 },   // 最下層：最長
            { len: 6, count: 10, tilt: -0.6,  yOffset: 0.5 }, // 中間層：中等
            { len: 4, count: 8,  tilt: -1.2,  yOffset: 1.2 }  // 最上層：最短
        ];

        layerConfigs.forEach(config => {
            const geo = createSharpPetal(config.len);
            for (let i = 0; i < config.count; i++) {
                const mesh = new THREE.Mesh(geo, goldMat);
                const pivot = new THREE.Group();
                
                mesh.rotation.x = config.tilt; 
                mesh.position.y = config.yOffset;
                
                pivot.rotation.y = (Math.PI * 2 / config.count) * i;
                pivot.add(mesh);
                lotus.add(pivot);
            }
        });

        // 5. 加上中心蓮台
        const core = new THREE.Mesh(
            new THREE.CylinderGeometry(1.2, 0.8, 0.8, 32),
            new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff8800 })
        );
        core.position.y = 0.5;
        lotus.add(core);

        scene.add(lotus);
        camera.position.set(0, 10, 18);
        camera.lookAt(0, 0, 0);

        // 移除載入文字
        document.getElementById('loading-ui').style.display = 'none';

        // 6. 動畫迴圈
        function animate() {
            requestAnimationFrame(animate);
            lotus.rotation.y += 0.003; 
            renderer.render(scene, camera);
        }

        if (typeof THREE !== 'undefined') {
            animate();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
