<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀大願海：實心金蓮與 7x7 法陣</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Noto Serif TC', serif; user-select: none; perspective: 1000px; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #bloom-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #ffffff 0%, #d4af37 60%, #050505 100%);
            opacity: 0; pointer-events: none; z-index: 10; transition: opacity 2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        /* 啟動按鈕 */
        #trigger-ui { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); z-index: 20; transition: opacity 1s; }
        .vow-btn {
            background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 15px 40px;
            font-size: 1.2rem; letter-spacing: 4px; cursor: pointer; border-radius: 30px;
            box-shadow: 0 0 15px rgba(212,175,55,0.2), inset 0 0 10px rgba(212,175,55,0.1); transition: all 0.5s;
        }
        .vow-btn:hover { background: rgba(212,175,55,0.1); box-shadow: 0 0 30px rgba(212,175,55,0.5); }
        
        /* 提示文字 */
        #sea-ui {
            position: absolute; top: 8%; width: 100%; text-align: center; color: #d4af37;
            z-index: 5; opacity: 0; letter-spacing: 8px; font-size: 1.2rem;
            text-shadow: 0 0 20px #d4af37; transition: opacity 3s; pointer-events: none;
        }

        /* 7x7 陣法容器 */
        #matrix-wrapper {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            z-index: 30; opacity: 0; pointer-events: none; transition: opacity 2s;
            transform-style: preserve-3d;
        }
        #matrix-7x7 {
            display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(7, 1fr); gap: 12px;
            width: 85vw; height: 85vh; max-width: 900px; max-height: 900px;
            transform: translateZ(0); transition: transform 0.1s ease-out;
        }
        .matrix-cell {
            background: rgba(5, 5, 5, 0.6); backdrop-filter: blur(4px);
            border: 1px solid rgba(212,175,55,0.15); border-radius: 8px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: rgba(212,175,55,0.6); font-size: 0.95rem; letter-spacing: 2px; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8); transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer; position: relative; overflow: hidden;
        }
        .matrix-cell:hover {
            border-color: #d4af37; color: #fff; background: rgba(30, 20, 0, 0.8);
            box-shadow: 0 0 25px rgba(212,175,55,0.6), inset 0 0 20px rgba(212,175,55,0.3);
            text-shadow: 0 0 10px #d4af37; transform: translateZ(20px) scale(1.05);
        }
        .matrix-cell::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
            background: radial-gradient(circle, rgba(212,175,55,0.4) 0%, transparent 70%);
            transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; border-radius: 50%;
        }
        .matrix-cell:hover::after { width: 150%; height: 150%; }
        
        .cell-num { font-size: 0.7rem; color: #8b0000; margin-bottom: 4px; transition: 0.6s; }
        .matrix-cell:hover .cell-num { color: #d4af37; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

</head>
<body>

    <div id="canvas-container"></div>
    <div id="bloom-overlay"></div>
    
    <div id="trigger-ui"><button class="vow-btn" onclick="initiateWarp()">資糧圓滿 · 契入願海</button></div>
    <div id="sea-ui">請點擊您的專屬大白蓮華<br><span style="font-size: 0.8rem; color:#888;">展開 48 願法陣</span></div>

    <div id="matrix-wrapper">
        <div id="matrix-7x7"></div>
    </div>

    <script>
        // --- 初始化場景與光效 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.0012);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 4000);
        camera.position.z = 800;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping; 
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.enabled = false;

        const ambientLight = new THREE.AmbientLight(0x401010, 2); 
        scene.add(ambientLight);
        const centerLight = new THREE.PointLight(0xd4af37, 3, 1500);
        scene.add(centerLight);

        // 光暈渲染器
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.5, 0.1);
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- 效能優化：建立全局唯一的基礎花瓣幾何體 ---
        function createStandardBezierShape() {
            const size = 1; // 基準大小
            const shape = new THREE.Shape();
            shape.moveTo(0, 0);
            shape.bezierCurveTo(size*0.4, size*0.2, size*0.8, size*0.5, size, 0);
            shape.bezierCurveTo(size*0.8, -size*0.5, size*0.4, -size*0.2, 0, 0);
            return shape;
        }

        const globalPetalGeo = new THREE.ExtrudeGeometry(createStandardBezierShape(), {
    depth: 0.1,           // 稍微增加厚度，避免面重疊
    bevelEnabled: true,
    bevelSegments: 3,     // 段數不要太高
    steps: 1,
    bevelSize: 0.05,      // 增加斜角大小
    bevelThickness: 0.05
});


        // --- 組裝實心蓮花 ---
        function buildSolidLotus(baseSize, isMain) {
            const group = new THREE.Group();
            
            const material = new THREE.MeshStandardMaterial({
                color: isMain ? 0xffffff : 0xaa7700,
                emissive: isMain ? 0xffea99 : 0x8b0000, 
                emissiveIntensity: isMain ? 1.5 : 0.8,
                roughness: 0.2, metalness: 0.9, side: THREE.DoubleSide
            });

            for (let layer = 0; layer < 2; layer++) {
                const numPetals = 12;
                const layerScale = layer === 0 ? 1 : 0.65;
                const tilt = layer === 0 ? Math.PI/7 : Math.PI/3;

                for (let i = 0; i < numPetals; i++) {
                    const petal = new THREE.Mesh(globalPetalGeo, material);
                    const angle = (Math.PI * 2 / numPetals) * i + (layer * Math.PI/12);
                    
                    const pivot = new THREE.Group();
                    petal.rotation.z = tilt;
                    petal.scale.set(layerScale, layerScale, layerScale);
                    petal.position.z = -0.025; // 對齊厚度中心
                    
                    pivot.add(petal);
                    pivot.rotation.y = angle;
                    group.add(pivot);
                }
            }
            
            const coreGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const coreMat = new THREE.MeshStandardMaterial({ 
                color: 0xffcc00, emissive: 0xd4af37, emissiveIntensity: 2 
            });
            const core = new THREE.Mesh(coreGeo, coreMat);
            core.position.y = 0.08;
            group.add(core);

            // 根據傳入的 baseSize 放大整個群組
            group.scale.set(baseSize, baseSize, baseSize);

            return group;
        }

        // --- 建立場景物件 ---
        let warpParticles, starParticles;
        const lotuses = [];
        const lotusGroup = new THREE.Group();
        let mainLotus;

        function initSceneElements() {
            const warpGeo = new THREE.BufferGeometry();
            const warpVerts = [];
            for (let i=0; i<3000; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 50 + Math.random() * 500;
                warpVerts.push(Math.cos(angle)*radius, Math.sin(angle)*radius, (Math.random()-0.5)*2500);
            }
            warpGeo.setAttribute('position', new THREE.Float32BufferAttribute(warpVerts, 3));
            warpParticles = new THREE.Points(warpGeo, new THREE.PointsMaterial({ color: 0xd4af37, size: 3, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending }));
            scene.add(warpParticles);

            const starGeo = new THREE.BufferGeometry();
            const starVerts = [];
            for (let i=0; i<2500; i++) {
                starVerts.push((Math.random()-0.5)*4000, (Math.random()-0.5)*4000, (Math.random()-0.5)*4000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
            starParticles = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xf3e5ab, size: 2, transparent: true, opacity: 0.5 }));
            starParticles.visible = false;
            scene.add(starParticles);

            scene.add(lotusGroup);
            lotusGroup.visible = false;

            // 建立 1 朵大蓮花
            mainLotus = buildSolidLotus(120, true);
            mainLotus.rotation.x = -Math.PI / 3; 
            mainLotus.userData = { isMain: true, pulseOffset: 0, speed: 0.0015 };
            lotusGroup.add(mainLotus);
            lotuses.push(mainLotus);

            // 建立 47 朵小蓮花
            for(let i=0; i<47; i++) {
                const size = 12 + Math.random() * 18; 
                const lotus = buildSolidLotus(size, false);
                
                const theta = Math.random() * Math.PI * 2;
                const radius = 250 + Math.random() * 800; 
                lotus.position.set( Math.cos(theta)*radius, (Math.random()-0.5)*400, Math.sin(theta)*radius - 300 );
                
                lotus.rotation.x = -Math.PI / 2 + (Math.random()*0.4 - 0.2); 
                lotus.userData = { isMain: false, pulseOffset: Math.random()*Math.PI*2, speed: (Math.random()-0.5)*0.01 };
                
                lotusGroup.add(lotus);
                lotuses.push(lotus);
            }
        }
        initSceneElements();

        // --- 互動與動畫 ---
        let warpSpeed = 0, isWarping = false, inLotusSea = false, matrixActive = false;
        const clock = new THREE.Clock();
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const matrixWrapper = document.getElementById('matrix-wrapper');
        const matrixElement = document.getElementById('matrix-7x7');

        // 按鈕觸發
        window.initiateWarp = function() {
            document.getElementById('trigger-ui').style.opacity = '0';
            isWarping = true; warpSpeed = 4;
        };

        // 點擊蓮花觸發法陣
        window.addEventListener('click', (event) => {
            if (!inLotusSea || matrixActive) return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(mainLotus.children, true);
            if (intersects.length > 0) activate7x7Matrix();
        });

        // 法陣重力傾斜
        document.addEventListener('mousemove', (e) => {
            if (!matrixActive) return;
            const xAxis = (window.innerWidth / 2 - e.pageX) / 40; 
            const yAxis = (window.innerHeight / 2 - e.pageY) / 40; 
            matrixElement.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        function activate7x7Matrix() {
            matrixActive = true;
            document.getElementById('sea-ui').style.opacity = '0';
            matrixWrapper.style.pointerEvents = 'auto';
            matrixWrapper.style.opacity = '1';
            
            matrixElement.innerHTML = '';
            for(let i=1; i<=49; i++) {
                const cell = document.createElement('div');
                cell.className = 'matrix-cell';
                
                const num = document.createElement('div');
                num.className = 'cell-num';
                num.innerText = i === 49 ? '總願' : `第 ${i} 願`;
                
                const title = document.createElement('div');
                title.style.zIndex = "2";
                if(i === 1) {
                    title.innerText = '國無惡道';
                    title.style.color = '#d4af37'; title.style.fontWeight = 'bold';
                } else if(i === 49) {
                    title.innerText = '同生極樂';
                } else {
                    title.innerText = '未解鎖';
                }

                cell.appendChild(num);
                cell.appendChild(title);
                matrixElement.appendChild(cell);
            }
            
            scene.fog.density = 0.0035;
            controls.autoRotateSpeed = 0.1; 
            bloomPass.strength = 1.0; 
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            if (isWarping && warpParticles.visible) {
                warpSpeed *= 1.035;
                camera.fov = THREE.MathUtils.lerp(camera.fov, 150, 0.05);
                camera.updateProjectionMatrix();

                const positions = warpParticles.geometry.attributes.position.array;
                for (let i = 2; i < positions.length; i += 3) {
                    positions[i] += warpSpeed;
                    if (positions[i] > camera.position.z) positions[i] -= 2500;
                }
                warpParticles.geometry.attributes.position.needsUpdate = true;

                if (warpSpeed > 220) {
                    isWarping = false;
                    document.getElementById('bloom-overlay').style.opacity = '1';

                    setTimeout(() => {
                        warpParticles.visible = false;
                        starParticles.visible = true;
                        lotusGroup.visible = true;
                        
                        camera.position.set(0, 180, 500); 
                        camera.lookAt(0, 0, 0);
                        camera.fov = 60; camera.updateProjectionMatrix();

                        controls.enabled = true; controls.autoRotate = true; controls.autoRotateSpeed = 0.4;
                        document.getElementById('bloom-overlay').style.opacity = '0';
                        document.getElementById('sea-ui').style.opacity = '1';
                        inLotusSea = true;
                    }, 1500);
                }
            }

            if (inLotusSea) {
                lotuses.forEach(lotus => {
                    lotus.rotation.y += lotus.userData.speed;
                    const pulseMult = lotus.userData.isMain ? 0.05 : 0.03;
                    const scale = 1 + Math.sin(time * 2 + lotus.userData.pulseOffset) * pulseMult;
                    lotus.scale.set(scale, scale, scale);
                });
                starParticles.rotation.y -= 0.0003;
            }

            controls.update();
            composer.render(); 
            renderer.render(scene, camera); 
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
