<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀願海 · 圓金法鏡</title>
    <style>
        :root {
            --gold: #d4af37;
            --deep-red: #8b0000;
            --bg: #050505;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg);
            color: white; font-family: "Noto Serif TC", serif;
            overflow: hidden; /* 由容器接管捲動 */
        }

        /* 滾動容器：一捲一格 */
        #vow-scroller {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        /* 每一願的區塊 */
        .vow-section {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
            position: relative;
            perspective: 1000px;
        }

        /* 圓金框容器 */
        .gold-mirror {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 2px solid rgba(212, 175, 55, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
            background: radial-gradient(circle, rgba(20,0,0,0.3) 0%, transparent 70%);
            cursor: pointer;
            transform: scale(0.8) rotateX(20deg);
            opacity: 0.3;
        }

        /* 當進入視野時的發亮狀態 */
        .vow-section.active .gold-mirror {
            transform: scale(1) rotateX(0deg);
            opacity: 1;
            border-color: var(--gold);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3), inset 0 0 30px rgba(212, 175, 55, 0.2);
        }

        /* 願文名稱 */
        .vow-name {
            font-size: 1.8rem;
            letter-spacing: 6px;
            color: #ddd;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            transition: 1s;
        }
        .vow-section.active .vow-name { color: var(--gold); }

        .vow-num {
            position: absolute; top: 60px;
            font-size: 0.8rem; color: var(--deep-red);
            letter-spacing: 2px;
        }

        /* 底部金蓮花圖示 */
        .mini-lotus {
            position: absolute; bottom: 50px;
            width: 30px; height: 30px;
            fill: var(--gold);
            opacity: 0.5;
            transition: 1s;
        }
        .vow-section.active .mini-lotus {
            opacity: 1;
            filter: drop-shadow(0 0 5px var(--gold));
            transform: scale(1.2);
        }

        /* 提示文字 */
        .hint-text {
            position: absolute; bottom: 30px;
            font-size: 0.7rem; color: #444;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="vow-scroller">
    </div>

<script>
    const vows = [
        "國無惡道", "不復更生", "各得真金色", "形色無別", "設有姓名", "宿命通", "天眼通", "天耳通", "他心通", "神足通",
        "遍供諸佛", "定成正覺", "光明無量", "觸光安樂", "壽命無量", "聲聞無數", "諸佛稱嘆", "十念必生", "臨終接引", "欲生果遂",
        "悔過生西", "國無婦女", "厭女轉男", "蓮花化生", "天人禮敬", "聞名得福", "修殊勝行", "國無不善", "住正定聚", "樂如漏盡",
        "不墮惡道", "身悉金色", "形貌端嚴", "成佛迅速", "聞名發心", "永離穢行", "善根增長", "聞名得忍", "具足根缺", "現證不退",
        "國土嚴飾", "照見十方", "寶香普薰", "普等三昧", "定中供佛", "獲陀羅尼", "聞名永離", "獲三法忍", "同生極樂"
    ];

    const scroller = document.getElementById('vow-scroller');

    // 蓮花 SVG 圖示代碼
    const lotusSvg = `
        <svg class="mini-lotus" viewBox="0 0 24 24">
            <path d="M12 22C12 22 17 16 17 12C17 8 12 4 12 4C12 4 7 8 7 12C7 16 12 22 12 22Z" />
            <path d="M12 22C12 22 22 18 22 12C22 8 17 8 12 12" opacity="0.4"/>
            <path d="M12 22C12 22 2 18 2 12C2 8 7 8 12 12" opacity="0.4"/>
        </svg>
    `;

    vows.forEach((name, i) => {
        const section = document.createElement('div');
        section.className = 'vow-section';
        
        section.innerHTML = `
            <div class="gold-mirror">
                <span class="vow-num">VOW ${(i+1).toString().padStart(2, '0')}</span>
                <div class="vow-name">${name}</div>
                ${lotusSvg}
            </div>
            <div class="hint-text">SCROLL TO OBSERVE</div>
        `;

        section.onclick = () => {
            // 點擊後的跳轉或開啟您的內容
            alert(`契入願海：${name}\n此處將展現您的觀想內容...`);
        };

        scroller.appendChild(section);
    });

    // 監聽滾動，切換發亮狀態
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
            } else {
                entry.target.classList.remove('active');
            }
        });
    }, { threshold: 0.6 });

    document.querySelectorAll('.vow-section').forEach(section => observer.observe(section));
</script>

</body>
</html>
