<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀第一願：時空穿越與蓮池海會</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Noto Serif TC', serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* 時空爆裂的純白/純金濾鏡 */
        #bloom-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #ffffff 0%, #d4af37 60%, #050505 100%);
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            transition: opacity 2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        /* 啟動按鈕 (模擬達到 10,000 聲的觸發器) */
        #trigger-ui {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
            transition: opacity 1s;
        }
        .vow-btn {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 15px 40px;
            font-size: 1.2rem;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 30px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2), inset 0 0 10px rgba(212, 175, 55, 0.1);
            transition: all 0.5s;
            text-transform: uppercase;
        }
        .vow-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5), inset 0 0 20px rgba(212, 175, 55, 0.3);
            text-shadow: 0 0 8px #d4af37;
        }
        /* 進入願海後的提示文字 */
        #sea-ui {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            color: #d4af37;
            z-index: 5;
            opacity: 0;
            letter-spacing: 8px;
            font-size: 1.5rem;
            text-shadow: 0 0 20px #d4af37;
            transition: opacity 3s ease-in;
            pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="bloom-overlay"></div>
    
    <div id="trigger-ui">
        <button class="vow-btn" id="start-warp" onclick="initiateWarp()">資糧圓滿 · 契入願海</button>
    </div>

    <div id="sea-ui">
        <div>彌陀大願海</div>
        <div style="font-size: 0.9rem; margin-top: 10px; color:#888; letter-spacing: 4px;">拖曳以觀想無邊淨土</div>
    </div>

    <script>
        // --- 智的結界核心設定 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.002); // 極簡黑的深邃霧氣

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.z = 400;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enabled = false; // 初始鎖定視角，進入蓮花海後再解鎖

        // --- 第一階段：金光隧道 (The Warp) ---
        let warpParticles;
        const particleCount = 5000;
        let warpSpeed = 0;
        let isWarping = false;
        let warpProgress = 0;

        function createWarpTunnel() {
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < particleCount; i++) {
                // 將粒子散佈在圓柱體周圍，留出中心隧道
                const angle = Math.random() * Math.PI * 2;
                const radius = 20 + Math.random() * 300;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                const z = (Math.random() - 0.5) * 1000;
                vertices.push(x, y, z);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            
            const material = new THREE.PointsMaterial({
                color: 0xd4af37, // 佛光金
                size: 2,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            warpParticles = new THREE.Points(geometry, material);
            scene.add(warpParticles);
        }
        createWarpTunnel();

        // --- 第三階段：3D 全息蓮花海 (The Lotus Sea) ---
        const lotuses = [];
        const lotusGroup = new THREE.Group();
        scene.add(lotusGroup);
        lotusGroup.visible = false; // 初始隱藏

        // 建立科技禪意「線框蓮花」模型
        function createCyberLotus() {
            const lotus = new THREE.Group();
            const petalGeo = new THREE.ConeGeometry(0.5, 3, 4);
            petalGeo.translate(0, 1.5, 0); // 將軸心移至底部
            
            const petalMat = new THREE.MeshBasicMaterial({ 
                color: 0xd4af37, 
                wireframe: true, 
                transparent: true, 
                opacity: 0.6 
            });

            // 三層花瓣
            for(let layer = 0; layer < 3; layer++) {
                const numPetals = 6 + layer * 2;
                const angleStep = (Math.PI * 2) / numPetals;
                const tilt = 0.3 + layer * 0.4; // 越外層越展開
                
                for(let i = 0; i < numPetals; i++) {
                    const petal = new THREE.Mesh(petalGeo, petalMat);
                    petal.rotation.y = angleStep * i;
                    petal.rotation.z = tilt;
                    lotus.add(petal);
                }
            }
            // 莊嚴紅的蓮花核心 (業力消融點)
            const coreGeo = new THREE.OctahedronGeometry(0.6, 0);
            const coreMat = new THREE.MeshBasicMaterial({ color: 0x8b0000, wireframe: true });
            const core = new THREE.Mesh(coreGeo, coreMat);
            lotus.add(core);

            return lotus;
        }

        function buildLotusSea() {
            // 生成 48 朵願力蓮花，散佈於 3D 空間
            for(let i = 0; i < 48; i++) {
                const lotus = createCyberLotus();
                // 隨機分佈在球體空間中
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const radius = 50 + Math.random() * 250;
                
                lotus.position.x = radius * Math.sin(phi) * Math.cos(theta);
                lotus.position.y = (Math.random() - 0.5) * 100; // 壓扁 Y 軸形成「海面」感
                lotus.position.z = radius * Math.sin(phi) * Math.sin(theta);
                
                // 給予每朵蓮花不同的呼吸跳動頻率
                lotus.userData = {
                    pulseOffset: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.01
                };
                
                // 將它們轉向中心 (象徵萬法歸宗)
                lotus.lookAt(0, 0, 0);
                // 稍微翻轉使其朝上
                lotus.rotateX(Math.PI / 2);

                lotuses.push(lotus);
                lotusGroup.add(lotus);
            }
        }
        buildLotusSea();

        // --- 動畫與過渡邏輯 ---
        function initiateWarp() {
            document.getElementById('trigger-ui').style.opacity = '0';
            isWarping = true;
            warpSpeed = 2; // 初始低速前進
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // 1. 金光隧道加速邏輯
            if (isWarping && warpParticles.visible) {
                warpSpeed *= 1.02; // 指數級加速
                camera.fov = THREE.MathUtils.lerp(camera.fov, 120, 0.05); // 視野拉伸產生強烈速度感
                camera.updateProjectionMatrix();

                const positions = warpParticles.geometry.attributes.position.array;
                for (let i = 2; i < positions.length; i += 3) {
                    positions[i] += warpSpeed; // 粒子向鏡頭衝來
                    if (positions[i] > camera.position.z) {
                        positions[i] -= 1000; // 循環回到遠處
                    }
                }
                warpParticles.geometry.attributes.position.needsUpdate = true;

                // 2. 臨界點：時空爆裂 (The Bloom)
                if (warpSpeed > 150 && warpProgress === 0) {
                    warpProgress = 1;
                    const bloom = document.getElementById('bloom-overlay');
                    bloom.style.opacity = '1'; // 畫面閃白/閃金

                    // 在閃白最高峰時，切換場景維度
                    setTimeout(() => {
                        warpParticles.visible = false; // 移除隧道
                        scene.fog.color.setHex(0x050505); // 確保深色禪意底色
                        scene.fog.density = 0.003;
                        
                        camera.position.set(0, 150, 300); // 抬高視角俯視蓮花海
                        camera.lookAt(0, 0, 0);
                        camera.fov = 60; // 恢復正常視野
                        camera.updateProjectionMatrix();

                        lotusGroup.visible = true; // 展現 3D 蓮花海
                        controls.enabled = true;   // 允許手動旋轉縮放
                        controls.autoRotate = true; // 開啟緩慢自轉
                        controls.autoRotateSpeed = 0.5;

                        bloom.style.opacity = '0'; // 迷霧退去
                        document.getElementById('sea-ui').style.opacity = '1'; // 顯示文字
                    }, 1500);
                }
            }

            // 3. 蓮花海的呼吸與轉動邏輯
            if (lotusGroup.visible) {
                lotuses.forEach(lotus => {
                    // 自轉
                    lotus.rotation.y += lotus.userData.rotationSpeed;
                    // 呼吸跳動 (Lotus Pulse)
                    const scale = 1 + Math.sin(time * 2 + lotus.userData.pulseOffset) * 0.1;
                    lotus.scale.set(scale, scale, scale);
                });
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // 視窗自適應
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
