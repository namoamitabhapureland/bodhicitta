<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀願海 · 琉璃法鏡</title>
    <style>
        :root {
            --gold: #d4af37;
            --light-gold: #f3e5ab;
            --deep-red: #8b0000;
            --bg: #030303;
            --glass: rgba(10, 15, 30, 0.6);
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg);
            color: white; font-family: "Noto Serif TC", serif;
            overflow: hidden;
        }

        /* Three.js 星空背景預留區 */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* 滾動容器：一捲一格 */
        #vow-scroller {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            position: relative; z-index: 2;
        }

        /* 每一願的區塊 */
        .vow-section {
            height: 100vh;
            width: 100vw;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            scroll-snap-align: start;
            position: relative;
            perspective: 2000px;
        }

        /* 🏆 琉璃法鏡容器優化 */
        .mirror-wrapper {
            position: relative;
            width: 380px; height: 380px;
            display: flex; justify-content: center; align-items: center;
            transition: all 1.5s cubic-bezier(0.23, 1, 0.32, 1);
            transform: scale(0.8) translateY(50px) rotateX(15deg);
            opacity: 0;
        }

        /* 激活狀態：進場點亮 */
        .vow-section.active .mirror-wrapper {
            transform: scale(1) translateY(0) rotateX(0deg);
            opacity: 1;
        }

        /* 1. 琉璃鏡面核心 */
        .glass-surface {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1) 0%, transparent 60%), var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            z-index: 1;
        }

        /* 2. 動態流動金邊 (SVG) */
        .gold-ring-svg {
            position: absolute; width: 110%; height: 110%;
            top: -5%; left: -5%;
            z-index: 2;
            pointer-events: none;
        }
        .ring-path {
            stroke: var(--gold);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            stroke-linecap: round;
            transition: stroke-dashoffset 2s ease-out 0.5s, stroke 1s;
        }
        
        /* 激活時金邊流動 */
        .vow-section.active .ring-path {
            stroke-dashoffset: 0;
            animation: ring-rotation 20s linear infinite 2.5s;
        }

        @keyframes ring-rotation {
            from { transform: rotate(0deg); transform-origin: center; }
            to { transform: rotate(360deg); transform-origin: center; }
        }

        /* 3. 法力場光暈 */
        .mirror-glow {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%;
            background: transparent;
            z-index: 0;
            transition: 1.5s;
        }
        .vow-section.active .mirror-glow {
            box-shadow: 0 0 80px rgba(212, 175, 55, 0.4), 
                        0 0 40px rgba(212, 175, 55, 0.2), 
                        inset 0 0 60px rgba(212, 175, 55, 0.1);
            animation: glow-breathing 4s infinite ease-in-out 2s;
        }

        @keyframes glow-breathing {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); }
        }

        /* 願文內容 */
        .vow-content {
            z-index: 3; text-align: center;
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer;
        }
        .vow-num {
            font-size: 0.8rem; color: var(--deep-red);
            letter-spacing: 3px; margin-bottom: 20px;
            font-weight: bold;
        }
        .vow-name {
            font-size: 2.4rem; letter-spacing: 10px;
            color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.5);
            transition: color 1s;
        }
        .vow-section.active .vow-name { color: var(--light-gold); text-shadow: 0 0 20px var(--gold); }

        /* 底部裝飾線 */
        .deco-line {
            width: 80px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 25px 0; opacity: 0.5;
        }

        /* 4. 金蓮花綻放動畫 (SVG) */
        .lotus-svg-container {
            width: 50px; height: 50px;
            margin-top: 10px;
        }
        .blooming-lotus {
            fill: var(--gold);
            transform: scale(0);
            transform-origin: center;
            transition: transform 1.2s cubic-bezier(0.17, 0.89, 0.32, 1.49) 1.5s, filter 1s;
        }
        .vow-section.active .blooming-lotus {
            transform: scale(1);
            filter: drop-shadow(0 0 10px var(--gold));
        }

    </style>
</head>
<body>

<div id="bg-canvas"></div>

<div id="vow-scroller">
    </div>

<script>
    const vows = [
        "國無惡道", "不復更生", "各得真金色", "形色無別", "設有姓名", "宿命通", "天眼通", "天耳通", "他心通", "神足通",
        "遍供諸佛", "定成正覺", "光明無量", "觸光安樂", "壽命無量", "聲聞無數", "諸佛稱嘆", "十念必生", "臨終接引", "欲生果遂",
        "悔過生西", "國無婦女", "厭女轉男", "蓮花化生", "天人禮敬", "聞名得福", "修殊勝行", "國無不善", "住正定聚", "樂如漏盡",
        "不墮惡道", "身悉金色", "形貌端嚴", "成佛迅速", "聞名發心", "永離穢行", "善根增長", "聞名得忍", "具足根缺", "現證不退",
        "國土嚴飾", "照見十方", "寶香普薰", "普等三昧", "定中供佛", "獲陀羅尼", "聞名永離", "獲三法忍", "同生極樂"
    ];

    const scroller = document.getElementById('vow-scroller');

    // 蓮花 SVG 圖示代碼
    const lotusSvg = `
        <svg class="lotus-svg-container" viewBox="0 0 24 24">
            <path class="blooming-lotus" d="M12 22C12 22 17 16 17 12C17 8 12 4 12 4C12 4 7 8 7 12C7 16 12 22 12 22Z" />
            <path class="blooming-lotus" d="M12 22C12 22 22 18 22 12C22 8 17 8 12 12" opacity="0.4"/>
            <path class="blooming-lotus" d="M12 22C12 22 2 18 2 12C2 8 7 8 12 12" opacity="0.4"/>
        </svg>
    `;

    vows.forEach((name, i) => {
        const section = document.createElement('div');
        section.className = 'vow-section';
        
        section.innerHTML = `
            <div class="mirror-wrapper">
                <div class="mirror-glow"></div>
                <div class="glass-surface"></div>
                
                <svg class="gold-ring-svg" viewBox="0 0 100 100">
                    <circle class="ring-path" cx="50" cy="50" r="48" transform="rotate(-90 50 50)"/>
                </svg>

                <div class="vow-content" onclick="openVowDetail(${i})">
                    <span class="vow-num">— VOW ${(i+1).toString().padStart(2, '0')} —</span>
                    <div class="vow-name">${name}</div>
                    <div class="deco-line"></div>
                    ${lotusSvg}
                </div>
            </div>
        `;

        scroller.appendChild(section);
    });

    // 監聽滾動，切換發亮狀態
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
            } else {
                entry.target.classList.remove('active');
            }
        });
    }, { threshold: 0.6 });

    document.querySelectorAll('.vow-section').forEach(section => observer.observe(section));

    // 點擊願位的處理函數
    function openVowDetail(index) {
        alert(`契入第 ${index + 1} 願：${vows[index]}\n您寫的深刻內容將在此處浮現...`);
    }
</script>

</body>
</html>
