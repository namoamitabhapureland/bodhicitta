<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀四十八願 ． 解鎖動畫</title>
    <style>
        body {
            margin: 0; padding: 0; background: #000; overflow: hidden;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            user-select: none; -webkit-user-select: none;
        }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* 爆光特效 */
        #universe-flash {
            position: absolute; inset: 0; background: #fff; z-index: 50; 
            opacity: 0; pointer-events: none;
        }
        .flash-active {
            animation: holy-flash 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }
        @keyframes holy-flash {
            0% { opacity: 0; background: #fff; }
            10% { opacity: 1; background: #fff; box-shadow: inset 0 0 100px #d4af37; }
            40% { opacity: 1; background: #f3e5ab; }
            100% { opacity: 0; background: #000; }
        }

        /* 測試用的啟動按鈕 */
        #start-btn {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            z-index: 100; background: transparent; border: 1px solid #d4af37;
            color: #d4af37; padding: 15px 40px; font-size: 1.2rem; letter-spacing: 4px;
            border-radius: 30px; cursor: pointer; backdrop-filter: blur(5px);
            transition: all 0.5s; text-shadow: 0 0 10px rgba(212,175,55,0.5);
        }
        #start-btn:hover { background: rgba(212,175,55,0.2); box-shadow: 0 0 20px rgba(212,175,55,0.4); }
    </style>
</head>
<body>

    <canvas id="vowCanvas"></canvas>
    <div id="universe-flash"></div>
    <button id="start-btn" onclick="startUnlockSequence()">契入願海</button>

    <script>
        const canvas = document.getElementById('vowCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        const FOV = 400;

        // 系統狀態：0=等待, 1=極速加速, 2=蓮花海成形
        let phase = 0; 
        let globalSpeed = 2;
        
        // 星辰/光軌粒子
        let stars = [];
        // 48 願蓮花陣列
        let lotuses = [];
        const lotusPetals = Array.from({length: 12}, (_, i) => i * (Math.PI * 2 / 12));

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
        }
        window.addEventListener('resize', resize); resize();

        // 1. 初始化背景星辰
        for (let i = 0; i < 600; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 4000, 
                y: (Math.random() - 0.5) * 4000, 
                z: Math.random() * 2000,
                baseSpeed: Math.random() * 5 + 2
            });
        }

        // 2. 初始化 48 朵蓮花 (預先設定好它們的最終 3D 座標)
        function initLotuses() {
            lotuses = [];
            for (let i = 0; i < 48; i++) {
                // 利用黃金螺旋分布，產生錯落有致的星海排列
                let angle = i * 2.4; 
                let radius = 100 + i * 25;
                
                // 目標座標 (定格位置)
                let tx = Math.cos(angle) * radius * (Math.random()*0.5 + 0.8);
                let ty = Math.sin(angle) * radius * 0.6 * (Math.random()*0.5 + 0.8);
                // Z 軸決定大小：越小代表越近(大)，越大代表越遠(小)
                let tz = 100 + (Math.random() * 800); 

                lotuses.push({
                    id: i + 1,
                    // 初始位置設定在極遠處，產生飛來的效果
                    x: tx * 3, y: ty * 3, 
                    z: 3000 + (i * 150), // 透過初始 Z 的差距，創造「陸續飛來」的時間差
                    targetX: tx, targetY: ty, targetZ: tz,
                    rot: Math.random() * Math.PI,
                    rotSpeed: (Math.random() - 0.5) * 0.005,
                    opacity: 0,
                    isArrived: false
                });
            }
        }

        // 畫單片蓮花瓣
        function drawPetal(ctx, size) {
            ctx.beginPath(); ctx.moveTo(0, 0);
            ctx.bezierCurveTo(size*0.4, size*0.2, size*0.8, size*0.5, size, 0);
            ctx.bezierCurveTo(size*0.8, -size*0.5, size*0.4, -size*0.2, 0, 0);
            ctx.fill(); ctx.stroke();
        }

        // 畫整朵蓮花
        function drawLotus(cx, cy, scale, opacity, rot) {
            ctx.save(); 
            ctx.translate(cx, cy);
            ctx.rotate(rot);
            let bSize = 60 * scale; // 基準大小
            
            // 優化效能：抵達後才加上重度發光效果
            if (opacity > 0.8) {
                ctx.shadowBlur = 15; 
                ctx.shadowColor = `rgba(212,175,55,${opacity})`;
            }
            
            ctx.fillStyle = `rgba(243,229,171,${opacity*0.15})`; 
            ctx.strokeStyle = `rgba(255,255,255,${opacity*0.8})`; 
            ctx.lineWidth = 1;

            for (let i=0; i<12; i++) {
                ctx.save(); ctx.rotate(lotusPetals[i]); drawPetal(ctx, bSize); ctx.restore();
                ctx.save(); ctx.rotate(lotusPetals[i]+Math.PI/12); drawPetal(ctx, bSize*0.6); ctx.restore();
            }
            // 蓮心
            ctx.beginPath(); ctx.arc(0, 0, 8*scale, 0, Math.PI*2); 
            ctx.fillStyle = `rgba(255,255,255,${opacity})`; ctx.fill();
            ctx.restore();
        }

        // 主渲染迴圈
        function animate() {
            // 背景殘影效果，營造速度感
            ctx.fillStyle = phase === 1 ? 'rgba(0,0,0,0.2)' : 'rgba(5,5,5,0.4)';
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen';

            let cx = width / 2; let cy = height / 2;

            // --- 星辰/光軌渲染 ---
            stars.forEach(star => {
                let sSpeed = star.baseSpeed * globalSpeed;
                let oldZ = star.z;
                star.z -= sSpeed;
                
                if (star.z <= 0) { 
                    star.z = 2000; oldZ = 2000;
                    star.x = (Math.random() - 0.5) * 4000; 
                    star.y = (Math.random() - 0.5) * 4000; 
                }

                let sc = FOV / (FOV + star.z); 
                let sx = cx + star.x * sc; let sy = cy + star.y * sc;

                if (phase === 1) {
                    // 加速期：畫光軌 (Lines)
                    let oldSc = FOV / (FOV + oldZ);
                    let oldSx = cx + star.x * oldSc; let oldSy = cy + star.y * oldSc;
                    ctx.beginPath(); ctx.moveTo(oldSx, oldSy); ctx.lineTo(sx, sy);
                    ctx.strokeStyle = `rgba(243,229,171, ${Math.min(1, sc*2)})`;
                    ctx.lineWidth = sc * 2; ctx.stroke();
                } else {
                    // 平靜期：畫星點 (Dots)
                    ctx.beginPath(); ctx.arc(sx, sy, Math.max(0.5, 2*sc), 0, Math.PI*2);
                    ctx.fillStyle = `rgba(243,229,171, ${Math.min(0.8, sc)})`; ctx.fill();
                }
            });

            // --- 狀態邏輯 ---
            if (phase === 1) {
                // 加速階段：不斷疊加 globalSpeed
                globalSpeed *= 1.02; 
                if (globalSpeed > 150) {
                    // 觸發閃光與轉場
                    document.getElementById('universe-flash').classList.add('flash-active');
                    phase = 2;
                    globalSpeed = 0.5; // 速度驟降，進入祥和的願海
                    initLotuses();
                }
            } 
            else if (phase === 2) {
                // 願海階段：48 蓮花陸續飛入
                lotuses.forEach(lotus => {
                    // 緩動趨近目標 Z 軸 (製造飛來的感覺)
                    if (lotus.z > lotus.targetZ) {
                        lotus.z -= 15; // 飛行速度
                        lotus.opacity = Math.min(1, lotus.opacity + 0.01);
                    } else {
                        lotus.isArrived = true;
                        lotus.opacity = 1;
                    }

                    // 緩動趨近目標 X, Y
                    lotus.x += (lotus.targetX - lotus.x) * 0.05;
                    lotus.y += (lotus.targetY - lotus.y) * 0.05;
                    lotus.rot += lotus.rotSpeed;

                    // 投影到 2D 螢幕
                    if (lotus.z > 0 && lotus.z < 2500) { // 太遠就不畫，省效能
                        let lsc = FOV / (FOV + lotus.z);
                        let lsx = cx + lotus.x * lsc;
                        let lsy = cy + lotus.y * lsc;
                        drawLotus(lsx, lsy, lsc, lotus.opacity, lotus.rot);
                    }
                });
            }

            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }

        // 啟動函數
        function startUnlockSequence() {
            document.getElementById('start-btn').style.opacity = '0';
            document.getElementById('start-btn').style.pointerEvents = 'none';
            phase = 1; // 進入極速期
            globalSpeed = 2;
        }

        animate();
    </script>
</body>
</html>
