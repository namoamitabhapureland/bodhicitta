<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>彌陀大願海：穩定流暢版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        #trigger-ui { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); z-index: 20; }
        .vow-btn {
            background: rgba(212,175,55,0.1); border: 1px solid #d4af37; color: #d4af37; padding: 12px 30px;
            font-size: 1.1rem; cursor: pointer; border-radius: 20px; transition: 0.3s;
        }
        #matrix-wrapper {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            z-index: 30; opacity: 0; pointer-events: none; transition: 1.5s;
        }
        #matrix-7x7 {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px;
            width: 80vw; height: 80vh;
        }
        .matrix-cell {
            border: 1px solid rgba(212,175,55,0.3); display: flex; align-items: center;
            justify-content: center; color: #d4af37; font-size: 0.8rem; background: rgba(0,0,0,0.5);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="trigger-ui"><button class="vow-btn" onclick="startWarp()">進入願海</button></div>
    <div id="canvas-container"></div>
    <div id="matrix-wrapper"><div id="matrix-7x7"></div></div>

    <script>
        // --- 基礎設定 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.z = 1000;

        // 燈光
        scene.add(new THREE.AmbientLight(0x444444));
        const light = new THREE.PointLight(0xffffff, 1, 2000);
        light.position.set(0, 200, 500);
        scene.add(light);

        // --- 建立圓潤金蓮 ---
        function createLotus(size, isMain) {
            const group = new THREE.Group();
            // 貝茲曲線花瓣
            const shape = new THREE.Shape();
            shape.moveTo(0, 0);
            shape.bezierCurveTo(0.4, 0.2, 0.8, 0.5, 1, 0);
            shape.bezierCurveTo(0.8, -0.5, 0.4, -0.2, 0, 0);

            const extrudeSettings = { depth: 0.05, bevelEnabled: true, bevelSize: 0.05, bevelThickness: 0.05 };
            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            
            // 使用 Emissive (發光) 模擬佛光，這不依賴後處理也能亮
            const material = new THREE.MeshStandardMaterial({
                color: isMain ? 0xffffff : 0xccaa00,
                emissive: 0xd4af37,
                emissiveIntensity: isMain ? 1.2 : 0.5,
                metalness: 0.8, roughness: 0.2
            });

            for (let i = 0; i < 12; i++) {
                const petal = new THREE.Mesh(geometry, material);
                const pivot = new THREE.Group();
                petal.rotation.z = Math.PI / 6;
                pivot.rotation.y = (Math.PI * 2 / 12) * i;
                pivot.add(petal);
                group.add(pivot);
            }
            group.scale.set(size, size, size);
            return group;
        }

        const lotusGroup = new THREE.Group();
        const mainLotus = createLotus(150, true);
        lotusGroup.add(mainLotus);
        scene.add(lotusGroup);
        lotusGroup.visible = false;

        // 星空粒子
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<2000; i++) starPos.push((Math.random()-0.5)*3000, (Math.random()-0.5)*3000, (Math.random()-0.5)*3000);
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 2}));
        scene.add(stars);

        // --- 動畫與互動 ---
        let warping = false;
        window.startWarp = function() {
            warping = true;
            document.getElementById('trigger-ui').style.display = 'none';
        }

        function animate() {
            requestAnimationFrame(animate);
            if(warping) {
                camera.position.z -= 10;
                if(camera.position.z < 600) {
                    warping = false;
                    lotusGroup.visible = true;
                    controls.enabled = true;
                }
            }
            lotusGroup.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        // 監聽視窗大小
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
