<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀四十八願 ． 大勢至爆發解鎖</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
        #lengyan-flash {
            position: absolute; inset: 0; background: #fff; z-index: 100; opacity: 0;
            pointer-events: none; transition: opacity 0.1s;
        }
        #ui {
            position: absolute; bottom: 10%; width: 100%; text-align: center; z-index: 200;
        }
        button {
            background: rgba(0,0,0,0.6); color: #d4af37; border: 1px solid #d4af37;
            padding: 12px 30px; border-radius: 30px; cursor: pointer; font-size: 1.1rem;
            letter-spacing: 2px; backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div id="lengyan-flash"></div>
    <canvas id="realmCanvas"></canvas>
    <div id="ui">
        <button id="start-btn" onpointerdown="startUnlock()">長按 ． 凝聚願海</button>
    </div>

<script>
    const canvas = document.getElementById('realmCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, time = 0;

    // 狀態機：0: 平穩流動, 1: 強烈凝聚, 2: 爆發噴湧與定格
    let mode = 0;
    let gravityForce = 0;
    let flashIntensity = 0;

    let stars = [];
    let lotuses = [];
    const FOV = 400;
    let angleX = 0.2, angleY = 0; // 沿用大勢至視角

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
    }
    window.addEventListener('resize', resize); resize();

    // 初始化星辰（五十陰魔 -> 轉化態）
    for(let i=0; i<1000; i++) {
        stars.push({
            x: (Math.random() - 0.5) * 1500, y: (Math.random() - 0.5) * 1500, z: (Math.random() - 0.5) * 1500,
            vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2, vz: (Math.random() - 0.5) * 2,
            hue: Math.random() * 60 + 20, // 初始偏暖色
            isGold: false, s: Math.random() * 2 + 1
        });
    }

    function project3D(x, y, z) {
        let cosX = Math.cos(angleX), sinX = Math.sin(angleX), cosY = Math.cos(angleY), sinY = Math.sin(angleY);
        let y1 = y*cosX - z*sinX, z1 = y*sinX + z*cosX;
        let x2 = x*cosY - z1*sinY, z2 = x*sinY + z1*cosY;
        if(z2 < -FOV+10) return null;
        let scale = FOV / (FOV + z2); 
        return { x: (width/2) + x2*scale, y: (height/2) - y1*scale, scale: scale, z: z2 };
    }

    function initLotuses() {
        lotuses = [];
        for (let i = 0; i < 48; i++) {
            let angle = i * 2.4; let radius = 160 + i * 18;
            lotuses.push({
                x: 0, y: 0, z: 0, // 從中心噴出
                targetX: Math.cos(angle) * radius * 1.2,
                targetY: Math.sin(angle) * radius * 0.7,
                targetZ: 100 + (Math.random() * 800),
                opacity: 0, 
                v: (Math.random() * 0.05 + 0.02), // 噴射速度因子
                rot: Math.random() * Math.PI,
                settled: false
            });
        }
    }

    function drawLotus(ctx, x, y, sc, opacity, rot, isBreathing) {
        ctx.save();
        ctx.translate(x, y);
        if(isBreathing) {
            let b = 1 + Math.sin(time * 3) * 0.05;
            ctx.scale(sc * b, sc * b);
            opacity *= (0.8 + Math.sin(time * 3) * 0.2);
        } else {
            ctx.scale(sc, sc);
        }
        ctx.rotate(rot);
        ctx.shadowBlur = 20 * sc; ctx.shadowColor = "gold";
        ctx.fillStyle = `rgba(243, 229, 171, ${opacity * 0.3})`;
        ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
        ctx.lineWidth = 2;
        // 簡約蓮瓣繪製
        for(let r=0; r<Math.PI*2; r+=Math.PI/6) {
            ctx.beginPath(); ctx.rotate(Math.PI/6);
            ctx.ellipse(30, 0, 30, 12, 0, 0, Math.PI*2);
            ctx.fill(); ctx.stroke();
        }
        ctx.restore();
    }

    function animate() {
        ctx.fillStyle = 'rgba(2, 2, 5, 0.4)';
        ctx.fillRect(0, 0, width, height);
        time += 0.02;

        // 處理閃光
        flashIntensity *= 0.9;
        document.getElementById('lengyan-flash').style.opacity = flashIntensity;

        // 邏輯控制
        if(mode === 1) {
            gravityForce += (1.2 - gravityForce) * 0.04;
            if(gravityForce > 1.15) { // 自動觸發爆發
                mode = 2;
                flashIntensity = 1;
                initLotuses();
                document.getElementById('start-btn').style.display = 'none';
            }
        }

        ctx.globalCompositeOperation = 'screen';

        // 1. 星辰渲染 (大勢至風格)
        stars.forEach(p => {
            if(mode === 1) {
                let dist = Math.sqrt(p.x*p.x + p.y*p.y + p.z*p.z);
                let pull = (gravityForce * 2000) / (dist + 50);
                p.vx -= (p.x / dist) * pull; p.vy -= (p.y / dist) * pull; p.vz -= (p.z / dist) * pull;
                p.vx *= 0.85; p.vy *= 0.85; p.vz *= 0.85;
                if(dist < 50) p.isGold = true;
            } else {
                p.x += p.vx; p.y += p.vy; p.z += p.vz;
            }

            let proj = project3D(p.x, p.y, p.z);
            if(proj) {
                let color = p.isGold ? `rgba(243,229,171,${0.5 + gravityForce*0.5})` : `hsla(${p.hue}, 70%, 50%, 0.3)`;
                ctx.beginPath(); ctx.arc(proj.x, proj.y, p.s * proj.scale, 0, Math.PI*2);
                ctx.fillStyle = color; ctx.fill();
            }
        });

        // 2. 核心金光爆發感
        if(mode === 1) {
            let core = project3D(0,0,0);
            if(core) {
                let r = 80 * core.scale * gravityForce;
                let g = ctx.createRadialGradient(core.x, core.y, 0, core.x, core.y, r*2);
                g.addColorStop(0, '#fff'); g.addColorStop(0.3, '#f3e5ab'); g.addColorStop(1, 'transparent');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(core.x, core.y, r*2, 0, Math.PI*2); ctx.fill();
            }
        }

        // 3. 48願蓮花噴湧 (千佛劫 + 呼吸)
        if(mode === 2) {
            lotuses.forEach(l => {
                // 噴湧算法：向目標坐標緩動
                l.x += (l.targetX - l.x) * 0.05;
                l.y += (l.targetY - l.y) * 0.05;
                l.z += (l.targetZ - l.z) * 0.05;
                l.opacity = Math.min(1, l.opacity + 0.02);
                l.rot += 0.01;

                let proj = project3D(l.x, l.y, l.z);
                if(proj) {
                    let isSettle = Math.abs(l.z - l.targetZ) < 10;
                    drawLotus(ctx, proj.x, proj.y, proj.scale, l.opacity, l.rot, isSettle);
                }
            });
            angleY += 0.002; // 願海緩緩轉動
        }

        ctx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(animate);
    }

    function startUnlock() {
        mode = 1;
    }

    animate();
</script>
</body>
</html>
