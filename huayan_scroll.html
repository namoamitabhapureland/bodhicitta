<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀願海 · 七七法陣</title>
    <style>
        :root {
            --gold: #d4af37;
            --deep-red: #8b0000;
            --bg-dark: #050505;
            --glow: rgba(212, 175, 55, 0.3);
        }

        body { margin: 0; background: var(--bg-dark); overflow: hidden; font-family: "Noto Serif TC", serif; }

        /* 陣法容器優化 */
        #matrix-wrapper {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            z-index: 30; opacity: 1; /* 初始設為1便於開發調試 */
            perspective: 1200px;
            background: radial-gradient(circle at center, rgba(20,0,0,0.5) 0%, transparent 70%);
        }

        #matrix-7x7 {
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            grid-template-rows: repeat(7, 1fr); 
            gap: 8px;
            width: 92vw; height: 92vh; 
            max-width: 850px; max-height: 850px;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.2, 0, 0.2, 1);
        }

        /* 單個願位格子 */
        .matrix-cell {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 2px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: rgba(212, 175, 55, 0.6); 
            font-size: 0.8rem; letter-spacing: 2px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; position: relative; overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        /* 懸浮效果：向行者浮現 */
        .matrix-cell:hover {
            border-color: var(--gold);
            color: #fff;
            background: rgba(30, 20, 10, 0.8);
            transform: translateZ(50px);
            z-index: 10;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px var(--glow);
        }

        /* 編號標註 */
        .cell-num { 
            font-size: 0.6rem; 
            color: var(--deep-red); 
            margin-bottom: 4px; 
            opacity: 0.8;
            font-family: serif;
        }

        /* 願文名稱：直書感 */
        .vow-name {
            writing-mode: vertical-rl;
            text-orientation: upright;
            line-height: 1.2;
            height: 4.5em;
            display: flex; align-items: center;
        }

        /* 中心特殊位次：大白蓮華/彌陀本尊 */
        .cell-center {
            border: 2px solid var(--gold);
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 80%);
            color: #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }
        .cell-center .cell-num { color: var(--gold); }

        /* 掃光動畫效果 */
        .matrix-cell::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: rotate(45deg); transition: 0.8s; opacity: 0;
        }
        .matrix-cell:hover::after { opacity: 1; transform: rotate(45deg) translate(20%, 20%); }

    </style>
</head>
<body>

    <div id="matrix-wrapper">
        <div id="matrix-7x7"></div>
    </div>

    <script>
        const vows = [
            "國無惡道", "不復更生", "各得真金色", "形色無別", "設有姓名", "宿命通", "天眼通", 
            "天耳通", "他心通", "神足通", "遍供諸佛", "定成正覺", "光明無量", "觸光安樂", 
            "壽命無量", "聲聞無數", "諸佛稱嘆", "十念必生", "臨終接引", "欲生果遂", 
            "悔過生西", "國無婦女", "厭女轉男", "蓮花化生", "彌陀本願", /* 25格中心 */
            "天人禮敬", "聞名得福", "修殊勝行", "國無不善", "住正定聚", "樂如漏盡",
            "不墮惡道", "身悉金色", "形貌端嚴", "成佛迅速", "聞名發心", "永離穢行", 
            "善根增長", "聞名得忍", "具足根缺", "現證不退", "國土嚴飾", "照見十方", 
            "寶香普薰", "普等三昧", "定中供佛", "獲陀羅尼", "聞名永離", "獲三法忍"
        ];

        const container = document.getElementById('matrix-7x7');

        vows.forEach((name, index) => {
            const cell = document.createElement('div');
            cell.className = 'matrix-cell';
            if (index === 24) cell.classList.add('cell-center');
            
            // 編號格式：如 01, 02...
            const numStr = (index + 1).toString().padStart(2, '0');
            
            cell.innerHTML = `
                <span class="cell-num">${numStr}</span>
                <span class="vow-name">${name}</span>
            `;

            // 點擊觸發邏輯：導向具體的願文內容
            cell.onclick = () => {
                console.log(`契入第 ${index + 1} 願：${name}`);
                // 這裡可以觸發跳轉，例如：navigateTo(`vow_detail.html?id=${index+1}`);
            };

            container.appendChild(cell);
        });

        // 簡單的陀螺儀/滑鼠視差效果
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 15;
            const y = (e.clientY / window.innerHeight - 0.5) * -15;
            container.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
        });
    </script>
</body>
</html>
