<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>彌陀願海 - 橫向翹曲金蓮</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #d4af37; z-index: 100; font-family: serif; }
        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h2>金蓮願海：實心橫向瓣</h2>
        <p>若畫面全黑，請稍候 3 秒載入核心庫</p>
    </div>

    <script>
        // 1. 基本場景設置
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. 燈光 (讓金屬質感顯現)
        const light = new THREE.PointLight(0xffffff, 1.5, 1000);
        light.position.set(10, 20, 15);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x443311));

        // 3. 建立「橫向往上翹」的花瓣幾何
        function createPetal() {
            const shape = new THREE.Shape();
            // 橫向拉長的水滴形 (X軸為長，Y軸為寬)
            shape.moveTo(0, 0);
            shape.bezierCurveTo(2, 1, 4, 1, 5, 0);
            shape.bezierCurveTo(4, -1, 2, -1, 0, 0);

            const settings = { depth: 0.2, bevelEnabled: true, bevelSize: 0.1 };
            const geo = new THREE.ExtrudeGeometry(shape, settings);
            return geo;
        }

        const lotus = new THREE.Group();
        const petalGeo = createPetal();
        const goldMat = new THREE.MeshStandardMaterial({ 
            color: 0xd4af37, 
            metalness: 0.7, 
            roughness: 0.2,
            emissive: 0x442200 
        });

        // 4. 分三層排列花瓣 (每一層往上翹的角度不同)
        const layers = [
            { count: 12, tilt: -0.2, scale: 1.0 }, // 底層：平展
            { count: 10, tilt: -0.6, scale: 0.8 }, // 中層：微翹
            { count: 8,  tilt: -1.2, scale: 0.6 }  // 內層：包心
        ];

        layers.forEach(config => {
            for (let i = 0; i < config.count; i++) {
                const mesh = new THREE.Mesh(petalGeo, goldMat);
                const pivot = new THREE.Group();
                
                // 調整姿態：橫向往上翹
                mesh.rotation.x = config.tilt; 
                mesh.scale.set(config.scale, config.scale, config.scale);
                
                pivot.rotation.y = (Math.PI * 2 / config.count) * i;
                pivot.add(mesh);
                lotus.add(pivot);
            }
        });

        scene.add(lotus);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        // 5. 動畫迴圈
        function animate() {
            requestAnimationFrame(animate);
            lotus.rotation.y += 0.005; // 蓮花自轉
            renderer.render(scene, camera);
        }

        // 6. 偵錯輔助：如果核心庫載入失敗，會跳出警告
        window.onerror = function(msg) {
            document.getElementById('ui').innerHTML = "<h1 style='color:red'>載入失敗：" + msg + "</h1>";
        };

        // 啟動
        if (typeof THREE !== 'undefined') {
            animate();
        } else {
            document.getElementById('ui').innerHTML = "<h1>核心庫無法載入，請檢查網路</h1>";
        }

        // 視窗縮放
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
