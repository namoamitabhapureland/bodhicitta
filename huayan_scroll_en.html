<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>無量光隧道 ． 彌陀接引</title>
    <style>
        :root {
            --bg-deep: #050205; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
        }
        body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            /* ✨ 徹底封殺手機長按全選與放大鏡 ✨ */
            overflow: hidden; touch-action: none; overscroll-behavior: none;
            -webkit-touch-callout: none; /* iOS Safari */
            -webkit-user-select: none;   /* Safari */
            -khtml-user-select: none;    /* Konqueror HTML */
            -moz-user-select: none;      /* Old versions of Firefox */
            -ms-user-select: none;       /* Internet Explorer/Edge */
            user-select: none;           /* Non-prefixed version */
        }
        * { box-sizing: border-box; }

        #canvas-container { position: absolute; inset: 0; width: 100%; height: 100%; }
        canvas { display: block; width: 100%; height: 100%; }

        /* 終極接引白光層 */
        #flash-layer {
            position: absolute; inset: 0; background: #ffffff; z-index: 50; opacity: 0;
            pointer-events: none; transition: opacity 0.1s ease-out;
        }

        #hint-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--gold); font-family: "PingFang TC", serif;
            text-align: center; letter-spacing: 4px; pointer-events: none;
            transition: opacity 0.8s; z-index: 10;
        }
        .title { font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 20px var(--solid-gold); margin-bottom: 10px; }
        .subtitle { font-size: 0.9rem; color: #aaa; letter-spacing: 2px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="canvas-container">
        <canvas id="gatewayCanvas"></canvas>
    </div>
    
    <div id="flash-layer"></div>

    <div id="hint-ui">
        <div class="title">一萬願力 ． 慈悲接引</div>
        <div class="subtitle">長按加速穿梭 ． 鬆手契入極樂</div>
    </div>

<script>
    const canvas = document.getElementById('gatewayCanvas');
    const ctx = canvas.getContext('2d');
    const flashLayer = document.getElementById('flash-layer');
    const hintUI = document.getElementById('hint-ui');

    let width, height;
    
    // 狀態機: 0=待機, 1=加速隧道(長按), 2=金光吞噬(放手)
    let state = 0; 
    let charge = 0; // 0 to 100 蓄力值
    let speedMult = 1; // 速度倍率
    let isHolding = false;
    let time = 0;
    
    let coreRadius = 0;
    let particles = [];
    const FOV = 400;

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        initParticles();
    }
    window.addEventListener('resize', resize);

    function initParticles() {
        particles = [];
        for(let i=0; i<1500; i++) {
            particles.push({
                x: (Math.random() - 0.5) * 4000,
                y: (Math.random() - 0.5) * 4000,
                z: Math.random() * 3000 + 100,
                baseSpeed: Math.random() * 2 + 1
            });
        }
    }

    function render() {
        time += 0.05;
        let centerX = width / 2;
        let centerY = height / 2;

        // --- 物理與狀態邏輯 ---
        if (state === 0 || state === 1) {
            if (isHolding) {
                state = 1;
                charge += 0.6; // 蓄力時間
                if (charge > 100) charge = 100;
                hintUI.style.opacity = 0;
            } else {
                charge -= 1.5; // 退蓄力
                if (charge <= 0) {
                    charge = 0;
                    state = 0;
                    hintUI.style.opacity = 1;
                }
            }
            // 速度隨著蓄力值呈指數級上升，製造加速隧道感
            speedMult = 1 + Math.pow(charge * 0.15, 2);
            coreRadius = charge * 1.5; 
        } 
        else if (state === 2) {
            // 放手後，中心光丸極速膨脹吞噬螢幕
            coreRadius += (coreRadius * 0.2) + 10; 
            speedMult *= 1.1; // 殘餘粒子繼續加速
            
            if (coreRadius > Math.max(width, height) * 0.8) {
                flashLayer.style.opacity = 1;
            }
        }

        // --- 繪圖 ---
        ctx.fillStyle = 'rgba(5, 2, 8, 0.5)';
        ctx.fillRect(0, 0, width, height);

        ctx.globalCompositeOperation = 'screen';
        
        // 繪製星塵 / 光隧道
        particles.forEach(p => {
            // 粒子往螢幕衝 (Z軸減少)
            p.z -= p.baseSpeed * speedMult; 

            // 粒子循環：衝過螢幕後回到遠方
            if (p.z < 10) {
                p.z = 3000;
                p.x = (Math.random() - 0.5) * 4000;
                p.y = (Math.random() - 0.5) * 4000;
            }

            let scale = FOV / p.z;
            let px = centerX + p.x * scale;
            let py = centerY + p.y * scale;

            // 根據速度決定畫圓點還是拉出光速線條
            if (speedMult > 5) {
                let prevScale = FOV / (p.z + p.baseSpeed * speedMult * 1.5);
                let prevPx = centerX + p.x * prevScale;
                let prevPy = centerY + p.y * prevScale;

                ctx.beginPath();
                ctx.moveTo(prevPx, prevPy);
                ctx.lineTo(px, py);
                ctx.lineWidth = scale * 3;
                ctx.strokeStyle = charge > 80 ? '#ffffff' : '#f3e5ab';
                ctx.shadowBlur = 10 * scale;
                ctx.shadowColor = '#d4af37';
                ctx.stroke();
            } else {
                let fSize = Math.max(0.5, scale * 3);
                ctx.beginPath();
                ctx.arc(px, py, fSize, 0, Math.PI*2);
                ctx.fillStyle = '#f3e5ab';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#d4af37';
                ctx.fill();
            }
        });

        // 繪製遠方極其高貴的「彌陀光丸」
        if (charge > 0 || state === 2) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, coreRadius * 2, 0, Math.PI*2);
            
            let grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, coreRadius * 2);
            grad.addColorStop(0, '#ffffff'); // 純白核心
            grad.addColorStop(0.2, '#f3e5ab'); // 耀眼金黃
            grad.addColorStop(1, 'rgba(212, 175, 55, 0)');
            
            ctx.fillStyle = grad;
            ctx.fill();
        }
        
        ctx.globalCompositeOperation = 'source-over';
        ctx.shadowBlur = 0;

        requestAnimationFrame(render);
    }

    // --- 互動偵測 ---
    function handleDown(e) {
        if(state === 0 || state === 1) isHolding = true;
    }

    function handleUp(e) {
        isHolding = false;
        // 蓄力超過 80% 鬆手，觸發金光吞噬與躍遷
        if ((state === 1 && charge > 80) || charge >= 100) {
            state = 2; 
        }
    }

    canvas.addEventListener('mousedown', handleDown);
    window.addEventListener('mouseup', handleUp);
    canvas.addEventListener('touchstart', handleDown, {passive: false});
    window.addEventListener('touchend', handleUp);

    resize();
    render();
</script>
</body>
</html>
