<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彌陀大願 ． 極樂蓮邦</title>
    <style>
        :root {
            --bg-deep: #020205; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
            --silver: #e0e0e0;
            --text-main: #d0d0d0;
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; overscroll-behavior: none;
            -webkit-touch-callout: none; -webkit-user-select: none; -khtml-user-select: none;
            -moz-user-select: none; -ms-user-select: none; user-select: none;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            color: var(--gold); text-decoration: none; font-size: 0.95rem; font-weight: bold;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3);
            backdrop-filter: blur(5px); transition: all 0.3s;
        }

        #status-panel {
            position: absolute; top: 70px; left: 5%; width: 90%; max-width: 320px;
            background: transparent; border-left: 2px solid rgba(212,175,55,0.6); 
            padding: 10px 20px; z-index: 100; pointer-events: none;
        }
        .status-title { font-size: 1.15rem; font-weight: bold; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px; }
        .status-desc { font-size: 0.85rem; color: #bbb; line-height: 1.8; }

        .matrix-section { position: absolute; inset: 0; background: #000; overflow: hidden; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

        #lengyan-flash { position: absolute; inset: 0; background: #ffffff; z-index: 50; opacity: 0; pointer-events: none; }

        .ui-layer { position: absolute; bottom: 8%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; gap: 12px; }
        
        .switch-btn {
            width: 85%; max-width: 320px; justify-content: center;
            background: linear-gradient(135deg, rgba(15,15,15,0.9), rgba(5,5,5,0.95)); 
            border: 1px solid rgba(212,175,55,0.5); color: var(--gold);
            padding: 14px 20px; border-radius: 30px; font-size: 1rem; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .switch-btn.cyan-mode { border-color: rgba(139,168,156,0.4); color: var(--cyan); }

        #theory-drawer {
            position: fixed; bottom: 0; left: 0; width: 100vw; height: 85vh; background: rgba(5, 5, 8, 0.96); backdrop-filter: blur(20px);
            border-top: 1.5px solid rgba(212,175,55,0.4); border-radius: 25px 25px 0 0; transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 2000; overflow-y: auto; padding-bottom: 80px;
        }
        #theory-drawer.open { transform: translateY(0); }
        .drawer-header { position: sticky; top: 0; background: #050508; padding: 15px; text-align: center; border-bottom: 1px solid rgba(212,175,55,0.2); }
        .close-bar { width: 40px; height: 4px; background: rgba(212,175,55,0.4); border-radius: 2px; margin: 0 auto 10px; }
        .theory-container { padding: 30px 7%; max-width: 720px; margin: 0 auto; }
        .main-title { color: var(--gold); font-size: 1.5rem; text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="back-btn" onclick="window.location.href='index.html?screen=3'">
        回道場
    </div>

    <div id="status-panel">
        <div class="status-title" id="s-title">彌陀願力接引</div>
        <div class="status-desc" id="s-desc">「萬念歸一，光芒四射。」<br>長按螢幕凝聚金光，放手契入極樂。</div>
    </div>

    <section class="matrix-section" id="bg-section">
        <canvas id="realmCanvas"></canvas>
        <div id="lengyan-flash"></div> 
        
        <div class="ui-layer" id="ui-layer">
            <button class="switch-btn" id="btn-jieyin" onclick="toggleRealm(0)">彌陀願力接引</button>
            <button class="switch-btn cyan-mode" id="btn-yuanhai" onclick="toggleRealm(1)">探彌陀48願海</button>
            <button class="switch-btn" id="theory-btn" onclick="openTheoryDrawer()">探究彌陀無量願海</button>
        </div>
    </section>

    <div id="theory-drawer">
        <div class="drawer-header" onclick="closeTheoryDrawer()"><div class="close-bar"></div></div>
        <div class="theory-container">
            <h1 class="main-title">彌陀大願 ． 極樂蓮邦</h1>
            <p style="color: #ccc; line-height: 2;">法海浩瀚，唯佛與佛乃能究盡。當願力圓滿，放下執著之剎那，彌陀之無量光便瞬間遍照法界。</p>
        </div>
    </div>

<script>
    const canvas = document.getElementById('realmCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, time = 0;
    
    let currentRealm = 0; 
    let jieyinParticles = [];
    let yuanhaiParticles = [];
    let extraLotuses = []; // ✨ 新增：用來存放多朵蓮花的座標
    
    let angleX = 0.6, angleY = 0;
    let isDragging = false;
    let lastMouseX = 0, lastMouseY = 0;
    let gravityForce = 0;   
    let flashIntensity = 0; 
    let waveColorBlend = 0; 

    const FOV = 400; 

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize); resize();

    function initEngines() {
        // 1. 接引粒子
        jieyinParticles = [];
        for(let i=0; i<1200; i++) {
            jieyinParticles.push({
                x: (Math.random() - 0.5) * 1200, y: (Math.random() - 0.5) * 1200, z: (Math.random() - 0.5) * 1200,
                vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2, vz: (Math.random() - 0.5) * 2,
                c: Math.random() > 0.5 ? '#f3e5ab' : '#d4af37', s: Math.random() * 2 + 1
            });
        }

        // 2. 願海粒子
        yuanhaiParticles = [];
        for(let r = 20; r <= 800; r += 15) {
            let count = Math.floor(r * 0.4);
            for(let i=0; i<count; i++) {
                let theta = (i / count) * Math.PI * 2;
                yuanhaiParticles.push({ baseX: r * Math.cos(theta), baseY: r * Math.sin(theta), dist: r });
            }
        }

        // ✨ 3. 初始化多朵蓮花的位置
        extraLotuses = [];
        for(let i=0; i<6; i++) { // 額外增加 6 朵
            let r = 150 + Math.random() * 300;
            let angle = Math.random() * Math.PI * 2;
            extraLotuses.push({
                x: Math.cos(angle) * r,
                y: Math.sin(angle) * r,
                z: Math.random() * 20, // 稍微起伏
                scale: 0.3 + Math.random() * 0.4, // 伴隨蓮花較小
                rotOffset: Math.random() * Math.PI, // 初始旋轉偏移
                rotSpeed: (Math.random() - 0.5) * 0.5 // 旋轉速度
            });
        }
    }

    function project3D(x, y, z) {
        let cosX = Math.cos(angleX), sinX = Math.sin(angleX), cosY = Math.cos(angleY), sinY = Math.sin(angleY);
        let y1 = y*cosX - z*sinX, z1 = y*sinX + z*cosX;
        let x2 = x*cosY - z1*sinY, z2 = x*sinY + z1*cosY;
        if(z2 < -FOV+10) return null;
        let scale = FOV / (FOV + z2); 
        return { x: (width/2) + x2*scale, y: (height/2) - y1*scale - 50, scale: scale, z: z2 };
    }

    // ✨ 修改：增加 rotation 參數
    function drawGiantLotus(coreProj, beat, blend, rotation = 0) {
        if(!coreProj) return;
        ctx.save();
        ctx.translate(coreProj.x, coreProj.y);
        
        // ✨ 加入旋轉控制
        ctx.rotate(rotation);

        let s = coreProj.scale * (3.2 + beat * 0.15 + blend * 0.5); 
        ctx.scale(s, s);
        
        ctx.shadowBlur = 20 + blend * 20;
        ctx.shadowColor = '#d4af37';
        
        let petalCount = 12;
        for(let i=0; i<petalCount; i++) {
            ctx.rotate((Math.PI * 2) / petalCount);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(15, -30, 0, -60);
            ctx.quadraticCurveTo(-15, -30, 0, 0);
            let grad = ctx.createLinearGradient(0, 0, 0, -60);
            grad.addColorStop(0, '#d4af37');
            grad.addColorStop(1, blend > 0.5 ? '#fff' : '#f3e5ab');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.lineWidth = 0.5;
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.stroke();
        }
        ctx.restore();
    }

    function renderJieyin() {
        if(isDragging) gravityForce += (1 - gravityForce) * 0.05;
        else gravityForce *= 0.95;

        flashIntensity *= 0.9;
        document.getElementById('lengyan-flash').style.opacity = flashIntensity;

        let projected = [];
        jieyinParticles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.z += p.vz;
            let d = Math.sqrt(p.x*p.x + p.y*p.y + p.z*p.z);
            if(gravityForce > 0.1) {
                let pull = (gravityForce * 1500) / (d + 10);
                p.vx -= (p.x/d)*pull; p.vy -= (p.y/d)*pull; p.vz -= (p.z/d)*pull;
                p.vx *= 0.9; p.vy *= 0.9; p.vz *= 0.9;
            }
            if(Math.abs(p.x) > 600) p.x *= -1;
            let proj = project3D(p.x, p.y, p.z);
            if(proj) projected.push({ ...proj, c: p.c, s: p.s });
        });

        projected.sort((a,b) => b.z - a.z);
        ctx.globalCompositeOperation = 'screen';
        projected.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s*p.scale, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.fill();
        });
        
        // 中心大蓮花（在接引模式也緩慢旋轉）
        drawGiantLotus(project3D(0,0,0), Math.sin(time), gravityForce, time * 0.2);
        ctx.globalCompositeOperation = 'source-over';
    }

    function renderYuanhai() {
        waveColorBlend += ((isDragging ? 1 : 0) - waveColorBlend) * 0.05;
        if(!isDragging) angleY += 0.001;

        let projected = [];
        yuanhaiParticles.forEach(p => {
            let waveZ = Math.sin(p.dist * 0.05 - time * 2) * 30;
            let proj = project3D(p.baseX, p.baseY, waveZ);
            if(proj) {
                let alpha = 0.3 + waveColorBlend * 0.4;
                projected.push({ x: proj.x, y: proj.y, z: proj.z, sc: proj.scale, c: `rgba(212,175,55,${alpha})` });
            }
        });

        projected.sort((a,b) => b.z - a.z);
        ctx.globalCompositeOperation = 'screen';
        projected.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, 2*p.sc, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.fill();
        });

        // ✨ 繪製伴隨的小蓮花
        extraLotuses.forEach(lotus => {
            let waveZ = Math.sin(Math.sqrt(lotus.x*lotus.x + lotus.y*lotus.y) * 0.05 - time * 2) * 30;
            let lp = project3D(lotus.x, lotus.y, lotus.z + waveZ);
            if(lp) {
                // 讓每朵蓮花有自己的旋轉速度與方向
                let rot = time * lotus.rotSpeed + lotus.rotOffset;
                // 稍微縮小 scale 以符合伴隨身分
                let tempProj = { ...lp, scale: lp.scale * lotus.scale };
                drawGiantLotus(tempProj, Math.sin(time + lotus.rotOffset), waveColorBlend, rot);
            }
        });

        // 主蓮花（中心）
        drawGiantLotus(project3D(0, 0, 10), Math.sin(time * 2), waveColorBlend, time * 0.5);
        ctx.globalCompositeOperation = 'source-over';
    }

    function animate() {
        ctx.fillStyle = '#020205';
        ctx.fillRect(0, 0, width, height);
        time += 0.02;
        if (currentRealm === 0) renderJieyin(); 
        else renderYuanhai();
        requestAnimationFrame(animate);
    }

    function toggleRealm(type) {
        currentRealm = type;
        document.getElementById('s-title').innerText = type===0?"彌陀願力接引":"探彌陀48願海";
    }

    function openTheoryDrawer() { document.getElementById('theory-drawer').classList.add('open'); }
    function closeTheoryDrawer() { document.getElementById('theory-drawer').classList.remove('open'); }

    function onDown(e) { 
        if(e.target.closest('.switch-btn') || e.target.closest('#theory-drawer')) return;
        isDragging = true; 
        lastMouseX = e.touches?e.touches[0].clientX:e.clientX; 
        lastMouseY = e.touches?e.touches[0].clientY:e.clientY; 
    }
    function onMove(e) { 
        if (!isDragging || currentRealm === 0) return; 
        let x = e.touches?e.touches[0].clientX:e.clientX; let y = e.touches?e.touches[0].clientY:e.clientY; 
        angleY += (x-lastMouseX)*0.01; angleX += (y-lastMouseY)*0.01; 
        lastMouseX=x; lastMouseY=y; 
    }
    function onUp() { 
        if(currentRealm === 0 && gravityForce > 0.8) flashIntensity = 1;
        isDragging = false; 
    }

    canvas.addEventListener('mousedown', onDown); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
    canvas.addEventListener('touchstart', onDown, {passive: true}); canvas.addEventListener('touchmove', onMove, {passive: true}); window.addEventListener('touchend', onUp);

    initEngines(); animate();
</script>
</body>
</html>
