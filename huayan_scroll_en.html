<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彌陀大願 ． 極樂蓮邦</title>
    <style>
        :root {
            --bg-deep: #020205; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --text-main: #d0d0d0;
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; user-select: none;
        }

        /* 頁面切換控制 */
        .ui-screen { 
            position: absolute; inset: 0; z-index: 100; 
            display: none; flex-direction: column; align-items: center; 
            pointer-events: none; /* 讓點擊穿透到 canvas */
        }
        .ui-screen.active { display: flex; }

        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1001;
            color: var(--gold); text-decoration: none; font-size: 0.95rem; font-weight: bold;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; 
            border: 1px solid rgba(212,175,55,0.3); backdrop-filter: blur(5px);
            pointer-events: auto;
        }

        /* 第一頁 UI 佈局 */
        .title-group { margin-top: 15vh; text-align: center; }
        .main-title { font-size: 1.6rem; color: var(--gold); letter-spacing: 6px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(212,175,55,0.5); }
        .sub-title { font-size: 0.9rem; color: #888; letter-spacing: 2px; }

        .press-container { position: absolute; bottom: 12%; display: flex; flex-direction: column; align-items: center; }
        .progress-ring {
            width: 70px; height: 70px; border-radius: 50%; border: 1.5px solid rgba(212,175,55,0.2);
            display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 10px;
        }
        #progress-fill {
            position: absolute; inset: -1.5px; border-radius: 50%;
            border: 2px solid var(--gold); clip-path: inset(100% 0 0 0); /* 由下而上填滿 */
            transition: clip-path 0.1s linear;
        }
        .press-hint { font-size: 0.8rem; color: var(--gold); opacity: 0.8; letter-spacing: 1px; }

        /* 第二頁 UI 佈局 */
        .bottom-action {
            position: absolute; bottom: 10%; width: 85%; max-width: 320px;
            background: linear-gradient(135deg, rgba(15,20,15,0.9), rgba(5,10,5,0.95));
            border: 1px solid var(--solid-gold); color: var(--gold);
            padding: 16px; border-radius: 35px; font-weight: bold; font-size: 1rem;
            cursor: pointer; pointer-events: auto; text-align: center;
            box-shadow: 0 0 20px rgba(212,175,55,0.2);
        }

        canvas { position: absolute; inset: 0; z-index: 1; }
        #flash-overlay { position: absolute; inset: 0; background: #fff; z-index: 500; opacity: 0; pointer-events: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="back-btn" onclick="window.location.href='index.html?screen=3'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        回道場
    </div>

    <div id="screen1" class="ui-screen active">
        <div class="title-group">
            <div class="main-title">彌陀願力接引</div>
            <div class="sub-title">長按五秒 ． 萬念歸一</div>
        </div>
        <div class="press-container">
            <div class="progress-ring">
                <div id="progress-fill"></div>
                <div style="font-size: 0.7rem; color: var(--gold);">長按</div>
            </div>
            <div class="press-hint">契入無量願海</div>
        </div>
    </div>

    <div id="screen2" class="ui-screen">
        <div class="bottom-action" onclick="alert('進入探究內容...')">
            探究彌陀無量願海
        </div>
    </div>

    <canvas id="realmCanvas"></canvas>
    <div id="flash-overlay"></div>

<script>
    const canvas = document.getElementById('realmCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, time = 0;
    
    // 狀態變數
    let isPressing = false;
    let pressTimer = 0;
    let gravityForce = 0;
    let currentScreen = 1;
    let isTransitioning = false;
    const TARGET_TIME = 5000; // 5秒

    let particles = [];
    const FOV = 400;

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
    }
    window.addEventListener('resize', resize); resize();

    function initParticles() {
        particles = [];
        for(let i=0; i<1000; i++) {
            particles.push({
                x: (Math.random()-0.5)*1200, y: (Math.random()-0.5)*1200, z: (Math.random()-0.5)*1200,
                vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2, vz: (Math.random()-0.5)*2,
                c: Math.random() > 0.5 ? '#f3e5ab' : '#d4af37',
                s: Math.random() * 2 + 1
            });
        }
    }

    function project3D(x, y, z) {
        let scale = FOV / (FOV + z);
        return { x: (width/2) + x*scale, y: (height/2) - y*scale, scale: scale };
    }

    // 繪製金蓮花 (支持呼吸與縮放)
    function drawLotus(proj, beat, strength) {
        if(!proj) return;
        ctx.save();
        ctx.translate(proj.x, proj.y);
        
        // 呼吸邏輯：基礎 0.15 (極小) + 呼吸起伏 + 長按增強
        let breath = (Math.sin(time * 2) + 1) * 0.05;
        let scaleBase = 0.15 + breath + (strength * 3.5); 
        let s = proj.scale * scaleBase;
        ctx.scale(s, s);
        
        ctx.shadowBlur = 10 + strength * 50;
        ctx.shadowColor = '#d4af37';
        
        for(let i=0; i<12; i++) {
            ctx.rotate((Math.PI * 2) / 12);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(15, -30, 0, -60);
            ctx.quadraticCurveTo(-15, -30, 0, 0);
            ctx.fillStyle = `rgba(212, 175, 55, ${0.4 + strength * 0.6})`;
            ctx.fill();
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.2 + strength * 0.3})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }
        ctx.restore();
    }

    function animate() {
        ctx.fillStyle = '#020205';
        ctx.fillRect(0, 0, width, height);
        time += 0.02;

        if (isPressing && !isTransitioning) {
            pressTimer += 16.6; 
            gravityForce += (1 - gravityForce) * 0.03;
            let progress = Math.min(pressTimer / TARGET_TIME, 1);
            document.getElementById('progress-fill').style.clipPath = `inset(${(1 - progress) * 100}% 0 0 0)`;
        } else {
            gravityForce *= 0.94; // 放開後引力消失，粒子開始混亂擴散
            document.getElementById('progress-fill').style.clipPath = `inset(100% 0 0 0)`;
        }

        particles.forEach(p => {
            // 引力運算
            if (gravityForce > 0.05) {
                let d = Math.sqrt(p.x*p.x + p.y*p.y + p.z*p.z);
                let pull = (gravityForce * 2500) / (d + 20);
                p.vx -= (p.x/d)*pull; p.vy -= (p.y/d)*pull; p.vz -= (p.z/d)*pull;
                p.vx *= 0.9; p.vy *= 0.9; p.vz *= 0.9;
            }
            
            p.x += p.vx; p.y += p.vy; p.z += p.vz;

            // 邊界回捲
            if(Math.abs(p.x) > 800) p.vx *= -1;
            if(Math.abs(p.y) > 800) p.vy *= -1;
            if(Math.abs(p.z) > 800) p.vz *= -1;

            let proj = project3D(p.x, p.y, p.z);
            if(proj) {
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, p.s * proj.scale, 0, Math.PI*2);
                ctx.fillStyle = p.c;
                ctx.fill();
            }
        });

        // 繪製蓮花
        let core = project3D(0, 0, 0);
        drawLotus(core, Math.sin(time), gravityForce);

        requestAnimationFrame(animate);
    }

    function switchPage() {
        isTransitioning = true;
        // 觸發爆光效果
        const flash = document.getElementById('flash-overlay');
        flash.style.opacity = '1';
        
        setTimeout(() => {
            document.getElementById('screen1').classList.remove('active');
            document.getElementById('screen2').classList.add('active');
            flash.style.transition = 'opacity 1.5s';
            flash.style.opacity = '0';
            currentScreen = 2;
            isTransitioning = false;
        }, 300);
    }

    // 交互偵測
    function handleDown() {
        if(isTransitioning || currentScreen === 2) return;
        isPressing = true;
        pressTimer = 0;
    }

    function handleUp() {
        if(!isPressing) return;
        if(pressTimer >= TARGET_TIME) {
            switchPage();
        }
        isPressing = false;
    }

    canvas.addEventListener('mousedown', handleDown);
    window.addEventListener('mouseup', handleUp);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleDown(); }, {passive: false});
    window.addEventListener('touchend', handleUp);

    initParticles();
    animate();
</script>
</body>
</html>
