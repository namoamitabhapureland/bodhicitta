<div id="vow-48-module" class="vow-wrapper">
    <style>
        .vow-wrapper {
            width: 100%; margin-top: 35px; margin-bottom: 20px;
            position: relative; border-radius: 20px; overflow: hidden;
            background: #050505; border: 1px solid #222;
            transition: all 1.5s cubic-bezier(0.25, 0.1, 0.25, 1);
            display: flex; flex-direction: column; align-items: center;
            padding: 35px 20px; cursor: pointer;
        }
        /* 封印狀態：深沉內斂 */
        .vow-sealed { box-shadow: inset 0 0 30px rgba(60, 10, 10, 0.4); border-color: rgba(139, 0, 0, 0.2) !important; }
        /* 顯現狀態：金光攝受 */
        .vow-unlocked { box-shadow: 0 0 30px rgba(212,175,55,0.15), inset 0 0 30px rgba(212,175,55,0.1); border-color: #d4af37 !important; }

        #vow-icon { width: 60px; height: 60px; margin-bottom: 15px; transition: all 1.5s; }
        .lotus-pulse { animation: lotus-breathing 4s infinite ease-in-out; }
        @keyframes lotus-breathing {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.08); opacity: 1; }
        }

        /* 莊嚴提示框 */
        .vow-toast {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 0, 0, 0.9); color: #f3e5ab;
            padding: 18px 25px; border-radius: 15px; border: 1px solid #8b0000;
            font-size: 0.9rem; text-align: center; z-index: 10000;
            pointer-events: none; opacity: 0; transition: all 0.8s;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }
    </style>

    <svg id="vow-icon" class="lotus-pulse" viewBox="0 0 24 24" fill="none" stroke-width="1.2">
        <path id="vow-lotus-path" d="M12 22C12 22 17 16 17 12C17 8 12 4 12 4C12 4 7 8 7 12C7 16 12 22 12 22Z" stroke="#8b0000" />
        <path d="M12 22C12 22 22 18 22 12C22 8 17 8 12 12" stroke="#8b0000" opacity="0.3"/>
        <path d="M12 22C12 22 2 18 2 12C2 8 7 8 12 12" stroke="#8b0000" opacity="0.3"/>
        <g id="vow-core-target">
            <circle id="vow-lock-core" cx="12" cy="12" r="2.5" fill="#050505" stroke="#8b0000" stroke-width="1.5" />
        </g>
    </svg>
    
    <div id="vow-title" style="color:#555; font-weight:bold; letter-spacing:2px; transition: 1s;">THE 48 VOWS REALM</div>
    <div id="vow-desc" style="color:#444; font-size:0.8rem; margin-top:8px; transition: 1s;">Accumulate Merit to Reveal</div>

    <script>
        function showVowToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'vow-toast';
            toast.innerHTML = `<div style="color:#d4af37;margin-bottom:8px;font-weight:bold;">【 Realm Sealed 】</div>${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '1'; toast.style.top = '38%'; }, 100);
            setTimeout(() => { toast.style.opacity = '0'; }, 3000);
            setTimeout(() => { toast.remove(); }, 4000);
        }

        (function updateVowVisual() {
            setTimeout(() => {
                let nian = (typeof db !== 'undefined') ? (db.totalNian || 5500) : 0;
                const mod = document.getElementById('vow-48-module');
                const path = document.getElementById('vow-lotus-path');
                const core = document.getElementById('vow-lock-core');
                const title = document.getElementById('vow-title');
                const desc = document.getElementById('vow-desc');

                // 十信位色彩演化 (每 500 聲換一階)
                const faithColors = ['#600000', '#8b0000', '#a52a2a', '#b8860b', '#cd7f32', '#808000', '#556b2f', '#4682b4', '#6a5acd', '#9ca3af'];

                mod.onclick = function() {
                    if (nian >= 5000) {
                        if(document.getElementById('page-transition-curtain')) document.getElementById('page-transition-curtain').style.opacity = '1';
                        setTimeout(() => { window.location.href = '48vows_en.html'; }, 800);
                    } else {
                        if (navigator.vibrate) navigator.vibrate([20, 40, 20]);
                        showVowToast(`Current Merit: ${nian}<br>Required: 5,000 (Ten Faiths)`);
                    }
                };

                if (nian >= 5000) {
                    mod.className = 'vow-wrapper vow-unlocked';
                    path.setAttribute('stroke', '#f3e5ab');
                    path.style.filter = "drop-shadow(0 0 15px rgba(243,229,171,0.6))";
                    document.getElementById('vow-core-target').innerHTML = '<circle cx="12" cy="12" r="3.5" fill="#f3e5ab" filter="blur(1px)"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" /></circle><circle cx="12" cy="12" r="1.5" fill="#fff" />';
                    title.innerText = "VOW OCEAN REVEALED";
                    title.style.color = "#f3e5ab";
                    desc.innerHTML = "Infinite Life Realm Opened.";
                    desc.style.color = "#aaa";
                } else {
                    let stage = Math.floor(nian / 500);
                    let currentColor = faithColors[stage] || faithColors[0];
                    mod.className = 'vow-wrapper vow-sealed';
                    path.setAttribute('stroke', currentColor);
                    path.style.filter = `drop-shadow(0 0 10px ${currentColor}44)`;
                    core.setAttribute('stroke', currentColor);
                    title.innerText = `THE 48 VOWS (STAGE ${stage + 1})`;
                    desc.innerHTML = `Merit: ${nian} / 5000<br>Purifying the Faith Heart...`;
                }
            }, 600);
        })();
    </script>
</div>
