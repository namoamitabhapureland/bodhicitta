<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 48 Vows - Visual Preview</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --deep-red: #8b0000;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 💡 模組主容器：解鎖後的呼吸金光狀態 */
        #vow-48-module {
            width: 320px;
            padding: 40px 20px;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: radial-gradient(circle at center, rgba(212,175,55,0.08) 0%, #050505 100%);
            border: 1px solid rgba(212,175,55,0.6);
            box-shadow: 0 0 40px rgba(212,175,55,0.15), inset 0 0 30px rgba(212,175,55,0.05);
            text-align: center;
            cursor: pointer;
            transition: all 1s cubic-bezier(0.25, 0.1, 0.25, 1);
            animation: vow-glow 6s infinite ease-in-out;
        }

        @keyframes vow-glow {
            0%, 100% { border-color: rgba(212,175,55,0.4); box-shadow: 0 0 20px rgba(212,175,55,0.1); }
            50% { border-color: rgba(212,175,55,0.9); box-shadow: 0 0 50px rgba(212,175,55,0.25); }
        }

        #vow-48-module:active {
            transform: scale(0.97);
            filter: brightness(1.2);
        }

        /* SVG 圖示優化 */
        #vow-icon {
            width: 65px;
            height: 65px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(243,229,171,0.5));
            stroke: var(--gold);
        }

        /* 標題：智慧開顯的質感 */
        #vow-title {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 12px;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(212,175,55,0.6);
            text-transform: uppercase;
        }

        /* 描述：沈穩的灰金感 */
        #vow-desc {
            font-size: 0.9rem;
            letter-spacing: 1px;
            line-height: 1.6;
            color: #aaa;
        }

        /* 裝飾線：增加一點層次 */
        .vow-line {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--solid-gold), transparent);
            margin: 15px auto 0;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="vow-48-module">
        <svg id="vow-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22C12 22 17 16 17 12C17 8 12 4 12 4C12 4 7 8 7 12C7 16 12 22 12 22Z" opacity="0.6"/>
            <path d="M12 22C12 22 22 18 22 12C22 8 17 8 12 12" opacity="0.3"/>
            <path d="M12 22C12 22 2 18 2 12C2 8 7 8 12 12" opacity="0.3"/>
            
            <g id="vow-core-seed">
                <circle cx="12" cy="12" r="3.5" fill="var(--gold)" filter="blur(1px)">
                    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" />
                </circle>
                <circle cx="12" cy="12" r="1.5" fill="#fff" />
            </g>
        </svg>
        
        <div id="vow-title">Vow Ocean Revealed</div>
        <div id="vow-desc">
            Merit Fulfilled.<br>
            Entering the Realm of Infinite Life.
        </div>
        <div class="vow-line"></div>
    </div>

</body>
</html>
