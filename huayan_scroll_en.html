<div id="vow-48-module" class="vow-wrapper">
    <style>
        /* 基礎容器：結界隔離 */
        .vow-wrapper {
            width: 100%; margin-top: 35px; margin-bottom: 20px;
            position: relative; border-radius: 20px; overflow: hidden;
            background: #050505; border: 1px solid #222;
            transition: all 1.5s cubic-bezier(0.25, 0.1, 0.25, 1);
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 20px; cursor: pointer;
        }

        /* 1. 封印狀態：沈穩暗紅，帶有「業力遮蔽」的壓抑感 */
        .vow-sealed { 
            box-shadow: inset 0 0 30px rgba(60, 10, 10, 0.4); 
            border-color: rgba(139, 0, 0, 0.2) !important; 
        }

        /* 2. 顯現狀態：佛光攝受 */
        .vow-unlocked { 
            box-shadow: 0 0 30px rgba(212,175,55,0.15), inset 0 0 30px rgba(212,175,55,0.1); 
            border-color: var(--solid-gold) !important; 
        }

        /* 蓮花法相動畫 */
        #vow-icon { width: 60px; height: 60px; margin-bottom: 15px; transition: all 1.5s; }
        .lotus-pulse { animation: lotus-breathing 4s infinite ease-in-out; }
        
        @keyframes lotus-breathing {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* 自定義「法界提示」樣式 */
        .vow-toast {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 0, 0, 0.85); color: var(--gold);
            padding: 15px 25px; border-radius: 12px; border: 1px solid var(--deep-red);
            font-size: 0.9rem; text-align: center; z-index: 10000;
            pointer-events: none; opacity: 0; transition: all 0.8s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>

    <svg id="vow-icon" class="lotus-pulse" viewBox="0 0 24 24" fill="none" stroke-width="1.2">
        <path id="vow-lotus-path" d="M12 22C12 22 17 16 17 12C17 8 12 4 12 4C12 4 7 8 7 12C7 16 12 22 12 22Z" stroke="#8b0000" />
        <path d="M12 22C12 22 22 18 22 12C22 8 17 8 12 12" stroke="#8b0000" opacity="0.4"/>
        <path d="M12 22C12 22 2 18 2 12C2 8 7 8 12 12" stroke="#8b0000" opacity="0.4"/>
        <circle id="vow-lock-core" cx="12" cy="12" r="2.5" fill="#050505" stroke="#8b0000" stroke-width="1.5" />
    </svg>
    
    <div id="vow-title" style="color:#555; font-weight:bold; letter-spacing:2px;">THE 48 VOWS REALM</div>
    <div id="vow-desc" style="color:#444; font-size:0.8rem; margin-top:8px;">Accumulate Merit to Reveal</div>

    <script>
        function showVowToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'vow-toast';
            toast.innerHTML = `<div style="color:#d4af37;margin-bottom:5px;">【 Realm Sealed 】</div>${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '1'; toast.style.top = '38%'; }, 100);
            setTimeout(() => { toast.style.opacity = '0'; }, 2500);
            setTimeout(() => { toast.remove(); }, 3500);
        }

        function check48VowAccess() {
            let currentNian = (typeof db !== 'undefined') ? (db.totalNian || 0) : 0;
            if (currentNian >= 5000) {
                document.getElementById('page-transition-curtain').style.opacity = '1';
                setTimeout(() => { window.location.href = '48vows_en.html'; }, 800);
            } else {
                if (navigator.vibrate) navigator.vibrate([20, 40, 20]);
                showVowToast(`Current Merit: ${currentNian}<br>Required: 5,000 (Ten Faiths)`);
            }
        }

       (function updateVowVisual() {
    // 稍微延遲執行，確保主系統 db 已經載入完成
    setTimeout(() => {
        let nian = (typeof db !== 'undefined') ? (db.totalNian || 0) : 0;
        const mod = document.getElementById('vow-48-module');
        const path = document.getElementById('vow-lotus-path');
        const core = document.getElementById('vow-lock-core');
        const title = document.getElementById('vow-title');
        const desc = document.getElementById('vow-desc');

        // 十信位色彩矩陣：從深紅無明到清淨琉璃
        const faithColors = [
            '#600000', // 0-500: 信心 (暗紅)
            '#8b0000', // 501-1000: 念心 (硃砂)
            '#a52a2a', // 1001-1500: 精進心 (琥珀)
            '#b8860b', // 1501-2000: 慧心 (焦糖金)
            '#cd7f32', // 2001-2500: 定心 (古銅)
            '#808000', // 2501-3000: 不退心 (橄欖綠)
            '#556b2f', // 3001-3500: 迴向心 (翠青)
            '#4682b4', // 3501-4000: 護法心 (鋼藍)
            '#6a5acd', // 4001-4500: 戒心 (靛紫)
            '#9ca3af'  // 4501-4999: 願心 (幻銀)
        ];

        if (nian >= 5000) {
            // 🔓 圓滿狀態：顯現彌陀願海金
            mod.className = 'vow-wrapper vow-unlocked';
            path.setAttribute('stroke', '#f3e5ab');
            path.style.filter = "drop-shadow(0 0 15px rgba(243,229,171,0.6))";
            core.setAttribute('fill', '#f3e5ab');
            core.setAttribute('stroke', '#fff');
            title.innerText = "VOW OCEAN REVEALED";
            title.style.color = "#f3e5ab";
            desc.innerHTML = "Infinite Life Realm Opened.";
        } else {
            // 🔒 封印/演化狀態
            let stage = Math.floor(nian / 500);
            let currentColor = faithColors[stage] || faithColors[0];
            
            mod.className = 'vow-wrapper vow-sealed';
            path.setAttribute('stroke', currentColor);
            // 根據區間內的進度 (0~499)，微調發光強度
            let subProgress = (nian % 500) / 500;
            let glowIntensity = 5 + (subProgress * 10); 
            path.style.filter = `drop-shadow(0 0 ${glowIntensity}px ${currentColor})`;
            
            core.setAttribute('stroke', currentColor);
            title.innerText = `THE 48 VOWS (STAGE ${stage + 1})`;
            desc.innerHTML = `Merit: ${nian} / 5000<br>Purifying the Faith Heart...`;
        }
    }, 600);
})();


    </script>
</div>
