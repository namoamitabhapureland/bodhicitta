<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>無量光隧道 ． 彌陀接引</title>
    <style>
        :root {
            --bg-deep: #050205; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --pure-light: #ffffff;
        }
          body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            /* ✨ 徹底封殺手機長按全選與放大鏡 ✨ */
            overflow: hidden; touch-action: none; overscroll-behavior: none;
            -webkit-touch-callout: none; /* iOS Safari */
            -webkit-user-select: none;   /* Safari */
            -khtml-user-select: none;    /* Konqueror HTML */
            -moz-user-select: none;      /* Old versions of Firefox */
            -ms-user-select: none;       /* Internet Explorer/Edge */
            user-select: none;           /* Non-prefixed version */
        }
        * { box-sizing: border-box; }

        #canvas-container { position: absolute; inset: 0; width: 100%; height: 100%; }
        canvas { display: block; width: 100%; height: 100%; }

        /* ✨ 完美繼承大勢至的開悟爆光特效 ✨ */
        #lengyan-flash {
            position: absolute; inset: 0; background: #ffffff; z-index: 50; opacity: 0;
            pointer-events: none; transition: opacity 0.1s ease-out;
        }

        #hint-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--gold); font-family: "PingFang TC", serif;
            text-align: center; letter-spacing: 4px; pointer-events: none;
            transition: opacity 0.8s; z-index: 10;
        }
        .title { font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 20px var(--solid-gold); margin-bottom: 10px; }
        .subtitle { font-size: 0.9rem; color: #aaa; letter-spacing: 2px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="canvas-container">
        <canvas id="gatewayCanvas"></canvas>
    </div>
    
    <div id="lengyan-flash"></div>

    <div id="hint-ui">
        <div class="title">無量光海 ． 慈悲接引</div>
        <div class="subtitle">長按凝聚大願 ． 鬆手契入極樂</div>
    </div>

<script>
    const canvas = document.getElementById('gatewayCanvas');
    const ctx = canvas.getContext('2d');
    const flashLayer = document.getElementById('lengyan-flash');
    const hintUI = document.getElementById('hint-ui');

    let width, height;
    
    // 狀態機: 0=待機, 1=長按凝聚(大勢至引力), 2=光隧道躍遷, 3=極樂平息
    let state = 0; 
    let charge = 0; 
    let isHolding = false;
    let time = 0;
    
    // 躍遷核心半徑
    let coreRadius = 0;

    // 光塵粒子
    let particles = [];
    const FOV = 400;

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        initParticles();
    }
    window.addEventListener('resize', resize);

    function initParticles() {
        particles = [];
        for(let i=0; i<1200; i++) {
            particles.push({
                x: (Math.random() - 0.5) * 3000,
                y: (Math.random() - 0.5) * 3000,
                z: Math.random() * 2000 + 100,
                baseSpeed: Math.random() * 2 + 0.5
            });
        }
    }

    function render() {
        time += 0.05;
        let centerX = width / 2;
        let centerY = height / 2;

        // 狀態邏輯更新
        if (state === 0 || state === 1) {
            if (isHolding) {
                state = 1;
                charge += 1; 
                if (charge > 100) charge = 100;
                hintUI.style.opacity = 0;
            } else {
                charge -= 1.5; 
                if (charge <= 0) {
                    charge = 0;
                    state = 0;
                    hintUI.style.opacity = 1;
                }
            }
            coreRadius = charge * 1.2; // 蓄力時的核心大小
        } 
        else if (state === 2) {
            // 光隧道躍遷：核心光丸以指數級速度膨脹，吞噬螢幕
            coreRadius += (coreRadius * 0.15) + 5; 
            
            // 當光丸超越螢幕邊界，觸發白光爆發
            if (coreRadius > Math.max(width, height) * 0.8) {
                flashLayer.style.transition = 'opacity 0.1s ease-out';
                flashLayer.style.opacity = 1;
                
                // 進入平息狀態
                state = 3;
                setTimeout(() => {
                    flashLayer.style.transition = 'opacity 2.5s ease-in-out';
                    flashLayer.style.opacity = 0;
                }, 400);
            }
        }

        // 繪製背景 (深邃宇宙)
        ctx.fillStyle = 'rgba(5, 2, 8, 0.4)';
        ctx.fillRect(0, 0, width, height);

        // 繪製 3D 光塵粒子
        ctx.globalCompositeOperation = 'screen';
        particles.forEach(p => {
            let pSpeed = p.baseSpeed;
            
            if (state === 1) {
                // 蓄力時：粒子被吸向中央 (大勢至引力)
                p.z -= pSpeed * (charge * 0.2); 
            } else if (state === 2) {
                // 躍遷時：粒子化為光速隧道線條
                p.z -= pSpeed * 60; 
            } else if (state === 3) {
                // 極樂平息：緩慢漂浮
                p.z -= pSpeed * 0.5;
            }

            // 粒子循環
            if (p.z < 10) {
                p.z = 2000;
                p.x = (Math.random() - 0.5) * 3000;
                p.y = (Math.random() - 0.5) * 3000;
            }

            let scale = FOV / p.z;
            let px = centerX + p.x * scale;
            let py = centerY + p.y * scale;

            if (state === 2) {
                // 光隧道尾跡
                let prevScale = FOV / (p.z + pSpeed * 60);
                let prevPx = centerX + p.x * prevScale;
                let prevPy = centerY + p.y * prevScale;

                ctx.beginPath();
                ctx.moveTo(prevPx, prevPy);
                ctx.lineTo(px, py);
                ctx.lineWidth = scale * 2.5;
                ctx.strokeStyle = '#f3e5ab';
                ctx.shadowBlur = 10 * scale;
                ctx.shadowColor = '#d4af37';
                ctx.stroke();
            } else {
                // 圓形光塵
                let fSize = Math.max(0.5, scale * 3);
                ctx.beginPath();
                ctx.arc(px, py, fSize, 0, Math.PI*2);
                ctx.fillStyle = charge > 50 ? '#ffffff' : '#f3e5ab';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#d4af37';
                ctx.fill();
            }
        });

        // 繪製中央高貴的「彌陀光丸」與隧道發光體
        if (state === 1 || state === 2) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, coreRadius * 2, 0, Math.PI*2);
            
            let grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, coreRadius * 2);
            grad.addColorStop(0, '#ffffff'); // 純白極亮核心
            grad.addColorStop(0.3, '#f3e5ab'); // 柔和金光
            grad.addColorStop(1, 'rgba(212, 175, 55, 0)'); // 融於虛空
            
            ctx.fillStyle = grad;
            ctx.fill();

            // 蓄力高於 50% 時，中心出現更神聖的光暈呼吸
            if (state === 1 && charge > 50) {
                let pulse = Math.sin(time * 8) * 10;
                ctx.beginPath();
                ctx.arc(centerX, centerY, coreRadius * 0.5 + pulse, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#ffffff';
                ctx.fill();
            }
        }
        
        ctx.globalCompositeOperation = 'source-over';
        ctx.shadowBlur = 0;

        requestAnimationFrame(render);
    }

    // --- 觸控與滑鼠事件 ---
    function handleDown(e) {
        if(state === 0 || state === 1) isHolding = true;
    }

    function handleUp(e) {
        isHolding = false;
        // 蓄力超過 70% 放手，觸發光隧道躍遷
        if ((state === 1 && charge > 70) || charge >= 100) {
            state = 2; // 進入光速隧道狀態
        }
    }

    canvas.addEventListener('mousedown', handleDown);
    window.addEventListener('mouseup', handleUp);
    canvas.addEventListener('touchstart', handleDown, {passive: false});
    window.addEventListener('touchend', handleUp);

    resize();
    render();
</script>
</body>
</html>
