<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏世界海 (Avatamsaka Universe)</title>
    <style>
        :root {
            --spin-val: 0;
            --tilt-val: 75;
        }

        body { 
            margin: 0; background: #030305; color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; perspective: 1000px; 
            touch-action: none; 
        }

        /* 大日如來 一真法界之光 (最上方) */
        .vairocana-light {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center 20%, rgba(255,255,255,0.15) 0%, rgba(212,175,55,0.08) 30%, rgba(3,3,5,0.95) 80%);
            z-index: 0; animation: divine-breath 8s infinite alternate ease-in-out;
            pointer-events: none;
        }
        @keyframes divine-breath {
            0% { opacity: 0.7; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        /* 宇宙空間容器 (負責上下傾斜) */
        #universe-container {
            position: absolute; top: 55%; left: 50%;
            width: 0; height: 0;
            transform-style: preserve-3d;
            transform: rotateX(calc(var(--tilt-val) * 1deg)); 
            z-index: 2;
        }

        /* 旋轉的華藏世界本體 */
        #world {
            position: absolute; top: 0; left: 0;
            transform-style: preserve-3d;
            transform: rotateZ(calc(var(--spin-val) * 1deg));
        }

        /* 最底部：無盡香水海 */
        .perfume-ocean {
            position: absolute; top: 0; left: 0;
            width: 1000px; height: 1000px;
            background: radial-gradient(circle, rgba(139,168,156,0.15) 0%, rgba(212,175,55,0.05) 40%, transparent 70%);
            transform: translate(-50%, -50%) translateZ(-40px);
            border-radius: 50%;
            border: 1px dashed rgba(139,168,156,0.2);
            animation: ocean-flow 15s infinite linear;
        }
        @keyframes ocean-flow {
            100% { transform: translate(-50%, -50%) translateZ(-40px) rotateZ(360deg); }
        }

        /* 3D 大蓮華 */
        #lotus-ocean {
            position: absolute; top: 0; left: 0;
            width: 600px; height: 600px;
            transform: translate(-50%, -50%);
            transform-style: preserve-3d;
        }

        /* --- 垂直光點系統 --- */
        .tier-node {
            position: absolute; top: 0; left: 0;
            transform-style: preserve-3d;
        }
        
        /* 一般樓層的微小光點 (恢復截圖美學) */
        .dot-normal {
            position: absolute;
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(255,255,255,0.6);
            box-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(212,175,55,0.3);
            /* 讓光點永遠面向鏡頭，保持圓潤 */
            transform: translate(-50%, -50%) rotateZ(calc(var(--spin-val) * -1deg)) rotateX(calc(var(--tilt-val) * -1deg));
        }

        /* 第十三層：大金球 */
        .dot-13-sun {
            position: absolute;
            width: 20px; height: 20px; border-radius: 50%;
            background: #fff; border: 2px solid #d4af37;
            box-shadow: 0 0 20px #f3e5ab, 0 0 40px #d4af37, inset 0 0 8px #d4af37;
            transform: translate(-50%, -50%) rotateZ(calc(var(--spin-val) * -1deg)) rotateX(calc(var(--tilt-val) * -1deg));
            animation: pulse-sun 2s infinite alternate ease-in-out;
            cursor: pointer; pointer-events: auto;
        }
        @keyframes pulse-sun { 
            0% { box-shadow: 0 0 15px #d4af37; } 
            100% { box-shadow: 0 0 40px #f3e5ab, 0 0 80px #d4af37; } 
        }

        /* 永遠面向使用者的標籤廣告牌 */
        .billboard-label {
            position: absolute;
            /* 將標籤向右推開，形成公轉半徑，不與光柱重疊 */
            left: 35px; top: -10px; 
            width: 220px;
            color: #f3e5ab; font-size: 0.95rem; font-weight: bold; letter-spacing: 2px;
            text-shadow: 0 0 15px #d4af37, 0 0 5px #000; pointer-events: none;
            /* 抵銷世界的旋轉與傾斜 */
            transform-style: preserve-3d;
            transform: rotateZ(calc(var(--spin-val) * -1deg)) rotateX(calc(var(--tilt-val) * -1deg));
            transition: opacity 0.3s;
        }

        /* 觸控引導 */
        #touch-guide {
            position: absolute; bottom: 8%; color: rgba(243,229,171,0.6);
            font-size: 0.85rem; letter-spacing: 2px; pointer-events: none;
            animation: fade-guide 4s infinite alternate; z-index: 50;
        }
        @keyframes fade-guide { 0% { opacity: 0.2; } 100% { opacity: 1; } }

        /* 資訊卡片 */
        #info-card {
            position: absolute; top: 15%; width: 85%; max-width: 400px;
            background: linear-gradient(145deg, rgba(10,12,18,0.95), rgba(5,5,8,0.98)); 
            border: 1px solid #d4af37; border-radius: 20px; padding: 30px; text-align: center; z-index: 1000;
            display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.1);
        }
        .btn-enter {
            margin-top: 25px; padding: 15px 30px; border-radius: 30px; width: 100%;
            background: linear-gradient(145deg, #d4af37, #b08d2b); color: #000; font-weight: bold; 
            border: none; font-size: 1rem; cursor: pointer; letter-spacing: 2px; 
            box-shadow: 0 0 20px rgba(212,175,55,0.4);
        }
    </style>
</head>
<body>

    <div class="vairocana-light"></div>
    <div id="touch-guide">👆 滑動指尖 ． 探索華藏法界 👇</div>

    <div id="universe-container">
        <div id="world">
            
            <div class="perfume-ocean"></div>

            <div id="lotus-ocean">
                <svg viewBox="0 0 200 200" style="width:100%; height:100%; filter: drop-shadow(0 0 20px rgba(139,168,156,0.2));">
                    <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(139,168,156,0.3)" stroke-width="0.5" stroke-dasharray="1 4"/>
                    <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
                    <path d="M100 0 L 100 200 M 0 100 L 200 100" stroke="rgba(212,175,55,0.1)" stroke-width="0.5"/>
                    <g stroke="rgba(212,175,55,0.6)" fill="none" stroke-width="0.8">
                        <path d="M100 20 C 130 50, 120 90, 100 100 C 80 90, 70 50, 100 20" />
                        <path d="M100 180 C 130 150, 120 110, 100 100 C 80 110, 70 150, 100 180" />
                        <path d="M20 100 C 50 130, 90 120, 100 100 C 90 80, 50 70, 20 100" />
                        <path d="M180 100 C 150 130, 110 120, 100 100 C 110 80, 150 70, 180 100" />
                        <g transform="rotate(45 100 100)" stroke="rgba(243,229,171,0.4)" stroke-width="0.6">
                            <path d="M100 30 C 120 50, 110 90, 100 100 C 80 90, 80 50, 100 30" />
                            <path d="M100 170 C 120 150, 110 110, 100 100 C 80 110, 80 150, 100 170" />
                            <path d="M30 100 C 50 120, 90 110, 100 100 C 90 80, 50 80, 30 100" />
                            <path d="M170 100 C 150 120, 110 110, 100 100 C 110 80, 150 80, 170 100" />
                        </g>
                    </g>
                    <circle cx="100" cy="100" r="18" fill="rgba(255,255,255,0.05)" stroke="#d4af37" stroke-width="1.5"/>
                </svg>
            </div>

            <div id="tiers-container"></div>

        </div>
    </div>

    <div id="info-card">
        <div style="position:absolute; top:15px; right:20px; color:#888; font-size:1.5rem; cursor:pointer;" onclick="document.getElementById('info-card').style.display='none'">×</div>
        <h3 style="color:#f3e5ab; margin-top:5px; font-size: 1.3rem; letter-spacing: 2px;">第十三層<br><span style="font-size:1rem; color:#8ba89c;">娑婆與極樂</span></h3>
        <p style="color:#ccc; font-size:0.9rem; line-height:1.8; text-align:justify; margin: 15px 0;">
            您已觸及一真法界之核心。<br><br>
            在無盡的華藏世界海中，我們所在的<span style="color:#d4af37;">娑婆世界</span>與阿彌陀佛的<span style="color:#d4af37;">極樂世界</span>，皆安住於此第十三層。娑婆居中，極樂在西。<br><br>
            無量劫的流浪，是時候從娑婆起修，一念迴光，歸向極樂。
        </p>
        <button class="btn-enter" onclick="window.location.href='https://namoamitabhapureland.github.io/bodhicitta/'">
            歸向彌陀淨土系統
        </button>
    </div>

    <script>
        const tiersContainer = document.getElementById('tiers-container');
        
        // 生成 20 層垂直光點
        for(let i = 1; i <= 20; i++) {
            let node = document.createElement('div');
            node.className = 'tier-node';
            
            // 每一層的高度間距 (Z軸)
            let zVal = i * 28; 
            node.style.transform = `translateZ(${zVal}px)`;

            if(i === 13) {
                // 第 13 層：大金球與公轉標籤
                let sunDot = document.createElement('div');
                sunDot.className = 'dot-13-sun';
                
                let label = document.createElement('div');
                label.className = 'billboard-label';
                label.innerHTML = '第十三層：娑婆 / 極樂';
                
                sunDot.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById('info-card').style.display = 'block';
                    if (navigator.vibrate) navigator.vibrate([30]);
                };

                node.appendChild(sunDot);
                node.appendChild(label);
            } else {
                // 其他層：精緻的小光點
                let normalDot = document.createElement('div');
                normalDot.className = 'dot-normal';
                
                // 越往上的光點稍微亮一點，呼應大日如來之光
                let opacity = 0.4 + (i * 0.03);
                normalDot.style.background = `rgba(255,255,255,${opacity})`;
                
                node.appendChild(normalDot);
            }
            tiersContainer.appendChild(node);
        }

        // --- 觸控互動 ---
        let root = document.documentElement;
        let isDragging = false;
        let startX, startY;
        let currentTilt = 72;   
        let currentSpin = 0;    

        setInterval(() => {
            if(!isDragging) {
                currentSpin -= 0.15;
                root.style.setProperty('--spin-val', currentSpin);
            }
        }, 30);

        document.addEventListener('pointerdown', (e) => {
            if(e.target.closest('#info-card') || e.target.closest('.dot-13-sun')) return;
            isDragging = true;
            startX = e.clientX || e.touches[0].clientX;
            startY = e.clientY || e.touches[0].clientY;
            document.getElementById('touch-guide').style.display = 'none';
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            currentSpin += (x - startX) * 0.4;
            currentTilt -= (y - startY) * 0.2;
            
            if (currentTilt > 85) currentTilt = 85; 
            if (currentTilt < 50) currentTilt = 50; 

            root.style.setProperty('--spin-val', currentSpin);
            root.style.setProperty('--tilt-val', currentTilt);

            startX = x; startY = y;
        });

        document.addEventListener('pointerup', () => isDragging = false);
        document.addEventListener('pointercancel', () => isDragging = false);
    </script>
</body>
</html>
