<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華嚴大世界 ． 宏觀法界</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --bg-deep: #020205;
        }

        body { 
            margin: 0; background: var(--bg-deep); color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; perspective: 1200px; 
            touch-action: none;
        }

        .vairocana-light {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.08) 0%, rgba(212,175,55,0.02) 40%, transparent 80%);
            z-index: 0; animation: divine-breath 12s infinite alternate ease-in-out;
            pointer-events: none;
        }
        @keyframes divine-breath {
            0% { opacity: 0.5; transform: scale(0.9); filter: drop-shadow(0 0 30px rgba(212,175,55,0.1)); }
            100% { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 80px rgba(255,255,255,0.2)); }
        }

        /* 宇宙空間總控制 (確保整體能在畫面中) */
        #universe-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transform: rotateX(75deg) scale(0.8); /* 稍微縮小，讓高樓能全部收進來 */
            transition: transform 0.1s ease-out;
            z-index: 2;
        }

        /* ✨ 絕對核心 (0x0 座標)：錨定所有分離Bug的關鍵 ✨ */
        #lotus-ocean {
            position: absolute; 
            top: 65%; left: 50%; /* 將底盤下降，留出天空給大樓 */
            width: 0; height: 0; /* 鎖死為 0，所有子元素皆以絕對中心向外長 */
            transform-style: preserve-3d;
        }

        .svg-glow {
            position: absolute; 
            width: 1200px; height: 1200px;
            left: -600px; top: -600px; /* 絕對置中 */
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.2));
            z-index: 1;
        }

        /* V10 完美 3D 蓮花容器 */
        #standing-lotus {
            position: absolute; top: 0; left: 0;
            transform-style: preserve-3d;
            z-index: 2;
        }
        .petal-3d {
            position: absolute; bottom: 0; 
            transform-origin: bottom center; 
            transform-style: preserve-3d;
            filter: drop-shadow(0 0 10px rgba(212,175,55,0.2));
            pointer-events: none; /* 避免花瓣擋住點擊 */
        }
        .petal-svg { width: 100%; height: 100%; overflow: visible; }

        /* V10 2D 蓮花陣眼 */
        #classic-lotus-wrapper {
            position: absolute; 
            width: 200px; height: 200px;
            top: -100px; left: -100px; /* 絕對置中 */
            z-index: 3;
            filter: drop-shadow(0 0 20px rgba(212,175,55,0.8));
            transform-style: preserve-3d;
            pointer-events: none;
        }

        /* 全息鋼骨大樓 */
        #world-tower {
            position: absolute; top: 0; left: 0;
            width: 0; height: 0;
            transform-style: preserve-3d;
            z-index: 10;
        }

        /* ✨ 修正：壓縮樓層間距，光柱高度壓縮到 550px，保證不碰頂！ ✨ */
        .central-beam {
            position: absolute;
            top: 0; left: -1px; 
            width: 2px;
            height: 550px; /* 從 900px 壓縮到 550px，保證入鏡！ */
            background: linear-gradient(to bottom, rgba(255,255,255,0.8) 0%, rgba(212,175,55,0.8) 30%, rgba(139,168,156,0.3) 100%);
            box-shadow: 0 0 20px rgba(212,175,55,0.5);
            transform-origin: top center;
            transform: rotateX(90deg); /* 向上直立 */
            pointer-events: none;
        }

        .tier-layer {
            position: absolute; top: 0; left: 0;
            transform-style: preserve-3d;
            pointer-events: none; /* 防止層與層之間互相阻擋點擊 */
        }

        /* 實體透明玻璃盤 (包含框與面都有顏色) */
        .tier-disk {
            position: absolute;
            border-radius: 50%;
            border-width: 1.5px; 
            transform-style: preserve-3d;
            pointer-events: none; /* 玻璃盤不能擋住點擊 */
        }
        /*十字結構線*/
        .tier-disk::before, .tier-disk::after {
            content: ''; position: absolute; background: currentColor; opacity: 0.3;
        }
        .tier-disk::before { top: 50%; left: 0; width: 100%; height: 1px; margin-top: -0.5px; }
        .tier-disk::after { top: 0; left: 50%; width: 1px; height: 100%; margin-left: -0.5px; }

        /* ✨ 光點必須可以被點擊 ✨ */
        .tier-dot {
            position: absolute; border-radius: 50%; cursor: pointer;
            transition: all 0.4s ease; transform-style: preserve-3d;
            pointer-events: auto; /* 強制開啟點擊 */
        }

        /* 13 層特化 */
        .tier-13-disk {
            border: 2px solid rgba(212,175,55,0.8) !important;
            background-color: rgba(212,175,55,0.2) !important;
            box-shadow: 0 0 20px rgba(212,175,55,0.3), inset 0 0 15px rgba(212,175,55,0.2);
        }
        .tier-13-dot {
            background: #fff !important; border: 2px solid var(--solid-gold);
            box-shadow: 0 0 20px var(--gold) !important;
            animation: pulse-13 2s infinite alternate ease-in-out;
        }
        @keyframes pulse-13 { 
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(212,175,55,0.5); } 
            100% { transform: scale(1.3); box-shadow: 0 0 25px var(--solid-gold); } 
        }

        /* 看板文字 (在 3D 空間中立起來) */
        .tier-label {
            position: absolute; left: 25px; top: -10px; width: 220px;
            color: rgba(243,229,171,0.9); font-size: 1.1rem; font-weight: bold; letter-spacing: 2px;
            text-shadow: 0 0 10px #000, 0 0 15px rgba(212,175,55,0.6); 
            transform-origin: left center;
            transform: rotateX(-90deg); /* 直立面對鏡頭 */
            pointer-events: auto; /* 文字也可以點擊 */
            cursor: pointer;
        }

        #touch-guide {
            position: absolute; bottom: 8%; color: rgba(243,229,171,0.6);
            font-size: 0.9rem; letter-spacing: 3px; pointer-events: none;
            animation: fade-guide 4s infinite alternate; z-index: 50;
        }
        @keyframes fade-guide { 0% { opacity: 0.2; } 100% { opacity: 1; text-shadow: 0 0 10px var(--gold); } }

        /* 卡片 */
        #info-card {
            position: absolute; top: 15%; width: 85%; max-width: 400px; background: linear-gradient(145deg, rgba(15,20,30,0.9), rgba(5,5,10,0.95)); backdrop-filter: blur(15px); border: 1.5px solid var(--solid-gold); border-radius: 24px; padding: 30px; text-align: center; z-index: 100; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.15);
        }
        .btn-enter {
            margin-top: 25px; padding: 16px 35px; border-radius: 40px; width: 100%; background: linear-gradient(145deg, #d4af37, #b08d2b); color: #000; font-weight: bold; border: 1px solid var(--gold); font-size: 1.05rem; cursor: pointer; letter-spacing: 3px; box-shadow: 0 0 30px rgba(212,175,55,0.5); transition: 0.3s;
        }
        .btn-enter:active { transform: scale(0.95); box-shadow: 0 0 50px rgba(243,229,171,0.8); }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #888; font-size: 1.5rem; cursor: pointer; font-weight: bold; }

    </style>
</head>
<body>

    <div class="vairocana-light"></div>
    <div id="touch-guide">👆 撥動指尖 ． 俯瞰華藏法界 👇</div>

    <div id="universe-container">
        
        <div id="lotus-ocean">
            
            <svg class="svg-glow" viewBox="0 0 200 200" id="ocean-svg" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="fade-grad" x1="0%" y1="100%" x2="0%" y2="0%">
                        <stop offset="0%" stop-color="rgba(212,175,55, 0.7)" />
                        <stop offset="40%" stop-color="rgba(243,229,171, 0.3)" />
                        <stop offset="85%" stop-color="transparent" />
                    </linearGradient>
                    <linearGradient id="gold-grad" x1="0%" y1="100%" x2="0%" y2="0%">
                        <stop offset="0%" stop-color="rgba(212,175,55, 0.9)" />
                        <stop offset="60%" stop-color="rgba(255,255,255, 0.4)" />
                        <stop offset="100%" stop-color="transparent" />
                    </linearGradient>
                    <linearGradient id="cyan-grad" x1="0%" y1="100%" x2="0%" y2="0%">
                        <stop offset="0%" stop-color="rgba(139,168,156, 0.9)" />
                        <stop offset="50%" stop-color="rgba(212,175,55, 0.6)" />
                        <stop offset="100%" stop-color="rgba(255,255,255, 0.1)" />
                    </linearGradient>
                </defs>
                <g id="ocean-rings"></g>
                <g id="ocean-dots"></g>
                <g id="geometric-mandala"></g>
            </svg>

            <div id="standing-lotus"></div>

            <div id="classic-lotus-wrapper">
                <svg viewBox="0 0 200 200" style="width: 100%; height: 100%; overflow: visible;">
                    <path d="M 100 160 C 70 110 80 60 100 30 C 120 60 130 110 100 160 Z" fill="rgba(212,175,55,0.6)" stroke="#d4af37" stroke-width="2"/>
                    <path d="M 97 155 C 50 130 30 80 45 50 C 60 90 80 120 97 140 Z" fill="rgba(212,175,55,0.4)" stroke="#d4af37" stroke-width="2"/>
                    <path d="M 103 155 C 150 130 170 80 155 50 C 140 90 120 120 103 140 Z" fill="rgba(212,175,55,0.4)" stroke="#d4af37" stroke-width="2"/>
                    <path d="M 94 150 C 30 140 10 100 15 75 C 35 105 60 125 94 135 Z" fill="rgba(212,175,55,0.2)" stroke="#f3e5ab" stroke-width="1.5"/>
                    <path d="M 106 150 C 170 140 190 100 185 75 C 165 105 140 125 106 135 Z" fill="rgba(212,175,55,0.2)" stroke="#f3e5ab" stroke-width="1.5"/>
                    <path d="M 100 165 C 70 170 45 160 30 145 C 55 160 80 160 100 155 C 120 160 145 160 170 145 C 155 160 130 170 100 165 Z" fill="rgba(139,168,156,0.6)" stroke="#8ba89c" stroke-width="1.5"/>
                    <circle cx="100" cy="145" r="5" fill="#fff" filter="drop-shadow(0 0 8px #fff)"/>
                </svg>
            </div>
            
            <div id="world-tower">
                <div class="central-beam"></div>
                </div>

        </div>
    </div>

    <div id="info-card">
        <div class="close-btn" onclick="document.getElementById('info-card').style.display='none'">×</div>
        <h3 style="color:var(--gold); margin-top:10px; font-size: 1.4rem; letter-spacing: 3px;">第十三層<br><span style="font-size:1rem; color:var(--cyan);">娑婆與極樂</span></h3>
        <p style="color:#ddd; font-size:0.95rem; line-height:1.8; text-align:justify; margin: 20px 0;">
            您已觸及一真法界之核心。<br><br>
            在無盡浩瀚的華藏世界海中，我們所在的<span style="color:var(--solid-gold); font-weight:bold;">娑婆世界</span>與阿彌陀佛的<span style="color:var(--solid-gold); font-weight:bold;">極樂世界</span>，皆安住於此第十三層。<br><br>
            彌陀淨土是諸佛悲心為眾生設立的「中繼站」。一念迴光，先歸極樂，確保不退轉後，方能於此無盡華嚴宇宙中，圓滿普賢行願。
        </p>
        <button class="btn-enter" onclick="window.location.href='https://namoamitabhapureland.github.io/bodhicitta/'">
            歸向彌陀淨土系統
        </button>
    </div>

    <script>
        const gold = "rgba(212,175,55,";
        const cyan = "rgba(139,168,156,";

        // ==========================================
        // 1. 十重海與 10 顆海洋光點 (V10 對齊用)
        // ==========================================
        const oceanRings = document.getElementById('ocean-rings');
        const geometricMandala = document.getElementById('geometric-mandala');
        const oceanDots = document.getElementById('ocean-dots');

        for(let i = 1; i <= 10; i++) {
            let radius = i * 9.5; 
            let opacity = 1 - (i * 0.08); 
            let circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", "100"); circle.setAttribute("cy", "100"); circle.setAttribute("r", radius);
            circle.setAttribute("fill", "none");
            circle.setAttribute("stroke", i % 2 === 0 ? `${cyan}${opacity})` : `${gold}${opacity})`);
            circle.setAttribute("stroke-width", "0.3"); 
            circle.setAttribute("stroke-dasharray", i % 3 === 0 ? "2 8" : "none"); 
            oceanRings.appendChild(circle);
        }

        // ✨ 此 10 個點將用來與未來的花瓣對齊
        for(let i = 0; i < 10; i++) {
            let angle = (Math.PI * 2 / 10) * i;
            let radius = 85.5; 
            let cx = 100 + Math.cos(angle) * radius; let cy = 100 + Math.sin(angle) * radius;
            
            let glow = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            glow.setAttribute("cx", cx); glow.setAttribute("cy", cy); glow.setAttribute("r", "4");
            glow.setAttribute("fill", "rgba(139,168,156,0.3)"); glow.setAttribute("stroke", "rgba(139,168,156,0.8)"); glow.setAttribute("stroke-width", "0.5");
            oceanDots.appendChild(glow);

            let dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            dot.setAttribute("cx", cx); dot.setAttribute("cy", cy); dot.setAttribute("r", "1.5");
            dot.setAttribute("fill", "#fff"); dot.setAttribute("filter", "drop-shadow(0 0 5px #8ba89c)");
            oceanDots.appendChild(dot);
        }

        // ✨ JS 生成幾何結構：加上實體填滿顏色參數 fillStr ✨
        function drawGeometricLayer(radius, count, colorStr, fillStr) {
            let g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("stroke", colorStr); 
            // ✨ ✨ 新增：面填滿顏色 ✨ ✨
            g.setAttribute("fill", fillStr); 
            g.setAttribute("stroke-width", "0.4");
            for(let j=0; j<count; j++) {
                let angle = (360 / count) * j;
                let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                let d = `M100 ${100-radius} C ${100+radius*0.4} ${100-radius*0.4}, ${100+radius*0.4} ${100+radius*0.4}, 100 ${100+radius} C ${100-radius*0.4} ${100+radius*0.4}, ${100-radius*0.4} ${100-radius*0.4}, 100 ${100-radius}`;
                path.setAttribute("d", d); path.setAttribute("transform", `rotate(${angle} 100 100)`);
                g.appendChild(path);
            }
            return g;
        }
        // ✨ ✨ 為底下的海瓣加上極淡分類色彩：實體填滿！ ✨ ✨
        geometricMandala.appendChild(drawGeometricLayer(85, 12, `${cyan}0.2)`, `${cyan}0.05)`)); // 最外分類琉璃色
        geometricMandala.appendChild(drawGeometricLayer(50, 8, `${gold}0.3)`, `${gold}0.07)`));  // 內層分類真金色


        // ==========================================
        // 2. V10 立體蓮花瓣生成 (絕對中心定位)
        // ==========================================
        const standingLotus = document.getElementById('standing-lotus');
        
        function create3DPetal(angle, tiltX, gradientId, w, h, strokeOpacity) {
            let petal = document.createElement('div');
            petal.className = 'petal-3d';
            petal.style.transform = `rotateZ(${angle}deg) rotateX(${tiltX}deg)`;
            
            // 動態設置寬度和高度
            petal.style.width = `${w}px`;
            petal.style.height = `${h}px`;
            petal.style.left = `-${w/2}px`; /* 精準置中修正 */
            
            petal.innerHTML = `
                <svg viewBox="0 0 120 320" class="petal-svg" preserveAspectRatio="none">
                    <path d="M 60 320 C 60 320, 0 180, 0 80 C 0 30, 60 0, 60 0 C 60 0, 120 30, 120 80 C 120 180, 60 320, 60 320 Z" 
                          fill="url(#${gradientId})" stroke="rgba(212,175,55,${strokeOpacity})" stroke-width="1.2"/>
                </svg>`;
            return petal;
        }

        // 🌸 外層：最長 (360px)，微微離開水面 (tiltX: -12)，展現向外托起的氣勢
        for(let i=0; i<16; i++) {
            standingLotus.appendChild(create3DPetal(i * 22.5, -12, 'fade-grad', 150, 360, 0.15));
        }
        
        // 🌸 中層：中度長度 (260px)，優雅翹起 (tiltX: -32)，形成托缽的層次感
        for(let i=0; i<12; i++) {
            standingLotus.appendChild(create3DPetal((i * 30) + 15, -32, 'gold-grad', 110, 260, 0.4));
        }
        
        // 🌸 內層：最短 (170px)！最陡峭 (tiltX: -55)，如同剛長出的花蕊般緊緊抱住中心光柱
        for(let i=0; i<8; i++) {
            standingLotus.appendChild(create3DPetal((i * 45) + 22.5, -55, 'cyan-grad', 70, 170, 0.7));
        }


        // ==========================================
        // 3. 實體透明玻璃大樓 (20層，高度壓縮版)
        // ==========================================
        const tower = document.getElementById('world-tower');
        
        // 色彩矩陣：依照居士的結構分類
        const tierData = [
            { c: '230,200,100', d: false }, { c: '230,200,100', d: false }, { c: '230,200,100', d: false }, // 1-3: 築基 (金銀)
            { c: '180,160,220', d: false }, { c: '180,160,220', d: false }, { c: '180,160,220', d: false }, { c: '180,160,220', d: false }, // 4-7: 薰修 (紫青)
            { c: '255,255,255', d: false }, { c: '255,255,255', d: false }, { c: '255,255,255', d: false }, // 8-10: 純淨白光
            { c: '100,200,220', d: false }, { c: '100,200,220', d: false }, // 11-14: 青藍與淡金光雲
            { c: '255,230,150', d: false, is13: true }, // 13: 娑婆/極樂
            { c: '100,200,220', d: false }, { c: '250,240,200', d: false }, // 14
            { c: '150,220,255', d: true },  { c: '150,220,255', d: true },  { c: '150,220,255', d: true },  { c: '150,220,255', d: true },  // 16-19: 琉璃蓮華燈 (虛線)
            { c: '255,245,200', d: false }  // 20: 浩瀚金白
        ];

        for(let i = 0; i < 20; i++) {
            let data = tierData[i];
            let level = i + 1;
            
            // ✨ 壓縮樓層間距為 25px (總高度約 500px，保證入鏡！) ✨
            let zHeight = level * 25; 
            let radius = 20 + (level * 12); 

            let tierGroup = document.createElement('div');
            tierGroup.className = 'tier-layer';
            // 將整層網格沿著 Z 軸推高
            tierGroup.style.transform = `translateZ(${zHeight}px)`;

            // 1. 實體填滿色彩透明玻璃盤 (包含框與面)
            let disk = document.createElement('div');
            disk.className = 'tier-disk';
            if (data.is13) disk.classList.add('tier-13-disk');
            
            disk.style.width = `${radius * 2}px`;
            disk.style.height = `${radius * 2}px`;
            disk.style.left = `-${radius}px`; /* 鎖死絕對中心置中 */
            disk.style.top = `-${radius}px`;  
            
            disk.style.borderColor = `rgba(${data.c}, 0.5)`; // 實體邊框
            disk.style.backgroundColor = `rgba(${data.c}, 0.15)`; // ✨ 實體整片填滿的透明玻璃色 ✨
            disk.style.color = `rgba(${data.c}, 0.5)`; // 十字線顏色
            if(data.d) disk.style.borderStyle = 'dashed'; // 16-19 琉璃燈虛線

            // 2. 世界核心光點 (點越高越大)
            let dot = document.createElement('div');
            dot.className = 'tier-dot';
            if (data.is13) dot.classList.add('tier-13-dot');
            
            let dotSize = 4 + (level * 0.6); 
            dot.style.width = `${dotSize}px`;
            dot.style.height = `${dotSize}px`;
            dot.style.left = `-${dotSize/2}px`;
            dot.style.top = `-${dotSize/2}px`;
            
            if(!data.is13) {
                dot.style.background = `rgba(${data.c}, 0.9)`;
                dot.style.boxShadow = `0 0 12px rgba(${data.c}, 0.6)`;
            }

            // 看板標籤
            if(data.is13) {
                let label = document.createElement('div');
                label.className = 'tier-label';
                label.innerHTML = '第十三層：娑婆 / 極樂';
                dot.appendChild(label);
                
                // ✨ 將點擊事件綁定在 dot 和 label 上，並確保它們可以被點擊 (pointer-events: auto) ✨
                dot.onclick = () => {
                    document.getElementById('info-card').style.display = 'block';
                    if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
                };
            }

            tierGroup.appendChild(disk);
            tierGroup.appendChild(dot);
            tower.appendChild(tierGroup);
        }

        // ==========================================
        // 4. 觸控互動魔法 (獨立自轉鎖定文字)
        // ==========================================
        let universe = document.getElementById('universe-container');
        let lotusOcean = document.getElementById('lotus-ocean');
        
        let isDragging = false;
        let startX, startY;
        let currentTilt = 75;   
        let currentSpin = 0;    

        setInterval(() => {
            if(!isDragging) {
                currentSpin -= 0.05;
                // ✨ 絕對錨定後，整個宇宙星盤統一自轉 ✨
                lotusOcean.style.transform = `rotateZ(${currentSpin}deg)`;
                
                // ✨ 修正看板文字，讓它「反向」抵銷自轉，永遠正面面向我們 ✨
                let labels = document.querySelectorAll('.tier-label');
                labels.forEach(label => {
                    label.style.transform = `rotateX(-90deg) rotateY(${-currentSpin}deg)`;
                });
            }
        }, 30);

        document.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX || e.touches[0].clientX;
            startY = e.clientY || e.touches[0].clientY;
            document.getElementById('touch-guide').style.display = 'none';
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            let deltaX = x - startX;
            let deltaY = y - startY;

            // 旋轉整個宇宙星盤
            currentSpin += deltaX * 0.4;
            lotusOcean.style.transform = `rotateZ(${currentSpin}deg)`;
            
            // 看板永遠正面面向我們
            let labels = document.querySelectorAll('.tier-label');
            labels.forEach(label => {
                label.style.transform = `rotateX(-90deg) rotateY(${-currentSpin}deg)`;
            });

            // 調整視角仰角 (限制在 50~85 度)
            currentTilt -= deltaY * 0.15;
            if (currentTilt > 85) currentTilt = 85; 
            if (currentTilt < 45) currentTilt = 45; 

            // 保持 scale(0.85) 不變，縮小讓高樓可見
            universe.style.transform = `rotateX(${currentTilt}deg) scale(0.85)`;

            startX = x; startY = y;
        });

        document.addEventListener('pointerup', () => { isDragging = false; });
        document.addEventListener('pointercancel', () => { isDragging = false; });
    </script>
</body>
</html>
