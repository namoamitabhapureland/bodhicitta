<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏世界海 (Avatamsaka Universe)</title>
    <style>
        /* 定義控制整個宇宙的 CSS 變數 */
        :root {
            --spin-val: 0;
            --tilt-val: 75;
        }

        body { 
            margin: 0; background: #000; color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; perspective: 1200px; 
            touch-action: none; 
        }

        /* 大日如來 一真法界之光 */
        .vairocana-light {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center 40%, rgba(255,255,255,0.15) 0%, rgba(212,175,55,0.08) 25%, rgba(0,0,0,0.95) 70%);
            z-index: 0; animation: divine-breath 8s infinite alternate ease-in-out;
            pointer-events: none;
        }
        @keyframes divine-breath {
            0% { opacity: 0.6; transform: scale(0.95); filter: drop-shadow(0 0 50px rgba(255,255,255,0.1)); }
            100% { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 100px rgba(212,175,55,0.3)); }
        }

        /* 宇宙空間容器 (負責上下傾斜) */
        #universe-container {
            position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; /* 基準點 */
            transform-style: preserve-3d;
            transform: rotateX(calc(var(--tilt-val) * 1deg)); 
            z-index: 2;
        }

        /* 旋轉的華藏世界本體 (包含香水海、蓮花、光柱、層級) */
        #world {
            position: absolute; top: 0; left: 0;
            transform-style: preserve-3d;
            transform: rotateZ(calc(var(--spin-val) * 1deg));
        }

        /* 底部香水海 */
        .perfume-ocean {
            position: absolute; top: 50%; left: 50%;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(139,168,156,0.15) 0%, rgba(212,175,55,0.05) 40%, transparent 70%);
            transform: translate(-50%, -50%) translateZ(-30px);
            border-radius: 50%;
            animation: ocean-flow 10s infinite linear;
        }
        @keyframes ocean-flow {
            0% { transform: translate(-50%, -50%) translateZ(-30px) rotateZ(0deg) scale(1); }
            50% { transform: translate(-50%, -50%) translateZ(-30px) rotateZ(180deg) scale(1.05); }
            100% { transform: translate(-50%, -50%) translateZ(-30px) rotateZ(360deg) scale(1); }
        }

        /* 3D 大蓮華 */
        #lotus-ocean {
            position: absolute; top: 50%; left: 50%;
            width: 600px; height: 600px;
            transform: translate(-50%, -50%);
            transform-style: preserve-3d;
        }

        /* 十方貫穿光柱 (真3D十字交叉平面) */
        .beam-plane {
            position: absolute; top: 0; left: 0;
            width: 4px; height: 600px; /* height 變成 Z 軸的深度 */
            margin-left: -2px;
            transform-origin: top center;
            background: linear-gradient(to bottom, transparent, rgba(212,175,55,1) 30%, rgba(139,168,156,0.8) 80%, transparent);
            box-shadow: 0 0 15px rgba(212,175,55,0.6);
        }
        .face-1 { transform: rotateX(-90deg); }
        .face-2 { transform: rotateX(-90deg) rotateY(90deg); }

        /* 層層遞升的空間軌道 */
        .tier-layer { position: absolute; top: 0; left: 0; transform-style: preserve-3d; }
        
        .tier-ring {
            position: absolute; top: 50%; left: 50%;
            border: 1px dashed rgba(212,175,55,0.25);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: inset 0 0 20px rgba(139,168,156,0.05);
        }

        /* 軌道上的定位點 */
        .orbit-point { position: absolute; transform-style: preserve-3d; }

        /* 永遠面向使用者的廣告牌技術 (抵銷世界旋轉與傾斜) */
        .billboard {
            position: absolute; transform-style: preserve-3d;
            transform: rotateZ(calc(var(--spin-val) * -1deg)) rotateX(calc(var(--tilt-val) * -1deg));
        }

        /* 每一層世界的光點 */
        .tier-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(255,255,255,0.4); 
            transform: translate(-50%, -50%); /* 置中對齊 billboard */
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* ✨ 第十三層：娑婆與極樂 */
        .tier-13 {
            width: 22px; height: 22px; background: #fff; border: 2px solid #d4af37;
            box-shadow: 0 0 20px #f3e5ab, 0 0 40px #d4af37, inset 0 0 10px #d4af37;
            animation: pulse-13 2s infinite alternate ease-in-out;
            cursor: pointer; pointer-events: auto;
        }
        @keyframes pulse-13 { 
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 15px #d4af37; } 
            100% { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 40px #f3e5ab, 0 0 80px #d4af37; } 
        }

        .tier-label {
            position: absolute; left: 25px; top: -10px; width: 220px;
            color: #f3e5ab; font-size: 0.95rem; font-weight: bold; letter-spacing: 2px;
            text-shadow: 0 0 15px #d4af37, 0 0 5px #000; pointer-events: none;
        }

        /* 觸控引導提示 */
        #touch-guide {
            position: absolute; bottom: 8%; color: rgba(243,229,171,0.6);
            font-size: 0.85rem; letter-spacing: 2px; pointer-events: none;
            animation: fade-guide 4s infinite alternate; z-index: 50;
        }
        @keyframes fade-guide { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        /* 資訊卡片 */
        #info-card {
            position: absolute; top: 15%; width: 85%; max-width: 400px;
            background: linear-gradient(145deg, rgba(15,20,30,0.9), rgba(5,5,10,0.95)); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1.5px solid #d4af37; border-radius: 24px; padding: 30px; text-align: center; z-index: 1000;
            display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.15);
        }
        .btn-enter {
            margin-top: 25px; padding: 16px 35px; border-radius: 40px; width: 100%;
            background: linear-gradient(145deg, #d4af37, #b08d2b); color: #000; font-weight: bold; 
            border: 1px solid #f3e5ab; font-size: 1.05rem; cursor: pointer; letter-spacing: 3px; 
            box-shadow: 0 0 30px rgba(212,175,55,0.5); transition: 0.3s;
        }
        .btn-enter:active { transform: scale(0.95); box-shadow: 0 0 50px rgba(243,229,171,0.8); }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #888; font-size: 1.5rem; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="vairocana-light"></div>
    <div id="touch-guide">👆 滑動指尖 ． 探索華藏法界 👇</div>

    <div id="universe-container">
        <div id="world">
            
            <div class="perfume-ocean"></div>

            <div id="lotus-ocean">
                <svg viewBox="0 0 200 200" style="width:100%; height:100%; filter: drop-shadow(0 0 20px rgba(139,168,156,0.3));">
                    <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(139,168,156,0.4)" stroke-width="0.5" stroke-dasharray="1 4"/>
                    <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(212,175,55,0.3)" stroke-width="1"/>
                    <circle cx="100" cy="100" r="60" fill="none" stroke="rgba(139,168,156,0.5)" stroke-width="1" stroke-dasharray="5 5"/>
                    <path d="M100 0 L 100 200 M 0 100 L 200 100 M 30 30 L 170 170 M 30 170 L 170 30" stroke="rgba(212,175,55,0.2)" stroke-width="0.5"/>
                    <g stroke="rgba(212,175,55,0.8)" fill="none" stroke-width="0.8">
                        <path d="M100 20 C 130 50, 120 90, 100 100 C 80 90, 70 50, 100 20" />
                        <path d="M100 180 C 130 150, 120 110, 100 100 C 80 110, 70 150, 100 180" />
                        <path d="M20 100 C 50 130, 90 120, 100 100 C 90 80, 50 70, 20 100" />
                        <path d="M180 100 C 150 130, 110 120, 100 100 C 110 80, 150 70, 180 100" />
                        <g transform="rotate(45 100 100)" stroke="rgba(243,229,171,0.6)" stroke-width="0.6">
                            <path d="M100 30 C 120 50, 110 90, 100 100 C 80 90, 80 50, 100 30" />
                            <path d="M100 170 C 120 150, 110 110, 100 100 C 80 110, 80 150, 100 170" />
                            <path d="M30 100 C 50 120, 90 110, 100 100 C 90 80, 50 80, 30 100" />
                            <path d="M170 100 C 150 120, 110 110, 100 100 C 110 80, 150 80, 170 100" />
                        </g>
                    </g>
                    <circle cx="100" cy="100" r="15" fill="rgba(255,255,255,0.1)" stroke="#d4af37" stroke-width="2"/>
                </svg>
            </div>

            <div class="beam-plane face-1"></div>
            <div class="beam-plane face-2"></div>

            <div id="tiers-container"></div>

        </div>
    </div>

    <div id="info-card">
        <div class="close-btn" onclick="document.getElementById('info-card').style.display='none'">×</div>
        <h3 style="color:#f3e5ab; margin-top:10px; font-size: 1.4rem; letter-spacing: 3px;">第十三層<br><span style="font-size:1rem; color:#8ba89c;">娑婆與極樂</span></h3>
        <p style="color:#ddd; font-size:0.95rem; line-height:1.8; text-align:justify; margin: 20px 0;">
            您已觸及一真法界之核心。<br><br>
            在無盡浩瀚的華藏世界海中，我們所在的<span style="color:#d4af37; font-weight:bold;">娑婆世界</span>與阿彌陀佛的<span style="color:#d4af37; font-weight:bold;">極樂世界</span>，皆安住於此第十三層。娑婆居中，極樂在西。<br><br>
            無量劫的流浪，是時候從娑婆起修，一念迴光，歸向極樂。
        </p>
        <button class="btn-enter" onclick="window.location.href='https://namoamitabhapureland.github.io/bodhicitta/'">
            歸向彌陀淨土系統
        </button>
    </div>

    <script>
        // --- 1. 生成 20 層世界 (層層遞升) ---
        const tiersContainer = document.getElementById('tiers-container');
        
        for(let i = 1; i <= 20; i++) {
            let layer = document.createElement('div');
            layer.className = 'tier-layer';
            
            // 計算高度 (Z軸) 與 光環大小
            let zVal = i * 25; 
            let ringSize = 40 + (i * 15); // 越往上世界越廣大

            // 建立光環
            let ring = document.createElement('div');
            ring.className = 'tier-ring';
            ring.style.width = ringSize + 'px';
            ring.style.height = ringSize + 'px';
            ring.style.transform = `translate(-50%, -50%) translateZ(${zVal}px)`;
            layer.appendChild(ring);

            // 建立軌道上的定位點
            let orbitPoint = document.createElement('div');
            orbitPoint.className = 'orbit-point';
            
            let billboard = document.createElement('div');
            billboard.className = 'billboard';

            let dot = document.createElement('div');
            dot.className = 'tier-dot';

            // 第十三層特殊處理：讓它沿著光環軌道運行 (身心合一)
            if(i === 13) {
                // 將定位點推到光環邊緣，它就會隨著蓮花旋轉而公轉
                orbitPoint.style.transform = `translate(${ringSize/2}px, 0) translateZ(${zVal}px)`;
                dot.classList.add('tier-13');
                dot.innerHTML = '<div class="tier-label">第十三層：娑婆 / 極樂</div>';
                
                // 點擊事件
                dot.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById('info-card').style.display = 'block';
                    if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
                };
            } else {
                // 其他層級的光點保持在中央，構成光柱的節點
                orbitPoint.style.transform = `translate(0, 0) translateZ(${zVal}px)`;
            }

            billboard.appendChild(dot);
            orbitPoint.appendChild(billboard);
            layer.appendChild(orbitPoint);
            tiersContainer.appendChild(layer);
        }

        // --- 2. 觸控互動與全域變數 ---
        let root = document.documentElement;
        let isDragging = false;
        let startX, startY;
        let currentTilt = 75;   
        let currentSpin = 0;    

        // 自動緩慢旋轉
        setInterval(() => {
            if(!isDragging) {
                currentSpin -= 0.1;
                root.style.setProperty('--spin-val', currentSpin);
            }
        }, 30);

        // 監聽觸控/滑鼠按下
        document.addEventListener('pointerdown', (e) => {
            // 避免點擊到資訊卡或按鈕時觸發拖曳
            if(e.target.closest('#info-card') || e.target.closest('.tier-13')) return;
            
            isDragging = true;
            startX = e.clientX || e.touches[0].clientX;
            startY = e.clientY || e.touches[0].clientY;
            document.getElementById('touch-guide').style.display = 'none';
        });

        // 監聽觸控/滑鼠移動
        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            let deltaX = x - startX;
            let deltaY = y - startY;

            // 更新旋轉與傾斜數值
            currentSpin += deltaX * 0.3;
            currentTilt -= deltaY * 0.15;
            
            if (currentTilt > 85) currentTilt = 85; 
            if (currentTilt < 45) currentTilt = 45; 

            // 將數值注入 CSS 變數，由 CSS 自動處理複雜的 3D 抵銷計算
            root.style.setProperty('--spin-val', currentSpin);
            root.style.setProperty('--tilt-val', currentTilt);

            startX = x;
            startY = y;
        });

        // 監聽觸控/滑鼠放開
        document.addEventListener('pointerup', () => { isDragging = false; });
        document.addEventListener('pointercancel', () => { isDragging = false; });
    </script>
</body>
</html>
