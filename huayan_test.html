<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華嚴大世界 ． 宏觀法界</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --bg-deep: #020205;
        }

        body { 
            margin: 0; background: var(--bg-deep); color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; perspective: 1200px; 
            touch-action: none;
        }

        .vairocana-light {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.08) 0%, rgba(212,175,55,0.02) 40%, transparent 80%);
            z-index: 0; animation: divine-breath 12s infinite alternate ease-in-out;
            pointer-events: none;
        }
        @keyframes divine-breath {
            0% { opacity: 0.5; transform: scale(0.9); filter: drop-shadow(0 0 30px rgba(212,175,55,0.1)); }
            100% { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 80px rgba(255,255,255,0.2)); }
        }

        #universe-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transform: rotateX(75deg); 
            transition: transform 0.1s ease-out;
            z-index: 2;
        }

        /* ✨ 關鍵修正 1：蓮花底盤降到畫面底部 (top: 80%)，讓大樓有空間往上長 ✨ */
        #lotus-ocean {
            position: absolute; top: 80%; left: 50%;
            width: 250vw; height: 250vw; max-width: 1600px; max-height: 1600px;
            margin-left: -125vw; margin-top: -125vw;
            transform-style: preserve-3d;
            display: flex; justify-content: center; align-items: center;
        }
        @media (min-width: 1400px) { #lotus-ocean { margin-left: -800px; margin-top: -800px; } }

        .svg-glow {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.2));
            position: absolute; z-index: 1;
        }

        #standing-lotus {
            position: absolute; top: 50%; left: 50%;
            transform-style: preserve-3d;
            z-index: 2;
        }
        .petal-3d {
            position: absolute; bottom: 0; 
            transform-origin: bottom center; 
            transform-style: preserve-3d;
            filter: drop-shadow(0 0 10px rgba(212,175,55,0.2));
        }
        .petal-svg { width: 100%; height: 100%; overflow: visible; }

        #classic-lotus-wrapper {
            position: absolute; top: 50%; left: 50%;
            width: 180px; height: 180px;
            margin-top: -90px; margin-left: -90px;
            z-index: 3;
            filter: drop-shadow(0 0 20px rgba(212,175,55,0.8));
            transform-style: preserve-3d;
            transform: translateZ(1px); 
        }

        /* ✨ 關鍵修正 2：全息大樓鋼骨，扎根於底座 ✨ */
        #world-tower {
            position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; 
            transform-style: preserve-3d;
            z-index: 10;
        }

        /* ✨ 關鍵修正 3：光柱拔地而起 (沿 Z 軸向上) ✨ */
        .central-beam {
            position: absolute;
            bottom: 50%; left: -1px; /* 寬 2px 置中 */
            width: 2px;
            height: 850px; /* 拔地而起的高度 */
            background: linear-gradient(to top, rgba(212,175,55,0.8) 0%, rgba(255,255,255,0.6) 50%, rgba(139,168,156,0.3) 100%);
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
            transform-origin: bottom center;
            transform: rotateX(90deg); /* 讓光柱垂直於星盤站立！ */
        }

        /* 每一層網格 */
        .tier-layer {
            position: absolute; top: 0; left: 0;
            transform-style: preserve-3d;
        }

        /* 全息透明幾何鋼骨 */
        .tier-disk {
            position: absolute;
            border-radius: 50%;
            border: 1px solid; 
            transform-style: preserve-3d;
        }
        .tier-disk::before, .tier-disk::after {
            content: ''; position: absolute; background: currentColor; opacity: 0.2;
        }
        .tier-disk::before { top: 50%; left: 0; width: 100%; height: 1px; margin-top: -0.5px; }
        .tier-disk::after { top: 0; left: 50%; width: 1px; height: 100%; margin-left: -0.5px; }

        .tier-dot {
            position: absolute; border-radius: 50%; cursor: pointer;
            transition: all 0.4s ease; transform-style: preserve-3d;
        }

        /* 第 13 層 */
        .tier-13-disk {
            border: 1.5px solid rgba(212,175,55,0.6) !important;
            background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%) !important;
        }
        .tier-13-dot {
            background: #fff !important; border: 2px solid var(--solid-gold);
            box-shadow: 0 0 20px var(--gold) !important;
            animation: pulse-13 2s infinite alternate ease-in-out;
        }
        @keyframes pulse-13 { 
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(212,175,55,0.5); } 
            100% { transform: scale(1.3); box-shadow: 0 0 30px var(--solid-gold); } 
        }

        /* 看板文字 (在 3D 空間中立起來) */
        .tier-label {
            position: absolute; left: 20px; top: -10px; width: 220px;
            color: rgba(243,229,171,0.9); font-size: 0.95rem; font-weight: bold; letter-spacing: 2px;
            text-shadow: 0 0 10px #000; pointer-events: none;
            transform-origin: left bottom;
            transform: rotateX(90deg) translateY(-10px); /* 讓看板站起來面向鏡頭 */
        }

        #touch-guide {
            position: absolute; bottom: 8%; color: rgba(243,229,171,0.6);
            font-size: 0.9rem; letter-spacing: 3px; pointer-events: none;
            animation: fade-guide 4s infinite alternate; z-index: 50;
        }
        @keyframes fade-guide { 0% { opacity: 0.2; } 100% { opacity: 1; text-shadow: 0 0 10px var(--gold); } }

        /* 卡片 */
        #info-card {
            position: absolute; top: 15%; width: 85%; max-width: 400px; background: linear-gradient(145deg, rgba(15,20,30,0.9), rgba(5,5,10,0.95)); backdrop-filter: blur(15px); border: 1.5px solid var(--solid-gold); border-radius: 24px; padding: 30px; text-align: center; z-index: 100; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.15);
        }
        .btn-enter {
            margin-top: 25px; padding: 16px 35px; border-radius: 40px; width: 100%; background: linear-gradient(145deg, #d4af37, #b08d2b); color: #000; font-weight: bold; border: 1px solid var(--gold); font-size: 1.05rem; cursor: pointer; letter-spacing: 3px; box-shadow: 0 0 30px rgba(212,175,55,0.5); transition: 0.3s;
        }
        .btn-enter:active { transform: scale(0.95); box-shadow: 0 0 50px rgba(243,229,171,0.8); }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #888; font-size: 1.5rem; cursor: pointer; font-weight: bold; }

    </style>
</head>
<body>

    <div class="vairocana-light"></div>
    <div id="touch-guide">👆 撥動指尖 ． 俯瞰華嚴全息大樓 👇</div>

    <div id="universe-container">
        
        <div id="lotus-ocean">
            
            <svg class="svg-glow" viewBox="0 0 200 200" id="ocean-svg" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="fade-grad" x1="0%" y1="100%" x2="0%" y2="0%">
                        <stop offset="0%" stop-color="rgba(212,175,55, 0.5)" />
                        <stop offset="40%" stop-color="rgba(243,229,171, 0.2)" />
                        <stop offset="85%" stop-color="transparent" />
                    </linearGradient>
                    <linearGradient id="gold-grad" x1="0%" y1="100%" x2="0%" y2="0%">
                        <stop offset="0%" stop-color="rgba(212,175,55, 0.7)" />
                        <stop offset="60%" stop-color="rgba(255,255,255, 0.3)" />
                        <stop offset="100%" stop-color="rgba(212,175,55, 0.05)" />
                    </linearGradient>
                    <linearGradient id="cyan-grad" x1="0%" y1="100%" x2="0%" y2="0%">
                        <stop offset="0%" stop-color="rgba(139,168,156, 0.7)" />
                        <stop offset="50%" stop-color="rgba(212,175,55, 0.4)" />
                        <stop offset="100%" stop-color="rgba(139,168,156, 0.05)" />
                    </linearGradient>
                </defs>
                <g id="ocean-rings"></g>
                <g id="ocean-dots"></g>
                <g id="geometric-mandala"></g>
            </svg>

            <div id="standing-lotus"></div>

            <div id="classic-lotus-wrapper">
                <svg viewBox="0 0 200 200" style="width: 100%; height: 100%; overflow: visible;">
                    <path d="M 100 160 C 70 110 80 60 100 30 C 120 60 130 110 100 160 Z" fill="rgba(212,175,55,0.4)" stroke="rgba(212,175,55,0.8)" stroke-width="1.5"/>
                    <path d="M 97 155 C 50 130 30 80 45 50 C 60 90 80 120 97 140 Z" fill="rgba(212,175,55,0.3)" stroke="rgba(212,175,55,0.8)" stroke-width="1.5"/>
                    <path d="M 103 155 C 150 130 170 80 155 50 C 140 90 120 120 103 140 Z" fill="rgba(212,175,55,0.3)" stroke="rgba(212,175,55,0.8)" stroke-width="1.5"/>
                    <path d="M 94 150 C 30 140 10 100 15 75 C 35 105 60 125 94 135 Z" fill="rgba(212,175,55,0.15)" stroke="rgba(243,229,171,0.6)" stroke-width="1"/>
                    <path d="M 106 150 C 170 140 190 100 185 75 C 165 105 140 125 106 135 Z" fill="rgba(212,175,55,0.15)" stroke="rgba(243,229,171,0.6)" stroke-width="1"/>
                    <path d="M 100 165 C 70 170 45 160 30 145 C 55 160 80 160 100 155 C 120 160 145 160 170 145 C 155 160 130 170 100 165 Z" fill="rgba(139,168,156,0.4)" stroke="rgba(139,168,156,0.8)" stroke-width="1"/>
                    <circle cx="100" cy="145" r="4" fill="#fff" filter="drop-shadow(0 0 5px #fff)"/>
                </svg>
            </div>

            <div id="world-tower">
                <div class="central-beam"></div>
                </div>

        </div>

    </div>

    <div id="info-card">
        <div class="close-btn" onclick="document.getElementById('info-card').style.display='none'">×</div>
        <h3 style="color:var(--gold); margin-top:10px; font-size: 1.4rem; letter-spacing: 3px;">第十三層<br><span style="font-size:1rem; color:var(--cyan);">娑婆與極樂</span></h3>
        <p style="color:#ddd; font-size:0.95rem; line-height:1.8; text-align:justify; margin: 20px 0;">
            您已觸及一真法界之核心。<br><br>
            在無盡浩瀚的華藏世界海中，我們所在的<span style="color:var(--solid-gold); font-weight:bold;">娑婆世界</span>與阿彌陀佛的<span style="color:var(--solid-gold); font-weight:bold;">極樂世界</span>，皆安住於此第十三層。<br><br>
            彌陀淨土是諸佛悲心為眾生設立的「中繼站」。一念迴光，先歸極樂，確保不退轉後，方能於此無盡華嚴宇宙中，圓滿普賢行願。
        </p>
        <button class="btn-enter" onclick="window.location.href='https://namoamitabhapureland.github.io/bodhicitta/'">
            歸向彌陀淨土系統
        </button>
    </div>

    <script>
        const gold = "rgba(212,175,55,";
        const cyan = "rgba(139,168,156,";

        // ==========================================
        // 1. 生成十重海與點 (極度透明化)
        // ==========================================
        const oceanRings = document.getElementById('ocean-rings');
        const geometricMandala = document.getElementById('geometric-mandala');
        const oceanDots = document.getElementById('ocean-dots');

        for(let i = 1; i <= 10; i++) {
            let radius = i * 9.5; 
            let opacity = 0.6 - (i * 0.05); // 更透明
            let circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", "100"); circle.setAttribute("cy", "100"); circle.setAttribute("r", radius);
            circle.setAttribute("fill", "none");
            circle.setAttribute("stroke", i % 2 === 0 ? `${cyan}${opacity})` : `${gold}${opacity})`);
            circle.setAttribute("stroke-width", "0.2"); 
            circle.setAttribute("stroke-dasharray", i % 3 === 0 ? "2 8" : "none"); 
            oceanRings.appendChild(circle);
        }

        for(let i = 0; i < 10; i++) {
            let angle = (Math.PI * 2 / 10) * i;
            let radius = 85.5; 
            let cx = 100 + Math.cos(angle) * radius; let cy = 100 + Math.sin(angle) * radius;
            
            let dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            dot.setAttribute("cx", cx); dot.setAttribute("cy", cy); dot.setAttribute("r", "1.5");
            dot.setAttribute("fill", "rgba(139,168,156,0.8)"); 
            oceanDots.appendChild(dot);
        }

        function drawGeometricLayer(radius, count, colorStr) {
            let g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("stroke", colorStr); g.setAttribute("fill", "none"); g.setAttribute("stroke-width", "0.3");
            for(let j=0; j<count; j++) {
                let angle = (360 / count) * j;
                let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                let d = `M100 ${100-radius} C ${100+radius*0.4} ${100-radius*0.4}, ${100+radius*0.4} ${100+radius*0.4}, 100 ${100+radius} C ${100-radius*0.4} ${100+radius*0.4}, ${100-radius*0.4} ${100-radius*0.4}, 100 ${100-radius}`;
                path.setAttribute("d", d); path.setAttribute("transform", `rotate(${angle} 100 100)`);
                g.appendChild(path);
            }
            return g;
        }
        geometricMandala.appendChild(drawGeometricLayer(85, 12, `${cyan}0.15)`));
        geometricMandala.appendChild(drawGeometricLayer(50, 8, `${gold}0.2)`));


        // ==========================================
        // 2. 生成 3D 蓮花 (極度透明化)
        // ==========================================
        const standingLotus = document.getElementById('standing-lotus');
        
        function create3DPetal(angle, tiltX, gradientId, w, h, strokeOpacity) {
            let petal = document.createElement('div');
            petal.className = 'petal-3d';
            petal.style.transform = `rotateZ(${angle}deg) rotateX(${tiltX}deg)`;
            petal.style.width = `${w}px`; petal.style.height = `${h}px`; petal.style.left = `-${w/2}px`; 
            petal.innerHTML = `
                <svg viewBox="0 0 120 320" class="petal-svg" preserveAspectRatio="none">
                    <path d="M 60 320 C 60 320, 0 180, 0 80 C 0 30, 60 0, 60 0 C 60 0, 120 30, 120 80 C 120 180, 60 320, 60 320 Z" 
                          fill="url(#${gradientId})" stroke="rgba(212,175,55,${strokeOpacity})" stroke-width="1"/>
                </svg>`;
            return petal;
        }

        for(let i=0; i<16; i++) standingLotus.appendChild(create3DPetal(i * 22.5, -12, 'fade-grad', 150, 360, 0.1));
        for(let i=0; i<12; i++) standingLotus.appendChild(create3DPetal((i * 30) + 15, -32, 'gold-grad', 110, 260, 0.25));
        for(let i=0; i<8; i++)  standingLotus.appendChild(create3DPetal((i * 45) + 22.5, -55, 'cyan-grad', 70, 170, 0.4));


        // ==========================================
        // ✨ 3. 動態搭建「透明全息鋼骨大樓」✨
        // ==========================================
        const tower = document.getElementById('world-tower');
        
        for(let i = 1; i <= 20; i++) {
            // Z 軸高度 (向上拔地而起)
            let zHeight = i * 38; 
            // 倒梯形半徑 (越上層越寬廣，呈現倒金字塔全息感)
            let radius = 15 + (i * 12); 

            let tierGroup = document.createElement('div');
            tierGroup.className = 'tier-layer';
            // TranslateZ 正值，在 rotateX(75deg) 下會向上生長
            tierGroup.style.transform = `translateZ(${zHeight}px)`;

            // --- 賦予專屬透明主題色 ---
            let diskBorder, diskBg, dotColor, dotGlow;

            if (i >= 1 && i <= 3) {
                // 1-3層：築基 (淡金不壞)
                diskBorder = 'rgba(212,175,55,0.15)'; 
                diskBg = 'radial-gradient(circle, rgba(212,175,55,0.03) 0%, transparent 60%)';
                dotColor = 'rgba(212,175,55,0.7)'; dotGlow = 'rgba(212,175,55,0.4)';
            } else if (i >= 4 && i <= 7) {
                // 4-7層：薰修 (多色混合，極淡)
                diskBorder = 'rgba(180,160,200,0.15)'; 
                diskBg = 'radial-gradient(circle, rgba(180,160,200,0.03) 0%, transparent 60%)';
                dotColor = 'rgba(180,160,200,0.7)'; dotGlow = 'rgba(180,160,200,0.4)';
            } else if (i >= 8 && i <= 10) {
                // 8-10層：純化 (清淨白光)
                diskBorder = 'rgba(255,255,255,0.15)'; 
                diskBg = 'radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 60%)';
                dotColor = 'rgba(255,255,255,0.9)'; dotGlow = 'rgba(255,255,255,0.6)';
            } else if (i >= 11 && i <= 14 && i !== 13) {
                // 11-14層：跨越 (青藍與淡金光雲)
                diskBorder = 'rgba(139,168,156,0.2)'; 
                diskBg = 'radial-gradient(circle, rgba(139,168,156,0.05) 0%, rgba(212,175,55,0.02) 50%, transparent 70%)';
                dotColor = 'rgba(139,168,156,0.8)'; dotGlow = 'rgba(139,168,156,0.5)';
            } else if (i >= 16 && i <= 19) {
                // 16-19層：琉璃蓮華燈 (虛線外框)
                diskBorder = 'rgba(255,255,255,0.15)'; 
                diskBg = 'radial-gradient(circle, rgba(139,168,156,0.03) 0%, transparent 60%)';
                dotColor = 'rgba(255,255,255,0.8)'; dotGlow = 'rgba(139,168,156,0.5)';
            } else {
                // 15層與20層：普賢世界 (廣大淡金白光)
                diskBorder = 'rgba(243,229,171,0.2)'; 
                diskBg = 'radial-gradient(circle, rgba(243,229,171,0.04) 0%, transparent 70%)';
                dotColor = 'rgba(243,229,171,0.9)'; dotGlow = 'rgba(243,229,171,0.5)';
            }

            // 1. 幾何鋼骨網格 (Disk)
            let disk = document.createElement('div');
            disk.className = 'tier-disk';
            if (i === 13) disk.classList.add('tier-13-disk');
            
            disk.style.width = `${radius * 2}px`;
            disk.style.height = `${radius * 2}px`;
            disk.style.marginLeft = `-${radius}px`;
            disk.style.marginTop = `-${radius}px`;
            disk.style.borderColor = diskBorder;
            disk.style.background = diskBg;
            disk.style.color = diskBorder; // 影響內部十字線

            if(i >= 16 && i <= 19) {
                disk.style.borderStyle = 'dashed'; // 蓮華燈意象
            }

            // 2. 世界核心光點 (點越高越大)
            let dot = document.createElement('div');
            dot.className = 'tier-dot';
            if (i === 13) dot.classList.add('tier-13-dot');
            
            let dotSize = 4 + (i * 0.6); // 越高層，點越大
            dot.style.width = `${dotSize}px`;
            dot.style.height = `${dotSize}px`;
            dot.style.marginLeft = `-${dotSize/2}px`;
            dot.style.marginTop = `-${dotSize/2}px`;
            
            if(i !== 13) {
                dot.style.background = dotColor;
                dot.style.boxShadow = `0 0 8px ${dotGlow}`;
            }

            // 第 13 層看板標籤
            if(i === 13) {
                let label = document.createElement('div');
                label.className = 'tier-label';
                label.innerHTML = '第十三層：娑婆 / 極樂';
                dot.appendChild(label);
                
                dot.onclick = () => {
                    document.getElementById('info-card').style.display = 'block';
                    if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
                };
            }

            tierGroup.appendChild(disk);
            tierGroup.appendChild(dot);
            tower.appendChild(tierGroup);
        }

        // ==========================================
        // 4. 觸控互動魔法
        // ==========================================
        let universe = document.getElementById('universe-container');
        let lotusOcean = document.getElementById('lotus-ocean');
        
        let isDragging = false;
        let startX, startY;
        let currentTilt = 75;   
        let currentSpin = 0;    

        setInterval(() => {
            if(!isDragging) {
                currentSpin -= 0.05;
                lotusOcean.style.transform = `rotateZ(${currentSpin}deg)`;
            }
        }, 30);

        document.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX || e.touches[0].clientX;
            startY = e.clientY || e.touches[0].clientY;
            document.getElementById('touch-guide').style.display = 'none';
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            let deltaX = x - startX;
            let deltaY = y - startY;

            currentSpin += deltaX * 0.4;
            lotusOcean.style.transform = `rotateZ(${currentSpin}deg)`;

            currentTilt -= deltaY * 0.15;
            if (currentTilt > 85) currentTilt = 85; 
            if (currentTilt < 45) currentTilt = 45; 

            universe.style.transform = `rotateX(${currentTilt}deg)`;

            startX = x; startY = y;
        });

        document.addEventListener('pointerup', () => { isDragging = false; });
        document.addEventListener('pointercancel', () => { isDragging = false; });
    </script>
</body>
</html>
