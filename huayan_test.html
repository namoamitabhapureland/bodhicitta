<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏世界海 (Avatamsaka Universe)</title>
    <style>
        body { 
            margin: 0; background: #020202; color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        /* 宇宙深邃背景 */
        .universe-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a1128 0%, #020202 70%);
            z-index: 0;
        }

        /* 帝釋網/風輪 旋轉動畫 */
        .mandala-spin {
            position: absolute; top: 50%; left: 50%; width: 100vmin; height: 100vmin;
            transform: translate(-50%, -50%); z-index: 1;
            animation: spin-slow 60s linear infinite;
            opacity: 0.3; pointer-events: none;
        }
        @keyframes spin-slow { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* 中心光柱 */
        .light-pillar {
            position: absolute; top: 15%; bottom: 15%; width: 2px;
            background: linear-gradient(to bottom, transparent, rgba(139,168,156,0.8), rgba(212,175,55,1), rgba(139,168,156,0.8), transparent);
            box-shadow: 0 0 20px rgba(139,168,156,0.5); z-index: 2;
        }

        /* 二十層世界容器 */
        .world-tiers {
            position: absolute; top: 15%; bottom: 15%; height: 70%;
            display: flex; flex-direction: column-reverse; justify-content: space-between; align-items: center;
            z-index: 3;
        }

        /* 每一層世界的光點 */
        .tier-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.3); cursor: pointer;
            transition: all 0.3s ease; position: relative;
        }
        .tier-dot:hover { background: #fff; transform: scale(1.5); box-shadow: 0 0 10px #fff; }

        /* ✨ 第十三層：娑婆與極樂的所在 */
        .tier-13 {
            width: 18px; height: 18px; background: #d4af37;
            box-shadow: 0 0 15px #f3e5ab, 0 0 30px #d4af37;
            animation: pulse-gold 2s infinite alternate;
        }
        @keyframes pulse-gold { 
            0% { transform: scale(1); box-shadow: 0 0 10px #d4af37; } 
            100% { transform: scale(1.3); box-shadow: 0 0 30px #f3e5ab, 0 0 50px #d4af37; } 
        }

        /* 第十三層的文字標籤 */
        .tier-13::after {
            content: "第十三層：娑婆 / 極樂";
            position: absolute; left: 30px; top: -2px; width: 180px;
            color: #f3e5ab; font-size: 0.85rem; letter-spacing: 2px;
            text-shadow: 0 0 10px #d4af37; pointer-events: none;
        }

        /* 點擊後的解說卡片 (隱藏) */
        #info-card {
            position: absolute; bottom: 8%; width: 90%; max-width: 380px;
            background: rgba(10, 15, 25, 0.85); backdrop-filter: blur(10px);
            border: 1px solid #d4af37; border-radius: 20px;
            padding: 25px; text-align: center; z-index: 10;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .btn-enter {
            margin-top: 20px; padding: 15px 30px; border-radius: 30px;
            background: linear-gradient(145deg, #d4af37, #b08d2b);
            color: #000; font-weight: bold; border: none; font-size: 1rem;
            cursor: pointer; letter-spacing: 2px; box-shadow: 0 0 20px rgba(212,175,55,0.4);
        }
    </style>
</head>
<body>

    <div class="universe-bg"></div>

    <svg class="mandala-spin" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="95" fill="none" stroke="#8ba89c" stroke-width="0.5" stroke-dasharray="2 6"/>
        <circle cx="100" cy="100" r="80" fill="none" stroke="#8ba89c" stroke-width="1" opacity="0.5"/>
        <path d="M100 10 L 100 190 M 10 100 L 190 100 M 35 35 L 165 165 M 35 165 L 165 35" stroke="#8ba89c" stroke-width="0.5" opacity="0.3"/>
        <g stroke="#d4af37" fill="none" stroke-width="1" opacity="0.6">
            <path d="M100 20 Q 130 50 100 100 Q 70 50 100 20" />
            <path d="M100 180 Q 130 150 100 100 Q 70 150 100 180" />
            <path d="M20 100 Q 50 130 100 100 Q 50 70 20 100" />
            <path d="M180 100 Q 150 130 100 100 Q 150 70 180 100" />
        </g>
    </svg>

    <div class="light-pillar"></div>

    <div class="world-tiers" id="tiers-container"></div>

    <div id="info-card">
        <h3 style="color:#f3e5ab; margin-top:0; letter-spacing: 2px;">第十三層：娑婆與極樂</h3>
        <p style="color:#bbb; font-size:0.9rem; line-height:1.6; text-align:justify;">
            在浩瀚的華藏世界海中，娑婆世界與極樂世界同處於第十三層。娑婆居中，極樂在西。<br><br>
            您不需向外尋求，只需一念迴光。
        </p>
        <button class="btn-enter" onclick="window.location.href='https://namoamitabhapureland.github.io/bodhicitta/'">
            歸向淨土道場
        </button>
    </div>

    <script>
        const container = document.getElementById('tiers-container');
        // 生成 20 層世界 (由下往上是 1 到 20)
        for(let i = 1; i <= 20; i++) {
            let dot = document.createElement('div');
            dot.className = 'tier-dot';
            
            // 如果是第 13 層，加上特殊樣式與點擊事件
            if(i === 13) {
                dot.classList.add('tier-13');
                dot.onclick = () => {
                    document.getElementById('info-card').style.display = 'block';
                    // 加上震動回饋 (手機版)
                    if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
                };
            }
            container.appendChild(dot);
        }
    </script>
</body>
</html>
