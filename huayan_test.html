<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華嚴大世界 ． 宏觀法界</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --bg-deep: #020205;
        }

        body { 
            margin: 0; background: var(--bg-deep); color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; perspective: 1200px; 
            touch-action: none;
        }

        /* ✨ 1. 大日如來 常寂光背景 (極度緩慢深邃的呼吸) */
        .vairocana-light {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.08) 0%, rgba(212,175,55,0.03) 30%, transparent 70%);
            z-index: 0; animation: divine-breath 12s infinite alternate ease-in-out;
            pointer-events: none;
        }
        @keyframes divine-breath {
            0% { opacity: 0.5; transform: scale(0.9); filter: drop-shadow(0 0 30px rgba(212,175,55,0.1)); }
            100% { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 80px rgba(255,255,255,0.2)); }
        }

        /* 3D 空間容器 */
        #universe-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transform: rotateX(75deg); /* 預設 3D 傾斜 */
            transition: transform 0.1s ease-out;
            z-index: 2;
        }

        /* ✨ 2. 十重香水海與大蓮華 (平躺的星盤) */
        #lotus-ocean {
            position: absolute; top: 50%; left: 50%;
            width: 250vw; height: 250vw; max-width: 1400px; max-height: 1400px;
            margin-left: -125vw; margin-top: -125vw;
            transform-style: preserve-3d;
            display: flex; justify-content: center; align-items: center;
        }
        @media (min-width: 1400px) { #lotus-ocean { margin-left: -700px; margin-top: -700px; } }

        /* SVG 畫布發光濾鏡 */
        .svg-glow {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.3));
        }

        /* ✨ 3. 貫穿法界的主光柱 (中軸線) */
        #pillar-system {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 80vh;
            margin-left: -2px; margin-top: -40vh;
            display: flex; flex-direction: column-reverse; justify-content: space-between; align-items: center;
            transform-style: preserve-3d;
            transform: rotateX(-75deg) translateY(-20vh); /* 反向抵銷傾斜，保持直立 */
        }

        .light-beam {
            position: absolute; top: 0; bottom: 0; width: 2px;
            background: linear-gradient(to top, transparent, rgba(212,175,55,1) 20%, rgba(255,255,255,0.9) 50%, rgba(139,168,156,0.8) 80%, transparent);
            box-shadow: 0 0 20px rgba(212,175,55,0.6), 0 0 40px rgba(255,255,255,0.2); z-index: 1;
        }

        /* 觸控引導提示 */
        #touch-guide {
            position: absolute; bottom: 8%; color: rgba(243,229,171,0.5);
            font-size: 0.9rem; letter-spacing: 3px; pointer-events: none;
            animation: fade-guide 4s infinite alternate; z-index: 50;
        }
        @keyframes fade-guide { 0% { opacity: 0.2; } 100% { opacity: 1; text-shadow: 0 0 10px var(--gold); } }

    </style>
</head>
<body>

    <div class="vairocana-light"></div>
    
    <div id="touch-guide">👆 撥動指尖 ． 俯瞰十重香水海 👇</div>

    <div id="universe-container">
        
        <div id="lotus-ocean">
            <svg class="svg-glow" viewBox="0 0 200 200" id="ocean-svg" xmlns="http://www.w3.org/2000/svg">
                <circle cx="100" cy="100" r="2" fill="#fff" filter="drop-shadow(0 0 5px #fff)"/>
                <circle cx="100" cy="100" r="5" fill="none" stroke="#d4af37" stroke-width="0.5"/>
            </svg>
        </div>

        <div id="pillar-system">
            <div class="light-beam"></div>
        </div>

    </div>

    <script>
        // --- 1. 動態生成「十重」香水海與蓮華骨架 ---
        const svg = document.getElementById('ocean-svg');
        const gold = "rgba(212,175,55,";
        const cyan = "rgba(139,168,156,";

        // 畫出 10 重同心圓 (香水海的波紋)
        for(let i = 1; i <= 10; i++) {
            let radius = i * 9.5; // 每層擴展
            let opacity = 1 - (i * 0.08); // 越往外越淡
            
            // 圓形波紋
            let circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", "100");
            circle.setAttribute("cy", "100");
            circle.setAttribute("r", radius);
            circle.setAttribute("fill", "none");
            // 交替使用金色與琉璃色
            circle.setAttribute("stroke", i % 2 === 0 ? `${cyan}${opacity})` : `${gold}${opacity})`);
            circle.setAttribute("stroke-width", i % 3 === 0 ? "0.8" : "0.3"); // 某些層加粗
            circle.setAttribute("stroke-dasharray", i % 4 === 0 ? "2 4" : "none"); // 某些層虛線
            svg.appendChild(circle);

            // 在特定幾層加入「十字金剛杵」或「四葉蓮瓣」的骨架
            if(i === 3 || i === 6 || i === 9) {
                let petalSize = radius;
                let g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("stroke", `${gold}${opacity + 0.2})`);
                g.setAttribute("fill", "none");
                g.setAttribute("stroke-width", "0.5");
                
                // 簡單的四葉瓣數學路徑
                let d = `M100 ${100-petalSize} C ${100+petalSize*0.4} ${100-petalSize*0.4}, ${100+petalSize*0.4} ${100+petalSize*0.4}, 100 ${100+petalSize} C ${100-petalSize*0.4} ${100+petalSize*0.4}, ${100-petalSize*0.4} ${100-petalSize*0.4}, 100 ${100-petalSize}`;
                let path1 = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path1.setAttribute("d", d);
                
                let path2 = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path2.setAttribute("d", d);
                path2.setAttribute("transform", "rotate(90 100 100)"); // 轉 90 度交疊

                g.appendChild(path1);
                g.appendChild(path2);
                
                // 讓這幾層蓮華有各自緩慢的正反旋轉
                let anim = document.createElementNS("http://www.w3.org/2000/svg", "animateTransform");
                anim.setAttribute("attributeName", "transform");
                anim.setAttribute("type", "rotate");
                anim.setAttribute("from", i % 2 === 0 ? "0 100 100" : "360 100 100");
                anim.setAttribute("to", i % 2 === 0 ? "360 100 100" : "0 100 100");
                anim.setAttribute("dur", `${100 + i*20}s`); // 非常緩慢
                anim.setAttribute("repeatCount", "indefinite");
                g.appendChild(anim);

                svg.appendChild(g);
            }
        }

        // --- 2. 觸控互動魔法 (指尖撥動 3D 法界) ---
        let universe = document.getElementById('universe-container');
        let lotus = document.getElementById('lotus-ocean');
        let pillarSys = document.getElementById('pillar-system');
        
        let isDragging = false;
        let startX, startY;
        let currentTilt = 75;   
        let currentSpin = 0;    

        // 大星盤基礎自轉
        setInterval(() => {
            if(!isDragging) {
                currentSpin -= 0.08;
                lotus.style.transform = `rotateZ(${currentSpin}deg)`;
            }
        }, 30);

        document.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX || e.touches[0].clientX;
            startY = e.clientY || e.touches[0].clientY;
            document.getElementById('touch-guide').style.display = 'none';
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            let deltaX = x - startX;
            let deltaY = y - startY;

            // 左右滑動：撥動星盤
            currentSpin += deltaX * 0.4;
            lotus.style.transform = `rotateZ(${currentSpin}deg)`;

            // 上下滑動：改變俯瞰傾斜度
            currentTilt -= deltaY * 0.15;
            if (currentTilt > 85) currentTilt = 85; 
            if (currentTilt < 50) currentTilt = 50; 

            universe.style.transform = `rotateX(${currentTilt}deg)`;
            pillarSys.style.transform = `rotateX(-${currentTilt}deg) translateY(-20vh)`; // 讓光柱保持相對直立

            startX = x;
            startY = y;
        });

        document.addEventListener('pointerup', () => { isDragging = false; });
        document.addEventListener('pointercancel', () => { isDragging = false; });
    </script>
</body>
</html>
