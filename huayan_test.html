<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏世界海 (Avatamsaka Universe)</title>
    <style>
        body { 
            margin: 0; background: #000; color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; perspective: 1000px; /* 啟動 3D 空間透視 */
        }

        /* ✨ 1. 大日如來 一真法界之光 (常寂光) */
        .vairocana-light {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center 40%, rgba(255,255,255,0.15) 0%, rgba(212,175,55,0.08) 25%, rgba(0,0,0,0.95) 70%);
            z-index: 0; animation: divine-breath 8s infinite alternate ease-in-out;
        }
        @keyframes divine-breath {
            0% { opacity: 0.6; transform: scale(0.95); filter: drop-shadow(0 0 50px rgba(255,255,255,0.1)); }
            100% { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 100px rgba(212,175,55,0.3)); }
        }

        /* 星空微塵 */
        .stars-dust {
            position: absolute; width: 100%; height: 100%; z-index: 1;
            background-image: radial-gradient(#fff 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.15;
            animation: star-move 100s linear infinite;
        }
        @keyframes star-move { 0% { transform: translateY(0); } 100% { transform: translateY(100vh); } }

        /* ✨ 2. 3D 巨大風輪與香水海大蓮華 (平躺旋轉) */
        .lotus-ocean-3d {
            position: absolute; top: 40%; left: 50%;
            width: 250vw; height: 250vw; max-width: 1200px; max-height: 1200px;
            margin-left: -125vw; margin-top: -125vw; /* 居中 */
            /* 關鍵：傾斜 75 度，創造巨大宇宙盤的視覺 */
            transform: rotateX(75deg); 
            transform-style: preserve-3d; z-index: 2;
            animation: ocean-spin 180s linear infinite;
        }
        @media (min-width: 1200px) {
            .lotus-ocean-3d { margin-left: -600px; margin-top: -600px; }
        }
        @keyframes ocean-spin { 100% { transform: rotateX(75deg) rotateZ(360deg); } }

        /* ✨ 3. 中心貫穿法界的光柱 (直立不動) */
        .light-pillar {
            position: absolute; bottom: 20%; height: 65vh; width: 3px;
            background: linear-gradient(to top, transparent, rgba(212,175,55,1) 30%, rgba(139,168,156,0.8) 80%, transparent);
            box-shadow: 0 0 25px rgba(212,175,55,0.8), 0 0 50px rgba(255,255,255,0.3); z-index: 3;
        }

        /* 20層世界的容器 */
        .world-tiers {
            position: absolute; bottom: 20%; height: 65vh;
            display: flex; flex-direction: column-reverse; justify-content: space-between; align-items: center;
            z-index: 4;
        }

        /* 每一層世界的光點 */
        .tier-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(255,255,255,0.4); cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }
        .tier-dot:hover { background: #fff; transform: scale(2); box-shadow: 0 0 20px #fff; }

        /* ✨ 第十三層：娑婆與極樂的所在 (強化) */
        .tier-13 {
            width: 20px; height: 20px; background: #fff;
            border: 2px solid #d4af37;
            box-shadow: 0 0 20px #f3e5ab, 0 0 40px #d4af37, inset 0 0 10px #d4af37;
            animation: pulse-13 2s infinite alternate ease-in-out;
            z-index: 10;
        }
        @keyframes pulse-13 { 
            0% { transform: scale(1); box-shadow: 0 0 15px #d4af37, inset 0 0 5px #d4af37; } 
            100% { transform: scale(1.2); box-shadow: 0 0 40px #f3e5ab, 0 0 80px #d4af37, inset 0 0 15px #d4af37; } 
        }

        .tier-13::after {
            content: "第十三層：娑婆 / 極樂";
            position: absolute; left: 35px; top: 1px; width: 180px;
            color: #f3e5ab; font-size: 0.9rem; font-weight: bold; letter-spacing: 2px;
            text-shadow: 0 0 15px #d4af37, 0 0 5px #000; pointer-events: none;
        }

        /* 資訊卡片 */
        #info-card {
            position: absolute; top: 15%; width: 85%; max-width: 400px;
            background: linear-gradient(145deg, rgba(15,20,30,0.9), rgba(5,5,10,0.95)); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1.5px solid #d4af37; border-radius: 24px;
            padding: 30px; text-align: center; z-index: 100;
            display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.15);
            animation: fade-in-up 0.5s ease-out forwards;
        }
        @keyframes fade-in-up { 0% { opacity:0; transform:translateY(20px); } 100% { opacity:1; transform:translateY(0); } }

        .btn-enter {
            margin-top: 25px; padding: 16px 35px; border-radius: 40px; width: 100%;
            background: linear-gradient(145deg, #d4af37, #b08d2b);
            color: #000; font-weight: bold; border: 1px solid #f3e5ab; font-size: 1.05rem;
            cursor: pointer; letter-spacing: 3px; box-shadow: 0 0 30px rgba(212,175,55,0.5);
            transition: 0.3s;
        }
        .btn-enter:active { transform: scale(0.95); box-shadow: 0 0 50px rgba(243,229,171,0.8); }

        .close-btn {
            position: absolute; top: 15px; right: 20px; color: #888; font-size: 1.5rem;
            cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="vairocana-light"></div>
    <div class="stars-dust"></div>

    <div class="lotus-ocean-3d">
        <svg viewBox="0 0 200 200" style="width:100%; height:100%; filter: drop-shadow(0 0 20px rgba(139,168,156,0.3));">
            <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(139,168,156,0.4)" stroke-width="0.5" stroke-dasharray="1 4"/>
            <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(212,175,55,0.3)" stroke-width="1"/>
            <circle cx="100" cy="100" r="60" fill="none" stroke="rgba(139,168,156,0.5)" stroke-width="1" stroke-dasharray="5 5"/>
            <path d="M100 0 L 100 200 M 0 100 L 200 100 M 30 30 L 170 170 M 30 170 L 170 30" stroke="rgba(212,175,55,0.2)" stroke-width="0.5"/>
            <g stroke="rgba(212,175,55,0.8)" fill="none" stroke-width="0.8">
                <path d="M100 20 C 130 50, 120 90, 100 100 C 80 90, 70 50, 100 20" />
                <path d="M100 180 C 130 150, 120 110, 100 100 C 80 110, 70 150, 100 180" />
                <path d="M20 100 C 50 130, 90 120, 100 100 C 90 80, 50 70, 20 100" />
                <path d="M180 100 C 150 130, 110 120, 100 100 C 110 80, 150 70, 180 100" />
                <g transform="rotate(45 100 100)" stroke="rgba(243,229,171,0.6)" stroke-width="0.6">
                    <path d="M100 30 C 120 50, 110 90, 100 100 C 80 90, 80 50, 100 30" />
                    <path d="M100 170 C 120 150, 110 110, 100 100 C 80 110, 80 150, 100 170" />
                    <path d="M30 100 C 50 120, 90 110, 100 100 C 90 80, 50 80, 30 100" />
                    <path d="M170 100 C 150 120, 110 110, 100 100 C 110 80, 150 80, 170 100" />
                </g>
            </g>
            <circle cx="100" cy="100" r="15" fill="rgba(255,255,255,0.1)" stroke="#d4af37" stroke-width="2"/>
        </svg>
    </div>

    <div class="light-pillar"></div>

    <div class="world-tiers" id="tiers-container"></div>

    <div id="info-card">
        <div class="close-btn" onclick="document.getElementById('info-card').style.display='none'">×</div>
        <h3 style="color:#f3e5ab; margin-top:10px; font-size: 1.4rem; letter-spacing: 3px;">第十三層<br><span style="font-size:1rem; color:var(--cyan);">娑婆與極樂</span></h3>
        <p style="color:#ddd; font-size:0.95rem; line-height:1.8; text-align:justify; margin: 20px 0;">
            您已觸及一真法界之核心。<br><br>
            在無盡浩瀚的華藏世界海中，我們所在的<span style="color:#d4af37; font-weight:bold;">娑婆世界</span>與阿彌陀佛的<span style="color:#d4af37; font-weight:bold;">極樂世界</span>，皆安住於此第十三層。娑婆居中，極樂在西。<br><br>
            無量劫的流浪，是時候從娑婆起修，一念迴光，歸向極樂。
        </p>
        <button class="btn-enter" onclick="window.location.href='https://namoamitabhapureland.github.io/bodhicitta/'">
            歸向彌陀淨土系統
        </button>
    </div>

    <script>
        const container = document.getElementById('tiers-container');
        for(let i = 1; i <= 20; i++) {
            let dot = document.createElement('div');
            dot.className = 'tier-dot';
            
            if(i === 13) {
                dot.classList.add('tier-13');
                dot.onclick = () => {
                    document.getElementById('info-card').style.display = 'block';
                    if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
                };
            } else {
                // 其他樓層點擊的小回饋
                dot.onclick = () => {
                    dot.style.transform = "scale(2.5)";
                    dot.style.background = "#d4af37";
                    setTimeout(()=> {
                        dot.style.transform = "";
                        dot.style.background = "rgba(255,255,255,0.4)";
                    }, 500);
                };
            }
            container.appendChild(dot);
        }
    </script>
</body>
</html>
