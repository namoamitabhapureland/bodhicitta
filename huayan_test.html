<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華嚴大世界 ． 宏觀法界</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --bg-deep: #020205;
        }

        body { 
            margin: 0; background: var(--bg-deep); color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; perspective: 1200px; 
            touch-action: none;
        }

        /* 大日如來 常寂光背景 */
        .vairocana-light {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.08) 0%, rgba(212,175,55,0.03) 30%, transparent 70%);
            z-index: 0; animation: divine-breath 12s infinite alternate ease-in-out;
            pointer-events: none;
        }
        @keyframes divine-breath {
            0% { opacity: 0.5; transform: scale(0.9); filter: drop-shadow(0 0 30px rgba(212,175,55,0.1)); }
            100% { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 80px rgba(255,255,255,0.2)); }
        }

        /* 3D 空間容器 */
        #universe-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transform: rotateX(75deg); 
            transition: transform 0.1s ease-out;
            z-index: 2;
        }

        /* 底盤：十重香水海與核心古典蓮華 */
        #lotus-ocean {
            position: absolute; top: 50%; left: 50%;
            width: 250vw; height: 250vw; max-width: 1400px; max-height: 1400px;
            margin-left: -125vw; margin-top: -125vw;
            transform-style: preserve-3d;
            display: flex; justify-content: center; align-items: center;
        }
        @media (min-width: 1400px) { #lotus-ocean { margin-left: -700px; margin-top: -700px; } }

        .svg-glow {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 20px rgba(212,175,55,0.3));
        }

        /* 貫穿法界的主光柱 */
        #pillar-system {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 75vh;
            margin-left: -2px; margin-top: -37.5vh;
            display: flex; flex-direction: column-reverse; justify-content: space-between; align-items: center;
            transform-style: preserve-3d;
            transform: rotateX(-75deg) translateY(-20vh); /* 反向抵銷傾斜，保持直立 */
        }

        .light-beam {
            position: absolute; top: 0; bottom: 0; width: 2px;
            background: linear-gradient(to top, transparent, rgba(212,175,55,1) 20%, rgba(255,255,255,0.9) 50%, rgba(139,168,156,0.8) 80%, transparent);
            box-shadow: 0 0 20px rgba(212,175,55,0.6), 0 0 40px rgba(255,255,255,0.2); z-index: 1;
        }

        /* 二十層世界光點 (基礎樣式，大小由 JS 動態控制) */
        .tier-dot {
            border-radius: 50%;
            background: rgba(255,255,255,0.5); cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; z-index: 2;
            box-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        /* ✨ 第十三層：娑婆與極樂 (固定莊嚴大小) */
        .tier-13 {
            width: 20px !important; height: 20px !important; background: #fff; border: 2px solid var(--solid-gold);
            box-shadow: 0 0 20px var(--gold), 0 0 40px var(--solid-gold), inset 0 0 10px var(--solid-gold);
            animation: pulse-13 2s infinite alternate ease-in-out;
            z-index: 10;
        }
        @keyframes pulse-13 { 
            0% { transform: scale(1); box-shadow: 0 0 15px var(--solid-gold), inset 0 0 5px var(--solid-gold); } 
            100% { transform: scale(1.2); box-shadow: 0 0 40px var(--gold), 0 0 80px var(--solid-gold), inset 0 0 15px var(--solid-gold); } 
        }

        .tier-label {
            position: absolute; left: 35px; top: 0px; width: 220px;
            color: var(--gold); font-size: 0.95rem; font-weight: bold; letter-spacing: 2px;
            text-shadow: 0 0 15px var(--solid-gold), 0 0 5px #000; pointer-events: none;
        }

        /* 觸控引導提示 */
        #touch-guide {
            position: absolute; bottom: 8%; color: rgba(243,229,171,0.5);
            font-size: 0.9rem; letter-spacing: 3px; pointer-events: none;
            animation: fade-guide 4s infinite alternate; z-index: 50;
        }
        @keyframes fade-guide { 0% { opacity: 0.2; } 100% { opacity: 1; text-shadow: 0 0 10px var(--gold); } }

        /* ✨ 接引資訊卡片 */
        #info-card {
            position: absolute; top: 15%; width: 85%; max-width: 400px;
            background: linear-gradient(145deg, rgba(15,20,30,0.9), rgba(5,5,10,0.95)); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1.5px solid var(--solid-gold); border-radius: 24px; padding: 30px; text-align: center; z-index: 100;
            display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.15);
        }
        .btn-enter {
            margin-top: 25px; padding: 16px 35px; border-radius: 40px; width: 100%;
            background: linear-gradient(145deg, #d4af37, #b08d2b); color: #000; font-weight: bold; 
            border: 1px solid var(--gold); font-size: 1.05rem; cursor: pointer; letter-spacing: 3px; 
            box-shadow: 0 0 30px rgba(212,175,55,0.5); transition: 0.3s;
        }
        .btn-enter:active { transform: scale(0.95); box-shadow: 0 0 50px rgba(243,229,171,0.8); }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #888; font-size: 1.5rem; cursor: pointer; font-weight: bold; }

    </style>
</head>
<body>

    <div class="vairocana-light"></div>
    <div id="touch-guide">👆 撥動指尖 ． 俯瞰華藏法界 👇</div>

    <div id="universe-container">
        <div id="lotus-ocean">
            <svg class="svg-glow" viewBox="0 0 200 200" id="ocean-svg" xmlns="http://www.w3.org/2000/svg">
                <circle cx="100" cy="100" r="1.5" fill="#fff" filter="drop-shadow(0 0 5px #fff)"/>
                <circle cx="100" cy="100" r="5" fill="rgba(212,175,55,0.1)" stroke="#d4af37" stroke-width="0.3"/>
            </svg>
        </div>

        <div id="pillar-system">
            <div class="light-beam"></div>
        </div>
    </div>

    <div id="info-card">
        <div class="close-btn" onclick="document.getElementById('info-card').style.display='none'">×</div>
        <h3 style="color:var(--gold); margin-top:10px; font-size: 1.4rem; letter-spacing: 3px;">第十三層<br><span style="font-size:1rem; color:var(--cyan);">娑婆與極樂</span></h3>
        <p style="color:#ddd; font-size:0.95rem; line-height:1.8; text-align:justify; margin: 20px 0;">
            您已觸及一真法界之核心。<br><br>
            在無盡浩瀚的華藏世界海中，我們所在的<span style="color:var(--solid-gold); font-weight:bold;">娑婆世界</span>與阿彌陀佛的<span style="color:var(--solid-gold); font-weight:bold;">極樂世界</span>，皆安住於此第十三層。娑婆居中，極樂在西。<br><br>
            無量劫的流浪，是時候從娑婆起修，一念迴光，歸向極樂。
        </p>
        <button class="btn-enter" onclick="window.location.href='https://namoamitabhapureland.github.io/bodhicitta/'">
            歸向彌陀淨土系統
        </button>
    </div>

    <script>
        const svg = document.getElementById('ocean-svg');
        const gold = "rgba(212,175,55,";
        const cyan = "rgba(139,168,156,";

        // ==========================================
        // ✨ 1. 背景：保留十重香水海圓環
        // ==========================================
        for(let i = 1; i <= 10; i++) {
            let radius = i * 9.5; 
            let opacity = 1 - (i * 0.08); 
            let circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", "100");
            circle.setAttribute("cy", "100");
            circle.setAttribute("r", radius);
            circle.setAttribute("fill", "none");
            circle.setAttribute("stroke", i % 2 === 0 ? `${cyan}${opacity})` : `${gold}${opacity})`);
            circle.setAttribute("stroke-width", "0.2"); 
            circle.setAttribute("stroke-dasharray", i % 3 === 0 ? "2 6" : "none"); 
            svg.appendChild(circle);
        }

        // ==========================================
        // ✨ 2. 核心：繪製古典 2D 幾何蓮花 (經典的尖瓣疊影)
        // ==========================================
        let lotusGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");

        // 繪製單層蓮花的函數
        function drawClassicLayer(radius, petalCount, color, rotationOffset, strokeW) {
            let layer = document.createElementNS("http://www.w3.org/2000/svg", "g");
            layer.setAttribute("stroke", color);
            layer.setAttribute("fill", "rgba(212,175,55,0.02)"); // 極淡的金色填充
            layer.setAttribute("stroke-width", strokeW);

            for(let i=0; i<petalCount; i++) {
                let angle = (360 / petalCount) * i + rotationOffset;
                let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                
                // 完美的古典蓮花瓣貝茲曲線：底部圓潤，尖端收攏
                let d = `M 100 100 C ${100 - radius*0.5} ${100 - radius*0.1}, ${100 - radius*0.3} ${100 - radius*0.7}, 100 ${100 - radius} C ${100 + radius*0.3} ${100 - radius*0.7}, ${100 + radius*0.5} ${100 - radius*0.1}, 100 100`;
                
                path.setAttribute("d", d);
                path.setAttribute("transform", `rotate(${angle} 100 100)`);
                layer.appendChild(path);
            }
            return layer;
        }

        // 疊加三層不同大小、角度的蓮花，創造 2D 曼陀羅美感
        lotusGroup.appendChild(drawClassicLayer(65, 8, `${gold}0.6)`, 0, "0.5"));       // 外層大瓣
        lotusGroup.appendChild(drawClassicLayer(48, 8, `${cyan}0.7)`, 22.5, "0.5"));    // 中層交錯青瓣
        lotusGroup.appendChild(drawClassicLayer(30, 8, `${gold}0.9)`, 0, "0.8"));       // 內層小瓣

        // 讓這朵 2D 古典蓮花在 3D 空間中極度緩慢地自轉
        let anim = document.createElementNS("http://www.w3.org/2000/svg", "animateTransform");
        anim.setAttribute("attributeName", "transform");
        anim.setAttribute("type", "rotate");
        anim.setAttribute("from", "0 100 100");
        anim.setAttribute("to", "360 100 100");
        anim.setAttribute("dur", "180s"); 
        anim.setAttribute("repeatCount", "indefinite");
        lotusGroup.appendChild(anim);

        svg.appendChild(lotusGroup);


        // ==========================================
        // ✨ 3. 漸進增大的 20 層世界與七彩光芒特效
        // ==========================================
        const pillar = document.getElementById('pillar-system');
        
        for(let i = 1; i <= 20; i++) {
            let dot = document.createElement('div');
            dot.className = 'tier-dot';
            
            // 【漸進大小】：從底部的 4px 慢慢長大到頂部的 13.5px
            let baseSize = 4 + (i * 0.5); 
            
            if(i === 13) {
                dot.classList.add('tier-13');
                dot.innerHTML = '<div class="tier-label">第十三層：娑婆 / 極樂</div>';
                dot.onclick = () => {
                    document.getElementById('info-card').style.display = 'block';
                    if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
                };
            } else {
                dot.style.width = `${baseSize}px`;
                dot.style.height = `${baseSize}px`;

                dot.onclick = () => {
                    // 【漸進爆發】：越上層，點擊時放大的倍率越驚人
                    let burstScale = 1.8 + (i * 0.15); 
                    
                    // 【漸層色彩】：從底部的金色 (Hue: 40)，漸層到頂層的琉璃青 (Hue: ~160)
                    let hue = 40 + (i * 6); 
                    let dynamicColor = `hsl(${hue}, 80%, 70%)`;

                    dot.style.transform = `scale(${burstScale})`;
                    dot.style.background = dynamicColor;
                    dot.style.boxShadow = `0 0 ${10 + i*2}px ${dynamicColor}, 0 0 ${20 + i*2}px #fff`;

                    // 800 毫秒後收攝光芒
                    setTimeout(()=> {
                        dot.style.transform = "";
                        dot.style.background = "rgba(255,255,255,0.5)";
                        dot.style.boxShadow = "0 0 8px rgba(255,255,255,0.6)";
                    }, 800);
                };
            }
            pillar.appendChild(dot);
        }


        // ==========================================
        // ✨ 4. 觸控互動魔法 (指尖撥動 3D 宇宙)
        // ==========================================
        let universe = document.getElementById('universe-container');
        let lotus = document.getElementById('lotus-ocean');
        let pillarSys = document.getElementById('pillar-system');
        
        let isDragging = false;
        let startX, startY;
        let currentTilt = 75;   
        let currentSpin = 0;    

        // 整個星盤底座的自轉
        setInterval(() => {
            if(!isDragging) {
                currentSpin -= 0.05;
                lotus.style.transform = `rotateZ(${currentSpin}deg)`;
            }
        }, 30);

        document.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX || e.touches[0].clientX;
            startY = e.clientY || e.touches[0].clientY;
            document.getElementById('touch-guide').style.display = 'none';
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            let deltaX = x - startX;
            let deltaY = y - startY;

            // 左右撥動
            currentSpin += deltaX * 0.4;
            lotus.style.transform = `rotateZ(${currentSpin}deg)`;

            // 上下俯瞰
            currentTilt -= deltaY * 0.15;
            if (currentTilt > 85) currentTilt = 85; 
            if (currentTilt < 50) currentTilt = 50; 

            universe.style.transform = `rotateX(${currentTilt}deg)`;
            pillarSys.style.transform = `rotateX(-${currentTilt}deg) translateY(-20vh)`;

            startX = x;
            startY = y;
        });

        document.addEventListener('pointerup', () => { isDragging = false; });
        document.addEventListener('pointercancel', () => { isDragging = false; });
    </script>
</body>
</html>
