<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>彌陀淨土 ． 圖示生成器</title>
    <style>
        body {
            background: #000;
            color: #d4af37;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .panel {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(212,175,55,0.05);
        }
        h2 {
            margin-top: 0;
            letter-spacing: 4px;
            font-weight: normal;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        button {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.9), rgba(10, 10, 10, 1));
            color: #f3e5ab;
            border: 1px solid #d4af37;
            padding: 15px 30px;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        button:hover {
            background: rgba(212, 175, 55, 0.15);
            transform: scale(0.98);
        }
        .hint {
            font-size: 0.8rem;
            color: #888;
            margin-top: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h2>道場專屬圖示生成器</h2>
        <button onclick="downloadPNG('hands')">生成並下載：合十對頻 (PNG)</button>
        <button onclick="downloadPNG('lotus')">生成並下載：十念蓮花 (PNG)</button>
        <div class="hint">將自動轉換為 512x512 高解析度圖檔</div>
    </div>

    <canvas id="canvas" width="512" height="512" style="display:none;"></canvas>

    <script>
        const svgs = {
            // 合十 SVG (已將視角置中並加入極黑底板)
            hands: `<svg viewBox="0 0 320 320" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
              <rect width="320" height="320" fill="#050505"/>
              <rect x="2" y="2" width="316" height="316" fill="none" stroke="#d4af37" stroke-width="4" rx="40"/>
              <g transform="translate(60, 10)">
                  <defs>
                    <linearGradient id="glass-base" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stop-color="rgba(243, 229, 171, 0.35)"/>
                      <stop offset="50%" stop-color="rgba(212, 175, 55, 0.20)"/>
                      <stop offset="100%" stop-color="rgba(212, 175, 55, 0.08)"/>
                    </linearGradient>
                  </defs>
                  <path d="M 100 25 C 97 18, 93 20, 92 30 L 62 165 C 55 190, 40 230, 10 245 L 30 275 C 65 265, 85 245, 100 225 C 115 245, 135 265, 170 275 L 190 245 C 160 230, 145 190, 138 165 L 108 30 C 107 20, 103 18, 100 25 Z" fill="url(#glass-base)" />
                  <path d="M 138 165 L 108 30 C 107 20, 103 18, 100 25 C 97 18, 93 20, 92 30 L 62 165 M 30 275 C 65 265, 85 245, 100 225 C 115 245, 135 265, 170 275" fill="none" stroke="#d4af37" stroke-width="1.5" stroke-linejoin="round"/>
                  <path d="M 62 165 C 55 190, 40 230, 10 245" fill="none" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M 138 165 C 145 190, 160 230, 190 245" fill="none" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M 0 240 Q 37.5 265, 75 240" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" transform="rotate(40, 37.5, 240)"/>
                  <path d="M 5 232 Q 41.5 257, 78 232" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" transform="rotate(40, 37.5, 240)"/>
                  <path d="M 200 240 Q 162.5 265, 125 240" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" transform="rotate(-40, 162.5, 240)"/>
                  <path d="M 195 232 Q 158.5 257, 122 232" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" transform="rotate(-40, 162.5, 240)"/>
                  <path d="M 100 25 L 100 160" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" fill="none" />
                  <path d="M 100 195 L 100 225" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" fill="none" />
                  <path d="M 136 175 C 125 155, 110 152, 102 155" stroke="rgba(212,175,55,0.8)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                  <path d="M 63 170 C 80 155, 95 152, 112 158 C 118 160, 120 170, 115 175 C 95 188, 75 198, 63 215" stroke="#d4af37" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
                  <path d="M 105 182 Q 125 218 138 210" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" fill="none" />
              </g>
            </svg>`,

            // 蓮花 SVG (置中比例調整並加入極黑底板)
            lotus: `<svg viewBox="0 0 24 24" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
              <rect width="24" height="24" fill="#050505"/>
              <rect x="0.5" y="0.5" width="23" height="23" fill="none" stroke="#d4af37" stroke-width="0.3" rx="3"/>
              <g transform="translate(0, -1)">
                  <path d="M12 21C12 21 17 15 17 11C17 7 12 3 12 3C12 3 7 7 7 11C7 15 12 21 12 21Z" fill="rgba(212,175,55,0.2)" stroke="#f3e5ab" stroke-width="0.8"/>
                  <path d="M12 21C12 21 22 17 22 11C22 7 17 7 12 11" fill="none" stroke="#d4af37" stroke-width="0.8"/>
                  <path d="M12 21C12 21 2 17 2 11C2 7 7 7 12 11" fill="none" stroke="#d4af37" stroke-width="0.8"/>
                  <circle cx="12" cy="11" r="1.5" fill="#f3e5ab"/>
              </g>
            </svg>`
        };

        function downloadPNG(type) {
            const svgStr = svgs[type];
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            // 清除畫布
            ctx.clearRect(0, 0, 512, 512);

            const img = new Image();
            // 將 SVG 字串轉為 Base64
            const encodedData = window.btoa(unescape(encodeURIComponent(svgStr)));
            
            img.onload = function() {
                // 將圖片繪製於 Canvas
                ctx.drawImage(img, 0, 0, 512, 512);
                
                // 將 Canvas 輸出為 PNG 檔案
                const pngUrl = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = pngUrl;
                a.download = type === 'hands' ? 'apple-touch-icon.png' : 'lotus-icon.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
            
            img.src = 'data:image/svg+xml;base64,' + encodedData;
        }
    </script>
</body>
</html>
