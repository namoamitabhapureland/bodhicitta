<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>彌陀淨土 ． 圖示生成器 (完美精裝版)</title>
    <style>
        body {
            background: #000; color: #d4af37;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0;
        }
        .panel {
            background: rgba(15, 15, 15, 0.9); border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 40px; border-radius: 16px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(212,175,55,0.05);
        }
        h2 { margin-top: 0; letter-spacing: 4px; font-weight: normal; border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 15px; margin-bottom: 30px; }
        button {
            display: block; width: 100%;
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.9), rgba(10, 10, 10, 1));
            color: #f3e5ab; border: 1px solid #d4af37;
            padding: 15px 30px; border-radius: 8px; margin-bottom: 15px;
            cursor: pointer; font-size: 1rem; letter-spacing: 2px; transition: all 0.3s;
        }
        button:hover { background: rgba(212, 175, 55, 0.15); transform: scale(0.98); }
        .hint { font-size: 0.8rem; color: #888; margin-top: 20px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>道場專屬圖示生成器</h2>
        <button onclick="downloadPNG('hands')">生成並下載：原版合十 (含指甲)</button>
        <button onclick="downloadPNG('lotus')">生成並下載：十念大蓮花 (大日純金)</button>
        <div class="hint">將萃取您的原生 SVG 轉換為 512x512 PNG</div>
    </div>

    <canvas id="canvas" width="512" height="512" style="display:none;"></canvas>

    <script>
        // 1. 原汁原味的合十 SVG (加入指甲路徑與完美置中)
        const handsSVG = `<svg viewBox="0 0 320 320" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
          <rect width="320" height="320" fill="#050505"/>
          <g transform="translate(60, 15)">
            <defs>
              <linearGradient id="glass-base" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="rgba(243, 229, 171, 0.35)"/>
                <stop offset="50%" stop-color="rgba(212, 175, 55, 0.20)"/>
                <stop offset="100%" stop-color="rgba(212, 175, 55, 0.08)"/>
              </linearGradient>
            </defs>
            <path d="M 100 25 C 97 18, 93 20, 92 30 L 62 165 C 55 190, 40 230, 10 245 L 30 275 C 65 265, 85 245, 100 225 C 115 245, 135 265, 170 275 L 190 245 C 160 230, 145 190, 138 165 L 108 30 C 107 20, 103 18, 100 25 Z" fill="url(#glass-base)" />
            <path d="M 138 165 L 108 30 C 107 20, 103 18, 100 25 C 97 18, 93 20, 92 30 L 62 165 M 30 275 C 65 265, 85 245, 100 225 C 115 245, 135 265, 170 275" fill="none" stroke="#d4af37" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M 62 165 C 55 190, 40 230, 10 245" fill="none" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M 138 165 C 145 190, 160 230, 190 245" fill="none" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M 0 240 Q 37.5 265, 75 240" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" transform="rotate(40, 37.5, 240)"/>
            <path d="M 5 232 Q 41.5 257, 78 232" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" transform="rotate(40, 37.5, 240)"/>
            <path d="M 200 240 Q 162.5 265, 125 240" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" transform="rotate(-40, 162.5, 240)"/>
            <path d="M 195 232 Q 158.5 257, 122 232" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" transform="rotate(-40, 162.5, 240)"/>
            
            <path d="M 96 23 C 98 25, 98 32, 94 34" stroke="#d4af37" stroke-width="1.5" fill="none" />
            <path d="M 104 23 C 102 25, 102 32, 106 34" stroke="#d4af37" stroke-width="1.5" fill="none" />
            
            <path d="M 100 25 L 100 160" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" fill="none" />
            <path d="M 100 195 L 100 225" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" fill="none" />
            <path d="M 136 175 C 125 155, 110 152, 102 155" stroke="rgba(212,175,55,0.8)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <path d="M 63 170 C 80 155, 95 152, 112 158 C 118 160, 120 170, 115 175 C 95 188, 75 198, 63 215" stroke="#d4af37" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
            <path d="M 103 162 C 109 159, 113 161, 113 166 C 109 169, 103 167, 103 162 Z" stroke="#d4af37" stroke-width="1.5" fill="none" />
            <path d="M 105 182 Q 125 218 138 210" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" fill="none" />
            <path d="M 40 260 Q 70 250, 95 230" stroke="rgba(212,175,55,0.7)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <path d="M 45 250 Q 70 240, 90 225" stroke="rgba(212,175,55,0.4)" stroke-width="1" fill="none" stroke-linecap="round"/>
            <path d="M 160 260 Q 130 250, 105 230" stroke="rgba(212,175,55,0.7)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <path d="M 155 250 Q 130 240, 110 225" stroke="rgba(212,175,55,0.4)" stroke-width="1" fill="none" stroke-linecap="round"/>
          </g>
        </svg>`;

        // 2. 原汁原味的十念大蓮花演算法 (已移除會干擾 PNG 生成的 animate 標籤)
        function generateLotusSVG() {
            // 選用您設定檔中的 "大日純金" 等級 (最適合當作 Icon)
            const s = { t:"#fffde7", m:"#fdd835", b:"#f57f17", o: 0.9, l: 5, g: 2.2 };
            
            let svgHtml = `<svg viewBox="0 0 100 100" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" fill="#050505"/>
                <defs>
                    <linearGradient id="cl-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="${s.t}" stop-opacity="0.95"/>
                        <stop offset="50%" stop-color="${s.m}" stop-opacity="${s.o}"/>
                        <stop offset="100%" stop-color="${s.b}" stop-opacity="0.95"/>
                    </linearGradient>
                    <radialGradient id="cl-core" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#fff"/><stop offset="40%" stop-color="${s.m}"/><stop offset="100%" stop-color="transparent"/>
                    </radialGradient>
                    <path id="cl-petal" d="M 50 50 C 39 25, 41 9, 50 2 C 59 9, 61 25, 50 50 Z" fill="url(#cl-grad)" stroke="rgba(255,255,255,0.4)" stroke-width="0.3"/>
                </defs>
                <circle cx="50" cy="50" r="45" fill="rgba(10,10,10,0.6)"/>
                <circle cx="50" cy="50" r="38" fill="none" stroke="${s.m}" stroke-width="0.5" stroke-dasharray="1 4" opacity="0.6"/>
                <g filter="drop-shadow(0 0 4px rgba(0,0,0,0.5))">`;

            // 動態生成 40 片層次交疊的花瓣
            for (let l = s.l; l > 0; l--) {
                const sc = 0.35 + (l * 0.12);
                const off = (l % 2 === 0) ? 22.5 : 0; 
                for (let i = 0; i < 8; i++) {
                    const angle = i * 45 + off;
                    const op = Math.min(1, 0.7 + (l * 0.05));
                    svgHtml += `<use href="#cl-petal" transform="rotate(${angle} 50 50) scale(${sc}) translate(${(1-sc)*50/sc} ${(1-sc)*50/sc})" opacity="${op}"/>`;
                }
            }
            
            svgHtml += `</g>
                <circle cx="50" cy="50" r="${3 + (s.l * 0.5) * s.g}" fill="url(#cl-core)" opacity="0.95"/>
            </svg>`;
            return svgHtml;
        }

        function downloadPNG(type) {
            const svgStr = type === 'hands' ? handsSVG : generateLotusSVG();
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, 512, 512);

            const img = new Image();
            const encodedData = window.btoa(unescape(encodeURIComponent(svgStr)));
            
            img.onload = function() {
                ctx.drawImage(img, 0, 0, 512, 512);
                const pngUrl = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = pngUrl;
                a.download = type === 'hands' ? 'apple-touch-icon-hands.png' : 'apple-touch-icon-lotus.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
            img.src = 'data:image/svg+xml;base64,' + encodedData;
        }
    </script>
</body>
</html>
