<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>彌陀淨土 ． 圖示生成器 (精裝金框版)</title>
    <style>
        body {
            background: #000; color: #d4af37;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0;
        }
        .panel {
            background: rgba(15, 15, 15, 0.9); border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 40px; border-radius: 16px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(212,175,55,0.05);
        }
        h2 { margin-top: 0; letter-spacing: 4px; font-weight: normal; border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 15px; margin-bottom: 30px; }
        button {
            display: block; width: 100%;
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.9), rgba(10, 10, 10, 1));
            color: #f3e5ab; border: 1px solid #d4af37;
            padding: 16px 30px; border-radius: 8px; margin-bottom: 15px;
            cursor: pointer; font-size: 1rem; letter-spacing: 3px; font-weight: bold; transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        button:hover { background: rgba(212, 175, 55, 0.15); transform: scale(0.98); }
        .hint { font-size: 0.8rem; color: #888; margin-top: 20px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>道場 Icon 生成器</h2>
        <button onclick="downloadPNG()">生成並下載：合十對頻 (精裝金框)</button>
        <div class="hint">將自動轉換為 512x512 PNG</div>
    </div>

    <canvas id="canvas" width="512" height="512" style="display:none;"></canvas>

    <script>
        // 🌟 核心 SVG (包含金框、修飾直角、以及大幅提升亮度的發光手)
        const finalIconSVG = `<svg viewBox="0 0 320 320" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="glass-base-bright" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="rgba(243, 229, 171, 0.6)"/> <stop offset="50%" stop-color="rgba(212, 175, 55, 0.4)"/> <stop offset="100%" stop-color="rgba(212, 175, 55, 0.2)"/> </linearGradient>
            
            <filter id="buddha-halo" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="8" result="blur"/>
              <feFlood flood-color="#f3e5ab" flood-opacity="0.6" result="flood"/>
              <feComposite in="flood" in2="blur" operator="in" result="softGlow"/>
              <feMerge>
                <feMergeNode in="softGlow"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>

          <rect width="320" height="320" rx="60" ry="60" fill="#030303"/>

          <rect x="6" y="6" width="308" height="308" rx="55" ry="55" fill="none" stroke="#d4af37" stroke-width="12" filter="drop-shadow(0 0 5px rgba(212,175,55,0.4))"/>

          <g transform="translate(60, 35)" filter="url(#buddha-halo)">
            <path d="M 100 25 C 97 18, 93 20, 92 30 L 62 165 C 55 190, 40 230, 10 245 L 30 275 C 65 265, 85 245, 100 225 C 115 245, 135 265, 170 275 L 190 245 C 160 230, 145 190, 138 165 L 108 30 C 107 20, 103 18, 100 25 Z" fill="url(#glass-base-bright)" />
            
            <path d="M 138 165 L 108 30 C 107 20, 103 18, 100 25 C 97 18, 93 20, 92 30 L 62 165 M 30 275 C 65 265, 85 245, 100 225 C 115 245, 135 265, 170 275" fill="none" stroke="#d4af37" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M 62 165 C 55 190, 40 230, 10 245" fill="none" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M 138 165 C 145 190, 160 230, 190 245" fill="none" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M 0 240 Q 37.5 265, 75 240" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" transform="rotate(40, 37.5, 240)"/>
            <path d="M 5 232 Q 41.5 257, 78 232" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" transform="rotate(40, 37.5, 240)"/>
            <path d="M 200 240 Q 162.5 265, 125 240" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" transform="rotate(-40, 162.5, 240)"/>
            <path d="M 195 232 Q 158.5 257, 122 232" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" transform="rotate(-40, 162.5, 240)"/>
            
            <path d="M 96 23 C 98 25, 98 32, 94 34" stroke="#d4af37" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <path d="M 104 23 C 102 25, 102 32, 106 34" stroke="#d4af37" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            
            <path d="M 100 25 L 100 160" stroke="#d4af37" stroke-width="1.8" stroke-linecap="round" fill="none" />
            <path d="M 100 195 L 100 225" stroke="#d4af37" stroke-width="1.8" stroke-linecap="round" fill="none" />
            <path d="M 136 175 C 125 155, 110 152, 102 155" stroke="rgba(212,175,55,0.8)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <path d="M 63 170 C 80 155, 95 152, 112 158 C 118 160, 120 170, 115 175 C 95 188, 75 198, 63 215" stroke="#d4af37" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
            <path d="M 103 162 C 109 159, 113 161, 113 166 C 109 169, 103 167, 103 162 Z" stroke="#d4af37" stroke-width="1.2" fill="none" />
            <path d="M 105 182 Q 125 218 138 210" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" fill="none" />
            <path d="M 40 260 Q 70 250, 95 230" stroke="rgba(212,175,55,0.8)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <path d="M 45 250 Q 70 240, 90 225" stroke="rgba(212,175,55,0.5)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <path d="M 160 260 Q 130 250, 105 230" stroke="rgba(212,175,55,0.8)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <path d="M 155 250 Q 130 240, 110 225" stroke="rgba(212,175,55,0.5)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          </g>
        </svg>`;

        function downloadPNG() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 512, 512);

            const img = new Image();
            const encodedData = window.btoa(unescape(encodeURIComponent(finalIconSVG)));
            
            img.onload = function() {
                // 將 SVG 繪製到 Canvas 上
                ctx.drawImage(img, 0, 0, 512, 512);
                
                // 輸出 PNG
                const pngUrl = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = pngUrl;
                a.download = 'apple-touch-icon.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
            
            // 觸發圖片載入 (在 PNG 轉換中必須使用 Base64，因為 blob 在跨域安全性上較複雜)
            img.src = 'data:image/svg+xml;base64,' + encodedData;
        }
    </script>
</body>
</html>
