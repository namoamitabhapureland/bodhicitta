<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普賢行願 OS - 實修版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="time-monitor">
    <div id="mini-seed" style="font-size: 2rem;">✨</div>
    
    <div style="text-align:center; flex:1; margin: 0 10px;">
        <div style="font-size:1.1rem; font-weight:bold; color:var(--theme-color); text-shadow: 0 0 10px var(--theme-color);">
            ［<span id="rank-title">初信位</span>］<span id="display-name">行者</span>
        </div>
        <div style="font-size:0.8rem; color:var(--gold); margin:2px 0;">
            今日發心對頻：第 <span id="today-count">0</span> 次
        </div>
        <div style="font-size:0.75rem; color:#888; letter-spacing:1px;">
            娑婆：<span id="earth-time">--</span> | 極樂累積：<span id="pure-time">--</span>
        </div>
    </div>
    <div id="growth-lv" style="font-size:0.8rem; color:var(--theme-color); border: 1px solid var(--theme-color); padding: 2px 10px; border-radius: 12px;">金剛種子</div>
</div>
    <div id="gold-dust-layer"></div>
    <div id="home-btn" onclick="goHome()">🏠</div>

    <div id="screen-1" class="container active">
        <div id="welcome-msg" style="color:var(--cyan); margin-bottom:20px; font-size:1.1rem;"></div>
        <input type="text" id="user-name" placeholder="請留名號">
        <div class="progress-box">
            <div style="color:var(--gold); font-size:1.3rem;">累積念佛：<span id="total-count">0</span> 聲</div>
            <div style="margin-top:20px;">
                <div class="streak-header">
                    <span id="streak-title">百日功德進度</span>
                    <span><span id="streak-val">0.0</span> / 100 日</span>
                </div>
                <div class="bar-bg"><div id="streak-bar" class="bar-fill"></div></div>
            </div>
        </div>
        <button class="btn-main" onclick="startApp()">啟動與佛對頻</button>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn-tool" onclick="exportProgress()">💾 備份</button>
            <button class="btn-tool" onclick="document.getElementById('import-file').click()">📂 還原</button>
            <input type="file" id="import-file" style="display:none" onchange="importProgress(this)">
        </div>
    </div>

    <div id="screen-2" class="container">
        <div class="nian-circle-wrap">
            <svg width="260" height="260">
                <circle cx="130" cy="130" r="120" stroke="#222" stroke-width="12" fill="none"></circle>
                <circle id="nian-progress" class="circle-progress" cx="130" cy="130" r="120"></circle>
            </svg>
            <div id="big-seed" onclick="handleNian()">✨</div>
        </div>
        <div id="nian-num" style="font-size:3rem; font-weight:bold; margin-bottom:10px;">0 / 10</div>
        <div id="nian-word" style="font-size:2.5rem; color:var(--gold); height:3rem;"></div>
        
        <div id="bodhi-layer">
            <div class="bodhi-text">願以此功德，平等施於一切。<br>同發菩提心，往生極樂國。</div>
            <button class="btn-main" onclick="confirmBodhi()">誠心領受．進入資糧</button>
        </div>
    </div>

    <div id="screen-3" class="container">
        <h3 style="color:var(--gold);">今日十項修行資糧</h3>
        <div id="task-list"></div>
        
        <hr style="width:100%; border:0; border-top:1px solid #333; margin:30px 0;">
        
        <h3 style="color:var(--cyan);">聞法與樂</h3>
        <div style="display:flex; gap:15px; width:100%; margin-bottom:20px;">
            <button class="btn-main" style="flex:1; font-size:0.9rem;" onclick="openLib()">📖 進入法寶閣</button>
            <a href="https://www.youtube.com/@您的頻道ID" target="_blank" style="flex:1; text-decoration:none;">
                <button class="btn-main" style="width:100%; font-size:0.9rem; border-color:var(--rose); color:var(--rose);">🎵 佛樂欣賞</button>
            </a>
        </div>
        
        <button class="btn-main" style="width:100%; background:var(--gold); color:#000;" onclick="showScreen(4)">進行大回向</button>
    </div>

    <div id="screen-4" class="container">
        <textarea id="dedi-box" placeholder="願以此功德..."></textarea>
        <button class="btn-main" onclick="finishSession()" style="width:100%;">封存今日資糧</button>
    </div>

    <div id="lib-modal">
        <h3 style="color:var(--gold); text-align:center;">圓教法寶閣</h3>
        <a class="lib-link" href="https://zh.m.wikisource.org/zh-hant/佛說觀無量壽佛經" target="_blank">《觀無量壽佛經》</a>
        <a class="lib-link" href="https://zh.wikisource.org/zh-hant/大方廣佛華嚴經" target="_blank">《華嚴經》</a>
        <button class="btn-main" style="width:100%; margin-top:15px;" onclick="document.getElementById('lib-modal').style.display='none'">返回</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
