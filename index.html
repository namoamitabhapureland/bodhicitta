<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>普賢行願 OS - 圓滿修復版</title>
    <style>
        :root { --bg: #000; --gold: #d4af37; --cyan: #06b6d4; --gray: #888; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: "PingFang TC", sans-serif; display: flex; flex-direction: column; align-items: center; }

        /* 頂端金框：五五對齊 */
        .time-monitor {
            width: 94%; max-width: 450px; margin: 15px auto; padding: 12px;
            background: #000; border: 1.5px solid var(--gold); border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 10px; z-index: 1000;
        }
        .mon-left { display: flex; align-items: center; gap: 10px; flex: 1; }
        .mon-right { text-align: right; flex: 1; display: flex; flex-direction: column; gap: 2px; }
        #earth-time { color: var(--gray); font-size: 0.75rem; font-family: monospace; }
        #pure-time { color: var(--gold); font-size: 0.9rem; font-weight: bold; font-family: monospace; }

        /* 通用容器與金框 */
        .container { width: 90%; max-width: 450px; display: none; flex-direction: column; align-items: center; padding: 20px 0; }
        .container.active { display: flex; }
        .gold-frame { width: 100%; border: 1px solid var(--gold); border-radius: 10px; padding: 10px; margin-bottom: 20px; }

        /* 按鈕：按下放光 */
        .btn-main {
            width: 100%; background: #000; color: var(--gold); border: 1.5px solid var(--gold);
            padding: 15px; border-radius: 30px; font-weight: bold; margin: 8px 0; transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.96); box-shadow: 0 0 20px var(--gold); }
        
        /* 五五對齊按鈕組 */
        .flex-55 { display: flex; gap: 10px; width: 100%; }
        .flex-55 .btn-main { flex: 1; }

        /* 進度條 */
        .bar-bg { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin: 10px 0; border: 0.5px solid #444; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--gold)); transition: 1s; }

        /* 任務卡片 */
        .task-card { 
            width: 100%; background: #111; border: 1px solid #333; padding: 15px; 
            border-radius: 12px; margin-bottom: 12px; transition: 0.3s;
        }
        .task-card.active-light { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        /* 念佛圓圈 */
        .circle-wrap { position: relative; margin: 30px 0; }
        #big-seed { font-size: 5rem; cursor: pointer; filter: drop-shadow(0 0 15px var(--gold)); transition: 0.2s; }
        #big-seed:active { transform: translate(-50%, -50%) scale(0.9); }
        
        #home-btn { position: fixed; bottom: 20px; right: 20px; border: 1px solid var(--cyan); color: var(--cyan); background: #000; padding: 8px 18px; border-radius: 20px; z-index: 1000; }
    </style>
</head>
<body>

<div class="time-monitor">
    <div class="mon-left">
        <div id="mini-seed" style="font-size: 1.8rem;">✨</div>
        <div style="display:flex; flex-direction:column;">
            <span id="rank-title" style="font-size: 0.75rem; color: var(--cyan);">初信位</span>
            <span id="display-name" style="font-weight: bold;">行者</span>
        </div>
    </div>
    <div class="mon-right">
        <div id="earth-time">娑婆：--:--:--</div>
        <div id="pure-time">--</div>
    </div>
</div>

<div id="home-btn" onclick="goHome()">HOME</div>

<div id="screen-1" class="container active">
    <div class="gold-frame">
        <input type="text" id="user-name" placeholder="請留名號" style="width:100%; background:transparent; border:none; color:var(--gold); text-align:center; font-size:1.2rem; outline:none;">
    </div>
    <div style="color:var(--gold); margin-bottom:10px;">一生累積：<span id="total-count">0</span> 聲</div>
    <div class="bar-bg"><div id="streak-bar" class="bar-fill"></div></div>
    <div style="font-size:0.8rem; margin-top:5px; color:var(--gray);">百日進度：<span id="streak-val">0.0</span> / 100</div>
    <button class="btn-main" style="margin-top:30px;" onclick="startApp()">啟動對頻</button>
    <div class="flex-55">
        <button class="btn-main" style="font-size:0.8rem;" onclick="exportProgress()">💾 備份</button>
        <button class="btn-main" style="font-size:0.8rem;" onclick="document.getElementById('import-file').click()">📂 還原</button>
        <input type="file" id="import-file" style="display:none" onchange="importProgress(this)">
    </div>
</div>

<div id="screen-2" class="container">
    <div class="circle-wrap">
        <svg width="240" height="240">
            <circle cx="120" cy="120" r="110" stroke="#222" stroke-width="10" fill="none"></circle>
            <circle id="progress-ring" cx="120" cy="120" r="110" stroke="var(--gold)" stroke-width="10" fill="none" stroke-dasharray="691" stroke-dashoffset="691" stroke-linecap="round" style="transition:0.4s;"></circle>
        </svg>
        <div id="big-seed" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);" onclick="handleNian()">✨</div>
    </div>
    <div id="nian-num" style="font-size:2.5rem; font-weight:bold;">0 / 10</div>
    <div id="nian-word" style="font-size:1.8rem; color:var(--gold); height:2.5rem; margin-top:10px;"></div>
</div>

<div id="screen-3" class="container">
    <h3 style="color:var(--gold); margin-bottom:20px;">今日修行資糧</h3>
    <div id="task-list" style="width:100%;"></div>
    <div class="flex-55">
        <button class="btn-main" onclick="openLib()">📖 法寶閣</button>
        <button class="btn-main" onclick="window.open('https://www.youtube.com')">🎵 佛樂頻道</button>
    </div>
    <button class="btn-main" style="background:var(--gold) !important; color:#000 !important;" onclick="showScreen(4)">大回向</button>
</div>

<div id="screen-4" class="container">
    <textarea id="dedi-box" placeholder="願以此功德..." style="width:100%; height:200px; background:#111; border:1.5px solid var(--gold); border-radius:15px; color:#eee; padding:15px; outline:none;"></textarea>
    <button class="btn-main" onclick="finishSession()">封存今日資糧</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('PX_V14.3')) || { name: "", totalNian: 0, points: 0, dailyTasks: [], todayCount: 0, lastDate: new Date().toLocaleDateString() };
    const tasks = ["普賢十大願修行", "五戒十善持守", "親近供養三寶", "財布施與法布施", "興建塔廟造像", "供養護持三寶", "每日定課誦經", "受持清淨八關齋戒", "分享法寶善知識", "一念至誠普皆回向"];
    let nianCount = 0;

    function updateClock() {
        const now = new Date();
        const earthEl = document.getElementById('earth-time');
        if(earthEl) earthEl.innerText = "娑婆：" + now.toLocaleTimeString();

        const dayPercent = (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds() + now.getMilliseconds()/1000) / 86400;
        const pureEl = document.getElementById('pure-time');
        if (pureEl) {
            const total = db.points + dayPercent;
            pureEl.innerText = `${Math.floor(total)} 年${(dayPercent).toFixed(4).substring(1)}`;
        }
    }
    setInterval(updateClock, 50);

    function speak(t, r) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t.replace(/阿/g, 'ㄚ'));
        m.lang='zh-TW'; m.rate=r; window.speechSynthesis.speak(m);
    }

    function startApp() {
        const name = document.getElementById('user-name').value;
        if(!name) return alert("請留名號");
        db.name = name;
        const today = new Date().toLocaleDateString();
        if (db.lastDate !== today) { db.todayCount = 0; db.lastDate = today; db.dailyTasks = []; }
        save();
        showScreen(2); updateUI();
        speak("以此大願，隨順趣入", 0.8);
    }

    function updateUI() {
        document.getElementById('total-count').innerText = db.totalNian;
        let totalDays = db.points / 100;
        document.getElementById('streak-val').innerText = totalDays.toFixed(1);
        document.getElementById('streak-bar').style.width = Math.min(totalDays, 100) + '%';
        
        const rank = totalDays >= 100 ? {l:"不退轉", i:"🪷", c:"#d4af37"} : (totalDays >= 20 ? {l:"二信位", i:"🌱", c:"#22c55e"} : {l:"初信位", i:"✨", c:"#06b6d4"});
        document.getElementById('rank-title').innerText = rank.l;
        document.getElementById('display-name').innerText = db.name || "行者";
        document.getElementById('mini-seed').innerText = rank.i;
        document.getElementById('big-seed').innerText = rank.i;
        document.documentElement.style.setProperty('--cyan', rank.c);
    }

    function handleNian() {
        if (nianCount < 10) {
            nianCount++; db.totalNian++;
            document.getElementById('nian-word').innerText = "南無阿彌陀佛";
            setTimeout(()=> document.getElementById('nian-word').innerText="", 500);
            speak("南無阿彌陀佛", 0.75);
            document.getElementById('progress-ring').style.strokeDashoffset = 691 - (nianCount * 69.1);
            document.getElementById('nian-num').innerText = nianCount + " / 10";
            if(nianCount === 10) { 
                db.points += 2; 
                setTimeout(()=> showScreen(3), 800); 
            }
        }
    }

    function renderTasks() {
        const container = document.getElementById('task-list'); container.innerHTML = "";
        tasks.forEach((t, i) => {
            const isDone = db.dailyTasks.includes(i);
            const card = document.createElement('div'); card.className = `task-card ${isDone?'active-light':''}`;
            card.innerHTML = `<div style="color:var(--gold); font-size:1.1rem; border-bottom:1px solid #222; padding-bottom:5px;">${t}</div><div class="bar-bg" style="height:4px;"><div class="bar-fill" style="width:${isDone?'100%':'0%'}"></div></div>`;
            if(!isDone) card.onclick = () => { 
                db.dailyTasks.push(i); db.points += 10; renderTasks(); updateUI(); speak(t+"圓滿", 0.8); 
            };
            container.appendChild(card);
        });
    }

    function showScreen(n) { document.querySelectorAll('.container').forEach(c => c.classList.remove('active')); document.getElementById('screen-'+n).classList.add('active'); if(n===3) renderTasks(); }
    function save() { localStorage.setItem('PX_V14.3', JSON.stringify(db)); }
    function goHome() { nianCount=0; document.getElementById('progress-ring').style.strokeDashoffset=691; document.getElementById('nian-num').innerText="0 / 10"; showScreen(1); updateUI(); }
    function finishSession() { save(); alert("今日修行資糧已封存"); goHome(); }
    function exportProgress() { const blob = new Blob([JSON.stringify(db)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `修行備份.json`; a.click(); }
    function importProgress(i) { const reader = new FileReader(); reader.onload = (e) => { db = JSON.parse(e.target.result); save(); location.reload(); }; reader.readAsText(i.files[0]); }
    function openLib() { alert("法寶閣開啟中..."); }
    
    if(db.name) document.getElementById('user-name').value = db.name;
    updateUI();
</script>
</body>
</html>
