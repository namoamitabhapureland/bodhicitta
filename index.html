<body>
<div class="time-monitor">
    <div class="mon-left">
        <div id="mini-seed" style="font-size: 1.8rem;">✨</div>
        <div style="display:flex; flex-direction:column;">
            <span id="rank-title" style="font-size: 0.75rem; color: var(--cyan);">初信位</span>
            <span id="display-name" style="font-weight: bold;">行者</span>
        </div>
    </div>
    <div class="mon-right">
        <div id="earth-time" style="font-size:0.7rem; color:#888;">娑婆：--:--:--</div>
        <div style="font-size:0.85rem; color:var(--gold); font-weight:bold;">
            極樂累積：<span id="pure-time">--</span>
        </div>
    </div>
</div>

<div id="screen-1" class="container active">
    <div class="btn-main" style="border-radius:15px; padding:5px; margin-bottom:25px;">
        <input type="text" id="user-name" placeholder="請留名號" style="width:100%; background:transparent; border:none; color:var(--gold); text-align:center; font-size:1.2rem; outline:none; padding:10px;">
    </div>
    <div style="color:var(--gold); margin-bottom:10px;">一生累積：<span id="total-count">0</span> 聲</div>
    <div id="today-area" style="font-size:0.85rem; color:var(--cyan); margin-bottom:15px;">今日對頻：<span id="today-count">0</span> 次</div>
    <div class="bar-bg" style="width:100%; height:8px; background:#222; border-radius:4px;"><div id="streak-bar" class="bar-fill" style="height:100%; background:var(--gold); width:0%;"></div></div>
    <button class="btn-main" style="margin-top:30px;" onclick="startApp()">啟動對頻</button>
    <div class="flex-55" style="display:flex; gap:10px; width:100%;">
        <button class="btn-main" style="font-size:0.85rem; flex:1;" onclick="exportProgress()">封存備份</button>
        <button class="btn-main" style="font-size:0.85rem; flex:1;" onclick="document.getElementById('import-file').click()">意念導入</button>
        <input type="file" id="import-file" style="display:none" onchange="importProgress(this)">
    </div>
</div>

<div id="dedi-modal" class="dedi-modal">
    <div class="glass-box">
        <h3 style="color:var(--gold); margin-top:0;">願以此功德</h3>
        <p style="line-height:1.8; color:#ddd;">普及於一切。我等與眾生。皆共成佛道。</p>
        <button class="btn-main" onclick="confirmDedi()">進入修行資糧</button>
    </div>
</div>
