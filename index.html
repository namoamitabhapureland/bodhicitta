<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>普賢行願 OS - 圓滿擴張版</title>
    <style>
        :root { 
            --bg: #000; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #06b6d4; 
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* 1. 五五對齊守護：確保不重疊 (擴張完善) */
        .time-monitor {
            width: 94%; max-width: 450px; margin: 15px auto; padding: 12px 15px;
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1.5px solid var(--gold); border-radius: 12px;
            display: grid; grid-template-columns: 1fr 1fr; align-items: center;
            position: sticky; top: 10px; z-index: 1000;
        }
        .mon-left { display: flex; align-items: center; gap: 10px; border-right: 1px solid rgba(243,229,171,0.2); overflow: hidden; }
        .mon-right { text-align: right; display: flex; flex-direction: column; padding-left: 10px; }
        #earth-time { color: #888; font-size: 0.7rem; font-family: monospace; }
        #pure-time-display { color: var(--gold); font-size: 0.82rem; font-weight: bold; }

        /* 2. 資糧卡片：擴張「亮燈」質感 */
        .task-card { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #333; 
            padding: 20px; border-radius: 15px; margin-bottom: 12px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; position: relative; overflow: hidden;
            display: flex; justify-content: space-between; align-items: center;
        }
        .task-card:active { transform: scale(0.97); background: rgba(243,229,171,0.1); }
        
        /* 亮燈狀態：整個亮起來 */
        .task-card.completed { 
            border: 1.5px solid var(--gold); 
            background: linear-gradient(145deg, rgba(243,229,171,0.2), rgba(0,0,0,0.6));
            box-shadow: 0 0 25px rgba(243, 229, 171, 0.25);
        }
        .task-card.completed .task-text { color: var(--gold); font-weight: bold; text-shadow: 0 0 8px rgba(243,229,171,0.5); }
        .task-card::after { content: "READY"; font-size: 0.6rem; color: #444; }
        .task-card.completed::after { content: "圓滿"; color: var(--gold); font-size: 0.7rem; }

        /* 3. 實體按鈕：厚重與放光 */
        .btn-main {
            width: 100%; background: linear-gradient(145deg, #222, #000); 
            color: var(--gold); border: 1.5px solid var(--gold);
            padding: 18px; border-radius: 35px; font-weight: bold; margin: 10px 0; 
            transition: 0.2s; cursor: pointer; text-align: center; font-size: 1rem;
            box-shadow: 0 6px 15px rgba(0,0,0,0.6);
        }
        .btn-main:active { 
            transform: translateY(3px); 
            box-shadow: 0 0 40px var(--solid-gold); 
            background: var(--gold); color: #000;
        }

        /* 4. 種子呼吸燈 (保留並強化) */
        .circle-wrap { position: relative; margin: 30px 0; width: 240px; height: 240px; }
        #big-seed { 
            font-size: 5.5rem; cursor: pointer; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: seed-breath 4s infinite ease-in-out;
        }
        @keyframes seed-breath {
            0%, 100% { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 15px var(--solid-gold)); }
            50% { transform: translate(-50%, -50%) scale(1.15); filter: drop-shadow(0 0 35px var(--gold)); }
        }

        .container { width: 92%; max-width: 450px; display: none; flex-direction: column; align-items: center; padding: 20px 0; }
        .active { display: flex; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        #home-btn { position: fixed; bottom: 25px; right: 25px; border: 1.2px solid var(--gold); color: var(--gold); background: #000; padding: 10px 22px; border-radius: 25px; z-index: 1000; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="time-monitor">
    <div class="mon-left">
        <div id="mini-seed" style="font-size: 1.8rem;">✨</div>
        <div style="display:flex; flex-direction:column; overflow:hidden;">
            <span id="rank-title" style="font-size: 0.65rem; color: var(--cyan);">初信位</span>
            <span id="display-name" style="font-weight: bold; font-size: 0.95rem;">行者</span>
        </div>
    </div>
    <div class="mon-right">
        <div id="earth-time">娑婆：--:--:--</div>
        <div id="pure-time-display">極樂累積：--</div>
    </div>
</div>

<div id="home-btn" onclick="goHome()">HOME</div>

<div id="screen-1" class="container active">
   <div style="text-align: center; margin-top: 15px;">
    <div id="display-name" style="color:var(--gold); font-size:1.4rem; font-weight:bold; margin-bottom:15px;">妙依</div>

    <div style="color:var(--gold); font-size: 1.1rem; margin-bottom:8px;">
        一生累積：<span id="total-count">0</span> 聲
    </div>

    <div id="medal-zone" style="height: 45px; display: flex; align-items: center; justify-content: center; gap: 8px; margin: 5px 0; font-weight: bold; transition: all 0.5s;"></div>

    <div id="today-info" style="color:var(--cyan); font-size:0.9rem; margin-bottom:15px; letter-spacing: 1px;">
        今日對頻：<span id="today-count">0</span> 次
    </div>
</div>
    <div style="width:100%; height:8px; background:#1a1a1a; border-radius:4px; overflow:hidden; border: 0.5px solid #333;"><div id="streak-bar" style="height:100%; background: linear-gradient(90deg, var(--solid-gold), var(--gold)); width:0%; transition:1.2s;"></div></div>
    <div style="font-size:0.8rem; margin:12px 0 35px; color:#888;">百日進度：<span id="streak-val">0.0</span> / 100</div>
    
    <button class="btn-main" onclick="startApp()">啟動與阿彌陀佛對頻</button>
    <div style="display:flex; gap:12px; width:100%;">
        <button class="btn-main" style="font-size:0.85rem; flex:1;" onclick="exportProgress()">封存備份</button>
        <button class="btn-main" style="font-size:0.85rem; flex:1;" onclick="document.getElementById('import-file').click()">意念導入</button>
        <input type="file" id="import-file" style="display:none" onchange="importProgress(this)">
    </div>
</div>

<div id="screen-2" class="container">
    <div class="circle-wrap">
        <svg width="240" height="240" style="transform: rotate(-90deg);">
            <circle cx="120" cy="120" r="110" stroke="#111" stroke-width="12" fill="none"></circle>
            <circle id="progress-ring" cx="120" cy="120" r="110" stroke="var(--gold)" stroke-width="12" fill="none" stroke-dasharray="691" stroke-dashoffset="691" stroke-linecap="round" style="transition:0.5s; filter: drop-shadow(0 0 10px var(--solid-gold));"></circle>
        </svg>
        <div id="big-seed" onclick="handleNian()">✨</div>
    </div>
    <div id="nian-num" style="font-size:3.2rem; font-weight:bold; font-family: monospace;">0 / 10</div>
    <div id="nian-word" style="font-size:2.2rem; color:var(--gold); height:3.5rem; margin-top:15px; font-weight:bold; letter-spacing: 2px;"></div>
</div>

<div id="screen-3" class="container">
    <h3 style="color:var(--gold); margin-bottom:25px; border-bottom:1.5px solid var(--gold); width:100%; text-align:center; padding-bottom:12px; letter-spacing: 2px;">今日修行資糧</h3>
    <div id="task-list" style="width:100%;"></div>
    <div style="display:flex; gap:12px; width:100%;">
        <button class="btn-main" style="flex:1;" onclick="document.getElementById('lib-modal').style.display='flex'">進入法寶閣</button>
        <button class="btn-main" style="flex:1;" onclick="document.getElementById('music-modal').style.display='flex'">修行音樂</button>
    </div>
    <button class="btn-main" style="background:var(--gold) !important; color:#000 !important; margin-top:15px;" onclick="showScreen(4)">大回向</button>
</div>

<div id="screen-4" class="container">
    <textarea id="dedi-box" placeholder="願以此功德..." style="width:100%; height:280px; background:#050505; border:1.8px solid var(--gold); border-radius:22px; color:#eee; padding:22px; outline:none; font-size:1.15rem; line-height:1.7;"></textarea>
    <button class="btn-main" onclick="finishSession()">封存今日資糧</button>
</div>

<div id="dedi-modal" class="modal">
    <div style="width:88%; max-width:380px; padding:35px; border:2px solid var(--gold); background:#000; border-radius:30px; text-align:center; box-shadow: 0 0 50px rgba(212,175,55,0.15);">
        <h2 style="color:var(--gold); margin-top:0; letter-spacing: 3px;">願以此功德</h2>
        <p style="line-height:2.2; color:#eee; font-size:1.25rem; margin: 30px 0;">普及於一切<br>我等與眾生<br>皆共成佛道</p>
        <button class="btn-main" onclick="confirmDedi()">進入修行資糧</button>
    </div>
</div>

<div id="lib-modal" class="modal">
    <div style="width:92%; max-width:400px; padding:30px; border:1.8px solid var(--gold); background:#000; border-radius:30px; text-align:center;">
        <h3 style="color:var(--gold); border-bottom:1px solid #333; padding-bottom:15px; margin-bottom:20px; letter-spacing:2px;">圓教法寶閣</h3>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:25px; text-align:center;">
            <a style="color:var(--cyan); text-decoration:none; font-size:0.95rem; padding:8px; border:1px solid rgba(6,182,212,0.2); border-radius:8px;" href="https://zh.m.wikipedia.org/zh-hant/阿含經" target="_blank">阿含經</a>
            <a style="color:var(--cyan); text-decoration:none; font-size:0.95rem; padding:8px; border:1px solid rgba(6,182,212,0.2); border-radius:8px;" href="https://zh.m.wikisource.org/zh-hant/佛說觀無量壽佛經" target="_blank">淨土五經</a>
            <a style="color:var(--cyan); text-decoration:none; font-size:0.95rem; padding:8px; border:1px solid rgba(6,182,212,0.2); border-radius:8px;" href="https://zh.m.wikipedia.org/zh-hant/妙法蓮華經" target="_blank">法華經</a>
            <a style="color:var(--cyan); text-decoration:none; font-size:0.95rem; padding:8px; border:1px solid rgba(6,182,212,0.2); border-radius:8px;" href="https://zh.wikisource.org/zh-hant/大方廣佛華嚴經" target="_blank">華嚴經</a>
            <a style="color:var(--cyan); text-decoration:none; font-size:0.95rem; padding:8px; border:1px solid rgba(6,182,212,0.2); border-radius:8px;" href="https://zh.m.wikipedia.org/zh-hant/金剛經" target="_blank">金剛經</a>
            <a style="color:var(--cyan); text-decoration:none; font-size:0.95rem; padding:8px; border:1px solid rgba(6,182,212,0.2); border-radius:8px;" href="https://zh.m.wikipedia.org/zh-hant/大佛頂首楞嚴經" target="_blank">楞嚴經</a>
            <a style="color:var(--cyan); text-decoration:none; font-size:0.95rem; padding:8px; border:1px solid rgba(6,182,212,0.2); border-radius:8px;" href="https://zh.m.wikipedia.org/zh-hant/般若波羅蜜多心經" target="_blank">心經</a>
            <a style="color:var(--cyan); text-decoration:none; font-size:0.95rem; padding:8px; border:1px solid rgba(6,182,212,0.2); border-radius:8px;" href="https://zh.m.wikipedia.org/zh-hant/地藏菩薩本願經" target="_blank">地藏經</a>
            <a style="color:var(--cyan); text-decoration:none; font-size:0.95rem; padding:8px; border:1px solid rgba(6,182,212,0.2); border-radius:8px;" href="https://zh.m.wikipedia.org/zh-hant/維摩詰所說經" target="_blank">維摩詰經</a>
            <a style="color:var(--gold); text-decoration:none; font-size:0.95rem; padding:8px; border:1px solid var(--gold); border-radius:8px;" href="https://zh.m.wikipedia.org/wiki/Portal:佛教" target="_blank">維基佛法</a>
        </div>
        
        <button class="btn-main" onclick="this.parentElement.parentElement.style.display='none'">返回修行位</button>
    </div>
</div>
<div id="music-modal" class="modal">
    <div style="width:92%; max-width:400px; padding:30px; border:1.8px solid var(--gold); background:#000; border-radius:30px; text-align:center;">
        <h3 style="color:var(--gold); border-bottom:1px solid #333; padding-bottom:15px; margin-bottom:20px; letter-spacing:2px;">無私佛樂欣賞</h3>
        
        <div id="music-list-container" style="display:flex; flex-direction:column; gap:12px; margin-bottom:25px;">
            <button class="btn-main" style="font-size:0.9rem; padding:12px;" onclick="window.open('https://www.youtube.com/@Ami-PureLand')">✨ 我的修行頻道</button>
            
            <button class="btn-main" style="font-size:0.9rem; padding:12px; border-color:var(--cyan); color:var(--cyan);" onclick="window.open('https://www.youtube.com/watch?v=這裡放別人的影片ID')">🪷 推薦佛樂 A</button>
        </div>
        
        <button class="btn-main" style="background:#222 !important;" onclick="document.getElementById('music-modal').style.display='none'">返回修行位</button>
    </div>
</div>

<script>
    // 1. 核心數據：絕對守護 PX_V14.3 (不刪減)
    let db = JSON.parse(localStorage.getItem('PX_V14.3')) || { 
        name: "", totalNian: 0, points: 0, dailyTasks: [], todayCount: 0, lastDate: new Date().toLocaleDateString() 
    };
    const tasks = ["普賢十大願修行", "五戒十善持守", "出家護法持戒", "財布施與法布施", "興建塔廟造像", "供養護持三寶", "每日定課誦經", "受持清淨八關齋戒", "分享法寶善知識", "一念至誠普皆回向"];
    let nianCount = 0;

    function checkNewDay() {
        const today = new Date().toLocaleDateString();
        if (db.lastDate !== today) {
            db.todayCount = 0; db.dailyTasks = []; db.lastDate = today; save();
        }
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('earth-time').innerText = "娑婆：" + now.toLocaleTimeString();
        const dayPercent = (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds() + now.getMilliseconds()/1000) / 86400;
        const total = db.points + dayPercent;
        document.getElementById('pure-time-display').innerText = `極樂累積：${Math.floor(total)} 年${(dayPercent).toFixed(4).substring(1)}`;
    }
    setInterval(updateClock, 50);

    function startApp() {
        const nameInput = document.getElementById('user-name').value.trim();
        if(!nameInput) return alert("請留名號");
        if (db.name && db.name !== nameInput) {
            if(!confirm(`⚠️ 法寶換人警告：\n目前的護持者是「${db.name}」，確定要更改為「${nameInput}」嗎？`)) return;
        }
        db.name = nameInput; db.todayCount++; checkNewDay(); save();
        showScreen(2); updateUI();
        speak("以此大願，隨順趣入", 0.8);
    }

    function handleNian() {
        if (nianCount < 10) {
            nianCount++; db.totalNian++;
            document.getElementById('nian-word').innerText = "南無阿彌陀佛";
            document.getElementById('big-seed').style.filter = "drop-shadow(0 0 50px white)";
            setTimeout(()=> {
                document.getElementById('nian-word').innerText="";
                document.getElementById('big-seed').style.filter = "drop-shadow(0 0 15px var(--solid-gold))";
            }, 300);
            speak("南無阿彌陀佛", 0.75);
            document.getElementById('progress-ring').style.strokeDashoffset = 691 - (nianCount * 69.1);
            document.getElementById('nian-num').innerText = nianCount + " / 10";
            if(nianCount === 10) { 
                db.points += 2; save();
                setTimeout(()=> document.getElementById('dedi-modal').style.display='flex', 800); 
            }
        }
    }

    // 擴張渲染：亮燈與觸感
    function renderTasks() {
        const container = document.getElementById('task-list'); container.innerHTML = "";
        tasks.forEach((t, i) => {
            const isDone = db.dailyTasks.includes(i);
            const card = document.createElement('div'); 
            card.className = `task-card ${isDone?'completed':''}`;
            card.innerHTML = `<span class="task-text">${t}</span>`;
            if(!isDone) card.onclick = () => { 
                db.dailyTasks.push(i); db.points += 10; save(); renderTasks(); updateUI(); speak(t+"圓滿", 0.8); 
            };
            container.appendChild(card);
        });
    }

    function speak(t, r) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t.replace(/阿/g, 'ㄚ'));
        m.lang='zh-TW'; m.rate=r; window.speechSynthesis.speak(m);
    }

function updateUI() {
    try {
        // 1. 更新基礎數值
        if(document.getElementById('total-count')) document.getElementById('total-count').innerText = db.totalNian.toLocaleString();
        if(document.getElementById('today-count')) document.getElementById('today-count').innerText = db.todayCount;
        
        // 2. 更新進度條與位次
        let totalDays = (db.points || 0) / 100;
        if(document.getElementById('streak-val')) document.getElementById('streak-val').innerText = totalDays.toFixed(1);
        if(document.getElementById('streak-bar')) document.getElementById('streak-bar').style.width = Math.min(totalDays, 100) + '%';
        
        const rank = totalDays >= 100 ? {l:"六信位・不退轉", i:"🪷", c:"#d4af37"} : 
                    (totalDays >= 80 ? {l:"五信位", i:"🎋", c:"#fbbf24"} : 
                    (totalDays >= 60 ? {l:"四信位", i:"🍀", c:"#34d399"} : 
                    (totalDays >= 40 ? {l:"三信位", i:"🌿", c:"#a3e635"} : 
                    (totalDays >= 20 ? {l:"二信位", i:"🌱", c:"#22c55e"} : 
                    {l:"初信位", i:"✨", c:"#06b6d4"}))));
        
        const rtEl = document.getElementById('rank-title');
        if(rtEl) {
            rtEl.innerText = rank.l;
            rtEl.style.color = rank.c;
        }
        
        if(document.getElementById('display-name')) document.getElementById('display-name').innerText = db.name || "妙依";
        if(document.getElementById('mini-seed')) document.getElementById('mini-seed').innerText = rank.i;
        if(document.getElementById('big-seed')) document.getElementById('big-seed').innerText = rank.i;

        // 3. --- 🎖️ 功德勳章顯化系統 ---
        const n = db.totalNian || 0;
        let medal = {i: "", t: "", c: "transparent"};

        if (n >= 100000000) medal = {i:"☀️", t:"[圓滿覺心]", c:"#d4af37"};
        else if (n >= 10000000) medal = {i:"👑", t:"[無生法忍]", c:"#a855f7"};
        else if (n >= 1000000) medal = {i:"💎", t:"[寶蓮成就]", c:"#3b82f6"};
        else if (n >= 500000) medal = {i:"🪷", t:"[入流守護]", c:"#f43f5e"};
        else if (n >= 100000) medal = {i:"🏆", t:"[淨念相繼]", c:"#fbbf24"};
        else if (n >= 10000) medal = {i:"🎖️", t:"[梵音初顯]", c:"#60a5fa"};
        else if (n >= 5000) medal = {i:"🏅", t:"[心口相應]", c:"#22c55e"};
        else if (n >= 500) medal = {i:"🎖️", t:"[一念清淨]", c:"#06b6d4"};
        else if (n >= 10) medal = {i:"🎖️", t:"[初發心]", c:"#94a3b8"};
        else medal = {i:"✨", t:"[願心萌芽]", c:"#888"};

        const mz = document.getElementById('medal-zone');
        if (mz) {
            mz.innerHTML = `<span style="font-size:1.4rem">${medal.i}</span> <span style="color:${medal.c}; text-shadow: 0 0 8px ${medal.c}88;">${medal.t}</span>`;
            mz.style.opacity = "1";
        }
    } catch (e) {
        console.error("UI 更新出錯:", e);
    }
}


        titleEl.style.color = rank.c; // 補足：讓階位文字隨等級亮燈
        
        document.getElementById('display-name').innerText = db.name || "行者";
        document.getElementById('mini-seed').innerText = rank.i;
        document.getElementById('big-seed').innerText = rank.i;
    } // 這是 updateUI 的結尾大括號

    function save() { localStorage.setItem('PX_V14.3', JSON.stringify(db)); }
    function showScreen(n) { document.querySelectorAll('.container').forEach(c => c.style.display = 'none'); document.getElementById('screen-'+n).style.display = 'flex'; if(n===3) renderTasks(); window.scrollTo(0,0); }
    function confirmDedi() { document.getElementById('dedi-modal').style.display='none'; showScreen(3); }
    function goHome() { nianCount=0; document.getElementById('progress-ring').style.strokeDashoffset=691; document.getElementById('nian-num').innerText="0 / 10"; showScreen(1); updateUI(); }
    function finishSession() { save(); alert("今日修行資糧已封存"); goHome(); }
    function exportProgress() { const blob = new Blob([JSON.stringify(db)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `修行備份_${db.name}.json`; a.click(); }
    function importProgress(i) { const reader = new FileReader(); reader.onload = (e) => { try { db = JSON.parse(e.target.result); save(); location.reload(); } catch(err){alert("格式錯誤");} }; reader.readAsText(i.files[0]); }
    
    checkNewDay();
    if(db.name) document.getElementById('user-name').value = db.name;
    updateUI();
</script>
</body>
</html>
