<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>普賢行願 OS - 圓滿擴張版</title>
    <style>
        :root { --bg: #000; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #06b6d4; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .time-monitor { width: 94%; max-width: 450px; margin: 15px auto; padding: 12px 15px; background: var(--glass); backdrop-filter: blur(20px); border: 1.5px solid var(--gold); border-radius: 12px; display: grid; grid-template-columns: 1fr 1fr; align-items: center; position: sticky; top: 10px; z-index: 1000; }
        .mon-left { display: flex; align-items: center; gap: 10px; border-right: 1px solid rgba(243,229,171,0.2); }
        .mon-right { text-align: right; display: flex; flex-direction: column; padding-left: 10px; }
        #earth-time { color: #888; font-size: 0.7rem; font-family: monospace; }
        #pure-time-display { color: var(--gold); font-size: 0.82rem; font-weight: bold; }
        .task-card { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .task-card.completed { border: 1.5px solid var(--gold); background: rgba(243,229,171,0.1); }
        .task-card.completed .task-text { color: var(--gold); font-weight: bold; }
        .btn-main { width: 100%; background: linear-gradient(145deg, #222, #000); color: var(--gold); border: 1.5px solid var(--gold); padding: 18px; border-radius: 35px; font-weight: bold; margin: 10px 0; cursor: pointer; text-align: center; }
        .btn-main:active { background: var(--gold); color: #000; }
        .input-style { width: 100%; background: #111; border: 1px solid #444; color: var(--gold); padding: 12px; border-radius: 12px; text-align: center; margin: 15px 0; font-size: 1.1rem; }
        .circle-wrap { position: relative; margin: 30px 0; width: 240px; height: 240px; }
        #big-seed { font-size: 5.5rem; cursor: pointer; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: seed-breath 4s infinite ease-in-out; }
        @keyframes seed-breath { 0%, 100% { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 15px var(--solid-gold)); } 50% { transform: translate(-50%, -50%) scale(1.1); filter: drop-shadow(0 0 30px var(--gold)); } }
        .container { width: 92%; max-width: 450px; display: none; flex-direction: column; align-items: center; padding: 20px 0; }
        .active { display: flex; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        #home-btn { position: fixed; bottom: 25px; right: 25px; border: 1.2px solid var(--gold); color: var(--gold); background: #000; padding: 10px 22px; border-radius: 25px; z-index: 1000; cursor: pointer; }
    </style>
</head>
<body>

<div class="time-monitor">
    <div class="mon-left">
        <div id="mini-seed" style="font-size: 1.8rem;">✨</div>
        <div style="display:flex; flex-direction:column;">
            <span id="rank-title" style="font-size: 0.65rem; color: var(--cyan);">初信位</span>
            <span id="display-name" style="font-weight: bold; font-size: 0.95rem;">妙依</span>
        </div>
    </div>
    <div class="mon-right">
        <div id="earth-time">娑婆：--:--:--</div>
        <div id="pure-time-display">極樂累積：--</div>
    </div>
</div>

<div id="home-btn" onclick="goHome()">HOME</div>

<div id="screen-1" class="container active">
    <div style="text-align: center; width:100%;">
        <div style="color:var(--gold); font-size: 1.1rem;">一生累積：<span id="total-count">0</span> 聲</div>
        <input type="text" id="user-name" class="input-style" value="妙依">
        <div id="medal-zone" style="height: 45px; display: flex; align-items: center; justify-content: center; gap: 8px;"></div>
        <div style="color:var(--cyan); font-size:0.9rem; margin-bottom:10px;">今日對頻：<span id="today-count">0</span> 次</div>
    </div>
    <div style="width:100%; height:8px; background:#1a1a1a; border-radius:4px; overflow:hidden;"><div id="streak-bar" style="height:100%; background: var(--gold); width:0%;"></div></div>
    <div style="font-size:0.8rem; margin:12px 0; color:#888;">百日進度：<span id="streak-val">0.0</span> / 100</div>
    <button class="btn-main" onclick="startApp()">啟動與阿彌陀佛對頻</button>
    <div style="display:flex; gap:10px; width:100%;">
        <button class="btn-main" style="font-size:0.8rem; flex:1;" onclick="exportProgress()">備份</button>
        <button class="btn-main" style="font-size:0.8rem; flex:1;" onclick="document.getElementById('import-file').click()">導入</button>
        <input type="file" id="import-file" style="display:none" onchange="importProgress(this)">
    </div>
</div>

<div id="screen-2" class="container">
    <div class="circle-wrap">
        <svg width="240" height="240" style="transform: rotate(-90deg);"><circle cx="120" cy="120" r="110" stroke="#111" stroke-width="12" fill="none"></circle><circle id="progress-ring" cx="120" cy="120" r="110" stroke="var(--gold)" stroke-width="12" fill="none" stroke-dasharray="691" stroke-dashoffset="691" style="transition:0.3s;"></circle></svg>
        <div id="big-seed" onclick="handleNian()">✨</div>
    </div>
    <div id="nian-num" style="font-size:3rem;">0 / 10</div>
    <div id="nian-word" style="font-size:2rem; color:var(--gold); height:3rem;"></div>
</div>

<div id="screen-3" class="container">
    <h3 style="color:var(--gold);">今日修行資糧</h3>
    <div id="task-list" style="width:100%;"></div>
    <div style="display:flex; gap:10px; width:100%;">
        <button class="btn-main" style="flex:1;" onclick="document.getElementById('lib-modal').style.display='flex'">進入法寶閣</button>
        <button class="btn-main" style="flex:1;" onclick="document.getElementById('music-modal').style.display='flex'">修行音樂</button>
    </div>
    <button class="btn-main" style="background:var(--solid-gold); color:#000;" onclick="showScreen(4)">大回向</button>
</div>

<div id="screen-4" class="container">
    <textarea id="dedi-box" placeholder="願以此功德..." style="width:100%; height:250px; background:#050505; border:1px solid var(--gold); border-radius:15px; color:#eee; padding:15px;"></textarea>
    <button class="btn-main" onclick="finishSession()">封存今日資糧</button>
</div>

<div id="dedi-modal" class="modal">
    <div style="width:85%; padding:30px; border:1.5px solid var(--gold); background:#000; border-radius:25px; text-align:center;">
        <h2 style="color:var(--gold);">願以此功德</h2>
        <p style="line-height:2; font-size:1.2rem;">普及於一切<br>我等與眾生<br>皆共成佛道</p>
        <button class="btn-main" onclick="confirmDedi()">進入修行資糧</button>
    </div>
</div>

<div id="lib-modal" class="modal">
    <div style="width:90%; padding:25px; border:1px solid var(--gold); background:#000; border-radius:20px; text-align:center;">
        <h3 style="color:var(--gold);">圓教法寶閣</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
            <a style="color:var(--cyan); text-decoration:none; padding:10px; border:1px solid #333;" href="https://zh.m.wikisource.org/zh-hant/佛說觀無量壽佛經" target="_blank">淨土五經</a>
            <a style="color:var(--cyan); text-decoration:none; padding:10px; border:1px solid #333;" href="https://zh.m.wikipedia.org/zh-hant/金剛經" target="_blank">金剛經</a>
            <a style="color:var(--cyan); text-decoration:none; padding:10px; border:1px solid #333;" href="https://zh.m.wikipedia.org/zh-hant/地藏菩薩本願經" target="_blank">地藏經</a>
            <a style="color:var(--cyan); text-decoration:none; padding:10px; border:1px solid #333;" href="https://zh.m.wikipedia.org/zh-hant/般若波羅蜜多心經" target="_blank">心經</a>
        </div>
        <button class="btn-main" onclick="document.getElementById('lib-modal').style.display='none'">返回</button>
    </div>
</div>

<div id="music-modal" class="modal">
    <div style="width:90%; padding:25px; border:1px solid var(--gold); background:#000; border-radius:20px; text-align:center;">
        <h3 style="color:var(--gold);">修行音樂</h3>
        <button class="btn-main" onclick="window.open('https://www.youtube.com/@Ami-PureLand')">✨ 我的修行頻道</button>
        <button class="btn-main" style="background:#222;" onclick="document.getElementById('music-modal').style.display='none'">返回</button>
    </div>
</div>

<script>
    const tasks = ["普賢十大願修行", "五戒十善持守", "出家護法持戒", "財布施與法布施", "每日定課誦經", "受持清淨八關齋戒", "分享法寶善知識", "一念至誠普皆回向"];
    let db = JSON.parse(localStorage.getItem('PX_V14.3')) || { name: "妙依", totalNian: 0, points: 0, dailyTasks: [], todayCount: 0, lastDate: new Date().toLocaleDateString() };
    let nianCount = 0;

    function save() { localStorage.setItem('PX_V14.3', JSON.stringify(db)); }
    function updateClock() {
        const now = new Date();
        document.getElementById('earth-time').innerText = "娑婆：" + now.toLocaleTimeString();
        const dayPercent = (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds()) / 86400;
        document.getElementById('pure-time-display').innerText = `極樂累積：${Math.floor(db.points + dayPercent)} 年`;
    }
    setInterval(updateClock, 100);

    function updateUI() {
        document.getElementById('total-count').innerText = (db.totalNian || 0).toLocaleString();
        document.getElementById('today-count').innerText = db.todayCount || 0;
        document.getElementById('display-name').innerText = db.name || "妙依";
        let totalDays = (db.points || 0) / 100;
        document.getElementById('streak-val').innerText = totalDays.toFixed(1);
        document.getElementById('streak-bar').style.width = Math.min(totalDays, 100) + '%';
        const rank = totalDays >= 100 ? {l:"六信位・不退轉", i:"🪷", c:"#d4af37"} : (totalDays >= 50 ? {l:"三信位", i:"🌿", c:"#a3e635"} : {l:"初信位", i:"✨", c:"#06b6d4"});
        document.getElementById('rank-title').innerText = rank.l;
        document.getElementById('rank-title').style.color = rank.c;
        document.getElementById('mini-seed').innerText = rank.i;
        document.getElementById('big-seed').innerText = rank.i;
        const mz = document.getElementById('medal-zone');
        if (db.totalNian >= 10) { mz.innerHTML = `🎖️ <span style="color:#06b6d4">[一念清淨]</span>`; mz.style.display = "flex"; } else { mz.style.display = "none"; }
    }

    function startApp() {
        const n = document.getElementById('user-name').value.trim();
        if(!n) return alert("請留名號");
        db.name = n; db.todayCount++; save(); showScreen(2); updateUI();
    }

    function handleNian() {
        if (nianCount < 10) {
            nianCount++; db.totalNian++;
            document.getElementById('nian-word').innerText = "南無阿彌陀佛";
            document.getElementById('progress-ring').style.strokeDashoffset = 691 - (nianCount * 69.1);
            document.getElementById('nian-num').innerText = nianCount + " / 10";
            if(nianCount === 10) { db.points += 2; save(); setTimeout(()=> document.getElementById('dedi-modal').style.display='flex', 500); }
        }
    }

    function renderTasks() {
        const container = document.getElementById('task-list'); container.innerHTML = "";
        tasks.forEach((t, i) => {
            const isDone = db.dailyTasks.includes(i);
            const card = document.createElement('div'); card.className = `task-card ${isDone?'completed':''}`;
            card.innerHTML = `<span class="task-text">${t}</span>`;
            if(!isDone) card.onclick = () => { db.dailyTasks.push(i); db.points += 10; save(); renderTasks(); updateUI(); };
            container.appendChild(card);
        });
    }

    function showScreen(n) { document.querySelectorAll('.container').forEach(c => c.style.display = 'none'); document.getElementById('screen-'+n).style.display = 'flex'; if(n===3) renderTasks(); }
    function confirmDedi() { document.getElementById('dedi-modal').style.display='none'; showScreen(3); }
    function goHome() { nianCount=0; document.getElementById('progress-ring').style.strokeDashoffset=691; document.getElementById('nian-num').innerText="0 / 10"; showScreen(1); updateUI(); }
    function finishSession() { save(); alert("修行資糧已封存"); goHome(); }
    function exportProgress() { const blob = new Blob([JSON.stringify(db)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download=`修行備份.json`; a.click(); }
    function importProgress(i) { const reader = new FileReader(); reader.onload=(e)=>{ db=JSON.parse(e.target.result); save(); location.reload(); }; reader.readAsText(i.files[0]); }
    updateUI();
</script>
</body>
</html>
