<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#d4af37">
    
    <link rel="manifest" href="data:application/json,{'name':'普賢行願OS','short_name':'普賢OS','start_url':'.','display':'standalone','background_color':'#000000','theme_color':'#d4af37'}">

    <title>普賢行願 OS - 琉璃圓滿版 2.5.1</title>
    <style>
        :root { 
            --bg: #000; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; /* 溫潤的琉璃玉色 */
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* 法界微型日曆橫幅 */
        #festival-banner {
            width: 100%; background: linear-gradient(90deg, rgba(212,175,55,0.1), rgba(212,175,55,0.3), rgba(212,175,55,0.1));
            color: var(--gold); text-align: center; padding: 8px 0; font-size: 0.85rem; font-weight: bold;
            letter-spacing: 2px; border-bottom: 1px solid rgba(212,175,55,0.3); display: none; text-shadow: 0 0 5px var(--solid-gold);
        }

        .time-monitor {
            width: 94%; max-width: 450px; margin: 15px auto; padding: 12px 15px;
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1.5px solid var(--gold); border-radius: 12px;
            display: grid; grid-template-columns: 1fr 1fr; align-items: center;
            position: sticky; top: 10px; z-index: 1000;
        }
        .mon-left { display: flex; align-items: center; gap: 10px; border-right: 1px solid rgba(243,229,171,0.2); overflow: hidden; }
        .mon-right { text-align: right; display: flex; flex-direction: column; padding-left: 10px; }
        #earth-time { color: #888; font-size: 0.7rem; font-family: monospace; }
        #pure-time-display { color: var(--gold); font-size: 0.82rem; font-weight: bold; }

        .task-card { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #333; 
            padding: 20px; border-radius: 15px; margin-bottom: 12px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; position: relative; overflow: hidden;
            display: flex; justify-content: space-between; align-items: center;
        }
        .task-card:active { transform: scale(0.97); background: rgba(243,229,171,0.1); }
        .task-card.completed { 
            border: 1.5px solid var(--gold); 
            background: linear-gradient(145deg, rgba(243,229,171,0.2), rgba(0,0,0,0.6));
            box-shadow: 0 0 25px rgba(243, 229, 171, 0.25);
        }
        .task-card.completed .task-text { color: var(--gold); font-weight: bold; text-shadow: 0 0 8px rgba(243,229,171,0.5); }
        .task-card::after { content: "READY"; font-size: 0.6rem; color: #444; }
        .task-card.completed::after { content: "圓滿"; color: var(--gold); font-size: 0.7rem; }

        .btn-main {
            width: 100%; background: linear-gradient(145deg, #222, #000); 
            color: var(--gold); border: 1.5px solid var(--gold);
            padding: 18px; border-radius: 35px; font-weight: bold; margin: 10px 0; 
            transition: 0.2s; cursor: pointer; text-align: center; font-size: 1rem;
            box-shadow: 0 6px 15px rgba(0,0,0,0.6);
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 0 40px var(--solid-gold); background: var(--gold); color: #000; }

        .circle-wrap { position: relative; margin: 30px 0; width: 240px; height: 240px; }
        #big-seed { 
            cursor: pointer; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center;
            animation: seed-breath 4s infinite ease-in-out;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5));
            transition: 0.5s;
        }
       
        #big-seed svg { 
            width: 175px; 
            height: 175px; 
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
            transition: all 0.5s ease;
        }
        #mini-seed svg { width: 42px; height: 42px; transition: transform 0.2s; }

        @keyframes seed-breath {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
            50% { transform: translate(-50%, -50%) scale(1.03); opacity: 1; }
        }

        .container { width: 92%; max-width: 450px; display: none; flex-direction: column; align-items: center; padding: 20px 0; }
        .active { display: flex; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        #home-btn { position: fixed; bottom: 25px; right: 25px; border: 1.2px solid var(--gold); color: var(--gold); background: #000; padding: 10px 22px; border-radius: 25px; z-index: 1000; font-size: 0.85rem; font-weight: bold; cursor: pointer; }
        
        .gold-btn {
            border: 1.2px solid var(--gold);
            color: var(--gold);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            padding: 10px 22px;
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }
        .gold-btn:active { background: var(--gold); color: #000; }

        #nian-num-wrap {
            margin-top: 10px;
            padding: 5px 25px;
            border: 1.2px solid var(--gold);
            border-radius: 50px;
            background: rgba(243, 229, 171, 0.05);
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.1);
            position: relative;
            z-index: 20;
        }

        @keyframes goldRipple {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.8); }
            70% { box-shadow: 0 0 0 60px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        .ripple-effect {
            border-radius: 50%;
            animation: goldRipple 1s cubic-bezier(0.1, 0.8, 0.3, 1) !important;
        }

        #level-up-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(212,175,55,0.3) 0%, rgba(0,0,0,0.95) 80%);
            display: none; justify-content: center; align-items: center; flex-direction: column;
            z-index: 3000; opacity: 0; transition: opacity 0.8s ease;
        }
        .level-text-glow {
            color: var(--gold); font-size: 2rem; font-weight: bold; letter-spacing: 5px;
            text-shadow: 0 0 20px var(--solid-gold); margin-top: 30px;
            opacity: 0; transform: translateY(20px); transition: all 1s ease;
        }
        .level-svg-glow {
            filter: drop-shadow(0 0 30px var(--solid-gold));
            transform: scale(0.5); opacity: 0; transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .vol-slider-wrap { width: 100%; display: flex; align-items: center; gap: 12px; margin-top: 5px; padding: 0 5px; color: var(--gold); font-size: 0.85rem; }
        input[type=range] { flex: 1; accent-color: var(--solid-gold); height: 2px; background: rgba(243,229,171,0.2); outline: none; border-radius: 4px; }
        
        #guide-ripple {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(243, 229, 171, 0.4);
            animation: gentle-pulse 2s infinite cubic-bezier(0.2, 0.8, 0.2, 1);
            pointer-events: none; z-index: 30;
        }
        @keyframes gentle-pulse {
            0% { box-shadow: 0 0 0 0 rgba(243, 229, 171, 0.5); }
            70% { box-shadow: 0 0 0 35px rgba(243, 229, 171, 0); }
            100% { box-shadow: 0 0 0 0 rgba(243, 229, 171, 0); }
        }

        .orbit-container { position: absolute; top: 0; left: 0; width: 240px; height: 240px; border-radius: 50%; pointer-events: none; opacity: 0;}
        #orbit-dot { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; top: -3px; left: 117px; box-shadow: 0 0 10px #fff, 0 0 20px var(--gold); }
        .orbit-anim { animation: orbit-spin 2s linear forwards; opacity: 1; }
        @keyframes orbit-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .gold-dust { position: fixed; background: var(--gold); border-radius: 50%; pointer-events: none; animation: dust-fall 1.2s ease-out forwards; z-index: 40; filter: drop-shadow(0 0 6px #fff); }
        @keyframes dust-fall { 0% { opacity: 1; transform: scale(1) translate(0,0); } 100% { opacity: 0; transform: scale(0) translate(var(--dx), var(--dy)); } }
        
        .flower-petal { position: fixed; top: -50px; pointer-events: none; animation: flower-fall linear forwards; z-index: 9999; }
        @keyframes flower-fall { 
            0% { transform: translateY(0) rotate(0deg) scale(0.6); opacity: 0; } 
            15% { opacity: 1; } 
            85% { opacity: 1; } 
            100% { transform: translateY(110vh) rotate(360deg) scale(1.1); opacity: 0; } 
        }

        .zen-q-box { margin-bottom: 22px; border-left: 2px solid rgba(139,168,156,0.4); padding-left: 15px; }
        .zen-q { color: var(--gold); font-weight: bold; font-size: 1.05rem; margin-bottom: 8px; letter-spacing: 1px; }
        .zen-a { color: #bbb; font-size: 0.95rem; line-height: 1.8; text-align: justify; }

        .merit-forest-wrap { width: 100%; border-top: 1px solid rgba(139,168,156,0.3); padding-top: 20px; margin-top: 15px; }
        .merit-title { color: var(--cyan); text-align: center; font-size: 1.1rem; letter-spacing: 3px; margin-bottom: 15px; font-weight: bold; }
        
        #daily-dew-box {
            background: linear-gradient(145deg, rgba(139,168,156,0.08), rgba(0,0,0,0.8));
            border: 1px solid rgba(139,168,156,0.3); border-radius: 12px;
            padding: 15px 20px; text-align: center; margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.3s; cursor: pointer;
        }
        #daily-dew-box:active { transform: scale(0.98); }
        
        .merit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .merit-btn {
            background: rgba(243,229,171,0.03); border: 1px solid rgba(212,175,55,0.2);
            border-radius: 12px; padding: 18px 10px; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            color: var(--gold); cursor: pointer; transition: 0.3s;
        }
        .merit-btn:active { background: rgba(212,175,55,0.15); transform: translateY(2px); }
        .merit-icon { width: 32px; height: 32px; filter: drop-shadow(0 0 5px rgba(212,175,55,0.4)); stroke: var(--gold); }

        .dedi-dissolve {
            color: transparent !important; 
            text-shadow: 0 0 15px rgba(243, 229, 171, 0.9), 0 -30px 30px rgba(243, 229, 171, 0) !important; 
            border-color: transparent !important; 
            background: transparent !important;
            box-shadow: none !important;
            transition: all 3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        
        .void-dust {
            position: fixed; background: var(--gold); border-radius: 50%; pointer-events: none;
            filter: drop-shadow(0 0 8px var(--solid-gold)); animation: float-up-void 3.5s ease-out forwards; z-index: 50;
        }
        @keyframes float-up-void {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--vx), var(--vy)) scale(0); }
        }

        /* 煉心區：專屬樣式 */
        .meditation-btn { width: 100%; background: #111; color: var(--cyan); border: 1px solid var(--cyan); padding: 15px; border-radius: 15px; margin-bottom: 12px; font-size: 1.05rem; letter-spacing: 2px; text-align: center; cursor: pointer; transition: 0.3s; }
        .meditation-btn:active { background: var(--cyan); color: #000; }
        
        /* 4-7-8 呼吸曼荼羅 */
        #breathe-mandala {
            width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--cyan);
            display: flex; justify-content: center; align-items: center; font-size: 1.5rem; font-weight: bold; color: var(--gold);
            box-shadow: 0 0 20px rgba(139,168,156,0.3), inset 0 0 20px rgba(139,168,156,0.3);
            margin: 50px auto; transition: transform 0.5s linear;
        }
        .breathe-expand { animation: b-exp 4s linear forwards; }
        .breathe-hold { transform: scale(1.6); box-shadow: 0 0 40px rgba(212,175,55,0.6), inset 0 0 40px rgba(212,175,55,0.6) !important; border-color: var(--gold) !important; transition: all 0.5s; }
        .breathe-shrink { animation: b-shr 8s linear forwards; }
        @keyframes b-exp { from { transform: scale(1); } to { transform: scale(1.6); } }
        @keyframes b-shr { from { transform: scale(1.6); } to { transform: scale(1); } }

        /* 眉心入夢法 */
        #sleep-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000;
            z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }
        #sleep-dot {
            width: 8px; height: 8px; background: var(--gold); border-radius: 50%;
            box-shadow: 0 0 15px var(--gold); margin-bottom: 20vh;
            animation: sleep-fade 600s linear forwards, sleep-pulse 4s infinite alternate; /* 10分鐘緩慢熄滅 */
        }
        @keyframes sleep-pulse { from { transform: scale(1); opacity: 0.8;} to { transform: scale(1.3); opacity: 1;} }
        @keyframes sleep-fade { from { opacity: 1; } to { opacity: 0; display: none;} }
        .sleep-text { color: #444; font-size: 0.8rem; letter-spacing: 3px; position: absolute; bottom: 15vh; animation: text-fade 10s forwards; }
        @keyframes text-fade { 0%, 80% { opacity: 1; } 100% { opacity: 0; } }

        /* 化塵法 (碎裂) */
        .worry-dust {
            position: fixed; background: #444; border-radius: 50%; pointer-events: none;
            animation: shatter-fall 2s ease-out forwards; z-index: 50;
        }
        @keyframes shatter-fall {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--vx), var(--vy)) scale(0); }
        }
        .bell-btn {
            width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #333, #000);
            border: 2px solid var(--gold); display: flex; justify-content: center; align-items: center;
            margin: 30px auto; cursor: pointer; box-shadow: 0 0 20px rgba(212,175,55,0.2); transition: 0.2s;
        }
        .bell-btn:active { transform: scale(0.95); box-shadow: 0 0 40px rgba(212,175,55,0.8); }
    </style>
</head>
<body>

<div id="festival-banner"></div>

<div class="time-monitor">
    <div class="mon-left" onclick="touchAvatar()" style="cursor:pointer;">
        <div id="mini-seed" style="display:flex; align-items:center; justify-content:center; width:42px; height:42px;">✨</div>
        <div style="display:flex; flex-direction:column; overflow:hidden;">
            <div style="display:flex; align-items:center; gap:5px;">
                <span id="rank-title" style="font-size: 0.65rem; color: var(--cyan);">初信位</span>
                <span id="title-medal" style="color:var(--gold); font-size:0.6rem; font-weight:bold;"></span>
            </div>
            <span id="display-name" style="font-weight: bold; font-size: 0.95rem;">行者</span>
        </div>
    </div>
    <div class="mon-right">
        <div id="earth-time">娑婆：--:--:--</div>
        <div id="pure-time-display">極樂累積：--</div>
    </div>
</div>

<div id="screen-1" class="container active">
    <div style="width:100%; border: 1.5px solid var(--gold); border-radius: 18px; margin: 20px 0; background: rgba(243,229,171,0.03);">
        <input type="text" id="user-name" placeholder="請留名號" style="width:100%; background:transparent; border:none; color:var(--gold); text-align:center; font-size:1.25rem; outline:none; padding:18px; font-weight: bold;">
    </div>
    <div style="color:var(--gold); font-size: 1.1rem; margin-bottom:8px;">累積念佛：<span id="total-count">0</span> 聲</div>
    <div id="today-info" style="color:var(--cyan); font-size:0.9rem; margin-bottom:5px; letter-spacing: 1px;">今日對頻：<span id="today-count">0</span> 次</div>
    
    <div class="vol-slider-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        </svg>
        <input type="range" id="vol-slider" min="0" max="100" value="5" oninput="changeVolume(this.value)">
        <span id="vol-display" style="width: 35px; text-align: right;">5%</span>
    </div>

    <div style="width:100%; height:8px; background:#1a1a1a; border-radius:4px; overflow:hidden; border: 0.5px solid #333; margin-top: 15px;"><div id="streak-bar" style="height:100%; background: linear-gradient(90deg, var(--solid-gold), var(--gold)); width:0%; transition:1.2s;"></div></div>
    
    <div id="label-container" style="font-size:0.8rem; margin:12px 0 35px; color:#888;">信位進度 (十日一階)：<span id="streak-val">0.0</span> / 100</div>

    <button class="btn-main" onclick="startApp()">啟動與阿彌陀佛對頻</button>
    <div style="display:flex; gap:12px; width:100%;">
        <button class="btn-main" style="font-size:0.85rem; flex:1;" onclick="exportProgress()">封存備份</button>
        <button class="btn-main" style="font-size:0.85rem; flex:1;" onclick="document.getElementById('import-file').click()">意念導入</button>
        <input type="file" id="import-file" style="display:none" onchange="importProgress(this)">
    </div>
    
    <div style="text-align:center; margin-top:20px;">
        <span class="gold-btn" style="font-size: 0.75rem;" onclick="document.getElementById('guide-modal').style.display='flex'">修行指南 GUIDE</span>
    </div>
</div>

<div id="screen-2" class="container">
    <div class="circle-wrap">
        <svg width="240" height="240" viewBox="0 0 100 100" style="position:absolute; top:0; left:0;">
            <circle cx="50" cy="50" r="48" stroke="#111" stroke-width="2" fill="none"></circle>
            <g id="lotus-petals"></g>
        </svg>
        <svg width="240" height="240" style="transform: rotate(-90deg); position:absolute; top:0; left:0; pointer-events:none;">
            <circle id="progress-ring" cx="120" cy="120" r="110" stroke="var(--gold)" stroke-width="4" fill="none" stroke-dasharray="691" stroke-dashoffset="691" stroke-linecap="round" style="transition:0.5s; opacity:0.3;"></circle>
        </svg>
        
        <div id="orbit-wrap" class="orbit-container">
            <div id="orbit-dot"></div>
        </div>

        <div id="big-seed" onclick="handleNian(event)" style="z-index: 10;">✨</div>
        <div id="guide-ripple"></div>
    </div>

    <div id="nian-num-wrap">
        <div id="nian-num" style="font-size:3.2rem; font-weight:bold; font-family: monospace;">0 / 10</div>
    </div>

    <div id="nian-word" style="font-size:2.2rem; color:var(--gold); height:3.5rem; margin-top:15px; font-weight:bold; letter-spacing: 2px; opacity: 0; transition: opacity 0.5s;"></div>

    <div style="display:flex; gap:15px; margin-top:20px;">
        <div class="gold-btn" onclick="document.getElementById('guide-modal').style.display='flex'">GUIDE</div>
        <div class="gold-btn" onclick="goHome()">HOME</div>
    </div>
</div>

<div id="screen-3" class="container">
    <h3 style="color:var(--gold); margin-bottom:20px; border-bottom:1.5px solid var(--gold); width:100%; text-align:center; padding-bottom:12px; letter-spacing: 2px;">今日修行資糧</h3>
    
    <div id="task-list" style="width:100%;"></div>
    
    <div class="merit-forest-wrap">
        <div class="merit-title">【 功德林 】</div>
        
        <div id="daily-dew-box" onclick="refreshDew()">
            <div style="color:var(--cyan); font-weight:bold; font-size:0.85rem; margin-bottom:8px; letter-spacing:2px;">今日法露</div>
            <div id="dew-text" style="color:#ddd; font-size:0.95rem; line-height:1.6; letter-spacing:1px;">一稱南無佛，皆已成佛道。</div>
            <div style="font-size:0.6rem; color:#666; margin-top:8px;">(點擊汲取甘泉)</div>
        </div>

        <div class="merit-grid">
            <div class="merit-btn" onclick="document.getElementById('lib-modal').style.display='flex'">
                <svg class="merit-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                <span style="font-size:0.85rem; letter-spacing:1px;">法寶閣</span>
            </div>
            <div class="merit-btn" onclick="document.getElementById('music-modal').style.display='flex'">
                <svg class="merit-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                <span style="font-size:0.85rem; letter-spacing:1px;">佛樂欣賞</span>
            </div>
            <div class="merit-btn" onclick="showScreen(5)">
                <svg class="merit-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                <span style="font-size:0.85rem; letter-spacing:1px;">入靜煉心</span>
