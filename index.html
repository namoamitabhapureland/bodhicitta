<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>普賢行願 OS - 圓滿全法寶版</title>
    <style>
        :root { --bg: #000; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #06b6d4; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 監控面板 */
        .time-monitor { width: 94%; max-width: 450px; margin: 15px auto; padding: 12px; background: var(--glass); backdrop-filter: blur(20px); border: 1.5px solid var(--gold); border-radius: 12px; display: grid; grid-template-columns: 1fr 1fr; position: sticky; top: 10px; z-index: 1000; }
        
        /* 資糧卡片 */
        .task-card { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 18px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .task-card.completed { border: 1.5px solid var(--gold); background: rgba(243,229,171,0.15); }
        .task-card.completed span:last-child { color: var(--gold); font-weight: bold; }

        .btn-main { width: 100%; background: #111; color: var(--gold); border: 1.5px solid var(--gold); padding: 15px; border-radius: 30px; font-weight: bold; margin: 8px 0; cursor: pointer; text-align: center; }
        .container { width: 92%; max-width: 450px; display: none; flex-direction: column; align-items: center; padding: 20px 0; }
        .active { display: flex; }
        
        /* 彈窗 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { width: 90%; max-width: 400px; padding: 20px; border: 1.5px solid var(--gold); background: #000; border-radius: 20px; max-height: 80vh; overflow-y: auto; }
        
        .lib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .lib-link { color: var(--cyan); text-decoration: none; padding: 12px; border: 1px solid #333; border-radius: 8px; font-size: 0.9rem; text-align: center; background: rgba(255,255,255,0.02); }
        
        #home-btn { position: fixed; bottom: 20px; right: 20px; border: 1px solid var(--gold); color: var(--gold); background: #000; padding: 8px 18px; border-radius: 20px; z-index: 1000; cursor: pointer; }
    </style>
</head>
<body>

<div class="time-monitor">
    <div style="display:flex; align-items:center; gap:8px;">
        <div id="mini-seed" style="font-size:1.5rem;">✨</div>
        <div style="display:flex; flex-direction:column;">
            <span id="rank-title" style="font-size:0.6rem; color:var(--cyan);">初信位</span>
            <span id="display-name" style="font-weight:bold; font-size:0.9rem;">妙依</span>
        </div>
    </div>
    <div style="text-align:right; font-size:0.75rem;">
        <div id="earth-time">--:--:--</div>
        <div id="pure-time-display" style="color:var(--gold);">極樂資糧：--</div>
    </div>
</div>

<div id="home-btn" onclick="goHome()">HOME</div>

<div id="screen-1" class="container active">
    <div style="text-align:center; width:100%;">
        <div style="color:var(--gold); font-size:1.1rem; margin-bottom:10px;">一生累積：<span id="total-count">0</span> 聲</div>
        <input type="text" id="user-name" style="width:80%; background:#111; border:1px solid #444; color:var(--gold); padding:10px; border-radius:10px; text-align:center; margin-bottom:15px;" value="妙依">
        <div id="medal-zone" style="height:40px; margin-bottom:10px; display:flex; justify-content:center; align-items:center; gap:5px;"></div>
    </div>
    <div style="width:100%; height:6px; background:#1a1a1a; border-radius:3px; overflow:hidden;"><div id="streak-bar" style="height:100%; background:var(--gold); width:0%; transition:1s;"></div></div>
    <div style="font-size:0.75rem; margin:10px 0; color:#888;">百日圓滿進度：<span id="streak-val">0.0</span>%</div>
    <button class="btn-main" onclick="startApp()">啟動對頻修行</button>
</div>

<div id="screen-2" class="container">
    <div style="position:relative; margin:20px 0;">
        <svg width="200" height="200" style="transform: rotate(-90deg);"><circle cx="100" cy="100" r="90" stroke="#111" stroke-width="8" fill="none"></circle><circle id="progress-ring" cx="100" cy="100" r="90" stroke="var(--gold)" stroke-width="8" fill="none" stroke-dasharray="565" stroke-dashoffset="565" style="transition:0.3s;"></circle></svg>
        <div id="big-seed" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:4rem; cursor:pointer;" onclick="handleNian()">✨</div>
    </div>
    <div id="nian-num" style="font-size:2.5rem;">0 / 10</div>
    <div id="nian-word" style="font-size:1.8rem; color:var(--gold); height:2.5rem;"></div>
</div>

<div id="screen-3" class="container">
    <h3 style="color:var(--gold); margin-bottom:15px;">修行資糧區域</h3>
    <div id="task-list" style="width:100%;"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%;">
        <button class="btn-main" onclick="document.getElementById('lib-modal').style.display='flex'">進入法寶閣</button>
        <button class="btn-main" onclick="document.getElementById('music-modal').style.display='flex'">佛樂欣賞</button>
    </div>
    <button class="btn-main" style="background:var(--solid-gold); color:#000;" onclick="showScreen(4)">大回向</button>
</div>

<div id="screen-4" class="container">
    <textarea id="dedi-box" placeholder="願以此功德..." style="width:100%; height:200px; background:#050505; border:1px solid var(--gold); border-radius:12px; color:#eee; padding:12px; font-size:1rem;"></textarea>
    <button class="btn-main" onclick="finishSession()">封存今日修行</button>
</div>

<div id="lib-modal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--gold); text-align:center;">圓教無私法寶閣</h3>
        <div class="lib-grid">
            <a class="lib-link" href="https://www.fodizi.tw/fajing/103.html" target="_blank">普賢行願品</a>
            <a class="lib-link" href="https://www.fodizi.tw/fajing/1.html" target="_blank">阿彌陀經</a>
            <a class="lib-link" href="https://www.fodizi.tw/fajing/9.html" target="_blank">金剛經</a>
            <a class="lib-link" href="https://www.fodizi.tw/fajing/3.html" target="_blank">地藏本願經</a>
            <a class="lib-link" href="https://www.fodizi.tw/fajing/2.html" target="_blank">般若心經</a>
            <a class="lib-link" href="https://www.fodizi.tw/fajing/8.html" target="_blank">大悲咒</a>
            <a class="lib-link" href="https://zh.m.wikisource.org/zh-hant/佛說觀無量壽佛經" target="_blank">觀無量壽經</a>
            <a class="lib-link" href="https://zh.m.wikisource.org/zh-hant/大方廣佛華嚴經" target="_blank">華嚴經</a>
        </div>
        <button class="btn-main" onclick="document.getElementById('lib-modal').style.display='none'">返回修行</button>
    </div>
</div>

<div id="music-modal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--gold); text-align:center;">無私佛樂欣賞</h3>
        <button class="btn-main" onclick="window.open('https://www.youtube.com/@Ami-PureLand')">✨ 我的修行頻道</button>
        <div class="lib-grid" style="grid-template-columns:1fr;">
            <a class="lib-link" href="https://www.youtube.com/results?search_query=佛樂" target="_blank">更多無私佛樂分享</a>
        </div>
        <button class="btn-main" style="background:#222;" onclick="document.getElementById('music-modal').style.display='none'">返回</button>
    </div>
</div>

<script>
    const tasks = ["普賢十大願修行", "五戒十善持守", "財布施與法布施", "每日定課誦經", "受持八關齋戒", "分享法寶善知識", "一念至誠回向"];
    let db = JSON.parse(localStorage.getItem('PX_V14.3')) || { name: "妙依", totalNian: 0, points: 0, dailyTasks: [], todayCount: 0 };
    let nianCount = 0;

    function save() { localStorage.setItem('PX_V14.3', JSON.stringify(db)); }
    
    function updateClock() {
        const now = new Date(); document.getElementById('earth-time').innerText = "娑婆：" + now.toLocaleTimeString();
        const dp = (now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds())/86400;
        document.getElementById('pure-time-display').innerText = `極樂資糧：${(db.points/100 + dp).toFixed(4)}`;
    }
    setInterval(updateClock, 1000);

    function updateUI() {
        document.getElementById('total-count').innerText = (db.totalNian || 0).toLocaleString();
        document.getElementById('display-name').innerText = db.name;
        let progress = (db.points / 10000) * 100;
        document.getElementById('streak-val').innerText = progress.toFixed(1);
        document.getElementById('streak-bar').style.width = Math.min(progress, 100) + '%';
        
        const rank = progress >= 100 ? {l:"六信位・不退轉", i:"🪷", c: "#d4af37"} : 
                    (progress >= 80 ? {l:"五信位", i:"🎋", c:"#fbbf24"} :
                    (progress >= 60 ? {l:"四信位", i:"🍀", c:"#34d399"} :
                    (progress >= 40 ? {l:"三信位", i:"🌿", c:"#a3e635"} :
                    (progress >= 20 ? {l:"二信位", i:"🌱", c:"#22c55e"} : {l:"初信位", i:"✨", c:"#06b6d4"}))));
        
        document.getElementById('rank-title').innerText = rank.l;
        document.getElementById('rank-title').style.color = rank.c;
        document.getElementById('mini-seed').innerText = rank.i;
        document.getElementById('big-seed').innerText = rank.i;
        
        const mz = document.getElementById('medal-zone'); mz.innerHTML = "";
        if (db.totalNian >= 10) mz.innerHTML += `<span title="初發心">🎖️</span>`;
        if (db.totalNian >= 500) mz.innerHTML += `<span style="color:var(--cyan)" title="一念清淨">💠</span>`;
        if (db.totalNian >= 10000) mz.innerHTML += `<span style="color:var(--gold)" title="淨念相繼">🏆</span>`;
    }

    function startApp() { db.name = document.getElementById('user-name').value; save(); showScreen(2); updateUI(); }
    
    function handleNian() {
        if (nianCount < 10) {
            nianCount++; db.totalNian++; 
            document.getElementById('nian-word').innerText = "南無阿彌陀佛";
            document.getElementById('progress-ring').style.strokeDashoffset = 565 - (nianCount * 56.5);
            document.getElementById('nian-num').innerText = nianCount + " / 10";
            if(nianCount === 10) { 
                db.points += 2; save(); 
                setTimeout(()=> { showScreen(3); nianCount=0; document.getElementById('progress-ring').style.strokeDashoffset=565; }, 800); 
            }
        }
    }

    function renderTasks() {
        const container = document.getElementById('task-list'); container.innerHTML = "";
        tasks.forEach((t, i) => {
            const isDone = db.dailyTasks.includes(i);
            const card = document.createElement('div'); card.className = `task-card ${isDone?'completed':''}`;
            card.innerHTML = `<span>${t}</span> <span>${isDone?'(圓滿)':'[修持]'}</span>`;
            if(!isDone) card.onclick = () => { db.dailyTasks.push(i); db.points += 10; save(); renderTasks(); updateUI(); };
            container.appendChild(card);
        });
    }

    function showScreen(n) { document.querySelectorAll('.container').forEach(c => c.style.display='none'); document.getElementById('screen-'+n).style.display='flex'; if(n===3) renderTasks(); }
    function goHome() { nianCount=0; showScreen(1); updateUI(); }
    function finishSession() { alert("今日修行資糧已封存"); goHome(); }
    updateUI();
</script>
</body>
</html>
