<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>普賢行願 OS - 圓滿版</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --gold: #d4af37;
            --theme-color: #06b6d4;
            --cyan: #22d3ee;
            --rose: #fb7185;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background: var(--bg-dark); color: #eee;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* 頂端監控 */
        .time-monitor {
            width: 100%; max-width: 500px; padding: 15px; background: rgba(20, 20, 20, 0.95);
            border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }

        /* 修正：小圖示呼吸動畫 */
        @keyframes mini-breath {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        #mini-seed { animation: mini-breath 3s infinite ease-in-out; display: inline-block; }

        .container {
            width: 90%; max-width: 450px; display: none;
            flex-direction: column; align-items: center; padding: 30px 10px; text-align: center;
        }
        .container.active { display: flex; }

        /* 修正：圓圈位置絕對置中，不偏移 */
        .nian-circle-wrap {
            position: relative; margin: 30px auto;
            width: 280px; height: 280px;
            display: flex; justify-content: center; align-items: center;
        }
        svg { position: absolute; }
        .circle-progress {
            fill: none; stroke: var(--gold); stroke-width: 12;
            stroke-dasharray: 754; stroke-dashoffset: 754;
            stroke-linecap: round; transition: 0.5s;
            filter: drop-shadow(0 0 8px var(--gold));
        }

        #big-seed {
            font-size: 5rem; cursor: pointer; z-index: 10;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 20px var(--gold));
            user-select: none;
        }

        /* 修正：黑金按鈕視覺 */
        .btn-main, .btn-tool {
            background: #000 !important; color: var(--gold) !important;
            border: 1.5px solid var(--gold) !important; padding: 15px 25px;
            border-radius: 30px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.2); width: 100%; margin: 10px 0;
        }

        /* 修正：黑金能量棒 */
        .bar-bg, .task-bar {
            width: 100%; height: 10px; background: #000 !important;
            border: 1px solid #333; border-radius: 5px; overflow: hidden; margin-top: 10px;
        }
        .bar-fill, .task-fill {
            height: 100%; background: linear-gradient(90deg, #b8860b, #ffd700, #d4af37) !important;
        }

        /* 修正：彈窗寬度鎖定，拒絕細長條 */
        #lib-modal, #bodhi-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; padding: 20px;
        }
        #lib-modal > *, #bodhi-layer > div {
            width: 85vw !important; max-width: 400px; background: #111;
            padding: 25px; border: 1px solid var(--gold); border-radius: 20px;
        }

        input[type="text"] {
            width: 85%; background: #1a1a1a; border: none; border-bottom: 1px solid var(--gold);
            color: var(--gold); padding: 12px; text-align: center; font-size: 1.1rem; margin-bottom: 20px; outline: none;
        }
        .task-card { width: 100%; background: #151515; margin-bottom: 12px; padding: 15px; border-radius: 10px; border-left: 4px solid #333; text-align: left; }
        .task-card.completed { border-left-color: var(--gold); opacity: 0.6; }
        #home-btn { position: fixed; bottom: 20px; right: 20px; color: var(--theme-color); background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--theme-color); cursor: pointer; z-index: 1000; }
        #dedi-box { width: 100%; height: 180px; background: #151515; border: 1px solid var(--gold); color: #eee; padding: 15px; border-radius: 15px; outline: none; }
    </style>
</head>
<body>
  <div class="time-monitor">
    <div class="monitor-left">
        <div id="mini-seed" style="font-size: 1.8rem;">✨</div>
        <div style="display: flex; flex-direction: column; align-items: flex-start;">
            <span id="rank-title" style="font-size: 0.8rem; color: var(--theme-color);">初信位</span>
            <span id="display-name" style="font-size: 1rem; font-weight: bold; color: #fff;">行者</span>
        </div>
    </div>
    
    <div class="monitor-right">
        <div id="earth-time">娑婆：--:--:--</div>
        <div id="pure-time">--</div>
    </div>
</div>
    <div class="monitor-right">
        <div id="earth-time">娑婆：--:--:--</div>
        <div id="pure-time">--</div>
    </div>
        <div id="growth-lv" style="font-size:0.7rem; color:var(--theme-color); border: 1px solid var(--theme-color); padding: 2px 8px; border-radius: 10px;">種子</div>
    </div>

    <div id="gold-dust-layer"></div>
    <div id="home-btn" onclick="goHome()">HOME</div>

    <div id="screen-1" class="container active">
        <input type="text" id="user-name" placeholder="請留名號">
        <div style="color:var(--gold); margin-bottom: 15px;">一生累積：<span id="total-count">0</span> 聲</div>
        <div class="bar-bg"><div id="streak-bar" class="bar-fill"></div></div>
        <div style="font-size: 0.8rem; margin: 5px 0 20px;">百日進度：<span id="streak-val">0.0</span> / 100</div>
        <button class="btn-main" onclick="startApp()">啟動啟動啟動啟動</button>
        <div style="display:flex; gap:10px; width:100%;">
            <button class="btn-tool" onclick="exportProgress()">💾 備份</button>
            <button class="btn-tool" onclick="document.getElementById('import-file').click()">📂 還原</button>
            <input type="file" id="import-file" style="display:none" onchange="importProgress(this)">
        </div>
    </div>

    <div id="screen-2" class="container">
        <div class="nian-circle-wrap">
            <svg width="260" height="260"><circle cx="130" cy="130" r="120" stroke="#222" stroke-width="12" fill="none"></circle><circle id="nian-progress" class="circle-progress" cx="130" cy="130" r="120"></circle></svg>
            <div id="big-seed" onclick="handleNian()">✨</div>
        </div>
        <div id="nian-num" style="font-size:2.5rem; font-weight:bold;">0 / 10</div>
        <div id="nian-word" style="font-size:2rem; color:var(--gold); height:3rem;"></div>
        <div id="bodhi-layer">
            <div>
                <div style="margin-bottom:20px;">願以此功德，平等施於一切。</div>
                <button class="btn-main" onclick="confirmBodhi()">進入資糧修行</button>
            </div>
        </div>
    </div>

    <div id="screen-3" class="container">
        <h3 style="color:var(--gold);">今日修行資糧</h3>
        <div id="task-list"></div>
        <div style="display:flex; gap:10px; width:100%;">
            <button class="btn-main" onclick="openLib()">📖 法寶閣</button>
            <button class="btn-main" style="border-color:var(--rose); color:var(--rose);" onclick="window.open('https://www.youtube.com/@您的頻道')">🎵 佛樂</button>
        </div>
        <button class="btn-main" style="background:var(--gold) !important; color:#000 !important;" onclick="showScreen(4)">大回向</button>
    </div>

    <div id="screen-4" class="container">
        <textarea id="dedi-box" placeholder="願以此功德..."></textarea>
        <button class="btn-main" onclick="finishSession()">封存今日資糧</button>
    </div>

    <div id="lib-modal">
        <div>
            <h3 style="color:var(--gold);">圓教法寶閣</h3>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <a style="color:var(--cyan);" href="https://zh.m.wikisource.org/zh-hant/佛說觀無量壽佛經" target="_blank">《觀無量壽佛經》</a>
                <a style="color:var(--cyan);" href="https://zh.wikisource.org/zh-hant/大方廣佛華嚴經" target="_blank">《華嚴經》</a>
            </div>
            <button class="btn-main" style="margin-top:20px;" onclick="document.getElementById('lib-modal').style.display='none'">返回</button>
        </div>
    </div>

    <script>
        // --- 穩定版資料庫架構 (PX_V14.3) ---
        let db = JSON.parse(localStorage.getItem('PX_V14.3')) || { name: "", totalNian: 0, points: 0, dailyTasks: [], todayCount: 0, lastDate: new Date().toLocaleDateString() };
        const tasks = ["普賢十大願修行", "五戒十善持守", "親近供養三寶", "財布施與法布施", "興建塔廟造像", "供養護持三寶", "每日定課誦經", "受持清淨八關齋戒", "分享傳遞佛法", "一念至誠回向"];
        const sutras = ["大自在神通。無量清淨。", "一塵中有塵數剎。一一剎有難思佛。", "以此大願。隨順趣入。", "不取眾相。復於諸法實相。"];
        let nianCount = 0;

        const rankConfig = [
            { day: 0, label: "初信位", color: "#06b6d4", icon: "✨" },
            { day: 20, label: "二信位", color: "#22c55e", icon: "🌱" },
            { day: 100, label: "不退轉", color: "#d4af37", icon: "🪷" }
        ];

        // 修正：正音與安卓喚醒
        function speak(t, r) { 
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t.replace(/阿/g, 'ㄚ'));
            m.lang='zh-TW'; m.rate=r; window.speechSynthesis.speak(m);
        }

        function startApp() {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); // 喚醒安卓
            const name = document.getElementById('user-name').value;
            if(!name) return alert("請留名號");
            
            // --- 護持提醒邏輯 (原本的穩定邏輯) ---
            if (db.name && db.name !== name) {
                if (!confirm(`此法寶目前由「${db.name}」護持，確定更改為「${name}」？`)) return;
            }
            db.name = name;
            const today = new Date().toLocaleDateString();
            if (db.lastDate !== today) { db.todayCount = 0; db.lastDate = today; db.dailyTasks = []; }
            db.todayCount++; save();
            speak(sutras[Math.floor(Math.random() * sutras.length)], 0.8);
            showScreen(2); updateUI();
        }

        function updateUI() {
            document.getElementById('total-count').innerText = db.totalNian;
            let totalDays = db.points / 100;
            document.getElementById('streak-val').innerText = totalDays.toFixed(1);
            document.getElementById('streak-bar').style.width = Math.min(totalDays, 100) + '%';
            
            const current = [...rankConfig].reverse().find(r => totalDays >= r.day) || rankConfig[0];
            document.documentElement.style.setProperty('--theme-color', current.color);
            document.getElementById('rank-title').innerText = current.label;
            document.getElementById('display-name').innerText = db.name || "行者";
            document.getElementById('mini-seed').innerText = current.icon;
            
            let growth = 1 + (db.points / 5000);
            document.getElementById('big-seed').innerText = current.icon;
            document.getElementById('big-seed').style.transform = `scale(${growth})`;
            document.getElementById('mini-seed').style.transform = `scale(${Math.min(growth, 1.3)})`;
        }

        function handleNian() {
            if (nianCount < 10) {
                nianCount++; db.totalNian++;
                document.getElementById('nian-word').innerText = "南無ㄚ彌陀佛";
                setTimeout(()=> document.getElementById('nian-word').innerText="", 500);
                speak("南無ㄚ彌陀佛", 0.75);
                updateNianCircle();
                if(nianCount===10) setTimeout(()=>document.getElementById('bodhi-layer').style.display='flex', 800);
            }
        }

        function updateClock() {
            const now = new Date();
            const dayPercent = (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds() + now.getMilliseconds()/1000) / 86400;
            document.getElementById('pure-time').innerText = `${Math.floor(db.points + dayPercent)} 年${(dayPercent).toFixed(4).substring(1)}`;
        }
        setInterval(updateClock, 50);

        function save() { localStorage.setItem('PX_V14.3', JSON.stringify(db)); }
        function showScreen(n) { document.querySelectorAll('.container').forEach(c => c.classList.remove('active')); document.getElementById('screen-'+n).classList.add('active'); if(n===3) renderTasks(); }
        function confirmBodhi() { document.getElementById('bodhi-layer').style.display='none'; showScreen(3); }
        function updateNianCircle() { document.getElementById('nian-progress').style.strokeDashoffset = 754 - (nianCount*75.4); document.getElementById('nian-num').innerText = nianCount+" / 10"; }
        function renderTasks() {
            const container = document.getElementById('task-list'); container.innerHTML = "";
            tasks.forEach((t, i) => {
                const isDone = db.dailyTasks.includes(i);
                const card = document.createElement('div'); card.className = `task-card ${isDone?'completed':''}`;
                card.innerHTML = `<div style="color:var(--gold);">${t}</div><div class="task-bar"><div class="task-fill" style="width:${isDone?'100%':'0%'}"></div></div>`;
                if(!isDone) card.onclick = () => { db.dailyTasks.push(i); db.points+=10; renderTasks(); updateUI(); speak(t+"圓滿", 0.8); };
                container.appendChild(card);
            });
        }
        function goHome() { nianCount=0; updateNianCircle(); showScreen(1); updateUI(); }
        function finishSession() { save(); alert("今日修行資糧已封存"); goHome(); }
        function openLib() { document.getElementById('lib-modal').style.display = 'flex'; }
        function exportProgress() { const blob = new Blob([JSON.stringify(db)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `修行備份.json`; a.click(); }
        function importProgress(i) { const reader = new FileReader(); reader.onload = (e) => { db = JSON.parse(e.target.result); save(); location.reload(); }; reader.readAsText(i.files[0]); }
        updateUI();
    </script>
</body>
</html>
