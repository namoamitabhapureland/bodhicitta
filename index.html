<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>普賢行願 OS - 琉璃金芒版</title>
    <style>
        :root { 
            --bg: #000; 
            --gold: #f3e5ab; /* 淺金色 */
            --solid-gold: #d4af37; 
            --cyan: #06b6d4; 
            --glass: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #eee; 
            font-family: "PingFang TC", sans-serif; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* 頂端監控：五五對齊 */
        .time-monitor {
            width: 94%; max-width: 450px; margin: 15px auto; padding: 12px;
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1.2px solid var(--gold); border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 10px; z-index: 1000;
        }
        .mon-left { flex: 0 0 48%; display: flex; align-items: center; gap: 8px; }
        .mon-right { flex: 0 0 48%; text-align: right; display: flex; flex-direction: column; }
        #earth-time { color: #888; font-size: 0.7rem; font-family: monospace; }
        #pure-time-display { color: var(--gold); font-size: 0.82rem; font-weight: bold; }

        /* 按鈕：實體金質感，無圖示 */
        .btn-main {
            width: 100%; background: linear-gradient(145deg, #1a1a1a, #000); 
            color: var(--gold); border: 1.5px solid var(--gold);
            padding: 16px; border-radius: 30px; font-weight: bold; margin: 10px 0; 
            transition: 0.2s; cursor: pointer; text-align: center; font-size: 1rem;
        }
        .btn-main:active { 
            transform: scale(0.96); box-shadow: 0 0 25px var(--solid-gold); 
            background: var(--gold); color: #000;
        }

        /* 任務卡片：移除圓圈，改用左側飾條 */
        .task-card { 
            width: 100%; background: var(--glass); border: 1px solid #333; 
            padding: 18px; border-radius: 12px; margin-bottom: 12px; 
            transition: 0.4s; border-left: 4px solid #333; /* 預設暗線 */
        }
        .task-card.completed { 
            border: 1.2px solid var(--gold); border-left: 4px solid var(--gold);
            box-shadow: 0 0 15px rgba(243, 229, 171, 0.15);
            background: rgba(243, 229, 171, 0.05);
        }

        /* 種子呼吸燈 */
        .circle-wrap { position: relative; margin: 40px 0; width: 240px; height: 240px; }
        #big-seed { 
            font-size: 5.5rem; cursor: pointer; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: seed-breath 4s infinite ease-in-out;
        }
        @keyframes seed-breath {
            0%, 100% { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 15px var(--solid-gold)); }
            50% { transform: translate(-50%, -50%) scale(1.1); filter: drop-shadow(0 0 30px var(--gold)); }
        }

        /* 彈窗 */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
        }
        .glass-box {
            width: 85%; max-width: 380px; padding: 30px; border: 1.5px solid var(--gold);
            background: #000; border-radius: 20px; text-align: center;
        }

        #home-btn { position: fixed; bottom: 25px; right: 25px; border: 1px solid var(--gold); color: var(--gold); background: #000; padding: 8px 18px; border-radius: 20px; z-index: 1000; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="time-monitor">
    <div class="mon-left">
        <div id="mini-seed" style="font-size: 1.8rem;">✨</div>
        <div style="display:flex; flex-direction:column;">
            <span id="rank-title" style="font-size: 0.65rem; color: var(--cyan);">初信位</span>
            <span id="display-name" style="font-weight: bold;">行者</span>
        </div>
    </div>
    <div class="mon-right">
        <div id="earth-time">娑婆：--:--:--</div>
        <div id="pure-time-display">極樂累積：--</div>
    </div>
</div>

<div id="home-btn" onclick="goHome()">HOME</div>

<div id="screen-1" class="container active" style="width:90%; display:flex; flex-direction:column; align-items:center;">
    <div style="width:100%; border: 1.2px solid var(--gold); border-radius: 15px; margin: 20px 0; background: rgba(243,229,171,0.03);">
        <input type="text" id="user-name" placeholder="請留名號" style="width:100%; background:transparent; border:none; color:var(--gold); text-align:center; font-size:1.2rem; outline:none; padding:15px;">
    </div>
    <div style="color:var(--gold); margin-bottom:10px;">一生累積：<span id="total-count">0</span> 聲</div>
    <div id="today-info" style="color:var(--cyan); font-size:0.85rem; margin-bottom:15px;">今日對頻：<span id="today-count">0</span> 次</div>
    <div style="width:100%; height:6px; background:#222; border-radius:3px; overflow:hidden;"><div id="streak-bar" style="height:100%; background:var(--gold); width:0%; transition:1s;"></div></div>
    <div style="font-size:0.75rem; margin:10px 0 30px; color:#888;">百日進度：<span id="streak-val">0.0</span> / 100</div>
    
    <button class="btn-main" onclick="startApp()">啟動對頻</button>
    <div class="flex-55" style="display:flex; gap:10px; width:100%;">
        <button class="btn-main" style="font-size:0.85rem; flex:1;" onclick="exportProgress()">封存備份</button>
        <button class="btn-main" style="font-size:0.85rem; flex:1;" onclick="document.getElementById('import-file').click()">意念導入</button>
        <input type="file" id="import-file" style="display:none" onchange="importProgress(this)">
    </div>
</div>

<div id="screen-2" class="container" style="display:none; flex-direction:column; align-items:center;">
    <div class="circle-wrap">
        <svg width="240" height="240" style="transform: rotate(-90deg);">
            <circle cx="120" cy="120" r="110" stroke="#111" stroke-width="10" fill="none"></circle>
            <circle id="progress-ring" cx="120" cy="120" r="110" stroke="var(--gold)" stroke-width="10" fill="none" stroke-dasharray="691" stroke-dashoffset="691" stroke-linecap="round" style="transition:0.4s;"></circle>
        </svg>
        <div id="big-seed" onclick="handleNian()">✨</div>
    </div>
    <div id="nian-num" style="font-size:2.5rem; font-weight:bold;">0 / 10</div>
    <div id="nian-word" style="font-size:1.8rem; color:var(--gold); height:3rem; margin-top:10px;"></div>
</div>

<div id="screen-3" class="container" style="display:none; width:90%;">
    <h3 style="color:var(--gold); text-align:center; margin-bottom:20px; border-bottom:1px solid #333; padding-bottom:10px;">今日修行資糧</h3>
    <div id="task-list" style="width:100%;"></div>
    <div class="flex-55" style="display:flex; gap:10px; width:100%;">
        <button class="btn-main" style="flex:1;" onclick="openLib()">進入法寶閣</button>
        <button class="btn-main" style="flex:1;" onclick="window.open('https://www.youtube.com/@Ami-PureLand')">修行音樂</button>
    </div>
    <button class="btn-main" style="background:var(--gold) !important; color:#000 !important;" onclick="showScreen(4)">大回向</button>
</div>

<div id="screen-4" class="container" style="display:none; width:90%;">
    <textarea id="dedi-box" placeholder="願以此功德..." style="width:100%; height:200px; background:#111; border:1.5px solid var(--gold); border-radius:15px; color:#eee; padding:15px; outline:none; font-size:1.1rem;"></textarea>
    <button class="btn-main" onclick="finishSession()">封存今日資糧</button>
</div>

<div id="dedi-modal" class="modal-overlay">
    <div class="glass-box">
        <h2 style="color:var(--gold);">願以此功德</h2>
        <p style="line-height:1.8; color:#eee; font-size:1.1rem;">普及於一切。我等與眾生。皆共成佛道。</p>
        <button class="btn-main" onclick="confirmDedi()">進入修行資糧</button>
    </div>
</div>

<div id="lib-modal" class="modal-overlay">
    <div class="glass-box">
        <h3 style="color:var(--gold);">法寶閣</h3>
        <div style="display:flex; flex-direction:column; gap:20px; margin:30px 0;">
            <a style="color:var(--cyan); text-decoration:none; font-size:1.1rem;" href="https://zh.m.wikisource.org/zh-hant/佛說觀無量壽佛經" target="_blank">觀無量壽佛經</a>
            <a style="color:var(--cyan); text-decoration:none; font-size:1.1rem;" href="https://zh.wikisource.org/zh-hant/大方廣佛華嚴經" target="_blank">大方廣佛華嚴經</a>
        </div>
        <button class="btn-main" onclick="document.getElementById('lib-modal').style.display='none'">返回</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('PX_V14.3')) || { 
        name: "", totalNian: 0, points: 0, dailyTasks: [], todayCount: 0, lastDate: new Date().toLocaleDateString() 
    };
    const tasks = ["普賢十大願修行", "五戒十善持守", "親近供養三寶", "財布施與法布施", "興建塔廟造像", "供養護持三寶", "每日定課誦經", "受持清淨八關齋戒", "分享法寶善知識", "一念至誠普皆回向"];
    let nianCount = 0;

    function checkNewDay() {
        const today = new Date().toLocaleDateString();
        if (db.lastDate !== today) {
            db.todayCount = 0; db.dailyTasks = []; db.lastDate = today; save();
        }
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('earth-time').innerText = "娑婆：" + now.toLocaleTimeString();
        const dayPercent = (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds() + now.getMilliseconds()/1000) / 86400;
        const total = db.points + dayPercent;
        document.getElementById('pure-time-display').innerText = `極樂累積：${Math.floor(total)} 年${(dayPercent).toFixed(4).substring(1)}`;
    }
    setInterval(updateClock, 50);

    function startApp() {
        const name = document.getElementById('user-name').value.trim();
        if(!name) return alert("請留名號");
        if (db.name && db.name !== name) {
            if(!confirm(`⚠️ 換人警告：目前的護持者是「${db.name}」，確定要更改嗎？`)) return;
        }
        db.name = name; db.todayCount++; checkNewDay(); save();
        showScreen(2); updateUI();
        speak("以此大願，隨順趣入", 0.8);
    }

    function handleNian() {
        if (nianCount < 10) {
            nianCount++; db.totalNian++;
            document.getElementById('nian-word').innerText = "南無阿彌陀佛";
            document.getElementById('big-seed').style.filter = "drop-shadow(0 0 50px white)";
            setTimeout(()=> {
                document.getElementById('nian-word').innerText="";
                document.getElementById('big-seed').style.filter = "drop-shadow(0 0 15px var(--solid-gold))";
            }, 300);
            speak("南無阿彌陀佛", 0.75);
            document.getElementById('progress-ring').style.strokeDashoffset = 691 - (nianCount * 69.1);
            document.getElementById('nian-num').innerText = nianCount + " / 10";
            if(nianCount === 10) { 
                db.points += 2; save();
                setTimeout(()=> document.getElementById('dedi-modal').style.display='flex', 800); 
            }
        }
    }

    function renderTasks() {
        const container = document.getElementById('task-list'); container.innerHTML = "";
        tasks.forEach((t, i) => {
            const isDone = db.dailyTasks.includes(i);
            const card = document.createElement('div'); 
            card.className = `task-card ${isDone?'completed':''}`;
            card.innerText = t;
            if(!isDone) card.onclick = () => { 
                db.dailyTasks.push(i); db.points += 10; save(); renderTasks(); updateUI(); speak(t+"圓滿", 0.8); 
            };
            container.appendChild(card);
        });
    }

    function speak(t, r) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t.replace(/阿/g, 'ㄚ'));
        m.lang='zh-TW'; m.rate=r; window.speechSynthesis.speak(m);
    }

    function updateUI() {
        document.getElementById('total-count').innerText = db.totalNian.toLocaleString();
        document.getElementById('today-count').innerText = db.todayCount;
        let totalDays = db.points / 100;
        document.getElementById('streak-val').innerText = totalDays.toFixed(1);
        document.getElementById('streak-bar').style.width = Math.min(totalDays, 100) + '%';
        const rank = totalDays >= 100 ? {l:"不退轉", i:"🪷", c:"#d4af37"} : (totalDays >= 20 ? {l:"二信位", i:"🌱", c:"#22c55e"} : {l:"初信位", i:"✨", c:"#06b6d4"});
        document.getElementById('rank-title').innerText = rank.l;
        document.getElementById('display-name').innerText = db.name || "行者";
        document.getElementById('mini-seed').innerText = rank.i;
        document.getElementById('big-seed').innerText = rank.i;
    }

    function save() { localStorage.setItem('PX_V14.3', JSON.stringify(db)); }
    function showScreen(n) { document.querySelectorAll('.container').forEach(c => c.style.display = 'none'); document.getElementById('screen-'+n).style.display = 'flex'; if(n===3) renderTasks(); window.scrollTo(0,0); }
    function confirmDedi() { document.getElementById('dedi-modal').style.display='none'; showScreen(3); }
    function openLib() { document.getElementById('lib-modal').style.display='flex'; }
    function goHome() { nianCount=0; document.getElementById('progress-ring').style.strokeDashoffset=691; document.getElementById('nian-num').innerText="0 / 10"; showScreen(1); updateUI(); }
    function finishSession() { save(); alert("今日修行資糧已封存"); goHome(); }
    function exportProgress() { const blob = new Blob([JSON.stringify(db)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `修行備份.json`; a.click(); }
    function importProgress(i) { const reader = new FileReader(); reader.onload = (e) => { db = JSON.parse(e.target.result); save(); location.reload(); }; reader.readAsText(i.files[0]); }
    
    checkNewDay();
    if(db.name) document.getElementById('user-name').value = db.name;
    updateUI();
</script>
</body>
</html>
