<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普賢行願 OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="time-monitor">
        <div id="mini-seed">✨</div>
        <div style="flex:1; text-align:center;">
            <div style="color:var(--gold); font-weight:bold;">［<span id="rank-title">初信位</span>］<span id="display-name">行者</span></div>
            <div style="font-size:0.7rem; color:#888;">娑婆：<span id="earth-time">--</span> | 極樂：<span id="pure-time">--</span></div>
        </div>
        <div id="growth-lv" style="font-size:0.7rem; border:1px solid var(--gold); padding:2px 8px; border-radius:10px; color:var(--gold);">金剛種子</div>
    </div>

    <div id="screen-1" class="container active">
        <input type="text" id="user-name" placeholder="請留名號">
        <div style="width:100%; background:var(--mist); padding:20px; border-radius:15px;">
            <div style="color:var(--gold); font-size:1.2rem;">累積念佛：<span id="total-count">0</span> 聲</div>
            <div style="height:6px; background:#222; margin-top:10px; border-radius:3px; overflow:hidden;">
                <div id="streak-bar" style="height:100%; background:var(--gold); width:0%;"></div>
            </div>
            <div style="font-size:0.8rem; margin-top:5px; color:var(--gold);">百日功德：<span id="streak-val">0.0</span> / 100</div>
        </div>
        <button class="btn-main" style="width:100%; margin-top:20px;" onclick="startApp()">啟動與阿彌陀佛對頻</button>
        <div class="btn-row">
            <button class="btn-tool" onclick="exportProgress()">備份資糧</button>
            <button class="btn-tool" onclick="document.getElementById('import-file').click()">還原資糧</button>
            <input type="file" id="import-file" style="display:none" onchange="importProgress(this)">
        </div>
    </div>

    <div id="screen-2" class="container">
        <div class="nian-circle-wrap" onclick="handleNian()">
            <svg width="280" height="280">
                <circle cx="140" cy="140" r="130" stroke="#222" stroke-width="10" fill="none"></circle>
                <circle id="nian-progress" cx="140" cy="140" r="130" stroke="var(--gold)" stroke-width="10" fill="none" stroke-dasharray="816" stroke-dashoffset="816" style="transition:0.3s;"></circle>
            </svg>
            <div id="big-seed">✨</div>
        </div>
        <div id="nian-num" style="font-size:3rem; font-weight:bold; margin-top:10px;">0 / 10</div>
        <div id="nian-word" style="font-size:1.8rem; color:var(--gold); height:2.5rem;"></div>
        <div id="bodhi-layer" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); flex-direction:column; justify-content:center; align-items:center; z-index:1000;">
            <div style="color:var(--gold); padding:30px; line-height:2;">願以此功德，平等施於一切。<br>同發菩提心，往生極樂國。</div>
            <button class="btn-main" onclick="confirmBodhi()">進入資糧修行</button>
        </div>
    </div>

    <div id="screen-3" class="container">
        <h3 style="color:var(--gold); margin-bottom:10px;">今日十項修行資糧</h3>
        <div id="task-list"></div>
        <div class="btn-row">
            <button class="btn-main" onclick="openLib()">法寶閣</button>
            <button class="btn-main" onclick="window.open('https://youtube.com')">佛樂欣賞</button>
        </div>
        <button class="btn-main" style="width:100%; margin-top:10px; background:rgba(212,175,55,0.1);" onclick="showScreen(4)">大回向</button>
    </div>

    <div id="screen-4" class="container">
        <textarea id="dedi-box" placeholder="願以此功德..." style="width:100%; height:200px; background:var(--mist); border:none; border-bottom:1px solid var(--gold); color:#fff; padding:15px;"></textarea>
        <button class="btn-main" onclick="finishSession()" style="width:100%; margin-top:20px;">封存資糧</button>
    </div>

    <div id="lib-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); flex-direction:column; justify-content:center; align-items:center; z-index:2000;">
        <h3 style="color:var(--gold); margin-bottom:20px;">法寶閣</h3>
        <a style="color:var(--gold); margin:10px; text-decoration:none;" href="https://zh.m.wikisource.org/zh-hant/佛說觀無量壽佛經" target="_blank">《觀無量壽佛經》</a>
        <button class="btn-main" style="width:60%; margin-top:20px;" onclick="document.getElementById('lib-modal').style.display='none'">返回</button>
    </div>

    <div id="home-btn" onclick="goHome()" style="position:fixed; bottom:20px; right:20px; color:var(--gold); border:1px solid var(--gold); padding:5px 15px; border-radius:20px; font-size:0.8rem; z-index:100;">HOME</div>
    <script src="script.js"></script>
</body>
</html>
