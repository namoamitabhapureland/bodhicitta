<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>普賢行願 OS - 圓滿版</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --gold: #d4af37;
            --theme-color: #06b6d4;
            --cyan: #22d3ee;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background: var(--bg-dark); color: #eee;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* 1. 頂端監控：金框 + 五五對齊 */
        .time-monitor {
            width: 92%; max-width: 450px; margin: 15px auto;
            padding: 12px 15px; background: #000;
            border: 1.5px solid var(--gold); border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 10px; z-index: 1000;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }
        .monitor-left { display: flex; align-items: center; gap: 10px; flex: 1; }
        .monitor-right { text-align: right; flex: 1; display: flex; flex-direction: column; }
        #earth-time { color: #888; font-size: 0.7rem; font-family: monospace; }
        #pure-time { color: var(--gold); font-size: 0.85rem; font-weight: bold; font-family: monospace; }

        /* 2. 通用金框容器 */
        .input-frame {
            width: 100%; border: 1px solid var(--gold); border-radius: 10px;
            padding: 5px; margin-bottom: 20px; background: rgba(212, 175, 55, 0.05);
        }

        /* 3. 按鈕：按下放光特效 */
        .btn-main, .btn-tool {
            background: #000 !important; color: var(--gold) !important;
            border: 1.5px solid var(--gold) !important; padding: 15px;
            border-radius: 30px; font-weight: bold; cursor: pointer;
            transition: 0.2s; width: 100%; margin: 8px 0;
            text-align: center;
        }
        .btn-main:active, .btn-tool:active {
            transform: scale(0.96);
            box-shadow: 0 0 20px var(--gold) !important; /* 按下放光 */
        }

        /* 4. 五五對齊按鈕組 */
        .btn-group-55 { display: flex; gap: 10px; width: 100%; }
        .btn-group-55 .btn-main, .btn-group-55 .btn-tool { flex: 1; }

        /* 基礎佈局 */
        .container { width: 90%; max-width: 450px; display: none; flex-direction: column; align-items: center; padding: 20px 0; }
        .container.active { display: flex; }
        .bar-bg { width: 100%; height: 8px; background: #111; border: 1px solid #333; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--theme-color), var(--gold)); transition: 1s; }
        .task-card { width: 100%; background: #111; margin-bottom: 12px; padding: 15px; border-radius: 10px; border: 1px solid #333; text-align: left; }
        .task-card.completed { border-color: var(--gold); opacity: 0.6; }
        .circle-progress { fill: none; stroke: var(--gold); stroke-width: 12; stroke-dasharray: 754; stroke-dashoffset: 754; stroke-linecap: round; transition: 0.5s; }
        #big-seed { font-size: 5rem; cursor: pointer; transition: 0.2s; filter: drop-shadow(0 0 20px var(--gold)); }
        #home-btn { position: fixed; bottom: 20px; right: 20px; color: var(--gold); border: 1px solid var(--gold); background: #000; padding: 5px 15px; border-radius: 20px; cursor: pointer; z-index: 1000; font-size: 0.8rem; }
        #lib-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:2000; }
        #dedi-box { width: 100%; height: 180px; background: #111; border: 1px solid var(--gold); color: #eee; padding: 15px; border-radius: 15px; outline: none; }
    </style>
</head>
<body>
    <div class="time-monitor">
        <div class="monitor-left">
            <div id="mini-seed">✨</div>
            <div style="display:flex; flex-direction:column;">
                <span id="rank-title" style="font-size:0.7rem; color:var(--theme-color);">初信位</span>
                <span id="display-name" style="font-weight:bold;">行者</span>
            </div>
        </div>
        <div class="monitor-right">
            <div id="earth-time">娑婆：--:--:--</div>
            <div id="pure-time">--</div>
        </div>
    </div>

    <div id="home-btn" onclick="goHome()">HOME</div>

    <div id="screen-1" class="container active">
        <div class="input-frame">
            <input type="text" id="user-name" placeholder="請留名號" style="width:100%; background:transparent; border:none; color:var(--gold); text-align:center; font-size:1.2rem; outline:none; padding:10px;">
        </div>
        <div style="color:var(--gold); margin-bottom: 15px;">一生累積：<span id="total-count">0</span> 聲</div>
        <div class="bar-bg"><div id="streak-bar" class="bar-fill"></div></div>
        <div style="font-size: 0.8rem; margin: 10px 0 25px;">百日進度：<span id="streak-val">0.0</span> / 100</div>
        <button class="btn-main" onclick="startApp()">啟動對頻</button>
        <div class="btn-group-55">
            <button class="btn-tool" onclick="exportProgress()">💾 備份</button>
            <button class="btn-tool" onclick="document.getElementById('import-file').click()">📂 還原</button>
            <input type="file" id="import-file" style="display:none" onchange="importProgress(this)">
        </div>
    </div>

    <div id="screen-2" class="container">
        <div style="position:relative; margin:30px 0;">
            <svg width="260" height="260"><circle cx="130" cy="130" r="120" stroke="#222" stroke-width="12" fill="none"></circle><circle id="nian-progress" class="circle-progress" cx="130" cy="130" r="120"></circle></svg>
            <div id="big-seed" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);" onclick="handleNian()">✨</div>
        </div>
        <div id="nian-num" style="font-size:2.5rem; font-weight:bold;">0 / 10</div>
        <div id="nian-word" style="font-size:2rem; color:var(--gold); height:3.5rem;"></div>
    </div>

    <div id="screen-3" class="container">
        <h3 style="color:var(--gold);">今日修行資糧</h3>
        <div id="task-list" style="width:100%;"></div>
        <div class="btn-group-55">
            <button class="btn-main" onclick="openLib()">📖 法寶閣</button>
            <button class="btn-main" style="border-color:#fb7185 !important; color:#fb7185 !important;" onclick="window.open('您的音樂頻道連結')">🎵 佛樂</button>
        </div>
        <button class="btn-main" style="background:var(--gold) !important; color:#000 !important;" onclick="showScreen(4)">大回向</button>
    </div>

    <div id="screen-4" class="container">
        <textarea id="dedi-box" placeholder="願以此功德..."></textarea>
        <button class="btn-main" onclick="finishSession()">封存今日資糧</button>
    </div>

    <div id="lib-modal">
        <div style="width:85%; max-width:400px; background:#111; padding:25px; border:1px solid var(--gold); border-radius:20px; text-align:center;">
            <h3 style="color:var(--gold);">圓教法寶閣</h3>
            <div style="display:flex; flex-direction:column; gap:15px; margin:20px 0;">
                <a style="color:var(--cyan); text-decoration:none;" href="https://zh.m.wikisource.org/zh-hant/佛說觀無量壽佛經" target="_blank">《觀無量壽佛經》</a>
                <a style="color:var(--cyan); text-decoration:none;" href="https://zh.wikisource.org/zh-hant/大方廣佛華嚴經" target="_blank">《華嚴經》</a>
            </div>
            <button class="btn-main" onclick="document.getElementById('lib-modal').style.display='none'">返回</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('PX_V14.3')) || { name: "", totalNian: 0, points: 0, dailyTasks: [], todayCount: 0, lastDate: new Date().toLocaleDateString() };
        const tasks = ["普賢十大願修行", "五戒十善持守", "親近供養三寶", "財布施與法布施", "興建塔廟造像", "供養護持三寶", "每日定課誦經", "受持清淨八關齋戒", "分享傳遞佛法", "一念至誠回向"];
        const sutras = ["大自在神通。無量清淨。", "一塵中有塵數剎。", "以此大願。隨順趣入。", "不取眾相。復於諸法實相。"];
        let nianCount = 0;

        const rankConfig = [
            { day: 0, label: "初信位", color: "#06b6d4", icon: "✨" },
            { day: 20, label: "二信位", color: "#22c55e", icon: "🌱" },
            { day: 100, label: "不退轉", color: "#d4af37", icon: "🪷" }
        ];

        function updateClock() {
            const now = new Date();
            const earthEl = document.getElementById('earth-time');
            if(earthEl) earthEl.innerText = "娑婆：" + now.toLocaleTimeString();

            const dayPercent = (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds() + now.getMilliseconds()/1000) / 86400;
            const pureEl = document.getElementById('pure-time');
            if (pureEl) {
                const total = db.points + dayPercent;
                pureEl.innerText = `${Math.floor(total)} 年${(dayPercent).toFixed(4).substring(1)}`;
            }
        }
        setInterval(updateClock, 50);

        function speak(t, r) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t.replace(/阿/g, 'ㄚ'));
            m.lang='zh-TW'; m.rate=r; window.speechSynthesis.speak(m);
        }

        function startApp() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("請留名號");
            db.name = name;
            const today = new Date().toLocaleDateString();
            if (db.lastDate !== today) { db.todayCount = 0; db.lastDate = today; db.dailyTasks = []; }
            save();
            speak(sutras[Math.floor(Math.random() * sutras.length)], 0.8);
            showScreen(2); updateUI();
        }

        function updateUI() {
            document.getElementById('total-count').innerText = db.totalNian;
            let totalDays = db.points / 100;
            document.getElementById('streak-val').innerText = totalDays.toFixed(1);
            document.getElementById('streak-bar').style.width = Math.min(totalDays, 100) + '%';
            const current = [...rankConfig].reverse().find(r => totalDays >= r.day) || rankConfig[0];
            document.documentElement.style.setProperty('--theme-color', current.color);
            document.getElementById('rank-title').innerText = current.label;
            document.getElementById('display-name').innerText = db.name || "行者";
            document.getElementById('mini-seed').innerText = current.icon;
            document.getElementById('big-seed').innerText = current.icon;
        }

        function handleNian() {
            if (nianCount < 10) {
                nianCount++; db.totalNian++;
                document.getElementById('nian-word').innerText = "南無阿彌陀佛";
                setTimeout(()=> document.getElementById('nian-word').innerText="", 500);
                speak("南無阿彌陀佛", 0.75);
                updateNianCircle();
                if(nianCount===10) { 
                    db.points += 2; // 念完十聲加點資糧
                    setTimeout(()=> showScreen(3), 1000); 
                }
            }
        }

        function showScreen(n) { document.querySelectorAll('.container').forEach(c => c.classList.remove('active')); document.getElementById('screen-'+n).classList.add('active'); if(n===3) renderTasks(); }
        function updateNianCircle() { document.getElementById('nian-progress').style.strokeDashoffset = 754 - (nianCount*75.4); document.getElementById('nian-num').innerText = nianCount+" / 10"; }
        function renderTasks() {
            const container = document.getElementById('task-list'); container.innerHTML = "";
            tasks.forEach((t, i) => {
                const isDone = db.dailyTasks.includes(i);
                const card = document.createElement('div'); card.className = `task-card ${isDone?'completed':''}`;
                card.innerHTML = `<div style="color:var(--gold);">${t}</div><div class="bar-bg" style="height:4px; margin-top:8px;"><div class="bar-fill" style="width:${isDone?'100%':'0%'}"></div></div>`;
                if(!isDone) card.onclick = () => { db.dailyTasks.push(i); db.points+=10; renderTasks(); updateUI(); speak(t+"圓滿", 0.8); };
                container.appendChild(card);
            });
        }
        function save() { localStorage.setItem('PX_V14.3', JSON.stringify(db)); }
        function goHome() { nianCount=0; updateNianCircle(); showScreen(1); updateUI(); }
        function finishSession() { save(); alert("今日修行資糧已封存"); goHome(); }
        function openLib() { document.getElementById('lib-modal').style.display = 'flex'; }
        function exportProgress() { const blob = new Blob([JSON.stringify(db)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `修行備份.json`; a.click(); }
        function importProgress(i) { const reader = new FileReader(); reader.onload = (e) => { db = JSON.parse(e.target.result); save(); location.reload(); }; reader.readAsText(i.files[0]); }
        
        // 初始化載入
        if(db.name) document.getElementById('user-name').value = db.name;
        updateUI();
    </script>
</body>
</html>
