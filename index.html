<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>普賢行願 OS - 圓滿琉璃版</title>
    <style>
        :root { 
            --bg: #000; 
            --gold: #f3e5ab; /* 居士指定淺金色 */
            --solid-gold: #d4af37; 
            --cyan: #06b6d4; 
            --gray: #888;
            --glass: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* 頂端金框：嚴格五五對齊，絕不重疊 */
        .time-monitor {
            width: 94%; max-width: 450px; margin: 15px auto; padding: 12px;
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1.5px solid var(--gold); border-radius: 15px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 10px; z-index: 1000;
        }
        .mon-left { flex: 0 0 48%; display: flex; align-items: center; gap: 8px; overflow: hidden; }
        .mon-right { flex: 0 0 48%; text-align: right; display: flex; flex-direction: column; gap: 2px; }
        #earth-time { color: var(--gray); font-size: 0.7rem; font-family: monospace; }
        #pure-time-display { color: var(--gold); font-size: 0.82rem; font-weight: bold; }

        /* 實體金按鈕與按下放光 */
        .btn-main {
            width: 100%; background: linear-gradient(145deg, #222, #000); 
            color: var(--gold); border: 1.8px solid var(--gold);
            padding: 16px; border-radius: 35px; font-weight: bold; margin: 10px 0; 
            transition: 0.2s; cursor: pointer; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-size: 1rem; letter-spacing: 1px;
        }
        .btn-main:active { 
            transform: scale(0.95); 
            box-shadow: 0 0 30px var(--solid-gold); 
            background: var(--solid-gold); color: #000;
        }
        .flex-55 { display: flex; gap: 12px; width: 100%; }
        .flex-55 .btn-main { flex: 1; padding: 12px; font-size: 0.85rem; }

        /* 容器佈局 */
        .container { width: 92%; max-width: 450px; display: none; flex-direction: column; align-items: center; padding: 20px 0; }
        .container.active { display: flex; }
        
        /* 種子呼吸燈與縮放動畫 */
        .circle-wrap { position: relative; margin: 40px 0; width: 240px; height: 240px; }
        #big-seed { 
            font-size: 5.5rem; cursor: pointer; 
            filter: drop-shadow(0 0 20px var(--solid-gold));
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: seed-breath 4s infinite ease-in-out;
            z-index: 10;
        }
        @keyframes seed-breath {
            0%, 100% { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 15px var(--solid-gold)); }
            50% { transform: translate(-50%, -50%) scale(1.15); filter: drop-shadow(0 0 35px var(--gold)); }
        }

        /* 任務卡片琉璃感 */
        .task-card { 
            width: 100%; background: var(--glass); border: 1px solid #333; 
            padding: 18px; border-radius: 16px; margin-bottom: 15px; transition: 0.4s;
        }
        .task-card.completed { 
            border: 1.8px solid var(--gold); 
            box-shadow: 0 0 20px rgba(243, 229, 171, 0.2);
            background: rgba(243, 229, 171, 0.1);
        }

        /* 儀軌彈窗 */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(12px);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
        }
        .glass-box {
            width: 88%; max-width: 380px; padding: 30px; border: 1.5px solid var(--gold);
            background: #000; border-radius: 25px; text-align: center;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.15);
        }

        #home-btn { position: fixed; bottom: 25px; right: 25px; border: 1px solid var(--gold); color: var(--gold); background: #000; padding: 10px 20px; border-radius: 25px; z-index: 1000; font-size: 0.8rem; font-weight: bold; }
        input::placeholder { color: #555; }
    </style>
</head>
<body>

<div class="time-monitor">
    <div class="mon-left">
        <div id="mini-seed" style="font-size: 1.8rem;">✨</div>
        <div style="display:flex; flex-direction:column; min-width: 0;">
            <span id="rank-title" style="font-size: 0.65rem; color: var(--cyan); white-space: nowrap;">初信位</span>
            <span id="display-name" style="font-weight: bold; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">行者</span>
        </div>
    </div>
    <div class="mon-right">
        <div id="earth-time">娑婆：--:--:--</div>
        <div id="pure-time-display">極樂累積：--</div>
    </div>
</div>

<div id="home-btn" onclick="goHome()">HOME</div>

<div id="screen-1" class="container active">
    <div style="width:100%; border: 1.5px solid var(--gold); border-radius: 20px; padding: 5px; margin-bottom: 25px; background: rgba(243, 229, 171, 0.05);">
        <input type="text" id="user-name" placeholder="請留名號" style="width:100%; background:transparent; border:none; color:var(--gold); text-align:center; font-size:1.3rem; outline:none; padding:12px; font-weight: bold;">
    </div>
    <div style="color:var(--gold); font-size: 1.1rem; margin-bottom:10px;">一生累積：<span id="total-count" style="font-family: monospace;">0</span> 聲</div>
    <div id="today-info" style="color:var(--cyan); font-size:0.9rem; margin-bottom:18px; letter-spacing: 1px;">今日對頻：<span id="today-count">0</span> 次</div>
    
    <div style="width:100%; height:10px; background:#1a1a1a; border-radius:5px; overflow:hidden; border: 0.5px solid #333;">
        <div id="streak-bar" style="height:100%; background: linear-gradient(90deg, var(--solid-gold), var(--gold)); width:0%; transition:1.5s ease-out;"></div>
    </div>
    <div style="font-size:0.8rem; margin:12px 0 30px; color:var(--gray);">百日進度：<span id="streak-val">0.0</span> / 100</div>
    
    <button class="btn-main" onclick="startApp()">啟動對頻</button>
    
    <div class="flex-55">
        <button class="btn-main" onclick="exportProgress()">封存備份</button>
        <button class="btn-main" onclick="document.getElementById('import-file').click()">意念導入</button>
        <input type="file" id="import-file" style="display:none" onchange="importProgress(this)">
    </div>
</div>

<div id="screen-2" class="container">
    <div class="circle-wrap">
        <svg width="240" height="240" style="transform: rotate(-90deg);">
            <circle cx="120" cy="120" r="110" stroke="#111" stroke-width="12" fill="none"></circle>
            <circle id="progress-ring" cx="120" cy="120" r="110" stroke="var(--gold)" stroke-width="12" fill="none" stroke-dasharray="691" stroke-dashoffset="691" stroke-linecap="round" style="transition:0.5s cubic-bezier(0.4, 0, 0.2, 1); filter: drop-shadow(0 0 8px var(--solid-gold));"></circle>
        </svg>
        <div id="big-seed" onclick="handleNian()">✨</div>
    </div>
    <div id="nian-num" style="font-size:2.8rem; font-weight:bold; font-family: monospace; color: #fff;">0 / 10</div>
    <div id="nian-word" style="font-size:2rem; color:var(--gold); height:3.5rem; margin-top:15px; font-weight: bold; letter-spacing: 2px;"></div>
</div>

<div id="screen-3" class="container">
    <h3 style="color:var(--gold); margin-bottom:25px; letter-spacing: 2px; border-bottom: 1px solid var(--gold); padding-bottom: 10px; width: 100%; text-align: center;">今日修行資糧</h3>
    <div id="task-list" style="width:100%;"></div>
    <div class="flex-55">
        <button class="btn-main" onclick="openLib()">📖 法寶閣</button>
        <button class="btn-main" onclick="window.open('https://www.youtube.com/@Ami-PureLand')">🎵 佛樂頻道</button>
    </div>
    <button class="btn-main" style="background:var(--gold) !important; color:#000 !important; margin-top: 15px;" onclick="showScreen(4)">大回向</button>
</div>

<div id="screen-4" class="container">
    <textarea id="dedi-box" placeholder="願以此功德..." style="width:100%; height:220px; background:#0a0a0a; border:1.8px solid var(--gold); border-radius:20px; color:#eee; padding:20px; outline:none; font-size: 1.1rem; line-height: 1.6;"></textarea>
    <button class="btn-main" onclick="finishSession()">封存今日資糧</button>
</div>

<div id="dedi-modal" class="modal-overlay">
    <div class="glass-box">
        <h2 style="color:var(--gold); margin-top:0; letter-spacing: 3px;">願以此功德</h2>
        <p style="line-height:2; color:#eee; font-size: 1.15rem; margin: 25px 0;">普及於一切<br>我等與眾生<br>皆共成佛道</p>
        <button class="btn-main" onclick="confirmDedi()">進入修行資糧</button>
    </div>
</div>

<div id="lib-modal" class="modal-overlay">
    <div class="glass-box">
        <h3 style="color:var(--gold); border-bottom: 1px solid #333; padding-bottom: 10px;">圓教法寶閣</h3>
        <div style="display:flex; flex-direction:column; gap:18px; margin:25px 0;">
            <a style="color:var(--cyan); text-decoration:none; font-size: 1.1rem;" href="https://zh.m.wikisource.org/zh-hant/佛說觀無量壽佛經" target="_blank">《觀無量壽佛經》</a>
            <a style="color:var(--cyan); text-decoration:none; font-size: 1.1rem;" href="https://zh.wikisource.org/zh-hant/大方廣佛華嚴經" target="_blank">《華嚴經》</a>
        </div>
        <button class="btn-main" onclick="document.getElementById('lib-modal').style.display='none'">返回</button>
    </div>
</div>

<script>
    // 核心數據庫邏輯 - 嚴格保護 PX_V14.3
    let db = JSON.parse(localStorage.getItem('PX_V14.3')) || { 
        name: "", totalNian: 0, points: 0, dailyTasks: [], todayCount: 0, lastDate: new Date().toLocaleDateString() 
    };
    
    const tasks = ["普賢十大願修行", "五戒十善持守", "親近供養三寶", "財布施與法布施", "興建塔廟造像", "供養護持三寶", "每日定課誦經", "受持清淨八關齋戒", "分享法寶善知識", "一念至誠普皆回向"];
    let nianCount = 0;

    // 換日檢查邏輯
    function checkNewDay() {
        const today = new Date().toLocaleDateString();
        if (db.lastDate !== today) {
            db.todayCount = 0;
            db.dailyTasks = [];
            db.lastDate = today;
            save();
        }
    }

    // 雙時間顯示邏輯
    function updateClock() {
        const now = new Date();
        document.getElementById('earth-time').innerText = "娑婆：" + now.toLocaleTimeString();
        
        // 極樂時間計算 (以點數為基礎加上當日百分比)
        const dayPercent = (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds() + now.getMilliseconds()/1000) / 86400;
        const total = db.points + dayPercent;
        document.getElementById('pure-time-display').innerText = `極樂累積：${Math.floor(total)} 年${(dayPercent).toFixed(4).substring(1)}`;
    }
    setInterval(updateClock, 50);

    // 啟動對頻：含換名警告
    function startApp() {
        const inputName = document.getElementById('user-name').value.trim();
        if(!inputName) return alert("請留名號");
        
        if (db.name && db.name !== inputName) {
            if(!confirm(`⚠️ 法寶換人警告：\n此機台目前由「${db.name}」護持。\n確定要更改為「${inputName}」嗎？\n(更改將導致資料流向新名號)`)) return;
        }
        
        db.name = inputName;
        db.todayCount++; 
        checkNewDay();
        save();
        showScreen(2); 
        updateUI();
        speak("以此大願，隨順趣入", 0.8);
    }

    // 十念放光與音聲
    function handleNian() {
        if (nianCount < 10) {
            nianCount++; 
            db.totalNian++;
            
            // 視覺閃爍
            const wordEl = document.getElementById('nian-word');
            wordEl.innerText = "南無阿彌陀佛";
            const seedEl = document.getElementById('big-seed');
            seedEl.style.filter = "drop-shadow(0 0 50px #fff)";
            seedEl.style.transform = "translate(-50%, -50%) scale(1.3)";
            
            setTimeout(()=> {
                wordEl.innerText="";
                seedEl.style.filter = "drop-shadow(0 0 20px var(--solid-gold))";
                seedEl.style.transform = "translate(-50%, -50%) scale(1)";
            }, 350);
            
            speak("南無阿彌陀佛", 0.75);
            
            // 進度環更新
            const offset = 691 - (nianCount * 69.1);
            document.getElementById('progress-ring').style.strokeDashoffset = offset;
            document.getElementById('nian-num').innerText = nianCount + " / 10";
            
            if(nianCount === 10) { 
                db.points += 2; 
                save();
                setTimeout(()=> document.getElementById('dedi-modal').style.display='flex', 800); 
            }
        }
    }

    // 任務資糧渲染
    function renderTasks() {
        const container = document.getElementById('task-list'); 
        container.innerHTML = "";
        tasks.forEach((t, i) => {
            const isDone = db.dailyTasks.includes(i);
            const card = document.createElement('div'); 
            card.className = `task-card ${isDone?'completed':''}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="color:var(--gold); font-size:1.05rem; font-weight:500;">${t}</div>
                    <div style="font-size:1.2rem;">${isDone?'💠':'⭕'}</div>
                </div>
            `;
            if(!isDone) card.onclick = () => { 
                db.dailyTasks.push(i); 
                db.points += 10; 
                save();
                renderTasks(); 
                updateUI(); 
                speak(t+"圓滿", 0.8); 
            };
            container.appendChild(card);
        });
    }

    // 語音引擎
    function speak(t, r) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t.replace(/阿/g, 'ㄚ'));
        m.lang='zh-TW'; m.rate=r; window.speechSynthesis.speak(m);
    }

    // UI 全面更新
    function updateUI() {
        document.getElementById('total-count').innerText = db.totalNian.toLocaleString();
        document.getElementById('today-count').innerText = db.todayCount;
        
        let totalDays = db.points / 100;
        document.getElementById('streak-val').innerText = totalDays.toFixed(1);
        document.getElementById('streak-bar').style.width = Math.min(totalDays, 100) + '%';
        
        const rank = totalDays >= 100 ? {l:"不退轉", i:"🪷", c:"#d4af37"} : (totalDays >= 20 ? {l:"二信位", i:"🌱", c:"#22c55e"} : {l:"初信位", i:"✨", c:"#06b6d4"});
        document.getElementById('rank-title').innerText = rank.l;
        document.getElementById('display-name').innerText = db.name || "行者";
        document.getElementById('mini-seed').innerText = rank.i;
        document.getElementById('big-seed').innerText = rank.i;
        document.documentElement.style.setProperty('--cyan', rank.c);
    }

    function save() { localStorage.setItem('PX_V14.3', JSON.stringify(db)); }
    function showScreen(n) { document.querySelectorAll('.container').forEach(c => c.classList.remove('active')); document.getElementById('screen-'+n).classList.add('active'); if(n===3) renderTasks(); window.scrollTo(0,0); }
    function confirmDedi() { document.getElementById('dedi-modal').style.display='none'; showScreen(3); }
    function openLib() { document.getElementById('lib-modal').style.display='flex'; }
    function goHome() { 
        nianCount=0; 
        document.getElementById('progress-ring').style.strokeDashoffset=691; 
        document.getElementById('nian-num').innerText="0 / 10"; 
        showScreen(1); 
        updateUI(); 
    }
    function finishSession() { save(); alert("今日修行資糧已封存"); goHome(); }
    
    // 備份還原
    function exportProgress() { 
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'}); 
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); 
        a.download = `普賢行願_${db.name}_${new Date().toLocaleDateString()}.json`; a.click(); 
    }
    function importProgress(i) { 
        const reader = new FileReader(); 
        reader.onload = (e) => { 
            try {
                db = JSON.parse(e.target.result); 
                save(); 
                alert("意念導入成功");
                location.reload(); 
            } catch(err) { alert("導入失敗，格式有誤"); }
        }; 
        reader.readAsText(i.files[0]); 
    }
    
    // 初始執行
    checkNewDay();
    if(db.name) document.getElementById('user-name').value = db.name;
    updateUI();
</script>
</body>
</html>
