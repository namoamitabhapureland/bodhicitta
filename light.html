無量的光
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>無量的光 ． 你不孤單</title>
    
    <style>
        :root {
            /* 日光室溫暖色系 */
            --bg-color: #FAF4EE;
            --text-main: #5C4E44;
            --text-muted: #9E8E84;
            --gold: #C8956A;
            --rose: #C9968E;
            --sage: #8A9E94;
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(255, 255, 255, 0.9);
            --shadow-soft: 0 10px 30px rgba(160, 130, 110, 0.08);
            --shadow-hover: 0 15px 40px rgba(200, 149, 106, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; 
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "PingFang TC", "Helvetica Neue", sans-serif;
            overflow-x: hidden; line-height: 1.7;
        }

        /* 溫暖光暈背景 */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 15%, rgba(212, 170, 130, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 85%, rgba(201, 150, 142, 0.15) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px 80px 20px; }

        /* --- 頂部英雄區 --- */
        .header { text-align: center; margin-bottom: 30px; animation: fadeIn 1s ease-out; }
        .hero-svg-wrap {
            width: 180px; height: 180px; margin: 0 auto 15px auto; position: relative;
            filter: drop-shadow(0 10px 20px rgba(200, 149, 106, 0.2));
            animation: floatSlow 6s ease-in-out infinite;
        }
        @keyframes floatSlow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .title-main { font-size: 1.8rem; font-weight: 300; letter-spacing: 6px; margin: 10px 0 5px; color: var(--text-main); }
        .title-sub { font-size: 0.85rem; letter-spacing: 2px; color: var(--text-muted); font-weight: 300; }

        .guide-text {
            font-size: 0.85rem; color: var(--text-muted); text-align: center;
            margin-bottom: 30px; padding: 0 15px; line-height: 1.8; letter-spacing: 1px;
        }

        /* --- 發文區 (完全匿名) --- */
        .post-panel {
            background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border); border-radius: 24px;
            padding: 25px; margin-bottom: 40px; box-shadow: var(--shadow-soft);
            transition: all 0.3s ease;
        }
        .post-panel:focus-within { box-shadow: var(--shadow-hover); border-color: rgba(200, 149, 106, 0.4); }

        .input-area {
            width: 100%; background: rgba(255, 255, 255, 0.8); border: 1.5px solid transparent;
            color: var(--text-main); padding: 18px; border-radius: 16px; font-size: 0.95rem;
            outline: none; resize: none; margin-bottom: 15px; line-height: 1.6;
            transition: 0.3s; font-family: inherit;
        }
        .input-area:focus { border-color: var(--gold); background: #FFF; }
        .input-area::placeholder { color: #BDB0A8; font-weight: 300; }

        .post-btn {
            width: 100%; padding: 15px; border-radius: 16px; border: none;
            background: linear-gradient(135deg, var(--gold), var(--rose));
            color: white; font-size: 1rem; letter-spacing: 4px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(200, 149, 106, 0.3); transition: 0.2s;
        }
        .post-btn:active { transform: translateY(2px); box-shadow: 0 4px 10px rgba(200, 149, 106, 0.3); }
        .post-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* --- 論壇卡片區 --- */
        .card {
            background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border); border-radius: 20px;
            margin-bottom: 25px; padding: 25px 20px 15px; box-shadow: var(--shadow-soft);
            animation: fadeIn 0.6s ease-out; position: relative; overflow: hidden;
        }
        /* 卡片左側溫暖光條 */
        .card::before {
            content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px;
            background: linear-gradient(to bottom, var(--gold), var(--rose)); opacity: 0.7;
        }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.75rem; color: var(--text-muted); }
        .card-body { font-size: 1rem; color: var(--text-main); line-height: 1.8; margin-bottom: 20px; word-break: break-word; }

        /* 回覆列表 */
        .reply-list { border-top: 1px dashed rgba(200, 149, 106, 0.3); padding-top: 15px; margin-bottom: 15px; }
        .reply-item { 
            display: flex; align-items: flex-start; gap: 12px; 
            margin-bottom: 12px; font-size: 0.9rem; color: var(--text-main);
            background: rgba(255, 255, 255, 0.4); padding: 10px 15px; border-radius: 12px;
        }
        .reply-icon-wrap { flex-shrink: 0; width: 24px; height: 24px; display: flex; justify-content: center; align-items: center; }

        /* 互動操作區 (回應輸入與 4 個按鈕) */
        .action-zone { background: rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 16px; }
        .reply-input {
            width: 100%; background: #FFF; border: 1px solid rgba(200, 149, 106, 0.2);
            padding: 12px 15px; border-radius: 12px; font-size: 0.9rem; outline: none;
            margin-bottom: 12px; transition: 0.3s; font-family: inherit; color: var(--text-main);
        }
        .reply-input:focus { border-color: var(--gold); }

        .reaction-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .react-btn {
            background: #FFF; border: 1px solid rgba(200, 149, 106, 0.15);
            padding: 10px 0; border-radius: 12px; cursor: pointer; color: var(--text-muted);
            display: flex; flex-direction: column; align-items: center; gap: 6px; transition: 0.2s;
        }
        .react-btn:active { transform: scale(0.95); background: rgba(200, 149, 106, 0.1); border-color: var(--gold); }
        .react-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .react-btn span { font-size: 0.7rem; letter-spacing: 1px; }
        
        /* 四個按鈕懸停色彩 */
        .btn-hug:active { color: var(--rose); } .btn-hug:active svg { stroke: var(--rose); }
        .btn-light:active { color: var(--gold); } .btn-light:active svg { stroke: var(--gold); }
        .btn-listen:active { color: var(--sage); } .btn-listen:active svg { stroke: var(--sage); }
        .btn-together:active { color: var(--text-main); } .btn-together:active svg { stroke: var(--text-main); }

        .btn-delete {
            background: transparent; border: none; color: #ff8fa3; font-size: 0.75rem; 
            cursor: pointer; padding: 0; margin-left: 10px; text-decoration: underline; opacity: 0.7;
        }

        /* 提示彈窗 */
        .toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(92, 78, 68, 0.9); color: #FFF; padding: 12px 24px; border-radius: 20px;
            font-size: 0.85rem; letter-spacing: 2px; opacity: 0; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 1000; backdrop-filter: blur(8px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="toast" id="toast-msg"></div>

    <div class="container">
        <header class="header">
            <div class="hero-svg-wrap">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="bodyLeft" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#D4AA82"/><stop offset="100%" stop-color="#C8956A"/>
                        </linearGradient>
                        <linearGradient id="bodyRight" x1="100%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#C9968E"/><stop offset="100%" stop-color="#BA8079"/>
                        </linearGradient>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="8" result="blur"/>
                            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                        </filter>
                    </defs>
                    <circle cx="100" cy="100" r="75" fill="rgba(255,255,255,0.6)" filter="url(#glow)"/>
                    
                    <g opacity="0.95">
                        <path d="M 50 140 C 30 140, 45 85, 75 80 C 100 75, 115 100, 115 110 C 115 125, 90 140, 50 140 Z" fill="url(#bodyLeft)"/>
                        <circle cx="75" cy="65" r="18" fill="url(#bodyLeft)"/>
                    </g>
                    <g opacity="0.9">
                        <path d="M 150 140 C 170 140, 155 90, 125 85 C 100 80, 85 105, 85 115 C 85 130, 110 140, 150 140 Z" fill="url(#bodyRight)"/>
                        <circle cx="125" cy="72" r="16" fill="url(#bodyRight)"/>
                    </g>
                    <path d="M 60 110 C 70 95, 110 100, 135 120" fill="none" stroke="url(#bodyLeft)" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
                    
                    <circle cx="50" cy="50" r="3" fill="#FFF" opacity="0.8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
                    <circle cx="150" cy="40" r="2" fill="#D4AA82" opacity="0.6"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/></circle>
                    <circle cx="160" cy="120" r="4" fill="#C9968E" opacity="0.5"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/></circle>
                </svg>
            </div>
            <h1 class="title-main">無量的光</h1>
            <div class="title-sub">你不孤單</div>
        </header>

        <div class="guide-text">
            把心裡的雨下在這裡吧。<br>這裡沒有名字，只有溫暖的傾聽。<br>為了保護彼此的寧靜，文字將隨時間溫柔消散於五十則之外。
        </div>

        <div class="post-panel">
            <textarea id="post-input" class="input-area" rows="4" maxlength="150" placeholder="說說此刻的感受吧，不需要理由，只要讓世界知道你在這裡... (限 150 字)"></textarea>
            <button class="post-btn" id="btn-submit" onclick="submitPost()">點亮一盞燈</button>
        </div>

        <div id="board"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 1. 初始化 Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCtttGd8yvbcEq17P75cnh52Pxgcc5ak_4",
            authDomain: "pureland-system.firebaseapp.com",
            databaseURL: "https://pureland-system-default-rtdb.firebaseio.com",
            projectId: "pureland-system"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        
        // 為了不弄髒主系統，開一個新的光之論壇節點
        const dbRef = firebase.database().ref('light_forum_v1');
        let currentUserUid = "guest_" + Math.random().toString(36).substr(2, 9);
        let isLoaded = false;

        firebase.auth().signInAnonymously().catch(err => console.warn("匿名登入提示:", err));
        firebase.auth().onAuthStateChanged((user) => {
            if (user) currentUserUid = user.uid; 
            if (!isLoaded) { loadBoard(); isLoaded = true; } 
        });

        // 2. 輔助功能
        function showToast(msg) {
            const toast = document.getElementById('toast-msg');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m])).replace(/\n/g, "<br>");
        }

        // 3. 獲取光之語 SVG 圖標 (絕對原創、零版權風險)
        function getActionSVG(type) {
            const baseProps = `width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"`;
            switch(type) {
                case 'hug': // 雙手交疊環抱的心
                    return `<svg ${baseProps} stroke="var(--rose)"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="rgba(201,150,142,0.1)"/><path d="M7 9 Q12 14 17 9" opacity="0.6"/><path d="M9 12 Q12 16 15 12" opacity="0.4"/></svg>`;
                case 'light': // 發光星芒
                    return `<svg ${baseProps} stroke="var(--gold)"><path d="M12 2 L14.5 9.5 L22 12 L14.5 14.5 L12 22 L9.5 14.5 L2 12 L9.5 9.5 Z" fill="rgba(200,149,106,0.15)"/><circle cx="12" cy="12" r="2.5" fill="var(--gold)"/></svg>`;
                case 'listen': // 柔和聲波與接納
                    return `<svg ${baseProps} stroke="var(--sage)"><path d="M12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22Z" fill="rgba(138,158,148,0.1)"/><path d="M8 12 Q12 16 16 12" opacity="0.8"/><circle cx="12" cy="9" r="1" fill="var(--sage)"/></svg>`;
                case 'together': // 並肩的靈魂
                    return `<svg ${baseProps} stroke="var(--text-main)"><circle cx="8" cy="10" r="3" fill="rgba(92,78,68,0.1)"/><circle cx="16" cy="10" r="3" fill="rgba(92,78,68,0.1)"/><path d="M5 20 Q8 15 11 20" opacity="0.7"/><path d="M13 20 Q16 15 19 20" opacity="0.7"/></svg>`;
                default: return '';
            }
        }

        // 4. 發文功能
        window.submitPost = function() {
            const input = document.getElementById('post-input');
            const m = input.value.trim();
            if(!m) return showToast("請先寫下心裡的聲音喔");
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.textContent = "光芒傳送中...";
            
            // 完全不存名字，只有內容、時間、UID(用來判斷刪除權限)
            dbRef.push({ m: m, t: Date.now(), uid: currentUserUid })
            .then(() => {
                input.value = "";
                showToast("你的光已經亮起");
            }).catch(err => {
                showToast("傳送失敗，請稍後再試");
            }).finally(() => {
                btn.disabled = false; btn.textContent = "點亮一盞燈";
            });
        };

        // 5. 讀取論壇 (維持 50 則)
        function loadBoard() {
            dbRef.limitToLast(50).on('value', snap => {
                const board = document.getElementById('board'); 
                board.innerHTML = "";
                const data = snap.val(); if(!data) return;
                
                Object.keys(data).reverse().forEach(id => {
                    const item = data[id];
                    const timeStr = new Date(item.t).toLocaleString([], {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
                    
                    // 組合回覆區
                    let repliesHTML = "";
                    if(item.rs) {
                        repliesHTML = `<div class="reply-list">`;
                        Object.values(item.rs).forEach(r => {
                            const icon = getActionSVG(r.ty);
                            repliesHTML += `
                                <div class="reply-item">
                                    <div class="reply-icon-wrap">${icon}</div>
                                    <div style="flex:1;">${escapeHTML(r.m)}</div>
                                </div>`;
                        });
                        repliesHTML += `</div>`;
                    }

                    // 刪除按鈕判斷
                    let delBtn = "";
                    if (currentUserUid && item.uid === currentUserUid && !currentUserUid.startsWith('guest_')) {
                        delBtn = `<button class="btn-delete" onclick="delPost('${id}')">收回光芒</button>`;
                    }

                    // 建立卡片
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-header">
                            <span>無名氏</span>
                            <div>${timeStr} ${delBtn}</div>
                        </div>
                        <div class="card-body">${escapeHTML(item.m)}</div>
                        ${repliesHTML}
                        
                        <div class="action-zone">
                            <input type="text" id="reply-${id}" class="reply-input" placeholder="留下一句溫暖的話，或直接點擊下方按鈕 (限20字)" maxlength="20">
                            <div class="reaction-grid">
                                <button class="react-btn btn-hug" onclick="sendReply('${id}', 'hug')">
                                    ${getActionSVG('hug')}<span>抱抱</span>
                                </button>
                                <button class="react-btn btn-light" onclick="sendReply('${id}', 'light')">
                                    ${getActionSVG('light')}<span>點燈</span>
                                </button>
                                <button class="react-btn btn-listen" onclick="sendReply('${id}', 'listen')">
                                    ${getActionSVG('listen')}<span>傾聽</span>
                                </button>
                                <button class="react-btn btn-together" onclick="sendReply('${id}', 'together')">
                                    ${getActionSVG('together')}<span>同行</span>
                                </button>
                            </div>
                        </div>
                    `;
                    board.appendChild(card);
                });
            });
        }

        // 6. 回覆/互動功能
        window.sendReply = function(id, type) {
            const input = document.getElementById(`reply-${id}`);
            let m = input.value.trim();
            
            // 若沒打字，直接給予預設溫暖字句
            const defaultMsgs = {
                'hug': '給你一個大大的擁抱。',
                'light': '你的光，我看見了。',
                'listen': '我在這裡靜靜陪你。',
                'together': '這條路不孤單，有我在。'
            };
            if(!m) m = defaultMsgs[type];

            input.disabled = true;
            dbRef.child(id).child('rs').push({ m: m, ty: type })
            .then(() => {
                input.value = "";
                showToast("溫暖已送達");
            }).catch(() => {
                showToast("傳送失敗");
            }).finally(() => {
                input.disabled = false;
            });
        };

        // 7. 刪除功能
        window.delPost = function(id) {
            if(confirm("確定要將這道光芒收回嗎？")) {
                dbRef.child(id).remove().catch(() => showToast("收回失敗，權限不足"));
            }
        };
    </script>
</body>
</html>
