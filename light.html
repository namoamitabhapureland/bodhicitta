<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>無量的光 ． 你不孤單</title>
    
    <style>
        :root {
            /* 日光室溫暖色系 - 淨息流乾淨風格 */
            --bg-color: #FAF6F3;
            --text-main: #5C524C;
            --text-muted: #A3978F;
            --gold: #D2A87A;
            --rose: #D1A299;
            --sage: #9CB2A6;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.9);
            --shadow-soft: 0 8px 25px rgba(180, 160, 140, 0.08);
            --shadow-hover: 0 12px 35px rgba(210, 168, 122, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; 
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "PingFang TC", "Helvetica Neue", "Noto Sans TC", sans-serif;
            overflow-x: hidden; line-height: 1.8;
        }

        /* 溫暖光暈背景 */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(210, 168, 122, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 90% 80%, rgba(209, 162, 153, 0.08) 0%, transparent 60%);
            z-index: -1; pointer-events: none;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px 80px 20px; }

        /* --- 頂部英雄區 --- */
        .header { text-align: center; margin-bottom: 20px; animation: fadeIn 1.5s ease-out; }
        .hero-svg-wrap {
            width: 160px; height: 160px; margin: 0 auto 10px auto; position: relative;
            filter: drop-shadow(0 8px 25px rgba(210, 168, 122, 0.3));
            animation: floatSlow 6s ease-in-out infinite;
        }
        @keyframes floatSlow { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.02); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .guide-text {
            font-size: 0.9rem; color: var(--text-muted); text-align: center;
            margin-bottom: 30px; padding: 0 10px; line-height: 2; letter-spacing: 1.5px;
            font-weight: 300;
        }

        /* --- 發文區 --- */
        .post-panel {
            background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border); border-radius: 24px;
            padding: 25px; margin-bottom: 15px; box-shadow: var(--shadow-soft);
            transition: all 0.4s ease;
        }
        .post-panel:focus-within { box-shadow: var(--shadow-hover); border-color: rgba(210, 168, 122, 0.3); }

        .input-area {
            width: 100%; background: rgba(255, 255, 255, 0.85); border: 1px solid transparent;
            color: var(--text-main); padding: 18px; border-radius: 16px; font-size: 0.95rem;
            outline: none; resize: none; margin-bottom: 15px; line-height: 1.6;
            transition: 0.3s; font-family: inherit;
        }
        .input-area:focus { border-color: var(--gold); background: #FFF; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02); }
        .input-area::placeholder { color: #C4B9B2; font-weight: 300; }

        .post-btn {
            width: 100%; padding: 14px; border-radius: 16px; border: none;
            background: linear-gradient(135deg, var(--gold), #CAA08D);
            color: white; font-size: 0.95rem; letter-spacing: 5px; cursor: pointer;
            box-shadow: 0 6px 20px rgba(210, 168, 122, 0.35); transition: 0.3s; font-weight: 300;
        }
        .post-btn:active { transform: scale(0.98); box-shadow: 0 2px 10px rgba(210, 168, 122, 0.3); }
        .post-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* 常駐守護專線 */
        .emergency-line {
            text-align: center; font-size: 0.75rem; color: #BDB0A8; 
            letter-spacing: 1px; margin-bottom: 40px; font-weight: 300;
        }

        /* --- 論壇卡片區 --- */
        .card {
            background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border); border-radius: 20px;
            margin-bottom: 25px; padding: 25px 20px 20px; 
            transition: all 0.8s ease; /* 為了漸變消散動畫 */
            position: relative; overflow: hidden;
        }
        
        /* 動態光芒邊界 (純點燈機制) */
        .card.has-light {
            border-color: rgba(210, 168, 122, 0.4);
        }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.75rem; color: var(--text-muted); }
        .card-body { font-size: 1rem; color: var(--text-main); line-height: 1.8; margin-bottom: 20px; word-break: break-word; font-weight: 300; }

        /* 回覆列表 */
        .reply-list { border-top: 1px dashed rgba(210, 168, 122, 0.2); padding-top: 15px; margin-bottom: 15px; }
        .reply-item { 
            display: flex; align-items: flex-start; gap: 10px; 
            margin-bottom: 10px; font-size: 0.9rem; color: var(--text-main);
            background: rgba(255, 255, 255, 0.5); padding: 12px 15px; border-radius: 12px;
            font-weight: 300;
        }
        .reply-icon-wrap { flex-shrink: 0; width: 20px; height: 20px; display: flex; justify-content: center; align-items: center; margin-top: 2px; }

        /* 互動操作區 */
        .action-zone { background: rgba(255, 255, 255, 0.6); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.8); }
        .reply-input {
            width: 100%; background: #FFF; border: 1px solid rgba(210, 168, 122, 0.15);
            padding: 12px 15px; border-radius: 12px; font-size: 0.85rem; outline: none;
            margin-bottom: 12px; transition: 0.3s; font-family: inherit; color: var(--text-main);
        }
        .reply-input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(210,168,122,0.1); }
        .reply-input::placeholder { color: #C4B9B2; font-weight: 300; }

        .reaction-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .react-btn {
            background: #FFF; border: 1px solid rgba(210, 168, 122, 0.1);
            padding: 10px 0; border-radius: 12px; cursor: pointer; color: var(--text-muted);
            display: flex; flex-direction: column; align-items: center; gap: 6px; transition: 0.3s;
        }
        .react-btn:active { transform: scale(0.92); background: rgba(210, 168, 122, 0.05); }
        .react-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
        .react-btn span { font-size: 0.7rem; letter-spacing: 1px; }
        
        .btn-delete {
            background: transparent; border: none; color: #D1A299; font-size: 0.75rem; 
            cursor: pointer; padding: 0; margin-left: 10px; text-decoration: underline; opacity: 0.8;
        }

        /* 提示彈窗 */
        .toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(92, 82, 76, 0.95); color: #FFF; padding: 12px 28px; border-radius: 25px;
            font-size: 0.85rem; letter-spacing: 2px; opacity: 0; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 1000; backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); font-weight: 300;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="toast" id="toast-msg"></div>

    <div class="container">
        <header class="header">
            <div class="hero-svg-wrap">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="bodyGlow" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
                            <stop offset="70%" stop-color="#FAF4EE" stop-opacity="0.9"/>
                            <stop offset="100%" stop-color="#D2A87A" stop-opacity="0"/>
                        </radialGradient>
                        <linearGradient id="warmTones" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#E2CDBA" stop-opacity="0.8"/>
                            <stop offset="100%" stop-color="#D1A299" stop-opacity="0.4"/>
                        </linearGradient>
                        <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
                            <feGaussianBlur stdDeviation="12" result="blur"/>
                            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                        </filter>
                    </defs>
                    
                    <circle cx="100" cy="100" r="70" fill="url(#bodyGlow)" filter="url(#softGlow)"/>
                    
                    <path d="M 60 140 C 40 140, 45 90, 70 70 C 90 50, 110 50, 130 70 C 155 90, 160 140, 140 140 C 120 140, 130 150, 100 150 C 70 150, 80 140, 60 140 Z" fill="url(#warmTones)" filter="url(#softGlow)"/>
                    
                    <circle cx="85" cy="85" r="4" fill="#8C7A6B" opacity="0.8"/>
                    <circle cx="115" cy="85" r="4" fill="#8C7A6B" opacity="0.8"/>
                    
                    <ellipse cx="70" cy="95" rx="8" ry="4" fill="#D1A299" opacity="0.5" filter="url(#softGlow)"/>
                    <ellipse cx="130" cy="95" rx="8" ry="4" fill="#D1A299" opacity="0.5" filter="url(#softGlow)"/>
                    
                    <circle cx="45" cy="60" r="3" fill="#FFF" opacity="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
                    <circle cx="155" cy="120" r="2" fill="#D2A87A"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="4s" repeatCount="indefinite"/></circle>
                </svg>
            </div>
        </header>

        <div class="guide-text">
            把心裡的雨下在這裡吧。<br>這世界上總有一個人，願意靜靜為你撐傘。<br>這裡沒有名字，只有溫暖，<br>你的文字將隨時間溫柔消散。
        </div>

        <div class="post-panel">
            <textarea id="post-input" class="input-area" rows="4" maxlength="150" placeholder="說說此刻的感受吧，不需要理由，只要讓世界知道你在這裡... (限 150 字)"></textarea>
            <button class="post-btn" id="btn-submit" onclick="submitPost()">點亮一盞燈</button>
        </div>
        
        <div class="emergency-line">黑夜若太長，隨時為你亮著的燈：1925 安心專線</div>

        <div id="board"></div>
        
        <div class="emergency-line" style="margin-top: 40px;">黑夜若太長，隨時為你亮著的燈：1925 安心專線</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 1. 初始化 Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCtttGd8yvbcEq17P75cnh52Pxgcc5ak_4",
            authDomain: "pureland-system.firebaseapp.com",
            databaseURL: "https://pureland-system-default-rtdb.firebaseio.com",
            projectId: "pureland-system"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        
        // 使用 v2 避免與舊資料結構衝突
        const dbRef = firebase.database().ref('light_forum_v2');
        let currentUserUid = "guest_" + Math.random().toString(36).substr(2, 9);
        let isLoaded = false;

        firebase.auth().signInAnonymously().catch(err => console.warn("匿名登入提示:", err));
        firebase.auth().onAuthStateChanged((user) => {
            if (user) currentUserUid = user.uid; 
            if (!isLoaded) { loadBoard(); isLoaded = true; } 
        });

        // 2. 輔助功能
        function showToast(msg) {
            const toast = document.getElementById('toast-msg');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m])).replace(/\n/g, "<br>");
        }

        // 3. 獲取光之語 SVG 圖標 (淨息流乾淨極簡版)
        function getActionSVG(type, color) {
            const baseProps = `width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"`;
            switch(type) {
                case 'hug': // 兩條柔和的弧線交疊
                    return `<svg ${baseProps}><path d="M7 10 Q12 5 17 10" opacity="0.6"/><path d="M5 14 Q12 20 19 14"/><circle cx="12" cy="12" r="1.5" fill="${color}" stroke="none"/></svg>`;
                case 'light': // 極簡發光微星
                    return `<svg ${baseProps}><path d="M12 4 L12 20 M4 12 L20 12" opacity="0.4"/><path d="M8 8 L16 16 M8 16 L16 8" opacity="0.2"/><circle cx="12" cy="12" r="3" fill="${color}" stroke="none"/></svg>`;
                case 'listen': // 輕柔水波紋/聲波
                    return `<svg ${baseProps}><path d="M12 18 Q12 18 12 18"/><path d="M9 14 Q12 17 15 14" opacity="0.6"/><path d="M6 10 Q12 15 18 10" opacity="0.3"/></svg>`;
                case 'together': // 兩顆依偎的光點
                    return `<svg ${baseProps}><circle cx="9" cy="12" r="2.5" fill="${color}" stroke="none" opacity="0.8"/><circle cx="15" cy="12" r="2.5" fill="${color}" stroke="none" opacity="0.5"/><path d="M7 18 Q12 16 17 18" opacity="0.3"/></svg>`;
                default: return '';
            }
        }

        // 定義按鈕顏色與專屬點擊提示語
        const actionsConfig = {
            'hug': { color: 'var(--rose)', name: '抱抱', msg: '我抱抱你' },
            'light': { color: 'var(--gold)', name: '點燈', msg: '為你點燈' },
            'listen': { color: 'var(--sage)', name: '傾聽', msg: '我在聽喔' },
            'together': { color: 'var(--text-main)', name: '願光引路', msg: '有我在' }
        };

        // 4. 發文功能
        window.submitPost = function() {
            const input = document.getElementById('post-input');
            const m = input.value.trim();
            if(!m) return showToast("請先寫下心裡的聲音喔");
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.textContent = "光芒傳送中...";
            
            dbRef.push({ m: m, t: Date.now(), uid: currentUserUid, pureLights: 0 })
            .then(() => {
                input.value = "";
                showToast("你的光已經亮起");
            }).catch(err => {
                showToast("傳送失敗，請稍後再試");
            }).finally(() => {
                btn.disabled = false; btn.textContent = "點亮一盞燈";
            });
        };

        // 5. 讀取論壇 (維持 50 則，並加入消散視覺與純光芒機制)
        function loadBoard() {
            dbRef.limitToLast(50).on('value', snap => {
                const board = document.getElementById('board'); 
                board.innerHTML = "";
                const data = snap.val(); if(!data) return;
                
                const postIds = Object.keys(data).reverse();
                const totalPosts = postIds.length;

                postIds.forEach((id, index) => {
                    const item = data[id];
                    const timeStr = new Date(item.t).toLocaleString([], {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
                    
                    // 1. 計算消散透明度 (越接近 50 則邊緣，越透明)
                    // 假設總數達 50，最舊的(index 49)透明度約為 0.35
                    const fadeRatio = index / 50; 
                    const opacity = Math.max(1 - (fadeRatio * 0.65), 0.35);

                    // 2. 計算純點燈光芒視覺
                    const lightCount = item.pureLights || 0;
                    const shadowSpread = Math.min(lightCount * 2, 20); // 最大光暈
                    const shadowOpacity = Math.min(0.08 + (lightCount * 0.02), 0.3);
                    const lightStyle = lightCount > 0 
                        ? `box-shadow: 0 0 calc(15px + ${shadowSpread}px) rgba(210,168,122,${shadowOpacity}); border-color: rgba(210,168,122,0.4);` 
                        : `box-shadow: var(--shadow-soft);`;

                    // 組合文字回覆區
                    let repliesHTML = "";
                    if(item.rs) {
                        repliesHTML = `<div class="reply-list">`;
                        Object.values(item.rs).forEach(r => {
                            const icon = getActionSVG(r.ty, actionsConfig[r.ty].color);
                            repliesHTML += `
                                <div class="reply-item">
                                    <div class="reply-icon-wrap">${icon}</div>
                                    <div style="flex:1;">${escapeHTML(r.m)}</div>
                                </div>`;
                        });
                        repliesHTML += `</div>`;
                    }

                    // 刪除按鈕
                    let delBtn = "";
                    if (currentUserUid && item.uid === currentUserUid && !currentUserUid.startsWith('guest_')) {
                        delBtn = `<button class="btn-delete" onclick="delPost('${id}')">收回光芒</button>`;
                    }

                    // 建立卡片
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.opacity = opacity; // 套用消散效果
                    card.style.cssText += lightStyle; // 套用光芒效果

                    // 產生四個互動按鈕
                    let reactionButtons = '';
                    Object.keys(actionsConfig).forEach(type => {
                        const conf = actionsConfig[type];
                        reactionButtons += `
                            <button class="react-btn" onclick="sendReply('${id}', '${type}')" style="color: ${conf.color}">
                                ${getActionSVG(type, conf.color)}<span>${conf.name}</span>
                            </button>
                        `;
                    });

                    card.innerHTML = `
                        <div class="card-header">
                            <span>無名氏</span>
                            <div>${timeStr} ${delBtn}</div>
                        </div>
                        <div class="card-body">${escapeHTML(item.m)}</div>
                        ${repliesHTML}
                        
                        <div class="action-zone">
                            <input type="text" id="reply-${id}" class="reply-input" placeholder="留下一句溫暖的話，或直接點擊下方圖騰給予無聲陪伴 (限20字)" maxlength="20">
                            <div class="reaction-grid">
                                ${reactionButtons}
                            </div>
                        </div>
                    `;
                    board.appendChild(card);
                });
            });
        }

        // 6. 回覆/互動功能 (純點燈 vs 文字回覆)
        window.sendReply = function(id, type) {
            const input = document.getElementById(`reply-${id}`);
            const m = input.value.trim();
            const promptMsg = actionsConfig[type].msg;
            
            input.disabled = true;

            // 如果沒有文字，執行「無聲純點燈」機制
            if(!m) {
                // 使用 transaction 確保光芒數安全遞增
                dbRef.child(id).child('pureLights').transaction(current => (current || 0) + 1)
                .then(() => {
                    showToast(promptMsg); // 顯示例如「我抱抱你」
                }).catch(() => {
                    showToast("傳送失敗");
                }).finally(() => {
                    input.disabled = false;
                });
                return;
            }

            // 如果有文字，則送出文字回覆
            dbRef.child(id).child('rs').push({ m: m, ty: type })
            .then(() => {
                input.value = "";
                showToast(promptMsg);
            }).catch(() => {
                showToast("傳送失敗");
            }).finally(() => {
                input.disabled = false;
            });
        };

        // 7. 刪除功能
        window.delPost = function(id) {
            if(confirm("確定要將這道光芒收回嗎？")) {
                dbRef.child(id).remove().catch(() => showToast("收回失敗，權限不足"));
            }
        };
    </script>
</body>
</html>
