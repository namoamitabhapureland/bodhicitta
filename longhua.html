<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 物理引擎實裝版</title>
    <style>
        :root {
            --bg-deep: #050508;
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none;
        }

        #header {
            padding: 20px 25px; display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); z-index: 10;
        }
        .lv-tag { letter-spacing: 3px; color: var(--gold); font-size: 1rem; font-weight: bold; }
        .info-tag { font-size: 0.8rem; color: var(--cyan); letter-spacing: 1px; margin-top: 5px; }

        /* ✨ 多寶閣容器擴展 */
        #game-area {
            flex: 1; display: flex; flex-wrap: wrap; justify-content: center; align-content: center;
            gap: 20px 25px; padding: 30px; z-index: 10;
        }

        /* ✨ 極致琉璃瓶設計 */
        .bottle-wrap {
            width: 50px; height: 160px; position: relative; cursor: pointer;
            /* 加入傾斜動畫的軸心與過渡 */
            transform-origin: bottom center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* 選取時上浮 */
        .bottle-wrap.selected { transform: translateY(-30px); filter: brightness(1.2); }
        
        /* 傾倒時的動畫類別 (由 JS 動態加入) */
        .bottle-wrap.pour-left { transform: translateY(-40px) translateX(-20px) rotate(-60deg); }
        .bottle-wrap.pour-right { transform: translateY(-40px) translateX(20px) rotate(60deg); }

        .bottle-glass {
            width: 100%; height: 100%; position: absolute; inset: 0;
            border: 3px solid rgba(243, 229, 171, 0.6); /* 強化的金邊 */
            border-top: none; /* 瓶口開口 */
            border-radius: 0 0 25px 25px; /* U型底 */
            background: rgba(255, 255, 255, 0.08);
            box-shadow: inset 6px 0 12px rgba(255,255,255,0.1), inset -6px 0 12px rgba(0,0,0,0.6);
            overflow: hidden; z-index: 2;
        }

        /* 瓶口立體環 */
        .bottle-rim {
            position: absolute; top: -6px; left: -5px; right: -5px; height: 12px;
            border: 3px solid rgba(243, 229, 171, 0.8); border-radius: 50%;
            background: rgba(0,0,0,0.5); z-index: 3;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }

        /* ✨ 液體層與流體物理 */
        .liquids-container {
            position: absolute; left: 0; bottom: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column-reverse; /* 從底部堆疊 */
            border-radius: 0 0 22px 22px; overflow: hidden; z-index: 1;
        }

        .liquid {
            width: 100%; height: 25%; /* 預設4層，每層25% */
            transition: height 0.4s ease-in-out;
            border-top: 1px solid rgba(255,255,255,0.3);
            position: relative;
        }

        /* ✨ 倒水時的水柱特效 */
        .pour-stream {
            position: fixed; width: 8px; border-radius: 4px; z-index: 15;
            transform-origin: top center;
            box-shadow: 0 0 10px currentColor;
            transition: height 0.3s ease-in-out;
        }

        #footer { padding: 25px; display: flex; justify-content: center; z-index: 10; }
        .reset-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--cyan);
            color: var(--cyan); padding: 10px 25px; border-radius: 20px;
            font-size: 0.85rem; letter-spacing: 2px; cursor: pointer;
        }

        #toast {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); border: 1px solid var(--solid-gold); padding: 10px 25px; border-radius: 25px;
            color: var(--gold); letter-spacing: 2px; font-size: 0.9rem; opacity: 0; transition: 0.5s; pointer-events: none; z-index: 100;
        }
    </style>
</head>
<body>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">第一重 ‧ 破無明</div>
        <div class="info-tag">理順心識 ． 轉趣菩提</div>
    </div>
</div>

<div id="game-area"></div>

<div id="footer">
    <div class="reset-btn" onclick="initLevel()">重整心識</div>
</div>

<div id="toast"></div>

<script>
    // 柔和且具有法喜的資糧色彩
    const COLORS = ['#e63946', '#2a9d8f', '#00b4d8', '#d4af37', '#9b5de5', '#fb8500'];

    let db = {
        level: 1, bottles: [], selected: null, isAnimating: false
    };

    function initLevel() {
        const grid = document.getElementById('game-area');
        grid.innerHTML = '';
        db.bottles = []; db.selected = null; db.isAnimating = false;

        // 確保第一關絕對有解：3個瓶子，2種顏色 (4紅, 4綠, 分散在2個瓶中，1個全空)
        let colorNum = db.level === 1 ? 2 : Math.min(6, 2 + Math.floor(db.level/4));
        let bottleNum = colorNum + 1; // 至少1個空瓶
        
        let pool = [];
        for(let i=0; i<colorNum; i++) {
            for(let j=0; j<4; j++) pool.push(COLORS[i]);
        }
        
        // 打亂資糧 (簡易洗牌)
        pool.sort(() => Math.random() - 0.5);

        for (let i = 0; i < bottleNum; i++) {
            // 前面的瓶子裝滿4格，最後的瓶子留空
            let content = (i < colorNum) ? pool.splice(0, 4) : [];
            db.bottles.push(content);
            
            // 建立 DOM
            const wrap = document.createElement('div');
            wrap.className = 'bottle-wrap'; wrap.id = `btl-${i}`;
            wrap.onclick = () => handleTap(i);
            
            const rim = document.createElement('div'); rim.className = 'bottle-rim';
            const glass = document.createElement('div'); glass.className = 'bottle-glass';
            const liqContainer = document.createElement('div'); liqContainer.className = 'liquids-container';
            
            wrap.appendChild(rim);
            wrap.appendChild(glass);
            wrap.appendChild(liqContainer);
            grid.appendChild(wrap);
            
            renderLiquids(i);
        }
        document.getElementById('lv-display').innerText = `第 ${db.level} 重 ‧ 理順`;
    }

    function renderLiquids(idx) {
        const container = document.getElementById(`btl-${idx}`).querySelector('.liquids-container');
        container.innerHTML = '';
        
        // 因為是用 flex column-reverse，陣列前面的(底部)先加入
        db.bottles[idx].forEach(c => {
            const l = document.createElement('div');
            l.className = 'liquid';
            l.style.backgroundColor = c;
            container.appendChild(l);
        });
    }

    async function handleTap(idx) {
        if (db.isAnimating) return;
        const targetEl = document.getElementById(`btl-${idx}`);
        
        // 尚未選取瓶子
        if (db.selected === null) {
            if (db.bottles[idx].length === 0) return; // 點擊空瓶無效
            db.selected = idx; 
            targetEl.classList.add('selected');
        } 
        // 已經有選取的瓶子，執行判定與傾倒
        else {
            const fromIdx = db.selected;
            const toIdx = idx;
            const fromEl = document.getElementById(`btl-${fromIdx}`);
            
            if (fromIdx === toIdx) {
                // 取消選取
                fromEl.classList.remove('selected');
                db.selected = null;
                return;
            }

            const fromArr = db.bottles[fromIdx];
            const toArr = db.bottles[toIdx];
            const moveColor = fromArr[fromArr.length - 1]; // 取得最上層顏色

            // 檢查是否合法 (目標未滿，且為空或同色)
            if (toArr.length < 4 && (toArr.length === 0 || toArr[toArr.length-1] === moveColor)) {
                db.isAnimating = true;
                
                // 計算要倒幾層 (直到顏色不同或目標瓶滿)
                let moveCount = 0;
                for(let i = fromArr.length - 1; i >= 0; i--) {
                    if(fromArr[i] === moveColor && toArr.length + moveCount < 4) moveCount++;
                    else break;
                }

                // 執行傾倒動畫
                await performPourAnimation(fromIdx, toIdx, moveColor, moveCount);

                // 更新邏輯資料
                for(let i=0; i<moveCount; i++) toArr.push(fromArr.pop());
                
                // 更新 DOM (強制重新渲染)
                renderLiquids(fromIdx); 
                renderLiquids(toIdx);

                checkWin();
            } else {
                // 不合法的操作，可加入抖動提示
                fromEl.classList.remove('selected');
            }
            
            if(db.selected !== null) document.getElementById(`btl-${db.selected}`).classList.remove('selected');
            db.selected = null; 
            db.isAnimating = false;
        }
    }

    // ✨ 核心流體動畫引擎
    function performPourAnimation(fromIdx, toIdx, color, count) {
        return new Promise(resolve => {
            const fromEl = document.getElementById(`btl-${fromIdx}`);
            const toEl = document.getElementById(`btl-${toIdx}`);
            const fromRect = fromEl.getBoundingClientRect();
            const toRect = toEl.getBoundingClientRect();

            // 判斷向左倒還是向右倒
            const isPourRight = toRect.left > fromRect.left;
            fromEl.classList.add(isPourRight ? 'pour-right' : 'pour-left');

            // 建立水柱
            const stream = document.createElement('div');
            stream.className = 'pour-stream';
            stream.style.backgroundColor = color;
            stream.style.color = color; // 供 shadow-box 使用

            // 計算水柱起點 (傾斜後的瓶口大約位置)
            const startX = fromRect.left + fromRect.width / 2 + (isPourRight ? 20 : -20);
            const startY = fromRect.top - 20;
            const endY = toRect.top + 20 + (4 - db.bottles[toIdx].length) * 30; // 注入深度
            
            stream.style.left = startX + 'px';
            stream.style.top = startY + 'px';
            stream.style.height = '0px';
            document.body.appendChild(stream);

            // 動畫時序
            setTimeout(() => {
                // 1. 水柱往下伸長
                stream.style.height = (endY - startY) + 'px';
                
                // 2. 目標瓶的液體 DOM 預先增長
                setTimeout(() => {
                    const toContainer = toEl.querySelector('.liquids-container');
                    const tempLiquid = document.createElement('div');
                    tempLiquid.className = 'liquid';
                    tempLiquid.style.backgroundColor = color;
                    tempLiquid.style.height = '0%';
                    toContainer.appendChild(tempLiquid);
                    
                    // 利用微小的延遲觸發 CSS height transition
                    requestAnimationFrame(() => {
                        tempLiquid.style.height = (count * 25) + '%';
                        // 來源瓶的液體減少
                        const fromLiquids = fromEl.querySelectorAll('.liquid');
                        for(let i=0; i<count; i++) {
                            let idx = fromLiquids.length - 1 - i;
                            if(fromLiquids[idx]) fromLiquids[idx].style.height = '0%';
                        }
                    });

                    // 3. 收回水柱與瓶身
                    setTimeout(() => {
                        stream.style.top = endY + 'px';
                        stream.style.height = '0px';
                        fromEl.classList.remove('pour-right', 'pour-left');
                        
                        setTimeout(() => { stream.remove(); resolve(); }, 300);
                    }, 400); // 倒水持續時間
                }, 150);
            }, 50);
        });
    }

    function checkWin() {
        const win = db.bottles.every(b => b.length === 0 || (b.length === 4 && b.every(v => v === b[0])));
        if (win) {
            showToast("理順心識 ‧ 圓滿歸位");
            setTimeout(() => {
                db.level++;
                initLevel();
            }, 1500);
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 2000);
    }

    initLevel();
</script>
</body>
</html>
