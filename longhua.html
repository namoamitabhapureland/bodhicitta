<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 菩提觀心定課</title>
    <style>
        :root {
            --bg-deep: #010204; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
            --color-red: #ff4d4d; --color-cyan: #00e5ff; --color-gold: #ffe066;
            --color-purple: #d8b4fe; --color-green: #80ed99; --color-orange: #ffb703; --color-pink: #ffb7c5;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; transition: filter 1s; }
        
        /* ✨ 異象覆蓋層：地藏業海、過關白霧、佛光 */
        #vision-overlay {
            position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0;
            transition: opacity 0.8s, background 1s;
        }
        .vibrate { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, -1px); } }

        /* 中心菩提心呼吸點 */
        #center-point {
            position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: #fff; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 5; pointer-events: none;
            filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 35px var(--solid-gold));
            animation: breathe 4s infinite alternate ease-in-out;
        }
        @keyframes breathe { 0% { transform: translate(-50%, -50%) scale(0.7); opacity: 0.5; } 100% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; } }

        #header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(212,175,55,0.15); z-index: 10; position: relative; background: rgba(1,2,4,0.4); backdrop-filter: blur(8px); }
        .lv-tag { letter-spacing: 3px; color: var(--gold); font-size: 1rem; font-weight: bold; }
        .info-tag { font-size: 0.72rem; color: var(--cyan); letter-spacing: 1px; margin-top: 5px; }

        #scene { flex: 1; display: flex; justify-content: center; align-items: center; perspective: 1200px; overflow: hidden; position: relative; z-index: 10; }
        #carousel { width: 80px; height: 180px; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }

        .vessel { position: absolute; top: 0; left: 0; width: 80px; height: 140px; cursor: pointer; transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .vessel.selected { transform: translateY(-18px); }
        .bottle-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        /* RPG 玻璃對話框 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 2000; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.5s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-box { width: 85%; max-width: 360px; background: rgba(10,15,25,0.85); border: 1px solid var(--solid-gold); border-radius: 20px; padding: 30px 25px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; }
        .m-title { color: var(--gold); font-size: 1.1rem; letter-spacing: 4px; margin-bottom: 20px; border-bottom: 1px solid rgba(243,229,171,0.2); padding-bottom: 15px; }
        .m-text { font-size: 0.95rem; line-height: 1.8; margin-bottom: 30px; letter-spacing: 2px; color: #ddd; }
        
        /* 長按聚光按鈕 */
        .rpg-btn-wrap { position: relative; width: 100%; height: 50px; border-radius: 25px; border: 1px solid var(--gold); background: rgba(255,255,255,0.05); cursor: pointer; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .rpg-btn-fill { position: absolute; left: 0; top: 0; height: 100%; width: 0%; transition: width 0.1s linear; }
        .rpg-btn-text { position: relative; z-index: 5; color: #fff; font-size: 0.9rem; letter-spacing: 4px; }

        .m-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px 25px; border-radius: 25px; font-size: 0.9rem; cursor: pointer; margin: 10px 5px; transition: 0.3s; letter-spacing: 2px; }
        .m-btn-prime { background: var(--solid-gold); color: #fff; border: none; }

        .drop-jump { position: fixed; width: 20px; height: 20px; border-radius: 50%; box-shadow: inset -3px -3px 8px rgba(0,0,0,0.5), inset 3px 3px 8px #fff; z-index: 1000; pointer-events: none; }

        #footer { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 10; position: relative; background: rgba(1,2,4,0.3); }
        .tool-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--cyan); color: var(--cyan); padding: 10px 18px; border-radius: 20px; font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; backdrop-filter: blur(5px); }
    </style>
</head>
<body id="main-body">

<svg style="width:0; height:0; position:absolute;">
    <defs>
        <linearGradient id="grad-red" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff4d4d"/><stop offset="100%" stop-color="#800000"/></linearGradient>
        <linearGradient id="grad-cyan" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00e5ff"/><stop offset="100%" stop-color="#004d40"/></linearGradient>
        <linearGradient id="grad-gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffe066"/><stop offset="100%" stop-color="#8b6508"/></linearGradient>
        <linearGradient id="grad-purple" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d8b4fe"/><stop offset="100%" stop-color="#4a148c"/></linearGradient>
        <linearGradient id="grad-green" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#80ed99"/><stop offset="100%" stop-color="#1b5e20"/></linearGradient>
        <linearGradient id="grad-orange" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffb703"/><stop offset="100%" stop-color="#e65100"/></linearGradient>
        <linearGradient id="grad-pink" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffb7c5"/><stop offset="100%" stop-color="#880e4f"/></linearGradient>
        <linearGradient id="glass-glare" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="rgba(255,255,255,0.25)"/><stop offset="40%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.3)"/></linearGradient>
    </defs>
</svg>

<canvas id="bgCanvas"></canvas>
<div id="vision-overlay"></div>
<div id="center-point"></div>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">琉璃定課</div>
        <div id="timer-ui" style="font-size:0.65rem; color:var(--gold); margin-top:4px; opacity:0.7; letter-spacing:1px;">觀心餘時...</div>
    </div>
    <div style="text-align:right;">
        <div class="info-tag" id="bag-ui">資糧累積：0/100</div>
    </div>
</div>

<div id="scene"><div id="carousel"></div></div>

<div id="footer">
    <div class="tool-btn" onclick="initLevel()">重整</div>
    <div class="tool-btn" onclick="shareApp()">法施</div>
    <div class="tool-btn" style="border-color:var(--solid-gold); color:var(--gold);" onclick="triggerExit(true)">退場</div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-box" id="modal-box">
        <div class="m-title" id="m-title"></div>
        <div class="m-text" id="m-text"></div>
        <div id="m-actions"></div>
    </div>
</div>

<script>
    // --------------------------------------------------
    // 資料庫與初始化 (PX_V15.0)
    // --------------------------------------------------
    let db = JSON.parse(localStorage.getItem('PX_V15.0')) || { 
        waterLevel: 1, waterLastDate: "", tempBag: 0, points: 0, 
        treasures: { sword: 0, vase: 0, jewel: 0 } 
    };
    function saveDB() { localStorage.setItem('PX_V15.0', JSON.stringify(db)); }

    const COLORS = ['red', 'cyan', 'gold', 'purple', 'green', 'orange', 'pink'];
    const MAX_CAPACITY = 4; // 瓶頸為第4等分
    let game = { vessels: [], selectedIdx: null, isAnimating: false, rotY: 0, startTime: Date.now(), starSpeed: 1, currentEncounter: null };

    // --------------------------------------------------
    // 視覺引擎：還原妙依設計的淨瓶
    // --------------------------------------------------
    function getBottleSVG(idx) {
        return `
        <svg viewBox="0 0 100 150" class="bottle-svg">
            <defs><clipPath id="m-${idx}"><path d="M45,25 L55,25 L58,50 L72,95 L60,125 Q50,135 40,125 L28,95 L42,50 Z" /></clipPath></defs>
            <path d="M45,25 L55,25 L58,50 L72,95 L60,125 Q50,135 40,125 L28,95 L42,50 Z" fill="rgba(255,255,255,0.05)" />
            <g id="w-${idx}" clip-path="url(#m-${idx})"></g>
            <path d="M45,25 L55,25 L58,50 L72,95 L60,125 Q50,135 40,125 L28,95 L42,50 Z" fill="url(#glass-glare)" />
            <ellipse cx="50" cy="95" rx="22" ry="6" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" />
            <path d="M45,25 L55,25 L58,50 L72,95 L60,125 L40,125 L28,95 L42,50 Z" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round" />
            <path d="M40,125 Q50,135 60,125" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" />
        </svg>`;
    }

    function initLevel() {
        const today = new Date().toDateString();
        const isDone = db.waterLastDate === today;
        const carousel = document.getElementById('carousel'); carousel.innerHTML = '';
        game.selectedIdx = null; game.isAnimating = false; game.startTime = Date.now(); game.starSpeed = 1;
        
        const lv = db.waterLevel;
        let totalVessels = Math.min(16, 4 + Math.floor(lv / 6));
        let colorCount = totalVessels - 2;
        let pool = [];
        for(let i=0; i<colorCount; i++) { for(let j=0; j<3; j++) pool.push(COLORS[i % COLORS.length]); }
        pool.sort(() => Math.random() - 0.5);
        
        game.vessels = [];
        for(let i=0; i<totalVessels; i++) game.vessels.push(i < colorCount ? pool.splice(0, 3) : []);

        const radius = Math.round((100 / 2) / Math.tan(Math.PI / totalVessels)) + 75;
        game.vessels.forEach((content, i) => {
            const v = document.createElement('div'); v.className = 'vessel'; v.id = `v-${i}`;
            let theta = (360 / totalVessels) * i;
            v.style.transform = `rotateY(${theta}deg) translateZ(${radius}px)`;
            v.dataset.theta = theta;
            v.innerHTML = getBottleSVG(i);
            if (!isDone) v.onclick = () => handleTap(i, theta);
            carousel.appendChild(v);
            renderWater(i);
        });

        document.getElementById('lv-display').innerText = `第 ${lv} 關`;
        document.getElementById('bag-ui').innerText = `資糧累積：${db.tempBag}/100`;
        if(isDone) {
            document.getElementById('timer-ui').innerText = "今日圓滿 ‧ 靜待明日";
            setTimeout(() => { triggerExit(false); }, 1000);
        } else {
            startTimer();
        }
    }

    function renderWater(idx) {
        const g = document.getElementById(`w-${idx}`); g.innerHTML = '';
        const slots = [{y:103.75, h:27}, {y:77.5, h:26.5}, {y:51.25, h:26.5}];
        game.vessels[idx].forEach((c, i) => {
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("x", "0"); rect.setAttribute("y", slots[i].y); rect.setAttribute("width", "100"); rect.setAttribute("height", slots[i].h);
            rect.setAttribute("fill", `url(#grad-${c})`); g.appendChild(rect);
            if(i === game.vessels[idx].length - 1) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", "10"); line.setAttribute("y1", slots[i].y); line.setAttribute("x2", "90"); line.setAttribute("y2", slots[i].y);
                line.setAttribute("stroke", "rgba(255,255,255,0.7)"); line.setAttribute("stroke-width", "1.5"); g.appendChild(line);
            }
        });
    }

    // 最短路徑旋轉邏輯
    async function handleTap(idx, theta) {
        if (game.isAnimating || game.currentEncounter) return;
        const targetEl = document.getElementById(`v-${idx}`);
        
        if (game.selectedIdx === null) {
            if (game.vessels[idx].length === 0) return;
            game.selectedIdx = idx; targetEl.classList.add('selected');
        } else {
            const fromIdx = game.selectedIdx; const toIdx = idx;
            const fromEl = document.getElementById(`v-${fromIdx}`);
            if (fromIdx === toIdx) { fromEl.classList.remove('selected'); game.selectedIdx = null; return; }

            const fromArr = game.vessels[fromIdx]; const toArr = game.vessels[toIdx];
            const moveColor = fromArr[fromArr.length - 1];

            if (toArr.length < 3 && (toArr.length === 0 || toArr[toArr.length-1] === moveColor)) {
                game.isAnimating = true; fromEl.classList.remove('selected');
                let diff = ((-theta) - game.rotY + 540) % 360 - 180;
                game.rotY += diff;
                document.getElementById('carousel').style.transform = `rotateY(${game.rotY}deg)`;
                
                await new Promise(r => setTimeout(r, 450));
                fromArr.pop(); renderWater(fromIdx);
                
                const fromRect = fromEl.getBoundingClientRect();
                const toRect = targetEl.getBoundingClientRect();
                await animateJump(fromRect.left + 40, fromRect.top + 40, toRect.left + 40, toRect.top + 60, moveColor);
                
                toArr.push(moveColor); renderWater(toIdx);
                checkWin();
            } else { fromEl.classList.remove('selected'); }
            game.selectedIdx = null; game.isAnimating = false;
        }
    }

    function animateJump(sx, sy, ex, ey, cid) {
        return new Promise(resolve => {
            const j = document.createElement('div'); j.className = 'drop-jump'; j.style.background = `var(--color-${cid})`;
            document.body.appendChild(j);
            const anim = j.animate([{ transform: `translate(${sx}px, ${sy}px) scale(1)`, opacity: 1 }, { transform: `translate(${(sx+ex)/2}px, ${Math.min(sy,ey)-150}px) scale(1.4)`, opacity: 1 }, { transform: `translate(${ex}px, ${ey}px) scale(0.6)`, opacity: 0 }], { duration: 400, easing: 'cubic-bezier(0.25, 0.8, 0.25, 1)' });
            anim.onfinish = () => { j.remove(); resolve(); };
        });
    }

    // --------------------------------------------------
    // RPG 異象與經典事件庫
    // --------------------------------------------------
    const SCRIPTURES = [
        { t: "釋迦如來 ‧ 演說大經", c: "【發菩提心，一向專念】。此三輩往生之根本，行者當攝心入定。", b: "南無本師釋迦牟尼佛", color: "rgba(243,229,171,0.3)" },
        { t: "法藏比丘 ‧ 弘願顯現", c: "【設我得佛，十方眾生，至心信樂】。四十八願，願願皆為導歸極樂。", b: "南無阿彌陀佛", color: "rgba(255,255,255,0.4)" },
        { t: "地藏菩薩 ‧ 業海震盪", c: "【眾生度盡，方證菩提】。業海翻湧，請至誠稱唸大願名號，鎮伏波濤。", b: "南無地藏王菩薩", color: "rgba(255,50,50,0.4)", type: "earth" },
        { t: "大勢至 ‧ 念佛三昧", c: "【都攝六根，淨念相繼】。如子憶母，法界白光恆常護念。", b: "南無大勢至菩薩", color: "rgba(255,255,255,0.6)" },
        { t: "觀音如來 ‧ 般若照見", c: "【照見五蘊皆空，度一切苦厄】。色即是空，空即是色。", b: "南無觀世音菩薩", color: "rgba(0,229,255,0.3)" }
    ];

    async function checkWin() {
        if (game.vessels.every(v => v.length === 0 || (v.length === 3 && v.every(c => c === v[0])))) {
            const today = new Date().toDateString();
            db.waterLastDate = today; db.waterLevel++; db.tempBag += 10;
            if (db.waterLevel % 20 === 0) { const ts = ['sword', 'vase', 'jewel']; db.treasures[ts[Math.floor(Math.random()*3)]]++; }
            saveDB();
            
            // ✨ 過關動畫：白霧爆發 + Warp Speed
            game.starSpeed = 25;
            const overlay = document.getElementById('vision-overlay');
            overlay.style.background = 'radial-gradient(circle, #fff 0%, transparent 70%)';
            overlay.style.opacity = '1';
            
            setTimeout(() => {
                game.starSpeed = 1;
                overlay.style.opacity = '0';
                if (db.waterLevel % 5 === 0) {
                    const s = SCRIPTURES[Math.floor(Math.random()*SCRIPTURES.length)];
                    triggerRPG(s);
                } else {
                    triggerExit(false);
                }
            }, 1200);
        }
    }

    function triggerRPG(s) {
        game.currentEncounter = s;
        const overlay = document.getElementById('vision-overlay');
        overlay.style.opacity = '1';
        overlay.style.background = s.color;
        if(s.type === 'earth') document.getElementById('main-body').classList.add('vibrate');

        showModal(s.t, s.c, null, null, `
            <div class="rpg-btn-wrap" onmousedown="startRPG()" onmouseup="stopRPG()" ontouchstart="startRPG()" ontouchend="stopRPG()">
                <div class="rpg-btn-fill" id="fill" style="background:${s.color}"></div>
                <div class="rpg-btn-text">${s.b}</div>
            </div>
        `);
    }

    let rpgTimer = null, rpgProg = 0;
    function startRPG() {
        clearInterval(rpgTimer); rpgProg = 0;
        rpgTimer = setInterval(() => {
            rpgProg += 2; document.getElementById('fill').style.width = rpgProg + '%';
            if(rpgProg >= 100) { clearInterval(rpgTimer); finishRPG(); }
        }, 30);
    }
    function stopRPG() { clearInterval(rpgTimer); rpgProg = 0; document.getElementById('fill').style.width = '0%'; }
    function finishRPG() {
        const overlay = document.getElementById('vision-overlay');
        overlay.style.background = '#fff'; setTimeout(() => { overlay.style.opacity = '0'; }, 200);
        document.getElementById('main-body').classList.remove('vibrate');
        closeModal(); triggerExit(false);
    }

    function triggerExit(isManual) {
        const title = isManual ? "法水觀心 ‧ 暫歇" : "今日修持 ‧ 圓滿";
        let text = "放下手機，請給身邊的人一個微笑，或在心中默默感恩。清淨即在當下。";
        let html = `<button class="m-btn" onclick="shareApp()">法施分享</button>`;
        if (db.tempBag >= 100) { html += `<button class="m-btn m-btn-prime" onclick="syncPoints()">資糧結集 (${db.tempBag})</button>`; }
        else { html += `<button class="m-btn" onclick="window.location.href='index.html'">歸返道場</button>`; }
        showModal(title, text, null, null, html);
    }

    function showModal(title, text, btnText, callback, customHtml) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-text').innerText = text;
        document.getElementById('m-actions').innerHTML = customHtml || `<button class="m-btn m-btn-prime" onclick="closeModal()">${btnText}</button>`;
        document.getElementById('modal').classList.add('show');
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); game.currentEncounter = null; }

    function syncPoints() { db.points += db.tempBag; db.tempBag = 0; saveDB(); window.location.href = 'index.html'; }

    function startTimer() {
        const limit = (30 + db.waterLevel) * 60 * 1000;
        const check = setInterval(() => {
            const elapsed = Date.now() - game.startTime;
            if (elapsed > limit) { clearInterval(check); showModal("超時提醒", "一念執著，心神已疲。請暫且放下，明日再來理順。", "安住呼吸", () => window.location.href='index.html'); }
            const min = Math.floor((limit - elapsed) / 60000);
            document.getElementById('timer-ui').innerText = `觀心餘時：${min} 分鐘`;
        }, 10000);
    }

    function shareApp() {
        if (navigator.share) { navigator.share({ title: '淨流 ‧ 生活紀錄', url: window.location.href.split('?')[0] }); }
        else { alert("網址已複製，隨喜分享功德！"); }
    }

    // --------------------------------------------------
    // 背景引擎：星雲前進穿梭
    // --------------------------------------------------
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let cw, ch, stars = [], orbs = [];
    function res() { cw=canvas.width=window.innerWidth; ch=canvas.height=window.innerHeight; }
    window.addEventListener('resize', res); res();
    for(let i=0; i<150; i++) stars.push({x:(Math.random()-0.5)*2000, y:(Math.random()-0.5)*2000, z:Math.random()*2000, s:Math.random()*2+1});
    const oCols = ['rgba(230,57,70,0.4)', 'rgba(0,180,216,0.4)', 'rgba(212,175,55,0.4)', 'rgba(155,93,229,0.4)'];
    for(let i=0; i<6; i++) orbs.push({x:Math.random()*cw, y:Math.random()*ch, r:Math.random()*100+60, c:oCols[i%4], vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2});

    function draw() {
        ctx.fillStyle = '#010204'; ctx.fillRect(0,0,cw,ch); ctx.globalCompositeOperation = 'screen';
        if(!game.currentEncounter) {
            orbs.forEach(o => { o.x+=o.vx; o.y+=o.vy; if(o.x<0||o.x>cw)o.vx*=-1; if(o.y<0||o.y>ch)o.vy*=-1; let g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r); g.addColorStop(0,o.c); g.addColorStop(1,'transparent'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill(); });
        }
        stars.forEach(s => {
            s.z -= (8 * game.starSpeed); if(s.z<=0){s.z=2000; s.x=(Math.random()-0.5)*2000; s.y=(Math.random()-0.5)*2000;}
            let sc=1000/(1000+s.z), px=cw/2+s.x*sc, py=ch/2+s.y*sc;
            if(px>0&&px<cw&&py>0&&py<ch){ ctx.fillStyle=`rgba(255,255,255,${sc})`; ctx.beginPath(); ctx.arc(px,py,s.s*sc*(game.starSpeed>1?5:1),0,Math.PI*2); ctx.fill(); }
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(draw);
    }
    draw();

    let isD = false, sx = 0;
    document.addEventListener('pointerdown', e => { if(game.isAnimating||game.currentEncounter) return; isD=true; sx=e.clientX; });
    document.addEventListener('pointermove', e => { if(!isD) return; let dx=e.clientX-sx; game.rotY+=dx*0.4; sx=e.clientX; document.getElementById('carousel').style.transform=`rotateY(${game.rotY}deg)`; });
    document.addEventListener('pointerup', () => isD=false);

    initLevel();
</script>
</body>
</html>
