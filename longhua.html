<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 寶珠淨瓶終極版</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; }
        
        body { 
            margin: 0; background: #010204; color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            /* 絕對防卡死手勢攔截 */
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; }

        #header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(212, 175, 55, 0.2); z-index: 10; position: relative; background: rgba(1,2,4,0.3); backdrop-filter: blur(5px); }
        .lv-tag { letter-spacing: 3px; color: var(--gold); font-size: 1rem; font-weight: bold; }
        .info-tag { font-size: 0.75rem; color: var(--cyan); letter-spacing: 1px; margin-top: 5px; }

        #scene { flex: 1; display: flex; justify-content: center; align-items: center; perspective: 1200px; overflow: hidden; position: relative; z-index: 10; }
        #carousel { width: 60px; height: 180px; position: relative; transform-style: preserve-3d; transition: transform 0.1s ease-out; }

        /* ✨ 實裝：琉璃淨瓶 (絕美曲線，告別方框與試管) */
        .vessel {
            position: absolute; top: 0; left: 0; width: 60px; height: 180px; cursor: pointer;
            /* 完美淨瓶曲線：瓶口 -> 瓶頸 -> 瓶身 -> 瓶底 */
            clip-path: polygon(25% 0%, 75% 0%, 75% 5%, 65% 12%, 65% 25%, 95% 70%, 75% 100%, 25% 100%, 5% 70%, 35% 25%, 35% 12%, 25% 5%);
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 40%, rgba(0,0,0,0.5) 100%);
            backdrop-filter: blur(5px);
            display: flex; flex-direction: column-reverse; align-items: center; 
            padding-bottom: 5px; gap: -10px; /* 讓寶珠微微堆疊交錯 */
            box-shadow: inset 0 0 15px rgba(255,255,255,0.2);
            transition: transform 0.3s, filter 0.3s;
        }
        
        /* 淨瓶底部的法緣金線 */
        .vessel::after {
            content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 3px;
            background: rgba(212, 175, 55, 0.7); border-radius: 2px;
        }

        .vessel.selected { transform: translateY(-12px); filter: brightness(1.5) drop-shadow(0 0 15px rgba(243, 229, 171, 0.4)); }

        /* ✨ 實裝：多面寶珠容器 */
        .orb { 
            width: 44px; height: 48px; position: relative; 
            z-index: 2; flex-shrink: 0; transition: all 0.3s; 
            display: flex; justify-content: center; align-items: center;
        }
        
        .vessel.selected .orb:last-child { transform: translateY(-8px); filter: brightness(1.4); }
        
        /* 躍遷寶珠 */
        .orb-jump { position: fixed; width: 44px; height: 48px; z-index: 1000; pointer-events: none; }

        /* 中心神秘種子 (取代蓮花) */
        #center-seed {
            position: absolute; top: 50%; left: 50%; width: 160px; height: 160px;
            margin-top: -80px; margin-left: -80px; pointer-events: none; z-index: 5;
        }

        #footer { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 10; position: relative; }
        .tool-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--cyan); color: var(--cyan); padding: 10px 18px; border-radius: 20px; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">第 1 關</div>
        <div class="info-tag">理順琉璃，轉識成智</div>
    </div>
</div>

<div id="scene">
    <div id="center-seed">
        <svg viewBox="0 0 100 150">
            <g transform="translate(0, 15)">
                <circle cx="50" cy="60" r="35" fill="none" stroke="#d4af37" stroke-width="0.8" stroke-dasharray="4 8" opacity="0.6">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 60" to="360 50 60" dur="40s" repeatCount="indefinite"/>
                </circle>
                <circle cx="50" cy="60" r="25" fill="none" stroke="#f3e5ab" stroke-width="0.5" stroke-dasharray="10 5" opacity="0.4">
                    <animateTransform attributeName="transform" type="rotate" from="360 50 60" to="0 50 60" dur="30s" repeatCount="indefinite"/>
                </circle>
                <circle cx="50" cy="60" r="4" fill="#fff" filter="drop-shadow(0 0 12px #d4af37)">
                    <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
                </circle>
                <path d="M50 40 L53 57 L70 60 L53 63 L50 80 L47 63 L30 60 L47 57 Z" fill="rgba(212,175,55,0.15)" stroke="#d4af37" stroke-width="0.6"/>
            </g>
        </svg>
    </div>

    <div id="carousel">
        </div>
</div>

<div id="footer">
    <div class="tool-btn" onclick="initLevel()">重整</div>
    <div class="tool-btn" style="border-color:var(--solid-gold); color:var(--gold);" onclick="forceNextLevel()">過關 +10</div>
</div>

<script>
    // --------------------------------------------------
    // 原生音效合成引擎 
    // --------------------------------------------------
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function initAudio() { try { if (!audioCtx) { audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); } } catch(e){} }
    function playTone(freq, type, duration, vol) {
        try {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch(e){}
    }
    function playSelectSound() { playTone(1200, 'sine', 0.1, 0.3); } 
    function playJumpSound() { playTone(800, 'triangle', 0.25, 0.2); } 
    function playErrorSound() { playTone(200, 'sawtooth', 0.2, 0.2); } 
    function playWinSound() { playTone(432, 'sine', 2.0, 0.5); } 

    // --------------------------------------------------
    // 背景引擎：星雲穿梭 + 清晰彩色光球
    // --------------------------------------------------
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let cw, ch;
    
    let stars = [];
    let colorOrbs = [];
    const orbColors = [ 'rgba(230, 57, 70, 0.6)', 'rgba(0, 180, 216, 0.6)', 'rgba(212, 175, 55, 0.6)', 'rgba(155, 93, 229, 0.6)' ];

    function resizeCanvas() { cw = canvas.width = window.innerWidth; ch = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    for(let i=0; i<200; i++) { stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, size: Math.random() * 2 + 0.5 }); }
    for(let i=0; i<6; i++) { colorOrbs.push({ x: Math.random() * cw, y: Math.random() * ch, radius: Math.random() * 120 + 60, color: orbColors[i % 4], vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5 }); }

    function drawBg() {
        ctx.fillStyle = '#010204'; ctx.fillRect(0, 0, cw, ch);
        ctx.globalCompositeOperation = 'screen';

        colorOrbs.forEach(orb => {
            orb.x += orb.vx; orb.y += orb.vy;
            if(orb.x < -orb.radius || orb.x > cw + orb.radius) orb.vx *= -1;
            if(orb.y < -orb.radius || orb.y > ch + orb.radius) orb.vy *= -1;
            let grad = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.radius);
            grad.addColorStop(0, orb.color); grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.beginPath(); ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI*2);
            ctx.fillStyle = grad; ctx.fill();
        });

        stars.forEach(s => {
            s.z -= 8; 
            if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; }
            let scale = 800 / (800 + s.z);
            let px = cw / 2 + s.x * scale; let py = ch / 2 + s.y * scale;
            if (px > 0 && px < cw && py > 0 && py < ch) {
                ctx.beginPath(); ctx.arc(px, py, s.size * scale, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 255, 255, ${scale})`; ctx.fill();
            }
        });

        ctx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(drawBg);
    }
    drawBg();

    // ✨ 實裝：提取您設計的「多面寶珠」SVG 代碼
    const getJewelSVG = () => `
    <svg viewBox="0 0 100 150" style="width:100%; height:100%; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.6));">
        <g transform="translate(0, 25)">
            <polygon points="50,10 80,40 50,55 20,40" fill="rgba(255,255,255,0.7)" stroke="#fff" stroke-width="0.5"/>
            <polygon points="20,40 50,55 50,100" fill="currentColor" opacity="0.95" stroke="#fff" stroke-width="0.5"/>
            <polygon points="80,40 50,55 50,100" fill="currentColor" opacity="0.5" stroke="#fff" stroke-width="0.5"/>
            <polygon points="20,40 35,25 50,55" fill="rgba(255,255,255,0.4)" stroke="#fff" stroke-width="0.3"/>
            <polygon points="80,40 65,25 50,55" fill="rgba(255,255,255,0.15)" stroke="#fff" stroke-width="0.3"/>
        </g>
    </svg>`;

    // 遊戲邏輯與穩定版數組
    const PALETTE = ['#e63946', '#2a9d8f', '#00b4d8', '#d4af37', '#9b5de5', '#fb8500', '#f4a261', '#ffb7c5'];
    const MAX_ORBS = 4;
    let db = { level: 1, vessels: [], selectedIdx: null, isAnimating: false, carouselRotY: 0, radius: 0 };

    function generateLevelData(lv) {
        let totalVessels = Math.min(24, 4 + Math.floor(lv / 5)); 
        let colorTypes = Math.min(8, totalVessels - 2);   
        let pool = [];
        let emptyVessels = totalVessels > 10 ? 3 : 2; 
        let itemsNeeded = (totalVessels - emptyVessels) * MAX_ORBS; 
        
        let colorIdx = 0;
        for(let i=0; i < itemsNeeded / MAX_ORBS; i++) {
            let targetColor = PALETTE[colorIdx % colorTypes];
            for(let j=0; j<MAX_ORBS; j++) pool.push(targetColor);
            colorIdx++;
        }
        pool.sort(() => Math.random() - 0.5); 
        
        let vessels = [];
        for(let i=0; i<totalVessels; i++) vessels.push(i < totalVessels - emptyVessels ? pool.splice(0, MAX_ORBS) : []);
        return vessels;
    }

    function initLevel() {
        const carousel = document.getElementById('carousel');
        carousel.innerHTML = ''; 
        
        db.vessels = generateLevelData(db.level);
        db.selectedIdx = null; db.isAnimating = false;
        db.carouselRotY = 0; carousel.style.transform = `rotateY(0deg)`;
        
        const total = db.vessels.length;
        const rows = total > 12 ? 2 : 1;
        const vesselsPerRow = Math.ceil(total / rows); 
        db.radius = Math.round((60 / 2) / Math.tan(Math.PI / vesselsPerRow)) + 65; 

        for (let i = 0; i < total; i++) {
            const v = document.createElement('div');
            v.className = 'vessel'; v.id = `vsl-${i}`;
            
            let rowIdx = Math.floor(i / vesselsPerRow);
            let colIdx = i % vesselsPerRow;
            let theta = (360 / vesselsPerRow) * colIdx;
            let yOffset = rows === 2 ? (rowIdx === 0 ? -95 : 95) : 0; 
            
            v.style.transform = `rotateY(${theta}deg) translateY(${yOffset}px) translateZ(${db.radius}px)`;
            v.dataset.theta = theta; 
            v.onclick = () => handleTap(i, theta);
            carousel.appendChild(v);
            renderOrbs(i);
        }
        updateShading();
        document.getElementById('lv-display').innerText = `第 ${db.level} 關`;
    }

    function renderOrbs(idx) {
        const v = document.getElementById(`vsl-${idx}`);
        v.innerHTML = '';
        db.vessels[idx].forEach(color => {
            const orb = document.createElement('div');
            orb.className = 'orb'; 
            orb.style.color = color; // 將顏色傳遞給內部 SVG 的 currentColor
            orb.innerHTML = getJewelSVG(); // 注入您設計的 SVG 寶珠
            v.appendChild(orb);
        });
    }

    // 穩固的防卡死滑動偵測
    let isDragging = false, startX = 0, dragDelta = 0;
    const carousel = document.getElementById('carousel');
    
    document.addEventListener('pointerdown', e => { 
        if (db.isAnimating || e.target.closest('.tool-btn')) return;
        initAudio(); isDragging = true; startX = e.clientX; dragDelta = 0; carousel.style.transition = 'none'; 
    });
    document.addEventListener('pointermove', e => {
        if (!isDragging) return;
        let delta = e.clientX - startX;
        dragDelta += Math.abs(delta);
        db.carouselRotY += delta * 0.4; startX = e.clientX;
        carousel.style.transform = `rotateY(${db.carouselRotY}deg)`;
        updateShading();
    });
    
    const endDrag = () => { if(isDragging) { isDragging = false; carousel.style.transition = 'transform 0.5s ease-out'; } };
    document.addEventListener('pointerup', endDrag);
    document.addEventListener('pointercancel', endDrag);
    document.addEventListener('pointerleave', endDrag);

    function updateShading() {
        document.querySelectorAll('.vessel').forEach(c => {
            let currentAngle = (parseFloat(c.dataset.theta) + db.carouselRotY) % 360;
            if(currentAngle < 0) currentAngle += 360;
            let dist = Math.min(currentAngle, 360 - currentAngle);
            if(dist > 85) { c.style.filter = 'brightness(0.3) opacity(0.6)'; } 
            else { c.style.filter = c.classList.contains('selected') ? 'brightness(1.5) drop-shadow(0 0 15px rgba(243, 229, 171, 0.4))' : 'brightness(1) opacity(1)'; }
        });
    }

    async function handleTap(idx, theta) {
        initAudio();
        if (db.isAnimating || dragDelta > 5) return; // 區分滑動與點擊
        
        const targetEl = document.getElementById(`vsl-${idx}`);
        
        if (db.selectedIdx === null) {
            if (db.vessels[idx].length === 0) return;
            db.selectedIdx = idx; targetEl.classList.add('selected');
            updateShading(); playSelectSound();
        } else {
            const fromIdx = db.selectedIdx; const toIdx = idx;
            const fromEl = document.getElementById(`vsl-${fromIdx}`);
            if (fromIdx === toIdx) { fromEl.classList.remove('selected'); db.selectedIdx = null; updateShading(); return; }

            const fromArr = db.vessels[fromIdx]; const toArr = db.vessels[toIdx];
            const moveColor = fromArr[fromArr.length - 1];

            if (toArr.length < MAX_ORBS && (toArr.length === 0 || toArr[toArr.length-1] === moveColor)) {
                try {
                    db.isAnimating = true; fromEl.classList.remove('selected'); updateShading();
                    playJumpSound();
                    
                    db.carouselRotY = -theta;
                    carousel.style.transform = `rotateY(${db.carouselRotY}deg)`;
                    updateShading();

                    await new Promise(r => setTimeout(r, 450));

                    const poppedColor = fromArr.pop();
                    const topOrbEl = fromEl.querySelectorAll('.orb')[fromEl.querySelectorAll('.orb').length - 1];
                    const fromRect = topOrbEl.getBoundingClientRect();
                    topOrbEl.style.opacity = '0';

                    const destX = targetEl.getBoundingClientRect().left + (targetEl.getBoundingClientRect().width - 44) / 2;
                    const destY = targetEl.getBoundingClientRect().bottom - 5 - 42 * (toArr.length + 1);

                    await animateOrbJump(fromRect.left, fromRect.top, destX, destY, poppedColor);
                    
                    toArr.push(poppedColor); renderOrbs(fromIdx); renderOrbs(toIdx);
                    checkWin();
                } catch(e) { console.warn(e); } 
                finally { db.selectedIdx = null; db.isAnimating = false; }
            } else { fromEl.classList.remove('selected'); db.selectedIdx = null; updateShading(); playErrorSound(); }
        }
    }

    function animateOrbJump(startX, startY, endX, endY, color) {
        return new Promise(resolve => {
            const jumper = document.createElement('div');
            jumper.className = 'orb-jump'; 
            jumper.style.color = color; 
            jumper.innerHTML = getJewelSVG(); // 躍遷的也是寶珠
            document.body.appendChild(jumper);

            const controlY = Math.min(startY, endY) - 180; 
            const deltaX = endX - startX;

            try {
                const animation = jumper.animate([
                    { transform: `translate(${startX}px, ${startY}px) scale(1)` },
                    { transform: `translate(${startX + deltaX*0.5}px, ${controlY}px) scale(1.3)` },
                    { transform: `translate(${endX}px, ${endY}px) scale(1)` }
                ], { duration: 400, easing: 'cubic-bezier(0.25, 0.8, 0.25, 1)', fill: 'forwards' });

                animation.onfinish = () => { jumper.remove(); resolve(); };
            } catch(e) { jumper.remove(); resolve(); }
            
            setTimeout(() => { if(jumper.parentNode) { jumper.remove(); resolve(); } }, 450); // 絕對防卡死解鎖
        });
    }

    function checkWin() {
        if (db.vessels.every(v => v.length === 0 || (v.length === MAX_ORBS && v.every(item => item === v[0])))) {
            playWinSound(); setTimeout(() => { db.level++; initLevel(); }, 1200);
        }
    }
    
    function forceNextLevel() { db.level += 9; db.level++; initLevel(); }

    initLevel();
</script>
</body>
</html>
