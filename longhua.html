<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 法界穿梭版</title>
    <style>
        :root {
            --bg-deep: #010204;
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
            touch-action: none;
        }

        /* 菩提心三千世界 - Z軸穿梭底座 */
        #realmCanvas { position: fixed; inset: 0; z-index: -1; }

        #header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15); z-index: 10; backdrop-filter: blur(8px);
        }
        .lv-tag { letter-spacing: 3px; color: var(--gold); font-size: 1rem; font-weight: bold; }

        /* 3D 場景 */
        #scene {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            perspective: 1500px; overflow: hidden; position: relative; z-index: 10;
        }

        /* 中央多層金蓮 */
        #lotus-mandala {
            position: absolute; width: 140px; height: 140px; pointer-events: none;
            transform: translateZ(-200px); /* 位於中央深處 */
        }

        /* 旋轉圓環容器 - 分層排版 */
        .tier-ring {
            position: relative; transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s, filter 0.5s;
            margin: -20px 0; /* 讓層與層之間更緊湊 */
        }
        /* 聚焦效果：未選中層淡化並縮小 */
        .tier-ring.unfocused { opacity: 0.4; transform: scale(0.8) translateZ(-300px); filter: blur(3px); }
        .tier-ring.focused { opacity: 1; transform: scale(1.1) translateZ(100px); filter: blur(0px); }

        /* 六角晶體容器 - 徹底直角化 */
        .vessel {
            position: absolute; width: 48px; height: 130px; cursor: pointer;
            border: 1px solid rgba(243, 229, 171, 0.4);
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(8px);
            display: flex; flex-direction: column-reverse; align-items: center; 
            padding-bottom: 5px; gap: 4px; box-sizing: border-box;
            transition: border-color 0.3s, transform 0.3s;
        }
        .vessel.selected { border-color: var(--gold); box-shadow: 0 0 20px var(--solid-gold); }

        /* 資糧球與幾何相 - 顯著放大 */
        .orb {
            width: 32px; height: 32px; border-radius: 50%; position: relative;
            box-shadow: inset -4px -4px 10px rgba(0,0,0,0.6), inset 4px 4px 10px rgba(255,255,255,0.7);
            display: flex; justify-content: center; align-items: center;
        }
        .shape-inner { width: 14px; height: 14px; background: rgba(255,255,255,0.9); }
        .shape-square { border-radius: 2px; }
        .shape-triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }

        #footer { padding: 15px; display: flex; justify-content: space-around; z-index: 10; }
        .nav-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--cyan); color: var(--cyan);
            padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; cursor: pointer;
        }
    </style>
</head>
<body>

<canvas id="realmCanvas"></canvas>

<div id="header">
    <div class="lv-tag">法界漫遊 ‧ 第 24 重</div>
</div>

<div id="scene">
    <div id="lotus-mandala">
        <svg viewBox="0 0 200 200">
            <defs>
                <radialGradient id="lotusGrad" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fff" />
                    <stop offset="60%" stop-color="#f3e5ab" />
                    <stop offset="100%" stop-color="#d4af37" stop-opacity="0" />
                </radialGradient>
            </defs>
            <g transform="translate(100, 100)">
                <g class="lotus-layer" id="layer-back"></g>
                <g class="lotus-layer" id="layer-mid" style="transform: scale(0.8) rotate(15deg)"></g>
                <g class="lotus-layer" id="layer-front" style="transform: scale(0.6) rotate(30deg)"></g>
            </g>
        </svg>
    </div>
    
    <div id="ring-container" style="transform-style: preserve-3d; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;"></div>
</div>

<div id="footer">
    <div class="nav-btn" onclick="switchTier('top')">觀照上層</div>
    <div class="nav-btn" onclick="switchTier('mid')">中心法輪</div>
    <div class="nav-btn" onclick="switchTier('bottom')">底座資糧</div>
</div>

<script>
    const COLORS = ['#e63946', '#2a9d8f', '#00b4d8', '#d4af37', '#9b5de5'];
    const SHAPES = ['square', 'triangle'];
    
    let db = {
        level: 24, tiers: { top: [], mid: [], bottom: [] },
        currentFocus: 'mid', carouselRotY: 0,
        stars: [], time: 0
    };

    // ✨ 菩提星體 Z 軸穿梭引擎
    function initBackground() {
        const cvs = document.getElementById('realmCanvas');
        const ctx = cvs.getContext('2d');
        let w, h;
        const resize = () => { w = cvs.width = window.innerWidth; h = cvs.height = window.innerHeight; };
        window.addEventListener('resize', resize); resize();

        for(let i=0; i<150; i++) {
            db.stars.push({ x: (Math.random()-0.5)*w*2, y: (Math.random()-0.5)*h*2, z: Math.random()*2000, s: Math.random()*2+1 });
        }

        function draw() {
            ctx.fillStyle = '#010204'; ctx.fillRect(0, 0, w, h);
            db.time += 0.01;
            
            db.stars.forEach(s => {
                s.z -= 10; // 星體向使用者飛來
                if(s.z <= 0) s.z = 2000;
                
                let scale = 1000 / (1000 + s.z);
                let px = w/2 + s.x * scale;
                let py = h/2 + s.y * scale;
                
                if(px > 0 && px < w && py > 0 && py < h) {
                    ctx.fillStyle = `rgba(139, 168, 156, ${scale})`;
                    ctx.beginPath(); ctx.arc(px, py, s.s * scale * 2, 0, Math.PI*2); ctx.fill();
                }
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    // ✨ 萬德金蓮層次繪製
    function drawLotus() {
        const paths = ["layer-back", "layer-mid", "layer-front"];
        paths.forEach(id => {
            const g = document.getElementById(id);
            for(let i=0; i<12; i++) {
                const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                p.setAttribute("d", "M0,0 C15,-25 35,-50 0,-85 C-35,-50 -15,-25 0,0");
                p.setAttribute("fill", "url(#lotusGrad)");
                p.setAttribute("transform", `rotate(${i*30})`);
                g.appendChild(p);
            }
        });
    }

    // ✨ 多層圓柱初始化
    function initMandala() {
        const container = document.getElementById('ring-container');
        container.innerHTML = '';
        const tierNames = ['top', 'mid', 'bottom'];
        
        tierNames.forEach(name => {
            const ring = document.createElement('div');
            ring.className = `tier-ring ${name === db.currentFocus ? 'focused' : 'unfocused'}`;
            ring.id = `ring-${name}`;
            
            const num = 10; // 每層 10 瓶
            const radius = 180;
            
            for(let i=0; i<num; i++) {
                const v = document.createElement('div');
                v.className = 'vessel';
                let theta = (360 / num) * i;
                v.style.transform = `rotateY(${theta}deg) translateZ(${radius}px)`;
                
                // 填充示範球
                for(let j=0; j<3; j++) {
                    const o = document.createElement('div');
                    o.className = 'orb'; o.style.backgroundColor = COLORS[Math.floor(Math.random()*5)];
                    const s = document.createElement('div');
                    s.className = `shape-inner shape-${SHAPES[Math.floor(Math.random()*2)]}`;
                    o.appendChild(s);
                    v.appendChild(o);
                }
                ring.appendChild(v);
            }
            container.appendChild(ring);
        });
    }

    // ✨ 切換層級並執行放大效果
    function switchTier(name) {
        db.currentFocus = name;
        document.querySelectorAll('.tier-ring').forEach(r => {
            const id = r.id.split('-')[1];
            r.className = `tier-ring ${id === name ? 'focused' : 'unfocused'}`;
        });
    }

    // ✨ 360度撥轉 (同步所有層)
    let isDragging = false, startX = 0;
    document.addEventListener('touchstart', (e) => { isDragging = true; startX = e.touches[0].clientX; });
    document.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        let x = e.touches[0].clientX;
        db.carouselRotY += (x - startX) * 0.4; startX = x;
        document.querySelectorAll('.tier-ring').forEach(r => {
            r.style.transform = r.classList.contains('focused') 
                ? `scale(1.1) translateZ(100px) rotateY(${db.carouselRotY}deg)` 
                : `scale(0.8) translateZ(-300px) rotateY(${db.carouselRotY}deg)`;
        });
    });
    document.addEventListener('touchend', () => isDragging = false);

    initBackground();
    drawLotus();
    initMandala();
</script>
</body>
</html>
