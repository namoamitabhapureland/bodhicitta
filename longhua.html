<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 無相漂浮版</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; }
        
        body { 
            margin: 0; background: transparent; color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: pan-y; 
            background-color: #000;
        }

        /* 禪之亂流 Canvas 畫布底層 */
        #zenCanvas {
            position: fixed; inset: 0; z-index: 0;
            filter: blur(15px) contrast(1.2);
            animation: canvasBreath 15s ease-in-out infinite alternate;
        }

        @keyframes canvasBreath {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.15) rotate(5deg); } 
        }

        /* 動態漂浮高解析度 SVG 蓮花 */
        #wandering-lotus {
            position: fixed; top: 50%; left: 50%; width: 240px; height: 240px;
            margin-top: -120px; margin-left: -120px; 
            display: flex; justify-content: center; align-items: center; 
            pointer-events: none; z-index: 5;
            animation: lotusWander 30s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        }
        
        #wandering-lotus svg {
            width: 100%; height: 100%; 
            filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.8));
        }

        /* 蓮花全場景漂浮、旋轉與極限縮放軌跡 */
        @keyframes lotusWander {
            0% { transform: translate(0, 0) scale(0.6) rotate(0deg); filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4)); opacity: 0.6; }
            25% { transform: translate(-15vw, -15vh) scale(1.5) rotate(70deg); filter: drop-shadow(0 0 35px rgba(212, 175, 55, 0.8)); opacity: 0.8; }
            50% { transform: translate(10vw, -20vh) scale(2.8) rotate(160deg); filter: drop-shadow(0 0 60px rgba(212, 175, 55, 1)); opacity: 1; }
            75% { transform: translate(20vw, 15vh) scale(1.2) rotate(260deg); filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.7)); opacity: 0.7; }
            100% { transform: translate(-15vw, 20vh) scale(0.5) rotate(360deg); filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5)); opacity: 0.5; }
        }

        /* 介面與立體塔 */
        #header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(212, 175, 55, 0.2); z-index: 10; position: relative; }
        .lv-tag { letter-spacing: 3px; color: var(--gold); font-size: 1rem; font-weight: bold; text-shadow: 0 0 10px rgba(243, 229, 171, 0.5); }
        .info-tag { font-size: 0.75rem; color: var(--cyan); letter-spacing: 1px; margin-top: 5px; }

        #scene { flex: 1; display: flex; justify-content: center; align-items: center; perspective: 1200px; overflow: hidden; position: relative; z-index: 10; }
        #carousel { width: 60px; height: 160px; position: relative; transform-style: preserve-3d; transition: transform 0.1s ease-out; }

        /* 隱形的邏輯容器 (拔除所有長方框視覺) */
        .vessel {
            position: absolute; top: 0; left: 0; width: 56px; height: 175px; cursor: pointer;
            background: transparent; border: none; box-shadow: none;
            display: flex; flex-direction: column-reverse; align-items: center; padding-bottom: 5px; gap: 4px;
            transition: transform 0.3s;
        }
        
        /* 選中時容器本身不上色，而是讓內部的資糧球提舉並強化發光 */
        .vessel.selected { transform: translateY(-8px); }
        
        /* 資糧球與內部幾何 */
        .orb { 
            width: 36px; height: 36px; border-radius: 50%; position: relative; 
            box-shadow: inset -5px -5px 12px rgba(0,0,0,0.6), inset 5px 5px 12px rgba(255,255,255,0.9); 
            z-index: 2; flex-shrink: 0; transition: all 0.3s; 
            display: flex; justify-content: center; align-items: center; 
        }
        .shape-inner { width: 16px; height: 16px; background: rgba(255,255,255,0.95); box-shadow: 0 0 8px rgba(255,255,255,0.6); }
        .shape-circle { border-radius: 50%; } 
        .shape-square { border-radius: 3px; } 
        .shape-triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); background: #fff; } 
        .shape-diamond { transform: rotate(45deg); }
        
        /* 強化選中時的資糧球光暈，取代原有的方框視覺 */
        .vessel.selected .orb { filter: brightness(1.2); box-shadow: 0 0 15px currentColor, inset -5px -5px 12px rgba(0,0,0,0.5), inset 5px 5px 12px rgba(255,255,255,0.9); }
        .vessel.selected .orb:last-child { transform: translateY(-12px); filter: brightness(1.6); box-shadow: 0 0 35px currentColor, inset -5px -5px 12px rgba(0,0,0,0.5), inset 5px 5px 12px rgba(255,255,255,1); }
        
        /* 躍遷球 */
        .orb-jump { position: fixed; width: 36px; height: 36px; border-radius: 50%; box-shadow: 0 0 50px currentColor, inset -5px -5px 12px rgba(0,0,0,0.5), inset 5px 5px 12px #fff; z-index: 1000; pointer-events: none; display: flex; justify-content: center; align-items: center; }

        /* RPG 與底部按鈕 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 2000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.5s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-box { width: 85%; max-width: 360px; background: rgba(10,5,15,0.95); border: 1px solid var(--solid-gold); border-radius: 12px; padding: 30px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        .modal-title { color: var(--gold); font-size: 1.2rem; letter-spacing: 4px; margin-bottom: 15px; }
        .modal-text { color: #ddd; font-size: 0.95rem; letter-spacing: 2px; line-height: 1.8; margin-bottom: 30px; }
        .rpg-btn { width: 100%; height: 45px; display: flex; justify-content: center; align-items: center; border-radius: 25px; border: 1px solid var(--cyan); color: var(--cyan); letter-spacing: 4px; font-size: 0.95rem; cursor: pointer; transition: 0.3s; }

        #footer { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 10; position: relative; }
        .tool-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--cyan); color: var(--cyan); padding: 10px 18px; border-radius: 20px; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<canvas id="zenCanvas"></canvas>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">第 1 關</div>
        <div class="info-tag">理順色相，歸於一處</div>
    </div>
</div>

<div id="scene">
    <div id="wandering-lotus">
        <svg viewBox="0 0 200 200" id="lotus-svg">
            <defs>
                <radialGradient id="lotusGrad" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fff" /><stop offset="60%" stop-color="#f3e5ab" /><stop offset="100%" stop-color="#d4af37" stop-opacity="0" />
                </radialGradient>
            </defs>
            <g transform="translate(100, 100)" id="lotus-group"></g>
        </svg>
    </div>

    <div id="carousel">
        </div>
</div>

<div id="footer">
    <div class="tool-btn" onclick="initLevel()">重整</div>
    <div class="tool-btn" style="border-color:#e63946; color:#e63946;" onclick="triggerHellEvent()">業力海</div>
    <div class="tool-btn" style="border-color:var(--solid-gold); color:var(--gold);" onclick="forceNextLevel()">過關 +10</div>
</div>

<div class="modal-overlay" id="rpg-modal">
    <div class="modal-box">
        <div class="modal-title" id="rpg-title"></div>
        <div class="modal-text" id="rpg-text"></div>
        <div class="rpg-btn" id="rpg-confirm" onclick="closeModal()">心領神會</div>
    </div>
</div>

<script>
    // --------------------------------------------------
    // 原生音效合成引擎 
    // --------------------------------------------------
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTone(freq, type, duration, vol) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function playSelectSound() { playTone(880, 'sine', 0.15, 0.4); } 
    function playJumpSound() { playTone(600, 'triangle', 0.3, 0.3); } 
    function playErrorSound() { playTone(150, 'sawtooth', 0.2, 0.3); } 
    function playWinSound() { playTone(432, 'sine', 2.0, 0.6); } 
    // --------------------------------------------------

    // 禪之亂流 Canvas 引擎
    const zenCanvas = document.getElementById('zenCanvas');
    const zCtx = zenCanvas.getContext('2d');
    let cw, ch;
    let orbs = [];
    const zenColors = [
        {r: 155, g: 93, b: 229}, {r: 0, g: 180, b: 216}, 
        {r: 212, g: 175, b: 55}, {r: 241, g: 91, b: 181}, {r: 3, g: 4, b: 94}
    ];
    let hellMode = false;

    function resizeCanvas() {
        cw = zenCanvas.width = window.innerWidth;
        ch = zenCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    for (let i = 0; i < 6; i++) {
        orbs.push({
            x: Math.random() * cw,
            y: Math.random() * ch,
            radius: (Math.random() * 200) + 150,
            color: zenColors[i % zenColors.length],
            vx: (Math.random() - 0.5) * 1.5,
            vy: (Math.random() - 0.5) * 1.5,
            angle: Math.random() * Math.PI * 2,
            angleSpeed: (Math.random() * 0.02) + 0.01
        });
    }

    function drawZen() {
        zCtx.fillStyle = hellMode ? 'rgba(15, 2, 5, 0.3)' : 'rgba(1, 2, 5, 0.2)';
        zCtx.fillRect(0, 0, cw, ch);
        zCtx.globalCompositeOperation = 'screen';

        for (let i = 0; i < orbs.length; i++) {
            let p = orbs[i];
            p.x += p.vx * (hellMode ? 4 : 1);
            p.y += p.vy * (hellMode ? 4 : 1);
            p.angle += p.angleSpeed;

            if (p.x < -p.radius || p.x > cw + p.radius) p.vx *= -1;
            if (p.y < -p.radius || p.y > ch + p.radius) p.vy *= -1;

            let currentRadius = p.radius + Math.sin(p.angle) * 50;
            let gradient = zCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, currentRadius);
            
            if (hellMode) {
                gradient.addColorStop(0, `rgba(230, 57, 70, 0.8)`);
                gradient.addColorStop(1, `rgba(100, 0, 0, 0)`);
            } else {
                gradient.addColorStop(0, `rgba(${p.color.r}, ${p.color.g}, ${p.color.b}, 0.6)`);
                gradient.addColorStop(1, `rgba(${p.color.r}, ${p.color.g}, ${p.color.b}, 0)`);
            }

            zCtx.beginPath();
            zCtx.arc(p.x, p.y, currentRadius, 0, Math.PI * 2);
            zCtx.fillStyle = gradient;
            zCtx.fill();
        }
        zCtx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(drawZen);
    }
    drawZen();

    // 蓮花繪製邏輯
    function drawLotus() {
        const group = document.getElementById('lotus-group');
        group.innerHTML = '';
        for(let i=0; i<12; i++) {
            let p1 = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p1.setAttribute("d", "M0,0 C15,-30 35,-60 0,-90 C-35,-60 -15,-30 0,0");
            p1.setAttribute("fill", "url(#lotusGrad)"); p1.setAttribute("transform", `rotate(${i*30})`); p1.setAttribute("opacity", "0.8");
            let p2 = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p2.setAttribute("d", "M0,0 C10,-20 20,-40 0,-60 C-20,-40 -10,-20 0,0");
            p2.setAttribute("fill", "url(#lotusGrad)"); p2.setAttribute("transform", `rotate(${i*30 + 15}) scale(0.8)`); p2.setAttribute("opacity", "0.9");
            group.appendChild(p1); group.appendChild(p2);
        }
    }

    // 遊戲資料與雙層排版
    const PALETTE = ['#e63946', '#2a9d8f', '#00b4d8', '#d4af37', '#9b5de5', '#fb8500', '#f4a261', '#ffb7c5'];
    const SHAPES = ['circle', 'square', 'triangle', 'diamond'];
    const MAX_ORBS = 4;
    let db = { level: 1, vessels: [], selectedIdx: null, isAnimating: false, carouselRotY: 0, radius: 0 };

    function generateLevelData(lv) {
        let totalVessels = Math.min(24, 4 + Math.floor(lv / 5)); 
        let colorTypes = Math.min(8, 2 + Math.floor(lv / 8));   
        let shapeTypes = lv >= 5 ? Math.min(4, 1 + Math.floor(lv / 15)) : 1; 
        
        let pool = [];
        let emptyVessels = totalVessels > 10 ? 3 : 2; 
        let itemsNeeded = (totalVessels - emptyVessels) * MAX_ORBS; 
        
        let combinations = [];
        for(let c=0; c<colorTypes; c++) {
            for(let s=0; s<shapeTypes; s++) combinations.push({ c: PALETTE[c], s: SHAPES[s] });
        }
        
        let comboIdx = 0;
        for(let i=0; i<itemsNeeded / MAX_ORBS; i++) {
            let targetCombo = combinations[comboIdx % combinations.length];
            for(let j=0; j<MAX_ORBS; j++) pool.push({ ...targetCombo });
            comboIdx++;
        }
        pool.sort(() => Math.random() - 0.5); 
        
        let vessels = [];
        for(let i=0; i<totalVessels; i++) vessels.push(i < totalVessels - emptyVessels ? pool.splice(0, MAX_ORBS) : []);
        return vessels;
    }

    function initLevel() {
        const carousel = document.getElementById('carousel');
        carousel.innerHTML = ''; 
        
        db.vessels = generateLevelData(db.level);
        db.selectedIdx = null; db.isAnimating = false;
        db.carouselRotY = 0; carousel.style.transform = `rotateY(0deg)`;
        
        const total = db.vessels.length;
        const rows = total > 12 ? 2 : 1;
        const vesselsPerRow = Math.ceil(total / rows); 
        db.radius = Math.round((60 / 2) / Math.tan(Math.PI / vesselsPerRow)) + 45; 

        for (let i = 0; i < total; i++) {
            const v = document.createElement('div');
            v.className = 'vessel'; v.id = `vsl-${i}`;
            
            let rowIdx = Math.floor(i / vesselsPerRow);
            let colIdx = i % vesselsPerRow;
            let theta = (360 / vesselsPerRow) * colIdx;
            
            let yOffset = 0;
            if (rows === 2) yOffset = rowIdx === 0 ? -95 : 95; 
            
            v.style.transform = `rotateY(${theta}deg) translateY(${yOffset}px) translateZ(${db.radius}px)`;
            v.dataset.theta = theta; 
            v.onclick = () => handleTap(i, theta);
            carousel.appendChild(v);
            renderOrbs(i);
        }
        updateShading();
        document.getElementById('lv-display').innerText = `第 ${db.level} 關`;
    }

    function renderOrbs(idx) {
        const v = document.getElementById(`vsl-${idx}`);
        v.querySelectorAll('.orb').forEach(o => o.remove());
        db.vessels[idx].forEach(data => {
            const orb = document.createElement('div');
            orb.className = 'orb'; orb.style.backgroundColor = data.c; orb.style.color = data.c;
            const shape = document.createElement('div');
            shape.className = `shape-inner shape-${data.s}`;
            orb.appendChild(shape);
            v.appendChild(orb);
        });
    }

    let isDragging = false, startX = 0;
    const carousel = document.getElementById('carousel');
    document.addEventListener('pointerdown', e => { initAudio(); isDragging = true; startX = e.clientX; carousel.style.transition = 'none'; });
    document.addEventListener('pointermove', e => {
        if (!isDragging) return;
        db.carouselRotY += (e.clientX - startX) * 0.4; startX = e.clientX;
        carousel.style.transform = `rotateY(${db.carouselRotY}deg)`;
        updateShading();
    });
    document.addEventListener('pointerup', () => { isDragging = false; carousel.style.transition = 'transform 0.5s ease-out'; });

    function updateShading() {
        document.querySelectorAll('.vessel').forEach(c => {
            let currentAngle = (parseFloat(c.dataset.theta) + db.carouselRotY) % 360;
            if(currentAngle < 0) currentAngle += 360;
            let dist = Math.min(currentAngle, 360 - currentAngle);
            if(dist > 85) { c.style.filter = 'brightness(0.3) blur(3px)'; c.style.pointerEvents = 'none'; } 
            else { c.style.filter = 'brightness(1) blur(0px)'; c.style.pointerEvents = 'auto'; }
        });
    }

    async function handleTap(idx, theta) {
        initAudio();
        if (db.isAnimating || isDragging) return;
        const targetEl = document.getElementById(`vsl-${idx}`);
        
        if (db.selectedIdx === null) {
            if (db.vessels[idx].length === 0) return;
            db.selectedIdx = idx; targetEl.classList.add('selected');
            playSelectSound();
        } else {
            const fromIdx = db.selectedIdx; const toIdx = idx;
            const fromEl = document.getElementById(`vsl-${fromIdx}`);
            if (fromIdx === toIdx) { fromEl.classList.remove('selected'); db.selectedIdx = null; return; }

            const fromArr = db.vessels[fromIdx]; const toArr = db.vessels[toIdx];
            const moveData = fromArr[fromArr.length - 1];

            if (toArr.length < MAX_ORBS && (toArr.length === 0 || (toArr[toArr.length-1].c === moveData.c && toArr[toArr.length-1].s === moveData.s))) {
                db.isAnimating = true; fromEl.classList.remove('selected');
                playJumpSound();
                
                db.carouselRotY = -theta;
                carousel.style.transform = `rotateY(${db.carouselRotY}deg)`;
                updateShading();

                await new Promise(r => setTimeout(r, 450));

                const poppedData = fromArr.pop();
                const topOrbEl = fromEl.querySelectorAll('.orb')[fromEl.querySelectorAll('.orb').length - 1];
                const fromRect = topOrbEl.getBoundingClientRect();
                topOrbEl.style.opacity = '0';

                const destX = targetEl.getBoundingClientRect().left + (targetEl.getBoundingClientRect().width - 36) / 2;
                const destY = targetEl.getBoundingClientRect().bottom - 5 - 40 * (toArr.length + 1);

                await animateOrbJump(fromRect.left, fromRect.top, destX, destY, poppedData);
                
                toArr.push(poppedData); renderOrbs(fromIdx); renderOrbs(toIdx);
                checkWin();
            } else { fromEl.classList.remove('selected'); playErrorSound(); }
            db.selectedIdx = null; db.isAnimating = false;
        }
    }

    function animateOrbJump(startX, startY, endX, endY, data) {
        return new Promise(resolve => {
            const jumper = document.createElement('div');
            jumper.className = 'orb-jump'; jumper.style.backgroundColor = data.c; jumper.style.color = data.c;
            const shape = document.createElement('div'); shape.className = `shape-inner shape-${data.s}`;
            jumper.appendChild(shape); document.body.appendChild(jumper);

            const animation = jumper.animate([
                { transform: `translate(${startX}px, ${startY}px) scale(1)` },
                { transform: `translate(${startX + (endX - startX)*0.5}px, ${Math.min(startY, endY) - 180}px) scale(1.3)` },
                { transform: `translate(${endX}px, ${endY}px) scale(1)` }
            ], { duration: 400, easing: 'cubic-bezier(0.25, 0.8, 0.25, 1)', fill: 'forwards' });

            animation.onfinish = () => { jumper.remove(); resolve(); };
        });
    }

    function checkWin() {
        if (db.vessels.every(v => v.length === 0 || (v.length === MAX_ORBS && v.every(item => item.c === v[0].c && item.s === v[0].s)))) {
            playWinSound(); db.level++; initLevel();
        }
    }
    
    function forceNextLevel() { db.level += 9; db.level++; initLevel(); }

    function triggerHellEvent() {
        playErrorSound(); hellMode = true; 
        document.getElementById('rpg-title').innerText = "業力顯前";
        document.getElementById('rpg-text').innerText = "六根攀緣引發業海波濤。請攝心專注，方能平息亂流。";
        document.getElementById('rpg-modal').classList.add('show');
        document.getElementById('rpg-confirm').onclick = () => { closeModal(); hellMode = false; };
    }

    function closeModal() { document.getElementById('rpg-modal').classList.remove('show'); }

    drawLotus(); initLevel();
</script>
</body>
</html>
