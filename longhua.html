<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 菩提心與等分法水</title>
    <style>
        :root {
            --bg-deep: #010204;
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; }

        #header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15); z-index: 10; position: relative;
            background: rgba(2, 3, 6, 0.5); backdrop-filter: blur(5px);
        }
        .lv-tag { letter-spacing: 3px; color: var(--gold); font-size: 1rem; font-weight: bold; }
        .info-tag { font-size: 0.75rem; color: var(--cyan); letter-spacing: 1px; margin-top: 5px; }

        /* 中心菩提心種子 (完全採用您的代碼) */
        #center-seed {
            position: absolute; top: 50%; left: 50%; width: 140px; height: 160px;
            margin-top: -80px; margin-left: -70px; pointer-events: none; z-index: 5;
        }

        #scene {
            flex: 1; display: flex; justify-content: center; align-items: center;
            perspective: 1200px; overflow: hidden; position: relative; z-index: 10;
        }
        
        #carousel {
            width: 50px; height: 160px; position: relative;
            transform-style: preserve-3d; transition: transform 0.1s ease-out;
        }

        /* ✨ 莊嚴 SVG 淨瓶與動態法水容器 */
        .vessel {
            position: absolute; top: 0; left: 0; width: 50px; height: 160px;
            cursor: pointer; transition: transform 0.3s, filter 0.3s;
        }

        /* 外層：擁有完整金色框線的 SVG 玻璃瓶 */
        .bottle-svg {
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none;
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.3)); transition: filter 0.3s;
        }

        /* 內層：動態水位的剪裁遮罩 (完美契合瓶身內部) */
        .water-mask {
            position: absolute; inset: 0; z-index: 1;
            clip-path: polygon(30% 0%, 70% 0%, 70% 12.5%, 90% 37.5%, 90% 87.5%, 70% 100%, 30% 100%, 10% 87.5%, 10% 37.5%, 30% 12.5%);
            display: flex; flex-direction: column-reverse; /* 水從底部往上疊加 */
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
        }

        /* ✨ 等分比例的法水區塊 */
        .water-segment {
            width: 100%; height: 25%; /* 每份佔 1/4 */
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.3), inset 0 -2px 6px rgba(0,0,0,0.4);
            transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s;
        }
        
        /* 賦予最上層水面明亮的高光折射 */
        .water-segment:last-child {
            box-shadow: inset 0 6px 8px rgba(255,255,255,0.7), inset 0 -2px 4px rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.8);
        }

        /* 點擊提舉效果 */
        .vessel.selected { transform: translateY(-15px); }
        .vessel.selected .bottle-svg { filter: drop-shadow(0 0 15px rgba(243, 229, 171, 0.8)); }
        .vessel.selected .water-mask { filter: brightness(1.3); }

        /* 躍遷水滴 (飛躍動畫用) */
        .orb-jump {
            position: fixed; width: 30px; height: 30px; border-radius: 50%;
            box-shadow: 0 0 35px currentColor, inset -5px -5px 12px rgba(0,0,0,0.3), inset 5px 5px 12px #fff;
            z-index: 1000; pointer-events: none;
        }

        #footer { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 10; position: relative; }
        .tool-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--cyan); color: var(--cyan); padding: 10px 18px; border-radius: 20px; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">第 1 關</div>
        <div class="info-tag">理順色相，轉識成智</div>
    </div>
</div>

<div id="scene">
    <div id="center-seed">
        <svg viewBox="0 0 100 150">
            <g transform="translate(0, 15)">
                <circle cx="50" cy="60" r="35" fill="none" stroke="#d4af37" stroke-width="0.8" stroke-dasharray="4 8" opacity="0.6">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 60" to="360 50 60" dur="40s" repeatCount="indefinite"/>
                </circle>
                <circle cx="50" cy="60" r="25" fill="none" stroke="#f3e5ab" stroke-width="0.5" stroke-dasharray="10 5" opacity="0.4">
                    <animateTransform attributeName="transform" type="rotate" from="360 50 60" to="0 50 60" dur="30s" repeatCount="indefinite"/>
                </circle>
                <circle cx="50" cy="60" r="4" fill="#fff" filter="drop-shadow(0 0 12px #d4af37)">
                    <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
                </circle>
                <path d="M50 40 L53 57 L70 60 L53 63 L50 80 L47 63 L30 60 L47 57 Z" fill="rgba(212,175,55,0.15)" stroke="#d4af37" stroke-width="0.6"/>
            </g>
        </svg>
    </div>

    <div id="carousel"></div>
</div>

<div id="footer">
    <div class="tool-btn" onclick="initLevel()">重整陣列</div>
    <div class="tool-btn" style="border-color:var(--solid-gold); color:var(--gold);" onclick="forceNextLevel()">過關 +10</div>
</div>

<script>
    // 原生音效
    let audioCtx = null;
    function initAudio() { try { if (!audioCtx) { const AC = window.AudioContext || window.webkitAudioContext; if(AC) audioCtx = new AC(); } if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); } catch(e) {} }
    function playTone(freq, type, duration, vol) { try { if (!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration); } catch(e) {} }
    function playSelectSound() { playTone(1200, 'sine', 0.1, 0.2); } 
    function playJumpSound() { playTone(800, 'triangle', 0.25, 0.15); } 
    function playErrorSound() { playTone(200, 'sawtooth', 0.2, 0.2); } 
    function playWinSound() { playTone(432, 'sine', 2.0, 0.4); } 

    // 背景引擎：星雲穿梭 + 清晰光球
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let cw, ch, stars = [], colorOrbs = [];
    const orbColors = ['rgba(230, 57, 70, 0.5)', 'rgba(0, 180, 216, 0.5)', 'rgba(212, 175, 55, 0.5)', 'rgba(155, 93, 229, 0.5)'];

    function resizeCanvas() { cw = canvas.width = window.innerWidth; ch = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    for(let i=0; i<150; i++) stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, size: Math.random() * 2 + 0.5 });
    for(let i=0; i<6; i++) colorOrbs.push({ x: Math.random() * cw, y: Math.random() * ch, radius: Math.random() * 100 + 60, color: orbColors[i % 4], vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5 });

    function drawBg() {
        ctx.fillStyle = '#010204'; ctx.fillRect(0, 0, cw, ch);
        ctx.globalCompositeOperation = 'screen';
        colorOrbs.forEach(orb => {
            orb.x += orb.vx; orb.y += orb.vy;
            if(orb.x < -orb.radius || orb.x > cw + orb.radius) orb.vx *= -1;
            if(orb.y < -orb.radius || orb.y > ch + orb.radius) orb.vy *= -1;
            let grad = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.radius);
            grad.addColorStop(0, orb.color); grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.beginPath(); ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI*2); ctx.fillStyle = grad; ctx.fill();
        });
        stars.forEach(s => {
            s.z -= 8; if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; }
            let scale = 800 / (800 + s.z); let px = cw / 2 + s.x * scale; let py = ch / 2 + s.y * scale;
            if (px > 0 && px < cw && py > 0 && py < ch) { ctx.beginPath(); ctx.arc(px, py, s.size * scale, 0, Math.PI*2); ctx.fillStyle = `rgba(255, 255, 255, ${scale})`; ctx.fill(); }
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(drawBg);
    }
    drawBg();

    // --------------------------------------------------
    // 核心邏輯：等分比例水
    // --------------------------------------------------
    const COLORS = [
        'rgba(230, 57, 70, 0.85)',  // 紅
        'rgba(42, 157, 143, 0.85)', // 綠
        'rgba(0, 180, 216, 0.85)',  // 藍
        'rgba(212, 175, 55, 0.85)', // 金
        'rgba(155, 93, 229, 0.85)', // 紫
        'rgba(251, 133, 0, 0.85)',  // 橘
        'rgba(255, 183, 197, 0.85)' // 粉
    ];
    const MAX_CAPACITY = 4; // 淨瓶最大等分數
    let db = { level: 1, vessels: [], selectedIdx: null, isAnimating: false, carouselRotY: 0, radius: 0 };

    // ✨ SVG 淨瓶邊框生成器 (絕對完整、不被截斷的金色描邊)
    function getBottleSVG() {
        return `
        <svg class="bottle-svg" viewBox="0 0 50 160" preserveAspectRatio="none">
            <polygon points="15,0 35,0 35,20 45,60 45,140 35,160 15,160 5,140 5,60 15,20" fill="none" stroke="#d4af37" stroke-width="1.5"/>
            <path d="M 15 20 L 5 60 L 5 140 M 35 20 L 45 60 L 45 140" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none"/>
        </svg>`;
    }

    function generateLevelData(lv) {
        let totalVessels = Math.min(18, 4 + Math.floor(lv / 5)); 
        let colorTypes = Math.min(7, totalVessels - 2);   
        let pool = [];
        for(let i=0; i < colorTypes; i++) { for(let j=0; j<MAX_CAPACITY; j++) pool.push(COLORS[i]); }
        pool.sort(() => Math.random() - 0.5); 
        
        let vessels = [];
        for(let i=0; i<totalVessels; i++) { vessels.push(i < colorTypes ? pool.splice(0, MAX_CAPACITY) : []); }
        return vessels;
    }

    function initLevel() {
        db.isAnimating = false; db.selectedIdx = null; isDragging = false; dragDelta = 0;
        const carousel = document.getElementById('carousel'); carousel.innerHTML = ''; 
        db.vessels = generateLevelData(db.level);
        db.carouselRotY = 0; carousel.style.transform = `rotateY(0deg)`;
        
        const total = db.vessels.length;
        const rows = total > 10 ? 2 : 1;
        const perRow = Math.ceil(total / rows); 
        db.radius = Math.round((50 / 2) / Math.tan(Math.PI / perRow)) + 65; 

        for (let i = 0; i < total; i++) {
            const v = document.createElement('div');
            v.className = 'vessel'; v.id = `vsl-${i}`;
            let rowIdx = Math.floor(i / perRow); let colIdx = i % perRow;
            let theta = (360 / perRow) * colIdx;
            let yOffset = rows === 2 ? (rowIdx === 0 ? -90 : 90) : 0; 
            
            v.style.transform = `rotateY(${theta}deg) translateY(${yOffset}px) translateZ(${db.radius}px)`;
            v.dataset.theta = theta; 
            
            // 注入 SVG 框線與水遮罩
            v.innerHTML = getBottleSVG() + `<div class="water-mask" id="mask-${i}"></div>`;
            v.onclick = () => handleTap(i, theta);
            carousel.appendChild(v);
            renderWater(i);
        }
        updateShading();
        document.getElementById('lv-display').innerText = `第 ${db.level} 關`;
    }

    // ✨ 渲染等分比例水
    function renderWater(idx) {
        const mask = document.getElementById(`mask-${idx}`);
        mask.innerHTML = '';
        db.vessels[idx].forEach(color => {
            const seg = document.createElement('div');
            seg.className = 'water-segment'; 
            seg.style.backgroundColor = color; 
            mask.appendChild(seg); // 因為是 column-reverse，先 append 的會沉在最底部
        });
    }

    // 滑動偵測
    let isDragging = false, startX = 0, dragDelta = 0;
    const carousel = document.getElementById('carousel');
    
    document.addEventListener('pointerdown', e => { 
        if (db.isAnimating || e.target.closest('.tool-btn')) return;
        initAudio(); isDragging = true; startX = e.clientX; dragDelta = 0; carousel.style.transition = 'none'; 
    });
    document.addEventListener('pointermove', e => {
        if (!isDragging) return;
        let delta = e.clientX - startX; dragDelta += Math.abs(delta); db.carouselRotY += delta * 0.4; startX = e.clientX;
        carousel.style.transform = `rotateY(${db.carouselRotY}deg)`; updateShading();
    });
    
    const endDrag = () => { if(isDragging) { isDragging = false; carousel.style.transition = 'transform 0.5s ease-out'; } };
    document.addEventListener('pointerup', endDrag); document.addEventListener('pointercancel', endDrag); document.addEventListener('pointerleave', endDrag);

    function updateShading() {
        document.querySelectorAll('.vessel').forEach(c => {
            let currentAngle = (parseFloat(c.dataset.theta) + db.carouselRotY) % 360;
            if(currentAngle < 0) currentAngle += 360;
            let dist = Math.min(currentAngle, 360 - currentAngle);
            if(dist > 85) { c.style.filter = 'brightness(0.3) opacity(0.6)'; } 
            else { c.style.filter = c.classList.contains('selected') ? 'brightness(1.2)' : 'brightness(1) opacity(1)'; }
        });
    }

    // ✨ 倒水邏輯
    async function handleTap(idx, theta) {
        initAudio();
        if (db.isAnimating || dragDelta > 5) return; 
        const targetEl = document.getElementById(`vsl-${idx}`);
        
        if (db.selectedIdx === null) {
            if (db.vessels[idx].length === 0) return;
            db.selectedIdx = idx; targetEl.classList.add('selected');
            updateShading(); playSelectSound();
        } else {
            const fromIdx = db.selectedIdx; const toIdx = idx;
            const fromEl = document.getElementById(`vsl-${fromIdx}`);
            if (fromIdx === toIdx) { fromEl.classList.remove('selected'); db.selectedIdx = null; updateShading(); return; }

            const fromArr = db.vessels[fromIdx]; const toArr = db.vessels[toIdx];
            const moveColor = fromArr[fromArr.length - 1];

            if (toArr.length < MAX_CAPACITY && (toArr.length === 0 || toArr[toArr.length-1] === moveColor)) {
                try {
                    db.isAnimating = true; fromEl.classList.remove('selected'); updateShading(); playJumpSound();
                    
                    db.carouselRotY = -theta; carousel.style.transform = `rotateY(${db.carouselRotY}deg)`; updateShading();
                    await new Promise(r => setTimeout(r, 400));

                    const poppedColor = fromArr.pop();
                    
                    // 視覺：源瓶子水面瞬間下降
                    renderWater(fromIdx); 

                    // 視覺：躍遷水滴飛躍
                    const fromRect = fromEl.getBoundingClientRect();
                    const destX = targetEl.getBoundingClientRect().left + (targetEl.getBoundingClientRect().width - 30) / 2;
                    // 計算目標水面高度 (每份水高 25%，約 40px)
                    const destY = targetEl.getBoundingClientRect().bottom - 20 - (toArr.length * 40);

                    await animateDropJump(fromRect.left + 10, fromRect.top + 20, destX, destY, poppedColor);
                    
                    // 視覺：目標瓶子水面上升
                    toArr.push(poppedColor); renderWater(toIdx);
                    checkWin();
                } catch(e) { console.warn(e); } 
                finally { db.selectedIdx = null; db.isAnimating = false; }
            } else { fromEl.classList.remove('selected'); db.selectedIdx = null; updateShading(); playErrorSound(); }
        }
    }

    // ✨ 水滴躍遷動畫
    function animateDropJump(startX, startY, endX, endY, color) {
        return new Promise(resolve => {
            const jumper = document.createElement('div');
            jumper.className = 'orb-jump'; jumper.style.backgroundColor = color; jumper.style.color = color;
            document.body.appendChild(jumper);

            const controlY = Math.min(startY, endY) - 150; 
            const deltaX = endX - startX;

            try {
                const animation = jumper.animate([
                    { transform: `translate(${startX}px, ${startY}px) scale(1)` },
                    { transform: `translate(${startX + deltaX*0.5}px, ${controlY}px) scale(1.3)` },
                    { transform: `translate(${endX}px, ${endY}px) scale(0.5)`, opacity: 0 }
                ], { duration: 350, easing: 'cubic-bezier(0.25, 0.8, 0.25, 1)', fill: 'forwards' });
                animation.onfinish = () => { jumper.remove(); resolve(); };
            } catch(e) { jumper.remove(); resolve(); }
            
            setTimeout(() => { if(jumper.parentNode) { jumper.remove(); resolve(); } }, 400); 
        });
    }

    function checkWin() {
        if (db.vessels.every(v => v.length === 0 || (v.length === MAX_CAPACITY && v.every(item => item === v[0])))) {
            playWinSound(); setTimeout(() => { db.level++; initLevel(); }, 1000);
        }
    }
    
    function forceNextLevel() { db.level += 9; db.level++; initLevel(); }

    initLevel();
</script>
</body>
</html>
