<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 每日觀心定課</title>
    <style>
        :root {
            --bg-deep: #010204; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
            --color-red: #ff4d4d; --color-cyan: #00e5ff; --color-gold: #ffe066;
            --color-purple: #d8b4fe; --color-green: #80ed99; --color-orange: #ffb703; --color-pink: #ffb7c5;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; }
        
        /* 中心單一呼吸光點 (無醜圖虛線) */
        #center-point {
            position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: #fff; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 5; pointer-events: none;
            filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 35px var(--solid-gold));
            animation: breathe 4s infinite alternate ease-in-out;
        }
        @keyframes breathe { 0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.4; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; } }

        #header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(212,175,55,0.15); z-index: 10; position: relative; background: rgba(1,2,4,0.4); backdrop-filter: blur(8px); }
        .lv-tag { letter-spacing: 3px; color: var(--gold); font-size: 1rem; font-weight: bold; }
        .info-tag { font-size: 0.72rem; color: var(--cyan); letter-spacing: 1px; margin-top: 5px; }

        #scene { flex: 1; display: flex; justify-content: center; align-items: center; perspective: 1200px; overflow: hidden; position: relative; z-index: 10; }
        #carousel { width: 100px; height: 180px; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }

        .vessel { position: absolute; top: 0; left: 0; width: 100px; height: 150px; cursor: pointer; transition: transform 0.3s; }
        .vessel.selected { transform: translateY(-15px); }
        .bottle-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        /* RPG 玻璃對話框 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); z-index: 2000; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.5s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-box { width: 85%; max-width: 360px; background: rgba(15,20,30,0.85); border: 1px solid var(--solid-gold); border-radius: 20px; padding: 30px 25px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .m-title { color: var(--gold); font-size: 1.1rem; letter-spacing: 4px; margin-bottom: 20px; border-bottom: 1px solid rgba(243,229,171,0.2); padding-bottom: 15px; }
        .m-text { font-size: 0.95rem; line-height: 1.8; margin-bottom: 30px; letter-spacing: 2px; color: #eee; }
        
        .m-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px 25px; border-radius: 25px; font-size: 0.9rem; cursor: pointer; margin: 5px; transition: 0.3s; letter-spacing: 2px; }
        .m-btn:active { background: rgba(243, 229, 171, 0.2); }
        .m-btn-prime { background: var(--solid-gold); color: #fff; border: none; }

        /* 躍遷水滴 */
        .drop-jump { position: fixed; width: 22px; height: 22px; border-radius: 50%; box-shadow: inset -3px -3px 8px rgba(0,0,0,0.5), inset 3px 3px 8px #fff; z-index: 1000; pointer-events: none; }

        #footer { padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; position: relative; }
        .tool-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--cyan); color: var(--cyan); padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<svg style="width:0; height:0; position:absolute;">
    <defs>
        <linearGradient id="grad-red" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff4d4d"/><stop offset="100%" stop-color="#800000"/></linearGradient>
        <linearGradient id="grad-cyan" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00e5ff"/><stop offset="100%" stop-color="#004d40"/></linearGradient>
        <linearGradient id="grad-gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffe066"/><stop offset="100%" stop-color="#8b6508"/></linearGradient>
        <linearGradient id="grad-purple" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d8b4fe"/><stop offset="100%" stop-color="#4a148c"/></linearGradient>
        <linearGradient id="grad-green" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#80ed99"/><stop offset="100%" stop-color="#1b5e20"/></linearGradient>
        <linearGradient id="grad-orange" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffb703"/><stop offset="100%" stop-color="#e65100"/></linearGradient>
        <linearGradient id="grad-pink" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffb7c5"/><stop offset="100%" stop-color="#880e4f"/></linearGradient>
        <linearGradient id="glass-glare" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="rgba(255,255,255,0.25)"/><stop offset="40%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.3)"/></linearGradient>
    </defs>
</svg>

<canvas id="bgCanvas"></canvas>
<div id="center-point"></div>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">琉璃定課</div>
        <div id="timer-ui" style="font-size:0.7rem; color:var(--gold); margin-top:4px; opacity:0.7;">心如止水...</div>
    </div>
    <div style="text-align:right;">
        <div class="info-tag" id="bag-ui">資糧累積：0/100</div>
    </div>
</div>

<div id="scene"><div id="carousel"></div></div>

<div id="footer">
    <div class="tool-btn" onclick="initLevel()">重整陣列</div>
    <div class="tool-btn" onclick="shareApp()">法施分享</div>
    <div class="tool-btn" style="border-color:var(--solid-gold); color:var(--gold);" onclick="triggerExit(true)">圓滿退場</div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <div class="m-title" id="m-title"></div>
        <div class="m-text" id="m-text"></div>
        <div id="m-actions"></div>
    </div>
</div>

<script>
    // --------------------------------------------------
    // 資料庫與初始化 (PX_V15.0)
    // --------------------------------------------------
    let db = JSON.parse(localStorage.getItem('PX_V15.0')) || { 
        waterLevel: 1, waterLastDate: "", tempBag: 0, points: 0, 
        treasures: { sword: 0, vase: 0, jewel: 0 } 
    };
    function saveDB() { localStorage.setItem('PX_V15.0', JSON.stringify(db)); }

    const COLORS = ['red', 'cyan', 'gold', 'purple', 'green', 'orange', 'pink'];
    const MAX_CAPACITY = 4; // 瓶頸為第4等分
    let game = { vessels: [], selectedIdx: null, isAnimating: false, rotY: 0, startTime: Date.now() };

    // --------------------------------------------------
    // 視覺引擎：還原妙依設計的淨瓶
    // --------------------------------------------------
    function getBottleSVG(idx) {
        return `
        <svg viewBox="0 0 100 150" class="bottle-svg">
            <defs><clipPath id="m-${idx}"><path d="M45,25 L55,25 L58,50 L72,95 L60,125 Q50,135 40,125 L28,95 L42,50 Z" /></clipPath></defs>
            <path d="M45,25 L55,25 L58,50 L72,95 L60,125 Q50,135 40,125 L28,95 L42,50 Z" fill="rgba(255,255,255,0.05)" />
            <g id="w-${idx}" clip-path="url(#m-${idx})"></g>
            <path d="M45,25 L55,25 L58,50 L72,95 L60,125 Q50,135 40,125 L28,95 L42,50 Z" fill="url(#glass-glare)" />
            <ellipse cx="50" cy="95" rx="22" ry="6" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" />
            <path d="M45,25 L55,25 L58,50 L72,95 L60,125 L40,125 L28,95 L42,50 Z" fill="none" stroke="#ffffff" stroke-width="1.5" />
            <path d="M40,125 Q50,135 60,125" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" />
        </svg>`;
    }

    function initLevel() {
        const today = new Date().toDateString();
        const isDone = db.waterLastDate === today;
        const carousel = document.getElementById('carousel'); carousel.innerHTML = '';
        game.selectedIdx = null; game.isAnimating = false; game.startTime = Date.now();
        
        // 核心邏輯：一日一關
        const lv = db.waterLevel;
        let totalVessels = Math.min(16, 4 + Math.floor(lv / 6));
        let colorCount = totalVessels - 2;
        let pool = [];
        for(let i=0; i<colorCount; i++) { for(let j=0; j<3; j++) pool.push(COLORS[i % COLORS.length]); }
        pool.sort(() => Math.random() - 0.5);
        
        game.vessels = [];
        for(let i=0; i<totalVessels; i++) game.vessels.push(i < colorCount ? pool.splice(0, 3) : []);

        const radius = Math.round((100 / 2) / Math.tan(Math.PI / totalVessels)) + 70;
        game.vessels.forEach((content, i) => {
            const v = document.createElement('div'); v.className = 'vessel'; v.id = `v-${i}`;
            let theta = (360 / totalVessels) * i;
            v.style.transform = `rotateY(${theta}deg) translateZ(${radius}px)`;
            v.dataset.theta = theta;
            v.innerHTML = getBottleSVG(i);
            if (!isDone) v.onclick = () => handleTap(i, theta);
            carousel.appendChild(v);
            renderWater(i);
        });

        document.getElementById('lv-display').innerText = `第 ${lv} 關`;
        document.getElementById('bag-ui').innerText = `資糧累積：${db.tempBag}/100`;
        if(isDone) {
            document.getElementById('timer-ui').innerText = "今日圓滿 ‧ 靜心觀想";
            setTimeout(() => { triggerExit(false); }, 1000);
        } else {
            startTimer();
        }
    }

    function renderWater(idx) {
        const g = document.getElementById(`w-${idx}`); g.innerHTML = '';
        const slots = [{y:104, h:28}, {y:78, h:26}, {y:52, h:26}];
        game.vessels[idx].forEach((c, i) => {
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("x", "0"); rect.setAttribute("y", slots[i].y); rect.setAttribute("width", "100"); rect.setAttribute("height", slots[i].h);
            rect.setAttribute("fill", `url(#grad-${c})`); g.appendChild(rect);
        });
    }

    // --------------------------------------------------
    // ✨ 最短路徑旋轉邏輯 (Bug 修復)
    // --------------------------------------------------
    async function handleTap(idx, theta) {
        if (game.isAnimating) return;
        const targetEl = document.getElementById(`v-${idx}`);
        
        if (game.selectedIdx === null) {
            if (game.vessels[idx].length === 0) return;
            game.selectedIdx = idx; targetEl.classList.add('selected');
        } else {
            const fromIdx = game.selectedIdx; const toIdx = idx;
            const fromEl = document.getElementById(`v-${fromIdx}`);
            if (fromIdx === toIdx) { fromEl.classList.remove('selected'); game.selectedIdx = null; return; }

            const fromArr = game.vessels[fromIdx]; const toArr = game.vessels[toIdx];
            const moveColor = fromArr[fromArr.length - 1];

            if (toArr.length < 3 && (toArr.length === 0 || toArr[toArr.length-1] === moveColor)) {
                game.isAnimating = true; fromEl.classList.remove('selected');
                
                // ✨ 最短路徑計算
                let diff = ((-theta) - game.rotY + 540) % 360 - 180;
                game.rotY += diff;
                document.getElementById('carousel').style.transform = `rotateY(${game.rotY}deg)`;
                
                await new Promise(r => setTimeout(r, 450));
                fromArr.pop(); renderWater(fromIdx);
                
                // 躍遷水滴
                const fromRect = fromEl.getBoundingClientRect();
                const toRect = targetEl.getBoundingClientRect();
                await animateJump(fromRect.left + 40, fromRect.top + 40, toRect.left + 40, toRect.top + 60, moveColor);
                
                toArr.push(moveColor); renderWater(toIdx);
                checkWin();
            } else { fromEl.classList.remove('selected'); }
            game.selectedIdx = null; game.isAnimating = false;
        }
    }

    function animateJump(sx, sy, ex, ey, cid) {
        return new Promise(resolve => {
            const j = document.createElement('div'); j.className = 'drop-jump'; j.style.background = `var(--color-${cid})`;
            document.body.appendChild(j);
            const anim = j.animate([
                { transform: `translate(${sx}px, ${sy}px) scale(1)`, opacity: 1 },
                { transform: `translate(${(sx+ex)/2}px, ${Math.min(sy,ey)-150}px) scale(1.5)`, opacity: 1 },
                { transform: `translate(${ex}px, ${ey}px) scale(0.5)`, opacity: 0 }
            ], { duration: 400, easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)' });
            anim.onfinish = () => { j.remove(); resolve(); };
        });
    }

    // --------------------------------------------------
    // 結算與 RPG 經典事件
    // --------------------------------------------------
    const SCRIPTURES = [
        { t: "釋迦如來 ‧ 演說大經", c: "【發菩提心，一向專念】。此三輩往生之根本，行者當攝心入定。", b: "南無本師釋迦牟尼佛" },
        { t: "法藏比丘 ‧ 弘願顯現", c: "【設我得佛，十方眾生，至心信樂】。四十八願，願願皆為導歸極樂。", b: "南無阿彌陀佛" },
        { t: "地藏菩薩 ‧ 業海清涼", c: "【眾生度盡，方證菩提】。一念歸依，大願墨綠法光即現，鎮伏業海。", b: "南無地藏王菩薩" },
        { t: "大勢至 ‧ 念佛圓通", c: "【都攝六根，淨念相繼】。如子憶母，法界白光恆常護念。", b: "南無大勢至菩薩" }
    ];

    function checkWin() {
        if (game.vessels.every(v => v.length === 0 || (v.length === 3 && v.every(c => c === v[0])))) {
            const today = new Date().toDateString();
            db.waterLastDate = today; db.waterLevel++; db.tempBag += 10;
            
            // 每20關法寶掉落
            if (db.waterLevel % 20 === 0) {
                const ts = ['sword', 'vase', 'jewel'];
                db.treasures[ts[Math.floor(Math.random()*3)]]++;
            }
            saveDB();
            
            // 過關特效：白霧爆發 (Warp Speed)
            document.getElementById('center-point').animate([{scale:1, opacity:1}, {scale:100, opacity:0}], {duration: 800});
            
            setTimeout(() => {
                if (db.waterLevel % 5 === 0) {
                    const s = SCRIPTURES[Math.floor(Math.random()*SCRIPTURES.length)];
                    showModal(s.t, s.c, s.b, () => triggerExit(false));
                } else {
                    triggerExit(false);
                }
            }, 800);
        }
    }

    function triggerExit(isManual) {
        const title = isManual ? "法水觀心 ‧ 暫歇" : "今日修持 ‧ 圓滿";
        let text = "放下手機，請給身邊的人一個微笑，或在心中默默感恩。清淨即在當下。";
        
        let html = `<button class="m-btn" onclick="shareApp()">法施分享</button>`;
        if (db.tempBag >= 100) {
            html += `<button class="m-btn m-btn-prime" onclick="syncPoints()">資糧結集 (${db.tempBag})</button>`;
        } else {
            html += `<button class="m-btn" onclick="window.location.href='index.html'">歸返道場</button>`;
        }
        
        showModal(title, text, null, null, html);
    }

    function showModal(title, text, btnText, callback, customHtml) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-text').innerText = text;
        const actions = document.getElementById('m-actions');
        actions.innerHTML = customHtml || `<button class="m-btn m-btn-prime" onclick="closeModal(${callback ? 'true' : 'false'})">${btnText}</button>`;
        window.currentCallback = callback;
        document.getElementById('modal').classList.add('show');
    }

    function closeModal(runCallback) {
        document.getElementById('modal').classList.remove('show');
        if(runCallback && window.currentCallback) window.currentCallback();
    }

    function syncPoints() {
        db.points += db.tempBag; db.tempBag = 0; saveDB();
        window.location.href = 'index.html';
    }

    function startTimer() {
        const limit = (30 + Math.floor(db.waterLevel / 5)) * 60 * 1000;
        const check = setInterval(() => {
            const elapsed = Date.now() - game.startTime;
            if (elapsed > limit) {
                clearInterval(check);
                showModal("超時提醒", "一念執著，心神已疲。請暫且放下，明日再來理順。", "安住呼吸", () => window.location.href='index.html');
            }
            const min = Math.floor((limit - elapsed) / 60000);
            document.getElementById('timer-ui').innerText = `觀心餘時：${min} 分鐘`;
        }, 10000);
    }

    function shareApp() {
        if (navigator.share) {
            navigator.share({ title: '淨流 ‧ 生活紀錄', url: window.location.href.split('?')[0] });
        } else {
            alert("隨喜功德！網址已可分享。");
        }
    }

    // --------------------------------------------------
    // 背景與拖曳 (略過部分重複背景代碼，保持核心)
    // --------------------------------------------------
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let cw, ch; function res() { cw=canvas.width=window.innerWidth; ch=canvas.height=window.innerHeight; }
    window.addEventListener('resize', res); res();
    function draw() {
        ctx.fillStyle = '#010204'; ctx.fillRect(0,0,cw,ch);
        // ... (背景星空邏輯)
        requestAnimationFrame(draw);
    }
    draw();

    // 觸控旋轉防死機
    let isD = false, sx = 0;
    document.addEventListener('pointerdown', e => { if(game.isAnimating) return; isD = true; sx = e.clientX; });
    document.addEventListener('pointermove', e => {
        if(!isD) return;
        let dx = e.clientX - sx; game.rotY += dx * 0.4; sx = e.clientX;
        document.getElementById('carousel').style.transform = `rotateY(${game.rotY}deg)`;
    });
    document.addEventListener('pointerup', () => isD = false);

    initLevel();
</script>
</body>
</html>
