<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 第一章：禪圓見性</title>
    <style>
        :root {
            --bg: #000000;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
            touch-action: none;
        }

        /* ✨ 自主律動禪圓背景 */
        #bg-canvas {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #050508 0%, #000 100%);
        }

        #header {
            padding: 20px 25px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1); backdrop-filter: blur(10px);
            z-index: 10;
        }
        .lv-tag { letter-spacing: 3px; color: var(--gold); font-size: 0.9rem; font-weight: bold; }
        .merit-tag { font-size: 0.75rem; color: var(--cyan); letter-spacing: 1px; }

        /* ✨ 萬德蓮華區 */
        #lotus-stage {
            height: 25vh; display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 5;
        }
        #main-lotus {
            width: 160px; height: 160px; filter: drop-shadow(0 0 20px rgba(212,175,55,0.3));
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ✨ 琉璃瓶區域 */
        #game-grid {
            flex: 1; display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; padding: 10px 40px; justify-items: center; align-content: center;
            z-index: 10;
        }

        .bottle {
            width: 52px; height: 145px; position: relative; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }
        .bottle.selected { transform: translateY(-20px); filter: brightness(1.2); }
        
        .bottle-body {
            width: 100%; height: 100%; border: 1.5px solid rgba(243, 229, 171, 0.2);
            border-radius: 6px 6px 20px 20px; overflow: hidden;
            background: var(--glass); backdrop-filter: blur(5px);
        }

        .liquid {
            position: absolute; left: 0; width: 100%; transition: all 0.5s ease;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        /* 無明蔽心：11關後啟動 */
        .liquid.hidden-layer { 
            background: #222 !important; filter: contrast(0.5) !important; 
        }
        .liquid.hidden-layer::after {
            content: '?'; position: absolute; width: 100%; text-align: center;
            top: 20%; color: #444; font-size: 10px; font-weight: bold;
        }

        #footer { padding: 20px; display: flex; justify-content: center; z-index: 10; }
        .reset-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--cyan);
            color: var(--cyan); padding: 8px 20px; border-radius: 20px;
            font-size: 0.8rem; letter-spacing: 2px; cursor: pointer;
        }

        #toast {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
            color: var(--gold); letter-spacing: 4px; font-size: 0.95rem;
            opacity: 0; transition: 0.8s; pointer-events: none; z-index: 100;
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="header">
    <div class="lv-tag" id="lv-display">第一重 ‧ 禪圓見性</div>
    <div class="merit-tag">資糧：<span id="merit-count">0</span></div>
</div>

<div id="lotus-stage">
    <svg id="main-lotus" viewBox="0 0 200 200">
        <defs>
            <radialGradient id="lotusGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff" />
                <stop offset="70%" stop-color="#f3e5ab" />
                <stop offset="100%" stop-color="#d4af37" stop-opacity="0" />
            </radialGradient>
        </defs>
        <g id="lotus-group" transform="translate(100, 100)"></g>
    </svg>
</div>

<div id="game-grid"></div>

<div id="footer">
    <div class="reset-btn" onclick="resetGame()">重整心識</div>
</div>

<div id="toast"></div>

<script>
    const COLORS = {
        'r': '#e63946', 'g': '#2a9d8f', 'b': '#00b4d8', 
        'y': '#d4af37', 'p': '#9b5de5', 'o': '#ff9f1c'
    };

    let db = {
        level: 1, merit: 0,
        bottles: [], selected: null, isAnimating: false,
        time: 0, angleX: 0.3, angleY: 0
    };

    // ✨ 禪圓自主背景引擎
    function initBackground() {
        const cvs = document.getElementById('bg-canvas');
        const ctx = cvs.getContext('2d');
        let width, height;
        let ensoParticles = [];

        const resize = () => {
            width = cvs.width = window.innerWidth;
            height = cvs.height = window.innerHeight;
        };
        window.addEventListener('resize', resize); resize();

        // 構建無相禪圓粒子
        for(let i=0; i<1200; i++) {
            let theta = Math.random() * Math.PI * 2;
            if(theta > 0 && theta < 0.5 && Math.random() > 0.1) continue; // 刻意留下一點缺口
            ensoParticles.push({
                r: 180 + (Math.random()-0.5)*30,
                theta: theta,
                z: (Math.random()-0.5)*60,
                s: Math.random()*1.5 + 0.5,
                c: Math.random() > 0.8 ? '#ffffff' : '#d4af37'
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            db.time += 0.01;
            db.angleY += 0.003; // 自主慢速旋轉
            let breath = 1 + Math.sin(db.time * 0.5) * 0.1; // 空間呼吸感

            const cosX = Math.cos(db.angleX), sinX = Math.sin(db.angleX);
            const cosY = Math.cos(db.angleY), sinY = Math.sin(db.angleY);

            ctx.globalCompositeOperation = 'screen';
            ensoParticles.forEach(p => {
                let currR = p.r * breath;
                let x = Math.cos(p.theta) * currR;
                let y = Math.sin(p.theta) * currR;
                let z = p.z;

                // 3D 投影
                let x1 = x * cosY - z * sinY;
                let z1 = x * sinY + z * cosY;
                let y2 = y * cosX - z1 * sinX;
                let z2 = y * sinX + z1 * cosX;

                let scale = 400 / (400 + z2);
                let px = width/2 + x1 * scale;
                let py = height/2 - y2 * scale;

                if(scale > 0) {
                    ctx.fillStyle = p.c;
                    ctx.globalAlpha = scale * 0.6;
                    ctx.beginPath();
                    ctx.arc(px, py, p.s * scale, 0, Math.PI*2);
                    ctx.fill();
                }
            });
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(draw);
        }
        draw();
    }

    // ✨ 萬德蓮華生長引擎
    function updateLotus() {
        const group = document.getElementById('lotus-group');
        group.innerHTML = '';
        const layers = 2 + Math.floor(db.level / 8);
        const rot = (db.time * 20) % 360;
        const scale = 0.8 + (db.merit % 500) / 2000;

        document.getElementById('main-lotus').style.transform = `rotate(${rot}deg) scale(${scale})`;

        for (let l = 0; l < layers; l++) {
            const count = 8 + l * 4;
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * 360 + (l * 25);
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", "M0,0 C10,-15 20,-30 0,-55 C-20,-30 -10,-15 0,0");
                path.setAttribute("fill", "url(#lotusGrad)");
                path.setAttribute("opacity", 0.7 - l * 0.15);
                path.setAttribute("transform", `rotate(${angle}) scale(${1 - l * 0.2})`);
                group.appendChild(path);
            }
        }
    }

    // ✨ 核心遊戲邏輯
    function initLevel() {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';
        db.bottles = []; db.selected = null;

        // 難度演算法：1-5關極簡，6-10關中等，11關後啟動魔障
        let colorNum = db.level <= 5 ? 2 : (db.level <= 10 ? 3 : Math.min(6, 4 + Math.floor((db.level-10)/3)));
        let bottleNum = colorNum + (db.level <= 5 ? 1 : 2);
        
        let pool = [];
        const keys = Object.keys(COLORS).slice(0, colorNum);
        keys.forEach(k => { for(let i=0; i<4; i++) pool.push(k); });
        pool.sort(() => Math.random() - 0.5);

        for (let i = 0; i < bottleNum; i++) {
            let content = (i < colorNum) ? pool.splice(0, 4) : [];
            db.bottles.push(content);
            
            const b = document.createElement('div');
            b.className = 'bottle'; b.id = `btl-${i}`;
            b.onclick = () => handleTap(i);
            const body = document.createElement('div'); body.className = 'bottle-body';
            b.appendChild(body); grid.appendChild(b);
            renderLiquids(i);
        }
        
        document.getElementById('lv-display').innerText = `第 ${db.level} 重 ‧ ${db.level >= 11 ? '無明考驗' : '禪圓見性'}`;
    }

    function renderLiquids(idx) {
        const body = document.getElementById(`btl-${idx}`).querySelector('.bottle-body');
        body.querySelectorAll('.liquid').forEach(l => l.remove());
        
        db.bottles[idx].forEach((c, i) => {
            const l = document.createElement('div');
            l.className = 'liquid';
            l.style.height = '25%'; l.style.bottom = (i * 25) + '%';
            l.style.backgroundColor = COLORS[c];
            l.style.boxShadow = `inset 0 0 10px rgba(255,255,255,0.2), 0 0 10px ${COLORS[c]}`;
            
            // 11關後的無明魔障：隱藏最底下的顏色
            if(db.level >= 11 && i === 0 && db.bottles[idx].length > 1) {
                l.classList.add('hidden-layer');
            }
            body.appendChild(l);
        });
    }

    async function handleTap(idx) {
        if (db.isAnimating) return;
        
        if (db.selected === null) {
            if (db.bottles[idx].length === 0) return;
            db.selected = idx;
            document.getElementById(`btl-${idx}`).classList.add('selected');
        } else {
            const from = db.bottles[db.selected];
            const to = db.bottles[idx];
            
            if (db.selected !== idx && to.length < 4 && (to.length === 0 || to[to.length-1] === from[from.length-1])) {
                db.isAnimating = true;
                const moveColor = from[from.length-1];
                while(from.length > 0 && from[from.length-1] === moveColor && to.length < 4) {
                    to.push(from.pop());
                    renderLiquids(db.selected); renderLiquids(idx);
                    await new Promise(r => setTimeout(r, 200));
                }
                checkWin();
            }
            document.getElementById(`btl-${db.selected}`).classList.remove('selected');
            db.selected = null; db.isAnimating = false;
        }
    }

    function checkWin() {
        const win = db.bottles.every(b => b.length === 0 || (b.length === 4 && b.every(v => v === b[0])));
        if (win) {
            db.merit += 100;
            document.getElementById('merit-count').innerText = db.merit;
            showToast("清淨資糧 ‧ 圓滿歸位");
            setTimeout(() => {
                db.level++;
                if (db.level >= 20) {
                    showToast("第一章圓滿，即將轉入下一分頁");
                    // 這裡未來可以跳轉至 game2.html
                } else {
                    initLevel();
                }
            }, 1500);
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 2000);
    }

    function resetGame() { initLevel(); }

    initBackground();
    initLevel();
    setInterval(updateLotus, 100);
</script>
</body>
</html>
