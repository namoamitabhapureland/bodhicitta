<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 - 三層聚焦與禪之亂流測試</title>
    <style>
        :root { --gold: #f3e5ab; --cyan: #8ba89c; }
        body { 
            margin: 0; background: #010204; color: #fff; overflow: hidden; height: 100dvh; 
            font-family: sans-serif; -webkit-touch-callout: none; user-select: none; touch-action: none;
        }

        /* ✨ 激烈律動的「禪之亂流」背景 */
        #zen-chaos-bg {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: -1;
            /* 使用極端對比的漸層來凸顯旋轉感 */
            background: radial-gradient(circle at center, rgba(30,5,15,1) 0%, rgba(2,3,6,1) 40%, rgba(20,5,10,1) 100%);
            /* 呼大呼小 + 激烈旋轉的複合動畫 */
            animation: zenBreath 8s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        }
        
        /* 加入飄移的光斑增加混沌感 */
        #zen-chaos-bg::after {
            content: ''; position: absolute; inset: 0;
            background: repeating-conic-gradient(from 0deg, transparent 0deg 20deg, rgba(212,175,55,0.05) 20deg 40deg);
            animation: zenSpin 12s linear infinite;
        }

        @keyframes zenBreath {
            0% { transform: scale(0.8) rotate(0deg) translate(0, 0); filter: brightness(0.8) contrast(1.2); }
            50% { transform: scale(1.5) rotate(90deg) translate(5%, 5%); filter: brightness(1.2) contrast(1.5); }
            100% { transform: scale(1) rotate(180deg) translate(-5%, -5%); filter: brightness(1) contrast(2); }
        }
        @keyframes zenSpin { 100% { transform: rotate(-360deg); } }

        /* ✨ 3D 場景與三層架構 */
        #scene {
            position: absolute; inset: 0; top: 80px; bottom: 80px;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px; overflow: hidden;
        }

        .tier {
            position: absolute; top: 50%; left: 50%;
            transform-style: preserve-3d;
            /* 極度滑順的 Z軸穿梭與縮放過渡 */
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.6s, filter 0.6s;
        }

        /* 核心：透過 body 的 data-focus 屬性，
           精準控制哪一層在正前方放大，哪一層退縮到上下方模糊 
        */
        
        /* 1. 當聚焦【上層】時 */
        body[data-focus="top"] #tier-top { transform: translateY(0) translateZ(150px) scale(1.2); opacity: 1; filter: blur(0); z-index: 10; }
        body[data-focus="top"] #tier-mid { transform: translateY(220px) translateZ(-300px) scale(0.7); opacity: 0.4; filter: blur(4px); pointer-events: none; }
        body[data-focus="top"] #tier-bot { transform: translateY(380px) translateZ(-500px) scale(0.4); opacity: 0.1; filter: blur(8px); pointer-events: none; }

        /* 2. 當聚焦【中層】時 (預設) */
        body[data-focus="mid"] #tier-top { transform: translateY(-220px) translateZ(-300px) scale(0.7); opacity: 0.4; filter: blur(4px); pointer-events: none; }
        body[data-focus="mid"] #tier-mid { transform: translateY(0) translateZ(150px) scale(1.2); opacity: 1; filter: blur(0); z-index: 10; }
        body[data-focus="mid"] #tier-bot { transform: translateY(220px) translateZ(-300px) scale(0.7); opacity: 0.4; filter: blur(4px); pointer-events: none; }

        /* 3. 當聚焦【下層】時 */
        body[data-focus="bot"] #tier-top { transform: translateY(-380px) translateZ(-500px) scale(0.4); opacity: 0.1; filter: blur(8px); pointer-events: none; }
        body[data-focus="bot"] #tier-mid { transform: translateY(-220px) translateZ(-300px) scale(0.7); opacity: 0.4; filter: blur(4px); pointer-events: none; }
        body[data-focus="bot"] #tier-bot { transform: translateY(0) translateZ(150px) scale(1.2); opacity: 1; filter: blur(0); z-index: 10; }

        /* 極簡測試用法器 (只有框，證明空間感) */
        .vessel {
            position: absolute; width: 40px; height: 120px;
            margin-top: -60px; margin-left: -20px; /* 置中偏移 */
            border: 2px solid rgba(255,255,255,0.4); border-top: none;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center; font-size: 1.5rem;
            transition: 0.2s; cursor: pointer;
        }
        /* 點擊時的提舉感測試 */
        .vessel:active { transform: translateY(-15px) !important; border-color: var(--gold); background: rgba(212,175,55,0.2); }

        /* UI 按鈕區 */
        #ui-top { position: absolute; top: 20px; width: 100%; text-align: center; letter-spacing: 2px; font-weight: bold; color: var(--gold); }
        #ui-bottom { 
            position: absolute; bottom: 30px; width: 100%; 
            display: flex; justify-content: center; gap: 15px; z-index: 100;
        }
        .btn {
            background: rgba(255,255,255,0.1); border: 1px solid var(--cyan); color: var(--cyan);
            padding: 12px 25px; border-radius: 25px; font-size: 0.9rem; letter-spacing: 2px; cursor: pointer;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .btn.active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }
    </style>
</head>
<body data-focus="mid"> <div id="zen-chaos-bg"></div>

<div id="ui-top">立體層級切換測試</div>

<div id="scene">
    <div id="tier-top" class="tier"></div>
    <div id="tier-mid" class="tier"></div>
    <div id="tier-bot" class="tier"></div>
</div>

<div id="ui-bottom">
    <div class="btn" id="btn-top" onclick="setFocus('top')">上層</div>
    <div class="btn active" id="btn-mid" onclick="setFocus('mid')">中層</div>
    <div class="btn" id="btn-bot" onclick="setFocus('bot')">下層</div>
</div>

<script>
    // 建立三層的測試容器 (每層 12 個)
    const tiers = ['top', 'mid', 'bot'];
    const radius = 160; 

    tiers.forEach((tierName, tierIndex) => {
        const tierEl = document.getElementById(`tier-${tierName}`);
        for(let i=0; i<12; i++) {
            const v = document.createElement('div');
            v.className = 'vessel';
            // 給個標記證明是哪一層
            v.innerHTML = ['上', '中', '下'][tierIndex]; 
            
            let theta = (360 / 12) * i;
            // 先只做 Y軸旋轉跟 Z軸推遠成圓環，Y軸高度由 CSS 切換控制
            v.style.transform = `rotateY(${theta}deg) translateZ(${radius}px)`;
            tierEl.appendChild(v);
        }
    });

    // ✨ 聚焦切換邏輯
    function setFocus(target) {
        document.body.setAttribute('data-focus', target);
        
        // 更新按鈕樣式
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${target}`).classList.add('active');
    }

    // ✨ 360度滑動旋轉 (同步轉動三層)
    let isDragging = false, startX = 0, rotY = 0;
    
    document.addEventListener('pointerdown', e => { isDragging = true; startX = e.clientX; });
    document.addEventListener('pointermove', e => {
        if(!isDragging) return;
        let deltaX = e.clientX - startX;
        startX = e.clientX;
        rotY += deltaX * 0.4;
        
        // 將旋轉角度同時套用到三層的內部 transform
        // 注意：為了不覆蓋 CSS 寫好的 translateZ 聚焦動畫，
        // 我們這裡只旋轉裝載容器的 div (.tier)，這正是 3D 引擎的奧妙
        tiers.forEach(t => {
            document.getElementById(`tier-${t}`).style.transform = `rotateY(${rotY}deg)`;
        });
    });
    document.addEventListener('pointerup', () => isDragging = false);

</script>
</body>
</html>
