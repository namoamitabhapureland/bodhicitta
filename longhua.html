<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德</title>
    <style>
        :root {
            --bg: #020205;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: "PingFang TC", serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            height: 100dvh;
        }

        /* ✨ 背景虛空質感 */
        #universe {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 30%, #150d1f 0%, #020205 80%);
        }

        /* ✨ 頂部進度列 (妳要求的小圖示呈現) */
        #header {
            width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center;
            z-index: 10; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        .level-info { display: flex; align-items: center; gap: 10px; color: var(--gold); letter-spacing: 2px; }
        .progress-icons { display: flex; gap: 5px; }
        .prog-icon { width: 12px; height: 12px; border-radius: 50%; border: 1px solid var(--solid-gold); opacity: 0.3; }
        .prog-icon.active { background: var(--solid-gold); opacity: 1; box-shadow: 0 0 8px var(--solid-gold); }

        /* ✨ 中央蓮花 (萬日生長算法核心) */
        #lotus-altar {
            margin-top: 30px; width: 220px; height: 220px; position: relative;
            display: flex; justify-content: center; align-items: center;
        }
        #lotus-svg {
            width: 100%; height: 100%; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
            animation: lotusBreath 4s infinite alternate ease-in-out;
        }
        @keyframes lotusBreath {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.05); filter: brightness(1.3) drop-shadow(0 0 40px rgba(212, 175, 55, 0.6)); }
        }

        /* ✨ 遊戲區：琉璃瓶排列 */
        #game-grid {
            flex: 1; width: 100%; display: flex; flex-wrap: wrap; 
            justify-content: center; align-content: center; gap: 20px; padding: 20px;
        }

        .bottle {
            width: 50px; height: 140px; border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 0 0 15px 15px; position: relative; cursor: pointer;
            overflow: hidden; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(5px);
        }
        .bottle.selected { transform: translateY(-20px); border-color: var(--gold); box-shadow: 0 0 20px rgba(243, 229, 171, 0.4); }
        
        .liquid-layer {
            position: absolute; bottom: 0; left: 0; width: 100%;
            transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* ✨ 功能按鈕 */
        #footer { width: 100%; padding: 30px; display: flex; justify-content: space-around; }
        .btn {
            background: rgba(212, 175, 55, 0.1); border: 1px solid var(--solid-gold);
            color: var(--gold); padding: 10px 20px; border-radius: 20px;
            font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); background: rgba(212, 175, 55, 0.3); }

        #toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15, 15, 20, 0.95); border: 1px solid var(--solid-gold);
            padding: 20px 40px; border-radius: 15px; opacity: 0; pointer-events: none;
            transition: 0.5s; z-index: 1000; text-align: center;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div id="universe"></div>

<div id="header">
    <div class="level-info">
        <span id="lv-text">第 1 關</span>
        <div class="progress-icons" id="prog-dots"></div>
    </div>
    <div id="hint-btn" class="btn" style="padding: 5px 15px; font-size: 0.7rem;" onclick="useHint()">般若之眼 (1)</div>
</div>

<div id="lotus-altar">
    <svg id="lotus-svg" viewBox="0 0 200 200">
        <g id="lotus-g" transform="translate(100, 100)"></g>
    </svg>
</div>

<div id="game-grid" id="bottle-container"></div>

<div id="footer">
    <button class="btn" onclick="resetLevel()">重整心識</button>
    <button class="btn" onclick="syncToMain()">資糧結算</button>
</div>

<div id="toast" id="toast-ui">
    <div style="color: var(--gold); font-size: 1.2rem; margin-bottom: 10px;">圓滿 ‧ 淨化</div>
    <div id="toast-msg">資糧已匯入蓮池</div>
</div>

<script>
    // ✨ 模擬妳的 DB JS 結構
    let db = {
        lotusLevel: 1,
        tempBag: 0,
        hints: 1
    };

    const COLORS = {
        'blue': '#4facfe',   // 般若
        'gold': '#f3e5ab',   // 願力
        'pink': '#ff0844',   // 慈悲
        'green': '#00f2fe'   // 淨化
    };

    let selectedBottleIndex = null;
    let bottles = [];

    // ✨ 萬日蓮花演化演算法
    function renderLotus(level) {
        const g = document.getElementById('lotus-g');
        g.innerHTML = '';
        const layers = 1 + Math.floor(level / 100); // 每一百關增加一層
        const petalsPerLayer = 8 + (Math.floor(level / 10) % 12);
        
        for (let l = 0; l < layers; l++) {
            const radius = 20 + l * 15;
            const scale = 1 - l * 0.2;
            for (let i = 0; i < petalsPerLayer; i++) {
                const angle = (i / petalsPerLayer) * 360;
                const petal = document.createElementNS("http://www.w3.org/2000/svg", "path");
                petal.setAttribute("d", "M 0 0 C 15 -25 15 -50 0 -70 C -15 -50 -15 -25 0 0");
                petal.setAttribute("fill", "url(#petalGrad)");
                petal.setAttribute("stroke", "rgba(243,229,171,0.5)");
                petal.setAttribute("stroke-width", "0.5");
                petal.setAttribute("transform", `rotate(${angle}) scale(${scale}) translate(0, -${l * 10})`);
                g.appendChild(petal);
            }
        }
        
        // 增加一個發光漸層定義
        if(!document.getElementById('petalGrad')) {
            const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
            defs.innerHTML = `
                <linearGradient id="petalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:white;stop-opacity:0.8" />
                    <stop offset="100%" style="stop-color:var(--solid-gold);stop-opacity:0.2" />
                </linearGradient>
            `;
            document.getElementById('lotus-svg').appendChild(defs);
        }
    }

    // ✨ 初始化關卡 (Candy Crush 般的線性增加)
    function initLevel(level) {
        const container = document.getElementById('game-grid');
        container.innerHTML = '';
        bottles = [];
        
        // 難度計算公式：每 50 關增加瓶子與顏色
        const bottleCount = 3 + Math.min(8, Math.floor(level / 50));
        const colorCount = 2 + Math.min(4, Math.floor(level / 100));
        const colorPool = Object.keys(COLORS).slice(0, colorCount);

        // 生成打亂的顏色數據
        let allColors = [];
        colorPool.forEach(c => {
            for(let i=0; i<4; i++) allColors.push(c);
        });
        while(allColors.length < (bottleCount - 2) * 4) {
             allColors.push(colorPool[Math.floor(Math.random() * colorCount)]);
        }
        allColors.sort(() => Math.random() - 0.5);

        for (let i = 0; i < bottleCount; i++) {
            let bColors = [];
            if (i < bottleCount - 2) {
                bColors = allColors.splice(0, 4);
            }
            bottles.push(bColors);
            
            const bDiv = document.createElement('div');
            bDiv.className = 'bottle';
            bDiv.id = `bottle-${i}`;
            bDiv.onclick = () => handleBottleClick(i);
            renderBottle(i, bDiv);
            container.appendChild(bDiv);
        }

        document.getElementById('lv-text').innerText = `第 ${level} 關`;
        renderLotus(level);
        updateProgressIcons();
    }

    function renderBottle(index, el) {
        el.innerHTML = '';
        const data = bottles[index];
        data.forEach((color, i) => {
            const div = document.createElement('div');
            div.className = 'liquid-layer';
            div.style.height = '25%';
            div.style.bottom = (i * 25) + '%';
            div.style.backgroundColor = COLORS[color];
            div.style.boxShadow = `inset 0 0 10px ${COLORS[color]}`;
            el.appendChild(div);
        });
    }

    function handleBottleClick(index) {
        if (selectedBottleIndex === null) {
            if (bottles[index].length === 0) return;
            selectedBottleIndex = index;
            document.getElementById(`bottle-${index}`).classList.add('selected');
        } else {
            if (selectedBottleIndex === index) {
                document.getElementById(`bottle-${index}`).classList.remove('selected');
                selectedBottleIndex = null;
                return;
            }
            
            tryPour(selectedBottleIndex, index);
            document.getElementById(`bottle-${selectedBottleIndex}`).classList.remove('selected');
            selectedBottleIndex = null;
        }
    }

    function tryPour(from, to) {
        const fromBottle = bottles[from];
        const toBottle = bottles[to];

        if (toBottle.length >= 4) return;
        const colorToPour = fromBottle[fromBottle.length - 1];

        if (toBottle.length > 0 && toBottle[toBottle.length - 1] !== colorToPour) return;

        // 執行傾倒
        toBottle.push(fromBottle.pop());
        renderBottle(from, document.getElementById(`bottle-${from}`));
        renderBottle(to, document.getElementById(`bottle-${to}`));

        checkWin();
    }

    function checkWin() {
        const isWin = bottles.every(b => b.length === 0 || (b.length === 4 && b.every(c => c === b[0])));
        if (isWin) {
            showToast("覺照圓滿，晉級下一重。");
            db.lotusLevel++;
            db.tempBag += 10;
            setTimeout(() => initLevel(db.lotusLevel), 1500);
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toast-msg').innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    function updateProgressIcons() {
        const dots = document.getElementById('prog-dots');
        dots.innerHTML = '';
        for(let i=0; i<5; i++) {
            const d = document.createElement('div');
            d.className = 'prog-icon' + (i < (db.lotusLevel % 5) ? ' active' : '');
            dots.appendChild(d);
        }
    }

    function useHint() {
        showToast("般若引導：觀察最上方色塊之流動。");
    }

    function syncToMain() {
        showToast(`資糧結集：${db.tempBag} 分已匯入。`);
        // 此處對接妳的 localStorage
    }

    initLevel(db.lotusLevel);
</script>
</body>
</html>
