<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 無相星海與尊聖法光</title>
    <style>
        :root {
            --bg-deep: #020306;
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
            touch-action: pan-y; 
        }

        /* 背景：星雲穿梭與清晰彩色光球 */
        #bgCanvas {
            position: fixed; inset: 0; z-index: 0;
        }

        #header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15); z-index: 10; position: relative;
            background: rgba(2, 3, 6, 0.4); backdrop-filter: blur(5px);
        }
        .lv-tag { letter-spacing: 3px; color: var(--gold); font-size: 1rem; font-weight: bold; }
        .info-tag { font-size: 0.75rem; color: var(--cyan); letter-spacing: 1px; margin-top: 5px; }

        #scene {
            flex: 1; display: flex; justify-content: center; align-items: center;
            perspective: 1200px; overflow: hidden; position: relative; z-index: 10;
        }
        
        #carousel {
            width: 50px; height: 180px; position: relative;
            transform-style: preserve-3d; transition: transform 0.1s ease-out;
        }

        /* 採用您的代碼：六角水晶柱 (徹底去除試管感) */
        .crystal {
            position: absolute; top: 0; left: 0; width: 50px; height: 180px;
            cursor: pointer;
            clip-path: polygon(15% 0, 85% 0, 100% 10%, 100% 90%, 85% 100%, 15% 100%, 0 90%, 0 10%);
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 80%, rgba(0,0,0,0.5) 100%);
            backdrop-filter: blur(4px);
            display: flex; flex-direction: column-reverse; align-items: center;
            padding-bottom: 8px; gap: 4px;
            box-shadow: inset 0 0 10px rgba(243, 229, 171, 0.2);
            transition: filter 0.3s, transform 0.3s;
        }

        .crystal.selected {
            filter: brightness(1.5) drop-shadow(0 0 15px rgba(243, 229, 171, 0.5));
            transform: translateY(-10px);
        }

        /* 琉璃圓球 (放置於水晶柱內) */
        .orb {
            width: 38px; height: 38px; border-radius: 50%; position: relative;
            box-shadow: inset -5px -5px 12px rgba(0,0,0,0.6), inset 5px 5px 12px rgba(255,255,255,0.8), 0 2px 5px rgba(0,0,0,0.5);
            z-index: 2; flex-shrink: 0; transition: all 0.3s;
        }

        .crystal.selected .orb:last-child {
            transform: translateY(-8px); filter: brightness(1.4);
            box-shadow: 0 0 20px currentColor, inset -5px -5px 12px rgba(0,0,0,0.5), inset 5px 5px 12px #fff;
        }

        /* 躍遷球 */
        .orb-jump {
            position: fixed; width: 38px; height: 38px; border-radius: 50%;
            box-shadow: 0 0 30px currentColor, inset -5px -5px 12px rgba(0,0,0,0.5), inset 5px 5px 12px #fff;
            z-index: 1000; pointer-events: none;
        }

        /* 您設計的 RPG 琉璃玉簡與長按法光系統 */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            z-index: 2000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.5s;
        }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-box {
            width: 85%; max-width: 360px; background: rgba(5,10,15,0.85); 
            border: 1px solid var(--solid-gold); border-radius: 10px; padding: 30px 25px; 
            text-align: center; box-shadow: 0 0 40px rgba(0,0,0,0.8);
            transform: translateY(20px); transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .modal-overlay.show .modal-box { transform: translateY(0); }
        
        .modal-title { color: var(--gold); font-size: 1.15rem; letter-spacing: 4px; margin-bottom: 15px; }
        .modal-text { color: #ddd; font-size: 0.95rem; letter-spacing: 2px; line-height: 1.8; margin-bottom: 35px; text-align: justify; text-align-last: center;}
        
        .rpg-btn-wrap {
            position: relative; width: 100%; height: 50px; display: flex; justify-content: center; align-items: center;
            border-radius: 25px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer; overflow: hidden;
        }
        .rpg-btn-fill {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%; 
            transition: width 0.1s linear; opacity: 0.8;
        }
        .rpg-btn-text { position: absolute; color: #fff; font-size: 0.95rem; letter-spacing: 5px; z-index: 5; text-shadow: 0 0 5px rgba(0,0,0,0.8); }

        #footer { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 10; position: relative; }
        .tool-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--cyan); color: var(--cyan);
            padding: 10px 18px; border-radius: 20px; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">第 1 關</div>
        <div class="info-tag">轉動法輪，理順琉璃資糧</div>
    </div>
</div>

<div id="scene">
    <div id="carousel"></div>
</div>

<div id="footer">
    <div class="tool-btn" onclick="initLevel()">重整</div>
    <div class="tool-btn" style="border-color:#e63946; color:#e63946;" onclick="triggerRandomEncounter()">無常遭遇</div>
    <div class="tool-btn" style="border-color:var(--solid-gold); color:var(--gold);" onclick="forceNextLevel()">過關 +10</div>
</div>

<div class="modal-overlay" id="rpg-modal">
    <div class="modal-box">
        <div class="modal-title" id="rpg-title"></div>
        <div class="modal-text" id="rpg-text"></div>
        <div class="rpg-btn-wrap" onmousedown="startFill()" onmouseup="stopFill()" onmouseleave="stopFill()" ontouchstart="startFill()" ontouchend="stopFill()">
            <div class="rpg-btn-fill" id="rpg-btn-fill"></div>
            <div class="rpg-btn-text" id="rpg-btn-text"></div>
        </div>
    </div>
</div>

<script>
    // 原生音效
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function initAudio() { if (!audioCtx) { audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); } }
    function playTone(freq, type, duration, vol) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }
    function playSelectSound() { playTone(1200, 'sine', 0.1, 0.3); } 
    function playJumpSound() { playTone(800, 'triangle', 0.25, 0.2); } 
    function playErrorSound() { playTone(200, 'sawtooth', 0.2, 0.2); } 
    function playWinSound() { playTone(432, 'sine', 2.0, 0.5); } 

    // 背景引擎：星雲穿梭 + 清晰彩色光球
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let cw, ch;
    
    let stars = [];
    let colorOrbs = [];
    const orbColors = [
        'rgba(230, 57, 70, 0.4)',  
        'rgba(0, 180, 216, 0.4)',  
        'rgba(212, 175, 55, 0.4)', 
        'rgba(155, 93, 229, 0.4)'  
    ];

    function resizeCanvas() { cw = canvas.width = window.innerWidth; ch = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    for(let i=0; i<200; i++) {
        stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, size: Math.random() * 2 + 0.5 });
    }

    for(let i=0; i<6; i++) {
        colorOrbs.push({
            x: Math.random() * cw, y: Math.random() * ch,
            radius: Math.random() * 100 + 60,
            color: orbColors[i % orbColors.length],
            vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5
        });
    }

    function drawBg() {
        ctx.fillStyle = db.currentEncounter ? 'rgba(10, 5, 20, 0.9)' : '#010204'; 
        ctx.fillRect(0, 0, cw, ch);
        ctx.globalCompositeOperation = 'screen';

        if (!db.currentEncounter) {
            colorOrbs.forEach(orb => {
                orb.x += orb.vx; orb.y += orb.vy;
                if(orb.x < -orb.radius || orb.x > cw + orb.radius) orb.vx *= -1;
                if(orb.y < -orb.radius || orb.y > ch + orb.radius) orb.vy *= -1;

                let grad = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.radius);
                grad.addColorStop(0, orb.color);
                grad.addColorStop(1, 'rgba(0,0,0,0)');

                ctx.beginPath(); ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI*2);
                ctx.fillStyle = grad; ctx.fill();
            });
        }

        stars.forEach(s => {
            s.z -= 8; 
            if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; }
            let scale = 800 / (800 + s.z);
            let px = cw / 2 + s.x * scale; let py = ch / 2 + s.y * scale;

            if (px > 0 && px < cw && py > 0 && py < ch) {
                ctx.beginPath(); ctx.arc(px, py, s.size * scale, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 255, 255, ${scale})`; ctx.fill();
            }
        });

        ctx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(drawBg);
    }
    drawBg();

    // 遊戲邏輯
    const PALETTE = ['#e63946', '#2a9d8f', '#00b4d8', '#d4af37', '#9b5de5', '#fb8500', '#f4a261', '#ffb7c5'];
    const MAX_ORBS = 4;
    let db = { level: 1, crystals: [], selectedIdx: null, isAnimating: false, carouselRotY: 0, radius: 0, currentEncounter: null };

    function generateLevelData(lv) {
        let totalCrystals = Math.min(24, 4 + Math.floor(lv / 5)); 
        let colorTypes = Math.min(8, totalCrystals - 2);   
        
        let pool = [];
        let emptyCrystals = totalCrystals > 10 ? 3 : 2; 
        let itemsNeeded = (totalCrystals - emptyCrystals) * MAX_ORBS; 
        
        let colorIdx = 0;
        for(let i=0; i < itemsNeeded / MAX_ORBS; i++) {
            let targetColor = PALETTE[colorIdx % colorTypes];
            for(let j=0; j<MAX_ORBS; j++) pool.push(targetColor);
            colorIdx++;
        }
        pool.sort(() => Math.random() - 0.5); 
        
        let crystals = [];
        for(let i=0; i<totalCrystals; i++) crystals.push(i < totalCrystals - emptyCrystals ? pool.splice(0, MAX_ORBS) : []);
        return crystals;
    }

    function initLevel() {
        const carousel = document.getElementById('carousel');
        carousel.innerHTML = ''; 
        
        db.crystals = generateLevelData(db.level);
        db.selectedIdx = null; db.isAnimating = false;
        db.carouselRotY = 0; carousel.style.transform = `rotateY(0deg)`;
        
        const total = db.crystals.length;
        const rows = total > 12 ? 2 : 1;
        const perRow = Math.ceil(total / rows); 
        db.radius = Math.round((50 / 2) / Math.tan(Math.PI / perRow)) + 60; 

        for (let i = 0; i < total; i++) {
            const c = document.createElement('div');
            c.className = 'crystal'; c.id = `cry-${i}`;
            
            let rowIdx = Math.floor(i / perRow);
            let colIdx = i % perRow;
            let theta = (360 / perRow) * colIdx;
            
            let yOffset = rows === 2 ? (rowIdx === 0 ? -95 : 95) : 0; 
            
            c.style.transform = `rotateY(${theta}deg) translateY(${yOffset}px) translateZ(${db.radius}px)`;
            c.dataset.theta = theta; 
            c.onclick = () => handleTap(i, theta);
            carousel.appendChild(c);
            renderOrbs(i);
        }
        updateShading();
        document.getElementById('lv-display').innerText = `第 ${db.level} 關`;
    }

    function renderOrbs(idx) {
        const c = document.getElementById(`cry-${idx}`);
        c.innerHTML = '';
        db.crystals[idx].forEach(color => {
            const orb = document.createElement('div');
            orb.className = 'orb'; 
            orb.style.backgroundColor = color; 
            orb.style.color = color;
            c.appendChild(orb);
        });
    }

    let isDragging = false, startX = 0;
    const carousel = document.getElementById('carousel');
    document.addEventListener('pointerdown', e => { 
        if(db.currentEncounter) return; 
        initAudio(); isDragging = true; startX = e.clientX; carousel.style.transition = 'none'; 
    });
    document.addEventListener('pointermove', e => {
        if (!isDragging) return;
        db.carouselRotY += (e.clientX - startX) * 0.4; startX = e.clientX;
        carousel.style.transform = `rotateY(${db.carouselRotY}deg)`;
        updateShading();
    });
    document.addEventListener('pointerup', () => { isDragging = false; carousel.style.transition = 'transform 0.5s ease-out'; });

    function updateShading() {
        document.querySelectorAll('.crystal').forEach(c => {
            let currentAngle = (parseFloat(c.dataset.theta) + db.carouselRotY) % 360;
            if(currentAngle < 0) currentAngle += 360;
            let dist = Math.min(currentAngle, 360 - currentAngle);
            if(dist > 85) { c.style.filter = 'brightness(0.2) blur(2px)'; c.style.pointerEvents = 'none'; } 
            else { c.style.filter = 'brightness(1) blur(0px)'; c.style.pointerEvents = 'auto'; }
        });
    }

    async function handleTap(idx, theta) {
        initAudio();
        if (db.isAnimating || isDragging || db.currentEncounter) return;
        const targetEl = document.getElementById(`cry-${idx}`);
        
        if (db.selectedIdx === null) {
            if (db.crystals[idx].length === 0) return;
            db.selectedIdx = idx; targetEl.classList.add('selected');
            playSelectSound();
        } else {
            const fromIdx = db.selectedIdx; const toIdx = idx;
            const fromEl = document.getElementById(`cry-${fromIdx}`);
            if (fromIdx === toIdx) { fromEl.classList.remove('selected'); db.selectedIdx = null; return; }

            const fromArr = db.crystals[fromIdx]; const toArr = db.crystals[toIdx];
            const moveColor = fromArr[fromArr.length - 1];

            if (toArr.length < MAX_ORBS && (toArr.length === 0 || toArr[toArr.length-1] === moveColor)) {
                db.isAnimating = true; fromEl.classList.remove('selected');
                playJumpSound();
                
                db.carouselRotY = -theta;
                carousel.style.transform = `rotateY(${db.carouselRotY}deg)`;
                updateShading();

                await new Promise(r => setTimeout(r, 450));

                const poppedColor = fromArr.pop();
                const topOrbEl = fromEl.querySelectorAll('.orb')[fromEl.querySelectorAll('.orb').length - 1];
                const fromRect = topOrbEl.getBoundingClientRect();
                topOrbEl.style.opacity = '0';

                const destX = targetEl.getBoundingClientRect().left + (targetEl.getBoundingClientRect().width - 38) / 2;
                const destY = targetEl.getBoundingClientRect().bottom - 8 - 42 * (toArr.length + 1);

                await animateOrbJump(fromRect.left, fromRect.top, destX, destY, poppedColor);
                
                toArr.push(poppedColor); renderOrbs(fromIdx); renderOrbs(toIdx);
                checkWin();
            } else { fromEl.classList.remove('selected'); playErrorSound(); }
            db.selectedIdx = null; db.isAnimating = false;
        }
    }

    function animateOrbJump(startX, startY, endX, endY, color) {
        return new Promise(resolve => {
            const jumper = document.createElement('div');
            jumper.className = 'orb-jump'; jumper.style.backgroundColor = color; jumper.style.color = color;
            document.body.appendChild(jumper);

            const animation = jumper.animate([
                { transform: `translate(${startX}px, ${startY}px) scale(1)` },
                { transform: `translate(${startX + (endX - startX)*0.5}px, ${Math.min(startY, endY) - 150}px) scale(1.2)` },
                { transform: `translate(${endX}px, ${endY}px) scale(1)` }
            ], { duration: 400, easing: 'cubic-bezier(0.25, 0.8, 0.25, 1)', fill: 'forwards' });

            animation.onfinish = () => { jumper.remove(); resolve(); };
        });
    }

    function checkWin() {
        if (db.crystals.every(v => v.length === 0 || (v.length === MAX_ORBS && v.every(item => item === v[0])))) {
            playWinSound(); setTimeout(() => { db.level++; initLevel(); }, 1200);
        }
    }
    
    function forceNextLevel() { db.level += 9; db.level++; initLevel(); }

    // 您的 RPG 長按互動系統
    const encounters = [
        { buddha: '釋迦牟尼佛', title: '無明網現', text: '娑婆業力翻湧，迷失本心。請至誠稱唸本師名號，祈求常寂金光護念，破除無明。', btnText: '南無本師釋迦牟尼佛', lightColor: '#d4af37', boxShadow: '0 0 30px rgba(212, 175, 55, 0.8)' },
        { buddha: '地藏王菩薩', title: '深淵震盪', text: '宿世業障現前，心識動盪。請稱唸大願地藏王菩薩名號，以安忍如地之墨綠法光，鎮伏業海。', btnText: '南無地藏王菩薩', lightColor: '#1e5631', boxShadow: '0 0 30px rgba(30, 86, 49, 0.8)' },
        { buddha: '大勢至菩薩', title: '念頭散亂', text: '六根攀緣，無法攝心。請稱唸大勢至菩薩名號，以無邊智慧白光，都攝六根，淨念相繼。', btnText: '南無大勢至菩薩', lightColor: '#ffffff', boxShadow: '0 0 30px rgba(255, 255, 255, 0.8)' }
    ];

    let fillTimer = null; let fillProgress = 0;

    function triggerRandomEncounter() {
        if(db.isAnimating || db.currentEncounter) return;
        const enc = encounters[Math.floor(Math.random() * encounters.length)];
        db.currentEncounter = enc;

        document.getElementById('rpg-title').innerText = enc.title;
        document.getElementById('rpg-text').innerText = enc.text;
        document.getElementById('rpg-btn-text').innerText = enc.btnText;
        
        const fillEl = document.getElementById('rpg-btn-fill');
        fillEl.style.backgroundColor = enc.lightColor;
        fillEl.style.boxShadow = enc.boxShadow;
        fillEl.style.width = '0%';

        document.getElementById('rpg-modal').classList.add('show');
    }

    function startFill() {
        if(!db.currentEncounter) return;
        initAudio();
        clearInterval(fillTimer);
        fillProgress = 0;
        document.getElementById('rpg-btn-fill').style.width = '0%';
        fillTimer = setInterval(() => {
            fillProgress += 2.5; 
            document.getElementById('rpg-btn-fill').style.width = fillProgress + '%';
            if(fillProgress >= 100) { clearInterval(fillTimer); playWinSound(); closeEncounter(); }
        }, 100);
    }

    function stopFill() {
        clearInterval(fillTimer); fillProgress = 0; document.getElementById('rpg-btn-fill').style.width = '0%';
    }

    function closeEncounter() {
        document.getElementById('rpg-modal').classList.remove('show');
        setTimeout(() => db.currentEncounter = null, 500);
    }

    initLevel();
</script>
</body>
</html>
