<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 無相漂浮版</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; }
        
        body { 
            margin: 0; background: #010204; color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: pan-y; 
        }

        /* ✨ 背景畫布：星空穿梭 + 清晰彩色球 (無模糊) */
        #bgCanvas {
            position: fixed; inset: 0; z-index: 0;
            /* 絕對不加 blur，保持清晰銳利 */
        }

        /* ✨ 高解析度漂浮蓮花 (無限縮放、旋轉、全場景遊走) */
        #wandering-lotus {
            position: fixed; top: 50%; left: 50%; width: 200px; height: 200px;
            margin-top: -100px; margin-left: -100px; 
            display: flex; justify-content: center; align-items: center; 
            pointer-events: none; z-index: 5;
            animation: lotusWander 40s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        }
        
        #wandering-lotus svg {
            width: 100%; height: 100%; 
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.8));
        }

        /* 蓮花極致漂浮軌跡 */
        @keyframes lotusWander {
            0% { transform: translate(0, 0) scale(0.6) rotate(0deg); opacity: 0.7; }
            25% { transform: translate(-25vw, -20vh) scale(1.8) rotate(90deg); opacity: 0.9; }
            50% { transform: translate(20vw, 15vh) scale(3.5) rotate(180deg); opacity: 1; } /* 極致放大 */
            75% { transform: translate(-10vw, 25vh) scale(1.2) rotate(270deg); opacity: 0.8; }
            100% { transform: translate(25vw, -10vh) scale(0.5) rotate(360deg); opacity: 0.5; }
        }

        /* UI 與 立體場景 */
        #header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(212, 175, 55, 0.2); z-index: 10; position: relative; backdrop-filter: blur(5px); }
        .lv-tag { letter-spacing: 3px; color: var(--gold); font-size: 1rem; font-weight: bold; text-shadow: 0 0 10px rgba(243, 229, 171, 0.5); }
        .info-tag { font-size: 0.75rem; color: var(--cyan); letter-spacing: 1px; margin-top: 5px; }

        #scene { flex: 1; display: flex; justify-content: center; align-items: center; perspective: 1200px; overflow: hidden; position: relative; z-index: 10; }
        #carousel { width: 60px; height: 160px; position: relative; transform-style: preserve-3d; transition: transform 0.1s ease-out; }

        /* ✨ 隱形的邏輯容器：徹底拔除方框 */
        .vessel {
            position: absolute; top: 0; left: 0; width: 44px; height: 180px; cursor: pointer;
            background: transparent; border: none; box-shadow: none;
            display: flex; flex-direction: column-reverse; align-items: center; padding-bottom: 5px; gap: 2px;
            transition: transform 0.3s;
        }
        
        /* 點擊提舉效果 */
        .vessel.selected { transform: translateY(-10px); }

        /* ✨ 純淨的立體琉璃資糧球 (無內部幾何) */
        .orb { 
            width: 40px; height: 40px; border-radius: 50%; position: relative; 
            /* 模擬您截圖中的高光玻璃質感 */
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.7), inset 5px 5px 15px rgba(255,255,255,0.8), 0 0 8px currentColor; 
            z-index: 2; flex-shrink: 0; transition: all 0.3s; 
        }
        
        /* 選中時整體發光強化 */
        .vessel.selected .orb { filter: brightness(1.3); box-shadow: inset -5px -5px 15px rgba(0,0,0,0.6), inset 5px 5px 15px rgba(255,255,255,0.9), 0 0 20px currentColor; }
        /* 最上方的球更亮，準備躍遷 */
        .vessel.selected .orb:last-child { transform: translateY(-8px); filter: brightness(1.8); box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5), inset 5px 5px 15px #fff, 0 0 35px currentColor; }
        
        /* 躍遷球 */
        .orb-jump { position: fixed; width: 40px; height: 40px; border-radius: 50%; box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5), inset 5px 5px 15px #fff, 0 0 40px currentColor; z-index: 1000; pointer-events: none; }

        /* 底部按鈕 */
        #footer { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 10; position: relative; }
        .tool-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--cyan); color: var(--cyan); padding: 10px 18px; border-radius: 20px; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="wandering-lotus">
    <svg viewBox="0 0 200 200">
        <defs>
            <radialGradient id="lotusGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff" /><stop offset="60%" stop-color="#f3e5ab" /><stop offset="100%" stop-color="#d4af37" stop-opacity="0" />
            </radialGradient>
        </defs>
        <g transform="translate(100, 100)" id="lotus-group"></g>
    </svg>
</div>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">第 1 關</div>
        <div class="info-tag">理順琉璃，轉識成智</div>
    </div>
</div>

<div id="scene">
    <div id="carousel">
        </div>
</div>

<div id="footer">
    <div class="tool-btn" onclick="initLevel()">重整</div>
    <div class="tool-btn" style="border-color:var(--solid-gold); color:var(--gold);" onclick="forceNextLevel()">過關 +10</div>
</div>

<script>
    // --------------------------------------------------
    // ✨ 背景引擎：星雲穿梭 + 清晰彩色光球
    // --------------------------------------------------
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let cw, ch;
    
    let stars = [];
    let colorOrbs = [];
    const orbColors = [
        'rgba(230, 57, 70, 0.4)',  // 紅
        'rgba(0, 180, 216, 0.4)',  // 藍
        'rgba(212, 175, 55, 0.4)', // 金
        'rgba(155, 93, 229, 0.4)'  // 紫
    ];

    function resizeCanvas() {
        cw = canvas.width = window.innerWidth;
        ch = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // 初始化星空 (前進感)
    for(let i=0; i<150; i++) {
        stars.push({
            x: (Math.random() - 0.5) * 2000,
            y: (Math.random() - 0.5) * 2000,
            z: Math.random() * 2000,
            size: Math.random() * 2 + 0.5
        });
    }

    // 初始化彩色能量球 (清晰漂浮)
    for(let i=0; i<8; i++) {
        colorOrbs.push({
            x: Math.random() * cw,
            y: Math.random() * ch,
            radius: Math.random() * 80 + 50,
            color: orbColors[i % orbColors.length],
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2
        });
    }

    function drawBg() {
        // 深邃黑底
        ctx.fillStyle = '#010204';
        ctx.fillRect(0, 0, cw, ch);

        ctx.globalCompositeOperation = 'screen';

        // 繪製彩色球 (清晰無 Blur，利用漸層營造光暈)
        colorOrbs.forEach(orb => {
            orb.x += orb.vx; orb.y += orb.vy;
            if(orb.x < -orb.radius || orb.x > cw + orb.radius) orb.vx *= -1;
            if(orb.y < -orb.radius || orb.y > ch + orb.radius) orb.vy *= -1;

            let grad = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.radius);
            grad.addColorStop(0, orb.color);
            grad.addColorStop(1, 'transparent');

            ctx.beginPath();
            ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
        });

        // 繪製 Z 軸穿梭星空
        stars.forEach(s => {
            s.z -= 10; // 星星迎面飛來
            if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; }
            
            let scale = 800 / (800 + s.z);
            let px = cw / 2 + s.x * scale;
            let py = ch / 2 + s.y * scale;

            if (px > 0 && px < cw && py > 0 && py < ch) {
                ctx.beginPath();
                ctx.arc(px, py, s.size * scale, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 255, 255, ${scale})`;
                ctx.fill();
            }
        });

        ctx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(drawBg);
    }
    drawBg();

    // --------------------------------------------------
    // 遊戲邏輯與立體塔
    // --------------------------------------------------
    function drawLotus() {
        const group = document.getElementById('lotus-group');
        group.innerHTML = '';
        for(let i=0; i<12; i++) {
            let p1 = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p1.setAttribute("d", "M0,0 C15,-30 35,-60 0,-90 C-35,-60 -15,-30 0,0");
            p1.setAttribute("fill", "url(#lotusGrad)"); p1.setAttribute("transform", `rotate(${i*30})`); p1.setAttribute("opacity", "0.8");
            let p2 = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p2.setAttribute("d", "M0,0 C10,-20 20,-40 0,-60 C-20,-40 -10,-20 0,0");
            p2.setAttribute("fill", "url(#lotusGrad)"); p2.setAttribute("transform", `rotate(${i*30 + 15}) scale(0.8)`); p2.setAttribute("opacity", "0.9");
            group.appendChild(p1); group.appendChild(p2);
        }
    }

    // ✨ 化繁為簡：純色資料庫，無形狀干擾
    const PALETTE = ['#e63946', '#2a9d8f', '#00b4d8', '#d4af37', '#9b5de5', '#fb8500', '#f4a261', '#ffb7c5'];
    const MAX_ORBS = 4;
    let db = { level: 1, vessels: [], selectedIdx: null, isAnimating: false, carouselRotY: 0, radius: 0 };

    function generateLevelData(lv) {
        let totalVessels = Math.min(24, 4 + Math.floor(lv / 5)); 
        let colorTypes = Math.min(8, totalVessels - 2);   
        
        let pool = [];
        let emptyVessels = totalVessels > 10 ? 3 : 2; 
        let itemsNeeded = (totalVessels - emptyVessels) * MAX_ORBS; 
        
        let colorIdx = 0;
        for(let i=0; i < itemsNeeded / MAX_ORBS; i++) {
            let targetColor = PALETTE[colorIdx % colorTypes];
            for(let j=0; j<MAX_ORBS; j++) pool.push(targetColor);
            colorIdx++;
        }
        pool.sort(() => Math.random() - 0.5); 
        
        let vessels = [];
        for(let i=0; i<totalVessels; i++) vessels.push(i < totalVessels - emptyVessels ? pool.splice(0, MAX_ORBS) : []);
        return vessels;
    }

    function initLevel() {
        const carousel = document.getElementById('carousel');
        carousel.innerHTML = ''; 
        
        db.vessels = generateLevelData(db.level);
        db.selectedIdx = null; db.isAnimating = false;
        db.carouselRotY = 0; carousel.style.transform = `rotateY(0deg)`;
        
        const total = db.vessels.length;
        const rows = total > 12 ? 2 : 1;
        const vesselsPerRow = Math.ceil(total / rows); 
        db.radius = Math.round((44 / 2) / Math.tan(Math.PI / vesselsPerRow)) + 60; 

        for (let i = 0; i < total; i++) {
            const v = document.createElement('div');
            v.className = 'vessel'; v.id = `vsl-${i}`;
            
            let rowIdx = Math.floor(i / vesselsPerRow);
            let colIdx = i % vesselsPerRow;
            let theta = (360 / vesselsPerRow) * colIdx;
            
            let yOffset = rows === 2 ? (rowIdx === 0 ? -90 : 90) : 0; 
            
            v.style.transform = `rotateY(${theta}deg) translateY(${yOffset}px) translateZ(${db.radius}px)`;
            v.dataset.theta = theta; 
            v.onclick = () => handleTap(i, theta);
            carousel.appendChild(v);
            renderOrbs(i);
        }
        updateShading();
        document.getElementById('lv-display').innerText = `第 ${db.level} 關`;
    }

    function renderOrbs(idx) {
        const v = document.getElementById(`vsl-${idx}`);
        v.innerHTML = '';
        db.vessels[idx].forEach(color => {
            const orb = document.createElement('div');
            orb.className = 'orb'; 
            orb.style.backgroundColor = color; 
            orb.style.color = color; // 控制 Glow 顏色
            v.appendChild(orb);
        });
    }

    let isDragging = false, startX = 0;
    const carousel = document.getElementById('carousel');
    document.addEventListener('pointerdown', e => { isDragging = true; startX = e.clientX; carousel.style.transition = 'none'; });
    document.addEventListener('pointermove', e => {
        if (!isDragging) return;
        db.carouselRotY += (e.clientX - startX) * 0.4; startX = e.clientX;
        carousel.style.transform = `rotateY(${db.carouselRotY}deg)`;
        updateShading();
    });
    document.addEventListener('pointerup', () => { isDragging = false; carousel.style.transition = 'transform 0.5s ease-out'; });

    function updateShading() {
        document.querySelectorAll('.vessel').forEach(c => {
            let currentAngle = (parseFloat(c.dataset.theta) + db.carouselRotY) % 360;
            if(currentAngle < 0) currentAngle += 360;
            let dist = Math.min(currentAngle, 360 - currentAngle);
            if(dist > 85) { c.style.filter = 'brightness(0.2) blur(2px)'; c.style.pointerEvents = 'none'; } 
            else { c.style.filter = 'brightness(1) blur(0px)'; c.style.pointerEvents = 'auto'; }
        });
    }

    async function handleTap(idx, theta) {
        if (db.isAnimating || isDragging) return;
        const targetEl = document.getElementById(`vsl-${idx}`);
        
        if (db.selectedIdx === null) {
            if (db.vessels[idx].length === 0) return;
            db.selectedIdx = idx; targetEl.classList.add('selected');
        } else {
            const fromIdx = db.selectedIdx; const toIdx = idx;
            const fromEl = document.getElementById(`vsl-${fromIdx}`);
            if (fromIdx === toIdx) { fromEl.classList.remove('selected'); db.selectedIdx = null; return; }

            const fromArr = db.vessels[fromIdx]; const toArr = db.vessels[toIdx];
            const moveColor = fromArr[fromArr.length - 1];

            // 純色檢測
            if (toArr.length < MAX_ORBS && (toArr.length === 0 || toArr[toArr.length-1] === moveColor)) {
                db.isAnimating = true; fromEl.classList.remove('selected');
                
                db.carouselRotY = -theta;
                carousel.style.transform = `rotateY(${db.carouselRotY}deg)`;
                updateShading();

                await new Promise(r => setTimeout(r, 450));

                const poppedColor = fromArr.pop();
                const topOrbEl = fromEl.querySelectorAll('.orb')[fromEl.querySelectorAll('.orb').length - 1];
                const fromRect = topOrbEl.getBoundingClientRect();
                topOrbEl.style.opacity = '0';

                const destX = targetEl.getBoundingClientRect().left + (targetEl.getBoundingClientRect().width - 40) / 2;
                const destY = targetEl.getBoundingClientRect().bottom - 5 - 42 * (toArr.length + 1);

                await animateOrbJump(fromRect.left, fromRect.top, destX, destY, poppedColor);
                
                toArr.push(poppedColor); renderOrbs(fromIdx); renderOrbs(toIdx);
                checkWin();
            } else { fromEl.classList.remove('selected'); }
            db.selectedIdx = null; db.isAnimating = false;
        }
    }

    function animateOrbJump(startX, startY, endX, endY, color) {
        return new Promise(resolve => {
            const jumper = document.createElement('div');
            jumper.className = 'orb-jump'; jumper.style.backgroundColor = color; jumper.style.color = color;
            document.body.appendChild(jumper);

            const animation = jumper.animate([
                { transform: `translate(${startX}px, ${startY}px) scale(1)` },
                { transform: `translate(${startX + (endX - startX)*0.5}px, ${Math.min(startY, endY) - 180}px) scale(1.3)` },
                { transform: `translate(${endX}px, ${endY}px) scale(1)` }
            ], { duration: 400, easing: 'cubic-bezier(0.25, 0.8, 0.25, 1)', fill: 'forwards' });

            animation.onfinish = () => { jumper.remove(); resolve(); };
        });
    }

    function checkWin() {
        if (db.vessels.every(v => v.length === 0 || (v.length === MAX_ORBS && v.every(item => item === v[0])))) {
            setTimeout(() => { db.level++; initLevel(); }, 800);
        }
    }
    
    function forceNextLevel() { db.level += 9; db.level++; initLevel(); }

    drawLotus(); initLevel();
</script>
</body>
</html>
