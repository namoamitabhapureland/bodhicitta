<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 360度法輪壇城</title>
    <style>
        :root {
            --bg-deep: #010204;
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
            /* 阻止原生的水平滑動，保留我們自己的 3D 拖曳 */
            touch-action: pan-y; 
        }

        /* 虛空底座 */
        #realmCanvas { position: fixed; inset: 0; z-index: -1; }

        #header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15); z-index: 10; backdrop-filter: blur(5px);
        }
        .lv-tag { letter-spacing: 3px; color: var(--gold); font-size: 1rem; font-weight: bold; }
        .info-tag { font-size: 0.75rem; color: var(--cyan); letter-spacing: 1px; margin-top: 5px; }

        /* ✨ 3D 場景容器 */
        #scene {
            flex: 1; display: flex; justify-content: center; align-items: center;
            perspective: 1200px; /* 創造 3D 透視深度 */
            overflow: hidden; position: relative; z-index: 10;
        }

        /* ✨ 旋轉法輪 (Carousel) */
        #carousel {
            width: 50px; height: 140px; position: relative;
            transform-style: preserve-3d; /* 保留子元素的 3D 空間 */
            transition: transform 0.1s ease-out; /* 滑順的拖曳跟隨 */
        }

        /* 琉璃法器 */
        .vessel {
            position: absolute; top: 0; left: 0; width: 50px; height: 140px;
            cursor: pointer;
            border: 1.5px solid rgba(243, 229, 171, 0.3);
            border-top: none; border-radius: 0 0 18px 18px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(5px);
            box-shadow: inset 4px 0 10px rgba(255,255,255,0.1), inset -4px 0 10px rgba(0,0,0,0.6);
            display: flex; flex-direction: column-reverse; align-items: center; padding-bottom: 5px; gap: 3px;
            /* 讓背面的瓶子變暗，增加立體感 */
            transition: filter 0.3s, transform 0.3s;
        }

        /* 瓶口立體環 */
        .vessel::before {
            content: ''; position: absolute; top: -3px; left: -3px; right: -3px; height: 8px;
            border: 1.5px solid rgba(243, 229, 171, 0.6); border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 5;
        }

        /* 發光選取狀態 */
        .vessel.selected {
            border-color: rgba(243, 229, 171, 0.9);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6), inset 0 0 15px rgba(255,255,255,0.2);
        }

        /* 資糧寶珠 */
        .orb {
            width: 22px; height: 22px; border-radius: 50%; position: relative;
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.6), inset 3px 3px 8px rgba(255,255,255,0.7);
            z-index: 2; flex-shrink: 0; transition: all 0.3s;
        }

        .vessel.selected .orb:last-child {
            transform: translateY(-10px); filter: brightness(1.3);
            box-shadow: 0 0 15px currentColor, inset -3px -3px 8px rgba(0,0,0,0.5), inset 3px 3px 8px rgba(255,255,255,0.8);
        }

        /* 光影躍遷 */
        .orb-jump {
            position: fixed; width: 22px; height: 22px; border-radius: 50%;
            box-shadow: 0 0 25px currentColor, inset -3px -3px 8px rgba(0,0,0,0.5), inset 3px 3px 8px rgba(255,255,255,0.8);
            z-index: 1000; pointer-events: none;
        }

        #footer { padding: 15px; display: flex; justify-content: center; z-index: 10; }
        .reset-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--cyan); color: var(--cyan);
            padding: 8px 25px; border-radius: 20px; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer;
        }
    </style>
</head>
<body>

<canvas id="realmCanvas"></canvas>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">立體壇城 ‧ 轉動法輪</div>
        <div class="info-tag">左右滑動螢幕，調動虛空法器</div>
    </div>
</div>

<div id="scene">
    <div id="carousel"></div>
</div>

<div id="footer">
    <div class="reset-btn" onclick="initLevel()">重整陣列</div>
</div>

<script>
    const ORB_COLORS = ['#e63946', '#2a9d8f', '#00b4d8', '#d4af37', '#9b5de5', '#fb8500', '#f4a261', '#8338ec', '#ffb7c5', '#06d6a0'];
    const MAX_ORBS = 4;
    const TOTAL_VESSELS = 24; // 24 個瓶子完美支援
    const COLORS_IN_PLAY = 18; 

    let db = {
        level: 24, vessels: [], selectedIdx: null, isAnimating: false,
        carouselRotY: 0, radius: 0
    };

    // 極簡星空底座
    function initBackground() {
        const cvs = document.getElementById('realmCanvas');
        const ctx = cvs.getContext('2d');
        let w, h; let stars = [];
        const resize = () => { w = cvs.width = window.innerWidth; h = cvs.height = window.innerHeight; };
        window.addEventListener('resize', resize); resize();
        for(let i=0; i<80; i++) stars.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*1.5, a: Math.random()*Math.PI*2 });
        function draw() {
            ctx.fillStyle = 'rgba(1, 2, 4, 0.4)'; ctx.fillRect(0, 0, w, h);
            stars.forEach(p => {
                p.y -= 0.3; p.x += Math.sin(p.a)*0.3; p.a += 0.02;
                if(p.y < 0) p.y = h;
                ctx.fillStyle = `rgba(212, 175, 55, ${0.2 + Math.random()*0.3})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    function initLevel() {
        const carousel = document.getElementById('carousel');
        carousel.innerHTML = '';
        db.vessels = []; db.selectedIdx = null; db.isAnimating = false;
        db.carouselRotY = 0; carousel.style.transform = `rotateY(0deg)`;

        // 計算 3D 圓柱半徑 (Radius = (itemWidth / 2) / Math.tan(PI / totalItems))
        // 稍微加大間距讓視覺更開闊
        db.radius = Math.round((60 / 2) / Math.tan(Math.PI / TOTAL_VESSELS)) + 20;

        let pool = [];
        for(let i=0; i<COLORS_IN_PLAY; i++) {
            for(let j=0; j<MAX_ORBS; j++) pool.push(ORB_COLORS[i]);
        }
        pool.sort(() => Math.random() - 0.5);

        for (let i = 0; i < TOTAL_VESSELS; i++) {
            let content = (i < COLORS_IN_PLAY) ? pool.splice(0, MAX_ORBS) : [];
            db.vessels.push(content);
            
            const v = document.createElement('div');
            v.className = 'vessel'; v.id = `vsl-${i}`;
            
            // ✨ 核心：將法器沿著 Y 軸旋轉，並向外推至半徑邊緣，形成立體圓柱
            let theta = (360 / TOTAL_VESSELS) * i;
            v.style.transform = `rotateY(${theta}deg) translateZ(${db.radius}px)`;
            
            v.onclick = () => handleTap(i, theta);
            carousel.appendChild(v);
            renderOrbs(i);
        }
        updateVesselShading();
    }

    function renderOrbs(idx) {
        const v = document.getElementById(`vsl-${idx}`);
        v.innerHTML = '';
        db.vessels[idx].forEach(color => {
            const orb = document.createElement('div');
            orb.className = 'orb'; orb.style.backgroundColor = color; orb.style.color = color;
            v.appendChild(orb);
        });
    }

    // ✨ 3D 場景拖曳控制引擎
    let isDragging = false, startX = 0, currentX = 0;
    const scene = document.getElementById('scene');
    const carousel = document.getElementById('carousel');

    function onPointerDown(e) {
        isDragging = true;
        startX = e.clientX || e.touches[0].clientX;
        carousel.style.transition = 'none'; // 拖曳時取消動畫，緊跟手指
    }

    function onPointerMove(e) {
        if (!isDragging) return;
        let x = e.clientX || e.touches[0].clientX;
        let deltaX = x - startX;
        startX = x;
        // 將水平滑動距離轉換為旋轉角度 (除以一個靈敏度系數)
        db.carouselRotY += deltaX * 0.4;
        carousel.style.transform = `rotateY(${db.carouselRotY}deg)`;
        updateVesselShading();
    }

    function onPointerUp() {
        if(!isDragging) return;
        isDragging = false;
        carousel.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1)'; // 釋放時加上慣性滑動感
        // 自動吸附到最近的法器角度 (可選，這裡為了滑順度先只加過渡)
    }

    scene.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);
    scene.addEventListener('touchstart', onPointerDown, {passive: true});
    window.addEventListener('touchmove', onPointerMove, {passive: true});
    window.addEventListener('touchend', onPointerUp);

    // 根據 3D 角度，讓轉到背面的瓶子變暗，前方的瓶子變亮，強化立體感
    function updateVesselShading() {
        const vessels = document.querySelectorAll('.vessel');
        vessels.forEach((v, i) => {
            let theta = (360 / TOTAL_VESSELS) * i;
            // 計算目前瓶子與正前方視角的絕對角度差
            let currentAngle = (theta + db.carouselRotY) % 360;
            if(currentAngle < 0) currentAngle += 360;
            // 距離前方 (0度或360度) 越遠越暗
            let distToFront = Math.min(currentAngle, 360 - currentAngle);
            if(distToFront > 90) {
                v.style.filter = 'brightness(0.3) blur(2px)'; // 背面模糊且黯淡
                v.style.pointerEvents = 'none'; // 背面的不可點擊
            } else {
                v.style.filter = 'brightness(1) blur(0px)';
                v.style.pointerEvents = 'auto';
            }
        });
    }

    async function handleTap(idx, theta) {
        if (db.isAnimating || isDragging) return;
        const targetEl = document.getElementById(`vsl-${idx}`);
        
        if (db.selectedIdx === null) {
            if (db.vessels[idx].length === 0) return;
            db.selectedIdx = idx; targetEl.classList.add('selected');
        } else {
            const fromIdx = db.selectedIdx;
            const toIdx = idx;
            const fromEl = document.getElementById(`vsl-${fromIdx}`);
            
            if (fromIdx === toIdx) {
                fromEl.classList.remove('selected'); db.selectedIdx = null; return;
            }

            const fromArr = db.vessels[fromIdx];
            const toArr = db.vessels[toIdx];
            const moveColor = fromArr[fromArr.length - 1];

            if (toArr.length < MAX_ORBS && (toArr.length === 0 || toArr[toArr.length-1] === moveColor)) {
                db.isAnimating = true;
                fromEl.classList.remove('selected');
                
                // 自動將目標瓶轉到正前方 (強化互動感)
                db.carouselRotY = -theta;
                carousel.style.transition = 'transform 0.4s ease-in-out';
                carousel.style.transform = `rotateY(${db.carouselRotY}deg)`;
                updateVesselShading();

                // 等待旋轉到位後再進行光影躍遷
                await new Promise(r => setTimeout(r, 450));

                const poppedColor = fromArr.pop();
                const fromOrbs = fromEl.querySelectorAll('.orb');
                const topOrbEl = fromOrbs[fromOrbs.length - 1];
                
                // 取得旋轉後的最新 2D 螢幕座標
                const fromRect = topOrbEl.getBoundingClientRect();
                topOrbEl.style.opacity = '0';

                const toRect = targetEl.getBoundingClientRect();
                const destX = toRect.left + (toRect.width - 22) / 2;
                const destY = toRect.bottom - 5 - 25 * (toArr.length + 1);

                await animateOrbJump(fromRect.left, fromRect.top, destX, destY, poppedColor);
                
                toArr.push(poppedColor);
                renderOrbs(fromIdx); renderOrbs(toIdx);
            } else {
                fromEl.classList.remove('selected');
            }
            db.selectedIdx = null; db.isAnimating = false;
        }
    }

    function animateOrbJump(startX, startY, endX, endY, color) {
        return new Promise(resolve => {
            const jumper = document.createElement('div');
            jumper.className = 'orb-jump';
            jumper.style.backgroundColor = color; jumper.style.color = color;
            document.body.appendChild(jumper);

            const controlY = Math.min(startY, endY) - 150; 
            const deltaX = endX - startX;

            const animation = jumper.animate([
                { transform: `translate(${startX}px, ${startY}px) scale(1)` },
                { transform: `translate(${startX + deltaX*0.5}px, ${controlY}px) scale(1.3)` },
                { transform: `translate(${endX}px, ${endY}px) scale(1)` }
            ], {
                duration: 400, easing: 'cubic-bezier(0.25, 0.8, 0.25, 1)', fill: 'forwards'
            });

            animation.onfinish = () => { jumper.remove(); resolve(); };
        });
    }

    initBackground(); initLevel();
</script>
</body>
</html>
