<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 光影陣列初稿</title>
    <style>
        :root {
            --bg-deep: #010204; /* 深青黛 */
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none;
        }

        /* 虛空底座 */
        #realmCanvas { position: fixed; inset: 0; z-index: -1; }

        #header {
            padding: 20px 25px; display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15); z-index: 10;
        }
        .lv-tag { letter-spacing: 3px; color: var(--gold); font-size: 1rem; font-weight: bold; }
        .info-tag { font-size: 0.8rem; color: var(--cyan); letter-spacing: 1px; margin-top: 5px; }

        /* 法器陣列區 */
        #game-area {
            flex: 1; display: flex; flex-wrap: wrap; justify-content: center; align-content: center;
            gap: 20px 25px; padding: 30px; z-index: 10;
        }

        /* ✨ 琉璃法器 (容器) */
        .vessel {
            width: 54px; height: 210px; position: relative; cursor: pointer;
            border: 2px solid rgba(243, 229, 171, 0.3);
            border-top: none;
            border-radius: 0 0 27px 27px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            box-shadow: 
                inset 8px 0 15px rgba(255,255,255,0.1), 
                inset -8px 0 15px rgba(0,0,0,0.6),
                0 10px 20px rgba(0,0,0,0.5);
            display: flex; flex-direction: column-reverse; /* 寶珠從底部往上疊 */
            align-items: center; padding-bottom: 5px; gap: 2px;
            transition: all 0.3s ease;
        }

        /* 容器發光選取狀態 */
        .vessel.selected {
            border-color: rgba(243, 229, 171, 0.8);
            box-shadow: 
                inset 8px 0 15px rgba(255,255,255,0.2), 
                inset -8px 0 15px rgba(0,0,0,0.4),
                0 0 25px rgba(212, 175, 55, 0.4);
            transform: translateY(-10px);
        }

        /* 法器瓶口環 */
        .vessel::before {
            content: ''; position: absolute; top: -4px; left: -4px; right: -4px; height: 10px;
            border: 2px solid rgba(243, 229, 171, 0.6); border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 5;
        }

        /* ✨ 資糧寶珠 */
        .orb {
            width: 44px; height: 44px; border-radius: 50%;
            position: relative; transition: all 0.3s;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5), inset 5px 5px 15px rgba(255,255,255,0.5);
            z-index: 2; flex-shrink: 0;
        }

        /* 寶珠選中時的浮動感 */
        .vessel.selected .orb:last-child {
            transform: translateY(-15px);
            filter: brightness(1.3);
            box-shadow: 0 0 20px currentColor, inset -5px -5px 15px rgba(0,0,0,0.5), inset 5px 5px 15px rgba(255,255,255,0.5);
        }

        /* 躍遷中的光芒寶珠 */
        .orb-jump {
            position: fixed; width: 44px; height: 44px; border-radius: 50%;
            box-shadow: 0 0 30px currentColor, inset -5px -5px 15px rgba(0,0,0,0.5), inset 5px 5px 15px rgba(255,255,255,0.8);
            z-index: 100; pointer-events: none;
        }

        #footer { padding: 25px; display: flex; justify-content: center; z-index: 10; }
        .reset-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--cyan);
            color: var(--cyan); padding: 10px 25px; border-radius: 20px;
            font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .reset-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<canvas id="realmCanvas"></canvas>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">初境 ‧ 能量躍遷</div>
        <div class="info-tag">點擊寶珠 ． 理順光影</div>
    </div>
</div>

<div id="game-area"></div>

<div id="footer">
    <div class="reset-btn" onclick="initLevel()">重整陣列</div>
</div>

<script>
    // 柔和的發光色彩，搭配深黛色背景
    const ORB_COLORS = ['#e63946', '#2a9d8f', '#00b4d8', '#d4af37', '#9b5de5'];
    
    // 每個容器的最大容量
    const MAX_ORBS = 4;

    let db = {
        level: 1, vessels: [], selectedIdx: null, isAnimating: false
    };

    // 一葦渡江極簡底座
    function initBackground() {
        const cvs = document.getElementById('realmCanvas');
        const ctx = cvs.getContext('2d');
        let w, h; let waves = [];
        const resize = () => { w = cvs.width = window.innerWidth; h = cvs.height = window.innerHeight; };
        window.addEventListener('resize', resize); resize();

        for(let i=0; i<50; i++) waves.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*2+1, a: Math.random()*Math.PI*2 });

        function draw() {
            ctx.fillStyle = 'rgba(1, 2, 4, 0.3)'; ctx.fillRect(0, 0, w, h);
            waves.forEach(p => {
                p.y -= 0.5; p.x += Math.sin(p.a)*0.5; p.a += 0.02;
                if(p.y < 0) p.y = h;
                ctx.fillStyle = `rgba(212, 175, 55, ${0.1 + Math.random()*0.2})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    function initLevel() {
        const grid = document.getElementById('game-area');
        grid.innerHTML = '';
        db.vessels = []; db.selectedIdx = null; db.isAnimating = false;

        // 初稿強制設定為：3個容器，2種顏色寶珠
        let colorNum = 2;
        let vesselNum = 3; 
        
        let pool = [];
        for(let i=0; i<colorNum; i++) {
            for(let j=0; j<MAX_ORBS; j++) pool.push(ORB_COLORS[i]);
        }
        pool.sort(() => Math.random() - 0.5);

        for (let i = 0; i < vesselNum; i++) {
            let content = (i < colorNum) ? pool.splice(0, MAX_ORBS) : [];
            db.vessels.push(content);
            
            const v = document.createElement('div');
            v.className = 'vessel'; v.id = `vsl-${i}`;
            v.onclick = () => handleTap(i);
            
            grid.appendChild(v);
            renderOrbs(i);
        }
    }

    function renderOrbs(idx) {
        const v = document.getElementById(`vsl-${idx}`);
        v.innerHTML = ''; 
        
        db.vessels[idx].forEach(color => {
            const orb = document.createElement('div');
            orb.className = 'orb';
            orb.style.backgroundColor = color;
            orb.style.color = color; // 傳遞顏色給 box-shadow 使用
            v.appendChild(orb);
        });
    }

    async function handleTap(idx) {
        if (db.isAnimating) return;
        const targetEl = document.getElementById(`vsl-${idx}`);
        
        // 1. 尚未選取
        if (db.selectedIdx === null) {
            if (db.vessels[idx].length === 0) return; // 空法器無法選取
            db.selectedIdx = idx; 
            targetEl.classList.add('selected');
        } 
        // 2. 已選取，執行躍遷判定
        else {
            const fromIdx = db.selectedIdx;
            const toIdx = idx;
            const fromEl = document.getElementById(`vsl-${fromIdx}`);
            
            // 點擊同一個，取消選取
            if (fromIdx === toIdx) {
                fromEl.classList.remove('selected');
                db.selectedIdx = null; return;
            }

            const fromArr = db.vessels[fromIdx];
            const toArr = db.vessels[toIdx];
            const moveColor = fromArr[fromArr.length - 1];

            // 規則：目標未滿，且(目標為空 或 頂部同色)
            if (toArr.length < MAX_ORBS && (toArr.length === 0 || toArr[toArr.length-1] === moveColor)) {
                db.isAnimating = true;
                
                // 取消原本的發光狀態，準備動畫
                fromEl.classList.remove('selected');
                
                // 將陣列最上層彈出並準備推入
                const poppedColor = fromArr.pop();

                // 取得 DOM 元素進行動畫軌跡計算
                const fromOrbs = fromEl.querySelectorAll('.orb');
                const topOrbEl = fromOrbs[fromOrbs.length - 1];
                const fromRect = topOrbEl.getBoundingClientRect();
                
                // 隱藏原本的寶珠
                topOrbEl.style.opacity = '0';

                // 計算目標落點 (精算高度)
                const toRect = targetEl.getBoundingClientRect();
                // 容器底部位置減去現有寶珠堆疊的高度，加上內邊距
                const destX = toRect.left + (toRect.width - 44) / 2;
                const destY = toRect.bottom - 5 - 46 * (toArr.length + 1);

                // 執行光影躍遷動畫
                await animateOrbJump(fromRect.left, fromRect.top - 15, destX, destY, poppedColor);
                
                // 動畫結束，更新邏輯陣列與 DOM
                toArr.push(poppedColor);
                renderOrbs(fromIdx); 
                renderOrbs(toIdx);
                
                checkWin();
            } else {
                // 不合法，取消選取
                fromEl.classList.remove('selected');
            }
            
            db.selectedIdx = null; 
            db.isAnimating = false;
        }
    }

    // ✨ 核心光影躍遷物理引擎 (貝茲曲線拋物線)
    function animateOrbJump(startX, startY, endX, endY, color) {
        return new Promise(resolve => {
            const jumper = document.createElement('div');
            jumper.className = 'orb-jump';
            jumper.style.backgroundColor = color;
            jumper.style.color = color;
            document.body.appendChild(jumper);

            // 計算拋物線的最高點 (拉出一道優美的弧線)
            const controlY = Math.min(startY, endY) - 150; 
            const deltaX = endX - startX;

            // 使用 Web Animations API 實現完美的拋物線
            const animation = jumper.animate([
                { transform: `translate(${startX}px, ${startY}px) scale(1)` },
                { transform: `translate(${startX + deltaX*0.5}px, ${controlY}px) scale(1.1)` },
                { transform: `translate(${endX}px, ${endY}px) scale(1)` }
            ], {
                duration: 400,
                easing: 'cubic-bezier(0.25, 0.8, 0.25, 1)', // 柔和的加減速
                fill: 'forwards'
            });

            animation.onfinish = () => {
                jumper.remove();
                resolve();
            };
        });
    }

    function checkWin() {
        const win = db.vessels.every(v => v.length === 0 || (v.length === MAX_ORBS && v.every(c => c === v[0])));
        if (win) {
            setTimeout(() => {
                db.level++;
                initLevel();
            }, 1000);
        }
    }

    initBackground();
    initLevel();
</script>
</body>
</html>
