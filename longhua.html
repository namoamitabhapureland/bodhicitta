<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 立體冰晶壇城</title>
    <style>
        :root {
            --bg-deep: #020306;
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
            /* 水晶切面專用色 - 冰冷透明 */
            --cry-highlight: rgba(255, 255, 255, 0.4);
            --cry-body: rgba(200, 220, 255, 0.08);
            --cry-shadow: rgba(0, 0, 0, 0.5);
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
            touch-action: pan-y; 
        }

        /* 菩提心三千世界底座 - 加強模糊與深邃感 */
        #realmCanvas { position: fixed; inset: 0; z-index: -1; filter: blur(2px); }

        #header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15); z-index: 10; backdrop-filter: blur(5px);
        }
        .lv-tag { letter-spacing: 3px; color: var(--gold); font-size: 1rem; font-weight: bold; }
        .info-tag { font-size: 0.75rem; color: var(--cyan); letter-spacing: 1px; margin-top: 5px; }

        /* 加強透視深度 */
        #scene {
            flex: 1; display: flex; justify-content: center; align-items: center;
            perspective: 2000px; overflow: hidden; position: relative; z-index: 10;
        }
        #carousel {
            width: 50px; height: 180px; position: relative;
            transform-style: preserve-3d; transition: transform 0.1s ease-out;
        }

        /* ✨ 真正的立體六角水晶柱 (Isometric Hexagonal Prism) */
        .crystal {
            position: absolute; top: 0; left: 0; width: 50px; height: 180px;
            cursor: pointer; transform-style: preserve-3d;
            transition: filter 0.3s, transform 0.3s;
        }
        
        /*正面 (玻璃通透感)*/
        .v-face {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 100%);
            backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column-reverse; align-items: center; 
            padding-bottom: 8px; gap: 3px; box-sizing: border-box; z-index: 2;
        }

        /*正面切面高光與陰影*/
        .v-face::before {
            content:''; position: absolute; left: 0; top: 0; height: 100%; width: 30%;
            background: linear-gradient(to right, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%);
        }
        .v-face::after {
            content:''; position: absolute; right: 0; top: 0; height: 100%; width: 30%;
            background: linear-gradient(to left, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 100%);
        }

        /*立體側面與頂部*/
        .crystal-3d { position: absolute; inset: 0; transform-style: preserve-3d; z-index: 1; }
        
        /*頂部六角切面*/
        .crystal-3d::before {
            content:''; position: absolute; top: -14px; left: 0; width: 50px; height: 28px;
            background: rgba(255,255,255,0.1);
            clip-path: polygon(25% 0, 75% 0, 100% 50%, 75% 100%, 25% 100%, 0 50%);
            transform: rotateX(90deg) translateZ(0px); /* 貼合頂部 */
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        /* 側面幾何 */
        .crystal-3d::after {
            content:''; position: absolute; top: -14px; right: -7px; width: 14px; height: 180px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(255,255,255,0.1) 50%, rgba(0,0,0,0.4) 100%);
            transform: rotateY(60deg) translateZ(0px); /* 貼合側面 */
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        /* 容器選取狀態 */
        .crystal.selected .v-face {
            border-color: rgba(243, 229, 171, 0.8);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4), inset 0 0 15px rgba(255,255,255,0.1);
            transform: translateZ(20px); /* 向前浮出 */
        }
        .crystal.selected { transform: translateY(-10px); }

        /* ✨ 淺色清透資糧 (靜態幾何塊) */
        .gem-block {
            width: 80%; height: 25%; position: relative; transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 1px 3px rgba(255,255,255,0.2);
            border-radius: 4px;
            opacity: 0.8; /* 增加透明度 */
        }

        /* 躍遷前奏：晶塊收縮 */
        .crystal.selected .gem-block:last-child {
            border-radius: 50%; width: 28px; height: 28px; margin: 0 auto;
            transform: translateY(-10px); filter: brightness(1.2); opacity: 1;
            box-shadow: 0 0 15px currentColor, inset -3px -3px 8px rgba(0,0,0,0.5);
        }

        /* 躍遷光球 (動態) */
        .orb-jump {
            position: fixed; width: 28px; height: 28px; border-radius: 50%;
            box-shadow: 0 0 25px currentColor, inset -3px -3px 8px rgba(0,0,0,0.5);
            z-index: 1000; pointer-events: none;
        }

        #footer { padding: 15px; display: flex; justify-content: center; z-index: 10; }
        .reset-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--cyan); color: var(--cyan);
            padding: 8px 25px; border-radius: 20px; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer;
        }
    </style>
</head>
<body>

<canvas id="realmCanvas"></canvas>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">立體壇城 ‧ 冰晶壇城</div>
        <div class="info-tag">轉動法輪，理順清透資糧</div>
    </div>
</div>

<div id="scene">
    <div id="carousel"></div>
</div>

<div id="footer">
    <div class="reset-btn" onclick="initLevel()">重整陣列</div>
</div>

<script>
    // 清透淺色系色彩
    const PASTEL_COLORS = ['#ffadad', '#ffd6a5', '#fdffb6', '#caffbf', '#9bf6ff', '#a0c4ff', '#bdb2ff', '#ffc6ff'];
    const MAX_GEMS = 4;
    const TOTAL_VESSELS = 12; // 測試用

    let db = {
        crystals: [], selectedIdx: null, isAnimating: false,
        carouselRotY: 0, radius: 0
    };

    // 三千世界背景引擎
    function initBackground() {
        const cvs = document.getElementById('realmCanvas');
        const ctx = cvs.getContext('2d');
        let w, h; let stars = [];
        const resize = () => { w = cvs.width = window.innerWidth; h = cvs.height = window.innerHeight; };
        window.addEventListener('resize', resize); resize();
        for(let i=0; i<100; i++) stars.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*2, a: Math.random()*Math.PI*2, speed: Math.random()*0.3+0.05 });
        function draw() {
            ctx.fillStyle = 'rgba(2, 3, 6, 0.4)'; ctx.fillRect(0, 0, w, h);
            stars.forEach(p => {
                p.y -= p.speed; p.x += Math.sin(p.a)*0.2; p.a += 0.01;
                if(p.y < 0) p.y = h;
                ctx.fillStyle = `rgba(139, 168, 156, ${0.1 + Math.random()*0.3})`; // 淺青黛色星雲
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    function initLevel() {
        const carousel = document.getElementById('carousel');
        carousel.innerHTML = '';
        db.crystals = []; db.selectedIdx = null; db.isAnimating = false;
        db.carouselRotY = 0; carousel.style.transform = `rotateY(0deg)`;
        
        // 加大半徑，增加法輪開闊感
        db.radius = Math.round((50 / 2) / Math.tan(Math.PI / TOTAL_VESSELS)) + 50;

        let pool = [];
        for(let i=0; i<TOTAL_VESSELS - 2; i++) {
            for(let j=0; j<MAX_GEMS; j++) pool.push(PASTEL_COLORS[i % PASTEL_COLORS.length]);
        }
        pool.sort(() => Math.random() - 0.5);

        for (let i = 0; i < TOTAL_VESSELS; i++) {
            let content = (i < TOTAL_VESSELS - 2) ? pool.splice(0, MAX_GEMS) : [];
            db.crystals.push(content);
            
            // ✨ 立體容器 DOM 結構
            const crystal = document.createElement('div');
            crystal.className = 'crystal'; crystal.id = `cry-${i}`;
            
            const crystal3D = document.createElement('div');
            crystal3D.className = 'crystal-3d';
            
            const face = document.createElement('div');
            face.className = 'v-face';
            
            crystal.appendChild(crystal3D);
            crystal.appendChild(face);
            
            let theta = (360 / TOTAL_VESSELS) * i;
            crystal.style.transform = `rotateY(${theta}deg) translateZ(${db.radius}px)`;
            
            crystal.onclick = () => handleTap(i, theta);
            carousel.appendChild(crystal);
            renderGems(i);
        }
        updateShading();
    }

    function renderGems(idx) {
        const face = document.getElementById(`cry-${idx}`).querySelector('.v-face');
        face.innerHTML = '';
        db.crystals[idx].forEach(color => {
            const gem = document.createElement('div');
            gem.className = 'gem-block'; gem.style.backgroundColor = color; gem.style.color = color;
            face.appendChild(gem);
        });
    }

    // 3D 旋轉控制
    let isDragging = false, startX = 0;
    const scene = document.getElementById('scene');
    const carousel = document.getElementById('carousel');

    function onPointerDown(e) { isDragging = true; startX = e.clientX || e.touches[0].clientX; carousel.style.transition = 'none'; }
    function onPointerMove(e) {
        if (!isDragging) return;
        let x = e.clientX || e.touches[0].clientX;
        db.carouselRotY += (x - startX) * 0.4; startX = x;
        carousel.style.transform = `rotateY(${db.carouselRotY}deg)`;
        updateShading();
    }
    function onPointerUp() { if(!isDragging) return; isDragging = false; carousel.style.transition = 'transform 0.5s ease-out'; }
    
    scene.addEventListener('mousedown', onPointerDown); window.addEventListener('mousemove', onPointerMove); window.addEventListener('mouseup', onPointerUp);
    scene.addEventListener('touchstart', onPointerDown, {passive: true}); window.addEventListener('touchmove', onPointerMove, {passive: true}); window.addEventListener('touchend', onPointerUp);

    function updateShading() {
        document.querySelectorAll('.crystal').forEach((c, i) => {
            let theta = (360 / TOTAL_VESSELS) * i;
            let currentAngle = (theta + db.carouselRotY) % 360;
            if(currentAngle < 0) currentAngle += 360;
            let dist = Math.min(currentAngle, 360 - currentAngle);
            if(dist > 90) { c.style.filter = 'brightness(0.2) blur(3px)'; c.style.pointerEvents = 'none'; } 
            else { c.style.filter = 'brightness(1) blur(0px)'; c.style.pointerEvents = 'auto'; }
        });
    }

    async function handleTap(idx, theta) {
        if (db.isAnimating || isDragging) return;
        const targetEl = document.getElementById(`cry-${idx}`);
        
        if (db.selectedIdx === null) {
            if (db.crystals[idx].length === 0) return;
            db.selectedIdx = idx; targetEl.classList.add('selected');
        } else {
            const fromIdx = db.selectedIdx; const toIdx = idx;
            const fromEl = document.getElementById(`cry-${fromIdx}`);
            if (fromIdx === toIdx) { fromEl.classList.remove('selected'); db.selectedIdx = null; return; }

            const fromArr = db.crystals[fromIdx]; const toArr = db.crystals[toIdx];
            const moveColor = fromArr[fromArr.length - 1];

            if (toArr.length < MAX_GEMS && (toArr.length === 0 || toArr[toArr.length-1] === moveColor)) {
                db.isAnimating = true; fromEl.classList.remove('selected');
                
                db.carouselRotY = -theta;
                carousel.style.transition = 'transform 0.4s ease-in-out';
                carousel.style.transform = `rotateY(${db.carouselRotY}deg)`;
                updateShading();

                await new Promise(r => setTimeout(r, 450));

                const poppedColor = fromArr.pop();
                const fromFace = fromEl.querySelector('.v-face');
                const fromGems = fromFace.querySelectorAll('.gem-block');
                const topGemEl = fromGems[fromGems.length - 1];
                
                const fromRect = topGemEl.getBoundingClientRect();
                topGemEl.style.opacity = '0';

                const targetFace = targetEl.querySelector('.v-face');
                const toRect = targetFace.getBoundingClientRect();
                const destX = toRect.left + (toRect.width - 28) / 2;
                const destY = toRect.bottom - 8 - 43 * (toArr.length + 1); // 适配新尺寸

                await animateOrbJump(fromRect.left, fromRect.top, destX, destY, poppedColor);
                
                toArr.push(poppedColor);
                renderGems(fromIdx); renderGems(toIdx);
            } else { fromEl.classList.remove('selected'); }
            db.selectedIdx = null; db.isAnimating = false;
        }
    }

    function animateOrbJump(startX, startY, endX, endY, color) {
        return new Promise(resolve => {
            const jumper = document.createElement('div');
            jumper.className = 'orb-jump';
            jumper.style.backgroundColor = color; jumper.style.color = color;
            document.body.appendChild(jumper);

            const controlY = Math.min(startY, endY) - 150; 
            const deltaX = endX - startX;

            const animation = jumper.animate([
                { transform: `translate(${startX}px, ${startY}px) scale(1)` },
                { transform: `translate(${startX + deltaX*0.5}px, ${controlY}px) scale(1.3)` },
                { transform: `translate(${endX}px, ${endY}px) scale(1)` }
            ], { duration: 400, easing: 'cubic-bezier(0.25, 0.8, 0.25, 1)', fill: 'forwards' });

            animation.onfinish = () => { jumper.remove(); resolve(); };
        });
    }

    initBackground(); initLevel();
</script>
</body>
</html>
