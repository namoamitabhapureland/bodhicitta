<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 萬日修行版</title>
    <style>
        :root {
            --bg: #020205;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --lotus-pink: #ffb7c5;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }

        /* ✨ 流動虛空背景 */
        #space-canvas {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%);
        }

        #header {
            padding: 25px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(10px);
        }

        .level-info {
            letter-spacing: 3px; color: var(--gold); font-size: 0.9rem;
            text-shadow: 0 0 10px rgba(212,175,55,0.5);
        }

        /* ✨ 般若時限光弦 */
        #timer-container {
            width: 100%; height: 2px; background: rgba(255,255,255,0.1);
            position: relative; display: none;
        }
        #timer-bar {
            height: 100%; background: var(--solid-gold); width: 100%;
            box-shadow: 0 0 15px var(--gold); transition: width 0.1s linear;
        }

        /* ✨ 中央旋轉蓮華 */
        #lotus-stage {
            height: 30vh; display: flex; justify-content: center; align-items: center;
            position: relative; transition: transform 2s ease-in-out;
        }
        #main-lotus {
            width: 200px; height: 200px; filter: drop-shadow(0 0 30px rgba(212,175,55,0.3));
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ✨ 琉璃瓶區域 */
        #game-grid {
            flex: 1; display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; padding: 20px; justify-items: center; align-content: center;
        }

        .bottle {
            width: 50px; height: 150px; position: relative; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bottle.selected { transform: translateY(-20px); filter: brightness(1.3); }
        
        /* 瓶身碎裂動畫類 */
        .bottle.cracked { animation: crack 0.5s forwards; opacity: 0.5; pointer-events: none; }

        .bottle-glass {
            width: 100%; height: 100%; border: 1.5px solid rgba(243, 229, 171, 0.3);
            border-radius: 8px 8px 18px 18px; overflow: hidden;
            background: var(--glass); backdrop-filter: blur(5px);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05);
        }

        .liquid-layer {
            position: absolute; width: 100%; transition: all 0.5s ease;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        /* ✨ 介面控制 */
        .ui-layer { padding: 30px; display: flex; gap: 20px; justify-content: center; }
        .action-btn {
            background: transparent; border: 1px solid var(--cyan); color: var(--cyan);
            padding: 10px 25px; border-radius: 20px; font-size: 0.85rem; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s;
        }
        .action-btn:active { transform: scale(0.9); }

        @keyframes crack {
            0% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(0) rotate(-10deg); }
        }

        #toast {
            position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
            color: var(--gold); letter-spacing: 4px; font-size: 1rem;
            opacity: 0; transition: 1s; pointer-events: none;
        }
    </style>
</head>
<body>

<canvas id="space-canvas"></canvas>

<div id="header">
    <div class="level-info" id="level-display">第十重 ‧ 般若初照</div>
    <div style="font-size: 0.75rem; color: var(--cyan);">累積資糧：<span id="merit-total">0</span></div>
</div>

<div id="timer-container">
    <div id="timer-bar"></div>
</div>

<div id="lotus-stage">
    <svg id="main-lotus" viewBox="0 0 200 200">
        <defs>
            <radialGradient id="lotusGold" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff" />
                <stop offset="80%" stop-color="#f3e5ab" />
                <stop offset="100%" stop-color="#d4af37" stop-opacity="0.2" />
            </radialGradient>
        </defs>
        <g id="lotus-petals" transform="translate(100, 100)"></g>
    </svg>
</div>

<div id="game-grid"></div>

<div class="ui-layer">
    <div class="action-btn" onclick="resetCurrent()">重整心識</div>
</div>

<div id="toast"></div>

<script>
    const COLORS = {
        'red': '#e63946', 'gold': '#f3e5ab', 'teal': '#2a9d8f',
        'purple': '#9b5de5', 'blue': '#00b4d8', 'pink': '#ffb7c5'
    };

    let state = {
        level: 10,
        merit: 0,
        bottles: [],
        selected: null,
        isAnimating: false,
        timer: null,
        timeLeft: 100
    };

    // ✨ 背景流動特效
    function initSpace() {
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize); resize();

        for(let i=0; i<150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                z: Math.random() * canvas.width,
                o: Math.random()
            });
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            
            stars.forEach(s => {
                s.z -= 0.5;
                if(s.z <= 0) s.z = canvas.width;
                let k = 128 / s.z;
                let px = (s.x - canvas.width/2) * k + canvas.width/2;
                let py = (s.y - canvas.height/2) * k + canvas.height/2;
                
                if(px>=0 && px<=canvas.width && py>=0 && py<=canvas.height) {
                    let size = (1 - s.z/canvas.width) * 3;
                    ctx.fillStyle = `rgba(243, 229, 171, ${1 - s.z/canvas.width})`;
                    ctx.beginPath();
                    ctx.arc(px, py, size, 0, Math.PI*2);
                    ctx.fill();
                }
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    // ✨ 蓮花動態生長與旋轉
    function updateLotusVisual() {
        const group = document.getElementById('lotus-petals');
        group.innerHTML = '';
        
        const layers = 2 + Math.floor(state.merit / 200);
        const scale = 0.5 + (state.merit / 1000);
        const rotation = (Date.now() / 50) % 360;

        document.getElementById('main-lotus').style.transform = `scale(${scale}) rotate(${rotation}deg)`;
        
        for (let l = 0; l < layers; l++) {
            const count = 8 + l * 4;
            const opacity = 0.8 - (l * 0.15);
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * 360 + (l * 20);
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", "M0,0 C10,-15 20,-30 0,-60 C-20,-30 -10,-15 0,0");
                path.setAttribute("fill", "url(#lotusGold)");
                path.setAttribute("opacity", opacity);
                path.setAttribute("transform", `rotate(${angle}) scale(${1 - l*0.2})`);
                group.appendChild(path);
            }
        }
        
        // 隨機漂浮感
        const floatX = Math.sin(Date.now() / 1000) * 10;
        const floatY = Math.cos(Date.now() / 1200) * 10;
        document.getElementById('lotus-stage').style.transform = `translate(${floatX}px, ${floatY}px)`;
    }

    // ✨ 核心遊戲邏輯
    function initLevel() {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';
        state.bottles = [];
        state.selected = null;
        
        // 難度配置
        const numColors = state.level >= 20 ? 6 : 5;
        const numBottles = numColors + 3;
        
        let colorPool = [];
        const colorKeys = Object.keys(COLORS).slice(0, numColors);
        colorKeys.forEach(c => { for(let i=0; i<4; i++) colorPool.push(c); });
        colorPool.sort(() => Math.random() - 0.5);

        for (let i = 0; i < numBottles; i++) {
            let contents = (i < numBottles - 2) ? colorPool.splice(0, 4) : [];
            state.bottles.push(contents);

            const b = document.createElement('div');
            b.className = 'bottle';
            b.id = `bottle-${i}`;
            b.onclick = () => handleSelect(i);
            
            const glass = document.createElement('div');
            glass.className = 'bottle-glass';
            b.appendChild(glass);
            grid.appendChild(b);
            renderLiquids(i);
        }

        // 大魔王關卡計時器
        if(state.level % 10 === 0) {
            startTimer();
        } else {
            stopTimer();
        }

        document.getElementById('level-display').innerText = `第 ${state.level} 重 ‧ ${state.level >= 20 ? '業力考驗' : '覺照初入'}`;
        updateLotusVisual();
    }

    function renderLiquids(idx) {
        const b = document.getElementById(`bottle-${idx}`).querySelector('.bottle-glass');
        b.querySelectorAll('.liquid-layer').forEach(l => l.remove());
        
        state.bottles[idx].forEach((c, i) => {
            const layer = document.createElement('div');
            layer.className = 'liquid-layer';
            layer.style.height = '25%';
            layer.style.bottom = (i * 25) + '%';
            layer.style.backgroundColor = COLORS[c];
            layer.style.boxShadow = `inset 0 0 10px rgba(255,255,255,0.2), 0 0 10px ${COLORS[c]}`;
            b.appendChild(layer);
        });
    }

    async function handleSelect(idx) {
        if (state.isAnimating) return;

        if (state.selected === null) {
            if (state.bottles[idx].length === 0) return;
            state.selected = idx;
            document.getElementById(`bottle-${idx}`).classList.add('selected');
        } else {
            if (state.selected === idx) {
                document.getElementById(`bottle-${idx}`).classList.remove('selected');
                state.selected = null;
                return;
            }

            const from = state.bottles[state.selected];
            const to = state.bottles[idx];
            const moveColor = from[from.length - 1];

            if (to.length < 4 && (to.length === 0 || to[to.length - 1] === moveColor)) {
                state.isAnimating = true;
                while (from.length > 0 && from[from.length - 1] === moveColor && to.length < 4) {
                    to.push(from.pop());
                    renderLiquids(state.selected);
                    renderLiquids(idx);
                    await new Promise(r => setTimeout(r, 250));
                }
                checkWin();
            }
            
            document.getElementById(`bottle-${state.selected}`).classList.remove('selected');
            state.selected = null;
            state.isAnimating = false;
        }
    }

    function startTimer() {
        document.getElementById('timer-container').style.display = 'block';
        state.timeLeft = 100;
        clearInterval(state.timer);
        state.timer = setInterval(() => {
            state.timeLeft -= 0.5;
            document.getElementById('timer-bar').style.width = state.timeLeft + '%';
            if(state.timeLeft <= 0) {
                clearInterval(state.timer);
                failLevel();
            }
        }, 500);
    }

    function stopTimer() {
        document.getElementById('timer-container').style.display = 'none';
        clearInterval(state.timer);
    }

    function failLevel() {
        document.querySelectorAll('.bottle').forEach(b => b.classList.add('cracked'));
        showToast("時空消解 ‧ 攝心重來");
        setTimeout(initLevel, 1500);
    }

    function checkWin() {
        const isWin = state.bottles.every(b => b.length === 0 || (b.length === 4 && b.every(c => c === b[0])));
        if (isWin) {
            stopTimer();
            state.merit += 100;
            document.getElementById('merit-total').innerText = state.merit;
            showToast("資糧增長 ‧ 圓滿此重");
            setTimeout(() => {
                state.level++;
                initLevel();
            }, 1500);
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 2000);
    }

    function resetCurrent() { initLevel(); }

    // ✨ 初始啟動
    initSpace();
    initLevel();
    setInterval(updateLotusVisual, 100);

</script>
</body>
</html>
