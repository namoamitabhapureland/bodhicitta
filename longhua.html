<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨流 ‧ 琉璃萬德 - 菩提觀心・正法水</title>
    <style>
        :root {
            --bg-deep: #010204;
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
            
            /* 法水主題色 (躍遷水滴用) */
            --color-red: #ff4d4d; --color-cyan: #00e5ff; --color-gold: #ffe066;
            --color-purple: #d8b4fe; --color-green: #80ed99; --color-orange: #ffb703; --color-pink: #ffb7c5;
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; }

        #header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(212, 175, 55, 0.15); z-index: 10; position: relative; background: rgba(2, 3, 6, 0.4); backdrop-filter: blur(5px); }
        .lv-tag { letter-spacing: 3px; color: var(--gold); font-size: 1rem; font-weight: bold; }
        .info-tag { font-size: 0.75rem; color: var(--cyan); letter-spacing: 1px; margin-top: 5px; }

        /* ✨ 實裝：中心唯餘一光，如菩提心跳動放大 (無圖、無虛線) */
        #center-point {
            position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px; background: #fff; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 5; pointer-events: none;
            filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 35px #d4af37);
            animation: breathe 3s infinite alternate ease-in-out;
        }
        @keyframes breathe {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.5; filter: drop-shadow(0 0 10px #fff); }
            100% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; filter: drop-shadow(0 0 25px #fff) drop-shadow(0 0 50px #d4af37); }
        }

        #scene { flex: 1; display: flex; justify-content: center; align-items: center; perspective: 1200px; overflow: hidden; position: relative; z-index: 10; }
        #carousel { width: 80px; height: 180px; position: relative; transform-style: preserve-3d; transition: transform 0.1s ease-out; }

        /* 法尊淨瓶容器 (純粹定位用) */
        .vessel {
            position: absolute; top: 0; left: -10px; width: 100px; height: 150px;
            cursor: pointer; transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .bottle-svg {
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;
            transition: filter 0.3s;
        }

        /* 點擊提舉發光 */
        .vessel.selected { transform: translateY(-15px); }
        .vessel.selected .bottle-svg { filter: drop-shadow(0 0 15px rgba(243, 229, 171, 0.8)); }

        /* 躍遷水滴 (使用主題色) */
        .drop-jump {
            position: fixed; width: 20px; height: 20px; border-radius: 50%;
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.5), inset 3px 3px 8px rgba(255,255,255,0.9);
            z-index: 1000; pointer-events: none;
        }

        #footer { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 10; position: relative; }
        .tool-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--cyan); color: var(--cyan); padding: 10px 18px; border-radius: 20px; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; backdrop-filter: blur(5px); transition: 0.3s; }
        .tool-btn:active { transform: scale(0.95); background: rgba(139, 168, 156, 0.2); }
    </style>
</head>
<body>

<svg style="width:0; height:0; position:absolute;">
    <defs>
        <linearGradient id="grad-red" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ff4d4d"/><stop offset="100%" stop-color="#800000"/></linearGradient>
        <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#00e5ff"/><stop offset="100%" stop-color="#004d40"/></linearGradient>
        <linearGradient id="grad-gold" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffe066"/><stop offset="100%" stop-color="#8b6508"/></linearGradient>
        <linearGradient id="grad-purple" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#d8b4fe"/><stop offset="100%" stop-color="#4a148c"/></linearGradient>
        <linearGradient id="grad-green" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#80ed99"/><stop offset="100%" stop-color="#1b5e20"/></linearGradient>
        <linearGradient id="grad-orange" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffb703"/><stop offset="100%" stop-color="#e65100"/></linearGradient>
        <linearGradient id="grad-pink" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffb7c5"/><stop offset="100%" stop-color="#880e4f"/></linearGradient>
        
        <linearGradient id="glass-glare" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
            <stop offset="40%" stop-color="rgba(255,255,255,0)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
        </linearGradient>
    </defs>
</svg>

<canvas id="bgCanvas"></canvas>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">第 1 關</div>
        <div class="info-tag">理順色相，轉識成智</div>
    </div>
</div>

<div id="scene">
    <div id="center-point"></div>
    <div id="carousel"></div>
</div>

<div id="footer">
    <div class="tool-btn" onclick="initLevel()">重整陣列</div>
    <div class="tool-btn" style="border-color:var(--solid-gold); color:var(--gold);" onclick="forceNextLevel()">過關 +10</div>
</div>

<script>
    // 音效引擎
    let audioCtx = null;
    function initAudio() { try { if (!audioCtx) { const AC = window.AudioContext || window.webkitAudioContext; if(AC) audioCtx = new AC(); } if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); } catch(e) {} }
    function playTone(freq, type, duration, vol) { try { if (!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration); } catch(e) {} }
    function playSelectSound() { playTone(1200, 'sine', 0.1, 0.2); } 
    function playJumpSound() { playTone(800, 'triangle', 0.25, 0.15); } 
    function playErrorSound() { playTone(200, 'sawtooth', 0.2, 0.2); } 
    function playWinSound() { playTone(432, 'sine', 2.0, 0.4); } 

    // 背景星空與清晰光球
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let cw, ch, stars = [], colorOrbs = [];
    const orbColors = ['rgba(230, 57, 70, 0.5)', 'rgba(0, 180, 216, 0.5)', 'rgba(212, 175, 55, 0.5)', 'rgba(155, 93, 229, 0.5)'];

    function resizeCanvas() { cw = canvas.width = window.innerWidth; ch = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    for(let i=0; i<150; i++) stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, size: Math.random() * 2 + 0.5 });
    for(let i=0; i<6; i++) colorOrbs.push({ x: Math.random() * cw, y: Math.random() * ch, radius: Math.random() * 100 + 60, color: orbColors[i % 4], vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5 });

    function drawBg() {
        ctx.fillStyle = '#010204'; ctx.fillRect(0, 0, cw, ch); ctx.globalCompositeOperation = 'screen';
        colorOrbs.forEach(orb => { orb.x += orb.vx; orb.y += orb.vy; if(orb.x < -orb.radius || orb.x > cw + orb.radius) orb.vx *= -1; if(orb.y < -orb.radius || orb.y > ch + orb.radius) orb.vy *= -1; let grad = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.radius); grad.addColorStop(0, orb.color); grad.addColorStop(1, 'rgba(0,0,0,0)'); ctx.beginPath(); ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI*2); ctx.fillStyle = grad; ctx.fill(); });
        stars.forEach(s => { s.z -= 8; if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; } let scale = 800 / (800 + s.z); let px = cw / 2 + s.x * scale; let py = ch / 2 + s.y * scale; if (px > 0 && px < cw && py > 0 && py < ch) { ctx.beginPath(); ctx.arc(px, py, s.size * scale, 0, Math.PI*2); ctx.fillStyle = `rgba(255, 255, 255, ${scale})`; ctx.fill(); } });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(drawBg);
    }
    drawBg();

    // --------------------------------------------------
    // ✨ 核心實裝：還原您的莊嚴 SVG 淨瓶 
    // --------------------------------------------------
    const COLORS = ['red', 'cyan', 'gold', 'purple', 'green', 'orange', 'pink'];
    const MAX_CAPACITY = 4; 

    // 生成完美的 SVG 瓶身
    function getBottleSVG(idx) {
        return `
        <svg viewBox="0 0 100 150" class="bottle-svg">
            <defs>
                <clipPath id="mask-${idx}">
                    <path d="M45,25 L55,25 L58,50 L72,95 L60,125 Q50,135 40,125 L28,95 L42,50 Z" />
                </clipPath>
            </defs>

            <path d="M45,25 L55,25 L58,50 L72,95 L60,125 Q50,135 40,125 L28,95 L42,50 Z" fill="rgba(255,255,255,0.05)" />

            <g id="water-${idx}" clip-path="url(#mask-${idx})"></g>

            <path d="M45,25 L55,25 L58,50 L72,95 L60,125 Q50,135 40,125 L28,95 L42,50 Z" fill="url(#glass-glare)" pointer-events="none"/>
            <ellipse cx="50" cy="95" rx="22" ry="6" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" pointer-events="none"/>
            <ellipse cx="50" cy="95" rx="22" ry="6" fill="rgba(255,255,255,0.15)" pointer-events="none"/>

            <path d="M45,25 L55,25 L58,50 L72,95 L60,125 L40,125 L28,95 L42,50 Z" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round" pointer-events="none"/>
            
            <path d="M40,125 Q50,135 60,125" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" pointer-events="none"/>
        </svg>`;
    }

    let db = { level: 1, vessels: [], selectedIdx: null, isAnimating: false, carouselRotY: 0, radius: 0 };

    function generateLevelData(lv) {
        let totalVessels = Math.min(18, 4 + Math.floor(lv / 5)); 
        let colorTypes = Math.min(7, totalVessels - 2);   
        let pool = [];
        for(let i=0; i < colorTypes; i++) { for(let j=0; j<MAX_CAPACITY; j++) pool.push(COLORS[i]); }
        pool.sort(() => Math.random() - 0.5); 
        let vessels = [];
        for(let i=0; i<totalVessels; i++) { vessels.push(i < colorTypes ? pool.splice(0, MAX_CAPACITY) : []); }
        return vessels;
    }

    function initLevel() {
        db.isAnimating = false; db.selectedIdx = null; isDragging = false; dragDelta = 0;
        const carousel = document.getElementById('carousel'); carousel.innerHTML = ''; 
        db.vessels = generateLevelData(db.level);
        db.carouselRotY = 0; carousel.style.transform = `rotateY(0deg)`;
        
        const total = db.vessels.length;
        const rows = total > 10 ? 2 : 1; const perRow = Math.ceil(total / rows); 
        // 依照淨瓶比例調整半徑，避免互撞
        db.radius = Math.round((100 / 2) / Math.tan(Math.PI / perRow)) + 65; 

        for (let i = 0; i < total; i++) {
            const v = document.createElement('div'); v.className = 'vessel'; v.id = `vsl-${i}`;
            let rowIdx = Math.floor(i / perRow); let colIdx = i % perRow;
            let theta = (360 / perRow) * colIdx;
            let yOffset = rows === 2 ? (rowIdx === 0 ? -100 : 100) : 0; 
            v.style.transform = `rotateY(${theta}deg) translateY(${yOffset}px) translateZ(${db.radius}px)`;
            v.dataset.theta = theta; 
            
            // 注入 SVG 淨瓶
            v.innerHTML = getBottleSVG(i);
            v.onclick = () => handleTap(i, theta);
            carousel.appendChild(v);
            renderWater(i);
        }
        updateShading();
        document.getElementById('lv-display').innerText = `第 ${db.level} 關`;
    }

    // ✨ 實裝：動態等分漸層水 (精準對齊您的四等分邏輯)
    function renderWater(idx) {
        const waterGroup = document.getElementById(`water-${idx}`);
        waterGroup.innerHTML = '';
        const arr = db.vessels[idx];
        
        // 總高度從瓶底 Y=130 到瓶頂 Y=25 (共 105px)
        // 4 等分，每等分高度 26.25px
        // slot 0 (最底): y=103.75, h=26.25
        // slot 1 (下身): y=77.5, h=26.25
        // slot 2 (上身): y=51.25, h=26.25
        // slot 3 (瓶頸): y=25, h=26.25 (這裡平常是空缺無蓋的)
        const slots = [
            { y: 103.75, h: 27 },
            { y: 77.5, h: 26.5 },
            { y: 51.25, h: 26.5 },
            { y: 25, h: 26.5 }
        ];

        arr.forEach((colorId, i) => {
            const slot = slots[i];
            
            // 填入漸層色塊
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("x", "0"); rect.setAttribute("y", slot.y);
            rect.setAttribute("width", "100"); rect.setAttribute("height", slot.h);
            rect.setAttribute("fill", `url(#grad-${colorId})`);
            waterGroup.appendChild(rect);
            
            // 為當前最高水位畫一條折射白線
            if (i === arr.length - 1) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", "10"); line.setAttribute("y1", slot.y);
                line.setAttribute("x2", "90"); line.setAttribute("y2", slot.y);
                line.setAttribute("stroke", "rgba(255,255,255,0.8)");
                line.setAttribute("stroke-width", "1.5");
                waterGroup.appendChild(line);
            }
        });
    }

    // 滑動防干擾
    let isDragging = false, startX = 0, dragDelta = 0; const carousel = document.getElementById('carousel');
    document.addEventListener('pointerdown', e => { if (db.isAnimating || e.target.closest('.tool-btn')) return; initAudio(); isDragging = true; startX = e.clientX; dragDelta = 0; carousel.style.transition = 'none'; });
    document.addEventListener('pointermove', e => { if (!isDragging) return; let delta = e.clientX - startX; dragDelta += Math.abs(delta); db.carouselRotY += delta * 0.4; startX = e.clientX; carousel.style.transform = `rotateY(${db.carouselRotY}deg)`; updateShading(); });
    const endDrag = () => { if(isDragging) { isDragging = false; carousel.style.transition = 'transform 0.5s ease-out'; } };
    document.addEventListener('pointerup', endDrag); document.addEventListener('pointercancel', endDrag); document.addEventListener('pointerleave', endDrag);

    function updateShading() {
        document.querySelectorAll('.vessel').forEach(c => {
            let theta = parseFloat(c.dataset.theta); let currentAngle = (theta + db.carouselRotY) % 360;
            if(currentAngle < 0) currentAngle += 360;
            let dist = Math.min(currentAngle, 360 - currentAngle);
            if(dist > 85) { c.style.filter = 'brightness(0.3) opacity(0.6)'; } 
            else { c.style.filter = c.classList.contains('selected') ? 'brightness(1.3)' : 'brightness(1) opacity(1)'; }
        });
    }

    // 倒水躍遷
    async function handleTap(idx, theta) {
        initAudio();
        if (db.isAnimating || dragDelta > 5) return; 
        const targetEl = document.getElementById(`vsl-${idx}`);
        
        if (db.selectedIdx === null) {
            if (db.vessels[idx].length === 0) return;
            db.selectedIdx = idx; targetEl.classList.add('selected'); updateShading(); playSelectSound();
        } else {
            const fromIdx = db.selectedIdx; const toIdx = idx; const fromEl = document.getElementById(`vsl-${fromIdx}`);
            if (fromIdx === toIdx) { fromEl.classList.remove('selected'); db.selectedIdx = null; updateShading(); return; }

            const fromArr = db.vessels[fromIdx]; const toArr = db.vessels[toIdx];
            const moveColor = fromArr[fromArr.length - 1];

            if (toArr.length < MAX_CAPACITY && (toArr.length === 0 || toArr[toArr.length-1] === moveColor)) {
                try {
                    db.isAnimating = true; fromEl.classList.remove('selected'); updateShading(); playJumpSound();
                    db.carouselRotY = -theta; carousel.style.transform = `rotateY(${db.carouselRotY}deg)`; updateShading();
                    await new Promise(r => setTimeout(r, 400));

                    const poppedColor = fromArr.pop(); renderWater(fromIdx); 

                    const fromRect = fromEl.getBoundingClientRect();
                    const destX = targetEl.getBoundingClientRect().left + (targetEl.getBoundingClientRect().width - 20) / 2;
                    // 水滴飛向目標水位高度
                    const slots = [103.75, 77.5, 51.25, 25];
                    const targetY_SVG = slots[toArr.length];
                    const destY = targetEl.getBoundingClientRect().top + (targetY_SVG / 150) * targetEl.getBoundingClientRect().height;

                    await animateDropJump(fromRect.left + 40, fromRect.top + 40, destX, destY, poppedColor);
                    
                    toArr.push(poppedColor); renderWater(toIdx);
                    checkWin();
                } catch(e) { console.warn(e); } 
                finally { db.selectedIdx = null; db.isAnimating = false; }
            } else { fromEl.classList.remove('selected'); db.selectedIdx = null; updateShading(); playErrorSound(); }
        }
    }

    function animateDropJump(startX, startY, endX, endY, colorId) {
        return new Promise(resolve => {
            const jumper = document.createElement('div');
            jumper.className = 'drop-jump'; 
            jumper.style.background = `var(--color-${colorId})`; 
            document.body.appendChild(jumper);
            const controlY = Math.min(startY, endY) - 150; const deltaX = endX - startX;
            try {
                const animation = jumper.animate([
                    { transform: `translate(${startX}px, ${startY}px) scale(1)`, opacity: 1 },
                    { transform: `translate(${startX + deltaX*0.5}px, ${controlY}px) scale(1.3)`, opacity: 1 },
                    { transform: `translate(${endX}px, ${endY}px) scale(0.5)`, opacity: 0 }
                ], { duration: 350, easing: 'cubic-bezier(0.25, 0.8, 0.25, 1)', fill: 'forwards' });
                animation.onfinish = () => { jumper.remove(); resolve(); };
            } catch(e) { jumper.remove(); resolve(); }
            setTimeout(() => { if(jumper.parentNode) { jumper.remove(); resolve(); } }, 400); 
        });
    }

    function checkWin() {
        if (db.vessels.every(v => v.length === 0 || (v.length === MAX_CAPACITY && v.every(item => item === v[0])))) {
            playWinSound(); setTimeout(() => { db.level++; initLevel(); }, 1000);
        }
    }
    function forceNextLevel() { db.level += 9; db.level++; initLevel(); }
    initLevel();
</script>
</body>
</html>
