<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彌陀矩陣 ‧ 發菩提心</title>
    <style>
        :root { 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #9fdfc8; 
            --bg-deep: #020202; 
        }
        
        body { 
            margin: 0; padding: 0; height: 100vh; background: var(--bg-deep); color: #fff; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif; overflow: hidden; 
            user-select: none; -webkit-tap-highlight-color: transparent; 
        }

        #page-curtain { position: fixed; inset: 0; background: #000; z-index: 999999; pointer-events: none; transition: opacity 0.8s ease-in-out; opacity: 1; }

        .top-nav-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(212,175,55,0.6); 
            color: var(--gold); 
            padding: 8px 16px; border-radius: 25px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; 
            display: flex; align-items: center; gap: 6px; z-index: 100; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.8), inset 0 0 10px rgba(212,175,55,0.15); 
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .top-nav-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.25); border-color: var(--solid-gold); }

        /* ======= 菩提光軌 ======= */
        #bodhi-container {
            position: relative; width: 320px; height: 320px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: transform 0.3s ease;
        }
        #bodhi-container:active { transform: scale(0.96); }

        .orbit {
            position: absolute; border-radius: 50%; border: 1.5px dashed rgba(212,175,55,0.15);
            transition: all 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); pointer-events: none;
        }
        .orbit-1 { width: 140px; height: 140px; animation: spin-right 20s linear infinite; }
        .orbit-2 { width: 200px; height: 200px; animation: spin-left 30s linear infinite; }
        .orbit-3 { width: 260px; height: 260px; animation: spin-right 40s linear infinite; }
        .orbit-4 { width: 320px; height: 320px; animation: spin-left 50s linear infinite; }

        @keyframes spin-right { 100% { transform: rotate(360deg); } }
        @keyframes spin-left { 100% { transform: rotate(-360deg); } }

        /* 光軌啟動狀態 */
        .orbit.active {
            border-style: solid; border-color: var(--solid-gold);
            box-shadow: 0 0 20px rgba(212,175,55,0.4), inset 0 0 10px rgba(212,175,55,0.2);
            background: rgba(243,229,171,0.02);
        }

        /* 中心摩尼寶珠 */
        #mani-jewel {
            position: relative; width: 60px; height: 60px; z-index: 10;
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.5)); transition: all 0.5s;
            animation: breathe-jewel 3s infinite alternate ease-in-out;
        }
        @keyframes breathe-jewel {
            0% { transform: scale(0.9); filter: drop-shadow(0 0 10px rgba(212,175,55,0.4)); }
            100% { transform: scale(1.1); filter: drop-shadow(0 0 25px rgba(243,229,171,0.8)); }
        }

        /* ======= 引導文字區 ======= */
        #text-wrap { margin-top: 50px; text-align: center; height: 100px; display: flex; flex-direction: column; justify-content: flex-start; }
        .title-text { font-size: 1.25rem; color: var(--gold); letter-spacing: 5px; text-shadow: 0 0 10px rgba(212,175,55,0.5); transition: opacity 0.8s; margin-bottom: 12px;}
        .desc-text { font-size: 0.9rem; color: var(--cyan); letter-spacing: 2px; line-height: 1.6; opacity: 0.8; transition: opacity 0.8s; }

        /* ======= 無相光暈大迴向 (Phase 2) ======= */
        #formless-light {
            position: fixed; inset: 0; z-index: 500; pointer-events: none; opacity: 0;
            background: radial-gradient(circle at center, rgba(243,229,171,0.95) 0%, rgba(212,175,55,0.8) 40%, rgba(2,2,2,0.9) 100%);
            mix-blend-mode: screen; transition: opacity 4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        #vow-theater {
            position: fixed; inset: 0; z-index: 600; display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 2s ease; padding: 0 20px; text-align: center;
        }
        .vow-title { color: #fff; font-size: 1.35rem; letter-spacing: 6px; margin-bottom: 30px; text-shadow: 0 0 20px var(--gold); }
        .vow-content { color: var(--gold); font-size: 1.05rem; line-height: 2.2; letter-spacing: 2px; text-shadow: 0 0 10px rgba(212,175,55,0.8); }

        /* 能量條 (隱藏式，用於計算長按) */
        #progress-line { width: 100px; height: 2px; background: rgba(212,175,55,0.2); margin: 20px auto 0; position: relative; overflow: hidden; border-radius: 2px; transition: opacity 0.5s; }
        #progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--solid-gold); box-shadow: 0 0 10px var(--gold); transition: width 0.1s linear; }

    </style>
</head>
<body>

    <div id="page-curtain"></div>
    <div id="formless-light"></div>

    <div class="top-nav-btn" onclick="navigateTo('index.html?screen=3')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        回修行位
    </div>

    <div id="bodhi-container">
        <div class="orbit orbit-1" id="orb-1"></div>
        <div class="orbit orbit-2" id="orb-2"></div>
        <div class="orbit orbit-3" id="orb-3"></div>
        <div class="orbit orbit-4" id="orb-4"></div>
        
        <svg id="mani-jewel" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="jewel-glow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
                    <stop offset="30%" stop-color="#f3e5ab" stop-opacity="0.9"/>
                    <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
                </radialGradient>
            </defs>
            <path d="M50 10 C 75 40, 85 65, 50 90 C 15 65, 25 40, 50 10 Z" fill="url(#jewel-glow)"/>
            <path d="M50 15 C 65 40, 70 60, 50 85 C 30 60, 35 40, 50 15 Z" fill="rgba(255,255,255,0.6)"/>
            <circle cx="50" cy="65" r="4" fill="#fff" filter="drop-shadow(0 0 4px #fff)"/>
        </svg>
    </div>

    <div id="text-wrap">
        <div id="t-title" class="title-text">發無上菩提心</div>
        <div id="t-desc" class="desc-text">長按明點 ‧ 注入願力<br>擴散慈悲喜捨四無量心</div>
        <div id="progress-line"><div id="progress-fill"></div></div>
    </div>

    <div id="vow-theater">
        <div class="vow-title">心包太虛 ‧ 願滿法界</div>
        <div class="vow-content">
            虛空有盡，我願無窮。<br>
            願代眾生，受無量苦；<br>
            令諸眾生，畢竟大樂。<br>
            <span style="font-size: 0.85rem; color: var(--cyan); display: block; margin-top: 30px; opacity: 0.8;">( 當日琉璃心燈已點亮 )</span>
        </div>
    </div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
        
        window.onload = () => {
            document.getElementById('page-curtain').style.opacity = '0';
            checkDailyStatus();
        };

        function navigateTo(url) {
            document.getElementById('page-curtain').style.opacity = '1';
            setTimeout(() => { window.location.href = url; }, 800);
        }

        let db;
        try { db = JSON.parse(localStorage.getItem('PX_V15.0')); } catch(e) {}
        if (!db || typeof db !== 'object') db = {}; 
        
        function save() { localStorage.setItem('PX_V15.0', JSON.stringify(db)); }

        function checkDailyStatus() {
            const today = new Date().toLocaleDateString();
            if (db.bodhiDate === today) {
                document.getElementById('t-desc').innerHTML = "今日願力已遍滿法界<br>心燈不滅，明日再啟";
                document.getElementById('bodhi-container').style.pointerEvents = 'none';
                document.getElementById('bodhi-container').style.opacity = '0.5';
                document.getElementById('progress-line').style.opacity = '0';
            }
        }

        let audioCtx; let gainNode;
        function initAudio() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playResonance() {
            if(!audioCtx) return;
            let osc = audioCtx.createOscillator(); 
            gainNode = audioCtx.createGain();
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(432, audioCtx.currentTime); 
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 3);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 10);
            
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 10);
        }

        const container = document.getElementById('bodhi-container');
        const fill = document.getElementById('progress-fill');
        let progress = 0; let chargeInterval; let isComplete = false;
        let currentLevel = 0;

        async function startCharge(e) {
            if (e) e.preventDefault();
            if (isComplete || db.bodhiDate === new Date().toLocaleDateString()) return;
            initAudio();

            document.getElementById('t-desc').innerHTML = "願離諸苦 ‧ 願得安樂<br>願無嫉妒 ‧ 願捨執念";

            chargeInterval = setInterval(() => {
                progress += 2; 
                fill.style.width = progress + '%';

                let newLevel = Math.floor(progress / 25);
                if (newLevel > currentLevel && newLevel <= 4) {
                    currentLevel = newLevel;
                    document.getElementById(`orb-${currentLevel}`).classList.add('active');
                }

                if(progress >= 100) {
                    completeVow();
                }
            }, 60);
        }

        function stopCharge() {
            if (isComplete) return;
            clearInterval(chargeInterval);
            progress = 0; fill.style.width = '0%'; currentLevel = 0;
            document.querySelectorAll('.orbit').forEach(el => el.classList.remove('active'));
            document.getElementById('t-desc').innerHTML = "長按明點 ‧ 注入願力<br>擴散慈悲喜捨四無量心";
        }

        async function completeVow() {
            clearInterval(chargeInterval);
            isComplete = true;
            
            db.bodhiDate = new Date().toLocaleDateString();
            save();

            playResonance();

            document.getElementById('text-wrap').style.opacity = '0';
            document.getElementById('bodhi-container').style.transform = 'scale(1.5)';
            document.getElementById('bodhi-container').style.opacity = '0';
            
            await sleep(500);
            document.getElementById('formless-light').style.opacity = '1';
            
            await sleep(2000);
            const vowTheater = document.getElementById('vow-theater');
            vowTheater.style.opacity = '1';

            await sleep(6000);
            vowTheater.style.opacity = '0';
            document.getElementById('formless-light').style.opacity = '0';

            await sleep(2000);
            navigateTo('index.html?screen=3');
        }

        container.addEventListener('mousedown', startCharge); 
        container.addEventListener('mouseup', stopCharge); 
        container.addEventListener('mouseleave', stopCharge); 
        container.addEventListener('touchstart', startCharge, {passive: false}); 
        container.addEventListener('touchend', stopCharge);

    </script>
</body>
</html>
