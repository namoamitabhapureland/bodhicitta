<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>開悟楞嚴 ． 常住真心</title>
    <style>
        :root {
            --bg-deep: #020205; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
            --silver: #e0e0e0;
            --text-main: #d0d0d0;
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; user-select: none; overscroll-behavior: none;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            color: var(--gold); text-decoration: none; font-size: 0.95rem; font-weight: bold;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3);
            backdrop-filter: blur(5px); transition: all 0.3s;
        }

        #status-panel {
            position: absolute; top: 70px; left: 5%; width: 90%; max-width: 320px;
            background: transparent; border-left: 2px solid rgba(139,168,156,0.6); 
            padding: 10px 20px; z-index: 100; transition: 1s; pointer-events: none;
        }
        .status-title { font-size: 1.15rem; font-weight: bold; color: var(--cyan); letter-spacing: 2px; margin-bottom: 8px; text-shadow: 0 2px 6px rgba(0,0,0,0.9); transition: 1s;}
        .status-desc { font-size: 0.85rem; color: #bbb; line-height: 1.8; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.9); transition: 1s;}

        .matrix-section { position: absolute; inset: 0; background: #000; overflow: hidden; transition: background 0.8s; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

        .ui-layer { position: absolute; bottom: 8%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; gap: 12px; transition: opacity 1s;}
        
        .switch-btn {
            width: 85%; max-width: 320px; justify-content: center;
            background: linear-gradient(135deg, rgba(15,15,15,0.9), rgba(5,5,5,0.95)); 
            border: 1px solid rgba(139,168,156,0.4); color: var(--cyan);
            padding: 14px 20px; border-radius: 30px; font-size: 1rem; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .switch-btn.gold-mode { border-color: rgba(212,175,55,0.5); color: var(--gold); }
        
        #theory-btn { border-color:rgba(139,168,156,0.8); color:var(--cyan); background:rgba(5,10,15,0.8); }

        #theory-drawer {
            position: fixed; bottom: 0; left: 0; width: 100vw; height: 85vh; background: rgba(5, 5, 8, 0.96); backdrop-filter: blur(20px);
            border-top: 1.5px solid rgba(139,168,156,0.4); border-radius: 25px 25px 0 0; transform: translateY(100%); transition: transform 0.6s; z-index: 2000; overflow-y: auto; padding: 0 0 80px 0; touch-action: pan-y;
        }
        #theory-drawer.open { transform: translateY(0); }
        .drawer-header { position: sticky; top: 0; background: linear-gradient(to bottom, rgba(5,5,8,1), rgba(5,5,8,0.95)); padding: 15px; text-align: center; z-index: 10; border-bottom: 1px solid rgba(139,168,156,0.2); }
        .close-bar { width: 40px; height: 4px; background: rgba(139,168,156,0.4); border-radius: 2px; margin: 0 auto 10px; }
        
        .theory-container { padding: 30px 7% 20px; max-width: 720px; margin: 0 auto; }
        .humble-statement { font-size: 0.85rem; color: #b0b0b0; line-height: 1.8; text-align: justify; padding: 20px; border: 1px solid rgba(139,168,156,0.2); border-radius: 12px; background: rgba(10,15,20,0.3); margin-bottom: 50px; }
    </style>
</head>
<body>

    <div class="back-btn" onclick="window.location.href='index.html?screen=3'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        回道場
    </div>

    <div id="status-panel">
        <div class="status-title" id="s-title">反聞自性 ． 耳根圓通</div>
        <div class="status-desc" id="s-desc">「入流亡所，動靜二相了然不生。」<br>長按並滑動，以自性之力撫平喧囂之聲波。</div>
    </div>

    <section class="matrix-section" id="bg-section">
        <canvas id="realmCanvas"></canvas>

        <div class="ui-layer" id="ui-layer">
            <button class="switch-btn" id="btn-ergen" onclick="toggleRealm(0)">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" stroke-dasharray="2 4"/>
                    <circle cx="12" cy="12" r="4" fill="currentColor"/>
                </svg>
                <span id="text-ergen">反聞自性 ． 觀音法門</span>
            </button>
            <button class="switch-btn gold-mode" id="btn-nianfo" onclick="toggleRealm(1)">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="8" stroke="currentColor"/>
                    <circle cx="12" cy="12" r="3" fill="var(--gold)"/>
                </svg>
                <span id="text-nianfo">都攝六根 ． 勢至法門</span>
            </button>
            
            <button class="switch-btn" id="theory-btn" onclick="openTheoryDrawer()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                探究楞嚴常住真心
            </button>
            
            <div style="color:rgba(139,168,156,0.6); font-size:0.75rem; letter-spacing:2px; margin-top:5px;" id="drag-hint">長按螢幕 ． 啟動見道之境</div>
        </div>
    </section>

    <div id="theory-drawer">
        <div class="drawer-header" onclick="closeTheoryDrawer()">
            <div class="close-bar"></div>
            <div style="color:var(--cyan); font-size:0.85rem; letter-spacing:2px; font-weight:bold; cursor:pointer;">收起法卷</div>
        </div>
        <div class="theory-container" id="theory-content-box">
           <div class="humble-statement">法海浩瀚，唯佛與佛乃能究盡。此處暫為文案佔位符，待總工程師檢核視覺氣氛後，大智將為您奉上玄而又玄之大乘法語，及中英雙語之朗讀引擎。</div>
           <!-- 文字待後續補齊 -->
        </div>
    </div>

<script>
    const canvas = document.getElementById('realmCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    
    let currentRealm = 0; // 0: 觀音(耳根), 1: 勢至(念佛)
    let time = 0;

    let ergenParticles = [];
    let nianfoParticles = [];
    
    let angleX = 0.6, angleY = 0;
    let isDragging = false;
    let silenceRadius = 0; // 耳根圓通的靜音力場
    let gravityForce = 0;  // 念佛圓通的引力場

    const FOV = 400; 

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
    }
    window.addEventListener('resize', resize); resize();

    function initEngines() {
        // 1. 耳根圓通：躁動的同心圓波紋
        ergenParticles = [];
        for(let r = 20; r <= 800; r += 15) {
            let count = Math.floor(r * 0.4);
            for(let i=0; i<count; i++) {
                let theta = (i / count) * Math.PI * 2;
                ergenParticles.push({
                    baseX: r * Math.cos(theta),
                    baseY: r * Math.sin(theta),
                    dist: r,
                    theta: theta,
                    s: Math.random() * 1.5 + 0.5
                });
            }
        }

        // 2. 念佛圓通：五十陰魔 (五彩紛呈的混亂微塵)
        nianfoParticles = [];
        for(let i=0; i<1500; i++) {
            nianfoParticles.push({
                x: (Math.random() - 0.5) * 1200,
                y: (Math.random() - 0.5) * 1200,
                z: (Math.random() - 0.5) * 1200,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                vz: (Math.random() - 0.5) * 2,
                hue: Math.random() * 360, // 五彩斑斕代表陰魔
                isPurified: false,
                s: Math.random() * 2 + 1
            });
        }
    }

    function project3D(x, y, z) {
        let cosX = Math.cos(angleX), sinX = Math.sin(angleX), cosY = Math.cos(angleY), sinY = Math.sin(angleY);
        let y1 = y*cosX - z*sinX, z1 = y*sinX + z*cosX;
        let x2 = x*cosY - z1*sinY, z2 = x*sinY + z1*cosY;
        if(z2 < -FOV+10) return null;
        let scale = FOV / (FOV + z2); 
        return { x: (width/2) + x2*scale, y: (height/2) - y1*scale, scale: scale, z: z2 };
    }

    function renderErgen() {
        // 長按時，靜音力場擴大；放開時，慢慢消退
        if(isDragging) silenceRadius += (600 - silenceRadius) * 0.05;
        else silenceRadius *= 0.95;

        angleY += 0.001; 

        let projected = [];
        ergenParticles.forEach(p => {
            // 基礎波浪 (外界的喧囂)
            let waveZ = Math.sin(p.dist * 0.05 - time * 2) * 40;
            
            // 力場效應：在力場內的波浪會被壓平 (相消干涉)
            let influence = Math.max(0, 1 - (p.dist / (silenceRadius + 1)));
            waveZ *= (1 - influence); // 越靠近中心，波浪越平息
            
            let proj = project3D(p.baseX, p.baseY, waveZ);
            if(proj) {
                // 喧囂時是暗青色，平靜時散發純白與明亮的光芒
                let r = Math.floor(139 + (255 - 139) * influence);
                let g = Math.floor(168 + (255 - 168) * influence);
                let b = Math.floor(156 + (255 - 156) * influence);
                let a = 0.3 + influence * 0.7;

                projected.push({ 
                    x: proj.x, y: proj.y, z: proj.z, sc: proj.scale, 
                    c: `rgba(${r},${g},${b},${a})`, 
                    s: p.s * (1 + influence), // 平靜的粒子微亮放大
                    glow: influence > 0.5
                });
            }
        });

        projected.sort((a,b) => b.z - a.z);

        ctx.globalCompositeOperation = 'screen';
        projected.forEach(p => {
            let fSize = p.s * p.sc; if(fSize < 0.2) return;
            ctx.beginPath(); ctx.arc(p.x, p.y, fSize, 0, Math.PI*2); ctx.fillStyle = p.c;
            if(p.glow) { ctx.shadowBlur = 10 * p.sc; ctx.shadowColor = '#ffffff'; } else { ctx.shadowBlur = 0; }
            ctx.fill();
        });
        ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';
    }

    function renderNianfo() {
        // 長按時，中心引力增強 (都攝六根)；放開時，魔境恢復散亂
        if(isDragging) gravityForce += (1 - gravityForce) * 0.05;
        else gravityForce *= 0.95;

        angleY += 0.002;

        let projected = [];
        let purifiedCount = 0;

        nianfoParticles.forEach(p => {
            // 基礎布朗運動 (五十陰魔的躁動)
            p.x += p.vx; p.y += p.vy; p.z += p.vz;
            
            let distToCenter = Math.sqrt(p.x*p.x + p.y*p.y + p.z*p.z);
            
            // 都攝六根的引力拉扯
            if(gravityForce > 0.1) {
                let pull = (gravityForce * 1500) / (distToCenter + 10);
                p.vx -= (p.x / distToCenter) * pull;
                p.vy -= (p.y / distToCenter) * pull;
                p.vz -= (p.z / distToCenter) * pull;
                
                // 阻力，避免彈射過度
                p.vx *= 0.9; p.vy *= 0.9; p.vz *= 0.9;
            } else {
                // 放開時恢復隨機游離
                p.vx += (Math.random()-0.5)*0.5; p.vy += (Math.random()-0.5)*0.5; p.vz += (Math.random()-0.5)*0.5;
                if(p.vx > 3) p.vx = 3; if(p.vy > 3) p.vy = 3; if(p.vz > 3) p.vz = 3;
            }

            // 邊界循環
            if(p.x > 600) p.x = -600; if(p.x < -600) p.x = 600;
            if(p.y > 600) p.y = -600; if(p.y < -600) p.y = 600;
            if(p.z > 600) p.z = -600; if(p.z < -600) p.z = 600;

            // 淨化判定：靠近中心(佛號)即轉化為純金
            if(distToCenter < 100 * gravityForce + 20) {
                p.isPurified = true;
                purifiedCount++;
            } else if (gravityForce < 0.2 && Math.random() > 0.98) {
                p.isPurified = false; // 引力消失，妄念重生
            }

            let proj = project3D(p.x, p.y, p.z);
            if(proj) {
                // 色彩邏輯：陰魔為五彩，淨化後為純金
                let color = p.isPurified ? `rgba(243,229,171,${0.6 + gravityForce*0.4})` : `hsla(${p.hue}, 80%, 60%, 0.5)`;
                projected.push({ 
                    x: proj.x, y: proj.y, z: proj.z, sc: proj.scale, 
                    c: color, s: p.s, isGold: p.isPurified 
                });
            }
        });

        projected.sort((a,b) => b.z - a.z);

        // 繪製中心的大勢至金光引力場
        if(gravityForce > 0.05) {
            let coreProj = project3D(0,0,0);
            if(coreProj) {
                ctx.globalCompositeOperation = 'screen';
                let coreR = 40 * coreProj.scale * gravityForce * (1 + Math.sin(time*10)*0.1);
                let grad = ctx.createRadialGradient(coreProj.x, coreProj.y, 0, coreProj.x, coreProj.y, coreR * 3);
                grad.addColorStop(0, `rgba(255, 255, 255, ${gravityForce})`);
                grad.addColorStop(0.2, `rgba(243, 229, 171, ${gravityForce * 0.8})`);
                grad.addColorStop(1, 'rgba(212, 175, 55, 0)');
                ctx.beginPath(); ctx.arc(coreProj.x, coreProj.y, coreR * 3, 0, Math.PI*2);
                ctx.fillStyle = grad; ctx.fill();
            }
        }

        ctx.globalCompositeOperation = 'screen';
        projected.forEach(p => {
            let fSize = p.s * p.sc; if(fSize < 0.2) return;
            ctx.beginPath(); ctx.arc(p.x, p.y, fSize, 0, Math.PI*2); ctx.fillStyle = p.c;
            if(p.isGold && gravityForce > 0.5) { ctx.shadowBlur = 15 * p.sc; ctx.shadowColor = '#f3e5ab'; } 
            else { ctx.shadowBlur = 0; }
            ctx.fill();
        });
        ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';
    }

    function animate() {
        ctx.fillStyle = 'rgba(2, 2, 5, 0.5)';
        ctx.fillRect(0, 0, width, height);
        time += 0.02;

        if (currentRealm === 0) renderErgen();
        else renderNianfo();

        requestAnimationFrame(animate);
    }

    function toggleRealm(type) {
        if(currentRealm === type) return;
        currentRealm = type;
        
        let panel = document.getElementById('status-panel');
        let title = document.getElementById('s-title'); let desc = document.getElementById('s-desc');
        let btnE = document.getElementById('btn-ergen'); let btnN = document.getElementById('btn-nianfo');
        let hint = document.getElementById('drag-hint');

        if (type === 0) {
            title.innerText = "反聞自性 ． 耳根圓通"; desc.innerHTML = "「入流亡所，動靜二相了然不生。」<br>長按並滑動，以自性之力撫平喧囂之聲波。";
            title.style.color = 'var(--cyan)'; panel.style.borderLeftColor = 'rgba(139,168,156,0.6)';
            
            btnE.style.background = 'rgba(10,20,15,0.9)'; btnE.style.color = 'var(--cyan)'; btnE.style.borderColor = 'var(--cyan)';
            btnE.classList.remove('gold-mode');
            
            btnN.style.background = 'linear-gradient(135deg, rgba(15,15,15,0.9), rgba(5,5,5,0.95))'; btnN.style.color = 'var(--gold)'; btnN.style.borderColor = 'rgba(212,175,55,0.5)';
            btnN.classList.add('gold-mode');
            
            hint.innerText = "長按螢幕 ． 展現破除喧囂之空性";
            angleX = 0.6; angleY = 0; 
        } else {
            title.innerText = "都攝六根 ． 念佛圓通"; desc.innerHTML = "「不假方便，自得心開。」<br>長按螢幕凝聚佛號，將五彩陰魔化為純金法身。";
            title.style.color = 'var(--gold)'; panel.style.borderLeftColor = 'var(--solid-gold)';
            
            btnN.style.background = 'rgba(20,15,5,0.9)'; btnN.style.color = 'var(--solid-gold)'; btnN.style.borderColor = 'var(--solid-gold)';
            btnN.classList.remove('gold-mode');
            
            btnE.style.background = 'linear-gradient(135deg, rgba(15,15,15,0.9), rgba(5,5,5,0.95))'; btnE.style.color = 'var(--cyan)'; btnE.style.borderColor = 'rgba(139,168,156,0.4)';
            
            hint.innerText = "長按螢幕 ． 以一句佛號吞噬五十陰魔";
            angleX = 0.2; angleY = 0; 
        }
    }

    function openTheoryDrawer() { document.getElementById('theory-drawer').classList.add('open'); }
    function closeTheoryDrawer() { document.getElementById('theory-drawer').classList.remove('open'); }

    document.getElementById('theory-drawer').addEventListener('pointerdown', (e) => e.stopPropagation());
    document.getElementById('ui-layer').addEventListener('pointerdown', (e) => e.stopPropagation());

    function onDown(e) { 
        if(e.target.closest('#ui-layer') || e.target.closest('#theory-drawer')) return; 
        isDragging = true; 
    }
    function onUp() { isDragging = false; }

    canvas.addEventListener('mousedown', onDown); window.addEventListener('mouseup', onUp);
    canvas.addEventListener('touchstart', onDown, {passive: true}); window.addEventListener('touchend', onUp);

    initEngines(); toggleRealm(0); animate();
</script>
</body>
</html>
