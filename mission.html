<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>唯識之旅 ． 實戰與防護矩陣</title>
    <style>
        body {
            margin: 0; background-color: #020202; color: #f3e5ab;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        
        .header {
            width: 100%; padding: 25px 0; text-align: center;
            background: linear-gradient(180deg, rgba(25,15,5,0.9) 0%, rgba(2,2,2,1) 100%);
            border-bottom: 1px solid rgba(212,175,55,0.3);
            position: relative; z-index: 10;
        }
        .header h1 {
            margin: 0; font-size: 1.2rem; letter-spacing: 4px; color: #d4af37;
            text-shadow: 0 0 15px rgba(212,175,55,0.5); font-weight: normal;
        }

        .matrix-display {
            width: 100%; max-width: 450px; padding: 20px 20px 0;
            display: flex; justify-content: center; align-items: center;
        }

        .system-log {
            width: 85%; max-width: 500px; margin-top: 10px;
            padding: 25px; border-radius: 12px;
            background: linear-gradient(145deg, rgba(212,175,55,0.05) 0%, rgba(0,0,0,0.8) 100%);
            border: 1px solid rgba(212,175,55,0.25);
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }
        
        .log-title {
            font-size: 1.05rem; color: #fff; text-align: center; letter-spacing: 2px;
            margin-bottom: 15px; text-shadow: 0 0 10px rgba(212,175,55,0.6);
            border-bottom: 1px dashed rgba(212,175,55,0.4); padding-bottom: 10px;
        }
        
        .log-text {
            font-size: 0.9rem; color: rgba(255,255,255,0.75); line-height: 1.8;
            letter-spacing: 1.2px; text-align: justify; margin-bottom: 25px;
        }
        .log-text strong { color: #d4af37; font-weight: normal; }
    </style>
</head>
<body>

    <div class="header">
        <h1>乘願再來 ． 防護矩陣</h1>
    </div>

    <div class="matrix-display">
        <svg viewBox="0 0 300 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="pedestalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#d4af37" stop-opacity="0.6"/>
                    <stop offset="100%" stop-color="#d4af37" stop-opacity="0.0"/>
                </linearGradient>
                <filter id="glowEffect">
                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <g transform="translate(150, 320)">
                <path d="M -60 0 L 60 0 L 80 30 L -80 30 Z" fill="url(#pedestalGrad)"/>
                <line x1="-60" y1="0" x2="60" y2="0" stroke="#d4af37" stroke-width="2" filter="url(#glowEffect)"/>
                <text x="0" y="22" fill="rgba(255,255,255,0.8)" font-size="11" text-anchor="middle" letter-spacing="3">頂配載體資源</text>
            </g>

            <g transform="translate(150, 220)">
                <circle cx="0" cy="0" r="25" fill="none" stroke="rgba(212,175,55,0.5)" stroke-width="1.5"/>
                <circle cx="0" cy="0" r="6" fill="#fff" filter="url(#glowEffect)">
                    <animate attributeName="r" values="6; 9; 6" dur="2s" repeatCount="indefinite"/>
                </circle>
                <path d="M 0 -25 Q 15 -45 0 -65 T 0 -105" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="4 4">
                    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="1s" repeatCount="indefinite"/>
                </path>
            </g>

            <g transform="translate(150, 220)">
                <circle cx="-80" cy="-90" r="4" fill="#d4af37" filter="url(#glowEffect)"/>
                <line x1="-80" y1="-90" x2="-20" y2="-20" stroke="rgba(212,175,55,0.6)" stroke-width="1" stroke-dasharray="3 3">
                    <animate attributeName="stroke-dashoffset" from="12" to="0" dur="1.5s" repeatCount="indefinite"/>
                </line>
                
                <circle cx="80" cy="-60" r="5" fill="#d4af37" filter="url(#glowEffect)"/>
                <line x1="80" y1="-60" x2="25" y2="-10" stroke="rgba(212,175,55,0.6)" stroke-width="1.5" stroke-dasharray="3 3">
                    <animate attributeName="stroke-dashoffset" from="12" to="0" dur="1.2s" repeatCount="indefinite"/>
                </line>

                <circle cx="0" cy="0" r="45" fill="none" stroke="rgba(255,0,0,0.2)" stroke-width="1" stroke-dasharray="1 5">
                    <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="10s" repeatCount="indefinite"/>
                </circle>
            </g>
            
            <text x="150" y="80" fill="rgba(212,175,55,0.8)" font-size="12" text-anchor="middle" letter-spacing="4">智慧連線 ． 善知識喚醒</text>
        </svg>
    </div>

    <div class="system-log">
        <div class="log-title">【 菩薩互助 ． 智慧喚醒 】</div>
        <div class="log-text">
            真正的神通是勘破生死的<strong>「智慧」</strong>。重返實戰的新載體雖會受雜訊干擾，但法界中已定頻的菩薩將化為<strong>「善知識」</strong>與緣分節點，精準引導行者重新連線，此乃最嚴密的 P2P 救援矩陣。
        </div>

        <div class="log-title">【 無限容錯 ． 資源最佳化 】</div>
        <div class="log-text">
            若因無常而暫時迷失，系統允許無限次 Reboot（重啟）。阿賴耶識中的向善慣性會火速將行者拉回正軌。<br><br>
            系統更配發<strong>「生尊貴家」</strong>之頂配初始資源，旨在助行者跳過底層生存焦慮，光速解壓縮累世智慧，投入救度眾生之任務。
        </div>
    </div>

</body>
</html>
