<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>琉璃多寶閣 ． 法界實修</title>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: #010103; overflow: hidden; font-family: "PingFang TC", "Microsoft JhengHei", serif; color: #f3e5ab; touch-action: manipulation; }
        
        /* 幽暗深邃的背景 */
        #bg { position: absolute; inset: 0; z-index: 0; background: radial-gradient(circle at 50% 30%, #1a1225 0%, #010103 80%); }

        /* 頂部導航 */
        header { position: relative; z-index: 10; padding: 40px 20px 20px; text-align: center; border-bottom: 1px solid rgba(243, 229, 171, 0.1); background: rgba(1,1,3,0.5); backdrop-filter: blur(10px); }
        .header-title { font-size: 1.2rem; letter-spacing: 8px; text-shadow: 0 0 15px rgba(243, 229, 171, 0.5); }
        #btn-back { position: absolute; left: 20px; top: 40px; font-size: 0.9rem; color: #8ba89c; cursor: pointer; letter-spacing: 2px; }

        /* 多寶格展示區 */
        #treasure-grid { position: relative; z-index: 10; height: calc(100vh - 200px); overflow-y: auto; padding: 30px 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; align-content: start; }
        
        /* 單一琉璃格 */
        .t-cell { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(139, 168, 156, 0.3); border-radius: 12px; aspect-ratio: 3/4; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: all 0.3s ease; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); overflow: hidden; }
        .t-cell::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 50%); pointer-events: none; }
        
        /* 選取狀態 */
        .t-cell.selected { border-color: #f3e5ab; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(212, 175, 55, 0.2); transform: translateY(-5px); }
        
        .t-svg { width: 60%; height: 60%; filter: drop-shadow(0 0 10px rgba(243, 229, 171, 0.3)); animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.6)); } }
        
        .t-info { margin-top: 15px; text-align: center; }
        .t-name { font-size: 0.9rem; letter-spacing: 2px; color: #fff; margin-bottom: 5px; }
        .t-lvl { font-size: 0.7rem; color: #d4af37; letter-spacing: 1px; }
        .t-tag { font-size: 0.65rem; color: #8ba89c; display: block; margin-top: 4px; }

        /* 底部操作區 */
        footer { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 20; padding: 20px; background: rgba(1,1,3,0.85); backdrop-filter: blur(15px); border-top: 1px solid rgba(243, 229, 171, 0.2); display: flex; justify-content: space-around; gap: 15px; }
        .action-btn { flex: 1; padding: 15px 0; border-radius: 30px; border: 1px solid rgba(243, 229, 171, 0.4); background: rgba(212, 175, 55, 0.1); color: #f3e5ab; font-size: 0.9rem; letter-spacing: 4px; cursor: pointer; transition: all 0.3s; opacity: 0.5; pointer-events: none; }
        .action-btn.active { opacity: 1; pointer-events: auto; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .action-btn:active { background: rgba(243, 229, 171, 0.3); transform: scale(0.98); }

        /* === 彈出視窗 Modal (實修門檻) === */
        #modal-overlay { position: fixed; inset: 0; background: rgba(1, 1, 3, 0.85); backdrop-filter: blur(10px); z-index: 60; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
        #modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-box { width: 85%; max-width: 340px; background: rgba(21, 13, 31, 0.9); border: 1px solid rgba(243, 229, 171, 0.3); border-radius: 12px; padding: 30px 25px; box-shadow: 0 0 40px rgba(212, 175, 55, 0.1); transform: translateY(20px); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        #modal-overlay.show .modal-box { transform: translateY(0); }
        
        .modal-title { text-align: center; color: #fff; font-size: 1.1rem; letter-spacing: 4px; margin-bottom: 20px; text-shadow: 0 0 15px rgba(243, 229, 171, 0.5); }
        .modal-desc { color: #8ba89c; font-size: 0.85rem; letter-spacing: 2px; line-height: 1.6; margin-bottom: 25px; text-align: justify; text-align-last: center; }
        
        /* 打勾實修區塊 */
        .checkbox-container { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 30px; cursor: pointer; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid rgba(139, 168, 156, 0.2); }
        .checkbox-box { width: 22px; height: 22px; border: 1px solid #f3e5ab; border-radius: 4px; flex-shrink: 0; display: flex; justify-content: center; align-items: center; transition: all 0.2s; }
        .checkbox-box.checked { background: rgba(212, 175, 55, 0.5); box-shadow: 0 0 10px rgba(243, 229, 171, 0.5); }
        .checkbox-box.checked::after { content: '✓'; color: #fff; font-size: 14px; }
        .checkbox-text { font-size: 0.8rem; color: #e0e0e0; letter-spacing: 1px; line-height: 1.5; }

        .modal-confirm-btn { width: 100%; padding: 12px; border-radius: 25px; border: 1px solid rgba(243, 229, 171, 0.2); background: transparent; color: rgba(243, 229, 171, 0.4); font-size: 0.9rem; letter-spacing: 4px; transition: all 0.3s; pointer-events: none; }
        .modal-confirm-btn.ready { background: rgba(212, 175, 55, 0.2); border-color: rgba(243, 229, 171, 0.8); color: #f3e5ab; pointer-events: auto; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }

        .modal-close { position: absolute; top: 15px; right: 20px; color: #8ba89c; font-size: 1.2rem; cursor: pointer; }

        /* === 全螢幕動畫與法語區 === */
        #anim-overlay { position: fixed; inset: 0; background: #010103; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 1s; }
        #anim-overlay.show { opacity: 1; pointer-events: auto; }
        
        .anim-text { color: #fff; font-size: 1.1rem; letter-spacing: 6px; line-height: 2; text-align: center; text-shadow: 0 0 20px rgba(243, 229, 171, 0.5); opacity: 0; transition: opacity 1.5s; padding: 0 30px; }
        .anim-subtext { color: #8ba89c; font-size: 0.85rem; letter-spacing: 4px; margin-top: 20px; opacity: 0; transition: opacity 1s; }
        .anim-flash { position: absolute; inset: 0; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(212,175,55,0) 70%); opacity: 0; pointer-events: none; transition: opacity 1s; }
        
    </style>
</head>
<body>

    <div id="bg"></div>

    <header>
        <div id="btn-back" onclick="alert('返回星空首頁')">← 星海</div>
        <div class="header-title">琉璃多寶閣</div>
    </header>

    <div id="treasure-grid">
        </div>

    <footer>
        <button class="action-btn" id="btn-dedicate" onclick="openDedicateModal()">祈福迴向</button>
        <button class="action-btn" id="btn-merge" onclick="openMergeModal()">願力交織</button>
    </footer>

    <div id="modal-overlay">
        <div class="modal-box">
            <div class="modal-close" onclick="closeModal()">✕</div>
            <div class="modal-title" id="m-title">祈請與實修</div>
            <div class="modal-desc" id="m-desc">欲調用願力，請先圓滿實修。</div>
            
            <div class="checkbox-container" onclick="toggleCheckbox()">
                <div class="checkbox-box" id="m-checkbox"></div>
                <div class="checkbox-text" id="m-check-text">
                    我已如實完成：<br>
                    靜心禁語三小時<br>
                    行一次微小佈施<br>
                    至誠念佛三千遍
                </div>
            </div>
            
            <button class="modal-confirm-btn" id="m-confirm-btn" onclick="executeAction()">實修圓滿 ． 啟動</button>
        </div>
    </div>

    <div id="anim-overlay" onclick="closeAnim()">
        <div class="anim-flash" id="anim-flash"></div>
        <div id="anim-svg-container" style="width: 150px; height: 150px; margin-bottom: 40px; opacity: 0; transition: opacity 1s;"></div>
        <div class="anim-text" id="anim-text"></div>
        <div class="anim-subtext" id="anim-subtext">輕觸畫面 ． 功德圓滿</div>
    </div>

    <script>
        // --- 核心資料庫 (包含 SVG 定義) ---
        const pureGlassDef = `<defs><linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#fff; stop-opacity:0.9" /><stop offset="50%" style="stop-color:#f3e5ab; stop-opacity:0.6" /><stop offset="100%" style="stop-color:#d4af37; stop-opacity:0.2" /></linearGradient></defs>`;
        
        const svgLib = {
            sword: `<svg viewBox="0 0 100 150">${pureGlassDef}<g><rect x="49.5" y="10" width="1" height="120" fill="#fff" opacity="0.8" /><path d="M50 10 L60 40 L50 50 L40 40 Z" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.5" /><path d="M50 50 L65 90 L50 100 L35 90 Z" fill="rgba(243, 229, 171, 0.2)" stroke="#f3e5ab" stroke-width="0.4" /><path d="M50 50 L55 92 L50 98 L45 92 Z" fill="rgba(255, 255, 255, 0.5)" stroke="none" /><path d="M25 100 L50 90 L75 100 L50 110 Z" fill="rgba(212, 175, 55, 0.3)" stroke="#f3e5ab" stroke-width="0.6" /><path d="M46 110 L54 110 L52 135 L48 135 Z" fill="rgba(243, 229, 171, 0.2)" stroke="#f3e5ab" stroke-width="0.5" /><polygon points="50,135 55,140 50,145 45,140" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.5" /></g></svg>`,
            vase: `<svg viewBox="0 0 100 150">${pureGlassDef}<g><path d="M45 30 L55 30 L55 50 L75 100 L65 130 L35 130 L25 100 L45 50 Z" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.5"/><path d="M45 50 L55 50 L75 100 L25 100 Z" fill="rgba(243, 229, 171, 0.15)" stroke="#fff" stroke-width="0.3"/><polygon points="45,30 55,30 50,10" fill="rgba(255,255,255,0.6)" stroke="#f3e5ab" stroke-width="0.3"/><ellipse cx="50" cy="130" rx="15" ry="4" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.5"/></g></svg>`,
            jewel: `<svg viewBox="0 0 100 150">${pureGlassDef}<g transform="translate(0, 15)"><polygon points="50,20 85,60 50,120 15,60" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.6"/><polygon points="50,20 65,60 50,120 35,60" fill="rgba(255,255,255,0.3)" stroke="#fff" stroke-width="0.4"/><polygon points="35,60 65,60 50,120" fill="rgba(212, 175, 55, 0.2)" stroke="none"/><circle cx="50" cy="60" r="5" fill="#fff" filter="drop-shadow(0 0 8px #fff)"/></g></svg>`,
            // 合成後的新寶物範例 (金剛蓮華燈)
            lotus_lamp: `<svg viewBox="0 0 100 150">${pureGlassDef}<g><path d="M30 80 Q50 120 70 80 Q50 40 30 80" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.5"/><path d="M20 70 Q50 130 80 70 Q50 50 20 70" fill="rgba(243, 229, 171, 0.2)" stroke="#fff" stroke-width="0.3"/><circle cx="50" cy="80" r="10" fill="#fff" filter="drop-shadow(0 0 15px #f3e5ab)"/><path d="M40 120 L60 120 L55 140 L45 140 Z" fill="rgba(212, 175, 55, 0.4)" stroke="#f3e5ab"/></g></svg>`
        };

        // 行者的法寶庫存 (預設放三個供測試)
        let inventory = [
            { id: 'item_1', type: 'sword', name: '幾何慧劍', level: 2, tag: '事業 ‧ 破迷', svg: svgLib.sword },
            { id: 'item_2', type: 'vase', name: '琉璃淨瓶', level: 1, tag: '健康 ‧ 息災', svg: svgLib.vase },
            { id: 'item_3', type: 'jewel', name: '多面寶珠', level: 1, tag: '福德 ‧ 滿願', svg: svgLib.jewel }
        ];

        let selectedItems = []; // 當前選取的法寶
        let currentAction = ''; // 'dedicate' 或 'merge'

        // --- UI 更新邏輯 ---
        function renderGrid() {
            const grid = document.getElementById('treasure-grid');
            grid.innerHTML = '';
            
            inventory.forEach(item => {
                const isSelected = selectedItems.includes(item.id);
                const cell = document.createElement('div');
                cell.className = `t-cell ${isSelected ? 'selected' : ''}`;
                cell.onclick = () => toggleSelect(item.id);
                
                cell.innerHTML = `
                    <div class="t-svg">${item.svg}</div>
                    <div class="t-info">
                        <div class="t-name">${item.name}</div>
                        <div class="t-lvl">Lv.${item.level}</div>
                        <span class="t-tag">【${item.tag}】</span>
                    </div>
                `;
                grid.appendChild(cell);
            });
            updateButtons();
        }

        function toggleSelect(id) {
            const index = selectedItems.indexOf(id);
            if (index > -1) {
                selectedItems.splice(index, 1);
            } else {
                // 最多只能選兩個來交織
                if (selectedItems.length < 2) {
                    selectedItems.push(id);
                } else {
                    // 選第三個時，替換掉第一個
                    selectedItems.shift();
                    selectedItems.push(id);
                }
            }
            renderGrid();
        }

        function updateButtons() {
            const btnDedicate = document.getElementById('btn-dedicate');
            const btnMerge = document.getElementById('btn-merge');
            
            // 祈福迴向：只需選 1 個
            if (selectedItems.length === 1) {
                btnDedicate.classList.add('active');
            } else {
                btnDedicate.classList.remove('active');
            }
            
            // 願力交織：必須選 2 個
            if (selectedItems.length === 2) {
                btnMerge.classList.add('active');
            } else {
                btnMerge.classList.remove('active');
            }
        }

        // --- 彈出視窗 (Modal) 邏輯 ---
        const modal = document.getElementById('modal-overlay');
        const mTitle = document.getElementById('m-title');
        const mDesc = document.getElementById('m-desc');
        const mCheckText = document.getElementById('m-check-text');
        const mCheckBtn = document.getElementById('m-checkbox');
        const mConfirmBtn = document.getElementById('m-confirm-btn');
        let isChecked = false;

        function toggleCheckbox() {
            isChecked = !isChecked;
            if (isChecked) {
                mCheckBtn.classList.add('checked');
                mConfirmBtn.classList.add('ready');
            } else {
                mCheckBtn.classList.remove('checked');
                mConfirmBtn.classList.remove('ready');
            }
        }

        function closeModal() {
            modal.classList.remove('show');
            isChecked = false; mCheckBtn.classList.remove('checked'); mConfirmBtn.classList.remove('ready');
        }

        function openDedicateModal() {
            currentAction = 'dedicate';
            const item = inventory.find(i => i.id === selectedItems[0]);
            mTitle.innerText = "【 祈福迴向 ． 實修前置 】";
            mDesc.innerText = `欲調用此「${item.name}」之願力，請先圓滿今日之實修，方能至誠感應。`;
            mCheckText.innerHTML = "我已如實完成下方一項或全部願行：<br>．靜心禁語三小時<br>．行一次無相佈施<br>．至誠念佛三千遍";
            mConfirmBtn.innerText = "實修圓滿 ． 至誠迴向";
            modal.classList.add('show');
        }

        function openMergeModal() {
            currentAction = 'merge';
            mTitle.innerText = "【 願力交織 ． 實修前置 】";
            mDesc.innerText = `欲將此二法寶之願力匯聚昇華，請先靜心攝念，以清淨心和合因緣。`;
            mCheckText.innerHTML = "我已如實完成：<br>．至誠默唸佛號（或心咒）一百遍。";
            mConfirmBtn.innerText = "實修圓滿 ． 啟動和合";
            modal.classList.add('show');
        }

        // --- 執行行動與動畫 ---
        function executeAction() {
            closeModal();
            const animOverlay = document.getElementById('anim-overlay');
            const animFlash = document.getElementById('anim-flash');
            const animText = document.getElementById('anim-text');
            const animSvg = document.getElementById('anim-svg-container');
            const animSubtext = document.getElementById('anim-subtext');
            
            animOverlay.classList.add('show');
            animFlash.style.opacity = '1';
            animText.style.opacity = '0'; animSvg.style.opacity = '0'; animSubtext.style.opacity = '0';

            setTimeout(() => {
                animFlash.style.opacity = '0'; // 閃光退去
                
                if (currentAction === 'dedicate') {
                    // 【祈福迴向】邏輯：消耗一級
                    const idx = inventory.findIndex(i => i.id === selectedItems[0]);
                    inventory[idx].level -= 1;
                    if(inventory[idx].level <= 0) inventory.splice(idx, 1); // 如果Lv0則用完消失
                    
                    animSvg.innerHTML = '';
                    animText.innerHTML = "願以此功德，普及於一切。<br>祈願順遂安康，業障消除。<br>我等與眾生，皆共成佛道。";
                    animText.style.opacity = '1';
                    
                } else if (currentAction === 'merge') {
                    // 【願力交織】邏輯：機率成功或失敗
                    const isSuccess = Math.random() > 0.4; // 60% 成功率測試
                    
                    if (isSuccess) {
                        // 成功：刪除舊的，加入新的
                        inventory = inventory.filter(i => !selectedItems.includes(i.id));
                        inventory.push({ id: 'item_' + Date.now(), type: 'lotus_lamp', name: '金剛蓮華燈', level: 1, tag: '破迷 ‧ 息災 ‧ 圓滿', svg: svgLib.lotus_lamp });
                        
                        animSvg.innerHTML = svgLib.lotus_lamp;
                        animSvg.style.opacity = '1';
                        animText.innerHTML = "【 因緣具足 ． 金剛蓮華燈現 】<br><span style='font-size:0.8rem; color:#8ba89c;'>願力交織擴容，涵蓋舊有，能量增上。</span>";
                    } else {
                        // 失敗：原狀含藏 (不扣級)
                        animSvg.innerHTML = '';
                        animText.innerHTML = "【 因緣尚待 ． 願力含藏 】<br><span style='font-size:0.8rem; color:#8ba89c;'>願力不滅，法寶安然，請持平常心靜待善緣。</span>";
                    }
                    animText.style.opacity = '1';
                }
                
                setTimeout(() => { animSubtext.style.opacity = '1'; }, 1500);

            }, 800);
        }

        // 關閉動畫，回到更新後的網格
        function closeAnim() {
            const animOverlay = document.getElementById('anim-overlay');
            if (document.getElementById('anim-text').style.opacity === '1') {
                animOverlay.classList.remove('show');
                selectedItems = [];
                renderGrid();
            }
        }

        // 初始化渲染
        renderGrid();

    </script>
</body>
</html>
