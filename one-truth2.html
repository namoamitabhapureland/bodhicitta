<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一真法界 ． 無相裂解</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --pink-gold: #ffdfba; /* 粉炸金光 */
        }
        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background: #000; color: #fff;
            display: flex; justify-content: center; align-items: center;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }

        /* 視角震盪容器 (爆炸時觸發) */
        #camera-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            will-change: transform;
        }

        @keyframes camera-shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-15px, -15px) rotate(-1deg); }
            20% { transform: translate(15px, 15px) rotate(1deg); }
            30% { transform: translate(-15px, 15px) rotate(-1deg); }
            40% { transform: translate(15px, -15px) rotate(1deg); }
            50% { transform: translate(-8px, -8px) rotate(-0.5deg); }
            60% { transform: translate(8px, 8px) rotate(0.5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shake-active { animation: camera-shake 0.6s cubic-bezier(.36,.07,.19,.97) both; }

        /* 啟動按鈕 */
        #start-btn {
            position: absolute; z-index: 9999;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            padding: 16px 45px; border: 1.5px solid var(--solid-gold); border-radius: 40px;
            color: var(--gold); background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            font-size: 1.25rem; letter-spacing: 5px; cursor: pointer; transition: 0.4s;
            box-shadow: 0 0 30px rgba(212,175,55,0.4); font-weight: bold;
        }
        #start-btn:active { background: var(--solid-gold); color: #000; transform: scale(0.95); }

        /* 全局場景 */
        .scene {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 2.5s ease;
        }

        /* ======= 第一幕：黑與點 ======= */
        #scene-1 { background: #000; z-index: 10; }
        .bindi-dot {
            width: 8px; height: 8px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 20px var(--gold), 0 0 40px #fff; 
            opacity: 0; transform: scale(0.8);
            transition: opacity 2s ease;
        }
        /* 緩慢深長的呼吸 */
        .deep-breath { animation: slow-pulse 5s infinite alternate ease-in-out; }
        @keyframes slow-pulse { 
            0% { transform: scale(0.8); box-shadow: 0 0 15px var(--gold); filter: brightness(0.8); } 
            100% { transform: scale(1.8); box-shadow: 0 0 40px #fff, 0 0 80px var(--gold); filter: brightness(1.2); } 
        }

        /* ======= 第二幕：粉炸無量光 ======= */
        .burst-light {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,223,186,0.9) 30%, rgba(212,175,55,0.7) 70%, #000 100%);
            mix-blend-mode: screen; opacity: 0; transition: opacity 3s ease;
        }

        /* ======= 第三幕：空之光環 (0) ======= */
        #scene-2 { background: #000; z-index: 20; }
        .halo-0 {
            width: 45vmin; height: 45vmin; border-radius: 50%;
            border: 3px solid transparent;
            background: linear-gradient(#000, #000) padding-box, 
                        linear-gradient(135deg, #fff, var(--gold), var(--solid-gold)) border-box;
            box-shadow: 0 0 60px rgba(212,175,55,0.5), inset 0 0 40px rgba(212,175,55,0.3);
            opacity: 0; transform: scale(0.9);
            transition: opacity 3s ease;
        }

        /* ======= 第四幕：菩提光柱 (1) ======= */
        #scene-3 { background: #fff; z-index: 30; }
        .pillar-1 {
            width: 4vmin; height: 75vh;
            background: linear-gradient(90deg, #fff 0%, var(--solid-gold) 50%, #fff 100%);
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            opacity: 0; transform: scale(0.9);
            transition: opacity 3s ease;
        }

        /* ======= 第五幕：陰陽對峙 ======= */
        #scene-4 { z-index: 40; opacity: 0; display: flex; flex-direction: row; }
        .half-bg { position: absolute; top: 0; width: 50vw; height: 100vh; transition: background 2s ease; }
        #bg-left { left: 0; background: #000; }
        #bg-right { left: 50vw; background: #fff; }

        .dharma-element {
            position: absolute; top: 50%; transform: translateY(-50%);
            transition: all 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, left;
        }
        
        #split-0 { 
            left: 25vw; transform: translate(-50%, -50%);
            width: 45vmin; height: 45vmin; border-radius: 50%;
            border: 4px solid transparent;
            background: linear-gradient(#000, #000) padding-box, linear-gradient(135deg, #fff, var(--gold)) border-box;
            box-shadow: 0 0 40px rgba(255,255,255,0.3);
        }
        #split-1 { 
            left: 75vw; transform: translate(-50%, -50%);
            width: 3vmin; height: 60vmin;
            background: linear-gradient(180deg, #111 0%, #000 50%, #111 100%);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* 法理中心：+ 號 */
        #plus-sign {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; font-weight: lighter; color: var(--gold);
            text-shadow: 0 0 20px var(--solid-gold); opacity: 0; z-index: 50; transition: opacity 2s ease;
        }

        /* ======= 爆炸粒子容器 ======= */
        #particles-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 60; pointer-events: none; overflow: hidden; }
        
        /* 實體碎片與光塵 (無花) */
        .shard-0 { position: absolute; border: 2px solid var(--gold); border-radius: 50%; border-bottom: none; border-left: none; box-shadow: 0 0 10px var(--gold); }
        .shard-1 { position: absolute; background: #fff; box-shadow: 0 0 15px #fff; }
        .gold-dust { position: absolute; background: var(--pink-gold); border-radius: 50%; filter: drop-shadow(0 0 12px var(--solid-gold)); }

        /* ======= 第六幕：玄語留白 ======= */
        #zen-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            font-size: 1.8rem; letter-spacing: 12px; color: transparent; white-space: nowrap;
            background: linear-gradient(90deg, #d4af37, #f3e5ab, #d4af37);
            -webkit-background-clip: text; filter: drop-shadow(0 0 20px rgba(212,175,55,0.6));
            opacity: 0; z-index: 100; transition: opacity 4s ease; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="camera-container">
        <button id="start-btn" onclick="startDharmaJourney()">入定 ． 觀想一真</button>

        <div class="scene" id="scene-1">
            <div class="burst-light" id="burst"></div>
            <div class="bindi-dot deep-breath" id="dot"></div>
        </div>

        <div class="scene" id="scene-2">
            <div class="halo-0 deep-breath" id="g-0"></div>
        </div>

        <div class="scene" id="scene-3">
            <div class="pillar-1 deep-breath" id="g-1"></div>
        </div>

        <div class="scene" id="scene-4">
            <div class="half-bg" id="bg-left"></div>
            <div class="half-bg" id="bg-right"></div>
            <div class="dharma-element deep-breath" id="split-0"></div>
            <div class="dharma-element deep-breath" id="split-1"></div>
            <div id="plus-sign">＋</div>
        </div>

        <div id="particles-container"></div>
        <div id="zen-text">色空無礙 ． 萬法一真</div>
    </div>

    <script>
        let audioCtx;
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        function playQingSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(864, audioCtx.currentTime); 
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 10); 
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 10);
            } catch (e) {}
        }

        // 實體裂解引擎 (無相版：只有碎片與光粉)
        function triggerShatter() {
            const container = document.getElementById('particles-container');
            const cX = window.innerWidth / 2;
            const cY = window.innerHeight / 2;
            
            // 1. 生成 0 的實體裂片 (弧形)
            for (let i = 0; i < 40; i++) {
                let shard = document.createElement('div');
                shard.className = 'shard-0';
                shard.style.width = (Math.random() * 40 + 20) + 'px';
                shard.style.height = shard.style.width;
                shard.style.left = cX + 'px'; shard.style.top = cY + 'px';
                container.appendChild(shard);
                animateParticle(shard, cX, cY, 1.5);
            }

            // 2. 生成 1 的實體裂片 (銳利直線)
            for (let i = 0; i < 40; i++) {
                let shard = document.createElement('div');
                shard.className = 'shard-1';
                shard.style.width = (Math.random() * 3 + 1) + 'px';
                shard.style.height = (Math.random() * 60 + 20) + 'px';
                shard.style.left = cX + 'px'; shard.style.top = cY + 'px';
                container.appendChild(shard);
                animateParticle(shard, cX, cY, 1.8);
            }

            // 3. 噴發 150 顆粉炸無量金剛沙 (代替花瓣，更顯純粹)
            for (let i = 0; i < 150; i++) {
                let dust = document.createElement('div');
                dust.className = 'gold-dust';
                let size = Math.random() * 5 + 2;
                dust.style.width = size + 'px'; dust.style.height = size + 'px';
                dust.style.left = cX + 'px'; dust.style.top = cY + 'px';
                
                // 偶爾混入純白光粉增加層次
                if(Math.random() > 0.7) { dust.style.background = '#fff'; dust.style.boxShadow = '0 0 15px #fff'; }
                
                container.appendChild(dust);
                animateParticle(dust, cX, cY, 2.5);
            }
        }

        function animateParticle(el, startX, startY, speedMultiplier) {
            let angle = Math.random() * Math.PI * 2;
            let velocity = (Math.random() * (window.innerWidth * 0.4) + 100) * speedMultiplier;
            let eX = Math.cos(angle) * velocity;
            let eY = Math.sin(angle) * velocity;
            let rot = Math.random() * 720 - 360;
            let duration = Math.random() * 3000 + 2500;

            el.animate([
                { transform: `translate(-50%, -50%) rotate(0deg) scale(1)`, opacity: 1 },
                { transform: `translate(calc(-50% + ${eX}px), calc(-50% + ${eY}px)) rotate(${rot}deg) scale(0)`, opacity: 0 }
            ], { duration: duration, easing: 'cubic-bezier(0.1, 0.9, 0.2, 1)', fill: 'forwards' });
            setTimeout(() => el.remove(), duration + 100);
        }

        // 異步時間軸 (慢呼吸、不急躁)
        async function startDharmaJourney() {
            document.getElementById('start-btn').style.display = 'none';
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch(e) {}

            const cam = document.getElementById('camera-container');
            const s1 = document.getElementById('scene-1'); const s2 = document.getElementById('scene-2');
            const s3 = document.getElementById('scene-3'); const s4 = document.getElementById('scene-4');
            const dot = document.getElementById('dot'); const burst = document.getElementById('burst');
            const split0 = document.getElementById('split-0'); const split1 = document.getElementById('split-1');
            const plus = document.getElementById('plus-sign');

            // 【第一幕：黑與微光入夢】
            s1.style.opacity = '1';
            dot.style.opacity = '1';
            await sleep(5000); // 靜靜呼吸 5 秒

            // 【第二幕：粉炸無量光】
            burst.style.opacity = '1';
            await sleep(4000); // 沐浴光芒 4 秒

            // 【第三幕：0 的呼吸】
            s1.style.opacity = '0';
            s2.style.opacity = '1';
            await sleep(5000); // 宇宙光環呼吸 5 秒

            // 【第四幕：1 的呼吸】
            s2.style.opacity = '0';
            s3.style.opacity = '1';
            await sleep(5000); // 菩提光柱呼吸 5 秒

            // 【第五幕：陰陽對峙與法理 ＋】
            s3.style.opacity = '0';
            s4.style.opacity = '1';
            await sleep(3000); // 感受對立的張力
            
            plus.style.opacity = '1'; // ＋號緩緩浮現
            await sleep(4000); // 醞釀合體的引力

            // 【第六幕：不二合體】
            plus.style.opacity = '0';
            split0.classList.remove('deep-breath'); split1.classList.remove('deep-breath');
            document.getElementById('bg-right').style.background = '#000'; // 背景融合為極黑
            
            // 1 走入 0
            split0.style.left = '50vw'; split0.style.background = 'transparent'; split0.style.boxShadow = '0 0 120px var(--gold)';
            split1.style.left = '50vw'; split1.style.background = '#fff'; split1.style.boxShadow = '0 0 100px #fff';
            await sleep(2500); // 給予契合的震撼時間

            // 【第七幕：劇震與裂解】
            playQingSound();
            cam.classList.add('shake-active'); // 螢幕劇烈晃動
            
            // 隱藏本體，觸發碎片爆發
            split0.style.display = 'none'; split1.style.display = 'none';
            document.getElementById('bg-left').style.display = 'none'; document.getElementById('bg-right').style.display = 'none';
            
            // 瞬間再次閃耀粉炸金光作為爆炸底色
            s1.style.opacity = '1'; burst.style.opacity = '1'; dot.style.display = 'none';
            
            triggerShatter(); // 實體裂解引擎啟動

            await sleep(800);
            burst.style.opacity = '0'; // 閃爆後光芒暗去，留下星火
            cam.classList.remove('shake-active'); // 震動結束

            // 【第八幕：玄語寂滅】
            await sleep(2500);
            document.getElementById('zen-text').style.opacity = '1';
        }
    </script>
</body>
</html>
