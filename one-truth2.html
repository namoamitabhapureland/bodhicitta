<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系統 ． 法界回饋</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background: #000; color: #fff;
            display: flex; justify-content: center; align-items: center;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }

        #ctrl-btn {
            position: absolute; z-index: 9999;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            padding: 15px 40px; border: 1px solid #d4af37; border-radius: 40px;
            color: #f3e5ab; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            font-size: 1.1rem; letter-spacing: 5px; cursor: pointer; transition: 0.3s;
        }

        /* ======= 1. 入夢明點 (超大黏合光暈) ======= */
        #meditation-dot {
            position: absolute;
            width: 12px; height: 12px; background: #fff; border-radius: 50%;
            /* 💡 加大、加厚四層光暈，絕對明顯且一體 */
            box-shadow: 0 0 20px #fff, 0 0 50px rgba(243,229,171,1), 0 0 100px rgba(212,175,55,0.9), 0 0 150px rgba(212,175,55,0.5);
            opacity: 0; transform: scale(0.5);
            transition: opacity 2s ease;
            z-index: 10;
        }
        
        .breathing { animation: dot-breath 4s infinite alternate ease-in-out; }
        @keyframes dot-breath {
            0% { transform: scale(0.6); filter: brightness(0.7); }
            100% { transform: scale(1.3); filter: brightness(1.3); }
        }

        /* ======= 2. 彌陀無量光 ======= */
        #infinite-light {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(243,229,171,0.9) 40%, rgba(212,175,55,0.8) 100%);
            mix-blend-mode: screen; opacity: 0; pointer-events: none;
            transition: opacity 3s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 20;
        }

        /* ======= 3. 空之顯現 (0) ======= */
        #ring-0 {
            position: absolute;
            width: 40vmin; height: 40vmin; border-radius: 50%;
            border: 2px solid rgba(243,229,171,0.8);
            box-shadow: 0 0 50px rgba(212,175,55,0.6), inset 0 0 30px rgba(212,175,55,0.3);
            opacity: 0; transform: scale(0.5);
            z-index: 15;
            will-change: transform, opacity;
        }

        /* ======= 4. 行菩提心 (1 - 華嚴定海神針) ======= */
        #pillar-1 {
            position: absolute;
            /* 配合 0 的大小 (40vmin 高度)，但稍微拉長一點展現挺拔 */
            width: 4px; height: 50vmin; 
            /* 移植自華嚴代碼的真金琉璃漸層 */
            background: linear-gradient(to bottom, rgba(255,255,255,0.9) 0%, rgba(212,175,55,0.9) 40%, rgba(139,168,156,0.6) 100%);
            box-shadow: 0 0 30px rgba(212,175,55,0.8), inset 0 0 10px rgba(255,255,255,0.8);
            border-radius: 2px;
            opacity: 0; transform: scale(0.5);
            z-index: 15;
            will-change: transform, opacity;
        }
    </style>
</head>
<body>

    <button id="ctrl-btn" onclick="startDharmaFeedback()">靜觀 ． 法界回饋</button>

    <div id="meditation-dot"></div>
    <div id="infinite-light"></div>
    <div id="ring-0"></div>
    <div id="pillar-1"></div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        // 💡 獨立寫成心跳模組，方便 0 和 1 共用 (5下心跳)
        async function playHeartbeat(element, baseScale, peakScale) {
            for(let i = 0; i < 5; i++) {
                element.style.transition = 'transform 0.15s ease-out';
                element.style.transform = `scale(${peakScale})`;
                await sleep(150);
                element.style.transition = 'transform 0.3s ease-in';
                element.style.transform = `scale(${baseScale})`;
                await sleep(400); // 每次心跳間隔
            }
        }

        async function startDharmaFeedback() {
            const btn = document.getElementById('ctrl-btn');
            const dot = document.getElementById('meditation-dot');
            const light = document.getElementById('infinite-light');
            const ring = document.getElementById('ring-0');
            const pillar = document.getElementById('pillar-1');

            // 狀態重置
            btn.style.display = 'none';
            dot.style.opacity = '0'; dot.classList.remove('breathing');
            light.style.opacity = '0';
            ring.style.opacity = '0'; ring.style.transform = 'scale(0.5)';
            pillar.style.opacity = '0'; pillar.style.transform = 'scale(0.5)';

            // --- 1. 極黑沉澱 ---
            await sleep(2000);

            // --- 2. 巨大光暈明點浮現並呼吸 ---
            dot.style.opacity = '1';
            dot.classList.add('breathing');
            await sleep(6000); 

            // --- 3. 彌陀無量光爆發 ---
            dot.classList.remove('breathing');
            light.style.opacity = '1';
            await sleep(3000); 

            // ==========================================
            //       【 0 的演化 (空性) 】
            // ==========================================
            light.style.opacity = '0';
            dot.style.opacity = '0';
            
            ring.style.transition = 'transform 4.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 3s ease';
            ring.style.opacity = '1';
            ring.style.transform = 'scale(1.5)';
            await sleep(4500); // 等待放大

            // 💡 0 跳動 5 下
            await playHeartbeat(ring, 1.5, 1.6);
            await sleep(800); // 餘韻

            // 0 極速收攝淡出
            ring.style.transition = 'transform 3s cubic-bezier(0.5, 0, 0.8, 0.2), opacity 2.5s ease';
            ring.style.transform = 'scale(0.02)'; 
            ring.style.opacity = '0';
            await sleep(3500); // 留白黑暗

            // ==========================================
            //       【 1 的演化 (定海神針/行菩提) 】
            // ==========================================
            // 💡 1 如同 0 的出場方式，從中心浮現並放大
            pillar.style.transition = 'transform 4.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 3s ease';
            pillar.style.opacity = '1';
            pillar.style.transform = 'scale(1.5)';
            await sleep(4500); // 等待放大

            // 💡 1 同樣跳動 5 下
            await playHeartbeat(pillar, 1.5, 1.6);
            await sleep(800); // 餘韻

            // --- 結束測試 (停在 1 的畫面，等候您的下一步) ---
            btn.innerText = "重播此階段";
            btn.style.display = 'block';
        }
    </script>
</body>
</html>
