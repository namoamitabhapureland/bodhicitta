<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>法界演化 ． 第一階測試</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background: #000; color: #fff;
            display: flex; justify-content: center; align-items: center;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }

        /* 控制按鈕 */
        #ctrl-btn {
            position: absolute; z-index: 9999;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            padding: 15px 40px; border: 1px solid #d4af37; border-radius: 40px;
            color: #f3e5ab; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            font-size: 1.1rem; letter-spacing: 5px; cursor: pointer; transition: 0.3s;
        }

        /* ======= 1. 入夢明點 ======= */
        #meditation-dot {
            position: absolute;
            width: 8px; height: 8px; background: #fff; border-radius: 50%;
            /* 參考您最後一張圖的強烈黃金光暈 */
            box-shadow: 0 0 15px #fff, 0 0 40px #d4af37, 0 0 80px rgba(243,229,171,0.6);
            opacity: 0; transform: scale(0.5);
            transition: opacity 2s ease;
            z-index: 10;
        }
        
        /* 明點的深長呼吸 (4秒一吸一呼) */
        .breathing { animation: dot-breath 4s infinite alternate ease-in-out; }
        @keyframes dot-breath {
            0% { transform: scale(0.7); box-shadow: 0 0 10px #fff, 0 0 20px #d4af37; opacity: 0.6; }
            100% { transform: scale(1.5); box-shadow: 0 0 25px #fff, 0 0 60px #d4af37, 0 0 100px rgba(243,229,171,0.8); opacity: 1; }
        }

        /* ======= 2. 彌陀無量光 (完全移植您的原代碼) ======= */
        #infinite-light {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            /* 您的原版徑向漸層 */
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(243,229,171,0.9) 40%, rgba(212,175,55,0.8) 100%);
            mix-blend-mode: screen; 
            opacity: 0; pointer-events: none;
            /* 原版的 4s cubic-bezier 漸變 */
            transition: opacity 4s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 20;
        }

        /* ======= 3. 空之顯現 (0) ======= */
        #ring-0 {
            position: absolute;
            width: 45vmin; height: 45vmin; border-radius: 50%;
            /* 極簡、莊嚴的細金線 */
            border: 2px solid rgba(243,229,171,0.8);
            box-shadow: 0 0 30px rgba(212,175,55,0.4), inset 0 0 20px rgba(212,175,55,0.2);
            opacity: 0; transform: scale(0.8);
            transition: opacity 3s ease, transform 6s ease-out;
            z-index: 15;
        }
    </style>
</head>
<body>

    <button id="ctrl-btn" onclick="startPhaseOne()">開始演繹</button>

    <div id="meditation-dot"></div>
    <div id="infinite-light"></div>
    <div id="ring-0"></div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        async function startPhaseOne() {
            const btn = document.getElementById('ctrl-btn');
            const dot = document.getElementById('meditation-dot');
            const light = document.getElementById('infinite-light');
            const ring = document.getElementById('ring-0');

            // 隱藏按鈕，確保重置狀態
            btn.style.display = 'none';
            dot.style.opacity = '0'; dot.classList.remove('breathing');
            light.style.opacity = '0';
            ring.style.opacity = '0'; ring.style.transform = 'scale(0.8)';

            // --- 步驟 1：極黑沉澱 (2秒) ---
            await sleep(2000);

            // --- 步驟 2：入夢明點浮現並開始呼吸 ---
            dot.style.opacity = '1';
            dot.classList.add('breathing');
            // 讓明點呼吸 6 秒 (大約一呼一吸半)
            await sleep(6000);

            // --- 步驟 3：彌陀無量光爆發 ---
            // 點停止呼吸，光芒瞬間照亮全銀幕
            dot.classList.remove('breathing');
            light.style.opacity = '1';
            await sleep(3000); // 讓無量光維持 3 秒的極致亮度

            // --- 步驟 4：光芒漸退，0 緩緩浮現 ---
            // 無量光與明點慢慢淡去
            light.style.opacity = '0';
            dot.style.opacity = '0';
            
            // 0 的光環浮現，並帶有微微放大的宇宙膨脹感
            ring.style.opacity = '1';
            ring.style.transform = 'scale(1)';

            // --- 結束測試，顯示重播按鈕 ---
            await sleep(4000);
            btn.innerText = "重播此階段";
            btn.style.display = 'block';
        }
    </script>
</body>
</html>
