<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>法界演化 ． 一體光暈與心跳</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background: #000; color: #fff;
            display: flex; justify-content: center; align-items: center;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }

        /* 控制按鈕 */
        #ctrl-btn {
            position: absolute; z-index: 9999;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            padding: 15px 40px; border: 1px solid #d4af37; border-radius: 40px;
            color: #f3e5ab; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            font-size: 1.1rem; letter-spacing: 5px; cursor: pointer; transition: 0.3s;
        }

        /* ======= 1. 入夢明點 (光暈與核心完全黏合) ======= */
        #meditation-dot {
            position: absolute;
            width: 10px; height: 10px; background: #fff; border-radius: 50%;
            /* 💡 徹底捨棄外圈，改用多層漸層光暈，由內白至外金，渾然一體 */
            box-shadow: 0 0 8px #fff, 0 0 25px rgba(243,229,171,0.9), 0 0 50px rgba(212,175,55,0.8);
            opacity: 0; transform: scale(0.5);
            transition: opacity 2s ease;
            z-index: 10;
        }
        
        /* 明點的深長呼吸 */
        .breathing { animation: dot-breath 4s infinite alternate ease-in-out; }
        @keyframes dot-breath {
            0% { transform: scale(0.6); filter: brightness(0.8); }
            100% { transform: scale(1.2); filter: brightness(1.2); }
        }

        /* ======= 2. 彌陀無量光 ======= */
        #infinite-light {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(243,229,171,0.9) 40%, rgba(212,175,55,0.8) 100%);
            mix-blend-mode: screen; 
            opacity: 0; pointer-events: none;
            transition: opacity 3s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 20;
        }

        /* ======= 3. 空之顯現 (0) ======= */
        #ring-0 {
            position: absolute;
            width: 40vmin; height: 40vmin; border-radius: 50%;
            border: 2px solid rgba(243,229,171,0.8);
            box-shadow: 0 0 40px rgba(212,175,55,0.6), inset 0 0 20px rgba(212,175,55,0.3);
            opacity: 0; transform: scale(0.5);
            z-index: 15;
            will-change: transform, opacity;
        }
    </style>
</head>
<body>

    <button id="ctrl-btn" onclick="startPhaseOne()">開始演繹</button>

    <div id="meditation-dot"></div>
    <div id="infinite-light"></div>
    <div id="ring-0"></div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        async function startPhaseOne() {
            const btn = document.getElementById('ctrl-btn');
            const dot = document.getElementById('meditation-dot');
            const light = document.getElementById('infinite-light');
            const ring = document.getElementById('ring-0');

            // 狀態重置
            btn.style.display = 'none';
            dot.style.opacity = '0'; dot.classList.remove('breathing');
            light.style.opacity = '0';
            ring.style.opacity = '0'; ring.style.transform = 'scale(0.5)';

            // --- 步驟 1：極黑沉澱 ---
            await sleep(2000);

            // --- 步驟 2：一體光暈明點浮現並呼吸 ---
            dot.style.opacity = '1';
            dot.classList.add('breathing');
            await sleep(6000); 

            // --- 步驟 3：彌陀無量光爆發 ---
            dot.classList.remove('breathing');
            light.style.opacity = '1';
            await sleep(3000); 

            // --- 步驟 4：光芒漸退，0 緩緩浮現並膨脹至 1.5 倍 ---
            light.style.opacity = '0';
            dot.style.opacity = '0';
            
            ring.style.transition = 'transform 4.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 3s ease';
            ring.style.opacity = '1';
            ring.style.transform = 'scale(1.5)';
            
            // 等待 0 慢慢膨脹到最大
            await sleep(4500);

            // --- 💡 步驟 5：到達最大時，跳動兩下 (真實心跳節奏感) ---
            // 第一跳 (擴張 -> 收縮)
            ring.style.transition = 'transform 0.15s ease-out';
            ring.style.transform = 'scale(1.58)';
            await sleep(150);
            ring.style.transition = 'transform 0.25s ease-in';
            ring.style.transform = 'scale(1.5)';
            await sleep(250);

            // 第二跳 (擴張 -> 收縮)
            ring.style.transition = 'transform 0.15s ease-out';
            ring.style.transform = 'scale(1.58)';
            await sleep(150);
            ring.style.transition = 'transform 0.25s ease-in';
            ring.style.transform = 'scale(1.5)';
            
            // 跳完後，留一點點餘韻停頓
            await sleep(800);

            // --- 步驟 6：慢慢縮小淡出 ---
            // 💡 改為更平滑緩慢的縮小曲線
            ring.style.transition = 'transform 3.5s cubic-bezier(0.5, 0, 0.8, 0.2), opacity 3s ease';
            ring.style.transform = 'scale(0.02)'; 
            ring.style.opacity = '0';
            
            await sleep(3500);

            // --- 結束測試 ---
            btn.innerText = "重播此階段";
            btn.style.display = 'block';
        }
    </script>
</body>
</html>
