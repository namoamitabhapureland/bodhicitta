<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一真法界 ． 陰陽碎裂</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            font-family: "Times New Roman", "Baskerville", serif;
            background: #000;
            display: flex; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* 陰陽分割畫面 */
        .half {
            width: 50vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
            transition: all 0.5s ease;
        }
        .left-half { background: #000; }
        .right-half { background: #fff; }

        /* 巨大的 0 與 1 */
        .giant-num {
            font-size: 50vw; /* 幾乎佔滿一半銀幕 */
            font-weight: lighter;
            line-height: 1;
            transition: transform 0.1s;
            will-change: transform;
        }
        .num-0 { color: #fff; }
        .num-1 { color: #000; }

        /* 呼吸動畫 Class (由 JS 控制節奏) */
        .breathing { animation: breathe 1s ease-in-out infinite alternate; }
        .breathing-fast { animation: breathe 0.4s ease-in-out infinite alternate; }
        .breathing-extreme { animation: breathe 0.15s ease-in-out infinite alternate; }

        @keyframes breathe {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); } /* 呼吸膨脹感 */
        }

        /* 倒數計時小字 */
        #countdown {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: "PingFang TC", sans-serif;
            font-size: 1.5rem; color: #888; letter-spacing: 5px;
            z-index: 100; mix-blend-mode: difference;
            pointer-events: none;
        }

        /* 啟動按鈕 */
        #start-btn {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: "PingFang TC", sans-serif;
            padding: 15px 40px; border: 1px solid #888; border-radius: 40px;
            color: #fff; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            font-size: 1.2rem; letter-spacing: 5px; cursor: pointer; z-index: 200;
            transition: 0.3s;
        }
        #start-btn:active { background: #fff; color: #000; }

        /* 碎裂粒子 */
        .particle {
            position: absolute; pointer-events: none;
            z-index: 50;
        }

        /* 餘音中的玄語 */
        #zen-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            font-size: 1.8rem; letter-spacing: 15px; font-weight: bold;
            color: transparent; white-space: nowrap;
            background: linear-gradient(90deg, #d4af37, #f3e5ab, #d4af37);
            -webkit-background-clip: text;
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.4));
            opacity: 0; z-index: 300; transition: opacity 3s ease;
        }
    </style>
</head>
<body>

    <div id="start-btn">入定觀想</div>
    <div id="countdown" style="display:none;"></div>

    <div class="half left-half" id="left-bg">
        <div class="giant-num num-0" id="num-0">0</div>
    </div>
    
    <div class="half right-half" id="right-bg">
        <div class="giant-num num-1" id="num-1">1</div>
    </div>

    <div id="zen-text">色空無礙 萬法歸一</div>

    <script>
        let audioCtx;

        // 模擬純淨法器：罄聲 (Qing Bowl)
        function playQingSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // 頻率設定為極具穿透力的 864Hz (高頻罄聲)
            osc.type = 'sine';
            osc.frequency.setValueAtTime(864, audioCtx.currentTime);
            
            // 敲擊瞬間大聲，隨後極度緩慢地衰減 (模擬餘音繞樑)
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 7);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 7);
        }

        // 字體粉碎爆炸引擎
        function shatterElement(elementId, isZero) {
            const el = document.getElementById(elementId);
            const rect = el.getBoundingClientRect();
            el.style.display = 'none'; // 隱藏原本字體

            const particleCount = 120; // 每個數字裂成 120 塊
            const color = isZero ? '#fff' : '#000';

            for (let i = 0; i < particleCount; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = color;
                
                // 0 碎成圓潤弧形，1 碎成銳利長條
                if (isZero) {
                    p.style.width = (Math.random() * 15 + 5) + 'px';
                    p.style.height = (Math.random() * 15 + 5) + 'px';
                    p.style.borderRadius = '50%';
                } else {
                    p.style.width = (Math.random() * 4 + 2) + 'px';
                    p.style.height = (Math.random() * 30 + 10) + 'px';
                    p.style.transform = `rotate(${Math.random() * 360}deg)`;
                }

                // 初始位置在字體原本的範圍內
                let startX = rect.left + Math.random() * rect.width;
                let startY = rect.top + Math.random() * rect.height;
                p.style.left = startX + 'px';
                p.style.top = startY + 'px';

                document.body.appendChild(p);

                // 物理爆炸軌跡 (極速向外擴散並消失)
                let angle = Math.random() * Math.PI * 2;
                let velocity = Math.random() * 400 + 100; // 爆炸衝力
                let endX = Math.cos(angle) * velocity;
                let endY = Math.sin(angle) * velocity;

                p.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${endX}px, ${endY}px) scale(0)`, opacity: 0 }
                ], {
                    duration: Math.random() * 2000 + 1500,
                    easing: 'cubic-bezier(0.1, 0.8, 0.2, 1)',
                    fill: 'forwards'
                });

                setTimeout(() => p.remove(), 3500);
            }
        }

        document.getElementById('start-btn').addEventListener('click', function() {
            this.style.display = 'none';
            
            // 初始化音效引擎 (必須由使用者點擊解鎖)
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const num0 = document.getElementById('num-0');
            const num1 = document.getElementById('num-1');
            const countdownEl = document.getElementById('countdown');
            countdownEl.style.display = 'block';

            // 1. 緩慢呼吸 (3秒)
            countdownEl.innerText = '三';
            num0.classList.add('breathing');
            num1.classList.add('breathing');

            // 2. 加速呼吸 (2秒)
            setTimeout(() => {
                countdownEl.innerText = '二';
                num0.classList.replace('breathing', 'breathing-fast');
                num1.classList.replace('breathing', 'breathing-fast');
            }, 2000);

            // 3. 極限呼吸 (1秒)
            setTimeout(() => {
                countdownEl.innerText = '一';
                num0.classList.replace('breathing-fast', 'breathing-extreme');
                num1.classList.replace('breathing-fast', 'breathing-extreme');
            }, 4000);

            // 4. 倒數歸零：敲擊罄聲 ＋ 碎裂大爆炸
            setTimeout(() => {
                countdownEl.style.display = 'none';
                
                // 響起安靜中的法器聲
                playQingSound();

                // 畫面瞬間融合為混沌的灰色 (打破黑白對立)
                document.getElementById('left-bg').style.background = '#111';
                document.getElementById('right-bg').style.background = '#111';

                // 字體各自粉碎 (0為真，1為假)
                shatterElement('num-0', true);
                shatterElement('num-1', false);

                // 5. 餘音渺渺中，玄語浮現
                setTimeout(() => {
                    document.getElementById('zen-text').style.opacity = '1';
                }, 1500);

            }, 5000);
        });
    </script>

</body>
</html>
