<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一真法界 ． 終極美學顯化</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
        }
        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background: #000; color: #fff;
            display: flex; justify-content: center; align-items: center;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }

        /* 啟動按鈕 */
        #start-btn {
            position: absolute; z-index: 9999;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            padding: 16px 45px; border: 1.5px solid var(--solid-gold); border-radius: 40px;
            color: var(--gold); background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            font-size: 1.25rem; letter-spacing: 5px; cursor: pointer; transition: 0.4s;
            box-shadow: 0 0 30px rgba(212,175,55,0.4); font-weight: bold;
        }
        #start-btn:active { background: var(--solid-gold); color: #000; transform: scale(0.95); }

        /* 全局場景容器 */
        .scene {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 2s ease;
        }

        /* ======= SVG 定義隱藏區 ======= */
        .svg-defs { position: absolute; width: 0; height: 0; }

        /* ======= 第一幕：入夢與無量光 ======= */
        #scene-1 { background: #000; z-index: 10; }
        .bindi-dot {
            width: 6px; height: 6px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 20px var(--gold), 0 0 40px #fff; 
            transform: scale(0.5); opacity: 0;
            transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 1.5s;
        }
        /* 會呼吸的光暈 (移植自您的入夢法) */
        .sleep-pulse { animation: sleep-breath 4s infinite alternate ease-in-out; }
        @keyframes sleep-breath { 0% { transform: scale(0.8); box-shadow: 0 0 15px var(--gold); } 100% { transform: scale(1.5); box-shadow: 0 0 35px #fff; } }

        .burst-light {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(243,229,171,0.9) 30%, rgba(212,175,55,0.6) 80%, transparent 100%);
            mix-blend-mode: screen; opacity: 0; transition: opacity 2s ease;
        }

        /* ======= 第二幕：空之光環 (0) ======= */
        #scene-2 { background: #000; z-index: 20; }
        .halo-0 {
            width: 40vmin; height: 40vmin; border-radius: 50%;
            border: 4px solid transparent;
            background: linear-gradient(#000, #000) padding-box, 
                        linear-gradient(135deg, #fff, var(--gold), var(--solid-gold)) border-box;
            box-shadow: 0 0 50px rgba(212,175,55,0.6), inset 0 0 30px rgba(212,175,55,0.3);
            transform: scale(0.01); opacity: 0;
            transition: transform 5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 2s;
        }

        /* ======= 第三幕：菩提光柱 (1) ======= */
        #scene-3 { background: #fff; z-index: 30; }
        .pillar-1 {
            width: 6vmin; height: 120vh;
            background: linear-gradient(90deg, #fff 0%, var(--gold) 50%, #fff 100%);
            box-shadow: 0 0 80px rgba(0,0,0,0.8);
            transform: scale(15); opacity: 0;
            transition: transform 4.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 2s;
        }

        /* ======= 第四幕：陰陽割昏曉 ======= */
        #scene-4 { z-index: 40; opacity: 0; display: flex; flex-direction: row; }
        .half-bg { position: absolute; top: 0; width: 50vw; height: 100vh; transition: background 2s ease, width 1.5s ease; }
        #bg-left { left: 0; background: #000; }
        #bg-right { left: 50vw; background: #fff; }

        .dharma-element {
            position: absolute; top: 50%; transform: translateY(-50%);
            transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, left;
        }
        
        /* 準備合體的 0 與 1 */
        #split-0 { 
            left: 25vw; transform: translate(-50%, -50%);
            width: 45vmin; height: 45vmin; border-radius: 50%;
            border: 6px solid transparent;
            background: linear-gradient(#000, #000) padding-box, linear-gradient(135deg, #fff, var(--gold)) border-box;
            box-shadow: 0 0 40px rgba(255,255,255,0.3);
        }
        #split-1 { 
            left: 75vw; transform: translate(-50%, -50%);
            width: 4vmin; height: 70vmin;
            background: linear-gradient(180deg, #111 0%, #000 50%, #111 100%);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* 倒數呼吸動畫 */
        @keyframes pulse-dharma { 0% { transform: translate(-50%, -50%) scale(1); filter: brightness(1); } 100% { transform: translate(-50%, -50%) scale(1.05); filter: brightness(1.3); box-shadow: 0 0 60px var(--gold); } }
        .pulse-slow { animation: pulse-dharma 1.2s infinite alternate ease-in-out; }
        .pulse-mid { animation: pulse-dharma 0.6s infinite alternate ease-in-out; }
        .pulse-fast { animation: pulse-dharma 0.15s infinite alternate ease-in-out; }

        #countdown {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            font-family: "PingFang TC", "Microsoft JhengHei", serif; font-size: 2.5rem; color: #888;
            letter-spacing: 10px; mix-blend-mode: difference; z-index: 100; opacity: 0; transition: 0.3s;
        }

        /* ======= 爆炸粒子與蓮瓣 ======= */
        #particles-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 50; pointer-events: none; overflow: hidden; }
        .gold-dust { position: absolute; background: var(--gold); border-radius: 50%; filter: drop-shadow(0 0 8px var(--solid-gold)); }
        .lotus-petal { position: absolute; filter: drop-shadow(0 0 10px rgba(212,175,55,0.8)); }

        /* ======= 第六幕：玄語留白 ======= */
        #zen-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            font-size: 1.8rem; letter-spacing: 12px; color: transparent; white-space: nowrap;
            background: linear-gradient(90deg, #d4af37, #f3e5ab, #d4af37);
            -webkit-background-clip: text; filter: drop-shadow(0 0 20px rgba(212,175,55,0.6));
            opacity: 0; z-index: 100; transition: opacity 4s ease; pointer-events: none;
        }
    </style>
</head>
<body>

    <svg class="svg-defs">
        <defs>
            <linearGradient id="petal-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
                <stop offset="100%" stop-color="rgba(212,175,55,0.4)"/>
            </linearGradient>
            <linearGradient id="petal-gold" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="rgba(243,229,171,0.95)"/>
                <stop offset="100%" stop-color="rgba(212,175,55,0.2)"/>
            </linearGradient>
        </defs>
    </svg>

    <button id="start-btn" onclick="startDharmaJourney()">入定 ． 觀想一真</button>

    <div class="scene" id="scene-1">
        <div class="bindi-dot sleep-pulse" id="dot"></div>
        <div class="burst-light" id="burst"></div>
    </div>

    <div class="scene" id="scene-2">
        <div class="halo-0" id="g-0"></div>
    </div>

    <div class="scene" id="scene-3">
        <div class="pillar-1" id="g-1"></div>
    </div>

    <div class="scene" id="scene-4">
        <div class="half-bg" id="bg-left"></div>
        <div class="half-bg" id="bg-right"></div>
        <div class="dharma-element" id="split-0"></div>
        <div class="dharma-element" id="split-1"></div>
        <div id="countdown"></div>
    </div>

    <div id="particles-container"></div>

    <div id="zen-text">色空無礙 ． 萬法一真</div>

    <script>
        let audioCtx;

        // 模擬純淨法器：清脆罄聲
        function playQingSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(864, audioCtx.currentTime); 
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 9); 
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 9);
            } catch (e) { console.log("法器音效需使用者互動解鎖"); }
        }

        // 無量光爆炸引擎 (移植並昇華您的金剛沙與琉璃蓮瓣)
        function triggerBigBang() {
            const container = document.getElementById('particles-container');
            const cX = window.innerWidth / 2;
            const cY = window.innerHeight / 2;
            
            // 1. 噴發 108 顆漫天金剛沙
            for (let i = 0; i < 108; i++) {
                let dust = document.createElement('div');
                dust.className = 'gold-dust';
                let size = Math.random() * 4 + 2;
                dust.style.width = size + 'px'; dust.style.height = size + 'px';
                dust.style.left = cX + 'px'; dust.style.top = cY + 'px';
                container.appendChild(dust);

                let angle = Math.random() * Math.PI * 2;
                let velocity = Math.random() * (window.innerWidth * 0.5) + 50;
                let eX = Math.cos(angle) * velocity;
                let eY = Math.sin(angle) * velocity;

                dust.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${eX}px), calc(-50% + ${eY}px)) scale(0)`, opacity: 0 }
                ], { duration: Math.random() * 3000 + 2000, easing: 'cubic-bezier(0.1, 0.8, 0.2, 1)', fill: 'forwards' });
                setTimeout(() => dust.remove(), 5500);
            }

            // 2. 噴發 36 片琉璃立體蓮瓣 (從您的系統完整移植)
            for(let i = 0; i < 36; i++) {
                let petal = document.createElement('div');
                petal.className = 'lotus-petal';
                let pSize = Math.random() * 25 + 15;
                petal.style.width = pSize + 'px'; petal.style.height = pSize + 'px';
                petal.style.left = cX + 'px'; petal.style.top = cY + 'px';
                
                let isGold = Math.random() > 0.5;
                let gradId = isGold ? 'petal-gold' : 'petal-grad';
                
                petal.innerHTML = `<svg viewBox="0 0 100 100"><path d="M50 10 C 65 30, 75 60, 50 85 C 25 60, 35 30, 50 10" fill="url(#${gradId})" /></svg>`;
                container.appendChild(petal);

                let angle = Math.random() * Math.PI * 2;
                let velocity = Math.random() * (window.innerWidth * 0.4) + 100;
                let eX = Math.cos(angle) * velocity;
                let eY = Math.sin(angle) * velocity;
                let rot = Math.random() * 720 - 360;

                petal.animate([
                    { transform: 'translate(-50%, -50%) rotate(0deg) scale(0.5)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${eX}px), calc(-50% + ${eY}px)) rotate(${rot}deg) scale(1.5)`, opacity: 0 }
                ], { duration: Math.random() * 4000 + 3000, easing: 'cubic-bezier(0.1, 0.9, 0.2, 1)', fill: 'forwards' });
                setTimeout(() => petal.remove(), 7500);
            }
        }

        // 終極時間軸控制器
        function startDharmaJourney() {
            document.getElementById('start-btn').style.display = 'none';
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch(e) {}

            const s1 = document.getElementById('scene-1');
            const s2 = document.getElementById('scene-2');
            const s3 = document.getElementById('scene-3');
            const s4 = document.getElementById('scene-4');
            
            const dot = document.getElementById('dot');
            const burst = document.getElementById('burst');
            const g0 = document.getElementById('g-0');
            const g1 = document.getElementById('g-1');
            const split0 = document.getElementById('split-0');
            const split1 = document.getElementById('split-1');
            const cd = document.getElementById('countdown');

            // --- 第一幕：微光入夢與無量金光 (0s) ---
            s1.style.opacity = '1';
            dot.style.opacity = '1';
            
            setTimeout(() => { 
                dot.classList.remove('sleep-pulse'); // 停止呼吸，準備爆發
                dot.style.transform = 'scale(200)'; 
            }, 3000); 
            setTimeout(() => { burst.style.opacity = '1'; }, 3500); 

            // --- 第二幕：空之光環無限膨脹 (6s) ---
            setTimeout(() => {
                s1.style.opacity = '0'; 
                s2.style.opacity = '1';
                g0.style.opacity = '1';
                g0.style.transform = 'scale(6)'; // 光環包容法界
            }, 6000);

            // --- 第三幕：菩提光柱極致收攝 (11s) ---
            setTimeout(() => {
                s2.style.opacity = '0'; 
                s3.style.opacity = '1';
                g1.style.opacity = '1';
                g1.style.transform = 'scale(1)'; // 光柱凝聚
            }, 11000);

            // --- 第四幕：陰陽割昏曉與呼吸 (15s) ---
            setTimeout(() => {
                s3.style.opacity = '0';
                s4.style.opacity = '1';
                split0.classList.add('pulse-slow');
                split1.classList.add('pulse-slow');
                cd.style.opacity = '1';
                cd.innerText = '三';
            }, 15000);

            // --- 倒數與呼吸加速 ---
            setTimeout(() => {
                cd.innerText = '二';
                split0.classList.replace('pulse-slow', 'pulse-mid');
                split1.classList.replace('pulse-slow', 'pulse-mid');
            }, 16500);

            setTimeout(() => {
                cd.innerText = '一';
                split0.classList.replace('pulse-mid', 'pulse-fast');
                split1.classList.replace('pulse-mid', 'pulse-fast');
            }, 18000);

            // --- 第五幕：不二合體 (19s) ---
            setTimeout(() => {
                cd.style.opacity = '0';
                split0.className = 'dharma-element'; 
                split1.className = 'dharma-element';
                
                // 黑白對立瓦解，背景化為純黑
                document.getElementById('bg-right').style.background = '#000';
                
                // 1 走入 0，光環與光柱合一，爆發出極致的白金光
                split0.style.left = '50vw';
                split0.style.background = 'transparent';
                split0.style.boxShadow = '0 0 100px var(--gold)';

                split1.style.left = '50vw';
                split1.style.background = '#fff'; // 轉為純粹白光
                split1.style.boxShadow = '0 0 80px #fff';
            }, 19000);

            // --- 第六幕：罄聲與金剛沙琉璃大爆炸 (20.5s) ---
            setTimeout(() => {
                playQingSound();
                split0.style.display = 'none';
                split1.style.display = 'none';
                document.getElementById('bg-left').style.display = 'none';
                document.getElementById('bg-right').style.display = 'none';
                
                // 觸發無量光法界爆炸
                document.getElementById('scene-1').style.opacity = '1';
                burst.style.opacity = '1'; // 再次閃耀無量金光底色
                
                triggerBigBang(); 
                
                setTimeout(()=> { burst.style.opacity = '0'; }, 800); // 閃爍後暗去
            }, 20500);

            // --- 第七幕：玄語留白 (23s) ---
            setTimeout(() => {
                document.getElementById('zen-text').style.opacity = '1';
            }, 23000);
        }
    </script>
</body>
</html>
