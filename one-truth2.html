<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>法寶演繹 ． 前半段圓滿版</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        /* 1. 初始明點：光暈與核心黏合一體 */
        #seed-dot {
            position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%;
            /* 多層光暈，讓邊界消失，渾然一體 */
            box-shadow: 0 0 10px #fff, 0 0 20px #d4af37, 0 0 40px rgba(243,229,171,0.6);
            opacity: 0; transition: opacity 3s ease;
        }

        /* 2. 彌陀無量光 (您的原版) */
        #infinite-light {
            position: absolute; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(243,229,171,0.9) 40%, rgba(212,175,55,0.8) 100%);
            mix-blend-mode: screen; opacity: 0; transition: opacity 4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        /* 3. 0 的法身：莊嚴金環 */
        #dharma-zero {
            position: absolute; width: 40vmin; height: 40vmin; border-radius: 50%;
            border: 2px solid rgba(243,229,171,0.9);
            box-shadow: 0 0 40px rgba(212,175,55,0.7), inset 0 0 30px rgba(212,175,55,0.4);
            opacity: 0; transform: scale(0.5);
            display: flex; justify-content: center; align-items: center;
        }

        /* 心跳動律 (跳兩下) */
        @keyframes heart-beat {
            0% { transform: scale(1.5); }
            15% { transform: scale(1.65); } /* 第一跳：擴張 */
            30% { transform: scale(1.5); }
            45% { transform: scale(1.6); }  /* 第二跳：微擴張 */
            60% { transform: scale(1.5); }
            100% { transform: scale(1.5); }
        }
        .beating { animation: heart-beat 1.5s ease-in-out forwards; }

        #start-btn { 
            position: absolute; z-index: 100; padding: 15px 40px; 
            border: 1px solid #d4af37; background: none; color: #f3e5ab; 
            cursor: pointer; letter-spacing: 3px; 
        }
    </style>
</head>
<body>

<button id="start-btn" onclick="runZen()">入定 ． 啟動</button>
<div id="seed-dot"></div>
<div id="infinite-light"></div>
<div id="dharma-zero"></div>

<script>
    const sleep = ms => new Promise(res => setTimeout(res, ms));
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playQing() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(864, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 8);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 8);
    }

    async function runZen() {
        document.getElementById('start-btn').style.display = 'none';
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const dot = document.getElementById('seed-dot');
        const light = document.getElementById('infinite-light');
        const zero = document.getElementById('dharma-zero');

        // 第一步：明點浮現並呼吸
        dot.style.opacity = '1';
        await sleep(4000);

        // 第二步：爆發無量光
        light.style.opacity = '1';
        playQing();
        await sleep(3000);

        // 第三步：光收、0 出現並放大
        light.style.opacity = '0';
        dot.style.opacity = '0';
        zero.style.transition = 'transform 5s cubic-bezier(0.16, 1, 0.3, 1), opacity 3s ease';
        zero.style.opacity = '1';
        zero.style.transform = 'scale(1.5)';
        await sleep(5000);

        // 第四步：心跳兩下並同步罄聲
        zero.classList.add('beating');
        playQing(); // 第一跳
        await sleep(800);
        playQing(); // 第二跳
        await sleep(1500);

        // 第五步：極速收攝淡出
        zero.style.transition = 'transform 2.5s cubic-bezier(0.7, 0, 0.84, 0), opacity 2s ease';
        zero.style.transform = 'scale(0.01)';
        zero.style.opacity = '0';
    }
</script>
</body>
</html>
