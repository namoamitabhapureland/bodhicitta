<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一真法界 ． 寂滅現前</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. 眉心點與全銀幕翻白金光 */
        .bindi-light {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            z-index: 10;
            /* 14秒的總時間軸 */
            animation: bindi-anim 14s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
        }

        @keyframes bindi-anim {
            0%, 5% { opacity: 0; transform: scale(0); box-shadow: none; } /* 黑畫面 */
            10% { opacity: 1; transform: scale(1); box-shadow: 0 0 20px #fff, 0 0 40px #d4af37; } /* 眉心點浮現 */
            18% { opacity: 1; transform: scale(300); background: #fff; box-shadow: 0 0 200px #d4af37; } /* 快速放大吞噬全銀幕 */
            28% { opacity: 1; transform: scale(300); } /* 維持無量光兩秒 */
            35%, 100% { opacity: 0; transform: scale(300); } /* 光芒褪去，回歸黑暗 */
        }

        /* 2. 巨大的 0 與 1 */
        .giant-number {
            position: absolute;
            font-family: "Times New Roman", "Baskerville", serif;
            font-size: 35vmax; /* 巨無霸字體，充滿螢幕高度 */
            font-weight: lighter;
            color: rgba(243, 229, 171, 0.9);
            opacity: 0;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.5));
            z-index: 5;
        }

        .num-0 { animation: num-0-anim 14s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }
        .num-1 { animation: num-1-anim 14s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }

        @keyframes num-0-anim {
            0%, 35% { opacity: 0; transform: translateX(-35vw); } /* 等待無量光褪去 */
            40%, 55% { opacity: 0.9; transform: translateX(-35vw); } /* 巨大浮現，遙遙相望 */
            65% { opacity: 0.9; transform: translateX(0); filter: blur(0px); } /* 緩慢靠近中心 */
            66%, 100% { opacity: 0; transform: translateX(0); filter: blur(20px); } /* 交疊瞬間消融 */
        }

        @keyframes num-1-anim {
            0%, 35% { opacity: 0; transform: translateX(35vw); }
            40%, 55% { opacity: 0.9; transform: translateX(35vw); }
            65% { opacity: 0.9; transform: translateX(0); filter: blur(0px); }
            66%, 100% { opacity: 0; transform: translateX(0); filter: blur(20px); }
        }

        /* 3. 粉碎虛空的巨大爆炸 */
        .explosion {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #fff;
            opacity: 0;
            z-index: 20;
            animation: explode-anim 14s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }

        @keyframes explode-anim {
            0%, 64% { opacity: 0; transform: scale(1); box-shadow: none; }
            65% { 
                opacity: 1; 
                transform: scale(20); 
                box-shadow: 0 0 150px 80px #fff, 0 0 300px 150px #d4af37; 
            } /* 0與1相撞，引發爆發 */
            75%, 100% { 
                opacity: 0; 
                transform: scale(100); 
                box-shadow: 0 0 400px 200px transparent; 
            } /* 徹底消散 */
        }

        /* 4. 玄而又玄的機鋒文字 (無菱形，大氣沉穩) */
        .final-text {
            position: absolute;
            font-size: 2rem; /* 中大字體，不壓迫但具備重量 */
            letter-spacing: 15px; /* 極寬的字距，營造虛空感 */
            color: rgba(243, 229, 171, 0.75);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            opacity: 0;
            z-index: 30;
            animation: text-anim 14s ease-in-out forwards;
            white-space: nowrap;
        }

        @keyframes text-anim {
            0%, 80% { opacity: 0; filter: blur(10px); transform: translateY(10px); }
            90%, 100% { opacity: 1; filter: blur(0px); transform: translateY(0); }
        }

        /* 重播按鈕 (僅供測試) */
        .replay-btn {
            position: absolute;
            bottom: 30px;
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: rgba(243, 229, 171, 0.6);
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 0.9rem;
            letter-spacing: 5px;
            cursor: pointer;
            opacity: 0;
            z-index: 100;
            animation: btn-anim 14s forwards;
            transition: all 0.3s;
        }
        .replay-btn:active { background: rgba(212, 175, 55, 0.2); }

        @keyframes btn-anim {
            0%, 95% { opacity: 0; pointer-events: none; }
            100% { opacity: 1; pointer-events: auto; }
        }
    </style>
</head>
<body>

    <div class="container" id="animation-zone">
        <div class="bindi-light"></div>
        
        <div class="giant-number num-0">0</div>
        <div class="giant-number num-1">1</div>
        
        <div class="explosion"></div>
        
        <div class="final-text">資糧若具 法界自開</div>
    </div>

    <button class="replay-btn" onclick="replay()">再次觀想</button>

    <script>
        function replay() {
            const zone = document.getElementById('animation-zone');
            const clone = zone.cloneNode(true);
            zone.parentNode.replaceChild(clone, zone);
            
            const btn = document.querySelector('.replay-btn');
            btn.style.animation = 'none';
            btn.offsetHeight; 
            btn.style.animation = 'btn-anim 14s forwards';
        }
    </script>

</body>
</html>
