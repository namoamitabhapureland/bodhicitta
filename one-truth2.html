<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系統 ． 法界回饋 (能量攀升與寂滅)</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
        }
        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background: #000; color: #fff;
            display: flex; justify-content: center; align-items: center;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }

        #ctrl-btn {
            position: absolute; z-index: 9999;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            padding: 15px 40px; border: 1px solid var(--solid-gold); border-radius: 40px;
            color: var(--gold); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            font-size: 1.1rem; letter-spacing: 5px; cursor: pointer; transition: 0.3s;
        }

                        /* ======= 1. 入夢明點 (強制圓形 + 巨大光暈) ======= */
        #meditation-dot {
            position: absolute;
            width: 12px; height: 12px; 
            background: var(--gold);
            border-radius: 50% !important; /* 💡 最高權限：強制變成圓形 */
            box-shadow: 0 0 25px var(--gold), 0 0 60px var(--solid-gold), 0 0 120px rgba(212,175,55,0.8), 0 0 180px rgba(212,175,55,0.4);
            opacity: 0; transform: scale(0.5);
            transition: opacity 2s ease;
            z-index: 10;
        }


        
        .breathing { animation: dot-breath 4s infinite alternate ease-in-out; }
        @keyframes dot-breath {
            0% { transform: scale(0.6); filter: brightness(0.7); }
            100% { transform: scale(1.4); filter: brightness(1.3); }
        }

        /* ======= 2. 彌陀無量光 ======= */
        #infinite-light {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(243,229,171,0.9) 40%, rgba(212,175,55,0.8) 100%);
            mix-blend-mode: screen; opacity: 0; pointer-events: none;
            transition: opacity 3s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 20;
        }

        /* ======= 3. 空之顯現 (0 - 光暈加大 1.5 倍) ======= */
        #ring-0 {
            position: absolute;
            width: 40vmin; height: 40vmin; border-radius: 50%;
            border: 2px solid rgba(243,229,171,0.8);
            /* 💡 內外光暈全面增幅，更加神聖莊嚴 */
            box-shadow: 0 0 75px rgba(212,175,55,0.7), inset 0 0 45px rgba(212,175,55,0.4);
            opacity: 0; transform: scale(0.5);
            z-index: 15;
            will-change: transform, opacity;
        }

                /* ======= 4. 行菩提心 (能量棒：深邃漸層 + 強大光暈) ======= */
        #pillar-1 {
            position: absolute;
            width: 4px; height: 50vmin; 
            /* 💡 越來越深的漸層：底面白金 -> 中段真金 -> 頂部深邃琥珀/暗金 */
            background: linear-gradient(to top, rgba(255,255,255,0.4) 0%, rgba(212,175,55,0.9) 40%, rgba(184,134,11,1) 75%, rgba(100,50,0,0.9) 100%);
            /* 💡 能量棒的光暈 (加深、加大) */
            box-shadow: 0 0 40px rgba(212,175,55,1), 0 0 90px rgba(184,134,11,0.8), inset 0 0 10px rgba(212,175,55,0.5);
            border-radius: 2px;
            opacity: 0; transform: scale(0.5);
            z-index: 15;
            will-change: transform, opacity;
        }


        /* 能量點基礎設定 (實際大小由 JS 動態控制) */
        .tier-dot {
            position: absolute; left: 50%;
            background: rgba(243,229,171,0.5);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(212,175,55,0.6);
            transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
    </style>
</head>
<body>

    <button id="ctrl-btn" onclick="startDharmaFeedback()">靜觀 ． 法界回饋</button>

    <div id="meditation-dot"></div>
    <div id="infinite-light"></div>
    <div id="ring-0"></div>
    <div id="pillar-1"></div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

                // 💡 重新佈置 20 重星點：底部極小(無感)，頂部微大
        function initHuaYenTiers() {
            const pillar = document.getElementById('pillar-1');
            pillar.innerHTML = ''; 
            for(let i = 0; i < 20; i++) {
                let d = document.createElement('div');
                d.className = 'tier-dot';
                
                let pos = 100 - (i * (100 / 19)); 
                // 底部 1px，頂部 5px (回歸精緻)
                let size = 1 + (i * (4 / 19)); 
                
                d.style.top = `calc(${pos}% - ${size/2}px)`;
                d.style.width = `${size}px`;
                d.style.height = `${size}px`;
                d.style.transform = `translateX(-50%)`; 
                pillar.appendChild(d);
            }
        }

        // 💡 內斂的能量攀升：不再誇張放大，只做能量的傳遞與點亮
        async function surgeEnergy() {
            const dots = document.querySelectorAll('.tier-dot');
            for(let i = 0; i < 20; i++) {
                let d = dots[i]; 
                
                // 點亮並微微放大 (只放大 1.5 倍，不再是之前的 3.5 倍)
                d.style.background = '#fff';
                d.style.boxShadow = '0 0 10px #fff, 0 0 20px #d4af37';
                d.style.transform = `translateX(-50%) scale(1.5)`;
                
                // 餘波收攝回原本大小，留下淡淡金光
                setTimeout(() => {
                    d.style.transform = `translateX(-50%) scale(1)`;
                    d.style.background = 'rgba(243,229,171,0.6)';
                    d.style.boxShadow = '0 0 5px #d4af37';
                }, 400);
                
                await sleep(200); 
            }
        }


        async function startDharmaFeedback() {
            const btn = document.getElementById('ctrl-btn');
            const dot = document.getElementById('meditation-dot');
            const light = document.getElementById('infinite-light');
            const ring = document.getElementById('ring-0');
            const pillar = document.getElementById('pillar-1');

            initHuaYenTiers(); // 佈置好從小到大的星點

            btn.style.display = 'none';
            dot.style.opacity = '0'; dot.classList.remove('breathing');
            light.style.opacity = '0';
            ring.style.opacity = '0'; ring.style.transform = 'scale(0.5)';
            pillar.style.opacity = '0'; pillar.style.transform = 'scale(0.5)';

            // --- 1. 極黑沉澱 ---
            await sleep(2000);

            // --- 2. 巨大明珠浮現並呼吸 ---
            dot.style.opacity = '1';
            dot.classList.add('breathing');
            await sleep(6000); 

            // --- 3. 彌陀無量光爆發 ---
            dot.classList.remove('breathing');
            light.style.opacity = '1';
            await sleep(3000); 

            // --- 4. 空性 (0) 演化 ---
            light.style.opacity = '0';
            dot.style.opacity = '0';
            
            ring.style.transition = 'transform 4.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 3s ease';
            ring.style.opacity = '1';
            ring.style.transform = 'scale(1.5)';
            await sleep(4500); 

            // 0 跳動 5 下
            for(let i = 0; i < 5; i++) {
                ring.style.transition = 'transform 0.15s ease-out';
                ring.style.transform = 'scale(1.6)';
                await sleep(150);
                ring.style.transition = 'transform 0.3s ease-in';
                ring.style.transform = 'scale(1.5)';
                await sleep(400);
            }
            await sleep(800); 

            // 0 收攝淡出
            ring.style.transition = 'transform 3s cubic-bezier(0.5, 0, 0.8, 0.2), opacity 2.5s ease';
            ring.style.transform = 'scale(0.02)'; 
            ring.style.opacity = '0';
            await sleep(3500); // 留白黑暗

            // --- 5. 行菩提 (1) 演化 ---
            pillar.style.transition = 'transform 4.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 3s ease';
            pillar.style.opacity = '1';
            pillar.style.transform = 'scale(1.5)';
            await sleep(3500); 

            // 能量由底(小)向頂(大)攀升
            await surgeEnergy();
            await sleep(2000); // 頂點大圓滿留白 2 秒

            // 💡 6. 1 的寂滅 (如同 0 一樣縮小淡出)
            pillar.style.transition = 'transform 3.5s cubic-bezier(0.5, 0, 0.8, 0.2), opacity 3s ease';
            pillar.style.transform = 'scale(0.02)'; 
            pillar.style.opacity = '0';
            
            await sleep(4000); // 完全回歸純黑寂靜

            // --- 結束 ---
            btn.innerText = "重播此階段";
            btn.style.display = 'block';
        }
    </script>
</body>
</html>
