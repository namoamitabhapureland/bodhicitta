<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>法界演化 ． 空性收攝</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background: #000; color: #fff;
            display: flex; justify-content: center; align-items: center;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }

        /* 控制按鈕 */
        #ctrl-btn {
            position: absolute; z-index: 9999;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            padding: 15px 40px; border: 1px solid #d4af37; border-radius: 40px;
            color: #f3e5ab; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            font-size: 1.1rem; letter-spacing: 5px; cursor: pointer; transition: 0.3s;
        }

        /* ======= 1. 入夢明點 (帶有 0 的光暈) ======= */
        #meditation-dot {
            position: absolute;
            width: 8px; height: 8px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 15px #fff;
            opacity: 0; transform: scale(0.5);
            transition: opacity 2s ease;
            z-index: 10;
        }
        
        /* 💡 新增：小圓外圍如同 0 的光暈環 */
        #meditation-dot::before {
            content: ''; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 32px; height: 32px; border-radius: 50%;
            border: 1px solid rgba(243,229,171,0.6);
            box-shadow: 0 0 15px rgba(212,175,55,0.8), inset 0 0 10px rgba(212,175,55,0.5);
        }
        
        /* 明點與光暈共同的深長呼吸 */
        .breathing { animation: dot-breath 4s infinite alternate ease-in-out; }
        @keyframes dot-breath {
            0% { transform: scale(0.7); filter: brightness(0.8); }
            100% { transform: scale(1.3); filter: brightness(1.2); }
        }

        /* ======= 2. 彌陀無量光 ======= */
        #infinite-light {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(243,229,171,0.9) 40%, rgba(212,175,55,0.8) 100%);
            mix-blend-mode: screen; 
            opacity: 0; pointer-events: none;
            transition: opacity 3s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 20;
        }

        /* ======= 3. 空之顯現 (0) ======= */
        #ring-0 {
            position: absolute;
            width: 40vmin; height: 40vmin; border-radius: 50%;
            border: 2px solid rgba(243,229,171,0.8);
            box-shadow: 0 0 40px rgba(212,175,55,0.6), inset 0 0 20px rgba(212,175,55,0.3);
            opacity: 0; transform: scale(0.5);
            /* 動態過渡交由 JS 精準控制，展現膨脹與收攝 */
            z-index: 15;
        }
    </style>
</head>
<body>

    <button id="ctrl-btn" onclick="startPhaseOne()">開始演繹</button>

    <div id="meditation-dot"></div>
    <div id="infinite-light"></div>
    <div id="ring-0"></div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        async function startPhaseOne() {
            const btn = document.getElementById('ctrl-btn');
            const dot = document.getElementById('meditation-dot');
            const light = document.getElementById('infinite-light');
            const ring = document.getElementById('ring-0');

            // 狀態重置
            btn.style.display = 'none';
            dot.style.opacity = '0'; dot.classList.remove('breathing');
            light.style.opacity = '0';
            ring.style.opacity = '0'; ring.style.transform = 'scale(0.5)';

            // --- 步驟 1：極黑沉澱 (2秒) ---
            await sleep(2000);

            // --- 步驟 2：帶有光暈的入夢明點浮現並呼吸 ---
            dot.style.opacity = '1';
            dot.classList.add('breathing');
            await sleep(6000); 

            // --- 步驟 3：彌陀無量光爆發 ---
            dot.classList.remove('breathing');
            light.style.opacity = '1';
            await sleep(3000); 

            // --- 步驟 4：光芒漸退，0 緩緩浮現並膨脹 ---
            light.style.opacity = '0';
            dot.style.opacity = '0';
            
            // 💡 新增：0 浮現並放大 1.5 倍 (呼吸感)
            ring.style.transition = 'transform 4.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 3s ease';
            ring.style.opacity = '1';
            ring.style.transform = 'scale(1.5)';
            
            // 給予 0 充分的膨脹與展示時間
            await sleep(5000);

            // --- 步驟 5：0 極速收攝成小圓點並淡出 ---
            // 💡 新增：收攝回最初的本源點
            ring.style.transition = 'transform 3s cubic-bezier(0.5, 0, 0.8, 0.2), opacity 2.5s ease';
            ring.style.transform = 'scale(0.02)'; // 縮小到極小(如同明點)
            ring.style.opacity = '0';
            
            await sleep(3500);

            // --- 結束測試，顯示重播按鈕 ---
            btn.innerText = "重播此階段";
            btn.style.display = 'block';
        }
    </script>
</body>
</html>
