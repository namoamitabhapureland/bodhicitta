<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一真法界 ． 陰陽合一母帶</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            font-family: "Times New Roman", "Baskerville", serif;
            background: #000; color: #fff;
            display: flex; justify-content: center; align-items: center;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }

        /* 啟動按鈕 */
        #start-btn {
            position: absolute; z-index: 9999;
            font-family: "PingFang TC", sans-serif;
            padding: 16px 45px; border: 1.5px solid #d4af37; border-radius: 40px;
            color: #f3e5ab; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            font-size: 1.25rem; letter-spacing: 5px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 25px rgba(212,175,55,0.4); font-weight: bold;
        }
        #start-btn:active { background: #d4af37; color: #000; transform: scale(0.95); }

        /* 全局場景容器 */
        .scene {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 1.5s ease;
        }

        /* ======= 第一幕：入夢與無量光 ======= */
        #scene-1 { background: #000; z-index: 10; }
        .bindi-dot {
            width: 4px; height: 4px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 15px #fff; transform: scale(0.5); opacity: 0;
            transition: transform 2s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s;
        }
        .burst-light {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(243,229,171,0.9) 40%, rgba(212,175,55,0.8) 100%);
            mix-blend-mode: screen; opacity: 0; transition: opacity 1.5s ease;
        }

        /* ======= 第二幕：空之顯現 (0由小變大) ======= */
        #scene-2 { background: #000; z-index: 20; }
        .giant-0 {
            font-size: 12vmin; color: #fff; font-weight: lighter; line-height: 1;
            transform: scale(0.1); opacity: 0;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.5));
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 2s;
        }

        /* ======= 第三幕：有之接續 (1由大變小) ======= */
        #scene-3 { background: #fff; z-index: 30; }
        .giant-1 {
            font-size: 120vmin; color: #000; font-weight: lighter; line-height: 1;
            transform: scale(15); opacity: 0;
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 2s;
        }

        /* ======= 第四幕：陰陽割昏曉 (左右分割與呼吸合體) ======= */
        #scene-4 { z-index: 40; opacity: 0; display: flex; flex-direction: row; }
        .half-bg {
            position: absolute; top: 0; width: 50vw; height: 100vh; transition: background 1.5s ease;
        }
        #bg-left { left: 0; background: #000; }
        #bg-right { left: 50vw; background: #fff; }

        .split-num {
            position: absolute; top: 50%; transform: translateY(-50%);
            font-size: 65vmin; font-weight: lighter; line-height: 1;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }
        /* 0 在左半邊中央 */
        #split-0 { left: 25vw; transform: translate(-50%, -50%); color: #fff; }
        /* 1 在右半邊中央 */
        #split-1 { left: 75vw; transform: translate(-50%, -50%); color: #000; }

        /* 呼吸動畫 */
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); } 100% { transform: translate(-50%, -50%) scale(1.08); } }
        .pulse-slow { animation: pulse 1.2s infinite alternate ease-in-out; }
        .pulse-mid { animation: pulse 0.6s infinite alternate ease-in-out; }
        .pulse-fast { animation: pulse 0.2s infinite alternate ease-in-out; }

        #countdown {
            position: absolute; top: 18%; left: 50%; transform: translateX(-50%);
            font-family: "PingFang TC", sans-serif; font-size: 2.5rem; color: #888;
            letter-spacing: 8px; mix-blend-mode: difference; z-index: 100; opacity: 0; transition: 0.3s;
        }

        /* ======= 第五幕：大爆炸粒子 ======= */
        #particles-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 50; pointer-events: none; }
        .particle { position: absolute; background: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.8); }

        /* ======= 第六幕：玄語留白 ======= */
        #zen-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            font-size: 1.6rem; letter-spacing: 12px; color: transparent; white-space: nowrap;
            background: linear-gradient(90deg, #d4af37, #f3e5ab, #d4af37);
            -webkit-background-clip: text; filter: drop-shadow(0 0 20px rgba(212,175,55,0.6));
            opacity: 0; z-index: 100; transition: opacity 4s ease; pointer-events: none;
        }
    </style>
</head>
<body>

    <button id="start-btn" onclick="startJourney()">入定 ． 觀想全貌</button>

    <div class="scene" id="scene-1">
        <div class="bindi-dot" id="dot"></div>
        <div class="burst-light" id="burst"></div>
    </div>

    <div class="scene" id="scene-2">
        <div class="giant-0" id="g-0">0</div>
    </div>

    <div class="scene" id="scene-3">
        <div class="giant-1" id="g-1">1</div>
    </div>

    <div class="scene" id="scene-4">
        <div class="half-bg" id="bg-left"></div>
        <div class="half-bg" id="bg-right"></div>
        <div class="split-num" id="split-0">0</div>
        <div class="split-num" id="split-1">1</div>
        <div id="countdown"></div>
    </div>

    <div id="particles-container"></div>

    <div id="zen-text">色空無礙 ． 掩卷靜思</div>

    <script>
        let audioCtx;

        // 模擬純淨法器：罄聲
        function playQingSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(864, audioCtx.currentTime); // 清脆高頻
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 8); // 8秒餘音
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 8);
            } catch (e) {
                console.log("法器音效啟動失敗，轉為寂靜模式");
            }
        }

        // 粒子粉碎引擎 (修復數學計算 Bug)
        function explode() {
            const container = document.getElementById('particles-container');
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            for (let i = 0; i < 150; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                
                let isZeroType = Math.random() > 0.5;
                if (isZeroType) {
                    p.style.width = (Math.random() * 12 + 4) + 'px';
                    p.style.height = p.style.width;
                    p.style.borderRadius = '50%';
                } else {
                    p.style.width = (Math.random() * 3 + 1) + 'px';
                    p.style.height = (Math.random() * 30 + 10) + 'px';
                    p.style.transform = `rotate(${Math.random() * 360}deg)`;
                }

                p.style.left = centerX + 'px';
                p.style.top = centerY + 'px';
                container.appendChild(p);

                // 物理擴散軌跡 (修復 vw 單位報錯)
                let angle = Math.random() * Math.PI * 2;
                let velocity = Math.random() * (window.innerWidth * 0.4) + (window.innerWidth * 0.1);
                let endX = Math.cos(angle) * velocity;
                let endY = Math.sin(angle) * velocity;

                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${endX}px), calc(-50% + ${endY}px)) scale(0)`, opacity: 0 }
                ], {
                    duration: Math.random() * 2500 + 1500,
                    easing: 'cubic-bezier(0.1, 0.8, 0.2, 1)',
                    fill: 'forwards'
                });

                setTimeout(() => p.remove(), 4000);
            }
        }

        // 終極時間軸控制器
        function startJourney() {
            document.getElementById('start-btn').style.display = 'none';
            
            // 嘗試解鎖音效
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch(e) {}

            const s1 = document.getElementById('scene-1');
            const s2 = document.getElementById('scene-2');
            const s3 = document.getElementById('scene-3');
            const s4 = document.getElementById('scene-4');
            const dot = document.getElementById('dot');
            const burst = document.getElementById('burst');
            const g0 = document.getElementById('g-0');
            const g1 = document.getElementById('g-1');
            const split0 = document.getElementById('split-0');
            const split1 = document.getElementById('split-1');
            const cd = document.getElementById('countdown');

            // --- 第一幕：微光與無量 (0s) ---
            s1.style.opacity = '1';
            setTimeout(() => { dot.style.opacity = '1'; dot.style.transform = 'scale(400)'; }, 500); 
            setTimeout(() => { burst.style.opacity = '1'; }, 1500); 

            // --- 第二幕：0 由小變大 (3.5s) ---
            setTimeout(() => {
                s1.style.opacity = '0'; 
                s2.style.opacity = '1';
                g0.style.opacity = '1';
                g0.style.transform = 'scale(10)'; 
            }, 3500);

            // --- 第三幕：1 由大變小 (7.5s) ---
            setTimeout(() => {
                s2.style.opacity = '0'; 
                s3.style.opacity = '1';
                g1.style.opacity = '1';
                g1.style.transform = 'scale(1)'; 
            }, 7500);

            // --- 第四幕：陰陽割昏曉 (11s) ---
            setTimeout(() => {
                s3.style.opacity = '0';
                s4.style.opacity = '1';
                split0.classList.add('pulse-slow');
                split1.classList.add('pulse-slow');
                cd.style.opacity = '1';
                cd.innerText = '三';
            }, 11000);

            // --- 呼吸加速 ---
            setTimeout(() => {
                cd.innerText = '二';
                split0.classList.replace('pulse-slow', 'pulse-mid');
                split1.classList.replace('pulse-slow', 'pulse-mid');
            }, 12500);

            setTimeout(() => {
                cd.innerText = '一';
                split0.classList.replace('pulse-mid', 'pulse-fast');
                split1.classList.replace('pulse-mid', 'pulse-fast');
            }, 14000);

            // --- 第五幕：不二合體 (15s) ---
            setTimeout(() => {
                cd.style.opacity = '0';
                split0.className = 'split-num'; 
                split1.className = 'split-num';
                
                // 背景消融為極黑
                document.getElementById('bg-right').style.background = '#000';
                
                // 1 走入 0，完美合體
                split0.style.left = '50vw';
                split1.style.left = '50vw';
                split1.style.color = '#fff';
                split1.style.filter = 'drop-shadow(0 0 25px #d4af37)';
            }, 15000);

            // --- 第六幕：罄聲與大爆炸 (16.5s) ---
            setTimeout(() => {
                playQingSound();
                split0.style.display = 'none';
                split1.style.display = 'none';
                document.getElementById('bg-left').style.display = 'none';
                document.getElementById('bg-right').style.display = 'none';
                explode(); 
            }, 16500);

            // --- 第七幕：玄語留白 (18.5s) ---
            setTimeout(() => {
                document.getElementById('zen-text').style.opacity = '1';
            }, 18500);
        }
    </script>
</body>
</html>
