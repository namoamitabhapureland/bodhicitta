<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自性金蓮 ． 契印示範</title>
    <style>
        :root { 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --bg-deep: #050608; 
        }
        
        body { 
            margin: 0; padding: 0; 
            height: 100vh; height: 100dvh; 
            overflow: hidden; 
            background: radial-gradient(circle at 50% 50%, #1a2228 0%, #000000 70%); 
            color: #fff; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 🌟 證書卡片：極致沉浸質感 */
        #cert-ui {
            width: 88%; max-width: 380px;
            background: linear-gradient(135deg, rgba(15, 15, 12, 0.92), rgba(2, 2, 0, 0.98));
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px; padding: 35px 25px 30px 25px;
            box-shadow: 0 30px 80px rgba(0,0,0,1), inset 0 0 30px rgba(212, 175, 55, 0.05);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; flex-direction: column; align-items: center;
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .cert-header {
            color: rgba(243, 229, 171, 0.7); font-size: 0.85rem; letter-spacing: 6px; 
            margin-bottom: 25px; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.3);
        }

        /* 蓮花容器 */
        #lotus-container {
            width: 180px; height: 180px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .lotus-spin { animation: slow-spin 60s linear infinite; }
        @keyframes slow-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .cert-name-wrap { text-align: center; margin-bottom: 20px; width: 100%; border-bottom: 1px solid rgba(212,175,55,0.15); padding-bottom: 15px; }
        .cert-label { color: #8ba89c; font-size: 0.7rem; letter-spacing: 4px; margin-bottom: 8px; }
        .cert-user { color: var(--gold); font-size: 1.5rem; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 15px rgba(212,175,55,0.5); }

        .cert-desc {
            color: #ccc; font-size: 0.85rem; line-height: 2.2; letter-spacing: 1.5px; text-align: center;
            margin-bottom: 30px; min-height: 100px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .cert-desc b { color: var(--solid-gold); font-size: 1.1rem; }

        .btn-confirm {
            width: 100%; padding: 14px 0; border-radius: 30px; border: 1px solid var(--solid-gold);
            background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(0,0,0,0.8));
            color: var(--gold); font-size: 0.9rem; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s;
        }

        /* 下方測試切換按鈕 */
        .demo-controls {
            position: absolute; bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 95%;
        }
        .demo-btn {
            padding: 6px 10px; font-size: 0.75rem; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.5); color: #fff; cursor: pointer;
        }
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <radialGradient id="grad-15000" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff"/>
                <stop offset="40%" stop-color="#ce93d8"/>
                <stop offset="100%" stop-color="#7b1fa2"/>
            </radialGradient>
            <radialGradient id="grad-20000" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff"/>
                <stop offset="40%" stop-color="#80deea"/>
                <stop offset="100%" stop-color="#00838f"/>
            </radialGradient>
            <radialGradient id="grad-25000" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff"/>
                <stop offset="40%" stop-color="#e0e0e0"/>
                <stop offset="100%" stop-color="#9e9e9e"/>
            </radialGradient>
            <radialGradient id="grad-30000" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff"/>
                <stop offset="40%" stop-color="#ffd54f"/>
                <stop offset="100%" stop-color="#ff8f00"/>
            </radialGradient>
        </defs>
    </svg>

    <div id="cert-ui">
        <div class="cert-header" id="rank-title">✦ 蓮池海會 契印 ✦</div>
        
        <div id="lotus-container">
            </div>

        <div class="cert-name-wrap">
            <div class="cert-label">行 者</div>
            <div class="cert-user">妙 依</div>
        </div>

        <div class="cert-desc" id="cert-desc">
            累積念佛已達 <b>100,000</b> 聲。<br>
            初入蓮池，霞光環繞。<br>
            諸上善人同聚一處，共修淨業。
        </div>

        <button class="btn-confirm">斂心為印 ． 默然歸返</button>
    </div>

    <div class="demo-controls">
        <button class="demo-btn" onclick="renderDemo(100000, '蓮池海會', 'grad-15000', '諸上善人同聚一處，共修淨業。')">10萬 (紫金)</button>
        <button class="demo-btn" onclick="renderDemo(500000, '不退轉菩薩', 'grad-20000', '淨業初成，如露清涼，永不退轉。')">50萬 (玉露)</button>
        <button class="demo-btn" onclick="renderDemo(1000000, '無相念佛', 'grad-25000', '心佛合一，湛藍如月，照徹大千。')">100萬 (銀輝)</button>
        <button class="demo-btn" onclick="renderDemo(10000000, '念佛三昧', 'grad-30000', '入深三昧，大地玄黃，定力如山。')">1千萬 (玄黃)</button>
        <button class="demo-btn" onclick="renderDemo(100000000, '圓滿成佛', 'grad-30000', '萬德圓滿，金剛不壞，大放光明。')">1億 (耀金)</button>
    </div>

    <script>
        function renderDemo(p, rTxt, gradId, subTxt) {
            const container = document.getElementById('lotus-container');
            const rankTitle = document.getElementById('rank-title');
            const certDesc = document.getElementById('cert-desc');
            const certUI = document.getElementById('cert-ui');

            rankTitle.innerText = `✦ ${rTxt} 契印 ✦`;
            certDesc.innerHTML = `累積念佛已達 <b>${p.toLocaleString()}</b> 聲。<br>${subTxt}`;
            
            let fill = `url(#${gradId})`;
            let stroke = "rgba(212,175,55,0.4)";
            let glow = "none";
            let layers = 3;

            if (p >= 100000000) {
                stroke = "#fff";
                glow = "drop-shadow(0 0 15px rgba(212,175,55,0.8)) drop-shadow(0 0 30px rgba(212,175,55,0.4))";
            }

            certUI.style.boxShadow = p >= 100000000 ? "0 0 100px rgba(212,175,55,0.3)" : "0 30px 80px rgba(0,0,0,1)";

            // ✨ 採用您提供的蓮花路徑演算法
            let svg = `<svg class="lotus-spin" viewBox="-150 -150 300 300" style="width:100%;height:100%;overflow:visible;filter:${glow}">`;

            for (let l = layers; l > 0; l--) {
                const sc = 0.44 + l * 0.28;
                const n = (l === layers) ? 8 : 6;
                const rotOffset = l * 22.5; 
                for (let i = 0; i < n; i++) {
                    const rot = i * (360/n) + rotOffset;
                    const s = 112 * sc;
                    // 流線瓣路徑
                    const pth = `M 0 0 C ${s*.44} ${-s*.07} ${s*.54} ${-s*.62} 0 ${-s} C ${-s*.54} ${-s*.62} ${-s*.44} ${-s*.07} 0 0`;
                    const vein = `M 0 ${-s*.08} Q 0 ${-s*.55} 0 ${-s*.88}`;
                    svg += `<g transform="rotate(${rot})">
                        <path d="${pth}" fill="${fill}" stroke="${stroke}" stroke-width="0.8" opacity="0.9"/>
                        <path d="${vein}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
                    </g>`;
                }
            }
            // 蓮心
            const cr = 18;
            svg += `<circle cx="0" cy="0" r="${cr}" fill="${fill}" stroke="${stroke}" stroke-width="1.2" />`;
            // 花蕊
            for (let s = 0; s < 12; s++) {
                const sa = (s * 30) * Math.PI / 180;
                const sr = cr + 8;
                const ex = (sr * Math.cos(sa)).toFixed(1);
                const ey = (sr * Math.sin(sa)).toFixed(1);
                svg += `<circle cx="${ex}" cy="${ey}" r="2.5" fill="${fill}" opacity="0.8"/>
                <line x1="${(cr*.6*Math.cos(sa)).toFixed(1)}" y1="${(cr*.6*Math.sin(sa)).toFixed(1)}" x2="${ex}" y2="${ey}" stroke="rgba(255,255,255,0.2)" stroke-width="0.6"/>`;
            }
            svg += `</svg>`;
            container.innerHTML = svg;
        }

        // 初始渲染第一階
        window.onload = () => renderDemo(100000, '蓮池海會', 'grad-15000', '諸上善人同聚一處，共修淨業。');
    </script>
</body>
</html>
