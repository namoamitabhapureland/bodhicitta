<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest_en.json">
    <title>Golden Lotus ． Merit Seal</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --bg-deep: #020203;
        }

        body {
            margin: 0; padding: 0;
            height: 100vh; height: 100dvh;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #111518 0%, var(--bg-deep) 100%);
            color: #fff; font-family: "Helvetica Neue", Arial, "PingFang TC", sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        canvas { 
            position: absolute; inset: 0; 
            width: 100%; height: 100%; 
            z-index: 1; pointer-events: none; 
        }

        .top-nav-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); 
            padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; 
            display: flex; align-items: center; gap: 6px; z-index: 1000; cursor: pointer; 
            backdrop-filter: blur(5px); transition: opacity 0.8s, transform 0.3s;
        }
        .top-nav-btn:active { 
            transform: scale(0.95); 
            background: rgba(212,175,55,0.2); 
        }

        #deck-container {
            position: absolute;
            bottom: 5%; 
            width: 100%; height: 420px;
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 30px;
            z-index: 10;
            perspective: 1500px;
        }

        .card {
            position: absolute;
            width: 220px; height: 380px; 
            transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1.1);
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.is-flipped .card-inner { 
            transform: rotateY(180deg); 
        }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        .card-back {
            background: linear-gradient(145deg, #0a0c0e, #010101);
            justify-content: center;
        }
        .totem-prajna {
            width: 90px; height: 90px;
            fill: none; stroke: var(--solid-gold);
            stroke-width: 1; opacity: 0.5;
        }

        .card-front {
            background: linear-gradient(135deg, rgba(15,15,12,0.95), rgba(2,2,0,1));
            transform: rotateY(180deg);
            padding: 25px 15px; 
            justify-content: space-between;
        }

        .lotus-box {
            width: 150px; height: 150px;
            display: flex; align-items: center; justify-content: center;
        }
        .lotus-spin { 
            animation: slow-spin 50s linear infinite; 
        }
        @keyframes slow-spin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        .draw-petal {
            stroke-dasharray: 1000; stroke-dashoffset: 1000; fill-opacity: 0;
            animation: dash-draw 3s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.5s, color-fade 2.5s ease forwards 2.5s;
        }
        @keyframes dash-draw { to { stroke-dashoffset: 0; } }
        @keyframes color-fade { to { fill-opacity: 0.8; } }

        .cert-header { 
            color: var(--gold); font-size: 0.8rem; letter-spacing: 2px; 
            font-weight: bold; text-transform: uppercase; text-align: center; 
        }
        .cert-user { 
            color: var(--gold); font-size: 1.15rem; font-weight: bold; 
            letter-spacing: 2px; margin: 8px 0; text-shadow: 0 0 10px rgba(212,175,55,0.4); text-align: center;
        }
        
        .cert-name-wrap { text-align: center; width: 100%; }
        .cert-label { color: var(--cyan); font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; }

        .cert-desc { 
            color: #ccc; font-size: 0.72rem; line-height: 1.6; 
            text-align: center; padding: 0 5px; 
        }
        .cert-desc b { color: var(--solid-gold); }

        .btn-confirm {
            margin-top: 15px; width: 100%; padding: 12px 0; border-radius: 30px;
            border: 1px solid var(--solid-gold); 
            background: linear-gradient(to right, rgba(212,175,55,0.1), rgba(212,175,55,0.2));
            color: var(--gold); font-size: 0.75rem; font-weight: bold; 
            cursor: pointer; transition: 0.3s; letter-spacing: 1px; text-transform: uppercase;
        }
        .btn-confirm:active { background: rgba(212,175,55,0.3); }

        .card-0 { transform: rotateZ(-12deg) translateX(-140px) translateY(35px); z-index: 5; }
        .card-1 { transform: rotateZ(-6deg) translateX(-70px) translateY(10px); z-index: 6; }
        .card-2 { transform: rotateZ(0deg) translateX(0px) translateY(0px); z-index: 7; }
        .card-3 { transform: rotateZ(6deg) translateX(70px) translateY(10px); z-index: 6; }
        .card-4 { transform: rotateZ(12deg) translateX(140px) translateY(35px); z-index: 5; }

        /* 聚焦狀態 */
        .card.is-active {
            transform: scale(1.1) rotateZ(0deg) translateX(0px) translateY(-100px) !important;
            z-index: 100 !important;
        }

        #page-curtain { 
            position: fixed; inset: 0; background: #000; 
            z-index: 999999; pointer-events: none; transition: opacity 1s; opacity: 1; 
        }
    </style>
</head>
<body onclick="resetAllCards(event)">

    <div id="page-curtain"></div>

    <div class="top-nav-btn" onclick="goHome('index_en.html')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Return
    </div>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <radialGradient id="grad-100k" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff"/><stop offset="60%" stop-color="#e1bee7"/><stop offset="100%" stop-color="#ba68c8"/>
            </radialGradient>
            <radialGradient id="grad-500k" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff"/><stop offset="50%" stop-color="#e0f7fa"/><stop offset="100%" stop-color="#4dd0e1"/>
            </radialGradient>
            <radialGradient id="grad-1m" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff"/><stop offset="50%" stop-color="#fce4ec"/><stop offset="100%" stop-color="#f48fb1"/>
            </radialGradient>
            <radialGradient id="grad-10m" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#b2ebf2"/><stop offset="50%" stop-color="#f8bbd0"/><stop offset="100%" stop-color="#fff9c4"/>
            </radialGradient>
            <radialGradient id="grad-100m" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff"/><stop offset="40%" stop-color="#fff59d"/><stop offset="100%" stop-color="#ffb300"/>
            </radialGradient>
            
            <g id="totem-prajna-symbol">
                <path d="M50 10 C 75 40, 75 70, 50 95 C 25 70, 25 40, 50 10 Z" />
                <path d="M50 35 L 65 55 L 50 75 L 35 55 Z" stroke-width="0.8"/>
                <circle cx="50" cy="55" r="5" stroke-width="0.8"/>
            </g>
        </defs>
    </svg>

    <canvas id="starCanvas"></canvas>
    <div id="deck-container"></div>

    <script>
        const MILESTONES = [
            { key: 'nian_100k', target: 100000, title: 'Lotus Assembly', desc: 'Entering the Lotus Pond, surrounded by rosy clouds.<br>Gathering with beings of superior goodness.', grad: 'grad-100k', color: '#ba68c8' },
            { key: 'nian_500k', target: 500000, title: 'Non-retrogressive', desc: 'Pure karma formed, refreshing as morning dew.<br>Never falling back, aspiring for supreme Bodhi.', grad: 'grad-500k', color: '#4dd0e1' },
            { key: 'nian_1m',   target: 1000000, title: 'Formless Recitation', desc: 'Serene and pure, mind and Buddha as one.<br>Practicing the formless, realizing unobstructed wisdom.', grad: 'grad-1m', color: '#f48fb1' },
            { key: 'nian_10m',  target: 10000000, title: 'Buddha Samadhi', desc: 'Radiant with colors, entering deep Samadhi.<br>Concentration firm as a mountain, Dharmadhatu in one mark.', grad: 'grad-10m', color: '#81d4fa' },
            { key: 'nian_100m', target: 100000000, title: 'Perfect Buddhahood', desc: 'Golden radiance of Great Perfection, indestructible Vajra.<br>Adorned with myriad virtues, illuminating ten directions.', grad: 'grad-100m', color: '#ffb300' }
        ];

        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        
        function resize() { 
            width = window.innerWidth; 
            height = window.innerHeight; 
            canvas.width = width; 
            canvas.height = height; 
        }
        
        window.addEventListener('resize', resize); 
        resize();
        
        for(let i=0; i<150; i++) {
            stars.push({ 
                x: (Math.random() - 0.5) * 2000, 
                y: (Math.random() - 0.5) * 2000, 
                z: Math.random() * 1000, 
                s: Math.random() * 2 
            });
        }
        
        function draw() {
            ctx.fillStyle = 'rgba(2, 2, 4, 0.4)'; 
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen';
            
            stars.forEach(s => { 
                s.z -= 0.8; 
                if(s.z <= 0) s.z = 1000; 
                let sc = 300 / (300 + s.z);
                let sx = width / 2 + s.x * sc;
                let sy = height / 2 + s.y * sc; 
                
                ctx.beginPath(); 
                ctx.arc(sx, sy, s.s * sc, 0, Math.PI * 2); 
                ctx.fillStyle = `rgba(243, 229, 171, ${sc * 1.5})`; 
                ctx.fill(); 
            });
            requestAnimationFrame(draw);
        }
        draw();

        let db; 
        try { 
            db = JSON.parse(localStorage.getItem('PX_EN_V15.0')) || {}; 
        } catch(e) { 
            db = {}; 
        }
        
        const milestones = db.milestones || {};
        const currentTotal = db.totalNian || 0;
        const userName = db.name || "Practitioner";
        const deck = document.getElementById('deck-container');
        
        let autoActiveIdx = -1;

        MILESTONES.forEach((m, idx) => {
            const alreadyClaimed = milestones[m.key] === true;
            if (currentTotal >= m.target && !alreadyClaimed && autoActiveIdx === -1) { 
                autoActiveIdx = idx; 
            }

            const card = document.createElement('div');
            card.className = `card card-${idx}`;
            
            if (alreadyClaimed) {
                card.onclick = (e) => { 
                    e.stopPropagation(); 
                    focusCard(idx); 
                };
            }
            
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-back card-face" style="box-shadow: inset 0 0 25px ${m.color}55">
                        <svg class="totem-prajna" style="stroke:${m.color}" viewBox="0 0 100 100">
                            <use href="#totem-prajna-symbol"/>
                        </svg>
                        <div style="margin-top:20px; color:${m.color}; font-size:0.75rem; letter-spacing:3px; font-weight:bold; opacity:0.8">
                            ${(currentTotal >= m.target || alreadyClaimed) ? 'PERFECTED' : 'CULTIVATING...'}
                        </div>
                    </div>
                    <div class="card-front card-face" style="box-shadow: inset 0 0 40px ${m.color}33">
                        <div class="cert-header">✦ ${m.title} ✦</div>
                        <div class="lotus-box" id="lotus-box-${idx}"></div>
                        <div class="cert-name-wrap">
                            <div class="cert-label">PRACTITIONER</div>
                            <div class="cert-user">${userName}</div>
                        </div>
                        <div class="cert-desc">Recitations: <b>${m.target.toLocaleString()}</b><br>${m.desc}</div>
                        <button class="btn-confirm" onclick="returnToSystem('${alreadyClaimed ? '' : m.key}')">
                            ${alreadyClaimed ? 'CLOSE SEAL' : 'REJOICE IN MERIT ． RETURN'}
                        </button>
                    </div>
                </div>
            `;
            deck.appendChild(card);
        });

        window.onload = () => {
            setTimeout(() => { 
                document.getElementById('page-curtain').style.opacity = '0'; 
            }, 300);
            
            if (autoActiveIdx !== -1) { 
                focusCard(autoActiveIdx); 
            }
        };

        function focusCard(idx) {
            resetAllCards();
            const targetCard = document.querySelector(`.card-${idx}`);
            targetCard.classList.add('is-active');
            
            setTimeout(() => {
                targetCard.classList.add('is-flipped');
                startLotusAnimation(idx);
            }, 800);
        }

        function resetAllCards(e) {
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('is-active');
                c.classList.remove('is-flipped');
            });
        }

        function startLotusAnimation(idx) {
            const box = document.getElementById(`lotus-box-${idx}`);
            if (box.innerHTML !== "") return;

            const m = MILESTONES[idx];
            const isMax = (idx === 4);
            let fill = `url(#${m.grad})`;
            let stroke = isMax ? "#ffffff" : "rgba(243, 229, 171, 0.8)";
            let glow = isMax ? "drop-shadow(0 0 15px rgba(212,175,55,0.8))" : "none";
            
            let svg = `<svg class="lotus-spin" viewBox="-150 -150 300 300" style="width:100%;height:100%;overflow:visible; filter:${glow}">`;
            
            for (let l = 3; l > 0; l--) {
                const sc = 0.44 + l * 0.28;
                const n = (l === 3) ? 8 : 6;
                const rotOffset = l * 22.5;
                
                for (let i = 0; i < n; i++) {
                    const rot = i * (360 / n) + rotOffset;
                    const s = 112 * sc;
                    const pth = `M 0 0 C ${s * .44} ${-s * .07} ${s * .54} ${-s * .62} 0 ${-s} C ${-s * .54} ${-s * .62} ${-s * .44} ${-s * .07} 0 0`;
                    svg += `<g transform="rotate(${rot})">
                                <path class="draw-petal" d="${pth}" fill="${fill}" stroke="${stroke}" stroke-width="${isMax ? 1.5 : 1.2}" />
                            </g>`;
                }
            }
            svg += `</svg>`;
            box.innerHTML = svg;
        }

        function goHome(targetUrl) {
            document.getElementById('page-curtain').style.opacity = '1';
            setTimeout(() => { 
                window.location.href = targetUrl; 
            }, 800);
        }

        function returnToSystem(key) {
            if (!key) { 
                resetAllCards(); 
                return; 
            } // 空字串代表是回顧模式，僅收起卡牌不跳轉
            
            document.getElementById('page-curtain').style.opacity = '1';
            
            if (!db.milestones) db.milestones = {};
            db.milestones[key] = true;
            localStorage.setItem('PX_EN_V15.0', JSON.stringify(db));
            
            setTimeout(() => { 
                window.location.href = 'index_en.html'; 
            }, 800);
        }
    </script>
</body>
</html>
