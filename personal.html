<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>菩提心室 ‧ 最終美學測試</title>
    <style>
        :root { --bg: #010103; --gold: #f3e5ab; --solid: #d4af37; --cyan: #8ba89c; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: "PingFang TC", serif; height: 100dvh; overflow: hidden; }
        
        /* 隱形作弊點擊區 */
        .dev-zone { position: absolute; top: 20px; left: 20px; padding: 10px; z-index: 2000; color: #444; font-size: 10px; cursor: pointer; letter-spacing: 2px; }

        /* 中央蓮花舞台 */
        .stage { height: 70vh; display: flex; justify-content: center; align-items: center; position: relative; }
        #lotus-svg { width: 80vw; height: 80vw; max-width: 300px; max-height: 300px; animation: breathe 4s infinite ease-in-out; }
        .seed { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px #fff; z-index: 10; }

        @keyframes breathe { 0%, 100% { transform: scale(0.96) rotate(0deg); } 50% { transform: scale(1.04) rotate(5deg); } }

        /* 底部數據 */
        .footer { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        .score-display { font-size: 24px; color: var(--solid); letter-spacing: 4px; margin-bottom: 10px; cursor: pointer; }
        .main-btn { width: 60px; height: 60px; border-radius: 50%; border: 1px solid var(--solid); background: rgba(212,175,55,0.1); margin: 0 auto; display: flex; justify-content: center; align-items: center; }

        /* 抄襲自妙依原版：毛玻璃送禮畫面 */
        #treasure-overlay {
            position: fixed; inset: 0; z-index: 3000; background: rgba(1, 1, 3, 0.9);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.8s;
        }
        #treasure-overlay.show { display: flex; opacity: 1; }
        .t-svg-wrap { width: 150px; height: 150px; margin-bottom: 20px; animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

<svg style="position: absolute; width: 0; height: 0;">
    <defs>
        <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
        <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.1"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.7"/></linearGradient>
        <linearGradient id="facet-cyan" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.9"/><stop offset="100%" stop-color="#00838f" stop-opacity="0.4"/></linearGradient>
        <linearGradient id="facet-rose" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="100%" stop-color="#c2185b" stop-opacity="0.5"/></linearGradient>
        <linearGradient id="rainbow-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff9a9e"/><stop offset="50%" stop-color="#fad0c4"/><stop offset="100%" stop-color="#a1c4fd"/></linearGradient>
    </defs>
</svg>

<div class="dev-zone" onclick="addCheat()">行者觀照 (作弊+100)</div>

<div id="treasure-overlay" onclick="this.classList.remove('show')">
    <div class="t-svg-wrap" id="t-svg"></div>
    <div style="color:var(--gold); letter-spacing:4px;" id="t-name"></div>
    <div style="color:var(--cyan); font-size:11px; margin-top:10px;">點擊收攝願力</div>
</div>

<div class="stage">
    <div class="seed"></div>
    <div id="lotus-svg"></div>
</div>

<div class="footer">
    <div class="score-display" id="ui-pts" onclick="resetPts()">0</div>
    <div style="font-size:10px; color:var(--cyan); margin-bottom:20px;">菩提資糧 ‧ <span id="ui-rank">一真法界</span></div>
    <div class="main-btn" onclick="addCount()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
    </div>
</div>

<script>
    let points = 0;
    let clickAcc = 0;

    [span_3](start_span)// 抄襲自你代碼中的 3 個寶物[span_3](end_span)
    const treasures = [
        { name: "幾何慧劍", svg: `<svg viewBox="0 0 100 150"><polygon points="50,10 56,40 50,105 44,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><circle cx="50" cy="105" r="4" fill="#fff"/></svg>` },
        { name: "琉璃淨瓶", svg: `<svg viewBox="0 0 100 150"><polygon points="42,50 58,50 72,95 28,95" fill="url(#facet-cyan)" stroke="#fff" stroke-width="0.5"/></svg>` },
        { name: "多面寶珠", svg: `<svg viewBox="0 0 100 150"><polygon points="50,15 85,45 50,65 15,45" fill="url(#facet-light)" stroke="#fff" stroke-width="0.8"/></svg>` }
    ];

    function addCheat() { points += 100; checkMilestone(); updateUI(); }
    function resetPts() { if(confirm("歸零？")) { points=0; updateUI(); } }

    function addCount() {
        clickAcc++;
        if(clickAcc >= 100) { points += 10; clickAcc = 0; checkMilestone(); }
        updateUI();
    }

    function checkMilestone() {
        // 每 30 點送一個寶物測試
        if(points > 0 && points % 30 === 0) {
            const t = treasures[Math.floor(Math.random()*treasures.length)];
            document.getElementById('t-svg').innerHTML = t.svg;
            document.getElementById('t-name').innerText = `獲得法寶：${t.name}`;
            document.getElementById('treasure-overlay').classList.add('show');
        }
    }

    function updateUI() {
        document.getElementById('ui-pts').innerText = points;
        renderLotus(points);
    }

    function renderLotus(pts) {
        const box = document.getElementById('lotus-svg');
        const rank = document.getElementById('ui-rank');
        if(pts < 10) { box.innerHTML = ''; rank.innerText = "一真法界"; return; }

        let layers = 1;
        let color = "rgba(255,255,255,0.7)"; 
        let rankText = "清淨萌芽";

        if(pts >= 20) { color = "url(#facet-rose)"; rankText = "慈悲長養"; }
        if(pts >= 50) { color = "url(#facet-cyan)"; rankText = "智慧生機"; }
        if(pts >= 100) { layers = 2; color = "url(#facet-dark)"; rankText = "聖潔金蓮"; }
        if(pts >= 1000) { layers = 2; color = "url(#rainbow-grad)"; rankText = "幻彩琉璃"; }
        if(pts >= 30000) { layers = 2; color = "#fff"; rankText = "大圓滿亮金"; }

        rank.innerText = rankText;

        let svg = `<svg viewBox="-150 -150 300 300" style="width:100%; height:100%;">
            <defs>
                <linearGradient id="pGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="${pts >= 100 ? 'transparent' : 'white'}"/>
                </linearGradient>
            </defs>`;

        for (let l = layers; l > 0; l--) {
            const sc = 0.4 + (l * 0.25);
            for (let i = 0; i < 8; i++) {
                svg += `<g transform="rotate(${i*45 + (l*22.5)}) scale(${sc})">
                    <path d="M0 0 C25 -50 40 -100 0 -150 C-40 -100 -25 -50 0 0" fill="${color}" stroke="${pts >= 1000 ? 'none' : color}" stroke-width="0.5" opacity="0.8"/>
                </g>`;
            }
        }
        svg += `</svg>`;
        box.innerHTML = svg;
    }

    updateUI();
</script>
</body>
</html>
