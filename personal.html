<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>行者觀照 ‧ 菩提空間</title>
<style>
    /* 頂級宇宙黑金主題 */
    :root {
        --gold-primary: #CBA37A; 
        --gold-light: #E2CDBA;
        --gold-dim: rgba(203, 163, 122, 0.3);
        --glass-bg: rgba(15, 12, 10, 0.4);
        --bg-deep: #050505;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0; padding: 0;
        background-color: var(--bg-deep);
        background-image: radial-gradient(circle at 50% 40%, rgba(30, 25, 20, 0.8) 0%, var(--bg-deep) 70%);
        font-family: -apple-system, "PingFang TC", "Helvetica Neue", sans-serif;
        color: #EAEAEA;
        height: 100dvh;
        overflow: hidden;
        display: flex; justify-content: center;
        user-select: none; -webkit-user-select: none;
    }

    .app-wrapper {
        width: 100%; max-width: 480px;
        display: flex; flex-direction: column;
        position: relative;
    }

    /* 1. 頂部極簡導航 */
    .nav-top {
        padding: max(20px, env(safe-area-inset-top)) 25px 10px;
        display: flex; justify-content: space-between; align-items: center;
        z-index: 20;
    }
    .nav-btn {
        color: var(--gold-primary); opacity: 0.6; text-decoration: none;
        font-size: 11px; letter-spacing: 3px; font-weight: 300;
        transition: opacity 0.3s; cursor: pointer;
    }
    .nav-btn:active { opacity: 1; }

    /* 2. 行者資訊 (整合你原本的照片與備忘錄) */
    .traveler-info {
        padding: 10px 30px;
        display: flex; flex-direction: column; gap: 15px;
        z-index: 20;
    }
    .profile-top {
        display: flex; justify-content: space-between; align-items: flex-start;
    }
    
    /* 你的大頭貼設計 (優化為高級圓框) */
    .avatar-section {
        display: flex; gap: 15px; align-items: center;
    }
    .avatar-wrap {
        width: 46px; height: 46px; border-radius: 50%;
        border: 1px solid var(--gold-dim);
        background: rgba(255,255,255,0.02);
        display: flex; justify-content: center; align-items: center;
        cursor: pointer; position: relative;
    }
    .avatar-circle {
        width: 100%; height: 100%; border-radius: 50%;
        background-size: cover; background-position: center;
    }
    /* 未上傳照片時的預設十字 */
    .avatar-placeholder {
        position: absolute; color: var(--gold-dim); font-size: 18px; font-weight: 100; pointer-events: none;
    }

    .t-name {
        font-size: 16px; letter-spacing: 6px; font-weight: 300; 
        color: var(--gold-light); margin-bottom: 4px;
    }
    .t-rank {
        font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.4);
    }
    .t-stats {
        text-align: right; font-size: 9px; letter-spacing: 2px;
        color: rgba(255,255,255,0.3); line-height: 1.8;
    }
    .t-stats span { color: var(--gold-primary); font-size: 11px; margin-left: 6px; }

    /* 你的備忘錄設計 (優化為極簡底線) */
    .memo-input {
        width: 100%; background: transparent; border: none;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        color: rgba(255,255,255,0.8); font-size: 11px; letter-spacing: 2px;
        padding: 5px 0; outline: none; font-weight: 300; transition: 0.3s;
    }
    .memo-input::placeholder { color: rgba(255,255,255,0.2); }
    .memo-input:focus { border-bottom-color: var(--gold-dim); }

    /* 3. 菩提心絕對主角區 (留白放大) */
    .bodhi-stage {
        flex: 1; position: relative;
        display: flex; justify-content: center; align-items: center;
    }
    .seed-core {
        position: absolute; width: 4px; height: 4px;
        background: #FFF; border-radius: 50%;
        box-shadow: 0 0 15px 4px rgba(255,255,255,0.8), 0 0 30px 10px rgba(203, 163, 122, 0.4);
        animation: breath-core 4s infinite ease-in-out;
        z-index: 10;
    }
    .lotus-container {
        position: absolute; width: 300px; height: 300px;
        display: flex; justify-content: center; align-items: center;
        transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* 4. 底部微縮操作區 */
    .action-panel {
        padding: 10px 30px max(35px, env(safe-area-inset-bottom));
        display: flex; flex-direction: column; align-items: center; gap: 25px;
        z-index: 20;
    }

    .btn-row {
        display: flex; justify-content: center; gap: 50px; width: 100%;
    }

    /* 極簡按鈕設計 */
    .btn-item {
        display: flex; flex-direction: column; align-items: center; gap: 12px;
        position: relative;
    }
    .circle-btn {
        width: 48px; height: 48px; border-radius: 50%;
        background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--gold-dim);
        display: flex; justify-content: center; align-items: center;
        cursor: pointer; transition: all 0.2s ease;
        position: relative; overflow: hidden;
    }
    .circle-btn:active { transform: scale(0.92); background: rgba(203, 163, 122, 0.1); }
    .circle-btn svg { width: 18px; height: 18px; stroke: var(--gold-primary); fill: none; stroke-width: 1.2; }
    
    .btn-lbl { font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.5); font-weight: 300; }
    .btn-val { font-size: 13px; color: var(--gold-primary); font-weight: 300; margin-top: 2px; }

    /* 長按進度環 */
    .progress-ring {
        position: absolute; top: -1px; left: -1px; width: 48px; height: 48px;
        transform: rotate(-90deg); pointer-events: none;
    }
    .progress-ring circle {
        fill: none; stroke: var(--gold-primary); stroke-width: 1.5;
        stroke-dasharray: 150; stroke-dashoffset: 150; transition: stroke-dashoffset 1.5s linear;
    }
    .is-pressing .progress-ring circle { stroke-dashoffset: 0; }

    /* 統計大數據入口 */
    .chart-btn {
        font-size: 10px; letter-spacing: 4px; color: var(--gold-primary);
        border: 1px solid var(--gold-dim); padding: 8px 24px; border-radius: 20px;
        background: transparent; transition: 0.3s; cursor: pointer; font-weight: 300;
    }
    .chart-btn:active { background: var(--gold-dim); color: #FFF; }

    /* 飛行光點動畫 */
    .light-particle {
        position: absolute; width: 3px; height: 3px;
        background: var(--gold-light); border-radius: 50%;
        box-shadow: 0 0 8px 2px var(--gold-primary);
        pointer-events: none; z-index: 50;
    }

    @keyframes breath-core {
        0%, 100% { transform: scale(0.8); opacity: 0.7; }
        50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 25px 8px rgba(255,255,255,1), 0 0 40px 15px rgba(203, 163, 122, 0.6); }
    }
</style>
</head>
<body>

<div class="app-wrapper">
    <div class="nav-top">
        <a href="index.html" class="nav-btn">← 回道場</a>
        <div class="nav-btn" onclick="alert('規則：\n1. 專念彌陀與點亮世界累積菩提分\n2. 中央光點隨分數長出黑金花瓣\n3. 普念諸佛可長按 1.5 秒歸零')">觀照</div>
    </div>

    <div class="traveler-info">
        <div class="profile-top">
            <div class="avatar-section">
                <div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()">
                    <div class="avatar-placeholder" id="avatarPlus">+</div>
                    <div class="avatar-circle" id="avatarCircle"></div>
                    <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                </div>
                <div>
                    <div class="t-name">妙依</div>
                    <div class="t-rank">一真法界 ‧ 初發心</div>
                </div>
            </div>
            <div class="t-stats">
                <div>娑婆 <span id="saha-time">--:--:--</span></div>
                <div style="margin-top:4px;">資糧 <span id="ui-score">0</span></div>
            </div>
        </div>
        <input type="text" class="memo-input" id="memoInput" placeholder="寫下今日發心，儲存於本地...">
    </div>

    <div class="bodhi-stage" id="bodhi-stage">
        <div class="lotus-container" id="lotus-svg">
            </div>
        <div class="seed-core" id="bodhi-seed"></div>
    </div>

    <div class="action-panel">
        <div class="btn-row">
            <div class="btn-item">
                <div class="circle-btn" onclick="addAmi(event)">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" stroke-dasharray="2 2"/></svg>
                </div>
                <div style="text-align:center;">
                    <div class="btn-lbl">專念彌陀</div>
                    <div class="btn-val" id="val-ami">0</div>
                </div>
            </div>

            <div class="btn-item" id="oth-wrapper">
                <div class="circle-btn" 
                     onmousedown="startPress()" onmouseup="endPress()" onmouseleave="endPress()"
                     ontouchstart="startPress()" ontouchend="endPress()">
                    <svg viewBox="0 0 24 24"><path d="M12 4l2 6h6l-5 4 2 7-5-4-5 4 2-7-5-4h6z" stroke-linejoin="round"/></svg>
                    <svg class="progress-ring"><circle cx="24" cy="24" r="23"></circle></svg>
                </div>
                <div style="text-align:center;">
                    <div class="btn-lbl">普念諸佛</div>
                    <div class="btn-val" id="val-oth">0</div>
                </div>
            </div>
        </div>

        <button class="chart-btn">觀照大數據</button>
    </div>
</div>

<script>
    // --- 0. 恢復你寫的：本地備忘錄與頭像讀寫邏輯 ---
    const memo = document.getElementById('memoInput');
    memo.value = localStorage.getItem('traveler_memo') || '';
    memo.addEventListener('input', e => localStorage.setItem('traveler_memo', e.target.value));

    const avatar = localStorage.getItem('traveler_avatar');
    if(avatar) {
        document.getElementById('avatarCircle').style.backgroundImage = `url(${avatar})`;
        document.getElementById('avatarPlus').style.display = 'none';
    }

    document.getElementById('avatarInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            document.getElementById('avatarCircle').style.backgroundImage = `url(${ev.target.result})`;
            document.getElementById('avatarPlus').style.display = 'none';
            localStorage.setItem('traveler_avatar', ev.target.result);
        };
        reader.readAsDataURL(file);
    });

    // --- 以下為狀態變數與動畫邏輯 ---
    let score = 0; 
    let amiCount = 0;
    let othCount = 0;
    let pressTimer;
    let isLongPress = false;

    // 1. 時間更新
    setInterval(() => {
        const d = new Date();
        document.getElementById('saha-time').innerText = d.toTimeString().split(' ')[0];
    }, 1000);

    // 2. 普念諸佛：長按歸零與點擊邏輯
    function startPress() {
        isLongPress = false;
        document.getElementById('oth-wrapper').classList.add('is-pressing');
        pressTimer = setTimeout(() => {
            isLongPress = true; 
            othCount = 0;
            updateData();
            document.getElementById('bodhi-seed').style.transform = 'scale(0.2)';
            setTimeout(() => document.getElementById('bodhi-seed').style.transform = '', 300);
        }, 1500);
    }

    function endPress(e) {
        clearTimeout(pressTimer);
        document.getElementById('oth-wrapper').classList.remove('is-pressing');
        if (!isLongPress && event.type !== 'mouseleave') {
            othCount++;
            updateData();
            fireParticle(event || e);
        }
    }

    // 3. 專念彌陀
    function addAmi(e) {
        amiCount++;
        score++; 
        updateData();
        fireParticle(e);
    }

    // 4. 數據與蓮花渲染
    function updateData() {
        document.getElementById('val-ami').innerText = amiCount;
        document.getElementById('val-oth').innerText = othCount;
        document.getElementById('ui-score').innerText = score;
        renderLotus(score);
    }

    // 5. 飛行光點特效 
    function fireParticle(e) {
        let startX = e.clientX || e.changedTouches[0].clientX;
        let startY = e.clientY || e.changedTouches[0].clientY;
        
        const seed = document.getElementById('bodhi-seed').getBoundingClientRect();
        const endX = seed.left + seed.width / 2;
        const endY = seed.top + seed.height / 2;

        const particle = document.createElement('div');
        particle.className = 'light-particle';
        document.body.appendChild(particle);

        particle.animate([
            { left: startX + 'px', top: startY + 'px', transform: 'scale(1)', opacity: 1 },
            { left: ((startX + endX)/2 - 30) + 'px', top: ((startY + endY)/2) + 'px', opacity: 0.8 },
            { left: endX + 'px', top: endY + 'px', transform: 'scale(0.2)', opacity: 0 }
        ], {
            duration: 800, easing: 'cubic-bezier(0.25, 1, 0.5, 1)'
        }).onfinish = () => particle.remove();
    }

    // 6. 黑金琉璃花瓣演算法
    function renderLotus(currentScore) {
        const totalPetals = Math.min(Math.floor(currentScore / 10), 16);
        const container = document.getElementById('lotus-svg');
        
        if (totalPetals === 0) {
            container.innerHTML = '';
            return;
        }

        let svgContent = `<svg viewBox="0 0 200 200" style="width:100%; height:100%; overflow:visible;">
            <defs>
                <linearGradient id="blackGold" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="rgba(10,10,10,0.9)"/>
                    <stop offset="100%" stop-color="rgba(40,35,30,0.5)"/>
                </linearGradient>
            </defs>`;

        for (let i = 0; i < totalPetals; i++) {
            const isInner = i >= 8;
            const angle = isInner ? (i - 8) * 45 + 22.5 : i * 45;
            const scale = isInner ? 0.7 : 1;
            
            svgContent += `
                <g transform="translate(100, 100) rotate(${angle}) scale(${scale})">
                    <path d="M0 0 C20 -40 40 -40 0 -80 C-40 -40 -20 -40 0 0" 
                          fill="url(#blackGold)" stroke="#CBA37A" stroke-width="0.5" opacity="0.8"/>
                </g>`;
        }
        svgContent += `</svg>`;
        container.innerHTML = svgContent;
        container.style.transform = `rotate(${currentScore * 2}deg) scale(${1 + (totalPetals * 0.02)})`;
    }
</script>
</body>
</html>
