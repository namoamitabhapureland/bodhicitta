<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>菩提心室 ‧ 極淨大圓滿</title>
    <style>
        /* ✨ 核心配色調整：全面轉向金色 ✨ */
        :root { 
            --bg: #010103; 
            --gold: #f3e5ab; 
            --solid: #d4af37; 
            --accent-gold: #c5a059; /* 原本的綠色改為琥珀金 */
            --text-light: #eee; 
            --glass-border: rgba(255, 255, 255, 0.15); 
        }

        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text-light); font-family: "PingFang TC", serif; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        .app-wrapper { width: 100%; max-width: 480px; display: flex; flex-direction: column; position: relative; z-index: 10; height: 100dvh; }

        /* ✨ 頂部導航按鈕化 ✨ */
        .nav-top { padding: max(20px, env(safe-area-inset-top)) 20px 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { 
            display: flex; align-items: center; gap: 6px; padding: 6px 12px; 
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); 
            border-radius: 20px; color: #aaa; text-decoration: none; font-size: 13px; 
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); transition: 0.3s;
        }
        .nav-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.1); border-color: var(--solid); color: var(--gold); }
        .nav-icon { width: 14px; height: 14px; fill: currentColor; }

        /* ✨ 浮動玻璃漸層方塊 (相片大框) ✨ */
        .glass-panel-float { 
            margin: 0 15px; padding: 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(212, 175, 55, 0.05) 100%);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 20px;
            transform: translateY(-5px); /* 營造浮動感 */
        }

        .avatar-wrap { width: 88px; height: 88px; border-radius: 50%; border: 2px solid var(--solid); padding: 3px; position: relative; flex-shrink: 0; cursor: pointer; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; background-color: #111; background-size: cover; background-position: center; }
        .avatar-plus { position: absolute; right: 0; bottom: 0; width: 26px; height: 26px; background: rgba(5,5,8,0.9); border: 1px solid var(--solid); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--gold); font-size: 18px; }

        .stats-wrap { flex: 1; display: flex; justify-content: space-evenly; align-items: center; text-align: center; }
        .stat-item { display: flex; flex-direction: column; gap: 6px; align-items: center; }
        .stat-num { font-size: 24px; font-weight: 300; color: #fff; }
        .stat-lbl { font-size: 11px; color: var(--accent-gold); letter-spacing: 1px; }
        .divider { width: 1px; height: 35px; background: var(--glass-border); }

        .bio-wrap { margin: 15px 25px 5px; padding-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 8px; }
        .bio-name-input { font-size: 16px; color: var(--gold); background: transparent; border: none; width: 120px; outline: none; font-family: inherit; }
        .memo-input { width: 100%; background: transparent; border: none; color: #aaa; font-size: 13px; outline: none; }

        /* 蓮花舞台 */
        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; min-height: 0; }
        #lotus-container { width: 80vw; height: 80vw; max-width: 340px; max-height: 340px; animation: breathe 4s infinite ease-in-out; position: relative; }
        .seed { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; z-index: 10; left: 50%; top: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px #fff; }
        @keyframes breathe { 0%, 100% { transform: scale(0.96); } 50% { transform: scale(1.04); } }

        /* ✨ 實心漸層念佛按鈕 & 冷卻態 ✨ */
        .footer { padding-bottom: max(50px, env(safe-area-inset-top)); display: flex; justify-content: center; align-items: center; position: relative; }
        .main-btn { 
            width: 86px; height: 86px; border-radius: 50%; 
            background: radial-gradient(circle at 30% 30%, var(--gold) 0%, var(--solid) 60%, #8a6d1d 100%); 
            display: flex; justify-content: center; align-items: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.4); 
        }
        .main-btn:active { transform: scale(0.9); }
        .main-btn.cooldown { 
            filter: grayscale(0.8) brightness(0.5); 
            transform: scale(0.85); 
            opacity: 0.6; 
            cursor: not-allowed; 
        }
        .cd-timer { position: absolute; top: -30px; font-size: 12px; color: var(--gold); opacity: 0; transition: 0.3s; pointer-events: none; letter-spacing: 2px; }
        .cd-timer.show { opacity: 1; transform: translateY(-5px); }

        .fly-particle { position: absolute; width: 3px; height: 3px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 100; box-shadow: 0 0 8px var(--gold); }

        /* 模態框 (維持原有邏輯) */
        .custom-modal { position: fixed; inset: 0; z-index: 4000; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.4s; }
        .custom-modal.show { display: flex; opacity: 1; }
        .modal-box { background: rgba(5,5,8,0.9); border: 1px solid var(--solid); border-radius: 16px; padding: 30px; width: 85%; max-width: 320px; text-align: center; }
        .modal-title { color: var(--solid); font-size: 16px; letter-spacing: 4px; margin-bottom: 20px; }
        .modal-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--solid); color: var(--gold); font-size: 15px; padding: 10px; text-align: center; margin-bottom: 25px; outline: none; }
        .gold-btn { width: 100%; background: rgba(212,175,55,0.15); border: 1px solid var(--solid); color: var(--gold); padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        
        .buddha-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .b-grid-btn { padding: 10px 5px; font-size: 12px; border: 1px solid var(--glass-border); border-radius: 8px; color: #bbb; background: transparent; cursor: pointer; }
        .b-grid-btn:active { background: rgba(212,175,55,0.2); color: var(--gold); border-color: var(--solid); }

        /* 大數據能量棒 (金色版) */
        .data-card { width: 90%; max-width: 400px; border: 1px solid var(--solid); border-radius: 16px; padding: 30px 20px; background: #050505; max-height: 80vh; overflow-y: auto; }
        .bar-track { width: 100%; height: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 10px; overflow: hidden; margin: 10px 0 25px; position: relative; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #D4AF37, #f3e5ab, #D4AF37); background-size: 200% 100%; animation: energyFlow 3s linear infinite; width: 0%; transition: width 1s; }
        @keyframes energyFlow { 0% { background-position: 200% 0; } 100% { background-position: 0% 0; } }

        /* 法寶顯示 */
        .t-svg-wrap { width: 120px; height: 120px; margin-bottom: 20px; animation: float-pulse 4s infinite ease-in-out; }
        @keyframes float-pulse { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body oncontextmenu="return false;">

<svg style="position: absolute; width:0; height:0;">
    <defs>
        <linearGradient id="grad-10" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(255,255,255,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.1)"/></linearGradient>
        <linearGradient id="grad-30000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#D4AF37"/><stop offset="50%" stop-color="#FFD700"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>
        <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
        <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.8"/></linearGradient>
    </defs>
</svg>

<canvas id="starCanvas"></canvas>

<div class="app-wrapper">
    <div class="nav-top">
        <a href="index.html" class="nav-btn">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            回道場
        </a>
        <div style="display:flex; gap:10px;">
            <div class="nav-btn" onclick="openDataModal()">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
                大數據
            </div>
            <div class="nav-btn" onclick="openResetModal()">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                歸零
            </div>
            <div class="nav-btn" onclick="openM('infoModal')">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                說明
            </div>
        </div>
    </div>

    <div class="glass-panel-float">
        <div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()">
            <div class="avatar-img" id="ui-avatar"></div>
            <div class="avatar-plus">+</div>
            <input type="file" id="avatarInput" hidden accept="image/*" onchange="handleAvatar(event)">
        </div>
        <div class="stats-wrap">
            <div class="stat-item" onclick="openBuddhaModal()" style="cursor:pointer; flex:1;">
                <span class="stat-num" id="ui-cur-name" style="font-size:16px; color:var(--gold); border-bottom:1px dashed rgba(255,255,255,0.2); padding-bottom:4px;">南無阿彌陀佛</span>
                <span class="stat-lbl">當前定課 ▾</span>
            </div>
            <div class="divider"></div>
            <div class="stat-item" style="flex:1;">
                <span class="stat-num" id="ui-session-count">0</span>
                <span class="stat-lbl">當前佛數</span>
            </div>
        </div>
    </div>

    <div class="bio-wrap">
        <div style="display:flex; align-items:center; gap:8px;">
            <input type="text" class="bio-name-input" id="ui-name" placeholder="行者">
            <span style="font-size:12px; color:var(--accent-gold);">‧ <span id="ui-rank-text">一真法界</span></span>
        </div>
        <input type="text" class="memo-input" id="ui-memo" placeholder="本地備忘錄：記下今日法喜...">
    </div>

    <div class="stage">
        <div class="seed" id="seed-core"></div>
        <div id="lotus-container"></div>
    </div>

    <div class="footer">
        <div id="cd-text" class="cd-timer">收攝心神...</div>
        <div class="main-btn" id="nian-btn" onclick="handleNian(event)">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.2">
                <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="white" fill-opacity="0.3"/>
            </svg>
        </div>
    </div>
</div>

<div id="buddhaModal" class="custom-modal" onclick="closeM('buddhaModal')">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">觀照定課切換</div>
        <div class="buddha-grid" id="buddhaGrid">
            </div>
        <input type="text" id="buddhaInput" class="modal-input" placeholder="自訂聖號...">
        <button class="gold-btn" onclick="confirmBuddha()">確認切換</button>
    </div>
</div>

<div id="resetModal" class="custom-modal" onclick="closeM('resetModal')">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">歸零確認</div>
        <div style="color:#aaa; font-size:14px; margin-bottom:25px;" id="reset-desc"></div>
        <div style="display:flex; gap:10px;">
            <button class="gold-btn" style="background:transparent;" onclick="closeM('resetModal')">取消</button>
            <button class="gold-btn" onclick="execReset()">確認歸零</button>
        </div>
    </div>
</div>

<div id="infoModal" class="custom-modal" onclick="closeM('infoModal')">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">觀照說明</div>
        <div style="text-align:left; font-size:13px; color:#ccc; line-height:1.8;">
            一、每百聲佛號轉化為十點資糧。<br>
            二、蓮花隨總數層層蛻變，見證功德。<br>
            三、為求誠心，每次念誦需間隔五秒。
        </div>
        <button class="gold-btn" onclick="closeM('infoModal')">收攝</button>
    </div>
</div>

<div id="dataModal" class="custom-modal" onclick="closeM('dataModal')">
    <div class="data-card" onclick="event.stopPropagation()">
        <div class="modal-title">歷史大數據</div>
        <div id="data-bars-container"></div>
        <button class="gold-btn" onclick="closeM('dataModal')">關閉</button>
    </div>
</div>

<script>
    // --- 核心變數 & 資料庫 ---
    let db = JSON.parse(localStorage.getItem('PX_V15.0')) || { 
        totalNian: 0, bodhiLitCount: 0, treasures: {}, 
        personalRoom: { sessionCounts: {}, othList: {}, avatar: "", memo: "", loginDays: 0 } 
    };
    let curBuddha = "南無阿彌陀佛";
    let isLocked = false; // 5秒鎖定開關

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTap() {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    // --- 念佛邏輯 (含5秒冷卻) ---
    function handleNian(e) {
        if (isLocked) return;
        
        playTap();
        // 觸發冷卻
        isLocked = true;
        const btn = document.getElementById('nian-btn');
        const cdText = document.getElementById('cd-text');
        btn.classList.add('cooldown');
        cdText.classList.add('show');

        // 數值增加
        db.personalRoom.sessionCounts[curBuddha] = (db.personalRoom.sessionCounts[curBuddha] || 0) + 1;
        if(curBuddha === "南無阿彌陀佛") db.totalNian++; else db.personalRoom.othList[curBuddha] = (db.personalRoom.othList[curBuddha] || 0) + 1;
        saveDB();
        updateUI();

        // 粒子動畫
        spawnParticle(e);

        // 5秒後解鎖
        setTimeout(() => {
            isLocked = false;
            btn.classList.remove('cooldown');
            cdText.classList.remove('show');
        }, 5000);
    }

    function spawnParticle(e) {
        const p = document.createElement('div'); p.className = 'fly-particle';
        const rect = document.getElementById('seed-core').getBoundingClientRect();
        const startX = e.clientX || e.touches[0].clientX;
        const startY = e.clientY || e.touches[0].clientY;
        p.style.left = startX + 'px'; p.style.top = startY + 'px';
        document.body.appendChild(p);
        p.animate([
            { transform: 'scale(1)', opacity: 1, left: startX+'px', top: startY+'px' },
            { transform: 'scale(0.2)', opacity: 0, left: rect.left+'px', top: rect.top+'px' }
        ], 800).onfinish = () => p.remove();
    }

    // --- UI 控制 ---
    function saveDB() { localStorage.setItem('PX_V15.0', JSON.stringify(db)); }
    function openM(id) { document.getElementById(id).classList.add('show'); }
    function closeM(id) { document.getElementById(id).classList.remove('show'); }

    function openBuddhaModal() {
        const list = ["南無阿彌陀佛", "觀世音菩薩", "地藏王菩薩", "藥師如來", "準提神咒", "滅定業真言"];
        let html = '';
        list.forEach(b => html += `<button class="b-grid-btn" onclick="setBuddha('${b}')">${b}</button>`);
        document.getElementById('buddhaGrid').innerHTML = html;
        openM('buddhaModal');
    }
    function setBuddha(name) { curBuddha = name; document.getElementById('ui-cur-name').innerText = name; updateUI(); closeM('buddhaModal'); }
    function confirmBuddha() { let val = document.getElementById('buddhaInput').value.trim(); if(val) setBuddha(val); }

    function openResetModal() {
        document.getElementById('reset-desc').innerText = `確定要將【${curBuddha}】的本次計數歸零嗎？歷史總額仍會保留。`;
        openM('resetModal');
    }
    function execReset() { db.personalRoom.sessionCounts[curBuddha] = 0; saveDB(); updateUI(); closeM('resetModal'); }

    function updateUI() {
        document.getElementById('ui-session-count').innerText = (db.personalRoom.sessionCounts[curBuddha] || 0).toLocaleString();
        renderLotus(getPts());
    }

    function getPts() {
        let nianSum = (db.totalNian || 0) + Object.values(db.personalRoom.othList).reduce((a,b)=>a+b, 0);
        return Math.floor(nianSum / 100) * 10 + (db.bodhiLitCount || 0);
    }

    // --- 蓮花渲染 (沿用原有邏輯但確保漸層顏色正確) ---
    function renderLotus(p) {
        const box = document.getElementById('lotus-container');
        const rank = document.getElementById('ui-rank-text');
        if(p < 10) { box.innerHTML = ''; rank.innerText = "一真法界"; return; }
        let layers = 1, fill = "url(#grad-10)", rTxt = "清淨萌芽";
        if(p >= 100) { layers = 2; fill = "gold"; rTxt = "初心金華"; }
        if(p >= 1000) { layers = 3; fill = "url(#grad-30000)"; rTxt = "大圓滿耀金"; }
        
        rank.innerText = rTxt;
        let svg = `<svg viewBox="-150 -150 300 300" style="width:100%; height:100%;">`;
        for(let l=layers; l>0; l--) {
            const sc = 0.4 + (l * 0.2);
            for(let i=0; i<8; i++) {
                svg += `<g transform="rotate(${i*45 + l*20}) scale(${sc})"><path d="M 0 0 Q 30 -60 0 -120 Q -30 -60 0 0" fill="${fill}" stroke="rgba(255,255,255,0.3)"/></g>`;
            }
        }
        svg += `</svg>`;
        box.innerHTML = svg;
    }

    // --- 星空背景 ---
    const cvs = document.getElementById('starCanvas'); const ctx = cvs.getContext('2d');
    let stars = [];
    function initS() { cvs.width=window.innerWidth; cvs.height=window.innerHeight; stars = Array.from({length:80}, ()=>({ x:Math.random()*cvs.width, y:Math.random()*cvs.height, s:Math.random()*1.5, sp:Math.random()*0.005 })); }
    function drawS() { ctx.clearRect(0,0,cvs.width,cvs.height); ctx.fillStyle="#fff"; stars.forEach(s => { ctx.globalAlpha = 0.3 + Math.abs(Math.sin(Date.now()*s.sp))*0.7; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(drawS); }
    window.onresize = initS; initS(); drawS();

    // 處理頭像與備忘錄
    document.getElementById('ui-name').value = db.name || '行者';
    document.getElementById('ui-name').oninput = e => { db.name = e.target.value; saveDB(); };
    document.getElementById('ui-memo').value = db.personalRoom.memo || '';
    document.getElementById('ui-memo').oninput = e => { db.personalRoom.memo = e.target.value; saveDB(); };
    if(db.personalRoom.avatar) document.getElementById('ui-avatar').style.backgroundImage = `url(${db.personalRoom.avatar})`;
    function handleAvatar(e) { const r = new FileReader(); r.onload = ev => { document.getElementById('ui-avatar').style.backgroundImage = `url(${ev.target.result})`; db.personalRoom.avatar = ev.target.result; saveDB(); }; if(e.target.files[0]) r.readAsDataURL(e.target.files[0]); }

    // --- 大數據能量棒生成 ---
    function openDataModal() {
        let html = buildBar('南無阿彌陀佛', db.totalNian || 0);
        for(let [k,v] of Object.entries(db.personalRoom.othList)) if(v > 0) html += buildBar(k, v);
        document.getElementById('data-bars-container').innerHTML = html;
        openM('dataModal');
        setTimeout(() => { document.querySelectorAll('.bar-fill').forEach(el => el.style.width = el.dataset.w); }, 50);
    }
    function buildBar(name, count) {
        let w = Math.min(100, (count / 10000) * 100 + 5);
        return `<div style="margin-bottom:15px; text-align:left;">
            <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--gold);"><span>${name}</span><span>${count}</span></div>
            <div class="bar-track"><div class="bar-fill" data-w="${w}%"></div></div>
        </div>`;
    }

    updateUI();
</script>
</body>
</html>
