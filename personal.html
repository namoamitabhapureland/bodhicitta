<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>菩提心室 ‧ 零Bug純淨地基版</title>
    <style>
        :root { --bg: #010103; --gold: #f3e5ab; --solid: #d4af37; --cyan: #8ba89c; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: "PingFang TC", serif; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        .app-wrapper { width: 100%; max-width: 480px; display: flex; flex-direction: column; position: relative; z-index: 10; }

        .nav-top { flex-shrink: 0; padding: max(20px, env(safe-area-inset-top)) 25px 5px; display: flex; justify-content: space-between; align-items: center; }
        .dev-zone { font-size: 11px; color: #555; letter-spacing: 2px; cursor: pointer; }
        .dev-zone:active { color: var(--gold); }

        .stats-row { flex-shrink: 0; padding: 15px 25px; display: flex; justify-content: space-around; text-align: center; }
        .stat-num { font-size: 24px; font-weight: 300; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); cursor: pointer; }
        .stat-lbl { font-size: 10px; color: var(--cyan); letter-spacing: 1px; margin-top: 5px; }

        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; min-height: 0; }
        
        /* 蓮花容器與種子，雙重綁定呼吸動畫 */
        #lotus-container { width: 85vw; height: 85vw; max-width: 320px; max-height: 320px; animation: lotus-breathe 4s infinite ease-in-out; display: flex; justify-content: center; align-items: center; position: relative; }
        .seed { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px #fff; z-index: 10; animation: lotus-breathe 4s infinite ease-in-out; }
        @keyframes lotus-breathe { 0%, 100% { transform: scale(0.96); } 50% { transform: scale(1.04); } }

        .footer { flex-shrink: 0; padding: 10px 25px max(35px, env(safe-area-inset-bottom)); text-align: center; }
        .main-btn { width: 72px; height: 72px; border-radius: 50%; border: 1px solid var(--solid); background: rgba(212,175,55,0.05); margin: 15px auto 0; display: flex; justify-content: center; align-items: center; transition: 0.2s; cursor: pointer; }
        .main-btn:active { transform: scale(0.92); background: rgba(212,175,55,0.2); }

        /* 絕對鎖定寶物容器尺寸，拒絕變形 */
        #treasure-overlay {
            position: fixed; inset: 0; z-index: 3000; background: rgba(1, 1, 3, 0.95);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #treasure-overlay.show { display: flex; opacity: 1; }
        .t-svg-wrap { 
            width: 140px; height: 140px; 
            display: flex; align-items: center; justify-content: center; 
            animation: float-pulse 4s infinite ease-in-out; margin-bottom: 25px;
        }
        .t-svg-wrap svg { width: 100%; height: 100%; object-fit: contain; }
        @keyframes float-pulse { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .t-name { color: #fff; font-size: 1.2rem; letter-spacing: 5px; text-shadow: 0 0 20px #fff, 0 0 40px var(--solid); margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

<svg style="position: absolute; width:0; height:0;" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
        <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.8"/></linearGradient>
        <linearGradient id="facet-cyan" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.9"/><stop offset="100%" stop-color="#00838f" stop-opacity="0.5"/></linearGradient>
        <linearGradient id="facet-rose" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="100%" stop-color="#c2185b" stop-opacity="0.5"/></linearGradient>
        <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6"/><stop offset="100%" stop-color="#d4af37" stop-opacity="0.2"/></linearGradient>
        
        <linearGradient id="grad-10" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(255,255,255,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.1)"/></linearGradient>
        <linearGradient id="grad-50" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#f8bbd0" stop-opacity="0.9"/><stop offset="100%" stop-color="#fce4ec" stop-opacity="0.4"/></linearGradient>
        <linearGradient id="grad-100" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(212,175,55,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.2)"/></linearGradient>
        <linearGradient id="grad-300" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#80deea"/><stop offset="100%" stop-color="#e0f7fa" stop-opacity="0.3"/></linearGradient>
        <linearGradient id="grad-500" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#a5d6a7"/><stop offset="100%" stop-color="#e8f5e9" stop-opacity="0.3"/></linearGradient>
        <linearGradient id="grad-700" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ce93d8"/><stop offset="100%" stop-color="#f3e5f5" stop-opacity="0.3"/></linearGradient>
        <linearGradient id="grad-900" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ffcc80"/><stop offset="100%" stop-color="#fff3e0" stop-opacity="0.3"/></linearGradient>
        <linearGradient id="grad-1000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ff9a9e" stop-opacity="0.9"/><stop offset="50%" stop-color="#fad0c4" stop-opacity="0.8"/><stop offset="100%" stop-color="#a1c4fd" stop-opacity="0.7"/></linearGradient>
        <linearGradient id="grad-5000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#84fab0" stop-opacity="0.8"/><stop offset="100%" stop-color="#8fd3f4" stop-opacity="0.6"/></linearGradient>
        <linearGradient id="grad-10000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#a18cd1" stop-opacity="0.9"/><stop offset="100%" stop-color="#fbc2eb" stop-opacity="0.7"/></linearGradient>
        <linearGradient id="grad-15000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ffecd2" stop-opacity="0.9"/><stop offset="100%" stop-color="#fcb69f" stop-opacity="0.7"/></linearGradient>
        <linearGradient id="grad-20000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#e2ebf0" stop-opacity="0.9"/><stop offset="100%" stop-color="#cfd9df" stop-opacity="0.6"/></linearGradient>
        <linearGradient id="grad-25000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#f6d365" stop-opacity="0.9"/><stop offset="100%" stop-color="#fda085" stop-opacity="0.8"/></linearGradient>
        <linearGradient id="grad-30000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#D4AF37" stop-opacity="1"/><stop offset="50%" stop-color="#FFD700" stop-opacity="0.9"/><stop offset="100%" stop-color="#ffffff" stop-opacity="1"/></linearGradient>
    </defs>
</svg>

<canvas id="starCanvas"></canvas>

<div id="treasure-overlay" onclick="this.classList.remove('show')">
    <div class="t-svg-wrap" id="t-svg-ui"></div>
    <div class="t-name" id="t-name-ui"></div>
    <div style="color:var(--cyan); font-size:0.9rem; letter-spacing:2px; text-align:center;">法界感應 ‧ 迴向願力<br><span style="opacity:0.5; font-size:10px; margin-top:10px; display:block;">點擊畫面收攝</span></div>
</div>

<div class="app-wrapper">
    <div class="nav-top">
        <div class="dev-zone" onclick="addCheat()">行者觀照 (+1000)</div>
        <div style="font-size:11px; color:var(--cyan); letter-spacing:3px;" id="ui-rank">一真法界</div>
        <div class="dev-zone" onclick="resetAll()" style="color:rgba(255,255,255,0.3)">重置</div>
    </div>

    <div class="stats-row">
        <div onclick="resetCurrent()"><div class="stat-num" id="ui-click">0</div><div class="stat-lbl" id="ui-lbl">當次定課</div></div>
        <div><div class="stat-num" id="ui-pts" style="color:var(--solid);">0</div><div class="stat-lbl">菩提總分</div></div>
    </div>

    <div class="stage">
        <div class="seed"></div>
        <div id="lotus-container"></div>
    </div>

    <div class="footer">
        <div id="buddha-sel" style="color:var(--cyan); font-size:12px; letter-spacing:4px; border-bottom:1px dashed rgba(255,255,255,0.1); display:inline-block; padding-bottom:3px; cursor:pointer;" onclick="changeBuddha()">當前定課：阿彌陀佛</div>
        <div class="main-btn" onclick="addCount()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
        </div>
    </div>
</div>

<script>
    // --- 1. 數據連動與公式 (0 Bug 核心) ---
    let db = JSON.parse(localStorage.getItem('PX_V15.0')) || { totalNian: 0, bodhiLitCount: 0 };
    let localOth = JSON.parse(localStorage.getItem('personal_oth_list') || '{}');
    let currentMode = "阿彌陀佛";
    let cheatPts = 0;

    const treasures = [
        { name: "幾何慧劍", svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" preserveAspectRatio="xMidYMid meet"><g transform="translate(0, 5)"><polygon points="50,10 56,40 50,105 44,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="35,100 65,100 55,110 45,110" fill="url(#pure-glass)" stroke="#d4af37" stroke-width="0.8"/><circle cx="50" cy="105" r="4" fill="#fff"/></g></svg>` },
        { name: "琉璃淨瓶", svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" preserveAspectRatio="xMidYMid meet"><g transform="translate(0, 10)"><polygon points="42,50 58,50 72,95 28,95" fill="url(#facet-cyan)" stroke="#fff" stroke-width="0.5"/><circle cx="50" cy="80" r="10" fill="rgba(255,255,255,0.6)"/></g></svg>` },
        { name: "多面寶珠", svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" preserveAspectRatio="xMidYMid meet"><g transform="translate(0, 20)"><polygon points="50,15 85,45 50,65 15,45" fill="url(#facet-light)" stroke="#fff" stroke-width="0.8"/><polygon points="15,45 50,65 50,115 25,85" fill="url(#facet-rose)" opacity="0.9" stroke="#fff" stroke-width="0.5"/></g></svg>` }
    ];

    function calculateTotalPoints() {
        let nianSum = (db.totalNian || 0) + Object.values(localOth).reduce((a,b)=>a+b, 0);
        let nianPts = Math.floor(nianSum / 100) * 10;
        let litCount = db.bodhiLitCount || 0;
        let dailyPts = litCount * 1 + Math.floor(litCount / 10) * 10;
        return nianPts + dailyPts + cheatPts;
    }

    function addCount() {
        if(currentMode === "阿彌陀佛") {
            db.totalNian = (db.totalNian || 0) + 1;
            localStorage.setItem('PX_V15.0', JSON.stringify(db));
        } else {
            localOth[currentMode] = (localOth[currentMode] || 0) + 1;
            localStorage.setItem('personal_oth_list', JSON.stringify(localOth));
        }
        updateUI();
        if(calculateTotalPoints() > 0 && calculateTotalPoints() % 30 === 0) showGift();
    }

    function showGift() {
        const t = treasures[Math.floor(Math.random()*treasures.length)];
        document.getElementById('t-svg-ui').innerHTML = t.svg;
        document.getElementById('t-name-ui').innerText = `獲得法寶：${t.name}`;
        document.getElementById('treasure-overlay').classList.add('show');
    }

    // --- 2. 蓮花渲染 (徹底修復 SVG 寬高塌陷 Bug) ---
    function renderLotus(p) {
        const box = document.getElementById('lotus-container');
        const rank = document.getElementById('ui-rank');
        if(p < 10) { box.innerHTML = ''; rank.innerText = "一真法界"; box.style.filter = "none"; return; }

        let layers = 1, fill = "url(#grad-10)", rankTxt = "清淨萌芽", stroke = "rgba(255,255,255,0.6)", glow = "none";

        if(p >= 50) fill = "url(#grad-50)";
        if(p >= 100) { layers = 2; fill = "url(#grad-100)"; stroke = "rgba(212,175,55,0.6)"; rankTxt = "聖潔初金"; }
        if(p >= 300) fill = "url(#grad-300)";
        if(p >= 500) fill = "url(#grad-500)";
        if(p >= 700) fill = "url(#grad-700)";
        if(p >= 900) fill = "url(#grad-900)";
        
        if(p >= 1000) { fill = "url(#grad-1000)"; stroke = "rgba(255,255,255,0.4)"; rankTxt = "初心幻彩"; }
        if(p >= 5000) { fill = "url(#grad-5000)"; rankTxt = "青淨琉璃"; }
        if(p >= 10000) { fill = "url(#grad-10000)"; rankTxt = "紫金霞光"; }
        if(p >= 15000) { fill = "url(#grad-15000)"; rankTxt = "晨曦玉露"; }
        if(p >= 20000) { fill = "url(#grad-20000)"; rankTxt = "月魄銀輝"; }
        if(p >= 25000) { fill = "url(#grad-25000)"; rankTxt = "玄黃凝脂"; }
        if(p >= 30000) { fill = "url(#grad-30000)"; stroke = "#fff"; rankTxt = "大圓滿耀金"; glow = "drop-shadow(0 0 15px rgba(212,175,55,0.6))"; }

        rank.innerText = rankTxt;
        box.style.filter = glow;

        // ✨ 補回 style="width:100%; height:100%;" 解決手機縮小變零的問題 ✨
        let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-150 -150 300 300" style="width:100%; height:100%; overflow:visible;">`;
        for (let l = layers; l > 0; l--) {
            const sc = 0.4 + (l * 0.25);
            for (let i = 0; i < 8; i++) {
                const ang = i * 45 + (l * 22.5) + (p * 0.02);
                svg += `<g transform="rotate(${ang}) scale(${sc})">
                    <path d="M 0 0 Q 30 -60 0 -120 Q -30 -60 0 0" fill="${fill}" stroke="${stroke}" stroke-width="1.2" opacity="0.9"/>
                </g>`;
            }
        }
        svg += `</svg>`;
        box.innerHTML = svg;
    }

    function updateUI() {
        const pts = calculateTotalPoints();
        document.getElementById('ui-pts').innerText = pts;
        document.getElementById('ui-click').innerText = currentMode === "阿彌陀佛" ? (db.totalNian || 0) : (localOth[currentMode] || 0);
        renderLotus(pts);
    }

    function addCheat() { cheatPts += 1000; updateUI(); }
    function resetAll() { if(confirm("重置測試？")) { cheatPts=0; localOth={}; localStorage.setItem('personal_oth_list','{}'); updateUI(); } }
    function resetCurrent() { if(confirm(`歸零 ${currentMode}？`)) { if(currentMode==="阿彌陀佛") db.totalNian=0; else localOth[currentMode]=0; updateUI(); } }
    function changeBuddha() { let n = prompt("輸入聖號：", currentMode); if(n) { currentMode = n; document.getElementById('buddha-sel').innerText = `當前定課：${n}`; document.getElementById('ui-lbl').innerText = n; updateUI(); } }

    // --- 3. 完美還原：88佛的極慢深邃星空 ---
    const canvas = document.getElementById('starCanvas'); 
    const ctx = canvas.getContext('2d');
    let stars = [];
    
    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = Array.from({length: 120}, () => ({ 
            x: Math.random() * canvas.width, 
            y: Math.random() * canvas.height, 
            size: Math.random() * 2 + 0.5, 
            speed: Math.random() * 0.002, 
            offset: Math.random() * Math.PI * 2
        }));
    }
    
    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let time = Date.now();
        stars.forEach(s => {
            let alpha = 0.2 + Math.abs(Math.sin(time * s.speed + s.offset)) * 0.8;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(drawStars);
    }
    
    window.addEventListener('resize', initStars);
    initStars(); drawStars(); updateUI();
</script>
</body>
</html>
