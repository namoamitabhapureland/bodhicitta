<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>菩提心室 ‧ 終極大滿貫</title>
    <style>
        :root { --bg: #010103; --gold: #f3e5ab; --solid: #d4af37; --cyan: #8ba89c; --text-light: #eee; --glass-border: rgba(255, 255, 255, 0.1); }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text-light); font-family: "PingFang TC", serif; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        .app-wrapper { width: 100%; max-width: 480px; display: flex; flex-direction: column; position: relative; z-index: 10; height: 100dvh; }

        /* 共通毛玻璃浮空面板 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* 頂部導航 */
        .nav-top { padding: max(20px, env(safe-area-inset-top)) 25px 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav-link { color: #888; font-size: 12px; letter-spacing: 2px; text-decoration: none; cursor: pointer; transition: 0.3s; }
        .nav-link:active { color: var(--gold); }

        /* IG 級個人化版面 */
        .ig-profile { padding: 10px 20px; display: flex; align-items: center; gap: 20px; margin: 0 15px; }
        .avatar-wrap { 
            width: 72px; height: 72px; border-radius: 50%; border: 1.5px solid var(--solid); 
            padding: 3px; position: relative; flex-shrink: 0; cursor: pointer;
            box-shadow: 0 0 15px rgba(212,175,55,0.2);
        }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; background-color: #111; background-size: cover; background-position: center; }
        .stats-wrap { flex: 1; display: flex; justify-content: space-between; text-align: center; }
        .stat-item { display: flex; flex-direction: column; gap: 4px; }
        .stat-num { font-size: 18px; font-weight: 300; color: #fff; }
        .stat-lbl { font-size: 9px; color: var(--cyan); letter-spacing: 1px; }

        /* Bio 區塊 */
        .bio-wrap { margin: 15px 25px 5px; padding-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .bio-name { font-size: 15px; letter-spacing: 3px; color: var(--gold); margin-bottom: 8px; }
        .memo-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid transparent; color: #aaa; font-size: 11px; letter-spacing: 1px; padding: 4px 0; transition: 0.3s; }
        .memo-input:focus { border-bottom-color: var(--glass-border); color: #fff; }

        /* 蓮花舞台 */
        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; min-height: 0; }
        #lotus-container { width: 85vw; height: 85vw; max-width: 320px; max-height: 320px; animation: breathe 4s infinite ease-in-out; display: flex; justify-content: center; align-items: center; position: relative; }
        .seed { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px #fff; z-index: 10; animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(0.96); } 50% { transform: scale(1.04); } }

        /* 底部操作 */
        .footer { padding: 10px 25px max(30px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; }
        .buddha-sel { color: var(--cyan); font-size: 11px; letter-spacing: 4px; cursor: pointer; margin-bottom: 15px; padding-bottom: 3px; border-bottom: 1px dashed var(--glass-border); }
        .actions { display: flex; align-items: center; justify-content: center; width: 100%; gap: 30px; position: relative; }
        .main-btn { width: 68px; height: 68px; border-radius: 50%; border: 1px solid var(--solid); background: rgba(212,175,55,0.05); display: flex; justify-content: center; align-items: center; transition: 0.2s; cursor: pointer; box-shadow: 0 0 20px rgba(212,175,55,0.1); }
        .main-btn:active { transform: scale(0.9); background: rgba(212,175,55,0.2); }
        .data-btn { position: absolute; left: 0; background: transparent; border: 1px solid var(--glass-border); color: #aaa; font-size: 10px; letter-spacing: 2px; padding: 8px 16px; border-radius: 20px; cursor: pointer; backdrop-filter: blur(5px); }

        /* 飛行動畫粒子 */
        .fly-particle { position: absolute; width: 3px; height: 3px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 100; box-shadow: 0 0 8px var(--gold); }

        /* ✨ 妙依神級 CSS：大數據黑金底與能量棒 ✨ */
        #dataModal { 
            position: fixed; inset: 0; z-index: 2000; background: rgba(10, 10, 12, 0.95); 
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; opacity: 0; transition: 0.5s;
        }
        #dataModal.show { display: flex; opacity: 1; }
        .data-card { width: 100%; max-width: 400px; border: 1px solid var(--solid); border-radius: 16px; padding: 30px 25px; box-shadow: 0 10px 40px rgba(212,175,55,0.1); background: #050505; max-height: 80vh; overflow-y: auto; }
        .data-title { color: var(--solid); font-size: 16px; letter-spacing: 4px; text-align: center; margin-bottom: 30px; }
        
        .glass-energy-bar { width: 100%; margin: 15px 0 25px 0; position: relative; }
        .bar-track { width: 100%; height: 14px; background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border); border-radius: 10px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 0 10px rgba(255,255,255,0.1); position: relative; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #FDF5D3, #D4AF37, #E5989B, #89CFF0, #C9A0DC, #D4AF37, #FDF5D3); background-size: 200% 100%; opacity: 0.9; animation: energyFlow 4s linear infinite; transition: width 1s cubic-bezier(0.2, 0.8, 0.2, 1); width: 0%; }
        @keyframes energyFlow { 0% { background-position: 200% 0; } 100% { background-position: 0% 0; } }
        .bar-labels { display: flex; justify-content: flex-end; margin-top: 8px; padding: 0 4px; }
        .bar-labels span { font-size: 0.8rem; color: #aaa; font-weight: 300; letter-spacing: 1px; position: relative; display: flex; justify-content: center; }
        .bar-labels span::before { content: ''; position: absolute; top: -16px; width: 4px; height: 4px; background: #FFFFFF; border-radius: 50%; box-shadow: 0 0 6px rgba(255,255,255,0.9); }

        /* 說明與寶物彈窗 */
        .modal-overlay { position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.5s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .info-content { width: 80%; max-width: 320px; text-align: left; line-height: 2; font-size: 13px; color: #ddd; letter-spacing: 1px; }
        
        .t-svg-wrap { width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; animation: float-pulse 4s infinite ease-in-out; margin-bottom: 25px; }
        .t-svg-wrap svg { width: 100%; height: 100%; object-fit: contain; }
        @keyframes float-pulse { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .t-name { color: #fff; font-size: 1.2rem; letter-spacing: 5px; text-shadow: 0 0 20px #fff, 0 0 40px var(--solid); text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

<svg style="position: absolute; width:0; height:0;" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
        <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.8"/></linearGradient>
        <linearGradient id="facet-cyan" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.9"/><stop offset="100%" stop-color="#00838f" stop-opacity="0.5"/></linearGradient>
        <linearGradient id="facet-rose" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="100%" stop-color="#c2185b" stop-opacity="0.5"/></linearGradient>
        <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6"/><stop offset="100%" stop-color="#d4af37" stop-opacity="0.2"/></linearGradient>
        
        <linearGradient id="grad-10" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(255,255,255,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.1)"/></linearGradient>
        <linearGradient id="grad-50" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#f8bbd0" stop-opacity="0.9"/><stop offset="100%" stop-color="#fce4ec" stop-opacity="0.4"/></linearGradient>
        <linearGradient id="grad-100" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(212,175,55,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.2)"/></linearGradient>
        <linearGradient id="grad-300" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#80deea"/><stop offset="100%" stop-color="#e0f7fa" stop-opacity="0.3"/></linearGradient>
        <linearGradient id="grad-500" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#a5d6a7"/><stop offset="100%" stop-color="#e8f5e9" stop-opacity="0.3"/></linearGradient>
        <linearGradient id="grad-700" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ce93d8"/><stop offset="100%" stop-color="#f3e5f5" stop-opacity="0.3"/></linearGradient>
        <linearGradient id="grad-900" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ffcc80"/><stop offset="100%" stop-color="#fff3e0" stop-opacity="0.3"/></linearGradient>
        <linearGradient id="grad-1000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ff9a9e" stop-opacity="0.9"/><stop offset="50%" stop-color="#fad0c4" stop-opacity="0.8"/><stop offset="100%" stop-color="#a1c4fd" stop-opacity="0.7"/></linearGradient>
        <linearGradient id="grad-5000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#84fab0" stop-opacity="0.8"/><stop offset="100%" stop-color="#8fd3f4" stop-opacity="0.6"/></linearGradient>
        <linearGradient id="grad-10000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#a18cd1" stop-opacity="0.9"/><stop offset="100%" stop-color="#fbc2eb" stop-opacity="0.7"/></linearGradient>
        <linearGradient id="grad-15000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ffecd2" stop-opacity="0.9"/><stop offset="100%" stop-color="#fcb69f" stop-opacity="0.7"/></linearGradient>
        <linearGradient id="grad-20000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#e2ebf0" stop-opacity="0.9"/><stop offset="100%" stop-color="#cfd9df" stop-opacity="0.6"/></linearGradient>
        <linearGradient id="grad-25000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#f6d365" stop-opacity="0.9"/><stop offset="100%" stop-color="#fda085" stop-opacity="0.8"/></linearGradient>
        <linearGradient id="grad-30000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#D4AF37" stop-opacity="1"/><stop offset="50%" stop-color="#FFD700" stop-opacity="0.9"/><stop offset="100%" stop-color="#ffffff" stop-opacity="1"/></linearGradient>

</svg>

<canvas id="starCanvas"></canvas>

<div id="infoModal" class="modal-overlay" onclick="this.classList.remove('show')">
    <div class="glass-panel info-content" style="padding: 25px;">
        <div style="color:var(--solid); text-align:center; font-size:16px; letter-spacing:4px; margin-bottom:20px;">觀照法義</div>
        一、每百聲佛號轉化為十點資糧。<br>
        二、主系統發心每日一點，滿十日加贈十點。<br>
        三、蓮花隨點數自一真法界層層蛻變。<br>
        四、登入滿三日，法界將隨緣賜予無相法寶。<br>
        <div style="text-align:center; margin-top:20px; font-size:10px; color:var(--cyan);">點擊關閉</div>
    </div>
</div>

<div id="dataModal" onclick="this.classList.remove('show')">
    <div class="data-card" onclick="event.stopPropagation()">
        <div class="data-title">修持大數據</div>
        <div id="data-bars-container"></div>
        <div style="text-align:center; margin-top:30px; font-size:10px; color:#666; cursor:pointer;" onclick="document.getElementById('dataModal').classList.remove('show')">收攝</div>
    </div>
</div>

<div id="treasureModal" class="modal-overlay" onclick="this.classList.remove('show')">
    <div class="t-svg-wrap" id="t-svg-ui"></div>
    <div class="t-name" id="t-name-ui"></div>
    <div style="color:var(--cyan); font-size:0.9rem; letter-spacing:2px; text-align:center;">法界感應 ‧ 迴向願力<br><span style="opacity:0.5; font-size:10px; margin-top:10px; display:block;">點擊畫面收攝</span></div>
</div>

<div class="app-wrapper">
    <div class="nav-top">
        <a href="index.html" class="nav-link">← 回道場</a>
        <div style="display:flex; gap:20px;">
            <div onclick="addCheat()" style="width:20px; height:20px;"></div> 
            <div class="nav-link" onclick="document.getElementById('infoModal').classList.add('show')">法義</div>
        </div>
    </div>

    <div class="ig-profile glass-panel">
        <div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()">
            <div class="avatar-img" id="ui-avatar"></div>
            <input type="file" id="avatarInput" hidden accept="image/*" onchange="handleAvatar(event)">
        </div>
        <div class="stats-wrap">
            <div class="stat-item"><span class="stat-num" id="ui-ami-count">0</span><span class="stat-lbl">專念彌陀</span></div>
            <div class="stat-item"><span class="stat-num" id="ui-oth-count">0</span><span class="stat-lbl">普念諸佛</span></div>
            <div class="stat-item"><span class="stat-num" id="ui-lit-count">0</span><span class="stat-lbl">點亮世界</span></div>
        </div>
    </div>

    <div class="bio-wrap">
        <div class="bio-name">妙依 ‧ <span id="ui-rank-text" style="font-size:10px; color:var(--cyan);">一真法界</span></div>
        <input type="text" class="memo-input" id="ui-memo" placeholder="本地備忘錄：記下今日法喜...">
    </div>

    <div class="stage">
        <div class="seed" id="seed-core"></div>
        <div id="lotus-container"></div>
    </div>

    <div class="footer">
        <div class="buddha-sel" id="buddha-sel" onclick="changeBuddha()">當前定課：阿彌陀佛</div>
        <div class="actions">
            <button class="data-btn" onclick="openDataModal()">大數據</button>
            <div class="main-btn" onclick="handleNian(event)">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 0. 音頻引擎 (無版權原生) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.body.addEventListener('touchstart', () => { if(audioCtx.state === 'suspended') audioCtx.resume(); }, {once:true});
    function playTap() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    // --- 1. 核心數據與 0 Bug 公式 ---
    let db = JSON.parse(localStorage.getItem('PX_V15.0')) || { totalNian: 0, bodhiLitCount: 0 };
    let localOth = JSON.parse(localStorage.getItem('personal_oth_list') || '{}');
    let curBuddha = "阿彌陀佛";
    let cheatPts = 0;

    function getPts() {
        let nianSum = (db.totalNian || 0) + Object.values(localOth).reduce((a,b)=>a+b, 0);
        let lit = db.bodhiLitCount || 0;
        return Math.floor(nianSum / 100)*10 + lit*1 + Math.floor(lit/10)*10 + cheatPts;
    }

    // --- 2. 頭像與 Bio ---
    const avSaved = localStorage.getItem('bodhi_avatar');
    if(avSaved) document.getElementById('ui-avatar').style.backgroundImage = `url(${avSaved})`;
    function handleAvatar(e) {
        const r = new FileReader();
        r.onload = ev => { document.getElementById('ui-avatar').style.backgroundImage = `url(${ev.target.result})`; localStorage.setItem('bodhi_avatar', ev.target.result); };
        if(e.target.files[0]) r.readAsDataURL(e.target.files[0]);
    }
    const memo = document.getElementById('ui-memo');
    memo.value = localStorage.getItem('bodhi_memo') || '';
    memo.oninput = e => localStorage.setItem('bodhi_memo', e.target.value);

    // --- 3. 念佛與飛行動畫 ---
    function handleNian(e) {
        playTap();
        if(curBuddha === "阿彌陀佛") { db.totalNian = (db.totalNian || 0) + 1; localStorage.setItem('PX_V15.0', JSON.stringify(db)); } 
        else { localOth[curBuddha] = (localOth[curBuddha] || 0) + 1; localStorage.setItem('personal_oth_list', JSON.stringify(localOth)); }
        
        // 飛行動畫
        const p = document.createElement('div'); p.className = 'fly-particle';
        const startX = e.clientX || e.touches[0].clientX; const startY = e.clientY || e.touches[0].clientY;
        p.style.left = startX + 'px'; p.style.top = startY + 'px';
        document.body.appendChild(p);
        const target = document.getElementById('seed-core').getBoundingClientRect();
        p.animate([
            { transform: 'scale(1)', opacity: 1, left: startX+'px', top: startY+'px' },
            { transform: 'scale(0.2)', opacity: 0, left: (target.left+3)+'px', top: (target.top+3)+'px' }
        ], 600).onfinish = () => p.remove();
        
        updateUI();
    }

    function changeBuddha() { let n = prompt("輸入觀照聖號：", curBuddha); if(n) { curBuddha = n; document.getElementById('buddha-sel').innerText = `當前定課：${n}`; } }
    function addCheat() { cheatPts += 1000; updateUI(); }

    // --- 4. 三日真實掉寶邏輯 ---
    const treasures = [
        { name: "幾何慧劍", svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" preserveAspectRatio="xMidYMid meet"><g transform="translate(0, 5)"><polygon points="50,10 56,40 50,105 44,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="35,100 65,100 55,110 45,110" fill="url(#pure-glass)" stroke="#d4af37" stroke-width="0.8"/><circle cx="50" cy="105" r="4" fill="#fff"/></g></svg>` },
        { name: "琉璃淨瓶", svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" preserveAspectRatio="xMidYMid meet"><g transform="translate(0, 10)"><polygon points="42,50 58,50 72,95 28,95" fill="url(#facet-cyan)" stroke="#fff" stroke-width="0.5"/><circle cx="50" cy="80" r="10" fill="rgba(255,255,255,0.6)"/></g></svg>` },
        { name: "多面寶珠", svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" preserveAspectRatio="xMidYMid meet"><g transform="translate(0, 20)"><polygon points="50,15 85,45 50,65 15,45" fill="url(#facet-light)" stroke="#fff" stroke-width="0.8"/><polygon points="15,45 50,65 50,115 25,85" fill="url(#facet-rose)" opacity="0.9" stroke="#fff" stroke-width="0.5"/></g></svg>` }
    ];
    function checkDailyTreasure() {
        const today = new Date().toDateString();
        const lastLogin = localStorage.getItem('bodhi_last_login');
        let days = parseInt(localStorage.getItem('bodhi_login_days') || '0');
        if (lastLogin !== today) { days++; localStorage.setItem('bodhi_login_days', days); localStorage.setItem('bodhi_last_login', today); }
        if (days > 0 && days % 3 === 0 && localStorage.getItem('bodhi_treasure_claimed') !== today) {
            const t = treasures[Math.floor(Math.random()*treasures.length)];
            document.getElementById('t-svg-ui').innerHTML = t.svg; document.getElementById('t-name-ui').innerText = `獲得法寶：${t.name}`;
            document.getElementById('treasureModal').classList.add('show');
            localStorage.setItem('bodhi_treasure_claimed', today);
        }
    }

    // --- 5. 大數據能量棒 (無表情符號版) ---
    function openDataModal() {
        let max = Math.max(db.totalNian || 0, ...Object.values(localOth), 1);
        let html = buildEnergyBar('阿彌陀佛', db.totalNian || 0, max);
        for(let [k,v] of Object.entries(localOth)) if(v > 0) html += buildEnergyBar(k, v, max);
        document.getElementById('data-bars-container').innerHTML = html;
        document.getElementById('dataModal').classList.add('show');
        // 延遲觸發動畫
        setTimeout(() => { document.querySelectorAll('.bar-fill').forEach(el => el.style.width = el.getAttribute('data-w')); }, 50);
    }
    function buildEnergyBar(name, count, max) {
        let pct = Math.max(5, (count / max) * 100);
        return `<div style="margin-bottom: 25px;">
            <div style="font-size:12px; color:var(--gold); letter-spacing:2px;">${name}</div>
            <div class="glass-energy-bar">
                <div class="bar-track"><div class="bar-fill" data-w="${pct}%"></div></div>
                <div class="bar-labels"><span>${count.toLocaleString()}</span></div>
            </div></div>`;
    }

    // --- 6. 蓮花渲染與 UI 更新 ---
    function renderLotus(p) {
        const box = document.getElementById('lotus-container'); const rank = document.getElementById('ui-rank-text');
        if(p < 10) { box.innerHTML = ''; rank.innerText = "一真法界"; box.style.filter = "none"; return; }

        let layers = 1, fill = "url(#grad-10)", rTxt = "清淨萌芽", stroke = "rgba(255,255,255,0.6)", glow = "none";
        if(p>=50) fill = "url(#grad-50)";
        if(p>=100) { layers=2; fill="url(#grad-100)"; stroke="rgba(212,175,55,0.6)"; rTxt="聖潔初金"; }
        if(p>=300) fill="url(#grad-300)"; if(p>=500) fill="url(#grad-500)"; if(p>=700) fill="url(#grad-700)"; if(p>=900) fill="url(#grad-900)";
        if(p>=1000) { fill="url(#grad-1000)"; stroke="rgba(255,255,255,0.4)"; rTxt="初心幻彩"; }
        if(p>=5000) { fill="url(#grad-5000)"; rTxt="青淨琉璃"; }
        if(p>=10000) { fill="url(#grad-10000)"; rTxt="紫金霞光"; }
        if(p>=15000) { fill="url(#grad-15000)"; rTxt="晨曦玉露"; }
        if(p>=20000) { fill="url(#grad-20000)"; rTxt="月魄銀輝"; }
        if(p>=25000) { fill="url(#grad-25000)"; rTxt="玄黃凝脂"; }
        if(p>=30000) { fill="url(#grad-30000)"; stroke="#fff"; rTxt="大圓滿耀金"; glow="drop-shadow(0 0 15px rgba(212,175,55,0.6))"; }

        rank.innerText = rTxt; box.style.filter = glow;
        let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-150 -150 300 300" style="width:100%; height:100%; overflow:visible;">`;
        for(let l=layers; l>0; l--) {
            const sc = 0.4 + (l * 0.25);
            for(let i=0; i<8; i++) {
                svg += `<g transform="rotate(${i*45 + (l*22.5) + (p*0.02)}) scale(${sc})"><path d="M 0 0 Q 30 -60 0 -120 Q -30 -60 0 0" fill="${fill}" stroke="${stroke}" stroke-width="1.2" opacity="0.9"/></g>`;
            }
        }
        svg += `</svg>`; box.innerHTML = svg;
    }

    function updateUI() {
        document.getElementById('ui-ami-count').innerText = db.totalNian || 0;
        document.getElementById('ui-oth-count').innerText = Object.values(localOth).reduce((a,b)=>a+b, 0);
        document.getElementById('ui-lit-count').innerText = db.bodhiLitCount || 0;
        renderLotus(getPts());
    }

    // --- 7. 星空 ---
    const cvs = document.getElementById('starCanvas'); const ctx = cvs.getContext('2d'); let stars = [];
    function initS() {
        cvs.width=window.innerWidth; cvs.height=window.innerHeight;
        stars = Array.from({length:100}, ()=>({ x:Math.random()*cvs.width, y:Math.random()*cvs.height, s:Math.random()*2+0.5, sp:Math.random()*0.002, off:Math.random()*Math.PI*2 }));
    }
    function drawS() {
        ctx.clearRect(0,0,cvs.width,cvs.height); let t = Date.now();
        stars.forEach(s => { ctx.globalAlpha = 0.2+Math.abs(Math.sin(t*s.sp+s.off))*0.8; ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(s.x,s.y,s.s,0,Math.PI*2); ctx.fill(); });
        requestAnimationFrame(drawS);
    }
    window.onresize = initS; initS(); drawS(); checkDailyTreasure(); updateUI();
</script>
</body>
</html>
