<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>菩提觀照 - 實體化空間</title>
<style>
    :root {
        --gold: #D4AF37;
        --gold-glow: rgba(212, 175, 55, 0.4);
        --bg: #030303;
    }

    body {
        margin: 0; background: var(--bg); color: white;
        font-family: -apple-system, "PingFang TC", sans-serif;
        height: 100dvh; overflow: hidden; display: flex; justify-content: center;
    }

    .app-container {
        width: 100%; max-width: 480px; display: flex; flex-direction: column; position: relative;
    }

    /* 1. 頂部導航與說明 */
    .top-bar {
        padding: 40px 20px 10px; display: flex; justify-content: space-between; align-items: center; z-index: 100;
    }
    .info-trigger {
        width: 24px; height: 24px; border: 1px solid var(--gold); border-radius: 50%;
        display: flex; justify-content: center; align-items: center; font-size: 12px; color: var(--gold); cursor: pointer;
    }

    /* 2. 行者卡片 (娑婆極樂對照) */
    .traveler-card {
        margin: 10px 20px; background: rgba(255,255,255,0.03); backdrop-filter: blur(15px);
        border: 1px solid rgba(212,175,55,0.15); border-radius: 20px; padding: 18px; display: flex; gap: 15px;
    }
    .card-left { flex: 1; }
    .card-right { 
        width: 100px; border-left: 1px solid rgba(212,175,55,0.2); 
        padding-left: 15px; display: flex; flex-direction: column; justify-content: center; gap: 8px;
    }
    .compare-item { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
    .compare-val { font-size: 11px; color: var(--gold); display: block; margin-top: 2px; }

    /* 3. 中央菩提心 (動態生長) */
    .bodhi-stage {
        flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
    }
    .seed-core {
        width: 6px; height: 6px; background: white; border-radius: 50%;
        box-shadow: 0 0 20px 5px white; animation: breathe 3s infinite ease-in-out;
    }
    .lotus-svg {
        position: absolute; width: 280px; height: 280px; transform-origin: center;
        transition: all 1s ease;
    }

    /* 4. 操作區與長按歸零 */
    .action-zone {
        padding: 20px 20px 40px; display: flex; flex-direction: column; gap: 20px;
    }
    .counter-row {
        display: flex; justify-content: space-around; align-items: center;
    }
    .btn-wrap { position: relative; text-align: center; width: 80px; }
    .main-circle {
        width: 60px; height: 60px; border-radius: 50%; border: 1px solid var(--gold);
        display: flex; justify-content: center; align-items: center; cursor: pointer;
        background: rgba(212,175,55,0.05); transition: 0.2s; position: relative;
    }
    .progress-ring {
        position: absolute; top: -2px; left: -2px; width: 64px; height: 64px;
        transform: rotate(-90deg); pointer-events: none;
    }
    .progress-ring circle {
        fill: none; stroke: var(--gold); stroke-width: 2;
        stroke-dasharray: 201; stroke-dashoffset: 201; transition: stroke-dashoffset 1.5s linear;
    }
    .long-press-active .progress-ring circle { stroke-dashoffset: 0; }

    /* 5. 統計按鈕 */
    .chart-trigger {
        align-self: center; padding: 8px 20px; border-radius: 20px;
        background: rgba(212,175,55,0.1); border: 1px solid var(--gold);
        color: var(--gold); font-size: 11px; letter-spacing: 2px; cursor: pointer;
    }

    /* 說明與圖表 Modal */
    .modal {
        position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
        display: none; padding: 40px 20px; overflow-y: auto;
    }

    @keyframes breathe {
        0%, 100% { transform: scale(0.8); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 1; }
    }

    /* 飛行的金點 */
    .fly-dot {
        position: absolute; width: 4px; height: 4px; background: var(--gold);
        border-radius: 50%; pointer-events: none; z-index: 50;
    }
</style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <a href="index.html" style="color:white; opacity:0.5; text-decoration:none; font-size:13px;">← 返回</a>
        <div class="info-trigger" onclick="toggleModal('info')">?</div>
    </div>

    <div class="traveler-card">
        <div class="card-left">
            <div style="font-size:18px; letter-spacing:3px; margin-bottom:10px;">妙依</div>
            <div id="ui-rank-text" style="font-size:12px; color:var(--gold); opacity:0.8;">一真法界 ‧ 初發心</div>
            <div style="margin-top:15px; font-size:11px; opacity:0.4;">菩提資糧 <span id="ui-score" style="color:var(--gold); margin-left:10px;">0</span></div>
        </div>
        <div class="card-right">
            <div class="compare-item">娑婆時間<span class="compare-val" id="time-earth">...</span></div>
            <div class="compare-item">極樂壽量<span class="compare-val">無量壽</span></div>
        </div>
    </div>

    <div class="bodhi-stage" id="stage">
        <div class="seed-core" id="seed"></div>
        <div id="lotus-svg-container"></div>
    </div>

    <div class="action-zone">
        <div class="chart-trigger" onclick="toggleModal('chart')">觀照修持大數據</div>
        
        <div class="counter-row">
            <div class="btn-wrap">
                <div class="main-circle" onclick="countAmi(event)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                        <circle cx="12" cy="12" r="9" />
                    </svg>
                </div>
                <div style="font-size:10px; margin-top:8px; opacity:0.6;">專念彌陀</div>
                <div id="ui-ami" style="font-size:14px; color:var(--gold); margin-top:4px;">0</div>
            </div>

            <div class="btn-wrap" id="oth-btn-wrap">
                <div class="main-circle" 
                     onmousedown="startPress()" onmouseup="endPress()" 
                     ontouchstart="startPress()" ontouchend="endPress()"
                     onclick="countOth(event)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                        <path d="M12 3l1.5 6h6l-5 4 2 7-4.5-4-4.5 4 2-7-5-4h6z"/>
                    </svg>
                    <svg class="progress-ring"><circle cx="32" cy="32" r="32"></circle></svg>
                </div>
                <div style="font-size:10px; margin-top:8px; opacity:0.6;">普念諸佛</div>
                <div id="ui-oth" style="font-size:14px; color:var(--gold); margin-top:4px;">0</div>
            </div>
        </div>
    </div>

    <div id="modal-info" class="modal">
        <h2 style="color:var(--gold); font-weight:300;">運作觀照</h2>
        <p style="font-size:13px; line-height:1.8; opacity:0.8;">
            1. <b>菩提心生長</b>：隨著念佛與點亮世界，中央光點會逐漸長出黑金琉璃花瓣。<br>
            2. <b>長按歸零</b>：普念諸佛按鈕具備長按 1.5 秒歸零功能，代表收攏心念，重新出發。<br>
            3. <b>大數據</b>：下方按鈕可開啟貝茲曲線統計圖，觀照每日發心的起伏。
        </p>
        <button onclick="toggleModal('info')" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:10px 30px; margin-top:30px;">合十</button>
    </div>

    <div id="modal-chart" class="modal">
        <h3 style="color:var(--gold); margin-bottom:20px;">修持趨勢</h3>
        <div id="chart-container" style="width:100%; height:200px; border-bottom:1px solid #333;">
            </div>
        <button onclick="toggleModal('chart')" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:10px 30px; margin-top:30px;">關閉</button>
    </div>
</div>

<script>
    let ami = 0, oth = 0, pressTimer;

    // 1. 長按邏輯
    function startPress() {
        document.getElementById('oth-btn-wrap').classList.add('long-press-active');
        pressTimer = setTimeout(() => {
            oth = 0;
            updateUI();
            alert("心念收攏，歸於清淨");
            endPress();
        }, 1500);
    }
    function endPress() {
        clearTimeout(pressTimer);
        document.getElementById('oth-btn-wrap').classList.remove('long-press-active');
    }

    // 2. 念佛動畫與計數
    function countAmi(e) { ami++; fly(e); updateUI(); }
    function countOth(e) { oth++; fly(e); updateUI(); }

    function fly(e) {
        const dot = document.createElement('div');
        dot.className = 'fly-dot';
        dot.style.left = e.clientX + 'px';
        dot.style.top = e.clientY + 'px';
        document.body.appendChild(dot);

        // 貝茲曲線飛行軌跡
        const target = document.getElementById('seed').getBoundingClientRect();
        dot.animate([
            { left: e.clientX + 'px', top: e.clientY + 'px', opacity: 1 },
            { left: (target.left + 20) + 'px', top: target.top + 'px', opacity: 0 }
        ], { duration: 800, easing: 'ease-in-out' }).onfinish = () => dot.remove();
    }

    // 3. UI 與蓮花變化
    function updateUI() {
        document.getElementById('ui-ami').innerText = ami;
        document.getElementById('ui-oth').innerText = oth;
        const score = ami + oth; // 簡化版公式
        document.getElementById('ui-score').innerText = score;

        // 當分數 > 100 時，浮現第一片黑金花瓣
        if (score > 10) {
            drawLotus(score);
        }
    }

    function drawLotus(score) {
        const container = document.getElementById('lotus-svg-container');
        const petalCount = Math.min(Math.floor(score / 50), 8); // 最高8片
        let svgHtml = `<svg class="lotus-svg" viewBox="0 0 200 200">`;
        
        for(let i=0; i<petalCount; i++) {
            const angle = (360 / 8) * i;
            // 黑金琉璃色調：半透深灰帶金邊
            svgHtml += `
                <path d="M100 100 C120 60 140 60 100 20 C60 60 80 60 100 100" 
                      fill="rgba(30,30,30,0.6)" stroke="var(--gold)" stroke-width="0.5"
                      transform="rotate(${angle} 100 100)" />`;
        }
        svgHtml += `</svg>`;
        container.innerHTML = svgHtml;
    }

    function toggleModal(id) {
        const m = document.getElementById('modal-' + id);
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }

    // 更新娑婆時間
    setInterval(() => {
        const now = new Date();
        document.getElementById('time-earth').innerText = now.toLocaleTimeString();
    }, 1000);

    updateUI();
</script>
</body>
</html>
