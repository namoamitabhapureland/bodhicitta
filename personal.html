<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>菩提心室 ‧ 個人觀照</title>
<style>
    :root {
        --bg-deep: #050508;
        --accent-gold: #CBA37A;
        --gold-glow: rgba(203, 163, 122, 0.4);
        --text-main: #EAEAEA;
        --text-dim: #888888;
        --glass-panel: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
    }

    /* 頂級防護：禁止選取、禁止右鍵、禁止長按選單 */
    * { 
        box-sizing: border-box; 
        -webkit-tap-highlight-color: transparent; 
        outline: none;
        -webkit-touch-callout: none; 
        -webkit-user-select: none;
        user-select: none;
    }

    body {
        margin: 0; padding: 0; background-color: var(--bg-deep); color: var(--text-main);
        background-image: radial-gradient(circle at 50% 40%, rgba(30, 25, 20, 0.9) 0%, var(--bg-deep) 70%);
        font-family: -apple-system, "PingFang TC", sans-serif;
        height: 100dvh; display: flex; justify-content: center; overflow: hidden;
    }

    .app-container {
        width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; position: relative;
    }

    /* 頂部導航 (鎖定高度) */
    .nav-top {
        flex-shrink: 0; padding: max(20px, env(safe-area-inset-top)) 25px 5px;
        display: flex; justify-content: space-between; align-items: center;
    }

    /* Profile 區塊 (鎖定高度) */
    .profile-section {
        flex-shrink: 0; padding: 10px 25px; display: flex; align-items: center; gap: 20px;
    }
    .avatar-box {
        width: 70px; height: 70px; border-radius: 50%; border: 1.5px solid var(--accent-gold);
        padding: 3px; position: relative; flex-shrink: 0; cursor: pointer;
    }
    .avatar-img {
        width: 100%; height: 100%; border-radius: 50%; background: #111;
        background-size: cover; background-position: center;
    }
    .avatar-plus { 
        position: absolute; bottom: -2px; right: -2px; background: var(--bg-deep); color: var(--accent-gold); 
        width: 22px; height: 22px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
        font-size: 14px; border: 1px solid var(--accent-gold); 
    }

    .stats-row { flex: 1; display: flex; justify-content: space-around; text-align: center; }
    .stat-num { font-size: 15px; font-weight: 500; color: var(--text-main); }
    .stat-lbl { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; margin-top: 4px; }

    /* 備忘錄區 */
    .bio-section { flex-shrink: 0; padding: 0 25px 15px; border-bottom: 1px solid var(--glass-border); }
    .bio-name { font-size: 14px; color: var(--accent-gold); letter-spacing: 2px; }
    .memo-input {
        width: 100%; background: transparent; border: none; font-size: 11px;
        color: var(--text-dim); padding: 5px 0; outline: none; border-bottom: 1px solid transparent;
    }

    /* 中央舞台 (彈性吸震區) */
    .bodhi-stage {
        flex: 1; position: relative; display: flex; justify-content: center; align-items: center; min-height: 0;
    }
    .lotus-container {
        width: 60vw; height: 60vw; max-width: 250px; max-height: 250px;
        display: flex; justify-content: center; align-items: center; transition: transform 1s ease;
    }
    .seed-core {
        position: absolute; width: 6px; height: 6px; background: #FFF; border-radius: 50%;
        box-shadow: 0 0 20px 5px rgba(255,255,255,0.8); animation: breathe 3s infinite; z-index: 10;
    }

    /* 底部操作 */
    .action-row {
        flex-shrink: 0; padding: 15px 25px max(35px, env(safe-area-inset-bottom));
        display: flex; justify-content: space-around; align-items: center;
    }
    .btn-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
    .btn-circle {
        width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--glass-border);
        display: flex; justify-content: center; align-items: center; background: var(--glass-panel);
    }
    .ring-svg { position: absolute; inset: -1px; transform: rotate(-90deg); pointer-events: none; }
    .ring-svg circle { fill: none; stroke: var(--accent-gold); stroke-width: 1.5; stroke-dasharray: 144; stroke-dashoffset: 144; transition: stroke-dashoffset 1.5s linear; }
    .pressing .ring-svg circle { stroke-dashoffset: 0; }

    /* 輸入框與 Modal (高質感黑金) */
    .modal-bg {
        position: absolute; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
        display: none; justify-content: center; align-items: center; z-index: 100;
    }
    .modal-card {
        width: 85%; background: #0A0A0C; border: 1px solid var(--glass-border);
        border-radius: 20px; padding: 25px;
    }
    .custom-input {
        width: 100%; background: transparent; border: none; border-bottom: 1.5px solid var(--accent-gold);
        color: #FFF; font-size: 16px; text-align: center; padding: 10px 0; margin: 20px 0;
    }

    @keyframes breathe {
        0%, 100% { transform: scale(0.8); opacity: 0.6; }
        50% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 30px 10px rgba(203, 163, 122, 0.5); }
    }
</style>
</head>
<body oncontextmenu="return false;">

<div class="app-container">
    <div class="nav-top">
        <a href="index.html" class="back-btn">← 菩提客棧</a>
        <div style="font-size:10px; color:var(--text-dim); letter-spacing:3px;">Saha一日 ‧ Pureland百歲</div>
    </div>

    <div class="profile-section">
        <div class="avatar-box" onclick="document.getElementById('avatarInput').click()">
            <div class="avatar-img" id="ui-avatar"></div>
            <div class="avatar-plus" id="avatarPlus">+</div>
            <input type="file" id="avatarInput" hidden accept="image/*" onchange="handleAvatar(event)">
        </div>
        <div class="stats-row">
            <div class="stat-item"><div class="stat-num" id="ui-ami">0</div><div class="stat-lbl">專念彌陀</div></div>
            <div class="stat-item"><div class="stat-num" id="ui-oth">0</div><div class="stat-lbl" id="lbl-oth">普念諸佛</div></div>
            <div class="stat-item"><div class="stat-num" id="ui-warmth" style="color:var(--accent-gold);">0</div><div class="stat-lbl">菩提資糧</div></div>
        </div>
    </div>

    <div class="bio-section">
        <div class="bio-name">妙依 ‧ <span id="ui-rank">初發心</span></div>
        <input type="text" class="memo-input" id="ui-memo" placeholder="寫下今日發心，此空間絕對隱私...">
    </div>

    <div class="bodhi-stage">
        <div class="lotus-container" id="lotus-svg"></div>
        <div class="seed-core" id="seed-core"></div>
    </div>

    <div class="action-row">
        <button onclick="toggleModal('chartModal')" style="background:none; border:1px solid var(--accent-gold); color:var(--accent-gold); padding:6px 15px; border-radius:20px; font-size:10px; letter-spacing:2px;">大數據</button>

        <div class="btn-item" onclick="addAmi(event)">
            <div class="btn-circle">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2">
                    <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/>
                </svg>
            </div>
            <div style="font-size:9px; color:var(--text-dim);">專念彌陀</div>
        </div>

        <div class="btn-item" id="btn-oth" onmousedown="startPress()" onmouseup="endPress(event)" ontouchstart="startPress()" ontouchend="endPress(event)">
            <div class="btn-circle">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2">
                    <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5Z"/>
                </svg>
                <svg class="ring-svg"><circle cx="23" cy="23" r="23"></circle></svg>
            </div>
            <div id="ui-oth-text" style="font-size:9px; color:var(--text-dim);">普念諸佛</div>
        </div>
    </div>
</div>

<div id="inputModal" class="modal-bg">
    <div class="modal-card">
        <div style="text-align:center; color:var(--accent-gold); font-size:13px;">請輸入欲觀照之佛菩薩聖號</div>
        <input type="text" id="customBuddha" class="custom-input" placeholder="如：觀世音菩薩">
        <button onclick="saveCustom()" style="width:100%; padding:10px; background:var(--accent-gold); border:none; border-radius:10px; color:#000;">開始灌溉菩提心</button>
    </div>
</div>

<div id="chartModal" class="modal-bg" onclick="toggleModal('chartModal')">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div style="color:var(--accent-gold); font-size:14px; margin-bottom:15px;">修持大數據觀照</div>
        <div id="chart-svg" style="width:100%; height:120px; border-bottom:1px solid var(--glass-border);"></div>
        <div id="oth-list" style="margin-top:20px; font-size:11px; max-height:100px; overflow-y:auto;"></div>
        <button onclick="toggleModal('chartModal')" style="width:100%; margin-top:20px; background:none; border:1px solid var(--glass-border); color:#888; padding:8px; border-radius:10px;">關閉</button>
    </div>
</div>

<script>
    // --- 聲音引擎 (與主系統一致) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSnd(f, d) {
        if(audioCtx.state==='suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(f, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + d);
    }

    // --- 數據邏輯 ---
    let ami = parseInt(localStorage.getItem('personal_ami') || '0');
    let warmth = parseInt(localStorage.getItem('pure_land_warmth') || '0');
    let othList = JSON.parse(localStorage.getItem('personal_oth_list') || '{}');
    let curBuddha = localStorage.getItem('current_buddha') || '';

    // 初始化與連十日邏輯
    window.onload = () => {
        const lastDate = localStorage.getItem('last_entry');
        const today = new Date().toDateString();
        if(lastDate !== today) {
            let streak = parseInt(localStorage.getItem('entry_streak') || '0');
            streak = (lastDate === new Date(Date.now()-86400000).toDateString()) ? streak + 1 : 1;
            if(streak >= 10) { warmth += 100; streak = 0; alert("連續十日進站觀照，資糧+100"); }
            localStorage.setItem('entry_streak', streak);
            localStorage.setItem('last_entry', today);
            localStorage.setItem('pure_land_warmth', warmth);
        }
        
        // 恢復頭像與備忘錄
        const av = localStorage.getItem('traveler_avatar');
        if(av) { document.getElementById('ui-avatar').style.backgroundImage=`url(${av})`; document.getElementById('avatarPlus').style.display='none'; }
        document.getElementById('ui-memo').value = localStorage.getItem('traveler_memo') || '';
        document.getElementById('ui-memo').oninput = e => localStorage.setItem('traveler_memo', e.target.value);
        
        if(curBuddha) document.getElementById('ui-oth-text').innerText = `念${curBuddha}`;
        updateUI();
    };

    function updateUI() {
        document.getElementById('ui-ami').innerText = ami;
        document.getElementById('ui-warmth').innerText = warmth;
        let totalOth = Object.values(othList).reduce((a,b)=>a+b, 0);
        document.getElementById('ui-oth').innerText = totalOth;
        
        // 分數公式：專念 + 諸佛 + 資糧權重
        let score = ami + totalOth + (warmth * 5);
        renderLotus(score);
    }

    // --- 蓮花層次演算法 (百年金蓮邏輯) ---
    function renderLotus(score) {
        const box = document.getElementById('lotus-svg');
        const rank = document.getElementById('ui-rank');
        if(score < 5000) { box.innerHTML = ''; rank.innerText = "菩提種子"; return; }
        
        // 5000分以上開始長第一層 (依據你的每日進來10天送分邏輯，大約10天後會開花)
        let layers = score < 50000 ? 1 : 2; 
        let color = score < 100000 ? "#FFF" : "#CBA37A";
        rank.innerText = score < 100000 ? "清淨萌芽" : "圓滿金蓮";

        let svg = `<svg viewBox="-100 -100 200 200" style="width:100%; height:100%;">`;
        for(let l=layers; l>0; l--) {
            const sc = 0.3 + (l*0.2);
            for(let i=0; i<8; i++) {
                const rot = i*45 + (l*22.5);
                svg += `<path d="M0 0 C15 -25 25 -50 0 -75 C-25 -50 -15 -25 0 0" fill="none" stroke="${color}" stroke-width="0.5" transform="rotate(${rot}) scale(${sc})"/>`;
            }
        }
        svg += `</svg>`;
        box.innerHTML = svg;
    }

    // --- 交互邏輯 ---
    function addAmi(e) { 
        ami++; localStorage.setItem('personal_ami', ami); 
        playSnd(880, 0.5); fly(e); updateUI(); 
    }

    function startPress() {
        isLong = false; document.getElementById('btn-oth').classList.add('pressing');
        pressTimer = setTimeout(() => {
            isLong = true; othList[curBuddha] = 0; // 當前聖號歸零
            playSnd(220, 0.8); updateUI();
            toggleModal('inputModal'); // 喚起更換聖號
        }, 1500);
    }
    function endPress(e) {
        clearTimeout(pressTimer); document.getElementById('btn-oth').classList.remove('pressing');
        if(!isLong) {
            if(!curBuddha) { toggleModal('inputModal'); return; }
            othList[curBuddha] = (othList[curBuddha] || 0) + 1;
            localStorage.setItem('personal_oth_list', JSON.stringify(othList));
            playSnd(440, 0.3); fly(e); updateUI();
        }
    }

    function saveCustom() {
        const name = document.getElementById('customBuddha').value.trim();
        if(!name) return;
        curBuddha = name;
        localStorage.setItem('current_buddha', curBuddha);
        document.getElementById('ui-oth-text').innerText = `念${curBuddha}`;
        toggleModal('inputModal');
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        if(id === 'chartModal' && m.style.display === 'flex') renderChart();
    }

    // --- 大數據渲染 (整合主系統貝茲曲線) ---
    function renderChart() {
        const list = document.getElementById('oth-list');
        list.innerHTML = Object.entries(othList).map(([k,v])=>`<div>✨ ${k} ── ${v} 次</div>`).join('');
        // SVG 曲線渲染略... (依照主系統公式繪製近7日ami趨勢)
    }

    function fly(e) {
        const dot = document.createElement('div');
        dot.style.cssText = `position:absolute; width:4px; height:4px; background:#CBA37A; border-radius:50%; pointer-events:none; left:${e.clientX}px; top:${e.clientY}px; z-index:100;`;
        document.body.appendChild(dot);
        const t = document.getElementById('seed-core').getBoundingClientRect();
        dot.animate([{left:e.clientX+'px', top:e.clientY+'px'}, {left:t.left+'px', top:t.top+'px', opacity:0}], 800).onfinish=()=>dot.remove();
    }

    function handleAvatar(e) {
        const r = new FileReader();
        r.onload = ev => {
            document.getElementById('ui-avatar').style.backgroundImage=`url(${ev.target.result})`;
            localStorage.setItem('traveler_avatar', ev.target.result);
            document.getElementById('avatarPlus').style.display='none';
        };
        r.readAsDataURL(e.target.files[0]);
    }
</script>
</body>
</html>
