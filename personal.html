<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>行者觀照 ‧ 菩提實體化</title>
<style>
    :root {
        --bg-deep: #050505;
        --gold-primary: #D4AF37;
        --gold-dim: rgba(212, 175, 55, 0.4);
        --text-main: #EAEAEA;
        --text-dim: #888888;
        --border-glass: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

    body {
        margin: 0; padding: 0; background-color: var(--bg-deep); color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Helvetica Neue", sans-serif;
        height: 100dvh; display: flex; justify-content: center; overflow: hidden;
        user-select: none; -webkit-user-select: none;
    }

    .app-wrapper {
        width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; position: relative;
    }

    /* 1. 頂部導航 */
    .nav-top {
        padding: max(15px, env(safe-area-inset-top)) 20px 10px;
        display: flex; justify-content: space-between; align-items: center; z-index: 20;
    }
    .nav-btn { color: var(--text-main); text-decoration: none; font-size: 14px; opacity: 0.8; display: flex; align-items: center; gap: 6px; }
    .icon-info { width: 22px; height: 22px; border: 1px solid var(--text-dim); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 11px; cursor: pointer; }

    /* 2. IG 風格 Profile 區塊 */
    .profile-header {
        padding: 15px 20px; display: flex; align-items: center; gap: 20px; z-index: 20;
    }
    /* 大頭貼 */
    .avatar-wrap {
        width: 80px; height: 80px; border-radius: 50%; border: 1.5px solid var(--gold-dim);
        padding: 3px; cursor: pointer; flex-shrink: 0; position: relative;
    }
    .avatar-inner {
        width: 100%; height: 100%; border-radius: 50%; background: #111;
        background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center;
    }
    .avatar-plus { font-size: 24px; color: var(--gold-dim); font-weight: 100; }

    /* 右側數據統計 */
    .stats-wrap {
        flex: 1; display: flex; justify-content: space-around; align-items: center;
    }
    .stat-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .stat-val { font-size: 16px; font-weight: 500; color: var(--text-main); }
    .stat-lbl { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }

    /* 名字與備忘錄 (Bio) */
    .bio-section {
        padding: 0 20px 15px; z-index: 20; border-bottom: 1px solid var(--border-glass);
    }
    .bio-name { font-size: 14px; font-weight: 500; letter-spacing: 2px; margin-bottom: 4px; }
    .bio-rank { font-size: 11px; color: var(--gold-primary); letter-spacing: 1px; margin-bottom: 10px; }
    .memo-input {
        width: 100%; background: transparent; border: none; color: var(--text-main);
        font-size: 13px; line-height: 1.5; padding: 0;
    }
    .memo-input::placeholder { color: rgba(255,255,255,0.2); }

    /* 3. 菩提心舞台 (絕對主角) */
    .bodhi-stage {
        flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
        background: radial-gradient(circle at center, rgba(30, 25, 20, 0.6) 0%, transparent 60%);
    }
    .saha-time {
        position: absolute; top: 15px; right: 20px; font-size: 10px; color: var(--text-dim); letter-spacing: 2px;
    }
    /* 核心跳動種子 */
    .seed-core {
        position: absolute; width: 6px; height: 6px; background: #FFF; border-radius: 50%;
        box-shadow: 0 0 15px 5px rgba(255,255,255,0.6); animation: breathe 3s infinite ease-in-out; z-index: 10;
    }
    /* 蓮花容器 */
    .lotus-container {
        position: absolute; width: 320px; height: 320px; display: flex; justify-content: center; align-items: center;
        transition: all 1s ease-in-out;
    }

    /* 4. 底部極簡操作列 */
    .action-bar {
        padding: 15px 30px max(30px, env(safe-area-inset-bottom));
        display: flex; justify-content: space-around; align-items: center; z-index: 20;
    }
    .action-btn {
        display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; cursor: pointer;
    }
    .icon-box {
        width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--text-dim);
        display: flex; justify-content: center; align-items: center; transition: 0.2s; position: relative;
    }
    .action-btn:active .icon-box { transform: scale(0.9); background: rgba(255,255,255,0.05); }
    .icon-box svg { width: 20px; height: 20px; fill: none; stroke: var(--text-main); stroke-width: 1.5; stroke-linejoin: round; }
    .action-lbl { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }

    /* 普念諸佛的長按圓環 */
    .progress-ring {
        position: absolute; top: -1px; left: -1px; width: 44px; height: 44px; transform: rotate(-90deg); pointer-events: none;
    }
    .progress-ring circle {
        fill: none; stroke: var(--gold-primary); stroke-width: 2;
        stroke-dasharray: 140; stroke-dashoffset: 140; transition: stroke-dashoffset 1.5s linear;
    }
    .is-pressing .progress-ring circle { stroke-dashoffset: 0; }

    /* 飛行光點特效 */
    .light-particle {
        position: absolute; width: 4px; height: 4px; border-radius: 50%; pointer-events: none; z-index: 50;
    }

    /* 彈窗樣式 (共用) */
    .modal-overlay {
        position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
        z-index: 100; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s;
    }
    .modal-overlay.show { display: flex; opacity: 1; }
    .modal-content {
        width: 85%; max-width: 340px; background: #111; border: 1px solid var(--border-glass);
        border-radius: 20px; padding: 25px; color: var(--text-main);
    }
    .modal-close { margin-top: 25px; width: 100%; padding: 12px; background: transparent; border: 1px solid var(--gold-dim); color: var(--gold-primary); border-radius: 12px; cursor: pointer; letter-spacing: 2px; }

    @keyframes breathe {
        0%, 100% { transform: scale(0.8); opacity: 0.6; }
        50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 25px 8px rgba(255,255,255,0.8); }
    }
</style>
</head>
<body>

<div class="app-wrapper">
    <div class="nav-top">
        <a href="index.html" class="nav-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg> 返回
        </a>
        <div class="icon-info" onclick="toggleModal('infoModal')">i</div>
    </div>

    <div class="profile-header">
        <div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()">
            <div class="avatar-inner" id="avatarCircle">
                <span class="avatar-plus" id="avatarPlus">+</span>
            </div>
            <input type="file" id="avatarInput" accept="image/*" style="display: none;">
        </div>
        
        <div class="stats-wrap">
            <div class="stat-item">
                <div class="stat-val" id="val-ami">0</div>
                <div class="stat-lbl">專念彌陀</div>
            </div>
            <div class="stat-item">
                <div class="stat-val" id="val-oth">0</div>
                <div class="stat-lbl">普念諸佛</div>
            </div>
            <div class="stat-item">
                <div class="stat-val" id="val-world">0</div>
                <div class="stat-lbl">點亮世界</div>
            </div>
        </div>
    </div>

    <div class="bio-section">
        <div class="bio-name">妙依</div>
        <div class="bio-rank" id="ui-rank">一真法界 ‧ 菩提種子</div>
        <input type="text" class="memo-input" id="memoInput" placeholder="寫下今日發心，儲存在本地守護...">
    </div>

    <div class="bodhi-stage">
        <div class="saha-time">娑婆 <span id="time-display">--:--</span><br><span style="color:var(--gold-dim); font-size:9px;">菩提分 <span id="ui-score">0</span></span></div>
        <div class="lotus-container" id="lotus-svg"></div>
        <div class="seed-core" id="bodhi-seed"></div>
    </div>

    <div class="action-bar">
        <div class="action-btn" onclick="toggleModal('chartModal')">
            <div class="icon-box"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg></div>
            <div class="action-lbl">觀照數據</div>
        </div>

        <div class="action-btn" onclick="countAmi(event)">
            <div class="icon-box"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg></div>
            <div class="action-lbl">專念彌陀</div>
        </div>

        <div class="action-btn" id="btn-oth" 
             onmousedown="startPress()" onmouseup="endPress(event)" onmouseleave="cancelPress()"
             ontouchstart="startPress()" ontouchend="endPress(event)">
            <div class="icon-box">
                <svg viewBox="0 0 24 24"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5Z"/></svg>
                <svg class="progress-ring"><circle cx="22" cy="22" r="21"></circle></svg>
            </div>
            <div class="action-lbl">普念諸佛</div>
        </div>
    </div>

    <div id="infoModal" class="modal-overlay" onclick="toggleModal('infoModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-top:0; color:var(--gold-primary); font-weight:400; letter-spacing:2px;">系統運作原理</h3>
            <p style="font-size:12px; line-height:1.8; color:var(--text-dim);">
                1. <b>永恆本地化</b>：您的照片、備忘錄與普念諸佛數據，皆永久安全儲存於本機。<br>
                2. <b>神聖積分</b>：菩提分 = 專念彌陀 + 普念諸佛 + (亮燈世界 × 3) + 總資糧。<br>
                3. <b>琉璃化現</b>：中央光點將依分數層層綻放，顏色歷經白、藍、粉、紫、綠、幻彩至純金。<br>
                4. <b>心念收攏</b>：長按「普念諸佛」1.5秒，圓滿歸零。
            </p>
            <button class="modal-close" onclick="toggleModal('infoModal')">合十</button>
        </div>
    </div>

    <div id="chartModal" class="modal-overlay" onclick="toggleModal('chartModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-top:0; color:var(--gold-primary); font-weight:400;">修持趨勢</h3>
            <div id="chart-area" style="width:100%; height:180px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; align-items:flex-end;">
                <svg viewBox="0 0 100 50" style="width:100%; height:100%; overflow:visible;">
                    <path d="M0,50 C20,40 30,10 50,30 C70,50 80,10 100,5" fill="none" stroke="#D4AF37" stroke-width="2"/>
                    <circle cx="50" cy="30" r="2" fill="#FFF"/> <circle cx="100" cy="5" r="2" fill="#FFF"/>
                </svg>
            </div>
            <button class="modal-close" onclick="toggleModal('chartModal')">關閉</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // --- 0. Firebase (可選，斷線亦不影響運作) ---
    const fbCfg = { /* 填入 Firebase Config */ };
    if (!firebase.apps.length) firebase.initializeApp(fbCfg);
    const db = firebase.database();

    // --- 1. 本地儲存讀寫 (IG 介面與 Bio) ---
    let amiCount = parseInt(localStorage.getItem('personal_ami') || '0');
    let othCount = parseInt(localStorage.getItem('personal_oth') || '0');
    let worldCount = JSON.parse(localStorage.getItem('unlocked_worlds') || '[]').length;
    let warmthCount = parseInt(localStorage.getItem('pure_land_warmth') || '0');
    let bodhiScore = 0;

    const memo = document.getElementById('memoInput');
    memo.value = localStorage.getItem('traveler_memo') || '';
    memo.addEventListener('input', e => localStorage.setItem('traveler_memo', e.target.value));

    const savedAvatar = localStorage.getItem('traveler_avatar');
    if (savedAvatar) {
        document.getElementById('avatarCircle').style.backgroundImage = `url(${savedAvatar})`;
        document.getElementById('avatarPlus').style.display = 'none';
    }

    document.getElementById('avatarInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            document.getElementById('avatarCircle').style.backgroundImage = `url(${ev.target.result})`;
            document.getElementById('avatarPlus').style.display = 'none';
            localStorage.setItem('traveler_avatar', ev.target.result);
        };
        reader.readAsDataURL(file);
    });

    // --- 2. 娑婆時間 ---
    setInterval(() => {
        const d = new Date();
        document.getElementById('time-display').innerText = d.toTimeString().split(' ')[0].substring(0,5);
    }, 1000);

    // --- 3. 普念諸佛 (長按與點擊的空性融合) ---
    let pressTimer;
    let isLongPress = false;

    function startPress() {
        isLongPress = false;
        document.getElementById('btn-oth').classList.add('is-pressing');
        pressTimer = setTimeout(() => {
            isLongPress = true;
            othCount = 0;
            updateUI();
            
            // 歸零震盪特效
            document.getElementById('bodhi-seed').style.transform = 'scale(0.1)';
            setTimeout(() => document.getElementById('bodhi-seed').style.transform = '', 400);
            alert("心念已收攏，歸於清淨。");
        }, 1500);
    }
    function cancelPress() {
        clearTimeout(pressTimer);
        document.getElementById('btn-oth').classList.remove('is-pressing');
    }
    function endPress(e) {
        cancelPress();
        if (!isLongPress && e.cancelable !== false) { // 避免觸控與滑鼠重複觸發
            e.preventDefault();
            othCount++;
            updateUI();
            fireParticle(e, 'oth');
        }
    }

    // --- 4. 專念彌陀 (同步 Firebase) ---
    function countAmi(e) {
        amiCount++;
        updateUI();
        fireParticle(e, 'ami');
        
        try {
            db.ref('global_stats/total_ami').transaction(n => (n || 0) + 1);
        } catch(err) { /* 靜默失敗，保證系統不崩潰 */ }
    }

    // --- 5. 數據更新與 UI 渲染 ---
    function updateUI() {
        localStorage.setItem('personal_ami', amiCount);
        localStorage.setItem('personal_oth', othCount);
        
        bodhiScore = amiCount + othCount + (worldCount * 3) + warmthCount;
        
        document.getElementById('val-ami').innerText = amiCount;
        document.getElementById('val-oth').innerText = othCount;
        document.getElementById('val-world').innerText = worldCount;
        document.getElementById('ui-score').innerText = bodhiScore;

        renderLotus(bodhiScore);
    }

    // --- 6. 飛行光點特效 (微彎軌跡) ---
    function fireParticle(e, type) {
        let startX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
        let startY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
        
        const seed = document.getElementById('bodhi-seed').getBoundingClientRect();
        const endX = seed.left + seed.width / 2;
        const endY = seed.top + seed.height / 2;

        const particle = document.createElement('div');
        particle.className = 'light-particle';
        // 彌陀偏金，諸佛偏白
        particle.style.background = type === 'ami' ? '#D4AF37' : '#FFFFFF';
        particle.style.boxShadow = `0 0 10px 2px ${type === 'ami' ? '#D4AF37' : '#FFFFFF'}`;
        document.body.appendChild(particle);

        particle.animate([
            { left: startX + 'px', top: startY + 'px', transform: 'scale(1)', opacity: 1 },
            { left: ((startX + endX)/2 - 40) + 'px', top: ((startY + endY)/2) + 'px', opacity: 0.8 },
            { left: endX + 'px', top: endY + 'px', transform: 'scale(0.2)', opacity: 0 }
        ], { duration: 900, easing: 'cubic-bezier(0.25, 1, 0.5, 1)' }).onfinish = () => particle.remove();
    }

    // --- 7. 神聖蓮花演算法 (層狀生長與色彩演化) ---
    function renderLotus(score) {
        const container = document.getElementById('lotus-svg');
        const rankText = document.getElementById('ui-rank');
        
        // 分數對應階位與層數 (每層 8 片)
        let layers = 0;
        let colorGrad = "";
        let rankName = "初發心";

        if (score < 10) {
            container.innerHTML = '';
            rankText.innerText = `一真法界 ‧ 菩提種子`;
            return; 
        }
        else if (score < 100) { layers = 1; rankName = "萌芽"; colorGrad = ["#FFFFFF", "rgba(255,255,255,0.2)"]; } // 白
        else if (score < 500) { layers = 2; rankName = "清淨"; colorGrad = ["#A2D2FF", "rgba(162,210,255,0.2)"]; } // 藍
        else if (score < 1000){ layers = 3; rankName = "慈悲"; colorGrad = ["#FFC8DD", "rgba(255,200,221,0.2)"]; } // 粉
        else if (score < 3000){ layers = 4; rankName = "智慧"; colorGrad = ["#CDB4DB", "rgba(205,180,219,0.2)"]; } // 紫
        else if (score < 5000){ layers = 5; rankName = "行願"; colorGrad = ["#B7E4C7", "rgba(183,228,199,0.2)"]; } // 綠
        else if (score < 10000){layers = 6; rankName = "幻彩"; colorGrad = ["#FFD6A5", "rgba(189,178,255,0.3)"]; } // 混色
        else { layers = 7; rankName = "圓滿金蓮"; colorGrad = ["#D4AF37", "rgba(212,175,55,0.3)"]; } // 純金

        rankText.innerText = `一真法界 ‧ ${rankName}`;

        let svgHtml = `<svg viewBox="-150 -150 300 300" style="width:100%; height:100%; overflow:visible;">
            <defs>
                <linearGradient id="petalGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="rgba(10,10,10,0.8)"/>
                    <stop offset="50%" stop-color="${colorGrad[1]}"/>
                    <stop offset="100%" stop-color="${colorGrad[0]}"/>
                </linearGradient>
            </defs>`;

        // 層狀渲染 (從大到小)
        for (let l = layers; l > 0; l--) {
            const scale = 0.3 + (l * 0.15); // 每層大小遞減
            const offsetAngle = (l % 2 === 0) ? 22.5 : 0; // 內外層交錯
            
            for (let i = 0; i < 8; i++) {
                const angle = i * 45 + offsetAngle;
                // 琉璃花瓣路徑
                svgHtml += `
                    <g transform="rotate(${angle}) scale(${scale})">
                        <path d="M0 0 C25 -50 40 -100 0 -150 C-40 -100 -25 -50 0 0" 
                              fill="url(#petalGrad)" stroke="${colorGrad[0]}" stroke-width="0.8" opacity="0.85"/>
                    </g>`;
            }
        }
        svgHtml += `</svg>`;
        container.innerHTML = svgHtml;
        
        // 蓮花隨分數緩慢旋轉呼吸
        container.style.transform = `rotate(${score * 0.5}deg)`;
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.classList.toggle('show');
    }

    // 初始化載入
    updateUI();
</script>
</body>
</html>
