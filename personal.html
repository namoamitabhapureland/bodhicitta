<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>菩提心室 ‧ 個人觀照</title>
<style>
    :root {
        --bg-deep: #050508;
        --accent-gold: #CBA37A;
        --gold-glow: rgba(203, 163, 122, 0.4);
        --text-main: #EAEAEA;
        --text-dim: #888888;
        --glass-panel: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

    body {
        margin: 0; padding: 0; background-color: var(--bg-deep); color: var(--text-main);
        /* 星空發光底色，對齊截圖質感 */
        background-image: radial-gradient(circle at 50% 40%, rgba(30, 25, 20, 0.9) 0%, var(--bg-deep) 70%);
        font-family: -apple-system, "PingFang TC", sans-serif;
        height: 100dvh; display: flex; justify-content: center; overflow: hidden;
    }

    .app-container {
        width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; position: relative;
    }

    /* 頂部導航 */
    .nav-top {
        padding: max(20px, env(safe-area-inset-top)) 25px 10px;
        display: flex; justify-content: space-between; align-items: center;
    }
    .back-btn { color: var(--text-dim); text-decoration: none; font-size: 13px; letter-spacing: 2px; }

    /* IG Profile 佈局 (深色玻璃質感) */
    .profile-section {
        padding: 15px 25px; display: flex; align-items: center; gap: 20px;
    }
    .avatar-box {
        width: 76px; height: 76px; border-radius: 50%; border: 1.5px solid var(--accent-gold);
        padding: 3px; position: relative; flex-shrink: 0; cursor: pointer;
        box-shadow: 0 0 15px var(--gold-glow);
    }
    .avatar-img {
        width: 100%; height: 100%; border-radius: 50%; background: #111;
        background-size: cover; background-position: center;
    }
    .avatar-plus { 
        position: absolute; bottom: -2px; right: -2px; background: var(--bg-deep); color: var(--accent-gold); 
        width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
        font-size: 16px; border: 1px solid var(--accent-gold); 
    }

    .stats-row {
        flex: 1; display: flex; justify-content: space-around; text-align: center;
    }
    .stat-item { flex: 1; min-width: 0; }
    .stat-num { font-size: 16px; font-weight: 500; color: var(--text-main); }
    .stat-lbl { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; margin-top: 4px; }

    /* 名字與備忘錄 */
    .bio-section { padding: 5px 25px 15px; border-bottom: 1px solid var(--glass-border); }
    .bio-name { font-size: 15px; font-weight: 400; letter-spacing: 3px; color: var(--accent-gold); }
    .bio-rank { font-size: 10px; color: var(--text-dim); margin: 4px 0 10px; letter-spacing: 1px; }
    .memo-input {
        width: 100%; background: transparent; border: none; font-size: 12px;
        color: var(--text-main); padding: 5px 0; outline: none; border-bottom: 1px solid transparent; transition: 0.3s;
    }
    .memo-input::placeholder { color: rgba(255,255,255,0.2); }
    .memo-input:focus { border-bottom-color: var(--glass-border); }

    /* 中央舞台 (星空與蓮花) */
    .bodhi-stage {
        flex: 1; position: relative; display: flex; flex-direction: column;
        justify-content: center; align-items: center;
    }
    .time-diff {
        position: absolute; top: 15px; right: 25px; text-align: right; font-size: 10px; color: var(--text-dim); line-height: 1.8; letter-spacing: 1px;
    }
    .lotus-container {
        width: 280px; height: 280px; display: flex; justify-content: center; align-items: center;
        transition: transform 1s ease;
    }
    .seed-core {
        position: absolute; width: 6px; height: 6px; background: #FFF; border-radius: 50%;
        box-shadow: 0 0 20px 5px rgba(255,255,255,0.8); animation: breathe 3s infinite; z-index: 10;
    }

    /* 底部操作 */
    .action-row {
        padding: 20px 25px max(35px, env(safe-area-inset-bottom));
        display: flex; justify-content: space-around; align-items: center;
    }
    .btn-item { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
    .btn-circle {
        width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--glass-border);
        display: flex; justify-content: center; align-items: center; background: var(--glass-panel);
        backdrop-filter: blur(10px); transition: 0.2s; position: relative;
    }
    .btn-circle:active { transform: scale(0.9); background: rgba(203, 163, 122, 0.1); border-color: var(--accent-gold); }
    .btn-lbl { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }

    /* 進度環 (長按) */
    .ring-svg { position: absolute; inset: -1px; transform: rotate(-90deg); pointer-events: none; }
    .ring-svg circle { fill: none; stroke: var(--accent-gold); stroke-width: 1.5; stroke-dasharray: 150; stroke-dashoffset: 150; transition: stroke-dashoffset 1.5s linear; }
    .pressing .ring-svg circle { stroke-dashoffset: 0; }

    /* 大數據按鈕 */
    .chart-btn {
        padding: 8px 20px; border-radius: 20px; border: 1px solid var(--accent-gold);
        color: var(--accent-gold); font-size: 10px; letter-spacing: 2px; background: transparent; cursor: pointer;
    }

    /* 飛行動畫 */
    .particle { position: absolute; width: 3px; height: 3px; background: var(--accent-gold); border-radius: 50%; pointer-events: none; box-shadow: 0 0 8px var(--accent-gold); z-index: 50;}

    /* Modal (大數據專用) */
    .modal-bg {
        position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
        display: none; justify-content: center; align-items: center; z-index: 100; opacity: 0; transition: 0.3s;
    }
    .modal-bg.show { display: flex; opacity: 1; }
    .modal-card {
        width: 90%; max-width: 360px; background: #0A0A0C; border: 1px solid var(--glass-border);
        border-radius: 20px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }
    
    /* 吐司提示 */
    .toast {
        position: fixed; top: max(60px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
        background: rgba(203, 163, 122, 0.9); color: #000; padding: 10px 20px;
        border-radius: 20px; font-size: 11px; font-weight: 500; letter-spacing: 1px; opacity: 0; transition: 0.3s; z-index: 1000; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    @keyframes breathe {
        0%, 100% { transform: scale(0.8); opacity: 0.6; }
        50% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 30px 10px rgba(203, 163, 122, 0.5); }
    }
</style>
</head>
<body>

<div class="app-container">
    <div class="nav-top">
        <a href="index.html" class="back-btn">← 菩提客棧</a>
        <div style="font-size:11px; color:var(--text-dim); letter-spacing:4px;">行者觀照</div>
    </div>

    <div class="profile-section">
        <div class="avatar-box" onclick="document.getElementById('avatarInput').click()">
            <div class="avatar-img" id="ui-avatar"></div>
            <div class="avatar-plus" id="avatarPlus">+</div>
            <input type="file" id="avatarInput" hidden accept="image/*" onchange="handleAvatar(event)">
        </div>
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-num" id="ui-ami">0</div>
                <div class="stat-lbl">專念彌陀</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="ui-oth">0</div>
                <div class="stat-lbl">普念諸佛</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="ui-warmth" style="color:var(--accent-gold);">0</div>
                <div class="stat-lbl">菩提資糧</div>
            </div>
        </div>
    </div>

    <div class="bio-section">
        <div class="bio-name">妙依</div>
        <div class="bio-rank" id="ui-rank-title">一真法界 ‧ 菩提種子</div>
        <input type="text" class="memo-input" id="ui-memo" placeholder="寫下今日發心，儲存於本地守護...">
    </div>

    <div class="bodhi-stage">
        <div class="time-diff">
            娑婆當下 <span id="time-earth">--:--:--</span><br>
            <span style="color:var(--accent-gold); margin-top:4px; display:block;">娑婆一日 ‧ 極樂百歲</span>
        </div>
        <div class="lotus-container" id="lotus-svg"></div>
        <div class="seed-core" id="seed-core"></div>
    </div>

    <div class="action-row">
        <button class="chart-btn" onclick="toggleChart()">大數據觀照</button>

        <div class="btn-item" onclick="addAmi(event)">
            <div class="btn-circle">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-main)" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/>
                </svg>
            </div>
            <div class="btn-lbl">專念彌陀</div>
        </div>

        <div class="btn-item" id="btn-oth" onmousedown="startPress()" onmouseup="endPress(event)" ontouchstart="startPress()" ontouchend="endPress(event)">
            <div class="btn-circle">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-main)" stroke-width="1.5">
                    <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5Z"/>
                </svg>
                <svg class="ring-svg"><circle cx="24" cy="24" r="23"></circle></svg>
            </div>
            <div class="btn-lbl">普念諸佛</div>
        </div>
    </div>
</div>

<div id="chartModal" class="modal-bg" onclick="toggleChart()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h3 style="margin-top:0; color:var(--accent-gold); font-weight:400; letter-spacing:2px; font-size:16px;">修持大數據</h3>
        <p style="font-size:11px; color:var(--text-dim); margin-bottom:20px;">近七日專念彌陀趨勢觀照</p>
        
        <div id="chart-container" style="width:100%; height:160px; border-bottom:1px solid rgba(255,255,255,0.1);"></div>
        
        <button onclick="toggleChart()" style="width:100%; margin-top:25px; padding:12px; background:transparent; border:1px solid var(--glass-border); color:var(--text-main); border-radius:12px; cursor:pointer;">收合</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // --- 聲音引擎 (純原生) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // --- 核心數據 (100% 本地儲存) ---
    let ami = parseInt(localStorage.getItem('personal_ami') || '0');
    let oth = parseInt(localStorage.getItem('personal_oth') || '0');
    let warmth = parseInt(localStorage.getItem('pure_land_warmth') || '0');
    let pendingWarmth = parseInt(localStorage.getItem('pending_warmth') || '0');
    
    // 假定一個主系統紀錄的 7 日數據陣列 (若本地無資料，給予預設起伏)
    let historyData = JSON.parse(localStorage.getItem('ami_7days') || '[12, 45, 30, 80, 50, 90, 0]');

    // --- 連續登入與資糧邏輯 ---
    function checkDailyEntry() {
        const lastDate = localStorage.getItem('last_entry_date');
        const today = new Date().toDateString();
        let streak = parseInt(localStorage.getItem('entry_streak') || '0');

        if (lastDate !== today) {
            pendingWarmth += 10;
            if (pendingWarmth >= 100) {
                warmth += 100;
                pendingWarmth -= 100;
                showToast("十日圓滿，百點資糧已歸入道場");
            }
            localStorage.setItem('pending_warmth', pendingWarmth);
            localStorage.setItem('pure_land_warmth', warmth);

            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            if (lastDate === yesterday.toDateString()) streak++;
            else streak = 1;
            
            localStorage.setItem('entry_streak', streak);
            localStorage.setItem('last_entry_date', today);
            
            // 每日更新圖表資料列 (將昨天的總數推進陣列)
            historyData.shift();
            historyData.push(ami);
            localStorage.setItem('ami_7days', JSON.stringify(historyData));
        }
    }

    // --- 互動與計數 ---
    function addAmi(e) {
        ami++;
        playSound(880, 'sine', 0.5); // 罄聲
        fly(e, '#CBA37A');
        updateUI();
    }

    let pressTimer;
    let isLong = false;
    function startPress() {
        isLong = false;
        document.getElementById('btn-oth').classList.add('pressing');
        pressTimer = setTimeout(() => {
            isLong = true;
            oth = 0;
            playSound(220, 'square', 0.6); // 低沉木魚歸零聲
            document.getElementById('seed-core').style.transform = 'scale(0.1)';
            setTimeout(() => document.getElementById('seed-core').style.transform = '', 300);
            updateUI();
            showToast("心念收攏，歸於清淨");
        }, 1500);
    }
    function endPress(e) {
        clearTimeout(pressTimer);
        document.getElementById('btn-oth').classList.remove('pressing');
        if(!isLong) {
            oth++;
            playSound(440, 'triangle', 0.3); // 輕快木魚
            fly(e, '#EAEAEA');
            updateUI();
        }
    }

    // --- 更新與蓮花渲染 ---
    function updateUI() {
        localStorage.setItem('personal_ami', ami);
        localStorage.setItem('personal_oth', oth);
        document.getElementById('ui-ami').innerText = ami;
        document.getElementById('ui-oth').innerText = oth;
        document.getElementById('ui-warmth').innerText = warmth;
        
        // 菩提總分公式：念佛 + 資糧(權重高)
        const score = ami + oth + (warmth * 5);
        renderLotus(score);
    }

    function renderLotus(score) {
        const container = document.getElementById('lotus-svg');
        const rankText = document.getElementById('ui-rank-title');
        
        let layers = 0;
        let colorGrad = [];
        let rankName = "初發心";

        if (score < 10) { container.innerHTML = ''; rankText.innerText = `一真法界 ‧ 菩提種子`; return; }
        else if (score < 100) { layers = 1; rankName = "清淨"; colorGrad = ["#FFFFFF", "rgba(255,255,255,0.1)"]; }
        else if (score < 1000){ layers = 2; rankName = "慈悲"; colorGrad = ["#A2D2FF", "rgba(162,210,255,0.1)"]; }
        else if (score < 5000){ layers = 3; rankName = "智慧"; colorGrad = ["#CDB4DB", "rgba(205,180,219,0.1)"]; }
        else if (score < 10000){layers = 4; rankName = "行願"; colorGrad = ["#B7E4C7", "rgba(183,228,199,0.1)"]; }
        else if (score < 50000){layers = 5; rankName = "幻彩"; colorGrad = ["#FFD6A5", "rgba(189,178,255,0.2)"]; }
        else { layers = 6; rankName = "圓滿金蓮"; colorGrad = ["#CBA37A", "rgba(203,163,122,0.3)"]; }

        rankText.innerText = `一真法界 ‧ ${rankName}`;

        let svgHtml = `<svg viewBox="-150 -150 300 300" style="width:100%; height:100%; overflow:visible;">
            <defs>
                <linearGradient id="petalGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="rgba(5,5,5,0.9)"/>
                    <stop offset="50%" stop-color="${colorGrad[1]}"/>
                    <stop offset="100%" stop-color="${colorGrad[0]}"/>
                </linearGradient>
            </defs>`;

        for (let l = layers; l > 0; l--) {
            const scale = 0.3 + (l * 0.15); 
            const offsetAngle = (l % 2 === 0) ? 22.5 : 0; 
            for (let i = 0; i < 8; i++) {
                const angle = i * 45 + offsetAngle;
                svgHtml += `<g transform="rotate(${angle}) scale(${scale})">
                    <path d="M0 0 C25 -50 40 -100 0 -150 C-40 -100 -25 -50 0 0" fill="url(#petalGrad)" stroke="${colorGrad[0]}" stroke-width="0.5" opacity="0.8"/>
                </g>`;
            }
        }
        svgHtml += `</svg>`;
        container.innerHTML = svgHtml;
        container.style.transform = `rotate(${score * 0.2}deg)`;
    }

    // --- 大數據圖表 (貝茲曲線繪製) ---
    function toggleChart() {
        const m = document.getElementById('chartModal');
        if(!m.classList.contains('show')) drawChart();
        m.classList.toggle('show');
    }

    function drawChart() {
        const box = document.getElementById('chart-container');
        // 同步最後一筆資料為當前 ami
        historyData[historyData.length - 1] = Math.max(historyData[historyData.length - 1], ami);
        
        const maxVal = Math.max(...historyData, 10); // 避免除以0
        const w = box.clientWidth;
        const h = 140; // 預留底部文字空間
        const step = w / 6;

        let pathD = `M0,${h - (historyData[0]/maxVal)*h}`;
        let pointsHtml = '';

        for(let i = 0; i < 7; i++) {
            const x = i * step;
            const y = h - (historyData[i] / maxVal) * h;
            
            if(i > 0) {
                const prevX = (i - 1) * step;
                const prevY = h - (historyData[i-1] / maxVal) * h;
                const cp1X = prevX + step/2;
                const cp1Y = prevY;
                const cp2X = x - step/2;
                const cp2Y = y;
                pathD += ` C${cp1X},${cp1Y} ${cp2X},${cp2Y} ${x},${y}`;
            }
            // 繪製資料點
            pointsHtml += `<circle cx="${x}" cy="${y}" r="3" fill="#0A0A0C" stroke="#CBA37A" stroke-width="2"/>`;
        }

        box.innerHTML = `<svg width="100%" height="100%" style="overflow:visible;">
            <path d="${pathD}" fill="none" stroke="#CBA37A" stroke-width="2"/>
            ${pointsHtml}
        </svg>`;
    }

    // --- 輔助功能 ---
    function fly(e, color) {
        const dot = document.createElement('div');
        dot.className = 'particle';
        dot.style.background = color;
        dot.style.left = e.clientX + 'px';
        dot.style.top = e.clientY + 'px';
        document.body.appendChild(dot);
        const target = document.getElementById('seed-core').getBoundingClientRect();
        dot.animate([
            { left: e.clientX + 'px', top: e.clientY + 'px', transform: 'scale(1)', opacity: 1 },
            { left: (target.left) + 'px', top: (target.top) + 'px', transform: 'scale(0.2)', opacity: 0 }
        ], { duration: 800, easing: 'ease-in-out' }).onfinish = () => dot.remove();
    }

    function handleAvatar(e) {
        const reader = new FileReader();
        reader.onload = ev => {
            document.getElementById('ui-avatar').style.backgroundImage = `url(${ev.target.result})`;
            document.getElementById('avatarPlus').style.display = 'none';
            localStorage.setItem('traveler_avatar', ev.target.result);
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    window.onload = () => {
        checkDailyEntry();
        const av = localStorage.getItem('traveler_avatar');
        if(av) {
            document.getElementById('ui-avatar').style.backgroundImage = `url(${av})`;
            document.getElementById('avatarPlus').style.display = 'none';
        }
        document.getElementById('ui-memo').value = localStorage.getItem('traveler_memo') || '';
        document.getElementById('ui-memo').oninput = e => localStorage.setItem('traveler_memo', e.target.value);
        updateUI();
        setInterval(() => { document.getElementById('time-earth').innerText = new Date().toLocaleTimeString(); }, 1000);
    };
</script>
</body>
</html>
