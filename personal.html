<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>菩提心室 ‧ 終極蓮花測試</title>
    <style>
        :root { --bg: #010103; --gold: #f3e5ab; --solid: #d4af37; --cyan: #8ba89c; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: "PingFang TC", serif; height: 100dvh; overflow: hidden; }
        
        /* 隱形作弊區：點一次 +1000，方便測試破萬點與三萬點 */
        .dev-zone { position: absolute; top: 20px; left: 20px; padding: 10px; z-index: 2000; color: #555; font-size: 11px; cursor: pointer; letter-spacing: 2px; }
        .dev-zone:active { color: var(--gold); }

        .stage { height: 70vh; display: flex; justify-content: center; align-items: center; position: relative; }
        /* 蓮花容器：加入呼吸動畫 */
        #lotus-container { width: 85vw; height: 85vw; max-width: 320px; max-height: 320px; animation: breathe 4s infinite ease-in-out; display: flex; justify-content: center; align-items: center; position: relative; }
        .seed { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px #fff; z-index: 10; }

        @keyframes breathe { 0%, 100% { transform: scale(0.96); } 50% { transform: scale(1.04); } }

        .footer { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        .score-display { font-size: 26px; color: var(--solid); letter-spacing: 4px; margin-bottom: 10px; cursor: pointer; text-shadow: 0 0 15px rgba(212,175,55,0.4); }
        .main-btn { width: 68px; height: 68px; border-radius: 50%; border: 1px solid var(--solid); background: rgba(212,175,55,0.05); margin: 0 auto; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .main-btn:active { transform: scale(0.9); background: rgba(212,175,55,0.2); }
    </style>
</head>
<body>

<svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
    <defs>
        <linearGradient id="grad-10" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.8)"/><stop offset="100%" stop-color="rgba(255,255,255,0.2)"/>
        </linearGradient>
        <linearGradient id="grad-20" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="rgba(225,190,231,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.2)"/>
        </linearGradient>
        <linearGradient id="grad-50" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="rgba(178,223,219,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.2)"/>
        </linearGradient>
        <linearGradient id="grad-100" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="rgba(212,175,55,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.4)"/>
        </linearGradient>
        <linearGradient id="grad-200" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="rgba(30,30,30,0.9)"/><stop offset="100%" stop-color="rgba(212,175,55,0.8)"/>
        </linearGradient>
        <linearGradient id="rainbow-glass" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
            <stop offset="25%" stop-color="#e0f7fa" stop-opacity="0.7"/>
            <stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6"/>
            <stop offset="75%" stop-color="#fce4ec" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#9c27b0" stop-opacity="0.4"/>
        </linearGradient>
        <linearGradient id="grad-30000" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#ffeb3b" stop-opacity="1"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
        </linearGradient>
    </defs>
</svg>

<div class="dev-zone" onclick="addCheat()">作弊 (+1000點)</div>

<div class="stage">
    <div class="seed"></div>
    <div id="lotus-container"></div>
</div>

<div class="footer">
    <div class="score-display" id="ui-pts" onclick="resetPts()">0</div>
    <div style="font-size:10px; color:var(--cyan); margin-bottom:20px; letter-spacing:2px;">菩提資糧 ‧ <span id="ui-rank">一真法界</span></div>
    <div class="main-btn" onclick="addCount()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
    </div>
</div>

<script>
    let pts = 0;
    let clickAcc = 0;

    // 點擊一次加 1000 點，保護妙依的手指
    function addCheat() { pts += 1000; updateUI(); }
    function resetPts() { if(confirm("確定歸零重啟？")) { pts=0; updateUI(); } }

    function addCount() {
        clickAcc++;
        if(clickAcc >= 100) { pts += 10; clickAcc = 0; }
        updateUI();
    }

    function updateUI() {
        document.getElementById('ui-pts').innerText = pts;
        renderLotus(pts);
    }

    // 終極蓮花演算法
    function renderLotus(p) {
        const box = document.getElementById('lotus-container');
        const rank = document.getElementById('ui-rank');
        if(p < 10) { box.innerHTML = ''; rank.innerText = "一真法界"; box.style.filter = "none"; return; }

        let layers = 1;
        let fillGrad = "url(#grad-10)";
        let strokeColor = "rgba(255,255,255,0.6)";
        let rankTxt = "清淨萌芽";
        let extraFilter = "none";

        if(p >= 20) { fillGrad = "url(#grad-20)"; rankTxt = "慈悲長養"; }
        if(p >= 50) { fillGrad = "url(#grad-50)"; rankTxt = "智慧生機"; }
        
        // 100點：長出第二層
        if(p >= 100) { layers = 2; fillGrad = "url(#grad-100)"; strokeColor = "rgba(243,229,171,0.6)"; rankTxt = "聖潔金蓮"; }
        
        // 200點：黑金
        if(p >= 200) { layers = 2; fillGrad = "url(#grad-200)"; strokeColor = "rgba(212,175,55,0.8)"; rankTxt = "黑金蛻變"; }
        
        // 1000點：幻彩琉璃 (抄襲你的 rainbow-glass)
        if(p >= 1000) { 
            layers = 2; 
            fillGrad = "url(#rainbow-glass)"; 
            strokeColor = "rgba(255,255,255,0.5)"; 
            rankTxt = "幻彩琉璃"; 
        }

        // 10000點、20000點：極慢速色澤提升 (利用 filter 色相旋轉，產生更深邃的琉璃折射)
        if(p >= 10000 && p < 30000) {
            layers = 2; 
            fillGrad = "url(#rainbow-glass)"; 
            let level = Math.floor(p / 10000);
            extraFilter = `hue-rotate(${level * 45}deg) brightness(${1 + level * 0.2})`;
            rankTxt = `幻彩琉璃 ‧ ${level}轉`;
        }

        // 30000點：永恆耀金
        if(p >= 30000) { 
            layers = 2; 
            fillGrad = "url(#grad-30000)"; 
            strokeColor = "#fff";
            extraFilter = "drop-shadow(0 0 20px #ffeb3b)";
            rankTxt = "大圓滿耀金"; 
        }

        rank.innerText = rankTxt;
        box.style.filter = extraFilter;

        let svg = `<svg viewBox="-150 -150 300 300" style="width:100%; height:100%; overflow:visible;">`;

        for (let l = layers; l > 0; l--) {
            const sc = 0.4 + (l * 0.25);
            for (let i = 0; i < 8; i++) {
                // 緩慢的整體旋轉 + 角度分配
                const ang = i * 45 + (l * 22.5) + (p * 0.05); 
                
                // ✨ 100% 抄襲 88佛 的二次貝茲曲線 (Q) 演算法，捨棄粗糙的 C 曲線 ✨
                svg += `<g transform="rotate(${ang}) scale(${sc})">
                    <path d="M 0 0 Q 30 -60 0 -120 Q -30 -60 0 0" fill="${fillGrad}" stroke="${strokeColor}" stroke-width="1.5" opacity="0.9"/>
                </g>`;
            }
        }
        svg += `</svg>`;
        box.innerHTML = svg;
    }

    updateUI();
</script>
</body>
</html>
