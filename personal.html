<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>菩提心室 ‧ 最終進化測試</title>
    <style>
        :root { --bg: #010103; --gold: #f3e5ab; --solid: #d4af37; --cyan: #8ba89c; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: "PingFang TC", serif; height: 100dvh; overflow: hidden; }
        
        /* 隱形作弊點擊區：點擊「行者觀照」加 100 點，快速測試千日與萬日 */
        .dev-zone { position: absolute; top: 20px; left: 20px; padding: 10px; z-index: 2000; color: #333; font-size: 10px; cursor: pointer; letter-spacing: 2px; }

        .stage { height: 70vh; display: flex; justify-content: center; align-items: center; position: relative; }
        #lotus-svg { width: 85vw; height: 85vw; max-width: 320px; max-height: 320px; animation: lotus-breathe 4s infinite ease-in-out; }
        .seed { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px #fff; z-index: 10; }

        @keyframes lotus-breathe { 0%, 100% { transform: scale(0.96) rotate(0deg); } 50% { transform: scale(1.04) rotate(5deg); } }

        .footer { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        .score-display { font-size: 24px; color: var(--solid); letter-spacing: 4px; margin-bottom: 10px; cursor: pointer; }
        .main-btn { width: 68px; height: 68px; border-radius: 50%; border: 1px solid var(--solid); background: rgba(212,175,55,0.05); margin: 0 auto; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .main-btn:active { transform: scale(0.9); background: rgba(212,175,55,0.2); }

        /* 100% 抄襲自妙依原版：毛玻璃送禮畫面 CSS */
        #treasure-overlay {
            position: fixed; inset: 0; z-index: 3000; background: rgba(1, 1, 3, 0.95);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #treasure-overlay.show { display: flex; opacity: 1; }
        .t-svg-wrap { width: 100%; height: 35%; display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.4)); animation: float-pulse 4s infinite ease-in-out; }
        @keyframes float-pulse { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); filter: drop-shadow(0 0 35px rgba(243, 229, 171, 0.8)); } }
        .t-text-group { text-align: center; margin-top: 30px; }
        .t-name { color: #fff; font-size: 1.15rem; letter-spacing: 4px; text-shadow: 0 0 15px #fff, 0 0 30px #d4af37; margin-bottom: 10px; }
    </style>
</head>
<body>

<svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
    <defs>
        <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9" /><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6" /><stop offset="100%" stop-color="#d4af37" stop-opacity="0.2" /></linearGradient>
        <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
        <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.1"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.7"/></linearGradient>
        <linearGradient id="facet-cyan" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.9"/><stop offset="100%" stop-color="#00838f" stop-opacity="0.4"/></linearGradient>
        <linearGradient id="facet-rose" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="100%" stop-color="#c2185b" stop-opacity="0.5"/></linearGradient>
        <linearGradient id="rainbow-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff9a9e"/><stop offset="33%" stop-color="#f3e5ab"/><stop offset="66%" stop-color="#e0f7fa"/><stop offset="100%" stop-color="#c2185b"/></linearGradient>
    </defs>
</svg>

<div class="dev-zone" onclick="addCheat()">行者觀照 (+100 點)</div>

<div id="treasure-overlay" onclick="this.classList.remove('show')">
    <div class="t-svg-wrap" id="t-svg-ui"></div>
    <div class="t-text-group">
        <div class="t-name" id="t-name-ui"></div>
        <div style="color:var(--gold); font-size:0.9rem; letter-spacing:2px;">法界感應 ‧ 迴向願力</div>
    </div>
</div>

<div class="stage">
    <div class="seed"></div>
    <div id="lotus-svg"></div>
</div>

<div class="footer">
    <div class="score-display" id="ui-pts" onclick="resetPts()">0</div>
    <div style="font-size:10px; color:var(--cyan); margin-bottom:20px; letter-spacing:2px;">菩提資糧 ‧ <span id="ui-rank">一真法界</span></div>
    <div class="main-btn" onclick="addCount()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
    </div>
</div>

<script>
    let pts = 0;
    let clickAcc = 0;

    // 100% 抄襲自多寶格代碼的寶物 SVG
    const treasures = [
        { name: "幾何慧劍", svg: `<svg viewBox="0 0 100 150"><g transform="translate(0, 5)"><polygon points="50,10 56,40 50,105 44,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="50,10 56,40 50,105" fill="url(#facet-cyan)" opacity="0.8"/><polygon points="50,10 44,40 50,105" fill="url(#facet-dark)" opacity="0.6"/><polygon points="35,100 65,100 55,110 45,110" fill="url(#pure-glass)" stroke="#d4af37" stroke-width="0.8"/><circle cx="50" cy="105" r="4" fill="#fff" filter="drop-shadow(0 0 8px #e0f7fa)"/></g></svg>` },
        { name: "琉璃淨瓶", svg: `<svg viewBox="0 0 100 150"><g transform="translate(0, 10)"><polygon points="45,25 55,25 58,50 42,50" fill="url(#facet-light)" stroke="#f3e5ab" stroke-width="0.3"/><polygon points="42,50 58,50 72,95 28,95" fill="url(#facet-cyan)" stroke="#fff" stroke-width="0.5"/><ellipse cx="50" cy="95" rx="22" ry="6" fill="rgba(255,255,255,0.4)"/><circle cx="50" cy="80" r="10" fill="rgba(255,255,255,0.8)"/></g></svg>` },
        { name: "多面寶珠", svg: `<svg viewBox="0 0 100 150"><g transform="translate(0, 20)"><polygon points="50,15 85,45 50,65 15,45" fill="url(#facet-light)" stroke="#fff" stroke-width="0.8"/><polygon points="15,45 50,65 50,115 25,85" fill="url(#facet-rose)" opacity="0.9" stroke="#fff" stroke-width="0.5"/><polygon points="85,45 50,65 50,115 75,85" fill="url(#facet-dark)" opacity="0.8" stroke="#fff" stroke-width="0.5"/><circle cx="50" cy="65" r="5" fill="#fff"/></g></svg>` }
    ];

    function addCheat() { pts += 100; checkGift(); updateUI(); }
    function resetPts() { if(confirm("歸零重啟觀照？")) { pts=0; updateUI(); } }

    function addCount() {
        clickAcc++;
        if(clickAcc >= 100) { pts += 10; clickAcc = 0; checkGift(); }
        updateUI();
    }

    function checkGift() {
        // 每 30 點觸發一次送禮測試
        if(pts > 0 && pts % 30 === 0) {
            const t = treasures[Math.floor(Math.random()*treasures.length)];
            document.getElementById('t-svg-ui').innerHTML = t.svg;
            document.getElementById('t-name-ui').innerText = t.name;
            document.getElementById('treasure-overlay').classList.add('show');
        }
    }

    function updateUI() {
        document.getElementById('ui-pts').innerText = pts;
        renderLotus(pts);
    }

    // 蓮花進化邏輯：嚴格對齊 10、20、50、100、1000、30000 點
    function renderLotus(p) {
        const box = document.getElementById('lotus-svg');
        const rank = document.getElementById('ui-rank');
        if(p < 10) { box.innerHTML = ''; rank.innerText = "一真法界"; return; }

        let layers = 1;
        let color = "rgba(255,255,255,0.8)"; // 10點：琉璃白
        let rankTxt = "清淨萌芽";

        if(p >= 20) { color = "url(#facet-rose)"; rankTxt = "慈悲長養"; }
        if(p >= 50) { color = "url(#facet-cyan)"; rankTxt = "智慧生機"; }
        if(p >= 100) { layers = 2; color = "url(#facet-dark)"; rankTxt = "聖潔金蓮"; }
        
        // 每 100 點變換色澤 (黑金系列測試)
        if(p >= 200 && p < 1000) {
            const blackGolds = ["#444", "#222", "#333", "#555"];
            color = blackGolds[Math.floor(p/100) % 4];
            rankTxt = "黑金蛻變";
        }

        if(p >= 1000) { layers = 2; color = "url(#rainbow-glass)"; rankTxt = "幻彩琉璃"; }
        if(p >= 30000) { layers = 2; color = "#fff"; rankTxt = "大圓滿亮金"; }

        rank.innerText = rankTxt;

        let svg = `<svg viewBox="-150 -150 300 300" style="width:100%; height:100%;">
            <defs>
                <linearGradient id="pGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="${p >= 100 ? 'transparent' : 'white'}"/>
                </linearGradient>
            </defs>`;

        for (let l = layers; l > 0; l--) {
            const sc = 0.4 + (l * 0.25);
            for (let i = 0; i < 8; i++) {
                const ang = i * 45 + (l * 22.5);
                // 採用你最滿意的絕美瓣片路徑
                svg += `<g transform="rotate(${ang}) scale(${sc})">
                    <path d="M0 0 C25 -50 40 -100 0 -150 C-40 -100 -25 -50 0 0" fill="${color}" stroke="${p >= 1000 ? 'none' : color}" stroke-width="0.3" opacity="0.85"/>
                </g>`;
            }
        }
        svg += `</svg>`;
        box.innerHTML = svg;
    }

    updateUI();
</script>
</body>
</html>
