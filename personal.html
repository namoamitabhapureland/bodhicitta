<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>菩提心室 ‧ 100至1000精細過渡色票</title>
    <style>
        :root { --bg: #010103; --gold: #f3e5ab; --solid: #d4af37; --cyan: #8ba89c; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: "PingFang TC", serif; padding: 20px; }
        
        .header { text-align: center; padding: 20px 0 30px; border-bottom: 1px solid rgba(243, 229, 171, 0.2); margin-bottom: 30px; }
        .header h1 { color: var(--gold); letter-spacing: 4px; font-weight: normal; margin: 0 0 10px 0; font-size: 20px; }
        .header p { color: var(--cyan); font-size: 12px; letter-spacing: 2px; margin: 0; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto; }
        
        .lotus-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px 5px; display: flex; flex-direction: column; align-items: center; }
        
        .svg-wrap { width: 120px; height: 120px; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; position: relative; }
        .svg-wrap svg { width: 100%; height: 100%; animation: breathe 4s infinite ease-in-out; }
        .seed { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 0 0 15px #fff; }

        @keyframes breathe { 0%, 100% { transform: scale(0.96) rotate(0deg); } 50% { transform: scale(1.04) rotate(5deg); } }

        .info { text-align: center; }
        .pts { color: var(--solid); font-size: 14px; letter-spacing: 2px; margin-bottom: 4px; font-weight: bold; }
        .name { color: #fff; font-size: 11px; letter-spacing: 2px; margin-bottom: 6px; }
    </style>
</head>
<body>

<svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
    <defs>
        <linearGradient id="grad-10" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
        </linearGradient>
        
        <linearGradient id="grad-50" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#f8bbd0" stop-opacity="0.9"/><stop offset="100%" stop-color="#fce4ec" stop-opacity="0.4"/>
        </linearGradient>

        <linearGradient id="grad-100" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="rgba(212,175,55,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.2)"/>
        </linearGradient>

        <linearGradient id="grad-300" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#80deea" stop-opacity="0.9"/><stop offset="100%" stop-color="#e0f7fa" stop-opacity="0.3"/>
        </linearGradient>

        <linearGradient id="grad-500" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#a5d6a7" stop-opacity="0.9"/><stop offset="100%" stop-color="#e8f5e9" stop-opacity="0.3"/>
        </linearGradient>

        <linearGradient id="grad-700" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#ce93d8" stop-opacity="0.9"/><stop offset="100%" stop-color="#f3e5f5" stop-opacity="0.3"/>
        </linearGradient>

        <linearGradient id="grad-900" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#ffcc80" stop-opacity="0.9"/><stop offset="100%" stop-color="#fff3e0" stop-opacity="0.3"/>
        </linearGradient>

        <linearGradient id="grad-1000" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#ff9a9e" stop-opacity="0.9"/>
            <stop offset="50%" stop-color="#fad0c4" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#a1c4fd" stop-opacity="0.7"/>
        </linearGradient>
    </defs>
</svg>

<div class="header">
    <h1>10 點至 1000 點 ‧ 精細過渡色票</h1>
    <p>解決單調感，每 200 點替換純淨琉璃色</p>
</div>

<div class="gallery" id="gallery"></div>

<script>
    const stages = [
        { pts: 10, name: "清淨萌芽", grad: "url(#grad-10)", stroke: "rgba(255,255,255,0.6)", layers: 1 },
        { pts: 50, name: "慈悲初現", grad: "url(#grad-50)", stroke: "rgba(255,255,255,0.6)", layers: 1 },
        { pts: 100, name: "聖潔初金", grad: "url(#grad-100)", stroke: "rgba(212,175,55,0.6)", layers: 2 },
        { pts: 300, name: "空靈水藍", grad: "url(#grad-300)", stroke: "rgba(255,255,255,0.4)", layers: 2 },
        { pts: 500, name: "琉璃翠玉", grad: "url(#grad-500)", stroke: "rgba(255,255,255,0.4)", layers: 2 },
        { pts: 700, name: "紫氣祥雲", grad: "url(#grad-700)", stroke: "rgba(255,255,255,0.4)", layers: 2 },
        { pts: 900, name: "赤金朝霞", grad: "url(#grad-900)", stroke: "rgba(255,255,255,0.4)", layers: 2 },
        { pts: 1000, name: "初心幻彩", grad: "url(#grad-1000)", stroke: "rgba(255,255,255,0.4)", layers: 2 }
    ];

    const gallery = document.getElementById('gallery');

    stages.forEach(s => {
        let svg = `<svg viewBox="-150 -150 300 300">`;
        for (let l = s.layers; l > 0; l--) {
            const sc = 0.4 + (l * 0.25);
            for (let i = 0; i < 8; i++) {
                const ang = i * 45 + (l * 22.5);
                svg += `<g transform="rotate(${ang}) scale(${sc})">
                    <path d="M 0 0 Q 30 -60 0 -120 Q -30 -60 0 0" fill="${s.grad}" stroke="${s.stroke}" stroke-width="1.5" opacity="0.9"/>
                </g>`;
            }
        }
        svg += `</svg>`;

        gallery.innerHTML += `
            <div class="lotus-card">
                <div class="svg-wrap">
                    <div class="seed"></div>
                    ${svg}
                </div>
                <div class="info">
                    <div class="pts">${s.pts} 點</div>
                    <div class="name">${s.name}</div>
                </div>
            </div>
        `;
    });
</script>
</body>
</html>
