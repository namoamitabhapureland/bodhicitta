<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>菩提心室 ‧ 蓮花與寶物測試</title>
    <style>
        :root {
            --bg-deep: #010103; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: var(--bg-deep); color: #d0d0d0; font-family: "PingFang TC", serif; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        
        /* 星空背景 */
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        .app-wrapper { width: 100%; max-width: 480px; display: flex; flex-direction: column; position: relative; z-index: 10; height: 100dvh; }

        /* 頂部導航 */
        .nav-top { padding: max(20px, env(safe-area-inset-top)) 25px 10px; display: flex; justify-content: space-between; align-items: center; }
        .dev-trigger { font-size: 10px; color: #555; letter-spacing: 3px; cursor: pointer; transition: 0.3s; }
        .dev-trigger:active { color: var(--gold); }

        /* 數據區 */
        .stats-row { padding: 10px 25px; display: flex; justify-content: space-around; text-align: center; }
        .stat-num { font-size: 18px; font-weight: 300; color: #fff; }
        .stat-lbl { font-size: 9px; color: var(--cyan); letter-spacing: 1px; margin-top: 4px; }

        /* 中央舞台與蓮花 */
        .bodhi-stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        .lotus-container { 
            width: 70vw; height: 70vw; max-width: 280px; max-height: 280px; 
            display: flex; justify-content: center; align-items: center; 
            transition: transform 0.5s ease-out; position: relative;
            animation: lotus-breathe 4s infinite ease-in-out;
        }
        .seed-core { position: absolute; width: 6px; height: 6px; background: #FFF; border-radius: 50%; box-shadow: 0 0 20px 5px rgba(255,255,255,0.8); z-index: 10; }

        /* 蓮花動畫：旋轉 + 呼吸 */
        @keyframes lotus-breathe {
            0%, 100% { transform: scale(0.97) rotate(0deg); }
            50% { transform: scale(1.03) rotate(5deg); }
        }

        /* 底部按鈕 */
        .action-row { padding: 10px 25px max(35px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .main-btn { 
            width: 68px; height: 68px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(243, 229, 171, 0.2); color: var(--gold); 
            cursor: pointer; transition: 0.2s;
        }
        .main-btn:active { transform: scale(0.9); background: rgba(212, 175, 55, 0.2); }

        /* ✨ 抄襲自妙依的原版毛玻璃送禮畫面 ✨ */
        #treasure-overlay {
            position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #treasure-overlay.show { opacity: 1; pointer-events: auto; }
        .treasure-svg { width: 120px; height: 120px; margin-bottom: 30px; filter: drop-shadow(0 0 20px var(--gold)); animation: float 4s infinite ease-in-out; }
        .treasure-msg { color: var(--gold); letter-spacing: 5px; font-size: 16px; margin-bottom: 10px; }
        .treasure-sub { color: var(--cyan); font-size: 11px; letter-spacing: 2px; text-align: center; line-height: 1.8; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .particle { position: absolute; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 50;}
    </style>
</head>
<body oncontextmenu="return false;">

<canvas id="starCanvas"></canvas>

<div id="treasure-overlay" onclick="closeTreasure()">
    <div class="treasure-svg" id="treasure-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
    </div>
    <div class="treasure-msg">【 諸佛結緣 】</div>
    <div class="treasure-sub" id="treasure-name">獲得法寶：淨世琉璃瓶<br><span style="opacity:0.5; font-size:9px;">點擊畫面收攝願力</span></div>
</div>

<div class="app-wrapper">
    <div class="nav-top">
        <div class="dev-trigger" onclick="applyCheat()">行者觀照</div>
        <div id="ui-rank" style="font-size:11px; color:var(--cyan); letter-spacing:2px;">一真法界</div>
        <div class="dev-trigger" onclick="resetAll()">歸零</div>
    </div>

    <div class="stats-row">
        <div><div class="stat-num" id="ui-click">0</div><div class="stat-lbl">今日念佛</div></div>
        <div><div class="stat-num" id="ui-points" style="color:var(--solid-gold);">0</div><div class="stat-lbl">菩提資糧</div></div>
    </div>

    <div class="bodhi-stage">
        <div class="seed-core"></div>
        <div class="lotus-container" id="lotus-box"></div>
    </div>

    <div class="action-row">
        <div style="font-size:10px; color:#444; letter-spacing:2px;">累積百聲 ‧ 增益資糧</div>
        <div class="main-btn" onclick="addCount(event)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
        </div>
    </div>
</div>

<script>
    // 數據狀態
    let clickCount = 0; // 今日念佛
    let bodhiPoints = 0; // 菩提點數 (資糧)
    let cheatClicks = 0;

    // 1. 作弊權限：點 5 次標題加 100 點
    function applyCheat() {
        cheatClicks++;
        if(cheatClicks >= 5) {
            bodhiPoints += 100;
            cheatClicks = 0;
            checkTreasure(); // 檢查是否送禮
            updateUI();
        }
    }

    // 2. 念佛邏輯：滿 100 聲送 10 點
    function addCount(e) {
        clickCount++;
        if(clickCount % 100 === 0) {
            bodhiPoints += 10;
            checkTreasure();
        }
        fly(e);
        updateUI();
    }

    // 3. 送禮邏輯 (抄襲妙依原本的多寶格觸發)
    function checkTreasure() {
        // 測試用：每增加 30 點點數就送一次禮
        if(bodhiPoints > 0 && bodhiPoints % 30 === 0) {
            const items = [
                { name: "智慧寶劍", svg: '<path d="M14.5 4l-10 10l2 2l10 -10zM17 7l3 -3M4 20l2 -2"/>' },
                { name: "淨世琉璃瓶", svg: '<path d="M9 3h6v3a4 4 0 0 1 4 4v9a2 2 0 0 1 -2 2H7a2 2 0 0 1 -2 -2v-9a4 4 0 0 1 4 -4V3z"/>' },
                { name: "如意摩尼珠", svg: '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4" fill="currentColor"/>' }
            ];
            const item = items[Math.floor(Math.random()*items.length)];
            document.getElementById('treasure-icon').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">${item.svg}</svg>`;
            document.getElementById('treasure-name').innerHTML = `獲得法寶：${item.name}<br><span style="opacity:0.5; font-size:9px;">點擊畫面收攝願力</span>`;
            document.getElementById('treasure-overlay').classList.add('show');
        }
    }

    function closeTreasure() {
        document.getElementById('treasure-overlay').classList.remove('show');
    }

    // 4. 蓮花進化邏輯 (點數唯一標準)
    function renderLotus(points) {
        const box = document.getElementById('lotus-box');
        const rank = document.getElementById('ui-rank');
        if(points < 10) { box.innerHTML = ''; rank.innerText = "一真法界"; return; }

        let layers = 1;
        let color = "#8ba89c"; // 預設白綠
        let rankText = "清淨萌芽";

        if(points >= 20) { color = "#e1bee7"; rankText = "慈悲長養"; }
        if(points >= 50) { color = "#b2dfdb"; rankText = "智慧生機"; }
        if(points >= 100) { layers = 2; color = "#d4af37"; rankText = "聖潔金蓮"; }
        
        // 100點後，每100點變換顏色
        if(points >= 200) {
            const hues = ["#d4af37", "#444", "#a28b6a", "#c0c0c0"]; 
            color = hues[Math.floor(points/100) % hues.length];
            rankText = `黑金蛻變 (${Math.floor(points/100)}階)`;
        }
        
        // 1000點彩色漸層
        if(points >= 1000) {
            color = "url(#rainbow)";
            rankText = "幻彩琉璃";
        }

        rank.innerText = rankText;

        let svg = `<svg viewBox="-150 -150 300 300" style="width:100%; height:100%; overflow:visible;">
            <defs>
                <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ff9a9e"/><stop offset="50%" stop-color="#fad0c4"/><stop offset="100%" stop-color="#a1c4fd"/>
                </linearGradient>
                <linearGradient id="pGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="transparent"/>
                    <stop offset="100%" stop-color="${color}"/>
                </linearGradient>
            </defs>`;

        for (let l = layers; l > 0; l--) {
            const sc = 0.4 + (l * 0.25);
            for (let i = 0; i < 8; i++) {
                svg += `<g transform="rotate(${i*45 + (l*22)}) scale(${sc})">
                    <path d="M0 0 C20 -40 35 -80 0 -120 C-35 -80 -20 -40 0 0" fill="url(#pGrad)" stroke="${color}" stroke-width="0.5" opacity="0.8"/>
                </g>`;
            }
        }
        svg += `</svg>`;
        box.innerHTML = svg;
    }

    function updateUI() {
        document.getElementById('ui-click').innerText = clickCount;
        document.getElementById('ui-points').innerText = bodhiPoints;
        renderLotus(bodhiPoints);
    }

    function resetAll() { if(confirm("確定歸零測試點數？")) { clickCount=0; bodhiPoints=0; updateUI(); } }

    function fly(e) {
        const d = document.createElement('div'); d.className='particle';
        const x = e.clientX || e.touches[0].clientX; const y = e.clientY || e.touches[0].clientY;
        d.style.left = x+'px'; d.style.top = y+'px'; document.body.appendChild(d);
        d.animate([{transform:'scale(1)', opacity:1}, {left:'50%', top:'50%', transform:'scale(0)', opacity:0}], 600).onfinish = ()=>d.remove();
    }

    // 星空背景渲染略...
    const canvas = document.getElementById('starCanvas'); const ctx = canvas.getContext('2d');
    function draw() {
        canvas.width=window.innerWidth; canvas.height=window.innerHeight;
        ctx.fillStyle="white"; for(let i=0;i<50;i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
        requestAnimationFrame(draw);
    }
    draw();
    updateUI();
</script>
</body>
</html>
