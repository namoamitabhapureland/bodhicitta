<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>菩提心室 ‧ 個人觀照</title>
<style>
    :root {
        --bg-main: #FDFDFD;
        --bg-grad: linear-gradient(135deg, #FDFDFD, #F5F2EF);
        --text-main: #58504A;
        --text-light: #968E86;
        --accent-gold: #CBA37A;
        --glass: rgba(255, 255, 255, 0.7);
        --border: rgba(203, 163, 122, 0.2);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0; padding: 0; background: var(--bg-grad); color: var(--text-main);
        font-family: -apple-system, "PingFang TC", sans-serif;
        height: 100dvh; display: flex; justify-content: center; overflow: hidden;
    }

    .app-container {
        width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; position: relative;
    }

    /* 頂部導航 */
    .nav-top {
        padding: max(20px, env(safe-area-inset-top)) 25px 10px;
        display: flex; justify-content: space-between; align-items: center;
    }
    .back-btn { color: var(--text-light); text-decoration: none; font-size: 13px; letter-spacing: 2px; }

    /* IG Profile 佈局 (防破格處理) */
    .profile-section {
        padding: 10px 25px; display: flex; align-items: center; gap: 20px;
    }
    .avatar-box {
        width: 80px; height: 80px; border-radius: 50%; border: 1px solid var(--accent-gold);
        padding: 3px; position: relative; flex-shrink: 0; cursor: pointer;
    }
    .avatar-img {
        width: 100%; height: 100%; border-radius: 50%; background: #eee;
        background-size: cover; background-position: center;
    }
    .avatar-plus { position: absolute; bottom: 0; right: 0; background: var(--accent-gold); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 16px; border: 2px solid white; }

    .stats-row {
        flex: 1; display: flex; justify-content: space-around; text-align: center;
    }
    .stat-item { flex: 1; min-width: 0; }
    .stat-num { font-size: 16px; font-weight: 500; color: var(--text-main); word-break: break-all; }
    .stat-lbl { font-size: 9px; color: var(--text-light); letter-spacing: 1px; margin-top: 4px; }

    /* 名字與備忘錄 */
    .bio-section { padding: 5px 25px 15px; border-bottom: 1px solid var(--border); }
    .bio-name { font-size: 15px; font-weight: 600; letter-spacing: 3px; }
    .bio-rank { font-size: 10px; color: var(--accent-gold); margin: 4px 0 10px; }
    .memo-input {
        width: 100%; background: transparent; border: none; font-size: 12px;
        color: var(--text-light); padding: 0; outline: none; border-bottom: 1px solid transparent;
    }
    .memo-input:focus { border-bottom-color: var(--border); }

    /* 中央舞台 */
    .bodhi-stage {
        flex: 1; position: relative; display: flex; flex-direction: column;
        justify-content: center; align-items: center;
    }
    .time-diff {
        position: absolute; top: 10px; right: 25px; text-align: right; font-size: 10px; color: var(--text-light); line-height: 1.6;
    }
    .lotus-container {
        width: 280px; height: 280px; display: flex; justify-content: center; align-items: center;
        transition: transform 1s ease;
    }
    .seed-core {
        position: absolute; width: 6px; height: 6px; background: var(--accent-gold); border-radius: 50%;
        box-shadow: 0 0 15px var(--accent-gold); animation: breathe 3s infinite;
    }

    /* 底部操作 */
    .action-row {
        padding: 20px 25px max(40px, env(safe-area-inset-bottom));
        display: flex; justify-content: space-around; align-items: center;
    }
    .btn-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
    .btn-circle {
        width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--accent-gold);
        display: flex; justify-content: center; align-items: center; background: var(--glass);
        transition: 0.2s; position: relative;
    }
    .btn-circle:active { transform: scale(0.9); }
    .btn-lbl { font-size: 10px; color: var(--text-light); letter-spacing: 2px; }

    /* 進度環 (長按) */
    .ring-svg { position: absolute; inset: -2px; transform: rotate(-90deg); pointer-events: none; }
    .ring-svg circle { fill: none; stroke: var(--accent-gold); stroke-width: 2; stroke-dasharray: 164; stroke-dashoffset: 164; transition: stroke-dashoffset 1.5s linear; }
    .pressing .ring-svg circle { stroke-dashoffset: 0; }

    /* 飛行動畫 */
    .particle { position: absolute; width: 4px; height: 4px; background: var(--accent-gold); border-radius: 50%; pointer-events: none; }

    @keyframes breathe {
        0%, 100% { transform: scale(0.8); opacity: 0.5; }
        50% { transform: scale(1.3); opacity: 1; }
    }
    
    /* Toast 提示 */
    .toast {
        position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
        background: rgba(88, 80, 74, 0.9); color: white; padding: 10px 20px;
        border-radius: 20px; font-size: 12px; opacity: 0; transition: 0.3s; z-index: 1000;
    }
    .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app-container">
    <div class="nav-top">
        <a href="index.html" class="back-btn">← 回道場</a>
        <div style="font-size:11px; color:var(--accent-gold); letter-spacing:3px;">BODHI SPACE</div>
    </div>

    <div class="profile-section">
        <div class="avatar-box" onclick="document.getElementById('avatarInput').click()">
            <div class="avatar-img" id="ui-avatar"></div>
            <div class="avatar-plus" id="avatarPlus">+</div>
            <input type="file" id="avatarInput" hidden accept="image/*" onchange="handleAvatar(event)">
        </div>
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-num" id="ui-ami">0</div>
                <div class="stat-lbl">專念彌陀</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="ui-oth">0</div>
                <div class="stat-lbl">普念諸佛</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="ui-worlds">0</div>
                <div class="stat-lbl">亮燈世界</div>
            </div>
        </div>
    </div>

    <div class="bio-section">
        <div class="bio-name">妙依</div>
        <div class="bio-rank" id="ui-rank-title">一真法界 ‧ 菩提種子</div>
        <input type="text" class="memo-input" id="ui-memo" placeholder="寫下今日發心，儲存於本地...">
    </div>

    <div class="bodhi-stage">
        <div class="time-diff">
            娑婆當下 <span id="time-earth">--:--:--</span><br>
            <span style="color:var(--accent-gold);">娑婆一日 ‧ 極樂百歲</span>
        </div>
        <div class="lotus-container" id="lotus-svg"></div>
        <div class="seed-core"></div>
    </div>

    <div class="action-row">
        <div class="btn-item" onclick="addAmi(event)">
            <div class="btn-circle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/>
                </svg>
            </div>
            <div class="btn-lbl">專念彌陀</div>
        </div>

        <div class="btn-item" id="btn-oth" onmousedown="startPress()" onmouseup="endPress(event)" ontouchstart="startPress()" ontouchend="endPress(event)">
            <div class="btn-circle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5Z"/>
                </svg>
                <svg class="ring-svg"><circle cx="26" cy="26" r="26"></circle></svg>
            </div>
            <div class="btn-lbl">普念諸佛</div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // --- 聲音引擎 ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // --- 核心邏輯 ---
    let ami = parseInt(localStorage.getItem('personal_ami') || '0');
    let oth = parseInt(localStorage.getItem('personal_oth') || '0');
    let worlds = JSON.parse(localStorage.getItem('unlocked_worlds') || '[]').length;
    let warmth = parseInt(localStorage.getItem('pure_land_warmth') || '0');
    let pendingWarmth = parseInt(localStorage.getItem('pending_warmth') || '0');

    // 連續進站邏輯
    function checkDailyEntry() {
        const lastDate = localStorage.getItem('last_entry_date');
        const today = new Date().toDateString();
        let streak = parseInt(localStorage.getItem('entry_streak') || '0');

        if (lastDate !== today) {
            // 每日進入，送資糧 10
            pendingWarmth += 10;
            if (pendingWarmth >= 100) {
                warmth += 100;
                pendingWarmth -= 100;
                showToast("十日圓滿，百點資糧已歸入主道場");
            }
            localStorage.setItem('pending_warmth', pendingWarmth);
            localStorage.setItem('pure_land_warmth', warmth);

            // 連續天數判斷
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            if (lastDate === yesterday.toDateString()) {
                streak++;
                if (streak >= 10) {
                    showToast("精進不停！連十日觀照獎勵已發放");
                    streak = 0; // 重置
                    // 這裡可以加菩提分數加成邏輯
                }
            } else {
                streak = 1;
            }
            localStorage.setItem('entry_streak', streak);
            localStorage.setItem('last_entry_date', today);
        }
    }

    function addAmi(e) {
        ami++;
        playSound(880, 'sine', 0.5); // 罄聲
        fly(e);
        updateUI();
    }

    function countOth() {
        oth++;
        playSound(440, 'triangle', 0.3); // 木魚聲
        updateUI();
    }

    // 長按歸零
    let pressTimer;
    let isLong = false;
    function startPress() {
        isLong = false;
        document.getElementById('btn-oth').classList.add('pressing');
        pressTimer = setTimeout(() => {
            isLong = true;
            oth = 0;
            playSound(220, 'square', 0.5); // 深沉收攏聲
            updateUI();
        }, 1500);
    }
    function endPress(e) {
        clearTimeout(pressTimer);
        document.getElementById('btn-oth').classList.remove('pressing');
        if(!isLong) countOth();
    }

    function updateUI() {
        localStorage.setItem('personal_ami', ami);
        localStorage.setItem('personal_oth', oth);
        document.getElementById('ui-ami').innerText = ami;
        document.getElementById('ui-oth').innerText = oth;
        document.getElementById('ui-worlds').innerText = worlds;
        
        const score = ami + oth + (worlds * 10) + (warmth * 2);
        document.getElementById('ui-score').innerText = score;
        renderLotus(score);
    }

    function renderLotus(score) {
        const container = document.getElementById('lotus-svg');
        const layers = Math.min(Math.floor(score / 500), 7); // 門檻提高
        let color = "#CBA37A";
        if(score < 1000) color = "#FFF";
        else if(score < 5000) color = "#A2D2FF";
        
        let svg = `<svg viewBox="-100 -100 200 200" style="width:100%;height:100%;">`;
        for(let l=layers; l>0; l--) {
            const scale = 0.3 + (l * 0.1);
            for(let i=0; i<8; i++) {
                const ang = i * 45 + (l*22.5);
                svg += `<path d="M0 0 C15 -25 25 -50 0 -75 C-25 -50 -15 -25 0 0" fill="none" stroke="${color}" stroke-width="0.5" transform="rotate(${ang}) scale(${scale})"/>`;
            }
        }
        svg += `</svg>`;
        container.innerHTML = svg;
    }

    function fly(e) {
        const dot = document.createElement('div');
        dot.className = 'particle';
        dot.style.left = e.clientX + 'px';
        dot.style.top = e.clientY + 'px';
        document.body.appendChild(dot);
        const target = document.querySelector('.seed-core').getBoundingClientRect();
        dot.animate([
            { left: e.clientX + 'px', top: e.clientY + 'px', opacity: 1 },
            { left: (target.left + 3) + 'px', top: (target.top + 3) + 'px', opacity: 0 }
        ], { duration: 800, easing: 'ease-in-out' }).onfinish = () => dot.remove();
    }

    function handleAvatar(e) {
        const reader = new FileReader();
        reader.onload = ev => {
            document.getElementById('ui-avatar').style.backgroundImage = `url(${ev.target.result})`;
            document.getElementById('avatarPlus').style.display = 'none';
            localStorage.setItem('traveler_avatar', ev.target.result);
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    window.onload = () => {
        checkDailyEntry();
        const av = localStorage.getItem('traveler_avatar');
        if(av) {
            document.getElementById('ui-avatar').style.backgroundImage = `url(${av})`;
            document.getElementById('avatarPlus').style.display = 'none';
        }
        document.getElementById('ui-memo').value = localStorage.getItem('traveler_memo') || '';
        document.getElementById('ui-memo').oninput = e => localStorage.setItem('traveler_memo', e.target.value);
        updateUI();
        setInterval(() => {
            document.getElementById('time-earth').innerText = new Date().toLocaleTimeString();
        }, 1000);
    };
</script>
</body>
</html>
