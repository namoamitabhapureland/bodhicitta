<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>菩提心室 ‧ 蓮花色票展示館</title>
    <style>
        :root { --bg: #010103; --gold: #f3e5ab; --solid: #d4af37; --cyan: #8ba89c; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: "PingFang TC", serif; padding: 20px; }
        
        .header { text-align: center; padding: 20px 0 40px; border-bottom: 1px solid rgba(243, 229, 171, 0.2); margin-bottom: 30px; }
        .header h1 { color: var(--gold); letter-spacing: 4px; font-weight: normal; margin: 0 0 10px 0; font-size: 20px; }
        .header p { color: var(--cyan); font-size: 12px; letter-spacing: 2px; margin: 0; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto; }
        
        .lotus-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .lotus-card:hover { border-color: rgba(212,175,55,0.4); background: rgba(212,175,55,0.05); }
        
        .svg-wrap { width: 140px; height: 140px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; position: relative; }
        
        /* 讓展示館的蓮花也緩緩旋轉呼吸 */
        .svg-wrap svg { width: 100%; height: 100%; animation: breathe 4s infinite ease-in-out; }
        .seed { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 0 0 15px #fff; }

        @keyframes breathe { 0%, 100% { transform: scale(0.96) rotate(0deg); } 50% { transform: scale(1.04) rotate(5deg); } }

        .info { text-align: center; }
        .pts { color: var(--solid); font-size: 16px; letter-spacing: 2px; margin-bottom: 4px; font-weight: bold; }
        .name { color: #fff; font-size: 12px; letter-spacing: 2px; margin-bottom: 6px; }
        .desc { color: var(--cyan); font-size: 10px; letter-spacing: 1px; line-height: 1.5; }
    </style>
</head>
<body>

<svg style="position: absolute; width: 0; height: 0;">
    <defs>
        <linearGradient id="grad-10" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
        </linearGradient>
        <linearGradient id="grad-100" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="rgba(212,175,55,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.2)"/>
        </linearGradient>
        <linearGradient id="grad-1000" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#ff9a9e" stop-opacity="0.9"/>
            <stop offset="50%" stop-color="#fad0c4" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#a1c4fd" stop-opacity="0.7"/>
        </linearGradient>
        <linearGradient id="grad-5000" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#84fab0" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#8fd3f4" stop-opacity="0.6"/>
        </linearGradient>
        <linearGradient id="grad-10000" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#a18cd1" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#fbc2eb" stop-opacity="0.7"/>
        </linearGradient>
        <linearGradient id="grad-15000" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#ffecd2" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#fcb69f" stop-opacity="0.7"/>
        </linearGradient>
        <linearGradient id="grad-20000" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#e2ebf0" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#cfd9df" stop-opacity="0.6"/>
        </linearGradient>
        <linearGradient id="grad-25000" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#f6d365" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#fda085" stop-opacity="0.8"/>
        </linearGradient>
        <linearGradient id="grad-30000" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#D4AF37" stop-opacity="1"/>
            <stop offset="50%" stop-color="#FFD700" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
        </linearGradient>
    </defs>
</svg>

<div class="header">
    <h1>琉璃蓮花 ‧ 演化色票</h1>
    <p>10 點至 30,000 點全階段視覺檢閱</p>
</div>

<div class="gallery" id="gallery"></div>

<script>
    // 定義 9 個階段的參數
    const stages = [
        { pts: 10, name: "清淨萌芽", grad: "url(#grad-10)", stroke: "rgba(255,255,255,0.6)", layers: 1, glow: "none", desc: "單層琉璃白" },
        { pts: 100, name: "聖潔初金", grad: "url(#grad-100)", stroke: "rgba(212,175,55,0.6)", layers: 2, glow: "none", desc: "雙層淡金" },
        { pts: 1000, name: "初心幻彩", grad: "url(#grad-1000)", stroke: "rgba(255,255,255,0.4)", layers: 2, glow: "none", desc: "妙依指定舒服漸層" },
        { pts: 5000, name: "青淨琉璃", grad: "url(#grad-5000)", stroke: "rgba(255,255,255,0.4)", layers: 2, glow: "none", desc: "湖水綠至空靈水藍" },
        { pts: 10000, name: "紫金霞光", grad: "url(#grad-10000)", stroke: "rgba(255,255,255,0.4)", layers: 2, glow: "none", desc: "丁香紫至暖金" },
        { pts: 15000, name: "晨曦玉露", grad: "url(#grad-15000)", stroke: "rgba(255,255,255,0.4)", layers: 2, glow: "none", desc: "玫瑰金至霜白" },
        { pts: 20000, name: "月魄銀輝", grad: "url(#grad-20000)", stroke: "rgba(255,255,255,0.4)", layers: 2, glow: "none", desc: "純粹銀灰至琉璃白" },
        { pts: 25000, name: "玄黃凝脂", grad: "url(#grad-25000)", stroke: "rgba(255,255,255,0.4)", layers: 2, glow: "none", desc: "深邃琥珀至赤金" },
        { pts: 30000, name: "大圓滿耀金", grad: "url(#grad-30000)", stroke: "#fff", layers: 2, glow: "drop-shadow(0 0 15px rgba(212,175,55,0.6))", desc: "正金透白光，永恆不滅" }
    ];

    const gallery = document.getElementById('gallery');

    // 渲染每一朵蓮花
    stages.forEach(s => {
        let svg = `<svg viewBox="-150 -150 300 300" style="filter: ${s.glow};">`;
        
        for (let l = s.layers; l > 0; l--) {
            const sc = 0.4 + (l * 0.25);
            for (let i = 0; i < 8; i++) {
                const ang = i * 45 + (l * 22.5);
                // 100% 抄襲 88 佛的水滴型瓣片 (二次貝茲曲線 Q)
                svg += `<g transform="rotate(${ang}) scale(${sc})">
                    <path d="M 0 0 Q 30 -60 0 -120 Q -30 -60 0 0" fill="${s.grad}" stroke="${s.stroke}" stroke-width="1.5" opacity="0.9"/>
                </g>`;
            }
        }
        svg += `</svg>`;

        gallery.innerHTML += `
            <div class="lotus-card">
                <div class="svg-wrap">
                    <div class="seed"></div>
                    ${svg}
                </div>
                <div class="info">
                    <div class="pts">${s.pts.toLocaleString()} 點</div>
                    <div class="name">${s.name}</div>
                    <div class="desc">${s.desc}</div>
                </div>
            </div>
        `;
    });
</script>
</body>
</html>
