<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>行者觀照 - 菩提心實體化</title>
<style>
    /* 宇宙黑金底色 - 極致深邃 */
    body {
        margin: 0;
        padding: 0;
        background-color: #030303;
        background-image: 
            radial-gradient(circle at 50% 30%, rgba(30, 24, 12, 0.4) 0%, transparent 70%),
            radial-gradient(circle at 50% 100%, rgba(15, 12, 6, 0.8) 0%, #030303 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #d4af37;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        display: flex;
        justify-content: center;
    }

    /* 手機視角容器 */
    .app-container {
        width: 100%;
        max-width: 480px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
    }

    /* 頂部導航：回道場 */
    .top-nav {
        padding: 20px;
        display: flex;
        align-items: center;
        z-index: 20;
    }
    .back-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        color: rgba(212, 175, 55, 0.8);
        font-size: 14px;
        letter-spacing: 2px;
        text-decoration: none;
        cursor: pointer;
        transition: opacity 0.3s;
    }
    .back-btn:active { opacity: 0.5; }

    /* 琉璃卡片模組 */
    .glass-panel {
        background: rgba(18, 15, 10, 0.4);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(212, 175, 55, 0.15);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), inset 0 1px 10px rgba(212, 175, 55, 0.05);
        border-radius: 16px;
    }

    /* === IG 風格行者檔案區 === */
    .profile-section {
        margin: 0 20px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        z-index: 10;
    }
    
    .profile-top {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    /* 左側：大頭貼 */
    .avatar-wrapper {
        width: 76px;
        height: 76px;
        border-radius: 50%;
        border: 1px solid rgba(249, 229, 150, 0.5);
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        background-color: rgba(10, 8, 5, 0.8);
        background-position: center;
        background-size: cover;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
    }
    .avatar-wrapper::after {
        content: '+';
        color: rgba(212, 175, 55, 0.4);
        font-size: 20px;
        font-weight: 100;
    }
    .avatar-wrapper.has-image::after { display: none; }

    /* 右側：數據統計區 (位階、時間、總分) */
    .profile-stats {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        letter-spacing: 1px;
    }
    .stat-label { color: rgba(212, 175, 55, 0.6); }
    .stat-value { 
        color: #f9e596; 
        font-weight: 300;
        text-shadow: 0 0 5px rgba(249, 229, 150, 0.3);
    }
    .rank-name {
        font-size: 16px;
        color: #ffffff;
        letter-spacing: 3px;
        border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        padding-bottom: 6px;
        margin-bottom: 4px;
    }

    /* 下方：行者便利貼 (自定義短文) */
    .bio-input {
        width: 100%;
        background: transparent;
        border: none;
        color: rgba(255, 255, 255, 0.8);
        font-family: inherit;
        font-size: 13px;
        letter-spacing: 1.5px;
        line-height: 1.6;
        resize: none;
        outline: none;
        padding-top: 10px;
        border-top: 1px dashed rgba(212, 175, 55, 0.2);
    }
    .bio-input::placeholder { color: rgba(212, 175, 55, 0.3); }

    /* === 中央：菩提道場 === */
    .center-stage {
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }
    
    /* 核心跳動光點 (預留給之後的蓮花 SVG) */
    .bodhi-seed {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: radial-gradient(circle, #ffffff 0%, #f9e596 60%, transparent 100%);
        box-shadow: 0 0 20px 5px rgba(249, 229, 150, 0.5);
        animation: breathe 4s ease-in-out infinite;
    }

    /* === 底部：純向量操作列 === */
    .action-bar {
        margin: 0 20px 30px 20px;
        display: flex;
        justify-content: space-around;
        align-items: flex-end;
        z-index: 10;
    }

    .action-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        position: relative;
    }

    .action-icon {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid rgba(212, 175, 55, 0.3);
        background: rgba(10, 8, 5, 0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.2s;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    .action-item:active .action-icon {
        transform: scale(0.95);
        background: rgba(212, 175, 55, 0.15);
        border-color: rgba(249, 229, 150, 0.6);
    }

    .action-label {
        font-size: 11px;
        letter-spacing: 2px;
        color: rgba(212, 175, 55, 0.7);
    }

    /* 懸浮計數數字 */
    .floating-count {
        position: absolute;
        top: -30px;
        font-size: 18px;
        font-weight: 300;
        color: #ffffff;
        text-shadow: 0 0 10px rgba(249, 229, 150, 0.6);
        opacity: 0; /* 預設隱藏，點擊時浮現 */
        transform: translateY(10px);
    }
    .show-count {
        animation: floatUpFade 1.5s ease-out forwards;
    }

    @keyframes breathe {
        0% { transform: scale(0.9); opacity: 0.8; }
        50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 30px 10px rgba(249, 229, 150, 0.6); }
        100% { transform: scale(0.9); opacity: 0.8; }
    }
    @keyframes floatUpFade {
        0% { opacity: 0; transform: translateY(10px) scale(0.8); }
        20% { opacity: 1; transform: translateY(0) scale(1.1); }
        80% { opacity: 1; transform: translateY(-10px) scale(1); }
        100% { opacity: 0; transform: translateY(-20px) scale(0.9); }
    }
</style>
</head>
<body>

<div class="app-container">

    <div class="top-nav">
        <a href="index.html" class="back-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            回主道場
        </a>
    </div>

    <div class="glass-panel profile-section">
        <div class="profile-top">
            <input type="file" id="avatarInput" accept="image/*" style="display: none;">
            <div class="avatar-wrapper" id="avatarWrapper" onclick="document.getElementById('avatarInput').click()"></div>
            
            <div class="profile-stats">
                <div class="rank-name">初信位【一念清淨】妙依</div>
                
                <div class="stat-row">
                    <span class="stat-label">娑婆時間</span>
                    <span class="stat-value" id="sahaTime">2026.04.12 12:00</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">極樂對照</span>
                    <span class="stat-value" id="purelandTime">236 年 .3982</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">菩提總分</span>
                    <span class="stat-value" id="totalScore">0</span>
                </div>
            </div>
        </div>
        
        <textarea class="bio-input" id="travelerBio" rows="2" placeholder="寫下今日發心，或紀錄修行體悟..."></textarea>
    </div>

    <div class="center-stage">
        <div class="bodhi-seed" id="bodhiSeed"></div>
    </div>

    <div class="action-bar">
        <div class="action-item" onclick="openChart()">
            <div class="action-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(249,229,150,0.8)" stroke-width="1.2">
                    <path d="M3 3v18h18M7 14l4-4 4 4 6-6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <span class="action-label">觀照圖表</span>
        </div>

        <div class="action-item" onclick="addCount('amitabha')">
            <div class="floating-count" id="floatAmi">0</div>
            <div class="action-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(249,229,150,0.9)" stroke-width="1.2">
                    <circle cx="12" cy="12" r="10" stroke-dasharray="2 4"/>
                    <circle cx="12" cy="12" r="4" fill="rgba(249,229,150,0.4)"/>
                </svg>
            </div>
            <span class="action-label">專念彌陀</span>
        </div>

        <div class="action-item" onclick="addCount('others')">
            <div class="floating-count" id="floatOth">0</div>
            <div class="action-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(212,175,55,0.8)" stroke-width="1.2">
                    <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12" stroke-dasharray="4 4"/>
                    <path d="M12 8v8M8 12h8" stroke-linecap="round"/>
                </svg>
            </div>
            <span class="action-label">普念諸佛</span>
        </div>
    </div>

</div>

<script>
    // 1. 初始化資料
    let totalBodhiScore = parseInt(localStorage.getItem('bodhi_total_score')) || 0;
    document.getElementById('totalScore').innerText = totalBodhiScore;

    // 2. 處理短文便利貼 (自動儲存)
    const bioInput = document.getElementById('travelerBio');
    bioInput.value = localStorage.getItem('traveler_bio') || '';
    bioInput.addEventListener('input', function() {
        localStorage.setItem('traveler_bio', this.value);
    });

    // 3. 處理頭像
    window.onload = function() {
        const savedAvatar = localStorage.getItem('traveler_avatar');
        if (savedAvatar) {
            const wrapper = document.getElementById('avatarWrapper');
            wrapper.style.backgroundImage = `url(${savedAvatar})`;
            wrapper.classList.add('has-image');
        }
    };

    document.getElementById('avatarInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 200; canvas.height = 200;
                const size = Math.min(img.width, img.height);
                const x = (img.width - size) / 2;
                const y = (img.height - size) / 2;
                ctx.drawImage(img, x, y, size, size, 0, 0, 200, 200);
                const base64Str = canvas.toDataURL('image/jpeg', 0.8);
                localStorage.setItem('traveler_avatar', base64Str);
                const wrapper = document.getElementById('avatarWrapper');
                wrapper.style.backgroundImage = `url(${base64Str})`;
                wrapper.classList.add('has-image');
            }
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // 4. 點擊計數與浮動數字特效
    function addCount(type) {
        let count = parseInt(localStorage.getItem(`bodhi_${type}`)) || 0;
        count++;
        localStorage.setItem(`bodhi_${type}`, count);
        
        totalBodhiScore++;
        localStorage.setItem('bodhi_total_score', totalBodhiScore);
        document.getElementById('totalScore').innerText = totalBodhiScore;

        // 觸發數字浮現動畫
        const floatId = type === 'amitabha' ? 'floatAmi' : 'floatOth';
        const floatEl = document.getElementById(floatId);
        floatEl.innerText = count;
        
        // 重置動畫
        floatEl.classList.remove('show-count');
        void floatEl.offsetWidth; 
        floatEl.classList.add('show-count');
    }

    // 5. 圖表按鈕佔位功能
    function openChart() {
        alert("將在此處以 Glassmorphism 面板展開方案 B 的視覺化圖表");
    }
</script>
</body>
</html>
