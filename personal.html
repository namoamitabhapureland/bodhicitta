<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>行者觀照 - 菩提空間</title>
<style>
    :root {
        --gold: #D4AF37;
        --gold-light: #F9E596;
        --glass: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(212, 175, 55, 0.2);
    }

    body {
        margin: 0; padding: 0;
        background: #030303;
        background-image: radial-gradient(circle at 50% 50%, #1a150f 0%, #030303 100%);
        font-family: -apple-system, "PingFang TC", sans-serif;
        color: #ffffff;
        height: 100dvh;
        overflow: hidden;
        display: flex; justify-content: center;
    }

    .app-container {
        width: 100%; max-width: 480px;
        display: flex; flex-direction: column;
        position: relative;
    }

    /* 頂部導航 */
    .top-nav {
        padding: max(20px, env(safe-area-inset-top)) 20px 10px;
        display: flex; justify-content: space-between; align-items: center;
    }
    .back-btn {
        color: white; text-decoration: none; font-size: 14px;
        display: flex; align-items: center; gap: 8px; opacity: 0.7;
    }

    /* 行者儀表板：霧面玻璃感 */
    .traveler-card {
        margin: 10px 20px;
        background: var(--glass);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .profile-section { display: flex; gap: 18px; align-items: center; }
    
    .avatar-wrap {
        position: relative; width: 70px; height: 70px;
    }
    .avatar-img {
        width: 100%; height: 100%; border-radius: 50%;
        border: 2px solid var(--gold);
        background: #111; background-size: cover;
    }

    .stats-box { flex: 1; }
    .traveler-name { 
        font-size: 18px; letter-spacing: 3px; margin-bottom: 8px; 
        color: var(--gold-light);
    }
    .stats-grid { 
        display: grid; grid-template-columns: 1fr 1fr; gap: 8px; 
        font-size: 11px; opacity: 0.8;
    }

    /* 菩提心中央舞台 */
    .bodhi-stage {
        flex: 1; display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        position: relative;
    }

    .lotus-container {
        width: 280px; height: 280px;
        transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .status-text {
        margin-top: 20px; font-size: 13px; letter-spacing: 4px;
        color: var(--gold-light); opacity: 0.6;
    }

    /* 底部加水操作 */
    .action-row {
        padding: 20px 20px max(40px, env(safe-area-inset-bottom));
        display: flex; justify-content: space-around;
    }
    .water-btn {
        display: flex; flex-direction: column; align-items: center; gap: 10px;
        cursor: pointer; transition: 0.3s;
    }
    .water-btn:active { transform: scale(0.9); }
    .icon-circle {
        width: 54px; height: 54px; border-radius: 50%;
        border: 1px solid var(--gold);
        display: flex; justify-content: center; align-items: center;
        background: rgba(212, 175, 55, 0.1);
    }
    .water-btn span { font-size: 12px; letter-spacing: 2px; opacity: 0.8; }

    /* 粒子特效 */
    .drop {
        position: absolute; width: 4px; height: 10px;
        background: var(--gold-light); border-radius: 50%;
        animation: dropDown 0.6s ease-in forwards;
    }
    @keyframes dropDown {
        to { transform: translateY(150px); opacity: 0; }
    }
</style>
</head>
<body>

<div class="app-container">
    <div class="top-nav">
        <a href="index.html" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M15 18l-6-6 6-6" />
            </svg>
            回道場
        </a>
        <div style="font-size:12px; color:var(--gold); letter-spacing:2px;">菩提心觀照</div>
    </div>

    <div class="traveler-card">
        <div class="profile-section">
            <div class="avatar-wrap" onclick="document.getElementById('fileInput').click()">
                <div class="avatar-img" id="avatarDisplay"></div>
                <input type="file" id="fileInput" hidden accept="image/*">
            </div>
            <div class="stats-box">
                <div class="traveler-name" id="ui-rank">行者 ‧ 觀照中</div>
                <div class="stats-grid">
                    <div>總念佛 <span id="ui-total-ami" style="color:var(--gold-light)">0</span></div>
                    <div>菩提分 <span id="ui-bodhi-score" style="color:var(--gold-light)">0</span></div>
                    <div style="grid-column: span 2;">亮燈世界 <span id="ui-worlds" style="color:var(--gold-light)">0</span></div>
                </div>
            </div>
        </div>
        <input type="text" id="memoInput" placeholder="此處寫下今日發心..." 
               style="width:100%; background:transparent; border:none; border-bottom:1px solid rgba(212,175,55,0.1); 
                      color:white; margin-top:15px; padding:5px 0; font-size:12px; outline:none;">
    </div>

    <div class="bodhi-stage">
        <div class="lotus-container" id="lotus-box">
            </div>
        <div class="status-text" id="ui-status">初發菩提心</div>
    </div>

    <div class="action-row">
        <div class="water-btn" onclick="irrigate('ami')">
            <div class="icon-circle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--gold-light)" stroke-width="1">
                    <path d="M12 2v20M2 12h20" opacity="0.3"/><circle cx="12" cy="12" r="9"/>
                </svg>
            </div>
            <span>專念彌陀</span>
        </div>
        <div class="water-btn" onclick="irrigate('oth')">
            <div class="icon-circle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--gold-light)" stroke-width="1">
                    <path d="M12 3l1.5 6h6l-5 4 2 7-4.5-4-4.5 4 2-7-5-4h6z"/>
                </svg>
            </div>
            <span>普念諸佛</span>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // 1. 初始化 Firebase (與主系統同步)
    const fbCfg = { /* 請放入你的 Firebase Config */ };
    if (!firebase.apps.length) firebase.initializeApp(fbCfg);
    const db = firebase.database();

    // 2. 核心數據讀取
    let personalAmi = parseInt(localStorage.getItem('personal_ami_count') || '0');
    let warmth = parseInt(localStorage.getItem('pure_land_warmth') || '0');
    let worldList = JSON.parse(localStorage.getItem('unlocked_worlds') || '[]');
    let bodhiScore = 0;

    function refreshData() {
        // 公式：本地念佛 + (世界數*3) + (資糧*2)
        bodhiScore = personalAmi + (worldList.length * 3) + (warmth * 2);
        
        document.getElementById('ui-total-ami').innerText = personalAmi;
        document.getElementById('ui-bodhi-score').innerText = bodhiScore;
        document.getElementById('ui-worlds').innerText = worldList.length;
        
        updateLotus(bodhiScore);
    }

    // 3. 蓮花成長系統 (SVG 實體化)
    function updateLotus(score) {
        const box = document.getElementById('lotus-box');
        const status = document.getElementById('ui-status');
        let color = "#fff";
        let scale = 0.5 + (score / 1000); // 隨分數變大
        
        if (score < 100) {
            status.innerText = "菩提種子";
            box.innerHTML = `<svg viewBox="0 0 100 100"><circle cx="50" cy="70" r="5" fill="var(--gold)"/></svg>`;
        } else if (score < 500) {
            status.innerText = "萌芽長養";
            box.innerHTML = `<svg viewBox="0 0 100 100"><path d="M50 70 Q40 50 50 30 Q60 50 50 70" fill="#82968C"/></svg>`;
        } else {
            status.innerText = "蓮花綻放";
            // 此處可放入你最美的蓮花 SVG
            box.innerHTML = `<svg viewBox="0 0 100 100"><path d="M50 20 C60 40 90 50 50 80 C10 50 40 40 50 20" fill="var(--gold)" opacity="0.6"/></svg>`;
        }
        box.style.transform = `scale(${Math.min(scale, 1.5)})`;
    }

    // 4. 灌溉操作 (連動主系統)
    function irrigate(type) {
        personalAmi++;
        localStorage.setItem('personal_ami_count', personalAmi);
        
        // 特效：金色水滴
        const drop = document.createElement('div');
        drop.className = 'drop';
        drop.style.left = (Math.random() * 40 + 30) + '%';
        document.querySelector('.bodhi-stage').appendChild(drop);
        setTimeout(() => drop.remove(), 600);

        if (type === 'ami') {
            // 同步寫入 Firebase 總念佛數
            db.ref('global_stats/total_ami').transaction(n => (n || 0) + 1);
        }
        refreshData();
    }

    // 5. 本地儲存 (頭像/備忘)
    const fileInput = document.getElementById('fileInput');
    fileInput.onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            localStorage.setItem('traveler_avatar', ev.target.result);
            document.getElementById('avatarDisplay').style.backgroundImage = `url(${ev.target.result})`;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // 初始化載入
    window.onload = () => {
        refreshData();
        const savedAvatar = localStorage.getItem('traveler_avatar');
        if(savedAvatar) document.getElementById('avatarDisplay').style.backgroundImage = `url(${savedAvatar})`;
    };
</script>
</body>
</html>
