<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>菩提心室 ‧ 極淨大圓滿</title>
    <style>
        :root { --bg: #010103; --gold: #f3e5ab; --solid: #d4af37; --cyan: #8ba89c; --text-light: #eee; --glass-border: rgba(255, 255, 255, 0.15); }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text-light); font-family: "PingFang TC", serif; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        .app-wrapper { width: 100%; max-width: 480px; display: flex; flex-direction: column; position: relative; z-index: 10; height: 100dvh; }

        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }

        /* 頂部導航 (三位一體：定課、數字、歸零) */
        .nav-top { padding: max(20px, env(safe-area-inset-top)) 20px 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav-link { color: #aaa; font-size: 14px; letter-spacing: 2px; text-decoration: none; cursor: pointer; transition: 0.3s; }
        .nav-link:active { color: var(--gold); }

        /* IG 級排版 */
        .ig-profile { padding: 15px 20px; display: flex; align-items: center; gap: 20px; margin: 0 15px; }
        .avatar-wrap { width: 88px; height: 88px; border-radius: 50%; border: 1.5px solid var(--solid); padding: 3px; position: relative; flex-shrink: 0; cursor: pointer; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; background-color: #111; background-size: cover; background-position: center; }
        .avatar-plus { position: absolute; right: 0; bottom: 0; width: 26px; height: 26px; background: rgba(5,5,8,0.9); border: 1px solid var(--solid); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--gold); font-size: 18px; line-height: 1; }

        .stats-wrap { flex: 1; display: flex; justify-content: space-evenly; align-items: center; text-align: center; }
        .stat-item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .stat-num { font-size: 24px; font-weight: 300; color: #fff; }
        .stat-lbl { font-size: 11px; color: var(--cyan); letter-spacing: 2px; }
        .divider { width: 1px; height: 35px; background: var(--glass-border); }

        .bio-wrap { margin: 15px 25px 5px; padding-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 8px; }
        .bio-header { display: flex; align-items: center; gap: 5px; }
        .bio-name-input { font-size: 16px; letter-spacing: 3px; color: var(--gold); background: transparent; border: none; width: 120px; outline: none; font-family: "PingFang TC", serif; }
        .memo-input { width: 100%; background: transparent; border: none; color: #aaa; font-size: 13px; letter-spacing: 1px; padding: 4px 0; outline: none; }

        /* 蓮花舞台 */
        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; min-height: 0; }
        #lotus-container { width: 85vw; height: 85vw; max-width: 320px; max-height: 320px; animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(0.96); } 50% { transform: scale(1.04); } }

        /* 底部按鈕 */
        .footer { padding-bottom: max(60px, env(safe-area-inset-bottom)); display: flex; justify-content: center; }
        .main-btn { 
            width: 86px; height: 86px; border-radius: 50%; border: 3px solid var(--solid); 
            background: radial-gradient(circle at center, rgba(212,175,55,0.15) 0%, rgba(5,5,8,0.9) 100%); 
            display: flex; justify-content: center; align-items: center; transition: 0.2s; cursor: pointer; 
            box-shadow: 0 0 20px rgba(212,175,55,0.2), inset 0 0 15px rgba(212,175,55,0.4); 
        }
        .main-btn:active { transform: scale(0.92); }
        .fly-particle { position: absolute; width: 3px; height: 3px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 100; box-shadow: 0 0 8px var(--gold); }

        /* 模態框 */
        .custom-modal { position: fixed; inset: 0; z-index: 4000; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.4s; }
        .custom-modal.show { display: flex; opacity: 1; }
        .modal-box { background: rgba(5,5,8,0.85); border: 1px solid var(--solid); border-radius: 16px; padding: 30px; width: 85%; max-width: 320px; text-align: center; }
        .modal-title { color: var(--solid); font-size: 16px; letter-spacing: 4px; margin-bottom: 20px; }
        .modal-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--solid); color: var(--gold); font-size: 15px; padding: 10px; text-align: center; margin-bottom: 25px; outline: none; }
        .gold-btn { flex: 1; background: rgba(212,175,55,0.1); border: 1px solid var(--solid); color: var(--gold); padding: 12px; border-radius: 8px; font-size: 14px; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .gold-btn.outline { border-color: var(--glass-border); color: #ccc; background: transparent; }
        
        /* 寶物專屬 */
        .t-svg-wrap { width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; animation: float 4s infinite ease-in-out; margin-bottom: 25px; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body oncontextmenu="return false;">

<svg style="position: absolute; width:0; height:0;" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
        <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.8"/></linearGradient>
        <linearGradient id="facet-cyan" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.9"/><stop offset="100%" stop-color="#00838f" stop-opacity="0.5"/></linearGradient>
        <linearGradient id="facet-rose" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="100%" stop-color="#c2185b" stop-opacity="0.5"/></linearGradient>
        <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6"/><stop offset="100%" stop-color="#d4af37" stop-opacity="0.2"/></linearGradient>
        <linearGradient id="grad-10" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(255,255,255,0.9)"/></linearGradient>
        <linearGradient id="grad-100" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#d4af37"/></linearGradient>
        <linearGradient id="grad-30000" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#D4AF37"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>
    </defs>
</svg>

<canvas id="starCanvas"></canvas>

<div id="buddhaModal" class="custom-modal" onclick="closeM('buddhaModal')">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">定課切換</div>
        <div class="modal-desc" style="font-size:12px; color:var(--cyan); margin-bottom:15px;">請輸入欲觀照之聖號：</div>
        <input type="text" id="buddhaInput" class="modal-input">
        <div style="display:flex; gap:10px;">
            <button class="gold-btn outline" onclick="closeM('buddhaModal')">取消</button>
            <button class="gold-btn" onclick="confirmBuddha()">確認</button>
        </div>
    </div>
</div>

<div id="resetModal" class="custom-modal" onclick="closeM('resetModal')">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">計數歸零</div>
        <div id="reset-desc" style="font-size:14px; color:var(--cyan); margin-bottom:25px; line-height:1.8;">是否將【當前聖號】的計數歸零？</div>
        <div style="display:flex; gap:10px;">
            <button class="gold-btn outline" onclick="closeM('resetModal')">取消</button>
            <button class="gold-btn" onclick="execReset()">確認歸零</button>
        </div>
    </div>
</div>

<div id="treasureModal" class="custom-modal" onclick="closeM('treasureModal')">
    <div style="display:flex; flex-direction:column; align-items:center;">
        <div class="t-svg-wrap" id="t-svg-ui"></div>
        <div id="t-name-ui" style="color:#fff; font-size:1.2rem; letter-spacing:5px; text-shadow:0 0 20px var(--solid); margin-bottom:15px;"></div>
        <div style="color:var(--cyan); font-size:13px; letter-spacing:2px; text-align:center;">法界感應 ‧ 第一天結緣<br><span style="opacity:0.5; font-size:10px;">點擊畫面收攝</span></div>
    </div>
</div>

<div class="app-wrapper">
    <div class="nav-top">
        <a href="index.html" class="nav-link">← 回道場</a>
        <div style="display:flex; gap:20px; align-items:center;">
            <div onclick="addCheat()" style="width:20px; height:20px; cursor:pointer;"></div>
            <div class="nav-link" onclick="openDataModal()" style="color:var(--cyan);">大數據</div>
            <div class="nav-link" onclick="openResetModal()" style="color:rgba(255,255,255,0.4);">歸零</div>
            <div class="nav-link" onclick="openM('infoModal')">說明</div>
        </div>
    </div>

    <div class="ig-profile glass-panel">
        <div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()">
            <div class="avatar-img" id="ui-avatar"></div>
            <div class="avatar-plus">+</div>
            <input type="file" id="avatarInput" hidden accept="image/*" onchange="handleAvatar(event)">
        </div>
        <div class="stats-wrap">
            <div class="stat-item" onclick="openBuddhaModal()" style="cursor:pointer; flex:1;">
                <span class="stat-num" id="ui-cur-name" style="font-size:18px; color:var(--cyan); border-bottom:1px dashed var(--glass-border);">阿彌陀佛</span>
                <span class="stat-lbl">當前定課 ▾</span>
            </div>
            <div class="divider"></div>
            <div class="stat-item" style="flex:1;">
                <span class="stat-num" id="ui-session-count">0</span>
                <span class="stat-lbl">當前佛數</span>
            </div>
        </div>
    </div>

    <div class="bio-wrap">
        <div class="bio-header">
            <input type="text" class="bio-name-input" id="ui-name" placeholder="行者">
            <span style="font-size:12px; color:var(--cyan);">‧ <span id="ui-rank-text">一真法界</span></span>
        </div>
        <input type="text" class="memo-input" id="ui-memo" placeholder="本地備忘錄：記下今日法喜...">
    </div>

    <div class="stage"><div id="lotus-container"></div></div>

    <div class="footer">
        <div class="main-btn" onclick="handleNian(event)">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
        </div>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTap() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function openM(id) { document.getElementById(id).classList.add('show'); }
    function closeM(id) { document.getElementById(id).classList.remove('show'); }

    // 資料庫
    let db = JSON.parse(localStorage.getItem('PX_V15.0')) || { totalNian: 0, bodhiLitCount: 0, treasures: {} };
    if (!db.personalRoom) db.personalRoom = { sessionCounts: {}, othList: {}, avatar: "", memo: "", loginDays: 0, lastLogin: "" };
    
    let curBuddha = "阿彌陀佛";
    let cheatPts = 0;

    function saveDB() { localStorage.setItem('PX_V15.0', JSON.stringify(db)); }

    // 名字照片連動
    const nameInput = document.getElementById('ui-name');
    nameInput.value = db.name || '行者';
    nameInput.oninput = e => { db.name = e.target.value; saveDB(); };
    if(db.personalRoom.avatar) document.getElementById('ui-avatar').style.backgroundImage = `url(${db.personalRoom.avatar})`;
    function handleAvatar(e) { const r = new FileReader(); r.onload = ev => { document.getElementById('ui-avatar').style.backgroundImage = `url(${ev.target.result})`; db.personalRoom.avatar = ev.target.result; saveDB(); }; if(e.target.files[0]) r.readAsDataURL(e.target.files[0]); }
    const memo = document.getElementById('ui-memo'); memo.value = db.personalRoom.memo || ''; memo.oninput = e => { db.personalRoom.memo = e.target.value; saveDB(); };

    // 歸零與切換
    function openBuddhaModal() { document.getElementById('buddhaInput').value = curBuddha; openM('buddhaModal'); }
    function confirmBuddha() { let val = document.getElementById('buddhaInput').value.trim(); if(val) { curBuddha = val; document.getElementById('ui-cur-name').innerText = val; updateUI(); } closeM('buddhaModal'); }
    function openResetModal() { document.getElementById('reset-desc').innerText = `是否將【${curBuddha}】的當前計數歸零？`; openM('resetModal'); }
    function execReset() { db.personalRoom.sessionCounts[curBuddha] = 0; saveDB(); updateUI(); closeM('resetModal'); }

    // 念佛
    function handleNian(e) {
        playTap();
        db.personalRoom.sessionCounts[curBuddha] = (db.personalRoom.sessionCounts[curBuddha] || 0) + 1;
        if(curBuddha === "阿彌陀佛") { db.totalNian = (db.totalNian || 0) + 1; } 
        else { db.personalRoom.othList[curBuddha] = (db.personalRoom.othList[curBuddha] || 0) + 1; }
        saveDB(); updateUI();
    }

    // ✨ 第一天進來贈寶與自動計日 ✨
    const treasures = [
        { id: "sword", name: "幾何慧劍", svg: `<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 100 150"><g transform="translate(0, 5)"><polygon points="50,10 56,40 50,105 44,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="50,10 56,40 50,105" fill="url(#facet-cyan)" opacity="0.8"/><polygon points="50,10 44,40 50,105" fill="url(#facet-dark)" opacity="0.6"/><polygon points="35,100 65,100 55,110 45,110" fill="url(#pure-glass)" stroke="#d4af37" stroke-width="0.8"/><polygon points="46,110 54,110 52,135 48,135" fill="url(#facet-dark)"/><polygon points="50,135 56,142 50,148 44,142" fill="url(#facet-light)" stroke="#f3e5ab" stroke-width="1"/></g></svg>` },
        { id: "vase", name: "琉璃淨瓶", svg: `<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 100 150"><g transform="translate(0, 10)"><polygon points="45,20 55,20 60,40 40,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="40,40 60,40 75,90 25,90" fill="url(#facet-cyan)" opacity="0.8" stroke="#fff" stroke-width="0.5"/><polygon points="25,90 75,90 60,120 40,120" fill="url(#facet-light)" stroke="#f3e5ab" stroke-width="0.5"/></g></svg>` }
    ];
    function checkLoginAndGift() {
        const today = new Date().toDateString();
        if (db.personalRoom.lastLogin !== today) {
            db.personalRoom.loginDays = (db.personalRoom.loginDays || 0) + 1;
            db.personalRoom.lastLogin = today;
            // 第一天贈寶
            if (db.personalRoom.loginDays === 1) {
                const t = treasures[Math.floor(Math.random()*treasures.length)];
                db.treasures[t.id] = (db.treasures[t.id] || 0) + 1;
                document.getElementById('t-svg-ui').innerHTML = t.svg;
                document.getElementById('t-name-ui').innerText = `獲得法寶：${t.name}`;
                setTimeout(() => openM('treasureModal'), 1000);
            }
            saveDB();
        }
    }

    function updateUI() {
        document.getElementById('ui-session-count').innerText = (db.personalRoom.sessionCounts[curBuddha] || 0).toLocaleString();
        document.getElementById('ui-ami-count')?.remove(); // 清理舊標籤
        // 蓮花與階位
        let nianSum = (db.totalNian || 0) + Object.values(db.personalRoom.othList).reduce((a,b)=>a+b, 0);
        let p = Math.floor(nianSum / 100) * 10 + (db.bodhiLitCount || 0) * 1 + cheatPts;
        const rank = document.getElementById('ui-rank-text');
        const box = document.getElementById('lotus-container');
        if(p < 10) { rank.innerText = "一真法界"; box.innerHTML = ''; }
        else {
            rank.innerText = p >= 100 ? "聖潔初金" : "清淨萌芽";
            let fill = p >= 100 ? "url(#grad-100)" : "url(#grad-10)";
            box.innerHTML = `<svg viewBox="-150 -150 300 300" style="width:100%;height:100%"><g transform="rotate(${p*0.1})">${Array.from({length:8}, (_,i)=>`<path d="M0,0 Q30,-60 0,-120 Q-30,-60 0,0" fill="${fill}" transform="rotate(${i*45})"/>`).join('')}</g></svg>`;
        }
    }

    const cvs = document.getElementById('starCanvas'); const ctx = cvs.getContext('2d');
    function initS() { cvs.width=window.innerWidth; cvs.height=window.innerHeight; }
    initS(); checkLoginAndGift(); updateUI();
</script>
</body>
</html>
