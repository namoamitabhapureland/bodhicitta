<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>菩提心實體化 - 妙依</title>
<style>
    /* 宇宙黑金底色 - 加深層次，對齊主系統 */
    body {
        margin: 0;
        padding: 0;
        background-color: #030303;
        background-image: 
            radial-gradient(circle at 50% 40%, rgba(40, 32, 15, 0.4) 0%, transparent 60%),
            radial-gradient(circle at 50% 100%, rgba(20, 16, 8, 0.8) 0%, #030303 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        height: 100vh;
        color: #d4af37;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
    }

    /* 琉璃卡片共用模組 (Glassmorphism) */
    .glass-panel {
        background: linear-gradient(145deg, rgba(25, 22, 18, 0.4) 0%, rgba(10, 8, 5, 0.6) 100%);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(212, 175, 55, 0.15);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6), inset 0 1px 15px rgba(212, 175, 55, 0.05);
        border-radius: 20px;
    }

    /* 頂部：行者專屬卡片 */
    .header-card {
        margin-top: 30px;
        width: 85%;
        max-width: 400px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 20px;
        position: relative;
        z-index: 10;
    }

    .avatar-wrapper {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 1px solid rgba(249, 229, 150, 0.5);
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        background-color: rgba(20, 18, 14, 0.8);
        background-position: center;
        background-size: cover;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
    }
    .avatar-wrapper::after {
        content: '+';
        color: rgba(212, 175, 55, 0.5);
        font-size: 20px;
        font-weight: 100;
    }
    .avatar-wrapper.has-image::after { display: none; }

    .traveler-info {
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
    .traveler-rank {
        font-size: 11px;
        letter-spacing: 2px;
        color: rgba(249, 229, 150, 0.6);
        margin-bottom: 6px;
    }
    .traveler-name {
        font-size: 20px;
        font-weight: 300;
        letter-spacing: 4px;
        color: #ffffff;
        text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
    }

    /* 中央：菩提道場 (加上法界底座) */
    .center-stage {
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        width: 100%;
    }

    /* 緩慢旋轉的幾何光環 (SVG) */
    .dharma-ring {
        position: absolute;
        width: 220px;
        height: 220px;
        animation: spin 30s linear infinite;
        opacity: 0.3;
        pointer-events: none;
    }
    .dharma-ring-inner {
        position: absolute;
        width: 150px;
        height: 150px;
        animation: spin-reverse 20s linear infinite;
        opacity: 0.5;
        pointer-events: none;
    }

    .bodhi-seed {
        position: absolute;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: radial-gradient(circle, #ffffff 0%, #f9e596 50%, transparent 80%);
        box-shadow: 0 0 25px 8px rgba(249, 229, 150, 0.5);
        animation: breathe 4s ease-in-out infinite;
    }

    .ripple-effect {
        position: absolute;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.8);
        opacity: 0;
        transform: scale(1);
    }
    .ripple-active { animation: rippleAnim 0.8s ease-out forwards; }

    /* 底部：計數模組化卡片 */
    .actions-area {
        margin-bottom: 40px;
        display: flex;
        gap: 20px;
        width: 85%;
        max-width: 400px;
        z-index: 10;
    }

    .counter-card {
        flex: 1;
        padding: 25px 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        position: relative;
        transition: background 0.3s, border-color 0.3s;
    }
    .counter-card:active {
        background: rgba(212, 175, 55, 0.1);
        border-color: rgba(249, 229, 150, 0.4);
    }

    .counter-num {
        font-size: 32px;
        font-weight: 200;
        color: #ffffff;
        letter-spacing: 2px;
        margin-bottom: 12px;
        text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .counter-title {
        font-size: 12px;
        letter-spacing: 2px;
        color: rgba(212, 175, 55, 0.7);
        position: relative;
    }
    /* 標題上方的極簡裝飾線 */
    .counter-title::before {
        content: '';
        position: absolute;
        top: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 20px;
        height: 1px;
        background: rgba(212, 175, 55, 0.5);
    }

    /* 長按歸零的倒數圓環 */
    .progress-ring {
        position: absolute;
        top: 35px; /* 對齊數字中心 */
        left: 50%;
        transform: translate(-50%, -50%) rotate(-90deg);
        pointer-events: none;
    }
    .progress-ring circle {
        fill: transparent;
        stroke: rgba(249, 229, 150, 0.8);
        stroke-width: 1.5;
        stroke-dasharray: 188.4; /* 2*pi*r (r=30) 放大一點包住數字 */
        stroke-dashoffset: 188.4;
        transition: stroke-dashoffset 0.1s linear;
    }

    /* 飛行動態光點 */
    .flying-particle {
        position: absolute;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background-color: #fff;
        box-shadow: 0 0 10px 3px rgba(249, 229, 150, 0.8);
        pointer-events: none;
        z-index: 100;
        transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.7s ease-in;
    }

    /* 動畫定義 */
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
    @keyframes breathe {
        0% { transform: scale(0.9); opacity: 0.8; }
        50% { transform: scale(1.15); opacity: 1; box-shadow: 0 0 35px 12px rgba(249, 229, 150, 0.7); }
        100% { transform: scale(0.9); opacity: 0.8; }
    }
    @keyframes rippleAnim {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(8); opacity: 0; border-width: 0; }
    }
    @keyframes heartbeat {
        0% { transform: scale(1); }
        50% { transform: scale(1.15); text-shadow: 0 0 25px #fff; }
        100% { transform: scale(1); }
    }
</style>
</head>
<body>

    <div class="glass-panel header-card">
        <input type="file" id="avatarInput" accept="image/*" style="display: none;">
        <div class="avatar-wrapper" id="avatarWrapper" onclick="document.getElementById('avatarInput').click()"></div>
        <div class="traveler-info">
            <div class="traveler-rank">初信位 【一念清淨】</div>
            <div class="traveler-name">妙依</div>
        </div>
    </div>

    <div class="center-stage" id="centerStage">
        <svg class="dharma-ring" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(212,175,55,0.4)" stroke-width="0.5" stroke-dasharray="2 4"/>
            <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
            <path d="M100 5 L100 15 M100 185 L100 195 M5 100 L15 100 M185 100 L195 100" stroke="rgba(249,229,150,0.6)" stroke-width="1"/>
        </svg>
        <svg class="dharma-ring-inner" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
            <circle cx="75" cy="75" r="70" fill="none" stroke="rgba(249,229,150,0.3)" stroke-width="0.5" stroke-dasharray="10 10"/>
        </svg>
        
        <div class="ripple-effect" id="centerRipple"></div>
        <div class="bodhi-seed" id="bodhiSeed"></div>
    </div>

    <div class="actions-area">
        <div class="glass-panel counter-card" onclick="addCount('amitabha', event)">
            <div class="counter-num" id="countAmitabha">0</div>
            <div class="counter-title">專念彌陀</div>
        </div>

        <div class="glass-panel counter-card" 
             onmousedown="startHold(event)" onmouseup="endHold()" onmouseleave="endHold()"
             ontouchstart="startHold(event)" ontouchend="endHold()">
            <svg class="progress-ring" width="70" height="70">
                <circle id="holdRing" cx="35" cy="35" r="30" />
            </svg>
            <div class="counter-num" id="countOthers">0</div>
            <div class="counter-title">普念諸佛</div>
        </div>
    </div>

<script>
    // --- 1. 變數與初始化 ---
    let amitabhaCount = parseInt(localStorage.getItem('bodhi_amitabha')) || 0;
    let othersCount = parseInt(localStorage.getItem('bodhi_others')) || 0;
    let totalBodhiScore = parseInt(localStorage.getItem('bodhi_total_score')) || 0;

    document.getElementById('countAmitabha').innerText = amitabhaCount;
    document.getElementById('countOthers').innerText = othersCount;

    // --- 2. 大頭貼 ---
    window.onload = function() {
        const savedAvatar = localStorage.getItem('traveler_avatar');
        if (savedAvatar) {
            const wrapper = document.getElementById('avatarWrapper');
            wrapper.style.backgroundImage = `url(${savedAvatar})`;
            wrapper.classList.add('has-image');
        }
    };

    document.getElementById('avatarInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 200; canvas.height = 200;
                const size = Math.min(img.width, img.height);
                const x = (img.width - size) / 2;
                const y = (img.height - size) / 2;
                ctx.drawImage(img, x, y, size, size, 0, 0, 200, 200);
                const base64Str = canvas.toDataURL('image/jpeg', 0.8);
                localStorage.setItem('traveler_avatar', base64Str);
                const wrapper = document.getElementById('avatarWrapper');
                wrapper.style.backgroundImage = `url(${base64Str})`;
                wrapper.classList.add('has-image');
            }
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // --- 3. 念佛與灌溉動畫 ---
    function addCount(type, event) {
        const numElement = type === 'amitabha' ? document.getElementById('countAmitabha') : document.getElementById('countOthers');
        numElement.style.animation = 'none';
        numElement.offsetHeight; 
        numElement.style.animation = 'heartbeat 0.3s ease-out';

        if (type === 'amitabha') {
            amitabhaCount++;
            localStorage.setItem('bodhi_amitabha', amitabhaCount);
            numElement.innerText = amitabhaCount;
        } else {
            othersCount++;
            localStorage.setItem('bodhi_others', othersCount);
            numElement.innerText = othersCount;
        }

        totalBodhiScore++;
        localStorage.setItem('bodhi_total_score', totalBodhiScore);

        spawnLightParticle(event.clientX, event.clientY);
    }

    function spawnLightParticle(startX, startY) {
        const particle = document.createElement('div');
        particle.className = 'flying-particle';
        document.body.appendChild(particle);

        // 確保光點從點擊的卡片上方飛出
        particle.style.left = `${startX}px`;
        particle.style.top = `${startY - 40}px`;

        const target = document.getElementById('bodhiSeed').getBoundingClientRect();
        const targetX = target.left + target.width / 2;
        const targetY = target.top + target.height / 2;

        requestAnimationFrame(() => {
            particle.style.transform = `translate(${targetX - startX}px, ${targetY - startY + 40}px) scale(0.1)`;
            particle.style.opacity = '0';
        });

        setTimeout(() => {
            particle.remove();
            triggerRipple();
        }, 700);
    }

    function triggerRipple() {
        const ripple = document.getElementById('centerRipple');
        ripple.classList.remove('ripple-active');
        ripple.offsetHeight; 
        ripple.classList.add('ripple-active');
    }

    // --- 4. 長按歸零 ---
    let holdTimer;
    let holdProgress = 0;
    let holdAnimation;
    const holdDuration = 1500; 
    const circle = document.getElementById('holdRing');
    const circumference = 188.4; 

    function startHold(event) {
        // 如果是點擊，依然觸發計數；如果是長按，才觸發歸零
        if(event.type !== 'mousedown' && event.type !== 'touchstart') return;
        
        // 這裡做一個小判定：延遲 150ms 判斷是點擊還是長按
        holdTimer = setTimeout(() => {
            holdProgress = 0;
            circle.style.transition = 'none';
            circle.style.strokeDashoffset = circumference;
            const startTime = performance.now();

            function animateHold(currentTime) {
                const elapsed = currentTime - startTime;
                holdProgress = Math.min(elapsed / holdDuration, 1);
                circle.style.strokeDashoffset = circumference - (holdProgress * circumference);

                if (holdProgress < 1) {
                    holdAnimation = requestAnimationFrame(animateHold);
                } else {
                    executeReset();
                }
            }
            holdAnimation = requestAnimationFrame(animateHold);
        }, 150); // 150ms 後才開始跑圈，若在那之前放開，就算作點擊
    }

    function endHold(event) {
        clearTimeout(holdTimer); // 取消長按判定
        cancelAnimationFrame(holdAnimation);
        
        if (holdProgress === 0) {
            // 代表是快速點擊
            addCount('others', event || window.event);
        } else if (holdProgress < 1) {
            // 長按未滿，退回
            circle.style.transition = 'stroke-dashoffset 0.3s ease';
            circle.style.strokeDashoffset = circumference;
            holdProgress = 0;
        }
    }

    function executeReset() {
        othersCount = 0;
        localStorage.setItem('bodhi_others', 0);
        const numElement = document.getElementById('countOthers');
        numElement.style.opacity = '0'; 
        
        setTimeout(() => {
            numElement.innerText = '0';
            numElement.style.opacity = '1';
            circle.style.transition = 'none';
            circle.style.strokeDashoffset = circumference;
            holdProgress = 0; // 重置狀態
        }, 300);

        triggerRipple();
        setTimeout(triggerRipple, 200); 
    }
</script>
</body>
</html>
