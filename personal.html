<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>行者觀照 - 菩提心實體化</title>
<style>
    /* 宇宙黑金底色 */
    body {
        margin: 0;
        padding: 0;
        background-color: #030303;
        background-image: radial-gradient(circle at 50% 50%, rgba(25, 20, 10, 0.5) 0%, #030303 80%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #ffffff; /* 全面改為高對比純白 */
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        display: flex;
        justify-content: center;
    }

    .app-container {
        width: 100%;
        max-width: 480px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
    }

    /* 頂部導航列 (緊湊) */
    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px 5px 20px;
        z-index: 20;
    }
    .nav-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        color: #ffffff;
        font-size: 14px;
        text-decoration: none;
        opacity: 0.8;
    }
    .info-btn {
        background: transparent;
        border: 1px solid rgba(212, 175, 55, 0.5);
        color: #fff;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 12px;
        cursor: pointer;
    }

    /* 行者儀表板 (極致壓縮版) */
    .dashboard-card {
        margin: 10px 20px;
        background: rgba(15, 12, 8, 0.5);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(212, 175, 55, 0.2);
        border-radius: 12px;
        padding: 15px;
        z-index: 10;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    
    .profile-row {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    /* IG 頭像模組 */
    .avatar-container {
        position: relative;
        width: 60px;
        height: 60px;
        flex-shrink: 0;
    }
    .avatar-circle {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 1px solid rgba(249, 229, 150, 0.6);
        background-color: #111;
        background-position: center;
        background-size: cover;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    }
    .avatar-add-btn {
        position: absolute;
        bottom: -2px;
        right: -2px;
        width: 20px;
        height: 20px;
        background: linear-gradient(135deg, #d4af37, #b8860b);
        border: 2px solid #030303;
        border-radius: 50%;
        color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 16px;
        font-weight: bold;
        line-height: 1;
        cursor: pointer;
    }

    /* 數據區 */
    .stats-col {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    .name-rank {
        font-size: 15px;
        letter-spacing: 2px;
        font-weight: 400;
        margin-bottom: 6px;
        border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        padding-bottom: 4px;
    }
    .data-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
        font-size: 11px;
    }
    .data-label { color: rgba(255, 255, 255, 0.6); }
    .data-val { color: #f9e596; font-weight: 500; }

    /* 備忘錄輸入區 */
    .memo-input {
        width: 100%;
        background: transparent;
        border: none;
        color: #ffffff;
        font-size: 12px;
        letter-spacing: 1px;
        margin-top: 10px;
        outline: none;
    }
    .memo-input::placeholder { color: rgba(255, 255, 255, 0.3); }

    /* 中央菩提區 (加大佔比) */
    .center-stage {
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }
    .bodhi-seed {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 20px 8px rgba(249, 229, 150, 0.6);
        animation: breathe 3s ease-in-out infinite;
    }

    /* 底部操作列 (緊湊向量) */
    .bottom-actions {
        display: flex;
        justify-content: space-evenly;
        padding: 10px 20px 30px 20px;
        z-index: 10;
    }
    .action-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        cursor: pointer;
    }
    .icon-box {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(20, 18, 14, 0.8);
        border: 1px solid rgba(212, 175, 55, 0.4);
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .action-btn:active .icon-box { background: rgba(212, 175, 55, 0.2); transform: scale(0.95); }
    .action-text { font-size: 11px; color: #fff; opacity: 0.8; letter-spacing: 1px; }

    /* 隱藏的說明面板 (Modal) */
    .info-modal {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        z-index: 100;
        display: none;
        justify-content: center;
        align-items: center;
    }
    .info-content {
        background: #111;
        border: 1px solid #d4af37;
        border-radius: 12px;
        padding: 20px;
        width: 80%;
        color: #fff;
        font-size: 13px;
        line-height: 1.6;
    }
    .close-btn { margin-top: 15px; text-align: center; color: #d4af37; cursor: pointer; border-top: 1px solid #333; padding-top: 10px; }

    @keyframes breathe {
        0% { transform: scale(0.8); opacity: 0.8; }
        50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 30px 10px rgba(249, 229, 150, 0.8); }
        100% { transform: scale(0.8); opacity: 0.8; }
    }
</style>
</head>
<body>

<div class="app-container">

    <div class="top-bar">
        <a href="index.html" class="nav-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            回道場
        </a>
        <div class="info-btn" onclick="toggleInfo(true)">?</div>
    </div>

    <div class="dashboard-card">
        <div class="profile-row">
            <div class="avatar-container">
                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                <div class="avatar-circle" id="avatarCircle"></div>
                <div class="avatar-add-btn" onclick="document.getElementById('avatarInput').click()">+</div>
            </div>
            
            <div class="stats-col">
                <div class="name-rank">妙依 ‧ 初信位</div>
                <div class="data-grid">
                    <div><span class="data-label">總念佛 </span><span class="data-val" id="amiCount">0</span></div>
                    <div><span class="data-label">菩提分 </span><span class="data-val" id="totalScore">0</span></div>
                    <div style="grid-column: span 2;"><span class="data-label">娑婆 </span><span class="data-val">2026.04.12 12:00</span></div>
                </div>
            </div>
        </div>
        <input type="text" class="memo-input" id="memoInput" placeholder="寫下今日發心，儲存於本地...">
    </div>

    <div class="center-stage">
        <div class="bodhi-seed" id="bodhiSeed"></div>
    </div>

    <div class="bottom-actions">
        <div class="action-btn" onclick="playClickSound(); addScore('ami');">
            <div class="icon-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10" stroke-dasharray="3 3"/>
                </svg>
            </div>
            <div class="action-text">專念彌陀</div>
        </div>
        <div class="action-btn" onclick="playClickSound(); addScore('oth');">
            <div class="icon-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5">
                    <path d="M12 22C17.5 22 22 17.5 22 12S17.5 2 12 2 2 6.5 2 12" stroke-dasharray="4 4"/>
                    <path d="M12 8v8M8 12h8"/>
                </svg>
            </div>
            <div class="action-text">普念諸佛</div>
        </div>
    </div>

    <div class="info-modal" id="infoModal">
        <div class="info-content">
            <h3 style="margin-top:0; color:#d4af37;">系統運作說明</h3>
            <p>1. <b>大頭貼與備忘錄</b>：所有資料僅儲存於您的手機本地，無伺服器紀錄，絕對隱私。</p>
            <p>2. <b>菩提分數邏輯</b>：每次念佛灌溉、點亮小千世界，皆會轉化為菩提分數。分數累積將促使中央菩提心結苞、綻放。</p>
            <p>3. <b>雙軌計數</b>：專念彌陀將同步寫入主系統總數；普念諸佛則獨立計算，供行者個人觀照。</p>
            <div class="close-btn" onclick="toggleInfo(false)">關閉</div>
        </div>
    </div>

</div>

<script>
    // --- 準備無版權音效 ---
    // 請將你的音效檔放在同個資料夾，命名為 click.mp3。
    // 如果沒有，這裡寫好防呆邏輯，不會報錯。
    const clickAudio = new Audio('click.mp3'); 
    
    function playClickSound() {
        // 每次點擊重置時間並播放，達成清脆連按效果
        clickAudio.currentTime = 0;
        clickAudio.play().catch(e => { /* 忽略尚未放入音效檔時的瀏覽器報錯 */ });
    }

    // --- 介面邏輯 ---
    function toggleInfo(show) {
        document.getElementById('infoModal').style.display = show ? 'flex' : 'none';
    }

    // 備忘錄與頭像讀寫... (與之前邏輯相同，確保本地存取)
    const memo = document.getElementById('memoInput');
    memo.value = localStorage.getItem('traveler_memo') || '';
    memo.addEventListener('input', e => localStorage.setItem('traveler_memo', e.target.value));

    window.onload = () => {
        const avatar = localStorage.getItem('traveler_avatar');
        if(avatar) document.getElementById('avatarCircle').style.backgroundImage = `url(${avatar})`;
    };

    document.getElementById('avatarInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            document.getElementById('avatarCircle').style.backgroundImage = `url(${ev.target.result})`;
            localStorage.setItem('traveler_avatar', ev.target.result); // 簡易存取
        };
        reader.readAsDataURL(file);
    });

    function addScore(type) {
        // 測試用：點擊讓中央光點微微放大
        const seed = document.getElementById('bodhiSeed');
        seed.style.transform = 'scale(1.5)';
        setTimeout(() => seed.style.transform = '', 200);
    }
</script>
</body>
</html>
