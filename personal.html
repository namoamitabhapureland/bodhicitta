<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>菩提心實體化 - 妙依</title>
<style>
    /* 宇宙黑金底色 */
    body {
        margin: 0;
        padding: 0;
        background-color: #050505;
        background-image: radial-gradient(circle at 50% 50%, #1a150b 0%, #050505 80%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        height: 100vh;
        color: #d4af37;
        overflow: hidden;
        user-select: none; /* 防止長按反白文字 */
        -webkit-user-select: none;
    }

    /* 頂部：行者識界 (懸浮式) */
    .header-area {
        margin-top: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 10;
    }

    /* 琉璃金框頭像 (隱藏 input，點擊觸發) */
    .avatar-wrapper {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        border: 1px solid rgba(212, 175, 55, 0.4);
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.1), inset 0 0 10px rgba(212, 175, 55, 0.2);
        background-color: rgba(20, 18, 14, 0.6);
        background-position: center;
        background-size: cover;
        position: relative;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
    }
    .avatar-wrapper::after {
        content: '+';
        color: rgba(212, 175, 55, 0.5);
        font-size: 24px;
        font-weight: 100;
        opacity: 0.7;
    }
    .avatar-wrapper.has-image::after {
        display: none; /* 有照片時隱藏 + 號 */
    }

    .traveler-name {
        margin-top: 15px;
        font-size: 16px;
        font-weight: 300;
        letter-spacing: 3px;
        color: #f9e596;
        text-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
    }
    .traveler-rank {
        margin-top: 5px;
        font-size: 11px;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.5);
    }

    /* 中央：菩提心輪 (第一階段光點) */
    .center-stage {
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        width: 100%;
    }
    
    .bodhi-seed {
        position: absolute;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: radial-gradient(circle, #ffffff 0%, #f9e596 40%, transparent 80%);
        box-shadow: 0 0 20px 5px rgba(249, 229, 150, 0.4);
        animation: breathe 4s ease-in-out infinite;
    }

    /* 點擊時觸發的水波紋 */
    .ripple-effect {
        position: absolute;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 1px solid rgba(249, 229, 150, 0.6);
        opacity: 0;
        transform: scale(1);
    }
    .ripple-active {
        animation: rippleAnim 0.8s ease-out forwards;
    }

    /* 底部：無痕計數區 */
    .actions-area {
        margin-bottom: 60px;
        display: flex;
        gap: 50px;
        z-index: 10;
    }

    .action-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
    }

    /* 懸浮數字 */
    .counter-num {
        font-size: 28px;
        font-weight: 100;
        color: rgba(255, 252, 240, 0.9);
        letter-spacing: 2px;
        margin-bottom: 15px;
        text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
    }

    /* 長按歸零的倒數圓環 (SVG) */
    .progress-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-90deg);
        pointer-events: none;
    }
    .progress-ring circle {
        fill: transparent;
        stroke: rgba(249, 229, 150, 0.8);
        stroke-width: 1.5;
        stroke-dasharray: 125.6; /* 2 * pi * r (r=20) */
        stroke-dashoffset: 125.6;
        transition: stroke-dashoffset 0.1s linear;
    }

    /* 極簡琉璃按鈕 */
    .btn-minimal {
        background: transparent;
        border: none;
        color: rgba(212, 175, 55, 0.6);
        font-size: 12px;
        letter-spacing: 2px;
        cursor: pointer;
        padding: 8px 0;
        position: relative;
    }
    .btn-minimal::before {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 30px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.5), transparent);
    }

    /* 飛行動態光點 */
    .flying-particle {
        position: absolute;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background-color: #fff;
        box-shadow: 0 0 8px 2px #f9e596;
        pointer-events: none;
        z-index: 100;
        transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.7s ease-in;
    }

    /* 動畫定義 */
    @keyframes breathe {
        0% { transform: scale(0.9); opacity: 0.7; }
        50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 30px 8px rgba(249, 229, 150, 0.6); }
        100% { transform: scale(0.9); opacity: 0.7; }
    }
    @keyframes rippleAnim {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(5); opacity: 0; border-width: 0; }
    }
    @keyframes heartbeat {
        0% { transform: scale(1); }
        50% { transform: scale(1.15); text-shadow: 0 0 20px rgba(255, 255, 255, 0.8); }
        100% { transform: scale(1); }
    }
</style>
</head>
<body>

    <div class="header-area">
        <input type="file" id="avatarInput" accept="image/*" style="display: none;">
        <div class="avatar-wrapper" id="avatarWrapper" onclick="document.getElementById('avatarInput').click()"></div>
        <div class="traveler-name">妙依</div>
        <div class="traveler-rank">初信位 【一念清淨】</div>
    </div>

    <div class="center-stage" id="centerStage">
        <div class="ripple-effect" id="centerRipple"></div>
        <div class="bodhi-seed" id="bodhiSeed"></div>
    </div>

    <div class="actions-area">
        <div class="action-group">
            <div class="counter-num" id="countAmitabha">0</div>
            <button class="btn-minimal" onclick="addCount('amitabha', event)">專念彌陀</button>
        </div>

        <div class="action-group">
            <svg class="progress-ring" width="50" height="50">
                <circle id="holdRing" cx="25" cy="25" r="20" />
            </svg>
            <div class="counter-num" id="countOthers">0</div>
            <button class="btn-minimal" 
                    onmousedown="startHold(event)" onmouseup="endHold()" onmouseleave="endHold()"
                    ontouchstart="startHold(event)" ontouchend="endHold()">普念諸佛</button>
        </div>
    </div>

<script>
    // --- 1. 初始化本地資料 ---
    let amitabhaCount = parseInt(localStorage.getItem('bodhi_amitabha')) || 0;
    let othersCount = parseInt(localStorage.getItem('bodhi_others')) || 0;
    let totalBodhiScore = parseInt(localStorage.getItem('bodhi_total_score')) || 0; // 隱藏的菩提總分

    document.getElementById('countAmitabha').innerText = amitabhaCount;
    document.getElementById('countOthers').innerText = othersCount;

    // --- 2. 大頭貼偽上傳與 Canvas 壓縮 ---
    window.onload = function() {
        const savedAvatar = localStorage.getItem('traveler_avatar');
        if (savedAvatar) {
            const wrapper = document.getElementById('avatarWrapper');
            wrapper.style.backgroundImage = `url(${savedAvatar})`;
            wrapper.classList.add('has-image');
        }
    };

    document.getElementById('avatarInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                // 使用 Canvas 壓縮圖片，避免擠爆 localStorage
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                // 設定壓縮後的大小 200x200
                canvas.width = 200; 
                canvas.height = 200;
                
                // 裁切成正方形置中
                const size = Math.min(img.width, img.height);
                const x = (img.width - size) / 2;
                const y = (img.height - size) / 2;
                ctx.drawImage(img, x, y, size, size, 0, 0, 200, 200);

                const base64Str = canvas.toDataURL('image/jpeg', 0.8); // 80% 畫質
                
                // 存入本地與顯示
                localStorage.setItem('traveler_avatar', base64Str);
                const wrapper = document.getElementById('avatarWrapper');
                wrapper.style.backgroundImage = `url(${base64Str})`;
                wrapper.classList.add('has-image');
            }
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // --- 3. 念佛計數與光點灌溉動態 ---
    function addCount(type, event) {
        // 數字跳動回饋
        const numElement = type === 'amitabha' ? document.getElementById('countAmitabha') : document.getElementById('countOthers');
        numElement.style.animation = 'none';
        numElement.offsetHeight; // 觸發重繪
        numElement.style.animation = 'heartbeat 0.3s ease-out';

        // 數值更新
        if (type === 'amitabha') {
            amitabhaCount++;
            localStorage.setItem('bodhi_amitabha', amitabhaCount);
            numElement.innerText = amitabhaCount;
            // 這裡可以呼叫主系統的 API 寫入總彌陀數： updateMainSystemAmitabha();
        } else {
            othersCount++;
            localStorage.setItem('bodhi_others', othersCount);
            numElement.innerText = othersCount;
        }

        // 菩提總分增加
        totalBodhiScore++;
        localStorage.setItem('bodhi_total_score', totalBodhiScore);

        // 觸發光點飛行動畫
        spawnLightParticle(event.clientX, event.clientY);
    }

    function spawnLightParticle(startX, startY) {
        const particle = document.createElement('div');
        particle.className = 'flying-particle';
        document.body.appendChild(particle);

        // 設定起點 (稍微在按鈕上方)
        particle.style.left = `${startX}px`;
        particle.style.top = `${startY - 30}px`;

        // 取得中央菩提心的位置
        const target = document.getElementById('bodhiSeed').getBoundingClientRect();
        const targetX = target.left + target.width / 2;
        const targetY = target.top + target.height / 2;

        // 計算位移量 (加入一點弧度視覺，利用 cubic-bezier 在 CSS 處理)
        requestAnimationFrame(() => {
            particle.style.transform = `translate(${targetX - startX}px, ${targetY - startY + 30}px) scale(0.1)`;
            particle.style.opacity = '0';
        });

        // 光點抵達後觸發水波紋
        setTimeout(() => {
            particle.remove();
            triggerRipple();
        }, 700);
    }

    function triggerRipple() {
        const ripple = document.getElementById('centerRipple');
        ripple.classList.remove('ripple-active');
        ripple.offsetHeight; // 觸發重繪
        ripple.classList.add('ripple-active');
    }

    // --- 4. 長按歸零儀式 (普念諸佛) ---
    let holdTimer;
    let holdProgress = 0;
    let holdAnimation;
    const holdDuration = 1500; // 1.5 秒
    const circle = document.getElementById('holdRing');
    const circumference = 125.6; // SVG 圓周

    function startHold(event) {
        // 防止手機長按選取文字或跳出選單
        event.preventDefault(); 
        
        holdProgress = 0;
        circle.style.transition = 'none';
        circle.style.strokeDashoffset = circumference;

        const startTime = performance.now();

        function animateHold(currentTime) {
            const elapsed = currentTime - startTime;
            holdProgress = Math.min(elapsed / holdDuration, 1);
            
            // 更新光圈
            circle.style.strokeDashoffset = circumference - (holdProgress * circumference);

            if (holdProgress < 1) {
                holdAnimation = requestAnimationFrame(animateHold);
            } else {
                // 圈滿了，執行歸零
                executeReset();
            }
        }
        holdAnimation = requestAnimationFrame(animateHold);
    }

    function endHold() {
        cancelAnimationFrame(holdAnimation);
        // 如果沒按滿 1.5 秒就放開，光圈退回
        if (holdProgress < 1) {
            circle.style.transition = 'stroke-dashoffset 0.3s ease';
            circle.style.strokeDashoffset = circumference;
        }
    }

    function executeReset() {
        // 將諸佛數字歸零，但總菩提分數保留
        othersCount = 0;
        localStorage.setItem('bodhi_others', 0);
        
        const numElement = document.getElementById('countOthers');
        numElement.style.opacity = '0'; // 優雅淡出
        
        setTimeout(() => {
            numElement.innerText = '0';
            numElement.style.opacity = '1';
            // 光圈隱藏
            circle.style.transition = 'none';
            circle.style.strokeDashoffset = circumference;
        }, 300);

        // 觸發一次大水波紋表示「收攏」
        triggerRipple();
        setTimeout(triggerRipple, 200); 
    }
</script>

</body>
</html>
