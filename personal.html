<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>菩提心室 ‧ 終極大滿貫</title>
    <style>
        :root { --bg: #010103; --gold: #f3e5ab; --solid: #d4af37; --cyan: #8ba89c; --text-light: #eee; --glass-border: rgba(255, 255, 255, 0.15); }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text-light); font-family: "PingFang TC", serif; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        .app-wrapper { width: 100%; max-width: 480px; display: flex; flex-direction: column; position: relative; z-index: 10; height: 100dvh; }

        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }

        /* 頂部導航 (文字放大、改為說明) */
        .nav-top { padding: max(20px, env(safe-area-inset-top)) 25px 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav-link { color: #aaa; font-size: 15px; letter-spacing: 2px; text-decoration: none; cursor: pointer; transition: 0.3s; }
        .nav-link:active { color: var(--gold); }

        /* IG 級排版 (字體全面放大) */
        .ig-profile { padding: 15px 20px; display: flex; align-items: center; gap: 20px; margin: 0 15px; }
        .avatar-wrap { 
            width: 88px; height: 88px; border-radius: 50%; border: 1.5px solid var(--solid); 
            padding: 3px; position: relative; flex-shrink: 0; cursor: pointer; box-shadow: 0 0 15px rgba(212,175,55,0.25);
        }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; background-color: #111; background-size: cover; background-position: center; }
        .stats-wrap { flex: 1; display: flex; justify-content: space-around; text-align: center; }
        .stat-item { display: flex; flex-direction: column; gap: 6px; cursor: pointer; }
        .stat-num { font-size: 26px; font-weight: 300; color: #fff; text-shadow: 0 0 12px rgba(255,255,255,0.2); }
        .stat-lbl { font-size: 13px; color: var(--cyan); letter-spacing: 2px; }

        .bio-wrap { margin: 15px 25px 5px; padding-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .bio-name { font-size: 16px; letter-spacing: 3px; color: var(--gold); margin-bottom: 10px; }
        .memo-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid transparent; color: #aaa; font-size: 13px; letter-spacing: 1px; padding: 4px 0; transition: 0.3s; }
        .memo-input:focus { border-bottom-color: var(--glass-border); color: #fff; }

        /* 蓮花舞台 */
        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; min-height: 0; }
        #lotus-container { width: 85vw; height: 85vw; max-width: 340px; max-height: 340px; animation: breathe 4s infinite ease-in-out; display: flex; justify-content: center; align-items: center; position: relative; }
        .seed { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px #fff; z-index: 10; animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(0.96); } 50% { transform: scale(1.04); } }

        /* 底部操作 */
        .footer { padding: 10px 25px max(30px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; }
        .buddha-sel { color: var(--cyan); font-size: 14px; letter-spacing: 4px; cursor: pointer; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 1px dashed var(--glass-border); }
        .actions { display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        
        /* ✨ 實心燙金包覆感主按鈕 ✨ */
        .main-btn { 
            width: 82px; height: 82px; border-radius: 50%; 
            border: 3px solid var(--solid); /* 實心第二圈 */
            background: radial-gradient(circle at center, rgba(212,175,55,0.15) 0%, rgba(5,5,8,0.9) 100%); 
            display: flex; justify-content: center; align-items: center; transition: 0.2s; cursor: pointer; 
            box-shadow: 0 0 20px rgba(212,175,55,0.2), inset 0 0 15px rgba(212,175,55,0.4); 
        }
        .main-btn:active { transform: scale(0.92); box-shadow: 0 0 30px rgba(212,175,55,0.4), inset 0 0 20px rgba(212,175,55,0.6); }
        
        .data-btn { position: absolute; left: 0; background: rgba(212,175,55,0.05); border: 1px solid var(--solid); color: var(--solid); font-size: 13px; letter-spacing: 2px; padding: 10px 18px; border-radius: 25px; cursor: pointer; backdrop-filter: blur(5px); transition: 0.3s; }
        .data-btn:active { background: rgba(212,175,55,0.2); }
        .fly-particle { position: absolute; width: 3px; height: 3px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 100; box-shadow: 0 0 8px var(--gold); }

        /* 琉璃燙金模態框 */
        .custom-modal { position: fixed; inset: 0; z-index: 4000; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.4s; }
        .custom-modal.show { display: flex; opacity: 1; }
        .modal-box { background: rgba(5,5,8,0.85); border: 1px solid var(--solid); border-radius: 16px; padding: 30px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 0 40px rgba(212,175,55,0.15); }
        .modal-title { color: var(--solid); font-size: 16px; letter-spacing: 4px; margin-bottom: 20px; }
        .modal-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--solid); color: var(--gold); font-size: 16px; padding: 10px; text-align: center; margin-bottom: 25px; outline: none; }
        .modal-desc { color: var(--cyan); font-size: 14px; letter-spacing: 2px; margin-bottom: 25px; line-height: 1.8; }
        .modal-actions { display: flex; gap: 15px; justify-content: center; }
        .gold-btn { flex: 1; background: rgba(212,175,55,0.1); border: 1px solid var(--solid); color: var(--gold); padding: 12px; border-radius: 8px; font-size: 14px; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .gold-btn:active { background: rgba(212,175,55,0.3); }
        .gold-btn.outline { border-color: var(--glass-border); color: #aaa; background: transparent; }

        /* ✨ 大數據能量棒 (神級 50/50 刻度) ✨ */
        #dataModal { z-index: 2000; flex-direction: column; }
        .data-card { width: 90%; max-width: 400px; border: 1px solid var(--solid); border-radius: 16px; padding: 30px 20px; box-shadow: 0 10px 40px rgba(212,175,55,0.15); background: #050505; max-height: 80vh; overflow-y: auto; }
        .data-title { color: var(--solid); font-size: 16px; letter-spacing: 4px; text-align: center; margin-bottom: 5px; }
        
        .glass-energy-bar { width: 100%; margin: 8px 0 35px 0; position: relative; }
        .bar-track { width: 100%; height: 14px; background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border); border-radius: 10px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #FDF5D3, #D4AF37, #E5989B, #89CFF0, #C9A0DC, #D4AF37, #FDF5D3); background-size: 200% 100%; opacity: 0.9; animation: energyFlow 4s linear infinite; transition: width 1s cubic-bezier(0.2, 0.8, 0.2, 1); width: 0%; }
        @keyframes energyFlow { 0% { background-position: 200% 0; } 100% { background-position: 0% 0; } }
        
        .bar-labels { position: absolute; width: 100%; height: 20px; top: 22px; }
        .bar-labels span { position: absolute; font-size: 10px; color: #aaa; letter-spacing: 1px; transform: translateX(-50%); white-space: nowrap; }
        .bar-labels span::before { content: ''; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 0 0 6px rgba(255,255,255,0.9); }

        .t-svg-wrap { width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; animation: float-pulse 4s infinite ease-in-out; margin-bottom: 25px; }
        .t-svg-wrap svg { width: 100%; height: 100%; object-fit: contain; }
        @keyframes float-pulse { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .t-name { color: #fff; font-size: 1.2rem; letter-spacing: 5px; text-shadow: 0 0 20px #fff, 0 0 40px var(--solid); text-align: center; }
    </style>
</head>

                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.body.addEventListener('touchstart', () => { if(audioCtx.state === 'suspended') audioCtx.resume(); }, {once:true});
    function playTap() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function openM(id) { document.getElementById(id).classList.add('show'); }
    function closeM(id) { document.getElementById(id).classList.remove('show'); }

    function openBuddhaModal() { document.getElementById('buddhaInput').value = curBuddha; openM('buddhaModal'); }
    function confirmBuddha() { let val = document.getElementById('buddhaInput').value.trim(); if(val) { curBuddha = val; document.getElementById('buddha-sel').innerText = `當前定課：${val}`; } closeM('buddhaModal'); }

    function execReset(type) {
        if(type === 'ami') { db.totalNian = 0; localStorage.setItem('PX_V15.0', JSON.stringify(db)); closeM('resetAmiModal'); }
        if(type === 'oth') { localOth = {}; localStorage.setItem('personal_oth_list', JSON.stringify(localOth)); closeM('resetOthModal'); }
        updateUI();
    }

    let db = JSON.parse(localStorage.getItem('PX_V15.0')) || { totalNian: 0, bodhiLitCount: 0 };
    let localOth = JSON.parse(localStorage.getItem('personal_oth_list') || '{}');
    let curBuddha = "阿彌陀佛";
    let cheatPts = 0;

    function getPts() {
        let nianSum = (db.totalNian || 0) + Object.values(localOth).reduce((a,b)=>a+b, 0);
        let lit = db.bodhiLitCount || 0; return Math.floor(nianSum / 100)*10 + lit + Math.floor(lit/10)*10 + cheatPts;
    }

    const avSaved = localStorage.getItem('bodhi_avatar'); if(avSaved) document.getElementById('ui-avatar').style.backgroundImage = `url(${avSaved})`;
    function handleAvatar(e) { const r = new FileReader(); r.onload = ev => { document.getElementById('ui-avatar').style.backgroundImage = `url(${ev.target.result})`; localStorage.setItem('bodhi_avatar', ev.target.result); }; if(e.target.files[0]) r.readAsDataURL(e.target.files[0]); }
    const memo = document.getElementById('ui-memo'); memo.value = localStorage.getItem('bodhi_memo') || ''; memo.oninput = e => localStorage.setItem('bodhi_memo', e.target.value);

    function handleNian(e) {
        playTap();
        if(curBuddha === "阿彌陀佛") { db.totalNian = (db.totalNian || 0) + 1; localStorage.setItem('PX_V15.0', JSON.stringify(db)); } 
        else { localOth[curBuddha] = (localOth[curBuddha] || 0) + 1; localStorage.setItem('personal_oth_list', JSON.stringify(localOth)); }
        
        const p = document.createElement('div'); p.className = 'fly-particle';
        const startX = e.clientX || e.touches[0].clientX; const startY = e.clientY || e.touches[0].clientY;
        p.style.left = startX + 'px'; p.style.top = startY + 'px'; document.body.appendChild(p);
        const target = document.getElementById('seed-core').getBoundingClientRect();
        p.animate([{ transform: 'scale(1)', opacity: 1, left: startX+'px', top: startY+'px' }, { transform: 'scale(0.2)', opacity: 0, left: (target.left+3)+'px', top: (target.top+3)+'px' }], 600).onfinish = () => p.remove();
        updateUI();
    }
    function addCheat() { cheatPts += 1000; updateUI(); }

    const treasures = [
        { name: "幾何慧劍", svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" preserveAspectRatio="xMidYMid meet"><g transform="translate(0, 5)"><polygon points="50,10 56,40 50,105 44,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="35,100 65,100 55,110 45,110" fill="url(#pure-glass)" stroke="#d4af37" stroke-width="0.8"/><circle cx="50" cy="105" r="4" fill="#fff"/></g></svg>` },
        { name: "琉璃淨瓶", svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" preserveAspectRatio="xMidYMid meet"><g transform="translate(0, 10)"><polygon points="42,50 58,50 72,95 28,95" fill="url(#facet-cyan)" stroke="#fff" stroke-width="0.5"/><circle cx="50" cy="80" r="10" fill="rgba(255,255,255,0.6)"/></g></svg>` },
        { name: "多面寶珠", svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" preserveAspectRatio="xMidYMid meet"><g transform="translate(0, 20)"><polygon points="50,15 85,45 50,65 15,45" fill="url(#facet-light)" stroke="#fff" stroke-width="0.8"/><polygon points="15,45 50,65 50,115 25,85" fill="url(#facet-rose)" opacity="0.9" stroke="#fff" stroke-width="0.5"/></g></svg>` }
    ];
    function checkDailyTreasure() {
        const today = new Date().toDateString(); const lastLogin = localStorage.getItem('bodhi_last_login'); let days = parseInt(localStorage.getItem('bodhi_login_days') || '0');
        if (lastLogin !== today) { days++; localStorage.setItem('bodhi_login_days', days); localStorage.setItem('bodhi_last_login', today); }
        if (days > 0 && days % 3 === 0 && localStorage.getItem('bodhi_treasure_claimed') !== today) {
            const t = treasures[Math.floor(Math.random()*treasures.length)];
            document.getElementById('t-svg-ui').innerHTML = t.svg; document.getElementById('t-name-ui').innerText = `獲得法寶：${t.name}`;
            openM('treasureModal'); localStorage.setItem('bodhi_treasure_claimed', today);
        }
    }

    // ✨ 50/50 數學完美映射能量棒 ✨
    function openDataModal() {
        let html = buildEnergyBar('阿彌陀佛', db.totalNian || 0);
        for(let [k,v] of Object.entries(localOth)) if(v > 0) html += buildEnergyBar(k, v);
        document.getElementById('data-bars-container').innerHTML = html; openM('dataModal');
        setTimeout(() => { document.querySelectorAll('.bar-fill').forEach(el => el.style.width = el.getAttribute('data-w')); }, 50);
    }
    function buildEnergyBar(name, count) {
        let w = 0;
        if(count <= 1000) w = (count / 1000) * 50; 
        else { let logC = Math.log10(count); w = 50 + ((logC - 3) / 5) * 50; } // 1000到1億對數映射
        w = Math.min(100, Math.max(1, w));
        
        return `<div style="margin-bottom: 35px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span style="font-size:14px; color:var(--gold); letter-spacing:2px;">${name}</span>
                <span style="font-size:14px; color:#fff;">${count.toLocaleString()}</span>
            </div>
            <div class="glass-energy-bar">
                <div class="bar-track"><div class="bar-fill" data-w="${w}%"></div></div>
                <div class="bar-labels">
                    <span style="left:5%">1百</span><span style="left:50%">1千</span><span style="left:60%">1萬</span>
                    <span style="left:70%">10萬</span><span style="left:80%">100萬</span><span style="left:90%">1千萬</span><span style="left:100%">1億</span>
                </div>
            </div></div>`;
    }

    function renderLotus(p) {
        const box = document.getElementById('lotus-container'); const rank = document.getElementById('ui-rank-text');
        if(p < 10) { box.innerHTML = ''; rank.innerText = "一真法界"; box.style.filter = "none"; return; }
        let layers = 1, fill = "url(#grad-10)", rTxt = "清淨萌芽", stroke = "rgba(255,255,255,0.6)", glow = "none";
        if(p>=50) fill = "url(#grad-50)";
        if(p>=100) { layers=2; fill="url(#grad-100)"; stroke="rgba(212,175,55,0.6)"; rTxt="聖潔初金"; }
        if(p>=300) fill="url(#grad-300)"; if(p>=500) fill="url(#grad-500)"; if(p>=700) fill="url(#grad-700)"; if(p>=900) fill="url(#grad-900)";
        if(p>=1000) { fill="url(#grad-1000)"; stroke="rgba(255,255,255,0.4)"; rTxt="初心幻彩"; }
        if(p>=5000) { fill="url(#grad-5000)"; rTxt="青淨琉璃"; }
        if(p>=10000) { fill="url(#grad-10000)"; rTxt="紫金霞光"; }
        if(p>=15000) { fill="url(#grad-15000)"; rTxt="晨曦玉露"; }
        if(p>=20000) { fill="url(#grad-20000)"; rTxt="月魄銀輝"; }
        if(p>=25000) { fill="url(#grad-25000)"; rTxt="玄黃凝脂"; }
        if(p>=30000) { fill="url(#grad-30000)"; stroke="#fff"; rTxt="大圓滿耀金"; glow="drop-shadow(0 0 15px rgba(212,175,55,0.6))"; }
        rank.innerText = rTxt; box.style.filter = glow;
        let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-150 -150 300 300" style="width:100%; height:100%; overflow:visible;">`;
        for(let l=layers; l>0; l--) { const sc = 0.4 + (l * 0.25); for(let i=0; i<8; i++) { svg += `<g transform="rotate(${i*45 + (l*22.5) + (p*0.02)}) scale(${sc})"><path d="M 0 0 Q 30 -60 0 -120 Q -30 -60 0 0" fill="${fill}" stroke="${stroke}" stroke-width="1.2" opacity="0.9"/></g>`; } }
        svg += `</svg>`; box.innerHTML = svg;
    }

    function updateUI() {
        document.getElementById('ui-ami-count').innerText = (db.totalNian || 0).toLocaleString();
        document.getElementById('ui-oth-count').innerText = Object.values(localOth).reduce((a,b)=>a+b, 0).toLocaleString();
        document.getElementById('ui-lit-count').innerText = (db.bodhiLitCount || 0).toLocaleString();
        renderLotus(getPts());
    }

    const cvs = document.getElementById('starCanvas'); const ctx = cvs.getContext('2d'); let stars = [];
    function initS() { cvs.width=window.innerWidth; cvs.height=window.innerHeight; stars = Array.from({length:100}, ()=>({ x:Math.random()*cvs.width, y:Math.random()*cvs.height, s:Math.random()*2+0.5, sp:Math.random()*0.002, off:Math.random()*Math.PI*2 })); }
    function drawS() { ctx.clearRect(0,0,cvs.width,cvs.height); let t = Date.now(); stars.forEach(s => { ctx.globalAlpha = 0.2+Math.abs(Math.sin(t*s.sp+s.off))*0.8; ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(s.x,s.y,s.s,0,Math.PI*2); ctx.fill(); }); requestAnimationFrame(drawS); }
    window.onresize = initS; initS(); drawS(); checkDailyTreasure(); updateUI();
</script>
</body>
</html>
