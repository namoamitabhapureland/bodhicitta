<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>般若智慧 ． 破迷開悟</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: #010103; color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
        }

        /* ---------------- 虛空瞬光 ---------------- */
        #void-flash { position: absolute; inset: 0; pointer-events: none; opacity: 0; z-index: 999; transition: opacity 0.8s ease-out, box-shadow 0.8s ease-out; }
        .flash-gold { box-shadow: inset 0 0 150px rgba(212, 175, 55, 0.85); opacity: 1 !important; }
        .flash-red { box-shadow: inset 0 0 180px rgba(139, 0, 0, 0.95); opacity: 1 !important; }

        /* ---------------- 星空引擎 ---------------- */
        canvas { display: block; position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(circle at center, transparent 10%, rgba(1, 1, 3, 0.98) 100%); }

    
                /* 能量光弦收攝於玉簡頂部 */
        #energy-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 6px; z-index: 100; background: rgba(255,255,255,0.02); opacity: 0; transition: opacity 0.5s; border-radius: 20px 20px 0 0; overflow: hidden; }
        #energy-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #d4af37, #f3e5ab, #d4af37); box-shadow: 0 0 15px rgba(212,175,55,0.8); transform-origin: left; }

        /* ---------------- 左上角與右上角：法界護法按鈕 (✨ 微調大小與排版) ---------------- */
        #btn-back, #btn-info {
            position: absolute; top: calc(max(20px, env(safe-area-inset-top, 20px))); 
            z-index: 100; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; 
            display: flex; align-items: center; gap: 6px; opacity: 0.6; transition: all 0.4s ease;
            background: rgba(255,255,255,0.02); padding: 8px 12px; border-radius: 20px;
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.05);
        }
        #btn-back { left: 20px; color: #8ba89c; }
        #btn-back:hover, #btn-back:active { opacity: 1; transform: scale(0.95); color: #d4af37; border-color: rgba(212,175,55,0.3); }
        #btn-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }

        #btn-info { right: 20px; color: #d4af37; border-color: rgba(212,175,55,0.15); }
        #btn-info:hover, #btn-info:active { opacity: 1; transform: scale(0.95); filter: drop-shadow(0 0 8px #d4af37); background: rgba(212,175,55,0.05); }
        #btn-info svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }

        /* ---------------- 說明欄彈出層：顯影美學 ---------------- */
        #info-overlay {
            position: fixed; inset: 0; z-index: 9999; background: rgba(1, 1, 3, 0.85);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.6s ease;
        }
        #info-overlay.show { display: flex; opacity: 1; }
        #info-content {
            width: 85%; max-width: 480px; color: #b0c4de; font-size: 0.95rem; line-height: 2.2;
            letter-spacing: 2px; text-align: justify; border-left: 1px solid rgba(212, 175, 55, 0.4); 
            padding-left: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); font-weight: 300;
        }
        .info-title { color: #f3e5ab; font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 4px; text-shadow: 0 0 15px rgba(212,175,55,0.5); font-weight: 300; }

        /* ---------------- 右下角：八瓣金蓮進度顯示 (✨ 縮小並調整文字位置) ---------------- */
        #lotus-totem-wrap {
            position: absolute; bottom: calc(max(20px, env(safe-area-inset-bottom, 20px))); right: 25px; 
            display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 100; pointer-events: none;
        }
        #lotus-totem { width: 60px; height: 60px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.1)); }
        .lunar-ring { fill: none; stroke: #8ba89c; stroke-width: 0.8; stroke-dasharray: 2 4; opacity: 0.4; transition: 0.5s; }
        .maze-petal { fill: rgba(139,168,156,0.12); stroke: #8ba89c; stroke-width: 0.8; stroke-opacity: 0.3; transition: all 0.8s; }
        .maze-petal.lit { fill: #f3e5ab; stroke: #fff; stroke-width: 1.2; filter: drop-shadow(0 0 8px #fff); opacity: 1; }
        .maze-core { fill: none; stroke: #8ba89c; stroke-width: 1.5; opacity: 0.6; transition: all 0.8s; }
        .maze-core.lit { stroke: #d4af37; fill: rgba(212,175,55,0.3); filter: drop-shadow(0 0 15px #d4af37); opacity: 1; }
        .center-seed { fill: #fff; opacity: 0.8; transition: all 0.5s; }
        .totem-text { color: #8ba89c; font-size: 0.75rem; letter-spacing: 2px; }

        /* ---------------- 法門場景 ---------------- */
        #door-scene { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 460px; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; cursor: pointer; pointer-events: auto; }
        #door-scene.zooming { transition: transform 1.8s cubic-bezier(0.6, 0.05, 0.1, 1), opacity 1.2s; transform: translate(-50%, -50%) scale(10); opacity: 0; pointer-events: none; }
        
        .door-frame-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 11; pointer-events: none; filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.2)); }
        
        #door-panel-container { position: absolute; top: 15px; left: 15px; right: 15px; bottom: 0; z-index: 12; display: flex; overflow: hidden; justify-content: center; pointer-events: none; border-radius: 125px 125px 0 0; }
        
        .door-panel { width: 50%; height: 100%; transition: transform 1.5s cubic-bezier(0.5, 0, 0.1, 1); position: relative; overflow: hidden; }
        
        .door-panel::before { 
            content: ''; position: absolute; inset: 0; 
            background: radial-gradient(circle at center, rgba(243, 229, 171, 0.25) 0%, rgba(212, 175, 55, 0.05) 80%);
            backdrop-filter: blur(5px);
            border-bottom: 0.8px solid rgba(243, 229, 171, 0.3);
            animation: doorBreathe 4s infinite alternate ease-in-out;
            transition: all 0.3s;
        }
        @keyframes doorBreathe { 0% { opacity: 0.85; filter: brightness(0.95); } 100% { opacity: 1; filter: brightness(1.2); } }

        .door-smoke {
            position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%);
            width: 480px; height: 120px; z-index: 13; pointer-events: none;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.35) 0%, rgba(212,175,55,0.15) 50%, transparent 85%);
            filter: blur(12px); animation: smokeDrift 6s infinite alternate ease-in-out;
        }

        .door-left { border-radius: 125px 0 0 0; }
        .door-left::before { border-right: 1px solid rgba(255,255,255,0.6); box-shadow: 2px 0 15px rgba(212,175,55,0.4); }
        .door-right { border-radius: 0 125px 0 0; }
        .door-right::before { border-left: 1px solid rgba(255,255,255,0.6); box-shadow: -2px 0 15px rgba(212,175,55,0.4); }
        
        .lotus-seal { position: absolute; top: 50%; transform: translateY(-50%); width: 140px; height: 140px; z-index: 15; pointer-events: none; }
        .door-left .lotus-seal { right: -70px; } 
        .door-right .lotus-seal { left: -70px; } 

        #door-scene.opening .door-left { transform: translateX(-100%); }
        #door-scene.opening .door-right { transform: translateX(100%); }

        #door-hint { position: absolute; top: -60px; width: 100%; text-align: center; color: #f3e5ab; font-size: 1.1rem; letter-spacing: 6px; animation: pulseGlow 2.5s infinite alternate; font-weight: 300; transition: all 0.5s; }
        @keyframes pulseGlow { 0% { opacity: 0.5; text-shadow: 0 0 10px rgba(212,175,55,0.3); } 100% { opacity: 1; text-shadow: 0 0 25px rgba(243,229,171,0.8), 0 0 40px #fff; } }
        
        /* ---------------- 業火餘燼美學字體 (✨ 優化失敗提示) ---------------- */
        .door-hint-fail {
            color: #d4af37 !important; /* 以暗金為主，避免大紅色的俗氣 */
            text-shadow: 0 0 15px rgba(184, 59, 59, 0.8), 0 0 5px rgba(212,175,55,0.5) !important;
            font-weight: 300 !important; letter-spacing: 4px !important;
            animation: embersGlow 3s infinite alternate !important; /* 加入餘燼閃爍感 */
        }
        @keyframes embersGlow { 0% { opacity: 0.6; text-shadow: 0 0 10px rgba(184, 59, 59, 0.5); } 100% { opacity: 1; text-shadow: 0 0 20px rgba(184, 59, 59, 0.9), 0 0 8px rgba(212,175,55,0.6); } }

        /* ---------------- 題庫玉簡 (✨ 優化內文排版呼吸感) ---------------- */
        #q-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%) scale(0.92); width: 92%; max-width: 540px; background: linear-gradient(145deg, rgba(15, 20, 25, 0.95), rgba(5, 8, 10, 0.98)); backdrop-filter: blur(25px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 40px 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(139, 168, 156, 0.05); opacity: 0; pointer-events: none; transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1); z-index: 50; }
        #q-panel.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        
        /* 錯題業火紅框警戒 */
        #q-panel.karma-border { border: 1px solid rgba(184, 59, 59, 0.5); box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(184, 59, 59, 0.1); }
        
        .karma-dot { position: absolute; top: 20px; right: 20px; width: 6px; height: 6px; background: #ff4444; border-radius: 50%; display: none; box-shadow: 0 0 10px #ff0000, 0 0 20px #8b0000; animation: pulseKarma 1.2s infinite alternate; }
        @keyframes pulseKarma { from { opacity: 0.4; transform: scale(0.8); } to { opacity: 1; transform: scale(1.3); } }

        #q-level { color: #8ba89c; font-size: 0.75rem; letter-spacing: 5px; margin-bottom: 25px; text-align: center; border-bottom: 1px solid rgba(139,168,156,0.15); padding-bottom: 15px; position: relative; text-transform: uppercase; }
        #voice-hint { color: #d4af37; font-size: 0.65rem; letter-spacing: 2px; position: absolute; right: 0; top: 0; animation: pulse 1.5s infinite alternate; opacity: 0.8;}
        
        #q-text { color: #f3e5ab; font-size: 1.05rem; letter-spacing: 2px; line-height: 2; text-align: justify; margin-bottom: 30px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); font-weight: 300; }

        .option-btn { width: 100%; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(139,168,156,0.15); border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; color: #b0c4de; font-size: 0.9rem; letter-spacing: 1.5px; line-height: 1.7; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); text-align: left; display: flex; align-items: flex-start; gap: 12px; position: relative; overflow: hidden; }
        .option-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.1), transparent); transition: 0.5s; }
        .option-btn:hover::before { left: 100%; }
        .option-btn:active { transform: scale(0.97); background: rgba(212,175,55,0.08); border-color: rgba(212,175,55,0.5); color: #fff; box-shadow: 0 0 20px rgba(212,175,55,0.1); }
        
        .opt-dot { width: 14px; height: 14px; border: 1.5px solid rgba(139,168,156,0.4); border-radius: 50%; flex-shrink: 0; margin-top: 5px; transition: 0.3s; position: relative; }
        .option-btn:active .opt-dot { border-color: #d4af37; background: rgba(212,175,55,0.5); box-shadow: 0 0 10px #d4af37; }

        #cert-content { display: none; text-align: center; flex-direction: column; align-items: center; animation: fadeIn 1s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .sword-container { width: 100px; height: 220px; margin: 15px auto; filter: drop-shadow(0 0 25px rgba(212,175,55,0.5)); display: none; animation: floatSword 4s infinite ease-in-out; }
        @keyframes floatSword { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* ---------------- 究竟圓滿：琉璃般若智印 ---------------- */
        .grand-cert {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(180deg, rgba(15, 20, 25, 0.85), rgba(5, 8, 10, 0.98));
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212,175,55,0.25); border-radius: 6px; 
            padding: 50px 30px; position: relative; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 60px rgba(212,175,55,0.05);
            animation: fadeInCert 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            margin-bottom: 20px; width: 100%;
        }
        @keyframes fadeInCert { from { opacity: 0; transform: scale(0.95); filter: brightness(0.5); } to { opacity: 1; transform: scale(1); filter: brightness(1); } }
        
        .cert-glow {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(212,175,55,0.12) 0%, transparent 60%);
            animation: rotateGlow 25s linear infinite; pointer-events: none; z-index: 0;
        }
        @keyframes rotateGlow { 100% { transform: rotate(360deg); } }
        
        .cert-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 240px; height: 240px; pointer-events: none; animation: pulseWatermark 8s infinite alternate ease-in-out; z-index: 1; }
        @keyframes pulseWatermark { 0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.95); } 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.02); } }
        
        .cert-title { color: #f3e5ab; font-size: 1.6rem; letter-spacing: 10px; margin-bottom: 15px; font-weight: 300; text-shadow: 0 0 20px rgba(212,175,55,0.8); position: relative; z-index: 2; margin-left: 10px; }
        .cert-divider { width: 35px; height: 1px; background: rgba(212,175,55,0.6); margin-bottom: 25px; position: relative; z-index: 2; box-shadow: 0 0 10px #d4af37; }
        .cert-text { color: #b0c4de; font-size: 0.95rem; line-height: 2.2; letter-spacing: 4px; text-align: center; position: relative; z-index: 2; font-weight: 300; text-shadow: 0 2px 5px rgba(0,0,0,0.9); margin-left: 4px; }

        .cert-seal {
            position: absolute; bottom: 25px; right: 25px;
            width: 45px; height: 45px; 
            border: 1.5px solid rgba(184, 59, 59, 0.85); border-radius: 3px;
            color: rgba(184, 59, 59, 0.9); font-size: 0.85rem; font-weight: bold; font-family: "KaiTi", "Microsoft JhengHei", serif;
            display: flex; align-items: center; justify-content: center; text-align: center;
            line-height: 1.1; filter: drop-shadow(0 0 8px rgba(184,59,59,0.3));
            transform: rotate(-6deg); letter-spacing: 1px; z-index: 2;
        }
        .cert-seal::after { content: ''; position: absolute; inset: 2px; border: 1px solid rgba(184, 59, 59, 0.4); }

        .btn-main { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212,175,55,0.4); color: #f3e5ab; padding: 12px 30px; border-radius: 25px; font-size: 0.85rem; letter-spacing: 4px; cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); display: block; margin: 20px auto 0 auto; backdrop-filter: blur(5px); }
        .btn-main:hover { background: rgba(212,175,55,0.15); box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        .btn-main:active { transform: scale(0.95); }
        
        .btn-danger { border-color: rgba(255, 68, 68, 0.4); color: #ffaaaa; background: rgba(139,0,0,0.1); }
        .btn-danger:hover { background: rgba(139,0,0,0.25); box-shadow: 0 0 25px rgba(255,68,68,0.3); }

        @keyframes pulse { 0% { opacity: 0.3; } 100% { opacity: 1; } }
        .svg-full { width: 100%; height: 100%; display: block; overflow: visible; }
        
                /* ---------------- 今日圓滿 / 陣法已閉 彈出結界 ---------------- */
        .modal-wrap { 
            position: fixed; inset: 0; z-index: 9999; 
            background: rgba(1, 1, 3, 0.85); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            display: flex; justify-content: center; align-items: center; 
            opacity: 0; pointer-events: none; transition: opacity 0.6s ease; 
        }
        .modal-wrap.show { opacity: 1; pointer-events: auto; }
        
        .modal-box { 
            width: 85%; max-width: 360px; 
            background: linear-gradient(145deg, rgba(15, 20, 25, 0.95), rgba(5, 8, 10, 0.98)); 
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 16px; 
            padding: 40px 30px; text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.05); 
            transform: translateY(20px); transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }
        .modal-wrap.show .modal-box { transform: translateY(0); }
        
        .modal-title { 
            color: #f3e5ab; font-size: 1.25rem; letter-spacing: 6px; 
            margin-bottom: 20px; text-shadow: 0 0 15px rgba(212, 175, 55, 0.6); 
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 15px; font-weight: 300; 
        }
        .modal-text { 
            color: #8ba89c; font-size: 0.95rem; letter-spacing: 3px; line-height: 2.2; 
            margin-bottom: 30px; font-weight: 300; 
        }

    </style>
</head>
<body>

    <div id="void-flash"></div>

    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
        <defs>
            <linearGradient id="gold-frame" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
                <stop offset="30%" stop-color="#d4af37" stop-opacity="1"/>
                <stop offset="70%" stop-color="#b8860b" stop-opacity="1"/>
                <stop offset="100%" stop-color="#5c400a" stop-opacity="0.9"/>
            </linearGradient>
            <linearGradient id="gold-bright" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="1"/><stop offset="50%" stop-color="#f3e5ab" stop-opacity="1"/><stop offset="100%" stop-color="#d4af37" stop-opacity="1"/></linearGradient>
            <linearGradient id="gold-dark" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#5c400a"/><stop offset="50%" stop-color="#b8860b"/><stop offset="100%" stop-color="#5c400a"/></linearGradient>
            <linearGradient id="cyan-glass" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.8"/><stop offset="50%" stop-color="#00838f" stop-opacity="0.6"/><stop offset="100%" stop-color="#004d40" stop-opacity="0.9"/></linearGradient>
            <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="sword-glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
    </svg>

    <template id="lotus-seal-svg">
        <svg viewBox="0 0 140 140" class="svg-full" filter="drop-shadow(0 0 15px rgba(212,175,55,0.6))">
            <circle cx="70" cy="70" r="60" fill="none" stroke="rgba(243,229,171,0.5)" stroke-width="1.5" stroke-dasharray="2 6"/>
            <circle cx="70" cy="70" r="42" fill="none" stroke="rgba(212,175,55,0.8)" stroke-width="1.2"/>
            <circle cx="70" cy="70" r="10" fill="url(#gold-bright)" filter="url(#glow)"/>
            <g stroke="url(#gold-bright)" stroke-width="1">
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(255, 183, 197, 0.15)" />
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(174, 221, 243, 0.15)" transform="rotate(45 70 70)" />
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(168, 230, 207, 0.15)" transform="rotate(90 70 70)" />
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(255, 139, 148, 0.15)" transform="rotate(135 70 70)" />
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(204, 174, 243, 0.15)" transform="rotate(180 70 70)" />
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(174, 243, 221, 0.15)" transform="rotate(225 70 70)" />
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(255, 204, 153, 0.15)" transform="rotate(270 70 70)" />
                <path d="M 70 18 C 88 42 88 55 70 63 C 52 55 52 42 70 18 Z" fill="rgba(235, 243, 174, 0.15)" transform="rotate(315 70 70)" />
            </g>
        </svg>
    </template>

    <canvas id="starCanvas"></canvas>
    <div id="vignette"></div>

    <div id="btn-back" onclick="returnToDaochang()">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        返回道場
    </div>

    

    

    <div id="door-scene" onclick="triggerDoor()">
        <div id="door-hint">請輕觸入陣</div>
        <svg class="door-frame-svg" viewBox="0 0 280 460" preserveAspectRatio="none">
            <path d="M10 460 L 10 140 C 10 60, 70 10, 140 10 C 210 10, 270 60, 270 140 L 270 460 L 250 460 L 250 140 C 250 75, 195 30, 140 30 C 85 30, 30 75, 30 140 L 30 460 Z" fill="url(#gold-frame)"/>
            <path d="M15 460 L 15 140 C 15 65, 75 15, 140 15 C 205 15, 265 65, 265 140 L 265 460" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.6"/>
        </svg>
        
        <div class="door-smoke"></div>

        <div id="door-panel-container">
            <div class="door-panel door-left"><div class="lotus-seal"></div></div>

    // ✨ 星空引擎 (Star Engine) ✨
    // ==========================================
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [], warpSpeed = 1;

    function resize() { 
        width = window.innerWidth; 
        height = window.innerHeight; 
        canvas.width = width; 
        canvas.height = height; 
    }
    window.addEventListener('resize', resize); 
    resize();

    for (let i = 0; i < 300; i++) {
        stars.push({ 
            x: (Math.random() - 0.5) * 2000, 
            y: (Math.random() - 0.5) * 2000, 
            z: Math.random() * 2000, 
            color: Math.random() > 0.5 ? '#8ba89c' : '#f3e5ab' 
        });
    }

    function renderStars() {
        ctx.fillStyle = 'rgba(1, 1, 3, 0.4)'; 
        ctx.fillRect(0, 0, width, height); 
        ctx.globalCompositeOperation = 'screen';
        
        stars.forEach(star => {
            star.z -= warpSpeed;
            if (star.z <= 0) { 
                star.z = 2000; 
                star.x = (Math.random() - 0.5) * 2000; 
                star.y = (Math.random() - 0.5) * 2000; 
            } else if (star.z > 2000) {
                star.z = 0;
            }
            let scale = 400 / (400 + star.z);
            ctx.beginPath(); 
            ctx.arc((width / 2) + star.x * scale, (height / 2) + star.y * scale, Math.max(0.5, 2 * scale), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '139,168,156'}, ${Math.min(1, scale * 2)})`; 
            ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over'; 
        requestAnimationFrame(renderStars);
    }
    renderStars();

    // ==========================================
    // ✨ 音效引擎 (Audio Engine) 升級沉鐘斷滅版 ✨
    // ==========================================
    let audioCtx, tensionOsc, tensionGain, tensionInterval;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playTensionSound() {
        if (!audioCtx) return;
        tensionOsc = audioCtx.createOscillator(); tensionGain = audioCtx.createGain();
        tensionOsc.type = 'sine'; tensionOsc.frequency.setValueAtTime(45, audioCtx.currentTime);
        tensionGain.gain.setValueAtTime(0, audioCtx.currentTime);
        tensionOsc.connect(tensionGain); tensionGain.connect(audioCtx.destination);
        tensionOsc.start();
        let isHigh = false;
        tensionInterval = setInterval(() => {
            isHigh = !isHigh;
            tensionGain.gain.setTargetAtTime(isHigh ? 0.3 : 0.05, audioCtx.currentTime + 0.1);
            tensionOsc.frequency.setTargetAtTime(isHigh ? 55 : 45, audioCtx.currentTime + 0.1);
        }, 400);
    }
    function stopTensionSound() {
        if (tensionInterval) clearInterval(tensionInterval);
        try { if (tensionGain) tensionGain.gain.setTargetAtTime(0, audioCtx.currentTime + 0.2); } catch(e) {}
        try { if (tensionOsc) setTimeout(() => { try { tensionOsc.stop(); } catch(e) {} }, 300); } catch(e) {}
    }
    
    function playWrongSound() {
        initAudio(); 
        if (!audioCtx) return;
        
        let t = audioCtx.currentTime;
        let osc1 = audioCtx.createOscillator();
        let osc2 = audioCtx.createOscillator();
        let gainNode = audioCtx.createGain();
        
        osc1.type = 'sine'; osc1.frequency.setValueAtTime(120, t); 
        osc2.type = 'triangle'; osc2.frequency.setValueAtTime(240, t); 
        
        gainNode.gain.setValueAtTime(0, t);
        gainNode.gain.linearRampToValueAtTime(0.8, t + 0.05); 
        gainNode.gain.exponentialRampToValueAtTime(0.001, t + 2.5); 
        
        osc1.connect(gainNode); osc2.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc1.start(t); osc2.start(t);
        osc1.stop(t + 3); osc2.stop(t + 3);
    }

        options: [
            { text: "全妄即真。極樂不離自心，以唯心淨土接引唯心眾生。", isCorrect: true },
            { text: "淨土乃為根器愚鈍者所設之幻城。", isCorrect: false },
            { text: "極樂與娑婆皆為實有，故須厭離此土欣求彼土。", isCorrect: false },
            { text: "必須仰賴彌陀神力，於心外建立一淨土供安立。", isCorrect: false }
        ]
    };

    let questionBank = [];
    
        function generateDailyQuiz() {
        // ✨ 判斷是否為新手期：總答對題數小於 10 題
        const isDayOne = db.totalCorrect < 10;
        let pool = isDayOne ? basicBank : sutraBank;
        
        // 濾除已答對的題目，並打亂順序
        let availableQ = pool.filter(q => !db.clearedQ.includes(q.id)).sort(() => Math.random() - 0.5);

        // 若該階段題庫快空了，法門大開，重置該題庫記憶
        if (availableQ.length < DEMO_TOTAL_Q) {
            db.clearedQ = db.clearedQ.filter(id => !pool.find(q => q.id === id));
            availableQ = [...pool].sort(() => Math.random() - 0.5);
        }

        // 取出 10 題作為今日定課
        questionBank = availableQ.slice(0, DEMO_TOTAL_Q);
        
        // ✨ 設定標題氣韻：新手顯示「基礎定課」，後續顯示「般若寶卷」
        const stageName = isDayOne ? "基礎定課" : "般若寶卷";
        questionBank.forEach((q, i) => q.level = `第 ${i+1} 重 ． ${stageName}`);
    }

    let currentStage = 0; let correctCount = 0; let isProcessing = false;
    let timerId = null, criticalTimerId = null;

    function flashEffect(type) {
        const vf = document.getElementById('void-flash');
        vf.className = type === 'gold' ? 'flash-gold' : 'flash-red';
        setTimeout(() => { vf.className = ''; }, 800);
    }

    function loadQuestion(index, isBoss = false) {
        const q = isBoss ? bossQuestion : questionBank[index];
        const qPanel = document.getElementById('q-panel');
        
        let isKarma = (db.failedQ && db.failedQ[q.id] >= 1);
        
        document.getElementById('karma-dot').style.display = isKarma ? 'block' : 'none';
        if (isKarma) qPanel.classList.add('karma-border');
        else qPanel.classList.remove('karma-border');

        document.getElementById('stage-text').innerText = q.level;
        document.getElementById('q-text').innerText = q.text;
        document.getElementById('action-btns').innerHTML = ''; 
        
        const optsDiv = document.getElementById('q-options');
        optsDiv.innerHTML = '';
        
        let shuffled = [...q.options].sort(() => Math.random() - 0.5);
        shuffled.forEach(opt => {
            const btn = document.createElement('div'); btn.className = 'option-btn';
            btn.innerHTML = `<div class="opt-dot"></div><div>${opt.text}</div>`;
            btn.onclick = () => processAnswer(opt.isCorrect, isBoss);
            optsDiv.appendChild(btn);
        });
    }

    function triggerDoor() {
        if (isProcessing) return;
        
        if (hasPlayedToday) { 
            const modal = document.getElementById('done-modal');
            if (modal) modal.classList.add('show');
            return; 
        }
        
        isProcessing = true; 
        initAudio(); 
        
        if (currentStage === 0 && correctCount === 0) {
            generateDailyQuiz(); 
        }
        
        const hint = document.getElementById('door-hint');
        if (hint) hint.style.display = 'none';

        if ('speechSynthesis' in window) window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));

        const scene = document.getElementById('door-scene');
        scene.classList.add('opening');
        setTimeout(() => { warpSpeed = 12; scene.classList.add('zooming'); }, 400);
        setTimeout(() => { 
            warpSpeed = 1; 
            document.getElementById('q-panel').classList.add('show');
            document.getElementById('question-content').style.display = 'block';
            document.getElementById('cert-content').style.display = 'none';
            // ✨ 已完全拔除尋找 grand-cert 的幽靈代碼
            
            loadQuestion(currentStage); 
            
            const currentQ = questionBank[currentStage];
            readVoiceAndStartTimer(currentQ.text, currentQ.time);
            isProcessing = false; 
        }, 1600); 
    }

    window.sysUtterances = []; 
    function readVoiceAndStartTimer(text, seconds) {
        const thisStage = currentStage;
        const wrap = document.getElementById('energy-wrap');
        const bar = document.getElementById('energy-bar');
        const voiceHint = document.getElementById('voice-hint');
        
        wrap.style.opacity = 1; 
        bar.style.transition = 'none'; bar.style.transform = 'scaleX(1)';
        bar.classList.remove('critical-time');
        
        try {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                let msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-TW'; msg.rate = 1.1; 
                window.sysUtterances.push(msg); 
                
                msg.onstart = () => { voiceHint.innerText = '導讀中...'; };
                msg.onend = () => { 
                    if (currentStage !== thisStage) return;
                    voiceHint.innerText = ''; startActualTimer(seconds); 
                };
                msg.onerror = () => { 
                    if (currentStage !== thisStage) return;
                    voiceHint.innerText = ''; startActualTimer(seconds); 
                }; 
                
                window.speechSynthesis.speak(msg);
                
                setTimeout(() => { 
                    if(currentStage === thisStage && voiceHint.innerText !== '') { 
                        voiceHint.innerText = ''; startActualTimer(seconds); 
                    } 
                }, 15000);
            } else {
                setTimeout(() => { if (currentStage === thisStage) startActualTimer(seconds); }, 3000);
            }
        } catch(err) {
            voiceHint.innerText = '';
            setTimeout(() => { if (currentStage === thisStage) startActualTimer(seconds); }, 1000);
        }
    }

    function startActualTimer(seconds) {
        if (isProcessing) return;
        
        clearTimeout(timerId); 
        clearTimeout(criticalTimerId);

        const bar = document.getElementById('energy-bar');
        void bar.offsetWidth;
        bar.style.transition = `transform ${seconds}s linear`;
        bar.style.transform = 'scaleX(0)';

        criticalTimerId = setTimeout(() => { 
            bar.classList.add('critical-time'); 
            try { playTensionSound(); } catch(e){}
        }, Math.max(0, seconds - 4) * 1000); 
        
        timerId = setTimeout(() => { 
            try { stopTensionSound(); playWrongSound(); } catch(e){} 
            flashEffect('red');
            showSettlement(false, false, true); 
        }, seconds * 1000);
    }

    function processAnswer(isCorrect, isBoss) {
        if (isProcessing) return;
        isProcessing = true; 
        
        let qid = isBoss ? bossQuestion.id : questionBank[currentStage].id;

        try { if ('speechSynthesis' in window) window.speechSynthesis.cancel(); } catch(e) {}
        clearTimeout(timerId); clearTimeout(criticalTimerId);
        try { stopTensionSound(); } catch(e) {}
        
        document.getElementById('voice-hint').innerText = '';
        document.getElementById('energy-wrap').style.opacity = 0;
        document.getElementById('q-panel').classList.remove('show');

        if (isCorrect) {
            if (!isBoss) correctCount++;
            if (!db.clearedQ.includes(qid)) db.clearedQ.push(qid);
            
            flashEffect('gold');
            setTimeout(() => { if (isBoss) { showSettlement(true, true); } else { nextStage(); } }, 1000);
        } else {
            db.failedQ[qid] = (db.failedQ[qid] || 0) + 1;
            
            flashEffect('red');
            try { playWrongSound(); } catch(e) {}
            
            setTimeout(() => { showSettlement(false, false, true); }, 1500);
        }
    }

    function nextStage() {
        currentStage++;
        
        if (currentStage >= DEMO_TOTAL_Q) {
            if (correctCount === DEMO_TOTAL_Q) { setTimeout(promptBossQuestion, 500); } 
            else { showSettlement(false, false); }
        } else {
            document.getElementById('q-panel').classList.remove('show');
            setTimeout(() => {
                loadQuestion(currentStage);
                document.getElementById('q-panel').classList.add('show');
                
                const currentQ = questionBank[currentStage];
                isProcessing = false; 
                try { readVoiceAndStartTimer(currentQ.text, currentQ.time); }
                catch(e) { startActualTimer(currentQ.time); }
            }, 600); 
        }
    }

    function promptBossQuestion() {
        warpSpeed = 3;
        document.getElementById('karma-dot').style.display = 'none';
        document.getElementById('q-panel').classList.remove('karma-border');
        document.getElementById('stage-text').innerText = "般若圓滿 ． 結界異動";
        document.getElementById('stage-text').style.color = "#d4af37";
        document.getElementById('question-content').style.display = 'block';
        document.getElementById('cert-content').style.display = 'none';
        // ✨ 已完全拔除尋找 grand-cert 的幽靈代碼
        
        document.getElementById('q-options').innerHTML = '';
        document.getElementById('q-text').innerHTML = `<div style="text-align:center; color:#ff8888; font-size:1.15rem; line-height:2.2; text-shadow: 0 0 10px rgba(255,0,0,0.3); font-weight: 300;">行者，您已連續答對十題。<br>法界深處，<span style="font-weight:bold;">【第十一重覺照】</span>已然浮現。<br>此題玄奧，錯亦不扣分。<br><br><span style="color:#d4af37; font-size:1.25rem; letter-spacing: 5px;">是否接受最終問心？</span></div>`;
        
        document.getElementById('action-btns').innerHTML = `
            <div style="display:flex; gap:15px; width:100%; justify-content:center;">
                <button class="btn-main btn-danger" style="margin:0;" onclick="startBoss()">直面覺照</button>
                <button class="btn-main" style="margin:0; border-color:rgba(139,168,156,0.5); color:#8ba89c;" onclick="declineBoss()">見好就收</button>
            </div>
        `;
        document.getElementById('q-panel').classList.add('show');
        isProcessing = false; 
    }

    function startBoss() {
        if (isProcessing) return; isProcessing = true;
        document.getElementById('q-panel').classList.remove('show');
        setTimeout(() => {
            warpSpeed = 10; 
            document.getElementById('stage-text').style.color = "#ff4444";
            loadQuestion(0, true);
            document.getElementById('q-panel').classList.add('show');
            
            isProcessing = false; 
            try { 
                readVoiceAndStartTimer(bossQuestion.text, bossQuestion.time); 
            } catch(e) { 
                startActualTimer(bossQuestion.time); 
            }
        }, 1000);
    }

    function declineBoss() {
        if (isProcessing) return; isProcessing = true;
        document.getElementById('q-panel').classList.remove('show');
        setTimeout(() => { showSettlement(true, false); }, 500);
    }

    function showSettlement(isPerfect, passedBoss, isFail = false) {
        isProcessing = false; 
        warpSpeed = 0.2; 
        document.getElementById('question-content').style.display = 'none';
        document.getElementById('karma-dot').style.display = 'none';
        document.getElementById('q-panel').classList.remove('karma-border');
        
        const stageText = document.getElementById('stage-text');
        stageText.innerText = isFail ? "一念微細 ． 陣法中止" : "問心圓滿 ． 資糧結集";
        stageText.style.color = isFail ? "#ff6666" : "#8ba89c";
        
        let basePoints = 10 + (correctCount * 4);
        let finalPoints = passedBoss ? basePoints + 10 : basePoints;
        
        db.tempBag += finalPoints;
        db.totalCorrect += correctCount;
        if (isPerfect) db.treasures.sword += 1;
        db.lastMatrixDate = todayStr;
        
        localStorage.setItem('PX_V15.0', JSON.stringify(db));

        document.getElementById('cert-content').style.display = 'flex';
        
        let html = `今日參陣，獲取基礎 10 分<br>答對 <span style="color:#fff;">${correctCount}</span> 題，獲取 <span style="color:#fff;">${correctCount * 4}</span> 分<br>`;
        if (passedBoss) html += `<span style="color:#ff8888;">第十一重覺照突破，額外 +10 分</span><br>`;
        html += `<br><span style="color:#d4af37; font-size:1.8rem; font-weight:bold; text-shadow:0 0 25px rgba(212,175,55,0.6); letter-spacing: 4px;">本次共得：${finalPoints} 分</span>`;

        if (isFail) {
            html += `<br><br><span style="color:#ff6666; font-size:0.9rem; letter-spacing: 2px;">菩提道長 ． 請明日再來</span>`;
        } else if (isPerfect) {
            document.getElementById('sword-svg').style.display = 'block';
            html += `<br><br><span style="color:#f3e5ab; font-size:0.95rem; letter-spacing: 2px;">般若圓滿！<br>化現【幾何慧劍】一尊，已收入多寶閣。</span>`;
        }
        document.getElementById('cert-text').innerHTML = html;
        
        const actionDiv = document.getElementById('action-btns');
        if (db.tempBag >= 100) {
            actionDiv.innerHTML = `<button class="btn-main" style="margin:0;" onclick="syncToMain()">資糧結集 ． 匯入主系統</button>`;
        } else {
            actionDiv.innerHTML = `
                <div style="color:#8ba89c; font-size:0.85rem; letter-spacing:2px; margin-bottom:10px;">資糧累積中 ． 尚未具足 (${db.tempBag}/100)</div>
                <button class="btn-main" style="border-color:rgba(139,168,156,0.3); color:#8ba89c; margin:0;" onclick="returnToDaochang()">關閉陣法</button>
            `;
        }
        document.getElementById('q-panel').classList.add('show');
    }

    function syncToMain() {
        if (isProcessing) return; isProcessing = true;
        db.points += db.tempBag; db.tempBag = 0;
        localStorage.setItem('PX_V15.0', JSON.stringify(db));
        
        document.getElementById('q-panel').classList.remove('show');
        flashEffect('gold');
        setTimeout(() => { returnToDaochang(); }, 1500);
    }

    function returnToDaochang() {
        if (window.history.length <= 1 || !document.referrer) {
            location.reload(); 
        } else {
            window.history.back(); 
        }
    }

    function toggleInfo(show) {
        const el = document.getElementById('info-overlay');
        if (show) {
            el.style.display = 'flex';
            setTimeout(() => el.classList.add('show'), 10);
        } else {
            el.classList.remove('show');
            setTimeout(() => el.style.display = 'none', 600);
        }
    }
</script>

<div id="done-modal" class="modal-wrap">
    <div class="modal-box">
        <div class="modal-title">今日陣法已閉</div>
        <div class="modal-text">一念流轉 ． 靜待明日<br><br>行者今日已入迷城<br>無論迷悟，皆是修行<br>請明日再來，堪破幻網</div>
        <button class="btn-main" style="margin-top:0;" onclick="returnToDaochang()">歸返道場</button>
    </div>
</div>

</body>
</html>
