<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彌陀淨土系統 - 蓮花位階展示矩陣</title>
<style>
    body {
        background: #0a0a0a;
        color: #f3e5ab;
        font-family: sans-serif;
        padding: 20px;
        margin: 0;
    }
    h1 { text-align: center; color: #d4af37; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        max-width: 1400px;
        margin: 0 auto;
    }
    .card {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(212,175,55,0.2);
        border-radius: 16px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }
    .card-title { font-size: 1rem; font-weight: bold; margin-top: 10px; color: #d4af37; }
    .card-sub { font-size: 0.8rem; color: #8ba89c; margin-top: 5px; }
    svg { width: 150px; height: 150px; }
</style>
</head>
<body>

<h1>彌陀淨土系統 - 位階與念佛蓮花圖示</h1>

<div class="grid-container" id="lotus-grid"></div>

<script>
// 重構的 SVG 生成邏輯，包含原本被略過的幾何路徑
function getLotusSVG(rankName, rankType, nianCount) {
    let nLevel = 1;
    if (nianCount >= 10000000) nLevel = 5;      // 大日紫金光 (包含1億)
    else if (nianCount >= 1000000) nLevel = 4;  // 紅蓮紫金
    else if (nianCount >= 100000) nLevel = 3;   // 純粹真金
    else if (nianCount >= 10000) nLevel = 2;    // 真珠粉銀
    else nLevel = 1;                            // 青玉琉璃

    // 共用漸層定義 (還原顏色)
    const sharedDefs = `
        <defs>
            <linearGradient id="grad-lv1" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#4a7c59"/><stop offset="100%" stop-color="#a8e6cf"/></linearGradient>
            <linearGradient id="grad-lv2" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#a9a9a9"/><stop offset="100%" stop-color="#ffb6c1"/></linearGradient>
            <linearGradient id="grad-lv3" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#d4af37"/><stop offset="100%" stop-color="#ffeb3b"/></linearGradient>
            <linearGradient id="grad-lv4" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#8b0000"/><stop offset="100%" stop-color="#da70d6"/></linearGradient>
            <linearGradient id="grad-lv5" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#4b0082"/><stop offset="100%" stop-color="#ffd700"/></linearGradient>
            
            <radialGradient id="void-glow"><stop offset="60%" stop-color="#000000" stop-opacity="0.8"/><stop offset="100%" stop-color="transparent"/></radialGradient>
        </defs>
    `;

    const voidBg = `<rect width="100" height="100" fill="url(#void-glow)" rx="20"/>`;
    let bgContent = '';

    // 資糧位階背景 (Rank Background)
    if (rankType === '信' || rankType === 'Faith') {
        bgContent = `<circle cx="50" cy="50" r="42" fill="none" stroke="rgba(212,175,55,0.3)" stroke-width="1" stroke-dasharray="2 4"/>`;
    } else if (rankType === '住' || rankType === 'Abiding') {
        bgContent = `<circle cx="50" cy="50" r="45" fill="none" stroke="rgba(212,175,55,0.4)" stroke-width="1"/>
                     <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(139,168,156,0.3)" stroke-width="2" stroke-dasharray="4 4"/>`;
    } else if (rankType === '行' || rankType === 'Practice') {
        let spokes = '';
        for(let i=0; i<12; i++) {
            spokes += `<line x1="50" y1="50" x2="50" y2="5" stroke="rgba(255,215,0,0.4)" stroke-width="1.5" transform="rotate(${i*30} 50 50)"/>`;
        }
        bgContent = `<circle cx="50" cy="50" r="46" fill="none" stroke="rgba(212,175,55,0.5)" stroke-width="2"/> ${spokes}`;
    } else if (rankType === '迴' || rankType === 'Dedication') {
        bgContent = `<circle cx="50" cy="50" r="40" fill="none" stroke="rgba(212,175,55,0.6)" stroke-width="4" stroke-dasharray="10 5"/>
                     <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(180,200,220,0.5)" stroke-width="1"/>`;
    } else if (rankType === '地' || rankType === 'Bhumi') {
        let rays = '';
        for(let i=0; i<16; i++) {
            let len = i % 2 === 0 ? 3 : 10;
            rays += `<line x1="50" y1="50" x2="50" y2="${len}" stroke="rgba(255,215,0,0.6)" stroke-width="2" transform="rotate(${i*22.5} 50 50)"/>`;
        }
        bgContent = `<circle cx="50" cy="50" r="48" fill="none" stroke="rgba(212,175,55,0.8)" stroke-width="2"/> ${rays}`;
    }

    // 累積念佛主蓮花 (Foreground Nian Lotus)
    let mColor = `url(#grad-lv${nLevel})`;
    let petals = '';
    let pairs = nLevel + 1; 

    // 1. 繪製【背後層】花瓣
    let backSpreadMax = 36;
    for (let i = pairs; i >= 1; i--) {
        let r = i / pairs;
        let spread = r * backSpreadMax;
        let drop = r * 15;
        let tipY = 25 + drop;
        // 左瓣
        petals += `<path d="M50 85 Q ${50 - spread} 70, ${50 - spread/2} ${tipY} Q 50 65, 50 85" fill="${mColor}" opacity="0.6"/>`;
        // 右瓣
        petals += `<path d="M50 85 Q ${50 + spread} 70, ${50 + spread/2} ${tipY} Q 50 65, 50 85" fill="${mColor}" opacity="0.6"/>`;
    }

    // 2. 繪製【前景層】主花瓣
    let frontSpreadMax = 28;
    for (let i = pairs - 1; i >= 1; i--) {
        let r = i / (pairs - 1);
        let spread = r * frontSpreadMax;
        let drop = r * 12;
        let tipY = 32 + drop;
        petals += `<path d="M50 85 Q ${50 - spread} 75, ${50 - spread/2} ${tipY} Q 50 70, 50 85" fill="${mColor}" opacity="0.85"/>`;
        petals += `<path d="M50 85 Q ${50 + spread} 75, ${50 + spread/2} ${tipY} Q 50 70, 50 85" fill="${mColor}" opacity="0.85"/>`;
    }

    // 3. 中心正面主瓣
    petals += `<path d="M50 85 Q 35 60, 50 30 Q 65 60, 50 85" fill="${mColor}"/>`;
    
    // 4. 底部大明點
    const core = `<circle cx="50" cy="82" r="4" fill="#ffffff" filter="drop-shadow(0 0 4px #d4af37)"/>`;

    const lotusContent = `<g transform="translate(0, -5)"> ${petals} ${core} </g>`;

    return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                ${sharedDefs} ${voidBg} ${bgContent} ${lotusContent}
            </svg>`;
}

// 定義測試資料矩陣
const testCases = [
    { name: "初信位", type: "信", count: 0, countDesc: "0聲" },
    { name: "十信位", type: "信", count: 10000, countDesc: "1萬聲" },
    { name: "初住位", type: "住", count: 100000, countDesc: "10萬聲" },
    { name: "十行位", type: "行", count: 1000000, countDesc: "100萬聲" },
    { name: "十迴向位", type: "迴", count: 10000000, countDesc: "1千萬聲" },
    { name: "初地位", type: "地", count: 50000000, countDesc: "5千萬聲" },
    { name: "十地位", type: "地", count: 100000000, countDesc: "1億聲 (大日紫金光)" }
];

const grid = document.getElementById('lotus-grid');
testCases.forEach(tc => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
        ${getLotusSVG(tc.name, tc.type, tc.count)}
        <div class="card-title">${tc.name}</div>
        <div class="card-sub">${tc.countDesc}</div>
    `;
    grid.appendChild(card);
});
</script>
</body>
</html>
