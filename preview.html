<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀淨土 ‧ 徽章與蓮花矩陣</title>
    <style>
        :root {
            --bg: #050505;
            --gold: #d4af37;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: #eee;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .header-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            width: 100%;
        }
        .title {
            color: var(--gold);
            font-size: 1.25rem;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 15px;
        }
        .lang-switch {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: rgba(243, 229, 171, 0.8);
            padding: 8px 24px;
            border-radius: 20px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .lang-switch:hover {
            background: rgba(212, 175, 55, 0.1);
            color: #fff;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 35px;
            width: 100%;
            max-width: 1100px;
            justify-items: center;
        }
        .badge-card {
            background: linear-gradient(145deg, #111, #000);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), inset 0 0 15px rgba(255, 255, 255, 0.02);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            width: 100%;
            max-width: 200px;
        }
        .badge-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.95), 0 0 30px rgba(212, 175, 55, 0.15);
        }
        .svg-wrap {
            width: 130px;
            height: 130px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
        }
        .text-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .badge-title {
            color: var(--gold);
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 1.05rem;
        }
        .lotus-title {
            color: #aaa;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <div class="title">同心圓徽章 ‧ 5-5 交錯蓮花矩陣</div>
        <button class="lang-switch" onclick="toggleLanguage()">切換至 Pure Land OS (英文版)</button>
    </div>

    <div class="matrix-grid" id="matrix"></div>

    <script>
        // 語言狀態管理
        let isEnglish = false;

        // 五大位階資料 (背景徽章)
        const rankData = [
            { id: 1, zh: '信', en: 'F', nameZh: '信位', nameEn: 'Faith', ringColor: '#80deea' },
            { id: 2, zh: '住', en: 'A', nameZh: '住位', nameEn: 'Abiding', ringColor: '#ffcc80' },
            { id: 3, zh: '行', en: 'P', nameZh: '行位', nameEn: 'Practice', ringColor: '#a5d6a7' },
            { id: 4, zh: '迴', en: 'D', nameZh: '迴向位', nameEn: 'Dedication', ringColor: '#f48fb1' },
            { id: 5, zh: '地', en: 'B', nameZh: '地位', nameEn: 'Bhumi', ringColor: '#d4af37' }
        ];

        // 五大蓮花資料 (5-5 交錯十瓣)
        const lotusData = [
            { id: 1, name: '粉藍 ‧ 空靈水月', cOuter: '#81d4fa', cInner: '#e1f5fe' },
            { id: 2, name: '粉紅 ‧ 慈悲幻彩', cOuter: '#f48fb1', cInner: '#fce4ec' },
            { id: 3, name: '粉綠 ‧ 菩提萌芽', cOuter: '#80cbc4', cInner: '#e0f2f1' },
            { id: 4, name: '粉黃 ‧ 般若微光', cOuter: '#ffe082', cInner: '#fff8e1' },
            { id: 5, name: '燙金 ‧ 大圓滿光', cOuter: '#ffb300', cInner: '#ffe57f' }
        ];

        function generateCombinedSVG(rank, lotus) {
            // 決定顯示的字元
            const char = isEnglish ? rank.en : rank.zh;
            
            // 獨立蓮花漸層 ID，避免渲染衝突
            const gradIdOuter = `grad-outer-${lotus.id}`;
            const gradIdInner = `grad-inner-${lotus.id}`;

            // 5-5 交錯花瓣的幾何運算
            let petalsHTML = '';
            // 1. 底層 5 瓣 (旋轉 0, 72, 144, 216, 288)
            for(let i=0; i<5; i++) {
                let angle = i * 72;
                petalsHTML += `<use href="#petal-shape" transform="rotate(${angle} 50 50) scale(1.0)" fill="url(#${gradIdOuter})" filter="url(#glow-soft)"/>`;
            }
            // 2. 表層 5 瓣 (交錯旋轉 36, 108, 180, 252, 324，稍微縮小)
            for(let i=0; i<5; i++) {
                let angle = (i * 72) + 36;
                // scale(0.75) 搭配 translate 校正中心點，形成完美的交錯層次
                petalsHTML += `<use href="#petal-shape" transform="rotate(${angle} 50 50) translate(12.5 12.5) scale(0.75)" fill="url(#${gradIdInner})"/>`;
            }

            // 是否為最高級燙金蓮花 (增加核心強光)
            const coreGlow = lotus.id === 5 ? 'filter="url(#glow-strong)"' : 'filter="url(#glow-soft)"';

            return `
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
                <defs>
                    <radialGradient id="${gradIdOuter}" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="${lotus.cOuter}" stop-opacity="0.9"/>
                        <stop offset="100%" stop-color="${lotus.cOuter}" stop-opacity="0.2"/>
                    </radialGradient>
                    <radialGradient id="${gradIdInner}" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="${lotus.cInner}" stop-opacity="1"/>
                        <stop offset="100%" stop-color="${lotus.cOuter}" stop-opacity="0.5"/>
                    </radialGradient>

                    <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
                        <feGaussianBlur stdDeviation="1.5" result="b"/>
                        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="3.5" result="b"/>
                        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>

                    <path id="petal-shape" d="M 50 50 C 40 30, 42 10, 50 5 C 58 10, 60 30, 50 50 Z" />
                </defs>

                <g>
                    <circle cx="50" cy="50" r="42" fill="#0a0a0a" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
                    <circle cx="50" cy="50" r="38" fill="none" stroke="${rank.ringColor}" stroke-width="0.8" stroke-dasharray="2 4" opacity="0.6">
                        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="40s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="50" cy="50" r="34" fill="none" stroke="${rank.ringColor}" stroke-width="0.5" opacity="0.3"/>
                </g>

                <g>
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="180s" repeatCount="indefinite"/>
                    ${petalsHTML}
                    <circle cx="50" cy="50" r="3.5" fill="#fff" ${coreGlow}/>
                </g>

                <g transform="translate(0, -2)">
                    <circle cx="50" cy="12" r="7.5" fill="#111" stroke="${rank.ringColor}" stroke-width="1.2" filter="url(#glow-soft)"/>
                    <text x="50" y="12" fill="${rank.ringColor}" font-size="8" font-family="sans-serif" font-weight="bold" text-anchor="middle" dominant-baseline="central" letter-spacing="0">
                        ${char}
                    </text>
                </g>
            </svg>
            `;
        }

        function renderMatrix() {
            const container = document.getElementById('matrix');
            container.innerHTML = '';

            // 為了展示矩陣，我們將 5 種位階與 5 種蓮花一一對應展示
            for(let i=0; i<5; i++) {
                const rank = rankData[i];
                const lotus = lotusData[i];
                
                const card = document.createElement('div');
                card.className = 'badge-card';

                const title = isEnglish ? rank.nameEn : rank.nameZh;

                card.innerHTML = `
                    <div class="svg-wrap">
                        ${generateCombinedSVG(rank, lotus)}
                    </div>
                    <div class="text-info">
                        <div class="badge-title">${title}</div>
                        <div class="lotus-title">${lotus.name}</div>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        function toggleLanguage() {
            isEnglish = !isEnglish;
            const btn = document.querySelector('.lang-switch');
            btn.innerText = isEnglish ? "切換至 中文版" : "切換至 Pure Land OS (英文版)";
            renderMatrix();
        }

        // 初始化渲染
        renderMatrix();
    </script>
</body>
</html>
