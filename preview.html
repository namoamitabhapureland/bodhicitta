<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彌陀淨土系統 ‧ 琉璃同心陣 (蓮華演化版)</title>
    <style>
        :root {
            --bg-deep: #010204; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
            --tile-w: 52px; --tile-h: 70px; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        #header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(212,175,55,0.15); z-index: 10; position: relative; background: rgba(1,2,4,0.4); backdrop-filter: blur(8px); }
        .lv-tag { letter-spacing: 4px; color: var(--gold); font-size: 1.05rem; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
        .info-tag { font-size: 0.75rem; color: var(--cyan); letter-spacing: 2px; margin-top: 6px; }

        #board { flex: 1; position: relative; width: 100%; overflow: hidden; z-index: 10; display: flex; justify-content: center; align-items: center; }
        #board-center { position: relative; width: 340px; height: 460px; transition: transform 0.3s; }

        /* 琉璃牌本體 */
        .tile { 
            position: absolute; width: var(--tile-w); height: var(--tile-h); 
            background: rgba(20, 20, 25, 0.6); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 8px; 
            box-shadow: inset 0 0 12px rgba(0,0,0,0.8), 2px 4px 8px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            backdrop-filter: blur(4px); padding: 4px;
        }
        .tile::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 50%); pointer-events: none; border-radius: 8px; }
        
        .tile-svg { width: 100%; height: 100%; pointer-events: none; filter: drop-shadow(0 0 6px rgba(0,0,0,0.5)); }
        
        /* 嚴格狀態：選中、被遮擋 (上下左右) */
        .tile.selected { border-color: #fff; box-shadow: 0 0 25px rgba(212,175,55,0.8), inset 0 0 15px rgba(212,175,55,0.5); transform: translateY(-4px); z-index: 999 !important; }
        .tile.covered { filter: brightness(0.2) contrast(0.9); cursor: not-allowed; pointer-events: none; border-color: rgba(139, 168, 156, 0.1); }

        #footer { height: 80px; width: 100%; background: rgba(1,2,4,0.6); border-top: 1px solid rgba(139,168,156,0.3); z-index: 20; position: relative; display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(10px); padding: 0 10px; }
        .ctrl-btn { padding: 10px 15px; border-radius: 20px; border: 1px solid rgba(139,168,156,0.5); background: transparent; color: var(--cyan); font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .ctrl-btn:active { background: rgba(139,168,156,0.2); transform: scale(0.95); }
        .ctrl-btn.prime { border-color: var(--solid-gold); color: var(--gold); background: rgba(212,175,55,0.1); }

        .dust { position: absolute; border-radius: 50%; pointer-events: none; z-index: 9999; }
        
        /* 模態框 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 2000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s; }
        .modal.show { display: flex; opacity: 1; }
        .m-box { width: 80%; max-width: 300px; background: linear-gradient(135deg, #111, #050505); border: 1px solid var(--solid-gold); border-radius: 16px; padding: 30px; text-align: center; box-shadow: 0 0 40px rgba(212,175,55,0.2); }
        .m-title { color: var(--gold); font-size: 1.1rem; letter-spacing: 4px; margin-bottom: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<svg style="width:0; height:0; position:absolute;">
    <defs id="lotus-defs"></defs>
</svg>

<canvas id="bgCanvas"></canvas>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">陣法讀取中...</div>
        <div id="status-ui" style="font-size:0.75rem; color:var(--cyan); margin-top:4px; letter-spacing:1px;">左右夾擊者 ‧ 無法出陣</div>
    </div>
    <div style="text-align:right;">
        <div class="info-tag" id="bag-ui">剩餘：0</div>
    </div>
</div>

<div id="board"><div id="board-center"></div></div>

<div id="footer">
    <button class="ctrl-btn" onclick="startGame('medium')">中階 ‧ 蓮華 (36)</button>
    <button class="ctrl-btn" onclick="startGame('hard')">高階 ‧ 浮屠 (72)</button>
    <button class="ctrl-btn prime" onclick="shuffleBoard()">打亂重推</button>
</div>

<div class="modal" id="modal">
    <div class="m-box">
        <div class="m-title" id="m-title">理順色相 ‧ 陣法圓滿</div>
        <button class="ctrl-btn prime" style="width: 100%;" onclick="document.getElementById('modal').classList.remove('show')">善哉</button>
    </div>
</div>

<script>
    // --------------------------------------------------
    // 1. 蓮花圖示資料庫 (取自十念法前 9 階)
    // --------------------------------------------------
    const lotusStages = [
        { c: {t:"#ffffff", m:"#ffb7b2", b:"#e2858e", o: 0.9}, l: 3, g: 0.9 }, // 晨曦玫瑰
        { c: {t:"#e0f7fa", m:"#4dd0e1", b:"#00838f", o: 0.9}, l: 3, g: 1.1 }, // 琉璃水玉
        { c: {t:"#fce4ec", m:"#f06292", b:"#c2185b", o: 0.9}, l: 3, g: 1.2 }, // 法悅粉櫻
        { c: {t:"#f3e5f5", m:"#ba68c8", b:"#7b1fa2", o: 0.9}, l: 4, g: 1.3 }, // 紫霞仙光
        { c: {t:"#e1f5fe", m:"#29b6f6", b:"#0277bd", o: 0.9}, l: 4, g: 1.4 }, // 幻海琉璃
        { c: {t:"#fff3e0", m:"#ffb74d", b:"#e65100", o: 0.9}, l: 4, g: 1.5 }, // 彩雲金蓮
        { c: {t:"#ffebee", m:"#e53935", b:"#b71c1c", o: 0.9}, l: 4, g: 1.6 }, // 赤焰紅蓮
        { c: {t:"#fffde7", m:"#fdd835", b:"#f57f17", o: 0.9}, l: 5, g: 2.2 }, // 大日純金
        { c: {t:"#ffffff", m:"#ff80ab", b:"#00e5ff", o: 0.85}, l: 5, g: 4.0 }  // 摩尼幻彩
    ];

    function injectDefs() {
        let defsHtml = '';
        lotusStages.forEach((s, idx) => {
            defsHtml += `
                <linearGradient id="cl-grad-${idx}" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="${s.c.t}" stop-opacity="0.95"/>
                    <stop offset="50%" stop-color="${s.c.m}" stop-opacity="${s.c.o}"/>
                    <stop offset="100%" stop-color="${s.c.b}" stop-opacity="0.95"/>
                </linearGradient>
                <radialGradient id="cl-core-${idx}" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fff"/><stop offset="40%" stop-color="${s.c.m}"/><stop offset="100%" stop-color="transparent"/>
                </radialGradient>
                <path id="cl-petal-${idx}" d="M 50 50 C 39 25, 41 9, 50 2 C 59 9, 61 25, 50 50 Z" fill="url(#cl-grad-${idx})" stroke="rgba(255,255,255,0.4)" stroke-width="0.3"/>
            `;
        });
        document.getElementById('lotus-defs').innerHTML = defsHtml;
    }
    injectDefs();

    function getLotusSVG(idx) {
        let s = lotusStages[idx];
        let svgHtml = `<svg viewBox="0 0 100 100" class="tile-svg"><circle cx="50" cy="50" r="45" fill="rgba(5,5,5,0.8)"/><g filter="drop-shadow(0 0 3px rgba(0,0,0,0.8))">`;
        for (let l = s.l; l > 0; l--) {
            const sc = 0.35 + (l * 0.12);
            const off = (l % 2 === 0) ? 22.5 : 0;
            for (let i = 0; i < 8; i++) {
                const angle = i * 45 + off;
                const op = Math.min(1, 0.7 + (l * 0.05));
                svgHtml += `<use href="#cl-petal-${idx}" transform="rotate(${angle} 50 50) scale(${sc}) translate(${(1-sc)*50/sc} ${(1-sc)*50/sc})" opacity="${op}"/>`;
            }
        }
        svgHtml += `</g><circle cx="50" cy="50" r="${3 + (s.l * 0.5) * s.g}" fill="url(#cl-core-${idx})"></circle></svg>`;
        return svgHtml;
    }

    // --------------------------------------------------
    // 2. 嚴格網格佈局定義 (單位：半塊牌的寬高)
    // --------------------------------------------------
    const LAYOUTS = {
        medium: [ // 36張 = 9花色 * 4張
            // Z=0 (20張)
            {x:2,y:2,z:0},{x:4,y:2,z:0},{x:6,y:2,z:0},{x:8,y:2,z:0},
            {x:0,y:4,z:0},{x:2,y:4,z:0},{x:4,y:4,z:0},{x:6,y:4,z:0},{x:8,y:4,z:0},{x:10,y:4,z:0},
            {x:0,y:6,z:0},{x:2,y:6,z:0},{x:4,y:6,z:0},{x:6,y:6,z:0},{x:8,y:6,z:0},{x:10,y:6,z:0},
            {x:2,y:8,z:0},{x:4,y:8,z:0},{x:6,y:8,z:0},{x:8,y:8,z:0},
            // Z=1 (10張)
            {x:3,y:3,z:1},{x:5,y:3,z:1},{x:7,y:3,z:1},
            {x:2,y:5,z:1},{x:4,y:5,z:1},{x:6,y:5,z:1},{x:8,y:5,z:1},
            {x:3,y:7,z:1},{x:5,y:7,z:1},{x:7,y:7,z:1},
            // Z=2 (4張)
            {x:4,y:4,z:2},{x:6,y:4,z:2},{x:4,y:6,z:2},{x:6,y:6,z:2},
            // Z=3,4 (塔頂2張)
            {x:5,y:5,z:3},{x:5,y:5,z:4}
        ],
        hard: [ // 72張 = 9花色 * 8張 (極大陷阱)
            // Z=0 (40張)
            {x:2,y:0,z:0},{x:4,y:0,z:0},{x:6,y:0,z:0},{x:8,y:0,z:0},{x:10,y:0,z:0},
            {x:0,y:2,z:0},{x:2,y:2,z:0},{x:4,y:2,z:0},{x:6,y:2,z:0},{x:8,y:2,z:0},{x:10,y:2,z:0},{x:12,y:2,z:0},
            {x:0,y:4,z:0},{x:2,y:4,z:0},{x:4,y:4,z:0},{x:6,y:4,z:0},{x:8,y:4,z:0},{x:10,y:4,z:0},{x:12,y:4,z:0},
            {x:0,y:6,z:0},{x:2,y:6,z:0},{x:4,y:6,z:0},{x:6,y:6,z:0},{x:8,y:6,z:0},{x:10,y:6,z:0},{x:12,y:6,z:0},
            {x:0,y:8,z:0},{x:2,y:8,z:0},{x:4,y:8,z:0},{x:6,y:8,z:0},{x:8,y:8,z:0},{x:10,y:8,z:0},{x:12,y:8,z:0},
            {x:2,y:10,z:0},{x:4,y:10,z:0},{x:6,y:10,z:0},{x:8,y:10,z:0},{x:10,y:10,z:0},
            {x:6,y:-2,z:0},{x:6,y:12,z:0}, // 上下孤島
            // Z=1 (20張)
            {x:3,y:1,z:1},{x:5,y:1,z:1},{x:7,y:1,z:1},{x:9,y:1,z:1},
            {x:1,y:3,z:1},{x:3,y:3,z:1},{x:5,y:3,z:1},{x:7,y:3,z:1},{x:9,y:3,z:1},{x:11,y:3,z:1},
            {x:1,y:5,z:1},{x:3,y:5,z:1},{x:5,y:5,z:1},{x:7,y:5,z:1},{x:9,y:5,z:1},{x:11,y:5,z:1},
            {x:3,y:7,z:1},{x:5,y:7,z:1},{x:7,y:7,z:1},{x:9,y:7,z:1},
            // Z=2 (8張)
            {x:4,y:3,z:2},{x:8,y:3,z:2},
            {x:2,y:5,z:2},{x:4,y:5,z:2},{x:8,y:5,z:2},{x:10,y:5,z:2},
            {x:4,y:7,z:2},{x:8,y:7,z:2},
            // Z=3,4,5,6 (塔頂4張)
            {x:6,y:5,z:3},{x:6,y:5,z:4},{x:6,y:5,z:5},{x:6,y:5,z:6}
        ]
    };

    // --------------------------------------------------
    // 3. 核心演算法：絕對有解的逆向生成 (Reverse Gen)
    // --------------------------------------------------
    let boardTiles = [];
    let selectedId = null;

    // 嚴格判定是否自由：上方無阻擋 AND (左邊無阻擋 OR 右邊無阻擋)
    function isFree(target, currentTiles) {
        let blockedTop = false;
        let blockedLeft = false;
        let blockedRight = false;

        for (let t of currentTiles) {
            if (t.id === target.id) continue;
            
            // 在網格座標系中，寬高為 2 單位。
            // 重疊條件：X距離 < 2 且 Y距離 < 2
            let overlapX = Math.abs(t.x - target.x) < 2;
            let overlapY = Math.abs(t.y - target.y) < 2;

            // 1. 上方遮蔽：比它高，且XY重疊
            if (t.z > target.z && overlapX && overlapY) blockedTop = true;

            // 2. 左右遮蔽：通常只算同層 (z相等)，且在正左或正右，且Y重疊
            if (t.z === target.z && overlapY) {
                if (t.x === target.x - 2) blockedLeft = true;
                if (t.x === target.x + 2) blockedRight = true;
            }
        }
        
        // 核心靈魂：必須上面空，且左右至少一邊空！
        return !blockedTop && (!blockedLeft || !blockedRight);
    }

    function generateSolvable(layoutArray) {
        let slots = layoutArray.map((pos, idx) => ({ ...pos, id: idx, symbol: null }));
        let result = [];
        
        // 準備配對池 (保證有解且有4/8張的陷阱)
        let pairsNeeded = slots.length / 2;
        let symbolsCount = 9; // 使用 9 種蓮花
        let pairsPerSymbol = pairsNeeded / symbolsCount; // 中階=2對(4張), 高階=4對(8張)
        
        let pool = [];
        for (let i = 0; i < symbolsCount; i++) {
            for(let p = 0; p < pairsPerSymbol; p++) pool.push(i); // 塞入配對ID
        }
        pool.sort(() => Math.random() - 0.5); // 洗牌

        let tempSlots = [...slots];
        
        // 逆向倒推：每次拔掉兩張「目前自由」的牌，賦予相同花色
        while (tempSlots.length > 0) {
            let freeSlots = tempSlots.filter(s => isFree(s, tempSlots));
            
            if (freeSlots.length < 2) return null; // 死局退回重算

            // 隨機挑兩張自由牌
            freeSlots.sort(() => Math.random() - 0.5);
            let s1 = freeSlots[0], s2 = freeSlots[1];
            
            let sym = pool.pop();
            s1.symbol = sym; s2.symbol = sym;
            
            result.push(s1, s2);
            // 從模擬盤面中移除，解鎖底下的牌
            tempSlots = tempSlots.filter(s => s.id !== s1.id && s.id !== s2.id);
        }
        return result; // 成功回傳保證有解的盤面
    }

    // --------------------------------------------------
    // 4. 遊戲控制與渲染
    // --------------------------------------------------
    function startGame(type) {
        document.getElementById('board-center').innerHTML = '';
        boardTiles = []; selectedId = null;
        
        document.getElementById('lv-display').innerText = '陣法推演中...';
        
        // 防呆機制：如果隨機生成卡死，重試直到成功 (通常幾毫秒內搞定)
        let attempts = 0;
        while (!boardTiles || boardTiles.length === 0) {
            boardTiles = generateSolvable(LAYOUTS[type]);
            attempts++;
            if (attempts > 50) { alert("生成超時，請重整"); break; }
        }

        document.getElementById('lv-display').innerText = type === 'medium' ? '中階 ‧ 蓮華十字陣' : '高階 ‧ 浮屠金剛塔';
        
        renderBoard();
    }

    function shuffleBoard() {
        let activeTiles = boardTiles.filter(t => t.symbol !== null); // 剩下的牌
        let layoutCoords = activeTiles.map(t => ({x: t.x, y: t.y, z: t.z}));
        
        // 再次利用逆向演算法，保證剩下的牌重新洗完依然 100% 有解
        let tempPool = [];
        let symbolCounts = {};
        activeTiles.forEach(t => { symbolCounts[t.symbol] = (symbolCounts[t.symbol]||0) + 1; });
        for(let sym in symbolCounts) {
            for(let i=0; i<symbolCounts[sym]/2; i++) tempPool.push(parseInt(sym));
        }
        tempPool.sort(() => Math.random() - 0.5);

        let newActive = null;
        while(!newActive) {
            newActive = generateSolvableCustom(layoutCoords, [...tempPool]);
        }
        
        // 覆寫原有狀態
        newActive.forEach((nt, idx) => {
            activeTiles[idx].symbol = nt.symbol;
            let el = document.getElementById(`tile-${activeTiles[idx].id}`);
            if(el) el.innerHTML = getLotusSVG(nt.symbol);
        });

        selectedId = null;
        document.getElementById('board-center').style.transform = 'scale(0.9)';
        setTimeout(() => document.getElementById('board-center').style.transform = 'scale(1)', 200);
        renderBoard();
    }

    // 洗牌專用的生成器
    function generateSolvableCustom(layoutCoords, pool) {
        let tempSlots = layoutCoords.map((c, i) => ({...c, id: i, symbol: null}));
        let result = [];
        while (tempSlots.length > 0) {
            let freeSlots = tempSlots.filter(s => isFree(s, tempSlots));
            if (freeSlots.length < 2) return null;
            freeSlots.sort(() => Math.random() - 0.5);
            let s1 = freeSlots[0], s2 = freeSlots[1];
            let sym = pool.pop();
            s1.symbol = sym; s2.symbol = sym;
            result.push(s1, s2);
            tempSlots = tempSlots.filter(s => s.id !== s1.id && s.id !== s2.id);
        }
        return result;
    }

    function renderBoard() {
        const center = document.getElementById('board-center');
        let remain = 0;

        // 計算當前所有牌的自由狀態
        let activeTiles = boardTiles.filter(t => t.symbol !== null);
        
        boardTiles.forEach(t => {
            if(t.symbol === null) return;
            remain++;
            
            let el = document.getElementById(`tile-${t.id}`);
            if(!el) {
                el = document.createElement('div');
                el.id = `tile-${t.id}`; el.className = 'tile';
                el.innerHTML = getLotusSVG(t.symbol);
                // 像素轉換：1單位 = 26px寬 / 35px高
                el.style.left = `${t.x * 26 + 10}px`; 
                el.style.top = `${t.y * 35 + 30}px`; 
                el.style.zIndex = t.z * 10;
                el.onclick = () => handleTap(t.id);
                center.appendChild(el);
            }
            
            let isTileFree = isFree(t, activeTiles);
            if (!isTileFree) {
                el.classList.add('covered'); el.classList.remove('selected');
            } else {
                el.classList.remove('covered');
                if (selectedId === t.id) el.classList.add('selected');
                else el.classList.remove('selected');
            }
        });

        document.getElementById('bag-ui').innerText = `剩餘：${remain} 朵`;
        if(remain === 0) { document.getElementById('modal').classList.add('show'); }
    }

    function handleTap(id) {
        let activeTiles = boardTiles.filter(t => t.symbol !== null);
        let t = boardTiles.find(x => x.id === id);
        
        if (!isFree(t, activeTiles)) return; // 夾住或被壓住不可點

        if (selectedId === null) {
            selectedId = id;
            renderBoard();
        } else if (selectedId === id) {
            selectedId = null;
            renderBoard();
        } else {
            let t1 = boardTiles.find(x => x.id === selectedId);
            let t2 = t;

            if (t1.symbol === t2.symbol) {
                // 配對成功：從資料中抹除
                t1.symbol = null; t2.symbol = null;
                
                let el1 = document.getElementById(`tile-${t1.id}`);
                let el2 = document.getElementById(`tile-${t2.id}`);
                createDustParticles(el1, '#d4af37'); createDustParticles(el2, '#d4af37');
                
                el1.style.transform = 'scale(1.5)'; el1.style.opacity = '0';
                el2.style.transform = 'scale(1.5)'; el2.style.opacity = '0';
                setTimeout(() => { el1.remove(); el2.remove(); }, 300);

                selectedId = null;
                renderBoard(); // 重新計算解鎖的牌
            } else {
                selectedId = id; // 換選
                renderBoard();
            }
        }
    }

    function createDustParticles(element, color) {
        const rect = element.getBoundingClientRect();
        for(let i=0; i<15; i++) {
            let dust = document.createElement('div'); 
            dust.className = 'dust'; dust.style.background = color;
            dust.style.left = rect.left + rect.width/2 + 'px'; dust.style.top = rect.top + rect.height/2 + 'px';
            let size = Math.random() * 4 + 2; dust.style.width = size + 'px'; dust.style.height = size + 'px';
            dust.style.boxShadow = `0 0 10px ${color}`;
            document.body.appendChild(dust); 
            
            dust.animate([
                { opacity: 1, transform: `translate(0, 0) scale(1)` },
                { opacity: 0, transform: `translate(${(Math.random() - 0.5) * 150}px, ${-(Math.random() * 200 + 50)}px) scale(0)` }
            ], { duration: 900, easing: 'ease-out', fill: 'forwards' });
            setTimeout(() => dust.remove(), 950);
        }
    }

    // 星空背景
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let cw, ch, stars = [];
    function res() { cw=canvas.width=window.innerWidth; ch=canvas.height=window.innerHeight; }
    window.addEventListener('resize', res); res();
    for(let i=0; i<80; i++) stars.push({x:(Math.random()-0.5)*2000, y:(Math.random()-0.5)*2000, z:Math.random()*2000, s:Math.random()*2+1});
    function drawBg() {
        ctx.fillStyle = '#010204'; ctx.fillRect(0,0,cw,ch); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= 1.0; if(s.z<=0){s.z=2000; s.x=(Math.random()-0.5)*2000; s.y=(Math.random()-0.5)*2000;}
            let sc=800/(800+s.z), px=cw/2+s.x*sc, py=ch/2+s.y*sc;
            if(px>0&&px<cw&&py>0&&py<ch){ ctx.fillStyle = `rgba(212,175,55,${sc*0.6})`; ctx.beginPath(); ctx.arc(px,py,s.s*sc,0,Math.PI*2); ctx.fill(); }
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(drawBg);
    }
    drawBg();

    // 啟動
    startGame('medium');
</script>
</body>
</html>
