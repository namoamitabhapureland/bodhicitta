<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彌陀淨土系統 ‧ 琉璃同心陣</title>
    <style>
        :root {
            --bg-deep: #010204; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
            --tile-w: 56px; --tile-h: 75px; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        #header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(212,175,55,0.15); z-index: 10; position: relative; background: rgba(1,2,4,0.4); backdrop-filter: blur(8px); }
        .lv-tag { letter-spacing: 4px; color: var(--gold); font-size: 1.05rem; font-weight: bold; }
        .info-tag { font-size: 0.72rem; color: var(--cyan); letter-spacing: 2px; margin-top: 6px; }

        /* 陣法核心區塊 */
        #board { flex: 1; position: relative; width: 100%; overflow: hidden; z-index: 10; display: flex; justify-content: center; align-items: center; }
        #board-center { position: relative; width: 340px; height: 460px; } /* 擴大畫布以容納高階陣法 */

        /* 琉璃牌 */
        .tile { 
            position: absolute; width: var(--tile-w); height: var(--tile-h); 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.6), 2px 4px 10px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            backdrop-filter: blur(5px);
        }
        .tile::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%); pointer-events: none; border-radius: 8px; }
        .tile-svg { width: 80%; height: 80%; pointer-events: none; filter: drop-shadow(0 0 6px rgba(255,255,255,0.2)); }
        
        /* 狀態樣式：選中、被遮擋 */
        .tile.selected { border-color: #fff; box-shadow: 0 0 20px rgba(212,175,55,0.8), inset 0 0 15px rgba(212,175,55,0.4); transform: translateY(-4px); z-index: 999 !important; }
        .tile.covered { filter: brightness(0.25) contrast(0.85); cursor: not-allowed; pointer-events: none; border-color: rgba(139, 168, 156, 0.15); }

        /* 底部操作列 */
        #footer { height: 80px; width: 100%; background: rgba(1,2,4,0.6); border-top: 1px solid rgba(139,168,156,0.3); z-index: 20; position: relative; display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(10px); padding: 0 15px; }
        .ctrl-btn { padding: 10px 20px; border-radius: 20px; border: 1px solid rgba(139,168,156,0.5); background: transparent; color: var(--cyan); font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .ctrl-btn:active { background: rgba(139,168,156,0.2); }
        .ctrl-btn.prime { border-color: var(--solid-gold); color: var(--gold); background: rgba(212,175,55,0.1); }

        /* 粉碎特效 */
        .dust { position: absolute; border-radius: 50%; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>

<svg style="width:0; height:0; position:absolute;">
    <defs>
        <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
        <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.8"/></linearGradient>
        <linearGradient id="grad-red" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ff4d4d"/><stop offset="100%" stop-color="#800000"/></linearGradient>
        <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#00e5ff"/><stop offset="100%" stop-color="#004d40"/></linearGradient>
        <linearGradient id="grad-gold" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffe066"/><stop offset="100%" stop-color="#8b6508"/></linearGradient>
        <linearGradient id="grad-purple" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#d8b4fe"/><stop offset="100%" stop-color="#4a148c"/></linearGradient>
    </defs>
</svg>

<canvas id="bgCanvas"></canvas>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">中階 ‧ 蓮華陣</div>
        <div id="status-ui" style="font-size:0.75rem; color:var(--cyan); margin-top:4px; letter-spacing:1px;">點擊兩相同法相以消除</div>
    </div>
    <div style="text-align:right;">
        <div class="info-tag" id="bag-ui">剩餘：0</div>
    </div>
</div>

<div id="board"><div id="board-center"></div></div>

<div id="footer">
    <button class="ctrl-btn" onclick="initLevel('medium')">測：中階陣法</button>
    <button class="ctrl-btn" onclick="initLevel('hard')">測：高階陣法</button>
    <button class="ctrl-btn prime" onclick="shuffleBoard()">打亂重洗</button>
</div>

<script>
    const COLORS = ['red', 'cyan', 'gold', 'purple'];
    const SYMBOLS = ['sword', 'vase', 'jewel'];
    
    const SVG_DEFS = {
        sword: (c) => `<svg viewBox="0 0 100 150" class="tile-svg"><g transform="translate(0, 10)"><polygon points="50,10 56,40 50,105 44,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="50,10 56,40 50,105" fill="url(#grad-${c})" opacity="0.8"/><polygon points="35,100 65,100 55,110 45,110" fill="url(#facet-dark)" stroke="#d4af37" stroke-width="1"/><polygon points="46,110 54,110 52,135 48,135" fill="url(#facet-dark)"/></g></svg>`,
        vase: (c) => `<svg viewBox="0 0 100 150" class="tile-svg"><g transform="translate(0, 15)"><polygon points="45,20 55,20 60,40 40,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="40,40 60,40 75,90 25,90" fill="url(#grad-${c})" opacity="0.8" stroke="#fff" stroke-width="0.5"/><polygon points="25,90 75,90 60,120 40,120" fill="url(#facet-light)" stroke="#f3e5ab" stroke-width="0.5"/><polygon points="50,90 75,90 60,120 50,120" fill="url(#facet-dark)" opacity="0.7"/></g></svg>`,
        jewel: (c) => `<svg viewBox="0 0 100 150" class="tile-svg"><g transform="translate(0, 25)"><polygon points="50,10 80,40 50,55 20,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="20,40 50,55 50,100" fill="url(#grad-${c})" opacity="0.9" stroke="#fff" stroke-width="0.5"/><polygon points="80,40 50,55 50,100" fill="url(#facet-dark)" opacity="0.8" stroke="#fff" stroke-width="0.5"/></g></svg>`
    };

    let tilesData = [];
    let selectedIdx = null;

    // 手工設計陣法結構 (格狀座標 x, y, 層次 z)
    // 我們以半塊牌的寬度 (28) 和高度 (37) 為一格單位，方便錯位疊加
    function buildLayout(type) {
        let layout = [];
        if (type === 'medium') {
            // 中階：蓮花十字陣 (總計 32 張牌 = 16 對)
            // 第一層 z=0 (十字底座)
            for(let x=2; x<=8; x+=2) { layout.push({x, y:2, z:0}); layout.push({x, y:8, z:0}); }
            for(let y=4; y<=6; y+=2) { layout.push({x:2, y, z:0}); layout.push({x:8, y, z:0}); }
            layout.push({x:4, y:4, z:0}); layout.push({x:6, y:4, z:0}); layout.push({x:4, y:6, z:0}); layout.push({x:6, y:6, z:0});
            // 第二層 z=1 (錯位疊加)
            layout.push({x:3, y:3, z:1}); layout.push({x:7, y:3, z:1}); layout.push({x:3, y:7, z:1}); layout.push({x:7, y:7, z:1});
            layout.push({x:5, y:3, z:1}); layout.push({x:5, y:7, z:1}); layout.push({x:3, y:5, z:1}); layout.push({x:7, y:5, z:1});
            layout.push({x:5, y:5, z:1});
            // 第三層 z=2 (陣眼)
            layout.push({x:4, y:4, z:2}); layout.push({x:6, y:4, z:2}); layout.push({x:4, y:6, z:2}); layout.push({x:6, y:6, z:2});
            layout.push({x:5, y:5, z:3}); // 最高點
            
            // 補齊到偶數 (32張)
            layout.push({x:1, y:5, z:0}); layout.push({x:9, y:5, z:0});
        } 
        else if (type === 'hard') {
            // 高階：浮屠金剛塔 (總計 72 張牌 = 36 對)
            // 第一層 z=0 (大方塊 6x6)
            for(let x=0; x<=10; x+=2) { for(let y=0; y<=10; y+=2) { layout.push({x, y, z:0}); } } // 36張
            // 第二層 z=1 (錯位 5x5)
            for(let x=1; x<=9; x+=2) { for(let y=1; y<=9; y+=2) { layout.push({x, y, z:1}); } } // 25張
            // 第三層 z=2 (錯位 3x3)
            for(let x=3; x<=7; x+=2) { for(let y=3; y<=7; y+=2) { layout.push({x, y, z:2}); } } // 9張
            // 第四層 z=3 (塔頂 2張)
            layout.push({x:4, y:5, z:3}); layout.push({x:6, y:5, z:3}); 
        }
        return layout;
    }

    function initLevel(type) {
        document.getElementById('board-center').innerHTML = '';
        tilesData = []; selectedIdx = null;
        
        let layoutCoords = buildLayout(type);
        let totalTiles = layoutCoords.length;

        // 生成成對的法寶池
        let pool = [];
        for(let i=0; i<totalTiles/2; i++) {
            let c = COLORS[Math.floor(Math.random() * COLORS.length)];
            let s = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
            pool.push({c, s}, {c, s}); // 保證成雙成對
        }
        pool.sort(() => Math.random() - 0.5);

        // 轉換座標並放入資料陣列
        layoutCoords.forEach((pos, idx) => {
            // 格子單位轉換為實際像素 (置中偏移)
            let pxX = pos.x * 28 + 10; 
            let pxY = pos.y * 37 + 10; 
            
            tilesData.push({
                id: `t-${idx}`, idx: idx,
                c: pool[idx].c, s: pool[idx].s,
                x: pxX, y: pxY, z: pos.z,
                state: 'board', isCovered: false
            });
        });

        document.getElementById('lv-display').innerText = type === 'medium' ? '中階 ‧ 蓮華陣' : '高階 ‧ 浮屠塔';
        
        updateCovers();
        renderBoard();
        updateCount();
    }

    // 將現有的盤面重新洗牌 (防死局)
    function shuffleBoard() {
        let activeTiles = tilesData.filter(t => t.state === 'board');
        let pool = activeTiles.map(t => ({c: t.c, s: t.s}));
        pool.sort(() => Math.random() - 0.5);
        
        activeTiles.forEach((t, i) => {
            t.c = pool[i].c;
            t.s = pool[i].s;
            // 重新渲染 SVG
            let el = document.getElementById(t.id);
            if(el) el.innerHTML = SVG_DEFS[t.s](t.c);
        });
        
        selectedIdx = null;
        renderBoard();
        // 特效反饋
        document.getElementById('board-center').style.transform = 'scale(0.95)';
        setTimeout(() => document.getElementById('board-center').style.transform = 'scale(1)', 150);
    }

    // 精準遮擋演算法 (AABB Bounding Box)
    // 只要上方 (Z值較大) 的牌與當前牌的矩形範圍有重疊，即視為被遮擋
    function updateCovers() {
        const w = 56, h = 75;
        const margin = 6; // 容錯邊緣，避免視覺上沒碰到卻被鎖定
        
        for(let i=0; i<tilesData.length; i++) {
            if(tilesData[i].state !== 'board') continue;
            tilesData[i].isCovered = false;
            
            for(let j=0; j<tilesData.length; j++) {
                if(i === j || tilesData[j].state !== 'board') continue;
                
                // 檢查更高層的牌
                if(tilesData[j].z > tilesData[i].z) {
                    let dx = Math.abs(tilesData[i].x - tilesData[j].x);
                    let dy = Math.abs(tilesData[i].y - tilesData[j].y);
                    
                    // 判斷矩形重疊
                    if(dx < (w - margin) && dy < (h - margin)) {
                        tilesData[i].isCovered = true;
                        break; // 只要被一張壓住就不用檢查其他了
                    }
                }
            }
        }
    }

    function renderBoard() {
        const center = document.getElementById('board-center');
        
        tilesData.forEach(t => {
            if(t.state !== 'board') return;
            
            let el = document.getElementById(t.id);
            if(!el) {
                el = document.createElement('div');
                el.id = t.id; el.className = 'tile';
                el.innerHTML = SVG_DEFS[t.s](t.c);
                el.style.left = `${t.x}px`; el.style.top = `${t.y}px`; el.style.zIndex = t.z * 10;
                el.onclick = () => handleTap(t.idx);
                center.appendChild(el);
            }
            
            // 更新狀態視覺
            if(t.isCovered) {
                el.classList.add('covered');
                el.classList.remove('selected');
            } else {
                el.classList.remove('covered');
                if (selectedIdx === t.idx) el.classList.add('selected');
                else el.classList.remove('selected');
            }
        });
    }

    // 點擊消除邏輯
    function handleTap(idx) {
        let t = tilesData[idx];
        if(t.state !== 'board' || t.isCovered) return;

        if (selectedIdx === null) {
            // 選擇第一張
            selectedIdx = idx;
            renderBoard();
        } else if (selectedIdx === idx) {
            // 點擊同一張取消選擇
            selectedIdx = null;
            renderBoard();
        } else {
            // 點擊第二張，進行比對
            let t1 = tilesData[selectedIdx];
            let t2 = t;

            if (t1.c === t2.c && t1.s === t2.s) {
                // 配對成功！
                t1.state = 'cleared'; t2.state = 'cleared';
                
                let el1 = document.getElementById(t1.id);
                let el2 = document.getElementById(t2.id);
                createDustParticles(el1, t1.c === 'gold' ? '#d4af37' : '#8ba89c');
                createDustParticles(el2, t2.c === 'gold' ? '#d4af37' : '#8ba89c');
                
                el1.style.transform = 'scale(0)'; el1.style.opacity = '0';
                el2.style.transform = 'scale(0)'; el2.style.opacity = '0';
                setTimeout(() => { el1.remove(); el2.remove(); }, 300);

                selectedIdx = null;
                updateCovers(); // 拔掉上層後，重新計算下層解鎖狀態
                renderBoard();
                updateCount();
            } else {
                // 配對失敗，改選新的一張
                selectedIdx = idx;
                renderBoard();
            }
        }
    }

    function updateCount() {
        let remain = tilesData.filter(t => t.state === 'board').length;
        document.getElementById('bag-ui').innerText = `剩餘：${remain} 張`;
        if(remain === 0) {
            setTimeout(() => alert("理順色相，陣法圓滿！"), 500);
        }
    }

    function createDustParticles(element, color) {
        const rect = element.getBoundingClientRect();
        for(let i=0; i<15; i++) {
            let dust = document.createElement('div'); 
            dust.className = 'dust'; dust.style.background = color;
            dust.style.left = rect.left + rect.width/2 + 'px'; 
            dust.style.top = rect.top + rect.height/2 + 'px';
            let size = Math.random() * 4 + 2; dust.style.width = size + 'px'; dust.style.height = size + 'px';
            document.body.appendChild(dust); 
            
            dust.animate([
                { opacity: 1, transform: `translate(0, 0) scale(1)` },
                { opacity: 0, transform: `translate(${(Math.random() - 0.5) * 120}px, ${-(Math.random() * 150 + 50)}px) scale(0)` }
            ], { duration: 800, easing: 'ease-out', fill: 'forwards' });
            setTimeout(() => dust.remove(), 850);
        }
    }

    // 星空背景
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let cw, ch, stars = [];
    function res() { cw=canvas.width=window.innerWidth; ch=canvas.height=window.innerHeight; }
    window.addEventListener('resize', res); res();
    for(let i=0; i<80; i++) stars.push({x:(Math.random()-0.5)*2000, y:(Math.random()-0.5)*2000, z:Math.random()*2000, s:Math.random()*2+1});
    function drawBg() {
        ctx.fillStyle = '#010204'; ctx.fillRect(0,0,cw,ch); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= 1.0; if(s.z<=0){s.z=2000; s.x=(Math.random()-0.5)*2000; s.y=(Math.random()-0.5)*2000;}
            let sc=800/(800+s.z), px=cw/2+s.x*sc, py=ch/2+s.y*sc;
            if(px>0&&px<cw&&py>0&&py<ch){ ctx.fillStyle = `rgba(212,175,55,${sc*0.6})`; ctx.beginPath(); ctx.arc(px,py,s.s*sc,0,Math.PI*2); ctx.fill(); }
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(drawBg);
    }
    drawBg();

    // 啟動預設中階陣法
    initLevel('medium');
</script>
</body>
</html>
