<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彌陀淨土系統 ‧ 琉璃蓮華陣</title>
    <style>
        :root {
            --bg-deep: #010204; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
            --tile-w: 56px; --tile-h: 75px; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        #header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(212,175,55,0.15); z-index: 10; position: relative; background: rgba(1,2,4,0.4); backdrop-filter: blur(8px); }
        .lv-tag { letter-spacing: 4px; color: var(--gold); font-size: 1.05rem; font-weight: bold; }
        .info-tag { font-size: 0.72rem; color: var(--cyan); letter-spacing: 2px; margin-top: 6px; }

        /* 陣法核心區塊 */
        #board { flex: 1; position: relative; width: 100%; overflow: hidden; z-index: 10; display: flex; justify-content: center; align-items: center; }
        #board-center { position: relative; width: 320px; height: 400px; }

        /* 琉璃牌 */
        .tile { 
            position: absolute; width: var(--tile-w); height: var(--tile-h); 
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 8px; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 2px 4px 8px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            backdrop-filter: blur(4px); transform-origin: center center;
        }
        .tile::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%); pointer-events: none; border-radius: 8px; }
        
        .tile-svg { width: 80%; height: 80%; pointer-events: none; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        
        /* 被遮擋的牌 */
        .tile.covered { filter: brightness(0.3) contrast(0.8); cursor: default; pointer-events: none; border-color: rgba(139, 168, 156, 0.2); }
        /* 進入托盤的牌 */
        .tile.in-tray { border-color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.3); }

        /* 底部托盤 */
        #tray-area { height: 120px; width: 100%; background: rgba(1,2,4,0.7); border-top: 1px solid rgba(139,168,156,0.3); z-index: 20; position: relative; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        #tray-bg { position: relative; width: calc((var(--tile-w) + 6px) * 7 + 10px); height: calc(var(--tile-h) + 16px); background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px dashed rgba(212,175,55,0.4); display: flex; gap: 6px; padding: 8px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .tray-slot { width: var(--tile-w); height: var(--tile-h); border-radius: 8px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }

        /* 模態框 (沿用琉璃水美學) */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); z-index: 2000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.5s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-box { width: 85%; max-width: 320px; background: linear-gradient(135deg, rgba(20,25,35,0.9), rgba(5,10,15,0.95)); border: 1px solid var(--solid-gold); border-radius: 16px; padding: 30px 25px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(212,175,55,0.1); transform: translateY(20px); transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .modal-overlay.show .modal-box { transform: translateY(0); }
        .m-title { color: var(--gold); font-size: 1.1rem; letter-spacing: 4px; margin-bottom: 20px; }
        .m-btn { background: transparent; border: 1px solid rgba(139,168,156,0.4); color: var(--cyan); padding: 12px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; letter-spacing: 3px; width: 100%; margin-bottom: 10px; }
        .m-btn-prime { background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.05)); border-color: var(--solid-gold); color: var(--gold); }
        .m-btn-prime:active { background: rgba(212,175,55,0.3); }

        /* 粉碎特效 */
        .dust { position: absolute; border-radius: 50%; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>

<svg style="width:0; height:0; position:absolute;">
    <defs>
        <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
        <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.8"/></linearGradient>
        
        <linearGradient id="grad-red" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ff4d4d"/><stop offset="100%" stop-color="#800000"/></linearGradient>
        <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#00e5ff"/><stop offset="100%" stop-color="#004d40"/></linearGradient>
        <linearGradient id="grad-gold" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffe066"/><stop offset="100%" stop-color="#8b6508"/></linearGradient>
        <linearGradient id="grad-purple" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#d8b4fe"/><stop offset="100%" stop-color="#4a148c"/></linearGradient>
    </defs>
</svg>

<canvas id="bgCanvas"></canvas>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">第 1 重陣法</div>
        <div id="status-ui" style="font-size:0.75rem; color:var(--cyan); margin-top:4px; letter-spacing:1px;">理順色相 ‧ 安住心念</div>
    </div>
    <div style="text-align:right;">
        <div class="info-tag" id="bag-ui">陣眼：0 / 0</div>
    </div>
</div>

<div id="board"><div id="board-center"></div></div>

<div id="tray-area">
    <div id="tray-bg">
        <div class="tray-slot"></div><div class="tray-slot"></div><div class="tray-slot"></div>
        <div class="tray-slot"></div><div class="tray-slot"></div><div class="tray-slot"></div><div class="tray-slot"></div>
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-box" id="modal-box">
        <div class="m-title" id="m-title"></div>
        <div id="m-actions"></div>
    </div>
</div>

<script>
    // --------------------------------------------------
    // 資料與幾何定義庫
    // --------------------------------------------------
    const COLORS = ['red', 'cyan', 'gold', 'purple'];
    const SYMBOLS = ['sword', 'vase', 'jewel'];
    
    // 壓縮版的多寶閣 SVG (為求盤面清爽，移除過多細節保留輪廓光澤)
    const SVG_DEFS = {
        sword: (c) => `<svg viewBox="0 0 100 150" class="tile-svg"><g transform="translate(0, 10)"><polygon points="50,10 56,40 50,105 44,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="50,10 56,40 50,105" fill="url(#grad-${c})" opacity="0.8"/><polygon points="35,100 65,100 55,110 45,110" fill="url(#facet-dark)" stroke="#d4af37" stroke-width="1"/><polygon points="46,110 54,110 52,135 48,135" fill="url(#facet-dark)"/></g></svg>`,
        vase: (c) => `<svg viewBox="0 0 100 150" class="tile-svg"><g transform="translate(0, 15)"><polygon points="45,20 55,20 60,40 40,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="40,40 60,40 75,90 25,90" fill="url(#grad-${c})" opacity="0.8" stroke="#fff" stroke-width="0.5"/><polygon points="25,90 75,90 60,120 40,120" fill="url(#facet-light)" stroke="#f3e5ab" stroke-width="0.5"/><polygon points="50,90 75,90 60,120 50,120" fill="url(#facet-dark)" opacity="0.7"/></g></svg>`,
        jewel: (c) => `<svg viewBox="0 0 100 150" class="tile-svg"><g transform="translate(0, 25)"><polygon points="50,10 80,40 50,55 20,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="20,40 50,55 50,100" fill="url(#grad-${c})" opacity="0.9" stroke="#fff" stroke-width="0.5"/><polygon points="80,40 50,55 50,100" fill="url(#facet-dark)" opacity="0.8" stroke="#fff" stroke-width="0.5"/></g></svg>`
    };

    let level = 1;
    let tilesData = [];
    let tray = [];
    const MAX_TRAY = 7;
    let isProcessing = false;

    // --------------------------------------------------
    // 動態曼陀羅陣法生成器 (Procedural Generation)
    // --------------------------------------------------
    function generateLevel(lvl) {
        document.getElementById('board-center').innerHTML = '';
        tilesData = []; tray = []; isProcessing = false;
        
        // 動態難度計算
        let tripletCount = Math.min(30, 2 + Math.floor(lvl * 1.5)); // 關卡越大，配對數越多
        let totalTiles = tripletCount * 3;
        
        // 準備配對池
        let pool = [];
        let colorLimit = Math.min(COLORS.length, 1 + Math.ceil(lvl / 10));
        let symbolLimit = Math.min(SYMBOLS.length, 1 + Math.ceil(lvl / 15));
        
        for(let i=0; i<tripletCount; i++) {
            let c = COLORS[Math.floor(Math.random() * colorLimit)];
            let s = SYMBOLS[Math.floor(Math.random() * symbolLimit)];
            pool.push({c, s}, {c, s}, {c, s});
        }
        pool.sort(() => Math.random() - 0.5); // 隨機洗牌

        // 生成陣法座標 (X, Y, Z層)
        let positions = [];
        let layers = Math.min(6, 1 + Math.floor(lvl / 5)); // 最多疊加 6 層
        
        // 幾何形狀演算法：隨著層數往上，分佈的半徑或格數逐漸縮小，形成塔狀或蓮花狀
        let currentZ = 0;
        while(positions.length < totalTiles) {
            let radiusX = 120 - (currentZ * 15);
            let radiusY = 160 - (currentZ * 20);
            if(radiusX < 20) radiusX = 20; if(radiusY < 20) radiusY = 20;

            let remaining = totalTiles - positions.length;
            let layerCount = Math.min(remaining, 8 + (layers - currentZ) * 4); // 底層多，上層少
            
            for(let i=0; i<layerCount; i++) {
                // 採用橢圓分佈 + 隨機微調
                let angle = (Math.PI * 2 / layerCount) * i;
                let x = 160 + Math.cos(angle) * (radiusX * (0.8 + Math.random()*0.4)) - 28; // 28是牌寬一半
                let y = 200 + Math.sin(angle) * (radiusY * (0.8 + Math.random()*0.4)) - 37; // 37是牌高一半
                positions.push({ x, y, z: currentZ });
            }
            currentZ++;
        }

        // 將洗好的牌分配至座標
        positions.forEach((pos, idx) => {
            tilesData.push({
                id: `t-${idx}`, idx: idx,
                c: pool[idx].c, s: pool[idx].s,
                x: pos.x, y: pos.y, z: pos.z,
                state: 'board' // board, tray, cleared
            });
        });

        renderBoard();
        document.getElementById('lv-display').innerText = `第 ${lvl} 重結界`;
        updateCount();
    }

    function renderBoard() {
        const center = document.getElementById('board-center');
        // 先計算所有遮擋關係 (AABB Collision)
        updateCovers();

        tilesData.forEach(t => {
            if(t.state !== 'board') return;
            let el = document.getElementById(t.id);
            if(!el) {
                el = document.createElement('div');
                el.id = t.id; el.className = 'tile';
                el.innerHTML = SVG_DEFS[t.s](t.c);
                el.style.left = `${t.x}px`; el.style.top = `${t.y}px`; el.style.zIndex = t.z * 10;
                el.onclick = () => handleTap(t.idx);
                center.appendChild(el);
            }
            if(t.isCovered) el.classList.add('covered');
            else el.classList.remove('covered');
        });
    }

    // 核心演算法：檢查是否被上方物件遮擋
    function updateCovers() {
        const w = 56, h = 75;
        const margin = 8; // 容錯邊緣，避免輕微擦邊就被鎖住
        for(let i=0; i<tilesData.length; i++) {
            if(tilesData[i].state !== 'board') continue;
            tilesData[i].isCovered = false;
            for(let j=0; j<tilesData.length; j++) {
                if(i === j || tilesData[j].state !== 'board') continue;
                if(tilesData[j].z > tilesData[i].z) { // 只檢查更高層的牌
                    let dx = Math.abs(tilesData[i].x - tilesData[j].x);
                    let dy = Math.abs(tilesData[i].y - tilesData[j].y);
                    if(dx < (w - margin) && dy < (h - margin)) {
                        tilesData[i].isCovered = true;
                        break;
                    }
                }
            }
        }
    }

    // --------------------------------------------------
    // 遊戲邏輯與動畫
    // --------------------------------------------------
    async function handleTap(idx) {
        if(isProcessing) return;
        let t = tilesData[idx];
        if(t.state !== 'board' || t.isCovered) return;
        if(tray.length >= MAX_TRAY) return;

        isProcessing = true;
        t.state = 'tray';
        let el = document.getElementById(t.id);
        el.classList.remove('covered'); el.classList.add('in-tray');
        
        // 移至托盤前，先整理托盤陣列 (將同類型的牌排在一起)
        tray.push(t);
        tray.sort((a, b) => (a.c + a.s).localeCompare(b.c + b.s));

        // 計算托盤 DOM 的絕對座標位置以供動畫飛行
        const trayBgRect = document.getElementById('tray-bg').getBoundingClientRect();
        const centerRect = document.getElementById('board-center').getBoundingClientRect();
        
        // 將盤面的相對座標，轉換為視窗絕對座標，再計算至目標
        tray.forEach((trayItem, trayIdx) => {
            let targetX = trayBgRect.left + 8 + (trayIdx * 62); // 8是padding, 62是寬度+gap
            let targetY = trayBgRect.top + 8;
            
            let domEl = document.getElementById(trayItem.id);
            // 由於 domEl 是 absolute 相對於 board-center，我們需要覆寫
            domEl.style.position = 'fixed';
            domEl.style.zIndex = 1000 + trayIdx;
            
            let currentRect = domEl.getBoundingClientRect();
            // 只執行動畫一次，針對剛剛點擊的那塊 (其他塊只需滑動)
            domEl.style.left = `${targetX}px`;
            domEl.style.top = `${targetY}px`;
        });

        // 重新渲染盤面解鎖下層
        renderBoard();
        updateCount();

        setTimeout(() => checkMatches(), 350); // 等待飛行結束
    }

    async function checkMatches() {
        let matchFound = false;
        // 尋找連續 3 個相同的牌
        for(let i=0; i <= tray.length - 3; i++) {
            if(tray[i].c === tray[i+1].c && tray[i].s === tray[i+1].s && 
               tray[i+1].c === tray[i+2].c && tray[i+1].s === tray[i+2].s) {
                
                // 找到三相歸一
                matchFound = true;
                let matchedTiles = tray.splice(i, 3);
                
                matchedTiles.forEach(mt => {
                    let domEl = document.getElementById(mt.id);
                    createDustParticles(domEl, mt.c === 'gold' ? '#d4af37' : '#8ba89c');
                    domEl.style.transform = 'scale(0)';
                    domEl.style.opacity = '0';
                    setTimeout(() => domEl.remove(), 400);
                });

                // 將托盤剩餘的牌往前遞補
                tray.forEach((trayItem, trayIdx) => {
                    let targetX = document.getElementById('tray-bg').getBoundingClientRect().left + 8 + (trayIdx * 62);
                    let domEl = document.getElementById(trayItem.id);
                    domEl.style.left = `${targetX}px`;
                });
                
                updateCount();
                break; // 一次只消一組
            }
        }

        if(!matchFound) {
            if(tray.length >= MAX_TRAY) {
                showModal("陣法氣結", `<button class="m-btn m-btn-prime" onclick="retryLevel()">重新起陣</button>`);
            } else if(tilesData.filter(t => t.state === 'board').length === 0) {
                // 盤面清空
                level++;
                showModal("理順色相 ‧ 境界提昇", `
                    <button class="m-btn m-btn-prime" onclick="nextLevel()">繼續精進</button>
                    <button class="m-btn" onclick="window.location.reload()">圓滿退場</button>
                `);
            }
        }
        isProcessing = false;
    }

    function updateCount() {
        let remain = tilesData.filter(t => t.state === 'board').length;
        document.getElementById('bag-ui').innerText = `陣眼：${remain} / ${tilesData.length}`;
    }

    // --------------------------------------------------
    // 特效與 UI
    // --------------------------------------------------
    function createDustParticles(element, color) {
        const rect = element.getBoundingClientRect();
        for(let i=0; i<15; i++) {
            let dust = document.createElement('div'); 
            dust.className = 'dust'; dust.style.background = color;
            dust.style.left = rect.left + rect.width/2 + 'px'; 
            dust.style.top = rect.top + rect.height/2 + 'px';
            let size = Math.random() * 4 + 2; dust.style.width = size + 'px'; dust.style.height = size + 'px';
            document.body.appendChild(dust); 
            
            dust.animate([
                { opacity: 1, transform: `translate(0, 0) scale(1)` },
                { opacity: 0, transform: `translate(${(Math.random() - 0.5) * 100}px, ${-(Math.random() * 150 + 50)}px) scale(0)` }
            ], { duration: 800, easing: 'ease-out', fill: 'forwards' });
            setTimeout(() => dust.remove(), 850);
        }
    }

    function showModal(title, html) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-actions').innerHTML = html;
        document.getElementById('modal').classList.add('show');
    }
    
    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    function retryLevel() { closeModal(); generateLevel(level); }
    function nextLevel() { closeModal(); generateLevel(level); }

    // 深空背景星辰
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let cw, ch, stars = [];
    function res() { cw=canvas.width=window.innerWidth; ch=canvas.height=window.innerHeight; }
    window.addEventListener('resize', res); res();
    for(let i=0; i<100; i++) stars.push({x:(Math.random()-0.5)*2000, y:(Math.random()-0.5)*2000, z:Math.random()*2000, s:Math.random()*2+1});
    function drawBg() {
        ctx.fillStyle = '#010204'; ctx.fillRect(0,0,cw,ch); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= 1.5; if(s.z<=0){s.z=2000; s.x=(Math.random()-0.5)*2000; s.y=(Math.random()-0.5)*2000;}
            let sc=800/(800+s.z), px=cw/2+s.x*sc, py=ch/2+s.y*sc;
            if(px>0&&px<cw&&py>0&&py<ch){ ctx.fillStyle = `rgba(212,175,55,${sc*0.8})`; ctx.beginPath(); ctx.arc(px,py,s.s*sc,0,Math.PI*2); ctx.fill(); }
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(drawBg);
    }
    drawBg();

    // 啟動第一關
    generateLevel(level);

</script>
</body>
</html>
