<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彌陀淨土 ‧ 法相妙觀陣 (事件全開版)</title>
    <style>
        :root {
            --bg-deep: #010204; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
            --color-red: #ff4d4d; --color-cyan: #00e5ff; --color-gold: #ffe066; --color-purple: #d8b4fe; 
            --color-green: #80ed99; --color-blue: #4da6ff; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        
        /* ✨ 舊版琉璃水的法界異象特效 CSS ✨ */
        #vision-overlay { position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.8s, background 1s; }
        .vibrate { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, -1px); } }

        .huayan-planet {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.1);
            width: 50vh; height: 50vh; border-radius: 50%; filter: blur(20px); opacity: 0; z-index: 50; pointer-events: none; 
            transition: transform 2.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 2.5s ease, filter 2.5s ease;
        }
        .huayan-planet.active { transform: translate(-50%, -50%) scale(1.5); opacity: 0.85; filter: blur(4px); }

        #center-point {
            position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: #fff; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 5; pointer-events: none; opacity: 0;
            filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 35px var(--solid-gold));
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 頂部題目區 */
        #header { padding: 15px 20px; z-index: 10; position: relative; background: linear-gradient(180deg, rgba(1,2,4,0.9) 0%, rgba(1,2,4,0) 100%); display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .header-top { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        .lv-tag { letter-spacing: 4px; color: var(--gold); font-size: 1.1rem; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
        .bag-tag { font-size: 0.8rem; color: var(--cyan); letter-spacing: 2px; }
        
        .question-box { background: rgba(20,25,30,0.85); border: 1px solid var(--solid-gold); border-radius: 30px; padding: 8px 25px; font-size: 1.1rem; color: #fff; letter-spacing: 2px; display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.8), inset 0 0 15px rgba(212,175,55,0.2); backdrop-filter: blur(10px); }
        .q-icon { width: 45px; height: 45px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.4)); }
        .q-text { font-weight: bold; color: var(--gold); }

        /* 核心觀相區 */
        #board { flex: 1; position: relative; width: 100%; overflow: hidden; z-index: 5; }
        
        .item { 
            position: absolute; display: flex; justify-content: center; align-items: center;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            filter: drop-shadow(4px 10px 12px rgba(0,0,0,0.9)) drop-shadow(0 0 3px rgba(255,255,255,0.15));
            animation: float-breathe 6s infinite ease-in-out alternate;
        }
        .item svg { width: 100%; height: 100%; pointer-events: none; }
        @keyframes float-breathe { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(-6px) scale(1.03); } }

        .item.highlight {
            filter: drop-shadow(0 0 25px var(--solid-gold)) drop-shadow(0 0 40px rgba(255,255,255,0.8)) brightness(1.4) !important;
            z-index: 2000 !important; animation: none; transform: scale(1.25) !important;
        }

        /* 底部作答區 */
        #footer { padding: 25px 15px; width: 100%; background: linear-gradient(0deg, rgba(1,2,4,1) 0%, rgba(1,2,4,0.6) 70%, transparent 100%); z-index: 20; position: relative; display: flex; justify-content: center; align-items: center; gap: 15px;}
        .ans-btn { flex: 1; height: 75px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.5); background: linear-gradient(135deg, rgba(30,35,45,0.9) 0%, rgba(10,15,20,0.9) 100%); color: var(--gold); font-size: 1.8rem; font-weight: bold; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; line-height: 1.2;}
        .ans-btn span { font-size: 0.8rem; color: var(--cyan); font-weight: normal; letter-spacing: 4px; }
        .ans-btn:active { transform: scale(0.92); background: rgba(212,175,55,0.2); box-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        
        /* 模態框 (相容原版事件) */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 3000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.5s; }
        .modal-overlay.show { display: flex; opacity: 1; pointer-events: auto; }
        .modal-box { width: 88%; max-width: 340px; background: linear-gradient(135deg, rgba(20,25,35,0.95), rgba(5,10,15,0.98)); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 24px; padding: 35px 25px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.1); transform: translateY(20px); transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .modal-overlay.show .modal-box { transform: translateY(0); }
        
        .m-title { color: var(--gold); font-size: 1.2rem; letter-spacing: 5px; margin-bottom: 15px; text-shadow: 0 0 15px rgba(212,175,55,0.5); font-weight: bold;}
        .m-divider { width: 50px; height: 1px; background: var(--solid-gold); margin: 0 auto 20px; opacity: 0.5; }
        .m-text { font-size: 0.95rem; line-height: 1.8; margin-bottom: 30px; letter-spacing: 2px; color: #e0e0e0; text-align: center; }
        
        /* RPG 長按按鈕 */
        .rpg-btn-wrap { position: relative; width: 100%; height: 52px; border-radius: 26px; border: 1px solid rgba(212,175,55,0.6); background: rgba(0,0,0,0.5); cursor: pointer; overflow: hidden; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }
        .rpg-btn-fill { position: absolute; left: 0; top: 0; height: 100%; width: 0%; transition: width 0.05s linear; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.6)); }
        .rpg-btn-text { position: relative; z-index: 5; color: #fff; font-size: 0.95rem; letter-spacing: 4px; text-shadow: 0 0 10px rgba(0,0,0,0.9); pointer-events: none; font-weight:bold;}
        
        .m-btn { background: transparent; border: 1px solid rgba(139,168,156,0.4); color: var(--cyan); padding: 14px; border-radius: 20px; font-size: 0.95rem; cursor: pointer; transition: all 0.3s; letter-spacing: 3px; width: 100%; margin-bottom: 10px;}
        .m-btn:active { transform: scale(0.96); background: rgba(139,168,156,0.1); }
        .m-btn-prime { background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.05)); border-color: var(--solid-gold); color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.1); }
        
        .drop-icon svg { width: 35px; height: 50px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));}
    </style>
</head>
<body id="main-body">

<canvas id="bgCanvas"></canvas>
<div id="vision-overlay"></div>
<div id="center-point"></div>

<div id="header">
    <div class="header-top">
        <div class="lv-tag" id="lv-display">結界讀取中</div>

</div>

<div id="board"></div>

    <button class="ans-btn" id="btn-0" onclick="submitAnswer(0)"></button>
    <button class="ans-btn" id="btn-1" onclick="submitAnswer(1)"></button>

</div>

<script>
    // --------------------------------------------------

    // --------------------------------------------------

    db.tempBag = db.tempBag || 0;
    if (!db.treasures) db.treasures = { sword: 0, vase: 0, jewel: 0 };
    function saveDB() { localStorage.setItem('PX_V16.0', JSON.stringify(db)); }

    const SCRIPTURES = [

        // 寶珠系
        jewel_gold: { name: "大日寶珠", drop: "jewel", svg: `<svg viewBox="0 0 100 150"><g transform="scale(1.3) translate(-8, 5)"><polygon points="50,10 80,40 50,55 20,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="20,40 50,55 50,100" fill="url(#g-gold)" opacity="0.95" stroke="#fff" stroke-width="0.5"/><polygon points="80,40 50,55 50,100" fill="url(#facet-dark)" opacity="0.8" stroke="#fff" stroke-width="0.5"/></g></svg>` },
        jewel_rose: { name: "粉晶寶珠", drop: "jewel", svg: `<svg viewBox="0 0 100 150"><g transform="scale(1.3) translate(-8, 5)"><polygon points="50,10 80,40 50,55 20,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="20,40 50,55 50,100" fill="url(#facet-rose)" opacity="0.95" stroke="#fff" stroke-width="0.5"/><polygon points="80,40 50,55 50,100" fill="url(#facet-dark)" opacity="0.8" stroke="#fff" stroke-width="0.5"/></g></svg>` },
    };

    const TYPES = Object.keys(LIBRARY);
    let targetType = '';
    let correctCount = 0;
    let options = [];

    // --------------------------------------------------
    // 2. 關卡佈陣與渲染
    // --------------------------------------------------
    function initLevel() {
        game.isProcessing = false;
        const board = document.getElementById('board');
        board.innerHTML = '';
        
        let lvl = db.waterLevel;
        document.getElementById('lv-display').innerText = `第 ${lvl} 重結界`;
        document.getElementById('bag-ui').innerText = `資糧：${db.tempBag}/100`;

        // 難度與干擾
        let totalItems = Math.min(85, 20 + Math.floor(lvl * 4)); 
        correctCount = Math.min(20, 5 + Math.floor(Math.random() * 5) + Math.floor(lvl / 3)); 
        
        let poolTypes = [...TYPES];
        poolTypes.sort(() => Math.random() - 0.5);
        targetType = poolTypes[0];

        let itemPool = [];
        for(let i=0; i<correctCount; i++) itemPool.push(targetType);
        
        while(itemPool.length < totalItems) {
            itemPool.push(TYPES[Math.floor(Math.random() * TYPES.length)]);
        }
        itemPool.sort(() => Math.random() - 0.5);

        document.getElementById('q-icon-display').innerHTML = LIBRARY[targetType].svg;
        document.getElementById('q-name-display').innerText = LIBRARY[targetType].name;

        options = [correctCount, correctCount + (Math.random()>0.5?1:-1), correctCount + (Math.random()>0.5?2:-2)];
        while(new Set(options).size !== 3 || Math.min(...options) <= 0) {
            options = [correctCount, correctCount + Math.floor(Math.random()*2)+1, correctCount - Math.floor(Math.random()*2)-1];
            if(Math.min(...options) <= 0) options = [correctCount, correctCount+1, correctCount+2];
        }
        options.sort(() => Math.random() - 0.5);

        for(let i=0; i<3; i++) {
            document.getElementById(`btn-${i}`).innerHTML = `${options[i]}<br><span>數量</span>`;
        }

        // 物理防疊死渲染
        const boardRect = board.getBoundingClientRect();
        let placedPositions = []; 
        const MIN_CORE_DISTANCE = 40; 

        itemPool.forEach((type, idx) => {
            let el = document.createElement('div');
            el.className = `item ${type === targetType ? 'target-item' : ''}`;
            el.innerHTML = LIBRARY[type].svg;
            
            // 尺寸極致錯落 70px ~ 140px
            let baseSize = 70 + Math.random() * 70; 
            el.style.width = `${baseSize}px`; el.style.height = `${baseSize}px`;
            
            let maxLeft = boardRect.width - baseSize + 20;
            let maxTop = boardRect.height - baseSize + 20;
            
            let finalX, finalY;
            let attempts = 0; let isValid = false;

            while(!isValid && attempts < 80) {
                finalX = Math.random() * maxLeft - 10; finalY = Math.random() * maxTop - 10;
                isValid = true;
                for(let pos of placedPositions) {
                    let dx = finalX - pos.x; let dy = finalY - pos.y;
                    if(Math.sqrt(dx*dx + dy*dy) < MIN_CORE_DISTANCE) { isValid = false; break; }
                }
                attempts++;
            }
            placedPositions.push({x: finalX, y: finalY});

            el.style.left = `${finalX}px`; el.style.top = `${finalY}px`;
            
            let flip = Math.random() > 0.5 ? 'scaleX(-1)' : 'scaleX(1)';
            let rot = `rotate(${(Math.random() - 0.5) * 360}deg)`;
            el.style.transform = `${flip} ${rot}`;
            el.style.animationDelay = `-${Math.random() * 8}s`;
            el.style.zIndex = idx; 
            
            board.appendChild(el);
        });
    }

    // --------------------------------------------------
    // 3. 核心：過關判定與【法界異象觸發】
    // --------------------------------------------------
    async function submitAnswer(btnIdx) {
        if(game.isProcessing) return;
        game.isProcessing = true;
        
        let guess = options[btnIdx];
        
        if (guess === correctCount) {
            // 答對特效：高光照見
            let targets = document.querySelectorAll('.target-item');
            targets.forEach(t => t.classList.add('highlight'));
            
            setTimeout(() => checkWinEvents(), 1200); 

        } else {
            showModal("心念散亂 ‧ 幻象叢生", `所見為虛妄，數目有異。<br>請安住呼吸，重新細觀畫布。`, "再次觀相", () => { game.isProcessing = false; });
        }
    }

    // ✨ 整合舊版琉璃水的全部過關事件 ✨
    function checkWinEvents() {
        const today = new Date().toDateString();
        let isFirstWinToday = (db.waterLastDate !== today);
        db.waterLastDate = today; 
        db.waterLevel++; 
        
        let earnedPoints = 1;
        let clearMsg = "一念清淨，資糧 +1。";
        if (isFirstWinToday) {
            earnedPoints += 10;
            clearMsg = "今日首度理順，獲【每日定課】 +10，過關 +1，共得 +11 點。";
        }
        db.tempBag += earnedPoints;
        
        // 隨機掉落多寶閣法寶 (逢 20 關或極小機率)
        let dropMsg = "";
        let levelPassed = db.waterLevel - 1;
        
        if (levelPassed % 20 === 0 && levelPassed > 0) { 
            let dropType = LIBRARY[targetType].drop; // 根據這關找的法寶決定掉落種類
            db.treasures[dropType]++; 
            let dropSvg = LIBRARY[targetType].svg;
            dropMsg = `
            <div style="display:flex; justify-content:center; align-items:center; gap:15px; margin: 20px 0; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 16px; border: 1px solid rgba(212,175,55,0.3);">
                <div class="drop-icon">${dropSvg}</div>
                <div style="text-align:left;">
                    <div style="color:var(--solid-gold); font-size:0.9rem; letter-spacing:2px; font-weight:bold;">化現【${LIBRARY[targetType].name}】</div>
                    <div style="color:#aaa; font-size:0.75rem; letter-spacing:1px; margin-top:3px;">已收入多寶閣</div>
                </div>
            </div>`;
        }
        saveDB();

        // 啟動全螢幕星空爆發與白霧 (舊版特效)
        game.starSpeed = 25; 
        document.getElementById('center-point').style.opacity = '1';
        const overlay = document.getElementById('vision-overlay');
        overlay.style.background = 'radial-gradient(circle, #fff 0%, transparent 80%)';
        overlay.style.opacity = '1';
        document.getElementById('center-point').style.transform = 'translate(-50%, -50%) scale(50)';
        
        setTimeout(() => {
            game.starSpeed = 1; overlay.style.opacity = '0';
            document.getElementById('center-point').style.transform = 'translate(-50%, -50%) scale(1)';
            document.getElementById('center-point').style.opacity = '0';
            
            // 判斷法界異象
            if (levelPassed % 5 === 0 && levelPassed > 0) {
                const s = SCRIPTURES[Math.floor(Math.random()*SCRIPTURES.length)];
                triggerRPG(s, clearMsg + dropMsg);
            } else if (levelPassed % 3 === 0 && levelPassed > 0) {
                triggerHuayanWorld(levelPassed, clearMsg + dropMsg);
            } else {
                showLevelClear(clearMsg + dropMsg);
            }
        }, 1800);
    }

    // 華藏大千世界特效
    function triggerHuayanWorld(lvl, extraMsg) {
        game.isHuayan = true;
        game.starSpeed = 60; // 極速金色星河
        let layer = Math.floor(lvl / 3) % 20 + 1;
        
        const planet = document.createElement('div');
        planet.className = 'huayan-planet';
        const cols = ['var(--color-cyan)', 'var(--color-purple)', 'var(--color-gold)', 'var(--color-green)'];
        planet.style.background = `radial-gradient(circle, ${cols[layer % 4]} 0%, transparent 70%)`;
        document.body.appendChild(planet);
        
        setTimeout(() => planet.classList.add('active'), 100);
        
        setTimeout(() => {
            planet.classList.remove('active'); planet.style.opacity = '0';
            setTimeout(() => planet.remove(), 1500);
            game.starSpeed = 1; game.isHuayan = false;
            
            showLevelClear(`<span style="color:var(--solid-gold); font-size:1.1rem; font-weight:bold;">神遊華藏大千 ‧ 第 ${layer} 重天</span><br><br>` + extraMsg);
        }, 3000);
    }

    function showLevelClear(msg) {
        document.getElementById('m-div').style.display = 'block';
        showModal("境界提昇 ‧ 法喜充滿", msg, null, null, `
            <button class="m-btn m-btn-prime" onclick="closeModalAndNext()">繼續精進</button>
            <button class="m-btn" onclick="window.location.href='index.html?screen=3'">圓滿退場</button>
        `);
    }

    function closeModalAndNext() { closeModal(); initLevel(); }

    function triggerRPG(s, extraMsg) {
        game.currentEncounter = s;
        const overlay = document.getElementById('vision-overlay');
        overlay.style.opacity = '1'; overlay.style.background = s.color;
        if(s.type === 'earth') document.getElementById('main-body').classList.add('vibrate');

        document.getElementById('m-div').style.display = 'none';
        showModal(s.t, s.c + "<br><br><span style='font-size:0.8rem; color:var(--gold);'>" + extraMsg + "</span>", null, null, `
            <div class="rpg-btn-wrap" onmousedown="startRPG()" onmouseup="stopRPG()" ontouchstart="startRPG()" ontouchend="stopRPG()">
                <div class="rpg-btn-fill" id="fill" style="background:linear-gradient(90deg, transparent, ${s.color.replace(/[\d\.]+\)$/g, '0.8)')})"></div>
                <div class="rpg-btn-text">${s.b}</div>
            </div>
            <div style="font-size:0.7rem; color:#888; letter-spacing:2px; margin-top:5px;">(長按聚光解厄)</div>
        `);
    }

    let rpgTimer = null, rpgProg = 0;
    function startRPG() {
        clearInterval(rpgTimer); rpgProg = 0;
        rpgTimer = setInterval(() => {
            rpgProg += 2; document.getElementById('fill').style.width = rpgProg + '%';
            if(rpgProg >= 100) { clearInterval(rpgTimer); finishRPG(); }
        }, 30);
    }
    function stopRPG() { clearInterval(rpgTimer); rpgProg = 0; document.getElementById('fill').style.width = '0%'; }
    function finishRPG() {
        const overlay = document.getElementById('vision-overlay');
        overlay.style.background = '#fff'; setTimeout(() => { overlay.style.opacity = '0'; }, 300);
        document.getElementById('main-body').classList.remove('vibrate');
        closeModal(); showLevelClear("業障消除，福慧增長。"); 
    }

    function showModal(title, text, btnText, callback, customHtml) {
        document.getElementById('m-title').innerHTML = title;
        document.getElementById('m-text').innerHTML = text;
        document.getElementById('m-actions').innerHTML = customHtml || `<button class="ctrl-btn prime" onclick="closeModal()">${btnText}</button>`;
        if(callback) window.currentCallback = callback;
        document.getElementById('modal').classList.add('show');
    }

    function closeModal() { 
        document.getElementById('modal').classList.remove('show'); 
        game.currentEncounter = null; game.isProcessing = false;
        if(window.currentCallback) { window.currentCallback(); window.currentCallback = null; } 
    }

    // --------------------------------------------------
    // 4. 繁星背景 (爆量閃爍干擾)
    // --------------------------------------------------
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let cw, ch;
    function res() { cw=canvas.width=window.innerWidth; ch=canvas.height=window.innerHeight; }
    window.addEventListener('resize', res); res();
    
    const starColors = ['#ffffff', '#f3e5ab', '#00e5ff', '#ffb7c5', '#ce93d8'];
    let stars = [];
    for(let i=0; i<250; i++) { // 星星數量翻倍，增強干擾
        stars.push({
            x: Math.random() * 2000 - 1000, y: Math.random() * 2000 - 1000, z: Math.random() * 2000, 
            s: Math.random() * 3.5 + 0.5, c: starColors[Math.floor(Math.random() * starColors.length)],
            alphaOffset: Math.random() * Math.PI * 2, twinkleSpeed: 0.02 + Math.random() * 0.04
        });
    }

    let time = 0;
    function animateBg() {
        time += 0.05;
        ctx.fillStyle = '#010204'; ctx.fillRect(0,0,cw,ch); 
        ctx.globalCompositeOperation = 'screen';
        
        stars.forEach(s => {
            s.z -= (2 * game.starSpeed); // 配合過關白光加速
            if(s.z<=0){ s.z=2000; s.x=(Math.random()-0.5)*2000; s.y=(Math.random()-0.5)*2000; }
            
            let sc = 800 / (800 + s.z);
            let px = cw / 2 + s.x * sc; let py = ch / 2 + s.y * sc;
            
            if(px > 0 && px < cw && py > 0 && py < ch) { 
                let alpha = (Math.sin(time * s.twinkleSpeed * 10 + s.alphaOffset) * 0.5 + 0.5) * sc;
                ctx.fillStyle = s.c; ctx.globalAlpha = alpha;
                ctx.beginPath(); ctx.arc(px, py, s.s * sc * (game.starSpeed > 1 ? 5 : 1), 0, Math.PI*2); ctx.fill(); 
                
                if(s.s > 2.5 && game.starSpeed === 1) {
                    let g = ctx.createRadialGradient(px, py, 0, px, py, s.s * sc * 4);
                    g.addColorStop(0, s.c); g.addColorStop(1, 'transparent');
                    ctx.fillStyle = g; ctx.fill();
                }
            }
        });
        ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over'; 
        requestAnimationFrame(animateBg);
    }
    animateBg();

    initLevel();
</script>
</body>
