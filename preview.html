<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彌陀淨土系統 ‧ 2.5D 琉璃玉牌大陣</title>
    <style>
        :root {
            --bg-deep: #010203; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
            /* 定義網格基本單位，確保 6~7 張大牌能完美塞滿手機螢幕 */
            --unit-w: 22px; 
            --unit-h: 26px;
            --tile-w: calc(var(--unit-w) * 2); /* 牌寬 44px */
            --tile-h: calc(var(--unit-h) * 2.2); /* 牌高 57px */
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* 頂部資訊列 */
        #header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(212,175,55,0.15); z-index: 10; position: relative; background: rgba(1,2,4,0.6); backdrop-filter: blur(8px); }
        .lv-tag { letter-spacing: 4px; color: var(--gold); font-size: 1.1rem; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
        .info-tag { font-size: 0.75rem; color: var(--cyan); letter-spacing: 2px; margin-top: 6px; }

        /* 遊戲核心陣法區 */
        #board { flex: 1; position: relative; width: 100%; overflow: hidden; z-index: 10; display: flex; justify-content: center; align-items: center; }
        #board-center { position: relative; width: calc(var(--unit-w) * 14); height: calc(var(--unit-h) * 16); transition: transform 0.3s; }

        /* ✨ 2.5D 實體厚度玉牌設計 ✨ */
        .tile { 
            position: absolute; width: var(--tile-w); height: var(--tile-h); 
            /* 牌面為白玉/淺琉璃色，確保長輩看得極度清晰 */
            background: linear-gradient(135deg, #fdfbf7 0%, #e6e2d3 100%); 
            border: 1px solid #d4af37; border-radius: 4px; 
            /* 刻畫 2.5D 左下角厚度與實體陰影 */
            box-shadow: 
                -1px 1px 0 #b39b59,
                -2px 2px 0 #8c7a46,
                -3px 3px 0 #665833,
                -4px 4px 8px rgba(0,0,0,0.7);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, filter 0.3s;
            padding: 2px;
        }
        
        .tile-svg { width: 85%; height: 85%; pointer-events: none; filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.3)); }
        
        /* 嚴格狀態：被遮擋變暗 (不可點) */
        .tile.covered { filter: brightness(0.65) contrast(0.9); cursor: not-allowed; pointer-events: none; }
        
        /* 選中時浮起發光 */
        .tile.selected { 
            transform: translate(2px, -2px); /* 往右上角浮起抵銷陰影 */
            border-color: #fff;
            box-shadow: 
                -2px 2px 0 #d4af37,
                -3px 3px 0 #b39b59,
                -4px 4px 20px rgba(212,175,55,0.8); 
            z-index: 999 !important; 
        }

        /* ✨ 無明陣：被壓在下方的暗牌 ✨ */
        .tile.blind { 
            background: linear-gradient(135deg, #1a1a20 0%, #050508 100%); 
            border-color: #555;
            box-shadow: 
                -1px 1px 0 #111,
                -2px 2px 0 #000,
                -3px 3px 5px rgba(0,0,0,0.9);
        }
        .tile.blind .tile-svg { filter: opacity(0.5); }

        /* 底部按鈕區 */
        #footer { height: 80px; width: 100%; background: rgba(1,2,4,0.8); border-top: 1px solid rgba(139,168,156,0.3); z-index: 20; position: relative; display: flex; justify-content: space-around; align-items: center; padding: 0 10px; gap: 8px;}
        .ctrl-btn { flex: 1; padding: 12px 0; border-radius: 12px; border: 1px solid rgba(139,168,156,0.5); background: transparent; color: var(--cyan); font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; transition: 0.2s; text-align: center; font-weight: bold;}
        .ctrl-btn:active { background: rgba(139,168,156,0.2); transform: scale(0.95); }
        .ctrl-btn.prime { border-color: var(--solid-gold); color: var(--gold); background: rgba(212,175,55,0.15); box-shadow: inset 0 0 10px rgba(212,175,55,0.1); }

        /* 消除粉塵特效 */
        .dust { position: absolute; border-radius: 50%; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>

<svg style="width:0; height:0; position:absolute;">
    <defs id="svg-defs"></defs>
</svg>

<canvas id="bgCanvas"></canvas>

<div id="header">
    <div>
        <div class="lv-tag" id="lv-display">大陣起建中...</div>
        <div id="status-ui" style="font-size:0.75rem; color:var(--cyan); margin-top:4px; letter-spacing:1px;">左右皆有阻者 ‧ 無法出陣</div>
    </div>
    <div style="text-align:right;">
        <div class="info-tag" id="bag-ui">陣眼：0</div>
    </div>
</div>

<div id="board"><div id="board-center"></div></div>

<div id="footer">
    <button class="ctrl-btn" onclick="startGame('normal')">明陣 (112)</button>
    <button class="ctrl-btn prime" onclick="startGame('blind')">無明暗陣</button>
    <button class="ctrl-btn" onclick="shuffleBoard()" style="border-color: #777; color: #aaa;">大陣重整</button>
</div>

<script>
    // --------------------------------------------------
    // 1. 豐富的多樣化圖騰庫 (顏色 x 法相 = 極大視覺挑戰)
    // --------------------------------------------------
    const TILE_COLORS = [
        { id: 'red', val: '#e53935' }, { id: 'blue', val: '#0288d1' }, 
        { id: 'purple', val: '#8e24aa' }, { id: 'green', val: '#43a047' }, 
        { id: 'gold', val: '#fbc02d' }
    ];
    
    // 生成 3 種法相 (蓮花、劍、寶珠) * 5 種顏色 = 15 種獨特牌面
    const TILE_TYPES = [];
    TILE_COLORS.forEach(c => {
        TILE_TYPES.push({ sym: 'lotus', col: c });
        TILE_TYPES.push({ sym: 'sword', col: c });
        TILE_TYPES.push({ sym: 'jewel', col: c });
    });

    // 牌背 (無明陣專用)
    const SVG_BACK = `<svg viewBox="0 0 100 100" class="tile-svg"><circle cx="50" cy="50" r="35" fill="none" stroke="#8ba89c" stroke-width="2" stroke-dasharray="4 4"/><text x="50" y="60" fill="#8ba89c" font-size="36" text-anchor="middle" font-family="serif" font-weight="bold">?</text></svg>`;

    // 依照給定的法相與顏色產出 SVG
    function getTileSVG(typeObj) {
        const c = typeObj.col.val;
        if (typeObj.sym === 'lotus') {
            return `<svg viewBox="0 0 100 100" class="tile-svg">
                <path d="M50 20 C35 35, 30 60, 50 80 C70 60, 65 35, 50 20 Z" fill="${c}" opacity="0.9"/>
                <path d="M50 30 C40 45, 42 65, 50 75 C58 65, 60 45, 50 30 Z" fill="#fff" opacity="0.6"/>
            </svg>`;
        } else if (typeObj.sym === 'sword') {
            return `<svg viewBox="0 0 100 100" class="tile-svg">
                <polygon points="50,15 60,45 50,85 40,45" fill="${c}"/>
                <polygon points="50,15 60,45 50,85" fill="#fff" opacity="0.4"/>
                <rect x="35" y="80" width="30" height="6" fill="#444"/>
            </svg>`;
        } else {
            return `<svg viewBox="0 0 100 100" class="tile-svg">
                <polygon points="50,25 75,50 50,75 25,50" fill="${c}"/>
                <polygon points="50,25 75,50 50,75" fill="#fff" opacity="0.4"/>
                <circle cx="50" cy="50" r="10" fill="#fff" opacity="0.8"/>
            </svg>`;
        }
    }

    // --------------------------------------------------
    // 2. 完美的金字塔高塔陣法 (112 張，單排最多 6 張，高度 6 層)
    // --------------------------------------------------
    function generatePyramidLayout() {
        let l = [];
        // Z=0: 6x7 = 42 張 (地基)
        for(let x=0; x<=10; x+=2) for(let y=0; y<=12; y+=2) l.push({x, y, z:0}); 
        // Z=1: 5x6 = 30 張 (半格錯位)
        for(let x=1; x<=9; x+=2) for(let y=1; y<=11; y+=2) l.push({x, y, z:1}); 
        // Z=2: 4x5 = 20 張
        for(let x=2; x<=8; x+=2) for(let y=2; y<=10; y+=2) l.push({x, y, z:2}); 
        // Z=3: 3x4 = 12 張
        for(let x=3; x<=7; x+=2) for(let y=3; y<=9; y+=2)  l.push({x, y, z:3}); 
        // Z=4: 2x3 = 6 張
        for(let x=4; x<=6; x+=2) for(let y=4; y<=8; y+=2)  l.push({x, y, z:4}); 
        // Z=5: 1x2 = 2 張 (塔頂陣眼)
        l.push({x:5, y:5, z:5}); l.push({x:5, y:7, z:5});
        return l; // 總計 112 張
    }

    // --------------------------------------------------
    // 3. 正宗連連看核心演算法
    // --------------------------------------------------
    let boardTiles = [];
    let selectedId = null;
    let isBlindMode = false;

    // 嚴格判定：上方無阻擋 AND (左邊或右邊完全空)
    function isFree(target, currentTiles) {
        let blockedTop = false;
        let blockedLeft = false;
        let blockedRight = false;

        for (let t of currentTiles) {
            if (t.id === target.id) continue;
            
            // 單位寬高為 2，只要距離小於 2 即為重疊
            let overlapX = Math.abs(t.x - target.x) < 2;
            let overlapY = Math.abs(t.y - target.y) < 2;

            // 1. 被上面壓住
            if (t.z > target.z && overlapX && overlapY) blockedTop = true;

            // 2. 被同層的左右護法夾住
            if (t.z === target.z && overlapY) {
                if (t.x === target.x - 2) blockedLeft = true;
                if (t.x === target.x + 2) blockedRight = true;
            }
        }
        return !blockedTop && (!blockedLeft || !blockedRight);
    }

    // 防作弊與絕對有解生成器
    function generateSolvable(layoutArray) {
        let slots = layoutArray.map((pos, idx) => ({ ...pos, id: idx, typeObj: null }));
        let result = [];
        
        let pairsNeeded = slots.length / 2; // 56對
        let pool = [];
        
        // 15種圖案，平均每種分配 3~4 對 (6~8張)，形成四相陷阱
        for (let i = 0; i < pairsNeeded; i++) {
            pool.push(TILE_TYPES[i % TILE_TYPES.length]);
        }
        pool.sort(() => Math.random() - 0.5); 

        let tempSlots = [...slots];
        
        // 逆向倒推：每次拔兩張「自由牌」
        while (tempSlots.length > 0) {
            let freeSlots = tempSlots.filter(s => isFree(s, tempSlots));
            if (freeSlots.length < 2) return null; // 死局重算

            // 為了防作弊(不讓成對的牌黏在一起)，我們試著找距離夠遠的兩張牌
            freeSlots.sort(() => Math.random() - 0.5);
            let s1 = freeSlots[0], s2 = null;
            
            for(let i=1; i<freeSlots.length; i++) {
                if (Math.abs(freeSlots[i].x - s1.x) > 2 || Math.abs(freeSlots[i].y - s1.y) > 2) {
                    s2 = freeSlots[i]; break;
                }
            }
            if(!s2) s2 = freeSlots[1]; // 找不到遠的就妥協
            
            let symObj = pool.pop();
            s1.typeObj = symObj; s2.typeObj = symObj;
            
            result.push(s1, s2);
            tempSlots = tempSlots.filter(s => s.id !== s1.id && s.id !== s2.id);
        }
        return result; 
    }

    // --------------------------------------------------
    // 4. 遊戲控制與渲染
    // --------------------------------------------------
    function startGame(mode) {
        isBlindMode = (mode === 'blind');
        document.getElementById('board-center').innerHTML = '';
        boardTiles = []; selectedId = null;
        
        document.getElementById('lv-display').innerText = '大陣起建中...';
        
        let layout = generatePyramidLayout();
        let attempts = 0;
        while (!boardTiles || boardTiles.length === 0) {
            boardTiles = generateSolvable(layout);
            attempts++;
            if (attempts > 100) { alert("生成超時，請重整"); break; }
        }

        document.getElementById('lv-display').innerText = isBlindMode ? '無明 ‧ 琉璃大陣' : '菩提 ‧ 琉璃大陣';
        renderBoard();
    }

    function shuffleBoard() {
        let activeTiles = boardTiles.filter(t => t.typeObj !== null); 
        if(activeTiles.length === 0) return;
        
        let layoutCoords = activeTiles.map(t => ({x: t.x, y: t.y, z: t.z}));
        let tempPool = [];
        // 將剩餘的牌型收回
        activeTiles.forEach(t => tempPool.push(t.typeObj));
        
        // 分成兩半 (因為 generateSolvable 需要 pairs)
        let pairPool = [];
        for(let i=0; i<tempPool.length; i+=2) pairPool.push(tempPool[i]);
        pairPool.sort(() => Math.random() - 0.5);

        let newActive = null;
        while(!newActive) {
            newActive = generateSolvableCustom(layoutCoords, [...pairPool]);
        }
        
        newActive.forEach((nt, idx) => {
            activeTiles[idx].typeObj = nt.typeObj;
        });

        selectedId = null;
        document.getElementById('board-center').style.transform = 'scale(0.95)';
        setTimeout(() => document.getElementById('board-center').style.transform = 'scale(1)', 200);
        renderBoard();
    }

    function generateSolvableCustom(layoutCoords, pool) {
        let tempSlots = layoutCoords.map((c, i) => ({...c, id: i, typeObj: null}));
        let result = [];
        while (tempSlots.length > 0) {
            let freeSlots = tempSlots.filter(s => isFree(s, tempSlots));
            if (freeSlots.length < 2) return null;
            freeSlots.sort(() => Math.random() - 0.5);
            let s1 = freeSlots[0], s2 = freeSlots[1];
            let sym = pool.pop();
            s1.typeObj = sym; s2.typeObj = sym;
            result.push(s1, s2);
            tempSlots = tempSlots.filter(s => s.id !== s1.id && s.id !== s2.id);
        }
        return result;
    }

    function renderBoard() {
        const center = document.getElementById('board-center');
        let remain = 0;
        let activeTiles = boardTiles.filter(t => t.typeObj !== null);
        
        boardTiles.forEach(t => {
            if(t.typeObj === null) return;
            remain++;
            
            let el = document.getElementById(`tile-${t.id}`);
            if(!el) {
                el = document.createElement('div');
                el.id = `tile-${t.id}`; 
                
                // 定位：將座標乘上單位寬高，並針對 Z 軸給予輕微左下角偏移，強化立體感
                let zOffset = t.z * -2; 
                el.style.left = `calc((var(--unit-w) * ${t.x}) + ${zOffset}px)`; 
                el.style.top = `calc((var(--unit-h) * ${t.y}) - ${zOffset}px)`; 
                el.style.zIndex = t.z * 10;
                
                el.onclick = () => handleTap(t.id);
                center.appendChild(el);
            }
            
            let isTileFree = isFree(t, activeTiles);
            
            // 判定是否被完全覆蓋 (正上方有牌) 用於無明陣
            let isCoveredByTop = false;
            for (let other of activeTiles) {
                if (other.id === t.id) continue;
                if (other.z > t.z && Math.abs(other.x - t.x) < 2 && Math.abs(other.y - t.y) < 2) {
                    isCoveredByTop = true; break;
                }
            }

            // 無明暗陣：Z 處於底層(<=2) 且 被壓住，顯示背面
            let renderAsBlind = isBlindMode && (t.z <= 2) && isCoveredByTop;
            
            if (renderAsBlind) {
                el.className = 'tile blind';
                if (!isTileFree) el.classList.add('covered');
                el.innerHTML = SVG_BACK;
            } else {
                el.className = 'tile';
                el.innerHTML = getTileSVG(t.typeObj);
                if (!isTileFree) el.classList.add('covered');
                if (selectedId === t.id) el.classList.add('selected');
            }
        });

        document.getElementById('bag-ui').innerText = `陣眼：${remain} 塊`;
        if(remain === 0) alert("理順色相 ‧ 陣法圓滿！");
    }

    function handleTap(id) {
        let activeTiles = boardTiles.filter(t => t.typeObj !== null);
        let t = boardTiles.find(x => x.id === id);
        
        // 被夾住不准點
        if (!isFree(t, activeTiles)) {
            // 視覺反饋：抖動
            let el = document.getElementById(`tile-${t.id}`);
            el.style.transform = 'translate(-3px, 2px)';
            setTimeout(() => el.style.transform = '', 100);
            return; 
        }

        // 處於無明暗牌狀態，不准選取 (這保證了長輩不能瞎猜，必須先拆上層)
        let isCoveredByTop = false;
        for (let other of activeTiles) {
            if (other.id === t.id) continue;
            if (other.z > t.z && Math.abs(other.x - t.x) < 2 && Math.abs(other.y - t.y) < 2) {
                isCoveredByTop = true; break;
            }
        }
        if (isBlindMode && (t.z <= 2) && isCoveredByTop) return;


        if (selectedId === null) {
            selectedId = id;
            renderBoard();
        } else if (selectedId === id) {
            selectedId = null;
            renderBoard();
        } else {
            let t1 = boardTiles.find(x => x.id === selectedId);
            let t2 = t;

            // 判斷法相與顏色是否皆一致
            if (t1.typeObj.sym === t2.typeObj.sym && t1.typeObj.col.id === t2.typeObj.col.id) {
                t1.typeObj = null; t2.typeObj = null;
                
                let el1 = document.getElementById(`tile-${t1.id}`);
                let el2 = document.getElementById(`tile-${t2.id}`);
                createDustParticles(el1, t1.typeObj ? t1.typeObj.col.val : '#d4af37'); 
                createDustParticles(el2, t2.typeObj ? t2.typeObj.col.val : '#d4af37');
                
                el1.style.transform = 'scale(1.2)'; el1.style.opacity = '0';
                el2.style.transform = 'scale(1.2)'; el2.style.opacity = '0';
                setTimeout(() => { el1.remove(); el2.remove(); }, 200);

                selectedId = null;
                renderBoard(); 
            } else {
                selectedId = id; 
                renderBoard();
            }
        }
    }

    function createDustParticles(element, color) {
        const rect = element.getBoundingClientRect();
        for(let i=0; i<12; i++) {
            let dust = document.createElement('div'); 
            dust.className = 'dust'; dust.style.background = color;
            dust.style.left = rect.left + rect.width/2 + 'px'; dust.style.top = rect.top + rect.height/2 + 'px';
            let size = Math.random() * 4 + 3; dust.style.width = size + 'px'; dust.style.height = size + 'px';
            dust.style.boxShadow = `0 0 8px ${color}`;
            document.body.appendChild(dust); 
            
            dust.animate([
                { opacity: 1, transform: `translate(0, 0) scale(1)` },
                { opacity: 0, transform: `translate(${(Math.random() - 0.5) * 100}px, ${-(Math.random() * 150 + 50)}px) scale(0)` }
            ], { duration: 600, easing: 'ease-out', fill: 'forwards' });
            setTimeout(() => dust.remove(), 650);
        }
    }

    // 星辰背景
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let cw, ch, stars = [];
    function res() { cw=canvas.width=window.innerWidth; ch=canvas.height=window.innerHeight; }
    window.addEventListener('resize', res); res();
    for(let i=0; i<60; i++) stars.push({x:(Math.random()-0.5)*2000, y:(Math.random()-0.5)*2000, z:Math.random()*2000, s:Math.random()*2+1});
    function drawBg() {
        ctx.fillStyle = '#010203'; ctx.fillRect(0,0,cw,ch); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= 1.0; if(s.z<=0){s.z=2000; s.x=(Math.random()-0.5)*2000; s.y=(Math.random()-0.5)*2000;}
            let sc=800/(800+s.z), px=cw/2+s.x*sc, py=ch/2+s.y*sc;
            if(px>0&&px<cw&&py>0&&py<ch){ ctx.fillStyle = `rgba(212,175,55,${sc*0.4})`; ctx.beginPath(); ctx.arc(px,py,s.s*sc,0,Math.PI*2); ctx.fill(); }
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(drawBg);
    }
    drawBg();

    // 啟動一般明陣
    startGame('normal');
</script>
</body>
</html>
