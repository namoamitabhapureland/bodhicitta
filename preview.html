<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彌陀淨土 ‧ 位階蓮花融合徽章 (統一金底版)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+TC:wght@300;400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06070a; --gold:#c9a84c; --gold2:#f0d480; --white:#f2ede0; --dim:#2e2a18;
}
body{
  background:var(--bg);color:var(--white);font-family:'Noto Serif TC',serif;
  min-height:100vh;padding:40px 16px 80px;
  display:flex;flex-direction:column;align-items:center;
}
.page-title{
  font-family:'Cinzel',serif;font-size:clamp(.9rem,3vw,1.35rem);
  letter-spacing:6px;color:var(--gold2);text-align:center;
  margin-bottom:6px;text-shadow:0 0 28px rgba(240,210,120,.35);
}
.page-sub{font-size:.68rem;letter-spacing:3px;color:#5a5234;text-align:center;margin-bottom:48px}
.sec{width:100%;max-width:960px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--dim),transparent)}
.sec-txt{font-size:.62rem;letter-spacing:4px;color:var(--gold);white-space:nowrap}
.sel-row{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;width:100%;max-width:960px;margin-bottom:6px}
.pick{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform .28s}
.pick:hover{transform:translateY(-3px)}
.pick svg{filter:drop-shadow(0 4px 18px rgba(0,0,0,.95));transition:filter .28s}
.pick.sel svg{filter:drop-shadow(0 0 16px rgba(210,168,60,.8)) drop-shadow(0 4px 18px rgba(0,0,0,.95))}
.pick .lbl{font-size:.6rem;letter-spacing:2px;color:#5a5030;transition:color .28s;text-align:center}
.pick.sel .lbl{color:var(--gold2)}
.divider{width:100%;max-width:960px;height:1px;background:linear-gradient(90deg,transparent,var(--dim),transparent);margin:32px 0}
.preview-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:4px}
.hint{font-size:.62rem;letter-spacing:3px;color:#3a3620}
#stage{width:200px;height:200px;display:flex;align-items:center;justify-content:center}
#stage .empty{color:#28241a;font-size:.68rem;letter-spacing:2px;text-align:center;line-height:2.4}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:18px;width:100%;max-width:960px;margin-top:2px}
.gc{display:flex;flex-direction:column;align-items:center;gap:5px;background:#08080d;border:1px solid #181610;border-radius:13px;padding:13px 6px 10px;cursor:pointer;transition:all .28s}
.gc:hover{border-color:#2e2a16;transform:translateY(-2px);box-shadow:0 6px 28px rgba(0,0,0,.9)}
.gc svg{filter:drop-shadow(0 2px 10px rgba(0,0,0,.9))}
.gc .cl{font-size:.54rem;letter-spacing:1px;color:#504828;text-align:center;line-height:1.8}
</style>
</head>
<body>
<div class="page-title">彌陀淨土 ‧ 位階蓮花融合徽章</div>
<div class="page-sub">五位階 × 五蓮花 ‧ 二十五融合聖印</div>

<div class="sec"><div class="sec-line"></div><div class="sec-txt">五位階徽章 (金剛底座統一)</div><div class="sec-line"></div></div>
<div class="sel-row" id="rank-row"></div>

<div class="sec" style="margin-top:18px"><div class="sec-line"></div><div class="sec-txt">五蓮花徽章</div><div class="sec-line"></div></div>
<div class="sel-row" id="lotus-row"></div>

<div class="divider"></div>
<div class="preview-wrap">
  <div class="sec" style="width:280px"><div class="sec-line"></div><div class="sec-txt">融合預覽</div><div class="sec-line"></div></div>
  <div class="hint">選擇位階 ＋ 蓮花各一 → 生成融合聖印</div>
  <div id="stage"><div class="empty">請選擇<br>位階 ＋ 蓮花<br>各一枚</div></div>
</div>

<div class="divider"></div>
<div class="sec"><div class="sec-line"></div><div class="sec-txt">二十五融合聖印矩陣</div><div class="sec-line"></div></div>
<div class="gallery" id="gallery"></div>

<script>
/* ═══════════════════════════════════════════════════
   FUSED BADGE ARCHITECTURE
═══════════════════════════════════════════════════ */

/* ── petal path builder ── */
function P(cx,cy,r0,r1,hw,bulge,shape){
  const bx=cx, by=cy-r0, tx=cx, ty=cy-r1;
  const my = cy - (r0+r1)/2;
  if(shape==='slim'){
    return `M${bx-hw*.7} ${by} C${bx-bulge*.75} ${my} ${tx-1.5} ${ty+3} ${tx} ${ty} C${tx+1.5} ${ty+3} ${bx+bulge*.75} ${my} ${bx+hw*.7} ${by}Z`;
  }
  if(shape==='wide'){
    return `M${bx-hw} ${by} C${bx-bulge*1.35} ${my+4} ${tx-bulge*.45} ${ty+7} ${tx} ${ty} C${tx+bulge*.45} ${ty+7} ${bx+bulge*1.35} ${my+4} ${bx+hw} ${by}Z`;
  }
  if(shape==='point'){
    return `M${bx-hw} ${by} C${bx-bulge} ${my} ${tx-2} ${ty+2} ${tx} ${ty} C${tx+2} ${ty+2} ${bx+bulge} ${my} ${bx+hw} ${by}Z`;
  }
  return `M${bx-hw} ${by} C${bx-bulge} ${my} ${tx-bulge*.3} ${ty+5} ${tx} ${ty} C${tx+bulge*.3} ${ty+5} ${bx+bulge} ${my} ${bx+hw} ${by}Z`;
}

function rotatedPetals(cx,cy,n,r0,r1,hw,bulge,shape,fill,op,offset=0){
  let s='';
  for(let i=0;i<n;i++){
    const a=i*(360/n)+offset;
    s+=`<path d="${P(cx,cy,r0,r1,hw,bulge,shape)}" fill="${fill}" opacity="${op}" transform="rotate(${a} ${cx} ${cy})"/>`;
  }
  return s;
}

/* ── shared defs ── */
function D(id){
  return `<defs>
<filter id="glo${id}" x="-50%" y="-50%" width="200%" height="200%">
  <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="sof${id}" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur stdDeviation="1.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<radialGradient id="rg-unified-gold" cx="50%" cy="50%" r="60%">
  <stop offset="0%" stop-color="#fffce0"/><stop offset="28%" stop-color="#f0c030"/><stop offset="65%" stop-color="#906010"/><stop offset="100%" stop-color="#4c3008"/>
</radialGradient>
</defs>`;
}

/* ══ LOTUS PETAL LAYERS ══ */

function L1_petals(cx,cy,id){  // 八瓣 粉霞蓮
  return `<defs>
<radialGradient id="lA${id}" cx="50%" cy="75%" r="100%">
  <stop offset="0%" stop-color="#fff0f5"/><stop offset="40%" stop-color="#f5a0bc"/><stop offset="100%" stop-color="#b04470" stop-opacity=".85"/>
</radialGradient>
<radialGradient id="lB${id}" cx="50%" cy="65%" r="100%">
  <stop offset="0%" stop-color="#ffe8f2"/><stop offset="100%" stop-color="#d87898" stop-opacity=".55"/>
</radialGradient>
</defs>
${rotatedPetals(cx,cy,8,22,56,7,11,'round',`url(#lA${id})`,.92)}
${rotatedPetals(cx,cy,8,22,46,5.5,8,'round',`url(#lB${id})`,.7,22.5)}`;
}

function L2_petals(cx,cy,id){  // 八瓣 淡藍蓮 (替換原本的紫煙蓮)
  return `<defs>
<radialGradient id="lA${id}" cx="50%" cy="72%" r="100%">
  <stop offset="0%" stop-color="#e0f0ff"/><stop offset="38%" stop-color="#58a0d0"/><stop offset="100%" stop-color="#085090" stop-opacity=".88"/>
</radialGradient>
<radialGradient id="lB${id}" cx="50%" cy="58%" r="100%">
  <stop offset="0%" stop-color="#d4e8ff"/><stop offset="100%" stop-color="#4090c0" stop-opacity=".5"/>
</radialGradient>
</defs>
${rotatedPetals(cx,cy,8,22,57,9,14,'wide',`url(#lA${id})`,.9)}
${rotatedPetals(cx,cy,8,22,45,6,9,'wide',`url(#lB${id})`,.62,22.5)}`;
}

function L3_petals(cx,cy,id){  // 十瓣 碧玉蓮
  return `<defs>
<radialGradient id="lA${id}" cx="50%" cy="78%" r="100%">
  <stop offset="0%" stop-color="#e0fff8"/><stop offset="42%" stop-color="#28c098"/><stop offset="100%" stop-color="#065c48" stop-opacity=".9"/>
</radialGradient>
<radialGradient id="lB${id}" cx="50%" cy="62%" r="100%">
  <stop offset="0%" stop-color="#c0fff0"/><stop offset="100%" stop-color="#38c0a8" stop-opacity=".5"/>
</radialGradient>
</defs>
${rotatedPetals(cx,cy,10,22,57,6,9,'point',`url(#lA${id})`,.9)}
${rotatedPetals(cx,cy,10,22,44,4,6,'slim',`url(#lB${id})`,.6,18)}`;
}

function L4_petals(cx,cy,id){  // 十二瓣 彩虹蓮
  const cols=['#ff8888','#ffb060','#ffe860','#a0e868','#40d898','#40c8e8',
              '#6888ff','#9870e8','#d870c8','#ff70b0','#ff9068','#ffc848'];
  let s='';
  for(let i=0;i<12;i++){
    const a=i*30;
    s+=`<path d="${P(cx,cy,22,57,7.5,11,'round')}" fill="${cols[i]}" opacity=".87" transform="rotate(${a} ${cx} ${cy})"/>`;
  }
  for(let i=0;i<12;i++){
    s+=`<path d="${P(cx,cy,22,44,5,7,'round')}" fill="${cols[(i+6)%12]}" opacity=".5" transform="rotate(${i*30+15} ${cx} ${cy})"/>`;
  }
  return s;
}

function L5_petals(cx,cy,id){  // 十六瓣 大金蓮
  return `<defs>
<radialGradient id="lA${id}" cx="50%" cy="73%" r="100%">
  <stop offset="0%" stop-color="#fffce0"/><stop offset="32%" stop-color="#f0c030"/><stop offset="100%" stop-color="#8c5c10" stop-opacity=".92"/>
</radialGradient>
<radialGradient id="lB${id}" cx="50%" cy="63%" r="100%">
  <stop offset="0%" stop-color="#fff8c0"/><stop offset="48%" stop-color="#e8a820"/><stop offset="100%" stop-color="#7a4c08" stop-opacity=".72"/>
</radialGradient>
<radialGradient id="lC${id}" cx="50%" cy="50%" r="100%">
  <stop offset="0%" stop-color="#fffde8"/><stop offset="100%" stop-color="#d4a030" stop-opacity=".38"/>
</radialGradient>
</defs>
${rotatedPetals(cx,cy,8,22,58,8.5,12,'round',`url(#lA${id})`,.95)}
${rotatedPetals(cx,cy,8,22,55,8,11,'round',`url(#lB${id})`,.88,22.5)}
${rotatedPetals(cx,cy,8,22,40,5.5,7.5,'round',`url(#lC${id})`,.62,11.25)}`;
}

const LOTUSES=[
  {label:'八瓣‧粉霞蓮', aura:'#d0608888', accent:'#f4b0cc', dur:52, fn:L1_petals},
  {label:'八瓣‧淡藍蓮', aura:'#4080c088', accent:'#80b0e8', dur:46, fn:L2_petals}, // 更新為淡藍色
  {label:'十瓣‧碧玉蓮', aura:'#20b09088', accent:'#50d0a8', dur:38, fn:L3_petals},
  {label:'十二瓣‧彩虹蓮', aura:'#c0808088', accent:'#f0d060', dur:34, fn:L4_petals},
  {label:'十六瓣‧大金蓮', aura:'#c9a84c90', accent:'#f0d060', dur:56, fn:L5_petals},
];

/* ══ RANK INNER SYMBOLS (ALL UNIFIED TO GOLD) ══ */

function R1_inner(cx,cy,id){  // 信位: 統一為金色
  return `
<circle cx="${cx}" cy="${cy}" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
<circle cx="${cx}" cy="${cy}" r="15.5" fill="none" stroke="#f0c868" stroke-width=".5" stroke-dasharray="1.8 2.2"/>
<polygon points="${cx},${cy-11} ${cx+9.5},${cy+5.5} ${cx-9.5},${cy+5.5}" fill="none" stroke="#fffce0" stroke-width="1.3"/>
<polygon points="${cx},${cy-7} ${cx+6},${cy+3.5} ${cx-6},${cy+3.5}" fill="#ffe8a0" opacity=".82"/>
<circle cx="${cx}" cy="${cy}" r="2.2" fill="#ffffff"/>`;
}

function R2_inner(cx,cy,id){  // 住位: 統一為金色
  return `
<circle cx="${cx}" cy="${cy}" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
<rect x="${cx-1.8}" y="${cy-13}" width="3.6" height="18" fill="url(#rg-unified-gold)" rx=".4"/>
<rect x="${cx-6}" y="${cy-9}" width="12" height="2.8" fill="url(#rg-unified-gold)" rx=".4"/>
<rect x="${cx-9.5}" y="${cy-4.5}" width="19" height="2.8" fill="url(#rg-unified-gold)" rx=".4"/>
<rect x="${cx-13}" y="${cy+0.5}" width="26" height="2.8" fill="url(#rg-unified-gold)" rx=".4"/>
<polygon points="${cx},${cy-17} ${cx+3},${cy-12} ${cx-3},${cy-12}" fill="#fffce0"/>
<circle cx="${cx}" cy="${cy}" r="2.2" fill="#ffffff"/>`;
}

function R3_inner(cx,cy,id){  // 行位: 統一為金色
  return `
<circle cx="${cx}" cy="${cy}" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
<circle cx="${cx}" cy="${cy}" r="14" fill="none" stroke="#f0c868" stroke-width="1.1"/>
<circle cx="${cx}" cy="${cy}" r="4.2" fill="#ffe8a0"/>
${[0,45,90,135].map(a=>{
  const r=a*Math.PI/180;
  const x1=cx+Math.cos(r)*4.2,y1=cy+Math.sin(r)*4.2;
  const x2=cx+Math.cos(r)*14,y2=cy+Math.sin(r)*14;
  const x3=cx-Math.cos(r)*4.2,y3=cy-Math.sin(r)*4.2;
  const x4=cx-Math.cos(r)*14,y4=cy-Math.sin(r)*14;
  return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#f0c868" stroke-width="1"/>
  <line x1="${x3.toFixed(1)}" y1="${y3.toFixed(1)}" x2="${x4.toFixed(1)}" y2="${y4.toFixed(1)}" stroke="#f0c868" stroke-width="1"/>`;
}).join('')}
${[0,45,90,135,180,225,270,315].map(a=>{
  const r=a*Math.PI/180;
  return `<circle cx="${(cx+Math.cos(r)*16).toFixed(1)}" cy="${(cy+Math.sin(r)*16).toFixed(1)}" r="1.5" fill="#f0c868"/>`;
}).join('')}
<circle cx="${cx}" cy="${cy}" r="2" fill="#ffffff"/>`;
}

function R4_inner(cx,cy,id){  // 迴向位: 統一為金色
  return `
<circle cx="${cx}" cy="${cy}" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
<circle cx="${cx}" cy="${cy}" r="5.5" fill="#ffe8a0"/>
<path d="M${cx} ${cy-5.5} C${cx} ${cy-13} ${cx+11} ${cy-13} ${cx+11} ${cy-8}" fill="none" stroke="#fffce0" stroke-width="1.4" stroke-linecap="round"/>
<polygon points="${cx+11},${cy-5} ${cx+15},${cy-10} ${cx+8},${cy-11}" fill="#fffce0"/>
<path d="M${cx+5.5} ${cy} C${cx+13} ${cy} ${cx+13} ${cy+11} ${cx+8} ${cy+11}" fill="none" stroke="#fffce0" stroke-width="1.4" stroke-linecap="round"/>
<polygon points="${cx+5},${cy+11} ${cx+10},${cy+15} ${cx+11},${cy+8}" fill="#fffce0"/>
<path d="M${cx} ${cy+5.5} C${cx} ${cy+13} ${cx-11} ${cy+13} ${cx-11} ${cy+8}" fill="none" stroke="#fffce0" stroke-width="1.4" stroke-linecap="round"/>
<polygon points="${cx-11},${cy+5} ${cx-15},${cy+10} ${cx-8},${cy+11}" fill="#fffce0"/>
<path d="M${cx-5.5} ${cy} C${cx-13} ${cy} ${cx-13} ${cy-11} ${cx-8} ${cy-11}" fill="none" stroke="#fffce0" stroke-width="1.4" stroke-linecap="round"/>
<polygon points="${cx-5},${cy-11} ${cx-10},${cy-15} ${cx-11},${cy-8}" fill="#fffce0"/>
<circle cx="${cx}" cy="${cy}" r="2.2" fill="#ffffff"/>`;
}

function R5_inner(cx,cy,id){  // 地位: 維持原樣，作為金色基準
  return `
<circle cx="${cx}" cy="${cy}" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
<polygon points="${cx},${cy-17} ${cx+2.5},${cy-7.5} ${cx+12},${cy-12} ${cx+7.5},${cy-2.5}
  ${cx+17},${cy} ${cx+7.5},${cy+2.5} ${cx+12},${cy+12} ${cx+2.5},${cy+7.5}
  ${cx},${cy+17} ${cx-2.5},${cy+7.5} ${cx-12},${cy+12} ${cx-7.5},${cy+2.5}
  ${cx-17},${cy} ${cx-7.5},${cy-2.5} ${cx-12},${cy-12} ${cx-2.5},${cy-7.5}"
  fill="#fffce0" opacity=".95"/>
<circle cx="${cx}" cy="${cy}" r="3.5" fill="#ffffff"/>`;
}

const RANKS=[
  {label:'信位', accent:'#f0d060', shape:'circle-dash', fn:R1_inner},
  {label:'住位', accent:'#f0d060', shape:'hexagon',     fn:R2_inner},
  {label:'行位', accent:'#f0d060', shape:'shield',      fn:R3_inner},
  {label:'迴向位',accent:'#f0d060', shape:'octagon',    fn:R4_inner},
  {label:'地位', accent:'#f0d060', shape:'starburst',   fn:R5_inner},
];

/* ══ OUTER FRAME SHAPES (standalone rank badge) ══ */
function rankFrame(ri){
  const cx=60,cy=60;
  const acc=RANKS[ri].accent;
  const frames=[
    // 0 信位: double circle
    `<circle cx="${cx}" cy="${cy}" r="52" fill="#050c14" stroke="${acc}" stroke-width="1.2"/>
     <circle cx="${cx}" cy="${cy}" r="47" fill="none" stroke="${acc}" stroke-width=".4" stroke-dasharray="3 3" opacity=".5"/>`,
    // 1 住位: hexagon
    `<polygon points="${cx},${cy-52} ${cx+45},${cy-26} ${cx+45},${cy+26} ${cx},${cy+52} ${cx-45},${cy+26} ${cx-45},${cy-26}" fill="#120800" stroke="${acc}" stroke-width="1.2"/>
     <polygon points="${cx},${cy-44} ${cx+38},${cy-22} ${cx+38},${cy+22} ${cx},${cy+44} ${cx-38},${cy+22} ${cx-38},${cy-22}" fill="none" stroke="${acc}" stroke-width=".4" opacity=".45"/>`,
    // 2 行位: gothic shield
    `<path d="M${cx} ${cy-52}L${cx+48} ${cy-30}L${cx+48} ${cy+10}Q${cx+48} ${cy+46} ${cx} ${cy+54}Q${cx-48} ${cy+46} ${cx-48} ${cy+10}L${cx-48} ${cy-30}Z" fill="#040e06" stroke="${acc}" stroke-width="1.2"/>
     <path d="M${cx} ${cy-44}L${cx+40} ${cy-24}L${cx+40} ${cy+8}Q${cx+40} ${cy+38} ${cx} ${cy+46}Q${cx-40} ${cy+38} ${cx-40} ${cy+8}L${cx-40} ${cy-24}Z" fill="none" stroke="${acc}" stroke-width=".4" opacity=".45"/>`,
    // 3 迴向位: octagon
    `<polygon points="${cx},${cy-52} ${cx+37},${cy-37} ${cx+52},${cy} ${cx+37},${cy+37} ${cx},${cy+52} ${cx-37},${cy+37} ${cx-52},${cy} ${cx-37},${cy-37}" fill="#120008" stroke="${acc}" stroke-width="1.2"/>
     <polygon points="${cx},${cy-44} ${cx+31},${cy-31} ${cx+44},${cy} ${cx+31},${cy+31} ${cx},${cy+44} ${cx-31},${cy+31} ${cx-44},${cy} ${cx-31},${cy-31}" fill="none" stroke="${acc}" stroke-width=".4" opacity=".45"/>`,
    // 4 地位: 12-point star polygon
    `<polygon points="${[...Array(24)].map((_,i)=>{const a=(i*15-90)*Math.PI/180;const R=i%2?36:54;return `${(cx+Math.cos(a)*R).toFixed(1)},${(cy+Math.sin(a)*R).toFixed(1)}`;}).join(' ')}" fill="#100900" stroke="${acc}" stroke-width="1.2"/>`,
  ];
  return frames[ri];
}

/* ══ GENERATE FUSED BADGE SVG ══ */
function fusedSVG(ri,li,sz=120){
  const cx=60,cy=60;
  const R=RANKS[ri],L=LOTUSES[li];
  const id=`${ri}${li}`;
  return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}">
${D(id)}
<circle cx="${cx}" cy="${cy}" r="59" fill="none" stroke="${L.aura.slice(0,7)}"
  stroke-width="5" opacity=".28" filter="url(#glo${id})"/>
<g filter="url(#sof${id})">
${L.fn(cx,cy,id)}
<animateTransform attributeName="transform" type="rotate"
  from="0 ${cx} ${cy}" to="360 ${cx} ${cy}"
  dur="${L.dur}s" repeatCount="indefinite" additive="sum"/>
</g>
<circle cx="${cx}" cy="${cy}" r="23" fill="none" stroke="${R.accent}" stroke-width="1.5" opacity=".95"/>
<circle cx="${cx}" cy="${cy}" r="21.5" fill="none" stroke="${R.accent}" stroke-width=".35" opacity=".35"/>
${R.fn(cx,cy,id)}
<circle cx="${cx}" cy="${cy}" r="1.8" fill="#ffffff" opacity=".95" filter="url(#glo${id})"/>
</svg>`;
}

/* ══ STANDALONE RANK SVG ══ */
function rankSVG(ri,sz=86){
  const cx=60,cy=60,id=`RS${ri}`;
  return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}">
${D(id)}
${rankFrame(ri)}
${RANKS[ri].fn(cx,cy,id)}
<circle cx="${cx}" cy="${cy}" r="1.6" fill="#fff" filter="url(#glo${id})"/>
</svg>`;
}

/* ══ STANDALONE LOTUS SVG ══ */
function lotusSVG(li,sz=86){
  const cx=60,cy=60,L=LOTUSES[li],id=`LS${li}`;
  function bigPetal(n,r0,r1,hw,bulge,shape,fill,op,off=0){return rotatedPetals(cx,cy,n,r0,r1,hw,bulge,shape,fill,op,off);}
  const petalFns=[
    ()=>`<defs>
<radialGradient id="lpA${id}" cx="50%" cy="72%" r="100%"><stop offset="0%" stop-color="#fff0f5"/><stop offset="42%" stop-color="#f5a0bc"/><stop offset="100%" stop-color="#b04470" stop-opacity=".88"/></radialGradient>
<radialGradient id="lpB${id}" cx="50%" cy="62%" r="100%"><stop offset="0%" stop-color="#ffe8f2"/><stop offset="100%" stop-color="#d87898" stop-opacity=".54"/></radialGradient>
</defs>
${bigPetal(8,12,52,9.5,14,'round',`url(#lpA${id})`,.92)}
${bigPetal(8,12,41,7,10,'round',`url(#lpB${id})`,.68,22.5)}`,
    ()=>`<defs>
<radialGradient id="lpA${id}" cx="50%" cy="70%" r="100%"><stop offset="0%" stop-color="#e0f0ff"/><stop offset="36%" stop-color="#58a0d0"/><stop offset="100%" stop-color="#085090" stop-opacity=".9"/></radialGradient>
<radialGradient id="lpB${id}" cx="50%" cy="58%" r="100%"><stop offset="0%" stop-color="#d4e8ff"/><stop offset="100%" stop-color="#4090c0" stop-opacity=".52"/></radialGradient>
</defs>
${bigPetal(8,12,52,12,18,'wide',`url(#lpA${id})`,.9)}
${bigPetal(8,12,40,8,12,'wide',`url(#lpB${id})`,.62,22.5)}`,
    ()=>`<defs>
<radialGradient id="lpA${id}" cx="50%" cy="76%" r="100%"><stop offset="0%" stop-color="#e0fff8"/><stop offset="40%" stop-color="#28c098"/><stop offset="100%" stop-color="#065c48" stop-opacity=".92"/></radialGradient>
<radialGradient id="lpB${id}" cx="50%" cy="60%" r="100%"><stop offset="0%" stop-color="#c0fff0"/><stop offset="100%" stop-color="#38c0a8" stop-opacity=".5"/></radialGradient>
</defs>
${bigPetal(10,12,52,8,12,'point',`url(#lpA${id})`,.9)}
${bigPetal(10,12,40,5.5,7.5,'slim',`url(#lpB${id})`,.6,18)}`,
    ()=>{
      const cols=['#ff8888','#ffb060','#ffe860','#a0e868','#40d898','#40c8e8','#6888ff','#9870e8','#d870c8','#ff70b0','#ff9068','#ffc848'];
      return cols.map((c,i)=>`<path d="${P(cx,cy,12,52,9.5,14,'round')}" fill="${c}" opacity=".87" transform="rotate(${i*30} ${cx} ${cy})"/>`).join('')
        +cols.map((c,i)=>`<path d="${P(cx,cy,12,40,6.5,9,'round')}" fill="${cols[(i+6)%12]}" opacity=".5" transform="rotate(${i*30+15} ${cx} ${cy})"/>`).join('');
    },
    ()=>`<defs>
<radialGradient id="lpA${id}" cx="50%" cy="71%" r="100%"><stop offset="0%" stop-color="#fffce0"/><stop offset="30%" stop-color="#f0c030"/><stop offset="100%" stop-color="#8c5c10" stop-opacity=".94"/></radialGradient>
<radialGradient id="lpB${id}" cx="50%" cy="61%" r="100%"><stop offset="0%" stop-color="#fff8c0"/><stop offset="46%" stop-color="#e8a820"/><stop offset="100%" stop-color="#7a4c08" stop-opacity=".74"/></radialGradient>
<radialGradient id="lpC${id}" cx="50%" cy="50%" r="100%"><stop offset="0%" stop-color="#fffde8"/><stop offset="100%" stop-color="#d4a030" stop-opacity=".38"/></radialGradient>
</defs>
${bigPetal(8,12,53,10,14.5,'round',`url(#lpA${id})`,.95)}
${bigPetal(8,12,50,9,13,'round',`url(#lpB${id})`,.88,22.5)}
${bigPetal(8,12,37,6.5,9,'round',`url(#lpC${id})`,.62,11.25)}`,
  ];
  return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}">
${D(id)}
<circle cx="${cx}" cy="${cy}" r="54" fill="#06060a" stroke="${L.aura.slice(0,7)}" stroke-width=".8" opacity=".6"/>
<circle cx="${cx}" cy="${cy}" r="50" fill="none" stroke="${L.aura.slice(0,7)}" stroke-width=".3" stroke-dasharray="1.8 3.5" opacity=".3"/>
<g filter="url(#sof${id})">
${petalFns[li]()}
<animateTransform attributeName="transform" type="rotate"
  from="0 ${cx} ${cy}" to="360 ${cx} ${cy}"
  dur="${L.dur}s" repeatCount="indefinite" additive="sum"/>
</g>
<circle cx="${cx}" cy="${cy}" r="9.5" fill="${L.aura.slice(0,7)}" opacity=".5" filter="url(#glo${id})"/>
<circle cx="${cx}" cy="${cy}" r="6" fill="${L.aura.slice(0,7)}" opacity=".9"/>
${[0,60,120,180,240,300].map(a=>{const r=a*Math.PI/180;return `<circle cx="${(cx+Math.cos(r)*7.5).toFixed(1)}" cy="${(cy+Math.sin(r)*7.5).toFixed(1)}" r="1.3" fill="#fffcdc" opacity=".85"/>`;}).join('')}
<circle cx="${cx}" cy="${cy}" r="2.8" fill="#fff8e0" filter="url(#glo${id})"/>
</svg>`;
}

/* ══ RENDER UI ══ */
let selR=null,selL=null;

function pick(html,lbl,clickFn){
  const d=document.createElement('div');
  d.className='pick';
  d.innerHTML=html+`<div class="lbl">${lbl}</div>`;
  d.addEventListener('click',clickFn);
  return d;
}

RANKS.forEach((r,ri)=>{
  const d=pick(rankSVG(ri),r.label,()=>{
    document.querySelectorAll('.pick[data-ri]').forEach(e=>e.classList.remove('sel'));
    d.classList.add('sel');selR=ri;renderPreview();
  });
  d.dataset.ri=ri;
  document.getElementById('rank-row').appendChild(d);
});

LOTUSES.forEach((l,li)=>{
  const d=pick(lotusSVG(li),l.label,()=>{
    document.querySelectorAll('.pick[data-li]').forEach(e=>e.classList.remove('sel'));
    d.classList.add('sel');selL=li;renderPreview();
  });
  d.dataset.li=li;
  document.getElementById('lotus-row').appendChild(d);
});

function renderPreview(){
  const st=document.getElementById('stage');
  if(selR===null||selL===null){st.innerHTML='<div class="empty">請選擇<br>位階 ＋ 蓮花<br>各一枚</div>';return;}
  st.innerHTML=fusedSVG(selR,selL,196);
}

const g=document.getElementById('gallery');
RANKS.forEach((_,ri)=>LOTUSES.forEach((_,li)=>{
  const c=document.createElement('div');
  c.className='gc';
  c.innerHTML=fusedSVG(ri,li,95)+`<div class="cl">${RANKS[ri].label}<br>${LOTUSES[li].label}</div>`;
  c.addEventListener('click',()=>{
    selR=ri;selL=li;
    document.querySelectorAll('.pick[data-ri]').forEach(e=>e.classList.toggle('sel',+e.dataset.ri===ri));
    document.querySelectorAll('.pick[data-li]').forEach(e=>e.classList.toggle('sel',+e.dataset.li===li));
    renderPreview();
    document.getElementById('stage').scrollIntoView({behavior:'smooth',block:'center'});
  });
  g.appendChild(c);
}));
</script>

</body>
