<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彌陀淨土 ‧ 終極大圓滿十階矩陣</title>
<style>
:root { --bg: #050508; --gold: #f0d060; --white: #f2ede0; }
body { background: var(--bg); color: var(--white); font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
.title { font-size: 1.4rem; letter-spacing: 4px; color: var(--gold); margin-bottom: 40px; text-shadow: 0 0 20px rgba(240,208,96,0.3); border-bottom: 1px solid rgba(240,208,96,0.3); padding-bottom: 15px; text-align: center; }
.matrix { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; justify-items: center; }
.card { background: rgba(255,255,255,0.02); border: 1px solid rgba(240,208,96,0.15); border-radius: 20px; padding: 30px 15px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; width: 100%; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
.card:hover { transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(240,208,96,0.1); }
.svg-wrap { width: 150px; height: 150px; margin-bottom: 25px; }
.medal-name { color: var(--gold); font-weight: bold; font-size: 1rem; margin-bottom: 8px; text-align: center; letter-spacing: 1px; text-shadow: 0 0 8px rgba(240,208,96,0.3); }
.threshold { color: #8ba89c; font-size: 0.75rem; letter-spacing: 1px; font-family: monospace; }
</style>
</head>
<body>

<div class="title">彌陀淨土 ‧ 終極十階演化矩陣</div>
<div class="matrix" id="matrix"></div>

<script>
// 10 階門檻定義 (測試預覽用)
const STAGES = [
    { rank: 'Faith',      nian: 0,         name: "[0] 清淨白蓮",       threshold: "0" },
    { rank: 'Faith',      nian: 10,        name: "[10] 初發暖橘",      threshold: "10" },
    { rank: 'Faith',      nian: 500,       name: "[500] 晨曦粉霞",     threshold: "500" },
    { rank: 'Abiding',    nian: 5000,      name: "[5000] 琉璃淡藍",    threshold: "5,000" },
    { rank: 'Abiding',    nian: 10000,     name: "[1萬] 菩提翠玉",      threshold: "10,000" },
    { rank: 'Practice',   nian: 100000,    name: "[10萬] 寶池深藍",     threshold: "100,000" },
    { rank: 'Practice',   nian: 500000,    name: "[50萬] 七寶彩虹",     threshold: "500,000" },
    { rank: 'Dedication', nian: 1000000,   name: "[100萬] 般若紫金",    threshold: "1,000,000" },
    { rank: 'Dedication', nian: 10000000,  name: "[1000萬] 大圓滿金",   threshold: "10,000,000" },
    { rank: 'Bhumi',      nian: 100000000, name: "[1億] 萬佛金剛 (繁花)", threshold: "100,000,000" }
];

// ══════════════════════════════════════════════════════════
// 終極定案版 getLotusSVG (可直接複製貼上至主系統替換)
// ══════════════════════════════════════════════════════════
function getLotusSVG(rankType, nianCount = 0, overrideLevel = null) {
    // 決定蓮花等級 (1~10)
    let nLevel = 1;
    if (overrideLevel !== null) {
        nLevel = overrideLevel; 
    } else {
        if (nianCount >= 100000000) nLevel = 10;      // 1億
        else if (nianCount >= 10000000) nLevel = 9;   // 1000萬
        else if (nianCount >= 1000000) nLevel = 8;    // 100萬
        else if (nianCount >= 500000) nLevel = 7;     // 50萬
        else if (nianCount >= 100000) nLevel = 6;     // 10萬
        else if (nianCount >= 10000) nLevel = 5;      // 1萬
        else if (nianCount >= 5000) nLevel = 4;       // 5000
        else if (nianCount >= 500) nLevel = 3;        // 500
        else if (nianCount >= 10) nLevel = 2;         // 10
        else nLevel = 1;                              // 0
    }

    const cx = 50, cy = 50;
    const id = `svg-${Math.random().toString(36).substr(2, 5)}`; 

    // ── 花瓣路徑生成器 ──
    function P(r0, r1, hw, bulge, shape) {
        const bx = cx, by = cy - r0, tx = cx, ty = cy - r1;
        const my = cy - (r0 + r1) / 2;
        if (shape === 'slim') return `M${bx - hw * .7} ${by} C${bx - bulge * .75} ${my} ${tx - 1.5} ${ty + 3} ${tx} ${ty} C${tx + 1.5} ${ty + 3} ${bx + bulge * .75} ${my} ${bx + hw * .7} ${by}Z`;
        if (shape === 'wide') return `M${bx - hw} ${by} C${bx - bulge * 1.35} ${my + 4} ${tx - bulge * .45} ${ty + 7} ${tx} ${ty} C${tx + bulge * .45} ${ty + 7} ${bx + bulge * 1.35} ${my + 4} ${bx + hw} ${by}Z`;
        if (shape === 'point') return `M${bx - hw} ${by} C${bx - bulge} ${my} ${tx - 2} ${ty + 2} ${tx} ${ty} C${tx + 2} ${ty + 2} ${bx + bulge} ${my} ${bx + hw} ${by}Z`;
        return `M${bx - hw} ${by} C${bx - bulge} ${my} ${tx - bulge * .3} ${ty + 5} ${tx} ${ty} C${tx + bulge * .3} ${ty + 5} ${bx + bulge} ${my} ${bx + hw} ${by}Z`;
    }

    function rotatedPetals(n, r0, r1, hw, bulge, shape, fill, op, offset = 0) {
        let s = '';
        for (let i = 0; i < n; i++) {
            const a = i * (360 / n) + offset;
            s += `<path d="${P(r0, r1, hw, bulge, shape)}" fill="${fill}" opacity="${op}" transform="rotate(${a} ${cx} ${cy})"/>`;
        }
        return s;
    }

    // ── 共用定義 (發光濾鏡與統一地位金底漸層) ──
    const sharedDefs = `
    <defs>
        <filter id="glo${id}" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="sof${id}" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <radialGradient id="rg-unified-gold" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stop-color="#fffce0"/><stop offset="28%" stop-color="#f0c030"/><stop offset="65%" stop-color="#906010"/><stop offset="100%" stop-color="#4c3008"/>
        </radialGradient>
        <radialGradient id="rg-void" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#111111" stop-opacity="0.95"/><stop offset="70%" stop-color="#0a0500" stop-opacity="0.8"/><stop offset="100%" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>
    </defs>`;

    const voidBg = `<circle cx="50" cy="50" r="42" fill="url(#rg-void)"><animate attributeName="r" values="41;43;41" dur="6s" repeatCount="indefinite"/></circle>`;

    // ── 幾何位階背景 (統一為大圓滿金，相容中英文) ──
    let bgContent = '';
    if (rankType === '信' || rankType === 'Faith' || rankType.includes('Faith')) {
        bgContent = `
        <circle cx="${cx}" cy="${cy}" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
        <circle cx="${cx}" cy="${cy}" r="15.5" fill="none" stroke="#f0c868" stroke-width=".5" stroke-dasharray="1.8 2.2"/>
        <polygon points="${cx},${cy-11} ${cx+9.5},${cy+5.5} ${cx-9.5},${cy+5.5}" fill="none" stroke="#fffce0" stroke-width="1.3"/>
        <polygon points="${cx},${cy-7} ${cx+6},${cy+3.5} ${cx-6},${cy+3.5}" fill="#ffe8a0" opacity=".82"/>
        <circle cx="${cx}" cy="${cy}" r="2.2" fill="#ffffff"/>`;
    } else if (rankType === '住' || rankType === 'Abiding' || rankType.includes('Abiding')) {
        bgContent = `
        <circle cx="${cx}" cy="${cy}" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
        <rect x="${cx-1.8}" y="${cy-13}" width="3.6" height="18" fill="url(#rg-unified-gold)" rx=".4"/>
        <rect x="${cx-6}" y="${cy-9}" width="12" height="2.8" fill="url(#rg-unified-gold)" rx=".4"/>
        <rect x="${cx-9.5}" y="${cy-4.5}" width="19" height="2.8" fill="url(#rg-unified-gold)" rx=".4"/>
        <rect x="${cx-13}" y="${cy+0.5}" width="26" height="2.8" fill="url(#rg-unified-gold)" rx=".4"/>
        <polygon points="${cx},${cy-17} ${cx+3},${cy-12} ${cx-3},${cy-12}" fill="#fffce0"/>
        <circle cx="${cx}" cy="${cy}" r="2.2" fill="#ffffff"/>`;
    } else if (rankType === '行' || rankType === 'Practice' || rankType.includes('Practice')) {
        let lines = [0,45,90,135].map(a=>{
            const r=a*Math.PI/180;
            const x1=cx+Math.cos(r)*4.2, y1=cy+Math.sin(r)*4.2;
            const x2=cx+Math.cos(r)*14, y2=cy+Math.sin(r)*14;
            const x3=cx-Math.cos(r)*4.2, y3=cy-Math.sin(r)*4.2;
            const x4=cx-Math.cos(r)*14, y4=cy-Math.sin(r)*14;
            return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#f0c868" stroke-width="1"/><line x1="${x3.toFixed(1)}" y1="${y3.toFixed(1)}" x2="${x4.toFixed(1)}" y2="${y4.toFixed(1)}" stroke="#f0c868" stroke-width="1"/>`;
        }).join('');
        let dots = [0,45,90,135,180,225,270,315].map(a=>{
            const r=a*Math.PI/180;
            return `<circle cx="${(cx+Math.cos(r)*16).toFixed(1)}" cy="${(cy+Math.sin(r)*16).toFixed(1)}" r="1.5" fill="#f0c868"/>`;
        }).join('');
        bgContent = `
        <circle cx="${cx}" cy="${cy}" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
        <circle cx="${cx}" cy="${cy}" r="14" fill="none" stroke="#f0c868" stroke-width="1.1"/>
        <circle cx="${cx}" cy="${cy}" r="4.2" fill="#ffe8a0"/>
        ${lines}${dots}
        <circle cx="${cx}" cy="${cy}" r="2" fill="#ffffff"/>`;
    } else if (rankType === '迴' || rankType === 'Dedication' || rankType.includes('Dedication')) {
        bgContent = `
        <circle cx="${cx}" cy="${cy}" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
        <circle cx="${cx}" cy="${cy}" r="5.5" fill="#ffe8a0"/>
        <path d="M${cx} ${cy-5.5} C${cx} ${cy-13} ${cx+11} ${cy-13} ${cx+11} ${cy-8}" fill="none" stroke="#fffce0" stroke-width="1.4" stroke-linecap="round"/>
        <polygon points="${cx+11},${cy-5} ${cx+15},${cy-10} ${cx+8},${cy-11}" fill="#fffce0"/>
        <path d="M${cx+5.5} ${cy} C${cx+13} ${cy} ${cx+13} ${cy+11} ${cx+8} ${cy+11}" fill="none" stroke="#fffce0" stroke-width="1.4" stroke-linecap="round"/>
        <polygon points="${cx+5},${cy+11} ${cx+10},${cy+15} ${cx+11},${cy+8}" fill="#fffce0"/>
        <path d="M${cx} ${cy+5.5} C${cx} ${cy+13} ${cx-11} ${cy+13} ${cx-11} ${cy+8}" fill="none" stroke="#fffce0" stroke-width="1.4" stroke-linecap="round"/>
        <polygon points="${cx-11},${cy+5} ${cx-15},${cy+10} ${cx-8},${cy+11}" fill="#fffce0"/>
        <path d="M${cx-5.5} ${cy} C${cx-13} ${cy} ${cx-13} ${cy-11} ${cx-8} ${cy-11}" fill="none" stroke="#fffce0" stroke-width="1.4" stroke-linecap="round"/>
        <polygon points="${cx-5},${cy-11} ${cx-10},${cy-15} ${cx-11},${cy-8}" fill="#fffce0"/>
        <circle cx="${cx}" cy="${cy}" r="2.2" fill="#ffffff"/>`;
    } else if (rankType === '地' || rankType === 'Bhumi' || rankType.includes('Bhumi')) {
        bgContent = `
        <circle cx="${cx}" cy="${cy}" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
        <polygon points="${cx},${cy-17} ${cx+2.5},${cy-7.5} ${cx+12},${cy-12} ${cx+7.5},${cy-2.5}
          ${cx+17},${cy} ${cx+7.5},${cy+2.5} ${cx+12},${cy+12} ${cx+2.5},${cy+7.5}
          ${cx},${cy+17} ${cx-2.5},${cy+7.5} ${cx-12},${cy+12} ${cx-7.5},${cy+2.5}
          ${cx-17},${cy} ${cx-7.5},${cy-2.5} ${cx-12},${cy-12} ${cx-2.5},${cy-7.5}"
          fill="#fffce0" opacity=".95"/>
        <circle cx="${cx}" cy="${cy}" r="3.5" fill="#ffffff"/>`;
    }

    // ── 蓮花顏料與十階演化邏輯 ──
    let lotusContent = '';

    if (nLevel === 1) { 
        lotusContent = `
        <defs>
            <radialGradient id="lA${id}" cx="50%" cy="75%" r="100%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="60%" stop-color="#f5f5f5" stop-opacity="0.6"/><stop offset="100%" stop-color="#cccccc" stop-opacity="0.3"/></radialGradient>
            <radialGradient id="lB${id}" cx="50%" cy="65%" r="100%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/><stop offset="100%" stop-color="#e0e0e0" stop-opacity="0.4"/></radialGradient>
        </defs>
        ${rotatedPetals(8,22,46,7,11,'round',`url(#lA${id})`,.85)}
        ${rotatedPetals(8,22,38,5.5,8,'round',`url(#lB${id})`,.65,22.5)}`;
    } else if (nLevel === 2) { 
        lotusContent = `
        <defs>
            <radialGradient id="lA${id}" cx="50%" cy="75%" r="100%"><stop offset="0%" stop-color="#fffde7" stop-opacity="0.9"/><stop offset="40%" stop-color="#ffcc80" stop-opacity="0.6"/><stop offset="100%" stop-color="#ef6c00" stop-opacity="0.4"/></radialGradient>
            <radialGradient id="lB${id}" cx="50%" cy="65%" r="100%"><stop offset="0%" stop-color="#fff8e1" stop-opacity="0.8"/><stop offset="100%" stop-color="#ffb74d" stop-opacity="0.45"/></radialGradient>
        </defs>
        ${rotatedPetals(8,22,46,7,11,'round',`url(#lA${id})`,.85)}
        ${rotatedPetals(8,22,38,5.5,8,'round',`url(#lB${id})`,.65,22.5)}`;
    } else if (nLevel === 3) { 
        lotusContent = `
        <defs>
            <radialGradient id="lA${id}" cx="50%" cy="75%" r="100%"><stop offset="0%" stop-color="#fff0f5"/><stop offset="40%" stop-color="#f5a0bc"/><stop offset="100%" stop-color="#b04470" stop-opacity=".85"/></radialGradient>
            <radialGradient id="lB${id}" cx="50%" cy="65%" r="100%"><stop offset="0%" stop-color="#ffe8f2"/><stop offset="100%" stop-color="#d87898" stop-opacity=".55"/></radialGradient>
        </defs>
        ${rotatedPetals(8,22,46,7,11,'round',`url(#lA${id})`,.92)}
        ${rotatedPetals(8,22,38,5.5,8,'round',`url(#lB${id})`,.7,22.5)}`;
    } else if (nLevel === 4) { 
        lotusContent = `
        <defs>
            <radialGradient id="lA${id}" cx="50%" cy="72%" r="100%"><stop offset="0%" stop-color="#e0f0ff" stop-opacity="0.9"/><stop offset="40%" stop-color="#81d4fa" stop-opacity="0.6"/><stop offset="100%" stop-color="#0277bd" stop-opacity="0.5"/></radialGradient>
            <radialGradient id="lB${id}" cx="50%" cy="58%" r="100%"><stop offset="0%" stop-color="#e1f5fe" stop-opacity="0.8"/><stop offset="100%" stop-color="#4fc3f7" stop-opacity="0.45"/></radialGradient>
        </defs>
        ${rotatedPetals(8,22,46,9,14,'wide',`url(#lA${id})`,.88)}
        ${rotatedPetals(8,22,37,6,9,'wide',`url(#lB${id})`,.6,22.5)}`;
    } else if (nLevel === 5) { 
        lotusContent = `
        <defs>
            <radialGradient id="lA${id}" cx="50%" cy="78%" r="100%"><stop offset="0%" stop-color="#e0fff8"/><stop offset="42%" stop-color="#28c098"/><stop offset="100%" stop-color="#065c48" stop-opacity=".9"/></radialGradient>
            <radialGradient id="lB${id}" cx="50%" cy="62%" r="100%"><stop offset="0%" stop-color="#c0fff0"/><stop offset="100%" stop-color="#38c0a8" stop-opacity=".5"/></radialGradient>
        </defs>
        ${rotatedPetals(10,22,46,6,9,'point',`url(#lA${id})`,.9)}
        ${rotatedPetals(10,22,36,4,6,'slim',`url(#lB${id})`,.6,18)}`;
    } else if (nLevel === 6) { 
        lotusContent = `
        <defs>
            <radialGradient id="lA${id}" cx="50%" cy="78%" r="100%"><stop offset="0%" stop-color="#bbdefb"/><stop offset="42%" stop-color="#1565c0"/><stop offset="100%" stop-color="#0d47a1" stop-opacity=".95"/></radialGradient>
            <radialGradient id="lB${id}" cx="50%" cy="62%" r="100%"><stop offset="0%" stop-color="#e3f2fd"/><stop offset="100%" stop-color="#1976d2" stop-opacity=".65"/></radialGradient>
        </defs>
        ${rotatedPetals(10,22,47,6.5,10,'point',`url(#lA${id})`,.95)}
        ${rotatedPetals(10,22,38,4.5,7,'slim',`url(#lB${id})`,.7,18)}`;
    } else if (nLevel === 7) { 
        const cols=['#ff8888','#ffb060','#ffe860','#a0e868','#40d898','#40c8e8','#6888ff','#9870e8','#d870c8','#ff70b0','#ff9068','#ffc848'];
        let p1='', p2='';
        for(let i=0; i<12; i++){ p1 += `<path d="${P(22,46,7.5,11,'round')}" fill="${cols[i]}" opacity=".87" transform="rotate(${i*30} ${cx} ${cy})"/>`; }
        for(let i=0; i<12; i++){ p2 += `<path d="${P(22,36,5,7,'round')}" fill="${cols[(i+6)%12]}" opacity=".5" transform="rotate(${i*30+15} ${cx} ${cy})"/>`; }
        lotusContent = p1 + p2;
    } else if (nLevel === 8) { 
        lotusContent = `
        <defs>
            <radialGradient id="lA${id}" cx="50%" cy="75%" r="100%"><stop offset="0%" stop-color="#f3e5f5"/><stop offset="35%" stop-color="#8e24aa"/><stop offset="100%" stop-color="#4a148c" stop-opacity=".95"/></radialGradient>
            <radialGradient id="lB${id}" cx="50%" cy="65%" r="100%"><stop offset="0%" stop-color="#e1bee7"/><stop offset="100%" stop-color="#6a1b9a" stop-opacity=".7"/></radialGradient>
        </defs>
        ${rotatedPetals(10,22,47,7,12,'wide',`url(#lA${id})`,.95)}
        ${rotatedPetals(10,22,38,5,8,'round',`url(#lB${id})`,.75,18)}`;
    } else if (nLevel === 9) { 
        lotusContent = `
        <defs>
            <radialGradient id="lA${id}" cx="50%" cy="73%" r="100%"><stop offset="0%" stop-color="#fffce0"/><stop offset="32%" stop-color="#f0c030"/><stop offset="100%" stop-color="#8c5c10" stop-opacity=".92"/></radialGradient>
            <radialGradient id="lB${id}" cx="50%" cy="63%" r="100%"><stop offset="0%" stop-color="#fff8c0"/><stop offset="48%" stop-color="#e8a820"/><stop offset="100%" stop-color="#7a4c08" stop-opacity=".72"/></radialGradient>
            <radialGradient id="lC${id}" cx="50%" cy="50%" r="100%"><stop offset="0%" stop-color="#fffde8"/><stop offset="100%" stop-color="#d4a030" stop-opacity=".38"/></radialGradient>
        </defs>
        ${rotatedPetals(8,22,47,8.5,12,'round',`url(#lA${id})`,.95)}
        ${rotatedPetals(8,22,44,8,11,'round',`url(#lB${id})`,.88,22.5)}
        ${rotatedPetals(8,22,33,5.5,7.5,'round',`url(#lC${id})`,.62,11.25)}`;
    } else if (nLevel === 10) { 
        lotusContent = `
        <defs>
            <radialGradient id="lA${id}" cx="50%" cy="75%" r="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="35%" stop-color="#fbc02d"/><stop offset="100%" stop-color="#e65100" stop-opacity=".95"/></radialGradient>
            <radialGradient id="lB${id}" cx="50%" cy="65%" r="100%"><stop offset="0%" stop-color="#fffde7"/><stop offset="45%" stop-color="#f39c12"/><stop offset="100%" stop-color="#d84315" stop-opacity=".85"/></radialGradient>
            <radialGradient id="lC${id}" cx="50%" cy="50%" r="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#fbc02d" stop-opacity=".75"/></radialGradient>
        </defs>
        ${rotatedPetals(12,22,48,7,10,'round',`url(#lA${id})`,.98)}
        ${rotatedPetals(12,22,42,6,8.5,'round',`url(#lB${id})`,.9, 15)}
        ${rotatedPetals(12,22,34,4.5,6.5,'round',`url(#lC${id})`,.8, 7.5)}`;
    }

    // ── 組合回傳 SVG ──
    return `
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
        ${sharedDefs}
        ${voidBg}
        <circle cx="50" cy="50" r="23" fill="none" stroke="#f0d060" stroke-width="1.5" opacity=".95"/>
        <circle cx="50" cy="50" r="21.5" fill="none" stroke="#f0d060" stroke-width=".35" opacity=".35"/>
        ${bgContent}
        <g filter="url(#sof${id})">
            ${lotusContent}
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="40s" repeatCount="indefinite" additive="sum"/>
        </g>
        <circle cx="50" cy="50" r="1.8" fill="#ffffff" opacity=".95" filter="url(#glo${id})"/>
    </svg>`;
}
// ══════════════════════════════════════════════════════════

// 渲染預覽矩陣
const matrix = document.getElementById('matrix');
STAGES.forEach(stage => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
        <div class="svg-wrap">${getLotusSVG(stage.rank, stage.nian)}</div>
        <div class="medal-name">${stage.name}</div>
        <div class="threshold">資糧點數：${stage.threshold}</div>
    `;
    matrix.appendChild(card);
});
</script>
</body>
</html>
