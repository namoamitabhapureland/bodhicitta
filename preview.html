<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀淨土 ‧ 純淨幾何 5+5 矩陣</title>
    <style>
        :root {
            --bg: #050505;
            --gold: #d4af37;
            --glow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        body {
            margin: 0;
            background: var(--bg);
            color: #eee;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .header-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
            width: 100%;
        }
        .title {
            color: var(--gold);
            font-size: 1.25rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 15px;
        }
        .subtitle {
            color: #aaa;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1200px;
            justify-items: center;
        }
        .badge-card {
            background: linear-gradient(145deg, #111, #000);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 35px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), inset 0 0 15px rgba(255, 255, 255, 0.02);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            width: 100%;
            max-width: 220px;
        }
        .badge-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.95), 0 0 30px rgba(212, 175, 55, 0.15);
        }
        .svg-wrap {
            width: 140px;
            height: 140px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
        }
        .text-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .rank-title {
            color: var(--gold);
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 1.05rem;
        }
        .lotus-title {
            color: #aaa;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <div class="title">純淨幾何 ‧ 五階各異契印矩陣</div>
        <div class="subtitle">核心：5-5 交錯十瓣蓮花（行者功德結晶）</div>
    </div>

    <div class="matrix-grid" id="matrix"></div>

    <script>
        // 五種蓮花資料 (5-5 交錯十瓣，核心，不重複顏色演進)
        const lotusData = [
            { id: 1, name: '粉藍 ‧ 空靈水月', cOuter: '#81d4fa', cInner: '#e1f5fe' },
            { id: 2, name: '粉紅 ‧ 慈悲幻彩', cOuter: '#f48fb1', cInner: '#fce4ec' },
            { id: 3, name: '粉綠 ‧ 菩提萌芽', cOuter: '#80cbc4', cInner: '#e0f2f1' },
            { id: 4, name: '粉黃 ‧ 般若微光', cOuter: '#ffe082', cInner: '#fff8e1' },
            { id: 5, name: '燙金 ‧ 大圓滿光', cOuter: '#ffb300', cInner: '#ffe57f' }
        ];

        // 五種位階資料 (背景，純幾何，無文字，各異)
        const rankData = [
            { id: 1, nameZh: '信位', concept: '信心安住', ringColor: '#80deea' },
            { id: 2, nameZh: '住位', concept: '寶塔建立', ringColor: '#ffcc80' },
            { id: 3, nameZh: '行位', concept: '法輪常轉', ringColor: '#a5d6a7' },
            { id: 4, nameZh: '迴向位', concept: '功德迴向', ringColor: '#f48fb1' },
            { id: 5, nameZh: '地位', concept: '普照大地', ringColor: '#d4af37' }
        ];

        function getPetalsHTML(gradIdOuter, gradIdInner) {
            // 5-5 交錯花瓣的幾何運算
            let html = '';
            // 1. 底層 5 瓣 (旋轉 0, 72, 144, 216, 288)
            for(let i=0; i<5; i++) {
                let angle = i * 72;
                html += `<use href="#petal-shape" transform="rotate(${angle} 50 50) scale(1.0)" fill="url(#${gradIdOuter})" filter="url(#glow-soft)"/>`;
            }
            // 2. 表層 5 瓣 (交錯旋轉 36, 108, 180, 252, 324，稍微縮小)
            for(let i=0; i<5; i++) {
                let angle = (i * 72) + 36;
                // scale(0.75) 搭配 translate 校正中心點，形成完美的交錯層次
                html += `<use href="#petal-shape" transform="rotate(${angle} 50 50) translate(12.5 12.5) scale(0.75)" fill="url(#${gradIdInner})"/>`;
            }
            return html;
        }

        // ==========================================
        // 核心：生成五種不同的位階背景 SVG (純幾何)
        // ==========================================
        function getRankBackgroundHTML(rank) {
            switch(rank.id) {
                // 1. 信位 - 莊嚴同心圓 (圓滿信心)
                case 1:
                    return `
                    <g opacity="0.7">
                        <circle cx="50" cy="50" r="42" fill="none" stroke="${rank.ringColor}" stroke-width="0.8" stroke-dasharray="2 4">
                            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="40s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="50" cy="50" r="38" fill="none" stroke="${rank.ringColor}" stroke-width="0.5" opacity="0.3"/>
                    </g>
                    `;
                // 2. 住位 - 幾何寶塔 (寶塔建立)
                case 2:
                    return `
                    <g transform="translate(10, 10) scale(0.8)" opacity="0.6">
                        <path d="M 50 5 C 45 10, 42 20, 42 30 H 58 C 58 20, 55 10, 50 5 Z M 35 30 H 65 V 45 H 35 Z M 20 45 H 80 V 70 H 20 Z M 5 70 H 95 V 95 H 5 Z" fill="${rank.ringColor}" filter="url(#glow-soft)"/>
                    </g>
                    `;
                // 3. 行位 - 金色法輪車輪 (法輪常轉)
                case 3:
                    return `
                    <g transform="translate(15, 15) scale(0.7)" opacity="0.6">
                        <circle cx="50" cy="50" r="48" fill="none" stroke="${rank.ringColor}" stroke-width="1.5"/>
                        <circle cx="50" cy="50" r="10" fill="${rank.ringColor}"/>
                        <line x1="50" y1="50" x2="50" y2="2" stroke="${rank.ringColor}" stroke-width="1.5"/>
                        <line x1="50" y1="50" x2="50" y2="98" stroke="${rank.ringColor}" stroke-width="1.5"/>
                        <line x1="50" y1="50" x2="2" y2="50" stroke="${rank.ringColor}" stroke-width="1.5"/>
                        <line x1="50" y1="50" x2="98" y2="50" stroke="${rank.ringColor}" stroke-width="1.5"/>
                        <line x1="50" y1="50" x2="16" y2="16" stroke="${rank.ringColor}" stroke-width="1.5"/>
                        <line x1="50" y1="50" x2="84" y2="84" stroke="${rank.ringColor}" stroke-width="1.5"/>
                        <line x1="50" y1="50" x2="16" y2="84" stroke="${rank.ringColor}" stroke-width="1.5"/>
                        <line x1="50" y1="50" x2="84" y2="16" stroke="${rank.ringColor}" stroke-width="1.5"/>
                        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite"/>
                    </g>
                    `;
                // 4. 迴向位 - 交錯線條幾何 (功德迴向)
                case 4:
                    return `
                    <g transform="translate(15, 15) scale(0.7)" opacity="0.6">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="${rank.ringColor}" stroke-width="0.5" opacity="0.3"/>
                        <polygon points="50,5 95,50 50,95 5,50" fill="none" stroke="${rank.ringColor}" stroke-width="1"/>
                        <polygon points="50,5 5,50 95,50 50,95" transform="rotate(45 50 50)" fill="none" stroke="${rank.ringColor}" stroke-width="1"/>
                        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="60s" repeatCount="indefinite"/>
                    </g>
                    `;
                // 5. 地位 - 廣大發光芒能量場 (普照大地)
                case 5:
                    let dotsHTML = '';
                    for(let i=0; i<36; i++) {
                        let angle = i * 10;
                        dotsHTML += `<circle cx="50" cy="15" r="1" fill="${rank.ringColor}" transform="rotate(${angle} 50 50)"/>`;
                        dotsHTML += `<circle cx="50" cy="5" r="0.6" fill="${rank.ringColor}" transform="rotate(${angle} 50 50)" opacity="0.5"/>`;
                    }
                    return `
                    <g opacity="0.7">
                        ${dotsHTML}
                        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="120s" repeatCount="indefinite"/>
                    </g>
                    `;
                default:
                    return '';
            }
        }

        function generateCombinedSVG(rank, lotus) {
            // 獨立蓮花漸層 ID，避免渲染衝突
            const gradIdOuter = `grad-outer-${lotus.id}`;
            const gradIdInner = `grad-inner-${lotus.id}`;

            // 是否為最高級燙金蓮花 (增加核心強光)
            const coreGlow = lotus.id === 5 ? 'filter="url(#glow-strong)"' : 'filter="url(#glow-soft)"';

            return `
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
                <defs>
                    <radialGradient id="${gradIdOuter}" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="${lotus.cOuter}" stop-opacity="0.9"/>
                        <stop offset="100%" stop-color="${lotus.cOuter}" stop-opacity="0.2"/>
                    </radialGradient>
                    <radialGradient id="${gradIdInner}" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="${lotus.cInner}" stop-opacity="1"/>
                        <stop offset="100%" stop-color="${lotus.cOuter}" stop-opacity="0.5"/>
                    </radialGradient>

                    <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
                        <feGaussianBlur stdDeviation="1.2" result="b"/>
                        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="3.0" result="b"/>
                        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>

                    <path id="petal-shape" d="M 50 50 C 40 30, 42 10, 50 5 C 58 10, 60 30, 50 50 Z" />
                </defs>

                ${getRankBackgroundHTML(rank)}

                <g>
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="180s" repeatCount="indefinite"/>
                    ${getPetalsHTML(gradIdOuter, gradIdInner)}
                    <circle cx="50" cy="50" r="3.0" fill="#fff" ${coreGlow}/>
                </g>

            </svg>
            `;
        }

        function renderMatrix() {
            const container = document.getElementById('matrix');
            container.innerHTML = '';

            // 為了展示矩陣，我們將 5 種位階與 5 種蓮花一一對應展示
            for(let i=0; i<5; i++) {
                const rank = rankData[i];
                const lotus = lotusData[i];
                
                const card = document.createElement('div');
                card.className = 'badge-card';

                card.innerHTML = `
                    <div class="svg-wrap">
                        ${generateCombinedSVG(rank, lotus)}
                    </div>
                    <div class="text-info">
                        <div class="rank-title">${rank.nameZh}</div>
                        <div class="lotus-title">${lotus.name}</div>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        // 初始化渲染
        renderMatrix();
    </script>
</body>
</html>
