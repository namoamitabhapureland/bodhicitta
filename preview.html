<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彌陀淨土 ‧ 淨瓶生存觀相陣 (實色終極版)</title>
    <style>
        :root {
            --bg-deep: #010204; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        
        /* 法界異象特效 */
        #vision-overlay { position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.8s, background 1s; }
        .vibrate { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, -1px); } }

        .huayan-planet { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.1); width: 50vh; height: 50vh; border-radius: 50%; filter: blur(20px); opacity: 0; z-index: 50; pointer-events: none; transition: transform 2.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 2.5s ease, filter 2.5s ease; }
        .huayan-planet.active { transform: translate(-50%, -50%) scale(1.5); opacity: 0.85; filter: blur(4px); }

        #header { padding: 12px 15px; z-index: 10; position: relative; background: linear-gradient(180deg, rgba(1,2,4,0.95) 0%, rgba(1,2,4,0) 100%); display: flex; justify-content: space-between; align-items: flex-end; }
        .header-left { display: flex; flex-direction: column; gap: 8px; flex: 1;}
        .lv-tag { letter-spacing: 4px; color: var(--gold); font-size: 1rem; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
        
        .question-box { background: rgba(20,25,30,0.85); border: 1px solid var(--solid-gold); border-radius: 30px; padding: 6px 15px; font-size: 1rem; color: #fff; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.8), inset 0 0 15px rgba(212,175,55,0.2); backdrop-filter: blur(10px); width: max-content;}
        .q-icon { width: 40px; height: 40px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.4)); }
        .q-text { font-weight: bold; color: var(--gold); }

        /* 淨瓶沙漏 */
        #timer-vessel-area { width: 60px; height: 85px; position: relative; display: flex; justify-content: center; align-items: center; filter: drop-shadow(0 0 10px #00e5ff); margin-left: 10px; flex-shrink: 0;}
        #vessel-pure { position: absolute; width: 100%; height: 100%; z-index: 2; }
        #nectar-water { position: absolute; bottom: 15%; left: 30%; width: 40%; height: 70%; background: linear-gradient(0deg, #00e5ff 0%, #e0f7fa 100%); border-radius: 3px; opacity: 0.9; transition: height 0.2s linear, background 0.3s; z-index: 1; box-shadow: 0 0 10px #00e5ff; }
        #timer-text { position: absolute; bottom: -20px; font-size: 0.75rem; color: #00e5ff; font-weight: bold; letter-spacing: 1px; white-space: nowrap; transition: color 0.3s;}

        #board { flex: 1; position: relative; width: 100%; overflow: hidden; z-index: 5; }
        
        /* 實體不透明的 SVG */
        .item { 
            position: absolute; display: flex; justify-content: center; align-items: center;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            filter: drop-shadow(4px 8px 6px rgba(0,0,0,0.8)); /* 強化實體陰影 */
            animation: float-breathe 6s infinite ease-in-out alternate;
        }
        .item svg { width: 100%; height: 100%; pointer-events: none; }
        @keyframes float-breathe { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(-5px) scale(1.02); } }

        .item.highlight { filter: drop-shadow(0 0 25px var(--solid-gold)) drop-shadow(0 0 40px rgba(255,255,255,0.9)) brightness(1.4) !important; z-index: 4000 !important; animation: none; transform: scale(1.3) !important; }

        #footer { padding: 20px 15px 25px 15px; width: 100%; background: linear-gradient(0deg, rgba(1,2,4,1) 0%, rgba(1,2,4,0.7) 70%, transparent 100%); z-index: 20; position: relative; display: flex; justify-content: center; align-items: center; gap: 15px;}
        .ans-btn { flex: 1; height: 75px; border-radius: 16px; border: 1px solid rgba(212,175,55,0.5); background: linear-gradient(135deg, rgba(30,35,45,0.95) 0%, rgba(10,15,20,0.95) 100%); color: var(--gold); font-size: 1.8rem; font-weight: bold; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; line-height: 1.2;}
        .ans-btn span { font-size: 0.75rem; color: var(--cyan); font-weight: normal; letter-spacing: 4px; }
        .ans-btn:active { transform: scale(0.92); background: rgba(212,175,55,0.2); box-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        
        /* 模態框 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 5000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s; }
        .modal-overlay.show { display: flex; opacity: 1; pointer-events: auto; }
        .modal-box { width: 85%; max-width: 340px; background: linear-gradient(135deg, #151515, #050505); border: 1px solid var(--solid-gold); border-radius: 20px; padding: 35px 25px; text-align: center; box-shadow: 0 0 50px rgba(212,175,55,0.3); transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .modal-overlay.show .modal-box { transform: scale(1); }
        
        .m-title { color: var(--gold); font-size: 1.2rem; letter-spacing: 5px; margin-bottom: 15px; text-shadow: 0 0 15px rgba(212,175,55,0.5); font-weight: bold;}
        .m-divider { width: 40px; height: 1px; background: var(--solid-gold); margin: 0 auto 20px; opacity: 0.5; }
        .m-text { font-size: 0.95rem; line-height: 1.8; margin-bottom: 30px; letter-spacing: 2px; color: #e0e0e0; text-align: center; }
        
        .rpg-btn-wrap { position: relative; width: 100%; height: 52px; border-radius: 26px; border: 1px solid rgba(212,175,55,0.6); background: rgba(0,0,0,0.5); cursor: pointer; overflow: hidden; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        .rpg-btn-fill { position: absolute; left: 0; top: 0; height: 100%; width: 0%; transition: width 0.05s linear; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.6)); }
        .rpg-btn-text { position: relative; z-index: 5; color: #fff; font-size: 0.95rem; letter-spacing: 4px; font-weight:bold;}
        
        .m-btn { background: transparent; border: 1px solid rgba(139,168,156,0.4); color: var(--cyan); padding: 12px; border-radius: 20px; font-size: 0.95rem; cursor: pointer; transition: all 0.3s; letter-spacing: 3px; width: 100%; margin-bottom: 10px;}
        .m-btn-prime { background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.05)); border-color: var(--solid-gold); color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.1); }
        
        .time-plus { position: absolute; color: #80ed99; font-weight: bold; font-size: 1.3rem; text-shadow: 0 0 10px #80ed99; z-index: 200; pointer-events: none; animation: floatUp 1s forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
    </style>
</head>
<body id="main-body">

<svg style="width:0; height:0; position:absolute;">
    <defs id="svg-defs">
        <g id="pure-vessel-g" transform="scale(0.65) translate(25, 10)">
            <polygon points="45,20 55,20 60,40 40,40" fill="rgba(255,255,255,0.1)" stroke="#fff" stroke-width="0.8"/>
            <path d="M40,40 L60,40 Q75,65, 75,90 Q75,120, 60,120 L40,120 Q25,120, 25,90 Q25,65, 40,40 Z" fill="rgba(255,255,255,0.05)" stroke="#fff" stroke-width="1.5"/>
            <ellipse cx="40" cy="70" rx="3" ry="15" fill="#fff" opacity="0.3" transform="rotate(-15 40 70)"/>
        </g>

        <linearGradient id="g-gold" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffd700" stop-opacity="1"/><stop offset="100%" stop-color="#b8860b" stop-opacity="1"/></linearGradient>

        <linearGradient id="g-rose" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffb7c5" stop-opacity="1"/><stop offset="100%" stop-color="#c2185b" stop-opacity="1"/></linearGradient>

        <linearGradient id="l-red" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ff9a9e" stop-opacity="1"/><stop offset="100%" stop-color="#d84315" stop-opacity="1"/></linearGradient>
        <linearGradient id="l-gold" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#fffde7" stop-opacity="1"/><stop offset="100%" stop-color="#f57f17" stop-opacity="1"/></linearGradient>
        <linearGradient id="l-cyan" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#84fab0" stop-opacity="1"/><stop offset="100%" stop-color="#0277bd" stop-opacity="1"/></linearGradient>
        <linearGradient id="l-purple" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ce93d8" stop-opacity="1"/><stop offset="100%" stop-color="#6a1b9a" stop-opacity="1"/></linearGradient>
        <linearGradient id="l-green" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#80ed99" stop-opacity="1"/><stop offset="100%" stop-color="#1b5e20" stop-opacity="1"/></linearGradient>
    </defs>
</svg>

<canvas id="bgCanvas"></canvas>
<div id="vision-overlay"></div>

<div id="header">
    <div class="header-left">
        <div class="lv-tag" id="lv-display">結界起建中</div>
        <div class="question-box">
            <span style="font-size: 0.95rem;">尋出</span>
            <div class="q-icon" id="q-icon-display"></div>
            <span class="q-text" id="q-name-display">法相</span>
        </div>
    </div>
    <div id="timer-vessel-area">
        <svg viewBox="0 0 100 130" id="vessel-pure"><use href="#pure-vessel-g" /></svg>
        <div id="nectar-water"></div>
        <div id="timer-text">60s</div>
    </div>
</div>

<div id="board"></div>

<div id="footer">
    <button class="ans-btn" id="btn-0" onclick="submitAnswer(0)"></button>
    <button class="ans-btn" id="btn-1" onclick="submitAnswer(1)"></button>
    <button class="ans-btn" id="btn-2" onclick="submitAnswer(2)"></button>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-box" id="modal-box">
        <div class="m-title" id="m-title"></div>
        <div class="m-divider" id="m-div"></div>
        <div class="m-text" id="m-text"></div>
        <div class="m-action-group" id="m-actions"></div>
    </div>
</div>

    // --------------------------------------------------
    // 0. 資料與異象庫
    // --------------------------------------------------
    let db = {};
    try { db = JSON.parse(localStorage.getItem('PX_V19.0')) || {}; } catch(e) { db = {}; }
    db.waterLevel = db.waterLevel || 1;
    db.tempBag = db.tempBag || 0;
    function saveDB() { localStorage.setItem('PX_V19.0', JSON.stringify(db)); }

    const SCRIPTURES = [
        { t: "觀音如來 ‧ 般若照見", c: "【照見五蘊皆空，度一切苦厄】。<br>色即是空，空即是色。", b: "南無觀世音菩薩", color: "rgba(0,200,255,0.2)" },
        { t: "地藏菩薩 ‧ 業海震盪", c: "【眾生度盡，方證菩提】。<br>請長按稱唸名號，鎮伏波濤。", b: "南無地藏王菩薩", color: "rgba(180,30,30,0.5)", type: "earth" },

    ];

    let game = { starSpeed: 1, currentEncounter: null, isHuayan: false, isProcessing: false, timeLeft: 60, maxTime: 60, timerInterval: null };

        sword_green: { name: "翡翠慧劍", svg: `<svg viewBox="0 0 100 150"><g transform="scale(1.1) translate(-5, -15)"><polygon points="50,10 56,40 50,105 44,40" fill="#fff" stroke="#fff" stroke-width="1"/><polygon points="50,10 56,40 50,105" fill="url(#g-green)"/><polygon points="35,100 65,100 55,110 45,110" fill="#8ba89c" stroke="#8ba89c" stroke-width="2"/><polygon points="46,110 54,110 52,135 48,135" fill="#b8860b"/></g></svg>` },

        vase_blue: { name: "琉璃淨瓶", svg: `<svg viewBox="0 0 100 150"><g transform="scale(1.1) translate(-5, -15)"><polygon points="45,20 55,20 60,40 40,40" fill="#fff" stroke="#fff" stroke-width="1"/><polygon points="40,40 60,40 75,90 25,90" fill="url(#g-blue)" stroke="#fff" stroke-width="1"/><polygon points="25,90 75,90 60,120 40,120" fill="#f3e5ab" stroke="#f3e5ab" stroke-width="1"/><polygon points="50,90 75,90 60,120 50,120" fill="#b8860b"/></g></svg>` },

    // 實體無漸層的蓮花迷彩
    const NOISE_LIB = {
        lotus_gold: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.2)"><g transform="rotate(20)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-gold)" stroke="#fff" stroke-width="2"/></g><g transform="rotate(80)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-gold)" stroke="#fff" stroke-width="2"/></g><g transform="rotate(140)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-gold)" stroke="#fff" stroke-width="2"/></g><circle cx="0" cy="0" r="25" fill="#f57f17"/></g></svg>`,
        lotus_red: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.2)"><g transform="rotate(40)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-red)" stroke="#fff" stroke-width="2"/></g><g transform="rotate(100)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-red)" stroke="#fff" stroke-width="2"/></g><g transform="rotate(160)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-red)" stroke="#fff" stroke-width="2"/></g><circle cx="0" cy="0" r="18" fill="#d84315"/></g></svg>`,
        lotus_cyan: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.2)"><g transform="rotate(10)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-cyan)" stroke="#fff" stroke-width="2"/></g><g transform="rotate(70)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-cyan)" stroke="#fff" stroke-width="2"/></g><g transform="rotate(130)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-cyan)" stroke="#fff" stroke-width="2"/></g><circle cx="0" cy="0" r="18" fill="#0277bd"/></g></svg>`,
        lotus_purple: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.2)"><g transform="rotate(15)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-purple)" stroke="#fff" stroke-width="2"/></g><g transform="rotate(75)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-purple)" stroke="#fff" stroke-width="2"/></g><g transform="rotate(135)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-purple)" stroke="#fff" stroke-width="2"/></g><circle cx="0" cy="0" r="16" fill="#6a1b9a"/></g></svg>`,
        lotus_green: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.2)"><g transform="rotate(30)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-green)" stroke="#fff" stroke-width="2"/></g><g transform="rotate(90)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-green)" stroke="#fff" stroke-width="2"/></g><g transform="rotate(150)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-green)" stroke="#fff" stroke-width="2"/></g><circle cx="0" cy="0" r="16" fill="#1b5e20"/></g></svg>`
    };

    let targetType = '';
    let correctCount = 0;
    let options = [];

    // --------------------------------------------------
    // 2. 生存計時器
    // --------------------------------------------------
    function startTimer() {
        clearInterval(game.timerInterval);
        document.getElementById('timer-text').style.color = '#00e5ff';
        
        game.timerInterval = setInterval(() => {
            if(game.isProcessing || game.isHuayan || game.currentEncounter) return;
            game.timeLeft -= 0.1;
            updateWaterUI();
            if (game.timeLeft <= 10) document.getElementById('timer-text').style.color = '#ff4d4d'; 
            if (game.timeLeft <= 0) {
                clearInterval(game.timerInterval);
                game.isProcessing = true;
                showModal("時劫已滿 ‧ 法水耗盡", "六根攀緣過盛，心念散亂。<br>請重新起建結界。", "安住呼吸", () => {
                    db.waterLevel = Math.max(1, db.waterLevel - 1); saveDB(); initLevel();
                });
            }
        }, 100);
    }

    function updateWaterUI() {
        let pct = Math.max(0, (game.timeLeft / game.maxTime) * 100);
        document.getElementById('nectar-water').style.height = `${pct * 0.7}%`; 
        document.getElementById('timer-text').innerText = `${Math.ceil(game.timeLeft)}s`;
        if(pct < 20) document.getElementById('nectar-water').style.background = 'linear-gradient(0deg, #ff4d4d 0%, #ffb7c5 100%)';
        else document.getElementById('nectar-water').style.background = 'linear-gradient(0deg, #00e5ff 0%, #e0f7fa 100%)';
    }

    // --------------------------------------------------
    // 3. 陣法生成 (✨ 絕對防呆數學 + 實色堆疊 ✨)
    // --------------------------------------------------
    function initLevel() {
        game.isProcessing = false;
        const board = document.getElementById('board');
        board.innerHTML = '';
        
        let lvl = db.waterLevel;
        document.getElementById('lv-display').innerText = `第 ${lvl} 重結界`;

        game.maxTime = Math.max(30, 70 - Math.floor(lvl / 1.5));
        game.timeLeft = game.maxTime; 
        updateWaterUI();
        startTimer();

        let totalItems = Math.min(100, 25 + Math.floor(lvl * 4)); 
        correctCount = Math.min(15, 4 + Math.floor(Math.random() * 4) + Math.floor(lvl / 3)); 
        
        let targetPool = Object.keys(TARGET_LIB);
        targetPool.sort(() => Math.random() - 0.5);
        targetType = targetPool[0];

        let itemPool = [];
        // 嚴格生成正確數量
        for(let i=0; i<correctCount; i++) itemPool.push({ type: targetType, cat: 'target' });
        
        // 嚴格排除題目生成干擾物
        let availableTargets = targetPool.filter(t => t !== targetType);
        if (lvl <= 20) availableTargets = availableTargets.slice(0, 4); 
        let availableNoise = Object.keys(NOISE_LIB);

        while(itemPool.length < totalItems) {
            if(Math.random() > 0.4) {
                itemPool.push({ type: availableNoise[Math.floor(Math.random() * availableNoise.length)], cat: 'noise' });
            } else {
                itemPool.push({ type: availableTargets[Math.floor(Math.random() * availableTargets.length)], cat: 'distractor' });
            }
        }
        itemPool.sort(() => Math.random() - 0.5);

        document.getElementById('q-icon-display').innerHTML = TARGET_LIB[targetType].svg;
        document.getElementById('q-name-display').innerText = TARGET_LIB[targetType].name;

        // 嚴格選項生成
        let optSet = new Set([correctCount]);
        while(optSet.size < 3) {
            let offset = Math.floor(Math.random() * 3) + 1;
            let sign = Math.random() > 0.5 ? 1 : -1;
            let val = correctCount + (offset * sign);
            if(val > 0) optSet.add(val);
        }
        options = Array.from(optSet);
        options.sort(() => Math.random() - 0.5);
        for(let i=0; i<3; i++) { document.getElementById(`btn-${i}`).innerHTML = `${options[i]}<br><span>數量</span>`; }

        // 物理渲染
        const boardRect = board.getBoundingClientRect();
        let placedPositions = []; 

        itemPool.forEach((itemDef, idx) => {
            let el = document.createElement('div');
            el.className = `item ${itemDef.cat === 'target' ? 'target-item' : ''}`;
            
            let baseSize;
            if (itemDef.cat === 'noise') {
                el.innerHTML = NOISE_LIB[itemDef.type];
                baseSize = 100 + Math.random() * 60; 
                // ✨ 蓮花迷彩強制壓在底層，不遮蓋法寶 ✨
                el.style.zIndex = 10 + Math.floor(Math.random() * 20); 
            } else {
                el.innerHTML = TARGET_LIB[itemDef.type].svg;
                baseSize = 50 + Math.random() * 35;
                // ✨ 法寶強制浮在頂層大亂鬥 ✨
                el.style.zIndex = 100 + Math.floor(Math.random() * 50); 
            }

            el.style.width = `${baseSize}px`; el.style.height = `${baseSize}px`;
            
            let maxLeft = boardRect.width - baseSize;
            let maxTop = boardRect.height - baseSize;
            
            let finalX = Math.random() * maxLeft; 
            let finalY = Math.random() * maxTop;
            
            el.style.left = `${finalX}px`; el.style.top = `${finalY}px`;
            
            let flip = Math.random() > 0.5 ? 'scaleX(-1)' : 'scaleX(1)';
            let rot = `rotate(${(Math.random() - 0.5) * 360}deg)`;
            el.style.transform = `${flip} ${rot}`;
            el.style.animationDelay = `-${Math.random() * 8}s`;
            
            board.appendChild(el);
        });
    }

    // --------------------------------------------------
    // 4. 答題驗證與回血
    // --------------------------------------------------
    function submitAnswer(btnIdx) {
        if(game.isProcessing) return;
        
        let guess = options[btnIdx];
        
        if (guess === correctCount) {
            game.isProcessing = true;
            
            let bonus = Math.min(game.maxTime - game.timeLeft, 15); 
            game.timeLeft += bonus;
            updateWaterUI();
            showBonusText(`+${Math.floor(bonus)}s`);

            let targets = document.querySelectorAll('.target-item');
            targets.forEach(t => t.classList.add('highlight'));
            
            setTimeout(() => checkWinEvents(), 1200); 

        } else {
            game.timeLeft = Math.max(0, game.timeLeft - 5);
            updateWaterUI();
            document.getElementById('board').classList.add('vibrate');
            setTimeout(() => document.getElementById('board').classList.remove('vibrate'), 300);
        }
    }

    function showBonusText(text) {
        let el = document.createElement('div');
        el.className = 'time-plus'; el.innerText = text;
        let rect = document.getElementById('timer-vessel-area').getBoundingClientRect();
        el.style.left = (rect.left - 10) + 'px'; el.style.top = rect.top + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    function checkWinEvents() {
        db.waterLevel++; 
        db.tempBag++;
        saveDB();

        game.starSpeed = 25; 
        const overlay = document.getElementById('vision-overlay');
        overlay.style.background = 'radial-gradient(circle, #fff 0%, transparent 80%)';
        overlay.style.opacity = '1';
        
        setTimeout(() => {
            game.starSpeed = 1; overlay.style.opacity = '0';
            
            let levelPassed = db.waterLevel - 1;
            if (levelPassed % 5 === 0 && levelPassed > 0) {
                const s = SCRIPTURES[Math.floor(Math.random()*SCRIPTURES.length)];
                triggerRPG(s);
            } else if (levelPassed % 3 === 0 && levelPassed > 0) {
                triggerHuayanWorld(levelPassed);
            } else {
                initLevel(); 
            }
        }, 1500);
    }

    // 華藏特效
    function triggerHuayanWorld(lvl) {
        game.isHuayan = true; game.starSpeed = 60; 
        let layer = Math.floor(lvl / 3) % 20 + 1;
        const planet = document.createElement('div'); planet.className = 'huayan-planet';
        const cols = ['var(--color-cyan)', 'var(--color-purple)', 'var(--color-gold)', 'var(--color-green)'];
        planet.style.background = `radial-gradient(circle, ${cols[layer % 4]} 0%, transparent 70%)`;
        document.body.appendChild(planet);
        
        setTimeout(() => planet.classList.add('active'), 100);
        setTimeout(() => {
            planet.classList.remove('active'); planet.style.opacity = '0';
            setTimeout(() => planet.remove(), 1500);
            game.starSpeed = 1; game.isHuayan = false;
            
            showModal("法喜充滿", `<span style="color:var(--solid-gold); font-size:1.1rem; font-weight:bold;">神遊華藏大千 ‧ 第 ${layer} 重天</span><br><br>法水充盈，請繼續理順心念。`, "繼續精進", () => initLevel());
        }, 3000);
    }

    function triggerRPG(s) {
        game.currentEncounter = s;
        const overlay = document.getElementById('vision-overlay');
        overlay.style.opacity = '1'; overlay.style.background = s.color;
        if(s.type === 'earth') document.getElementById('main-body').classList.add('vibrate');

        document.getElementById('m-div').style.display = 'none';
        showModal(s.t, s.c, null, null, `
            <div class="rpg-btn-wrap" onmousedown="startRPG()" onmouseup="stopRPG()" ontouchstart="startRPG()" ontouchend="stopRPG()">
                <div class="rpg-btn-fill" id="fill" style="background:linear-gradient(90deg, transparent, ${s.color.replace(/[\d\.]+\)$/g, '0.8)')})"></div>
                <div class="rpg-btn-text">${s.b}</div>
            </div>
            <div style="font-size:0.7rem; color:#888; letter-spacing:2px; margin-top:5px;">(長按聚光解厄)</div>
        `);
    }

    let rpgTimer = null, rpgProg = 0;
    function startRPG() {
        clearInterval(rpgTimer); rpgProg = 0;
        rpgTimer = setInterval(() => {
            rpgProg += 2; document.getElementById('fill').style.width = rpgProg + '%';
            if(rpgProg >= 100) { clearInterval(rpgTimer); finishRPG(); }
        }, 30);
    }
    function stopRPG() { clearInterval(rpgTimer); rpgProg = 0; document.getElementById('fill').style.width = '0%'; }
    function finishRPG() {
        const overlay = document.getElementById('vision-overlay');
        overlay.style.background = '#fff'; setTimeout(() => { overlay.style.opacity = '0'; }, 300);
        document.getElementById('main-body').classList.remove('vibrate');
        document.getElementById('modal').classList.remove('show');
        game.currentEncounter = null; game.isProcessing = false;
        
        game.timeLeft = game.maxTime; updateWaterUI();
        initLevel();
    }

    function showModal(title, text, btnText, callback, customHtml) {
        document.getElementById('m-title').innerHTML = title;
        document.getElementById('m-text').innerHTML = text;
        document.getElementById('m-actions').innerHTML = customHtml || `<button class="m-btn m-btn-prime" onclick="closeModal()">${btnText}</button>`;
        if(callback) window.currentCallback = callback;
        document.getElementById('modal').classList.add('show');
    }

    function closeModal() { 
        document.getElementById('modal').classList.remove('show'); 
        game.currentEncounter = null; game.isProcessing = false;
        if(window.currentCallback) { window.currentCallback(); window.currentCallback = null; } 
    }

    // --------------------------------------------------
    // 5. 背景星空
    // --------------------------------------------------
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let cw, ch;
    function res() { cw=canvas.width=window.innerWidth; ch=canvas.height=window.innerHeight; }
    window.addEventListener('resize', res); res();
    
    const starColors = ['#ffffff', '#f3e5ab', '#00e5ff', '#ffb7c5', '#ce93d8'];
    let stars = [];
    for(let i=0; i<200; i++) { 
        stars.push({
            x: Math.random() * 2000 - 1000, y: Math.random() * 2000 - 1000, z: Math.random() * 2000, 
            s: Math.random() * 3.5 + 0.5, c: starColors[Math.floor(Math.random() * starColors.length)],
            alphaOffset: Math.random() * Math.PI * 2, twinkleSpeed: 0.02 + Math.random() * 0.04
        });
    }

    let time = 0;
    function animateBg() {
        time += 0.05;
        ctx.fillStyle = '#010204'; ctx.fillRect(0,0,cw,ch); 
        ctx.globalCompositeOperation = 'screen';
        
        stars.forEach(s => {
            s.z -= (2 * game.starSpeed); 
            if(s.z<=0){ s.z=2000; s.x=(Math.random()-0.5)*2000; s.y=(Math.random()-0.5)*2000; }
            
            let sc = 800 / (800 + s.z);
            let px = cw / 2 + s.x * sc; let py = ch / 2 + s.y * sc;
            
            if(px > 0 && px < cw && py > 0 && py < ch) { 
                let alpha = (Math.sin(time * s.twinkleSpeed * 10 + s.alphaOffset) * 0.5 + 0.5) * sc;
                ctx.fillStyle = s.c; ctx.globalAlpha = alpha;
                ctx.beginPath(); ctx.arc(px, py, s.s * sc * (game.starSpeed > 1 ? 5 : 1), 0, Math.PI*2); ctx.fill(); 
            }
        });
        ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over'; 
        requestAnimationFrame(animateBg);
    }
    animateBg();

    initLevel();
</script>
</body>
