<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彌陀淨土 ‧ 蓮華尋寶陣</title>
    <style>
        :root {
            --bg-deep: #010204; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
            --slot-size: 45px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* 頂部：定課目標 */
        #header { padding: 15px 20px; z-index: 10; position: relative; background: rgba(1,2,4,0.6); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(212,175,55,0.15); display: flex; justify-content: space-between; align-items: center; }
        .lv-tag { letter-spacing: 4px; color: var(--gold); font-size: 1.1rem; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
        .target-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(139,168,156,0.3); border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; color: var(--cyan); letter-spacing: 1px; display: flex; align-items: center; gap: 8px;}

        /* 核心散落區 */
        #board { flex: 1; position: relative; width: 100%; overflow: hidden; z-index: 10; }
        
        /* 脫掉底框的純粹 SVG 道具 */
        .item { 
            position: absolute; width: 65px; height: 65px; 
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; 
            transition: left 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), top 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.35s, width 0.3s, height 0.3s;
            /* 讓 SVG 本身產生立體懸浮感 */
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.8)) drop-shadow(0 0 2px rgba(212,175,55,0.3));
        }
        .item:active { filter: brightness(1.3) drop-shadow(0 0 10px rgba(212,175,55,0.8)); }
        .item svg { width: 100%; height: 100%; pointer-events: none; }

        /* 底部 7 格托盤 */
        #tray-area { height: 110px; width: 100%; background: rgba(1,2,4,0.8); border-top: 1px solid rgba(212,175,55,0.3); z-index: 20; position: relative; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(10px); flex-direction: column; gap: 10px;}
        
        #tray-bg { position: relative; display: flex; gap: 6px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid rgba(139,168,156,0.2); box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .tray-slot { width: var(--slot-size); height: var(--slot-size); border-radius: 8px; background: rgba(0,0,0,0.6); border: 1px dashed rgba(255,255,255,0.1); }

        .dust { position: absolute; border-radius: 50%; pointer-events: none; z-index: 9999; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 2000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s; }
        .modal.show { display: flex; opacity: 1; }
        .m-box { width: 80%; max-width: 320px; background: linear-gradient(135deg, #151515, #050505); border: 1px solid var(--solid-gold); border-radius: 16px; padding: 35px 25px; text-align: center; box-shadow: 0 0 50px rgba(212,175,55,0.2); }
        .ctrl-btn { padding: 12px 20px; border-radius: 20px; border: 1px solid var(--solid-gold); background: rgba(212,175,55,0.15); color: var(--gold); font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 20px;}
        .ctrl-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<svg style="width:0; height:0; position:absolute;">
    <defs id="svg-defs">
        <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
        <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.8"/></linearGradient>
        
        <linearGradient id="l-white" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(255,255,255,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.1)"/></linearGradient>
        <linearGradient id="l-red" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ff9a9e" stop-opacity=".9"/><stop offset="50%" stop-color="#fad0c4" stop-opacity=".8"/><stop offset="100%" stop-color="#a1c4fd" stop-opacity=".7"/></linearGradient>
        <linearGradient id="l-gold" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#D4AF37" stop-opacity="1"/><stop offset="50%" stop-color="#FFD700" stop-opacity=".9"/><stop offset="100%" stop-color="#fff" stop-opacity="1"/></linearGradient>
        <linearGradient id="l-cyan" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#84fab0" stop-opacity=".8"/><stop offset="100%" stop-color="#8fd3f4" stop-opacity=".6"/></linearGradient>
        
        <linearGradient id="g-red" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ff4d4d"/><stop offset="100%" stop-color="#800000"/></linearGradient>
        <linearGradient id="g-blue" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#4da6ff"/><stop offset="100%" stop-color="#000080"/></linearGradient>
    </defs>
</svg>

<canvas id="bgCanvas"></canvas>

<div id="header">
    <div class="lv-tag" id="lv-display">第一重 ‧ 尋寶陣</div>
    <div class="target-box">
        三相歸一以破陣
    </div>
</div>

<div id="board"></div>

<div id="tray-area">
    <div id="tray-bg">
        <div class="tray-slot" id="slot-0"></div><div class="tray-slot" id="slot-1"></div><div class="tray-slot" id="slot-2"></div>
        <div class="tray-slot" id="slot-3"></div><div class="tray-slot" id="slot-4"></div><div class="tray-slot" id="slot-5"></div>
        <div class="tray-slot" id="slot-6"></div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="m-box">
        <div style="color:var(--gold); font-size:1.2rem; letter-spacing:4px; margin-bottom:10px;" id="m-title"></div>
        <div style="color:var(--cyan); font-size:0.85rem; letter-spacing:2px; line-height:1.6;" id="m-desc"></div>
        <button class="ctrl-btn" onclick="initGame()">再佈大陣</button>
    </div>
</div>

<script>
    // --------------------------------------------------
    // 1. 純淨 SVG 圖庫 (脫掉外框，保留最美的形體)
    // --------------------------------------------------
    const LIBRARY = {
        lotus_white: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.3)"><g transform="rotate(0)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-white)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/></g><g transform="rotate(60)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-white)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/></g><g transform="rotate(120)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-white)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/></g><circle cx="0" cy="0" r="20" fill="url(#l-white)"/></g></svg>`,
        
        lotus_gold: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.3)"><g transform="rotate(20)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-gold)" stroke="#fff" stroke-width="1.5"/></g><g transform="rotate(80)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-gold)" stroke="#fff" stroke-width="1.5"/></g><g transform="rotate(140)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-gold)" stroke="#fff" stroke-width="1.5"/></g><circle cx="0" cy="0" r="25" fill="url(#l-gold)"/></g></svg>`,

        lotus_red: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.3)"><g transform="rotate(40)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-red)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/></g><g transform="rotate(100)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-red)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/></g><g transform="rotate(160)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-red)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/></g><circle cx="0" cy="0" r="15" fill="url(#l-red)"/></g></svg>`,
        
        lotus_cyan: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.3)"><g transform="rotate(10)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-cyan)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/></g><g transform="rotate(70)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-cyan)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/></g><g transform="rotate(130)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-cyan)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/></g><circle cx="0" cy="0" r="18" fill="url(#l-cyan)"/></g></svg>`,

        sword_red: `<svg viewBox="0 0 100 150"><g transform="scale(1.2) translate(-8, -15)"><polygon points="50,10 56,40 50,105 44,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="50,10 56,40 50,105" fill="url(#g-red)" opacity="0.9"/><polygon points="35,100 65,100 55,110 45,110" fill="url(#facet-dark)" stroke="#d4af37" stroke-width="1.5"/><polygon points="46,110 54,110 52,135 48,135" fill="url(#facet-dark)"/></g></svg>`,
        
        vase_blue: `<svg viewBox="0 0 100 150"><g transform="scale(1.2) translate(-8, -15)"><polygon points="45,20 55,20 60,40 40,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="40,40 60,40 75,90 25,90" fill="url(#g-blue)" opacity="0.9" stroke="#fff" stroke-width="0.5"/><polygon points="25,90 75,90 60,120 40,120" fill="url(#facet-light)" stroke="#f3e5ab" stroke-width="0.5"/><polygon points="50,90 75,90 60,120 50,120" fill="url(#facet-dark)" opacity="0.8"/></g></svg>`
    };

    const TYPES = Object.keys(LIBRARY); // 6 種截然不同的美麗圖騰

    // --------------------------------------------------
    // 2. 遊戲狀態與物理散落生成 (Scatter Generation)
    // --------------------------------------------------
    let items = [];
    let tray = [];
    let isAnimating = false;

    function initGame() {
        document.getElementById('modal').classList.remove('show');
        const board = document.getElementById('board');
        board.innerHTML = '';
        items = []; tray = [];
        
        // 總共產生 60 個法寶 (每種 10 個 = 無法整除 3 會剩餘，我們確保一定是 3 的倍數)
        // 為了確保 100% 能消除完，我們每種產生 12 個 (4組) => 6 * 12 = 72 個
        let pool = [];
        TYPES.forEach(type => {
            for(let i=0; i<12; i++) pool.push(type);
        });
        pool.sort(() => Math.random() - 0.5); // 洗牌

        const boardRect = board.getBoundingClientRect();
        const centerX = boardRect.width / 2;
        const centerY = boardRect.height / 2;
        
        pool.forEach((type, idx) => {
            let el = document.createElement('div');
            el.className = 'item';
            el.id = `item-${idx}`;
            el.innerHTML = LIBRARY[type];
            el.dataset.type = type;
            
            // 隨機散落邏輯 (聚集在中央區域，避免跑出螢幕)
            // 使用高斯分佈概念，讓法寶堆成一座山
            let radius = Math.random() * (boardRect.width * 0.4);
            let angle = Math.random() * Math.PI * 2;
            let randomX = centerX + Math.cos(angle) * radius - 32.5; // 32.5 是寬度一半
            let randomY = centerY + Math.sin(angle) * radius - 32.5;
            
            // 隨機旋轉角度 (-60 到 60 度)
            let rotation = (Math.random() - 0.5) * 120;
            
            el.style.left = `${randomX}px`;
            el.style.top = `${randomY}px`;
            el.style.transform = `rotate(${rotation}deg)`;
            el.style.zIndex = idx; // 越晚生成的在越上面
            
            // 綁定點擊事件 (不需要判定遮擋！只要點得到就能拿)
            el.onclick = () => moveToTray(el);
            
            board.appendChild(el);
            items.push(el);
        });
    }

    // --------------------------------------------------
    // 3. 核心邏輯：飛入托盤與三相消除 (Match 3)
    // --------------------------------------------------
    function moveToTray(el) {
        if (isAnimating || tray.length >= 7) return; // 托盤滿了不可點
        if (tray.includes(el)) return; // 已經在托盤內的不可再點

        // 將該法寶從盤面邏輯中拔除，加入托盤
        tray.push(el);
        
        // 托盤自動排序 (將相同圖案排在一起)
        tray.sort((a, b) => a.dataset.type.localeCompare(b.dataset.type));

        // 重新計算托盤內每個物件的絕對坐標並執行動畫
        renderTray();
        
        // 檢查是否有 3 個連線
        setTimeout(() => checkMatch(), 350); // 等待飛行 CSS 結束
    }

    function renderTray() {
        const traySlots = document.querySelectorAll('.tray-slot');
        
        tray.forEach((item, index) => {
            const targetSlot = traySlots[index].getBoundingClientRect();
            
            // 將法寶的座標系統切換到 Fixed，以便精準飛入底部托盤
            item.style.position = 'fixed';
            // 扣除掉原本物體的中心點偏移 (因為 slot 寬 45，物體寬 65)
            item.style.left = `${targetSlot.left - 10}px`; 
            item.style.top = `${targetSlot.top - 10}px`;
            item.style.transform = `rotate(0deg) scale(0.7)`; // 飛入托盤時擺正並縮小
            item.style.zIndex = 2000 + index;
        });
    }

    function checkMatch() {
        let matchIndex = -1;
        // 尋找連續 3 個相同的
        for (let i = 0; i <= tray.length - 3; i++) {
            if (tray[i].dataset.type === tray[i+1].dataset.type && 
                tray[i+1].dataset.type === tray[i+2].dataset.type) {
                matchIndex = i;
                break;
            }
        }

        if (matchIndex !== -1) {
            isAnimating = true;
            let matchedItems = tray.splice(matchIndex, 3);
            
            matchedItems.forEach(item => {
                createDustParticles(item, getParticleColor(item.dataset.type));
                item.style.transform = 'scale(0)';
                item.style.opacity = '0';
                setTimeout(() => item.remove(), 300);
            });

            // 消除後，重新排列剩餘的托盤物件
            setTimeout(() => {
                renderTray();
                isAnimating = false;
                checkWinCondition();
            }, 300);
        } else {
            // 沒有消除，檢查是否氣結 (Game Over)
            if (tray.length === 7) {
                document.getElementById('m-title').innerText = "托盤滿溢 ‧ 陣法氣結";
                document.getElementById('m-desc').innerText = "六根攀緣過盛，請重新理順心念。";
                document.getElementById('modal').classList.add('show');
            }
        }
    }

    function checkWinCondition() {
        // 如果盤面上所有的法寶都被清空
        if (document.querySelectorAll('.item').length === 0) {
            document.getElementById('m-title').innerText = "理順色相 ‧ 陣法圓滿";
            document.getElementById('m-desc').innerText = "清淨無染，大陣已破。";
            document.getElementById('modal').classList.add('show');
        }
    }

    function getParticleColor(type) {
        if(type.includes('gold')) return '#d4af37';
        if(type.includes('red')) return '#ff4d4d';
        if(type.includes('cyan') || type.includes('blue')) return '#00e5ff';
        return '#ffffff';
    }

    function createDustParticles(element, color) {
        const rect = element.getBoundingClientRect();
        for(let i=0; i<15; i++) {
            let dust = document.createElement('div'); 
            dust.className = 'dust'; dust.style.background = color;
            dust.style.left = rect.left + rect.width/2 + 'px'; 
            dust.style.top = rect.top + rect.height/2 + 'px';
            let size = Math.random() * 4 + 2; dust.style.width = size + 'px'; dust.style.height = size + 'px';
            dust.style.boxShadow = `0 0 8px ${color}`;
            document.body.appendChild(dust); 
            
            dust.animate([
                { opacity: 1, transform: `translate(0, 0) scale(1)` },
                { opacity: 0, transform: `translate(${(Math.random() - 0.5) * 120}px, ${-(Math.random() * 150 + 50)}px) scale(0)` }
            ], { duration: 600, easing: 'ease-out', fill: 'forwards' });
            setTimeout(() => dust.remove(), 650);
        }
    }

    // 星空背景
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let cw, ch, stars = [];
    function res() { cw=canvas.width=window.innerWidth; ch=canvas.height=window.innerHeight; }
    window.addEventListener('resize', res); res();
    for(let i=0; i<80; i++) stars.push({x:(Math.random()-0.5)*2000, y:(Math.random()-0.5)*2000, z:Math.random()*2000, s:Math.random()*2+1});
    function drawBg() {
        ctx.fillStyle = '#010204'; ctx.fillRect(0,0,cw,ch); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= 1.0; if(s.z<=0){s.z=2000; s.x=(Math.random()-0.5)*2000; s.y=(Math.random()-0.5)*2000;}
            let sc=800/(800+s.z), px=cw/2+s.x*sc, py=ch/2+s.y*sc;
            if(px>0&&px<cw&&py>0&&py<ch){ ctx.fillStyle = `rgba(212,175,55,${sc*0.6})`; ctx.beginPath(); ctx.arc(px,py,s.s*sc,0,Math.PI*2); ctx.fill(); }
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(drawBg);
    }
    drawBg();

    // 啟動遊戲
    initGame();
</script>
</body>
</html>
