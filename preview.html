<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彌陀淨土系統 - 位階圖示示範</title>
<style>
    body {
        background-color: #0a0a0a;
        color: #f3e5ab;
        font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        padding: 30px;
        margin: 0;
    }
    h2 {
        text-align: center;
        color: #d4af37;
        margin-bottom: 40px;
        letter-spacing: 2px;
        text-shadow: 0 0 10px rgba(212,175,55,0.5);
    }
    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 30px;
        max-width: 1200px;
        margin: 0 auto;
    }
    .card {
        background: linear-gradient(135deg, rgba(15,15,15,0.95) 0%, rgba(5,5,5,0.98) 100%);
        border: 1px solid rgba(212,175,55,0.3);
        border-radius: 20px;
        padding: 25px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 15px rgba(212,175,55,0.05);
        transition: transform 0.3s ease;
    }
    .card:hover {
        transform: translateY(-5px);
        border-color: #d4af37;
        box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.15);
    }
    .svg-container {
        width: 150px;
        height: 150px;
        margin-bottom: 20px;
        /* 避免動畫在預覽時過於突兀，加一點容器的發光底座 */
        border-radius: 50%;
        box-shadow: 0 0 30px rgba(212,175,55,0.05);
    }
    .rank-title {
        color: #d4af37;
        font-size: 1.2rem;
        font-weight: bold;
        letter-spacing: 2px;
        text-shadow: 0 0 8px rgba(212,175,55,0.4);
    }
    .nian-count {
        color: rgba(139,168,156,0.9);
        font-size: 0.85rem;
        margin-top: 10px;
        letter-spacing: 1px;
    }
</style>
</head>
<body>

<h2>彌陀淨土系統 - 位階與念佛累積預覽 (1億聲圓滿)</h2>

<div class="grid-container" id="preview-grid"></div>

<script>
// ============================================================================
// 完全提取自您提供的原始碼 (4/24 中文主系統)
// ============================================================================
function getLotusSVG(rankType, nianCount = 0, overrideLevel = null) {
  // ── 專屬五大境界漸層與發光濾鏡 ──
  const sharedDefs = `
    <defs>
      <linearGradient id="grad-lv1" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#eafff8"/>
        <stop offset="100%" stop-color="#349b7d"/>
      </linearGradient>
      <linearGradient id="grad-lv2" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#ff9eb5"/>
      </linearGradient>
      <linearGradient id="grad-lv3" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#fffeea"/>
        <stop offset="100%" stop-color="#d4af37"/>
      </linearGradient>
      <linearGradient id="grad-lv4" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#ffeaee"/>
        <stop offset="100%" stop-color="#c1121f"/>
      </linearGradient>
      <linearGradient id="grad-lv5" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="35%" stop-color="#ffdf00"/>
        <stop offset="100%" stop-color="#d2691e"/>
      </linearGradient>

      <radialGradient id="rg-pure" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="30%" stop-color="#fff8dc"/>
        <stop offset="100%" stop-color="#d4af37"/>
      </radialGradient>
      <linearGradient id="lg-metal" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffeba8"/>
        <stop offset="50%" stop-color="#d4af37"/>
        <stop offset="100%" stop-color="#8a6d1c"/>
      </linearGradient>
      
      <radialGradient id="rg-void" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#111111" stop-opacity="0.95"/>
        <stop offset="70%" stop-color="#0a0500" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
      </radialGradient>
      
      <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="2.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="1.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
  `;

  // ── 背景虛空黑洞 ──
  const voidBg = `
    <circle cx="50" cy="50" r="42" fill="url(#rg-void)">
      <animate attributeName="r" values="41;43;41" dur="6s" repeatCount="indefinite"/>
    </circle>
  `;

  let bgContent = '';
  if (rankType === '信' || rankType === 'Faith') {
    bgContent = `
      <g opacity="0.8">
        <ellipse cx="50" cy="72" rx="30" ry="8" fill="none" stroke="url(#grad-lv1)" stroke-width="1.5">
          <animate attributeName="rx" values="15;35;15" dur="4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.8;0;0.8" dur="4s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="50" cy="72" rx="18" ry="4" fill="none" stroke="url(#rg-pure)" stroke-width="1.5" filter="url(#glow-soft)"/>
      </g>`;
  } else if (rankType === '住' || rankType === 'Abiding') {
    bgContent = `
      <g opacity="0.85">
        <path d="M 50 15 L 68 72 L 32 72 Z" fill="url(#rg-pure)" opacity="0.15" filter="url(#glow-soft)"/>
        <polygon points="25,78 75,78 70,72 30,72" fill="url(#lg-metal)"/>
        <rect x="22" y="78" width="56" height="3" fill="#ffffff" opacity="0.6"/>
      </g>`;
  } else if (rankType === '行' || rankType === 'Practice') {
    let spokes = '';
    for(let i=0; i<12; i++) {
      spokes += `<line x1="50" y1="45" x2="50" y2="18" transform="rotate(${i*30} 50 45)" stroke="url(#lg-metal)" stroke-width="1.5"/>`;
    }
    bgContent = `
      <g opacity="0.5" filter="url(#glow-soft)">
        <animateTransform attributeName="transform" type="rotate" from="0 50 45" to="360 50 45" dur="20s" repeatCount="indefinite"/>
        <circle cx="50" cy="45" r="28" fill="none" stroke="url(#lg-metal)" stroke-width="2"/>
        <circle cx="50" cy="45" r="24" fill="none" stroke="url(#lg-metal)" stroke-width="0.5" stroke-dasharray="2 4"/>
        ${spokes}
      </g>`;
  } else if (rankType === '迴' || rankType === 'Dedication') {
    bgContent = `
      <g opacity="0.6" stroke="#f472b6" fill="none" stroke-width="1.2" filter="url(#glow-soft)">
        <animateTransform attributeName="transform" type="rotate" from="360 50 45" to="0 50 45" dur="30s" repeatCount="indefinite"/>
        <rect x="24" y="19" width="52" height="52" transform="rotate(0 50 45)"/>
        <rect x="24" y="19" width="52" height="52" transform="rotate(30 50 45)"/>
        <rect x="24" y="19" width="52" height="52" transform="rotate(60 50 45)"/>
        <circle cx="50" cy="45" r="32" stroke-dasharray="4 4" stroke-width="0.8"/>
      </g>`;
  } else if (rankType === '地' || rankType === 'Bhumi') {
    let rays = '';
    for(let i=0; i<16; i++) {
      rays += `<path d="M50 45 Q 65 25 50 15 Q 35 25 50 45" fill="none" stroke="url(#grad-lv1)" stroke-width="1" opacity="0.7" transform="rotate(${i*22.5} 50 45)"/>`;
    }
    bgContent = `
      <g opacity="0.8">
        <circle cx="50" cy="45" r="36" fill="none" stroke="url(#rg-pure)" stroke-width="1.5" stroke-dasharray="2 6"/>
        <g filter="url(#glow-soft)">
          <animateTransform attributeName="transform" type="rotate" from="0 50 45" to="360 50 45" dur="45s" repeatCount="indefinite"/>
          ${rays}
        </g>
      </g>`;
  }

  let nLevel = 1;
  if (overrideLevel !== null) {
    nLevel = Math.min(overrideLevel, 5); 
  } else {
    if (nianCount >= 10000000) nLevel = 5;       // 破千萬：大日紫金光
    else if (nianCount >= 1000000) nLevel = 4;   // 破百萬：紅蓮紫金
    else if (nianCount >= 100000) nLevel = 3;    // 破十萬：純粹真金
    else if (nianCount >= 10000) nLevel = 2;     // 破一萬：真珠粉銀
    else nLevel = 1;                             // 初始值：青玉琉璃
  }

  let mColor = `url(#grad-lv${nLevel})`;
  let cColor = `url(#grad-lv${Math.min(nLevel + 1, 5)})`; 

  let petals = '';
  let pairs = nLevel + 1; 

  let backSpreadMax = 36; 
  for (let i = pairs; i >= 1; i--) {
    let r = i / pairs;
    let spread = r * backSpreadMax;
    let drop = r * 15;
    let tipY = 25 + drop; 
    petals += `<path d="M50 74 C ${50 - spread*0.6} 65, ${50 - spread} 50, ${50 - spread} ${tipY} C ${50 - spread*0.4} ${tipY+15}, 45 68, 50 74" fill="${cColor}" opacity="0.6" filter="url(#glow-soft)"/>`;
    petals += `<path d="M50 74 C ${50 + spread*0.6} 65, ${50 + spread} 50, ${50 + spread} ${tipY} C ${50 + spread*0.4} ${tipY+15}, 55 68, 50 74" fill="${cColor}" opacity="0.6" filter="url(#glow-soft)"/>`;
  }

  let frontSpreadMax = 28; 
  for (let i = pairs - 1; i >= 1; i--) {
    let r = i / (pairs - 1);
    let spread = r * frontSpreadMax;
    let drop = r * 12;
    let tipY = 32 + drop; 
    petals += `<path d="M50 76 C ${50 - spread*0.5} 68, ${50 - spread} 55, ${50 - spread} ${tipY} C ${50 - spread*0.4} ${tipY+12}, 47 70, 50 76" fill="${mColor}" opacity="0.95" filter="url(#glow-soft)"/>`;
    petals += `<path d="M50 76 C ${50 + spread*0.5} 68, ${50 + spread} 55, ${50 + spread} ${tipY} C ${50 + spread*0.4} ${tipY+12}, 53 70, 50 76" fill="${mColor}" opacity="0.95" filter="url(#glow-soft)"/>`;
  }

  petals += `<path d="M50 77 C 43 60, 44 42, 50 28 C 56 42, 57 60, 50 77" fill="${cColor}" filter="url(#glow-gold)"/>`;
  
  const core = `
    <circle cx="50" cy="70" r="${3 + nLevel}" fill="#ffffff" filter="url(#glow-strong)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>`;

  const lotusContent = `
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,2; 0,-1.5; 0,2" dur="4s" repeatCount="indefinite"/>
      ${petals}
      ${core}
    </g>`;

  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
    ${sharedDefs}
    ${voidBg}
    ${bgContent}
    ${lotusContent}
  </svg>`;
}
// ============================================================================

// 示範矩陣資料：從初信位到十地位，以及累積至 1 億聲佛號的組合
const displayMatrix = [
    { rankName: "初信位", rankType: "信", count: 0, countDesc: "0 聲" },
    { rankName: "十信位", rankType: "信", count: 10000, countDesc: "1 萬聲" },
    { rankName: "初住位", rankType: "住", count: 100000, countDesc: "10 萬聲" },
    { rankName: "十行位", rankType: "行", count: 1000000, countDesc: "100 萬聲" },
    { rankName: "十迴向位", rankType: "迴", count: 10000000, countDesc: "1,000 萬聲" },
    { rankName: "初地位", rankType: "地", count: 50000000, countDesc: "5,000 萬聲" },
    { rankName: "十地位", rankType: "地", count: 100000000, countDesc: "1 億聲 (大日紫金光)" }
];

const grid = document.getElementById('preview-grid');

displayMatrix.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    
    // 生成精確的 SVG
    const svgCode = getLotusSVG(item.rankType, item.count);
    
    card.innerHTML = `
        <div class="svg-container">
            ${svgCode}
        </div>
        <div class="rank-title">${item.rankName}</div>
        <div class="nian-count">${item.countDesc}</div>
    `;
    grid.appendChild(card);
});
</script>

</body>
</html>
