<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彌陀淨土 ‧ 淨瓶功德陣</title>
    <style>
        :root {
            --bg-deep: #010203; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* 頂部：題目與【琉璃淨瓶容器】 */
        #header { padding: 10px 15px; z-index: 10; position: relative; background: linear-gradient(180deg, rgba(1,2,3,0.95) 0%, rgba(1,2,3,0) 100%); display: flex; align-items: flex-end; justify-content: space-between; }
        
        .header-left { display: flex; flex-direction: column; gap: 2px; }
        .lv-tag { letter-spacing: 4px; color: var(--gold); font-size: 0.95rem; font-weight: bold; }
        
        /* 題目顯示區塊 (右移配合瓶子) */
        .question-box { background: rgba(20,25,30,0.85); border: 1px solid rgba(212,175,55,0.4); border-radius: 25px; padding: 6px 15px; font-size: 1rem; color: #fff; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.8); backdrop-filter: blur(5px); margin-left: 10px;}
        .q-icon { width: 40px; height: 40px; filter: drop-shadow(0 0 3px rgba(255,255,255,0.4)); }
        .q-text { font-weight: bold; color: var(--gold); }

        /* ✨ 琉璃淨瓶功德容器 (從舊版搬移事件並提昇視覺) ✨ */
        #vessel-area { width: 100px; height: 120px; position: relative; display: flex; justify-content: center; align-items: center; filter: drop-shadow(0 0 10px var(--cyan)); }
        #vessel-pure { position: absolute; width: 100%; height: 100%; z-index: 2; }
        /* 瓶內功德甘露 (金色水位) */
        #nectar-water { 
            position: absolute; bottom: 15px; left: 30%; width: 40%; height: 0%; 
            background: linear-gradient(0deg, #fbc02d 0%, #fff 100%); 
            border-radius: 5px; opacity: 0.8; 
            transition: height 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); 
            z-index: 1; box-shadow: 0 0 15px #ffd700;
        }

        /* 核心觀相區 (大圖、透明、紛呈) */
        #board { flex: 1; position: relative; width: 100%; overflow: hidden; z-index: 5; }
        
        /* 超大顆、透明且繽紛的 SVG (尺寸放大至 110px+) */
        .item { 
            position: absolute; 
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.2s, filter 0.2s;
            /* 保持透明與琉璃懸浮感 */
            filter: drop-shadow(5px 15px 15px rgba(0,0,0,0.8)) drop-shadow(0 0 2px rgba(255,255,255,0.2));
            /* 呼吸動態，增加辨識干擾 */
            animation: breathe 8s infinite ease-in-out alternate;
        }
        .item svg { width: 100%; height: 100%; pointer-events: none; }

        @keyframes breathe { 0% { transform: scale(1) translateY(0); } 100% { transform: scale(1.04) translateY(-5px); } }

        /*✨ 答對時的「淨瓶進水」飛行動畫與流光 ✨ */
        .item.highlight {
            filter: drop-shadow(0 0 25px var(--solid-gold)) drop-shadow(0 0 40px rgba(255,255,255,0.8)) brightness(1.5) !important;
            animation: none;
            transition: all 0.7s cubic-bezier(0.7, 0, 0.3, 1) !important;
            z-index: 2000 !important;
        }

        /* 底部：三選一按鈕 */
        #footer { padding: 25px 15px; width: 100%; background: linear-gradient(0deg, rgba(1,2,3,1) 0%, rgba(1,2,3,0.7) 70%, transparent 100%); z-index: 20; position: relative; display: flex; justify-content: center; align-items: center; gap: 15px; backdrop-filter: blur(1px);}
        
        .ans-btn { flex: 1; height: 80px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.5); background: linear-gradient(135deg, rgba(30,35,45,0.95) 0%, rgba(10,15,20,0.95) 100%); color: var(--gold); font-size: 2rem; font-weight: bold; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; line-height: 1.1; backdrop-filter: blur(10px);}
        .ans-btn span { font-size: 0.8rem; color: var(--cyan); font-weight: normal; letter-spacing: 4px; margin-top: 4px;}
        .ans-btn:active { transform: scale(0.92); background: rgba(212,175,55,0.2); box-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        
        /* 模態框回饋 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 3000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s; }
        .modal.show { display: flex; opacity: 1; }
        .m-box { width: 85%; max-width: 340px; background: linear-gradient(135deg, #151515, #050505); border: 1px solid var(--solid-gold); border-radius: 24px; padding: 40px 25px; text-align: center; box-shadow: 0 0 50px rgba(212,175,55,0.2); transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .modal.show .m-box { transform: scale(1); }
        .ctrl-btn { padding: 14px 20px; border-radius: 25px; border: 1px solid var(--solid-gold); background: rgba(212,175,55,0.15); color: var(--gold); font-size: 1rem; letter-spacing: 4px; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 25px;}
        .ctrl-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<svg style="width:0; height:0; position:absolute;">
    <defs id="svg-defs">
        <g id="pure-vessel-g" transform="scale(1.1) translate(0, 0)">
            <polygon points="45,20 55,20 60,40 40,40" fill="rgba(255,255,255,0.1)" stroke="url(#facet-light)" stroke-width="0.8"/>
            <path d="M40,40 L60,40 Q75,65, 75,90 Q75,120, 60,120 L40,120 Q25,120, 25,90 Q25,65, 40,40 Z" fill="rgba(255,255,255,0.05)" stroke="url(#facet-light)" stroke-width="1"/>
            <path d="M42,42 Q58,42, 58,42 Q72,66, 72,90 Q72,118, 58,118 L42,118 Q28,118, 28,90 Q28,66, 42,42 Z" fill="rgba(139, 168, 156, 0.15)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
            <ellipse cx="40" cy="70" rx="3" ry="15" fill="#fff" opacity="0.3" transform="rotate(-15 40 70)"/>
        </g>

        <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
        <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.8"/></linearGradient>
        <linearGradient id="l-white" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(255,255,255,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.1)"/></linearGradient>
        <linearGradient id="l-red" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ff9a9e" stop-opacity=".9"/><stop offset="50%" stop-color="#fad0c4" stop-opacity=".8"/><stop offset="100%" stop-color="#a1c4fd" stop-opacity=".7"/></linearGradient>
        <linearGradient id="l-gold" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#D4AF37" stop-opacity="1"/><stop offset="50%" stop-color="#FFD700" stop-opacity=".9"/><stop offset="100%" stop-color="#fff" stop-opacity="1"/></linearGradient>
        <linearGradient id="l-cyan" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#84fab0" stop-opacity=".8"/><stop offset="100%" stop-color="#8fd3f4" stop-opacity=".6"/></linearGradient>
        <linearGradient id="l-purple" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ce93d8" stop-opacity=".9"/><stop offset="100%" stop-color="#f3e5f5" stop-opacity=".4"/></linearGradient>
        
        <linearGradient id="g-red" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ff4d4d" stop-opacity="0.8"/><stop offset="100%" stop-color="#800000" stop-opacity="0.9"/></linearGradient>
        <linearGradient id="g-blue" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#4da6ff" stop-opacity="0.8"/><stop offset="100%" stop-color="#000080" stop-opacity="0.9"/></linearGradient>
        <linearGradient id="g-gold" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffd700" stop-opacity="0.9"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.9"/></linearGradient>
        <linearGradient id="g-purple" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ea80fc" stop-opacity="0.8"/><stop offset="100%" stop-color="#4a148c" stop-opacity="0.9"/></linearGradient>
        <linearGradient id="g-cyan" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#00e5ff" stop-opacity="0.8"/><stop offset="100%" stop-color="#006064" stop-opacity="0.9"/></linearGradient>
    </defs>
</svg>

<canvas id="bgCanvas"></canvas>

<div id="header">
    <div class="header-left">
        <div class="lv-tag" id="lv-display">第一階</div>
        <div class="question-box">
            <span>數出</span>
            <div class="q-icon" id="q-icon-display"></div>
            <span class="q-text" id="q-name-display">法相</span>
        </div>
    </div>
    <div id="vessel-area">
        <svg viewBox="0 0 100 130" id="vessel-pure">
            <use href="#pure-vessel-g" />
        </svg>
        <div id="nectar-water"></div>
    </div>
</div>

<div id="board"></div>

<div id="footer">
    <button class="ans-btn" id="btn-0" onclick="submitAnswer(0)"></button>
    <button class="ans-btn" id="btn-1" onclick="submitAnswer(1)"></button>
    <button class="ans-btn" id="btn-2" onclick="submitAnswer(2)"></button>
</div>

<div class="modal" id="modal">
    <div class="m-box">
        <div style="color:var(--gold); font-size:1.3rem; letter-spacing:4px; margin-bottom:15px; font-weight:bold;" id="m-title"></div>
        <div style="color:#aaa; font-size:0.95rem; letter-spacing:2px; line-height:1.6;" id="m-desc"></div>
        <button class="ctrl-btn" id="m-btn-action" onclick="closeModal()">繼續精進</button>
    </div>
</div>

<script>
    // --------------------------------------------------
    // 1. 純淨透明 SVG 圖庫 (已移除白玉蓮花題目，加入繽紛多色)
    // --------------------------------------------------
    const LIBRARY = {
        // ✨ 多多樣化的繽紛題目與干擾物 ✨
        lotus_gold: { name: "大日純金", svg: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.2)"><g transform="rotate(20)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-gold)" stroke="#fff" stroke-width="1.5" opacity="0.95"/></g><g transform="rotate(80)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-gold)" stroke="#fff" stroke-width="1.5" opacity="0.95"/></g><g transform="rotate(140)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-gold)" stroke="#fff" stroke-width="1.5" opacity="0.95"/></g><circle cx="0" cy="0" r="25" fill="url(#l-gold)"/></g></svg>` },

        lotus_red: { name: "法悅粉櫻", svg: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.2)"><g transform="rotate(40)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-red)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/></g><g transform="rotate(100)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-red)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/></g><g transform="rotate(160)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-red)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/></g><circle cx="0" cy="0" r="18" fill="url(#l-red)"/></g></svg>` },

        lotus_cyan: { name: "琉璃水玉", svg: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.2)"><g transform="rotate(10)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-cyan)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/></g><g transform="rotate(70)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-cyan)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/></g><g transform="rotate(130)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-cyan)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/></g><circle cx="0" cy="0" r="18" fill="url(#l-cyan)"/></g></svg>` },
        
        lotus_purple: { name: "紫霞仙光", svg: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.2)"><g transform="rotate(15)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-purple)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/></g><g transform="rotate(75)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-purple)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/></g><g transform="rotate(135)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-purple)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/></g><circle cx="0" cy="0" r="16" fill="url(#l-purple)"/></g></svg>` },

        sword_red: { name: "赤焰慧劍", svg: `<svg viewBox="0 0 100 150"><g transform="scale(1.1) translate(-5, -15)"><polygon points="50,10 56,40 50,105 44,40" fill="url(#facet-light)" stroke="#fff" stroke-width="1"/><polygon points="50,10 56,40 50,105" fill="url(#g-red)" opacity="0.85"/><polygon points="35,100 65,100 55,110 45,110" fill="url(#facet-dark)" stroke="#d4af37" stroke-width="2"/><polygon points="46,110 54,110 52,135 48,135" fill="url(#facet-dark)"/></g></svg>` },

        sword_gold: { name: "大日慧劍", svg: `<svg viewBox="0 0 100 150"><g transform="scale(1.1) translate(-5, -15)"><polygon points="50,10 56,40 50,105 44,40" fill="url(#facet-light)" stroke="#fff" stroke-width="1"/><polygon points="50,10 56,40 50,105" fill="url(#g-gold)" opacity="0.9"/><polygon points="35,100 65,100 55,110 45,110" fill="url(#facet-dark)" stroke="#f3e5ab" stroke-width="2"/><polygon points="46,110 54,110 52,135 48,135" fill="url(#facet-dark)"/></g></svg>` },
        
        vase_blue: { name: "琉璃淨瓶", svg: `<svg viewBox="0 0 100 150"><g transform="scale(1.1) translate(-5, -15)"><polygon points="45,20 55,20 60,40 40,40" fill="url(#facet-light)" stroke="#fff" stroke-width="1"/><polygon points="40,40 60,40 75,90 25,90" fill="url(#g-blue)" opacity="0.85" stroke="#fff" stroke-width="1"/><polygon points="25,90 75,90 60,120 40,120" fill="url(#facet-light)" stroke="#f3e5ab" stroke-width="1"/><polygon points="50,90 75,90 60,120 50,120" fill="url(#facet-dark)" opacity="0.8"/></g></svg>` },

        vase_purple: { name: "紫霞淨瓶", svg: `<svg viewBox="0 0 100 150"><g transform="scale(1.1) translate(-5, -15)"><polygon points="45,20 55,20 60,40 40,40" fill="url(#facet-light)" stroke="#fff" stroke-width="1"/><polygon points="40,40 60,40 75,90 25,90" fill="url(#g-purple)" opacity="0.85" stroke="#fff" stroke-width="1"/><polygon points="25,90 75,90 60,120 40,120" fill="url(#facet-light)" stroke="#ce93d8" stroke-width="1"/><polygon points="50,90 75,90 60,120 50,120" fill="url(#facet-dark)" opacity="0.8"/></g></svg>` }
    };

    const TYPES = Object.keys(LIBRARY);

    // --------------------------------------------------
    // 2. 關卡生成與「核心防疊死演算法」 (確保顏色核心不被完全壓死)
    // --------------------------------------------------
    let currentLevel = 1;
    let targetType = '';
    let correctCount = 0;
    let options = [];
    let isProcessing = false;

    function initLevel(lvl) {
        isProcessing = false;
        const board = document.getElementById('board');
        board.innerHTML = '';
        
        // ✨ 大大提昇星空神秘感 (背景星星翻倍，加入閃爍)
        drawStars(180);

        // 重設淨瓶水位 (舊版遷移事件之視覺地基)
        updateWaterLevel(0);

        // 難度曲線 (海量、繽紛、錯落)
        let totalItems = Math.min(75, 20 + Math.floor(lvl * 3)); 
        correctCount = Math.min(18, 5 + Math.floor(Math.random() * 4) + Math.floor(lvl / 4)); 
        
        let poolTypes = [...TYPES];
        // ✨ 移除白玉蓮花作為題目，避免辨識難度過高 (它依然可作為干擾物)
        poolTypes = poolTypes.filter(t => t !== 'lotus_white');
        poolTypes.sort(() => Math.random() - 0.5);
        targetType = poolTypes[0];

        let itemPool = [];
        for(let i=0; i<correctCount; i++) itemPool.push(targetType);
        
        // 填充繽紛的干擾物 (選用其他多樣種類)
        while(itemPool.length < totalItems) {
            itemPool.push(TYPES[Math.floor(Math.random() * TYPES.length)]);
        }
        itemPool.sort(() => Math.random() - 0.5);

        // 更新 UI
        document.getElementById('lv-display').innerText = `第 ${lvl} 階 ‧ 靜心觀相`;
        document.getElementById('q-icon-display').innerHTML = LIBRARY[targetType].svg;
        document.getElementById('q-name-display').innerText = LIBRARY[targetType].name;

        // 生成選項
        options = [correctCount, correctCount + (Math.random()>0.5?1:-1), correctCount + (Math.random()>0.5?2:-2)];
        while(new Set(options).size !== 3 || Math.min(...options) <= 0) {
            options = [correctCount, correctCount + Math.floor(Math.random()*2)+1, correctCount - Math.floor(Math.random()*2)-1];
            if(Math.min(...options) <= 0) options = [correctCount, correctCount+1, correctCount+2];
        }
        options.sort(() => Math.random() - 0.5);

        for(let i=0; i<3; i++) {
            document.getElementById(`btn-${i}`).innerHTML = `${options[i]}<br><span>數量</span>`;
        }

        // ✨ 渲染大陣 (防 100% 核心疊死演算法) ✨
        const boardRect = board.getBoundingClientRect();
        let placedPositions = []; 
        const MIN_CORE_DISTANCE = 45; // 確保核心能見度的最小安全半徑

        itemPool.forEach((type, idx) => {
            let el = document.createElement('div');
            el.className = `item ${type === targetType ? 'target-item' : ''}`;
            el.innerHTML = LIBRARY[type].svg;
            
            // ✨ 尺寸可大可小 (極致錯落 80px ~ 150px) ✨
            let baseSize = 80 + Math.random() * 70; 
            el.style.width = `${baseSize}px`;
            el.style.height = `${baseSize}px`;
            
            let maxLeft = boardRect.width - baseSize + 20;
            let maxTop = boardRect.height - baseSize + 20;
            
            let finalX, finalY;
            let attempts = 0;
            let isValid = false;

            // ✨ 物理防疊死偵測 ✨
            // 雖然可以大幅重疊，但中心核心必須保持一定距離，確保「顏色的部分看得到才能算數」
            while(!isValid && attempts < 80) {
                finalX = Math.random() * maxLeft - 10;
                finalY = Math.random() * maxTop - 10;
                isValid = true;
                
                // 檢查是否與現有圖騰的中心點太近 ( Poisson Disc概念 )
                for(let pos of placedPositions) {
                    let dx = finalX - pos.x;
                    let dy = finalY - pos.y;
                    // 兩者中心點距離必須大於安全距離
                    if(Math.sqrt(dx*dx + dy*dy) < MIN_CORE_DISTANCE) {
                        isValid = false; break;
                    }
                }
                attempts++;
            }
            
            placedPositions.push({x: finalX, y: finalY});

            el.style.left = `${finalX}px`;
            el.style.top = `${finalY}px`;
            
            // ✨ 隨機左右翻轉、角度與透明度變化，越繽紛越美 ✨
            let flip = Math.random() > 0.5 ? 'scaleX(-1)' : 'scaleX(1)';
            let rot = `rotate(${(Math.random() - 0.5) * 360}deg)`;
            el.style.transform = `${flip} ${rot}`;
            
            // 加入緩慢旋轉放大呼吸動態，增加辨識難度
            el.style.animationDelay = `-${Math.random() * 8}s`;
            // Z-Index 自動產生上下不規則遮擋
            el.style.zIndex = idx; 
            
            board.appendChild(el);
        });
    }

    // --------------------------------------------------
    // 3. ✨ 舊版琉璃淨水事件遷移 & 答題邏輯 ✨
    // --------------------------------------------------
    function updateWaterLevel(percent) {
        const water = document.getElementById('nectar-water');
        // 水位高度限制 (例如只填滿瓶身的 0% ~ 75%)
        let height = percent * 0.75;
        water.style.height = `${height}%`;
    }

    async function submitAnswer(btnIdx) {
        if(isProcessing) return;
        isProcessing = true;
        
        let guess = options[btnIdx];
        
        if (guess === correctCount) {
            // ✨✨ ✨ 答對了！觸發「琉璃淨水功德事件」 ✨✨ ✨
            
            // 1. 中央目標圖騰化作流光飛向淨瓶
            let targets = document.querySelectorAll('.target-item');
            const vesselArea = document.getElementById('vessel-area').getBoundingClientRect();
            const vesselCenterX = vesselArea.left + vesselArea.width/2;
            const vesselCenterY = vesselArea.top + vesselArea.height/2;

            targets.forEach(t => {
                const rect = t.getBoundingClientRect();
                createDustParticles(t, getParticleColor(targetType)); // 產生消散粉塵
                
                t.classList.add('highlight'); // 發光
                
                // 計算飛飛行目標 (Fixed坐標系)
                t.style.position = 'fixed';
                t.style.left = `${rect.left}px`;
                t.style.top = `${rect.top}px`;
                t.style.animation = 'none'; // 停止呼吸
                t.style.transform = `scale(1) rotate(0deg)`; // 飛出去前擺正

                // 強制渲染後飛飛行
                requestAnimationFrame(() => {
                    t.style.left = `${vesselCenterX - 25}px`; // 瓶子中心點，扣掉圖體一半
                    t.style.top = `${vesselCenterY - 25}px`;
                    t.style.transform = `scale(0.1) rotate(360deg)`; // 縮小並旋轉飛入
                    t.style.opacity = '0.3';
                });
            });

            // 2. 淨瓶進水視覺回饋 (遷移自舊版琉璃水)
            setTimeout(() => {
                // 水位上升至 100% 代表本關功德圓滿
                updateWaterLevel(100); 
                // 瓶身發光
                document.getElementById('vessel-area').style.filter = `drop-shadow(0 0 25px gold)`;
            }, 700);

            // 3. 跳出成功視窗
            setTimeout(() => {
                showModal("清明照見 ‧ 功德增上", `準確尋得 ${correctCount} 尊【${LIBRARY[targetType].name}】。<br>法相流光已匯入琉璃淨瓶。`, "前往下一重", () => {
                    currentLevel++;
                    initLevel(currentLevel);
                });
                // 復原瓶身發光
                document.getElementById('vessel-area').style.filter = `drop-shadow(0 0 10px var(--cyan))`;
            }, 1600); 

        } else {
            // 答錯了！給予溫柔的提示
            showModal("心念散亂 ‧ 幻象叢生", `所見為虛妄，數目有異。<br>請安住呼吸，重新細觀畫布。`, "再次觀相", () => {
                isProcessing = false;
                // 不換題目，只關閉視窗讓長輩重數
            });
        }
    }

    function getParticleColor(type) {
        if(type.includes('gold')) return '#d4af37';
        if(type.includes('red')) return '#ff4d4d';
        if(type.includes('cyan') || type.includes('blue')) return '#00e5ff';
        return '#ffffff';
    }

    function showModal(title, desc, btnText, callback) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-desc').innerHTML = desc;
        document.getElementById('m-btn-action').innerText = btnText;
        document.getElementById('m-btn-action').onclick = () => {
            document.getElementById('modal').classList.remove('remove');
            document.getElementById('modal').classList.remove('show');
            if(callback) callback();
        };
        document.getElementById('modal').classList.add('show');
    }
    
    function closeModal() { document.getElementById('modal').classList.remove('show'); isProcessing = false; }

    // --------------------------------------------------
    // 4. ✨ 升級版星空：大小錯落干擾，增加神祕感 ✨
    // --------------------------------------------------
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let cw, ch, stars = [];
    function res() { cw=canvas.width=window.innerWidth; ch=canvas.height=window.innerHeight; }
    window.addEventListener('resize', res); res();
    
    function drawStars(count) {
        stars = [];
        const starColors = ['#ffffff', '#f3e5ab', '#00e5ff', '#ffb7c5', '#ce93d8'];
        for(let i=0; i<count; i++) {
            stars.push({
                x: Math.random() * 2000 - 1000, 
                y: Math.random() * 2000 - 1000, 
                z: Math.random() * 2000, 
                // 星星尺寸大幅變化 0.5px ~ 4px
                s: Math.random() * 3.5 + 0.5, 
                c: starColors[Math.floor(Math.random() * starColors.length)],
                alphaOffset: Math.random() * Math.PI * 2,
                twinkleSpeed: 0.02 + Math.random() * 0.04
            });
        }
    }

    let time = 0;
    function animateBg() {
        time += 0.05;
        ctx.fillStyle = '#010203'; ctx.fillRect(0,0,cw,ch); 
        ctx.globalCompositeOperation = 'screen';
        
        stars.forEach(s => {
            s.z -= 1.0; 
            if(s.z<=0){ s.z=2000; s.x=(Math.random()-0.5)*2000; s.y=(Math.random()-0.5)*2000; }
            
            let sc = 800 / (800 + s.z);
            let px = cw / 2 + s.x * sc;
            let py = ch / 2 + s.y * sc;
            
            if(px > 0 && px < cw && py > 0 && py < ch) { 
                // 星星閃爍與透明度變化
                let alpha = (Math.sin(time * s.twinkleSpeed * 10 + s.alphaOffset) * 0.5 + 0.5) * sc;
                ctx.fillStyle = s.c; 
                ctx.globalAlpha = alpha;
                ctx.beginPath(); 
                ctx.arc(px, py, s.s * sc, 0, Math.PI*2); 
                ctx.fill(); 
                
                // 大星星帶有琉璃色光暈
                if(s.s > 2.5) {
                    let g = ctx.createRadialGradient(px, py, 0, px, py, s.s * sc * 4);
                    g.addColorStop(0, s.c);
                    g.addColorStop(1, 'transparent');
                    ctx.fillStyle = g;
                    ctx.fill();
                }
            }
        });
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over'; 
        requestAnimationFrame(animateBg);
    }
    animateBg();

    // 啟動
    initLevel(currentLevel);
</script>
</body>
</html>
