<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彌陀淨土 ‧ 法相妙觀陣</title>
    <style>
        :root {
            --bg-deep: #010204; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg-deep); color: #d0d0d0; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* 頂部：題目顯示區 */
        #header { padding: 15px 20px; z-index: 10; position: relative; background: linear-gradient(180deg, rgba(1,2,4,0.9) 0%, rgba(1,2,4,0) 100%); display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .lv-tag { letter-spacing: 4px; color: var(--gold); font-size: 1.1rem; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.4); width: 100%; text-align: left; }
        
        .question-box { background: rgba(20,25,30,0.85); border: 1px solid var(--solid-gold); border-radius: 30px; padding: 8px 25px; font-size: 1.1rem; color: #fff; letter-spacing: 2px; display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.8), inset 0 0 15px rgba(212,175,55,0.2); backdrop-filter: blur(10px); }
        .q-icon { width: 45px; height: 45px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.4)); }
        .q-text { font-weight: bold; color: var(--gold); }

        /* 核心觀相區 (不再限制點擊，純展示) */
        #board { flex: 1; position: relative; width: 100%; overflow: hidden; z-index: 5; }
        
        /* 超大法相 SVG */
        .item { 
            position: absolute; 
            display: flex; justify-content: center; align-items: center;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            /* 2.5D 極致懸浮陰影 */
            filter: drop-shadow(5px 15px 15px rgba(0,0,0,0.9)) drop-shadow(0 0 2px rgba(212,175,55,0.3));
        }
        .item svg { width: 100%; height: 100%; pointer-events: none; }

        /* 答對時的發光特效 */
        .item.highlight {
            filter: drop-shadow(0 0 25px var(--solid-gold)) drop-shadow(0 0 40px rgba(255,255,255,0.8)) brightness(1.3) !important;
            transform: scale(1.15) !important;
            z-index: 2000 !important;
        }

        /* 底部：三選一超大按鈕區 */
        #footer { padding: 25px 15px; width: 100%; background: linear-gradient(0deg, rgba(1,2,4,1) 0%, rgba(1,2,4,0.6) 70%, transparent 100%); z-index: 20; position: relative; display: flex; justify-content: center; align-items: center; gap: 15px;}
        
        .ans-btn { flex: 1; height: 75px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.5); background: linear-gradient(135deg, rgba(30,35,45,0.9) 0%, rgba(10,15,20,0.9) 100%); color: var(--gold); font-size: 1.8rem; font-weight: bold; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; line-height: 1.2;}
        .ans-btn span { font-size: 0.8rem; color: var(--cyan); font-weight: normal; letter-spacing: 4px; }
        .ans-btn:active { transform: scale(0.92); background: rgba(212,175,55,0.2); box-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        
        /* 模態框回饋 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 3000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s; }
        .modal.show { display: flex; opacity: 1; }
        .m-box { width: 85%; max-width: 340px; background: linear-gradient(135deg, #151515, #050505); border: 1px solid var(--solid-gold); border-radius: 24px; padding: 40px 25px; text-align: center; box-shadow: 0 0 50px rgba(212,175,55,0.2); transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .modal.show .m-box { transform: scale(1); }
        .ctrl-btn { padding: 14px 20px; border-radius: 25px; border: 1px solid var(--solid-gold); background: rgba(212,175,55,0.15); color: var(--gold); font-size: 1rem; letter-spacing: 4px; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 25px;}
        .ctrl-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<svg style="width:0; height:0; position:absolute;">
    <defs id="svg-defs">
        <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
        <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.8"/></linearGradient>
        <linearGradient id="l-white" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(255,255,255,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.1)"/></linearGradient>
        <linearGradient id="l-red" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ff9a9e" stop-opacity=".9"/><stop offset="50%" stop-color="#fad0c4" stop-opacity=".8"/><stop offset="100%" stop-color="#a1c4fd" stop-opacity=".7"/></linearGradient>
        <linearGradient id="l-gold" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#D4AF37" stop-opacity="1"/><stop offset="50%" stop-color="#FFD700" stop-opacity=".9"/><stop offset="100%" stop-color="#fff" stop-opacity="1"/></linearGradient>
        <linearGradient id="l-cyan" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#84fab0" stop-opacity=".8"/><stop offset="100%" stop-color="#8fd3f4" stop-opacity=".6"/></linearGradient>
        <linearGradient id="l-purple" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ce93d8"/><stop offset="100%" stop-color="#f3e5f5" stop-opacity=".3"/></linearGradient>
        <linearGradient id="g-red" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ff4d4d"/><stop offset="100%" stop-color="#800000"/></linearGradient>
        <linearGradient id="g-blue" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#4da6ff"/><stop offset="100%" stop-color="#000080"/></linearGradient>
    </defs>
</svg>

<canvas id="bgCanvas"></canvas>

<div id="header">
    <div class="lv-tag" id="lv-display">第一階 ‧ 靜心觀相</div>
    <div class="question-box">
        <span style="font-size: 0.9rem;">尋出</span>
        <div class="q-icon" id="q-icon-display"></div>
        <span class="q-text" id="q-name-display">法相</span>
    </div>
</div>

<div id="board"></div>

<div id="footer">
    <button class="ans-btn" id="btn-0" onclick="submitAnswer(0)"></button>
    <button class="ans-btn" id="btn-1" onclick="submitAnswer(1)"></button>
    <button class="ans-btn" id="btn-2" onclick="submitAnswer(2)"></button>
</div>

<div class="modal" id="modal">
    <div class="m-box">
        <div style="color:var(--gold); font-size:1.3rem; letter-spacing:4px; margin-bottom:15px; font-weight:bold;" id="m-title"></div>
        <div style="color:#aaa; font-size:0.95rem; letter-spacing:2px; line-height:1.6;" id="m-desc"></div>
        <button class="ctrl-btn" id="m-btn-action" onclick="closeModal()">繼續精進</button>
    </div>
</div>

<script>
    // --------------------------------------------------
    // 1. 純淨 SVG 圖庫與命名 (大幅優化細節)
    // --------------------------------------------------
    const LIBRARY = {
        lotus_white: { name: "白玉淨蓮", svg: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.2)"><g transform="rotate(0)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-white)" stroke="rgba(255,255,255,0.8)" stroke-width="2"/></g><g transform="rotate(60)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-white)" stroke="rgba(255,255,255,0.8)" stroke-width="2"/></g><g transform="rotate(120)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-white)" stroke="rgba(255,255,255,0.8)" stroke-width="2"/></g><circle cx="0" cy="0" r="20" fill="url(#l-white)"/></g></svg>` },
        
        lotus_gold: { name: "大日純金", svg: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.2)"><g transform="rotate(20)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-gold)" stroke="#fff" stroke-width="2"/></g><g transform="rotate(80)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-gold)" stroke="#fff" stroke-width="2"/></g><g transform="rotate(140)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-gold)" stroke="#fff" stroke-width="2"/></g><circle cx="0" cy="0" r="25" fill="url(#l-gold)"/></g></svg>` },

        lotus_red: { name: "法悅粉櫻", svg: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.2)"><g transform="rotate(40)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-red)" stroke="rgba(255,255,255,0.9)" stroke-width="2"/></g><g transform="rotate(100)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-red)" stroke="rgba(255,255,255,0.9)" stroke-width="2"/></g><g transform="rotate(160)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-red)" stroke="rgba(255,255,255,0.9)" stroke-width="2"/></g><circle cx="0" cy="0" r="18" fill="url(#l-red)"/></g></svg>` },
        
        lotus_purple: { name: "紫檀雲靄", svg: `<svg viewBox="-150 -150 300 300"><g transform="scale(1.2)"><g transform="rotate(15)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-purple)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/></g><g transform="rotate(75)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-purple)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/></g><g transform="rotate(135)"><path d="M 0 0 C 49 -7 60 -69 0 -112 C -60 -69 -49 -7 0 0" fill="url(#l-purple)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/></g><circle cx="0" cy="0" r="16" fill="url(#l-purple)"/></g></svg>` },

        sword_red: { name: "赤焰慧劍", svg: `<svg viewBox="0 0 100 150"><g transform="scale(1.1) translate(-5, -15)"><polygon points="50,10 56,40 50,105 44,40" fill="url(#facet-light)" stroke="#fff" stroke-width="1"/><polygon points="50,10 56,40 50,105" fill="url(#g-red)" opacity="0.9"/><polygon points="35,100 65,100 55,110 45,110" fill="url(#facet-dark)" stroke="#d4af37" stroke-width="2"/><polygon points="46,110 54,110 52,135 48,135" fill="url(#facet-dark)"/></g></svg>` },
        
        vase_blue: { name: "琉璃淨瓶", svg: `<svg viewBox="0 0 100 150"><g transform="scale(1.1) translate(-5, -15)"><polygon points="45,20 55,20 60,40 40,40" fill="url(#facet-light)" stroke="#fff" stroke-width="1"/><polygon points="40,40 60,40 75,90 25,90" fill="url(#g-blue)" opacity="0.9" stroke="#fff" stroke-width="1"/><polygon points="25,90 75,90 60,120 40,120" fill="url(#facet-light)" stroke="#f3e5ab" stroke-width="1"/><polygon points="50,90 75,90 60,120 50,120" fill="url(#facet-dark)" opacity="0.8"/></g></svg>` }
    };

    const TYPES = Object.keys(LIBRARY);

    // --------------------------------------------------
    // 2. 關卡生成與難度控制
    // --------------------------------------------------
    let currentLevel = 1;
    let targetType = '';
    let correctCount = 0;
    let options = [];

    function initLevel(lvl) {
        const board = document.getElementById('board');
        board.innerHTML = '';
        
        // 難度曲線設定 (Entropy)
        let totalItems = Math.min(60, 15 + Math.floor(lvl * 2.5)); // 總數量越來越多
        correctCount = Math.min(12, 4 + Math.floor(Math.random() * 4) + Math.floor(lvl / 5)); // 答案分佈
        
        let poolTypes = [...TYPES];
        poolTypes.sort(() => Math.random() - 0.5);
        targetType = poolTypes[0]; // 抽一題

        // 準備法寶池
        let itemPool = [];
        for(let i=0; i<correctCount; i++) itemPool.push(targetType);
        
        // 填充干擾物 (選用其他 2~4 種圖案來混淆)
        let distractorVariety = Math.min(poolTypes.length - 1, 2 + Math.floor(lvl / 10));
        let distractors = poolTypes.slice(1, 1 + distractorVariety);
        
        while(itemPool.length < totalItems) {
            let distractor = distractors[Math.floor(Math.random() * distractors.length)];
            itemPool.push(distractor);
        }
        itemPool.sort(() => Math.random() - 0.5); // 徹底洗牌

        // 更新 UI
        document.getElementById('lv-display').innerText = `第 ${lvl} 階 ‧ 靜心觀相`;
        document.getElementById('q-icon-display').innerHTML = LIBRARY[targetType].svg;
        document.getElementById('q-name-display').innerText = LIBRARY[targetType].name;

        // 生成選項按鈕 (保證包含正確答案，且順序隨機，數字合理不為負)
        options = [correctCount, correctCount + (Math.random()>0.5?1:-1), correctCount + (Math.random()>0.5?2:-2)];
        // 確保選項不重複且 > 0
        while(new Set(options).size !== 3 || Math.min(...options) <= 0) {
            options = [correctCount, correctCount + Math.floor(Math.random()*3)+1, correctCount - Math.floor(Math.random()*3)-1];
            if(Math.min(...options) <= 0) options = [correctCount, correctCount+1, correctCount+2];
        }
        options.sort(() => Math.random() - 0.5);

        for(let i=0; i<3; i++) {
            document.getElementById(`btn-${i}`).innerHTML = `${options[i]}<br><span>數量</span>`;
        }

        // 渲染散落寶山 (極致放大與錯位疊加)
        const boardRect = board.getBoundingClientRect();
        
        itemPool.forEach((type, idx) => {
            let el = document.createElement('div');
            el.className = `item ${type === targetType ? 'target-item' : ''}`;
            el.innerHTML = LIBRARY[type].svg;
            
            // 尺寸大大小小，增添曼陀羅的錯落美感 (尺寸介於 80px ~ 130px)
            let baseSize = 80 + Math.random() * 50; 
            el.style.width = `${baseSize}px`;
            el.style.height = `${baseSize}px`;
            
            // 隨機分佈 (確保不出界太多)
            let maxLeft = boardRect.width - baseSize + 20;
            let maxTop = boardRect.height - baseSize + 20;
            
            el.style.left = `${Math.random() * maxLeft - 10}px`;
            el.style.top = `${Math.random() * maxTop - 10}px`;
            
            // 隨機旋轉
            el.style.transform = `rotate(${(Math.random() - 0.5) * 360}deg)`;
            el.style.zIndex = idx; // 自動產生上下遮擋
            
            board.appendChild(el);
        });
    }

    // --------------------------------------------------
    // 3. 答題驗證與回饋
    // --------------------------------------------------
    function submitAnswer(btnIdx) {
        let guess = options[btnIdx];
        
        if (guess === correctCount) {
            // 答對了！將所有目標圖騰高光浮起
            let targets = document.querySelectorAll('.target-item');
            targets.forEach(t => t.classList.add('highlight'));
            
            setTimeout(() => {
                showModal("清明照見 ‧ 功德增上", `見相非相，隨緣點算。<br>準確尋得 ${correctCount} 尊【${LIBRARY[targetType].name}】。`, "前往下一階", () => {
                    currentLevel++;
                    initLevel(currentLevel);
                });
            }, 1000); // 讓長輩欣賞一下發光的圖騰再跳視窗

        } else {
            // 答錯了！給予溫柔的提示
            showModal("心念散亂 ‧ 幻象叢生", `所見為虛妄，數目有異。<br>請安住呼吸，重新細觀畫布。`, "再次觀相", () => {
                // 不換題目，只關閉視窗讓長輩重數
            });
        }
    }

    function showModal(title, desc, btnText, callback) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-desc').innerHTML = desc;
        document.getElementById('m-btn-action').innerText = btnText;
        document.getElementById('m-btn-action').onclick = () => {
            document.getElementById('modal').classList.remove('show');
            if(callback) callback();
        };
        document.getElementById('modal').classList.add('show');
    }

    // --------------------------------------------------
    // 背景星空
    // --------------------------------------------------
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let cw, ch, stars = [];
    function res() { cw=canvas.width=window.innerWidth; ch=canvas.height=window.innerHeight; }
    window.addEventListener('resize', res); res();
    for(let i=0; i<60; i++) stars.push({x:(Math.random()-0.5)*2000, y:(Math.random()-0.5)*2000, z:Math.random()*2000, s:Math.random()*2+1});
    function drawBg() {
        ctx.fillStyle = '#010204'; ctx.fillRect(0,0,cw,ch); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= 1.0; if(s.z<=0){s.z=2000; s.x=(Math.random()-0.5)*2000; s.y=(Math.random()-0.5)*2000;}
            let sc=800/(800+s.z), px=cw/2+s.x*sc, py=ch/2+s.y*sc;
            if(px>0&&px<cw&&py>0&&py<ch){ ctx.fillStyle = `rgba(212,175,55,${sc*0.5})`; ctx.beginPath(); ctx.arc(px,py,s.s*sc,0,Math.PI*2); ctx.fill(); }
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(drawBg);
    }
    drawBg();

    // 啟動第一關
    initLevel(currentLevel);
</script>
</body>
</html>
