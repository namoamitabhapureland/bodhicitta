<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彌陀淨土系統 - 動態法界蓮花預覽</title>
<style>
    body {
        background-color: #010103; color: #f3e5ab;
        font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        padding: 30px; margin: 0;
    }
    h2 { text-align: center; color: #d4af37; margin-bottom: 40px; letter-spacing: 2px; }
    .grid-container {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 30px; max-width: 1400px; margin: 0 auto;
    }
    .card {
        background: linear-gradient(135deg, rgba(20,20,20,0.95), rgba(5,5,10,0.98));
        border: 1px solid rgba(212,175,55,0.3); border-radius: 20px;
        padding: 30px 20px; display: flex; flex-direction: column;
        align-items: center; text-align: center;
        box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 15px rgba(212,175,55,0.05);
        transition: transform 0.3s ease;
    }
    .card:hover { transform: translateY(-5px); border-color: #d4af37; }
    .svg-container { 
        width: 160px; height: 160px; margin-bottom: 20px; 
        border-radius: 50%; box-shadow: inset 0 0 40px rgba(0,0,0,0.8); 
    }
    .rank-title { color: #d4af37; font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 8px rgba(212,175,55,0.4); }
    .nian-count { color: rgba(139,168,156,0.9); font-size: 0.85rem; margin-top: 10px; letter-spacing: 1px; }
</style>
</head>
<body>

<h2>彌陀淨土系統 - 萬聲願海 ‧ 動態演化預覽</h2>

<div class="grid-container" id="preview-grid"></div>

<script>
// ============================================================================
// 最新 2.5D 動態法輪與生命力蓮花 SVG 引擎
// ============================================================================
function getLotusSVG(rankType, nianCount = 0, overrideLevel = null) {
  const sharedDefs = `
    <defs>
      <linearGradient id="grad-lv1" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" stop-color="#349b7d" stop-opacity="0.95"/>
        <stop offset="60%" stop-color="#8ba89c" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#eafff8" stop-opacity="0.05"/>
      </linearGradient>
      <linearGradient id="grad-lv2" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" stop-color="#d88c9a" stop-opacity="0.95"/>
        <stop offset="60%" stop-color="#ffb6c1" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
      </linearGradient>
      <linearGradient id="grad-lv3" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" stop-color="#b8860b" stop-opacity="0.95"/>
        <stop offset="60%" stop-color="#d4af37" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#fff8dc" stop-opacity="0.1"/>
      </linearGradient>
      <linearGradient id="grad-lv4" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" stop-color="#8b0000" stop-opacity="0.95"/>
        <stop offset="50%" stop-color="#d2691e" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#ffeaee" stop-opacity="0.1"/>
      </linearGradient>
      <linearGradient id="grad-lv5" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" stop-color="#4b0082" stop-opacity="0.95"/>
        <stop offset="40%" stop-color="#d4af37" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15"/>
      </linearGradient>
      <linearGradient id="grad-lv6" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
        <stop offset="30%" stop-color="#fff9c4" stop-opacity="0.8"/>
        <stop offset="70%" stop-color="#d4af37" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
      </linearGradient>

      <linearGradient id="edge-gold" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffeba8" stop-opacity="0.9"/>
        <stop offset="50%" stop-color="#d4af37" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#8a6d1c" stop-opacity="0.8"/>
      </linearGradient>
      
      <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4.0" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
  `;

  // --- 判定動態與視覺參數 ---
  let nLevel = 1;
  let bloomState = 0.4;
  let hasAura = false;     // 1000聲解鎖：背後自轉法輪光暈
  let hasBase = false;     // 10000聲解鎖：願海蓮臺
  let breathSpeed = "6s";  // 呼吸動畫速度

  if (nianCount >= 100000000) { nLevel = 6; bloomState = 1.2; hasAura = true; hasBase = true; breathSpeed = "3s"; }
  else if (nianCount >= 10000000) { nLevel = 5; bloomState = 1.0; hasAura = true; hasBase = true; breathSpeed = "3.5s"; }
  else if (nianCount >= 1000000) { nLevel = 4; bloomState = 1.0; hasAura = true; hasBase = true; breathSpeed = "4s"; }
  else if (nianCount >= 100000) { nLevel = 3; bloomState = 1.0; hasAura = true; hasBase = true; breathSpeed = "4s"; }
  else if (nianCount >= 10000) { nLevel = 2; bloomState = 1.0; hasAura = true; hasBase = true; breathSpeed = "4.5s"; } 
  else if (nianCount >= 1000) { nLevel = 1; bloomState = 1.0; hasAura = true; hasBase = false; breathSpeed = "5s"; } // 1000聲：全開 + 背後法輪自轉！
  else if (nianCount >= 100) { nLevel = 1; bloomState = 0.6; hasAura = false; hasBase = false; breathSpeed = "6s"; } 
  else { nLevel = 1; bloomState = 0.4; hasAura = false; hasBase = false; breathSpeed = "7s"; } 

  let mColor = `url(#grad-lv${nLevel})`;
  let cColor = `url(#grad-lv${Math.min(nLevel + 1, 6)})`; 

  // --- 1. 背景層 (Rank) ---
  let bgContent = '';
  if (rankType === '信') {
    bgContent = `<g opacity="0.4"><ellipse cx="50" cy="78" rx="28" ry="6" fill="none" stroke="url(#edge-gold)" stroke-width="0.8"/></g>`;
  } else if (rankType === '住') {
    bgContent = `<g opacity="0.6"><polygon points="25,82 75,82 65,75 35,75" fill="rgba(212,175,55,0.15)" stroke="url(#edge-gold)" stroke-width="0.8"/></g>`;
  } else if (rankType === '行') {
    bgContent = `<circle cx="50" cy="45" r="28" fill="none" stroke="url(#edge-gold)" stroke-width="1" opacity="0.6"/>`;
  } else if (rankType === '迴') {
    bgContent = `<circle cx="50" cy="45" r="34" stroke-dasharray="2 4" stroke-width="1.5" stroke="#fff" opacity="0.6"/>`;
  } else if (rankType === '地') {
    bgContent = `<circle cx="50" cy="45" r="42" fill="none" stroke="url(#edge-gold)" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.8"/>`;
  }

  // --- 2. 1000聲解鎖：動態背光法輪 (Aura) ---
  let dynamicAura = '';
  if (hasAura) {
      let auraOpacity = nLevel >= 3 ? 0.6 : 0.3;
      let dash = nLevel >= 4 ? "4 8" : "2 6";
      dynamicAura = `
        <g filter="url(#glow-soft)" opacity="${auraOpacity}">
          <animateTransform attributeName="transform" type="rotate" from="0 50 60" to="360 50 60" dur="20s" repeatCount="indefinite"/>
          <circle cx="50" cy="60" r="35" fill="none" stroke="url(#edge-gold)" stroke-width="1.5" stroke-dasharray="${dash}"/>
          ${nLevel >= 6 ? `<circle cx="50" cy="60" r="45" fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="1 10"/>` : ''}
        </g>
        <circle cx="50" cy="65" r="25" fill="${mColor}" opacity="0.4" filter="url(#glow-strong)">
            <animate attributeName="opacity" values="0.2;0.5;0.2" dur="${breathSpeed}" repeatCount="indefinite"/>
        </circle>
      `;
  }

  // --- 3. 10000聲解鎖：願海金剛蓮臺 (Base) ---
  let lotusBase = '';
  if (hasBase) {
      lotusBase = `
        <g opacity="0.9">
          <ellipse cx="50" cy="85" rx="40" ry="8" fill="none" stroke="url(#edge-gold)" stroke-width="0.8" opacity="0.5">
              <animate attributeName="rx" values="30;45;30" dur="4s" repeatCount="indefinite"/>
              <animate attributeName="ry" values="6;10;6" dur="4s" repeatCount="indefinite"/>
          </ellipse>
          <ellipse cx="50" cy="85" rx="32" ry="7" fill="rgba(212,175,55,0.15)" stroke="url(#edge-gold)" stroke-width="1.5" filter="url(#glow-strong)"/>
          <ellipse cx="50" cy="85" rx="18" ry="3" fill="#ffffff" opacity="0.8" filter="url(#glow-soft)"/>
        </g>
      `;
  }

  // --- 4. 花瓣生成 (Petals) ---
  let petals = '';
  let pairs = nLevel + 1; 
  let baseY = 82;

  for (let i = pairs; i >= 1; i--) {
    let r = i / pairs;
    let spread = r * 38 * bloomState;  
    let tipY = 25 + (r * 30);
    if (bloomState < 1.0) tipY = 20 + (r * 35) - ((1 - bloomState) * 20); 
    
    let controlOut = spread * 0.8;
    let controlUp = tipY + 15;

    petals += `<path d="M50 ${baseY} C ${50-controlOut} ${baseY-10}, ${50-spread} ${controlUp}, ${50-spread} ${tipY} C ${50-spread*0.3} ${tipY+10}, 47 ${baseY-5}, 50 ${baseY}" fill="${i % 2 === 0 ? cColor : mColor}" stroke="url(#edge-gold)" stroke-width="0.5" filter="url(#glow-soft)"/>`;
    petals += `<path d="M50 ${baseY} C ${50+controlOut} ${baseY-10}, ${50+spread} ${controlUp}, ${50+spread} ${tipY} C ${50+spread*0.3} ${tipY+10}, 53 ${baseY-5}, 50 ${baseY}" fill="${i % 2 === 0 ? cColor : mColor}" stroke="url(#edge-gold)" stroke-width="0.5" filter="url(#glow-soft)"/>`;
  }

  let centerTipY = 15;
  if (bloomState < 1.0) centerTipY = 15 - ((1 - bloomState) * 10);
  petals += `<path d="M50 ${baseY+2} Q 38 45 50 ${centerTipY} Q 62 45 50 ${baseY+2}" fill="${nLevel === 6 ? 'url(#grad-lv6)' : cColor}" stroke="#fff" stroke-width="0.8" filter="url(#glow-strong)"/>`;
  
  let coreRadius = nLevel >= 5 ? 5 : 3.5;
  let coreY = hasBase ? baseY - 2 : baseY - 5;
  const core = `
    <circle cx="50" cy="${coreY}" r="${coreRadius}" fill="#ffffff" filter="url(#glow-strong)">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>`;

  // 1億聲終極星爆
  let ultimateBurst = nLevel === 6 ? `<circle cx="50" cy="50" r="45" fill="none" stroke="url(#grad-lv6)" stroke-width="2" opacity="0.3" filter="url(#glow-strong)"><animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="15s" repeatCount="indefinite"/></circle>` : '';

  // 將蓮花群組加入上下呼吸動畫
  const lotusContent = `
    <g>
      ${ultimateBurst}
      ${dynamicAura}
      ${lotusBase}
      <g>
          <animateTransform attributeName="transform" type="translate" values="0,1.5; 0,-1.5; 0,1.5" dur="${breathSpeed}" repeatCount="indefinite"/>
          ${petals}
          ${core}
      </g>
    </g>`;

  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%; overflow:visible;">
    ${sharedDefs}
    <rect width="100" height="100" fill="transparent"/>
    ${bgContent}
    ${lotusContent}
  </svg>`;
}
// ============================================================================

const displayMatrix = [
    { rankName: "0 聲 - 初發心", rankType: "信", count: 0, countDesc: "含苞待放，微弱呼吸" },
    { rankName: "100 聲 - 淨念", rankType: "信", count: 100, countDesc: "花瓣微綻" },
    { rankName: "1,000 聲 - 堅固", rankType: "信", count: 1000, countDesc: "破繭全開！背後法輪自轉" },
    { rankName: "10,000 聲 (解鎖)", rankType: "信", count: 10000, countDesc: "解鎖願海金剛蓮臺與水波紋" },
    { rankName: "10 萬聲 (初住位)", rankType: "住", count: 100000, countDesc: "純粹真金，光暈強化" },
    { rankName: "100 萬聲 (十行位)", rankType: "行", count: 1000000, countDesc: "紅蓮紫金，呼吸頻率加快" },
    { rankName: "1,000 萬聲 (十迴向)", rankType: "迴", count: 10000000, countDesc: "大日紫金光" },
    { rankName: "1 億聲 (十地位)", rankType: "地", count: 100000000, countDesc: "極致白金，雙重逆向法輪星爆" }
];

const grid = document.getElementById('preview-grid');

displayMatrix.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
        <div class="svg-container">${getLotusSVG(item.rankType, item.count)}</div>
        <div class="rank-title">${item.rankName}</div>
        <div class="nian-count">${item.countDesc}</div>
    `;
    grid.appendChild(card);
});
</script>
</body>
</html>
