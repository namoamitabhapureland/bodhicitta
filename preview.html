<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彌陀淨土 ‧ 十階蓮花演化矩陣</title>
<style>
:root { --bg: #050508; --gold: #f0d060; --white: #f2ede0; }
body { background: var(--bg); color: var(--white); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
.title { font-size: 1.4rem; letter-spacing: 4px; color: var(--gold); margin-bottom: 40px; text-shadow: 0 0 20px rgba(240,208,96,0.3); border-bottom: 1px solid rgba(240,208,96,0.3); padding-bottom: 15px; }
.matrix { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 30px; width: 100%; max-width: 1100px; justify-items: center; }
.card { background: rgba(255,255,255,0.02); border: 1px solid rgba(240,208,96,0.15); border-radius: 20px; padding: 25px 15px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; width: 100%; }
.card:hover { transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
.svg-wrap { width: 130px; height: 130px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.8)); }
.medal-name { color: var(--gold); font-weight: bold; font-size: 0.95rem; margin-bottom: 5px; text-align: center; }
.threshold { color: #888; font-size: 0.75rem; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="title">彌陀淨土 ‧ 十階蓮花演化矩陣 (100M 版)</div>
<div class="matrix" id="matrix"></div>

<script>
// 10 階蓮花色彩定義
const EVOLUTION_STAGES = [
    { level: 1,  name: "[Initial Lotus]",     threshold: "0+",       c1: "#ffffff", c2: "#e0e0e0", aura: "#ffffff" },
    { level: 2,  name: "[Ten Recitations]",   threshold: "10+",      c1: "#ffcc80", c2: "#e65100", aura: "#ffcc80" },
    { level: 3,  name: "[Pure Thought]",      threshold: "500+",     c1: "#fce4ec", c2: "#f06292", aura: "#f48fb1" },
    { level: 4,  name: "[Mindfulness Flow]",  threshold: "5,000+",   c1: "#e1f5fe", c2: "#29b6f6", aura: "#81d4fa" },
    { level: 5,  name: "[Faith & Vows]",      threshold: "10,000+",  c1: "#e8f5e9", c2: "#4caf50", aura: "#a5d6a7" },
    { level: 6,  name: "[Lotus Assembly]",    threshold: "100,000+", c1: "#e3f2fd", c2: "#1565c0", aura: "#1e88e5" },
    { level: 7,  name: "[Non-retrogression]", threshold: "500,000+", c1: "#ffffff", c2: "rainbow",  aura: "#f0d060" },
    { level: 8,  name: "[Formless Recit.]",   threshold: "1,000,000+",c1: "#f3e5f5", c2: "#7b1fa2", aura: "#9c27b0" },
    { level: 9,  name: "[Buddha Samadhi]",    threshold: "10M+",     c1: "#fffde7", c2: "#fbc02d", aura: "#f0d060" },
    { level: 10, name: "[Perfect Buddha]",    threshold: "100M+",    c1: "#ffffff", c2: "#fffce0", aura: "#ffffff" }
];

function getLotusSVG_Demo(stage) {
    const id = `s${stage.level}`;
    const cx = 60, cy = 60; // 使用 120x120 中心 (60,60) 的比例

    // 花瓣生成器 (採用妳最滿意的 5-5 交錯 10 瓣比例)
    function P(r0, r1, hw, bulge, shape) {
        const bx=cx, by=cy-r0, tx=cx, ty=cy-r1;
        const my = cy - (r0+r1)/2;
        return `M${bx-hw} ${by} C${bx-bulge} ${my} ${tx-bulge*.3} ${ty+5} ${tx} ${ty} C${tx+bulge*.3} ${ty+5} ${bx+bulge} ${my} ${bx+hw} ${by}Z`;
    }

    // 彩虹蓮花特殊處理
    const isRainbow = stage.c2 === 'rainbow';
    const rainbowCols = ['#ff8888','#ffb060','#ffe860','#a0e868','#40d898','#40c8e8','#6888ff','#9870e8','#d870c8','#ff70b0'];
    
    let petalsHTML = '';
    if(isRainbow) {
        for(let i=0; i<10; i++) {
            const angle = i * 36;
            petalsHTML += `<path d="${P(22, 56, 7, 11, 'round')}" fill="${rainbowCols[i]}" opacity="0.9" transform="rotate(${angle} ${cx} ${cy})"/>`;
        }
    } else {
        // 底層 5 瓣 (深色)
        for(let i=0; i<5; i++) {
            const angle = i * 72;
            petalsHTML += `<path d="${P(22, 56, 7, 11, 'round')}" fill="url(#gradA${id})" opacity="0.92" transform="rotate(${angle} ${cx} ${cy})"/>`;
        }
        // 表層 5 瓣 (交錯 36 度，淺色)
        for(let i=0; i<5; i++) {
            const angle = i * 72 + 36;
            petalsHTML += `<path d="${P(22, 46, 5.5, 8, 'round')}" fill="url(#gradB${id})" opacity="0.75" transform="rotate(${angle} ${cx} ${cy})"/>`;
        }
    }

    // 1 億特殊發光處理
    const isMax = stage.level === 10;
    const glowStd = isMax ? 4.5 : 2;

    return `
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
        <defs>
            <filter id="glow${id}" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="${glowStd}" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <radialGradient id="gradA${id}" cx="50%" cy="75%" r="100%">
                <stop offset="0%" stop-color="${stage.c1}"/><stop offset="100%" stop-color="${stage.c2}"/>
            </radialGradient>
            <radialGradient id="gradB${id}" cx="50%" cy="65%" r="100%">
                <stop offset="0%" stop-color="${stage.c1}"/><stop offset="100%" stop-color="${stage.c1}" stop-opacity="0.5"/>
            </radialGradient>
            <radialGradient id="unifiedGold" cx="50%" cy="50%" r="60%">
                <stop offset="0%" stop-color="#fffce0"/><stop offset="28%" stop-color="#f0c030"/><stop offset="65%" stop-color="#906010"/><stop offset="100%" stop-color="#4c3008"/>
            </radialGradient>
        </defs>

        <circle cx="${cx}" cy="${cy}" r="58" fill="none" stroke="${stage.aura}" stroke-width="4" opacity="0.15" filter="url(#glow${id})"/>
        <circle cx="${cx}" cy="${cy}" r="23" fill="none" stroke="#f0d060" stroke-width="1.5" opacity="0.95"/>
        <circle cx="${cx}" cy="${cy}" r="21" fill="url(#unifiedGold)" stroke="#f0d060" stroke-width="0.7"/>
        
        <g filter="url(#glow${id})">
            ${petalsHTML}
            <animateTransform attributeName="transform" type="rotate" from="0 ${cx} ${cy}" to="360 ${cx} ${cy}" dur="60s" repeatCount="indefinite" />
        </g>
        
        <circle cx="${cx}" cy="${cy}" r="2" fill="#fff" filter="url(#glow${id})"/>
    </svg>`;
}

const matrix = document.getElementById('matrix');
EVOLUTION_STAGES.forEach(stage => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
        <div class="svg-wrap">${getLotusSVG_Demo(stage)}</div>
        <div class="medal-name">${stage.name}</div>
        <div class="threshold">Level ${stage.level} ‧ ${stage.threshold}</div>
    `;
    matrix.appendChild(card);
});
</script>
</body>
</html>
