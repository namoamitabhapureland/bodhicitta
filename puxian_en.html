<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <link rel="manifest" href="manifest_en.json">
    <title>Amitabha Pure Land ． Samantabhadra's Vows</title>
    <style>
        :root {
            --bg-deep: #020203; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; 
            --gold-light: #f3e5ab; 
            --text-gold: #f3e5ab;
        }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, var(--bg-deep) 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
            display: flex; justify-content: center; align-items: center; color: #fff;
        }

        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(circle at 50% 30%, transparent 10%, rgba(1, 1, 3, 0.95) 100%); }

        #mist-layer { position: absolute; bottom: -10%; left: -10%; width: 120%; height: 60%; z-index: 5; pointer-events: none; mix-blend-mode: screen; overflow: hidden; }
        .mist-cloud { position: absolute; filter: blur(45px); border-radius: 50%; animation: drift-mist 15s infinite alternate ease-in-out; }
        .mist-1 { width: 1000px; height: 500px; left: -10%; bottom: -50px; background: radial-gradient(ellipse, rgba(212,175,55,0.25) 0%, transparent 70%); animation-duration: 18s; }
        .mist-2 { width: 1200px; height: 600px; right: -15%; bottom: -100px; background: radial-gradient(ellipse, rgba(196,113,237,0.2) 0%, transparent 70%); animation-duration: 22s; animation-delay: -5s; }
        .mist-3 { width: 900px; height: 450px; left: 15%; bottom: 0px; background: radial-gradient(ellipse, rgba(0,242,254,0.2) 0%, transparent 70%); animation-duration: 16s; animation-delay: -2s; }
        .mist-4 { width: 1100px; height: 550px; right: 10%; bottom: -80px; background: radial-gradient(ellipse, rgba(255,126,179,0.2) 0%, transparent 70%); animation-duration: 20s; animation-delay: -8s; }
        .mist-5 { width: 800px; height: 400px; left: 35%; bottom: -40px; background: radial-gradient(ellipse, rgba(255,255,255,0.25) 0%, transparent 70%); animation-duration: 14s; animation-delay: -10s; }
        @keyframes drift-mist { 0% { transform: translateX(-40px) translateY(10px) scale(1); opacity: 0.6; } 100% { transform: translateX(40px) translateY(-10px) scale(1.1); opacity: 1; } }
        #flash-overlay { position: fixed; inset: 0; background: radial-gradient(circle, #fff 0%, #f3e5ab 50%, transparent 100%); opacity: 0; z-index: 9999; pointer-events: none; transition: opacity 0.8s; mix-blend-mode: screen; }

        /* PAGE 1 */
        #page-1 { position: absolute; inset: 0; z-index: 10; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        #ui-layer-p1 { position: absolute; top: 12%; width: 100%; text-align: center; z-index: 20; transition: opacity 0.5s; pointer-events: none; }
        .main-title-p1 { color: var(--gold); font-size: 1.25rem; letter-spacing: 6px; font-weight: bold; text-shadow: 0 0 20px rgba(212,175,55,0.6); margin-bottom: 12px; text-transform: uppercase; }
        .sub-title-p1 { color: var(--cyan); font-size: 0.85rem; letter-spacing: 3px; transition: 0.5s; text-transform: uppercase; }

        #warp-container { position: absolute; inset: 0; z-index: 10; display: flex; justify-content: center; align-items: center; perspective: 1200px; }
        .warp-inner { position: relative; width: 100%; max-width: 600px; height: 100%; max-height: 900px; transform-origin: 59.1% 28.8%; transition: transform 2.2s cubic-bezier(0.6, 0.05, 0.1, 1), opacity 1.8s ease-in; }
        .warp-inner.warp-drive { transform: scale(25) translateY(10%); opacity: 0; pointer-events: none; }

        #stair-svg { width: 100%; height: 100%; overflow: visible; filter: drop-shadow(0 0 30px rgba(212,175,55,0.1)); }
        .stair-step { stroke-linejoin: round; transition: opacity 0.8s ease-in-out; opacity: 1; }
        .step-hidden { opacity: 0 !important; pointer-events: none; } 
        .step-lit { animation: breathe-gold-wireframe 3s infinite alternate ease-in-out; cursor: pointer; }
        .step-lit .step-top { fill-opacity: 0.85; stroke: #fff; stroke-width: 2px; }
        .step-lit .step-front { fill-opacity: 0.75; stroke: #f3e5ab; stroke-width: 1.5px; }
        .step-lit .step-side { fill-opacity: 0.6; stroke: #d4af37; stroke-width: 1.5px; }
        .stair-step:hover { filter: drop-shadow(0 0 25px rgba(255,255,255,0.6)) brightness(1.3) !important; }
        @keyframes breathe-gold-wireframe { 0% { filter: drop-shadow(0 0 10px rgba(212,175,55,0.6)) brightness(1); } 100% { filter: drop-shadow(0 0 25px rgba(243,229,171,0.9)) drop-shadow(0 0 10px #fff) brightness(1.25); } }

        #immortal-seed { position: absolute; left: 59.1%; top: 28.8%; transform: translate(-50%, -50%) scale(1); width: 32px; height: 32px; border-radius: 50%; background: radial-gradient(circle, #fff 10%, #ffe 30%, var(--gold) 60%, var(--solid-gold) 100%); box-shadow: 0 0 var(--seed-glow) var(--solid-gold); opacity: 1; z-index: 100; transition: all 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .seed-heartbeat { animation: hb-pulse 1.5s infinite cubic-bezier(0.2, 0.8, 0.4, 1); }
        @keyframes hb-pulse { 0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 var(--seed-glow) var(--gold); } 50% { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 calc(var(--seed-glow)*2) var(--gold), 0 0 calc(var(--seed-glow)*3) #fff; } 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 var(--seed-glow) var(--gold); } }

        /* PAGE 2 */
        #page-2 { position: absolute; inset: 0; z-index: 10; display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; }
        .neon-flow { background: linear-gradient(90deg, #FDF5D3, #D4AF37, #E5989B, #89CFF0, #C9A0DC, #D4AF37, #FDF5D3); background-size: 200% 100%; animation: energyFlow 4s linear infinite; }
        .nav-top { width: 90%; max-width: 480px; z-index: 20; display: flex; justify-content: space-between; align-items: center; margin-top: max(20px, env(safe-area-inset-top)); padding: 12px 20px; background: rgba(5, 5, 8, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(212,175,55,0.2); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .nav-btn { display: flex; align-items: center; gap: 8px; color: var(--gold-light); font-size: 0.8rem; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; }
        .nav-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.5; fill: none; }
        .nav-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }

        .tracker-container { z-index: 20; margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .tracker-title { color: var(--gold-light); font-size: 0.85rem; letter-spacing: 2px; text-shadow: 0 0 10px var(--gold-solid); font-weight: bold; text-transform: uppercase; }
        .tracker-circles { display: flex; gap: 10px; align-items: center; }
        .track-circle { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(212,175,55,0.4); display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); transition: 0.4s; }
        .track-circle svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.2); transition: 0.4s; }
        .track-circle.lit { border-color: #fff; background: rgba(212,175,55,0.25); box-shadow: 0 0 10px var(--gold-solid), inset 0 0 8px var(--gold-solid); }
        .track-circle.lit svg { fill: #fff; filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 10px var(--gold-solid)); }

        .task-container { position: relative; z-index: 10; margin-top: 2vh; width: 95%; max-width: 450px; aspect-ratio: 3 / 4; display: flex; justify-content: center; align-items: center; }
        .tusks-frame { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; filter: drop-shadow(0 0 25px rgba(212,175,55,0.6)); animation: breathe-frame 3s infinite alternate ease-in-out; }
        @keyframes breathe-frame { 0% { filter: drop-shadow(0 0 15px rgba(212,175,55,0.4)); } 100% { filter: drop-shadow(0 0 35px var(--gold-solid)) drop-shadow(0 0 20px #fff); } }
        .tusk-inner-line { fill: none; stroke: var(--gold-light); stroke-width: 1.5; opacity: 0.95; }

        .task-content { position: relative; z-index: 20; text-align: center; width: 85%; background: rgba(5, 5, 10, 0.85); border: 1px solid rgba(212,175,55,0.6); border-radius: 20px; padding: 25px 20px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); box-shadow: inset 0 0 30px rgba(212,175,55,0.15), 0 15px 40px rgba(0,0,0,0.9); opacity: 0; transform: scale(0.9) translateY(20px); pointer-events: none; transition: opacity 1.5s ease-out, transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .task-content.show { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
        .task-subtitle { color: var(--cyan); font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 12px; text-transform: uppercase; }
        .task-title { color: var(--gold-light); font-size: 1.15rem; font-weight: bold; letter-spacing: 1px; text-shadow: 0 0 15px rgba(212,175,55,0.8); margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px dashed rgba(212,175,55,0.4); display: flex; justify-content: center; align-items: center; gap: 10px; }
        .tts-icon { width: 18px; height: 18px; fill: var(--cyan); cursor: pointer; transition: 0.3s; }
        .tts-icon:active { fill: #fff; transform: scale(1.1); }
        .task-desc { color: #eee; font-size: 0.9rem; line-height: 1.8; letter-spacing: 0.5px; text-align: justify; hyphens: auto; -webkit-hyphens: auto; }

        .action-zone { z-index: 20; position: absolute; bottom: 5%; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; opacity: 0; transition: opacity 1.5s 1s; pointer-events: none; }
        .action-zone.show { opacity: 1; pointer-events: auto; }
        .seal-btn { position: relative; width: 90px; height: 90px; border-radius: 50%; cursor: pointer; }
        .seal-bg { position: absolute; inset: 0; border: 1px dashed rgba(212,175,55,0.4); border-radius: 50%; animation: slow-spin 10s linear infinite; }
        .seal-progress { position: absolute; top: -4px; left: -4px; width: 98px; height: 98px; transform: rotate(-90deg); pointer-events: none; }
        .seal-text { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); color: var(--cyan); font-size: 0.7rem; letter-spacing: 1px; transition: 0.3s; white-space: nowrap; text-transform: uppercase; }
        #p2-bodhi-seed { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1); width: 40px; height: 40px; border-radius: 50%; background: radial-gradient(circle, #fff 10%, #ffe 30%, var(--gold) 60%, var(--solid-gold) 100%); box-shadow: 0 0 15px var(--solid-gold); transition: all 0.3s; pointer-events: none; }
        .seal-btn:active #p2-bodhi-seed { transform: translate(-50%, -50%) scale(0.85); box-shadow: 0 0 25px #fff; animation: none; }

        .pool-wrap { width: 70%; max-width: 300px; text-align: center; margin-top: 15px; }
        .pool-label { font-size: 0.7rem; color: var(--gold-light); letter-spacing: 1px; margin-bottom: 6px; opacity: 0.8; text-transform: uppercase; }
        .pool-bar-bg { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.5); }
        .pool-bar-fill { height: 100%; width: 0%; transition: width 1s cubic-bezier(0.2,0.8,0.2,1); }
        @keyframes slow-spin { 100% { transform: rotate(360deg); } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 9999; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .data-card { width: 90%; max-width: 400px; border: 1px solid rgba(212,175,55,0.42); border-radius: 20px; padding: 30px 22px; box-shadow: 0 10px 55px rgba(212,175,55,0.15); background: rgba(2,2,5,0.96); }
        .data-title { color: var(--gold-solid); font-size: 1.05rem; letter-spacing: 2px; text-align: center; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        .glass-energy-bar { width: 100%; margin: 8px 0 35px 0; position: relative; }
        .bar-track { width: 100%; height: 10px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.09); border-radius: 10px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.55); }
        .bar-fill { height: 100%; width: 0%; opacity: 0.95; transition: width 1.2s cubic-bezier(0.2,0.8,0.2,1); }
        .bar-labels { position: absolute; width: 100%; height: 20px; top: 16px; }
        .bar-labels span { position: absolute; font-size: 9px; color: var(--text-gold); letter-spacing: 1px; transform: translateX(-50%); white-space: nowrap; opacity: 0.7; }
        .bar-labels span::before { content: ''; position: absolute; top: -11px; left: 50%; transform: translateX(-50%); width: 3px; height: 3px; background: rgba(255,255,255,0.8); border-radius: 50%; box-shadow: 0 0 4px #fff; }
        .close-btn { width: 100%; padding: 12px; margin-top: 10px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #aaa; border-radius: 10px; cursor: pointer; letter-spacing: 2px; transition: 0.3s; font-family: inherit; text-transform: uppercase; }
        .close-btn:active { background: rgba(212,175,55,0.2); color: var(--gold-light); border-color: var(--gold-solid); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="page-transition-curtain" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 999999; opacity: 0; pointer-events: none; transition: opacity 0.8s ease-in-out;"></div>

    <div id="vow-alert-overlay" style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 10000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s;">
        <div id="vow-alert-box" style="background: linear-gradient(135deg, rgba(20,20,20,0.95), rgba(5,5,5,0.98)); border: 1px solid rgba(212,175,55,0.4); border-radius: 20px; padding: 35px 25px; width: 85%; max-width: 340px; text-align: center; box-shadow: 0 15px 50px rgba(0,0,0,0.9), inset 0 0 15px rgba(212,175,55,0.1); transform: scale(0.95); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.2" style="width: 36px; height: 36px; margin-bottom: 15px; filter: drop-shadow(0 0 8px rgba(212,175,55,0.6));">
                <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
            </svg>
            <div style="color: var(--gold); font-size: 1.15rem; letter-spacing: 2px; margin-bottom: 15px; font-weight: bold; text-shadow: 0 0 10px rgba(212,175,55,0.3); text-transform: uppercase;">Realm Manifested</div>

        </div>

    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
        <defs>
            <linearGradient id="f-light" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.8"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
            <linearGradient id="f-dark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#000" stop-opacity="0.05"/><stop offset="100%" stop-color="#000" stop-opacity="0.4"/></linearGradient>
            <linearGradient id="g-gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff8dc"/><stop offset="50%" stop-color="#f3e5ab"/><stop offset="100%" stop-color="#d4af37"/></linearGradient>
            <linearGradient id="tusk-gold" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#8a6518" stop-opacity="0.95"/><stop offset="35%" stop-color="#d4af37" stop-opacity="0.95"/><stop offset="70%" stop-color="#f3e5ab" stop-opacity="1"/><stop offset="100%" stop-color="#fffde7" stop-opacity="1"/>
            </linearGradient>

                <path class="tusk-inner-line" d="M 35,395 C 30,280 80,150 170,60" />
                <path class="tusk-inner-line" d="M 50,395 C 45,300 80,200 130,110" />
                <path fill="none" stroke="var(--gold-light)" stroke-width="2.5" stroke-linecap="round" d="M 15,380 Q 45,395 73,380" />
                <path fill="none" stroke="var(--gold-light)" stroke-width="2.5" stroke-linecap="round" d="M 20,400 Q 45,415 70,400" />
            </g>

    </svg>

    <div id="mist-layer"><div class="mist-cloud mist-1"></div><div class="mist-cloud mist-2"></div><div class="mist-cloud mist-3"></div><div class="mist-cloud mist-4"></div><div class="mist-cloud mist-5"></div></div>
    <div id="flash-overlay"></div>

    <div id="page-1">
        <div id="ui-layer-p1">
            <div class="main-title-p1">The Ten Great Vows</div>

                <div class="nav-top">

            <div class="nav-divider"></div>
            <div class="nav-btn" onclick="showVowAlert('<div style=\'text-align:left; font-size:0.9rem; line-height:1.8; color:#ddd;\'>Translates the majestic vows into <span style=\'color:var(--gold);\'>70 daily practices</span>.<br><br>Each vow spans a 7-day cycle. Daily completions are stored in the Realm.<br><br>Upon completing a 7-day cycle, <span style=\'color:var(--gold);\'>1000 Merit points</span> will automatically transfer to your main system.</div>')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg> Guide</div>

            <div class="nav-btn" onclick="openDataModal()"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20V14"></path></svg> Records</div>

    <div class="modal-overlay" id="dataModal">
        <div class="data-card" onclick="event.stopPropagation()">
            <div class="data-title">Karmic Records</div>

                <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span style="font-size:12px; color:var(--gold-light); letter-spacing:1px;">Annual Merit (Days)</span><span style="font-size:14px; color:#fff; font-weight:bold;" id="ui-txt-365">0</span></div>
                <div class="glass-energy-bar"><div class="bar-track"><div class="bar-fill neon-flow" id="ui-bar-365"></div></div><div class="bar-labels"><span style="left:0%">0</span><span style="left:27%">100</span><span style="left:54%">200</span><span style="left:82%">300</span><span style="left:100%">365</span></div></div>

                <div class="glass-energy-bar"><div class="bar-track"><div class="bar-fill neon-flow" id="ui-bar-108"></div></div><div class="bar-labels"><span style="left:0%">0</span><span style="left:33%">36</span><span style="left:66%">72</span><span style="left:100%">108</span></div></div>

<script>
    function showVowAlert(msg) {
        document.getElementById('vow-alert-msg').innerHTML = msg;
        const overlay = document.getElementById('vow-alert-overlay');
        const box = document.getElementById('vow-alert-box');
        overlay.style.display = 'flex';
        setTimeout(() => { overlay.style.opacity = '1'; box.style.transform = 'scale(1)'; }, 10);
        if (navigator.vibrate) navigator.vibrate([20, 30, 20]);
    }
    function closeVowAlert() {
        const overlay = document.getElementById('vow-alert-overlay');
        const box = document.getElementById('vow-alert-box');
        overlay.style.opacity = '0'; box.style.transform = 'scale(0.95)';
        setTimeout(() => { overlay.style.display = 'none'; }, 400);
    }
    function returnToMainHall() {
        const curtain = document.getElementById('page-transition-curtain');
        if(curtain) curtain.style.opacity = '1';
        setTimeout(() => { window.location.href = 'index_en.html?screen=3'; }, 800);
    }

    const VOWS_DB = {
        regular: [
            [
                { title: "Formless Respect", desc: "During your commute or in a crowd today, randomly select three people. Silently bring your palms together in your mind and say: 'May you be at peace, I pay homage to the future Buddha.'<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Dust-Mote Beings", desc: "When encountering those who serve the public (cleaners, clerks, drivers), offer a sincere smile and thanks, viewing them as manifestations of Bodhisattvas.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Adversity as Aid", desc: "If you face a setback or harsh words today, take a deep breath. Do not rush to argue. Silently recite: 'Gratitude for this circumstance, a condition for my growth.' See it as a Bodhisattva's test.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Respect for Objects", desc: "All things have Dharma nature. Today, with extreme gentleness and respect, handle three everyday objects (like a cup, a door handle, or utensils), feeling gratitude for their service.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Respect Loved Ones", desc: "We often forget to respect those closest to us. When your family or partner speaks today, put down what you are doing, look at them with full attention, and listen without interrupting or judging.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "The Vessel of Body", desc: "This body is a vessel for practice. Before one meal today, silently offer gratitude. Eat slowly, without checking your phone. Nourish your physical body with a pure mind.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Universal Homage", desc: "The First Vow is almost complete. Before sleeping, sit quietly for 3 minutes. In your mind, make a vast, sweeping gesture of respect to the boundless beings you've honored these 7 days, along with all Buddhas.<br><br>[Daily Practice] Recite Buddha's name 300 times." }
            ],
            [
                { title: "Conceal Faults", desc: "In conversation today, deliberately omit any criticism or complaints about others. If you hear of someone's faults, do not agree or spread them.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Selfless Praise", desc: "Sincerely praise someone around you today. Without any ulterior motive, purely express appreciation for their kindness, effort, or virtue.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Praise Nature", desc: "Trees and stones all speak the Dharma. Pause outdoors today and silently praise the purity and resilience of a gentle breeze, a cloud, or a street tree.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Digital Purity", desc: "The digital world is also the Dharma realm. Leave no harsh words online today. Purposely leave a word of praise and encouragement on an uplifting or helpful article.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Praise Obstacles", desc: "Difficulties are the whetstone of the mind. If you meet an obstacle today, mentally say 'thank you' to it, praising it for reminding you of your shortcomings and arrogance.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Aware of Nature", desc: "We often judge ourselves harshly. Look in the mirror today and sincerely praise your 'pure initial resolve' to seek goodness and recite the Buddha's name. Affirm that your self-nature is complete.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Universal Praise", desc: "The Second Vow is almost complete. Throughout all activities today, view the four syllables 'Namo Amitabha' as the highest praise to all phenomena in the universe.<br><br>[Daily Practice] Recite Buddha's name 300 times." }
            ],
            [
                { title: "Offering a Smile", desc: "Generosity costs no money. Go out with a gentle smile today. Offer this 'kind and pleasant countenance' to everyone whose eyes meet yours.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Offering Words", desc: "Words can generate warmth. Proactively say something comforting, encouraging, or warm to someone who is tired or disheartened, making an offering of kind speech.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Offering Labor", desc: "Proactively take on a small chore for your family or colleagues today (like taking out the trash, organizing a desk, opening a door). Complete it silently, without seeking reward.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Offering Purity", desc: "A clean environment is a solemn dojo. Spend 10 minutes mindfully cleaning your frequent space (desk or bedroom), offering this purity to the Dharma realm.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Mental Offering", desc: "Before enjoying your meals today, silently vow to offer this clean food to the Buddhas of the ten directions and three times, then eat with gratitude.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Dharma Offering", desc: "Share a golden phrase of Dharma that inspires you, or a link to a Pure Land teaching, with a friend who might need it, without forcing it upon them.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Universal Offering", desc: "The Third Vow is almost complete. Among all offerings, the offering of Dharma is supreme. Today, let the pure recitation of 'Namo Amitabha' become boundless incense and flowers, offered to the void.<br><br>[Daily Practice] Recite Buddha's name 300 times." }
            ],
            [
                { title: "Observe Thoughts", desc: "Focus closely on your 'thoughts' today. The moment you detect a subtle arising of greed, anger, or jealousy, silently shout 'Stop' and recite the Buddha's name to transform it.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Repent Speech", desc: "Recall if you have recently hurt someone with words, complained, or gossiped. Sincerely repent to them in your heart, vowing to guard your speech today.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Forgive & Release", desc: "Repentance includes untying knots of resentment. Mentally tell someone who has hurt you and whom you hold a grudge against: 'I forgive you; may you be liberated.'<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Treat Body Well", desc: "Staying up late and overeating damage the vessel of practice. Go to bed 30 minutes earlier today, or skip an unhealthy snack, showing practical repentance to your body.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Do Not Repeat", desc: "Pick a minor bad habit you knowingly commit (like procrastination or excessive scrolling). Vow absolutely not to commit it for the next 24 hours.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Repent for Others", desc: "When seeing news of disasters, crimes, or suffering, do not arise arrogant judgment. Instead, silently repent on their behalf, wishing for their early awakening.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Universal Repentance", desc: "The Fourth Vow is almost complete. For your daily practice, recite with utmost sincerity: 'For all bad karma created in the past, based upon beginningless greed, hatred, and ignorance, born of body, mouth, and mind, I now repent of it all.'<br><br>[Daily Practice] Recite Buddha's name 300 times." }
            ],
            [
                { title: "Break Jealousy", desc: "If you see someone being praised, gaining benefit, or showing talent today, immediately notice any subtle jealousy. Mentally cheer for them forcefully: 'That is wonderful, I am so happy for you!'<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Rejoice in Micro-Good", desc: "Deliberately look for a small good deed done by someone (giving up a seat, picking up trash, explaining patiently). Mentally or verbally praise this act.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Rejoice in Dharma", desc: "If you see a fellow practitioner being diligent, or someone sharing the orthodox Dharma, mentally rejoice in their karmic roots, wishing them early realization of Bodhi.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Help Others Succeed", desc: "Rejoicing also means helping others succeed. Proactively offer a small assist to help a colleague or family member finish a task smoothly. Rejoice in their achievement.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Rejoice in Foes", desc: "Try to recall a good trait or a success of someone you dislike. Let go of prejudice and mentally rejoice in that spark of light within them.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Rejoice in Adversity", desc: "When seeing others bravely facing illness or setbacks, rejoice in their resilient vitality that turns adversity into a stepping stone, and pray for them.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Universal Rejoicing", desc: "The Fifth Vow is almost complete. 'For all beings, Sravakas, Pratyekabuddhas, and Buddhas in the ten directions, I deeply and joyfully rejoice in even the slightest root of their goodness.'<br><br>[Daily Practice] Recite Buddha's name 300 times." }
            ],
            [
                { title: "Read for Wisdom", desc: "Before the Dharma wheel turns, turn your own mind. Quiet down and open any Buddhist sutra. Even reading just a paragraph or verse allows the Dharma water to nourish your mind.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Listen to Dharma", desc: "Use 10 minutes of your commute or alone time to listen to a Dharma talk, Buddhist chanting, or pure meditation music, letting the sound of Dharma enter your ears.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Inner Request", desc: "If caught in an unresolved worry today, mentally request the Dharma from the Buddhas. Let go of attachments and ask yourself: 'How would the Buddha respond right now?'<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Turn the Mind", desc: "Turning the Dharma wheel means transforming thoughts. When a 'complaint' is about to slip out today, force yourself to swallow it and turn it into 'Thank you' or 'Amitabha'.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Share the Dharma", desc: "The wheel is pushed by all beings. Naturally share a phrase of wisdom that touched you in your social feed or a conversation, sowing seeds of goodness.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Practice One Teaching", desc: "Knowing ten principles is not as good as practicing one. Pick one teaching of the Buddha (e.g., no anger, practice giving) and strictly implement it in your life today.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Universal Request", desc: "The Sixth Vow is almost complete. With the merit of today's recitation, I pray that all Buddhas and Bodhisattvas of the ten directions and three times continually turn the supreme Dharma wheel to liberate beings from ignorance.<br><br>[Daily Practice] Recite Buddha's name 300 times." }
            ],
            [
                { title: "Guard the Mind", desc: "Buddha means awakened; requesting the Buddha to remain means keeping your 'awareness' present. Maintain mindfulness today: when walking, know you are walking; when eating, know you are eating.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Respect Teachers", desc: "Good spiritual friends are manifestations of the Buddha. Proactively greet and check in on a teacher or elder who has guided and mentored you.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Cherish Dharma Tools", desc: "Where the Dharma tools are, the Buddha is. With a respectful heart, wipe, organize, or properly back up your sutras, Buddha images, or this digital dojo today.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Protect Life", desc: "Buddha-nature fills the void. Deliberately avoid stepping on insects today, or repair and recycle an item about to be discarded, protecting the vitality of all things.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "See All as Buddhas", desc: "All beings possess the wisdom and virtue of the Tathagata. Try to view the most difficult person you meet today as a 'Bodhisattva in disguise' coming to teach you patience.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Abide in the Present", desc: "Do not regret the past or fantasize about the future. Give yourself 5 minutes, close your eyes, and focus solely on the breath at the tip of your nose, letting awareness remain.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Universal Request", desc: "The Seventh Vow is almost complete. May I, in all lifetimes, encounter good teachers and hear the true Dharma; I pray the Tathagatas of the ten directions do not abandon beings, but remain in the world.<br><br>[Daily Practice] Recite Buddha's name 300 times." }
            ],
            [
                { title: "Learn Gentleness", desc: "The Buddha's voice is harmonious and elegant. Deliberately slow down your speech today, lower your volume, and use the most gentle, soft tone to converse with everyone.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Learn Patience", desc: "If you face someone cutting in line, traffic jams, or unreasonable behavior today, do not get angry. Silently recite the Buddha's name, practicing the stillness of 'unmoved by the eight winds.'<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Learn Giving", desc: "The Buddha can let go of everything. Clear out one usable item you no longer need today, and donate or give it to someone in need, practicing the mind of 'letting go.'<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Learn Precepts", desc: "Strictly observe the precept of 'no false speech' today. No lying, no exaggerating, no useless chatter. Let every word be truthful and beneficial.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Learn Diligence", desc: "Take one extra step beyond your usual practice or work habits today. For example: wake up 10 minutes earlier to meditate, or recite 108 extra Buddha names.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Learn Formlessness", desc: "After doing a good deed or helping someone today, immediately drop the thought 'I helped them.' Seek no gratitude, practicing the emptiness of the three spheres.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Universal Following", desc: "The Eighth Vow is almost complete. From now until Bodhi, I vow to always follow and learn from Shakyamuni Buddha and Amitabha Tathagata, practicing the Bodhisattva path without retrogression.<br><br>[Daily Practice] Recite Buddha's name 300 times." }
            ],
            [
                { title: "Let Go of Ego", desc: "On trivial daily matters that don't involve moral baselines (like what to eat or watch), completely drop your insistence and joyfully follow others' decisions today.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Listen to Needs", desc: "If someone complains to you today, just listen attentively and provide empathetic companionship. Unless asked, absolutely do not rush to give advice or preach.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Follow Conditions", desc: "If unexpected changes disrupt your plans today, do not become annoyed. Take a deep breath and tell yourself: 'Everything is the best arrangement.'<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Understand Difficulties", desc: "If someone provides poor service or makes a mistake, first find a reason for them in your mind (maybe they are sick or frustrated today). Replace harshness with understanding.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Blend with the Dust", desc: "A Bodhisattva lives in the world without leaving worldly awakening. When joining group activities today, follow the group's rhythm. Do not act eccentric; blend in with a harmonious mind.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Offer Convenience", desc: "Yield the right of way once while driving or walking today; or hold the elevator for a few extra seconds. Practice the principle of accommodation by offering convenience to others.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Universal Harmony", desc: "The Ninth Vow is almost complete. View all beings as your parents, as Tathagatas. When beings are happy, all Buddhas are happy. May I accommodate all sentient beings in the Dharma realm with a soft heart.<br><br>[Daily Practice] Recite Buddha's name 300 times." }
            ],
            [
                { title: "Dedicate to Kin", desc: "Today, dedicate all your good deeds and the merit of reciting the Buddha's name first to your parents and closest relatives in this life, praying for their physical and mental peace and belief in cause and effect.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Dedicate to Sufferers", desc: "Mentally visualize patients in hospitals, or beings suffering from war and starvation. Dedicate all of today's merit entirely to them, wishing they leave suffering and attain bliss.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Dedicate to Foes", desc: "Untying karmic knots happens today. Sincerely dedicate your merit to karmic creditors from past lives and all beings you have hurt. May you reconcile and be born together in the Pure Land.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Dedicate to the Realm", desc: "The mind is boundless, so merit is boundless. Expand your heart to the entire void and Dharma realm today. May your small good deeds, like a drop of water entering the sea, benefit endless beings.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Dedicate to Bodhi", desc: "For all good dharmas practiced, seek no worldly or heavenly rewards. Firmly vow today to dedicate all provisions solely toward achieving 'Supreme, Perfect Enlightenment.'<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Dedicate to Pure Land", desc: "All rivers flow to the sea; all paths lead to Ultimate Bliss. Deeply visualize Amitabha's golden body today, pouring all the merit accumulated from the Ten Vows into your provisions for birth in the Pure Land.<br><br>[Daily Practice] Recite Buddha's name 100 times." },
                { title: "Completion of Vows", desc: "Seven days of vows, blooming lotuses with every step. Today completes the Ten Vows of Samantabhadra. Sit quietly and make the final dedication: 'May this merit adorn the Buddha's Pure Land, repaying the four kindnesses above, and aiding those suffering below.'<br><br>[Daily Practice] Recite Buddha's name 1000 times." }
            ]
        ],
        hidden: [
            { title: "One Day of Noble Silence", desc: "Unless absolutely necessary, observe silence today. Retract all outward-flowing energy back into your inner mind.<br><br>[Daily Practice] Recite silently without interruption during the silence.", points: 800 },
            { title: "Nighttime Focus", desc: "The Dharma realm resonates clearly in the quiet night. Before sleeping, discard your phone and all distractions. Sit cross-legged or lie quietly, solely reciting the Buddha's name for 15 minutes.<br><br>[Daily Practice] Focused recitation at night.", points: 500 }
        ]
    };

    const MAIN_DB_KEY = 'PX_EN_V15.0'; 
    let mainDb = JSON.parse(localStorage.getItem(MAIN_DB_KEY));
    let todayStr = new Date().toDateString();

    if (!mainDb) mainDb = { points: 0 }; 

    if (!mainDb.puxianData) {
        mainDb.puxianData = {
            startDate: new Date().setHours(0,0,0,0), 
            lastLogin: todayStr,
            weekRecord: [false, false, false, false, false, false, false],
            poolPoints: 0, totalDays365: 0, totalYears108: 0
        };
    }

    let db = mainDb.puxianData; 

    let nowMidnight = new Date().setHours(0,0,0,0);
    let startMidnight = new Date(db.startDate).setHours(0,0,0,0);
    let daysPassed = Math.round((nowMidnight - startMidnight) / 86400000);

    let currentVowIndex = Math.floor(daysPassed / 7) % 10;
    let currentDayOfWeek = daysPassed % 7;

    if (db.lastLogin !== todayStr) {
        let lastLoginMidnight = db.lastLogin ? new Date(db.lastLogin).setHours(0,0,0,0) : startMidnight;

        let lastLoginWeek = Math.floor(Math.round((lastLoginMidnight - startMidnight) / 86400000) / 7);
        let currentWeek = Math.floor(daysPassed / 7);

        if (currentWeek > lastLoginWeek) {
            let successCount = db.weekRecord.filter(Boolean).length;
            db.poolPoints += (successCount === 7) ? 1000 : (successCount * 100);
            
            if (db.poolPoints >= 1000) {
                showVowAlert(`Merit points reached 1000.<br>Automatically transferred to Pure Land System.`);
                mainDb.points = (mainDb.points || 0) + db.poolPoints; 
                db.poolPoints = 0; 
            }
            db.weekRecord = [false, false, false, false, false, false, false];
        }
        db.lastLogin = todayStr; saveDB();
    }
    function saveDB() { localStorage.setItem(MAIN_DB_KEY, JSON.stringify(mainDb)); }

    const ANCHORS = [
        { xl: 30,  xr: 370, y: 800, h: 45 }, { xl: 115, xr: 405, y: 675, h: 40 },
        { xl: 190, xr: 430, y: 570, h: 35 }, { xl: 245, xr: 445, y: 485, h: 30 },
        { xl: 285, xr: 445, y: 415, h: 25 }, { xl: 310, xr: 430, y: 360, h: 20 },
        { xl: 320, xr: 410, y: 320, h: 15 }, { xl: 322, xr: 388, y: 290, h: 0  } 
    ];

    function buildStairs() {
        let html = '';
        for (let i = 0; i < 7; i++) {
            let c = ANCHORS[i], n = ANCHORS[i+1];
            let lPts = `${c.xl},${c.y} ${c.xl},${c.y - c.h} ${n.xl},${n.y} ${n.xl},${n.y + c.h * 0.8}`;
            let rPts = `${c.xr},${c.y} ${c.xr},${c.y - c.h} ${n.xr},${n.y} ${n.xr},${n.y + c.h * 0.8}`;
            let fPts = `${c.xl},${c.y} ${c.xr},${c.y} ${c.xr},${c.y - c.h} ${c.xl},${c.y - c.h}`;
            let tPts = `${c.xl},${c.y - c.h} ${c.xr},${c.y - c.h} ${n.xr},${n.y} ${n.xl},${n.y}`;
            html += `<g class="stair-step step-hidden"><polygon class="step-side" points="${lPts}" fill="url(#g-gold)" /><polygon class="step-side" points="${lPts}" fill="url(#f-dark)" opacity="0.6"/><polygon class="step-side" points="${rPts}" fill="url(#g-gold)" /><polygon class="step-side" points="${rPts}" fill="url(#f-dark)" opacity="0.6"/><polygon class="step-front" points="${fPts}" fill="url(#g-gold)" /><polygon class="step-front" points="${fPts}" fill="url(#f-dark)" opacity="0.3"/><polygon class="step-top" points="${tPts}" fill="url(#g-gold)" /><polygon class="step-top" points="${tPts}" fill="url(#f-light)" opacity="0.8"/></g>`;
        }
        document.getElementById('steps-group').innerHTML = html;
    }

    function animateStairsSequence() {
        const steps = document.querySelectorAll('.stair-step');
        let i = 0;
        let interval = setInterval(() => {
            if (i < steps.length) { steps[i].classList.remove('step-hidden'); steps[i].classList.add('step-lit'); i++; } 
            else {
                clearInterval(interval);
                document.getElementById('day-hint').innerText = "Realm Manifested ． Tap to Enter";
                document.getElementById('page-1').style.cursor = 'pointer';
                document.getElementById('page-1').addEventListener('click', executeWarp, {once:true});
            }
        }, 500); 
    }

    function executeWarp() {
        warpSpeed = 40; starScale = 4; document.getElementById('ui-layer-p1').style.opacity = '0';
        const seed = document.getElementById('immortal-seed');
        seed.style.filter = "drop-shadow(0 0 80px #fff)"; seed.style.animationDuration = "0.3s";
        document.getElementById('warp-inner').classList.add('warp-drive');

        setTimeout(() => {
            document.getElementById('flash-overlay').style.opacity = '1';
            setTimeout(() => { 
                document.getElementById('page-1').style.display = 'none'; document.getElementById('page-2').style.display = 'flex';
                updatePageTwoUI(); document.getElementById('flash-overlay').style.opacity = '0';
                setTimeout(() => { 
                    document.getElementById('task-box').classList.add('show'); document.getElementById('action-zone').classList.add('show');
                    let calmInterval = setInterval(() => {
                        warpSpeed += (3 - warpSpeed) * 0.05; starScale += (0.6 - starScale) * 0.05; 
                        if (Math.abs(warpSpeed - 3) < 0.1) { warpSpeed = 3; starScale = 0.6; clearInterval(calmInterval); }
                    }, 30);
                }, 1000);
            }, 800);
        }, 1200); 
    }

    function updatePageTwoUI() {
        let vowList = VOWS_DB.regular[currentVowIndex] || VOWS_DB.regular[0]; 
        let vowData = vowList ? (vowList[currentDayOfWeek] || vowList[0]) : { title: "Expanding Realm", desc: "Please wait for updates." };

        document.getElementById('ui-task-sub').innerText = `Samantabhadra's Vows ． Vow ${currentVowIndex + 1} ． Day ${currentDayOfWeek + 1}/7`;
        document.getElementById('ui-task-title-text').innerText = vowData.title; 
        document.getElementById('ui-task-desc').innerHTML = vowData.desc;

        let trackersHTML = '';
        for (let i = 0; i < 7; i++) {
            let isLit = db.weekRecord[i] ? 'lit' : '';
            let svgIcon = i === 6 
                ? `<svg viewBox="0 0 24 24"><path d="M12 3 C9 9 7 13 12 19 C17 13 15 9 12 3 Z M12 19 C6 17 2 11 7 9 C9 9 10 14 12 19 Z M12 19 C18 17 22 11 17 9 C15 9 14 14 12 19 Z"/><path d="M7 21 Q12 23 17 21" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`
                : `<svg viewBox="0 0 24 24"><path d="M6 19 C5 10 11 3 19 2 C13 7 10 13 10 19 Q8 20 6 19 Z"/></svg>`;
            trackersHTML += `<div class="track-circle ${isLit}">${svgIcon}</div>`;
        }
        document.getElementById('ui-trackers').innerHTML = trackersHTML;
        document.getElementById('ui-pool-text').innerText = `Pending Merit : ${db.poolPoints} / 1000`;
        document.getElementById('ui-pool-bar').style.width = `${(db.poolPoints / 1000) * 100}%`;

        let btnText = document.getElementById('seal-text');
        if (db.weekRecord[currentDayOfWeek]) {
            btnText.innerText = "[ Today's Vow Completed ]"; btnText.style.color = "var(--gold-solid)";
            document.getElementById('progress-circle').style.strokeDashoffset = 0;
        } else {
            btnText.innerText = "Hold to Complete"; btnText.style.color = "var(--cyan)";
            document.getElementById('progress-circle').style.strokeDashoffset = 289;
        }
    }

    function playTTS() {
        if (!('speechSynthesis' in window)) return showVowAlert("Your device does not support voice reading.");
        window.speechSynthesis.cancel(); 
        let title = document.getElementById('ui-task-title-text').innerText;
        let desc = document.getElementById('ui-task-desc').innerText; 
        let utterance = new SpeechSynthesisUtterance(title + ". " + desc);
        utterance.lang = 'en-US'; utterance.rate = 0.9; 
        window.speechSynthesis.speak(utterance);
    }

    const btn = document.getElementById('seal-btn'); const progCircle = document.getElementById('progress-circle'); const hintText = document.getElementById('seal-text');
    let reqAnimId, startTime, DURATION = 2000;
    function drawProgress(timestamp) {
        if (!startTime) startTime = timestamp; let pct = Math.min((timestamp - startTime) / DURATION, 1);
        progCircle.style.strokeDashoffset = 289 - (289 * pct);
        if (pct < 1) reqAnimId = requestAnimationFrame(drawProgress); else completeTodayTask();
    }
    function startPress(e) { if (db.weekRecord[currentDayOfWeek]) return; e.preventDefault(); hintText.innerText = "Infusing Merit..."; hintText.style.color = "#fff"; startTime = null; reqAnimId = requestAnimationFrame(drawProgress); }
    function cancelPress() { if (db.weekRecord[currentDayOfWeek]) return; cancelAnimationFrame(reqAnimId); progCircle.style.strokeDashoffset = 289; hintText.innerText = "Hold to Complete"; hintText.style.color = "var(--cyan)"; }
    
    function completeTodayTask() {
        if (db.weekRecord[currentDayOfWeek]) return;
        db.weekRecord[currentDayOfWeek] = true; db.totalDays365++;
        if (db.totalDays365 >= 365) { db.totalDays365 = 0; db.totalYears108++; showVowAlert("365-day cycle completed.<br>Kalpa Lotus Year + 1."); }
        saveDB(); updatePageTwoUI();
        const core = document.getElementById('p2-bodhi-seed');
        core.style.transform = "translate(-50%, -50%) scale(1.5)"; core.style.opacity = "0";
        setTimeout(() => { core.style.transform = "translate(-50%, -50%) scale(1)"; core.style.opacity = "1"; }, 500);
    }
    btn.addEventListener('mousedown', startPress); btn.addEventListener('touchstart', startPress, {passive: false});
    window.addEventListener('mouseup', cancelPress); window.addEventListener('touchend', cancelPress); window.addEventListener('mouseleave', cancelPress); btn.addEventListener('touchcancel', cancelPress);

    function openDataModal() {
        document.getElementById('dataModal').classList.add('active');
        document.getElementById('ui-txt-365').innerText = db.totalDays365; document.getElementById('ui-txt-108').innerText = db.totalYears108;
        setTimeout(() => { document.getElementById('ui-bar-365').style.width = (Math.min(db.totalDays365 / 365, 1) * 100) + '%'; document.getElementById('ui-bar-108').style.width = (Math.min(db.totalYears108 / 108, 1) * 100) + '%'; }, 100);
    }
    function closeDataModal() { document.getElementById('dataModal').classList.remove('active'); document.getElementById('ui-bar-365').style.width = '0%'; document.getElementById('ui-bar-108').style.width = '0%'; }

    const canvas = document.getElementById('starCanvas'); const ctx = canvas.getContext('2d');
    let width, height, stars = [], warpSpeed = 1, starScale = 1; 
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();
    const STAR_COLORS = ['#f3e5ab', '#ffffff', '#00f2fe', '#ff7eb3', '#c471ed', '#43e97b', '#d4af37'];
    for (let i = 0; i < 350; i++) { stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)], s: Math.random() * 2 + 1 }); }
    
    function renderStars() {
        ctx.fillStyle = 'rgba(2, 2, 4, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= warpSpeed; if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; } 
            let sc = 400 / (400 + s.z); ctx.beginPath(); 
            ctx.arc((width / 2) + s.x * sc, (height / 2) + s.y * sc, s.s * sc * starScale, 0, Math.PI * 2);
            ctx.fillStyle = s.color; ctx.globalAlpha = Math.min(1, sc * 2.5); ctx.fill(); ctx.globalAlpha = 1;
        });
        ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(renderStars);
    }
    window.addEventListener('load', () => { buildStairs(); renderStars(); animateStairsSequence(); });
</script>

</body>
</html>
