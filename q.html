<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>大圓滿 ‧ 摩尼靈石</title>
    <style>
        :root {
            --bg: #010103;
            --gold: #f3e5ab;
            --solid: #d4af37;
            --purple: #9c27b0;
            --cyan: #e0f7fa;
        }

        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--gold);
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            height: 100dvh; overflow: hidden; display: flex;
            justify-content: center; align-items: center;
            background-image: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 60%);
        }

        /* ── 星空背景 (極低熵) ── */
        #star-bg {
            position: absolute; inset: 0; z-index: 0; pointer-events: none;
        }

        /* ── 靈石容器與呼吸浮動動畫 ── */
        #mani-container {
            position: relative; z-index: 10;
            width: 180px; height: 250px;
            cursor: pointer;
            animation: float-breathe 6s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.2)) drop-shadow(0 0 50px rgba(156, 39, 176, 0.15));
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.3s;
        }

        #mani-container:active {
            transform: scale(0.92);
            filter: drop-shadow(0 0 40px rgba(212, 175, 55, 0.6)) drop-shadow(0 0 80px rgba(255, 255, 255, 0.4));
        }

        @keyframes float-breathe {
            0% { transform: translateY(10px); }
            100% { transform: translateY(-10px); }
        }

        /* 靈石本體的緩慢自轉 (營造大圓滿的莊嚴感) */
        .crystal-svg {
            width: 100%; height: 100%; overflow: visible;
        }

        /* ── 光塵粒子動畫 ── */
        .dust-particle {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 20;
            animation: scatter 2.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes scatter {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* ── 飄升法語動畫 ── */
        .dharma-quote {
            position: fixed; z-index: 30; pointer-events: none;
            color: var(--gold); font-size: 1.1rem; letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.8), 0 0 30px #fff;
            white-space: nowrap; font-weight: bold;
            animation: float-up-fade 3.5s ease-out forwards;
        }

        @keyframes float-up-fade {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -20px) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -60px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -80px) scale(0.9); }
        }

        /* 介面提示文字 */
        .hint-text {
            position: absolute; bottom: 10vh; color: rgba(243, 229, 171, 0.4);
            font-size: 0.8rem; letter-spacing: 5px; pointer-events: none;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            animation: pulse-opacity 3s infinite alternate;
        }
        @keyframes pulse-opacity { 0% { opacity: 0.3; } 100% { opacity: 1; } }

    </style>
</head>
<body>

    <svg style="position:absolute; width:0; height:0;">
        <defs>
            <linearGradient id="rainbow-glass" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
                <stop offset="25%" stop-color="#e0f7fa" stop-opacity="0.8"/>
                <stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.7"/>
                <stop offset="75%" stop-color="#fce4ec" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#9c27b0" stop-opacity="0.5"/>
            </linearGradient>
            <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
                <stop offset="40%" stop-color="#f3e5ab" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
            </radialGradient>
        </defs>
    </svg>

    <canvas id="star-bg"></canvas>

    <div id="mani-container" onclick="resonateCrystal(event)">
        <svg class="crystal-svg" viewBox="0 0 200 250">
            <circle cx="100" cy="125" r="70" fill="url(#core-glow)" />
            
            <g stroke="rgba(255,255,255,0.7)" stroke-width="0.8" stroke-linejoin="round">
                <polygon points="100,10 160,80 100,240 40,80" fill="url(#rainbow-glass)" opacity="0.6"/>
                <polygon points="100,10 100,80 40,80" fill="rgba(255,255,255,0.4)"/>
                <polygon points="100,10 160,80 100,80" fill="rgba(224, 247, 250, 0.4)"/>
                <polygon points="40,80 100,80 100,240" fill="rgba(212, 175, 55, 0.3)"/>
                <polygon points="160,80 100,80 100,240" fill="rgba(156, 39, 176, 0.3)"/>
                <polygon points="100,40 130,80 100,180 70,80" fill="url(#rainbow-glass)" opacity="0.9"/>
                <polygon points="100,40 100,180 70,80" fill="rgba(255,255,255,0.5)"/>
            </g>

            <circle cx="100" cy="15" r="2.5" fill="#fff" filter="drop-shadow(0 0 5px #fff)"/>
            <circle cx="170" cy="75" r="2" fill="#e0f7fa" filter="drop-shadow(0 0 5px #e0f7fa)"/>
            <circle cx="30" cy="75" r="2" fill="#fce4ec" filter="drop-shadow(0 0 5px #fce4ec)"/>
            <circle cx="100" cy="245" r="3" fill="#d4af37" filter="drop-shadow(0 0 8px #d4af37)"/>
        </svg>
    </div>

    <div class="hint-text">點擊靈石 ‧ 諦聽共鳴</div>

    <script>
        // ── 隨機法語庫 ──
        const dharmaQuotes = [
            "凡所有相，皆是虛妄",
            "心如虛空，了無一物",
            "步步生蓮，念念彌陀",
            "狂心若歇，歇即菩提",
            "南無阿彌陀佛",
            "應無所住，而生其心",
            "清淨無為",
            "一切有為法，如夢幻泡影",
            "平安喜樂"
        ];

        // ── 音效引擎 (引磬 / 水晶缽音) ──
        let audioCtx = null;
        function playCrystalChime() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const t = audioCtx.currentTime;
            
            // 創造空靈的疊波 (主音 + 泛音)
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // 調整為類似頌缽或引磬的高頻清脆音
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(880, t); // A5

            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(1760, t); // A6 (泛音)

            // 音量包絡：瞬間敲擊，緩慢悠遠地衰減
            gainNode.gain.setValueAtTime(0, t);
            gainNode.gain.linearRampToValueAtTime(0.4, t + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, t + 3.0);

            osc1.connect(gainNode);
            osc2.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc1.start(t); osc2.start(t);
            osc1.stop(t + 3.5); osc2.stop(t + 3.5);
        }

        // ── 點擊共鳴主邏輯 ──
        let isResonating = false;

        function resonateCrystal(e) {
            // 防連點機制
            if (isResonating) return;
            isResonating = true;
            setTimeout(() => isResonating = false, 800); // 0.8秒後才可再次點擊

            // 1. 播放聲音
            playCrystalChime();

            // 取得點擊座標，若無法取得則以螢幕正中央為基準
            const rect = document.getElementById('mani-container').getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            // 2. 散落光塵
            createLightDust(startX, startY);

            // 3. 浮現法語
            showDharmaQuote(startX, startY);
        }

        // ── 產生散落的光塵 ──
        function createLightDust(x, y) {
            const colors = ['#fff', '#d4af37', '#e0f7fa', '#fce4ec'];
            for (let i = 0; i < 15; i++) {
                const dust = document.createElement('div');
                dust.className = 'dust-particle';
                
                // 隨機大小與顏色
                const size = Math.random() * 4 + 2;
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                dust.style.width = `${size}px`;
                dust.style.height = `${size}px`;
                dust.style.background = color;
                dust.style.boxShadow = `0 0 8px ${color}`;
                dust.style.left = `${x}px`;
                dust.style.top = `${y}px`;

                // 隨機飛散軌跡 (放射狀)
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 150 + 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance - 50; // 微向上飄

                dust.style.setProperty('--tx', `${tx}px`);
                dust.style.setProperty('--ty', `${ty}px`);

                document.body.appendChild(dust);

                // 動畫結束後移除 DOM
                setTimeout(() => dust.remove(), 2500);
            }
        }

        // ── 產生飄升法語 ──
        function showDharmaQuote(x, y) {
            const quoteEl = document.createElement('div');
            quoteEl.className = 'dharma-quote';
            
            // 隨機選句
            const text = dharmaQuotes[Math.floor(Math.random() * dharmaQuotes.length)];
            quoteEl.innerText = text;
            
            // 定位在水晶正上方
            quoteEl.style.left = `${x}px`;
            quoteEl.style.top = `${y - 80}px`;

            document.body.appendChild(quoteEl);

            // 動畫結束後移除 DOM
            setTimeout(() => quoteEl.remove(), 3500);
        }

        // ── 背景微星光 (延續您的低熵風格) ──
        const canvas = document.getElementById('star-bg');
        const ctx = canvas.getContext('2d');
        let cw, ch, stars = [];

        function resize() {
            cw = canvas.width = window.innerWidth;
            ch = canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<40; i++) {
                stars.push({
                    x: Math.random() * cw,
                    y: Math.random() * ch,
                    r: Math.random() * 1.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.01
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, cw, ch);
            stars.forEach(s => {
                s.alpha += s.speed;
                if (s.alpha > 1 || s.alpha < 0) s.speed *= -1;
                
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(212, 175, 55, ${Math.abs(s.alpha) * 0.5})`;
                ctx.fill();
            });
            requestAnimationFrame(drawStars);
        }

        window.addEventListener('resize', resize);
        resize();
        drawStars();

    </script>
</body>
</html>
