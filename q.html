<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摩尼靈石 ‧ 三階演化</title>
    <style>
        body {
            margin: 0; padding: 0; background: #010103; color: #f3e5ab;
            font-family: "PingFang TC", serif; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 40px;
        }

        .showcase {
            display: flex; gap: 40px; justify-content: center; align-items: flex-end;
        }

        .crystal-card {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .svg-wrap {
            width: 120px; height: 120px;
            animation: float 4s ease-in-out infinite alternate;
        }

        /* 讓大圓滿轉動 */
        .ultimate-spin {
            animation: float 4s ease-in-out infinite alternate, spin 20s linear infinite;
        }

        @keyframes float { 0% { transform: translateY(5px); } 100% { transform: translateY(-5px); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .title { font-size: 14px; letter-spacing: 2px; color: #d4af37; font-weight: bold; text-align: center;}
        .desc { font-size: 11px; letter-spacing: 1px; color: rgba(255,255,255,0.5); text-align: center; }
    </style>
</head>
<body>

    <svg style="position:absolute; width:0; height:0;">
        <defs>
            <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
                <stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="#d4af37" stop-opacity="0.1"/>
            </linearGradient>
            
            <linearGradient id="facet-rose" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
                <stop offset="50%" stop-color="#fce4ec" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="#c2185b" stop-opacity="0.4"/>
            </linearGradient>

            <linearGradient id="rainbow-glass" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
                <stop offset="25%" stop-color="#e0f7fa" stop-opacity="0.7"/>
                <stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6"/>
                <stop offset="75%" stop-color="#fce4ec" stop-opacity="0.7"/>
                <stop offset="100%" stop-color="#9c27b0" stop-opacity="0.4"/>
            </linearGradient>

            <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
                <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
            </radialGradient>
        </defs>
    </svg>

    <div style="font-size: 18px; letter-spacing: 4px; color: #fff; margin-bottom: 20px;">摩尼靈石 ‧ 成長演化</div>

    <div class="showcase">
        
        <div class="crystal-card">
            <div class="svg-wrap" style="animation-delay: 0s;">
                <svg viewBox="0 0 100 100" style="filter: drop-shadow(0 0 8px rgba(243, 229, 171, 0.3));">
                    <polygon points="50,10 85,50 50,90 15,50" fill="url(#pure-glass)" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
                    <polygon points="50,10 85,50 50,50" fill="rgba(255,255,255,0.4)"/>
                    <polygon points="15,50 50,50 50,90" fill="rgba(212,175,55,0.15)"/>
                    <line x1="50" y1="10" x2="50" y2="90" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
                    <line x1="15" y1="50" x2="85" y2="50" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
                </svg>
            </div>
            <div class="title">初階：琉璃原石</div>
            <div class="desc">佛號 0 ~ 1萬<br>微透清淨，純淨初發心</div>
        </div>

        <div class="crystal-card">
            <div class="svg-wrap" style="animation-delay: 0.5s;">
                <svg viewBox="0 0 100 100" style="filter: drop-shadow(0 0 15px rgba(229, 152, 155, 0.4));">
                    <polygon points="50,5 90,40 50,95 10,40" fill="url(#facet-rose)" stroke="#fff" stroke-width="0.5"/>
                    <polygon points="50,5 75,40 50,95 25,40" fill="rgba(212,175,55,0.2)"/>
                    <polygon points="50,20 65,45 50,80 35,45" fill="rgba(255,255,255,0.6)"/>
                    <circle cx="50" cy="45" r="4" fill="#fff" filter="drop-shadow(0 0 5px #fff)"/>
                </svg>
            </div>
            <div class="title">中階：玫瑰晶蓮</div>
            <div class="desc">佛號 1萬 ~ 10萬<br>切面增多，透出慈悲粉光</div>
        </div>

        <div class="crystal-card">
            <div class="svg-wrap ultimate-spin">
                <svg viewBox="0 0 100 100" style="filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.5)) drop-shadow(0 0 15px rgba(156, 39, 176, 0.3));">
                    <circle cx="50" cy="50" r="35" fill="url(#core-glow)" />
                    <g stroke="rgba(255,255,255,0.8)" stroke-width="0.5">
                        <polygon points="50,5 95,40 50,95 5,40" fill="url(#rainbow-glass)" opacity="0.7"/>
                        <polygon points="50,5 50,40 5,40" fill="rgba(255,255,255,0.5)"/>
                        <polygon points="50,5 95,40 50,40" fill="rgba(224, 247, 250, 0.5)"/>
                        <polygon points="5,40 50,40 50,95" fill="rgba(212, 175, 55, 0.3)"/>
                        <polygon points="95,40 50,40 50,95" fill="rgba(156, 39, 176, 0.3)"/>
                        <polygon points="50,20 70,40 50,75 30,40" fill="url(#rainbow-glass)" opacity="0.9"/>
                    </g>
                </svg>
            </div>
            <div class="title" style="color: #fff; text-shadow: 0 0 10px #d4af37;">高階：幻彩摩尼</div>
            <div class="desc">佛號 10萬以上<br>萬德莊嚴，自轉生光</div>
        </div>

    </div>
</body>
</html>
