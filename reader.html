<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>正法專欄 ． 覺醒矩陣</title>
    <style>
        :root {
            --bg-deep: #000000; --gold: #f3e5ab; --cyan: #8ba89c; --text-main: #d0d0d0;
        }
        body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: "PingFang TC", serif; overflow: hidden; touch-action: none; 
        }

        /* ✨ 背景 Canvas ✨ */
        #realmCanvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* ✨ 畫面一：文章清單 (List Screen) ✨ */
        #list-screen {
            position: relative; z-index: 10; height: 100vh; overflow-y: auto;
            padding: 80px 10% 40px; display: block; -webkit-overflow-scrolling: touch;
        }
        .list-header { text-align: center; margin-bottom: 50px; }
        .list-title { color: var(--cyan); font-size: 1.5rem; letter-spacing: 5px; margin-bottom: 20px; }
        
        .cat-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .cat-btn { 
            background: none; border: 1px solid rgba(139,168,156,0.3); color: var(--cyan);
            padding: 5px 15px; border-radius: 15px; font-size: 0.8rem; cursor: pointer;
        }
        .cat-btn.active { border-color: var(--gold); color: var(--gold); }

        .article-card { margin-bottom: 50px; cursor: pointer; transition: 0.3s; }
        .card-date { color: var(--gold); font-size: 0.8rem; font-family: monospace; margin-bottom: 8px; }
        .card-title { color: var(--cyan); font-size: 1.2rem; margin-bottom: 12px; font-weight: bold; }
        .card-preview { font-size: 0.9rem; color: #999; line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-divider { width: 100%; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); margin-top: 20px; opacity: 0.3; }

        /* ✨ 畫面二：閱讀模式 (Reader UI) ✨ */
        #reader-ui { display: none; } /* 初始隱藏 */
        .back-to-list {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            color: var(--gold); font-size: 0.9rem; font-weight: bold; cursor: pointer;
            background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3);
        }
        #status-panel { position: absolute; top: 80px; left: 5%; width: 90%; border-left: 2px solid var(--cyan); padding: 10px 20px; z-index: 100; }
        #theory-drawer { position: fixed; bottom: 0; left: 0; width: 100vw; height: 85vh; background: rgba(5,5,8,0.98); backdrop-filter: blur(25px); border-top: 1.5px solid rgba(139,168,156,0.4); border-radius: 25px 25px 0 0; transform: translateY(100%); transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 2000; overflow-y: auto; padding-bottom: 80px; }
        #theory-drawer.open { transform: translateY(0); }
        /* 其餘 Drawer 內部樣式與之前一致... */
        .drawer-header { position: sticky; top: 0; background: #050508; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .theory-container { padding: 40px 8%; max-width: 700px; margin: 0 auto; }
        .c-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; color: var(--cyan); }
        .c-text { line-height: 2; text-align: justify; padding-left: 35px; color: var(--text-main); }
    </style>
</head>
<body>

    <canvas id="realmCanvas"></canvas>

    <div id="list-screen">
        <div class="list-header">
            <div class="list-title">正法專欄 ． 覺醒流</div>
            <div class="cat-nav" id="cat-nav"></div>
        </div>
        <div id="list-container"></div>
    </div>

    <div id="reader-ui">
        <div class="back-to-list" onclick="showList()">← 返回清單</div>
        <div id="status-panel">
            <div class="status-title" id="s-title"></div>
            <div class="status-desc" id="s-desc"></div>
        </div>
        <div style="position:absolute; bottom:10%; width:100%; display:flex; justify-content:center; z-index:10;">
            <button onclick="openDrawer()" style="background:rgba(0,0,0,0.8); color:var(--cyan); border:1px solid var(--cyan); padding:15px 30px; border-radius:30px; cursor:pointer; letter-spacing:2px;">展開禪卷 ． 進入導讀</button>
        </div>
    </div>

    <div id="theory-drawer">
        <div class="drawer-header">
            <div onclick="closeDrawer()" style="color:var(--cyan); cursor:pointer;">收起</div>
            <div id="tts-btn" onclick="toggleAudio()" style="color:var(--gold); cursor:pointer; border:1px solid var(--gold); padding:5px 15px; border-radius:20px; font-size:0.8rem;">聆聽法音</div>
        </div>
        <div class="theory-container" id="article-content"></div>
    </div>

    <script src="articles.js"></script>
    <script>
        // --- ✨ 智慧控制引擎 ✨ ---
        const icons = ["M2 12 Q 12 20 22 12", "M12 3 A 9 9 0 1 1 3 12", "M21 16V8a2 2 0 0 0-1-1.73l-7-4"];

        function initApp() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                showArticle(id);
            } else {
                showList();
            }
        }

        // 顯示清單
        function showList(cat = '全部') {
            document.getElementById('list-screen').style.display = 'block';
            document.getElementById('reader-ui').style.display = 'none';
            document.getElementById('theory-drawer').classList.remove('open');
            
            // 渲染分類導航
            const categories = ['全部', ...new Set(rawArticles.map(a => a.category || "未分類"))];
            document.getElementById('cat-nav').innerHTML = categories.map(c => 
                `<div class="cat-btn ${c===cat?'active':''}" onclick="showList('${c}')">${c}</div>`
            ).join('');

            // 渲染文章卡片
            const filtered = cat === '全部' ? rawArticles : rawArticles.filter(a => a.category === cat);
            document.getElementById('list-container').innerHTML = filtered.map(a => `
                <div class="article-card" onclick="showArticle('${a.id}')">
                    <div class="card-date">${a.id}</div>
                    <div class="card-title">${a.title}</div>
                    <div class="card-preview">${a.content.substring(0, 100)}...</div>
                    <div class="card-divider"></div>
                </div>
            `).join('');
        }

        // 顯示文章
        function showArticle(id) {
            const data = rawArticles.find(a => a.id === id);
            if (!data) return showList();

            document.getElementById('list-screen').style.display = 'none';
            document.getElementById('reader-ui').style.display = 'block';

            // 更新狀態欄
            const statusParts = data.status.split('|');
            document.getElementById('s-title').innerText = statusParts[0].trim();
            document.getElementById('s-desc').innerText = statusParts[1]?.trim() || "";

            // 解析內容
            const sectionRegex = /\[(.*?)\](.*?)(?=\[|$)/gs;
            let sectionsHtml = ""; let match; let i = 0;
            while ((match = sectionRegex.exec(data.content.trim())) !== null) {
                sectionsHtml += `
                    <div class="chapter-box">
                        <div class="c-header">
                            <svg class="c-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="${icons[i % icons.length]}"/></svg>
                            <div class="c-title">${match[1].trim()}</div>
                        </div>
                        <div class="c-text">${match[2].trim()}</div>
                    </div>
                `;
                i++;
            }
            document.getElementById('article-content').innerHTML = `
                <div class="humble-statement">${data.humble}</div>
                <h1 class="main-title">${data.title}</h1>
                ${sectionsHtml}
            `;
            // 修改 URL 但不刷新頁面
            window.history.pushState({}, '', `?id=${id}`);
        }

        function openDrawer() { document.getElementById('theory-drawer').classList.add('open'); }
        function closeDrawer() { document.getElementById('theory-drawer').classList.remove('open'); if(isPlaying) toggleAudio(); }

        let isPlaying = false;
        function toggleAudio() {
            if (!isPlaying) {
                const utter = new SpeechSynthesisUtterance(document.getElementById('article-content').innerText);
                utter.lang = 'zh-TW'; utter.onend = () => { isPlaying = false; };
                window.speechSynthesis.speak(utter); isPlaying = true;
            } else {
                window.speechSynthesis.cancel(); isPlaying = false;
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
