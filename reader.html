<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>妙依園地 ． 數位法寶</title>
    <style>
        :root {
            --bg-deep: #020205;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --text-main: #e0e0e0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.25);
            --glow-gold: rgba(212, 175, 55, 0.4);
        }

        body {
            margin: 0; background: var(--bg-deep); color: var(--text-main);
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            -webkit-tap-highlight-color: transparent; overflow-x: hidden;
        }

        /* --- 列表頁面設計 --- */
        #list-view {
            padding: 40px 6%; max-width: 900px; margin: 0 auto;
            min-height: 100vh;
        }

        .page-title {
            text-align: center; color: var(--solid-gold); font-size: 1.8rem;
            letter-spacing: 5px; margin-bottom: 40px; font-weight: normal;
            text-shadow: 0 0 15px var(--glow-gold);
        }

        .cat-nav {
            display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
            margin-bottom: 50px;
        }

        /* 玻璃發光按鈕 */
        .glass-btn {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--cyan); padding: 8px 22px; border-radius: 30px;
            font-size: 0.9rem; letter-spacing: 2px; cursor: pointer;
            backdrop-filter: blur(10px); transition: all 0.4s ease;
            display: flex; align-items: center; gap: 8px;
        }
        .glass-btn:hover {
            border-color: var(--solid-gold); color: var(--gold);
            box-shadow: 0 0 15px var(--glow-gold); transform: translateY(-2px);
        }
        .glass-btn.active {
            background: rgba(212, 175, 55, 0.15); border-color: var(--solid-gold);
            color: var(--gold); box-shadow: 0 0 20px var(--glow-gold);
        }

        /* 文章卡片 */
        .article-card {
            background: rgba(10, 15, 20, 0.4); border: 1px solid rgba(139, 168, 156, 0.2);
            border-radius: 16px; padding: 30px; margin-bottom: 25px;
            cursor: pointer; transition: all 0.4s ease; backdrop-filter: blur(5px);
        }
        .article-card:hover {
            border-color: var(--solid-gold); background: rgba(20, 20, 25, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 15px rgba(212,175,55,0.05);
        }
        .card-meta { color: var(--cyan); font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 15px; display: flex; justify-content: space-between;}
        .card-title { color: var(--gold); font-size: 1.4rem; font-weight: bold; margin: 0 0 15px 0; letter-spacing: 1px; }
        .card-desc { color: #888; font-size: 0.95rem; line-height: 1.8; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- 閱讀器頁面設計 --- */
        #reader-view {
            display: none; position: fixed; inset: 0; background: var(--bg-deep);
            z-index: 1000; overflow-y: auto; padding-bottom: 100px;
        }

        .reader-header {
            position: sticky; top: 0; background: rgba(2, 2, 5, 0.9);
            backdrop-filter: blur(15px); padding: 15px 6%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border); z-index: 1100;
        }

        .article-container { max-width: 760px; margin: 50px auto 0; padding: 0 6%; }
        .article-main-title { color: var(--gold); font-size: 1.8rem; text-align: center; margin-bottom: 20px; letter-spacing: 2px; text-shadow: 0 0 20px rgba(212,175,55,0.3); }
        .article-status { text-align: center; color: var(--cyan); font-size: 0.9rem; margin-bottom: 50px; letter-spacing: 1px; }
        .humble-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(139,168,156,0.3); padding: 20px; border-radius: 12px; color: #aaa; font-size: 0.9rem; line-height: 1.8; margin-bottom: 60px; text-align: justify; }

        /* 動態生成的章節樣式 */
        .chapter-box { margin-bottom: 50px; }
        .chapter-title { 
            color: var(--cyan); font-size: 1.3rem; font-weight: bold; letter-spacing: 2px;
            display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
            border-bottom: 1px solid rgba(139,168,156,0.2); padding-bottom: 10px;
        }
        .chapter-content { color: var(--text-main); font-size: 1.05rem; line-height: 2.2; text-align: justify; letter-spacing: 0.5px; }
        
        .icon { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <div id="list-view">
        <h1 class="page-title">妙依園地 ． 專欄</h1>
        <div class="cat-nav" id="cat-nav"></div>
        <div id="article-list"></div>
    </div>

    <div id="reader-view">
        <div class="reader-header">
            <button class="glass-btn" onclick="closeReader()">
                <svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                返回
            </button>
            <button class="glass-btn" onclick="toggleSpeech()" id="tts-btn">
                <svg class="icon" id="tts-icon" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                <span id="tts-text">聆聽</span>
            </button>
        </div>
        <div class="article-container" id="article-body"></div>
    </div>

    <script src="articles.js"></script>
    <script>
        // 確保抓取到正確語系 (防呆機制：若無 lang 屬性預設為 zh)
        const currentLang = document.documentElement.lang.includes('en') ? 'en' : 'zh';
        let filteredData = [];
        let isPlaying = false;

        function initApp() {
            // 篩選出符合當前語系的文章 (如果文章沒設定 lang，也當作符合當前語系，防止黑畫面)
            filteredData = rawArticles.filter(a => !a.lang || a.lang === currentLang);
            
            // 處理直接帶 ID 進入的網址 (例如 reader.html?id=2026-04-03)
            const params = new URLSearchParams(window.location.search);
            const targetId = params.get('id');

            renderCategories();
            
            if (targetId) {
                openReader(targetId);
            } else {
                renderList('全部');
            }
        }

        function renderCategories() {
            // 自動收集所有分類，若無則顯示「未分類」
            const cats = ['全部', ...new Set(filteredData.map(a => a.category || "未分類"))];
            const nav = document.getElementById('cat-nav');
            
            nav.innerHTML = cats.map(c => 
                `<button class="glass-btn" id="btn-${c}" onclick="renderList('${c}')">${c}</button>`
            ).join('');
        }

        function renderList(targetCat) {
            // 更新按鈕發光狀態
            document.querySelectorAll('.cat-nav .glass-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${targetCat}`);
            if(activeBtn) activeBtn.classList.add('active');

            const container = document.getElementById('article-list');
            const dataToShow = targetCat === '全部' ? filteredData : filteredData.filter(a => (a.category || '未分類') === targetCat);
            
            container.innerHTML = dataToShow.map(a => `
                <div class="article-card" onclick="openReader('${a.id}')">
                    <div class="card-meta">
                        <span>${a.category || '未分類'}</span>
                        <span>${a.id}</span>
                    </div>
                    <h2 class="card-title">${a.title}</h2>
                    <div class="card-desc">${a.content.replace(/\[.*?\]/g, '').substring(0, 100)}...</div>
                </div>
            `).join('');
        }

        function openReader(id) {
            const article = filteredData.find(a => a.id === id);
            if (!article) return renderList('全部');

            document.getElementById('list-view').style.display = 'none';
            document.getElementById('reader-view').style.display = 'block';
            window.scrollTo(0, 0);

            // 智慧解析 [章節] 並加入向量圖示
            const sectionRegex = /\[(.*?)\](.*?)(?=\[|$)/gs;
            let sectionsHtml = ""; 
            let match; 
            const svgIcon = `<svg class="icon" viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2z"/></svg>`; // 簡單的幾何山峰圖示

            while ((match = sectionRegex.exec(article.content.trim())) !== null) {
                sectionsHtml += `
                    <div class="chapter-box">
                        <div class="chapter-title">${svgIcon} ${match[1].trim()}</div>
                        <div class="chapter-content">${match[2].trim().replace(/\n/g, '<br>')}</div>
                    </div>
                `;
            }

            document.getElementById('article-body').innerHTML = `
                <h1 class="article-main-title">${article.title}</h1>
                <div class="article-status">${article.status}</div>
                <div class="humble-box">${article.humble}</div>
                ${sectionsHtml}
            `;

            // 更新網址列但不重新載入頁面
            window.history.pushState({ id: id }, '', `?id=${id}`);
            document.title = article.title;
        }

        function closeReader() {
            if (isPlaying) toggleSpeech(); // 關閉時停止語音
            document.getElementById('reader-view').style.display = 'none';
            document.getElementById('list-view').style.display = 'block';
            window.history.pushState({}, '', window.location.pathname);
            document.title = "妙依園地 ． 數位法寶";
        }

        // 監聽上一頁按鈕
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.id) openReader(e.state.id);
            else closeReader();
        });

        // 語音導讀引擎
        function toggleSpeech() {
            if (!window.speechSynthesis) return alert("您的瀏覽器不支援語音功能");
            const btnText = document.getElementById('tts-text');
            const btnIcon = document.getElementById('tts-icon');

            if (isPlaying) {
                window.speechSynthesis.cancel();
                isPlaying = false;
                btnText.innerText = currentLang === 'en' ? "Listen" : "聆聽";
                btnIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>';
            } else {
                const text = document.getElementById('article-body').innerText;
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = currentLang === 'en' ? 'en-US' : 'zh-TW';
                utter.rate = 0.95;

                utter.onend = () => {
                    isPlaying = false;
                    btnText.innerText = currentLang === 'en' ? "Listen" : "聆聽";
                    btnIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>';
                };

                window.speechSynthesis.speak(utter);
                isPlaying = true;
                btnText.innerText = currentLang === 'en' ? "Stop" : "停止";
                btnIcon.innerHTML = '<rect x="6" y="6" width="12" height="12"></rect>';
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
