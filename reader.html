<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>正法專欄 ． 導讀系統</title>
    <style>
        :root {
            --bg-deep: #000000; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
            --text-main: #d0d0d0;
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; user-select: none; overscroll-behavior: none;
        }

        /* ✨ UI 基礎層 ✨ */
        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            color: var(--gold); text-decoration: none; font-size: 0.9rem; font-weight: bold;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; 
            border: 1px solid rgba(212,175,55,0.3); backdrop-filter: blur(5px);
        }

        #status-panel {
            position: absolute; top: 75px; left: 5%; width: 90%; max-width: 350px;
            border-left: 2px solid var(--cyan); padding: 10px 20px; z-index: 100;
        }
        .status-title { font-size: 1.1rem; font-weight: bold; color: var(--cyan); letter-spacing: 2px; }
        .status-desc { font-size: 0.8rem; color: #999; line-height: 1.6; margin-top: 5px; }

        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* ✨ 導讀喚起按鈕 ✨ */
        .ui-layer { 
            position: absolute; bottom: 8%; width: 100%; 
            display: flex; justify-content: center; z-index: 10; 
        }
        .open-drawer-btn {
            background: linear-gradient(135deg, rgba(15,15,15,0.9), rgba(5,5,5,0.95)); 
            border: 1px solid var(--cyan); color: var(--cyan);
            padding: 15px 35px; border-radius: 30px; font-size: 1rem; font-weight: bold;
            letter-spacing: 3px; cursor: pointer; backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.8); transition: 0.3s;
        }
        .open-drawer-btn:active { transform: scale(0.95); border-color: var(--gold); color: var(--gold); }

        /* ✨ 導讀長卷 (Drawer) ✨ */
        #theory-drawer {
            position: fixed; bottom: 0; left: 0; width: 100vw; height: 85vh; 
            background: rgba(5, 5, 8, 0.98); backdrop-filter: blur(20px);
            border-top: 1.5px solid rgba(139,168,156,0.4); border-radius: 25px 25px 0 0; 
            transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); 
            z-index: 2000; overflow-y: auto; padding-bottom: 80px;
        }
        #theory-drawer.open { transform: translateY(0); }

        .drawer-header {
            position: sticky; top: 0; background: #050508; padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; border-bottom: 1px solid rgba(139,168,156,0.1);
        }
        
        .theory-container { padding: 40px 8%; max-width: 700px; margin: 0 auto; }
        
        .humble-statement { 
            font-size: 0.8rem; color: #888; line-height: 1.8; text-align: justify; 
            padding: 20px; border: 1px solid rgba(139,168,156,0.15); 
            border-radius: 12px; background: rgba(10,15,20,0.3); margin-bottom: 40px; 
        }
        
        .main-title { color: var(--cyan); font-size: 1.4rem; letter-spacing: 3px; text-align: center; margin-bottom: 40px; }
        .chapter-box { margin-bottom: 45px; }
        .c-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; color: var(--cyan); }
        .c-icon { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; }
        .c-title { font-size: 1.1rem; font-weight: bold; letter-spacing: 1.5px; }
        .c-text { color: var(--text-main); font-size: 0.95rem; line-height: 1.9; text-align: justify; padding-left: 34px; }
        .chapter-divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(139,168,156,0.2), transparent); margin: 30px 0; }

        /* TTS 按鈕 */
        #tts-btn {
            color: var(--gold); font-size: 0.85rem; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 8px; background: rgba(212,175,55,0.1);
            padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3);
        }
    </style>
</head>
<body>

    <div class="back-btn" onclick="window.location.href='treasure_list.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        返回清單
    </div>

    <div id="status-panel">
        <div class="status-title" id="s-title">數據讀取中</div>
        <div class="status-desc" id="s-desc">正在從法界雲端調取專欄內容...</div>
    </div>

    <canvas id="realmCanvas"></canvas>

    <div class="ui-layer">
        <button class="open-drawer-btn" onclick="openDrawer()">展開專欄 ． 進入導讀</button>
    </div>

    <div id="theory-drawer">
        <div class="drawer-header">
            <div onclick="closeDrawer()" style="color:var(--cyan); cursor:pointer; font-size:0.9rem;">收起</div>
            <div id="tts-btn" onclick="toggleAudio()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                <span id="tts-text">聆聽導讀</span>
            </div>
        </div>
        
        <div class="theory-container" id="article-inject-point">
            </div>
    </div>

    <script src="articles.js"></script>

    <script>
        // --- 核心加載邏輯（強化修復版） ---
function initArticle() {
    try {
        const params = new URLSearchParams(window.location.search);
        const articleId = params.get('id') || "2026-001"; 

        // 檢查數據是否存在
        if (typeof articleLibrary === 'undefined') {
            document.getElementById('s-title').innerText = "數據連線失敗";
            document.getElementById('s-desc').innerText = "請檢查 articles.js 是否已正確上傳至同目錄。";
            return;
        }

        // 自動適配：不管是 Array 還是 Object 都能讀取
        let article;
        if (Array.isArray(articleLibrary)) {
            article = articleLibrary.find(a => a.id === articleId);
        } else if (articleLibrary.data) {
            article = articleLibrary.data[articleId];
        }

        if (!article) {
            document.getElementById('s-title').innerText = "查無此篇";
            document.getElementById('s-desc').innerText = `ID: ${articleId} 尚未寫入資料庫。`;
            return;
        }

        // 成功讀取後填充內容
        document.getElementById('s-title').innerText = article.statusTitle || article.title;
        document.getElementById('s-desc').innerHTML = article.statusDesc || "已成功對齊法界數據";
        document.title = article.title;

        let html = `
            <div class="humble-statement">${article.humble || article.humbleStatement}</div>
            <h1 class="main-title">${article.title}</h1>
        `;

        // 適配章節內容
        const sections = article.sections || article.chapters;
        sections.forEach(sec => {
            html += `
                <div class="chapter-box">
                    <div class="c-header">
                        <svg class="c-icon" viewBox="0 0 24 24"><path d="${sec.icon}"/></svg>
                        <div class="c-title">${sec.title || sec.subtitle}</div>
                    </div>
                    <div class="c-text">${sec.content || sec.text}</div>
                </div>
                <div class="chapter-divider"></div>
            `;
        });

        document.getElementById('article-inject-point').innerHTML = html;
        console.log("導讀數據加載成功！");

    } catch (err) {
        document.getElementById('s-title').innerText = "邏輯出錯";
        document.getElementById('s-desc').innerText = err.message;
    }
}

window.onload = initArticle;


        // --- 2. 抽屜控制 ---
        function openDrawer() { document.getElementById('theory-drawer').classList.add('open'); }
        function closeDrawer() { 
            document.getElementById('theory-drawer').classList.remove('open'); 
            if(isPlaying) toggleAudio(); // 關閉時停止播放
        }

        // --- 3. TTS 語音邏輯 ---
        let isPlaying = false;
        function toggleAudio() {
            const btnText = document.getElementById('tts-text');
            if (!isPlaying) {
                const text = document.getElementById('article-inject-point').innerText;
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'zh-TW';
                utter.rate = 0.9;
                utter.onend = () => { isPlaying = false; btnText.innerText = "聆聽導讀"; };
                window.speechSynthesis.speak(utter);
                isPlaying = true;
                btnText.innerText = "停止播放";
            } else {
                window.speechSynthesis.cancel();
                isPlaying = false;
                btnText.innerText = "聆聽導讀";
            }
        }

        // 啟動
        window.onload = initArticle;
    </script>
</body>
</html>
