<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妙依園地 ． 數位法寶</title>
    <style>
        :root {
            --bg-deep: #020205;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --solid-gold: #d4af37;
            --text-white: #ffffff;
            --text-dim: #a0a0a0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
            --cyan-accent: #8ba89c;
        }

        body {
            margin: 0; background: var(--bg-deep); color: var(--text-white);
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            line-height: 1.6; overflow-x: hidden;
        }

        /* 玻璃發光按鈕樣式 */
        .glass-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            color: var(--solid-gold);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .glass-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--solid-gold);
            box-shadow: 0 0 20px var(--gold-glow);
            transform: translateY(-2px);
        }

        .glass-btn.active {
            background: var(--solid-gold);
            color: var(--bg-deep);
            box-shadow: 0 0 25px var(--solid-gold);
        }

        /* 分類導航欄 */
        .nav-container {
            position: sticky; top: 0; z-index: 100;
            padding: 20px; background: rgba(2,2,5,0.8);
            backdrop-filter: blur(15px);
            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;
            border-bottom: 1px solid var(--glass-border);
        }

        /* 文章清單卡片 */
        #article-list { padding: 40px 10%; max-width: 900px; margin: 0 auto; }
        
        .article-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: 0.4s;
        }

        .article-card:hover {
            border-color: var(--cyan-accent);
            background: rgba(139, 168, 156, 0.05);
        }

        .card-category {
            color: var(--cyan-accent);
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .card-title {
            color: var(--solid-gold);
            font-size: 1.5rem;
            margin: 0 0 15px 0;
            font-weight: bold;
        }

        /* 閱讀器抽屜層 */
        #reader-overlay {
            position: fixed; inset: 0; background: var(--bg-deep);
            z-index: 2000; display: none; overflow-y: auto;
            padding: 60px 10%;
        }

        .reader-content { max-width: 750px; margin: 0 auto; }
        
        .chapter-title {
            color: var(--solid-gold);
            border-left: 3px solid var(--solid-gold);
            padding-left: 15px;
            margin: 40px 0 20px;
            font-size: 1.3rem;
        }

        /* 關閉與語音控制 */
        .controls {
            position: fixed; top: 20px; right: 20px;
            display: flex; gap: 10px; z-index: 2100;
        }

        /* 向量 SVG 圖示 */
        .icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
    </style>
</head>
<body>

    <div class="nav-container" id="cat-nav">
        </div>

    <div id="article-list"></div>

    <div id="reader-overlay">
        <div class="controls">
            <button class="glass-btn" onclick="toggleSpeech()" id="speech-btn">
                <svg class="icon" viewBox="0 0 24 24"><path d="M11 5 6 9 2 9v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                聆聽
            </button>
            <button class="glass-btn" onclick="closeReader()">返回</button>
        </div>
        <div class="reader-content" id="article-body"></div>
    </div>

    <script src="articles.js"></script>
    <script>
        let currentSpeech = null;

        function init() {
            // 根據當前頁面語系篩選資料 (範例默認 zh)
            const lang = document.documentElement.lang.startsWith('en') ? 'en' : 'zh';
            const articles = rawArticles.filter(a => a.lang === lang);
            
            renderCategories(articles);
            renderList(articles, '全部');
        }

        function renderCategories(data) {
            const cats = ['全部', ...new Set(data.map(a => a.category || "未分類"))];
            const nav = document.getElementById('cat-nav');
            nav.innerHTML = cats.map(c => `
                <button class="glass-btn" onclick="filterCat('${c}')" id="btn-${c}">${c}</button>
            `).join('');
            document.getElementById('btn-全部').classList.add('active');
        }

        function renderList(data, filter) {
            const container = document.getElementById('article-list');
            const filtered = filter === '全部' ? data : data.filter(a => a.category === filter);
            
            container.innerHTML = filtered.map(a => `
                <div class="article-card" onclick="openReader('${a.id}')">
                    <div class="card-category">${a.category || '未分類'}</div>
                    <div class="card-title">${a.title}</div>
                    <div style="color: var(--text-dim); font-size: 0.9rem;">${a.id} ． ${a.status.split('|')[0]}</div>
                </div>
            `).join('');
        }

        function filterCat(cat) {
            document.querySelectorAll('.glass-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${cat}`).classList.add('active');
            const lang = document.documentElement.lang.startsWith('en') ? 'en' : 'zh';
            renderList(rawArticles.filter(a => a.lang === lang), cat);
        }

        function openReader(id) {
            const article = rawArticles.find(a => a.id === id);
            const overlay = document.getElementById('reader-overlay');
            const body = document.getElementById('article-body');

            // 內容解析：將 [章節] 轉為美化標題
            const formattedContent = article.content.replace(/\[(.*?)\]/g, '<div class="chapter-title">$1</div>');

            body.innerHTML = `
                <h1 style="color: var(--solid-gold); font-size: 2rem; text-align: center;">${article.title}</h1>
                <p style="color: var(--cyan-accent); font-style: italic; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px;">${article.humble}</p>
                <div style="font-size: 1.1rem; color: #eee; text-align: justify;">${formattedContent}</div>
            `;

            overlay.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeReader() {
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            document.getElementById('reader-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function toggleSpeech() {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                document.getElementById('speech-btn').innerHTML = '聆聽';
            } else {
                const text = document.getElementById('article-body').innerText;
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = document.documentElement.lang === 'en' ? 'en-US' : 'zh-TW';
                window.speechSynthesis.speak(utter);
                document.getElementById('speech-btn').innerHTML = '停止';
                utter.onend = () => document.getElementById('speech-btn').innerHTML = '聆聽';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
