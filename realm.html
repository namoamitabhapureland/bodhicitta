<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>系統 ． 一真法界 (十信圓滿賜寶版)</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; --bg-deep: #000000; }
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: var(--bg-deep); color: #fff; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }

        .top-nav-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); 
            padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; 
            display: flex; align-items: center; gap: 6px; z-index: 1000; cursor: pointer; 
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .top-nav-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.2); }

        #status-panel {
            position: absolute; top: 70px; left: 5%; width: 90%; max-width: 320px;
            border-left: 2px solid rgba(212,175,55,0.8); padding: 10px 20px; z-index: 100; pointer-events: none;
            opacity: 0; transition: opacity 2s ease-in-out;
        }
        .status-title { font-size: 1.15rem; font-weight: bold; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px; text-shadow: 0 2px 6px rgba(0,0,0,0.9); }
        .status-desc { font-size: 0.85rem; color: #ddd; line-height: 1.8; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }

        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

        #golden-flash { 
            position: fixed; inset: 0; background: radial-gradient(circle, #ffffff 0%, #f3e5ab 40%, #d4af37 100%);
            mix-blend-mode: screen; opacity: 0; z-index: 99998; pointer-events: none; transition: opacity 0.2s ease-out; 
        }

        #immortal-seed {
            position: absolute; top: 50%; left: 50%; margin-top: -12px; margin-left: -12px;
            width: 24px; height: 24px; background: radial-gradient(circle, #fff 10%, #ffe 30%, var(--gold) 60%, var(--solid-gold) 100%);
            border-radius: 50%; opacity: 0; filter: blur(1.5px); 
            transition: opacity 2s, top 2s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 100;
        }
        
        .seed-heartbeat { animation: heartbeat-pulse 1.4s infinite cubic-bezier(0.2, 0.8, 0.4, 1); }
        @keyframes heartbeat-pulse {
            0% { transform: scale(1); box-shadow: 0 0 30px var(--gold), 0 0 60px var(--solid-gold); }
            15% { transform: scale(1.6); box-shadow: 0 0 60px var(--gold), 0 0 120px var(--solid-gold), 0 0 180px #fff; }
            30% { transform: scale(1.2); box-shadow: 0 0 40px var(--gold), 0 0 80px var(--solid-gold); }
            45% { transform: scale(1.6); box-shadow: 0 0 60px var(--gold), 0 0 120px var(--solid-gold), 0 0 180px #fff; }
            100% { transform: scale(1); box-shadow: 0 0 30px var(--gold), 0 0 60px var(--solid-gold); }
        }

        #profound-text { 
            position: absolute; top: calc(50% + 60px); width: 100%;
            color: var(--gold); font-size: 1.35rem; letter-spacing: 12px; opacity: 0; transition: opacity 4s; text-align: center; 
            text-shadow: 0 0 20px var(--solid-gold), 0 0 40px #fff; line-height: 2.8; font-weight: bold; z-index: 100; pointer-events: none;
        }

        .ui-layer { position: absolute; bottom: 8%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; opacity: 0; transition: opacity 2s;}
        .drag-hint { color:rgba(212,175,55,0.6); font-size:0.75rem; letter-spacing:2px; text-shadow: 0 0 5px rgba(0,0,0,0.8); }

        #realm-reward {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; z-index: 200;
            opacity: 0; pointer-events: none; transition: opacity 2s ease, top 2s cubic-bezier(0.2, 0.8, 0.2, 1); width: 100%;
        }
        .rr-grid { display: flex; gap: 20px; margin-bottom: 40px; justify-content: center; width: 100%; padding: 0 15px;}
        
        .rr-item { position: relative; display: flex; flex-direction: column; align-items: center; opacity: 0; transform: translateY(20px); transition: all 1.5s ease; flex: 1; max-width: 110px;}
        
        /* 專屬環境光暈 */
        .rr-glow-bg {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; border-radius: 50%; filter: blur(25px);
            opacity: 0; z-index: -1; animation: pulse-glow 3.5s infinite alternate;
        }
        #ri-1 .rr-glow-bg { background: rgba(255, 215, 0, 0.45); }
        #ri-2 .rr-glow-bg { background: rgba(77, 166, 255, 0.45); }
        #ri-3 .rr-glow-bg { background: rgba(255, 183, 197, 0.45); }
        
        @keyframes pulse-glow {
            0% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.3; }
            100% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.8; }
        }

        .rr-svg { height: 90px; filter: drop-shadow(0 0 15px rgba(243, 229, 171, 0.6)); animation: float 3s infinite ease-in-out alternate; }
        .rr-svg svg { height: 100%; width: 100%; overflow: visible; }
        @keyframes float { 
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.4)); } 
            50% { transform: translateY(-8px); filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.8)); } 
        }
        
        .rr-count { color: #f3e5ab; font-size: 1.1rem; font-weight: bold; margin-top: 15px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(212,175,55,0.8); }
        .rr-name { color: #8ba89c; font-size: 0.75rem; letter-spacing: 2px; margin-top: 5px; text-align: center; white-space: nowrap;}
        
        .rr-btn {
            padding: 12px 25px; border-radius: 25px; border: 1px solid #d4af37; background: rgba(212,175,55,0.15);
            color: #f3e5ab; font-size: 0.95rem; letter-spacing: 4px; cursor: pointer; opacity: 0; transition: all 1s ease;
            box-shadow: 0 0 25px rgba(212,175,55,0.3); backdrop-filter: blur(5px);
        }
        .rr-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.3); }

        #fast-preview { 
            position: absolute; top: 50%; width: 100%; transform: translateY(-50%);
            color: var(--cyan); font-size: 1.6rem; letter-spacing: 8px; opacity: 0; 
            text-align: center; text-shadow: 0 0 20px rgba(139,168,156,0.8);
            font-weight: bold; z-index: 100; pointer-events: none; transition: opacity 0.1s ease-in-out; 
        }
    </style>
</head>
<body>
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none; left: -9999px;">
        <defs>
            <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9" /><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6" /><stop offset="100%" stop-color="#d4af37" stop-opacity="0.2" /></linearGradient>
            <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
            <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.8"/></linearGradient>
            <linearGradient id="facet-cyan" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.9"/><stop offset="100%" stop-color="#00838f" stop-opacity="0.5"/></linearGradient>
            <linearGradient id="facet-rose" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="100%" stop-color="#c2185b" stop-opacity="0.5"/></linearGradient>
            
            <linearGradient id="g-gold" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffd700"/><stop offset="100%" stop-color="#b8860b"/></linearGradient>
            <linearGradient id="g-blue" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#4da6ff"/><stop offset="100%" stop-color="#000080"/></linearGradient>
            <linearGradient id="g-rose-pure" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffb7c5"/><stop offset="100%" stop-color="#c2185b"/></linearGradient>
        </defs>
    </svg>

    <div id="page-curtain" style="position:fixed; inset:0; background:#000; z-index: 9999999; pointer-events: none; transition: opacity 1s; opacity: 1;"></div>

    <div class="top-nav-btn" onclick="navigateTo('index.html')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        回道場
    </div>

    <div id="status-panel">
        <div class="status-title">一真法界 ． 萬法唯心</div>
        <div class="status-desc">「成住壞空，周而復始。<br>唯有菩提，歷劫不滅。」</div>
    </div>

    <canvas id="realmCanvas"></canvas>
    
    <div id="fast-preview"></div>
    <div id="golden-flash"></div>
    <div id="immortal-seed"></div>
    
    <div id="profound-text">菩提之心 ． 歷劫不滅<br>一真法界 ． 本自如如</div>

    <div id="realm-reward">
        <div style="color:#d4af37; font-size:1.15rem; letter-spacing: 5px; margin-bottom: 40px; font-weight:bold; text-shadow: 0 0 15px #d4af37;">十信圓滿 ‧ 法界賜寶</div>
        <div class="rr-grid">
            <div class="rr-item" id="ri-1">
                <div class="rr-glow-bg"></div>
                <div class="rr-svg">
                    <svg viewBox="0 0 100 150">
                        <g transform="scale(1.4) translate(-14, -20)">
                            <polygon points="50,10 65,40 50,105 35,40" fill="#fff" stroke="#fff" stroke-width="1"/>
                            <polygon points="50,10 65,40 50,105" fill="url(#g-gold)"/>
                            <polygon points="25,100 75,100 55,110 45,110" fill="#f3e5ab" stroke="#f3e5ab" stroke-width="2"/>
                            <polygon points="46,110 54,110 52,135 48,135" fill="#b8860b"/>
                            <circle cx="50" cy="105" r="6" fill="url(#g-gold)" stroke="#fff" stroke-width="1.5"/>
                        </g>
                    </svg>
                </div>
                <div class="rr-count">x 10</div><div class="rr-name">幾何慧劍</div>
            </div>
            <div class="rr-item" id="ri-2">
                <div class="rr-glow-bg"></div>
                <div class="rr-svg">
                    <svg viewBox="0 0 100 150">
                        <g transform="scale(1.1) translate(-5, -15)">
                            <polygon points="45,20 55,20 60,40 40,40" fill="#fff" stroke="#fff" stroke-width="1"/>
                            <polygon points="40,40 60,40 75,90 25,90" fill="url(#g-blue)" stroke="#fff" stroke-width="1"/>
                            <polygon points="25,90 75,90 60,120 40,120" fill="#f3e5ab" stroke="#f3e5ab" stroke-width="1"/>
                            <polygon points="50,90 75,90 60,120 50,120" fill="#b8860b"/>
                        </g>
                    </svg>
                </div>
                <div class="rr-count">x 10</div><div class="rr-name">琉璃淨瓶</div>
            </div>
            <div class="rr-item" id="ri-3">
                <div class="rr-glow-bg"></div>
                <div class="rr-svg">
                    <svg viewBox="0 0 100 150">
                        <g transform="scale(1.3) translate(-8, 5)">
                            <polygon points="50,10 80,40 50,55 20,40" fill="#fff" stroke="#fff" stroke-width="0.5"/>
                            <polygon points="20,40 50,55 50,100" fill="url(#g-rose-pure)" stroke="#fff" stroke-width="0.5"/>
                            <polygon points="80,40 50,55 50,100" fill="#c2185b" stroke="#fff" stroke-width="0.5"/>
                        </g>
                    </svg>
                </div>
                <div class="rr-count">x 10</div><div class="rr-name">多面寶珠</div>
            </div>
        </div>
        <button class="rr-btn" id="rr-btn" onclick="collectAndReturn()">收入多寶閣並歸返</button>
    </div>

    <div class="ui-layer" id="ui-layer">
        <div class="drag-hint">360° 全息滑動 ． 觀相一真</div>
    </div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        let audioCtx;
        function playDharmaSound(phase) {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                
                if (phase === 'preview') { 
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(108, audioCtx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(864, audioCtx.currentTime + 7.0); // 7秒縮時
                    gain.gain.setValueAtTime(0.01, audioCtx.currentTime); 
                    gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.5); 
                    gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 6.5); 
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 7.0);
                    osc.connect(gain); gain.connect(audioCtx.destination); 
                    osc.start(); osc.stop(audioCtx.currentTime + 7.0);
                } else if (phase === 'form') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(108, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(216, audioCtx.currentTime + 8);
                    gain.gain.setValueAtTime(0.01, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 4); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 10);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 10);
                } else if (phase === 'seed') { 
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(864, audioCtx.currentTime);
                    gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 4);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 4);
                }
            } catch(e) {}
        }

        const canvas = document.getElementById('realmCanvas'); const ctx = canvas.getContext('2d');
        let width, height; let particles = []; let time = 0; let angleX = 0.3, angleY = 0; let isDragging = false; let lastMouseX = 0, lastMouseY = 0; const FOV = 450; let state = -1; 

        // --- 20重預覽專用變數 ---
        let realmParticles = [];
        let currentPreviewId = 1;
        const PastelColors = [
            { hsl: "350, 100%, 85%", hex: "#FFB7C5" }, { hsl: "120, 100%, 85%", hex: "#98FB98" },
            { hsl: "210, 100%, 85%", hex: "#87CEFA" }, { hsl: "30, 100%, 80%", hex: "#FFDAB9" },  
            { hsl: "0, 0%, 80%", hex: "#D3D3D3" },     { hsl: "270, 100%, 85%", hex: "#E6E6FA" }
        ];
        function getRandomPastel() { return PastelColors[Math.floor(Math.random()*PastelColors.length)]; }
        function addColorfulParticle(x, y, z, extra = {}) { realmParticles.push({ x, y, z, ...extra, col: getRandomPastel() }); }

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        // 預覽粒子生成器
        function initPreviewRealm(id) {
            realmParticles = [];
            currentPreviewId = id;
            if (id === 1) { 
                let N = 800, R = 180, goldenAngle = Math.PI * (3 - Math.sqrt(5));
                for(let i=0; i<N; i++) { let y = 1 - (i / (N - 1)) * 2, radius = Math.sqrt(1 - y*y), theta = goldenAngle * i; addColorfulParticle(Math.cos(theta)*radius*R, y*R, Math.sin(theta)*radius*R, { seed: Math.random()*Math.PI*2, type: 'mani' }); }
            } else if (id === 2) { 
                for (let l = 0; l < 4; l++) { let pCount = [6, 8, 10, 12][l], rOut = 40 + l * 25, hUp = 20 + l * 20;
                for (let p = 0; p < pCount; p++) { let aC = (Math.PI * 2 / pCount) * p + (l * 0.3);
                for (let t = 0; t <= 1; t += 0.1) { for (let w = -1; w <= 1; w += 0.4) { let pW = Math.sin(t * Math.PI) * (15 + l * 5), cR = t * rOut, cY = -t * hUp + (w * w * 12); realmParticles.push({ x: cR * Math.cos(aC) - (w * pW) * Math.sin(aC), y: cY + 40, z: cR * Math.sin(aC) + (w * pW) * Math.cos(aC), type: 'lotus', l: l, t: t, col: {hsl: "139, 168, 156"} }); } } } }
                for(let i=0; i<300; i++) addColorfulParticle((Math.random()-0.5)*300, Math.random()*200-50, (Math.random()-0.5)*300, { type: 'aroma', sy: Math.random()*0.8+0.3, seed: Math.random()*Math.PI*2 });
            } else if (id === 3) { 
                for(let b = 1; b < 16; b++) { let phi = (Math.PI / 16) * b; for(let s = 0; s < 32; s++) { let theta = (Math.PI * 2 / 32) * s; realmParticles.push({ x: 130 * Math.sin(phi) * Math.cos(theta), y: 130 * Math.cos(phi), z: 130 * Math.sin(phi) * Math.sin(theta), theta: theta, phi: phi, type: 'grid', col:{hsl:"0,0%,88%"} }); } }
                for(let i = 0; i < 150; i++) { let t = Math.random() * Math.PI * 2, p = Math.acos((Math.random() * 2) - 1), r = Math.random() * 50; realmParticles.push({ x: r*Math.sin(p)*Math.cos(t), y: r*Math.cos(p), z: r*Math.sin(p)*Math.sin(t), speed: Math.random()*0.05+0.02, type: 'core', col:{hsl:"0,0%,100%"} }); }
            } else if (id === 4) { 
                for(let l = 1; l <= 6; l++) { let rL = l * 25, yO = Math.sin(l * 0.5) * 20; for(let p = 0; p < 12; p++) { let ang = (Math.PI * 2 / 12) * p + (l * 0.2); for(let t = 0; t <= 1; t += 0.15) { realmParticles.push({ x: rL * t * Math.cos(ang), y: yO * t - (t * t * 40), z: rL * t * Math.sin(ang), l: l, p: p, t: t, type: 'net' }); } } }
            } else if (id === 5) { 
                for(let i=0; i<300; i++) { let t = Math.random() * Math.PI * 2, p = Math.acos((Math.random() * 2) - 1), r = Math.random() * 40; addColorfulParticle(r*Math.sin(p)*Math.cos(t), r*Math.cos(p), r*Math.sin(p)*Math.sin(t), { type: 'mani-core' }); }
                for(let i=0; i<12; i++) { let col = getRandomPastel(); let bandAngle = (i / 12) * Math.PI * 2; for(let a=0; a<Math.PI*2; a+=0.1) { realmParticles.push({ lineId:i, a:a, bandAng:bandAngle, col: col, type:'mani-cage' }); } }
            } else if (id === 6) { 
                let layers = 15; let segments = 120; for(let l = 0; l < layers; l++) { let zBase = (l - layers/2) * 25; let radiusBase = 120 * Math.sin((l/layers) * Math.PI) + 20; for(let i = 0; i < segments; i++) { let theta = (i / segments) * Math.PI * 2; let col = getRandomPastel(); realmParticles.push({ x: 0, y: 0, z: zBase, bR: radiusBase, th: theta, l: l, type: 'old9', col: col }); } }
            } else if (id === 7) { 
                for(let i=0; i<1200; i++) { let t = i / 1200, a = t * Math.PI * 15, r = t * 160; let baseHue = (t * 360 * 3) % 360; realmParticles.push({ x: r*Math.cos(a), y: (Math.random()-0.5)*30, z: r*Math.sin(a), hue: baseHue }); realmParticles.push({ x: r*Math.cos(a+Math.PI), y: (Math.random()-0.5)*30, z: r*Math.sin(a+Math.PI), hue: (baseHue + 180) % 360 }); }
            } else if (id === 8) { 
                for(let i=0; i<600; i++) { let t = Math.random() * Math.PI, p = Math.acos((Math.random() * 2) - 1); addColorfulParticle(140*Math.sin(p)*Math.cos(t), 140*Math.sin(p)*Math.sin(t), 140*Math.cos(p)); }
            } else if (id === 9) { 
                let w = 120, h = 40, d = 160; for(let x = -w; x <= w; x += 15) { for(let y = -h; y <= h; y += 15) { for(let z = -d; z <= d; z += 15) { if(Math.abs(x) === w || Math.abs(y) === h || Math.abs(z) === d) addColorfulParticle(x, y, z); } } }
            } else if (id === 10) { 
                let size = 110; let v = [[-size,-size,-size],[size,-size,-size],[size,size,-size],[-size,size,-size],[-size,-size,size],[size,-size,size],[size,size,size],[-size,size,size]]; v.forEach(pt => realmParticles.push({ x:pt[0], y:pt[1], z:pt[2], type:'vimo-v', col: PastelColors[4] }));
                for(let i=0; i<1200; i++) { let col = getRandomPastel(); let x = (Math.random()-0.5)*size*1.9, y = (Math.random()-0.5)*size*1.9, z = (Math.random()-0.5)*size*1.9; if(Math.random()>0.5) { x = (Math.random()>0.5?size:-size)*Math.random(); } else { z = (Math.random()>0.5?size:-size)*Math.random(); } realmParticles.push({ x, y, z, type:'vimo-line', col: col }); }
            } else if (id === 11) { 
                for(let i=0; i<800; i++) { let t = Math.random()*Math.PI*2, p = Math.random()*Math.PI; let x = 140 * Math.pow(Math.abs(Math.cos(p)), 0.5) * Math.sign(Math.cos(p)) * Math.cos(t); let y = 140 * Math.pow(Math.abs(Math.sin(p)), 0.5) * Math.sign(Math.sin(p)) * Math.sin(t); addColorfulParticle(x, y, 140*Math.cos(t)); }
            } else if (id === 12) { 
                for(let i=0; i<150; i++) { let pastel = getRandomPastel(); realmParticles.push({ x: (Math.random()-0.5)*120, y: (Math.random()-0.5)*120, z: (Math.random()-0.5)*120, s: Math.random()*2+1, type: 'halo-core', col: pastel }); }

            else if (currentDays >= 11100) { let lv = Math.floor((currentDays - 11100) / 10000) + 1; calculatedRank = ["初", "二", "三", "四", "五", "六", "七", "八", "九", "十"][lv - 1] + "迴向位"; }
            else if (currentDays >= 1100) { let lv = Math.floor((currentDays - 1100) / 1000) + 1; calculatedRank = ["初", "二", "三", "四", "五", "六", "七", "八", "九", "十"][lv - 1] + "行位"; }
            else if (currentDays >= 100) { let lv = Math.floor((currentDays - 100) / 100) + 1; calculatedRank = ["初住", "二住", "三住", "四住", "五住", "六住", "七住", "八住", "九住", "十住"][lv - 1] + "位"; }
            else { let lv = Math.min(10, Math.floor(currentDays / 10) + 1); calculatedRank = ["初信位", "二信位", "三信位", "四信位", "五信位", "六信位", "七信位", "八信位", "九信位", "十信位"][lv - 1]; }
            db.currentRank = calculatedRank;
            localStorage.setItem('PX_V15.0', JSON.stringify(db));

            if (currentDays >= 90 && currentDays < 100 && !db.milestones?.['rank_10']) {
                await sleep(3000); 
                document.getElementById('profound-text').style.opacity = '0'; 
                
                document.getElementById('immortal-seed').style.top = '28%';
                await sleep(1000);

                const rewardUI = document.getElementById('realm-reward');
                rewardUI.style.top = '62%'; 
                rewardUI.style.opacity = '1'; rewardUI.style.pointerEvents = 'auto';

                setTimeout(() => { document.getElementById('ri-1').style.opacity = '1'; document.getElementById('ri-1').style.transform = 'translateY(0)'; }, 500);
                setTimeout(() => { document.getElementById('ri-2').style.opacity = '1'; document.getElementById('ri-2').style.transform = 'translateY(0)'; }, 1500);
                setTimeout(() => { document.getElementById('ri-3').style.opacity = '1'; document.getElementById('ri-3').style.transform = 'translateY(0)'; }, 2500);
                setTimeout(() => { document.getElementById('rr-btn').style.opacity = '1'; }, 4000);

                try {
                    let m = new SpeechSynthesisUtterance("十信圓滿，法界賜寶，請收入多寶閣。"); m.lang = 'zh-TW'; m.rate = 0.85; window.speechSynthesis.speak(m);
                } catch(e) {}
            } else {
                await sleep(9000); navigateTo('index.html'); 
            }
        }

        function collectAndReturn() {
            document.getElementById('rr-btn').style.transform = 'scale(0.9)';
            document.getElementById('realm-reward').style.opacity = '0';
            
            let db;
            try { db = JSON.parse(localStorage.getItem('PX_V15.0')) || {}; } catch(e) { db = {}; }
            
            if (!db.treasures) db.treasures = {};
            db.treasures.sword = db.treasures.sword || 0;
            db.treasures.vase = db.treasures.vase || 0;
            db.treasures.jewel = db.treasures.jewel || 0;
            db.treasures.lotus_lamp = db.treasures.lotus_lamp || 0;
            db.treasures.dharma_wheel = db.treasures.dharma_wheel || 0;
            db.treasures.white_lotus = db.treasures.white_lotus || 0;
            db.treasures.indra_net = db.treasures.indra_net || 0;

            if (!db.milestones) db.milestones = {};
            
            db.treasures.sword += 10;
            db.treasures.vase += 10;
            db.treasures.jewel += 10;
            db.milestones['rank_10'] = true;
            
            localStorage.setItem('PX_V15.0', JSON.stringify(db));
            navigateTo('index.html');
        }

        function navigateTo(url) {
            document.getElementById('page-curtain').style.opacity = '1';
            setTimeout(() => { window.location.href = url; }, 1000);
        }

        window.addEventListener('load', runZenEngine);
    </script>
</body>
</html>
