<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>系統 ． 一真法界 (圓滿賜寶版)</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; --bg-deep: #000000; }
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: var(--bg-deep); color: #fff; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }

        .top-nav-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); 
            padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; 
            display: flex; align-items: center; gap: 6px; z-index: 1000; cursor: pointer; 
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .top-nav-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.2); }

        #status-panel {
            position: absolute; top: 70px; left: 5%; width: 90%; max-width: 320px;
            border-left: 2px solid rgba(212,175,55,0.8); padding: 10px 20px; z-index: 100; pointer-events: none;
            opacity: 0; transition: opacity 2s ease-in-out;
        }
        .status-title { font-size: 1.15rem; font-weight: bold; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px; text-shadow: 0 2px 6px rgba(0,0,0,0.9); }
        .status-desc { font-size: 0.85rem; color: #ddd; line-height: 1.8; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }

        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

        #golden-flash { 
            position: fixed; inset: 0; background: radial-gradient(circle, #ffffff 0%, #f3e5ab 40%, #d4af37 100%);
            mix-blend-mode: screen; opacity: 0; z-index: 99998; pointer-events: none; transition: opacity 0.2s ease-out; 
        }

        #immortal-seed {
            position: absolute; top: 50%; left: 50%; margin-top: -12px; margin-left: -12px;
            width: 24px; height: 24px; background: radial-gradient(circle, #fff 10%, #ffe 30%, var(--gold) 60%, var(--solid-gold) 100%);
            border-radius: 50%; opacity: 0; filter: blur(1.5px); transition: opacity 2s; z-index: 100;
        }
        
        .seed-heartbeat { animation: heartbeat-pulse 1.4s infinite cubic-bezier(0.2, 0.8, 0.4, 1); }
        @keyframes heartbeat-pulse {
            0% { transform: scale(1); box-shadow: 0 0 30px var(--gold), 0 0 60px var(--solid-gold); }
            15% { transform: scale(1.6); box-shadow: 0 0 60px var(--gold), 0 0 120px var(--solid-gold), 0 0 180px #fff; }
            30% { transform: scale(1.2); box-shadow: 0 0 40px var(--gold), 0 0 80px var(--solid-gold); }
            45% { transform: scale(1.6); box-shadow: 0 0 60px var(--gold), 0 0 120px var(--solid-gold), 0 0 180px #fff; }
            100% { transform: scale(1); box-shadow: 0 0 30px var(--gold), 0 0 60px var(--solid-gold); }
        }

        #profound-text { 
            position: absolute; top: calc(50% + 60px); width: 100%;
            color: var(--gold); font-size: 1.35rem; letter-spacing: 12px; opacity: 0; transition: opacity 4s; text-align: center; 
            text-shadow: 0 0 20px var(--solid-gold), 0 0 40px #fff; line-height: 2.8; font-weight: bold; z-index: 100; pointer-events: none;
        }

        .ui-layer { position: absolute; bottom: 8%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; opacity: 0; transition: opacity 2s;}
        .drag-hint { color:rgba(212,175,55,0.6); font-size:0.75rem; letter-spacing:2px; text-shadow: 0 0 5px rgba(0,0,0,0.8); }

        /* ✨ 法界顯化獎勵全息層 ✨ */
        #realm-reward {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; z-index: 200;
            opacity: 0; pointer-events: none; transition: opacity 2s ease; width: 100%;
        }
        .rr-grid { display: flex; gap: 20px; margin-bottom: 40px; justify-content: center; width: 100%; padding: 0 15px;}
        .rr-item { display: flex; flex-direction: column; align-items: center; opacity: 0; transform: translateY(20px); transition: all 1.5s ease; flex: 1; max-width: 110px;}
        .rr-svg { height: 90px; filter: drop-shadow(0 0 15px rgba(243, 229, 171, 0.6)); animation: float 3s infinite ease-in-out alternate; }
        .rr-svg svg { height: 100%; width: 100%; overflow: visible; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); filter: drop-shadow(0 0 25px rgba(243, 229, 171, 0.9)); } }
        
        .rr-count { color: #f3e5ab; font-size: 1.1rem; font-weight: bold; margin-top: 15px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(212,175,55,0.8); }
        .rr-name { color: #8ba89c; font-size: 0.75rem; letter-spacing: 2px; margin-top: 5px; text-align: center; white-space: nowrap;}
        
        .rr-btn {
            padding: 12px 25px; border-radius: 25px; border: 1px solid #d4af37; background: rgba(212,175,55,0.15);
            color: #f3e5ab; font-size: 0.95rem; letter-spacing: 4px; cursor: pointer; opacity: 0; transition: all 1s ease;
            box-shadow: 0 0 25px rgba(212,175,55,0.3); backdrop-filter: blur(5px);
        }
        .rr-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.3); }
    </style>
</head>
<body>
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none; left: -9999px;">
        <defs>
            <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9" /><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6" /><stop offset="100%" stop-color="#d4af37" stop-opacity="0.2" /></linearGradient>
            <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.95"/><stop offset="100%" stop-color="#fff" stop-opacity="0.1"/></linearGradient>
            <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0.8"/></linearGradient>
            <linearGradient id="facet-cyan" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.9"/><stop offset="100%" stop-color="#00838f" stop-opacity="0.5"/></linearGradient>
            <linearGradient id="facet-rose" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="100%" stop-color="#c2185b" stop-opacity="0.5"/></linearGradient>
        </defs>
    </svg>

    <div id="page-curtain" style="position:fixed; inset:0; background:#000; z-index: 9999999; pointer-events: none; transition: opacity 1s; opacity: 1;"></div>

    <div class="top-nav-btn" onclick="navigateTo('index.html')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        回道場
    </div>

    <div id="status-panel">
        <div class="status-title">一真法界 ． 萬法唯心</div>
        <div class="status-desc">「成住壞空，周而復始。<br>唯有菩提，歷劫不滅。」</div>
    </div>

    <canvas id="realmCanvas"></canvas>
    <div id="golden-flash"></div>
    <div id="immortal-seed"></div>
    
    <div id="profound-text">菩提之心 ． 歷劫不滅<br>一真法界 ． 本自如如</div>

    <div id="realm-reward">
        <div id="rr-title" style="color:#d4af37; font-size:1.15rem; letter-spacing: 5px; margin-bottom: 40px; font-weight:bold; text-shadow: 0 0 15px #d4af37;">法界賜寶</div>
        <div class="rr-grid">
            <div class="rr-item" id="ri-1"></div>
            <div class="rr-item" id="ri-2"></div>
            <div class="rr-item" id="ri-3"></div>
        </div>
        <button class="rr-btn" id="rr-btn" onclick="collectAndReturn()">收入多寶閣並歸返</button>
    </div>

    <div class="ui-layer" id="ui-layer">
        <div class="drag-hint">360° 全息滑動 ． 觀相一真</div>
    </div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        // ✨ 完整立體法寶 SVG 資料庫 ✨
        const svgSword = `<svg viewBox="0 0 100 150"><g transform="translate(0, 5)"><polygon points="50,10 56,40 50,105 44,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="50,10 56,40 50,105" fill="url(#facet-cyan)" opacity="0.8"/><polygon points="50,10 44,40 50,105" fill="url(#facet-dark)" opacity="0.6"/><polygon points="35,100 65,100 55,110 45,110" fill="url(#pure-glass)" stroke="#d4af37" stroke-width="0.8"/><polygon points="46,110 54,110 52,135 48,135" fill="url(#facet-dark)"/><polygon points="50,135 56,142 50,148 44,142" fill="url(#facet-light)" stroke="#f3e5ab" stroke-width="1"/><circle cx="50" cy="105" r="4" fill="#fff" filter="drop-shadow(0 0 8px #e0f7fa)"/></g></svg>`;
        const svgVase = `<svg viewBox="0 0 100 150"><g transform="translate(0, 10)"><polygon points="45,20 55,20 60,40 40,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="40,40 60,40 75,90 25,90" fill="url(#facet-cyan)" opacity="0.8" stroke="#fff" stroke-width="0.5"/><polygon points="50,40 60,40 75,90 50,90" fill="url(#facet-dark)" opacity="0.6"/><polygon points="25,90 75,90 60,120 40,120" fill="url(#facet-light)" stroke="#f3e5ab" stroke-width="0.5"/><polygon points="50,90 75,90 60,120 50,120" fill="url(#facet-dark)" opacity="0.7"/><polygon points="40,25 60,25" stroke="#f3e5ab" stroke-width="1"/></g></svg>`;
        const svgJewel = `<svg viewBox="0 0 100 150"><g transform="translate(0, 25)"><polygon points="50,10 80,40 50,55 20,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/><polygon points="20,40 50,55 50,100" fill="url(#facet-rose)" opacity="0.9" stroke="#fff" stroke-width="0.5"/><polygon points="80,40 50,55 50,100" fill="url(#facet-dark)" opacity="0.8" stroke="#fff" stroke-width="0.5"/><polygon points="20,40 35,25 50,55" fill="rgba(255,255,255,0.4)" stroke="#fff" stroke-width="0.3"/><polygon points="80,40 65,25 50,55" fill="rgba(255,255,255,0.2)" stroke="#fff" stroke-width="0.3"/></g></svg>`;
        const svgLotusLamp = `<svg viewBox="0 0 100 150"><g transform="translate(0, 5)"><polygon points="30,120 70,120 60,135 40,135" fill="url(#facet-dark)" stroke="#d4af37" stroke-width="1"/><polygon points="35,110 65,110 70,120 30,120" fill="url(#facet-light)"/><polygon points="50,90 70,70 50,110" fill="url(#facet-cyan)" opacity="0.8" stroke="#fff" stroke-width="0.5"/><polygon points="50,90 30,70 50,110" fill="url(#facet-cyan)" opacity="0.5" stroke="#fff" stroke-width="0.5"/><polygon points="50,80 80,50 50,105" fill="url(#facet-rose)" opacity="0.7" stroke="#fff" stroke-width="0.5"/><polygon points="50,80 20,50 50,105" fill="url(#facet-rose)" opacity="0.4" stroke="#fff" stroke-width="0.5"/><polygon points="50,20 60,50 50,80 40,50" fill="url(#facet-light)" stroke="#fff" stroke-width="1"/><polygon points="50,20 60,50 50,80" fill="url(#facet-dark)" opacity="0.5"/><circle cx="50" cy="50" r="15" fill="none" stroke="#f3e5ab" stroke-width="0.5" filter="drop-shadow(0 0 10px #d4af37)"/></g></svg>`;
        const svgDharmaWheel = `<svg viewBox="0 0 100 150"><g transform="translate(0, 10)"><polygon points="40,110 60,110 65,125 35,125" fill="url(#facet-dark)" stroke="#d4af37" stroke-width="1"/><polygon points="50,15 75,25 85,50 75,75 50,85 25,75 15,50 25,25" fill="rgba(212,175,55,0.1)" stroke="url(#facet-light)" stroke-width="1.5"/><polygon points="50,25 68,32 75,50 68,68 50,75 32,68 25,50 32,32" fill="none" stroke="url(#facet-dark)" stroke-width="1"/><g stroke="#fff" stroke-width="1.5" opacity="0.8"><line x1="50" y1="25" x2="50" y2="75"/><line x1="25" y1="50" x2="75" y2="50"/><line x1="32" y1="32" x2="68" y2="68"/><line x1="32" y1="68" x2="68" y2="32"/></g><polygon points="50,40 60,50 50,60 40,50" fill="url(#facet-light)" stroke="#d4af37" stroke-width="1"/><polygon points="50,40 60,50 50,60" fill="url(#facet-dark)" opacity="0.6"/></g></svg>`;
        const svgWhiteLotus = `<svg viewBox="0 0 100 150"><g transform="translate(0, 15)"><polygon points="50,20 75,50 50,75 25,50" fill="url(#facet-cyan)" opacity="0.6" stroke="#fff" stroke-width="0.5"/><polygon points="50,30 85,60 50,85 15,60" fill="url(#facet-rose)" opacity="0.5" stroke="#fff" stroke-width="0.5"/><polygon points="50,10 65,45 50,85" fill="url(#facet-light)" opacity="0.9" stroke="#fff" stroke-width="0.5"/><polygon points="50,10 35,45 50,85" fill="url(#facet-light)" opacity="0.6" stroke="#fff" stroke-width="0.5"/><polygon points="50,35 75,70 50,95" fill="url(#facet-light)" opacity="0.9" stroke="#fff" stroke-width="0.5"/><polygon points="50,35 25,70 50,95" fill="url(#facet-light)" opacity="0.6" stroke="#fff" stroke-width="0.5"/><polygon points="50,50 60,75 50,100 40,75" fill="#fff" stroke="#f3e5ab" stroke-width="0.5"/><polygon points="50,50 60,75 50,100" fill="url(#facet-dark)" opacity="0.4"/></g></svg>`;

        let activeRewardType = null;
        let audioCtx;

        function playDharmaSound(phase) {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                if (phase === 'form') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(108, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(216, audioCtx.currentTime + 8);
                    gain.gain.setValueAtTime(0.01, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 4); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 10);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 10);
                } else if (phase === 'seed') { 
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(864, audioCtx.currentTime);
                    gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 4);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 4);
                }
            } catch(e) {}
        }

        const canvas = document.getElementById('realmCanvas'); const ctx = canvas.getContext('2d');
        let width, height; let particles = []; let time = 0; let angleX = 0.3, angleY = 0; let isDragging = false; let lastMouseX = 0, lastMouseY = 0; const FOV = 450; let state = 0; 

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        function initParticles() {
            particles = []; const totalLayers = 6; const pointsPerLayer = 108;
            for (let l = 0; l < totalLayers; l++) {
                let radius = 50 + l * 50; let yOffset = Math.pow(l, 1.5) * 15 - 50; 
                for (let p = 0; p < pointsPerLayer; p++) {
                    let theta = (p / pointsPerLayer) * Math.PI * 2; let wave = Math.sin(theta * 8) * (10 + l * 5); 
                    particles.push({
                        x: (Math.random() - 0.5) * 3000, y: (Math.random() - 0.5) * 3000, z: (Math.random() - 0.5) * 3000,
                        tx: (radius + wave) * Math.cos(theta), ty: yOffset + Math.abs(wave) * 0.5, tz: (radius + wave) * Math.sin(theta),
                        c: (l % 2 === 0) ? 'rgba(212,175,55,' : 'rgba(139,168,156,', size: Math.random() * 1.5 + 0.5, baseSize: Math.random() * 1.5 + 0.5, phase: Math.random() * Math.PI * 2
                    });
                }
            }
            for (let i = 0; i < 50; i++) { particles.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: (Math.random() - 0.5) * 2000, tx: (Math.random() - 0.5) * 20, ty: (Math.random() - 0.5) * 20, tz: (Math.random() - 0.5) * 20, c: 'rgba(255,255,255,', size: 2.5, baseSize: 2.5, phase: 0 }); }
        }

        function project3D(x, y, z) {
            let cosX = Math.cos(angleX), sinX = Math.sin(angleX), cosY = Math.cos(angleY), sinY = Math.sin(angleY);
            let y1 = y*cosX - z*sinX, z1 = y*sinX + z*cosX; let x2 = x*cosY - z1*sinY, z2 = x*sinY + z1*cosY;
            if(z2 < -FOV+10) return null; let scale = FOV / (FOV + z2); return { x: (width/2) + x2*scale, y: (height/2) - y1*scale, scale: scale, z: z2 };
        }

        function animate() {
            ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = (state === 3) ? `rgba(0,0,0,0.4)` : `rgba(1,1,2,0.6)`; ctx.fillRect(0, 0, width, height);
            time += 0.02; if(!isDragging && state >= 1 && state < 3) angleY -= 0.002; if(state === 3) angleY -= 0.05; 
            ctx.globalCompositeOperation = 'screen'; let projected = [];
            particles.forEach(p => {
                if (state === 0) { p.z -= 5; if(p.z < -1000) { p.z = 2000; p.x = (Math.random() - 0.5) * 3000; p.y = (Math.random() - 0.5) * 3000; } } 
                else if (state === 1) { p.x += (p.tx - p.x) * 0.015; p.y += (p.ty - p.y) * 0.015; p.z += (p.tz - p.z) * 0.015; } 
                else if (state === 2) { p.y = p.ty + Math.sin(time * 2 + p.phase) * 5; p.size = p.baseSize * (1 + Math.sin(time * 3 + p.phase) * 0.5); } 
                else if (state === 3) { p.x *= 0.85; p.y *= 0.85; p.z *= 0.85; }
                let proj = project3D(p.x, p.y, p.z); if(proj) projected.push({ x: proj.x, y: proj.y, z: proj.z, sc: proj.scale, c: p.c, s: p.size });
            });
            projected.sort((a,b) => b.z - a.z);
            projected.forEach(p => {
                let s = p.s * p.sc; if(s < 0.1) return;
                ctx.beginPath(); ctx.arc(p.x, p.y, s, 0, Math.PI*2);
                let alpha = (state === 0) ? Math.min(1, p.sc * 2) : Math.min(1, p.sc * 0.8); ctx.fillStyle = p.c + `${alpha})`;
                if (state >= 1 && state < 3 && s > 1.5) { ctx.shadowBlur = 10; ctx.shadowColor = p.c + '1)'; } else { ctx.shadowBlur = 0; }
                ctx.fill();
            });
            if (state < 4) requestAnimationFrame(animate); else { ctx.clearRect(0,0,width,height); } 
        }

        function onDown(e) { if(state === 3 || state === 4) return; isDragging = true; lastMouseX = e.touches?e.touches[0].clientX:e.clientX; lastMouseY = e.touches?e.touches[0].clientY:e.clientY; }
        function onMove(e) { if (!isDragging) return; let curX = e.touches?e.touches[0].clientX:e.clientX; let curY = e.touches?e.touches[0].clientY:e.clientY; angleY += (curX-lastMouseX)*0.008; angleX += (curY-lastMouseY)*0.008; angleX = Math.max(-Math.PI/2, Math.min(Math.PI/2, angleX)); lastMouseX=curX; lastMouseY=curY; }
        function onUp() { isDragging = false; }
        canvas.addEventListener('mousedown', onDown); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
        canvas.addEventListener('touchstart', onDown, {passive: true}); canvas.addEventListener('touchmove', onMove, {passive: true}); window.addEventListener('touchend', onUp);

        // ================= 劇本：成住壞空與雙階賜寶 =================
        async function runZenEngine() {
            initParticles(); animate();
            await sleep(100); document.getElementById('page-curtain').style.opacity = '0';
            await sleep(2000);

            // 成住壞空
            state = 1; playDharmaSound('form'); document.getElementById('status-panel').style.opacity = '1'; await sleep(6000); 
            state = 2; document.getElementById('ui-layer').style.opacity = '1'; await sleep(12000); 
            state = 3; document.getElementById('ui-layer').style.opacity = '0'; document.getElementById('status-panel').style.opacity = '0'; await sleep(2500);
            const flash = document.getElementById('golden-flash'); flash.style.opacity = '1'; playDharmaSound('seed'); await sleep(200); 
            state = 4; flash.style.transition = 'opacity 4s ease-in'; flash.style.opacity = '0'; await sleep(3000); 

            // 菩提
            const immortalSeed = document.getElementById('immortal-seed');
            immortalSeed.style.opacity = '1'; immortalSeed.classList.add('seed-heartbeat');
            await sleep(2000); document.getElementById('profound-text').style.opacity = '1'; 

            // ==========================================
            // 💥 【終極防呆】：自動同步主系統並強制上鎖
            // ==========================================
            let db;
            try { db = JSON.parse(localStorage.getItem('PX_V15.0')) || {}; } catch(e) { db = {}; }
            let currentDays = (db.points || 0) / 100; 
            if (!db.milestones) db.milestones = {};

            // 1. 強制算好正確位階並寫入，徹底阻斷主系統迴圈
            let calculatedRank = "";
            if (currentDays >= 111100) { let lv = Math.min(10, Math.floor((currentDays - 111100) / 100000) + 1); calculatedRank = ["初地", "二地", "三地", "四地", "五地", "六地", "七地", "八地", "九地", "十地"][lv - 1] + "菩薩"; }
            else if (currentDays >= 11100) { let lv = Math.floor((currentDays - 11100) / 10000) + 1; calculatedRank = ["初", "二", "三", "四", "五", "六", "七", "八", "九", "十"][lv - 1] + "迴向位"; }
            else if (currentDays >= 1100) { let lv = Math.floor((currentDays - 1100) / 1000) + 1; calculatedRank = ["初", "二", "三", "四", "五", "六", "七", "八", "九", "十"][lv - 1] + "行位"; }
            else if (currentDays >= 100) { let lv = Math.floor((currentDays - 100) / 100) + 1; calculatedRank = ["初住", "二住", "三住", "四住", "五住", "六住", "七住", "八住", "九住", "十住"][lv - 1] + "位"; }
            else { let lv = Math.min(10, Math.floor(currentDays / 10) + 1); calculatedRank = ["初信位", "二信位", "三信位", "四信位", "五信位", "六信位", "七信位", "八信位", "九信位", "十信位"][lv - 1]; }
            
            db.currentRank = calculatedRank;
            localStorage.setItem('PX_V15.0', JSON.stringify(db));

            // 2. 判定發放獎勵 (千日優先，其次百日)
            if (currentDays >= 1000 && !db.milestones['rank_100']) {
                activeRewardType = 'rank_100';
            } else if (currentDays >= 90 && !db.milestones['rank_10']) {
                activeRewardType = 'rank_10';
            }

            // 3. 渲染對應法寶介面
            if (activeRewardType) {
                await sleep(3000); 
                document.getElementById('profound-text').style.opacity = '0'; 
                await sleep(1000);

                const titleEl = document.getElementById('rr-title');
                const ri1 = document.getElementById('ri-1');
                const ri2 = document.getElementById('ri-2');
                const ri3 = document.getElementById('ri-3');

                if (activeRewardType === 'rank_100') {
                    titleEl.innerHTML = "十住圓滿 ‧ 法界賜寶";
                    ri1.innerHTML = `<div class="rr-svg">${svgLotusLamp}</div><div class="rr-count">x 3</div><div class="rr-name">金剛蓮華燈</div>`;
                    ri2.innerHTML = `<div class="rr-svg">${svgDharmaWheel}</div><div class="rr-count">x 3</div><div class="rr-name">八吉祥法輪</div>`;
                    ri3.innerHTML = `<div class="rr-svg">${svgWhiteLotus}</div><div class="rr-count">x 3</div><div class="rr-name">甘露白蓮華</div>`;
                } else {
                    titleEl.innerHTML = "十信圓滿 ‧ 法界賜寶";
                    ri1.innerHTML = `<div class="rr-svg">${svgSword}</div><div class="rr-count">x 10</div><div class="rr-name">幾何慧劍</div>`;
                    ri2.innerHTML = `<div class="rr-svg">${svgVase}</div><div class="rr-count">x 10</div><div class="rr-name">琉璃淨瓶</div>`;
                    ri3.innerHTML = `<div class="rr-svg">${svgJewel}</div><div class="rr-count">x 10</div><div class="rr-name">多面寶珠</div>`;
                }

                const rewardUI = document.getElementById('realm-reward');
                rewardUI.style.opacity = '1'; rewardUI.style.pointerEvents = 'auto';

                setTimeout(() => { ri1.style.opacity = '1'; ri1.style.transform = 'translateY(0)'; }, 500);
                setTimeout(() => { ri2.style.opacity = '1'; ri2.style.transform = 'translateY(0)'; }, 1500);
                setTimeout(() => { ri3.style.opacity = '1'; ri3.style.transform = 'translateY(0)'; }, 2500);
                setTimeout(() => { document.getElementById('rr-btn').style.opacity = '1'; }, 4000);

                try {
                    let voiceText = activeRewardType === 'rank_100' ? "十住圓滿，法界賜與高階法寶，請收入多寶閣。" : "十信圓滿，法界賜寶，請收入多寶閣。";
                    let m = new SpeechSynthesisUtterance(voiceText); m.lang = 'zh-TW'; m.rate = 0.85; window.speechSynthesis.speak(m);
                } catch(e) {}
            } else {
                await sleep(9000); navigateTo('index.html'); 
            }
        }

        // ================= 收下寶物並絕對安全存檔 =================
        function collectAndReturn() {
            document.getElementById('rr-btn').style.transform = 'scale(0.9)';
            document.getElementById('realm-reward').style.opacity = '0';
            
            let db;
            try { db = JSON.parse(localStorage.getItem('PX_V15.0')) || {}; } catch(e) { db = {}; }
            
            // 💥 全庫存安全初始化：防範 NaN 壞檔 Bug
            if (!db.treasures) db.treasures = {};
            db.treasures.sword = db.treasures.sword || 0;
            db.treasures.vase = db.treasures.vase || 0;
            db.treasures.jewel = db.treasures.jewel || 0;
            db.treasures.lotus_lamp = db.treasures.lotus_lamp || 0;
            db.treasures.dharma_wheel = db.treasures.dharma_wheel || 0;
            db.treasures.white_lotus = db.treasures.white_lotus || 0;
            db.treasures.indra_net = db.treasures.indra_net || 0;

            if (!db.milestones) db.milestones = {};
            
            // 給予法寶並強制上鎖
            if (activeRewardType === 'rank_100') {
                db.treasures.lotus_lamp += 3;
                db.treasures.dharma_wheel += 3;
                db.treasures.white_lotus += 3;
                db.milestones['rank_100'] = true;
            } else if (activeRewardType === 'rank_10') {
                db.treasures.sword += 10;
                db.treasures.vase += 10;
                db.treasures.jewel += 10;
                db.milestones['rank_10'] = true;
            }
            
            localStorage.setItem('PX_V15.0', JSON.stringify(db));
            navigateTo('index.html');
        }

        function navigateTo(url) {
            document.getElementById('page-curtain').style.opacity = '1';
            setTimeout(() => { window.location.href = url; }, 1000);
        }

        window.addEventListener('load', runZenEngine);
    </script>
</body>
