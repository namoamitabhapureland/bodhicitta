    <style>

        .top-nav-btn { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; z-index: 1000; cursor: pointer; backdrop-filter: blur(5px); transition: opacity 0.8s, transform 0.3s; }

        #status-panel { position: absolute; top: 70px; left: 5%; width: 90%; max-width: 340px; border-left: 2px solid rgba(212,175,55,0.8); padding: 10px 20px; z-index: 100; pointer-events: none; opacity: 0; transition: opacity 2s ease-in-out; }

        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
        #golden-flash { position: fixed; inset: 0; background: radial-gradient(circle, #ffffff 0%, #f3e5ab 40%, #d4af37 100%); mix-blend-mode: screen; opacity: 0; z-index: 99998; pointer-events: none; transition: opacity 0.2s ease-out; }
        #immortal-seed { position: absolute; top: 50%; left: 50%; margin-top: -12px; margin-left: -12px; width: 24px; height: 24px; background: radial-gradient(circle, #fff 10%, #ffe 30%, var(--gold) 60%, var(--solid-gold) 100%); border-radius: 50%; opacity: 0; filter: blur(1.5px); transition: opacity 2s, top 2s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 100; }
        .seed-heartbeat { animation: heartbeat-pulse 1.4s infinite cubic-bezier(0.2, 0.8, 0.4, 1); }
        @keyframes heartbeat-pulse { 0% { transform: scale(1); box-shadow: 0 0 30px var(--gold), 0 0 60px var(--solid-gold); } 15% { transform: scale(1.6); box-shadow: 0 0 60px var(--gold), 0 0 120px var(--solid-gold), 0 0 180px #fff; } 30% { transform: scale(1.2); box-shadow: 0 0 40px var(--gold), 0 0 80px var(--solid-gold); } 45% { transform: scale(1.6); box-shadow: 0 0 60px var(--gold), 0 0 120px var(--solid-gold), 0 0 180px #fff; } 100% { transform: scale(1); box-shadow: 0 0 30px var(--gold), 0 0 60px var(--solid-gold); } }
        
        #profound-text { position: absolute; top: calc(12% + 20px); width: 100%; color: var(--gold); font-size: 1.05rem; letter-spacing: 5px; word-spacing: 8px; opacity: 0; transition: opacity 4s ease; text-align: center; text-shadow: 0 0 15px var(--solid-gold), 0 0 3px #fff; line-height: 1.8; font-weight: 300; z-index: 100; pointer-events: none; }
        .ui-layer { position: absolute; bottom: 8%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; opacity: 0; transition: opacity 2s;}
        .drag-hint { color:rgba(212,175,55,0.6); font-size:0.75rem; letter-spacing:2px; text-shadow: 0 0 5px rgba(0,0,0,0.8); }

        #cert-ui { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -40%); width: 88%; max-width: 380px; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 2.5s ease, transform 2.5s cubic-bezier(0.2, 0.8, 0.2, 1); background: linear-gradient(135deg, rgba(12, 15, 14, 0.85), rgba(2, 3, 2, 0.95)); border: 1px solid rgba(212, 175, 55, 0.35); border-radius: 20px; padding: 30px 20px 25px 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.9), inset 0 0 25px rgba(243,229,171,0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: flex; flex-direction: column; align-items: center; }
        #cert-ui::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; border-radius: 20px; background: radial-gradient(circle at 50% 15%, rgba(212,175,55,0.15) 0%, transparent 60%); pointer-events: none; z-index: -1; }
        .cert-header { color: rgba(243,229,171,0.7); font-size: 0.85rem; letter-spacing: 6px; margin-bottom: 20px; font-weight: bold; }
        .gem-container { width: 130px; height: 130px; margin-bottom: 15px; position: relative; display: flex; justify-content: center; align-items: center; }
        .gem-svg { position: absolute; width: 100%; height: 100%; transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); filter: drop-shadow(0 0 12px rgba(255,255,255,0.15)); }
        .cert-name-wrap { text-align: center; margin-bottom: 15px; width: 100%; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 15px; }
        .cert-name-label { color: var(--cyan); font-size: 0.7rem; letter-spacing: 4px; margin-bottom: 6px; }
        .cert-name { color: var(--gold); font-size: 1.4rem; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 12px rgba(212,175,55,0.6); }
        .cert-desc { color: #ddd; font-size: 0.85rem; line-height: 2.1; letter-spacing: 1.5px; text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin-bottom: 25px; min-height: 100px; }

        .cert-desc-title { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; color: var(--gold); font-size: 0.95rem; letter-spacing: 2px; font-weight: bold; text-shadow: 0 0 8px rgba(212,175,55,0.4); }

        .btn-claim:active { transform: scale(0.95); background: rgba(212,175,55,0.4); }
        .btn-screenshot { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(139,168,156,0.4); background: rgba(255,255,255,0.03); color: var(--cyan); cursor: pointer; transition: all 0.3s; }
        .btn-screenshot:active { transform: scale(0.9); background: rgba(139,168,156,0.2); }
        .btn-screenshot svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.5; }
        #fast-preview { position: absolute; top: 50%; width: 100%; transform: translateY(-50%); color: var(--cyan); font-size: 1.15rem; letter-spacing: 4px; opacity: 0; text-align: center; text-shadow: 0 0 20px rgba(139,168,156,0.8); font-weight: bold; z-index: 100; pointer-events: none; transition: opacity 0.3s ease-in-out; padding: 0 20px; }

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        let audioCtx;
        function playDharmaSound(phase) {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                if (phase === 'preview') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(108, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(864, audioCtx.currentTime + 4.0); 
                    gain.gain.setValueAtTime(0.01, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.5); gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 3.5); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 4.0);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 4.0);
                } else if (phase === 'form') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(108, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(216, audioCtx.currentTime + 6);
                    gain.gain.setValueAtTime(0.01, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 3); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 6);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 6);
                } else if (phase === 'seed') { 
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(864, audioCtx.currentTime);
                    gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 3);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 3);
                }
            } catch(e) {}
        }

        const canvas = document.getElementById('realmCanvas'); const ctx = canvas.getContext('2d');
        let width, height; let particles = []; let time = 0; let angleX = 0.3, angleY = 0; let isDragging = false; let lastMouseX = 0, lastMouseY = 0; const FOV = 400; let state = -1; 
        let realmParticles = []; let currentPreviewId = 1;
        const PastelColors = [
            { hsl: "350, 100%, 85%", hex: "#FFB7C5" }, { hsl: "120, 100%, 85%", hex: "#98FB98" }, 
            { hsl: "210, 100%, 85%", hex: "#87CEFA" }, { hsl: "30, 100%, 80%", hex: "#FFDAB9" }, 
            { hsl: "0, 0%, 80%", hex: "#D3D3D3" }, { hsl: "270, 100%, 85%", hex: "#E6E6FA" }
        ];

        function getRandomPastel() { return PastelColors[Math.floor(Math.random()*PastelColors.length)]; }
        function addColorfulParticle(x, y, z, extra = {}) { realmParticles.push({ x, y, z, ...extra, col: getRandomPastel() }); }

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        function project3D(x, y, z) {
            let cosX = Math.cos(angleX), sinX = Math.sin(angleX), cosY = Math.cos(angleY), sinY = Math.sin(angleY);
            let y1 = y*cosX - z*sinX, z1 = y*sinX + z*cosX;
            let x2 = x*cosY - z1*sinY, z2 = x*sinY + z1*cosY;
            if(z2 < -FOV+50) return null;
            let scale = FOV / (FOV + z2 + 100); 
            return { px: (width/2) + x2*scale, py: (height/2) - y1*scale + 20, scale: scale, pz: z2 };
        }

        // 🌟 修正了第二重境界 (id === 2) 的變數名稱 ReferenceError
        function initPreviewRealm(id) {
            realmParticles = []; currentPreviewId = id;
            if (id === 1) { 
                let N = 800, R = 180, gA = Math.PI * (3 - Math.sqrt(5)); 
                for(let i=0; i<N; i++) { let y = 1 - (i / (N - 1)) * 2, rad = Math.sqrt(1 - y*y), th = gA * i; addColorfulParticle(Math.cos(th)*rad*R, y*R, Math.sin(th)*rad*R, { seed: Math.random()*Math.PI*2, type: 'mani' }); } 
            } else if (id === 2) { 
                for (let l = 0; l < 4; l++) { 
                    // 🌟 修正：確保迴圈內部能取到正確命名的變數 rOut 和 hUp
                    let pC = [6, 8, 10, 12][l], rOut = 40 + l * 25, hUp = 20 + l * 20; 
                    for (let p = 0; p < pC; p++) { 
                        let aC = (Math.PI * 2 / pC) * p + (l * 0.3); 
                        for (let t = 0; t <= 1; t += 0.1) { 
                            for (let w = -1; w <= 1; w += 0.4) { 
                                let pW = Math.sin(t * Math.PI) * (15 + l * 5), cR = t * rOut, cY = -t * hUp + (w * w * 12); 
                                realmParticles.push({ x: cR * Math.cos(aC) - (w * pW) * Math.sin(aC), y: cY + 40, z: cR * Math.sin(aC) + (w * pW) * Math.cos(aC), type: 'lotus', l: l, t: t, col: {hsl: "139, 168, 156"} }); 
                            } 
                        } 
                    } 
                }
                for(let i=0; i<300; i++) addColorfulParticle((Math.random()-0.5)*300, Math.random()*200-50, (Math.random()-0.5)*300, { type: 'aroma', sy: Math.random()*0.8+0.3, seed: Math.random()*Math.PI*2 });
            } else if (id === 3) { 
                for(let b = 1; b < 16; b++) { let phi = (Math.PI / 16) * b; for(let s = 0; s < 32; s++) { let theta = (Math.PI * 2 / 32) * s; realmParticles.push({ x: 130 * Math.sin(phi) * Math.cos(theta), y: 130 * Math.cos(phi), z: 130 * Math.sin(phi) * Math.sin(theta), theta: theta, phi: phi, type: 'grid', col:{hsl:"0,0%,88%"} }); } } 
                for(let i = 0; i < 150; i++) { let t = Math.random() * Math.PI * 2, p = Math.acos((Math.random() * 2) - 1), r = Math.random() * 50; realmParticles.push({ x: r*Math.sin(p)*Math.cos(t), y: r*Math.cos(p), z: r*Math.sin(p)*Math.sin(t), speed: Math.random()*0.05+0.02, type: 'core', col:{hsl:"0,0%,100%"} }); }
            } else if (id === 4) { 
                for(let l = 1; l <= 6; l++) { let rL = l * 25, yO = Math.sin(l * 0.5) * 20; for(let p = 0; p < 12; p++) { let ang = (Math.PI * 2 / 12) * p + (l * 0.2); for(let t = 0; t <= 1; t += 0.15) { realmParticles.push({ x: rL * t * Math.cos(ang), y: yO * t - (t * t * 40), z: rL * t * Math.sin(ang), l: l, p: p, t: t, type: 'net' }); } } } 
            } else if (id === 5) { 
                for(let i=0; i<300; i++) { let t = Math.random() * Math.PI * 2, p = Math.acos((Math.random() * 2) - 1), r = Math.random() * 40; addColorfulParticle(r*Math.sin(p)*Math.cos(t), r*Math.cos(p), r*Math.sin(p)*Math.sin(t), { type: 'mani-core' }); }

            let currentDays = (db.points || 0) / 100;
            let ms = db.milestones || {};
            
            // 🌟 觀想境界決定：永遠根據點數播放對應的 4 重動畫 (不論是否領證)
            let displayRealms = [1, 2, 3, 4];
            if (currentDays >= 111100) displayRealms = [17, 18, 19, 20];
            else if (currentDays >= 11100) displayRealms = [13, 14, 15, 16];
            else if (currentDays >= 1100) displayRealms = [9, 10, 11, 12];
            else if (currentDays >= 100) displayRealms = [5, 6, 7, 8];

            const RealmNames = [
                "普光明照", "香蓮華寶", "普光摩尼", "妙華光明", "出妙華光", "清淨妙明", "華光莊嚴", "威光普照", "出妙音聲", "金剛寶幢", 
                "出青蓮華", "普照大明", "娑婆極樂", "無塵寂靜", "妙明寶燈", "清淨光照", "寶華莊嚴", "離塵清淨", "普照十方", "妙寶焰光"
            ];
            
            const previewEl = document.getElementById('fast-preview');
            previewEl.style.opacity = '1'; playDharmaSound('preview'); 
            
            for(let id of displayRealms) {
                previewEl.innerText = `第 ${id} 重 ． ${RealmNames[id-1]}`;
                initPreviewRealm(id); 
                await sleep(1000);
            }
            
            previewEl.style.opacity = '0'; realmParticles = []; await sleep(500);
            
            state = 0; initParticles(); await sleep(500);

            state = 1; playDharmaSound('form'); document.getElementById('status-panel').style.opacity = '1'; await sleep(3000); 
            state = 2; document.getElementById('ui-layer').style.opacity = '1'; await sleep(6000); 
            state = 3; document.getElementById('ui-layer').style.opacity = '0'; document.getElementById('status-panel').style.opacity = '0'; await sleep(2000);
            
            const flash = document.getElementById('golden-flash'); flash.style.opacity = '1'; playDharmaSound('seed'); await sleep(200); 
            state = 4; flash.style.transition = 'opacity 4s ease-in'; flash.style.opacity = '0'; await sleep(2500); 

            const immortalSeed = document.getElementById('immortal-seed');
            immortalSeed.style.opacity = '1'; immortalSeed.classList.add('seed-heartbeat');
            await sleep(1000); 
            
            immortalSeed.style.top = '15%'; 
            document.getElementById('profound-text').style.opacity = '1'; 
            await sleep(1000);

            // 🌟 證書判定邏輯 (僅當達標且尚未領取時，才會阻擋並彈出證書)
            let rankData = null;
            if (currentDays >= 111100 && !ms['rank_ground_10']) {
                rankData = { lock: 'rank_ground_10', svg: 'svg-ground', tts: '十地行圓。請斂心為印，默然歸返。', html: `<div class="cert-desc-title"><svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>百萬不退，十地行圓。<svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg></div>福慧兩足，等覺妙覺在望。<br>法界一相，今趣「無上正等正覺」，<br>以「般若」徹照萬法皆空，<br>無功用行，圓滿佛果，普度十方。` };
            } else if (currentDays >= 11100 && !ms['rank_dedication_10']) {
                rankData = { lock: 'rank_dedication_10', svg: 'svg-dedication', tts: '迴向功圓。請斂心為印，默然歸返。', html: `<div class="cert-desc-title"><svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>十萬恆持，迴向功圓。<svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg></div>三處迴向，心無所住而生其心。<br>聖凡同體，今登「初地」歡喜地，<br>當證無生忍，以「禪定」入深三昧，<br>破除無明，法雲普蔭大千。` };
            } else if (currentDays >= 1100 && !ms['rank_practice_10']) {
                rankData = { lock: 'rank_practice_10', svg: 'svg-practice', tts: '十行圓滿。請斂心為印，默然歸返。', html: `<div class="cert-desc-title"><svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>萬日踐履，十行圓滿。<svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg></div>於一切法中，行無相真實行。<br>大乘心廣，今邁入「初迴向位」，<br>當以「忍辱」與「精進」為基，<br>迴事向理，迴自向他，悲智雙運。` };
            } else if (currentDays >= 1000 && !ms['rank_abiding_10']) {
                rankData = { lock: 'rank_abiding_10', svg: 'svg-abode', tts: '十住功成。請斂心為印，默然歸返。', html: `<div class="cert-desc-title"><svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>千日堅守，十住功成。<svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg></div>生如來家，安住真如本性。<br>菩薩行深，今邁入「初行位」，<br>當勤修六度，側重<span class="highlight">「持戒」</span>，<br>以清淨梵行，嚴飾菩提，不捨有情。` };
            } else if (currentDays >= 90 && !ms['rank_10']) {
                rankData = { lock: 'rank_10', svg: 'svg-faith', tts: '十信功圓。請斂心為印，默然歸返。', html: `<div class="cert-desc-title"><svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>百日梵行，十信功圓。<svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg></div>已成就信、念、精進等菩提心要。<br>菩薩行起，今邁入「初住位」，<br>當預修六度，首重<span class="highlight">「布施」</span>，<br>以捨對治慳貪，廣度有情。` };
            }

            if (rankData) {
                window.currentMilestoneLock = rankData.lock;
                document.getElementById('cert-text-body').innerHTML = rankData.html;
                document.getElementById('cert-name-insert').innerText = db.name || "無 名";

                ['svg-faith', 'svg-abode', 'svg-practice', 'svg-dedication', 'svg-ground'].forEach(id => {
                    let el = document.getElementById(id);
                    if (el) { el.style.opacity = (id === rankData.svg) ? '1' : '0'; el.style.transform = (id === rankData.svg) ? 'scale(1)' : 'scale(0.8)'; }
                });

                const certUI = document.getElementById('cert-ui');
                certUI.style.opacity = '1'; certUI.style.pointerEvents = 'auto';

                try { let m = new SpeechSynthesisUtterance(rankData.tts); m.lang = 'zh-TW'; m.rate = 0.85; window.speechSynthesis.speak(m); } catch(e) {}
            } else {
                await sleep(3000); navigateTo('index.html');
            }
        }

        function claimCertificate() {
            document.getElementById('cert-ui').style.opacity = '0';
            let db; try { db = JSON.parse(localStorage.getItem('PX_V15.0')) || {}; } catch(e) { db = {}; }
            
            if (!db.milestones) db.milestones = {};
            if (window.currentMilestoneLock) db.milestones[window.currentMilestoneLock] = true;
            
            let currentDays = (db.points || 0) / 100; 
            let calculatedRank = "";
            if (currentDays >= 111100) { let lv = Math.min(10, Math.floor((currentDays - 111100) / 100000) + 1); calculatedRank = ["初地", "二地", "三地", "四地", "五地", "六地", "七地", "八地", "九地", "十地"][lv - 1] + "菩薩"; }
            else if (currentDays >= 11100) { let lv = Math.floor((currentDays - 11100) / 10000) + 1; calculatedRank = ["初", "二", "三", "四", "五", "六", "七", "八", "九", "十"][lv - 1] + "迴向位"; }
            else if (currentDays >= 1100) { let lv = Math.floor((currentDays - 1100) / 1000) + 1; calculatedRank = ["初", "二", "三", "四", "五", "六", "七", "八", "九", "十"][lv - 1] + "行位"; }
            else if (currentDays >= 100) { let lv = Math.floor((currentDays - 100) / 100) + 1; calculatedRank = ["初住", "二住", "三住", "四住", "五住", "六住", "七住", "八住", "九住", "十住"][lv - 1] + "位"; }
            else { let lv = Math.min(10, Math.floor(currentDays / 10) + 1); calculatedRank = ["初信位", "二信位", "三信位", "四信位", "五信位", "六信位", "七信位", "八信位", "九信位", "十信位"][lv - 1]; }
            db.currentRank = calculatedRank;

            localStorage.setItem('PX_V15.0', JSON.stringify(db));
            navigateTo('index.html');
        }

        function toggleScreenshotMode() {
            document.getElementById('cert-actions').style.opacity = '0'; document.getElementById('top-nav').style.opacity = '0';
            const restoreUI = () => { document.getElementById('cert-actions').style.opacity = '1'; document.getElementById('top-nav').style.opacity = '1'; window.removeEventListener('click', restoreUI); window.removeEventListener('touchstart', restoreUI); };
            setTimeout(() => { window.addEventListener('click', restoreUI); window.addEventListener('touchstart', restoreUI, { passive: true }); setTimeout(restoreUI, 5000); }, 100);
        }

        function navigateTo(url) { document.getElementById('page-curtain').style.opacity = '1'; setTimeout(() => { window.location.href = url; }, 1000); }
        function unlockAudio() { if (audioCtx && audioCtx.state === 'suspended') { audioCtx.resume(); } else if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioCtx.resume(); } }
        window.addEventListener('click', unlockAudio); window.addEventListener('touchstart', unlockAudio, { passive: true });
        window.addEventListener('load', runZenEngine);
    </script>
</body>
</html>
