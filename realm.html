let audioCtx;
function playDharmaSound(phase) {
    try {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        let osc = audioCtx.createOscillator(); 
        let gain = audioCtx.createGain();
        if (phase === 'preview') { 
            osc.type = 'sine'; osc.frequency.setValueAtTime(108, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(864, audioCtx.currentTime + 4.0); 
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.5); 
            gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 3.5); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 4.0);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 4.0);
        } else if (phase === 'form') { 
            osc.type = 'sine'; osc.frequency.setValueAtTime(108, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(216, audioCtx.currentTime + 6);
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 3); 
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 6);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 6);
        } else if (phase === 'seed') { 
            osc.type = 'triangle'; osc.frequency.setValueAtTime(864, audioCtx.currentTime);
            gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 3);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 3);
        }
    } catch(e) {}
}

const canvas = document.getElementById('realmCanvas'); const ctx = canvas.getContext('2d');
let width, height; let particles = []; let time = 0; let angleX = 0.3, angleY = 0; let isDragging = false; let lastMouseX = 0, lastMouseY = 0; const FOV = 450; let state = -1; 
let realmParticles = []; let currentPreviewId = 1;
const PastelColors = [
    { hsl: "350, 100%, 85%", hex: "#FFB7C5" }, { hsl: "120, 100%, 85%", hex: "#98FB98" }, 
    { hsl: "210, 100%, 85%", hex: "#87CEFA" }, { hsl: "30, 100%, 80%", hex: "#FFDAB9" }, 
    { hsl: "0, 0%, 80%", hex: "#D3D3D3" }, { hsl: "270, 100%, 85%", hex: "#E6E6FA" }
];

function getRandomPastel() { return PastelColors[Math.floor(Math.random()*PastelColors.length)]; }
function addColorfulParticle(x, y, z, extra = {}) { realmParticles.push({ x, y, z, ...extra, col: getRandomPastel() }); }

function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
window.addEventListener('resize', resize); resize();

// 🌟 核心投影引擎 (補回缺失的投影函數)
function project3D(x, y, z) {
    let cosX = Math.cos(angleX), sinX = Math.sin(angleX);
    let cosY = Math.cos(angleY), sinY = Math.sin(angleY);
    let y1 = y * cosX - z * sinX, z1 = y * sinX + z * cosX;
    let x2 = x * cosY - z1 * sinY, z2 = x * sinY + z1 * cosY;
    let scale = FOV / (FOV + z2);
    return { x: width/2 + x2 * scale, y: height/2 + y1 * scale, z: z2, scale: scale };
}

// 🌟 20重境界初始化邏輯 (完全補回 500 行的核心細節)
function initPreviewRealm(id) {
    realmParticles = []; currentPreviewId = id;
    if (id === 1) { 
        let N = 400, R = 180, gA = Math.PI * (3 - Math.sqrt(5)); 
        for(let i=0; i<N; i++) { let y = 1 - (i / (N - 1)) * 2, rad = Math.sqrt(1 - y*y), th = gA * i; addColorfulParticle(Math.cos(th)*rad*R, y*R, Math.sin(th)*rad*R, { seed: Math.random()*Math.PI*2 }); } 
    } else if (id === 2) { 
        for (let l = 0; l < 3; l++) { let pC = [6, 8, 10][l], rO = 40 + l * 25, hU = 20 + l * 20; for (let p = 0; p < pC; p++) { let aC = (Math.PI * 2 / pC) * p + (l * 0.3); for (let t = 0; t <= 1; t += 0.2) { for (let w = -1; w <= 1; w += 0.5) { realmParticles.push({ x: (t * rO) * Math.cos(aC) - (Math.sin(t * Math.PI) * (15 + l * 5) * w) * Math.sin(aC), y: (-t * hU + (w * w * 12)) + 40, z: (t * rO) * Math.sin(aC) + (Math.sin(t * Math.PI) * (15 + l * 5) * w) * Math.cos(aC), type: 'lotus', l: l, t: t, col: {hsl: "139, 168, 156"} }); } } } } 
    } else if (id === 3) { 
        for(let b = 1; b < 10; b+=2) { let phi = (Math.PI / 10) * b; for(let s = 0; s < 16; s++) { realmParticles.push({ x: 130 * Math.sin(phi) * Math.cos((Math.PI * 2 / 16) * s), y: 130 * Math.cos(phi), z: 130 * Math.sin(phi) * Math.sin((Math.PI * 2 / 16) * s), theta: (Math.PI * 2 / 16) * s, phi: phi, type: 'grid', col:{hsl:"0,0%,88%"} }); } } 
    } else if (id === 4) { 
        for(let l = 1; l <= 4; l++) { let rL = l * 30, yO = Math.sin(l * 0.5) * 20; for(let p = 0; p < 8; p++) { let ang = (Math.PI * 2 / 8) * p + (l * 0.2); for (let t = 0; t <= 1; t += 0.2) { realmParticles.push({ x: rL * t * Math.cos(ang), y: yO * t - (t * t * 40), z: rL * t * Math.sin(ang), l: l, type: 'net' }); } } } 
    } else if (id === 5) { 
        for(let i=0; i<150; i++) { let t = Math.random() * Math.PI * 2, p = Math.acos((Math.random() * 2) - 1), r = Math.random() * 40; addColorfulParticle(r*Math.sin(p)*Math.cos(t), r*Math.cos(p), r*Math.sin(p)*Math.sin(t), { type: 'mani-core' }); } 
    } else if (id === 6) { 
        let layers = 8, segments = 60; for(let l = 0; l < layers; l++) { let zB = (l - 4) * 30, rB = 120 * Math.sin((l/8) * Math.PI) + 20; for(let i = 0; i < segments; i++) { realmParticles.push({ x: 0, y: 0, z: zB, bR: rB, th: (i/60)*Math.PI*2, l: l, type: 'old9' }); } } 
    } else if (id === 7) { 
        for(let i=0; i<600; i++) { let t = i / 600, a = t * Math.PI * 10, r = t * 160; realmParticles.push({ x: r*Math.cos(a), y: (Math.random()-0.5)*30, z: r*Math.sin(a), hue: (t * 360 * 3) % 360 }); } 
    } else if (id === 8) { 
        for(let i=0; i<300; i++) { let t = Math.random() * Math.PI, p = Math.acos((Math.random() * 2) - 1); addColorfulParticle(140*Math.sin(p)*Math.cos(t), 140*Math.sin(p)*Math.sin(t), 140*Math.cos(p)); } 
    } else if (id === 9) { 
        let w = 120; for(let x = -w; x <= w; x += 30) { for(let y = -40; y <= 40; y += 30) { for(let z = -160; z <= 160; z += 30) { if(Math.abs(x) === w || Math.abs(y) === 40 || Math.abs(z) === 160) addColorfulParticle(x, y, z); } } } 
    } else if (id === 10) { 
        let sz = 110; for(let i=0; i<600; i++) { realmParticles.push({ x: (Math.random()-0.5)*sz*1.9, y: (Math.random()-0.5)*sz*1.9, z: (Math.random()-0.5)*sz*1.9, type:'vimo-line' }); } 
    } else if (id === 11) { 
        for(let i=0; i<400; i++) { let t = Math.random()*Math.PI*2, p = Math.random()*Math.PI; addColorfulParticle(140*Math.pow(Math.abs(Math.cos(p)),0.5)*Math.sign(Math.cos(p))*Math.cos(t), 140*Math.pow(Math.abs(Math.sin(p)),0.5)*Math.sign(Math.sin(p))*Math.sin(t), 140*Math.cos(t)); } 
    } else if (id === 12) { 
        for(let i=0; i<80; i++) { realmParticles.push({ x: (Math.random()-0.5)*120, y: (Math.random()-0.5)*120, z: (Math.random()-0.5)*120, s: Math.random()*2+1, type: 'halo-core' }); } 
    } else if (id === 13) { 
        for(let i = 0; i < 150; i++) { let t = Math.random()*Math.PI*2, p = Math.acos(Math.random()*2-1), r = Math.random()*50+10; realmParticles.push({ x: r*Math.sin(p)*Math.cos(t), y: r*Math.cos(p), z: r*Math.sin(p)*Math.sin(t), s: Math.random()*2+1, type: 'saha' }); realmParticles.push({ x: (r+20)*Math.sin(p)*Math.cos(t), y: (r+20)*Math.cos(p), z: (r+20)*Math.sin(p)*Math.sin(t), s: Math.random()*2+1.5, type: 'pure' }); } 
    } else if (id === 14) { 
        for(let b = 0; b < 8; b++) { let aO = (b / 8) * Math.PI * 2; for(let i = 0; i < 40; i++) { realmParticles.push({ x: 0, y: 0, z: 0, tOffset: (i/40)*Math.PI*2, angOff: aO, type: 'ribbon-14' }); } } 
    } else if (id === 15) { 
        for(let i = 0; i < 8; i++) { let cA = (i/8)*Math.PI*2; for(let a = 0; a < Math.PI * 2; a += 0.2) { realmParticles.push({ cx: 60*Math.cos(cA), cy: 60*Math.sin(cA), cz: Math.sin(i*1.5)*20, ang: a, type: 'lotus-15' }); } } 
    } else if (id === 16) { 
        for(let i=0; i<500; i++) { let p = Math.acos(1-2*i/500), t = Math.PI*(1+Math.sqrt(5))*i; realmParticles.push({ x: 140*Math.sin(p)*Math.cos(t), y: 140*Math.cos(p), z: 140*Math.sin(p)*Math.sin(t), col:{hsl:"48, 100%, 65%"}, glow: "#d4af37" }); } 
    } else if (id === 17) { 
        for(let i=0; i<8; i++) { let rX = Math.random()*Math.PI*2, rY = Math.random()*Math.PI*2, rZ = Math.random()*Math.PI*2; for(let a=0; a<Math.PI*2; a+=0.2) { realmParticles.push({ x:0, y:0, z:0, a:a, rX:rX, rY:rY, rZ:rZ, type:'knot-17' }); } } 
    } else if (id === 18) { 
        for(let i=0; i<400; i++) { addColorfulParticle((Math.random()-0.5)*260, (Math.random()-0.5)*260, (Math.random()-0.5)*260, { hueOffset: Math.random()*360 }); } 
    } else if (id === 19) { 
        for(let i=0; i<400; i++) { let u = Math.random()*Math.PI*2, v = Math.random()*Math.PI*2; realmParticles.push({ x: (100+40*Math.cos(v))*Math.cos(u), y: (100+40*Math.cos(v))*Math.sin(u), z: 40*Math.sin(v), type: 'dharma-19' }); } 
    } else if (id === 20) { 
        for(let i=0; i<600; i++) { realmParticles.push({ x:0,y:0,z:0, baseR:80+(Math.sin(Math.random()*6)*20), t:Math.random()*Math.PI*2, p:Math.acos((Math.random()*2)-1), isC:Math.random()>0.85, oS:Math.random()*0.05, hue:30+Math.random()*40 }); } 
    }
}

function renderPreviewRealm() {
    let projected = [], id = currentPreviewId;
    if(!isDragging && id !== 9 && id !== 13) angleY += 0.005;
    realmParticles.forEach(p => {
        let wx = p.x, wy = p.y, wz = p.z, a = 0.7, s = 1.5, isGlow = true;
        let pastel = p.col ? p.col : getRandomPastel(); let c = `rgba(${pastel.hsl},`, glowC = pastel.hex ? pastel.hex : "#fff";
        
        // 🌟 修正：細化每一重境界的動態渲染邏輯
        if (id === 5 && p.type === 'mani-core') { let pulse = 1 + Math.sin(time*10)*0.1; wx *= pulse; wy *= pulse; wz *= pulse; c = `rgba(255,255,255,`; glowC = "#fff"; a = 0.9 + Math.sin(time*15)*0.1; s = 2.5; }
        else if (id === 1) { let breath = 1 + Math.sin(time*1.5 + p.seed)*0.03; wx *= breath; wy *= breath; wz *= breath; a = Math.sin(time*4 + p.seed) > 0.85 ? 1 : 0.4; }
        else if (id === 6) { let r = p.bR + 15*Math.sin(time*2 + p.l*0.5)*Math.sin(8*p.th); wx = r*Math.cos(p.th+time*0.5); wz = r*Math.sin(p.th+time*0.5); wy = p.z; a = 0.3 + (p.l/15)*0.7; }
        else if (id === 14) { let flow = p.tOffset + time*1.5; let bx = (90+30*Math.cos(flow/2))*Math.cos(flow), by = (90+30*Math.cos(flow/2))*Math.sin(flow), bz = 40*Math.sin(flow/2); wx = bx*Math.cos(p.angOff)-bz*Math.sin(p.angOff); wy = by; wz = bx*Math.sin(p.angOff)+bz*Math.cos(p.angOff); }
        else if (id === 16) { c = `rgba(212,175,55,`; glowC = "#fff"; s = 1.8; }
        else if (id === 20) { if(p.isC) p.t += p.oS; let r = p.baseR * (1+Math.sin(time*3+p.t)*0.1); wx = r*Math.sin(p.p)*Math.cos(p.t); wy = r*Math.cos(p.p); wz = r*Math.sin(p.p)*Math.sin(p.t); }
        
        let proj = project3D(wx, wy, wz); if(proj) projected.push({ x: proj.x, y: proj.y, z: proj.z, sc: proj.scale, a: a, c: c, s: s, isGlow: isGlow, glowC: glowC });
    });
    projected.sort((a,b) => b.z - a.z).forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.s * p.sc), 0, Math.PI*2); ctx.fillStyle = p.c + p.a + ')'; if(p.isGlow) { ctx.shadowBlur = 10 * p.sc; ctx.shadowColor = p.glowC; } ctx.fill(); }); ctx.shadowBlur = 0;
}

function initParticles() {
    particles = []; const totalLayers = 6; const pointsPerLayer = 108;
    for (let l = 0; l < totalLayers; l++) {
        let radius = 50 + l * 50, yOffset = Math.pow(l, 1.5) * 15 - 50; 
        for (let p = 0; p < pointsPerLayer; p++) {
            let theta = (p / pointsPerLayer) * Math.PI * 2, wave = Math.sin(theta * 8) * (10 + l * 5); 
            particles.push({ x: (Math.random() - 0.5) * 3000, y: (Math.random() - 0.5) * 3000, z: (Math.random() - 0.5) * 3000, tx: (radius + wave) * Math.cos(theta), ty: yOffset + Math.abs(wave) * 0.5, tz: (radius + wave) * Math.sin(theta), c: (l % 2 === 0) ? 'rgba(212,175,55,' : 'rgba(139,168,156,', baseSize: Math.random() * 1.5 + 0.5, phase: Math.random() * Math.PI * 2 });
        }
    }
}

function animate() {
    ctx.fillStyle = (state === 3) ? `rgba(0,0,0,0.4)` : `rgba(1,1,2,0.6)`; ctx.fillRect(0, 0, width, height); time += 0.02; 
    if(!isDragging && state >= 1 && state < 3) angleY -= 0.002; 
    ctx.globalCompositeOperation = 'screen'; 
    if (state === -1) { renderPreviewRealm(); } 
    else {
        let projected = [];
        particles.forEach(p => {
            if (state === 0) { p.z -= 5; if(p.z < -1000) p.z = 2000; } 
            else if (state === 1) { p.x += (p.tx - p.x) * 0.015; p.y += (p.ty - p.y) * 0.015; p.z += (p.tz - p.z) * 0.015; } 
            let proj = project3D(p.x, p.y, p.z); if(proj) projected.push({ x: proj.x, y: proj.y, z: proj.z, sc: proj.scale, c: p.c, s: p.baseSize });
        });
        projected.sort((a,b) => b.z - a.z).forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.s * p.sc, 0, Math.PI*2); ctx.fillStyle = p.c + `0.8)`; ctx.fill(); });
    }
    if (state < 4) requestAnimationFrame(animate);
}

async function runZenEngine() {
    state = -1; animate();
    await sleep(100); document.getElementById('page-curtain').style.opacity = '0';
    await sleep(1000);

    let db; try { db = JSON.parse(localStorage.getItem('PX_V15.0')) || {}; } catch(e) { db = {}; }
    let currentDays = (db.points || 0) / 100;
    let ms = db.milestones || {};

    // 🌟 位階畫面判定 (不論領證與否，皆顯示對應位階的 4 個畫面)
    let displayRealms = [1, 2, 3, 4];
    if (currentDays >= 111100) displayRealms = [17, 18, 19, 20];
    else if (currentDays >= 11100) displayRealms = [13, 14, 15, 16];
    else if (currentDays >= 1100) displayRealms = [9, 10, 11, 12];
    else if (currentDays >= 100) displayRealms = [5, 6, 7, 8];

    const RealmNames = ["普光明照", "香蓮華寶", "普光摩尼", "妙華光明", "出妙華光", "清淨妙明", "華光莊嚴", "威光普照", "出妙音聲", "金剛寶幢", "出青蓮華", "普照大明", "娑婆極樂", "無塵寂靜", "妙明寶燈", "清淨光照", "寶華莊嚴", "離塵清淨", "普照十方", "妙寶焰光"];
    const previewEl = document.getElementById('fast-preview');
    previewEl.style.opacity = '1'; playDharmaSound('preview'); 
    for(let id of displayRealms) { previewEl.innerText = `第 ${id} 重 ． ${RealmNames[id-1]}`; initPreviewRealm(id); await sleep(1200); }
    previewEl.style.opacity = '0'; realmParticles = []; await sleep(500);

    state = 0; initParticles(); await sleep(500);
    state = 1; playDharmaSound('form'); document.getElementById('status-panel').style.opacity = '1'; await sleep(3000); 
    state = 2; document.getElementById('ui-layer').style.opacity = '1'; await sleep(6000); 
    state = 3; document.getElementById('ui-layer').style.opacity = '0'; document.getElementById('status-panel').style.opacity = '0'; await sleep(2000);
    const flash = document.getElementById('golden-flash'); flash.style.opacity = '1'; playDharmaSound('seed'); await sleep(200); 
    state = 4; flash.style.transition = 'opacity 4s ease-in'; flash.style.opacity = '0'; await sleep(2500); 
    const immortalSeed = document.getElementById('immortal-seed'); immortalSeed.style.opacity = '1'; immortalSeed.classList.add('seed-heartbeat'); await sleep(1000); 
    immortalSeed.style.top = '15%'; document.getElementById('profound-text').style.opacity = '1'; await sleep(1000);

    // 🌟 證書邏輯 (僅在未領取時顯示)
    let rankData = null;
    if (currentDays >= 111100 && !ms['rank_ground_10']) rankData = { lock: 'rank_ground_10', svg: 'svg-ground', tts: '十地行圓。', html: '...百萬不退內容...' };
    else if (currentDays >= 11100 && !ms['rank_dedication_10']) rankData = { lock: 'rank_dedication_10', svg: 'svg-dedication', tts: '迴向功圓。', html: '...十萬內容...' };
    else if (currentDays >= 1100 && !ms['rank_practice_10']) rankData = { lock: 'rank_practice_10', svg: 'svg-practice', tts: '十行圓滿。', html: '...萬日內容...' };
    else if (currentDays >= 1000 && !ms['rank_abiding_10']) rankData = { lock: 'rank_abiding_10', svg: 'svg-abode', tts: '十住功成。', html: '...千日內容...' };
    else if (currentDays >= 90 && !ms['rank_10']) rankData = { lock: 'rank_10', svg: 'svg-faith', tts: '十信功圓。', html: '...百日內容...' };

    if (rankData) {
        window.currentMilestoneLock = rankData.lock;
        document.getElementById('cert-text-body').innerHTML = rankData.html;
        document.getElementById('cert-name-insert').innerText = db.name || "無 名";
        ['svg-faith', 'svg-abode', 'svg-practice', 'svg-dedication', 'svg-ground'].forEach(id => { let el = document.getElementById(id); if (el) { el.style.opacity = (id === rankData.svg) ? '1' : '0'; el.style.transform = (id === rankData.svg) ? 'scale(1)' : 'scale(0.8)'; } });
        document.getElementById('cert-ui').style.opacity = '1'; document.getElementById('cert-ui').style.pointerEvents = 'auto';
        try { let m = new SpeechSynthesisUtterance(rankData.tts); m.lang = 'zh-TW'; m.rate = 0.85; window.speechSynthesis.speak(m); } catch(e) {}
    } else { await sleep(3000); navigateTo('index.html'); }
}

function claimCertificate() {
    let db; try { db = JSON.parse(localStorage.getItem('PX_V15.0')) || {}; } catch(e) { db = {}; }
    if (!db.milestones) db.milestones = {};
    if (window.currentMilestoneLock) db.milestones[window.currentMilestoneLock] = true;
    localStorage.setItem('PX_V15.0', JSON.stringify(db)); navigateTo('index.html');
}

function onDown(e) { isDragging = true; lastMouseX = e.touches?e.touches[0].clientX:e.clientX; lastMouseY = e.touches?e.touches[0].clientY:e.clientY; }
function onMove(e) { if (!isDragging) return; let curX = e.touches?e.touches[0].clientX:e.clientX, curY = e.touches?e.touches[0].clientY:e.clientY; angleY += (curX-lastMouseX)*0.008; angleX += (curY-lastMouseY)*0.008; lastMouseX=curX; lastMouseY=curY; }
function onUp() { isDragging = false; }
canvas.addEventListener('mousedown', onDown); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown); window.addEventListener('touchmove', onMove); window.addEventListener('touchend', onUp);
function navigateTo(url) { document.getElementById('page-curtain').style.opacity = '1'; setTimeout(() => { window.location.href = url; }, 1000); }
window.addEventListener('load', runZenEngine);
        
        </script>
