<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest_en.json">
    <title>System · One True Realm (Refined Edition)</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; --bg-deep: #000000; }
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: var(--bg-deep); color: #fff; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }

        .top-nav-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); 
            padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; 
            display: flex; align-items: center; gap: 6px; z-index: 1000; cursor: pointer; 
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .top-nav-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.2); }

        #status-panel {
            position: absolute; top: 70px; left: 5%; width: 90%; max-width: 340px;
            border-left: 2px solid rgba(212,175,55,0.8); padding: 10px 20px; z-index: 100; pointer-events: none;
            opacity: 0; transition: opacity 2s ease-in-out;
        }
        .status-title { font-size: 1.15rem; font-weight: bold; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px; text-shadow: 0 2px 6px rgba(0,0,0,0.9); }
        .status-desc { font-size: 0.85rem; color: #ddd; line-height: 1.8; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }

        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

        #golden-flash { 
            position: fixed; inset: 0; background: radial-gradient(circle, #ffffff 0%, #f3e5ab 40%, #d4af37 100%);
            mix-blend-mode: screen; opacity: 0; z-index: 99998; pointer-events: none; transition: opacity 0.2s ease-out; 
        }

        #immortal-seed {
            position: absolute; top: 50%; left: 50%; margin-top: -12px; margin-left: -12px;
            width: 24px; height: 24px; background: radial-gradient(circle, #fff 10%, #ffe 30%, var(--gold) 60%, var(--solid-gold) 100%);
            border-radius: 50%; opacity: 0; filter: blur(1.5px); 
            /* 核心優化：賦予 top 位移 2 秒的貝茲曲線動畫 */
            transition: opacity 2s, top 2s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 100;
        }
        
        .seed-heartbeat { animation: heartbeat-pulse 1.4s infinite cubic-bezier(0.2, 0.8, 0.4, 1); }
        @keyframes heartbeat-pulse {
            0% { transform: scale(1); box-shadow: 0 0 30px var(--gold), 0 0 60px var(--solid-gold); }
            15% { transform: scale(1.6); box-shadow: 0 0 60px var(--gold), 0 0 120px var(--solid-gold), 0 0 180px #fff; }
            30% { transform: scale(1.2); box-shadow: 0 0 40px var(--gold), 0 0 80px var(--solid-gold); }
            45% { transform: scale(1.6); box-shadow: 0 0 60px var(--gold), 0 0 120px var(--solid-gold), 0 0 180px #fff; }
            100% { transform: scale(1); box-shadow: 0 0 30px var(--gold), 0 0 60px var(--solid-gold); }
        }

        #profound-text { 
            position: absolute; top: calc(50% + 60px); width: 100%; color: var(--gold); 
            font-size: 1.05rem; letter-spacing: 5px; word-spacing: 8px; opacity: 0; 
            transition: opacity 4s ease; text-align: center; text-shadow: 0 0 15px var(--solid-gold), 0 0 3px #fff; 
            line-height: 1.8; font-weight: 300; z-index: 100; pointer-events: none; text-transform: uppercase; 
        }

        .ui-layer { position: absolute; bottom: 8%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; opacity: 0; transition: opacity 2s;}
        .drag-hint { color:rgba(212,175,55,0.6); font-size:0.75rem; letter-spacing:2px; text-transform: uppercase; text-shadow: 0 0 5px rgba(0,0,0,0.8); }

        #realm-reward {
            position: absolute; top: 62%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; z-index: 200;
            opacity: 0; pointer-events: none; transition: opacity 2s ease; width: 100%;
        }
        .rr-grid { display: flex; gap: 20px; margin-bottom: 40px; justify-content: center; width: 100%; padding: 0 15px;}
        .rr-item { position: relative; display: flex; flex-direction: column; align-items: center; opacity: 0; transform: translateY(20px); transition: all 1.5s ease; flex: 1; max-width: 110px;}
        
        /* 環境光暈 */
        .rr-glow-bg {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; border-radius: 50%; filter: blur(25px);
            opacity: 0.6; z-index: -1; animation: pulse-glow 3.5s infinite alternate;
        }
        #ri-1 .rr-glow-bg { background: rgba(255, 215, 0, 0.45); }
        #ri-2 .rr-glow-bg { background: rgba(77, 166, 255, 0.45); }
        #ri-3 .rr-glow-bg { background: rgba(255, 183, 197, 0.45); }
        @keyframes pulse-glow { 0% { transform: translate(-50%, -50%) scale(0.85); } 100% { transform: translate(-50%, -50%) scale(1.15); } }

        .rr-svg { height: 90px; filter: drop-shadow(0 0 15px rgba(243, 229, 171, 0.6)); animation: float 3s infinite ease-in-out alternate; }
        .rr-svg svg { height: 100%; width: 100%; overflow: visible; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        .rr-count { color: #f3e5ab; font-size: 1.1rem; font-weight: bold; margin-top: 15px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(212,175,55,0.8); }
        .rr-name { color: #8ba89c; font-size: 0.75rem; letter-spacing: 1.5px; margin-top: 5px; text-align: center; white-space: nowrap; text-transform: uppercase;}
        
        .rr-btn {
            padding: 12px 25px; border-radius: 25px; border: 1px solid #d4af37; background: rgba(212,175,55,0.15);
            color: #f3e5ab; font-size: 0.95rem; letter-spacing: 4px; cursor: pointer; opacity: 0; transition: all 0.5s ease;
            box-shadow: 0 0 25px rgba(212,175,55,0.3); backdrop-filter: blur(5px); text-transform: uppercase;
        }
        .rr-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.3); }
    </style>
</head>
<body>
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none; left: -9999px;">
        <defs>
            <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.9" /><stop offset="50%" stop-color="#f3e5ab" stop-opacity="0.6" /><stop offset="100%" stop-color="#d4af37" stop-opacity="0.2" /></linearGradient>
            <linearGradient id="g-gold" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffd700"/><stop offset="100%" stop-color="#b8860b"/></linearGradient>
            <linearGradient id="g-blue" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#4da6ff"/><stop offset="100%" stop-color="#000080"/></linearGradient>
            <linearGradient id="g-rose-pure" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffb7c5"/><stop offset="100%" stop-color="#c2185b"/></linearGradient>
        </defs>
    </svg>

    <div id="page-curtain" style="position:fixed; inset:0; background:#000; z-index: 9999999; pointer-events: none; transition: opacity 1s; opacity: 1;"></div>

    <div class="top-nav-btn" onclick="navigateTo('index_en.html')">Return</div>

    <div id="status-panel">
        <div class="status-title">One True Realm · All is Mind</div>
        <div class="status-desc">"Only Bodhi remains indestructible."</div>
    </div>

    <canvas id="realmCanvas"></canvas>
    <div id="golden-flash"></div>
    <div id="immortal-seed"></div>
    
    <div id="profound-text">
        Bodhicitta · Eternally Indestructible<br>
        One True Realm · Intrinsically Thus
    </div>

    <div id="realm-reward">
        <div style="color:#d4af37; font-size:1.1rem; letter-spacing: 4px; margin-bottom: 40px; font-weight:bold; text-shadow: 0 0 15px #d4af37; text-transform: uppercase; text-align: center; line-height: 1.5;">Ten Faiths Fulfilled<br>Realm's Gift</div>
        <div class="rr-grid">
            <div class="rr-item" id="ri-1">
                <div class="rr-glow-bg"></div>
                <div class="rr-svg"><svg viewBox="0 0 100 150"><g transform="scale(1.4) translate(-14, -20)"><polygon points="50,10 65,40 50,105 35,40" fill="#fff" stroke="#fff" stroke-width="1"/><polygon points="50,10 65,40 50,105" fill="url(#g-gold)"/><circle cx="50" cy="105" r="6" fill="url(#g-gold)" stroke="#fff" stroke-width="1.5"/></g></svg></div>
                <div class="rr-count">x 10</div><div class="rr-name">Sword</div>
            </div>
            <div class="rr-item" id="ri-2">
                <div class="rr-glow-bg"></div>
                <div class="rr-svg"><svg viewBox="0 0 100 150"><g transform="scale(1.1) translate(-5, -15)"><polygon points="45,20 55,20 60,40 40,40" fill="#fff" stroke="#fff" stroke-width="1"/><polygon points="40,40 60,40 75,90 25,90" fill="url(#g-blue)" stroke="#fff" stroke-width="1"/><polygon points="25,90 75,90 60,120 40,120" fill="#f3e5ab" stroke="#f3e5ab" stroke-width="1"/></g></svg></div>
                <div class="rr-count">x 10</div><div class="rr-name">Vase</div>
            </div>
            <div class="rr-item" id="ri-3">
                <div class="rr-glow-bg"></div>
                <div class="rr-svg"><svg viewBox="0 0 100 150"><g transform="scale(1.3) translate(-8, 5)"><polygon points="50,10 80,40 50,55 20,40" fill="#fff" stroke="#fff" stroke-width="0.5"/><polygon points="20,40 50,55 50,100" fill="url(#g-rose-pure)" stroke="#fff" stroke-width="0.5"/><polygon points="80,40 50,55 50,100" fill="#c2185b" stroke="#fff" stroke-width="0.5"/></g></svg></div>
                <div class="rr-count">x 10</div><div class="rr-name">Jewel</div>
            </div>
        </div>
        <button class="rr-btn" id="rr-btn" onclick="collectAndReturn()">Collect & Return</button>
    </div>

    <div class="ui-layer" id="ui-layer"><div class="drag-hint">360° Holographic Swipe · Contemplate</div></div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
        const canvas = document.getElementById('realmCanvas'); const ctx = canvas.getContext('2d');
        let width, height, particles = [], time = 0, angleX = 0.3, angleY = 0, isDragging = false, lastMouseX = 0, lastMouseY = 0, state = 0;
        const FOV = 450;

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        function initParticles() {
            particles = []; 
            for (let l = 0; l < 6; l++) {
                let radius = 50 + l * 50;
                for (let p = 0; p < 108; p++) {
                    let theta = (p / 108) * Math.PI * 2;
                    particles.push({
                        x: (Math.random()-0.5)*3000, y: (Math.random()-0.5)*3000, z: (Math.random()-0.5)*3000,
                        tx: radius * Math.cos(theta), ty: l*15-50, tz: radius * Math.sin(theta),
                        c: (l%2===0)?'rgba(212,175,55,':'rgba(139,168,156,', size: Math.random()*1.5+0.5
                    });
                }
            }
        }

        function project3D(x, y, z) {
            let cosX = Math.cos(angleX), sinX = Math.sin(angleX), cosY = Math.cos(angleY), sinY = Math.sin(angleY);
            let y1 = y*cosX - z*sinX, z1 = y*sinX + z*cosX; let x2 = x*cosY - z1*sinY, z2 = x*sinY + z1*cosY;
            if(z2 < -FOV+10) return null; let scale = FOV / (FOV + z2); return { x: (width/2) + x2*scale, y: (height/2) - y1*scale, scale: scale, z: z2 };
        }

        function animate() {
            ctx.fillStyle = (state === 3)?'rgba(0,0,0,0.4)':'rgba(1,1,2,0.6)'; ctx.fillRect(0,0,width,height);
            time += 0.02; if(!isDragging && state >= 1 && state < 3) angleY -= 0.002;
            let projected = [];
            particles.forEach(p => {
                if (state === 1) { p.x += (p.tx - p.x)*0.02; p.y += (p.ty - p.y)*0.02; p.z += (p.tz - p.z)*0.02; }
                else if (state === 3) { p.x *= 0.85; p.y *= 0.85; p.z *= 0.85; }
                let proj = project3D(p.x, p.y, p.z); if(proj) projected.push({ ...proj, c: p.c, s: p.size });
            });
            projected.sort((a,b) => b.z - a.z).forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s*p.scale, 0, Math.PI*2);
                ctx.fillStyle = p.c + `${Math.min(1, p.scale)})`; ctx.fill();
            });
            if (state < 4) requestAnimationFrame(animate); else ctx.clearRect(0,0,width,height);
        }

        async function runZenEngine() {
            initParticles(); animate();
            await sleep(100); document.getElementById('page-curtain').style.opacity = '0';
            await sleep(2000);

            state = 1; await sleep(6000); 
            state = 2; document.getElementById('ui-layer').style.opacity = '1'; document.getElementById('status-panel').style.opacity = '1';
            await sleep(10000); 

            // 讀取穩定版資料
            let db = JSON.parse(localStorage.getItem('PX_EN_V15.0')) || {};
            let currentDays = (db.points || 0) / 100;
            let hasAwarded = db.milestones && db.milestones['rank_10'];

            // 邏輯關鍵：精確判定是否領獎
            if (currentDays >= 90 && !hasAwarded) {
                state = 3; document.getElementById('ui-layer').style.opacity = '0'; 
                document.getElementById('status-panel').style.opacity = '0'; await sleep(2500);
                const flash = document.getElementById('golden-flash'); flash.style.opacity = '1'; await sleep(200); 
                state = 4; flash.style.opacity = '0'; await sleep(2000);

                const seed = document.getElementById('immortal-seed');
                seed.style.opacity = '1'; seed.classList.add('seed-heartbeat');
                await sleep(2000); document.getElementById('profound-text').style.opacity = '1'; 
                await sleep(4000);

                // --- 美學動線優化開始 ---
                document.getElementById('profound-text').style.opacity = '0'; // 隱藏文字
                seed.style.top = '28%'; // 菩提心優雅上移
                await sleep(1500);

                const rewardUI = document.getElementById('realm-reward');
                rewardUI.style.opacity = '1'; rewardUI.style.pointerEvents = 'auto';

                ['ri-1', 'ri-2', 'ri-3'].forEach((id, i) => {
                    setTimeout(() => { document.getElementById(id).style.opacity = '1'; document.getElementById(id).style.transform = 'translateY(0)'; }, i*1000);
                });
                setTimeout(() => { document.getElementById('rr-btn').style.opacity = '1'; }, 3500);

                try {
                    let m = new SpeechSynthesisUtterance("Ten Faiths fulfilled. Realm's gift is granted.");
                    m.lang = 'en-US'; window.speechSynthesis.speak(m);
                } catch(e) {}
            } else {
                await sleep(5000); navigateTo('index_en.html'); 
            }
        }

        function collectAndReturn() {
            let db = JSON.parse(localStorage.getItem('PX_EN_V15.0')) || {};
            if (!db.treasures) db.treasures = {};
            if (!db.milestones) db.milestones = {};
            
            db.treasures.sword = (db.treasures.sword || 0) + 10;
            db.treasures.vase = (db.treasures.vase || 0) + 10;
            db.treasures.jewel = (db.treasures.jewel || 0) + 10;
            db.milestones['rank_10'] = true; // 寫死里程碑，防止循環
            
            localStorage.setItem('PX_EN_V15.0', JSON.stringify(db));
            document.getElementById('realm-reward').style.opacity = '0';
            navigateTo('index_en.html');
        }

        function navigateTo(url) {
            document.getElementById('page-curtain').style.opacity = '1';
            setTimeout(() => { window.location.href = url; }, 1000);
        }

        window.addEventListener('load', runZenEngine);
    </script>
</body>
</html>
