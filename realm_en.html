<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
          <link rel="manifest" href="manifest_en.json">
    <title>One True Realm ． Bodhi Mandala</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; --bg-deep: #020203; }
        body { margin: 0; padding: 0; height: 100vh; height: 100dvh; overflow: hidden; background: radial-gradient(circle at 50% 50%, #0a0e14 0%, var(--bg-deep) 100%); color: #fff; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        .top-nav-btn { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; z-index: 1000; cursor: pointer; backdrop-filter: blur(5px); transition: opacity 0.8s, transform 0.3s; text-transform: uppercase; }
        .top-nav-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.2); }

        /* 🌟 Mandala Array */
        #mandala-container { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 460px; height: 460px; z-index: 10; opacity: 0; transition: opacity 2s ease; pointer-events: none; animation: slow-spin 100s linear infinite; }
        @keyframes slow-spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        
        .mandala-ring { position: absolute; top: 50%; left: 50%; border-radius: 50%; border: 1px dashed rgba(212,175,55,0.15); transform: translate(-50%, -50%); transition: all 1s ease; }
        .mandala-ring.is-achieved { border: 1.5px solid var(--ring-color); box-shadow: 0 0 15px var(--ring-color), inset 0 0 20px var(--ring-bg); background: var(--ring-bg); cursor: pointer; pointer-events: auto; }
        .mandala-ring.is-pulsing { animation: ring-pulse 1.2s ease-out; }
        @keyframes ring-pulse { 
            0% { box-shadow: 0 0 0 var(--ring-color), inset 0 0 0 var(--ring-bg); border-color: var(--ring-color); } 
            50% { box-shadow: 0 0 40px var(--ring-color), inset 0 0 40px var(--ring-bg); border-color: #fff; } 
            100% { box-shadow: 0 0 15px var(--ring-color), inset 0 0 20px var(--ring-bg); border-color: var(--ring-color); } 
        }

        /* 🌟 Crystals and Seed */
        .crystal-wrapper { position: absolute; transform-origin: center; transition: all 0.8s ease; filter: grayscale(0.85) brightness(0.4); opacity: 0.6; }
        .crystal-wrapper.is-lit { filter: grayscale(0) brightness(1.3); opacity: 1; }
        
        #immortal-seed { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 24px; height: 24px; border-radius: 50%; background: radial-gradient(circle, #fff 10%, #ffe 30%, var(--gold) 60%, var(--solid-gold) 100%); box-shadow: 0 0 var(--seed-glow) var(--solid-gold); opacity: 0; z-index: 100; transition: all 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .seed-heartbeat { animation: hb-pulse 1.5s infinite cubic-bezier(0.2, 0.8, 0.4, 1); }
        @keyframes hb-pulse { 
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 var(--seed-glow) var(--gold); } 
            50% { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 calc(var(--seed-glow)*2) var(--gold), 0 0 calc(var(--seed-glow)*3) #fff; } 
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 var(--seed-glow) var(--gold); } 
        }
        
        #golden-flash { position: fixed; inset: 0; background: radial-gradient(circle, #fff 0%, #f3e5ab 40%, #d4af37 100%); mix-blend-mode: screen; opacity: 0; z-index: 99998; pointer-events: none; transition: opacity 0.5s; }

        /* 🌟 Profound Text */
        #profound-text { position: absolute; bottom: 10%; width: 100%; color: var(--gold); font-size: 0.95rem; letter-spacing: 2.5px; word-spacing: 4px; opacity: 0; transition: opacity 1.5s; text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.9), 0 0 15px var(--solid-gold); line-height: 2.2; font-weight: bold; z-index: 100; pointer-events: none; -webkit-font-smoothing: antialiased; text-transform: uppercase; }

        /* 🌟 Volumetric Glassmorphism Certificate */
        #cert-ui { 
            position: absolute; bottom: 6%; left: 50%; transform: translateX(-50%) translateY(80px); width: 88%; max-width: 360px; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 1.5s ease, transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); 
            background: linear-gradient(135deg, rgba(16,20,18,0.85), rgba(4,6,5,0.95)); 
            border: 1px solid rgba(255,255,255,0.1); border-top: 1px solid rgba(255,255,255,0.25); border-left: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 25px 20px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.9), inset 2px 2px 5px rgba(255,255,255,0.15), inset -3px -3px 8px rgba(0,0,0,0.8), 0 0 30px var(--c-glow, transparent); 
            backdrop-filter: blur(15px); display: flex; flex-direction: column; align-items: center; 
        }
        #cert-ui.is-visible { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }

        /* 🌟 Anti-Gravity Sublimation Cluster */
        .cert-cluster { width: 120px; height: 120px; margin: 0 auto 10px auto; position: relative; }
        .float-wrapper { animation: f-breath 4s ease-in-out infinite; width: 100%; height: 100%; position: relative; }
        @keyframes f-breath { 0% { transform: translateY(0); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0); } }
        @keyframes drift { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(-10px) rotate(15deg); } }

        /* Certificate Content */
        .cert-header { color: rgba(243,229,171,0.9); font-size: 0.85rem; letter-spacing: 6px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; }
        .cert-name-label { color: var(--cyan); font-size: 0.65rem; letter-spacing: 4px; margin-bottom: 6px; text-transform: uppercase; }
        .cert-name { color: var(--gold); font-size: 1.3rem; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 12px rgba(212,175,55,0.6); margin-bottom: 15px; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 15px; width: 100%; text-align: center; }
        .cert-desc-title { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; color: var(--gold); font-size: 0.85rem; letter-spacing: 1px; font-weight: bold; text-shadow: 0 0 8px rgba(212,175,55,0.5); text-transform: uppercase; }
        .cert-desc { color: #ddd; font-size: 0.78rem; line-height: 1.9; letter-spacing: 1px; text-align: center; margin-bottom: 20px; }
        .cert-desc span.highlight { color: var(--solid-gold); font-weight: bold; }
        
        .btn-claim { width: 100%; padding: 12px 0; border-radius: 25px; border: 1px solid var(--solid-gold); background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(0,0,0,0.8)); color: var(--gold); font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; }
        .btn-claim:active { transform: scale(0.95); background: rgba(212,175,55,0.4); }
        #page-curtain { position: fixed; inset: 0; background: #000; z-index: 9999999; pointer-events: none; transition: opacity 1.5s; opacity: 1; }
    </style>
</head>
<body>

<div id="page-curtain"></div>

<div class="top-nav-btn" onclick="goHome('index_en.html')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
    </svg> Return
</div>

<!-- 🌟 Shared SVG Definitions -->
<svg style="position: absolute; width: 0; height: 0;">
    <defs>
        <linearGradient id="f-light" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fff" stop-opacity="0.85"/><stop offset="100%" stop-color="#fff" stop-opacity="0.2"/></linearGradient>
        <linearGradient id="f-dark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#000" stop-opacity="0.1"/><stop offset="100%" stop-color="#000" stop-opacity="0.5"/></linearGradient>
        <linearGradient id="g-0" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f7fa"/><stop offset="100%" stop-color="#4dd0e1"/></linearGradient> <!-- Cyan -->
        <linearGradient id="g-1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f3e5f5"/><stop offset="100%" stop-color="#ba68c8"/></linearGradient> <!-- Purple -->
        <linearGradient id="g-2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e3f2fd"/><stop offset="100%" stop-color="#2196f3"/></linearGradient> <!-- Blue -->
        <linearGradient id="g-3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#b2ebf2"/><stop offset="50%" stop-color="#f8bbd0"/><stop offset="100%" stop-color="#fff9c4"/></linearGradient> <!-- Rainbow -->
        <linearGradient id="g-4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff59d"/><stop offset="100%" stop-color="#ffb300"/></linearGradient> <!-- Gold -->
        <g id="lotus-petal"><path d="M12 2C16 8 18 14 12 22C6 14 8 8 12 2Z"/></g>
    </defs>
</svg>

<canvas id="realmCanvas"></canvas>

<!-- 🌟 Dynamic Profound Text -->
<div id="profound-text">
    Bodhicitta · Indestructible<br>One True Realm · Intrinsically Thus<br>
    <span id="sub-profound" style="font-size:0.75rem; color:var(--cyan); letter-spacing:1px; display:block; margin-top:8px;"></span>
</div>

<div id="golden-flash"></div>
<div id="mandala-container"></div>
<div id="immortal-seed" style="--seed-glow: 20px;"></div>

<!-- 🌟 Certificate UI -->
<div id="cert-ui">
    <div class="cert-cluster" id="cert-cluster"></div>
    <div class="cert-header">✦ Bodhi Seal ✦</div>
    <div class="cert-name-wrap">
        <div class="cert-name-label">Practitioner</div>
        <div class="cert-name" id="cert-name-insert">Unknown</div>
    </div>
    <div class="cert-desc" id="cert-text-body"></div>
    <button class="btn-claim" id="btn-claim" onclick="claimCert()">Seal in Mind · Return</button>
</div>

<script>
    // 🌟 鐵壁防護：徹底鎖死 iOS/Android 橡皮筋回彈與下拉重新整理
    document.addEventListener('touchmove', function(e) {
        e.preventDefault();
    }, { passive: false });


    const slp = ms => new Promise(r => setTimeout(r, ms));
    let aCtx;

    function iAu() {
        if(!aCtx) aCtx = new(window.AudioContext || window.webkitAudioContext)();
        if(aCtx.state === 'suspended') aCtx.resume();
    }

    function pDing(f, t='sine', d=0.3) {
        iAu();
        let o = aCtx.createOscillator(), g = aCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, aCtx.currentTime);
        g.gain.setValueAtTime(0, aCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.4, aCtx.currentTime + 0.05);
        g.gain.exponentialRampToValueAtTime(0.01, aCtx.currentTime + d);
        o.connect(g); g.connect(aCtx.destination);
        o.start(); o.stop(aCtx.currentTime + d);
    }

    function pGath() {
        iAu();
        let o = aCtx.createOscillator(), g = aCtx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(108, aCtx.currentTime); o.frequency.exponentialRampToValueAtTime(864, aCtx.currentTime + 3.0);
        g.gain.setValueAtTime(0.01, aCtx.currentTime); g.gain.linearRampToValueAtTime(0.5, aCtx.currentTime + 1.5); g.gain.exponentialRampToValueAtTime(0.01, aCtx.currentTime + 3.0);
        o.connect(g); g.connect(aCtx.destination);
        o.start(); o.stop(aCtx.currentTime + 3.0);
    }

    const cv = document.getElementById('realmCanvas'), cx = cv.getContext('2d');
    let w, h, pts = [], isG = true;

    function rs() { w = window.innerWidth; h = window.innerHeight; cv.width = w; cv.height = h; }
    window.addEventListener('resize', rs); rs();

    function initP() {
        for(let i=0; i<400; i++) {
            let a = Math.random() * Math.PI * 2, r = Math.random() * 800 + 200;
            pts.push({ x: w/2 + Math.cos(a)*r, y: h*0.45 + Math.sin(a)*r, s: Math.random()*2+1, sp: Math.random()*0.05+0.02, hu: Math.random()*60+180 });
        }
    }

    function drwP() {
        if(!isG) return;
        cx.fillStyle = 'rgba(10,14,20,0.4)'; cx.fillRect(0,0,w,h);
        cx.globalCompositeOperation = 'screen';
        let cX = w/2, cY = h*0.45;
        pts.forEach(p => {
            p.x += (cX - p.x) * p.sp; p.y += (cY - p.y) * p.sp; p.sp *= 1.05;
            cx.beginPath(); cx.arc(p.x, p.y, p.s, 0, Math.PI*2);
            cx.fillStyle = `hsla(${p.hu}, 80%, 70%, 0.8)`; cx.fill();
        });
        cx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(drwP);
    }

    // 🌟 5 Bodhi Levels Translation & Data Binding
    const RDAT = [
        { k:'rank_10', r:60, sc:0.35, c:'#4dd0e1', g:'url(#g-0)', t:90, tt:'10th Faith · Aspiring Bodhi', d:'Faith, mindfulness, and diligence perfected.<br>Entering the First Abiding Rank, focus on <span class="highlight">Generosity</span>.' },
        { k:'rank_abiding_10', r:100, sc:0.45, c:'#ba68c8', g:'url(#g-1)', t:1000, tt:'10th Abiding · Subduing Bodhi', d:'Born into the Tathagata\'s family.<br>Entering the First Practice Rank, focus on <span class="highlight">Discipline</span> to adorn Bodhi.' },
        { k:'rank_practice_10', r:140, sc:0.55, c:'#2196f3', g:'url(#g-2)', t:1100, tt:'10th Practice · Illuminating Bodhi', d:'Formless true practice within all dharmas.<br>Entering the First Dedication Rank, ground yourself in <span class="highlight">Patience</span>.' },
        { k:'rank_dedication_10', r:180, sc:0.65, c:'#f8bbd0', g:'url(#g-3)', t:11100, tt:'10th Dedication · Emancipating Bodhi', d:'The mind dwells nowhere yet generates compassion.<br>Ascending to the First Ground, enter deep Samadhi through <span class="highlight">Meditation</span>.' },
        { k:'rank_ground_10', r:220, sc:0.85, c:'#ffb300', g:'url(#g-4)', t:111100, tt:'10th Ground · Supreme Bodhi', d:'Merit and wisdom fully complete.<br>Illuminate the emptiness of all dharmas through <span class="highlight">Prajna</span>, saving all beings.' }
    ];

    let db; try{ db = JSON.parse(localStorage.getItem('PX_EN_V15.0'))||{}; }catch(e){ db={}; }
    const ms = db.milestones || {}, cD = (db.points || 0)/100;
    let aRI = -1, hiI = -1, isRvw = false;

    function getCry(g) {
        return `<svg viewBox="0 0 100 100" style="width:100%; height:100%; overflow:visible;">
            <polygon points="50,10 25,45 50,90 75,45" fill="${g}" opacity="0.95"/>
            <polygon points="50,10 25,45 50,55" fill="url(#f-light)"/>
            <polygon points="25,45 50,90 50,55" fill="url(#f-dark)"/>
            <polygon points="50,10 75,45 50,55" fill="url(#f-dark)"/>
            <polygon points="75,45 50,90 50,55" fill="url(#f-light)"/>
            <polyline points="50,10 25,45 50,90 75,45 50,10" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linejoin="round"/>
            <polyline points="25,45 50,55 75,45" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linejoin="round"/>
            <line x1="50" y1="10" x2="50" y2="90" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
        </svg>`;
    }

    function bMdl() {
        const ct = document.getElementById('mandala-container');
        let ht = '';
        RDAT.forEach((r,x) => {
            const ac = ms[r.k] === true;
            if(ac) hiI = x;
            if(cD >= r.t && !ac && aRI === -1) aRI = x;
            let sC = ac ? 'is-achieved' : '', op = ac ? `${r.c}14` : 'transparent';
            let rH = `<div class="mandala-ring ${sC}" id="ring-${x}" style="width:${r.r*2}px; height:${r.r*2}px; --ring-color:${r.c}; --ring-bg:${op};" ${ac ? `onclick="rvw(${x})"` : ''}>`;
            for(let i=0; i<10; i++) {
                let a = i * 36 * (Math.PI/180), cx = r.r * Math.cos(a), cy = r.r * Math.sin(a), rd = i * 36 + 90;
                rH += `<div class="crystal-wrapper cry-${x}-${i} ${ac ? 'is-lit' : ''}" style="left:calc(50% + ${cx}px); top:calc(50% + ${cy}px); width:100px; height:100px; transform:translate(-50%,-50%) rotate(${rd}deg) scale(${r.sc}); ${ac ? `filter:grayscale(0) brightness(1.3) drop-shadow(0 0 10px ${r.c}); opacity:1;` : ''}">${getCry(r.g)}</div>`;
            }
            rH += `</div>`; ht += rH;
        });
        ct.innerHTML = ht;
        
        let sg = 20;
        if(hiI >= 0) sg = 30 + (hiI * 25);
        if(aRI !== -1) sg = 30 + (aRI * 25);
        document.getElementById('immortal-seed').style.setProperty('--seed-glow', `${sg}px`);
    }

    function bCls(tR) {
        const cl = document.getElementById('cert-cluster');
        let ht = `<div class="float-wrapper"><svg viewBox="0 0 100 100" style="width:100%; height:100%; overflow:visible;">`;

        const mg = [
            { x: 15, y: 75, s: 0.12, a: 15,  g: 'url(#g-0)' },
            { x: 75, y: 70, s: 0.15, a: -20, g: 'url(#g-1)' },
            { x: 5,  y: 45, s: 0.18, a: 30,  g: 'url(#g-2)' },
            { x: 85, y: 50, s: 0.14, a: -15, g: 'url(#g-3)' },
            { x: 20, y: 15, s: 0.16, a: 45,  g: 'url(#g-4)' },
            { x: 70, y: 20, s: 0.20, a: -25, g: 'url(#g-0)' },
            { x: 40, y: -5, s: 0.22, a: 10,  g: 'url(#g-1)' },
            { x: 60, y: -10,s: 0.19, a: -10, g: 'url(#g-2)' }
        ];

        mg.forEach(m => {
            let delay = Math.random() * 2;
            let dur = 3 + Math.random() * 3;
            ht += `<g style="animation:drift ${dur}s ease-in-out ${delay}s infinite alternate; transform-origin:${m.x}px ${m.y}px;" transform="translate(${m.x},${m.y}) scale(${m.s}) rotate(${m.a} 50 50)" filter="drop-shadow(0 0 5px rgba(255,255,255,0.3))">${getCry(m.g)}</g>`;
        });

        // Main Crystal Absolute Binding
        ht += `<g transform="translate(20, 35) scale(0.6)" filter="drop-shadow(0 0 15px ${tR.c})">${getCry(tR.g)}</g>`;

        cl.innerHTML = ht + `</svg></div>`;
    }

    async function rvw(x) {
        if(aRI !== -1) return;
        isRvw = true;
        document.getElementById('profound-text').style.opacity = '0';
        let rE = document.getElementById(`ring-${x}`);
        rE.classList.remove('is-pulsing'); void rE.offsetWidth; rE.classList.add('is-pulsing');
        pDing(1200, 'sine', 1.0);
        
        const tR = RDAT[x];
        bCls(tR);
        document.getElementById('cert-name-insert').innerText = db.name || "Practitioner";
        document.getElementById('cert-text-body').innerHTML = `<div class="cert-desc-title"><svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>${tR.tt}<svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg></div>${tR.d}`;
        
        let cU = document.getElementById('cert-ui');
        cU.style.setProperty('--c-glow', `${tR.c}44`);
        document.getElementById('btn-claim').innerText = "Conceal Seal";
        cU.classList.add('is-visible');
    }

    async function runC() {
        initP(); drwP(); pGath();
        document.getElementById('page-curtain').style.opacity = '0';
        
        // 🌟 English Translation of the 5 Bodhi Stages Status
        const TT = ["Majestic Practices · Merit Never Fails", "Abiding in Dharmadhatu · Aspiring Bodhi", "Abiding in Dharmadhatu · Subduing Bodhi", "Abiding in Dharmadhatu · Illuminating Bodhi", "Abiding in Dharmadhatu · Emancipating Bodhi", "Perfect Dharmadhatu · Supreme Bodhi"];
        let eH = -1;
        RDAT.forEach((r,i) => { if(ms[r.k]) eH = i; });
        document.getElementById('sub-profound').innerText = TT[eH+1];
        document.getElementById('profound-text').style.opacity = '1';
        
        await slp(2800);
        isG = false; cx.clearRect(0,0,w,h);
        
        const fl = document.getElementById('golden-flash'); fl.style.opacity = '1';
        pDing(864, 'triangle', 2.0);
        
        const sd = document.getElementById('immortal-seed');
        sd.style.opacity = '1'; sd.style.transform = 'translate(-50%, -50%) scale(1)'; sd.classList.add('seed-heartbeat');
        
        await slp(300); fl.style.opacity = '0';
        await slp(1000);
        
        bMdl();
        document.getElementById('mandala-container').style.opacity = '1';
        await slp(1500);
        
        if(aRI !== -1) {
            const tR = RDAT[aRI];
            for(let i=0; i<10; i++) {
                await slp(300);
                const c = document.querySelector(`.cry-${aRI}-${i}`);
                c.classList.add('is-lit');
                c.style.filter = `grayscale(0) brightness(1.3) drop-shadow(0 0 12px ${tR.c})`;
                c.style.opacity = '1';
                pDing(800 + i * 50);
            }
            await slp(500);
            
            const rE = document.getElementById(`ring-${aRI}`);
            rE.classList.add('is-achieved', 'is-pulsing');
            rE.style.setProperty('--ring-bg', `${tR.c}14`);
            rE.setAttribute('onclick', `rvw(${aRI})`);
            pDing(1200, 'sine', 1.5);
            
            sd.style.boxShadow = '0 0 50px #fff, 0 0 100px var(--solid-gold)';
            sd.style.transform = 'translate(-50%, -50%) scale(1.5)';
            await slp(500);
            sd.style.transform = 'translate(-50%, -50%) scale(1)';
            sd.style.boxShadow = `0 0 var(--seed-glow) var(--gold)`;
            
            document.getElementById('profound-text').style.opacity = '0';
            bCls(tR);
            document.getElementById('cert-name-insert').innerText = db.name || "Practitioner";
            document.getElementById('cert-text-body').innerHTML = `<div class="cert-desc-title"><svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>${tR.tt}<svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg></div>${tR.d}`;
            
            let cU = document.getElementById('cert-ui');
            cU.style.setProperty('--c-glow', `${tR.c}44`);
            document.getElementById('btn-claim').innerText = "Seal in Mind · Return";
            cU.classList.add('is-visible');
        }
    }

    function goHome(u) {
        document.getElementById('page-curtain').style.opacity = '1';
        setTimeout(() => window.location.href = u, 800);
    }

    function claimCert() {
        if(isRvw) {
            document.getElementById('cert-ui').classList.remove('is-visible');
            document.getElementById('profound-text').style.opacity = '1';
            isRvw = false; return;
        }
        document.getElementById('cert-ui').classList.remove('is-visible');
        document.getElementById('page-curtain').style.opacity = '1';
        if(aRI !== -1) {
            if(!db.milestones) db.milestones = {};
            db.milestones[RDAT[aRI].k] = true;
            localStorage.setItem('PX_EN_V15.0', JSON.stringify(db));
        }
        setTimeout(() => window.location.href = 'index_en.html', 800);
    }

    window.addEventListener('click', iAu, {once:true});
    window.addEventListener('touchstart', iAu, {once:true, passive:true});
    window.addEventListener('load', runC);
</script>
