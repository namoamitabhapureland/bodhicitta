        #golden-flash {

        #immortal-seed {
            position: absolute; top: 50%; left: 50%; margin-top: -12px; margin-left: -12px;

        }

            font-weight: bold; z-index: 100; pointer-events: none; transition: opacity 0.1s ease-in-out; 
            text-transform: uppercase; padding: 0 20px;
        }

        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        let audioCtx;
        function playDharmaSound(phase) {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                
                if (phase === 'preview') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(108, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(864, audioCtx.currentTime + 7.0); 
                    gain.gain.setValueAtTime(0.01, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.5); gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 6.5); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 7.0);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 7.0);
                } else if (phase === 'form') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(108, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(216, audioCtx.currentTime + 8);
                    gain.gain.setValueAtTime(0.01, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 4); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 10);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 10);
                } else if (phase === 'seed') { 
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(864, audioCtx.currentTime);
                    gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 4);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 4);
                }
            } catch(e) {}
        }

        const canvas = document.getElementById('realmCanvas'); const ctx = canvas.getContext('2d');
        let width, height; let particles = []; let time = 0; let angleX = 0.3, angleY = 0; let isDragging = false; let lastMouseX = 0, lastMouseY = 0; const FOV = 450; let state = -1; 

        let realmParticles = []; let currentPreviewId = 1;
        const PastelColors = [{ hsl: "350, 100%, 85%", hex: "#FFB7C5" }, { hsl: "120, 100%, 85%", hex: "#98FB98" }, { hsl: "210, 100%, 85%", hex: "#87CEFA" }, { hsl: "30, 100%, 80%", hex: "#FFDAB9" }, { hsl: "0, 0%, 80%", hex: "#D3D3D3" }, { hsl: "270, 100%, 85%", hex: "#E6E6FA" }];
        function getRandomPastel() { return PastelColors[Math.floor(Math.random()*PastelColors.length)]; }
        function addColorfulParticle(x, y, z, extra = {}) { realmParticles.push({ x, y, z, ...extra, col: getRandomPastel() }); }

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        function initPreviewRealm(id) {
            realmParticles = []; currentPreviewId = id;
            if (id === 1) { let N = 800, R = 180, goldenAngle = Math.PI * (3 - Math.sqrt(5)); for(let i=0; i<N; i++) { let y = 1 - (i / (N - 1)) * 2, radius = Math.sqrt(1 - y*y), theta = goldenAngle * i; addColorfulParticle(Math.cos(theta)*radius*R, y*R, Math.sin(theta)*radius*R, { seed: Math.random()*Math.PI*2, type: 'mani' }); } }
            else if (id === 2) { for (let l = 0; l < 4; l++) { let pCount = [6, 8, 10, 12][l], rOut = 40 + l * 25, hUp = 20 + l * 20; for (let p = 0; p < pCount; p++) { let aC = (Math.PI * 2 / pCount) * p + (l * 0.3); for (let t = 0; t <= 1; t += 0.1) { for (let w = -1; w <= 1; w += 0.4) { let pW = Math.sin(t * Math.PI) * (15 + l * 5), cR = t * rOut, cY = -t * hUp + (w * w * 12); realmParticles.push({ x: cR * Math.cos(aC) - (w * pW) * Math.sin(aC), y: cY + 40, z: cR * Math.sin(aC) + (w * pW) * Math.cos(aC), type: 'lotus', l: l, t: t, col: {hsl: "139, 168, 156"} }); } } } } for(let i=0; i<300; i++) addColorfulParticle((Math.random()-0.5)*300, Math.random()*200-50, (Math.random()-0.5)*300, { type: 'aroma', sy: Math.random()*0.8+0.3, seed: Math.random()*Math.PI*2 }); }
            else if (id === 3) { for(let b = 1; b < 16; b++) { let phi = (Math.PI / 16) * b; for(let s = 0; s < 32; s++) { let theta = (Math.PI * 2 / 32) * s; realmParticles.push({ x: 130 * Math.sin(phi) * Math.cos(theta), y: 130 * Math.cos(phi), z: 130 * Math.sin(phi) * Math.sin(theta), theta: theta, phi: phi, type: 'grid', col:{hsl:"0,0%,88%"} }); } } for(let i = 0; i < 150; i++) { let t = Math.random() * Math.PI * 2, p = Math.acos((Math.random() * 2) - 1), r = Math.random() * 50; realmParticles.push({ x: r*Math.sin(p)*Math.cos(t), y: r*Math.cos(p), z: r*Math.sin(p)*Math.sin(t), speed: Math.random()*0.05+0.02, type: 'core', col:{hsl:"0,0%,100%"} }); } }
            else if (id === 4) { for(let l = 1; l <= 6; l++) { let rL = l * 25, yO = Math.sin(l * 0.5) * 20; for(let p = 0; p < 12; p++) { let ang = (Math.PI * 2 / 12) * p + (l * 0.2); for(let t = 0; t <= 1; t += 0.15) { realmParticles.push({ x: rL * t * Math.cos(ang), y: yO * t - (t * t * 40), z: rL * t * Math.sin(ang), l: l, p: p, t: t, type: 'net' }); } } } }

                        Entering the Unsurpassed Perfect Enlightenment,<br>
                        illuminate the emptiness of all dharmas through <span class="highlight">Prajna</span>,<br>
                        saving all beings across the ten directions.
                    `
                };
            } else if (currentDays >= 101100 && !ms['rank_dedication_10']) {
                rankData = {
                    lock: 'rank_dedication_10', svg: 'svg-dedication', tts: 'Ascension to the Tenth Dedication.',
                    html: `
                        <div class="cert-desc-title">
                            <svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>
                            Hundred Thousand Days of Perseverance
                            <svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>
                        </div>
                        The Dedications are fulfilled. The mind dwells nowhere yet generates boundless compassion.<br>
                        Ascending to the First Ground of Joy,<br>
                        realize the truth of non-arising. Enter deep Samadhi through <span class="highlight">Meditation</span><br>
                        to shelter the universe with the Dharma Cloud.
                    `
                };
            } else if (currentDays >= 10100 && !ms['rank_practice_10']) {
                rankData = {
                    lock: 'rank_practice_10', svg: 'svg-practice', tts: 'Ascension to the Tenth Practice.',
                    html: `
                        <div class="cert-desc-title">
                            <svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>
                            Ten Thousand Days of Fulfillment
                            <svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>
                        </div>
                        The Ten Practices are completed. Practicing the formless true practice within all dharmas.<br>
                        Entering the First Dedication Rank,<br>
                        ground yourself in <span class="highlight">Patience</span> and <span class="highlight">Diligence</span>,<br>
                        dedicating all merits to the absolute truth.
                    `
                };
            } else if (currentDays >= 1000 && !ms['rank_abiding_10']) {
                rankData = {
                    lock: 'rank_abiding_10', svg: 'svg-abode', tts: 'Ascension to the Tenth Abiding.',
                    html: `
                        <div class="cert-desc-title">
                            <svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>
                            A Thousand Days of Steadfastness
                            <svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>
                        </div>
                        The Ten Abodes are accomplished. Born into the Tathagata's family, abiding in the True Nature.<br>
                        Entering the First Practice Rank,<br>
                        focus on <span class="highlight">Discipline</span> to adorn Bodhi<br>
                        and never abandon sentient beings.
                    `
                };
            } else if (currentDays >= 90 && !ms['rank_10']) {
                rankData = {
                    lock: 'rank_10', svg: 'svg-faith', tts: 'Ascension to the Tenth Faith.',
                    html: `
                        <div class="cert-desc-title">
                            <svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>
                            A Hundred Days of Pure Practice
                            <svg viewBox="0 0 24 24"><use href="#lotus-petal"/></svg>
                        </div>
                        The Ten Faiths are fulfilled. You have perfected faith, mindfulness, and diligence.<br>
                        Entering the First Abiding Rank,<br>
                        prepare with the Six Paramitas. Focus on <span class="highlight">Generosity</span><br>
                        to cure stinginess and liberate all beings.
                    `
                };
            }

            const RealmNames = [
                "Supreme Light Illuminating", "Fragrant Lotus Adornments", "Jewel Adornments Universal Light", "Bright Flower Adornments",
                "Radiating Wondrous Flower Light", "Pure Wondrous Brightness", "Flower Lights Adornment", "Majestic Light", "Wondrous Sounds", "Vajra Banner",
                "Emerging Sapphire Light", "Illuminating Brightness", "Saha & Ultimate Bliss", "Tranquil Dustless Light", "Wondrous Bright Lamps",
                "Pure Light Illuminating", "Jewel Adornment", "Free from Dust", "Pure Light Universal Illumination", "Wondrous Jewel Flame"
            ];
            
            const previewEl = document.getElementById('fast-preview');
            previewEl.style.opacity = '1'; playDharmaSound('preview'); 
            
            for(let i = 1; i <= 20; i++) {
                previewEl.innerText = `Realm ${i} · ${RealmNames[i-1]}`;
                initPreviewRealm(i); await sleep(350); 
            }
            previewEl.style.opacity = '0'; realmParticles = []; await sleep(500);
            
            state = 0; initParticles(); await sleep(500);

            state = 1; playDharmaSound('form'); document.getElementById('status-panel').style.opacity = '1'; await sleep(3000); 
            state = 2; document.getElementById('ui-layer').style.opacity = '1'; await sleep(8000); 
            state = 3; document.getElementById('ui-layer').style.opacity = '0'; document.getElementById('status-panel').style.opacity = '0'; await sleep(2000);
            
            const flash = document.getElementById('golden-flash'); flash.style.opacity = '1'; playDharmaSound('seed'); await sleep(200); 
            state = 4; flash.style.transition = 'opacity 4s ease-in'; flash.style.opacity = '0'; await sleep(2500); 

            const immortalSeed = document.getElementById('immortal-seed');
            immortalSeed.style.opacity = '1'; immortalSeed.classList.add('seed-heartbeat');
            await sleep(1000); 
            
            immortalSeed.style.top = '15%'; 
            document.getElementById('profound-text').style.opacity = '1'; 
            await sleep(1000);

            if (rankData) {
                window.currentMilestoneLock = rankData.lock;
                
                document.getElementById('cert-text-body').innerHTML = rankData.html;
                document.getElementById('cert-name-insert').innerText = db.name || "Practitioner";

                ['svg-faith', 'svg-abode', 'svg-practice', 'svg-dedication', 'svg-ground'].forEach(id => {
                    let el = document.getElementById(id);
                    if (el) { el.style.opacity = (id === rankData.svg) ? '1' : '0'; el.style.transform = (id === rankData.svg) ? 'scale(1)' : 'scale(0.8)'; }
                });

                const certUI = document.getElementById('cert-ui');
                certUI.style.opacity = '1'; certUI.style.pointerEvents = 'auto';

                try { let m = new SpeechSynthesisUtterance(rankData.tts); m.lang = 'en-US'; m.rate = 0.85; window.speechSynthesis.speak(m); } catch(e) {}
            } else {
                await sleep(4000); navigateTo('index_en.html');
            }
        }

        function claimCertificate() {
            document.getElementById('cert-ui').style.opacity = '0';
            let db; try { db = JSON.parse(localStorage.getItem('PX_EN_V15.0')) || {}; } catch(e) { db = {}; }
            
            if (!db.milestones) db.milestones = {};
            if (window.currentMilestoneLock) db.milestones[window.currentMilestoneLock] = true;
            
            let currentDays = (db.points || 0) / 100; 
            let calculatedRank = "";
            if (currentDays >= 111100) { let lv = Math.min(10, Math.floor((currentDays - 111100) / 100000) + 1); calculatedRank = ["1st", "2nd", "3rd", "4th", "5th", "6th", "7th", "8th", "9th", "10th"][lv - 1] + " Bhumi Bodhisattva"; }
            else if (currentDays >= 11100) { let lv = Math.floor((currentDays - 11100) / 10000) + 1; calculatedRank = ["1st", "2nd", "3rd", "4th", "5th", "6th", "7th", "8th", "9th", "10th"][lv - 1] + " Dedication Level"; }
            else if (currentDays >= 1100) { let lv = Math.floor((currentDays - 1100) / 1000) + 1; calculatedRank = ["1st", "2nd", "3rd", "4th", "5th", "6th", "7th", "8th", "9th", "10th"][lv - 1] + " Practice Level"; }
            else if (currentDays >= 100) { let lv = Math.floor((currentDays - 100) / 100) + 1; calculatedRank = ["1st", "2nd", "3rd", "4th", "5th", "6th", "7th", "8th", "9th", "10th"][lv - 1] + " Abiding Level"; }
            else { let lv = Math.min(10, Math.floor(currentDays / 10) + 1); calculatedRank = ["1st", "2nd", "3rd", "4th", "5th", "6th", "7th", "8th", "9th", "10th"][lv - 1] + " Faith Level"; }
            db.currentRank = calculatedRank;

            localStorage.setItem('PX_EN_V15.0', JSON.stringify(db));
            navigateTo('index_en.html');
        }

        function toggleScreenshotMode() {
            document.getElementById('cert-actions').style.opacity = '0'; document.getElementById('top-nav').style.opacity = '0';
            const restoreUI = () => { document.getElementById('cert-actions').style.opacity = '1'; document.getElementById('top-nav').style.opacity = '1'; window.removeEventListener('click', restoreUI); window.removeEventListener('touchstart', restoreUI); };
            setTimeout(() => { window.addEventListener('click', restoreUI); window.addEventListener('touchstart', restoreUI, { passive: true }); setTimeout(restoreUI, 5000); }, 100);
        }

        function navigateTo(url) { document.getElementById('page-curtain').style.opacity = '1'; setTimeout(() => { window.location.href = url; }, 1000); }
        function unlockAudio() { if (audioCtx && audioCtx.state === 'suspended') { audioCtx.resume(); } else if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioCtx.resume(); } }
        window.addEventListener('click', unlockAudio); window.addEventListener('touchstart', unlockAudio, { passive: true });
        window.addEventListener('load', runZenEngine);
    </script>
</body>
</html>
