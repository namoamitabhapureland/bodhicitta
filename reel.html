<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏調頻 ‧ 莊嚴法輪</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --gold-dark: #b8860b; --cyan: #8ba89c; --bg-deep: #020202; }
        body { margin: 0; padding: 0; height: 100vh; background: var(--bg-deep); color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: "PingFang TC", "Microsoft JhengHei", serif; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }

        /* ======= 法輪本體（視覺中心）======= */
        #wheel-container { position: relative; width: 320px; height: 320px; cursor: pointer; transform: translateZ(0); filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); transition: filter 0.3s ease; }
        #wheel-container:active { filter: drop-shadow(0 0 25px rgba(243,229,171,0.7)); }
        
        #dharma-wheel { width: 100%; height: 100%; transform-origin: center; transition: transform 2.8s cubic-bezier(0.1, 0.9, 0.2, 1); will-change: transform; }
        
        /* 轉動時的發光效果 */
        .spinning-glow { animation: wheel-glow 2.8s ease-out; }
        @keyframes wheel-glow {
            0% { filter: drop-shadow(0 0 60px var(--solid-gold)) brightness(1.2); }
            100% { filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); brightness(1); }
        }

        /* 幾何與輻條紋路的細節濾鏡 */
        .detail-glow { filter: drop-shadow(0 0 3px rgba(243,229,171,0.5)); }

        /* ======= 文字與特效 ======= */
        #instruction-text { margin-top: 50px; font-size: 1.15rem; color: var(--gold); letter-spacing: 5px; text-align: center; height: 65px; transition: opacity 0.5s; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .sub-text { font-size: 0.85rem; color: var(--cyan); letter-spacing: 2px; margin-top: 8px; opacity: 0.8; }
        .dust-particle { position: absolute; background: rgba(60,60,60,0.8); border-radius: 50%; pointer-events: none; z-index: 10; }

        /* ======= 調頻處方卡片 (籤) ======= */
        #result-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -45%) scale(0.9);
            width: 85%; max-width: 360px; background: rgba(5,5,5,0.98);
            border: 1px solid rgba(212,175,55,0.6); border-radius: 16px;
            box-shadow: 0 0 50px rgba(212,175,55,0.3), inset 0 0 25px rgba(0,0,0,0.8);
            padding: 35px 25px; opacity: 0; pointer-events: none; transition: all 1.8s cubic-bezier(0.1, 0.9, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; text-align: center; z-index: 100;
        }
        #result-card.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        .card-title { color: var(--gold); font-size: 1.25rem; letter-spacing: 4px; margin-bottom: 20px; border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 12px; width: 100%; text-shadow: 0 0 10px var(--solid-gold); }
        .card-content { color: #ccc; font-size: 0.95rem; line-height: 1.8; text-align: justify; letter-spacing: 1px; }
        .card-action { margin-top: 25px; color: var(--cyan); font-weight: bold; letter-spacing: 2px; font-size: 1rem; border-top: 1px dashed rgba(139,168,156,0.3); padding-top: 15px; width: 100%; }
        #close-btn { margin-top: 30px; padding: 12px 35px; background: transparent; border: 1px solid var(--cyan); color: var(--cyan); border-radius: 25px; cursor: pointer; letter-spacing: 3px; font-size: 0.9rem; transition: all 0.3s; }
        #close-btn:active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }
    </style>
</head>
<body>

    <div id="wheel-container" onclick="spinWheel()">
        <svg id="dharma-wheel" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f3e5ab" />
                    <stop offset="50%" stop-color="#d4af37" />
                    <stop offset="100%" stop-color="#b8860b" />
                </linearGradient>
                <pattern id="petal-pattern" patternUnits="userSpaceOnUse" width="10" height="20">
                    <path d="M5 0 C 8 5, 8 10, 5 20 C 2 10, 2 5, 5 0 Z" fill="none" stroke="rgba(243,229,171,0.3)" stroke-width="0.3"/>
                </pattern>
            </defs>
            
            <circle cx="120" cy="120" r="100" fill="rgba(212,175,55,0.02)" />

            <g class="detail-glow">
                <g transform="translate(120,120)">
                    <script>
                        const spokeCount = 8;
                        const spokesG = document.currentScript.parentElement;
                        for(let i=0; i<spokeCount; i++) {
                            const angle = (360/spokeCount) * i;
                            const spokeGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                            spokeGroup.setAttribute("transform", `rotate(${angle})`);
                            
                            // 主光柱
                            const beam = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                            beam.setAttribute("x", "-4"); beam.setAttribute("y", "-85");
                            beam.setAttribute("width", "8"); beam.setAttribute("height", "65");
                            beam.setAttribute("fill", "url(#gold-grad)");
                            beam.setAttribute("rx", "2"); // 圓角
                            spokeGroup.appendChild(beam);
                            
                            // 光柱上的圖騰花紋
                            const pattern = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                            pattern.setAttribute("x", "-3"); pattern.setAttribute("y", "-80");
                            pattern.setAttribute("width", "6"); pattern.setAttribute("height", "55");
                            pattern.setAttribute("fill", "url(#petal-pattern)");
                            spokeGroup.appendChild(pattern);
                            
                            spokesG.appendChild(spokeGroup);
                        }
                    </script>
                </g>
            </g>

            <g stroke="url(#gold-grad)" fill="none" stroke-width="2">
                <circle cx="120" cy="120" r="95" />
                <circle cx="120" cy="120" r="85" stroke-width="1" stroke="rgba(212,175,55,0.4)" />
                
                <g transform="translate(120,120)">
                    <script>
                        const bumpG = document.currentScript.parentElement;
                        for(let i=0; i<8; i++) {
                            const angle = (360/8) * i;
                            const bumpGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                            bumpGroup.setAttribute("transform", `rotate(${angle}) translate(0, -95)`);
                            
                            // 💡 核心細節：12/6/3/9點方位，三個小突起合一
                            if(i%2 === 0) { // 0,2,4,6 對應 12,3,6,9 點
                                const tripleBump = document.createElementNS("http://www.w3.org/2000/svg", "path");
                                tripleBump.setAttribute("d", "M-6 0 C-6 -8, -2 -10, 0 -10 C2 -10, 6 -8, 6 0 L6 3 L-6 3 Z M0 -10 C-3 -16, 3 -16, 0 -10 M-5 -5 C-8 -11, -2 -11, -5 -5 M5 -5 C8 -11, 2 -11, 5 -5");
                                tripleBump.setAttribute("fill", "url(#gold-grad)");
                                tripleBump.setAttribute("stroke", "none");
                                bumpGroup.appendChild(tripleBump);
                            } else {
                                // 其他方向，單一尊貴凸起
                                const singleBump = document.createElementNS("http://www.w3.org/2000/svg", "path");
                                singleBump.setAttribute("d", "M-4 0 C-4 -8, -1 -10, 0 -10 C1 -10, 4 -8, 4 0 L4 3 L-4 3 Z M0 -10 C-2 -14, 2 -14, 0 -10");
                                singleBump.setAttribute("fill", "url(#gold-grad)");
                                singleBump.setAttribute("stroke", "none");
                                bumpGroup.appendChild(singleBump);
                            }
                            bumpG.appendChild(bumpGroup);
                        }
                    </script>
                </g>
            </g>

            <g transform="translate(120,120)">
                <circle cx="0" cy="0" r="28" fill="var(--bg-deep)" stroke="url(#gold-grad)" stroke-width="3" />
                <circle cx="0" cy="0" r="14" fill="url(#gold-grad)" />
                
                <g class="detail-glow" fill="none" stroke="rgba(243,229,171,0.5)" stroke-width="0.3">
                    <script>
                        const centerG = document.currentScript.parentElement;
                        const geoR = 25; const geoC = 8;
                        for(let j=0; j<geoC; j++) {
                            const angle = (360/geoC) * j;
                            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                            // 幾何曲線方程式（縮小版）
                            const d = `M0 ${-geoR} C ${geoR*0.4} ${-geoR*0.4}, ${geoR*0.4} ${geoR*0.4}, 0 ${geoR} C ${-geoR*0.4} ${geoR*0.4}, ${-geoR*0.4} ${geoR*0.4}, 0 ${-geoR}`;
                            path.setAttribute("d", d);
                            path.setAttribute("transform", `rotate(${angle} 0 0)`);
                            centerG.appendChild(path);
                        }
                    </script>
                </g>
            </g>
        </svg>
    </div>

    <div id="instruction-text">
        <div id="main-text">輕觸法輪 ‧ 啟動調頻</div>
        <div id="sub-text" class="sub-text">碾摧無明不善，碾摧粗重無明不善</div>
    </div>

    <div id="result-card">
        <div class="card-title">今日法界觀照</div>
        <div class="card-content" id="card-desc">
            </div>
        <div class="card-action" id="card-action">
            </div>
        <button id="close-btn" onclick="closeCard()">收攝心念</button>
    </div>

    <script>
        let currentTurn = 0;
        let isSpinning = false;
        let currentRotation = 0;

        const mainText = document.getElementById('main-text');
        const subText = document.getElementById('sub-text');
        const wheel = document.getElementById('dharma-wheel');
        const container = document.getElementById('wheel-container');
        const resultCard = document.getElementById('result-card');

        // 模擬題庫 (可執行的普世價值)
        const dharmaPrescriptions = [
            {
                desc: "法界映照出，您的潛意識今日有些緊繃，或許正緊抓著某個『必須如此』的執念，這讓生命頻率大幅消耗。",
                action: "【今日處方】今日在準備抱怨或發脾氣的瞬間，請『深呼吸三次，延遲五秒鐘開口』。把這五秒鐘的空白，當作今日的修行。"
            },
            {
                desc: "讚歎！您今日的心場十分敞開，具備了接納萬物生滅的彈性與勇氣。能量正由負轉正，生機盎然。",
                action: "【今日處方】請在今天『主動且不求回報地幫助一個人』，或者『真誠地讚美一位家人/同事』。將這份正向動能傳遞出去。"
            },
            {
                desc: "太美好了！您今日的心頻與華藏世界的『清淨』高度共振。內在的祥和超越了外在條件，喜悅順流。",
                action: "【今日處方】切莫執著此寧靜。請在今晚睡前，在心中默默祝願一位『您目前覺得有些隔閡的人』，願他也得此平靜。一念迴向，即是一真法界。"
            }
        ];

        function createDust() {
            // 粒子特效
            for(let i=0; i<10; i++) {
                let dust = document.createElement('div');
                dust.className = 'dust-particle';
                let size = Math.random() * 6 + 2;
                dust.style.width = size + 'px'; dust.style.height = size + 'px';
                dust.style.left = '50%'; dust.style.top = '50%';
                container.appendChild(dust);
                
                let angle = Math.random() * Math.PI * 2;
                let distance = Math.random() * 100 + 160;
                
                dust.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 0.8 },
                    { transform: `translate(calc(-50% + ${Math.cos(angle)*distance}px), calc(-50% + ${Math.sin(angle)*distance}px)) scale(0)`, opacity: 0 }
                ], { duration: 1000 + Math.random()*1200, easing: 'ease-out' }).onfinish = () => dust.remove();
            }
        }

        async function spinWheel() {
            if(isSpinning || currentTurn >= 3) return;
            isSpinning = true;
            currentTurn++;

            createDust();
            wheel.classList.remove('spinning-glow');
            void wheel.offsetWidth; 
            wheel.classList.add('spinning-glow');

            // 依據次第設定旋轉（時間稍長以展示細節）
            if(currentTurn === 1) {
                currentRotation += 1080 + Math.random() * 120; // 初轉碾摧無明
                mainText.innerText = "初轉 ‧ 阿含";
                subText.innerText = "碾摧粗重無明不善，車輪碾摧無明不善";
            } else if (currentTurn === 2) {
                currentRotation += 1440 + Math.random() * 120; // 二轉般若真空
                mainText.innerText = "二轉 ‧ 般若";
                subText.innerText = "照見五蘊皆空，碾摧法執煩惱";
            } else if (currentTurn === 3) {
                currentRotation += 1800 + Math.random() * 120; // 三轉歸一
                mainText.innerText = "三轉 ‧ 唯識歸一";
                subText.innerText = "萬法唯心，法界大調頻";
            }

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // 等待動畫結束 (2.8秒)
            await new Promise(r => setTimeout(r, 2800));
            isSpinning = false;

            if(currentTurn === 3) {
                await new Promise(r => setTimeout(r, 800)); // 停頓沉澱
                showPrescription();
            }
        }

        function showPrescription() {
            const data = dharmaPrescriptions[Math.floor(Math.random() * dharmaPrescriptions.length)];
            document.getElementById('card-desc').innerText = data.desc;
            document.getElementById('card-action').innerText = data.action;
            
            container.style.transition = 'opacity 1s, filter 1s';
            container.style.opacity = '0.15';
            container.style.filter = 'blur(8px)';
            mainText.style.opacity = '0';
            subText.style.opacity = '0';

            resultCard.classList.add('show');
        }

        function closeCard() {
            resultCard.classList.remove('show');
            container.style.opacity = '1';
            container.style.filter = 'drop-shadow(0 0 10px rgba(212,175,55,0.2))';
            
            setTimeout(() => {
                mainText.innerText = "今日調頻圓滿";
                subText.innerText = "安住修行，碾摧萬惑";
                mainText.style.opacity = '1';
                subText.style.opacity = '1';
            }, 600);
        }
    </script>
</body>
</html>
