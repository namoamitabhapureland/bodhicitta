<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏調頻 ‧ 轉法輪</title>
    <style>
        :root { 
            --bg-deep: #020202; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
            --score-color: #ffffff; /* 動態注入的能量顏色 */
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg-deep); color: #fff; font-family: "PingFang TC", "Microsoft JhengHei", serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        /* ================= 1. 法輪本體 ================= */
        #wheel-container { position: relative; width: 340px; height: 340px; cursor: pointer; filter: drop-shadow(0 0 15px rgba(212,175,55,0.25)); transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 10; }
        #wheel-container:active { filter: drop-shadow(0 0 35px rgba(243,229,171,0.7)); }
        #wheel-container.fade-back { transform: scale(0.7) translateY(-30px); opacity: 0.15; filter: blur(5px); pointer-events: none; }
        
        #dharma-wheel { width: 100%; height: 100%; transform-origin: center; transition: transform 2.8s cubic-bezier(0.1, 0.9, 0.2, 1); will-change: transform; }
        .spinning-glow { animation: wheel-glow 2.8s ease-out; }
        @keyframes wheel-glow { 0% { filter: drop-shadow(0 0 70px var(--solid-gold)) brightness(1.2); } 100% { filter: drop-shadow(0 0 15px rgba(212,175,55,0.25)); brightness(1); } }

        #text-wrap { position: absolute; bottom: 12%; text-align: center; transition: opacity 0.8s; z-index: 15; }
        .main-text { color: var(--gold); font-size: 1.2rem; letter-spacing: 5px; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .sub-text { color: var(--cyan); font-size: 0.85rem; letter-spacing: 2px; margin-top: 10px; opacity: 0.8; }

        /* ================= 2. 神聖能量法棒 (金剛杵溫度計) ================= */
        #wand-theater {
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 1.5s ease; z-index: 50;
        }
        #wand-theater.show { opacity: 1; pointer-events: auto; }

        /* 法棒容器 */
        .vajra-wand { position: relative; width: 80px; height: 400px; filter: drop-shadow(0 0 15px rgba(212,175,55,0.3)); }
        
        /* 能量水位 (由 JS 動態控制 transform: scaleY) */
        #energy-liquid {
            position: absolute; bottom: 60px; left: 32px; width: 16px; height: 280px;
            background: var(--score-color); border-radius: 8px;
            transform-origin: bottom center; transform: scaleY(0);
            transition: transform 2.5s cubic-bezier(0.1, 0.9, 0.2, 1), background 1s, box-shadow 1s;
            box-shadow: 0 0 20px var(--score-color);
        }

        /* 水位刻度標記 */
        .wand-marks { position: absolute; left: 52px; bottom: 60px; height: 280px; display: flex; flex-direction: column-reverse; justify-content: space-between; padding: 10px 0; }
        .mark-line { width: 6px; height: 1px; background: rgba(212,175,55,0.4); }
        
        /* 浮動跳動的分數 */
        #score-display {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            color: var(--score-color); font-size: 1.5rem; font-weight: bold; letter-spacing: 2px;
            text-shadow: 0 0 15px var(--score-color); opacity: 0; transition: opacity 1s; font-family: monospace;
        }

        /* ================= 3. 純文字法界觀照 (無圖示) ================= */
        #prescription-box {
            width: 85%; max-width: 380px; margin-top: 30px; padding: 25px;
            background: linear-gradient(to bottom, rgba(10,10,10,0.9), rgba(5,5,5,0.95));
            border: 1px solid var(--score-color); border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
            text-align: center; opacity: 0; transform: translateY(20px); transition: all 1.5s ease;
        }
        #prescription-box.show { opacity: 1; transform: translateY(0); box-shadow: 0 0 40px var(--score-color), inset 0 0 15px rgba(255,255,255,0.05); }
        
        .p-title { color: var(--score-color); font-size: 1.1rem; letter-spacing: 4px; font-weight: bold; border-bottom: 1px dashed rgba(255,255,255,0.3); padding-bottom: 12px; margin-bottom: 15px; }
        .p-desc { color: #ddd; font-size: 0.95rem; line-height: 1.8; text-align: justify; margin-bottom: 20px; letter-spacing: 1px;}
        .p-action { color: var(--gold); font-weight: bold; font-size: 0.95rem; letter-spacing: 1px; padding: 12px; background: rgba(212,175,55,0.08); border-radius: 6px; }

        /* 返回按鈕 (純線條) */
        .btn-return {
            margin-top: 30px; padding: 12px 35px; background: transparent; color: var(--cyan);
            border: 1px solid var(--cyan); border-radius: 30px; font-size: 0.9rem; letter-spacing: 3px;
            cursor: pointer; transition: 0.3s; opacity: 0; pointer-events: none;
        }
        .btn-return.show { opacity: 1; pointer-events: auto; }
        .btn-return:active { background: var(--cyan); color: #000; box-shadow: 0 0 20px var(--cyan); }

        .dust-particle { position: absolute; background: rgba(80,80,80,0.8); border-radius: 50%; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <div id="wheel-container" onclick="triggerSpin()">
        <svg id="dharma-wheel" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f3e5ab" />
                    <stop offset="50%" stop-color="#d4af37" />
                    <stop offset="100%" stop-color="#b8860b" />
                </linearGradient>
                <pattern id="petal-pattern" patternUnits="userSpaceOnUse" width="12" height="24">
                    <path d="M 6 0 C 10 6, 10 18, 6 24 C 2 18, 2 6, 6 0 Z" fill="none" stroke="rgba(243,229,171,0.4)" stroke-width="0.5"/>
                </pattern>
            </defs>
            <circle cx="140" cy="140" r="130" fill="rgba(212,175,55,0.02)" />
            <g id="spokes-layer" transform="translate(140,140)"></g>
            <circle cx="140" cy="140" r="110" fill="none" stroke="url(#gold-grad)" stroke-width="5" />
            <circle cx="140" cy="140" r="98" fill="none" stroke="rgba(212,175,55,0.5)" stroke-width="1.5" />
            <g id="outer-bumps" transform="translate(140,140)"></g>
            <circle cx="140" cy="140" r="34" fill="var(--bg-deep)" stroke="url(#gold-grad)" stroke-width="4" />
            <g id="center-mandala" transform="translate(140,140)"></g>
            <circle cx="140" cy="140" r="12" fill="url(#gold-grad)" />
        </svg>
    </div>

    <div id="text-wrap">
        <div id="w-main-text" class="main-text">輕觸法輪 ‧ 啟動調頻</div>
        <div id="w-sub-text" class="sub-text">( 碾摧粗重無明不善 )</div>
    </div>


    <div id="wand-theater">
        
        <div id="score-display">0 Hz</div>
        
        <div class="vajra-wand">
            <div id="energy-liquid"></div>
            
            <div class="wand-marks">
                <div class="mark-line"></div><div class="mark-line"></div><div class="mark-line"></div>
                <div class="mark-line"></div><div class="mark-line"></div><div class="mark-line"></div>
                <div class="mark-line"></div><div class="mark-line"></div><div class="mark-line"></div>
            </div>

            <svg viewBox="0 0 80 400" xmlns="http://www.w3.org/2000/svg" style="position:absolute; top:0; left:0; width:100%; height:100%;">
                <defs>
                    <linearGradient id="vajra-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#b8860b" />
                        <stop offset="50%" stop-color="#f3e5ab" />
                        <stop offset="100%" stop-color="#d4af37" />
                    </linearGradient>
                </defs>
                <path d="M 40 10 C 55 25, 55 45, 40 60 C 25 45, 25 25, 40 10 Z" fill="none" stroke="url(#vajra-grad)" stroke-width="2"/>
                <path d="M 40 15 L 40 55" stroke="url(#vajra-grad)" stroke-width="1"/>
                <rect x="30" y="60" width="20" height="8" fill="url(#vajra-grad)" rx="2"/>
                
                <rect x="30" y="68" width="20" height="264" fill="rgba(255,255,255,0.03)" stroke="url(#vajra-grad)" stroke-width="1.5" rx="10"/>
                
                <rect x="30" y="332" width="20" height="8" fill="url(#vajra-grad)" rx="2"/>
                <path d="M 40 390 C 55 375, 55 355, 40 340 C 25 355, 25 375, 40 390 Z" fill="none" stroke="url(#vajra-grad)" stroke-width="2"/>
                <path d="M 40 385 L 40 345" stroke="url(#vajra-grad)" stroke-width="1"/>
            </svg>
        </div>

        <div id="prescription-box">
            <div class="p-title" id="p-title">【法界觀照】</div>
            <div class="p-desc" id="p-desc"></div>
            <div class="p-action" id="p-action"></div>
        </div>

        <button id="btn-return" class="btn-return" onclick="resetWheel()">收攝 ． 返本還源</button>
    </div>

    <script>
        // ==========================================
        // 霍金斯四階變色資料庫
        // ==========================================
        const hwkinsDB = [
            { min: 0, max: 200, 
              color: "rgba(220, 60, 60, 0.9)", // 幽紅
              desc: "法界之鏡顯示，您潛意識中正被某些『必須如此』的執念或擔憂牽絆，頻率落入了耗能狀態。", 
              action: "【今日處方】抱怨或急躁的瞬間，請深呼吸三次，延遲五秒開口。放過別人，就是放過自己。" },
            { min: 201, max: 400, 
              color: "rgba(240, 150, 50, 0.9)", // 暖橘
              desc: "隨喜！您今日心場十分敞開，具備接納萬物生滅的勇氣與彈性。能量正由負轉正，生機盎然。", 
              action: "【今日處方】請在今日主動且不求回報地幫助一人，或真誠讚美身邊的人，傳遞正向動能。" },
            { min: 401, max: 600, 
              color: "rgba(80, 200, 180, 0.9)", // 琉璃青
              desc: "極佳！您的心頻與華藏的『清淨』高度共振。看世間如看風景，內在有著無條件的喜悅。", 
              action: "【今日處方】切莫執著此份寧靜。請在心中默默祝願一位有隔閡的人，一念迴向即是法界。" },
            { min: 601, max: 1000, 
              color: "rgba(255, 255, 255, 1)", // 白金
              desc: "不可思議。您的頻率已然空靈，超越了世俗對立，與無量光佛本體相印。", 
              action: "【今日處方】無所求，無所住。只需安住當下，如如不動。" }
        ];

        // ==========================================
        // 繪製法輪 (保留之前的完美三合一頂戴)
        // ==========================================
        function buildWheelSVG() {
            const svgNS = "http://www.w3.org/2000/svg";
            const spokesG = document.getElementById('spokes-layer');
            for(let i=0; i<8; i++) {
                const g = document.createElementNS(svgNS, "g"); g.setAttribute("transform", `rotate(${(360/8)*i})`);
                const beam = document.createElementNS(svgNS, "rect"); beam.setAttribute("x", "-7"); beam.setAttribute("y", "-110"); beam.setAttribute("width", "14"); beam.setAttribute("height", "76"); beam.setAttribute("fill", "url(#gold-grad)"); beam.setAttribute("rx", "3"); 
                const pattern = document.createElementNS(svgNS, "rect"); pattern.setAttribute("x", "-7"); pattern.setAttribute("y", "-110"); pattern.setAttribute("width", "14"); pattern.setAttribute("height", "76"); pattern.setAttribute("fill", "url(#petal-pattern)");
                g.appendChild(beam); g.appendChild(pattern); spokesG.appendChild(g);
            }
            const bumpsG = document.getElementById('outer-bumps');
            for(let i=0; i<8; i++) {
                const g = document.createElementNS(svgNS, "g"); g.setAttribute("transform", `rotate(${(360/8)*i}) translate(0, -110)`);
                const orn = document.createElementNS(svgNS, "path"); orn.setAttribute("fill", "url(#gold-grad)");
                if(i % 2 === 0) orn.setAttribute("d", "M -18,0 C -18,-8 -12,-10 -8,-7 C -5,-16 5,-16 8,-7 C 12,-10 18,-8 18,0 Z");
                else orn.setAttribute("d", "M -14,0 C -14,-10 -6,-15 0,-16 C 6,-15 14,-10 14,0 Z");
                g.appendChild(orn); bumpsG.appendChild(g);
            }
            const centerG = document.getElementById('center-mandala');
            for(let j=0; j<8; j++) {
                const path = document.createElementNS(svgNS, "path"); path.setAttribute("d", `M0 -26 C 13 -17.8, 13 7.8, 0 26 C -13 7.8, -13 -17.8, 0 -26`);
                path.setAttribute("transform", `rotate(${(360/8)*j})`); path.setAttribute("stroke", "rgba(212,175,55,0.7)"); path.setAttribute("fill", "rgba(243,229,171,0.15)"); centerG.appendChild(path);
            }
        }
        buildWheelSVG();

        // ==========================================
        // 互動邏輯
        // ==========================================
        let wTurn = 0; let isSpinning = false; let wRot = 0;
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        function createDust() {
            const container = document.getElementById('wheel-container');
            for(let i=0; i<12; i++) {
                let dust = document.createElement('div'); dust.className = 'dust-particle';
                let size = Math.random() * 5 + 3; dust.style.width = size + 'px'; dust.style.height = size + 'px';
                dust.style.left = '50%'; dust.style.top = '50%'; container.appendChild(dust);
                let angle = Math.random() * Math.PI * 2; let distance = Math.random() * 120 + 170; 
                dust.animate([{ transform: 'translate(-50%, -50%) scale(1)', opacity: 0.8 }, { transform: `translate(calc(-50% + ${Math.cos(angle)*distance}px), calc(-50% + ${Math.sin(angle)*distance}px)) scale(0)`, opacity: 0 }], { duration: 1100 + Math.random()*1200, easing: 'ease-out' }).onfinish = () => dust.remove();
            }
        }

        async function triggerSpin() {
            if(isSpinning || wTurn >= 3) return;
            isSpinning = true; wTurn++;
            
            const wheel = document.getElementById('dharma-wheel');
            wheel.classList.remove('spinning-glow'); void wheel.offsetWidth; wheel.classList.add('spinning-glow');
            createDust();

            if(wTurn === 1) { wRot += 1080; document.getElementById('w-main-text').innerText = "初轉 ‧ 阿含"; }
            else if (wTurn === 2) { wRot += 1440; document.getElementById('w-main-text').innerText = "二轉 ‧ 般若"; document.getElementById('w-sub-text').innerText = "( 照見五蘊皆空 )";}
            else if (wTurn === 3) { wRot += 1800; document.getElementById('w-main-text').innerText = "三轉 ‧ 唯識歸一"; document.getElementById('w-sub-text').innerText = "( 法界能量共振 )";}
            
            wheel.style.transform = `rotate(${wRot}deg)`;
            await sleep(2800);
            isSpinning = false;

            if(wTurn === 3) {
                await sleep(600);
                showWandMechanism();
            }
        }

        async function showWandMechanism() {
            // 1. 法輪隱退
            document.getElementById('wheel-container').classList.add('fade-back');
            document.getElementById('text-wrap').style.opacity = '0';
            
            // 2. 隨機計算霍金斯能量
            let score = Math.floor(Math.random() * 800) + 50; 
            if(Math.random() < 0.1) score += 200; if(score > 1000) score = 1000;
            let preset = hwkinsDB.find(h => score >= h.min && score <= h.max) || hwkinsDB[1];

            // 3. 綁定色彩與文字
            const root = document.documentElement;
            root.style.setProperty('--score-color', preset.color);
            document.getElementById('p-title').style.color = preset.color;
            document.getElementById('p-title').style.borderBottomColor = preset.color;
            document.getElementById('p-desc').innerText = preset.desc;
            document.getElementById('p-action').innerText = preset.action;
            document.getElementById('p-action').style.color = preset.color;

            // 4. 浮現法棒劇院
            const theater = document.getElementById('wand-theater');
            theater.classList.add('show');
            await sleep(1000);

            // 5. 能量水位動畫衝刺 (0 -> 目標分數比例)
            const liquid = document.getElementById('energy-liquid');
            const scaleValue = score / 1000;
            liquid.style.transform = `scaleY(${scaleValue})`;
            
            // 數字跳動
            const scoreDisplay = document.getElementById('score-display');
            scoreDisplay.style.opacity = '1';
            let currentNum = 0;
            let counter = setInterval(() => {
                currentNum += 25;
                if(currentNum >= score) { currentNum = score; clearInterval(counter); }
                scoreDisplay.innerText = currentNum + " Hz";
            }, 50);

            await sleep(2500); // 等待水柱衝到頂

            // 6. 顯示法界觀照籤詩與返回鈕
            document.getElementById('prescription-box').classList.add('show');
            document.getElementById('btn-return').classList.add('show');
        }

        // 測試用重置按鈕
        function resetWheel() {
            wTurn = 0; wRot = 0;
            document.getElementById('dharma-wheel').style.transform = `rotate(0deg)`;
            document.getElementById('wheel-container').classList.remove('fade-back');
            document.getElementById('text-wrap').style.opacity = '1';
            document.getElementById('w-main-text').innerText = "輕觸法輪 ‧ 啟動調頻";
            document.getElementById('w-sub-text').innerText = "( 碾摧粗重無明不善 )";
            
            document.getElementById('wand-theater').classList.remove('show');
            document.getElementById('energy-liquid').style.transform = `scaleY(0)`;
            document.getElementById('score-display').style.opacity = '0';
            document.getElementById('prescription-box').classList.remove('show');
            document.getElementById('btn-return').classList.remove('show');
        }
    </script>
</body>
</html>
