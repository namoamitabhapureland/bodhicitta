<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏調頻 ‧ 尊貴法輪</title>
    <style>
        /* 💡 完全採用您指定的明亮純淨真金配色 */
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --gold-dark: #b8860b; --cyan: #8ba89c; --bg-deep: #020202; }
        body { margin: 0; padding: 0; height: 100vh; background: var(--bg-deep); color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: "PingFang TC", "Microsoft JhengHei", serif; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }

        #wheel-container { position: relative; width: 340px; height: 340px; cursor: pointer; transform: translateZ(0); filter: drop-shadow(0 0 15px rgba(212,175,55,0.25)); transition: filter 0.3s ease; }
        #wheel-container:active { filter: drop-shadow(0 0 35px rgba(243,229,171,0.7)); }
        
        #dharma-wheel { width: 100%; height: 100%; transform-origin: center; transition: transform 2.8s cubic-bezier(0.1, 0.9, 0.2, 1); will-change: transform; }
        
        .spinning-glow { animation: wheel-glow 2.8s ease-out; }
        @keyframes wheel-glow {
            0% { filter: drop-shadow(0 0 70px var(--solid-gold)) brightness(1.2); }
            100% { filter: drop-shadow(0 0 15px rgba(212,175,55,0.25)); brightness(1); }
        }

        #instruction-text { margin-top: 40px; font-size: 1.15rem; color: var(--gold); letter-spacing: 5px; text-align: center; height: 65px; transition: opacity 0.5s; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .sub-text { font-size: 0.85rem; color: var(--cyan); letter-spacing: 2px; margin-top: 8px; opacity: 0.8; }
        .dust-particle { position: absolute; background: rgba(60,60,60,0.8); border-radius: 50%; pointer-events: none; z-index: 10; filter: blur(1px); }

        #result-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -45%) scale(0.9);
            width: 85%; max-width: 360px; background: rgba(5,5,5,0.96);
            border: 1px solid rgba(212,175,55,0.6); border-radius: 16px;
            box-shadow: 0 0 50px rgba(212,175,55,0.3), inset 0 0 30px rgba(0,0,0,0.9);
            padding: 35px 25px; opacity: 0; pointer-events: none; transition: all 1.8s cubic-bezier(0.1, 0.9, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; text-align: center; z-index: 100;
        }
        #result-card.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        .card-title { color: var(--gold); font-size: 1.25rem; letter-spacing: 4px; margin-bottom: 20px; border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 12px; width: 100%; text-shadow: 0 0 10px var(--solid-gold); }
        .card-content { color: #ddd; font-size: 0.95rem; line-height: 1.8; text-align: justify; letter-spacing: 1px; }
        .card-action { margin-top: 25px; color: var(--cyan); font-weight: bold; letter-spacing: 2px; font-size: 1rem; border-top: 1px dashed rgba(139,168,156,0.3); padding-top: 15px; width: 100%; }
        #close-btn { margin-top: 30px; padding: 12px 35px; background: transparent; border: 1px solid var(--cyan); color: var(--cyan); border-radius: 25px; cursor: pointer; letter-spacing: 3px; font-size: 0.9rem; transition: all 0.3s; }
        #close-btn:active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }
    </style>
</head>
<body>

    <div id="wheel-container" onclick="spinWheel()">
        <svg id="dharma-wheel" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f3e5ab" />
                    <stop offset="50%" stop-color="#d4af37" />
                    <stop offset="100%" stop-color="#b8860b" />
                </linearGradient>
                <pattern id="petal-pattern" patternUnits="userSpaceOnUse" width="12" height="24">
                    <path d="M 6 0 C 10 6, 10 18, 6 24 C 2 18, 2 6, 6 0 Z" fill="none" stroke="rgba(243,229,171,0.4)" stroke-width="0.5"/>
                </pattern>
            </defs>
            
            <circle cx="140" cy="140" r="130" fill="rgba(212,175,55,0.02)" />

            <g id="spokes-layer" transform="translate(140,140)"></g>

            <circle cx="140" cy="140" r="110" fill="none" stroke="url(#gold-grad)" stroke-width="5" />
            <circle cx="140" cy="140" r="98" fill="none" stroke="rgba(212,175,55,0.5)" stroke-width="1.5" />
            
            <g id="outer-bumps" transform="translate(140,140)"></g>

            <circle cx="140" cy="140" r="34" fill="var(--bg-deep)" stroke="url(#gold-grad)" stroke-width="4" />
            <g id="center-mandala" transform="translate(140,140)"></g>
            <circle cx="140" cy="140" r="12" fill="url(#gold-grad)" />
        </svg>
    </div>

    <div id="instruction-text">
        <div id="main-text">輕觸法輪 ‧ 啟動調頻</div>
        <div id="sub-text" class="sub-text">碾摧無明不善，轉念一觸即發</div>
    </div>

    <div id="result-card">
        <div class="card-title">今日法界觀照</div>
        <div class="card-content" id="card-desc"></div>
        <div class="card-action" id="card-action"></div>
        <button id="close-btn" onclick="closeCard()">收攝心念</button>
    </div>

    <script>
        function buildWheelGeometry() {
            const svgNS = "http://www.w3.org/2000/svg";

            // 1. 繪製輻條
            const spokesG = document.getElementById('spokes-layer');
            for(let i=0; i<8; i++) {
                const angle = (360/8) * i;
                const g = document.createElementNS(svgNS, "g");
                g.setAttribute("transform", `rotate(${angle})`);

                const beamW = 14; 
                const beam = document.createElementNS(svgNS, "rect");
                beam.setAttribute("x", -beamW/2); beam.setAttribute("y", "-110");
                beam.setAttribute("width", beamW); beam.setAttribute("height", "76");
                beam.setAttribute("fill", "url(#gold-grad)");
                beam.setAttribute("rx", "3"); 
                
                const pattern = document.createElementNS(svgNS, "rect");
                pattern.setAttribute("x", -beamW/2); pattern.setAttribute("y", "-110");
                pattern.setAttribute("width", beamW); pattern.setAttribute("height", "76");
                pattern.setAttribute("fill", "url(#petal-pattern)");
                
                g.appendChild(beam);
                g.appendChild(pattern);
                spokesG.appendChild(g);
            }

            // 2. 💡 完美保留：與輪子融合的「雕花頂戴」造型
            const bumpsG = document.getElementById('outer-bumps');
            const ringR = 110; 
            
            for(let i=0; i<8; i++) {
                const angle = (360/8) * i;
                const g = document.createElementNS(svgNS, "g");
                g.setAttribute("transform", `rotate(${angle}) translate(0, -${ringR})`);

                const ornament = document.createElementNS(svgNS, "path");
                ornament.setAttribute("fill", "url(#gold-grad)");

                if(i % 2 === 0) { 
                    // 💡 主方位 (12, 3, 6, 9)：一體成形的「三山寶冠 / 蓮花瓣」造型
                    ornament.setAttribute("d", "M -18,0 C -18,-8 -12,-10 -8,-7 C -5,-16 5,-16 8,-7 C 12,-10 18,-8 18,0 Z");
                } else {
                    // 💡 次方位：一體成形的「單尖寶珠 / 火焰」造型
                    ornament.setAttribute("d", "M -14,0 C -14,-10 -6,-15 0,-16 C 6,-15 14,-10 14,0 Z");
                }
                g.appendChild(ornament);
                bumpsG.appendChild(g);
            }

            // 3. 中心玉石曼荼羅
            const centerG = document.getElementById('center-mandala');
            const geoR = 26; 
            const faintFill = "rgba(243,229,171,0.15)"; // 配合明亮金色的 15% 透明度，更顯玉石溫潤

            for(let j=0; j<8; j++) {
                const angle = (360/8) * j;
                const path = document.createElementNS(svgNS, "path");
                const d = `M0 ${-geoR} C ${geoR*0.5} ${-geoR*0.3}, ${geoR*0.5} ${geoR*0.3}, 0 ${geoR} C ${-geoR*0.5} ${geoR*0.3}, ${-geoR*0.5} ${-geoR*0.3}, 0 ${-geoR}`;
                path.setAttribute("d", d);
                path.setAttribute("transform", `rotate(${angle})`);
                path.setAttribute("stroke", "rgba(212,175,55,0.7)"); 
                path.setAttribute("stroke-width", "1");
                path.setAttribute("fill", faintFill); 
                centerG.appendChild(path);
            }
        }

        let currentTurn = 0;
        let isSpinning = false;
        let currentRotation = 0;

        const mainText = document.getElementById('main-text');
        const subText = document.getElementById('sub-text');
        const wheel = document.getElementById('dharma-wheel');
        const container = document.getElementById('wheel-container');
        const resultCard = document.getElementById('result-card');

        const dharmaPrescriptions = [
            {
                desc: "法界映照出，您的潛意識今日有些緊繃，或許正緊抓著某個『必須如此』的執念，這讓生命頻率大幅消耗。",
                action: "【今日處方】抱怨或發脾氣的瞬間，請『深呼吸三次，延遲五秒開口』。把這五秒鐘的空白，當作今日的修行。"
            },
            {
                desc: "讚歎！您今日的心場十分敞開，具備了接納萬物生滅的彈性與勇氣。能量正由負轉正，生機盎然。",
                action: "【今日處方】請在今天『主動且不求回報地幫助一個人』，或者『真誠地讚美一位家人/同事』。將這份動能傳遞出去。"
            },
            {
                desc: "太美好了！您今日的心頻與華藏世界的『清淨』高度共振。內在的祥和超越了外在條件，喜悅順流。",
                action: "【今日處方】請在今晚睡前，在心中默默祝願一位『您目前覺得有些隔閡的人』，願他也得此平靜。一念迴向，即是一真法界。"
            }
        ];

        function createDust() {
            for(let i=0; i<12; i++) {
                let dust = document.createElement('div');
                dust.className = 'dust-particle';
                let size = Math.random() * 5 + 3;
                dust.style.width = size + 'px'; dust.style.height = size + 'px';
                dust.style.left = '50%'; dust.style.top = '50%';
                container.appendChild(dust);
                
                let angle = Math.random() * Math.PI * 2;
                let distance = Math.random() * 120 + 170; 
                
                dust.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 0.8 },
                    { transform: `translate(calc(-50% + ${Math.cos(angle)*distance}px), calc(-50% + ${Math.sin(angle)*distance}px)) scale(0)`, opacity: 0 }
                ], { duration: 1100 + Math.random()*1200, easing: 'ease-out' }).onfinish = () => dust.remove();
            }
        }

        async function spinWheel() {
            if(isSpinning || currentTurn >= 3) return;
            isSpinning = true;
            currentTurn++;

            createDust();
            wheel.classList.remove('spinning-glow');
            void wheel.offsetWidth; 
            wheel.classList.add('spinning-glow');

            if(currentTurn === 1) {
                currentRotation += 1080 + Math.random() * 120; 
                mainText.innerText = "初轉 ‧ 阿含";
                subText.innerText = "碾摧粗重無明不善，車輪碾摧無明";
            } else if (currentTurn === 2) {
                currentRotation += 1440 + Math.random() * 120; 
                mainText.innerText = "二轉 ‧ 般若";
                subText.innerText = "照見五蘊皆空，破除法執煩惱";
            } else if (currentTurn === 3) {
                currentRotation += 1800 + Math.random() * 120; 
                mainText.innerText = "三轉 ‧ 唯識歸一";
                subText.innerText = "萬法唯心，法界大調頻";
            }

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            await new Promise(r => setTimeout(r, 2800));
            isSpinning = false;

            if(currentTurn === 3) {
                await new Promise(r => setTimeout(r, 800)); 
                showPrescription();
            }
        }

        function showPrescription() {
            const data = dharmaPrescriptions[Math.floor(Math.random() * dharmaPrescriptions.length)];
            document.getElementById('card-desc').innerText = data.desc;
            document.getElementById('card-action').innerText = data.action;
            
            container.style.transition = 'opacity 1s, filter 1s';
            container.style.opacity = '0.15';
            container.style.filter = 'blur(8px)'; 
            mainText.style.opacity = '0';
            subText.style.opacity = '0';

            resultCard.classList.add('show');
        }

        function closeCard() {
            resultCard.classList.remove('show');
            container.style.opacity = '1';
            container.style.filter = 'drop-shadow(0 0 15px rgba(212,175,55,0.25))';
            
            setTimeout(() => {
                mainText.innerText = "今日調頻圓滿";
                subText.innerText = "安住修行，碾摧萬惑";
                mainText.style.opacity = '1';
                subText.style.opacity = '1';
            }, 600);
        }

        window.onload = buildWheelGeometry;
    </script>
</body>
</html>
