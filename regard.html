<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九華悲願 ． 數位懺悔室</title>
    <style>
        /* (保留你原本所有完美 99 分的 CSS，此處為節省版面略縮，請將你原本的 CSS 完整保留) */
        :root { --bg-deep: #010102; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; --blood-red: #8b0000; --text-main: #d0d0d0; }
        body { margin: 0; background: var(--bg-deep); color: var(--text-main); font-family: "PingFang TC", serif; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* 這裡放你原本的 back-btn, status-panel, matrix-section, canvas 等等... */
        .back-btn { position: absolute; top: 20px; left: 20px; z-index: 1000; color: var(--gold); text-decoration: none; padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3); background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .matrix-section { position: absolute; inset: 0; background: #000; overflow: hidden; transition: background 0.8s; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
        #salvation-flash { position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, #ffffff 0%, #f3e5ab 40%, #d4af37 100%); opacity: 0; pointer-events: none; z-index: 99999; transition: opacity 0.2s ease-out; }
        .ui-layer { position: absolute; bottom: 8%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; gap: 12px; }
        .switch-btn { width: 85%; max-width: 320px; justify-content: center; background: linear-gradient(135deg, rgba(20,20,20,0.9), rgba(5,5,5,0.95)); border: 1px solid rgba(212,175,55,0.5); color: var(--gold); padding: 14px 20px; border-radius: 30px; font-size: 1rem; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 10px; }

        /* ✨ 新增：懺悔明鏡 (AI 互動區) ✨ */
        #confess-panel {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; z-index: 100;
            background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(15px);
            border: 1px solid rgba(212,175,55,0.4); border-radius: 20px;
            padding: 25px 20px; display: none; flex-direction: column;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.1);
        }
        #confess-text {
            width: 100%; height: 150px; background: rgba(0,0,0,0.5); border: 1px solid #444;
            border-radius: 12px; color: #ddd; padding: 15px; font-size: 0.95rem; line-height: 1.6;
            outline: none; resize: none; margin-bottom: 15px; font-family: inherit;
        }
        #confess-text:focus { border-color: var(--cyan); }
        .ai-response {
            color: var(--gold); font-size: 0.95rem; line-height: 1.8; text-align: justify;
            margin-top: 15px; padding-top: 15px; border-top: 1px dashed rgba(212,175,55,0.3);
            display: none; white-space: pre-wrap; max-height: 250px; overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="back-btn" onclick="window.location.href='index.html?screen=3'">← 回道場</div>

    <section class="matrix-section" id="bg-section">
        <canvas id="matrixCanvas"></canvas>
        <div id="salvation-flash"></div>

        <div id="confess-panel">
            <h3 style="color:var(--gold); margin:0 0 15px 0; text-align:center; letter-spacing:2px;">地藏明鏡 ． 坦白罪相</h3>
            <textarea id="confess-text" placeholder="請在此卸下您的懊悔、過錯或執念。&#10;此處無人評判，唯有諸佛之慈悲。&#10;當您點擊送出，法界即為您傾聽..."></textarea>
            
            <button class="switch-btn" id="btn-submit" onclick="submitConfession()" style="width:100%; font-size:0.9rem;">
                向法界傾吐 (AI 祈請)
            </button>
            
            <div class="ai-response" id="ai-response"></div>

            <button class="switch-btn" id="btn-purify" onclick="purifyAndClose()" style="width:100%; font-size:0.9rem; margin-top:15px; display:none; background:rgba(139,168,156,0.2); border-color:var(--cyan);">
                心亡罪滅 ． 沐浴白光
            </button>
        </div>

        <div class="ui-layer" id="ui-layer">
            <button class="switch-btn" onclick="openConfession()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z"/></svg>
                <span>直墮幽冥 ． 開啟懺悔</span>
            </button>
        </div>
    </section>

    <script>
        // (保留你原本 3D Canvas 星空與漩渦的 JavaScript)

        // ==========================================
        // ✨ 懺悔室 AI 核心邏輯 ✨
        // ==========================================
        
        // ⚠️ 請在這裡填入你申請的 Gemini API Key
        const GEMINI_API_KEY = "AIzaSy_這裡替換成你的真實金鑰_XXXXX"; 
        
        function openConfession() {
            document.getElementById('confess-panel').style.display = 'flex';
            document.getElementById('ui-layer').style.display = 'none';
            // 這裡可以呼叫你的 toggleHell(1) 讓背景變成業海
        }

        async function submitConfession() {
            const text = document.getElementById('confess-text').value.trim();
            if (!text) return alert("請先輸入您的懺悔或罣礙。");

            const btn = document.getElementById('btn-submit');
            const resDiv = document.getElementById('ai-response');
            
            btn.innerText = "菩薩諦聽中... (法界連線)";
            btn.disabled = true;
            resDiv.style.display = 'none';

            // 構建給 AI 的完美系統提示詞 (System Prompt)
            const prompt = `
你現在是彌陀淨土系統中的「數位地藏菩薩/清淨高僧」。
使用者即將向你懺悔他們的過錯、煩惱或執念。
請依據大乘佛法（如《地藏經》、《金剛經》），給予一段不超過 150 字的開示。
語氣必須：極度溫柔、絕對不評判、充滿慈悲、並引導他們放下執著，明白「罪性本空」的道理。
使用者的懺悔內容：${text}
            `;

            try {
                // 呼叫 Gemini API (使用 1.5 Flash 模型，速度最快、免費)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                
                // 解析 AI 回傳的文字
                const aiText = data.candidates[0].content.parts[0].text;
                
                // 顯示開示結果，並顯示「白光淨化」按鈕
                resDiv.innerText = aiText;
                resDiv.style.display = 'block';
                btn.style.display = 'none';
                document.getElementById('confess-text').style.display = 'none';
                document.getElementById('btn-purify').style.display = 'flex';

            } catch (error) {
                console.error(error);
                btn.innerText = "連線微弱，請稍後再試";
                btn.disabled = false;
            }
        }

        // 觸發白光，徹底清空對話 (無痕清淨)
        function purifyAndClose() {
            const flash = document.getElementById('salvation-flash');
            flash.style.opacity = '1';
            
            // 播放你原本的音效 playSound(0) 等等...

            setTimeout(() => {
                // 清空資料，回歸出廠設定
                document.getElementById('confess-panel').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'flex';
                document.getElementById('confess-text').value = "";
                document.getElementById('confess-text').style.display = 'block';
                document.getElementById('ai-response').style.display = 'none';
                document.getElementById('btn-submit').style.display = 'flex';
                document.getElementById('btn-submit').innerText = "向法界傾吐 (AI 祈請)";
                document.getElementById('btn-submit').disabled = false;
                document.getElementById('btn-purify').style.display = 'none';
                
                flash.style.opacity = '0';
            }, 3000);
        }
    </script>
</body>
</html>
