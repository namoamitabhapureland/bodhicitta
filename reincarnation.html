<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>唯識之旅 ． 輪迴啟動</title>
    <style>
        body {
            margin: 0; background-color: #050505; color: #f3e5ab;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        
        .header {
            width: 100%; padding: 25px 0; text-align: center;
            background: linear-gradient(180deg, rgba(20,15,5,0.9) 0%, rgba(5,5,5,1) 100%);
            border-bottom: 1px solid rgba(212,175,55,0.2);
            position: relative; z-index: 10;
        }
        .header h1 {
            margin: 0; font-size: 1.3rem; letter-spacing: 4px; color: #d4af37;
            text-shadow: 0 0 15px rgba(212,175,55,0.5); font-weight: normal;
        }

        .visual-matrix {
            width: 100%; max-width: 450px; padding: 30px 20px 0;
            display: flex; justify-content: center; align-items: center;
        }

        .dharma-text-box {
            width: 85%; max-width: 500px; margin-top: 20px;
            padding: 30px; border-radius: 12px;
            background: linear-gradient(145deg, rgba(212,175,55,0.05) 0%, rgba(0,0,0,0.5) 100%);
            border: 1px solid rgba(212,175,55,0.25);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
        }
        .highlight-quote {
            font-size: 1.2rem; color: #fff; text-align: center; letter-spacing: 3px;
            margin-bottom: 25px; text-shadow: 0 0 10px rgba(255,255,255,0.3);
            border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 15px;
        }
        .text-paragraph {
            font-size: 0.95rem; color: rgba(255,255,255,0.8); line-height: 1.9;
            letter-spacing: 1.5px; text-align: justify; margin-bottom: 20px;
        }
        .text-paragraph strong {
            color: #d4af37; font-weight: normal;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>輪迴轉世 ． 第一步</h1>
    </div>

    <div class="visual-matrix">
        <svg viewBox="0 0 300 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#d4af37" stop-opacity="0.8"/>
                    <stop offset="100%" stop-color="#d4af37" stop-opacity="0.1"/>
                </linearGradient>
                <linearGradient id="driveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ff6b00"/>
                    <stop offset="100%" stop-color="#d4af37"/>
                </linearGradient>
                <filter id="neonGlow">
                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <g transform="translate(150, 280)">
                <path d="M -25 0 C -25 -30, 25 -30, 25 0 C 25 35, 0 45, 0 45 C 0 45, -25 35, -25 0 Z" fill="none" stroke="url(#bodyGrad)" stroke-width="1.5"/>
                <path d="M -15 35 C -45 50, -70 80, -70 120 L 70 120 C 70 80, 45 50, 15 35" fill="none" stroke="url(#bodyGrad)" stroke-width="1.2" stroke-dasharray="3 4"/>
                <circle cx="0" cy="-5" r="3" fill="rgba(212,175,55,0.5)"/>
            </g>

            <g transform="translate(150, 120)">
                <line x1="0" y1="40" x2="0" y2="130" stroke="rgba(212,175,55,0.3)" stroke-width="1" stroke-dasharray="4 4">
                    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="2s" repeatCount="indefinite" />
                </line>

                <circle cx="0" cy="0" r="35" fill="none" stroke="url(#driveGrad)" stroke-width="2.5" filter="url(#neonGlow)">
                    <animate attributeName="r" values="35; 38; 35" dur="1.5s" repeatCount="indefinite"/>
                    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
                </circle>
                <circle cx="0" cy="-35" r="4" fill="#ff6b00"/>
                <circle cx="0" cy="35" r="4" fill="#ff6b00"/>

                <g opacity="0.9">
                    <circle cx="0" cy="0" r="22" fill="rgba(20,30,50,0.8)" stroke="#4a90e2" stroke-width="0.8"/>
                    <circle cx="-8" cy="-8" r="1.5" fill="#fff"/>
                    <circle cx="10" cy="-4" r="2" fill="#fff"/>
                    <circle cx="-5" cy="10" r="1" fill="#fff"/>
                    <circle cx="6" cy="8" r="1.5" fill="#fff"/>
                    <circle cx="0" cy="0" r="2.5" fill="#4a90e2" filter="url(#neonGlow)"/>
                    <path d="M -8 -8 L 0 0 L 10 -4 M 0 0 L -5 10 M 0 0 L 6 8" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
                </g>
            </g>

            <text x="150" y="50" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle" letter-spacing="2">【 第七識：驅動引擎 】</text>
            <text x="150" y="220" fill="rgba(212,175,55,0.6)" font-size="10" text-anchor="middle" letter-spacing="2">【 目標載體鎖定 】</text>
        </svg>
    </div>

    <div class="dharma-text-box">
        <div class="highlight-quote">「 不怕死，不等死 」</div>
        
        <div class="text-paragraph">
            <strong>第八識（阿賴耶）</strong>本身只是一個龐大的記憶叢聚，沒有靈魂與動機。若無外力介入，它僅是一組沉睡的靜態數據，不會主動進入輪迴。
        </div>
        
        <div class="text-paragraph">
            <strong>第七識（我執）</strong>則是這套系統的驅動引擎。因為強烈地「不想消失、不想死」，這股巨大的執念抓取了第八識的記憶庫，啟動了尋找新載體的「投胎程序」。
        </div>

        <div class="text-paragraph" style="border-top: 1px dashed rgba(212,175,55,0.3); padding-top: 15px; margin-bottom: 0;">
            高階行者看破了系統的幻象，卻選擇保留一份<strong>「利他的我執」</strong>。他們帶著極樂世界賦予的最高權限（不墮惡道之保障），不畏懼載體的生滅，主動將這龐大的記憶叢聚，再次駛入娑婆世界。
        </div>
    </div>

</body>
</html>
