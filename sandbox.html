<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>柔光記帳 - 報表與明細</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #F9F8F6, #EAE6DF);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-shadow: 0 8px 32px rgba(180, 175, 170, 0.15);
            
            --text-main: #5C544E;
            --text-light: #9A928B;
            --accent-gold: #D4A373;
            --accent-red: #D89A9E; /* 溫柔的超支警戒色 */
            
            /* 分類專屬柔和色彩 */
            --cat-food: #E2B4B7;   /* 柔玫瑰 */
            --cat-trans: #A8C2CB;  /* 灰霧藍 */
            --cat-house: #D4A373;  /* 陶土金 */
            --cat-ent: #8BA89C;    /* 青蓮綠 */
            --cat-other: #C4B7CB;  /* 丁香紫 */
        }

        body {
            margin: 0; padding: 0; background: var(--bg-gradient); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh; display: flex; justify-content: center; overflow: hidden;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }

        .app-container {
            width: 100%; max-width: 400px; height: 100%; display: flex; flex-direction: column;
            align-items: center; padding-top: 20px; box-sizing: border-box;
        }

        /* 頂部導航 */
        .header {
            width: 90%; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: var(--glass-shadow); color: var(--text-main);
        }
        .header-title { font-size: 1.1rem; font-weight: 500; letter-spacing: 2px; }

        /* 玻璃質感的 SVG 圓餅圖區塊 */
        .chart-card {
            width: 90%; background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 30px; box-shadow: var(--glass-shadow);
            padding: 30px 20px; display: flex; flex-direction: column; align-items: center; position: relative;
            margin-bottom: 20px; flex-shrink: 0;
        }

        .chart-container {
            position: relative; width: 180px; height: 180px;
        }
        
        svg.donut {
            width: 100%; height: 100%; transform: rotate(-90deg); /* 讓圓餅圖從正上方開始繪製 */
            overflow: visible;
        }
        
        .donut-segment {
            fill: transparent; stroke-width: 3.5; /* 極細的高雅線條 */
            stroke-linecap: round;
            /* 加入 CSS 動畫讓線條生長 */
            transition: stroke-dasharray 1s ease-out, stroke-dashoffset 1s ease-out;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.08));
        }

        .chart-center-text {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .total-label { font-size: 0.8rem; color: var(--text-light); letter-spacing: 1px; margin-bottom: 4px; }
        .total-amount { font-size: 1.8rem; font-weight: 300; color: var(--text-main); }
        .budget-hint { font-size: 0.7rem; color: var(--accent-gold); margin-top: 4px; opacity: 0.8; }

        /* 明細列表區塊 (可滾動) */
        .list-container {
            width: 90%; flex: 1; overflow-y: auto; padding-bottom: 40px;
            /* 隱藏卷軸但保留滑動功能 */
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .list-container::-webkit-scrollbar { display: none; }

        .list-header {
            font-size: 0.85rem; color: var(--text-light); letter-spacing: 1px;
            margin-bottom: 15px; padding-left: 5px;
        }

        .trans-item {
            background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 15px 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(180, 175, 170, 0.08); transition: transform 0.2s;
        }
        .trans-item:active { transform: scale(0.98); }

        .trans-left { display: flex; align-items: center; gap: 15px; }
        .cat-color-dot { width: 12px; height: 12px; border-radius: 50%; }
        .trans-info { display: flex; flex-direction: column; gap: 4px; }
        .trans-title { font-size: 0.95rem; font-weight: 500; color: var(--text-main); }
        .trans-time { font-size: 0.75rem; color: var(--text-light); }
        
        .trans-amt { font-size: 1.1rem; font-weight: 400; color: var(--text-main); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <div class="header-title">三月分析</div>
        <div style="width:40px;"></div> </div>

    <div class="chart-card">
        <div class="chart-container">
            <svg class="donut" viewBox="0 0 42 42" id="donut-chart"></svg>
            <div class="chart-center-text">
                <div class="total-label">總支出</div>
                <div class="total-amount" id="total-disp">$0</div>
                <div class="budget-hint" id="budget-disp">預算 15,000</div>
            </div>
        </div>
    </div>

    <div class="list-container">
        <div class="list-header">近期明細</div>
        <div id="trans-list">
            </div>
    </div>
</div>

<script>
    // 1. 模擬本機端已存儲的記帳資料 (免打字細項)
    const transactions = [
        { id: 1, cat: '飲食', sub: '早餐', amt: 65, time: '今日 08:30', color: 'var(--cat-food)' },
        { id: 2, cat: '交通', sub: '捷運', amt: 35, time: '今日 08:50', color: 'var(--cat-trans)' },
        { id: 3, cat: '飲食', sub: '咖啡', amt: 120, time: '今日 12:15', color: 'var(--cat-food)' },
        { id: 4, cat: '居住', sub: '水費', amt: 320, time: '昨日 15:00', color: 'var(--cat-house)' },
        { id: 5, cat: '育樂', sub: 'Netflix', amt: 390, time: '昨日 20:00', color: 'var(--cat-ent)' },
        { id: 6, cat: '其他', sub: '生活雜物', amt: 150, time: '3月22日', color: 'var(--cat-other)' },
        { id: 7, cat: '飲食', sub: '晚餐', amt: 250, time: '3月22日', color: 'var(--cat-food)' }
    ];

    const budgetLimit = 15000;

    // 2. 統整分類數據與渲染列表
    function initReport() {
        const listDiv = document.getElementById('trans-list');
        const donut = document.getElementById('donut-chart');
        
        let totalAmt = 0;
        let catTotals = {};

        // 渲染列表與計算總和
        transactions.forEach(t => {
            totalAmt += t.amt;
            if(!catTotals[t.cat]) catTotals[t.cat] = { amt: 0, color: t.color };
            catTotals[t.cat].amt += t.amt;

            // 建立明細 HTML
            const item = document.createElement('div');
            item.className = 'trans-item';
            item.innerHTML = `
                <div class="trans-left">
                    <div class="cat-color-dot" style="background: ${t.color}"></div>
                    <div class="trans-info">
                        <div class="trans-title">${t.cat} - ${t.sub}</div>
                        <div class="trans-time">${t.time}</div>
                    </div>
                </div>
                <div class="trans-amt">-$${t.amt}</div>
            `;
            listDiv.appendChild(item);
        });

        // 更新中央文字與預算提醒邏輯
        const totalDisp = document.getElementById('total-disp');
        const budgetDisp = document.getElementById('budget-disp');
        totalDisp.innerText = '$' + totalAmt.toLocaleString();
        
        // 預算警戒：超過 80% 變橘金，超過 100% 變紅
        if (totalAmt > budgetLimit) {
            totalDisp.style.color = 'var(--accent-red)';
            budgetDisp.innerText = '已超預算';
            budgetDisp.style.color = 'var(--accent-red)';
        } else if (totalAmt > budgetLimit * 0.8) {
            budgetDisp.innerText = `剩餘 $${(budgetLimit - totalAmt).toLocaleString()}`;
        }

        // 3. 繪製純 SVG 圓餅圖 (stroke-dasharray 魔法)
        // 圓周長 C = 2 * PI * r。當 r = 15.9155 時，C 剛好等於 100。
        let cumulativePercent = 0;
        
        // 為了動畫效果，先清空再繪製
        donut.innerHTML = '';
        
        Object.keys(catTotals).forEach(cat => {
            let percent = (catTotals[cat].amt / totalAmt) * 100;
            
            // 處理圓環間的微小留白 (如果百分比夠大)
            let gap = percent > 2 ? 1.5 : 0; 
            let visiblePercent = percent - gap;

            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", "21");
            circle.setAttribute("cy", "21");
            circle.setAttribute("r", "15.9155");
            circle.setAttribute("class", "donut-segment");
            circle.setAttribute("stroke", catTotals[cat].color);
            
            // 初始狀態 (用於動畫進場)
            circle.style.strokeDasharray = `0 100`;
            circle.style.strokeDashoffset = `-${cumulativePercent}`;
            
            donut.appendChild(circle);

            // 觸發重繪後賦予真實數值，產生生長動畫
            setTimeout(() => {
                circle.style.strokeDasharray = `${visiblePercent} ${100 - visiblePercent}`;
            }, 50);

            cumulativePercent += percent;
        });
    }

    // 啟動
    window.onload = initReport;
</script>

</body>
</html>
