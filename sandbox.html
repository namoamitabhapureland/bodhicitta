<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨息記帳 - 主視覺</title>
    <style>
        /* 繼承自彌陀系統的清淨色系 */
        :root {
            --bg-deep: #050508;          /* 深邃虛空底色 */
            --ring-track: rgba(139, 168, 156, 0.1); /* 軌道底色 */
            --ring-glow: #8ba89c;        /* 青蓮色光軌，若超支可改為陶土紅 */
            --text-main: #e0e0e0;
            --text-muted: #666666;
        }

        body {
            margin: 0; 
            background: var(--bg-deep); 
            color: var(--text-main);
            /* 選用乾淨的無襯線系統字體，展現現代極簡感 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .balance-container {
            position: relative; 
            width: 280px; 
            height: 280px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column;
        }

        .balance-svg {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            /* 將 SVG 起點旋轉至正上方 */
            transform: rotate(-90deg); 
            /* 整體緩慢自轉，猶如法界常轉 */
            animation: slow-spin 40s linear infinite;
        }

        .ring-bg {
            fill: none; 
            stroke: var(--ring-track); 
            stroke-width: 1.5; /* 極致纖細的底框 */
        }

        .ring-flow {
            fill: none; 
            stroke: var(--ring-glow); 
            stroke-width: 2;
            stroke-linecap: round;
            /* 利用 drop-shadow 創造純 CSS 向量光暈 */
            filter: drop-shadow(0 0 6px rgba(139,168,156,0.6));
            /* 圓周長約 289，這裡設定虛線陣列創造不閉合的流動感 */
            stroke-dasharray: 180 120;
            /* 呼吸與脈動動畫 */
            animation: breath 8s ease-in-out infinite;
        }

        /* 呼吸律動：粗細與透明度的微幅變化 */
        @keyframes breath {
            0%, 100% { opacity: 0.6; stroke-width: 1.5; filter: drop-shadow(0 0 4px rgba(139,168,156,0.4)); }
            50% { opacity: 1; stroke-width: 2.5; filter: drop-shadow(0 0 10px rgba(139,168,156,0.8)); }
        }

        /* 緩慢自轉 */
        @keyframes slow-spin {
            100% { transform: rotate(270deg); }
        }

        .balance-content {
            z-index: 10; 
            text-align: center;
        }

        .balance-label {
            font-size: 0.85rem; 
            color: var(--text-muted); 
            letter-spacing: 4px; 
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .balance-amount {
            font-size: 2.8rem; 
            font-weight: 300; 
            letter-spacing: 1px;
            /* 數字本身帶有極淡的光暈 */
            text-shadow: 0 0 15px rgba(224,224,224,0.2);
        }
    </style>
</head>
<body>

    <div class="balance-container">
        <svg class="balance-svg" viewBox="0 0 100 100">
            <circle class="ring-bg" cx="50" cy="50" r="46"></circle>
            <circle class="ring-flow" cx="50" cy="50" r="46"></circle>
        </svg>
        <div class="balance-content">
            <div class="balance-label">本月結餘</div>
            <div class="balance-amount">$12,500</div>
        </div>
    </div>

</body>
</html>
