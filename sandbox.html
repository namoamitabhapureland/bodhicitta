<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>柔光記帳 - 淨息流</title>
    <style>
        :root {
            /* 淺色莫蘭迪/奶霜灰基調 */
            --bg-gradient: linear-gradient(135deg, #F9F8F6, #EAE6DF);
            /* 玻璃質感設定 */
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-shadow: 0 8px 32px rgba(180, 175, 170, 0.15);
            /* 文字與點綴色 */
            --text-main: #5C544E; /* 深灰褐色 */
            --text-light: #9A928B;
            --accent-gold: #D4A373; /* 香檳玫瑰金 */
            --accent-green: #8BA89C; /* 點綴青蓮色 */
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 模擬手機螢幕寬度 */
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頂部載具膠囊 */
        .carrier-pill {
            margin-top: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .carrier-pill:active { transform: scale(0.96); }

        /* 中部結餘區塊 */
        .balance-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            transition: transform 0.4s ease;
        }
        .balance-label {
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: var(--text-light);
            margin-bottom: 5px;
        }
        .balance-amount {
            font-size: 3.5rem;
            font-weight: 300;
            color: var(--accent-gold);
            text-shadow: 0 4px 15px rgba(212, 163, 115, 0.2);
        }

        /* 下方分類網格 */
        .category-grid {
            width: 90%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding-bottom: 40px;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .cat-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 20px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-btn:active, .cat-btn.active {
            background: rgba(255, 255, 255, 0.8);
            transform: scale(0.95);
            border-color: var(--accent-gold);
        }
        .cat-btn svg {
            width: 28px;
            height: 28px;
            stroke: var(--text-main);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .cat-btn.active svg { stroke: var(--accent-gold); }
        .cat-btn span {
            font-size: 0.85rem;
            color: var(--text-main);
            font-weight: 500;
        }

        /* 無邊框滑動鍵盤 */
        .keyboard-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(249, 248, 246, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            box-shadow: 0 -10px 40px rgba(180, 175, 170, 0.1);
            border-radius: 30px 30px 0 0;
            padding: 20px 20px 40px 20px;
            box-sizing: border-box;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 100;
        }
        .keyboard-panel.open {
            transform: translateY(0);
        }

        .input-display {
            text-align: right;
            font-size: 2.5rem;
            color: var(--text-main);
            padding: 10px 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(92, 84, 78, 0.1);
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .key-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .key {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            color: var(--text-main);
            height: 60px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 300;
        }
        .key:active { background: rgba(0, 0, 0, 0.05); }
        
        .key-enter {
            grid-row: span 2;
            background: var(--accent-gold);
            color: white;
            border-radius: 20px;
            font-size: 1.8rem;
            box-shadow: 0 4px 15px rgba(212, 163, 115, 0.4);
        }
        .key-enter:active { background: #c29262; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="carrier-pill">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5v14M8 5v14M12 5v14M16 5v14M20 5v14"/></svg>
        發票載具 /12ABCDE
    </div>

    <div class="balance-section" id="balance-sec">
        <div class="balance-label">本月結餘</div>
        <div class="balance-amount" id="main-balance">$12,500</div>
    </div>

    <div class="category-grid" id="cat-grid">
        <div class="cat-btn" onclick="openKeyboard(this, '飲食')">
            <svg viewBox="0 0 24 24"><path d="M4 11h16a8 8 0 0 1-16 0z"/><path d="M12 3v4M8 4v3M16 4v3"/></svg>
            <span>飲食</span>
        </div>
        <div class="cat-btn" onclick="openKeyboard(this, '交通')">
            <svg viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="10" rx="2"/><circle cx="8" cy="18" r="2"/><circle cx="16" cy="18" r="2"/><path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            <span>交通</span>
        </div>
        <div class="cat-btn" onclick="openKeyboard(this, '購物')">
            <svg viewBox="0 0 24 24"><rect x="5" y="8" width="14" height="12" rx="2"/><path d="M8 8V6a4 4 0 0 1 8 0v2"/></svg>
            <span>購物</span>
        </div>
        <div class="cat-btn" onclick="openKeyboard(this, '居住')">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>居住</span>
        </div>
        <div class="cat-btn" onclick="openKeyboard(this, '娛樂')">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            <span>娛樂</span>
        </div>
        <div class="cat-btn" onclick="openKeyboard(this, '其他')">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/><circle cx="5" cy="12" r="2"/></svg>
            <span>其他</span>
        </div>
    </div>

    <div class="keyboard-panel" id="keyboard">
        <div class="input-display" id="input-amt">0</div>
        <div class="key-grid">
            <button class="key" onclick="inputNum(1)">1</button>
            <button class="key" onclick="inputNum(2)">2</button>
            <button class="key" onclick="inputNum(3)">3</button>
            <button class="key" onclick="deleteNum()">⌫</button>
            
            <button class="key" onclick="inputNum(4)">4</button>
            <button class="key" onclick="inputNum(5)">5</button>
            <button class="key" onclick="inputNum(6)">6</button>
            <button class="key key-enter" onclick="submitEntry()">✓</button>
            
            <button class="key" onclick="inputNum(7)">7</button>
            <button class="key" onclick="inputNum(8)">8</button>
            <button class="key" onclick="inputNum(9)">9</button>
            
            <button class="key" onclick="closeKeyboard()">取消</button>
            <button class="key" onclick="inputNum(0)">0</button>
            <button class="key" onclick="inputNum('00')">00</button>
        </div>
    </div>
</div>

<script>
    let currentInput = "0";
    let activeBtn = null;
    let balance = 12500;

    const display = document.getElementById('input-amt');
    const kb = document.getElementById('keyboard');
    const balSec = document.getElementById('balance-sec');
    const catGrid = document.getElementById('cat-grid');
    const mainBal = document.getElementById('main-balance');

    function updateDisplay() {
        display.innerText = currentInput === "" ? "0" : Number(currentInput).toLocaleString();
    }

    function openKeyboard(btn, category) {
        if(activeBtn) activeBtn.classList.remove('active');
        activeBtn = btn;
        activeBtn.classList.add('active');
        
        currentInput = "0";
        updateDisplay();
        
        // 視覺推擠效果：讓上方元素微微上移，為鍵盤讓出空間
        balSec.style.transform = "translateY(-20px) scale(0.95)";
        catGrid.style.transform = "translateY(-15px)";
        kb.classList.add('open');
    }

    function closeKeyboard() {
        if(activeBtn) activeBtn.classList.remove('active');
        activeBtn = null;
        
        // 恢復原位
        balSec.style.transform = "translateY(0) scale(1)";
        catGrid.style.transform = "translateY(0)";
        kb.classList.remove('open');
    }

    function inputNum(num) {
        if (currentInput === "0" && num !== "00") {
            currentInput = num.toString();
        } else {
            if(currentInput.length < 8) currentInput += num.toString();
        }
        updateDisplay();
    }

    function deleteNum() {
        if (currentInput.length > 1) {
            currentInput = currentInput.slice(0, -1);
        } else {
            currentInput = "0";
        }
        updateDisplay();
    }

    function submitEntry() {
        let amt = Number(currentInput);
        if(amt > 0) {
            balance -= amt;
            // 簡單的數字更新動畫效果
            mainBal.style.opacity = 0;
            setTimeout(() => {
                mainBal.innerText = "$" + balance.toLocaleString();
                mainBal.style.opacity = 1;
            }, 200);
        }
        closeKeyboard();
    }
</script>

</body>
</html>
