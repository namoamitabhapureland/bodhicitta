<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菩提幾何 ． 十八瓣蓮 (99分優化版)</title>
    <style>
        :root { --gold: #f3e5ab; --deep-gold: #d4af37; --bg: #050505; }
        body { margin: 0; background: var(--bg); overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #stage { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; perspective: 1000px; }
        svg { width: 85vmin; height: 85vmin; filter: drop-shadow(0 0 20px rgba(212,175,55,0.2)); transition: transform 0.1s ease-out; }
        
        .petal { fill: rgba(212, 175, 55, 0.15); stroke: var(--gold); stroke-width: 0.5; transition: all 0.5s; cursor: pointer; }
        .petal:hover { fill: rgba(255, 255, 255, 0.4); stroke: #fff; filter: brightness(1.5); }
        
        /* 核心心燈 */
        .core-light { fill: #fff; filter: blur(2px); animation: pulse 3s infinite alternate ease-in-out; }
        @keyframes pulse { from { opacity: 0.5; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }
        
        .info-text { position: fixed; bottom: 40px; color: var(--gold); letter-spacing: 8px; font-size: 0.9rem; opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>

<div id="stage">
    <svg id="lotus-svg" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet">
        <radialGradient id="grad1" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:var(--gold); stop-opacity:0.2" />
            <stop offset="100%" style="stop-color:var(--bg); stop-opacity:0" />
        </radialGradient>
        <circle cx="100" cy="100" r="80" fill="url(#grad1)" />

        <g id="lotus-g"></g>
        
        <circle cx="100" cy="100" r="3" class="core-light" />
    </svg>
</div>

<div class="info-text">妙依總工程師勘驗 ． 百八煩惱轉菩提</div>

<script>
    const g = document.getElementById('lotus-g');
    const svg = document.getElementById('lotus-svg');
    const layers = [
        { count: 8, r: 15, h: 25, w: 10, op: 0.9, tilt: 0 },   // 內層：最尖、最直
        { count: 16, r: 30, h: 35, w: 14, op: 0.7, tilt: 5 },
        { count: 24, r: 45, h: 45, w: 18, op: 0.5, tilt: 10 },
        { count: 28, r: 60, h: 55, w: 22, op: 0.3, tilt: 15 },
        { count: 32, r: 75, h: 65, w: 26, op: 0.2, tilt: 20 }  // 外層：最開、最淡
    ];

    // 繪製瓣尖花瓣 (幾何水滴形)
    function createPetalPath(w, h) {
        // M: 起點(底部), Q: 二次貝茲曲線, 頂點(尖端)
        return `M 0 0 Q ${w/2} ${h*0.3} 0 ${h} Q ${-w/2} ${h*0.3} 0 0 Z`;
    }

    layers.forEach((layer, lIdx) => {
        for (let i = 0; i < layer.count; i++) {
            const angle = (i / layer.count) * 360;
            const pathData = createPetalPath(layer.w, layer.h);
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            
            path.setAttribute("d", pathData);
            path.setAttribute("class", "petal");
            path.style.fill = `rgba(212, 175, 55, ${layer.op})`;
            
            // 計算佈局：旋轉 -> 平移出半徑 -> 再次旋轉微調瓣尖
            // 注意：這裡是 2D 模擬 3D 向上盛開感
            path.setAttribute("transform", `
                translate(100, 100) 
                rotate(${angle}) 
                translate(0, ${-layer.r}) 
                rotate(180)
            `);
            
            g.appendChild(path);
        }
    });

    // 視差互動：讓蓮花隨鼠標輕微轉動
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.clientX) / 25;
        const y = (window.innerHeight / 2 - e.clientY) / 25;
        svg.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
    });

    // 手機傾斜感應
    window.addEventListener('deviceorientation', (e) => {
        const x = e.gamma / 2;
        const y = e.beta / 2;
        svg.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
    });

</script>
</body>
</html>
