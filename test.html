<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>幾何慧劍 ． 法寶勘驗</title>
    <style>
        body { margin: 0; background: #010102; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .stage { width: 300px; height: 500px; position: relative; }
        svg { width: 100%; height: 100%; filter: drop-shadow(0 0 15px rgba(243, 229, 171, 0.4)); }
        
        /* 劍身漂浮動畫 */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        #sword-group { animation: float 4s infinite ease-in-out; transform-origin: center; }
        
        /* 閃爍光芒 */
        @keyframes glimmer {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .shimmer { animation: glimmer 2s infinite alternate; }
    </style>
</head>
<body>

<div class="stage">
    <svg viewBox="0 0 100 200">
        <defs>
            <linearGradient id="gold-glass" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#fff; stop-opacity:0.8" />
                <stop offset="50%" style="stop-color:#d4af37; stop-opacity:0.6" />
                <stop offset="100%" style="stop-color:#8b5a2b; stop-opacity:0.9" />
            </linearGradient>
            
            <radialGradient id="core-glow">
                <stop offset="0%" style="stop-color:#fff; stop-opacity:1" />
                <stop offset="100%" style="stop-color:#f3e5ab; stop-opacity:0" />
            </radialGradient>
        </defs>

        <g id="sword-group">
            <rect x="49.5" y="20" width="1" height="120" fill="url(#core-glow)" class="shimmer" />
            
            <path d="M50 20 L60 60 L50 70 L40 60 Z" fill="url(#gold-glass)" stroke="#f3e5ab" stroke-width="0.3" />
            <path d="M50 70 L65 110 L50 120 L35 110 Z" fill="rgba(212, 175, 55, 0.4)" stroke="#f3e5ab" stroke-width="0.2" />
            <path d="M50 70 L55 115 L50 125 L45 115 Z" fill="rgba(255, 255, 255, 0.2)" />
            
            <path d="M30 125 L50 115 L70 125 L50 135 Z" fill="#d4af37" stroke="#fff" stroke-width="0.5" />
            <path d="M40 120 L50 110 L60 120 L50 125 Z" fill="#f3e5ab" opacity="0.7" />

            <path d="M47 135 L53 135 L52 165 L48 165 Z" fill="#8b5a2b" />
            <circle cx="50" cy="175" r="5" fill="none" stroke="#f3e5ab" stroke-width="1" />
            <circle cx="50" cy="175" r="2" fill="#fff" class="shimmer" />
        </g>
        
        <circle cx="30" cy="180" r="1" fill="#f3e5ab" opacity="0.5">
            <animate attributeName="cy" from="180" to="150" dur="3s" repeatCount="indefinite" />
            <animate attributeName="opacity" from="0.5" to="0" dur="3s" repeatCount="indefinite" />
        </circle>
        <circle cx="70" cy="190" r="1.2" fill="#fff" opacity="0.8">
            <animate attributeName="cy" from="190" to="160" dur="4s" repeatCount="indefinite" />
            <animate attributeName="opacity" from="0.8" to="0" dur="4s" repeatCount="indefinite" />
        </circle>
    </svg>
</div>

</body>
</html>
