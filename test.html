<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>菩提星系 ． 氣韻版</title>
    <style>
        body { margin: 0; background: #010102; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <canvas id="starCanvas"></canvas>
    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, time = 0;
        const stars = [];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            for (let i = 0; i < 108; i++) {
                stars.push({
                    angle: (i / 108) * Math.PI * 2,
                    dist: 100 + Math.random() * 200,
                    size: Math.random() * 3 + 1,
                    speed: 0.002 + Math.random() * 0.005,
                    color: i % 2 === 0 ? '#f3e5ab' : '#8ba89c',
                    z: Math.random() * 1000
                });
            }
        }

        function draw() {
            // 關鍵：不再是全黑抹除，而是帶有留痕的半透抹除，產生「飄」的速度感
            ctx.fillStyle = 'rgba(1, 1, 2, 0.2)';
            ctx.fillRect(0, 0, w, h);
            time += 0.01;

            ctx.globalCompositeOperation = 'screen';

            stars.forEach(s => {
                s.angle += s.speed;
                // 加入呼吸感：半徑會隨時間微動
                const dynamicDist = s.dist + Math.sin(time + s.angle) * 20;
                
                // 3D 投影感
                const x = w/2 + Math.cos(s.angle) * dynamicDist;
                const y = h/2 + Math.sin(s.angle) * dynamicDist * 0.5; // 橢圓軌道增加深度感
                
                // 光輝感：多層光暈
                ctx.beginPath();
                ctx.arc(x, y, s.size, 0, Math.PI * 2);
                ctx.fillStyle = s.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = s.color;
                ctx.fill();
                
                // 淡淡的軌道線，增加時空感
                ctx.beginPath();
                ctx.arc(x, y, s.size * 0.5, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.stroke();
            });

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
