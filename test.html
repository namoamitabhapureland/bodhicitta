<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eight-Petal Lotus Test</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: #010103; color: #eee; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100dvh; overflow: hidden; font-family: "PingFang TC", sans-serif;
        }

        .totem-container {
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            cursor: pointer;
        }

        .totem-svg-wrap {
            width: 120px; height: 120px; position: relative;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .totem-svg-wrap:active { transform: scale(0.95); }
        
        .totem-svg { width: 100%; height: 100%; display: block; overflow: visible; filter: drop-shadow(0 0 10px rgba(212,175,55,0.1)); }
        
        .lunar-ring { fill: none; stroke: #8ba89c; stroke-width: 0.8; stroke-dasharray: 2 4; opacity: 0.4; transition: 0.5s; }
        
        .maze-petal { 
            fill: rgba(139,168,156,0.12); stroke: #8ba89c; stroke-width: 0.8; 
            stroke-opacity: 0.3; transition: all 0.8s cubic-bezier(0.25, 0.1, 0.25, 1); 
        }
        .maze-petal.lit { 
            fill: #f3e5ab; stroke: #fff; stroke-width: 1.2; 
            filter: drop-shadow(0 0 8px #fff); opacity: 1; 
        }
        
        .maze-core { 
            fill: none; stroke: #8ba89c; stroke-width: 1.5; opacity: 0.6; 
            transition: all 0.8s ease; 
        }
        .maze-core.lit { 
            stroke: #d4af37; fill: rgba(212,175,55,0.3); 
            filter: drop-shadow(0 0 15px #d4af37); opacity: 1;
        }
        
        .center-seed { fill: #fff; opacity: 0.8; transition: all 0.5s; }
        .maze-core.lit + .center-seed { filter: drop-shadow(0 0 8px #fff); transform: scale(1.2); transform-origin: 50px 50px; }

        .status-text {
            color: #8ba89c; font-size: 0.9rem; letter-spacing: 3px; 
            text-transform: uppercase; transition: color 0.5s;
        }
        .status-text.prajna {
            color: #d4af37; text-shadow: 0 0 10px rgba(212,175,55,0.5);
        }

        .instruction {
            position: absolute; bottom: 40px; color: #555; font-size: 0.75rem; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="totem-container" onclick="simulateProgress()">
        <div class="totem-svg-wrap">
            <svg class="totem-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="46" class="lunar-ring" id="ring"/>
                
                <g id="petals-group">
                    <path id="petal-1" class="maze-petal" d="M50 35 C 65 30, 70 20, 50 1 C 30 20, 35 30, 50 35" transform="rotate(0 50 50)"/>
                    <path id="petal-2" class="maze-petal" d="M50 35 C 65 30, 70 20, 50 1 C 30 20, 35 30, 50 35" transform="rotate(45 50 50)"/>
                    <path id="petal-3" class="maze-petal" d="M50 35 C 65 30, 70 20, 50 1 C 30 20, 35 30, 50 35" transform="rotate(90 50 50)"/>
                    <path id="petal-4" class="maze-petal" d="M50 35 C 65 30, 70 20, 50 1 C 30 20, 35 30, 50 35" transform="rotate(135 50 50)"/>
                    <path id="petal-5" class="maze-petal" d="M50 35 C 65 30, 70 20, 50 1 C 30 20, 35 30, 50 35" transform="rotate(180 50 50)"/>
                    <path id="petal-6" class="maze-petal" d="M50 35 C 65 30, 70 20, 50 1 C 30 20, 35 30, 50 35" transform="rotate(225 50 50)"/>
                    <path id="petal-7" class="maze-petal" d="M50 35 C 65 30, 70 20, 50 1 C 30 20, 35 30, 50 35" transform="rotate(270 50 50)"/>
                    <path id="petal-8" class="maze-petal" d="M50 35 C 65 30, 70 20, 50 1 C 30 20, 35 30, 50 35" transform="rotate(315 50 50)"/>
                </g>
                
                <path id="maze-core" class="maze-core" d="M50 35 C 58 45, 55 55, 50 56 C 45 55, 42 45, 50 35"/>
                <circle cx="50" cy="50" r="2" class="center-seed"/>
            </svg>
        </div>
        <div id="status-text" class="status-text">Stage 0 / 8</div>
    </div>

    <div class="instruction">Tap lotus to simulate progress</div>

    <script>
        let currentStage = 0;
        const totalStages = 8;

        function simulateProgress() {
            if (navigator.vibrate) navigator.vibrate(15);
            
            currentStage++;
            
            if (currentStage > totalStages) {
                currentStage = 0;
                document.querySelectorAll('.maze-petal').forEach(p => p.classList.remove('lit'));
                document.getElementById('maze-core').classList.remove('lit');
                document.getElementById('ring').style.stroke = '#8ba89c';
                document.getElementById('status-text').className = 'status-text';
            } else {
                const petal = document.getElementById('petal-' + currentStage);
                if (petal) petal.classList.add('lit');
                
                if (currentStage === totalStages) {
                    document.getElementById('maze-core').classList.add('lit');
                    document.getElementById('ring').style.stroke = '#d4af37';
                    const statusText = document.getElementById('status-text');
                    statusText.className = 'status-text prajna';
                    statusText.innerText = "Prajna Perfected";
                    return;
                }
            }
            
            document.getElementById('status-text').innerText = `Stage ${currentStage} / 8`;
        }
    </script>
</body>
</html>
