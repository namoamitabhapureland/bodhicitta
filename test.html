<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>唯識金剛載體 ． 99分美學測試</title>
    <style>
        :root {
            --bg-deep: #020205;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
        }

        body { 
            margin: 0; background: var(--bg-deep); color: #eee; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; perspective: 1200px; 
            touch-action: none;
        }

        /* 3D 旋轉樞紐 */
        #matrix-hub {
            position: relative; width: 0; height: 0;
            transform-style: preserve-3d;
            transform: rotateX(-15deg) rotateY(0deg);
            will-change: transform;
        }

        /* --- 第八識：阿賴耶外廓大圓 --- */
        .alaya-orbit {
            position: absolute; top: -200px; left: -200px; width: 400px; height: 400px;
            border-radius: 50%; border: 1px dashed rgba(139,168,156,0.3);
            transform-style: preserve-3d; pointer-events: none;
        }

        /* --- 第七識：我執內廓光環 --- */
        .manas-orbit {
            position: absolute; top: -120px; left: -120px; width: 240px; height: 240px;
            border-radius: 50%; border: 1.5px solid rgba(212,175,55,0.4);
            box-shadow: inset 0 0 20px rgba(212,175,55,0.1);
            transform-style: preserve-3d; pointer-events: none;
        }

        /* --- 核心載體：全息打坐金剛身 --- */
        #hologram-avatar {
            position: absolute; top: -100px; left: -75px; width: 150px; height: 180px;
            transform-style: preserve-3d;
            animation: float 4s infinite alternate ease-in-out;
        }

        @keyframes float { 0% { transform: translateY(-5px); } 100% { transform: translateY(5px); } }

        /* 利用多層 SVG 產生 3D 拓撲厚度 (極低算力，極高視覺張力) */
        .avatar-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: visible; pointer-events: none;
        }

        /* 背面層 (透明度低，帶青色光暈) */
        .layer-back { transform: translateZ(-15px); opacity: 0.3; filter: drop-shadow(0 0 5px var(--cyan)); }
        
        /* 中間層 (主結構) */
        .layer-mid { transform: translateZ(0px); opacity: 0.8; filter: drop-shadow(0 0 10px var(--solid-gold)); }
        
        /* 前面層 (高光細節) */
        .layer-front { transform: translateZ(15px); opacity: 0.5; filter: drop-shadow(0 0 8px #fff); }

        /* 底部法座光環 (解決底部視覺斷層) */
        .base-ring {
            position: absolute; top: 70px; left: -90px; width: 180px; height: 180px;
            border-radius: 50%; border: 1px solid rgba(243,229,171,0.5);
            transform: rotateX(90deg) translateZ(0px);
            box-shadow: 0 0 30px rgba(212,175,55,0.3) inset;
        }

        /* 導覽文字 */
        .guide-text {
            position: absolute; bottom: 10%; color: rgba(243,229,171,0.7);
            font-size: 0.9rem; letter-spacing: 3px; font-weight: bold;
            pointer-events: none; text-shadow: 0 0 10px rgba(212,175,55,0.5);
        }
    </style>
</head>
<body>

    <div class="guide-text">滑動螢幕 ． 檢視全息金剛載體</div>

    <div id="matrix-hub">
        <div class="base-ring"></div>

        <div class="alaya-orbit" style="transform: rotateY(0deg);"></div>
        <div class="alaya-orbit" style="transform: rotateY(60deg);"></div>
        <div class="alaya-orbit" style="transform: rotateY(120deg);"></div>
        <div class="alaya-orbit" style="transform: rotateX(90deg);"></div>

        <div class="manas-orbit" style="transform: rotateY(45deg);"></div>
        <div class="manas-orbit" style="transform: rotateY(135deg);"></div>
        <div class="manas-orbit" style="transform: rotateX(90deg);"></div>

        <div id="hologram-avatar">
            
            <svg class="avatar-layer layer-back" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <use href="#avatar-path" stroke="var(--cyan)" fill="none" stroke-width="0.8"/>
            </svg>
            
            <svg class="avatar-layer layer-mid" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <g id="avatar-path">
                        <polygon points="50,5 60,15 56,28 44,28 40,15" />
                        <polyline points="50,5 50,28" />
                        <polygon points="44,28 56,28 70,40 65,70 50,80 35,70 30,40" />
                        <polyline points="44,28 35,70" />
                        <polyline points="56,28 65,70" />
                        <polyline points="30,40 20,65 45,80 50,75" />
                        <polyline points="70,40 80,65 55,80 50,75" />
                        <polygon points="20,65 5,95 50,110 95,95 80,65 50,80" />
                        <polyline points="5,95 35,70" />
                        <polyline points="95,95 65,70" />
                        <line x1="50" y1="28" x2="50" y2="110" />
                    </g>
                </defs>
                <use href="#avatar-path" stroke="var(--gold)" fill="none" stroke-width="1.2"/>
            </svg>

            <svg class="avatar-layer layer-front" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <use href="#avatar-path" stroke="#fff" fill="none" stroke-width="0.5" stroke-dasharray="2 4"/>
                <circle cx="50" cy="55" r="2.5" fill="#fff" filter="drop-shadow(0 0 4px var(--solid-gold))"/>
            </svg>

        </div>
    </div>

    <script>
        // 簡單的 3D 觸控旋轉邏輯
        let hub = document.getElementById('matrix-hub');
        let isDragging = false, startX, startY;
        let rotX = -15, rotY = 0;

        function autoRotate() {
            if(!isDragging) {
                rotY -= 0.2;
                hub.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            }
            requestAnimationFrame(autoRotate);
        }
        autoRotate();

        document.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX || e.touches[0].clientX;
            startY = e.clientY || e.touches[0].clientY;
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            let deltaX = x - startX; let deltaY = y - startY;

            rotY += deltaX * 0.5; rotX -= deltaY * 0.5;
            if (rotX > 80) rotX = 80; if (rotX < -80) rotX = -80; // 限制上下視角

            hub.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            startX = x; startY = y;
        });

        document.addEventListener('pointerup', () => isDragging = false);
        document.addEventListener('pointercancel', () => isDragging = false);
    </script>
</body>
</html>
