<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>智慧幾何寶劍 ． 法寶勘驗</title>
    <style>
        body { margin: 0; background: #010102; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .stage { width: 300px; height: 500px; position: relative; }
        svg { width: 100%; height: 100%; filter: drop-shadow(0 0 15px rgba(243, 229, 171, 0.4)); }
        
        /* 劍身漂浮與光暈呼吸動畫 */
        @keyframes float-pulse {
            0% { transform: translateY(0px) rotate(0deg); filter: drop-shadow(0 0 15px rgba(243, 229, 171, 0.3)); }
            50% { transform: translateY(-15px) rotate(1deg); filter: drop-shadow(0 0 25px rgba(243, 229, 171, 0.6)); }
            100% { transform: translateY(0px) rotate(0deg); filter: drop-shadow(0 0 15px rgba(243, 229, 171, 0.3)); }
        }
        #sword-group { animation: float-pulse 4s infinite ease-in-out; transform-origin: center; }
        
        /* 核心光跡閃爍 */
        @keyframes glimmer { 0% { opacity: 0.3; } 100% { opacity: 1; } }
        .shimmer { animation: glimmer 2s infinite alternate; }
    </style>
</head>
<body>

<div class="stage">
    <svg viewBox="0 0 100 200">
        <defs>
            <linearGradient id="gold-glass" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#fff; stop-opacity:0.8" />
                <stop offset="50%" style="stop-color:#d4af37; stop-opacity:0.6" />
                <stop offset="100%" style="stop-color:#8b5a2b; stop-opacity:0.9" />
            </linearGradient>
            
            <radialGradient id="core-glow">
                <stop offset="0%" style="stop-color:#fff; stop-opacity:1" />
                <stop offset="100%" style="stop-color:#f3e5ab; stop-opacity:0" />
            </radialGradient>
        </defs>

        <g id="sword-group">
            <rect x="49.5" y="20" width="1" height="150" fill="url(#core-glow)" class="shimmer" />
            
            <path d="M50 20 L62 60 L50 72 L38 60 Z" fill="url(#gold-glass)" stroke="#fff" stroke-width="0.3" />
            <path d="M50 20 L56 60 L50 68 L44 60 Z" fill="rgba(255, 255, 255, 0.3)" /> <path d="M50 72 L68 115 L50 128 L32 115 Z" fill="rgba(212, 175, 55, 0.4)" stroke="#f3e5ab" stroke-width="0.3" />
            <path d="M50 72 L58 118 L50 125 L42 118 Z" fill="rgba(255, 255, 255, 0.2)" /> <path d="M25 130 L50 120 L75 130 L50 145 Z" fill="#d4af37" stroke="#fff" stroke-width="0.5" />
            <path d="M40 125 L50 115 L60 125 L50 132 Z" fill="#f3e5ab" opacity="0.7" stroke="#fff" stroke-width="0.3" />

            <path d="M46 145 L54 145 L53 175 L47 175 Z" fill="rgba(139, 90, 43, 0.8)" stroke="#f3e5ab" stroke-width="0.4" />
            <path d="M48 145 L52 145 L51 175 L49 175 Z" fill="rgba(212, 175, 55, 0.3)" /> <circle cx="50" cy="182" r="6" fill="none" stroke="#f3e5ab" stroke-width="1" />
            <circle cx="50" cy="182" r="2.5" fill="#fff" class="shimmer" />
        </g>
        
        <circle cx="30" cy="190" r="1" fill="#f3e5ab" opacity="0.5">
            <animate attributeName="cy" from="190" to="160" dur="3s" repeatCount="indefinite" />
            <animate attributeName="opacity" from="0.5" to="0" dur="3s" repeatCount="indefinite" />
        </circle>
        <circle cx="70" cy="195" r="1.2" fill="#fff" opacity="0.8">
            <animate attributeName="cy" from="195" to="165" dur="4s" repeatCount="indefinite" />
            <animate attributeName="opacity" from="0.8" to="0" dur="4s" repeatCount="indefinite" />
        </circle>
    </svg>
</div>

</body>
</html>
