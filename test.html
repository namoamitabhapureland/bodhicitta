<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賢劫千佛 ． 宇宙接力</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #9fdfc8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; background: #000; color: #eee;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            overflow: hidden; 
        }
        
        #realm-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
        }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10; pointer-events: none; 
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .header {
            text-align: center; padding: 40px 20px 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
        }
        .title { color: var(--gold); font-size: 1.5rem; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 15px var(--solid-gold); margin-bottom: 5px; }
        .subtitle { color: var(--cyan); font-size: 0.85rem; letter-spacing: 2px; opacity: 0.8; }
        
        /* ✨ 千佛名號顯示器 ✨ */
        #buddha-name-display {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: var(--gold); font-size: 2.2rem; font-weight: bold; letter-spacing: 8px;
            text-shadow: 0 0 20px var(--solid-gold), 0 0 40px #fff;
            opacity: 0; transition: opacity 1.5s ease-in-out;
            white-space: nowrap; text-align: center;
        }
        .buddha-rank { font-size: 1rem; color: var(--cyan); letter-spacing: 4px; margin-bottom: 10px; text-shadow: none; display: block;}

        .scroll-box {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 60%, transparent 100%);
            padding: 30px 25px 40px; pointer-events: auto; 
            border-top: 1px solid rgba(212,175,55,0.2);
            max-height: 45vh; overflow-y: auto; scrollbar-width: none;
        }
        .scroll-content { text-align: justify; line-height: 1.8; font-size: 0.95rem; color: #ddd; }
        .highlight { color: var(--gold); font-weight: bold; text-shadow: 0 0 5px rgba(212,175,55,0.4); }

        .back-btn {
            display: block; width: 100%; max-width: 300px; margin: 20px auto 0;
            background: transparent; color: var(--gold); border: 1px solid var(--gold);
            padding: 12px; border-radius: 25px; font-size: 0.9rem; letter-spacing: 2px;
            text-align: center; cursor: pointer; transition: 0.3s; pointer-events: auto;
            box-shadow: 0 0 10px rgba(212,175,55,0.1);
        }
        .back-btn:active { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(212,175,55,0.6); }
    </style>
</head>
<body>

    <canvas id="realm-canvas"></canvas>

    <div class="ui-layer">
        <div class="header">
            <div class="title">賢劫千佛 ． 宇宙接力</div>
            <div class="subtitle">時空長河 ． 願力不息</div>
        </div>

        <div id="buddha-name-display">
            <span class="buddha-rank" id="buddha-rank">第四尊</span>
            <span id="buddha-name">南無釋迦牟尼佛</span>
        </div>

        <div class="scroll-box">
            <div class="scroll-content">
                依《賢劫經》所載，吾等所處之時空名為「賢劫」。於此漫長劫中，將有一千尊佛依序降生娑婆，接力度化眾生。<br><br>
                佛法乃宇宙間永不熄滅之火炬。拘留孫佛、拘那含牟尼佛、迦葉佛、釋迦牟尼佛、彌勒尊佛……一尊接著一尊，生生不息。<br><br>
                吾等今日求生極樂，換取不退轉金身，實為預備此宇宙之約。待未來時機成熟，必將於此<span class="highlight">千佛接力</span>中，化身大菩薩乘願再來，甚至於未來際，綻放屬於吾等成佛之金蓮！
            </div>
            <button class="back-btn" onclick="window.history.back()">返回大乘法界</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('realm-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    
    // 時空長河星塵
    let stars = [];
    const NUM_STARS = 800;
    const FOV = 400; // 視角深度

    // 千佛名單 (節錄賢劫前幾尊，做無限循環演示)
    const buddhas = [
        { rank: "第一尊", name: "拘留孫佛" },
        { rank: "第二尊", name: "拘那含牟尼佛" },
        { rank: "第三尊", name: "迦葉佛" },
        { rank: "第四尊", name: "釋迦牟尼佛" },
        { rank: "第五尊", name: "彌勒尊佛" },
        { rank: "第六尊", name: "師子佛" },
        { rank: "第七尊", name: "明焰佛" }
    ];
    let currentBuddhaIndex = 3; // 從釋迦牟尼佛開始

    // 蓮花綻放狀態機
    let lotusState = {
        phase: 'waiting', // waiting, approaching, blooming, dissolving
        timer: 0,
        z: 2000,
        scale: 0,
        opacity: 0,
        petals: []
    };

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    // 初始化時空星塵
    function initStars() {
        stars = [];
        for (let i = 0; i < NUM_STARS; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 3000,
                y: (Math.random() - 0.5) * 3000,
                z: Math.random() * 2000,
                speed: Math.random() * 5 + 2, // 星塵流動速度
                color: Math.random() > 0.5 ? '#9fdfc8' : '#f3e5ab'
            });
        }

        // 預先計算蓮花花瓣路徑
        for(let i=0; i<12; i++) {
            lotusState.petals.push(i * (Math.PI * 2 / 12));
        }
    }

    // 繪製單片蓮花花瓣
    function drawPetal(ctx, size) {
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(size * 0.4, size * 0.2, size * 0.8, size * 0.5, size, 0);
        ctx.bezierCurveTo(size * 0.8, -size * 0.5, size * 0.4, -size * 0.2, 0, 0);
        ctx.fill();
        ctx.stroke();
    }

    // 狀態機核心邏輯
    function updateLotusLogic() {
        const textDisplay = document.getElementById('buddha-name-display');
        const rankEl = document.getElementById('buddha-rank');
        const nameEl = document.getElementById('buddha-name');

        switch(lotusState.phase) {
            case 'waiting':
                lotusState.timer++;
                if(lotusState.timer > 100) { // 等待 100 幀後浮現光點
                    lotusState.phase = 'approaching';
                    lotusState.timer = 0;
                    lotusState.z = 2500; // 從極遠處出現
                    // 更新下一尊佛的名字
                    rankEl.innerText = buddhas[currentBuddhaIndex].rank;
                    nameEl.innerText = buddhas[currentBuddhaIndex].name;
                }
                break;
            case 'approaching':
                lotusState.z -= 25; // 光點快速飛近
                if(lotusState.z <= 200) { // 到達綻放距離
                    lotusState.phase = 'blooming';
                    lotusState.timer = 0;
                    textDisplay.style.opacity = 1; // 顯示佛名
                }
                break;
            case 'blooming':
                lotusState.timer++;
                lotusState.scale = Math.min(1, lotusState.timer / 60); // 緩慢放大綻放 (60幀)
                lotusState.opacity = Math.min(1, lotusState.timer / 30);
                
                if(lotusState.timer > 200) { // 綻放並停留 200 幀
                    lotusState.phase = 'dissolving';
                    lotusState.timer = 0;
                    textDisplay.style.opacity = 0; // 隱藏佛名
                }
                break;
            case 'dissolving':
                lotusState.timer++;
                lotusState.opacity = Math.max(0, 1 - (lotusState.timer / 60)); // 緩慢化為光塵
                lotusState.scale += 0.01; // 散去時稍微膨脹
                
                if(lotusState.timer > 60) {
                    lotusState.phase = 'waiting';
                    lotusState.timer = 0;
                    currentBuddhaIndex = (currentBuddhaIndex + 1) % buddhas.length; // 換下一尊佛
                }
                break;
        }
    }

    // 渲染主迴圈
    function animate() {
        // 微弱拖影，營造時光隧道感
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.fillRect(0, 0, width, height);
        
        ctx.globalCompositeOperation = 'screen'; // 確保所有光芒都有疊加亮度

        // 1. 繪製時空星塵長河 (Z軸推進)
        stars.forEach(star => {
            star.z -= star.speed;
            if (star.z <= 0) {
                star.z = 2000;
                star.x = (Math.random() - 0.5) * 3000;
                star.y = (Math.random() - 0.5) * 3000;
            }

            let scale = FOV / (FOV + star.z);
            let sx = (width / 2) + star.x * scale;
            let sy = (height / 2) + star.y * scale - 50;
            let size = Math.max(0.1, 3 * scale);

            // 越近越亮，越遠越暗
            let alpha = Math.min(1, scale * 1.5);

            ctx.beginPath();
            ctx.arc(sx, sy, size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '159,223,200'}, ${alpha})`;
            ctx.fill();
        });

        // 2. 處理千佛蓮花接力邏輯
        updateLotusLogic();

        // 3. 繪製中央蓮花/光點
        let cx = width / 2;
        let cy = height / 2 - 80;

        if (lotusState.phase === 'approaching') {
            // 從深處飛來的光點
            let scale = FOV / (FOV + lotusState.z);
            let size = 15 * scale;
            
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#fff';
            ctx.beginPath();
            ctx.arc(cx, cy, size, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.shadowBlur = 0;
        } 
        else if (lotusState.phase === 'blooming' || lotusState.phase === 'dissolving') {
            // 蓮花綻放
            ctx.save();
            ctx.translate(cx, cy);
            
            // 旋轉動畫
            let rotation = (lotusState.timer * 0.005) * (lotusState.phase === 'dissolving' ? 2 : 1);
            ctx.rotate(rotation);

            let baseSize = 120 * lotusState.scale;
            
            ctx.shadowBlur = 30;
            ctx.shadowColor = `rgba(212, 175, 55, ${lotusState.opacity})`;
            ctx.fillStyle = `rgba(243, 229, 171, ${lotusState.opacity * 0.2})`; // 半透明金瓣
            ctx.strokeStyle = `rgba(255, 255, 255, ${lotusState.opacity * 0.8})`; // 白金邊框
            ctx.lineWidth = 1.5;

            // 畫雙層蓮花 (內外層)
            for (let i = 0; i < 12; i++) {
                ctx.save();
                ctx.rotate(lotusState.petals[i]);
                drawPetal(ctx, baseSize);
                ctx.restore();
                
                // 內層小花瓣
                ctx.save();
                ctx.rotate(lotusState.petals[i] + Math.PI/12);
                drawPetal(ctx, baseSize * 0.6);
                ctx.restore();
            }

            // 中心佛光核心
            ctx.beginPath();
            ctx.arc(0, 0, 15 * lotusState.scale, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${lotusState.opacity})`;
            ctx.fill();

            ctx.restore();
        }

        ctx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(animate);
    }

    initStars();
    animate();
</script>
</body>
</html>
