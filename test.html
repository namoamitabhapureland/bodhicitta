<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>琉璃法寶 ． 淨瓶與寶珠</title>
    <style>
        body { margin: 0; background: #010102; display: flex; justify-content: center; align-items: center; gap: 50px; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        .item-box { width: 200px; height: 300px; position: relative; display: flex; flex-direction: column; align-items: center; }
        svg { width: 100%; height: 80%; filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.2)); overflow: visible; }
        
        /* 懸浮與自轉動畫 */
        @keyframes hover-pulse {
            0% { transform: translateY(0px); filter: drop-shadow(0 0 15px rgba(243, 229, 171, 0.2)); }
            50% { transform: translateY(-15px); filter: drop-shadow(0 0 30px rgba(243, 229, 171, 0.6)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 0 15px rgba(243, 229, 171, 0.2)); }
        }
        .float-obj { animation: hover-pulse 4s infinite ease-in-out; transform-origin: center; }
        
        /* 內部能量微光 */
        @keyframes energy-glow { 0% { opacity: 0.4; } 100% { opacity: 1; } }
        .inner-light { animation: energy-glow 2s infinite alternate ease-in-out; }

        .label { color: #f3e5ab; letter-spacing: 5px; font-size: 0.9rem; margin-top: 20px; text-shadow: 0 0 10px #d4af37; opacity: 0.8; }
    </style>
</head>
<body>

<div class="item-box">
    <svg viewBox="0 0 100 150">
        <defs>
            <linearGradient id="cyan-glass" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#e0f7fa; stop-opacity:0.9" />
                <stop offset="50%" style="stop-color:#8ba89c; stop-opacity:0.6" />
                <stop offset="100%" style="stop-color:#2d5a4c; stop-opacity:0.9" />
            </linearGradient>
            <linearGradient id="gold-rim" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#f3e5ab; stop-opacity:1" />
                <stop offset="100%" style="stop-color:#d4af37; stop-opacity:1" />
            </linearGradient>
        </defs>

        <g class="float-obj">
            <circle cx="50" cy="90" r="15" fill="#e0f7fa" class="inner-light" filter="blur(5px)" />
            
            <polygon points="40,30 60,30 65,40 35,40" fill="url(#gold-rim)" stroke="#fff" stroke-width="0.5" />
            <polygon points="43,40 57,40 55,60 45,60" fill="rgba(139, 168, 156, 0.4)" stroke="#f3e5ab" stroke-width="0.3" />
            <polygon points="45,60 55,60 75,90 50,100 25,90" fill="url(#cyan-glass)" stroke="#f3e5ab" stroke-width="0.4" />
            <polygon points="45,60 55,60 50,100" fill="rgba(255, 255, 255, 0.2)" stroke="#f3e5ab" stroke-width="0.3" /> <polygon points="25,90 50,100 75,90 60,125 40,125" fill="rgba(45, 90, 76, 0.7)" stroke="#f3e5ab" stroke-width="0.4" />
            <polygon points="50,100 60,125 40,125" fill="rgba(139, 168, 156, 0.3)" stroke="#f3e5ab" stroke-width="0.3" />
            <polygon points="40,125 60,125 55,130 45,130" fill="url(#gold-rim)" />
            
            <polygon points="50,15 52,20 50,25 48,20" fill="#e0f7fa" class="inner-light" />
            <polygon points="35,10 37,13 35,16 33,13" fill="#8ba89c" class="inner-light" style="animation-delay: 0.5s;" />
        </g>
    </svg>
    <div class="label">藥師琉璃淨瓶</div>
</div>

<div class="item-box">
    <svg viewBox="0 0 100 150">
        <defs>
            <radialGradient id="prism-glow" cx="30%" cy="30%" r="70%">
                <stop offset="0%" style="stop-color:#fff; stop-opacity:0.9" />
                <stop offset="40%" style="stop-color:#f3e5ab; stop-opacity:0.7" />
                <stop offset="80%" style="stop-color:#d4af37; stop-opacity:0.5" />
                <stop offset="100%" style="stop-color:#8ba89c; stop-opacity:0.2" />
            </radialGradient>
        </defs>

        <g class="float-obj" style="animation-delay: 1s;">
            <circle cx="50" cy="80" r="20" fill="#fff" class="inner-light" filter="blur(8px)" />
            
            <polygon points="50,35 85,55 85,105 50,125 15,105 15,55" fill="url(#prism-glow)" stroke="#f3e5ab" stroke-width="0.5" />
            
            <polygon points="50,60 70,95 30,95" fill="rgba(255, 255, 255, 0.3)" stroke="#f3e5ab" stroke-width="0.4" />
            <polygon points="50,35 85,55 50,60" fill="rgba(212, 175, 55, 0.2)" stroke="#f3e5ab" stroke-width="0.3" />
            <polygon points="50,35 15,55 50,60" fill="rgba(255, 255, 255, 0.4)" stroke="#f3e5ab" stroke-width="0.3" />
            <polygon points="85,55 85,105 70,95 50,60" fill="rgba(212, 175, 55, 0.1)" stroke="#f3e5ab" stroke-width="0.3" />
            <polygon points="15,55 15,105 30,95 50,60" fill="rgba(139, 168, 156, 0.2)" stroke="#f3e5ab" stroke-width="0.3" />
            <polygon points="15,105 50,125 30,95" fill="rgba(212, 175, 55, 0.4)" stroke="#f3e5ab" stroke-width="0.3" />
            <polygon points="85,105 50,125 70,95" fill="rgba(243, 229, 171, 0.2)" stroke="#f3e5ab" stroke-width="0.3" />
            
            <line x1="50" y1="10" x2="50" y2="35" stroke="#f3e5ab" stroke-width="0.5" stroke-dasharray="2,2" />
            <line x1="50" y1="125" x2="50" y2="150" stroke="#f3e5ab" stroke-width="0.5" stroke-dasharray="2,2" />
        </g>
    </svg>
    <div class="label">如意多面寶珠</div>
</div>

</body>
</html>
