<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賢劫千佛 ． 宇宙接力</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #9fdfc8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; background: #000; color: #eee;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            overflow: hidden; 
        }
        
        #realm-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
        }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10; pointer-events: none; 
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .header {
            text-align: center; padding: 40px 20px 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
        }
        .title { color: var(--gold); font-size: 1.5rem; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 15px var(--solid-gold); margin-bottom: 5px; }
        .subtitle { color: var(--cyan); font-size: 0.85rem; letter-spacing: 2px; opacity: 0.8; }
        
        /* ✨ 佛號顯示器 (支援動態高光) ✨ */
        #buddha-name-display {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: var(--gold); font-size: 2.2rem; font-weight: bold; letter-spacing: 8px;
            text-shadow: 0 0 20px var(--solid-gold);
            opacity: 0; transition: opacity 1.5s ease-in-out, color 0.5s, text-shadow 0.5s;
            white-space: nowrap; text-align: center;
        }
        .buddha-rank { font-size: 1rem; color: var(--cyan); letter-spacing: 4px; margin-bottom: 12px; text-shadow: none; display: block;}
        
        /* ✨ 宇宙輪迴大閃光 ✨ */
        #universe-flash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #fff; z-index: 9999; pointer-events: none;
            opacity: 0; transition: opacity 1.5s ease-out;
        }
        .flash-active { opacity: 1 !important; transition: opacity 0.1s ease-in !important; }

        .scroll-box {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 60%, transparent 100%);
            padding: 30px 25px 40px; pointer-events: auto; 
            border-top: 1px solid rgba(212,175,55,0.2);
            max-height: 45vh; overflow-y: auto; scrollbar-width: none;
        }
        .scroll-content { text-align: justify; line-height: 1.8; font-size: 0.95rem; color: #ddd; }
        .highlight { color: var(--gold); font-weight: bold; text-shadow: 0 0 5px rgba(212,175,55,0.4); }

        .back-btn {
            display: block; width: 100%; max-width: 300px; margin: 20px auto 0;
            background: transparent; color: var(--gold); border: 1px solid var(--gold);
            padding: 12px; border-radius: 25px; font-size: 0.9rem; letter-spacing: 2px;
            text-align: center; cursor: pointer; transition: 0.3s; pointer-events: auto;
            box-shadow: 0 0 10px rgba(212,175,55,0.1);
        }
        .back-btn:active { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(212,175,55,0.6); }
    </style>
</head>
<body>

    <div id="universe-flash"></div> <canvas id="realm-canvas"></canvas>

    <div class="ui-layer">
        <div class="header">
            <div class="title">賢劫千佛 ． 宇宙接力</div>
            <div class="subtitle">時空長河 ． 願力不息</div>
        </div>

        <div id="buddha-name-display">
            <span class="buddha-rank" id="buddha-rank">第九小劫</span>
            <span id="buddha-name">拘留孫佛</span>
        </div>

        <div class="scroll-box">
            <div class="scroll-content">
                依《賢劫經》所載，吾等所處之時空名為「賢劫」。於此漫長劫中，將有一千尊佛依序降生娑婆，接力度化眾生。<br><br>
                佛法乃宇宙間永不熄滅之火炬。第九小劫四佛出世，第十小劫彌勒下生，第十五小劫更有九百九十四尊佛相繼出世，直至第二十小劫樓至佛圓滿千佛之數。<br><br>
                吾等今日求生極樂，換取不退轉金身，實為預備此宇宙之約。待未來時機成熟，必將於此<span class="highlight">千佛接力</span>中，化身大菩薩乘願再來，甚至於未來際，綻放屬於吾等成佛之金蓮！
            </div>
            <button class="back-btn" onclick="window.history.back()">返回大乘法界</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('realm-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    
    let stars = [];
    const NUM_STARS = 800;
    const FOV = 400; 

    // ✨ 終極千佛時間線 (嚴格依據《賢劫經》)
    const timeline = [
        { rank: "第九小劫 ． 第一尊", name: "拘留孫佛", highlight: false },
        { rank: "第九小劫 ． 第二尊", name: "拘那含牟尼佛", highlight: false },
        { rank: "第九小劫 ． 第三尊", name: "迦葉佛", highlight: false },
        { rank: "第九小劫 ． 第四尊", name: "釋迦牟尼佛", highlight: true }, // 特殊高光
        { rank: "第十小劫 ． 第五尊", name: "彌勒尊佛", highlight: true }, // 特殊高光
        // 快轉模式：994 尊佛連續爆發
        { isFastMode: true, rank: "第十五小劫", name: "994 尊佛相繼出世", lotusCount: 15 }, 
        { rank: "第二十小劫 ． 第一千尊", name: "樓至佛 (盧至如來)", highlight: true, isLast: true } // 最後一尊
    ];
    
    let currentStep = 0;
    let fastLotusCounter = 0;

    let lotusState = {
        phase: 'waiting', 
        timer: 0,
        z: 2000,
        scale: 0,
        opacity: 0,
        petals: []
    };

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    function initStars() {
        stars = [];
        for (let i = 0; i < NUM_STARS; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 3000, y: (Math.random() - 0.5) * 3000,
                z: Math.random() * 2000, speed: Math.random() * 5 + 2, 
                color: Math.random() > 0.5 ? '#9fdfc8' : '#f3e5ab'
            });
        }
        for(let i=0; i<12; i++) lotusState.petals.push(i * (Math.PI * 2 / 12));
    }

    function drawPetal(ctx, size) {
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(size * 0.4, size * 0.2, size * 0.8, size * 0.5, size, 0);
        ctx.bezierCurveTo(size * 0.8, -size * 0.5, size * 0.4, -size * 0.2, 0, 0);
        ctx.fill(); ctx.stroke();
    }

    // 觸發宇宙輪迴閃光
    function triggerFlash() {
        const flash = document.getElementById('universe-flash');
        flash.classList.add('flash-active');
        setTimeout(() => flash.classList.remove('flash-active'), 150);
    }

    // ✨ 狀態機：控制時間流速與文字渲染
    function updateLotusLogic() {
        const textDisplay = document.getElementById('buddha-name-display');
        const rankEl = document.getElementById('buddha-rank');
        const nameEl = document.getElementById('buddha-name');
        
        let currentData = timeline[currentStep];
        // 如果進入第15小劫，時間流速變為 6 倍！
        let speedMult = currentData.isFastMode ? 6 : 1; 

        switch(lotusState.phase) {
            case 'waiting':
                lotusState.timer += speedMult;
                if(lotusState.timer > 80) { // 等待期
                    lotusState.phase = 'approaching';
                    lotusState.timer = 0;
                    lotusState.z = 2500;
                    
                    // 文字渲染邏輯
                    if (fastLotusCounter === 0) { // 避免快轉時一直重繪文字
                        rankEl.innerText = currentData.rank;
                        nameEl.innerText = currentData.name;
                        
                        // 高光判斷 (釋迦、彌勒、樓至)
                        if (currentData.highlight) {
                            nameEl.style.color = "#ffffff";
                            nameEl.style.textShadow = "0 0 20px #fff, 0 0 40px var(--cyan)";
                        } else {
                            nameEl.style.color = "var(--gold)";
                            nameEl.style.textShadow = "0 0 20px var(--solid-gold)";
                        }
                    }
                    if (!currentData.isFastMode || fastLotusCounter === 0) {
                        textDisplay.style.opacity = 0; // 準備淡入
                    }
                }
                break;
                
            case 'approaching':
                lotusState.z -= (25 * speedMult);
                if(lotusState.z <= 200) {
                    lotusState.phase = 'blooming';
                    lotusState.timer = 0;
                    textDisplay.style.opacity = 1; // 顯示文字
                }
                break;
                
            case 'blooming':
                lotusState.timer += speedMult;
                lotusState.scale = Math.min(1, lotusState.timer / 60);
                lotusState.opacity = Math.min(1, lotusState.timer / 30);
                
                // 最後一尊佛停留久一點 (300幀)，其餘正常 (150幀)
                let bloomDuration = currentData.isLast ? 300 : 150; 
                
                if(lotusState.timer > bloomDuration) {
                    // 樓至佛圓滿時，引爆閃光！
                    if (currentData.isLast) triggerFlash();
                    
                    lotusState.phase = 'dissolving';
                    lotusState.timer = 0;
                    
                    // 快轉模式下，文字不消失，持續掛在畫面上
                    if (!currentData.isFastMode || fastLotusCounter >= currentData.lotusCount - 1) {
                        textDisplay.style.opacity = 0; 
                    }
                }
                break;
                
            case 'dissolving':
                lotusState.timer += speedMult;
                lotusState.opacity = Math.max(0, 1 - (lotusState.timer / 60));
                lotusState.scale += 0.01 * speedMult;
                
                if(lotusState.timer > 60) {
                    lotusState.phase = 'waiting';
                    lotusState.timer = 0;
                    
                    // 步驟切換邏輯
                    if (currentData.isFastMode) {
                        fastLotusCounter++;
                        if (fastLotusCounter >= currentData.lotusCount) {
                            fastLotusCounter = 0; // 快轉結束
                            currentStep = (currentStep + 1) % timeline.length;
                        }
                    } else {
                        currentStep = (currentStep + 1) % timeline.length;
                    }
                }
                break;
        }
    }

    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.fillRect(0, 0, width, height);
        
        ctx.globalCompositeOperation = 'screen'; 

        // 1. 星塵長河
        stars.forEach(star => {
            // 如果在快轉模式，星河也跟著加速流動！
            let currentData = timeline[currentStep];
            let starSpeed = currentData.isFastMode ? star.speed * 4 : star.speed;
            
            star.z -= starSpeed;
            if (star.z <= 0) {
                star.z = 2000;
                star.x = (Math.random() - 0.5) * 3000;
                star.y = (Math.random() - 0.5) * 3000;
            }

            let scale = FOV / (FOV + star.z);
            let sx = (width / 2) + star.x * scale;
            let sy = (height / 2) + star.y * scale - 50;
            let size = Math.max(0.1, 3 * scale);
            let alpha = Math.min(1, scale * 1.5);

            ctx.beginPath();
            ctx.arc(sx, sy, size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '159,223,200'}, ${alpha})`;
            ctx.fill();
        });

        // 2. 更新邏輯
        updateLotusLogic();

        // 3. 繪製蓮花
        let cx = width / 2;
        let cy = height / 2 - 80;

        if (lotusState.phase === 'approaching') {
            let scale = FOV / (FOV + lotusState.z);
            let size = 15 * scale;
            ctx.shadowBlur = 20; ctx.shadowColor = '#fff';
            ctx.beginPath(); ctx.arc(cx, cy, size, 0, Math.PI * 2);
            ctx.fillStyle = '#fff'; ctx.fill(); ctx.shadowBlur = 0;
        } 
        else if (lotusState.phase === 'blooming' || lotusState.phase === 'dissolving') {
            ctx.save();
            ctx.translate(cx, cy);
            
            // 旋轉動畫 (快轉模式下轉更快)
            let rotSpeed = timeline[currentStep].isFastMode ? 0.015 : 0.005;
            let rotation = (lotusState.timer * rotSpeed) * (lotusState.phase === 'dissolving' ? 2 : 1);
            ctx.rotate(rotation);

            // 樓至佛 (最後一尊) 蓮花稍微巨大化
            let sizeMult = timeline[currentStep].isLast ? 1.3 : 1;
            let baseSize = 120 * lotusState.scale * sizeMult;
            
            ctx.shadowBlur = 30;
            ctx.shadowColor = `rgba(212, 175, 55, ${lotusState.opacity})`;
            ctx.fillStyle = `rgba(243, 229, 171, ${lotusState.opacity * 0.2})`; 
            ctx.strokeStyle = `rgba(255, 255, 255, ${lotusState.opacity * 0.8})`; 
            ctx.lineWidth = 1.5;

            for (let i = 0; i < 12; i++) {
                ctx.save(); ctx.rotate(lotusState.petals[i]); drawPetal(ctx, baseSize); ctx.restore();
                ctx.save(); ctx.rotate(lotusState.petals[i] + Math.PI/12); drawPetal(ctx, baseSize * 0.6); ctx.restore();
            }

            ctx.beginPath();
            ctx.arc(0, 0, 15 * lotusState.scale * sizeMult, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${lotusState.opacity})`;
            ctx.fill();
            ctx.restore();
        }

        ctx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(animate);
    }

    initStars();
    animate();
</script>
</body>
</html>
