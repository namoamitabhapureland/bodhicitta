<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龍華三會 ． 赴法界約</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --emerald: #097969;
            --cyan: #9fdfc8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; background: #000; color: #eee;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            overflow: hidden; /* 鎖死畫面，專注 3D 互動 */
            touch-action: none; /* 防止手機預設滑動 */
        }
        
        /* ✨ 3D Canvas 畫布 ✨ */
        #realm-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; cursor: grab;
        }
        #realm-canvas:active { cursor: grabbing; }

        /* ✨ UI 介面層 ✨ */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10; pointer-events: none; /* 讓點擊穿透到 Canvas */
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* 頂部標題 */
        .header {
            text-align: center; padding: 40px 20px 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
        }
        .title { color: var(--gold); font-size: 1.5rem; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 15px var(--solid-gold); margin-bottom: 5px; }
        .subtitle { color: var(--cyan); font-size: 0.85rem; letter-spacing: 2px; opacity: 0.8; }
        
        /* 拖曳提示 */
        .drag-hint {
            position: absolute; top: 110px; left: 50%; transform: translateX(-50%);
            color: rgba(243,229,171,0.7); font-size: 0.75rem; letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px;
            animation: pulse-hint 2s infinite alternate;
            background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 15px; border: 1px solid rgba(212,175,55,0.3);
        }
        @keyframes pulse-hint { 0% { opacity: 0.4; } 100% { opacity: 1; box-shadow: 0 0 10px rgba(212,175,55,0.5); } }

        /* 底部法界古卷 */
        .scroll-box {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 60%, transparent 100%);
            padding: 30px 25px 40px; pointer-events: auto; /* 恢復點擊 */
            border-top: 1px solid rgba(212,175,55,0.2);
            max-height: 45vh; overflow-y: auto; scrollbar-width: none;
        }
        .scroll-content { text-align: justify; line-height: 1.8; font-size: 0.95rem; color: #ddd; }
        .highlight { color: var(--gold); font-weight: bold; text-shadow: 0 0 5px rgba(212,175,55,0.4); }
        .data-list { margin: 15px 0; padding-left: 15px; border-left: 2px solid var(--solid-gold); }
        .data-item { color: var(--cyan); font-size: 0.9rem; margin-bottom: 8px; }
        .data-num { color: #fff; font-weight: bold; font-family: monospace; font-size: 1.05rem; text-shadow: 0 0 8px #fff; }

        /* 返回按鈕 */
        .back-btn {
            display: block; width: 100%; max-width: 300px; margin: 20px auto 0;
            background: transparent; color: var(--gold); border: 1px solid var(--gold);
            padding: 12px; border-radius: 25px; font-size: 0.9rem; letter-spacing: 2px;
            text-align: center; cursor: pointer; transition: 0.3s; pointer-events: auto;
            box-shadow: 0 0 10px rgba(212,175,55,0.1);
        }
        .back-btn:active { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(212,175,55,0.6); }
    </style>
</head>
<body>

    <canvas id="realm-canvas"></canvas>

    <div class="ui-layer">
        <div class="header">
            <div class="title">賢劫 ． 龍華菩提</div>
            <div class="subtitle">彌勒下生 ． 赴法界約</div>
        </div>

        <div class="drag-hint">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16v-2a4 4 0 0 0-4-4H7"/><polygon points="11 6 7 10 11 14"/><path d="M3 8v2a4 4 0 0 0 4 4h10"/><polygon points="13 18 17 14 13 10"/></svg>
            滑動以 360° 觀想神樹
        </div>

        <div class="scroll-box">
            <div class="scroll-content">
                《菩薩處胎經》載，彌勒菩薩未來下生娑婆，於高大如龍盤空之龍華菩提樹下成佛，開三大法會度化有緣：
                <div class="data-list">
                    <div class="data-item">第一會：釋尊法運受五戒者 <span class="data-num">(96億)</span></div>
                    <div class="data-item">第二會：釋尊法運受三歸者 <span class="data-num">(94億)</span></div>
                    <div class="data-item">第三會：乃至一稱南無佛者 <span class="data-num">(92億)</span></div>
                </div>
                唯識宗匠具金剛之志，方能直往內院。然凡夫之志脆若琉璃，若無<span class="highlight">彌陀本願托底</span>，恐於輪迴巨浪中再次沉淪。
                <br><br>
                今稱念彌陀求生極樂，非為逃避，乃為獲不退轉金身。待時機至，吾等極樂菩薩必將<span class="highlight">乘願再來</span>，從容赴此龍華之約！
            </div>
            <button class="back-btn" onclick="window.history.back()">返回大乘法界</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('realm-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    
    // 3D 空間變數
    let particles = [];
    let ripples = [];
    let angleX = 0.1; // 預設稍微俯視
    let angleY = 0;
    let isDragging = false;
    let lastMouseX = 0;
    let lastMouseY = 0;
    let time = 0;

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    // 初始化法界元素
    function initRealm() {
        particles = [];
        ripples = [];
        
        // 1. 樹幹 (虯結如龍盤空)
        for (let i = 0; i < 600; i++) {
            let t = i / 600;
            let radius = 35 * (1 - t) + 5;
            let spiral = t * Math.PI * 12;
            let y = t * 250 - 100; // 樹幹高度區間
            
            let x = Math.cos(spiral) * radius + (Math.random() - 0.5) * 10;
            let z = Math.sin(spiral) * radius + (Math.random() - 0.5) * 10;
            
            particles.push({
                x: x, y: y, z: z,
                color: Math.random() > 0.4 ? '#8b5a2b' : '#d4af37', // 古銅與暗金
                size: Math.random() * 2 + 1, type: 'trunk'
            });
        }

        // 2. 樹冠 (巨大化、發光翡翠琉璃)
        for (let i = 0; i < 2000; i++) {
            let theta = Math.random() * Math.PI * 2;
            let phi = Math.acos(Math.random() * 2 - 1) / 1.4; // 傘狀半球體
            let radius = Math.random() * 220 + 60; // 樹冠半徑擴大
            
            let x = radius * Math.sin(phi) * Math.cos(theta);
            let y = radius * Math.cos(phi) + 120; // 樹冠置於樹幹上方
            let z = radius * Math.sin(phi) * Math.sin(theta);
            
            let colors = ['#097969', '#2e8b57', '#008b8b', '#f3e5ab'];
            let color = colors[Math.floor(Math.random() * colors.length)];

            particles.push({
                x: x, y: y, z: z, color: color,
                size: Math.random() * 3 + 1, type: 'canopy',
                offset: Math.random() * Math.PI * 2
            });
        }

        // 3. 彌勒法音漣漪 (初始化三個不同大小的波紋)
        ripples.push({ radius: 0, maxRadius: 400, speed: 0.8 });
        ripples.push({ radius: 130, maxRadius: 400, speed: 0.8 });
        ripples.push({ radius: 260, maxRadius: 400, speed: 0.8 });
    }

    // 3D 投影核心運算
    function project(x, y, z) {
        let cosX = Math.cos(angleX), sinX = Math.sin(angleX);
        let y1 = y * cosX - z * sinX;
        let z1 = y * sinX + z * cosX;
        
        let cosY = Math.cos(angleY), sinY = Math.sin(angleY);
        let x2 = x * cosY - z1 * sinY;
        let z2 = x * sinY + z1 * cosY;

        let fov = 400; 
        let scale = fov / (fov + z2 + 250); 
        
        let screenX = (width / 2) + x2 * scale;
        let screenY = (height / 2) - y1 * scale - 80; // 整體稍微下移
        
        return { x: screenX, y: screenY, scale: scale, z: z2 };
    }

    // 渲染彌勒金身剪影 (永遠面向鏡頭的 Billboarding 技術)
    function drawMaitreya() {
        // 佛身坐落於樹基 (-100 的高度)
        let proj = project(0, -100, 0); 
        
        if (proj.z > -400) {
            let scale = proj.scale;
            ctx.shadowBlur = 30;
            ctx.shadowColor = 'rgba(243, 229, 171, 0.8)';
            ctx.fillStyle = 'rgba(212, 175, 55, 0.9)'; // 真金色

            // 底部盤腿基座 (橢圓)
            ctx.beginPath();
            ctx.ellipse(proj.x, proj.y + 15 * scale, 35 * scale, 10 * scale, 0, 0, Math.PI * 2);
            ctx.fill();

            // 中間福報大肚 (大圓)
            ctx.beginPath();
            ctx.arc(proj.x, proj.y, 22 * scale, 0, Math.PI * 2);
            ctx.fill();

            // 上方佛首 (小圓)
            ctx.beginPath();
            ctx.arc(proj.x, proj.y - 30 * scale, 12 * scale, 0, Math.PI * 2);
            ctx.fill();
            
            // 關閉發光，避免影響其他粒子
            ctx.shadowBlur = 0; 
        }
    }

    // 渲染法音漣漪 (3D 擴散水波)
    function drawRipples() {
        ctx.lineWidth = 1.5;
        for (let r of ripples) {
            r.radius += r.speed;
            if (r.radius > r.maxRadius) r.radius = 0;
            
            let opacity = 1 - (r.radius / r.maxRadius);
            ctx.strokeStyle = `rgba(212, 175, 55, ${opacity * 0.6})`;

            ctx.beginPath();
            // 畫 3D 圓圈 (取 60 個點連接成透視圓)
            for (let i = 0; i <= 60; i++) {
                let theta = (i / 60) * Math.PI * 2;
                let x = Math.cos(theta) * r.radius;
                let z = Math.sin(theta) * r.radius;
                let proj = project(x, -100, z); // 從樹底擴散
                
                if (i === 0) ctx.moveTo(proj.x, proj.y);
                else ctx.lineTo(proj.x, proj.y);
            }
            ctx.stroke();
        }
    }

    function animate() {
        // 清除畫布，帶微弱拖影
        ctx.fillStyle = 'rgba(2, 5, 2, 0.5)'; 
        ctx.fillRect(0, 0, width, height);
        
        if(!isDragging) angleY += 0.0015; // 緩慢自轉
        time += 0.03;

        // 1. 畫漣漪 (在最底層)
        drawRipples();

        // 2. 處理 3D 粒子
        let projectedParticles = [];
        particles.forEach(p => {
            let py = p.y;
            if (p.type === 'canopy') {
                py += Math.sin(time + p.offset) * 1.5; // 樹冠呼吸感
            }
            
            let proj = project(p.x, py, p.z);
            if (proj.z > -400) {
                projectedParticles.push({
                    sx: proj.x, sy: proj.y, scale: proj.scale, z: proj.z,
                    color: p.color, size: p.size, type: p.type
                });
            }
        });

        // 遠近排序
        projectedParticles.sort((a, b) => b.z - a.z);

        // 開啟全域發光
        ctx.globalCompositeOperation = 'screen';
        
        projectedParticles.forEach(p => {
            let finalSize = p.size * p.scale;
            if (finalSize < 0.2) return;

            ctx.beginPath();
            ctx.arc(p.sx, p.sy, finalSize, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            // 樹冠增加光暈感
            if (p.type === 'canopy') {
                ctx.shadowBlur = 8;
                ctx.shadowColor = p.color;
            } else {
                ctx.shadowBlur = 0;
            }
            ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over';
        ctx.shadowBlur = 0;

        // 3. 畫彌勒金身 (疊在樹幹最前方)
        drawMaitreya();

        requestAnimationFrame(animate);
    }

    // 觸控與滑鼠互動 (360 度轉向)
    function onDown(e) {
        isDragging = true;
        lastMouseX = e.touches ? e.touches[0].clientX : e.clientX;
        lastMouseY = e.touches ? e.touches[0].clientY : e.clientY;
    }
    function onMove(e) {
        if (!isDragging) return;
        let currentX = e.touches ? e.touches[0].clientX : e.clientX;
        let currentY = e.touches ? e.touches[0].clientY : e.clientY;
        
        angleY += (currentX - lastMouseX) * 0.01; 
        angleX += (currentY - lastMouseY) * 0.01; 
        angleX = Math.max(-Math.PI/4, Math.min(Math.PI/4, angleX)); // 鎖定上下視角極限

        lastMouseX = currentX; lastMouseY = currentY;
    }
    function onUp() { isDragging = false; }

    canvas.addEventListener('mousedown', onDown);
    canvas.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    canvas.addEventListener('touchstart', onDown, {passive: true});
    canvas.addEventListener('touchmove', onMove, {passive: true});
    window.addEventListener('touchend', onUp);

    initRealm();
    animate();
</script>
</body>
</html>
