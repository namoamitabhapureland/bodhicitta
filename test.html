<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>菩提幾何 ． 全景預演</title>
    <style>
        body { margin: 0; background: #050505; color: #f3e5ab; overflow: hidden; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; perspective: 1000px; display: flex; justify-content: center; align-items: center; }
        .world { transform-style: preserve-3d; transition: transform 0.1s; }
        .node { 
            position: absolute; width: 8px; height: 8px; 
            background: rgba(243, 229, 171, 0.9);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.8), 0 0 30px rgba(255, 255, 255, 0.3);
            border-radius: 2px; transform-style: preserve-3d;
        }
        .info { position: fixed; bottom: 30px; width: 100%; text-align: center; letter-spacing: 5px; opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="world" id="world"></div>
    </div>
    <div class="info">撥動大千 ． 預見圓滿</div>

    <script>
        const world = document.getElementById('world');
        const count = 108;
        const nodes = [];

        // 數學排列：108顆種子組成幾何蓮花軌跡
        for (let i = 0; i < count; i++) {
            const node = document.createElement('div');
            node.className = 'node';
            
            // 費馬螺旋排列 (Fermat's Spiral) 配合高度變化形成 3D 蓮花
            const phi = i * Math.PI * (3 - Math.sqrt(5)); // 黃金角度
            const radius = Math.sqrt(i) * 20;
            const y = (i - count / 2) * 2; // 縱向拉伸成塔狀蓮花
            
            const x = Math.cos(phi) * radius;
            const z = Math.sin(phi) * radius;

            node.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
            world.appendChild(node);
            nodes.push(node);
        }

        // 3D 互動邏輯
        let rotateY = 0;
        let rotateX = -20;
        let isDragging = false;
        let lastX, lastY;

        window.addEventListener('mousedown', (e) => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - lastX;
            const deltaY = e.clientY - lastY;
            rotateY += deltaX * 0.5;
            rotateX -= deltaY * 0.5;
            world.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            lastX = e.clientX;
            lastY = e.clientY;
        });
        window.addEventListener('mouseup', () => isDragging = false);

        // 手機觸控支援
        window.addEventListener('touchstart', (e) => { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - lastX;
            const deltaY = e.touches[0].clientY - lastY;
            rotateY += deltaX * 0.5;
            rotateX -= deltaY * 0.5;
            world.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });
        window.addEventListener('touchend', () => isDragging = false);

        // 自動緩緩旋轉
        function animate() {
            if (!isDragging) {
                rotateY += 0.2;
                world.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
