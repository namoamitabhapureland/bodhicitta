<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>終極法寶 ． 寶劍與帝釋網</title>
    <style>
        body { margin: 0; background: #010102; display: flex; justify-content: center; align-items: center; gap: 60px; height: 100vh; overflow: hidden; font-family: "PingFang TC", sans-serif; }
        
        .item-box { width: 220px; height: 350px; position: relative; display: flex; flex-direction: column; align-items: center; }
        svg { width: 100%; height: 75%; filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.2)); overflow: visible; }
        
        /* 懸浮動畫 */
        @keyframes float-pulse {
            0% { transform: translateY(0px); filter: drop-shadow(0 0 15px rgba(243, 229, 171, 0.2)); }
            50% { transform: translateY(-15px); filter: drop-shadow(0 0 35px rgba(243, 229, 171, 0.6)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 0 15px rgba(243, 229, 171, 0.2)); }
        }
        .float-obj { animation: float-pulse 5s infinite ease-in-out; transform-origin: center; }
        
        /* 因陀羅網緩慢自轉 */
        @keyframes rotate-net { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spin-net { animation: rotate-net 20s linear infinite; transform-origin: 50px 75px; }

        /* 節點閃爍光芒 */
        @keyframes node-flash { 0% { opacity: 0.3; r: 1.5; } 100% { opacity: 1; r: 3; } }
        .node { animation: node-flash 2s infinite alternate ease-in-out; }

        .label { color: #f3e5ab; letter-spacing: 5px; font-size: 0.95rem; margin-top: 25px; text-shadow: 0 0 15px #d4af37; opacity: 0.9; text-align: center; line-height: 1.5; }
        .sub-label { font-size: 0.7rem; color: #8ba89c; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="item-box">
    <svg viewBox="0 0 100 150">
        <defs>
            <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#fff; stop-opacity:0.9" />
                <stop offset="50%" style="stop-color:#f3e5ab; stop-opacity:0.4" />
                <stop offset="100%" style="stop-color:#d4af37; stop-opacity:0.1" />
            </linearGradient>
            <radialGradient id="sword-core">
                <stop offset="0%" style="stop-color:#fff; stop-opacity:1" />
                <stop offset="100%" style="stop-color:#f3e5ab; stop-opacity:0" />
            </radialGradient>
        </defs>

        <g class="float-obj">
            <rect x="49.5" y="10" width="1" height="120" fill="url(#sword-core)" opacity="0.8" />
            
            <path d="M50 10 L60 40 L50 50 L40 40 Z" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.5" />
            <path d="M50 50 L65 90 L50 100 L35 90 Z" fill="rgba(243, 229, 171, 0.15)" stroke="#f3e5ab" stroke-width="0.4" />
            <path d="M50 50 L55 92 L50 98 L45 92 Z" fill="rgba(255, 255, 255, 0.4)" stroke="none" /> <path d="M25 100 L50 90 L75 100 L50 110 Z" fill="rgba(212, 175, 55, 0.2)" stroke="#f3e5ab" stroke-width="0.6" />
            <path d="M35 95 L50 88 L65 95 L50 102 Z" fill="url(#pure-glass)" stroke="#fff" stroke-width="0.3" />

            <path d="M46 110 L54 110 L52 135 L48 135 Z" fill="rgba(243, 229, 171, 0.1)" stroke="#f3e5ab" stroke-width="0.5" />
            <line x1="50" y1="110" x2="50" y2="135" stroke="#fff" stroke-width="0.3" stroke-dasharray="1,1" />

            <polygon points="50,135 55,140 50,145 45,140" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.5" />
        </g>
    </svg>
    <div class="label">智慧幾何寶劍<br><span class="sub-label">全琉璃淨化版</span></div>
</div>

<div class="item-box">
    <svg viewBox="0 0 100 150">
        <defs>
            <radialGradient id="net-glow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" style="stop-color:#fff; stop-opacity:1" />
                <stop offset="30%" style="stop-color:#f3e5ab; stop-opacity:0.6" />
                <stop offset="100%" style="stop-color:#d4af37; stop-opacity:0" />
            </radialGradient>
        </defs>

        <g class="float-obj" style="animation-delay: 1.5s;">
            <circle cx="50" cy="75" r="40" fill="url(#net-glow)" opacity="0.3" filter="blur(4px)" />

            <g class="spin-net">
                <g stroke="rgba(243, 229, 171, 0.4)" stroke-width="0.3">
                    <line x1="50" y1="35" x2="85" y2="55" /> <line x1="85" y1="55" x2="85" y2="95" />
                    <line x1="85" y1="95" x2="50" y2="115" /> <line x1="50" y1="115" x2="15" y2="95" />
                    <line x1="15" y1="95" x2="15" y2="55" /> <line x1="15" y1="55" x2="50" y2="35" />
                    
                    <line x1="50" y1="35" x2="50" y2="75" /> <line x1="85" y1="55" x2="50" y2="75" />
                    <line x1="85" y1="95" x2="50" y2="75" /> <line x1="50" y1="115" x2="50" y2="75" />
                    <line x1="15" y1="95" x2="50" y2="75" /> <line x1="15" y1="55" x2="50" y2="75" />

                    <line x1="15" y1="55" x2="85" y2="55" stroke-dasharray="2,2" />
                    <line x1="15" y1="95" x2="85" y2="95" stroke-dasharray="2,2" />
                </g>

                <polygon points="50,65 58,75 50,85 42,75" fill="#fff" filter="drop-shadow(0 0 5px #fff)" />
                <circle cx="50" cy="75" r="2" fill="#fff" class="node" style="animation-duration: 1s;" />
                
                <circle cx="50" cy="35" r="2" fill="#f3e5ab" class="node" style="animation-delay: 0.2s;" />
                <circle cx="85" cy="55" r="2" fill="#d4af37" class="node" style="animation-delay: 0.4s;" />
                <circle cx="85" cy="95" r="2" fill="#f3e5ab" class="node" style="animation-delay: 0.6s;" />
                <circle cx="50" cy="115" r="2" fill="#fff" class="node" style="animation-delay: 0.8s;" />
                <circle cx="15" cy="95" r="2" fill="#d4af37" class="node" style="animation-delay: 1.0s;" />
                <circle cx="15" cy="55" r="2" fill="#f3e5ab" class="node" style="animation-delay: 1.2s;" />
            </g>
        </g>
    </svg>
    <div class="label">華嚴因陀羅網<br><span class="sub-label">重重無盡 ‧ 終極大獎</span></div>
</div>

</body>
</html>
