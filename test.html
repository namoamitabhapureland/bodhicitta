<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系統 ． 一真法界 (圓滿回饋)</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; --bg-deep: #000; }
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: var(--bg-deep); color: #fff; display: flex; justify-content: center; align-items: center; -webkit-tap-highlight-color: transparent; user-select: none; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }

        /* ======= Z軸星空畫布 ======= */
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* ======= 菩提明點 (The Seed) ======= */
        #immortal-seed {
            position: absolute; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; 
            z-index: 100; opacity: 0; transform: scale(0.5);
            transition: all 2s ease-in-out;
            box-shadow: 0 0 20px var(--gold), 0 0 50px var(--solid-gold);
        }
        .seed-breathe { animation: seed-pulse 4s infinite alternate ease-in-out; }
        @keyframes seed-pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px var(--gold), 0 0 40px var(--solid-gold); }
            100% { transform: scale(1.4); box-shadow: 0 0 40px var(--gold), 0 0 80px var(--solid-gold), 0 0 120px #fff; }
        }

        /* ======= 萬法唯心：幾何曼陀羅 (The Mandala) ======= */
        #mandala-container {
            position: absolute; width: 100vmin; height: 100vmin; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transform: scale(0.1) rotate(0deg);
            will-change: transform, opacity;
            transition: opacity 4s ease, transform 10s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        /* 奇點坍縮專用 Class */
        .implode {
            transition: transform 3s cubic-bezier(0.5, 0, 1, 0.2), opacity 2.5s ease-in !important;
            transform: scale(0.01) rotate(1080deg) !important;
            opacity: 0 !important;
        }

        .mandala-ring { position: absolute; border-radius: 50%; border: 1px solid; transform-origin: center; }
        .ring-spin-cw { animation: spin-cw 40s linear infinite; }
        .ring-spin-ccw { animation: spin-ccw 50s linear infinite; }
        @keyframes spin-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        /* ======= 昇華：滿版極光 ======= */
        #golden-flash { 
            position: fixed; inset: 0; background: radial-gradient(circle, #fff 0%, #f3e5ab 40%, #d4af37 100%);
            mix-blend-mode: screen; opacity: 0; z-index: 99998; pointer-events: none; 
            transition: opacity 0.2s ease-out; 
        }

        /* ======= 法音宣流 (The Text) ======= */
        #profound-text { 
            position: absolute; margin-top: 100px; color: var(--gold); font-size: 1.3rem; 
            letter-spacing: 12px; opacity: 0; transition: opacity 4s; 
            text-shadow: 0 0 20px var(--solid-gold), 0 0 40px #fff; 
            text-align: center; line-height: 2.8; font-weight: bold; z-index: 100;
        }
    </style>
</head>
<body>
    
    <canvas id="starCanvas"></canvas>

    <div id="mandala-container"></div>

    <div id="immortal-seed"></div>

    <div id="golden-flash"></div>
    
    <div id="profound-text">菩提之心 ． 歷劫不滅<br>一真法界 ． 本自如如</div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        // ==========================================
        // 1. Z軸星空引擎 (The Void & The Warp)
        // ==========================================
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let xjStars = [];
        let warpSpeed = 1;       // 初始緩慢流動
        let targetWarpSpeed = 1; 
        const FOV = 400;

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
        }
        window.addEventListener('resize', resize); resize();

        function initStars() {
            xjStars = [];
            for (let i = 0; i < 600; i++) {
                xjStars.push({
                    x: (Math.random() - 0.5) * 3000,
                    y: (Math.random() - 0.5) * 3000,
                    z: Math.random() * 2000,
                    color: Math.random() > 0.5 ? '#8ba89c' : '#f3e5ab'
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, width, height);
            warpSpeed += (targetWarpSpeed - warpSpeed) * 0.05; // 平滑加速/減速

            ctx.globalCompositeOperation = 'screen';
            xjStars.forEach(star => {
                star.z -= warpSpeed;
                if (star.z <= 0) { 
                    star.z = 2000; 
                    star.x = (Math.random() - 0.5) * 3000; 
                    star.y = (Math.random() - 0.5) * 3000; 
                }
                
                let sc = FOV / (FOV + star.z); 
                let sx = (width/2) + star.x * sc; 
                let sy = (height/2) + star.y * sc;
                let alpha = Math.min(1, sc * 2) * (warpSpeed > 2 ? 0.9 : 0.6);

                if (warpSpeed > 5) {
                    // 極速躍遷時的拉線拖影效果
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    let tailSc = FOV / (FOV + star.z + warpSpeed * 2);
                    let tailX = (width/2) + star.x * tailSc;
                    let tailY = (height/2) + star.y * tailSc;
                    ctx.lineTo(tailX, tailY);
                    ctx.strokeStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '139,168,156'}, ${alpha})`;
                    ctx.lineWidth = Math.max(0.5, 2 * sc);
                    ctx.stroke();
                } else {
                    // 平緩時的點狀星星
                    ctx.beginPath(); 
                    ctx.arc(sx, sy, Math.max(0.5, 2 * sc), 0, Math.PI*2);
                    ctx.fillStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '139,168,156'}, ${alpha})`; 
                    ctx.fill();
                }
            });
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(drawStars);
        }

        // ==========================================
        // 2. 繪製極簡曼陀羅 (The Mandala)
        // ==========================================
        function buildMandala() {
            const container = document.getElementById('mandala-container');
            const sizes = [20, 35, 50, 70, 90]; 
            const colors = ['rgba(212,175,55,0.8)', 'rgba(139,168,156,0.6)', 'rgba(243,229,171,0.5)', 'rgba(212,175,55,0.3)', 'rgba(139,168,156,0.2)'];
            
            sizes.forEach((size, i) => {
                let ring = document.createElement('div');
                ring.className = `mandala-ring ${i % 2 === 0 ? 'ring-spin-cw' : 'ring-spin-ccw'}`;
                ring.style.width = `${size}%`; ring.style.height = `${size}%`;
                ring.style.borderColor = colors[i];
                ring.style.borderWidth = i % 2 === 0 ? '1px' : '2px';
                if (i % 2 !== 0) ring.style.borderStyle = 'dashed';
                ring.style.boxShadow = `0 0 20px ${colors[i]}, inset 0 0 15px ${colors[i]}`;
                container.appendChild(ring);
            });
            
            // 添加一點點內部幾何連線
            let starPoly = document.createElement('div');
            starPoly.className = 'mandala-ring ring-spin-cw';
            starPoly.style.width = '60%'; starPoly.style.height = '60%';
            starPoly.innerHTML = `<svg viewBox="0 0 100 100" style="width:100%; height:100%; overflow:visible;"><polygon points="50,0 100,50 50,100 0,50" fill="none" stroke="rgba(243,229,171,0.4)" stroke-width="0.5"/><polygon points="50,10 90,50 50,90 10,50" fill="none" stroke="rgba(139,168,156,0.5)" stroke-width="0.5" transform="rotate(45 50 50)"/></svg>`;
            container.appendChild(starPoly);
        }

        // ==========================================
        // 3. 終極 0+1 動畫引擎 (The Engine)
        // ==========================================
        async function runZenEngine() {
            initStars();
            drawStars();
            buildMandala();

            const seed = document.getElementById('immortal-seed');
            const mandala = document.getElementById('mandala-container');
            const flash = document.getElementById('golden-flash');
            const profoundText = document.getElementById('profound-text');

            // 【成】一念發心 (The Seed)
            await sleep(1000);
            seed.style.opacity = '1';
            seed.style.transform = 'scale(1)';
            seed.classList.add('seed-breathe');
            
            // 【住】萬法唯心 (The Mandala)
            await sleep(3500); 
            mandala.style.opacity = '1';
            mandala.style.transform = 'scale(1) rotate(45deg)'; // 緩緩展開並旋轉

            // 讓行者觀賞流動的法界
            await sleep(9000); 

            // 【壞】千佛躍遷與奇點坍縮 (The Collapse)
            targetWarpSpeed = 120; // 星空極速躍遷
            mandala.classList.add('implode'); // 曼陀羅極速旋轉坍縮
            
            // 讓坍縮進行 2.5 秒
            await sleep(2500);

            // 【空】寂光無相 (The Void)
            flash.style.opacity = '1'; // 爆發極光
            await sleep(300); // 強光停留
            
            // 趁強光時淨空舞台，並停止時間
            mandala.style.display = 'none'; 
            seed.classList.remove('seed-breathe');
            seed.style.opacity = '0'; // 種子暫時隱沒入光中
            targetWarpSpeed = 0; // 星空絕對靜止

            // 極光緩慢褪去
            flash.style.transition = 'opacity 5s ease-in';
            flash.style.opacity = '0';
            await sleep(4000); 

            // 【0+1】菩提不滅 (The Eternal)
            seed.style.transition = 'opacity 3s ease, transform 3s ease';
            seed.style.opacity = '1'; 
            seed.style.transform = 'scale(1.2)';
            seed.classList.add('seed-breathe');
            await sleep(2500);

            // 法音宣流
            profoundText.style.opacity = '1'; 

            // 停留 9 秒讓行者感受
            await sleep(9000); 
            
            // 圓滿歸向道場
            // 若您需要英文版，請改為 index_en.html?screen=3
            window.location.href = 'index.html?screen=3'; 
        }

        window.addEventListener('load', runZenEngine);

    </script>
</body>
</html>
