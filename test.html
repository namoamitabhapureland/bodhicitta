<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>唯識矩陣 ． 萬法歸一</title>
    <style>
        :root {
            --bg-deep: #010103;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
        }
        body { 
            margin: 0; background: var(--bg-deep); color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            overflow-x: hidden; scroll-behavior: smooth;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            color: var(--gold); text-decoration: none; font-size: 0.95rem; font-weight: bold;
            display: flex; align-items: center; gap: 8px; letter-spacing: 1px; cursor: pointer;
            text-shadow: 0 0 8px rgba(212,175,55,0.5); background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3);
        }

        .matrix-section { position: relative; width: 100vw; height: 100vh; background: #000; overflow: hidden; touch-action: pan-y; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .dharmadhatu-light {
            position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, rgba(139,168,156,0.02) 50%, transparent 80%);
            animation: breath 8s infinite alternate ease-in-out; pointer-events: none; transition: opacity 2s;
        }
        @keyframes breath { 0% { opacity: 0.4; } 100% { opacity: 1; } }

        .ui-layer { position: absolute; bottom: 8%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; gap: 15px; transition: opacity 1s;}
        
        .switch-btn {
            background: rgba(15,15,15,0.8); border: 1px solid rgba(139,168,156,0.5); color: var(--cyan);
            padding: 14px 30px; border-radius: 30px; font-size: 1rem; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; backdrop-filter: blur(10px); transition: all 0.5s; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
        }
        .switch-btn:active { transform: scale(0.95); }
        .switch-btn.pure-mode {
            border-color: var(--solid-gold); color: #000; background: linear-gradient(135deg, var(--solid-gold), #b08d2b);
            box-shadow: 0 0 30px rgba(212,175,55,0.6), inset 0 0 10px rgba(255,255,255,0.3);
        }

        #theory-btn { border-color: var(--cyan); color: var(--cyan); background: rgba(0,0,0,0.8); }
        #yizhen-btn { display: none; border-color: var(--gold); color: var(--gold); background: rgba(0,0,0,0.8); }
        
        #status-panel {
            position: absolute; top: 70px; left: 5%; width: 90%; max-width: 320px;
            background: rgba(5,5,10,0.8); backdrop-filter: blur(10px);
            border-left: 3px solid rgba(139,168,156,0.6); padding: 15px; z-index: 10; transition: 0.8s; pointer-events: none;
        }
        .status-title { font-size: 1.1rem; font-weight: bold; color: var(--cyan); letter-spacing: 2px; margin-bottom: 5px; transition: 0.8s; }
        .status-desc { font-size: 0.8rem; color: #aaa; line-height: 1.6; transition: 0.8s; }
        
        /* 結界警告彈窗 */
        #lock-warning {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: rgba(10,10,10,0.95); border: 1px solid var(--cyan); padding: 25px; border-radius: 15px;
            color: #eee; text-align: center; z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.3s;
            box-shadow: 0 0 30px rgba(139,168,156,0.3); width: 85%; max-width: 320px;
        }
        #lock-warning.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        
        /* 下方理論區塊排版 */
        .theory-section { padding: 60px 8% 100px; max-width: 600px; margin: 0 auto; background: var(--bg-deep); }
        .main-title { color: var(--gold); font-size: 1.6rem; letter-spacing: 4px; text-align: center; margin-bottom: 40px; border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 20px; }
        .theory-block { margin-bottom: 35px; border-left: 2px solid rgba(139,168,156,0.3); padding-left: 20px; }
        .t-title { color: var(--cyan); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; letter-spacing: 2px; }
        .t-text { color: #bbb; font-size: 0.95rem; line-height: 1.9; text-align: justify; }
    </style>
</head>
<body>

    <div class="back-btn" onclick="window.location.href='index.html?screen=3'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        回道場
    </div>

    <section class="matrix-section" id="matrix-view">
        <div class="dharmadhatu-light" id="bg-light"></div>
        
        <div id="status-panel">
            <div class="status-title" id="s-title">娑婆態 ． 受限連線</div>
            <div class="status-desc" id="s-desc">
                載體：碳基半透明態，生滅無常。<br>傳輸：實線上傳，但受限於硬體，下載微弱。<br>法座：空無。
            </div>
        </div>

        <canvas id="matrixCanvas"></canvas>

        <div class="ui-layer" id="ui-layer">
            <button class="switch-btn" id="toggle-btn" onclick="toggleState()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 17 12 22 22 17"></polyline>
                    <polyline points="2 12 12 17 22 12"></polyline>
                </svg>
                <span id="btn-text">切換極樂金身</span>
            </button>
            
            <button class="switch-btn" id="theory-btn" onclick="scrollToTheory()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                探輪迴之謎
            </button>

            <button class="switch-btn" id="yizhen-btn" onclick="checkAndTriggerImplosion()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2v20M2 12h20M4.93 4.93l14.14 14.14M4.93 19.07L19.07 4.93"/></svg>
                轉入一真法界
            </button>

            <div style="color:rgba(139,168,156,0.6); font-size:0.75rem; letter-spacing:2px;" id="drag-hint">360° 全息滑動俯瞰</div>
        </div>
    </section>
    
    <div id="lock-warning">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="1.5" style="margin-bottom:10px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        <div style="font-weight:bold; letter-spacing:2px; margin-bottom:10px; color:var(--gold);">結界未解</div>
        <div style="font-size:0.85rem; line-height:1.6; color:#bbb; margin-bottom:20px;">
            需達「十信位」<br>或累積念佛滿一萬聲<br>方可契入一真法界觀想。
        </div>
        <button style="background:var(--cyan); color:#000; border:none; padding:8px 20px; border-radius:15px; font-weight:bold; cursor:pointer;" onclick="document.getElementById('lock-warning').classList.remove('show')">繼續精進</button>
    </div>

    <section class="theory-section" id="theory-container">
        <h1 class="main-title">唯識與輪迴之謎</h1>
        <div class="theory-block">
            <div class="t-title">【 這裡等待您的法理文案填入 】</div>
            <div class="t-text">總工程師，大智已為您準備好乾淨、優雅的排版容器，請隨時將文案貼給大智進行整合。</div>
        </div>
    </section>

    <script>
        // 讀取本地資料
        let db = { totalNian: 0, points: 0 };
        try {
            let localDb = JSON.parse(localStorage.getItem('PX_V15.0'));
            if (localDb) db = localDb;
        } catch(e) {}

        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [], lotusParticles = [], dataLinks = [], stars = [], sublimeDust = [];
        
        let rotX = -0.15; let rotY = 0; 
        let isDragging = false; let startX, startY;
        let vX = 0, vY = 0; 

        let targetState = 0; 
        let tLotus = 0; let tGold = 0; let tCollapse = 1.0; 

        // 昇華粒子專用的微光暈
        const glowCanvas = document.createElement('canvas');
        glowCanvas.width = glowCanvas.height = 32;
        const gCtx = glowCanvas.getContext('2d');
        const gGrad = gCtx.createRadialGradient(16, 16, 0, 16, 16, 16);
        gGrad.addColorStop(0, 'rgba(255,255,255,1)');
        gGrad.addColorStop(0.2, 'rgba(212,175,55,0.6)');
        gGrad.addColorStop(1, 'rgba(212,175,55,0)');
        gCtx.fillStyle = gGrad; gCtx.fillRect(0,0,32,32);

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        function generateTopology() {
            particles = []; lotusParticles = []; dataLinks = []; stars = []; sublimeDust = [];
            function addPt(arr, x, y, z, rnd, type) { arr.push({x, y, z, rnd, type}); }

            for (let lat=0; lat<=Math.PI; lat+=0.25) { for (let lon=0; lon<Math.PI*2; lon+=0.25) { addPt(particles, 14*Math.sin(lat)*Math.cos(lon), -85+20*Math.cos(lat), 16*Math.sin(lat)*Math.sin(lon), Math.random(), 'body'); }}
            for (let y=-60; y<=25; y+=3) { let w = 35-Math.pow((y+60)*0.12, 2); if (y>-10) w += (y+10)*0.8; for (let lon=0; lon<Math.PI*2; lon+=0.25) addPt(particles, w*Math.cos(lon), y, (12+(y>0?y*0.3:0))*Math.sin(lon), Math.random(), 'body'); }
            for (let t=0; t<=1; t+=0.04) { let lx = -32*(1-t)-12*t-Math.sin(t*Math.PI)*15, ly = -55*(1-t)+25*t+Math.sin(t*Math.PI)*8, lz = 30*t; let rx = 32*(1-t)+12*t+Math.sin(t*Math.PI)*15; for(let a=0; a<Math.PI*2; a+=1.5) { addPt(particles, lx+4*Math.cos(a), ly, lz+4*Math.sin(a), Math.random(), 'body'); addPt(particles, rx+4*Math.cos(a), ly, lz+4*Math.sin(a), Math.random(), 'body'); } }
            for (let lon=0; lon<Math.PI*2; lon+=0.08) { let x=40*Math.cos(lon), y=32+4*Math.sin(lon*2), z=10+30*Math.sin(lon); for (let rad=0; rad<Math.PI*2; rad+=0.8) addPt(particles, x+7*Math.cos(rad), y+7*Math.sin(rad), z, Math.random(), 'body'); }

            const manasR = 110;
            for(let i=0; i<200; i++) { let t=Math.random()*Math.PI*2, p=Math.acos(Math.random()*2-1); addPt(particles, manasR*Math.sin(p)*Math.cos(t), -15+manasR*Math.cos(p), manasR*Math.sin(p)*Math.sin(t), Math.random(), 'manas'); }
            
            const alayaR = 240;
            for(let i=0; i<500; i++) { let t=Math.random()*Math.PI*2, p=Math.acos(Math.random()*2-1); addPt(particles, alayaR*Math.sin(p)*Math.cos(t), -15+alayaR*Math.cos(p), alayaR*Math.sin(p)*Math.sin(t), Math.random(), 'alaya'); }

            const layers = [{n:10,l:25,t:0.2,w:12,b:-3,y:40}, {n:14,l:45,t:0.7,w:18,b:8,y:45}, {n:18,l:70,t:1.25,w:26,b:22,y:50}];
            layers.forEach((L, idx) => {
                for(let i=0; i<L.n; i++) {
                    let a = (Math.PI*2/L.n)*i+(idx*0.2);
                    for(let t=0; t<=1; t+=0.05) { for(let v=-1; v<=1; v+=0.25) {
                        if(Math.abs(v)>0.7 || t>0.8 || Math.random()>0.4) {
                            let pW=L.w*Math.sin(t*Math.PI), oR=t*L.l*Math.sin(L.t)+Math.pow(t,2)*L.b, uY=-t*L.l*Math.cos(L.t);
                            addPt(lotusParticles, oR*Math.cos(a)-(v*pW)*Math.sin(a), uY+L.y, oR*Math.sin(a)+(v*pW)*Math.cos(a), Math.random(), 'lotus');
                        }
                    }}
                }
            });

            for(let i=0; i<40; i++) dataLinks.push({s: Math.floor(Math.random()*500), e: particles.length-Math.floor(Math.random()*600)-1});
            for(let i=0; i<250; i++) stars.push({ x: (Math.random()-0.5)*1200, y: (Math.random()-0.5)*1200, z: (Math.random()-0.5)*1200, s: Math.random()*1.5 });
        }

        function lerp(a, b, t) { return a + (b - a) * t; }
        function lerpCol(a, b, t) { return `rgba(${a[0]+(b[0]-a[0])*t},${a[1]+(b[1]-a[1])*t},${a[2]+(b[2]-a[2])*t},${a[3]+(b[3]-a[3])*t})`; }

        function render() {
            ctx.clearRect(0, 0, width, height); 
            ctx.globalCompositeOperation = 'screen';
            
            if (targetState === 1) {
                tLotus += (1 - tLotus) * 0.05; if (tLotus > 0.5) tGold += (1 - tGold) * 0.05; 
            } else if (targetState === 0) {
                tGold += (0 - tGold) * 0.08; if (tGold < 0.5) tLotus += (0 - tLotus) * 0.05;
            } else if (targetState === 2) {
                tCollapse += (0 - tCollapse) * 0.015; 
            }

            if(!isDragging) { rotY -= 0.003; rotX += vY; rotY += vX; vX *= 0.95; vY *= 0.95; }
            if (rotX > 1.2) rotX = 1.2; if (rotX < -1.2) rotX = -1.2;

            const cx=width/2, cy=height/2+30, fov=350, sinX=Math.sin(rotX), cosX=Math.cos(rotX), sinY=Math.sin(rotY), cosY=Math.cos(rotY);
            let proj = [];

            function project(p, c, s, hasGlow, isAlaya) {
                let wx = p.x, wy = p.y, wz = p.z;
                if (!isAlaya && targetState === 2) { wx *= tCollapse; wy *= tCollapse; wz *= tCollapse; }
                let x1=wx*cosY-wz*sinY, z1=wz*cosY+wx*sinY, y2=wy*cosX-z1*sinX, z2=z1*cosX+wy*sinX;
                if(z2 < -fov+10) return null; let scale=fov/(fov+z2);
                return {px:cx+x1*scale, py:cy+y2*scale, z:z2, sc:scale, c:c, s:s, glow:hasGlow, raw:p};
            }

            // 1. 星空
            if (targetState === 2) {
                let starAlpha = 1 - tCollapse;
                stars.forEach(st => {
                    let pr = project({x:st.x, y:st.y, z:st.z}, `rgba(255,255,255,${starAlpha * 0.8})`, st.s, false, true);
                    if(pr) { ctx.beginPath(); ctx.arc(pr.px, pr.py, pr.s*pr.sc, 0, Math.PI*2); ctx.fillStyle=pr.c; ctx.fill(); }
                });
            }

            // ✨ 2. 娑婆肉身光暈填充 (解決太淡的問題，創造體積感)
            if (targetState !== 2) {
                let bodyAura = project({x:0, y:-25, z:0}, 'rgba(0,0,0,0)', 1, false, false);
                if (bodyAura) {
                    let aS = 80 * bodyAura.sc;
                    let auraGrad = ctx.createRadialGradient(bodyAura.px, bodyAura.py, 0, bodyAura.px, bodyAura.py, aS);
                    // 娑婆是淡淡的青色，極樂是濃郁的金黃
                    let aCol1 = lerpCol([139,168,156,0.15], [243,229,171,0.25], tGold);
                    let aCol2 = `rgba(0,0,0,0)`;
                    auraGrad.addColorStop(0, aCol1); auraGrad.addColorStop(1, aCol2);
                    ctx.beginPath(); ctx.arc(bodyAura.px, bodyAura.py, aS, 0, Math.PI*2); ctx.fillStyle=auraGrad; ctx.fill();
                }
            }

            particles.forEach((p, i) => {
                if(p.type==='body') {
                    let densityThreshold = 0.85 - (tGold * 0.8);
                    if(p.rnd > densityThreshold) {
                        // ✨ 增強娑婆粒子透明度 (從0.4提升到0.85)，金身則用純金
                        let col = lerpCol([160,190,180,0.85], [255,223,100,1.0], tGold);
                        let pr = project(p, col, 1.2+(tGold*0.6), tGold>0.5, false);
                        if(pr){ pr.idx=i; proj.push(pr); }
                    }
                } 
                else if(p.type==='manas') { let pr=project(p, `rgba(212,175,55,${0.5+tGold*0.4})`, 1.5, false, false); if(pr){ pr.idx=i; proj.push(pr); } }
                else if(p.type==='alaya') { let pr=project(p, `rgba(139,168,156,${0.3+tGold*0.2})`, 1.5, false, true); if(pr){ pr.idx=i; proj.push(pr); } }
            });

            if(tLotus > 0.01) {
                lotusParticles.forEach(lp => {
                    let growY = lerp(50, lp.y, tLotus); let growX = lp.x * tLotus; let growZ = lp.z * tLotus;
                    let pr=project({x:growX, y:growY, z:growZ}, `rgba(243,229,171,${tLotus*0.95})`, 1.2*tLotus, true, false);
                    if(pr) proj.push(pr);
                });
            }

            proj.sort((a,b) => b.z-a.z);
            
            // 連線繪製
            ctx.lineWidth=1;
            dataLinks.forEach(l => {
                let p1 = proj.find(p=>p.idx===l.s), p2 = proj.find(p=>p.idx===l.e);
                if(p1 && p2) {
                    ctx.beginPath(); ctx.moveTo(p1.px, p1.py); ctx.lineTo(p2.px, p2.py);
                    if(tGold < 0.5) ctx.strokeStyle=`rgba(139,168,156,0.4)`; 
                    else ctx.strokeStyle=`rgba(243,229,171,${0.2 + tGold*0.5})`; 
                    ctx.stroke();
                }
            });

            // ✨ 銳化版繪製 (無模糊，晶瑩剔透)
            proj.forEach(p => {
                let dS = p.s*p.sc; if(dS<0.1) return;
                ctx.beginPath(); ctx.arc(p.px, p.py, dS, 0, Math.PI*2); ctx.fillStyle=p.c; ctx.fill();
                // 產生高光結晶點
                if(p.glow && p.raw.type === 'body') {
                    ctx.beginPath(); ctx.arc(p.px, p.py, dS*0.4, 0, Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
                }
            });

            // 昇華金塵 (使用偽光暈，不卡頓)
            if (targetState === 2) {
                if(Math.random() > 0.4 && tCollapse > 0.1) sublimeDust.push({ x: (Math.random()-0.5)*150, y: (Math.random()-0.5)*150, z: (Math.random()-0.5)*150, life: 1.0 });
                sublimeDust.forEach((sd, index) => {
                    sd.y -= 1.5; sd.life -= 0.015;
                    if(sd.life <= 0) sublimeDust.splice(index, 1);
                    else {
                        let pr = project({x:sd.x, y:sd.y, z:sd.z}, `rgba(243,229,171,${sd.life})`, 2, true, true);
                        if(pr) { 
                            let dsG = pr.s*pr.sc;
                            ctx.drawImage(glowCanvas, pr.px - dsG*4, pr.py - dsG*4, dsG*8, dsG*8); 
                            ctx.beginPath(); ctx.arc(pr.px, pr.py, dsG, 0, Math.PI*2); ctx.fillStyle=pr.c; ctx.fill(); 
                        }
                    }
                });
            }

            // 一真明點 (心跳)
            if (targetState === 2 && tCollapse < 0.05) {
                let pulse = 1 + Math.sin(Date.now() * 0.003) * 0.5;
                ctx.drawImage(glowCanvas, cx - 20*pulse, cy - 20*pulse, 40*pulse, 40*pulse);
                ctx.beginPath(); ctx.arc(cx, cy, 3 * pulse, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();
            }

            requestAnimationFrame(render);
        }

        function scrollToTheory() {
            document.getElementById('theory-container').scrollIntoView({ behavior: 'smooth' });
        }

        function toggleState() {
            let btn = document.getElementById('toggle-btn'); let yBtn = document.getElementById('yizhen-btn'); let tBtn = document.getElementById('theory-btn');
            let sTitle = document.getElementById('s-title'); let sDesc = document.getElementById('s-desc');
            
            if (targetState === 0) {
                targetState = 1; btn.classList.add('pure-mode'); document.getElementById('btn-text').innerText = "返回娑婆觀察";
                document.getElementById('status-panel').style.borderLeftColor = 'var(--solid-gold)';
                sTitle.style.color = 'var(--gold)'; sTitle.innerText = "極樂態 ． 完整全息";
                sDesc.innerHTML = "載體：無漏金身，緻密純粹。<br>傳輸：金光實線，上下載雙向開放。<br>法座：九品金蓮承托。";
                
                yBtn.style.display = 'flex'; tBtn.style.display = 'none';
            } else {
                targetState = 0; btn.classList.remove('pure-mode'); document.getElementById('btn-text').innerText = "切換極樂金身";
                document.getElementById('status-panel').style.borderLeftColor = 'rgba(139,168,156,0.6)';
                sTitle.style.color = 'var(--cyan)'; sTitle.innerText = "娑婆態 ． 受限連線";
                sDesc.innerHTML = "載體：碳基半透明態，生滅無常。<br>傳輸：實線上傳，但受限於硬體，下載微弱。<br>法座：空無。";
                
                yBtn.style.display = 'none'; tBtn.style.display = 'flex';
            }
        }

        // ✨ 結界攔截邏輯 (十信位 或 萬聲念佛) ✨
        function checkAndTriggerImplosion() {
            let points = db.points || 0;
            let totalNian = db.totalNian || 0;
            let currentDays = points / 100;
            
            // 條件：滿 90 日 (十信位) 或 念佛 >= 10000
            if (currentDays >= 90 || totalNian >= 10000) {
                triggerImplosion();
            } else {
                document.getElementById('lock-warning').classList.add('show');
            }
        }

        function triggerImplosion() {
            document.getElementById('toggle-btn').style.display = 'none';
            document.getElementById('yizhen-btn').style.display = 'none';
            document.getElementById('drag-hint').style.display = 'none';
            document.getElementById('bg-light').style.opacity = '0';
            
            document.getElementById('status-panel').style.borderLeftColor = '#fff';
            document.getElementById('s-title').style.color = '#fff';
            document.getElementById('s-title').innerText = "一真法界 ． 菩提不滅";
            document.getElementById('s-desc').innerHTML = "我執消融，載體坍縮。<br>萬法歸一，唯留大悲心跳動於星海之中。";
            
            targetState = 2; 
        }

        // 360度互動 (加入阻尼滑動)
        canvas.addEventListener('pointerdown', (e) => { isDragging = true; startX = e.clientX || e.touches[0].clientX; startY = e.clientY || e.touches[0].clientY; vX = 0; vY = 0; });
        canvas.addEventListener('pointermove', (e) => { 
            if (!isDragging) return; 
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0); let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            let dx = x - startX; let dy = y - startY;
            rotY -= dx * 0.008; rotX -= dy * 0.008;
            vX = -dx * 0.0005; vY = -dy * 0.0005; 
            startX = x; startY = y;
        });
        canvas.addEventListener('pointerup', () => isDragging = false); canvas.addEventListener('pointercancel', () => isDragging = false);

        generateTopology(); render();
    </script>
</body>
</html>
