<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系統 ． 一真法界 (圓滿回饋)</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; --bg-deep: #000; }
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: var(--bg-deep); color: #fff; display: flex; justify-content: center; align-items: center; -webkit-tap-highlight-color: transparent; user-select: none; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }

        /* ---------------- 頂部導航按鈕 (保留) ---------------- */
        .top-nav-btn {
            position: absolute; top: 20px; 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(212,175,55,0.6); 
            color: var(--gold); 
            padding: 8px 16px; border-radius: 25px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; 
            display: flex; align-items: center; gap: 6px; z-index: 1000; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.8), inset 0 0 10px rgba(212,175,55,0.15); 
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .top-nav-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.25); border-color: var(--solid-gold); box-shadow: 0 0 20px rgba(212,175,55,0.5); }
        
        #back-btn { left: 20px; }
        #wheel-nav-btn { right: 20px; }
        .mini-icon { width: 16px; height: 16px; filter: drop-shadow(0 0 4px rgba(243,229,171,0.5)); }

        /* ✨ Z軸星空背景 (來自千佛劫引擎，大幅優化效能) ✨ */
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* 凡所有相皆是虛妄：抽象曼陀羅世界 (The "住" World) */
        #mandala-container {
            position: absolute; width: 100vmin; height: 100vmin; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transform: scale(0.1) rotate(0deg); /* 初始縮小旋轉 */
            will-change: transform, opacity;
            transition: opacity 4s ease, transform 10s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        /* ✨ 奇點坍縮專用 Class：將華藏世界吸入黑洞 ✨ */
        .implode {
            transition: transform 3s cubic-bezier(0.5, 0, 1, 0.2), opacity 2.5s ease-in !important;
            transform: scale(0.01) rotateZ(1080deg) !important;
            opacity: 0 !important;
        }

        .mandala-ring { position: absolute; border-radius: 50%; border: 1.5px solid; transform-origin: center center; }
        .ring-spin { animation: spin 40s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ======= 昇華：滿版極光與常寂光 ======= */
        #golden-flash { 
            position: fixed; inset: 0; background: radial-gradient(circle, #fff 0%, #f3e5ab 40%, #d4af37 100%);
            mix-blend-mode: screen; opacity: 0; z-index: 99998; pointer-events: none; 
            transition: opacity 0.2s ease-out; 
        }

        /* ======= 💡 終極 0+1 重生場景 (0 + 1) ======= */
        #immortal-scene { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; background: transparent; }

        /* 💡 終極 0+1 的「1」：不滅的菩提心種子 (The Seed) */
        #immortal-seed {
            position: absolute; width: 20px; height: 20px;
            background: radial-gradient(circle, #fff 10%, #ffe 30%, var(--gold) 60%, var(--solid-gold) 100%);
            border-radius: 50%;
            opacity: 0; transition: opacity 2s;
            filter: blur(2px);
            box-shadow: 0 0 40px var(--gold), 0 0 80px var(--solid-gold), 0 0 120px #fff;
            animation: immortal-breathe 8s infinite alternate ease-in-out;
        }
        @keyframes immortal-breathe {
            0% { transform: scale(1); box-shadow: 0 0 40px var(--gold), 0 0 80px var(--solid-gold), 0 0 120px #fff; }
            100% { transform: scale(1.3); box-shadow: 0 0 70px var(--gold), 0 0 140px var(--solid-gold), 0 0 200px #fff, 0 0 300px rgba(255,255,255,0.5); }
        }

        #profound-text { margin-top: 100px; color: var(--gold); font-size: 1.35rem; letter-spacing: 12px; opacity: 0; transition: opacity 4s; text-shadow: 0 0 20px var(--solid-gold), 0 0 40px #fff; text-align: center; line-height: 2.8; font-weight: bold; z-index: 100; }
    </style>
</head>
<body>
    
    <div id="page-curtain" style="position:fixed; inset:0; background:#000; z-index: 9999999; pointer-events: none; transition: opacity 0.8s; opacity: 1;"></div>

    <div id="back-btn" class="top-nav-btn" onclick="navigateTo('index.html?screen=3')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
         Pure Land System
    </div>

    <div id="wheel-nav-btn" class="top-nav-btn" onclick="navigateTo('wheel.html')">
        Dharma Wheel
        <svg class="mini-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="wheel-gold" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f3e5ab"/><stop offset="100%" stop-color="#d4af37"/>
                </linearGradient>
            </defs>
            <circle cx="12" cy="12" r="10" fill="none" stroke="url(#wheel-gold)" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="8.5" fill="none" stroke="url(#wheel-gold)" stroke-width="0.5" stroke-dasharray="1 2"/>
            <g stroke="url(#wheel-gold)" stroke-width="1.5" stroke-linecap="round">
                <line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/><line x1="4.93" y1="19.07" x2="19.07" y2="4.93"/>
            </g>
            <circle cx="12" cy="12" r="2.5" fill="#020202" stroke="url(#wheel-gold)" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="1" fill="#f3e5ab"/>
        </svg>
    </div>

    <canvas id="starCanvas"></canvas>

    <div id="mandala-container">
        </div>

    <div id="golden-flash"></div>
    
    <div id="immortal-scene">
        <div id="immortal-seed"></div>
        <div id="profound-text">菩提之心 ． 歷劫不滅<br>一真法界 ． 本自如如</div>
    </div>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        // Z軸星空引擎變數 (來自千佛劫，大幅簡化效能)
        let xjStars = [];
        let warpSpeed = 1.5;       // 當前速度
        let targetWarpSpeed = 1.5; // 目標速度 (平滑加速減速)
        const FOV = 400;

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
        }
        window.addEventListener('resize', resize); resize();

        function initEngines() {
            // 1. 初始化星空
            xjStars = [];
            for (let i = 0; i < 600; i++) {
                xjStars.push({
                    x: (Math.random() - 0.5) * 3000,
                    y: (Math.random() - 0.5) * 3000,
                    z: Math.random() * 2000,
                    speed: Math.random() * 5 + 2,
                    color: Math.random() > 0.5 ? '#8ba89c' : '#f3e5ab'
                });
            }
        }

        function drawRealm() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; // 深邃背景拖影
            ctx.fillRect(0, 0, width, height);

            // ✨ Z軸加速邏輯 ✨
            warpSpeed += (targetWarpSpeed - warpSpeed) * 0.05; // 平滑過渡

            ctx.globalCompositeOperation = 'screen';
            xjStars.forEach(star => {
                let starSpeed = star.speed * (warpSpeed / 1.5);
                star.z -= starSpeed;
                if (star.z <= 0) { star.z = 2000; star.x = (Math.random() - 0.5) * 3000; star.y = (Math.random() - 0.5) * 3000; }
                let sc = FOV / (FOV + star.z); let sx = (width/2) + star.x * sc; let sy = (height/2) + star.y * sc;
                let alpha = Math.min(1, sc * 2);
                
                // 畫星星
                ctx.beginPath();
                if (warpSpeed > 5) {
                    // 極速時拉出拉線效果 (Warp Speed)
                    ctx.moveTo(sx, sy);
                    let tailSc = FOV / (FOV + star.z + starSpeed * 2);
                    let tailX = (width/2) + star.x * tailSc;
                    let tailY = (height/2) + star.y * tailSc;
                    ctx.lineTo(tailX, tailY);
                    ctx.strokeStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '139,168,156'}, ${alpha})`;
                    ctx.lineWidth = Math.max(0.5, 3 * sc * sc); // 越遠線越細
                    ctx.stroke();
                } else {
                    // 平常時是點
                    ctx.arc(sx, sy, Math.max(0.1, 2.5 * sc), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '139,168,156'}, ${alpha})`; ctx.fill();
                }
            });
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(drawRealm);
        }

        // ==========================================
        // ✨ 終極圓滿引擎 ✨
        // ==========================================
        async function runZenEngine() {
            initEngines();
            drawRealm();

            // 換頁黑幕褪去
            await sleep(100);
            document.getElementById('page-curtain').style.opacity = '0';

            const mandala = document.getElementById('mandala-container');
            await createMandalaRings(mandala);

            // 💡 1. Affirmation: 「1」的菩提心種子浮現，幾何世界「住」 💡
            await sleep(1500); 
            mandala.style.opacity = '1';
            mandala.style.transform = 'scale(1) rotate(45deg)'; // 緩緩展開並旋轉

            // 讓行者在 Z軸星空中感受華藏世界 10 秒
            await sleep(10000); 

            // 💡 2. Dissolution: 極速全黑幕 + 萬法唯心坍縮 (壞) 💡
            // ✨ 千佛劫的加速感：星空迎面衝來，速度瞬間調高 ✨
            targetWarpSpeed = 100;

            // ✨ 幾何坍縮：拋棄生硬的 driftDown，改用 scale 吸入黑洞 (image_0.png意境) ✨
            mandala.classList.add('implode'); // 劇烈旋轉、縮小

            // 讓星空加速與華嚴坍縮進行 2.5 秒
            await sleep(2500);

            // 💡 3. The 0 Flash: 當坍縮至寂滅的一剎那，爆發滿版白金「常寂光」 💡
            // 使用 radial-gradient 閃光，模仿 image_0.png 
            const flash = document.getElementById('golden-flash');
            flash.style.opacity = '1'; // 爆發
            await sleep(300); // 強光停留

            // 💡 趁畫面被極光覆蓋，淨空所有幾何抽象層，完全停止時間 (0) 💡
            targetWarpSpeed = 0; // Z軸星空引擎完全停止，呈現絕對的寂靜
            mandala.innerHTML = ''; // 徹底移除

            // 💡 極光褪去，露出「絕對純黑」的虛空 (0) 💡
            flash.style.transition = 'opacity 5s ease-in';
            flash.style.opacity = '0';
            await sleep(4000); 

            // 💡 4. Rebirth: 在純黑虛空中，唯一的純金「菩提明點」重生 (0+1) 💡
            const immortalSeed = document.getElementById('immortal-seed');
            immortalSeed.style.opacity = '1'; // 菩提之心不滅

            // 文字浮現
            await sleep(2500);
            document.getElementById('profound-text').style.opacity = '1'; 

            // 停留 9 秒讓行者感受
            await sleep(9000); 
            
            console.log("一真法界圓滿，自動歸向彌陀淨土");
            navigateTo('index.html?screen=3'); 
        }

        // 簡化曼陀羅生成函數
        async function createMandalaRings(container) {
            const sizes = [150, 300, 450, 600]; 
            const colors = ['rgba(139,168,156,0.3)', 'rgba(212,175,55,0.4)', 'rgba(255,255,255,0.2)', 'rgba(212,175,55,0.6)'];
            for(let i=0; i<4; i++) {
                let ring = document.createElement('div');
                ring.className = 'mandala-ring ring-spin';
                ring.style.width = `${sizes[i]}px`; ring.style.height = `${sizes[i]}px`;
                ring.style.borderColor = colors[i];
                ring.style.boxShadow = `0 0 10px ${colors[i]}, inset 0 0 5px ${colors[i]}`;
                container.appendChild(ring);
            }
        }

        function navigateTo(url) {
            document.getElementById('page-curtain').style.opacity = '1';
            setTimeout(() => { window.location.href = url; }, 800);
        }

        window.addEventListener('load', runZenEngine);

        // 防凍結：破除手機滑動返回的黑屏
        window.addEventListener('pageshow', (e) => {
            if (e.persisted) {
                document.getElementById('page-curtain').style.opacity = '0';
            }
        });
    </script>
</body>
</html>
