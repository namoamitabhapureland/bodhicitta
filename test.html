<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>法華密碼 ． 一佛乘寶塔</title>
    <style>
        :root {
            --bg-deep: #010103;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --fire-red: #8b3a3a;
            --text-main: #d0d0d0;
        }
        body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; user-select: none;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* ================= 頂部導航 ================= */
        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            color: var(--gold); text-decoration: none; font-size: 0.95rem; font-weight: bold;
            display: flex; align-items: center; gap: 8px; letter-spacing: 1px; cursor: pointer;
            text-shadow: 0 0 8px rgba(212,175,55,0.5); background: rgba(0,0,0,0.5); 
            padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3);
            backdrop-filter: blur(5px); transition: all 0.3s;
        }
        .back-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.2); }

        /* ================= 3D 畫布 ================= */
        .matrix-section { position: absolute; inset: 0; background: #000; overflow: hidden; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
        
        .dharmadhatu-light {
            position: absolute; inset: 0; 
            background: radial-gradient(circle at 50% 50%, rgba(139,58,58,0.05) 0%, transparent 70%);
            animation: breath 6s infinite alternate ease-in-out; pointer-events: none; transition: background 3s ease; z-index: 0;
        }
        @keyframes breath { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        /* ================= UI 浮層 ================= */
        .ui-layer { position: absolute; bottom: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; gap: 15px; transition: opacity 1s;}
        
        .switch-btn {
            background: linear-gradient(135deg, rgba(20,10,10,0.9), rgba(10,5,5,0.95)); 
            border: 1px solid rgba(212,175,55,0.4); color: var(--gold);
            padding: 16px 35px; border-radius: 30px; font-size: 1.05rem; font-weight: bold; letter-spacing: 3px;
            cursor: pointer; backdrop-filter: blur(10px); transition: all 0.5s; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(212,175,55,0.1);
        }
        .switch-btn:active { transform: scale(0.96); box-shadow: 0 0 30px rgba(212,175,55,0.6); }

        #status-panel {
            position: absolute; top: 70px; left: 5%; width: 90%; max-width: 320px;
            background: rgba(10,5,5,0.8); backdrop-filter: blur(12px);
            border-left: 3px solid var(--fire-red); padding: 15px; z-index: 10; transition: 1.5s; pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 0 10px 10px 0;
        }
        .status-title { font-size: 1.1rem; font-weight: bold; color: var(--gold); letter-spacing: 2px; margin-bottom: 5px; transition: 1.5s; }
        .status-desc { font-size: 0.8rem; color: #aaa; line-height: 1.6; transition: 1.5s; }

        /* ================= 法華玄義浮層 ================= */
        #fahua-overlay {
            position: absolute; top: 20%; width: 100%; display: flex; flex-direction: column; align-items: center;
            z-index: 60; opacity: 0; pointer-events: none; transition: opacity 3s ease-in;
        }
        .fahua-text {
            color: var(--gold); font-size: 1.05rem; letter-spacing: 4px; line-height: 2.2; text-align: center;
            text-shadow: 0 0 15px rgba(212,175,55,0.6); font-weight: bold;
        }
        .soft-cyan { color: var(--cyan); }
    </style>
</head>
<body>

    <div class="back-btn" onclick="window.location.href='index.html?screen=3'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        回道場
    </div>

    <section class="matrix-section">
        <div class="dharmadhatu-light" id="bg-light"></div>
        
        <div id="status-panel">
            <div class="status-title" id="s-title">三界火宅 ． 幻化之城</div>
            <div class="status-desc" id="s-desc">
                迷途：為求自了，安於化城。<br>實相：生死雖斷，佛道未成。<br>目標：未發大心，不見寶所。
            </div>
        </div>

        <canvas id="matrixCanvas"></canvas>

        <div id="fahua-overlay">
            <div class="fahua-text">
                十方佛土中，<span class="soft-cyan">唯有一乘法</span>。<br>
                無二亦無三，除佛方便說。<br>
                極樂之金身，十方之來去，<br>
                皆是為載汝，駛向此<span class="soft-cyan">成佛之寶所</span>。
            </div>
        </div>

        <div class="ui-layer" id="ui-layer">
            <button class="switch-btn" onclick="triggerStupa()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 22 20 2 20"></polygon><circle cx="12" cy="14" r="3"></circle></svg>
                迴小向大 ． 發無上菩提心
            </button>
            <div style="color:rgba(212,175,55,0.5); font-size:0.75rem; letter-spacing:3px; margin-top:5px;" id="drag-hint">360° 觀測三界幻象</div>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let fireDust = [], stupaParticles = [];
        
        let rotX = -0.1; let rotY = 0; 
        let isDragging = false; let startX, startY;
        let vX = 0, vY = 0; 

        let state = 0; // 0: 火宅, 1: 寶塔湧現
        let tStupa = 0; // 寶塔拔地而起的變數 (0 到 1)
        let stupaYOffset = 300; // 初始隱藏於地下

        // 偽光暈
        const glowCanvas = document.createElement('canvas');
        glowCanvas.width = glowCanvas.height = 32;
        const gCtx = glowCanvas.getContext('2d');
        const gGrad = gCtx.createRadialGradient(16, 16, 0, 16, 16, 16);
        gGrad.addColorStop(0, 'rgba(255,255,255,1)');
        gGrad.addColorStop(0.2, 'rgba(212,175,55,0.7)');
        gGrad.addColorStop(1, 'rgba(212,175,55,0)');
        gCtx.fillStyle = gGrad; gCtx.fillRect(0,0,32,32);

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        function generateTopology() {
            fireDust = []; stupaParticles = [];
            function addPt(arr, x, y, z, c, s, glow) { arr.push({x, y, z, c, s, glow, originalY: y}); }

            // 1. 三界火宅混沌塵埃 (State 0)
            for(let i=0; i<300; i++) { 
                fireDust.push({
                    x: (Math.random()-0.5)*400, y: (Math.random()-0.5)*400, z: (Math.random()-0.5)*400,
                    vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5, vz: (Math.random()-0.5)*0.5,
                    life: Math.random()
                });
            }

            // 2. 多寶塔幾何 (State 1)
            // 塔基 (大地)
            for(let a=0; a<Math.PI*2; a+=0.1) { addPt(stupaParticles, 120*Math.cos(a), 100, 120*Math.sin(a), 'rgba(139,168,156,0.6)', 1.5, false); }
            
            // 七重寶塔
            const tiers = 7;
            for(let i=0; i<tiers; i++) {
                let y = 80 - i*25;
                let r = 90 - i*10;
                // 每一層的八角簷
                for(let a=0; a<Math.PI*2; a+=Math.PI/4) {
                    // 連接上下層
                    for(let t=0; t<=1; t+=0.1) { addPt(stupaParticles, r*Math.cos(a)*t, y, r*Math.sin(a)*t, 'rgba(212,175,55,0.8)', 1, false); }
                    // 簷角懸掛寶珠
                    addPt(stupaParticles, (r+5)*Math.cos(a), y+5, (r+5)*Math.sin(a), 'rgba(243,229,171,1)', 2, true);
                }
                // 層的圓環
                for(let a=0; a<Math.PI*2; a+=0.15) { addPt(stupaParticles, r*Math.cos(a), y, r*Math.sin(a), 'rgba(212,175,55,0.6)', 1.2, false); }
            }

            // 塔頂相輪 (Spire)
            for(let y=-90; y>=-170; y-=8) {
                let r = (y < -150) ? 2 : 12 + (y+170)*0.1;
                for(let a=0; a<Math.PI*2; a+=0.5) { addPt(stupaParticles, r*Math.cos(a), y, r*Math.sin(a), 'rgba(243,229,171,0.9)', 1.5, true); }
            }

            // 核心：二佛並坐 (極亮光團)
            for(let i=0; i<80; i++) {
                let theta = Math.random()*Math.PI*2; let phi = Math.acos(Math.random()*2-1); let r = Math.random()*15;
                addPt(stupaParticles, -10+r*Math.sin(phi)*Math.cos(theta), 60+r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta), 'rgba(255,255,255,1)', 2, true); // 釋迦佛
                addPt(stupaParticles, 10+r*Math.sin(phi)*Math.cos(theta), 60+r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta), 'rgba(255,255,255,1)', 2, true);  // 多寶佛
            }
        }

        function render() {
            ctx.clearRect(0, 0, width, height); 
            ctx.globalCompositeOperation = 'screen';
            
            if(!isDragging) { rotY -= 0.003; rotX += vY; rotY += vX; vX *= 0.95; vY *= 0.95; }
            if (rotX > 1.0) rotX = 1.0; if (rotX < -0.5) rotX = -0.5;

            const cx=width/2, cy=height/2+30, fov=350, sinX=Math.sin(rotX), cosX=Math.cos(rotX), sinY=Math.sin(rotY), cosY=Math.cos(rotY);
            let proj = [];

            function project(p, c, s, glow) {
                let x1=p.x*cosY-p.z*sinY, z1=p.z*cosY+p.x*sinY, y2=p.y*cosX-z1*sinX, z2=z1*cosX+p.y*sinX;
                if(z2 < -fov+10) return null; let scale=fov/(fov+z2);
                return {px:cx+x1*scale, py:cy+y2*scale, z:z2, sc:scale, c:c, s:s, glow:glow};
            }

            // 火宅狀態 (State 0)
            if (state === 0) {
                fireDust.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.z += p.vz;
                    if(Math.abs(p.x)>200) p.vx*=-1; if(Math.abs(p.y)>200) p.vy*=-1; if(Math.abs(p.z)>200) p.vz*=-1;
                    p.life += 0.02; let alpha = (Math.sin(p.life)+1)/2 * 0.6;
                    let pr = project(p, `rgba(139,58,58,${alpha})`, 2.5, false);
                    if(pr) proj.push(pr);
                });
            }

            // 寶塔湧現狀態 (State 1)
            if (state === 1) {
                tStupa += (1 - tStupa) * 0.015; // 緩慢湧現
                stupaYOffset += (0 - stupaYOffset) * 0.02; // 從 300 升到 0

                stupaParticles.forEach(p => {
                    // Y軸加上 Offset，產生從地底升起的感覺
                    let currentY = p.originalY + stupaYOffset;
                    let pr = project({x:p.x, y:currentY, z:p.z}, p.c, p.s, p.glow);
                    if(pr) proj.push(pr);
                });
            }

            proj.sort((a,b) => b.z-a.z);
            
            proj.forEach(p => {
                let dS = p.s*p.sc; if(dS<0.1) return;
                if (p.glow) { ctx.drawImage(glowCanvas, p.px - dS*5, p.py - dS*5, dS*10, dS*10); }
                ctx.beginPath(); ctx.arc(p.px, p.py, dS, 0, Math.PI*2); ctx.fillStyle=p.c; ctx.fill();
            });

            requestAnimationFrame(render);
        }

        // 觸發寶塔湧現
        function triggerStupa() {
            document.getElementById('ui-layer').style.opacity = '0';
            setTimeout(() => document.getElementById('ui-layer').style.display = 'none', 1000);
            
            document.getElementById('bg-light').style.background = 'radial-gradient(circle at 50% 50%, rgba(212,175,55,0.08) 0%, transparent 80%)';
            
            document.getElementById('status-panel').style.borderLeftColor = 'var(--solid-gold)';
            document.getElementById('s-title').style.color = 'var(--gold)';
            document.getElementById('s-title').innerText = "一佛乘 ． 多寶塔現";
            document.getElementById('s-desc').innerHTML = "開權顯實，萬法歸一。<br>不求自了，唯願無盡眾生同登覺岸。";

            state = 1; // 啟動拔地而起

            // 湧現後，顯示法華玄義
            setTimeout(() => {
                document.getElementById('fahua-overlay').style.opacity = '1';
            }, 3500);
        }

        // 360 滑動
        canvas.addEventListener('pointerdown', (e) => { isDragging = true; startX = e.clientX || e.touches[0].clientX; startY = e.clientY || e.touches[0].clientY; vX = 0; vY = 0; });
        canvas.addEventListener('pointermove', (e) => { 
            if (!isDragging) return; 
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0); let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            let dx = x - startX; let dy = y - startY;
            rotY -= dx * 0.008; rotX -= dy * 0.008;
            vX = -dx * 0.0005; vY = -dy * 0.0005; startX = x; startY = y;
        });
        canvas.addEventListener('pointerup', () => isDragging = false); canvas.addEventListener('pointercancel', () => isDragging = false);

        generateTopology(); render();
    </script>
</body>
</html>
