<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>菩提幾何 ． 千葉蓮花預演</title>
    <style>
        body { margin: 0; background: #050505; color: #f3e5ab; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; perspective: 1200px; display: flex; justify-content: center; align-items: center; }
        .world { transform-style: preserve-3d; }
        /* 瓣片：Roblox風格的幾何長方體 */
        .petal { 
            position: absolute; width: 12px; height: 60px; 
            background: rgba(212, 175, 55, 0.4);
            border: 1px solid rgba(243, 229, 171, 0.6);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2), 0 0 15px rgba(212, 175, 55, 0.3);
            transform-origin: bottom center;
            border-radius: 2px;
        }
        /* 核心種子 */
        .core {
            position: absolute; width: 20px; height: 20px; background: #fff;
            border-radius: 50%; box-shadow: 0 0 50px #f3e5ab, 0 0 100px #fff;
            transform: translate3d(-10px, -10px, 0);
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="world" id="world">
            <div class="core"></div>
        </div>
    </div>

    <script>
        const world = document.getElementById('world');
        const layers = [12, 18, 24, 24, 30]; // 五層花瓣，共108片
        let petalIndex = 0;

        layers.forEach((count, layerIndex) => {
            const radius = (layerIndex + 1) * 25; // 每層半徑
            const tilt = 90 - (layerIndex * 20); // 每層傾斜角度，越外層越平

            for (let i = 0; i < count; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                const angle = (i / count) * 360;
                
                // 3D 變換：旋轉到對應角度，再向外平移，最後做瓣片的傾斜
                petal.style.transform = `
                    rotateY(${angle}deg) 
                    translateZ(${radius}px) 
                    rotateX(${tilt}deg)
                `;
                
                // 為了美感，給瓣片一點漸層光
                petal.style.background = `linear-gradient(to top, rgba(212,175,55,0.8), rgba(243,229,171,0.2))`;
                
                world.appendChild(petal);
            }
        });

        // 簡單旋轉邏輯
        let ry = 0;
        function frame() {
            ry += 0.3;
            world.style.transform = `rotateX(-25deg) rotateY(${ry}deg)`;
            requestAnimationFrame(frame);
        }
        frame();
    </script>
</body>
</html>
