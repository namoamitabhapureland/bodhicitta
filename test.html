<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>因果圓滿 ． 星辰覺醒</title>
    <style>
        body { margin: 0; background: #010102; overflow: hidden; font-family: "PingFang TC", serif; touch-action: none; user-select: none; }
        canvas { width: 100vw; height: 100vh; display: block; position: absolute; z-index: 1; transition: filter 0.5s ease; }
        
        .charging canvas { filter: brightness(0.5) blur(1px); }

        #vow-display {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; text-align: center; z-index: 10; pointer-events: none;
            color: #f3e5ab; font-size: 1.6rem; letter-spacing: 12px; font-weight: 300;
            text-shadow: 0 0 20px rgba(243, 229, 171, 0.8), 0 0 40px #fff;
            opacity: 0; transition: opacity 0.3s;
        }
        .charging #vow-display { opacity: 1; }

        #flash { position: absolute; inset: 0; background: #fff; z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.5s ease-out; }
        #hint { position: absolute; bottom: 40px; width: 100%; text-align: center; color: rgba(243, 229, 171, 0.5); font-size: 0.85rem; letter-spacing: 6px; z-index: 5; transition: opacity 0.5s; pointer-events: none; }
        
        /* 右下角進度顯示 */
        #progress { position: absolute; top: 30px; right: 30px; color: #8ba89c; font-size: 0.9rem; letter-spacing: 4px; z-index: 10; opacity: 0.8; }
    </style>
</head>
<body id="body-state">

    <canvas id="mainCanvas"></canvas>
    <div id="vow-display">眾生無邊誓願度</div>
    <div id="flash"></div>
    <div id="hint">長按金心 ． 匯聚願力</div>
    <div id="progress">覺醒 0 / 108</div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const bodyState = document.getElementById('body-state');
        const vowDisplay = document.getElementById('vow-display');
        const hint = document.getElementById('hint');
        const flash = document.getElementById('flash');
        const progressTxt = document.getElementById('progress');
        
        const vows = ["眾生無邊誓願度", "煩惱無盡誓願斷", "法門無量誓願學", "佛道無上誓願成"];
        // 覺醒後的琉璃色彩 (金、青、紅、白)
        const awakeColors = ['#d4af37', '#8ba89c', '#c2185b', '#e0f7fa']; 
        
        let w, h, time = 0;
        let stars = [];
        let isPressing = false;
        let chargeLevel = 0;
        let litCount = 0;
        
        // 流星動畫參數
        let shooting = false;
        let targetStar = null;
        let beamProgress = 0;

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            // 初始化 108 顆星球 (預設為暗色磨砂態)
            stars = Array.from({length: 108}, () => ({
                x: (Math.random() - 0.5) * 2000, 
                y: (Math.random() - 0.5) * 2000, 
                z: Math.random() * 2000,
                isLit: false,
                color: 'rgba(100, 100, 110, 0.3)', // 黯淡無光
                size: Math.random() * 1.5 + 1
            }));
        }

        function draw() {
            ctx.fillStyle = '#010102'; ctx.fillRect(0, 0, w, h);
            time += 0.05;

            // 星空流動
            let speed = isPressing ? 0.1 : (shooting ? 0 : 1.5);
            stars.forEach(s => {
                s.z -= speed; if (s.z <= 0) s.z = 2000;
                const scale = 400 / (400 + s.z);
                const x2d = w/2 + s.x * scale;
                const y2d = h/2 + s.y * scale;
                
                ctx.globalAlpha = Math.min(1, (2000 - s.z) / 1500);
                ctx.beginPath(); ctx.arc(x2d, y2d, s.size * scale * (s.isLit ? 2 : 1), 0, Math.PI * 2);
                
                if (s.isLit) {
                    // 已點亮的恆星：有光暈、色彩飽滿
                    ctx.fillStyle = s.color;
                    ctx.shadowBlur = 15 * scale; ctx.shadowColor = s.color;
                    ctx.fill(); ctx.shadowBlur = 0;
                } else {
                    // 未點亮的暗星：灰暗磨砂
                    ctx.fillStyle = s.color; ctx.fill();
                }
            });

            // 繪製發射中的流星光束
            if (shooting && targetStar) {
                const scale = 400 / (400 + targetStar.z);
                const targetX = w/2 + targetStar.x * scale;
                const targetY = h/2 + targetStar.y * scale;
                
                beamProgress += 0.08; // 光束速度
                const currentX = w/2 + (targetX - w/2) * beamProgress;
                const currentY = h/2 + (targetY - h/2) * beamProgress;

                ctx.beginPath();
                ctx.moveTo(w/2, h/2 + 30);
                ctx.lineTo(currentX, currentY);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; 
                ctx.shadowBlur = 20; ctx.shadowColor = '#f3e5ab';
                ctx.stroke(); ctx.shadowBlur = 0;

                // 擊中判定
                if (beamProgress >= 1) {
                    shooting = false;
                    targetStar.isLit = true;
                    // 隨機賦予高貴的琉璃色彩
                    targetStar.color = awakeColors[Math.floor(Math.random() * awakeColors.length)];
                    litCount++;
                    progressTxt.innerText = `覺醒 ${litCount} / 108`;
                    
                    // 擊中瞬間的法界閃爍
                    flash.style.opacity = 0.8;
                    setTimeout(() => { flash.style.opacity = 0; }, 300);
                    hint.innerText = "星辰覺醒 ． 功德增明";
                    hint.style.opacity = 0.5;
                }
            }

            // 中心菩提心 (集氣放大)
            if (!shooting) {
                ctx.globalAlpha = 1;
                let basePulse = isPressing ? 0 : Math.sin(time * 0.5) * 5;
                let currentRadius = 45 + basePulse + (chargeLevel * 1.5); 
                
                const grad = ctx.createRadialGradient(w/2, h/2 + 30, 0, w/2, h/2 + 30, currentRadius + 10);
                grad.addColorStop(0, `rgba(243, 229, 171, ${0.8 + (chargeLevel/200)})`);
                grad.addColorStop(1, 'rgba(212, 175, 55, 0)');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(w/2, h/2 + 30, currentRadius + 15, 0, Math.PI * 2); ctx.fill();

                ctx.beginPath(); ctx.arc(w/2, h/2 + 30, 8 + (chargeLevel * 0.3), 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 15 + (chargeLevel*0.5); ctx.shadowColor = '#f3e5ab'; ctx.fill(); ctx.shadowBlur = 0;
            }

            requestAnimationFrame(draw);
        }

        // 集氣引擎
        setInterval(() => {
            if (isPressing) {
                chargeLevel += 1;
                if (chargeLevel > 100) chargeLevel = 100;
                let stage = Math.floor((chargeLevel / 100) * 4);
                if (stage > 3) stage = 3;
                
                if (vowDisplay.innerText !== vows[stage]) {
                    vowDisplay.style.opacity = 0;
                    setTimeout(() => {
                        vowDisplay.innerText = vows[stage];
                        vowDisplay.style.opacity = 1;
                        vowDisplay.style.fontSize = `${1.6 + (stage * 0.1)}rem`; 
                    }, 50);
                }
            } else {
                chargeLevel *= 0.8;
                if (chargeLevel < 1) chargeLevel = 0;
            }
        }, 30);

        function handleDown(e) {
            e.preventDefault();
            if (shooting) return; // 正在發射時不可按
            isPressing = true; bodyState.className = 'charging'; hint.style.opacity = 0;
        }

        function handleUp(e) {
            e.preventDefault();
            if (!isPressing) return;
            isPressing = false; bodyState.className = '';
            
            if (chargeLevel >= 95) {
                // 集氣滿圓！尋找一顆未點亮的星
                vowDisplay.style.opacity = 0;
                let unlitStars = stars.filter(s => !s.isLit);
                
                if (unlitStars.length > 0) {
                    targetStar = unlitStars[Math.floor(Math.random() * unlitStars.length)];
                    shooting = true;
                    beamProgress = 0;
                    chargeLevel = 0;
                } else {
                    hint.innerText = "108 圓滿 ． 華嚴現前";
                    hint.style.opacity = 0.5;
                }
            } else {
                hint.style.opacity = 0.5;
            }
        }

        window.addEventListener('mousedown', handleDown); window.addEventListener('mouseup', handleUp);
        window.addEventListener('touchstart', handleDown, {passive: false}); window.addEventListener('touchend', handleUp, {passive: false});
        window.addEventListener('resize', init);
        
        init(); draw();
    </script>
</body>
</html>
