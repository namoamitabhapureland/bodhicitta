<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>唯識金剛載體 ． 圓融美學驗收</title>
    <style>
        :root { --bg-deep: #020205; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; }
        body { margin: 0; background: var(--bg-deep); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; perspective: 1200px; touch-action: none; }
        #matrix-hub { position: relative; width: 0; height: 0; transform-style: preserve-3d; transform: rotateX(-15deg) rotateY(0deg); will-change: transform; }
        .alaya-orbit { position: absolute; top: -200px; left: -200px; width: 400px; height: 400px; border-radius: 50%; border: 1px dashed rgba(139,168,156,0.2); transform-style: preserve-3d; pointer-events: none; }
        .manas-orbit { position: absolute; top: -120px; left: -120px; width: 240px; height: 240px; border-radius: 50%; border: 1.5px solid rgba(212,175,55,0.3); box-shadow: inset 0 0 20px rgba(212,175,55,0.05); transform-style: preserve-3d; pointer-events: none; }
        #hologram-avatar { position: absolute; top: -100px; left: -75px; width: 150px; height: 180px; transform-style: preserve-3d; animation: float 4s infinite alternate ease-in-out; }
        @keyframes float { 0% { transform: translateY(-5px); } 100% { transform: translateY(5px); } }
        .avatar-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
        .layer-back { transform: translateZ(-15px); opacity: 0.2; filter: drop-shadow(0 0 5px var(--cyan)); }
        .layer-mid { transform: translateZ(0px); opacity: 0.7; filter: drop-shadow(0 0 10px var(--solid-gold)); }
        .layer-front { transform: translateZ(15px); opacity: 0.4; filter: drop-shadow(0 0 8px #fff); }
        .base-ring { position: absolute; top: 85px; left: -90px; width: 180px; height: 180px; border-radius: 50%; border: 1px solid rgba(243,229,171,0.3); transform: rotateX(90deg) translateZ(0px); box-shadow: 0 0 30px rgba(212,175,55,0.1) inset; }
    </style>
</head>
<body>
    <div id="matrix-hub">
        <div class="base-ring"></div>
        <div class="alaya-orbit" style="transform: rotateY(0deg);"></div>
        <div class="alaya-orbit" style="transform: rotateY(60deg);"></div>
        <div class="alaya-orbit" style="transform: rotateY(120deg);"></div>
        <div class="alaya-orbit" style="transform: rotateX(90deg);"></div>
        <div class="manas-orbit" style="transform: rotateY(45deg);"></div>
        <div class="manas-orbit" style="transform: rotateY(135deg);"></div>
        <div class="manas-orbit" style="transform: rotateX(90deg);"></div>
        <div id="hologram-avatar">
            <svg class="avatar-layer layer-back" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <use href="#avatar-path" stroke="var(--cyan)" fill="none" stroke-width="0.8"/>
            </svg>
            <svg class="avatar-layer layer-mid" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <g id="avatar-path">
                        <ellipse cx="50" cy="18" rx="12" ry="15" />
                        <path d="M50,33 C52,50 48,70 50,110" />
                        <path d="M50,33 C60,33 70,40 70,55 C70,70 65,85 50,90 C35,85 30,70 30,55 C30,40 40,33 50,33 Z" />
                        <path d="M30,55 C20,80 30,100 50,105 C70,100 80,80 70,55" />
                        <line x1="40" y1="100" x2="60" y2="100" stroke-width="0.8" opacity="0.5"/>
                        <path d="M50,90 C20,95 5,110 50,115 C95,110 80,95 50,90 Z" />
                        <path d="M20,100 Q 50,108 80,100" />
                    </g>
                </defs>
                <use href="#avatar-path" stroke="var(--gold)" fill="none" stroke-width="1.2"/>
            </svg>
            <svg class="avatar-layer layer-front" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <use href="#avatar-path" stroke="#fff" fill="none" stroke-width="0.5" stroke-dasharray="2 4"/>
                <circle cx="50" cy="65" r="2.5" fill="#fff" filter="drop-shadow(0 0 4px var(--solid-gold))"/>
            </svg>
        </div>
    </div>
    <script>
        let hub = document.getElementById('matrix-hub'); let isDragging = false, startX, startY; let rotX = -15, rotY = 0;
        function autoRotate() { if(!isDragging) { rotY -= 0.1; hub.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`; } requestAnimationFrame(autoRotate); } autoRotate();
        document.addEventListener('pointerdown', (e) => { isDragging = true; startX = e.clientX || e.touches[0].clientX; startY = e.clientY || e.touches[0].clientY; });
        document.addEventListener('pointermove', (e) => { if (!isDragging) return; let x = e.clientX || (e.touches ? e.touches[0].clientX : 0); let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            let deltaX = x - startX; let deltaY = y - startY; rotY += deltaX * 0.4; rotX -= deltaY * 0.4; if (rotX > 75) rotX = 75; if (rotX < -75) rotX = -75;
            hub.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`; startX = x; startY = y; });
        document.addEventListener('pointerup', () => isDragging = false); document.addEventListener('pointercancel', () => isDragging = false);
    </script>
</body>
</html>
