<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>菩提星系 ． 清淨時空</title>
    <style>
        body { margin: 0; background: #010102; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <canvas id="starCanvas"></canvas>
    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        const stars = [];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars.length = 0;
            for (let i = 0; i < 108; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * 2000,
                    y: (Math.random() - 0.5) * 2000,
                    z: Math.random() * 2000,
                    size: 1.5,
                    color: i % 3 === 0 ? '#f3e5ab' : (i % 3 === 1 ? '#8ba89c' : '#d4af37')
                });
            }
        }

        function draw() {
            // 維持背景深邃，不產生殘影疊加導致的反白
            ctx.fillStyle = '#010102';
            ctx.fillRect(0, 0, w, h);

            const fov = 400; // 視角焦距

            stars.forEach(s => {
                s.z -= 2; // 向前飄移的速度
                if (s.z <= 0) s.z = 2000; // 循環回到遠方

                // 3D 投影計算
                const scale = fov / (fov + s.z);
                const x2d = w/2 + s.x * scale;
                const y2d = h/2 + s.y * scale;

                // 根據距離調整透明度與大小，產生深邃感
                const alpha = Math.min(1, (2000 - s.z) / 1500);
                
                ctx.beginPath();
                ctx.arc(x2d, y2d, s.size * scale * 2, 0, Math.PI * 2);
                ctx.fillStyle = s.color;
                ctx.globalAlpha = alpha;
                ctx.fill();
            });
            
            ctx.globalAlpha = 1;
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
