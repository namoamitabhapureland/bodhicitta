<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>唯識矩陣 ． 量子金剛全息身</title>
    <style>
        :root {
            --bg-deep: #020205;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
        }
        body { 
            margin: 0; background: var(--bg-deep); color: #eee; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none; user-select: none;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }
        canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        .dharmadhatu-light {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08) 0%, rgba(139,168,156,0.02) 50%, transparent 80%);
            z-index: 0; animation: breath 10s infinite alternate ease-in-out; pointer-events: none;
        }
        @keyframes breath { 0% { opacity: 0.5; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }
        
        .ui-layer {
            position: absolute; bottom: 8%; z-index: 10; text-align: center; pointer-events: none;
        }
        .guide-text {
            color: rgba(243,229,171,0.8); font-size: 1rem; letter-spacing: 4px; font-weight: bold;
            text-shadow: 0 0 15px rgba(212,175,55,0.6); animation: float-text 3s infinite alternate ease-in-out;
        }
        @keyframes float-text { 0% { transform: translateY(5px); opacity: 0.6;} 100% { transform: translateY(0); opacity: 1;} }
    </style>
</head>
<body>

    <div class="dharmadhatu-light"></div>
    <canvas id="matrixCanvas"></canvas>

    <div class="ui-layer">
        <div class="guide-text">滑動星盤 ． 照見量子金剛身</div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        
        // 3D 空間參數
        let rotX = -0.15; // 初始微俯視
        let rotY = 0;
        let isDragging = false;
        let startX, startY;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 建立 3D 粒子點雲
        function createHologram() {
            particles = [];
            
            function addPoint(x, y, z, color, size, glow) {
                particles.push({x, y, z, c: color, s: size, glow: glow});
            }

            // 1. ✨ 核心載體：量子金剛身 (全跏趺坐) ✨
            const bodyColor = 'rgba(255, 255, 255, 0.7)';
            const bodyGlow = 'rgba(212, 175, 55, 0.4)';

            // A. 頭部 (橢圓球體)
            for (let lat = 0; lat <= Math.PI; lat += 0.25) {
                for (let lon = 0; lon < Math.PI * 2; lon += 0.25) {
                    let rx = 16, ry = 22, rz = 18; // 圓潤的橢圓
                    let x = rx * Math.sin(lat) * Math.cos(lon);
                    let y = -90 + ry * Math.cos(lat);
                    let z = rz * Math.sin(lat) * Math.sin(lon);
                    // 剔除一些點增加空靈感
                    if(Math.random() > 0.3) addPoint(x, y, z, bodyColor, 1.2, bodyGlow);
                }
            }

            // B. 頸部到軀幹 (曲線拓撲)
            for (let y = -65; y <= 25; y += 4) {
                // 模擬肩膀寬度與腰部收束
                let width = 38 - Math.pow((y + 65) * 0.12, 2); 
                if (y > -10) width += (y + 10) * 0.8; // 臀部加寬
                let depth = 15 + (y > 0 ? y * 0.3 : 0);

                for (let lon = 0; lon < Math.PI * 2; lon += 0.3) {
                    let x = width * Math.cos(lon);
                    let z = depth * Math.sin(lon);
                    if(Math.random() > 0.2) addPoint(x, y, z, bodyColor, 1, bodyGlow);
                }
            }

            // C. 雙手 (貝茲流線垂下結印)
            for (let t = 0; t <= 1; t += 0.05) {
                // 左手
                let lx = -35 * (1-t) - 15 * t;
                let ly = -60 * (1-t) + 25 * t;
                let lz = 0 * (1-t) + 30 * t;
                lx -= Math.sin(t * Math.PI) * 18; // 弧線外展
                ly += Math.sin(t * Math.PI) * 10;
                
                // 右手
                let rx = 35 * (1-t) + 15 * t;
                let ry = ly;
                let rz = lz;
                rx += Math.sin(t * Math.PI) * 18;

                // 加粗手臂
                for(let a=0; a<Math.PI*2; a+=1) {
                    addPoint(lx + 5*Math.cos(a), ly, lz + 5*Math.sin(a), bodyColor, 1, bodyGlow);
                    addPoint(rx + 5*Math.cos(a), ry, rz + 5*Math.sin(a), bodyColor, 1, bodyGlow);
                }
            }

            // 中樞明點 (心輪與結印處)
            addPoint(0, -30, 10, '#fff', 4, '#fff'); // 心輪
            addPoint(0, 25, 32, 'var(--solid-gold)', 4, 'var(--gold)'); // 丹田結印

            // D. 雙腿 (全跏趺坐底座立體環)
            for (let lon = 0; lon < Math.PI * 2; lon += 0.1) {
                let x = 45 * Math.cos(lon);
                let y = 35 + 5 * Math.sin(lon * 2); // 腿部高低起伏
                let z = 10 + 35 * Math.sin(lon);
                // 腿部厚度
                for (let rad = 0; rad < Math.PI * 2; rad += 0.6) {
                    let r = 8;
                    addPoint(x + r*Math.cos(rad), y + r*Math.sin(rad), z, bodyColor, 1, bodyGlow);
                }
            }

            // 2. ✨ 第七識：末那識 (我執金環) ✨
            const manasR = 120;
            for(let i=0; i<300; i++) {
                let theta = Math.random() * Math.PI * 2;
                let phi = Math.acos(Math.random() * 2 - 1);
                let x = manasR * Math.sin(phi) * Math.cos(theta);
                let y = -20 + manasR * Math.cos(phi);
                let z = manasR * Math.sin(phi) * Math.sin(theta);
                // 緊密包覆，帶有躁動的錯落感
                addPoint(x, y, z, 'rgba(212,175,55,0.8)', Math.random()*1.5+0.5, 'var(--solid-gold)');
            }

            // 3. ✨ 第八識：阿賴耶識 (雲端巨大矩陣) ✨
            const alayaR = 250;
            for(let i=0; i<800; i++) {
                let theta = Math.random() * Math.PI * 2;
                let phi = Math.acos(Math.random() * 2 - 1);
                let x = alayaR * Math.sin(phi) * Math.cos(theta);
                let y = -20 + alayaR * Math.cos(phi);
                let z = alayaR * Math.sin(phi) * Math.sin(theta);
                addPoint(x, y, z, 'rgba(139,168,156,0.6)', Math.random()*2+0.5, 'var(--cyan)');
                
                // 業力連線 (稀疏的內部神經網)
                if(Math.random() > 0.95) {
                    let innerR = alayaR * Math.random();
                    let ix = innerR * Math.sin(phi) * Math.cos(theta);
                    let iy = -20 + innerR * Math.cos(phi);
                    let iz = innerR * Math.sin(phi) * Math.sin(theta);
                    addPoint(ix, iy, iz, 'rgba(139,168,156,0.3)', 1, 'transparent');
                }
            }
        }

        // 3D 渲染核心
        function render() {
            ctx.clearRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen'; // 產生光的疊加化合效應

            const cx = width / 2;
            const cy = height / 2 + 50;
            const fov = 400; // 攝像機距離

            // 自動緩慢旋轉
            if(!isDragging) { rotY -= 0.005; }

            let sinX = Math.sin(rotX), cosX = Math.cos(rotX);
            let sinY = Math.sin(rotY), cosY = Math.cos(rotY);

            // 深度排序 (畫遠處的點，再畫近處的點)
            let projected = [];

            for(let i = 0; i < particles.length; i++) {
                let p = particles[i];
                
                // Y軸旋轉
                let x1 = p.x * cosY - p.z * sinY;
                let z1 = p.z * cosY + p.x * sinY;
                
                // X軸旋轉
                let y2 = p.y * cosX - z1 * sinX;
                let z2 = z1 * cosX + p.y * sinX;

                // 透視投影
                let scale = fov / (fov + z2);
                let px = cx + x1 * scale;
                let py = cy + y2 * scale;

                projected.push({ x: px, y: py, z: z2, scale: scale, c: p.c, s: p.s, glow: p.glow });
            }

            projected.sort((a, b) => b.z - a.z); // Z軸排序

            for(let i = 0; i < projected.length; i++) {
                let p = projected[i];
                if(p.z < -fov) continue; // 在攝影機後方

                let drawSize = p.s * p.scale;
                if(drawSize < 0.1) continue;

                ctx.beginPath();
                ctx.arc(p.x, p.y, drawSize, 0, Math.PI * 2);
                ctx.fillStyle = p.c;
                
                if(p.glow !== 'transparent') {
                    ctx.shadowBlur = 10 * p.scale;
                    ctx.shadowColor = p.glow;
                } else {
                    ctx.shadowBlur = 0;
                }
                ctx.fill();
            }
            
            ctx.shadowBlur = 0; // 重置
            requestAnimationFrame(render);
        }

        // 互動控制
        document.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX || e.touches[0].clientX;
            startY = e.clientY || e.touches[0].clientY;
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            let deltaX = x - startX; 
            let deltaY = y - startY;

            rotY -= deltaX * 0.01;
            rotX -= deltaY * 0.01;
            if (rotX > 1.2) rotX = 1.2; if (rotX < -1.2) rotX = -1.2; // 限制仰角與俯視

            startX = x; startY = y;
        });

        document.addEventListener('pointerup', () => isDragging = false);
        document.addEventListener('pointercancel', () => isDragging = false);

        createHologram();
        render();
    </script>
</body>
</html>
