<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>小千世界 ． 效能與掉寶優化</title>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #010103; overflow: hidden; font-family: "PingFang TC", "Microsoft JhengHei", serif; touch-action: none; }
        
        #nebula { position: absolute; inset: 0; z-index: 0; background: radial-gradient(circle at 50% 50%, #150d1f 0%, #010103 100%); transition: opacity 1s; }
        canvas { width: 100vw; height: 100vh; display: block; position: absolute; z-index: 1; }
        .charging #nebula { opacity: 0.2; }

        #vow-display { position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%); width: 100%; text-align: center; z-index: 10; pointer-events: none; color: #f3e5ab; font-size: 1.5rem; letter-spacing: 12px; font-weight: 300; text-shadow: 0 0 20px rgba(243, 229, 171, 0.8), 0 0 40px #fff; opacity: 0; transition: opacity 0.3s; }
        .charging #vow-display { opacity: 1; }

        #flash { position: absolute; inset: 0; background: #fff; z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.8s ease-out; }
        
        #progress { position: absolute; top: 30px; right: 30px; color: #8ba89c; font-size: 0.9rem; letter-spacing: 3px; z-index: 10; opacity: 0.8; text-shadow: 0 0 10px rgba(139,168,156,0.5); }
        #hint { position: absolute; bottom: 40px; width: 100%; text-align: center; color: rgba(243, 229, 171, 0.5); font-size: 0.85rem; letter-spacing: 6px; z-index: 5; transition: opacity 0.5s; pointer-events: none; }

        .obs-ui { opacity: 0; pointer-events: none; transition: opacity 1s; z-index: 30; position: absolute; }
        .mode-observation .obs-ui { opacity: 1; pointer-events: auto; }
        #btn-back { top: 30px; left: 30px; padding: 8px 15px; border: 1px solid rgba(243, 229, 171, 0.4); background: rgba(212, 175, 55, 0.1); color: #f3e5ab; border-radius: 20px; font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; backdrop-filter: blur(5px); }
        #btn-treasure { bottom: 40px; right: 30px; width: 50px; height: 50px; background: rgba(212, 175, 55, 0.1); border: 1px solid rgba(243, 229, 171, 0.6); display: flex; justify-content: center; align-items: center; cursor: pointer; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); transition: all 0.3s; }
        #btn-treasure.ping { transform: scale(1.4); background: rgba(243, 229, 171, 0.6); box-shadow: 0 0 30px #d4af37; }

        /* 法寶展示圖層 */
        #treasure-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 90vw; height: 80vh; z-index: 40; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1); }
        #treasure-overlay.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        #treasure-overlay.collecting { transform: translate(calc(50vw - 80px), calc(50vh - 80px)) scale(0.1); opacity: 0; pointer-events: none; }

        #svg-container { width: 100%; height: 35%; display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.4)); animation: float-pulse 4s infinite ease-in-out; }
        @keyframes float-pulse { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); filter: drop-shadow(0 0 30px rgba(243, 229, 171, 0.8)); } }
        #svg-container svg { width: auto; height: 100%; }

        .t-text-group { text-align: center; margin-top: 30px; opacity: 0; transition: opacity 1s 0.5s; flex-shrink: 0; padding: 0 15px; }
        #treasure-overlay.show .t-text-group { opacity: 1; }
        
        .t-name { color: #fff; font-size: 1.2rem; letter-spacing: 4px; text-shadow: 0 0 15px #fff, 0 0 30px #d4af37; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 8px; }
        .t-tag { font-size: 0.75rem; color: #8ba89c; border: 1px solid rgba(139,168,156,0.6); padding: 3px 8px; border-radius: 12px; background: rgba(139, 168, 156, 0.1); text-shadow: none; letter-spacing: 2px; }
        
        .t-desc { color: #f3e5ab; font-size: 0.95rem; letter-spacing: 2px; line-height: 1.8; text-align: justify; text-align-last: center; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        .t-action-hint { margin-top: 30px; font-size: 0.8rem; color: rgba(255,255,255,0.6); letter-spacing: 4px; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    </style>
</head>
<body id="body-state">

    <div id="nebula"></div>
    <canvas id="mainCanvas"></canvas>
    <div id="vow-display">眾生無邊誓願度</div>
    
    <div id="treasure-overlay" onclick="collectTreasure()">
        <div id="svg-container">
            <svg viewBox="0 0 100 150">
                <defs>
                    <linearGradient id="pure-glass" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#fff; stop-opacity:0.9" />
                        <stop offset="50%" style="stop-color:#f3e5ab; stop-opacity:0.6" />
                        <stop offset="100%" style="stop-color:#d4af37; stop-opacity:0.2" />
                    </linearGradient>
                </defs>
                <g>
                    <rect x="49.5" y="10" width="1" height="120" fill="#fff" opacity="0.8" />
                    <path d="M50 10 L60 40 L50 50 L40 40 Z" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.5" />
                    <path d="M50 50 L65 90 L50 100 L35 90 Z" fill="rgba(243, 229, 171, 0.2)" stroke="#f3e5ab" stroke-width="0.4" />
                    <path d="M50 50 L55 92 L50 98 L45 92 Z" fill="rgba(255, 255, 255, 0.5)" stroke="none" />
                    <path d="M25 100 L50 90 L75 100 L50 110 Z" fill="rgba(212, 175, 55, 0.3)" stroke="#f3e5ab" stroke-width="0.6" />
                    <path d="M46 110 L54 110 L52 135 L48 135 Z" fill="rgba(243, 229, 171, 0.2)" stroke="#f3e5ab" stroke-width="0.5" />
                    <polygon points="50,135 55,140 50,145 45,140" fill="url(#pure-glass)" stroke="#f3e5ab" stroke-width="0.5" />
                </g>
            </svg>
        </div>
        <div class="t-text-group">
            <div class="t-name" id="t-name-ui">因緣和合 ． 幾何慧劍現 <span class="t-tag" id="t-tag-ui">【破迷 ‧ 決斷】</span></div>
            <div class="t-desc" id="t-desc-ui">劍氣本空，能斷無明之網...</div>
            <div class="t-action-hint">輕觸畫面 ． 功德歸藏</div>
        </div>
    </div>
    
    <div id="flash"></div>
    <div id="hint">長按發菩提心 ． 迴向法界</div>
    <div id="progress">功德迴向法界 ． 2 / 1080</div>

    <div class="obs-ui" id="btn-back">← 歸位首頁</div>
    <div class="obs-ui" id="btn-treasure">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f3e5ab" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas'); const ctx = canvas.getContext('2d');
        const bodyState = document.getElementById('body-state'); const vowDisplay = document.getElementById('vow-display');
        const treasureOverlay = document.getElementById('treasure-overlay'); const svgContainer = document.getElementById('svg-container');
        const tNameUi = document.getElementById('t-name-ui'); const tDescUi = document.getElementById('t-desc-ui'); const tTagUi = document.getElementById('t-tag-ui');
        const hint = document.getElementById('hint'); const flash = document.getElementById('flash');
        const progressTxt = document.getElementById('progress'); const btnTreasure = document.getElementById('btn-treasure');
        
        const vows = ["眾生無邊誓願度", "煩惱無盡誓願斷", "法門無量誓願學", "佛道無上誓願成"];
        const planetColors = [{r: 212, g: 175, b: 55}, {r: 139, g: 168, b: 156}, {r: 194, g: 24, b: 91}, {r: 224, g: 247, b: 250}];
        
        // 帶有 tag 功能標籤的法語庫 (35%掉寶機率時使用)
        const treasureTexts = [
            { t: "因緣和合 ． 幾何慧劍現", tag: "破迷 ‧ 決斷", d: "劍氣本空，能斷無明之網；鋒芒藏智，可破世業之迷。若逢關卡躑躅、前路未明，此劍或可映照本心。皆因行者至誠發無上菩提，感得法界幽微之迴響。冀以此緣，斬盡葛藤，令事理通達，無礙前行。" },
            { t: "因緣和合 ． 琉璃淨瓶現", tag: "療癒 ‧ 息災", d: "琉璃凝粹，內湛清涼之水；淨瓶無垢，堪息四大之微。若逢身心違和、暗夜驚瀾，此甘露或可潤澤枯槁。皆因行者至誠發無上菩提，感得法界幽微之迴響。冀以此緣，滌蕩疾厄，令身心泰然，得獲安康。" },
            { t: "因緣和合 ． 多面寶珠現", tag: "滿願 ‧ 增上", d: "摩尼多面，本具萬法之光；如意圓融，能隨善念之轉。若祈福德增上、百事逢春，此寶珠或可折射勝緣。皆因行者至誠發無上菩提，感得法界幽微之迴響。冀以此緣，匯聚資糧，令所求如意，善果日增。" }
        ];

        let w, h, time = 0;
        let planets = [];       
        let fgPlanets = [];     
        let appState = 'daily_ritual'; 
        let isPressing = false; let chargeLevel = 0; let litCount = 0;
        let rotX = 0, rotY = 0; let targetRotX = 0, targetRotY = 0;
        let isDragging = false; let lastMouseX = 0, lastMouseY = 0;
        let shooting = false; let targetPlanet = null; let beamProgress = 0;
        
        let hasDroppedTreasure = false; // 紀錄這次是否有掉寶

        function init() {
            w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
            
            // 背景星 (效能極致版，拔除 shadowBlur)
            planets = []; const radius = 1500; 
            for (let i = 0; i < 1080; i++) {
                const phi = Math.acos(1 - 2 * (i + 0.5) / 1080);
                const theta = Math.PI * (1 + Math.sqrt(5)) * i;
                planets.push({
                    id: i, baseX: radius * Math.cos(theta) * Math.sin(phi), baseY: radius * Math.cos(phi), baseZ: radius * Math.sin(theta) * Math.sin(phi),
                    isLit: false, colorObj: planetColors[i % 4], size: Math.random() * 2 + 1,
                    state: 'orbit', animT: 0
                });
            }
            planets[540].isLit = true; planets[100].isLit = true;
            litCount = 2; progressTxt.innerText = `功德迴向法界 ． ${litCount} / 1080`;

            // 前景大星 (嚴格限制 5 顆)
            fgPlanets = [];
            for (let i = 0; i < 5; i++) {
                fgPlanets.push({
                    x: Math.random() * w, y: Math.random() * h * 0.8 + h*0.1,
                    speed: (Math.random() * 0.3 + 0.1) * (Math.random() > 0.5 ? 1 : -1),
                    size: Math.random() * 15 + 10,
                    isLit: Math.random() > 0.5,
                    colorObj: planetColors[Math.floor(Math.random() * 4)],
                    phase: Math.random() * Math.PI * 2
                });
            }
        }

        function rotate3D(x, y, z, pitch, yaw) {
            let x1 = x * Math.cos(yaw) - z * Math.sin(yaw); let z1 = x * Math.sin(yaw) + z * Math.cos(yaw);
            let y2 = y * Math.cos(pitch) - z1 * Math.sin(pitch); let z2 = y * Math.sin(pitch) + z1 * Math.cos(pitch);
            return { x: x1, y: y2, z: z2 };
        }

        function draw() {
            ctx.clearRect(0, 0, w, h);
            time += 0.05;
            if (appState === 'daily_ritual' && !shooting) targetRotY += 0.001;
            rotX += (targetRotX - rotX) * 0.1; rotY += (targetRotY - rotY) * 0.1;

            // 1. 繪製背景矩陣 (極簡渲染)
            planets.forEach(p => {
                let worldPos = rotate3D(p.baseX, p.baseY, p.baseZ, rotX, rotY);
                let currentX = worldPos.x, currentY = worldPos.y, currentZ = worldPos.z;

                if (p.state !== 'orbit') {
                    let centerX = 0, centerY = -50, centerZ = -1800; 
                    if (p.state === 'flying_in') {
                        p.animT += 0.02;
                        if (p.animT >= 1) { p.animT = 1; p.state = 'presenting'; showTreasureOverlay(p); }
                    } else if (p.state === 'flying_out') {
                        p.animT -= 0.015;
                        if (p.animT <= 0) { p.animT = 0; p.state = 'orbit'; completeRitual(); }
                    }
                    const ease = p.animT < 0.5 ? 2 * p.animT * p.animT : -1 + (4 - 2 * p.animT) * p.animT;
                    currentX += (centerX - currentX) * ease; currentY += (centerY - currentY) * ease; currentZ += (centerZ - currentZ) * ease;
                }

                let dz = currentZ + 2000; if (dz < 10) return; 
                const scale = 1000 / dz;
                const x2d = w/2 + currentX * scale, y2d = h/2 + currentY * scale;
                if (x2d < -50 || x2d > w + 50 || y2d < -50 || y2d > h + 50) return;

                const baseR2d = p.size * scale;
                const r2d = p.isLit ? baseR2d * 2.5 : baseR2d; 
                const {r, g, b} = p.colorObj;

                if (p.state === 'presenting') {
                    // 星球退位成極度柔和的大光暈 (不重疊法寶)
                    const auraGrad = ctx.createRadialGradient(x2d, y2d, 0, x2d, y2d, r2d * 5);
                    auraGrad.addColorStop(0, `rgba(${r},${g},${b}, 0.2)`);
                    auraGrad.addColorStop(1, `rgba(${r},${g},${b}, 0)`);
                    ctx.fillStyle = auraGrad; ctx.beginPath(); ctx.arc(x2d, y2d, r2d * 5, 0, Math.PI*2); ctx.fill();
                } else if (p.isLit) {
                    // 覺醒星：只用透明度與小實心圓，徹底移除 shadowBlur 提升效能
                    let breath = (Math.sin(time * 2 + p.id) + 1) / 2;
                    ctx.fillStyle = `rgba(${r},${g},${b}, ${0.5 + breath*0.3})`;
                    ctx.beginPath(); ctx.arc(x2d, y2d, r2d, 0, Math.PI * 2); ctx.fill();
                } else {
                    let opacity = (appState === 'daily_ritual' && isPressing) ? 0.05 : 0.3;
                    ctx.fillStyle = `rgba(${r},${g},${b}, ${opacity})`;
                    ctx.beginPath(); ctx.arc(x2d, y2d, r2d, 0, Math.PI * 2); ctx.fill();
                }
            });

            if (shooting && targetPlanet) {
                beamProgress += 0.03;
                let targetWorld = rotate3D(targetPlanet.baseX, targetPlanet.baseY, targetPlanet.baseZ, rotX, rotY);
                let scale = 1000 / (targetWorld.z + 2000);
                let currentX = w/2 + ((w/2 + targetWorld.x * scale) - w/2) * beamProgress;
                let currentY = (h/2 + 50) + ((h/2 + targetWorld.y * scale) - (h/2 + 50)) * beamProgress;
                ctx.beginPath(); ctx.moveTo(w/2, h/2 + 50); ctx.lineTo(currentX, currentY);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
                if (beamProgress >= 1) { shooting = false; targetPlanet.state = 'flying_in'; targetPlanet.animT = 0; }
            }

            // 2. 繪製前景 5 顆大星 (移除雙圈白點，改用柔和徑向漸層)
            if (appState !== 'treasure_view') {
                fgPlanets.forEach(fp => {
                    fp.x += fp.speed;
                    if (fp.x > w + 80) fp.x = -80; else if (fp.x < -80) fp.x = w + 80;
                    const {r, g, b} = fp.colorObj;
                    let opacity = fp.isLit ? (0.6 + 0.2 * Math.sin(time + fp.phase)) : 0.2;
                    
                    const grad = ctx.createRadialGradient(fp.x, fp.y, 0, fp.x, fp.y, fp.size);
                    grad.addColorStop(0, `rgba(${r},${g},${b}, ${opacity})`);
                    grad.addColorStop(0.6, `rgba(${r},${g},${b}, ${opacity * 0.5})`);
                    grad.addColorStop(1, `rgba(${r},${g},${b}, 0)`);
                    ctx.fillStyle = grad;
                    ctx.beginPath(); ctx.arc(fp.x, fp.y, fp.size, 0, Math.PI * 2); ctx.fill();
                });
            }

            // 中心金心
            if (appState === 'daily_ritual' && !shooting && (!targetPlanet || targetPlanet.state === 'orbit')) {
                let basePulse = isPressing ? 0 : Math.sin(time * 0.5) * 5;
                let currentRadius = 40 + basePulse + (chargeLevel * 1.5); 
                const grad = ctx.createRadialGradient(w/2, h/2 + 50, 0, w/2, h/2 + 50, currentRadius + 10);
                grad.addColorStop(0, `rgba(243, 229, 171, ${0.8 + (chargeLevel/200)})`); grad.addColorStop(1, 'rgba(212, 175, 55, 0)');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(w/2, h/2 + 50, currentRadius + 15, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(w/2, h/2 + 50, 8 + (chargeLevel * 0.3), 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; ctx.fill();
            }

            requestAnimationFrame(draw);
        }

        // === 機率掉寶系統 (35%掉寶 / 65%純點亮) ===
        function showTreasureOverlay(planet) {
            appState = 'treasure_view'; 
            flash.style.opacity = 1; setTimeout(() => { flash.style.opacity = 0; }, 600);
            
            if (!planet.isLit) { planet.isLit = true; litCount++; progressTxt.innerText = `功德迴向法界 ． ${litCount} / 1080`; }
            
            // 決定是否掉落法寶 (約35%機率)
            hasDroppedTreasure = Math.random() < 0.35;

            if (hasDroppedTreasure) {
                // 掉寶：顯示 SVG 與法語
                svgContainer.style.display = 'flex';
                const randText = treasureTexts[Math.floor(Math.random() * treasureTexts.length)];
                tNameUi.innerHTML = `${randText.t} <span class="t-tag">【${randText.tag}】</span>`;
                tDescUi.innerText = randText.d;
            } else {
                // 無掉寶：只顯示點亮文字，隱藏 SVG
                svgContainer.style.display = 'none';
                tNameUi.innerHTML = `法界覺醒 ． 功德增明`;
                tDescUi.innerText = `行者至誠發無上菩提，點亮華藏星辰。願此微小清淨之光，融入無盡法界，迴向法界眾生得大安樂。`;
            }

            treasureOverlay.classList.remove('collecting');
            treasureOverlay.classList.add('show');
        }

        function collectTreasure() {
            if (appState !== 'treasure_view') return;
            treasureOverlay.classList.remove('show');
            treasureOverlay.classList.add('collecting');
            setTimeout(() => {
                // 如果有掉寶，法寶閣才震動
                if (hasDroppedTreasure) {
                    btnTreasure.classList.add('ping');
                    setTimeout(() => btnTreasure.classList.remove('ping'), 300);
                }
                if (targetPlanet) targetPlanet.state = 'flying_out'; 
            }, 800); // 縮短收起時間，讓節奏更俐落
        }

        function completeRitual() {
            appState = 'observation'; bodyState.className = 'mode-observation';
            hint.innerText = "今日功德已滿，請明日再來觀心"; hint.style.opacity = 0.5;
        }

        setInterval(() => {
            if (appState === 'daily_ritual' && isPressing) {
                chargeLevel += 1; if (chargeLevel > 100) chargeLevel = 100;
                let stage = Math.floor((chargeLevel / 100) * 4); if (stage > 3) stage = 3;
                if (vowDisplay.innerText !== vows[stage]) { vowDisplay.style.opacity = 0; setTimeout(() => { vowDisplay.innerText = vows[stage]; vowDisplay.style.opacity = 1; }, 50); }
            } else { chargeLevel *= 0.8; }
        }, 30);

        function pointerDown(e) {
            if (e.target.closest('.obs-ui') || appState === 'treasure_view') return;
            if (appState === 'daily_ritual') {
                if (shooting || (targetPlanet && targetPlanet.state !== 'orbit')) return;
                isPressing = true; bodyState.classList.add('charging'); hint.style.opacity = 0;
            } else if (appState === 'observation') {
                isDragging = true; lastMouseX = e.touches ? e.touches[0].clientX : e.clientX; lastMouseY = e.touches ? e.touches[0].clientY : e.clientY; hint.style.opacity = 0;
            }
        }
        function pointerMove(e) {
            if (appState === 'observation' && isDragging) {
                let currentX = e.touches ? e.touches[0].clientX : e.clientX; let currentY = e.touches ? e.touches[0].clientY : e.clientY;
                targetRotY += (currentX - lastMouseX) * 0.005; targetRotX += (currentY - lastMouseY) * 0.005;
                if (targetRotX > 0.5) targetRotX = 0.5; if (targetRotX < -0.5) targetRotX = -0.5;
                lastMouseX = currentX; lastMouseY = currentY;
            }
        }
        function pointerUp(e) {
            if (appState === 'daily_ritual' && isPressing) {
                isPressing = false; bodyState.classList.remove('charging');
                if (chargeLevel >= 95) { vowDisplay.style.opacity = 0; targetPlanet = planets[Math.floor(Math.random() * planets.length)]; shooting = true; beamProgress = 0; chargeLevel = 0; }
                else { hint.style.opacity = 0.5; }
            } else if (appState === 'observation') { isDragging = false; hint.style.opacity = 0.5; }
        }

        window.addEventListener('mousedown', pointerDown); window.addEventListener('mousemove', pointerMove); window.addEventListener('mouseup', pointerUp);
        window.addEventListener('touchstart', pointerDown, {passive: false}); window.addEventListener('touchmove', pointerMove, {passive: false}); window.addEventListener('touchend', pointerUp, {passive: false});
        window.addEventListener('resize', init);
        
        init(); draw();
    </script>
</body>
</html>
