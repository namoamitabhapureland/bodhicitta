<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>終極大獎 ． 蓮華因陀羅網</title>
    <style>
        body { margin: 0; background: #010102; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: "PingFang TC", sans-serif; }
        
        .item-box { width: 300px; height: 400px; position: relative; display: flex; flex-direction: column; align-items: center; }
        svg { width: 100%; height: 80%; filter: drop-shadow(0 0 25px rgba(243, 229, 171, 0.3)); overflow: visible; }
        
        /* 懸浮呼吸動畫 */
        @keyframes float-pulse {
            0% { transform: translateY(0px); filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.2)); }
            50% { transform: translateY(-15px); filter: drop-shadow(0 0 40px rgba(243, 229, 171, 0.6)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 0 20px rgba(243, 229, 171, 0.2)); }
        }
        .float-obj { animation: float-pulse 6s infinite ease-in-out; transform-origin: center; }
        
        /* 因陀羅網緩慢自轉 (象徵法輪常轉、重重無盡) */
        @keyframes rotate-net { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spin-net { animation: rotate-net 30s linear infinite; transform-origin: 50px 75px; }

        /* 蓮花核心光芒吞吐 */
        @keyframes lotus-breath { 0% { opacity: 0.5; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1.05); } }
        .core-light { animation: lotus-breath 3s infinite alternate ease-in-out; transform-origin: 50px 75px; }
        
        /* 節點摩尼珠閃爍 */
        @keyframes node-flash { 0% { opacity: 0.3; r: 1.5; } 100% { opacity: 1; r: 2.5; } }
        .node { animation: node-flash 2s infinite alternate ease-in-out; }

        .label { color: #f3e5ab; letter-spacing: 6px; font-size: 1.1rem; margin-top: 20px; text-shadow: 0 0 15px #d4af37; text-align: center; line-height: 1.6; }
        .sub-label { font-size: 0.75rem; color: #8ba89c; letter-spacing: 3px; }
    </style>
</head>
<body>

<div class="item-box">
    <svg viewBox="0 0 100 150">
        <defs>
            <radialGradient id="net-glow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" style="stop-color:#fff; stop-opacity:1" />
                <stop offset="30%" style="stop-color:#f3e5ab; stop-opacity:0.5" />
                <stop offset="100%" style="stop-color:#d4af37; stop-opacity:0" />
            </radialGradient>

            <g id="geo-petal">
                <path d="M50 75 L42 50 L50 25 L58 50 Z" fill="rgba(212, 175, 55, 0.15)" stroke="#f3e5ab" stroke-width="0.3" />
                <path d="M50 75 L46 55 L50 35 L54 55 Z" fill="rgba(255, 255, 255, 0.3)" stroke="#fff" stroke-width="0.2" />
            </g>
        </defs>

        <g class="float-obj">
            <circle cx="50" cy="75" r="45" fill="url(#net-glow)" opacity="0.4" filter="blur(6px)" />

            <g class="spin-net">
                
                <g stroke="rgba(243, 229, 171, 0.3)" stroke-width="0.2">
                    <polygon points="50,25 85.35,39.65 85.35,75 85.35,110.35 50,125 14.65,110.35 14.65,75 14.65,39.65" fill="none" stroke-width="0.4" />
                    <polygon points="50,25 85.35,75 50,125 14.65,75" fill="none" stroke-dasharray="1,1" />
                    <polygon points="85.35,39.65 85.35,110.35 14.65,110.35 14.65,39.65" fill="none" stroke-dasharray="1,1" />
                </g>

                <use href="#geo-petal" transform="rotate(0 50 75)" />
                <use href="#geo-petal" transform="rotate(45 50 75)" />
                <use href="#geo-petal" transform="rotate(90 50 75)" />
                <use href="#geo-petal" transform="rotate(135 50 75)" />
                <use href="#geo-petal" transform="rotate(180 50 75)" />
                <use href="#geo-petal" transform="rotate(225 50 75)" />
                <use href="#geo-petal" transform="rotate(270 50 75)" />
                <use href="#geo-petal" transform="rotate(315 50 75)" />

                <circle cx="50" cy="25" r="2" fill="#fff" class="node" style="animation-delay: 0s;" />
                <circle cx="85.35" cy="39.65" r="2" fill="#f3e5ab" class="node" style="animation-delay: 0.2s;" />
                <circle cx="85.35" cy="75" r="2" fill="#fff" class="node" style="animation-delay: 0.4s;" />
                <circle cx="85.35" cy="110.35" r="2" fill="#d4af37" class="node" style="animation-delay: 0.6s;" />
                <circle cx="50" cy="125" r="2" fill="#fff" class="node" style="animation-delay: 0.8s;" />
                <circle cx="14.65" cy="110.35" r="2" fill="#f3e5ab" class="node" style="animation-delay: 1s;" />
                <circle cx="14.65" cy="75" r="2" fill="#fff" class="node" style="animation-delay: 1.2s;" />
                <circle cx="14.65" cy="39.65" r="2" fill="#d4af37" class="node" style="animation-delay: 1.4s;" />

                <circle cx="50" cy="75" r="6" fill="#fff" class="core-light" filter="drop-shadow(0 0 8px #fff)" />
                <polygon points="50,68 53,75 50,82 47,75" fill="#f3e5ab" /> </g>
        </g>
    </svg>
    <div class="label">華嚴蓮華因陀羅網<br><span class="sub-label">重重無盡 ‧ 圓滿大獎</span></div>
</div>

</body>
</html>
