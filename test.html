<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>法華密碼 ． 多寶塔湧現</title>
    <style>
        :root {
            --bg-deep: #020202;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --fire-red: #8b3a3a;
            --text-main: #d0d0d0;
        }
        body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; user-select: none;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            color: var(--gold); text-decoration: none; font-size: 0.95rem; font-weight: bold;
            display: flex; align-items: center; gap: 8px; letter-spacing: 1px; cursor: pointer;
            text-shadow: 0 0 8px rgba(212,175,55,0.5); background: rgba(0,0,0,0.5); 
            padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3);
            backdrop-filter: blur(5px); transition: all 0.3s;
        }
        .back-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.2); }

        .matrix-section { position: absolute; inset: 0; background: #000; overflow: hidden; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
        
        .dharmadhatu-light {
            position: absolute; inset: 0; 
            background: radial-gradient(circle at 50% 50%, rgba(139,58,58,0.15) 0%, transparent 80%);
            animation: breath 4s infinite alternate ease-in-out; pointer-events: none; transition: background 4s ease; z-index: 0;
        }
        @keyframes breath { 0% { opacity: 0.6; } 100% { opacity: 1; } }

        .ui-layer { position: absolute; bottom: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; gap: 15px; transition: opacity 1.5s;}
        
        .switch-btn {
            background: linear-gradient(135deg, rgba(20,10,10,0.9), rgba(10,5,5,0.95)); 
            border: 1px solid rgba(212,175,55,0.5); color: var(--gold);
            padding: 16px 35px; border-radius: 30px; font-size: 1.05rem; font-weight: bold; letter-spacing: 3px;
            cursor: pointer; backdrop-filter: blur(10px); transition: all 0.5s; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 5px 20px rgba(139,58,58,0.4), inset 0 0 15px rgba(212,175,55,0.1);
        }
        .switch-btn:active { transform: scale(0.96); box-shadow: 0 0 30px rgba(212,175,55,0.6); }

        #status-panel {
            position: absolute; top: 70px; left: 5%; width: 90%; max-width: 320px;
            background: rgba(15,5,5,0.8); backdrop-filter: blur(12px);
            border-left: 3px solid var(--fire-red); padding: 15px 20px; z-index: 10; transition: 1.5s; pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 0 10px 10px 0;
        }
        .status-title { font-size: 1.1rem; font-weight: bold; color: rgba(255,150,150,1); letter-spacing: 2px; margin-bottom: 8px; transition: 1.5s; }
        .status-desc { font-size: 0.85rem; color: #bbb; line-height: 1.8; transition: 1.5s; letter-spacing: 1px; }

        #fahua-overlay {
            position: absolute; top: 15%; width: 100%; display: flex; flex-direction: column; align-items: center;
            z-index: 60; opacity: 0; pointer-events: none; transition: opacity 3s ease-in;
        }
        .fahua-text {
            color: var(--gold); font-size: 1.1rem; letter-spacing: 5px; line-height: 2.2; text-align: center;
            text-shadow: 0 0 15px rgba(212,175,55,0.8), 0 0 30px rgba(0,0,0,0.9); font-weight: bold;
            background: rgba(0,0,0,0.4); padding: 20px 40px; border-radius: 15px; border-top: 1px solid rgba(212,175,55,0.3); border-bottom: 1px solid rgba(212,175,55,0.3);
        }
        .soft-cyan { color: var(--cyan); text-shadow: 0 0 10px rgba(139,168,156,0.8); }
    </style>
</head>
<body>

    <div class="back-btn" onclick="window.location.href='index.html?screen=3'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        回道場
    </div>

    <section class="matrix-section">
        <div class="dharmadhatu-light" id="bg-light"></div>
        
        <div id="status-panel">
            <div class="status-title" id="s-title">三界火宅 ． 幻化之城</div>
            <div class="status-desc" id="s-desc">
                迷途：為求自了，安於化城。<br>實相：生死雖斷，佛道未成。<br>因緣：未發大心，不見寶所。
            </div>
        </div>

        <canvas id="matrixCanvas"></canvas>

        <div id="fahua-overlay">
            <div class="fahua-text">
                「十方佛土中，<span class="soft-cyan">唯有一乘法</span>。」<br><br>
                從地湧出，住於空中。<br>
                釋迦多寶，雙佛並坐。<br>
                一切萬法，皆為成佛。
            </div>
        </div>

        <div class="ui-layer" id="ui-layer">
            <button class="switch-btn" onclick="triggerStupa()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 22 20 2 20"></polygon><circle cx="12" cy="14" r="3"></circle></svg>
                見多寶塔 ． 發無上菩提心
            </button>
            <div style="color:rgba(212,175,55,0.5); font-size:0.75rem; letter-spacing:3px; margin-top:10px;" id="drag-hint">360° 滑動 ． 觀測三界幻象</div>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let fireDust = [], stupaParticles = [];
        
        let rotX = -0.15; let rotY = 0; 
        let isDragging = false; let startX, startY;
        let vX = 0, vY = 0; 

        let state = 0; // 0: 火宅, 1: 寶塔湧現
        let stupaYOffset = 800; // 寶塔初始藏於極深的地底
        let fireOpacity = 1.0;

        // 偽光暈
        const glowCanvas = document.createElement('canvas');
        glowCanvas.width = glowCanvas.height = 32;
        const gCtx = glowCanvas.getContext('2d');
        const gGrad = gCtx.createRadialGradient(16, 16, 0, 16, 16, 16);
        gGrad.addColorStop(0, 'rgba(255,255,255,1)');
        gGrad.addColorStop(0.2, 'rgba(212,175,55,0.7)');
        gGrad.addColorStop(1, 'rgba(212,175,55,0)');
        gCtx.fillStyle = gGrad; gCtx.fillRect(0,0,32,32);

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        // ✨ 雙佛並坐的光影生成器 ✨
        function addBuddhaSilhouette(offsetX, offsetY, offsetZ, color, isPastBuddha) {
            // 光相頭部
            for(let a=0; a<Math.PI*2; a+=0.5) {
                for(let b=0; b<Math.PI; b+=0.5) {
                    let r = 8;
                    stupaParticles.push({x: offsetX + r*Math.sin(b)*Math.cos(a), y: offsetY - 25 + r*Math.cos(b), z: offsetZ + r*Math.sin(b)*Math.sin(a), c: color, s: 1.2, glow: true, oY: offsetY - 25 + r*Math.cos(b)});
                }
            }
            // 光相身體 (打坐三角輪廓)
            for(let y=0; y<=30; y+=4) {
                let r = 4 + y*0.6; 
                for(let a=0; a<Math.PI*2; a+=0.6) {
                    stupaParticles.push({x: offsetX + r*Math.cos(a), y: offsetY - 15 + y, z: offsetZ + r*Math.sin(a), c: color, s: 1, glow: false, oY: offsetY - 15 + y});
                }
            }
            // 底部蓮台明點
            for(let a=0; a<Math.PI*2; a+=0.3) {
                stupaParticles.push({x: offsetX + 25*Math.cos(a), y: offsetY + 15, z: offsetZ + 25*Math.sin(a), c: color, s: 1.5, glow: true, oY: offsetY + 15});
            }
            // 核心心輪極強光點
            stupaParticles.push({x: offsetX, y: offsetY - 5, z: offsetZ, c: '#ffffff', s: 4, glow: true, oY: offsetY - 5});
        }

        function generateTopology() {
            fireDust = []; stupaParticles = [];
            function addPt(arr, x, y, z, c, s, glow) { arr.push({x, y, z, c, s, glow, oY: y}); }

            // 1. 三界火宅混沌塵埃 (焦慮的紅光)
            for(let i=0; i<400; i++) { 
                fireDust.push({
                    x: (Math.random()-0.5)*600, y: (Math.random()-0.5)*600, z: (Math.random()-0.5)*600,
                    vx: (Math.random()-0.5)*1.5, vy: (Math.random()-0.5)*1.5, vz: (Math.random()-0.5)*1.5,
                    life: Math.random() * Math.PI * 2
                });
            }

            // 2. 巨型多寶塔 (高五百由旬的壓迫感)
            const stupaBaseY = 150; // 塔基位置
            
            // 廣闊的懸浮塔基
            for(let r=0; r<140; r+=10) {
                for(let a=0; a<Math.PI*2; a+=0.15) { addPt(stupaParticles, r*Math.cos(a), stupaBaseY, r*Math.sin(a), 'rgba(139,168,156,0.3)', 1, false); }
            }
            
            // 七重寶塔本體
            const tiers = 7;
            for(let i=0; i<tiers; i++) {
                let y = stupaBaseY - 20 - i*45; // 每層高度
                let r = 110 - i*12; // 逐層縮小
                
                // 八角飛簷
                for(let a=0; a<Math.PI*2; a+=Math.PI/4) {
                    // 支柱
                    for(let t=0; t<=1; t+=0.05) { addPt(stupaParticles, r*Math.cos(a)*t, y, r*Math.sin(a)*t, 'rgba(212,175,55,0.7)', 1.2, false); }
                    // 簷角懸掛寶珠
                    addPt(stupaParticles, (r+10)*Math.cos(a), y+8, (r+10)*Math.sin(a), 'rgba(243,229,171,1)', 2.5, true);
                    // 垂降流蘇
                    for(let drop=0; drop<20; drop+=4) { addPt(stupaParticles, (r+10)*Math.cos(a), y+8+drop, (r+10)*Math.sin(a), 'rgba(212,175,55,0.4)', 0.8, false); }
                }
                // 樓層外環
                for(let a=0; a<Math.PI*2; a+=0.1) { addPt(stupaParticles, r*Math.cos(a), y, r*Math.sin(a), 'rgba(243,229,171,0.5)', 1, false); }
            }

            // 塔頂相輪 (刺破蒼穹的尖塔)
            let spireBaseY = stupaBaseY - 20 - (tiers-1)*45 - 30;
            for(let y=spireBaseY; y>spireBaseY - 180; y-=10) {
                let r = (y < spireBaseY - 140) ? 2 : 15 + (y - (spireBaseY-180))*0.1;
                for(let a=0; a<Math.PI*2; a+=0.4) { addPt(stupaParticles, r*Math.cos(a), y, r*Math.sin(a), 'rgba(139,168,156,0.9)', 1.5, true); }
            }

            // 🌟 核心：二佛並坐光影 🌟
            // 釋迦牟尼佛 (左側，純金光)
            addBuddhaSilhouette(-28, stupaBaseY - 180, 0, 'rgba(243,229,171,0.9)', false);
            // 多寶如來 (右側，青白光)
            addBuddhaSilhouette(28, stupaBaseY - 180, 0, 'rgba(139,168,156,0.9)', true);
        }

        function render() {
            ctx.clearRect(0, 0, width, height); 
            ctx.globalCompositeOperation = 'screen';
            
            if(!isDragging) { rotY -= 0.003; rotX += vY; rotY += vX; vX *= 0.95; vY *= 0.95; }
            if (rotX > 1.2) rotX = 1.2; if (rotX < -0.2) rotX = -0.2; // 限制視角，確保仰視感

            const cx=width/2, cy=height/2+60, fov=400, sinX=Math.sin(rotX), cosX=Math.cos(rotX), sinY=Math.sin(rotY), cosY=Math.cos(rotY);
            let proj = [];

            function project(p, c, s, glow) {
                let x1=p.x*cosY-p.z*sinY, z1=p.z*cosY+p.x*sinY, y2=p.y*cosX-z1*sinX, z2=z1*cosX+p.y*sinX;
                if(z2 < -fov+10) return null; let scale=fov/(fov+z2);
                return {px:cx+x1*scale, py:cy+y2*scale, z:z2, sc:scale, c:c, s:s, glow:glow};
            }

            // State 0: 渲染三界火宅
            if (fireOpacity > 0) {
                fireDust.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.z += p.vz;
                    if(Math.abs(p.x)>300) p.vx*=-1; if(Math.abs(p.y)>300) p.vy*=-1; if(Math.abs(p.z)>300) p.vz*=-1;
                    p.life += 0.05; let alpha = ((Math.sin(p.life)+1)/2 * 0.8) * fireOpacity;
                    let pr = project(p, `rgba(180,50,50,${alpha})`, 3, false);
                    if(pr) proj.push(pr);
                });
            }

            // State 1: 多寶塔湧現
            if (state === 1) {
                stupaYOffset += (0 - stupaYOffset) * 0.015; // 緩慢從地底升起
                fireOpacity -= 0.01; // 火宅漸漸消散
                if(fireOpacity < 0) fireOpacity = 0;

                stupaParticles.forEach(p => {
                    let currentY = p.oY + stupaYOffset;
                    // 根據升起程度控制透明度，營造光芒匯聚感
                    let alphaRatio = 1 - (stupaYOffset / 800);
                    
                    let pr = project({x:p.x, y:currentY, z:p.z}, p.c, p.s * alphaRatio, p.glow);
                    if(pr) proj.push(pr);
                });
            }

            proj.sort((a,b) => b.z-a.z);
            
            proj.forEach(p => {
                let dS = p.s*p.sc; if(dS<0.1) return;
                if (p.glow) { ctx.drawImage(glowCanvas, p.px - dS*6, p.py - dS*6, dS*12, dS*12); }
                ctx.beginPath(); ctx.arc(p.px, p.py, dS, 0, Math.PI*2); ctx.fillStyle=p.c; ctx.fill();
            });

            requestAnimationFrame(render);
        }

        // 觸發：從地湧出
        function triggerStupa() {
            document.getElementById('ui-layer').style.opacity = '0';
            setTimeout(() => document.getElementById('ui-layer').style.display = 'none', 1500);
            
            document.getElementById('bg-light').style.background = 'radial-gradient(circle at 50% 50%, rgba(212,175,55,0.08) 0%, transparent 80%)';
            
            let pnl = document.getElementById('status-panel');
            pnl.style.borderLeftColor = 'var(--solid-gold)';
            pnl.style.background = 'rgba(5,10,15,0.8)';
            let title = document.getElementById('s-title');
            title.style.color = 'var(--gold)';
            title.innerText = "一佛乘 ． 寶塔湧現";
            document.getElementById('s-desc').innerHTML = "開權顯實，雙佛並坐。<br>極樂十方，皆為駛向此真實寶所。";

            state = 1; // 啟動 Y 軸上升

            setTimeout(() => {
                document.getElementById('fahua-overlay').style.opacity = '1';
                pnl.style.opacity = '0'; // 隱藏左側板，讓畫面純淨
            }, 6000); // 等待寶塔升起到壯觀位置再顯示法語
        }

        // 阻尼滑動 (限制 X軸 角度，保持仰視的巨大壓迫感)
        canvas.addEventListener('pointerdown', (e) => { 
            if(e.target.closest('.ui-layer')) return;
            isDragging = true; startX = e.clientX || e.touches[0].clientX; startY = e.clientY || e.touches[0].clientY; vX = 0; vY = 0; 
        });
        canvas.addEventListener('pointermove', (e) => { 
            if (!isDragging) return; 
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0); let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            let dx = x - startX; let dy = y - startY;
            rotY -= dx * 0.008; rotX -= dy * 0.008;
            vX = -dx * 0.0005; vY = -dy * 0.0005; startX = x; startY = y;
        });
        canvas.addEventListener('pointerup', () => isDragging = false); canvas.addEventListener('pointercancel', () => isDragging = false);

        generateTopology(); render();
    </script>
</body>
</html>
