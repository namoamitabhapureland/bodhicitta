<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>唯識矩陣 ． 雙維度切換與立體金蓮</title>
    <style>
        :root {
            --bg-deep: #010103;
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #8ba89c;
            --saha-color: rgba(139, 168, 156, 0.4); /* 娑婆透明態 */
            --pure-color: rgba(243, 229, 171, 0.95); /* 極樂實心金 */
        }
        body { 
            margin: 0; background: var(--bg-deep); color: #eee; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none; user-select: none;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .dharmadhatu-light {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 45%, rgba(255,255,255,0.06) 0%, rgba(139,168,156,0.02) 50%, transparent 80%);
            z-index: 0; animation: breath 10s infinite alternate ease-in-out; pointer-events: none;
        }
        @keyframes breath { 0% { opacity: 0.5; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }
        
        .ui-layer { position: absolute; bottom: 8%; z-index: 10; text-align: center; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px;}
        
        .guide-text { color: rgba(243,229,171,0.6); font-size: 0.85rem; letter-spacing: 3px; font-weight: bold; pointer-events: none; }
        
        /* 狀態切換按鈕 */
        .switch-btn {
            background: rgba(15,15,15,0.8); border: 1.5px solid rgba(139,168,156,0.5);
            color: var(--cyan); padding: 15px 35px; border-radius: 30px;
            font-size: 1.05rem; font-weight: bold; letter-spacing: 3px;
            cursor: pointer; backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(139,168,156,0.1);
            transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
            display: flex; align-items: center; gap: 10px;
        }
        .switch-btn:active { transform: scale(0.95); }
        .switch-btn.pure-mode {
            border-color: var(--solid-gold); color: #000;
            background: linear-gradient(135deg, var(--solid-gold), #b08d2b);
            box-shadow: 0 0 35px rgba(212,175,55,0.6), inset 0 0 20px rgba(255,255,255,0.4);
        }
        
        /* 狀態文字面板 */
        #status-panel {
            position: absolute; top: 30px; left: 30px; width: 300px;
            background: rgba(5,5,10,0.85); backdrop-filter: blur(10px);
            border-left: 3px solid rgba(139,168,156,0.6); border-radius: 8px;
            padding: 15px 20px; z-index: 10; transition: all 0.8s;
        }
        .status-title { font-size: 1.2rem; font-weight: bold; color: var(--cyan); letter-spacing: 2px; margin-bottom: 8px; transition: color 0.8s; }
        .status-desc { font-size: 0.85rem; color: #aaa; line-height: 1.6; }
        
        @media (max-width: 768px) { #status-panel { top: 20px; left: 5%; width: 90%; padding: 12px; box-sizing: border-box;} .ui-layer { bottom: 12%; } }
    </style>
</head>
<body>

    <div class="dharmadhatu-light"></div>
    
    <div id="status-panel">
        <div class="status-title" id="s-title">娑婆態 ． 受限連線</div>
        <div class="status-desc" id="s-desc">
            載體：碳基透明態，生滅無常。<br>
            傳輸：虛線下載，受限於大腦硬體，僅能提取微弱習氣（隔陰之迷）。<br>
            法座：空無。
        </div>
    </div>

    <canvas id="matrixCanvas"></canvas>

    <div class="ui-layer">
        <button class="switch-btn" id="toggle-btn" onclick="toggleState()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <span id="btn-text">切換至極樂金身</span>
        </button>
        <div class="guide-text">滑動星盤 ． 360° 俯瞰法界</div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let lotusParticles = [];
        let dataLinks = [];
        
        let rotX = -0.15; let rotY = 0;
        let isDragging = false; let startX, startY;

        // 狀態變數 (0 = 娑婆, 1 = 極樂)
        let currentState = 0;
        let targetState = 0; // 用於平滑動畫過渡

        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        // --- 核心拓撲生成 ---
        function generateTopology() {
            particles = []; lotusParticles = []; dataLinks = [];
            
            function addPt(arr, x, y, z, rnd, type) { arr.push({x, y, z, rnd, type}); }

            // 1. 產生人體 (帶有隨機因子，用於控制緻密度)
            // A. 頭部
            for (let lat = 0; lat <= Math.PI; lat += 0.25) {
                for (let lon = 0; lon < Math.PI * 2; lon += 0.25) {
                    let rx = 14, ry = 20, rz = 16;
                    let x = rx * Math.sin(lat) * Math.cos(lon);
                    let y = -85 + ry * Math.cos(lat);
                    let z = rz * Math.sin(lat) * Math.sin(lon);
                    addPt(particles, x, y, z, Math.random(), 'body');
                }
            }
            // B. 軀幹
            for (let y = -60; y <= 25; y += 3) {
                let w = 35 - Math.pow((y + 60) * 0.12, 2); 
                if (y > -10) w += (y + 10) * 0.8;
                let d = 12 + (y > 0 ? y * 0.3 : 0);
                for (let lon = 0; lon < Math.PI * 2; lon += 0.25) {
                    let x = w * Math.cos(lon); let z = d * Math.sin(lon);
                    addPt(particles, x, y, z, Math.random(), 'body');
                }
            }
            // C. 雙手 (貝茲)
            for (let t = 0; t <= 1; t += 0.03) {
                let lx = -32 * (1-t) - 12 * t - Math.sin(t * Math.PI) * 15;
                let ly = -55 * (1-t) + 25 * t + Math.sin(t * Math.PI) * 8;
                let lz = 30 * t;
                let rx = 32 * (1-t) + 12 * t + Math.sin(t * Math.PI) * 15;
                for(let a=0; a<Math.PI*2; a+=1.5) {
                    addPt(particles, lx + 4*Math.cos(a), ly, lz + 4*Math.sin(a), Math.random(), 'body');
                    addPt(particles, rx + 4*Math.cos(a), ly, lz + 4*Math.sin(a), Math.random(), 'body');
                }
            }
            // D. 盤腿
            for (let lon = 0; lon < Math.PI * 2; lon += 0.08) {
                let x = 40 * Math.cos(lon); let y = 32 + 4 * Math.sin(lon * 2); let z = 10 + 30 * Math.sin(lon);
                for (let rad = 0; rad < Math.PI * 2; rad += 0.8) {
                    addPt(particles, x + 7*Math.cos(rad), y + 7*Math.sin(rad), z, Math.random(), 'body');
                }
            }

            // 2. 我執金環 (第七識)
            const manasR = 110;
            for(let i=0; i<200; i++) {
                let theta = Math.random() * Math.PI * 2; let phi = Math.acos(Math.random() * 2 - 1);
                let x = manasR * Math.sin(phi) * Math.cos(theta);
                let y = -15 + manasR * Math.cos(phi);
                let z = manasR * Math.sin(phi) * Math.sin(theta);
                addPt(particles, x, y, z, Math.random(), 'manas');
            }

            // 3. 阿賴耶雲端 (第八識)
            const alayaR = 240;
            for(let i=0; i<600; i++) {
                let theta = Math.random() * Math.PI * 2; let phi = Math.acos(Math.random() * 2 - 1);
                let x = alayaR * Math.sin(phi) * Math.cos(theta);
                let y = -15 + alayaR * Math.cos(phi);
                let z = alayaR * Math.sin(phi) * Math.sin(theta);
                addPt(particles, x, y, z, Math.random(), 'alaya');
            }

            // 4. ✨ 建立 3D 數學參數金蓮 (3層，越外越垂) ✨
            const lotusLayers = [
                { num: 10, len: 25, tilt: 0.2, width: 12, bend: -3, yOff: 40 }, // 內層：短、往上包覆
                { num: 14, len: 45, tilt: 0.7, width: 18, bend: 8, yOff: 45 },  // 中層：中等、微綻放
                { num: 18, len: 70, tilt: 1.25, width: 26, bend: 22, yOff: 50 } // 外層：長、向外垂墜
            ];
            lotusLayers.forEach((layer, lIdx) => {
                for (let i = 0; i < layer.num; i++) {
                    let angle = (Math.PI * 2 / layer.num) * i + (lIdx * 0.2); // 交錯排列
                    for (let t = 0; t <= 1; t += 0.05) { // 長度
                        for (let v = -1; v <= 1; v += 0.25) { // 寬度
                            if (Math.abs(v) > 0.7 || t > 0.8 || Math.random() > 0.4) {
                                let pW = layer.width * Math.sin(t * Math.PI);
                                // ✨ 核心數學：控制花瓣向外彎曲與下垂的拋物線
                                let outR = t * layer.len * Math.sin(layer.tilt) + Math.pow(t, 2) * layer.bend;
                                let upY = -t * layer.len * Math.cos(layer.tilt);
                                
                                let cx = outR * Math.cos(angle) - (v * pW) * Math.sin(angle);
                                let cz = outR * Math.sin(angle) + (v * pW) * Math.cos(angle);
                                let cy = upY + layer.yOff;
                                
                                lotusParticles.push({x: cx, y: cy, z: cz, rnd: Math.random()});
                            }
                        }
                    }
                }
            });

            // 5. 建立阿賴耶數據傳輸線
            for(let i=0; i<40; i++) {
                let startIdx = Math.floor(Math.random() * 500); // 人體/我執節點
                let endIdx = particles.length - Math.floor(Math.random() * 600) - 1; // 阿賴耶節點
                dataLinks.push({ s: startIdx, e: endIdx, rnd: Math.random() });
            }
        }

        // --- 狀態切換按鈕邏輯 ---
        function toggleState() {
            if (targetState === 0) {
                targetState = 1;
                document.getElementById('toggle-btn').classList.add('pure-mode');
                document.getElementById('btn-text').innerText = "返回娑婆觀察";
                
                // 更新面板
                document.getElementById('status-panel').style.borderLeftColor = 'var(--solid-gold)';
                document.getElementById('s-title').style.color = 'var(--gold)';
                document.getElementById('s-title').innerText = "極樂態 ． 完整全息";
                document.getElementById('s-desc').innerHTML = "載體：無漏金身，緻密純粹。<br>傳輸：實線上傳，宿命他心全開，阿賴耶識數據完美雙向同步。<br>法座：九品金蓮承托。";
            } else {
                targetState = 0;
                document.getElementById('toggle-btn').classList.remove('pure-mode');
                document.getElementById('btn-text').innerText = "切換至極樂金身";
                
                // 更新面板
                document.getElementById('status-panel').style.borderLeftColor = 'rgba(139,168,156,0.6)';
                document.getElementById('s-title').style.color = 'var(--cyan)';
                document.getElementById('s-title').innerText = "娑婆態 ． 受限連線";
                document.getElementById('s-desc').innerHTML = "載體：碳基透明態，生滅無常。<br>傳輸：虛線下載，受限於大腦硬體，僅能提取微弱習氣（隔陰之迷）。<br>法座：空無。";
            }
        }

        // 顏色插值運算 (Hex/RGB to RGBA blending)
        function lerpColor(r1,g1,b1,a1, r2,g2,b2,a2, t) {
            return `rgba(${r1+(r2-r1)*t}, ${g1+(g2-g1)*t}, ${b1+(b2-b1)*t}, ${a1+(a2-a1)*t})`;
        }

        // --- 3D 渲染核心 ---
        function render() {
            ctx.clearRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen'; 

            // 平滑過渡 (狀態 0 到 1)
            currentState += (targetState - currentState) * 0.05;

            const cx = width / 2; const cy = height / 2 + 50; const fov = 400;
            if(!isDragging) { rotY -= 0.004; }

            let sinX = Math.sin(rotX), cosX = Math.cos(rotX);
            let sinY = Math.sin(rotY), cosY = Math.cos(rotY);

            let projected = [];
            
            // 投影函數
            function projectPoint(p, drawColor, drawSize, glowStr) {
                let x1 = p.x * cosY - p.z * sinY; let z1 = p.z * cosY + p.x * sinY;
                let y2 = p.y * cosX - z1 * sinX;  let z2 = z1 * cosX + p.y * sinX;
                if(z2 < -fov + 10) return null;
                let scale = fov / (fov + z2);
                return { px: cx + x1 * scale, py: cy + y2 * scale, z: z2, scale: scale, c: drawColor, s: drawSize, glow: glowStr, rawP: p };
            }

            // 1. 處理基本粒子
            for(let i = 0; i < particles.length; i++) {
                let p = particles[i];
                let drawColor, drawSize, glowStr;

                if (p.type === 'body') {
                    // ✨ 核心對比：娑婆稀疏透明 vs 極樂緻密實金 ✨
                    let densityThreshold = 0.85 - (currentState * 0.8); // 狀態0:要>0.85才畫(稀疏), 狀態1:要>0.05才畫(緻密)
                    if (p.rnd > densityThreshold) {
                        drawColor = lerpColor(139,168,156, 0.4,   243,229,171, 0.9, currentState);
                        glowStr = currentState > 0.5 ? 'rgba(212,175,55,0.5)' : 'transparent';
                        drawSize = 1.0 + (currentState * 0.8);
                        let proj = projectPoint(p, drawColor, drawSize, glowStr);
                        if(proj) { proj.idx = i; projected.push(proj); } // 存 idx 以便連線
                    }
                } 
                else if (p.type === 'manas') {
                    let proj = projectPoint(p, `rgba(212,175,55,${0.6 + currentState*0.4})`, 1.5, 'rgba(212,175,55,0.8)');
                    if(proj) { proj.idx = i; projected.push(proj); }
                }
                else if (p.type === 'alaya') {
                    let proj = projectPoint(p, `rgba(139,168,156,${0.4 + currentState*0.2})`, 1.5, 'transparent');
                    if(proj) { proj.idx = i; projected.push(proj); }
                }
            }

            // 2. 處理金蓮粒子 (隨 currentState 浮現並擴大)
            if (currentState > 0.01) {
                for(let i = 0; i < lotusParticles.length; i++) {
                    let lp = lotusParticles[i];
                    // 金蓮生長特效 (由下往上、由內往外延展)
                    let pGrow = { x: lp.x * currentState, y: lp.y * currentState, z: lp.z * currentState };
                    let proj = projectPoint(pGrow, `rgba(212,175,55,${currentState * 0.9})`, 1.2 * currentState, 'rgba(212,175,55,0.5)');
                    if(proj) projected.push(proj);
                }
            }

            // 排序與繪製節點
            projected.sort((a, b) => b.z - a.z);
            
            // 3. 繪製數據連線 (Upload / Download)
            ctx.lineWidth = 1;
            for(let i=0; i<dataLinks.length; i++) {
                let link = dataLinks[i];
                let p1 = projected.find(p => p.idx === link.s);
                let p2 = projected.find(p => p.idx === link.e);
                
                if(p1 && p2) {
                    ctx.beginPath();
                    ctx.moveTo(p1.px, p1.py);
                    ctx.lineTo(p2.px, p2.py);
                    
                    if (currentState < 0.5) {
                        // 娑婆態：虛線、閃爍、不穩定
                        if(Math.random() > 0.5) continue; // 斷訊感
                        ctx.setLineDash([3, 8]);
                        ctx.strokeStyle = `rgba(139,168,156, ${0.15 + Math.random()*0.1})`;
                    } else {
                        // 極樂態：黃金實線、穩定傳輸
                        ctx.setLineDash([]);
                        ctx.strokeStyle = `rgba(243,229,171, ${currentState * 0.4})`;
                    }
                    ctx.stroke();
                }
            }
            ctx.setLineDash([]); // 重置虛線

            // 4. 繪製所有光點
            for(let i = 0; i < projected.length; i++) {
                let p = projected[i];
                let dSize = p.s * p.scale;
                if(dSize < 0.1) continue;

                ctx.beginPath();
                ctx.arc(p.px, p.py, dSize, 0, Math.PI * 2);
                ctx.fillStyle = p.c;
                
                if(p.glow !== 'transparent') {
                    ctx.shadowBlur = 10 * p.scale; ctx.shadowColor = p.glow;
                } else { ctx.shadowBlur = 0; }
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            
            requestAnimationFrame(render);
        }

        // 互動控制
        document.addEventListener('pointerdown', (e) => {
            if(e.target.closest('.switch-btn') || e.target.closest('#status-panel')) return;
            isDragging = true; startX = e.clientX || e.touches[0].clientX; startY = e.clientY || e.touches[0].clientY;
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0); let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            rotY -= (x - startX) * 0.01; rotX -= (y - startY) * 0.01;
            if (rotX > 1.2) rotX = 1.2; if (rotX < -1.2) rotX = -1.2;
            startX = x; startY = y;
        });

        document.addEventListener('pointerup', () => isDragging = false);
        document.addEventListener('pointercancel', () => isDragging = false);

        generateTopology();
        render();
    </script>
</body>
</html>
