<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>零增熵 ． 發菩提心</title>
    <style>
        body { margin: 0; background: #010102; overflow: hidden; font-family: "PingFang TC", "Microsoft JhengHei", serif; touch-action: none; user-select: none; }
        canvas { width: 100vw; height: 100vh; display: block; position: absolute; z-index: 1; transition: filter 1s ease; }
        
        /* 當進入誓願狀態時，背景星空模糊變暗 (降低環境熵) */
        .vow-mode canvas { filter: brightness(0.3) blur(2px); }

        /* 四宏誓願文字層 */
        #vow-container {
            position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px;
            opacity: 0; pointer-events: none; transition: opacity 2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .vow-mode #vow-container { opacity: 1; }
        /* 長按發願時，文字化作光塵消失的過渡 */
        .manifesting #vow-container { opacity: 0; transform: translate(-50%, -40%) scale(0.95); transition: all 0.8s ease-in; filter: blur(4px); }

        .vow-line {
            color: #f3e5ab; font-size: 1.3rem; letter-spacing: 12px; font-weight: 300;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.8), 0 0 30px rgba(255, 255, 255, 0.4);
            writing-mode: vertical-rl; /* 直書更具東方莊嚴感 */
        }
        .vow-wrapper { display: flex; flex-direction: row-reverse; gap: 30px; }

        /* 操作提示 (極簡) */
        #hint {
            position: absolute; bottom: 40px; width: 100%; text-align: center;
            color: rgba(243, 229, 171, 0.4); font-size: 0.85rem; letter-spacing: 6px; z-index: 5;
            transition: opacity 1s; pointer-events: none;
        }

        /* 宇宙大閃光 (保持原本的淨化感) */
        #flash { position: absolute; inset: 0; background: #fff; z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.8s ease-out; }
    </style>
</head>
<body id="body-state">

    <canvas id="mainCanvas"></canvas>
    
    <div id="vow-container">
        <div class="vow-wrapper">
            <div class="vow-line">眾生無邊誓願度</div>
            <div class="vow-line">煩惱無盡誓願斷</div>
            <div class="vow-line">法門無量誓願學</div>
            <div class="vow-line">佛道無上誓願成</div>
        </div>
    </div>

    <div id="flash"></div>
    <div id="hint">輕觸金心 ． 喚醒誓願</div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const bodyState = document.getElementById('body-state');
        const hint = document.getElementById('hint');
        const flash = document.getElementById('flash');
        
        let w, h, time = 0;
        let stars = [];
        let state = 'idle'; // idle -> vowing -> charging -> manifesting
        let pressTimer;

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars = Array.from({length: 108}, (_, i) => ({
                x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000,
                color: i % 2 === 0 ? '#d4af37' : '#8ba89c'
            }));
        }

        function draw() {
            ctx.fillStyle = '#010102'; ctx.fillRect(0, 0, w, h);
            time += 0.05;

            // 星空背景
            let speed = (state === 'idle') ? 1.5 : 0.2; // 誓願時星空幾乎靜止
            if (state === 'charging') speed = 0.5;

            stars.forEach(s => {
                s.z -= speed; if (s.z <= 0) s.z = 2000;
                const scale = 400 / (400 + s.z);
                ctx.globalAlpha = Math.min(1, (2000 - s.z) / 1500);
                ctx.beginPath(); ctx.arc(w/2 + s.x * scale, h/2 + s.y * scale, 1.5 * scale, 0, Math.PI * 2);
                ctx.fillStyle = s.color; ctx.fill();
            });

            // 中心金心繪製
            ctx.globalAlpha = 1;
            let basePulse = Math.sin(time * 0.5) * 5;
            if (state === 'vowing') basePulse = Math.sin(time * 0.2) * 2; // 誓願時呼吸變得極其平緩
            
            let chargeScale = (state === 'charging') ? 15 : 0; // 蓄力放大
            
            // 外層氤氳
            const grad = ctx.createRadialGradient(w/2, h/2 + 50, 0, w/2, h/2 + 50, 45 + basePulse + chargeScale);
            grad.addColorStop(0, `rgba(243, 229, 171, ${state === 'charging' ? 1 : 0.8})`);
            grad.addColorStop(1, 'rgba(212, 175, 55, 0)');
            ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(w/2, h/2 + 50, 55 + basePulse + chargeScale, 0, Math.PI * 2); ctx.fill();

            // 核心白金點
            ctx.beginPath(); ctx.arc(w/2, h/2 + 50, 6 + (chargeScale*0.2), 0, Math.PI * 2);
            ctx.fillStyle = '#fff'; ctx.shadowBlur = 15; ctx.shadowColor = '#f3e5ab'; ctx.fill(); ctx.shadowBlur = 0;

            requestAnimationFrame(draw);
        }

        // 互動邏輯 (零增熵控制)
        function handlePointerDown() {
            if (state === 'idle') {
                // 第一次點擊：進入誓願模式
                state = 'vowing';
                bodyState.className = 'vow-mode';
                hint.style.opacity = 0;
                setTimeout(() => { hint.innerText = "默念圓滿，長按金心以發願"; hint.style.opacity = 0.5; }, 2000);
            } else if (state === 'vowing') {
                // 在誓願模式下長按：開始蓄力
                state = 'charging';
                hint.style.opacity = 0;
                pressTimer = setTimeout(() => {
                    triggerShootingStar();
                }, 1000); // 長按 1 秒觸發
            }
        }

        function handlePointerUp() {
            if (state === 'charging') {
                // 長按時間不夠，退回誓願模式
                clearTimeout(pressTimer);
                state = 'vowing';
                hint.style.opacity = 0.5;
            }
        }

        function triggerShootingStar() {
            state = 'manifesting';
            bodyState.className = 'manifesting'; // 觸發文字消失與星空恢復
            
            // 延遲一下讓文字化為光塵，然後大閃光
            setTimeout(() => {
                flash.style.opacity = 1;
                setTimeout(() => {
                    flash.style.opacity = 0;
                    // 這裡銜接「流星擊中星球 -> 法寶浮現」的邏輯
                    // (為了專注展示誓願邏輯，此處先行重置)
                    setTimeout(() => {
                        state = 'idle';
                        bodyState.className = '';
                        hint.innerText = "輕觸金心 ． 喚醒誓願";
                        hint.style.opacity = 0.5;
                    }, 2000);
                }, 800);
            }, 800);
        }

        window.addEventListener('mousedown', handlePointerDown); window.addEventListener('mouseup', handlePointerUp);
        window.addEventListener('touchstart', handlePointerDown); window.addEventListener('touchend', handlePointerUp);
        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
