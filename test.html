<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系統 ． 一真法界 (圓滿回饋)</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; --pink: #fce4ec; --bg-deep: #000; }
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: var(--bg-deep); color: #fff; display: flex; justify-content: center; align-items: center; -webkit-tap-highlight-color: transparent; user-select: none; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }

        /* ---------------- 頂部導航按鈕 (保留) ---------------- */
        .top-nav-btn {
            position: absolute; top: 20px; 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(212,175,55,0.6); 
            color: var(--gold); 
            padding: 8px 16px; border-radius: 25px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; 
            display: flex; align-items: center; gap: 6px; z-index: 1000; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.8), inset 0 0 10px rgba(212,175,55,0.15); 
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .top-nav-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.25); border-color: var(--solid-gold); box-shadow: 0 0 20px rgba(212,175,55,0.5); }
        #back-btn { left: 20px; }

        /* ✨ Z軸星空背景 ✨ */
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* ======= 萬法化現：宇宙核心 (包含擴散光環與蓮花) ======= */
        #universe-core {
            position: absolute; width: 100vmin; height: 100vmin; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            will-change: transform, opacity;
        }

        /* 奇點坍縮專用 Class */
        .implode {
            transition: transform 3s cubic-bezier(0.5, 0, 1, 0.2), opacity 2.5s ease-in !important;
            transform: scale(0.01) rotate(1080deg) !important;
            opacity: 0 !important;
        }

        /* 🌸 菩提心擴散出的淡色透明光環 🌸 */
        .cosmic-ring {
            position: absolute; border-radius: 50%;
            border: 1.5px solid; transform: scale(0); opacity: 0;
            animation: ring-expand 12s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
        }
        @keyframes ring-expand {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: scale(1) rotate(60deg); opacity: 0.8; }
        }

        /* 🌸 核心生長的華藏蓮花線條 🌸 */
        #inner-lotus {
            position: absolute; width: 35vmin; height: 35vmin; z-index: 15;
            filter: drop-shadow(0 0 15px rgba(243,229,171,0.6));
            animation: slow-spin 40s linear infinite;
        }
        @keyframes slow-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 讓 SVG 線條有「慢慢畫出來」的感覺 */
        .lotus-path {
            fill: none; stroke: var(--gold); stroke-width: 0.8;
            stroke-dasharray: 500; stroke-dashoffset: 500;
            animation: draw-flower 5s cubic-bezier(0.4, 0, 0.2, 1) forwards 1.5s, 
                       flower-breathe 4s infinite alternate ease-in-out 6.5s;
        }
        .lotus-path-cyan { stroke: var(--cyan); animation-delay: 2s, 6.5s; }
        @keyframes draw-flower { to { stroke-dashoffset: 0; } }
        @keyframes flower-breathe { 
            0% { opacity: 0.7; filter: drop-shadow(0 0 5px var(--gold)); } 
            100% { opacity: 1; filter: drop-shadow(0 0 15px var(--solid-gold)); } 
        }

        /* ======= 昇華：滿版極光 ======= */
        #golden-flash { 
            position: fixed; inset: 0; background: radial-gradient(circle, #fff 0%, #f3e5ab 40%, #d4af37 100%);
            mix-blend-mode: screen; opacity: 0; z-index: 99998; pointer-events: none; 
            transition: opacity 0.2s ease-out; 
        }

        /* ======= 💡 終極 0+1 重生場景 ======= */
        #immortal-scene { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; background: transparent; pointer-events: none; }

        /* 💡 終極 0+1 的「1」：不滅的菩提心種子 */
        #immortal-seed {
            position: absolute; width: 16px; height: 16px;
            background: radial-gradient(circle, #fff 10%, #ffe 30%, var(--gold) 60%, var(--solid-gold) 100%);
            border-radius: 50%; opacity: 0; transition: opacity 2s; filter: blur(1px);
            box-shadow: 0 0 20px var(--gold), 0 0 50px var(--solid-gold), 0 0 80px #fff;
            z-index: 100;
        }
        .seed-breathe { animation: immortal-breathe 6s infinite alternate ease-in-out; }
        @keyframes immortal-breathe {
            0% { transform: scale(1); box-shadow: 0 0 30px var(--gold), 0 0 60px var(--solid-gold), 0 0 100px #fff; }
            100% { transform: scale(1.4); box-shadow: 0 0 60px var(--gold), 0 0 120px var(--solid-gold), 0 0 180px #fff, 0 0 250px rgba(255,255,255,0.4); }
        }

        #profound-text { margin-top: 100px; color: var(--gold); font-size: 1.35rem; letter-spacing: 12px; opacity: 0; transition: opacity 4s; text-shadow: 0 0 20px var(--solid-gold), 0 0 40px #fff; text-align: center; line-height: 2.8; font-weight: bold; z-index: 100; }
    </style>
</head>
<body>
    
    <div id="page-curtain" style="position:fixed; inset:0; background:#000; z-index: 9999999; pointer-events: none; transition: opacity 0.8s; opacity: 1;"></div>

    <div id="back-btn" class="top-nav-btn" onclick="navigateTo('index.html?screen=3')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
         回系統
    </div>

    <canvas id="starCanvas"></canvas>

    <div id="universe-core">
        <div id="inner-lotus">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <path class="lotus-path" d="M100 100 C 130 50, 160 50, 100 10 C 40 50, 70 50, 100 100 Z" />
                <path class="lotus-path" d="M100 100 C 150 70, 150 40, 190 100 C 150 160, 130 130, 100 100 Z" transform="rotate(72 100 100)" />
                <path class="lotus-path" d="M100 100 C 150 70, 150 40, 190 100 C 150 160, 130 130, 100 100 Z" transform="rotate(144 100 100)" />
                <path class="lotus-path" d="M100 100 C 150 70, 150 40, 190 100 C 150 160, 130 130, 100 100 Z" transform="rotate(216 100 100)" />
                <path class="lotus-path" d="M100 100 C 150 70, 150 40, 190 100 C 150 160, 130 130, 100 100 Z" transform="rotate(288 100 100)" />
                
                <path class="lotus-path lotus-path-cyan" d="M100 100 C 115 65, 130 65, 100 35 C 70 65, 85 65, 100 100 Z" transform="rotate(36 100 100)" />
                <path class="lotus-path lotus-path-cyan" d="M100 100 C 115 65, 130 65, 100 35 C 70 65, 85 65, 100 100 Z" transform="rotate(108 100 100)" />
                <path class="lotus-path lotus-path-cyan" d="M100 100 C 115 65, 130 65, 100 35 C 70 65, 85 65, 100 100 Z" transform="rotate(180 100 100)" />
                <path class="lotus-path lotus-path-cyan" d="M100 100 C 115 65, 130 65, 100 35 C 70 65, 85 65, 100 100 Z" transform="rotate(252 100 100)" />
                <path class="lotus-path lotus-path-cyan" d="M100 100 C 115 65, 130 65, 100 35 C 70 65, 85 65, 100 100 Z" transform="rotate(324 100 100)" />
                
                <circle class="lotus-path" cx="100" cy="100" r="15" stroke-dasharray="100" stroke-dashoffset="100" />
            </svg>
        </div>
    </div>

    <div id="immortal-seed"></div>

    <div id="golden-flash"></div>
    
    <div id="immortal-scene">
        <div id="profound-text">菩提之心 ． 歷劫不滅<br>一真法界 ． 本自如如</div>
    </div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        // ==========================================
        // 1. Z軸星空引擎 (The Void)
        // ==========================================
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let xjStars = [];
        let warpSpeed = 1.5;       
        let targetWarpSpeed = 1.5; 
        const FOV = 400;

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
        }
        window.addEventListener('resize', resize); resize();

        function initStars() {
            xjStars = [];
            for (let i = 0; i < 600; i++) {
                xjStars.push({
                    x: (Math.random() - 0.5) * 3000, y: (Math.random() - 0.5) * 3000,
                    z: Math.random() * 2000, speed: Math.random() * 5 + 2,
                    color: Math.random() > 0.5 ? '#8ba89c' : '#f3e5ab'
                });
            }
        }

        function drawRealm() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; 
            ctx.fillRect(0, 0, width, height);

            warpSpeed += (targetWarpSpeed - warpSpeed) * 0.05; 

            ctx.globalCompositeOperation = 'screen';
            xjStars.forEach(star => {
                let starSpeed = star.speed * (warpSpeed / 1.5);
                star.z -= starSpeed;
                if (star.z <= 0) { star.z = 2000; star.x = (Math.random() - 0.5) * 3000; star.y = (Math.random() - 0.5) * 3000; }
                let sc = FOV / (FOV + star.z); let sx = (width/2) + star.x * sc; let sy = (height/2) + star.y * sc;
                let alpha = Math.min(1, sc * 2);
                
                ctx.beginPath();
                if (warpSpeed > 5) {
                    ctx.moveTo(sx, sy);
                    let tailSc = FOV / (FOV + star.z + starSpeed * 2);
                    ctx.lineTo((width/2) + star.x * tailSc, (height/2) + star.y * tailSc);
                    ctx.strokeStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '139,168,156'}, ${alpha})`;
                    ctx.lineWidth = Math.max(0.5, 3 * sc * sc); 
                    ctx.stroke();
                } else {
                    ctx.arc(sx, sy, Math.max(0.1, 2.5 * sc), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${star.color === '#f3e5ab' ? '243,229,171' : '139,168,156'}, ${alpha})`; ctx.fill();
                }
            });
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(drawRealm);
        }

        // ==========================================
        // 2. 擴散光環生成 (The Expanding Rings)
        // ==========================================
        function createCosmicRipples(container) {
            const ringCount = 6;
            // 搭配淡色透明系：淡金、青瓷、初蓮粉、純白
            const colors = [
                'rgba(243, 229, 171, 0.4)', 'rgba(139, 168, 156, 0.3)', 
                'rgba(252, 228, 236, 0.3)', 'rgba(212, 175, 55, 0.3)',
                'rgba(255, 255, 255, 0.2)', 'rgba(139, 168, 156, 0.2)'
            ];
            
            for(let i = 0; i < ringCount; i++) {
                let ring = document.createElement('div');
                ring.className = 'cosmic-ring';
                
                // 由小到大排開
                let size = (i + 1) * 16 + 10; 
                ring.style.width = `${size}vmin`;
                ring.style.height = `${size}vmin`;
                
                let c = colors[i];
                ring.style.borderColor = c;
                // 用 box-shadow 創造柔和的漸層發光邊緣
                ring.style.boxShadow = `0 0 ${20 + i*5}px ${c}, inset 0 0 ${15 + i*5}px ${c}`;
                
                // 錯開擴散的時間
                ring.style.animationDelay = `${i * 1.2}s`;
                container.appendChild(ring);
            }
        }

        // ==========================================
        // 3. 終極 0+1 演繹引擎
        // ==========================================
        async function runZenEngine() {
            initEngines();
            drawRealm();

            await sleep(100);
            document.getElementById('page-curtain').style.opacity = '0';

            const universeCore = document.getElementById('universe-core');
            const immortalSeed = document.getElementById('immortal-seed');

            // 💡 1. 菩提心浮現 (The 1)
            await sleep(1000); 
            immortalSeed.style.opacity = '1';
            immortalSeed.classList.add('seed-breathe');

            // 💡 2. 萬法化現：擴散光環與蓮花 (The World)
            await sleep(1500);
            createCosmicRipples(universeCore);

            // 讓行者觀賞生長出的蓮花與擴散的星環 10 秒
            await sleep(10000); 

            // 💡 3. 千佛坍縮 (The Collapse)
            targetWarpSpeed = 100; // 星空極速迎面衝來
            universeCore.classList.add('implode'); // 蓮花與光環被中心黑洞強力吸入
            immortalSeed.style.opacity = '0'; // 種子暫時隱沒入光中

            // 讓坍縮與星空加速進行 2.5 秒
            await sleep(2500);

            // 💡 4. 滿版極光與歸零 (The Void)
            const flash = document.getElementById('golden-flash');
            flash.style.opacity = '1'; 
            await sleep(300); 
            
            targetWarpSpeed = 0; // 星空絕對靜止
            universeCore.innerHTML = ''; // 徹底移除色相

            // 極光緩慢褪去，露出純黑虛空
            flash.style.transition = 'opacity 5s ease-in';
            flash.style.opacity = '0';
            await sleep(4000); 

            // 💡 5. 重生：0 + 1 (The Eternal)
            immortalSeed.style.transition = 'opacity 3s ease';
            immortalSeed.style.opacity = '1'; // 菩提心再次浮現

            await sleep(2500);
            document.getElementById('profound-text').style.opacity = '1'; 

            // 停留 9 秒
            await sleep(9000); 
            
            console.log("一真法界圓滿，自動歸向道場");
            navigateTo('index.html?screen=3'); 
        }

        function navigateTo(url) {
            document.getElementById('page-curtain').style.opacity = '1';
            setTimeout(() => { window.location.href = url; }, 800);
        }

        window.addEventListener('load', runZenEngine);
    </script>
</body>
</html>
