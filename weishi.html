<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>唯識之旅 ． 輪迴矩陣</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --cyan: #9fdfc8; 
            --bg-deep: #030303;
        }

        body { 
            margin: 0; background: var(--bg-deep); color: #eee; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; overflow-x: hidden; user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* 換頁黑幕 */
        #page-curtain { position: fixed; inset: 0; background: #000; z-index: 999999; pointer-events: none; transition: opacity 0.8s ease-in-out; opacity: 1; }

        /* 頂部導航 */
        .top-bar {
            width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(3,3,3,0.9), transparent); z-index: 100; position: fixed; top: 0;
        }
        .nav-btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.4); 
            color: var(--gold); padding: 8px 16px; border-radius: 25px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; 
            display: flex; align-items: center; gap: 6px; cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .nav-btn:active { background: rgba(212,175,55,0.2); border-color: var(--solid-gold); transform: scale(0.95); }

        /* 標題區 */
        .header-title { margin-top: 80px; text-align: center; z-index: 10; padding: 0 20px; }
        .header-title h1 { color: var(--gold); font-size: 1.6rem; letter-spacing: 6px; margin: 0; font-weight: normal; text-shadow: 0 0 15px rgba(212,175,55,0.5); }
        .header-title p { color: rgba(255,255,255,0.5); font-size: 0.85rem; letter-spacing: 3px; margin-top: 10px; }

        /* 核心 SVG 矩陣畫布 */
        .matrix-container { position: relative; width: 100%; max-width: 500px; height: 600px; margin-top: 10px; }
        svg { width: 100%; height: 100%; overflow: visible; }

        /* 動畫定義 */
        .pulse-slow { animation: pulse 4s infinite alternate ease-in-out; }
        .pulse-fast { animation: pulse 2s infinite alternate ease-in-out; }
        @keyframes pulse { 0% { opacity: 0.4; filter: drop-shadow(0 0 2px var(--gold)); } 100% { opacity: 1; filter: drop-shadow(0 0 15px var(--solid-gold)); } }

        .data-flow { stroke-dasharray: 4 8; animation: flow 20s linear infinite; }
        @keyframes flow { to { stroke-dashoffset: -1000; } }
        
        .bypass-flow { stroke-dasharray: 6 12; animation: flow-fast 8s linear infinite; filter: drop-shadow(0 0 8px var(--gold)); }
        @keyframes flow-fast { to { stroke-dashoffset: -500; } }

        /* 人形輪廓打光 */
        .person-outline { filter: drop-shadow(0 0 5px rgba(159,223,200,0.3)); animation: person-breath 6s infinite alternate ease-in-out; }
        @keyframes person-breath { 0% { opacity: 0.5; stroke-width: 1.5; } 100% { opacity: 0.8; stroke-width: 2; } }

        /* 資訊卡片區 */
        .info-panel {
            width: 90%; max-width: 600px; background: rgba(15, 15, 18, 0.85); border: 1px solid rgba(212,175,55,0.3);
            border-radius: 16px; padding: 25px; margin-bottom: 50px; z-index: 10;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
        }
        .info-title { color: var(--solid-gold); font-size: 1.1rem; letter-spacing: 2px; font-weight: bold; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .info-text { color: #ccc; font-size: 0.95rem; line-height: 1.8; text-align: justify; }

    </style>
</head>
<body>

    <div id="page-curtain"></div>

    <div class="top-bar">
        <div class="nav-btn" onclick="navigateTo('index.html')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            歸向彌陀
        </div>
        <div class="nav-btn" onclick="navigateTo('huayan.html')">
            華嚴世界
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        </div>
    </div>

    <div class="header-title">
        <h1>唯識之旅 ‧ 輪迴矩陣</h1>
        <p>探索科學與心識的終極奧祕</p>
    </div>

    <div class="matrix-container">
        <svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="person-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="rgba(159,223,200,0.8)" />
                    <stop offset="80%" stop-color="rgba(159,223,200,0.1)" />
                    <stop offset="100%" stop-color="transparent" />
                </linearGradient>
                <pattern id="hex-grid" width="40" height="69.282" patternUnits="userSpaceOnUse">
                    <path d="M40 17.32l-20 11.547L0 17.32V-5.774l20-11.547L40-5.774V17.32zm0 46.188l-20 11.548-20-11.548V40.414L20 28.867l20 11.547v23.094z" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
                </pattern>
            </defs>

            <rect x="0" y="0" width="400" height="350" fill="url(#hex-grid)" />

            <g transform="translate(200, 560)">
                
                <path d="M 0,-160 C -18,-160 -32,-146 -32,-128 C -32,-110 -18,-96 0,-96 C 18,-96 32,-110 32,-128 C 32,-146 18,-160 0,-160 Z 
                         M 0,-88 C -40,-88 -72,-56 -72,-16 L -72,0 L 72,0 L 72,-16 C 72,-56 40,-88 0,-88 Z" 
                      fill="url(#person-grad)" stroke="var(--cyan)" stroke-width="1.8" class="person-outline"/>
                
                <circle cx="0" cy="-135" r="3.5" fill="#fff" class="pulse-fast" filter="drop-shadow(0 0 5px #fff)"/> <circle cx="-14" cy="-125" r="2.8" fill="var(--cyan)" /> <circle cx="14" cy="-120" r="2.2" fill="var(--cyan)" /> <path d="M0 -135 L-14 -125 M0 -135 L14 -120" fill="none" stroke="rgba(159,223,200,0.6)" stroke-width="0.8"/>
                
                <text x="0" y="-175" text-anchor="middle" fill="rgba(159,223,200,0.9)" font-size="11" letter-spacing="1">前六識肉身載體</text>
            </g>

            <path d="M200 390 C180 320, 220 230, 200 130" fill="none" stroke="rgba(212,175,55,0.7)" stroke-width="2" class="data-flow"/>
            <path d="M200 390 C230 300, 170 200, 200 130" fill="none" stroke="rgba(212,175,55,0.3)" stroke-width="1" class="data-flow" style="animation-duration: 15s;"/>
            
            <text x="215" y="270" fill="rgba(212,175,55,0.8)" font-size="10" letter-spacing="2">第七末那識</text>
            <text x="215" y="285" fill="rgba(212,175,55,0.6)" font-size="9" letter-spacing="1">(恆審思量我相隨)</text>

            <g transform="translate(200, 130)">
                <circle cx="0" cy="0" r="28" fill="none" stroke="var(--solid-gold)" stroke-width="1.2" class="pulse-slow"/>
                <circle cx="0" cy="0" r="18" fill="rgba(212,175,55,0.1)" stroke="var(--gold)" stroke-width="1.5" stroke-dasharray="2 5"/>
                <circle cx="0" cy="0" r="5" fill="#fff" filter="drop-shadow(0 0 10px var(--gold))"/>
                
                <path d="M0 -28 L0 -70 M24 -14 L55 -35 M-24 -14 L-55 -35 M24 14 L55 35 M-24 14 L-55 35 M0 28 L0 70" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
                <circle cx="0" cy="-70" r="2.5" fill="rgba(255,255,255,0.3)"/><circle cx="55" cy="-35" r="2.5" fill="rgba(255,255,255,0.3)"/><circle cx="-55" cy="-35" r="2.5" fill="rgba(255,255,255,0.3)"/>
                
                <text x="0" y="-45" text-anchor="middle" fill="var(--gold)" font-size="12" letter-spacing="3" font-weight="bold">第八阿賴耶識</text>
                <text x="0" y="-90" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9" letter-spacing="4">宇宙量子記憶矩陣</text>
            </g>

            <path d="M200 390 Q 360 300 325 90" fill="none" stroke="var(--gold)" stroke-width="2.5" class="bypass-flow"/>
            
            <g transform="translate(325, 90)">
                <circle cx="0" cy="0" r="9" fill="#fff" filter="drop-shadow(0 0 15px #fff) drop-shadow(0 0 35px var(--solid-gold))"/>
                <path d="M0 -18 L0 18 M-18 0 L18 0" stroke="#fff" stroke-width="1.2" opacity="0.8"/>
                <text x="0" y="-25" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" letter-spacing="2" filter="drop-shadow(0 0 5px var(--solid-gold))">極樂中繼站</text>
            </g>

        </svg>
    </div>

    <div class="info-panel">
        <div class="info-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            科學實相與輪迴之謎
        </div>
        <div class="info-text">
            法海浩瀚，唯佛與佛乃能究盡。本文僅為一介在家居士，依經教邏輯與祖師大德之註疏，試圖探求如來真實義之修學略影。若有未盡或錯漏之處，皆屬個人智識之侷限，祈願三寶加被，同修共鑒。
            <br><br>
            (總工程師，這裡是保留給您注入 100 分法理的空間。)
        </div>
    </div>

    <script>
        // 平滑換頁邏輯
        window.addEventListener('load', () => {
            const curtain = document.getElementById('page-curtain');
            if(curtain) curtain.style.opacity = '0';
        });

        function navigateTo(url) {
            document.getElementById('page-curtain').style.opacity = '1';
            setTimeout(() => { window.location.href = url; }, 800);
        }
    </script>
</body>
</html>
