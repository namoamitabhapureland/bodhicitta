<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>唯識之旅 ． 建構中</title>
    <style>
        body {
            margin: 0; background-color: #030303; color: #f3e5ab;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; text-align: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .icon { 
            margin-bottom: 25px; opacity: 0.8; 
            animation: pulse 3s infinite alternate ease-in-out;
        }
        @keyframes pulse {
            0% { filter: drop-shadow(0 0 2px rgba(212,175,55,0.4)); transform: scale(0.95); }
            100% { filter: drop-shadow(0 0 15px rgba(212,175,55,0.8)); transform: scale(1.05); }
        }
        .title { 
            font-size: 1.5rem; letter-spacing: 6px; color: #d4af37; 
            margin-bottom: 15px; text-shadow: 0 0 10px rgba(212,175,55,0.3);
        }
        .subtitle { 
            font-size: 0.95rem; letter-spacing: 3px; color: rgba(255,255,255,0.6); 
            line-height: 2; margin-bottom: 40px;
        }
        .back-btn {
            padding: 12px 30px; border: 1px solid rgba(212,175,55,0.4);
            border-radius: 30px; color: #f3e5ab; cursor: pointer; text-decoration: none;
            font-size: 0.95rem; letter-spacing: 2px; transition: 0.3s;
            background: rgba(212,175,55,0.05); backdrop-filter: blur(5px);
        }
        .back-btn:active { 
            background: rgba(212,175,55,0.2); transform: scale(0.95); border-color: #d4af37;
        }
    </style>
</head>
<body>

    <svg class="icon" width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="1.2">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
        <circle cx="12" cy="12" r="10" stroke-dasharray="2 4" opacity="0.5"/>
    </svg>

    <div class="title">法界醞釀中</div>
    
    <div class="subtitle">
        唯識之旅 ． 輪迴之謎<br>
        <span style="font-size: 0.8rem; color: rgba(255,255,255,0.4);">法寶正待因緣具足，請行者先行積累資糧</span>
    </div>

    <a href="index.html" class="back-btn">返回功德林</a>

</body>
</html>
