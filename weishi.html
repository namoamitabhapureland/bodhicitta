<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>唯識之旅 ． 建構中</title>
    <style>
        body {
            margin: 0; background-color: #030303; color: #f3e5ab;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; text-align: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .icon { 
            margin-bottom: 25px; opacity: 0.85; 
            animation: pulse 3s infinite alternate ease-in-out;
        }
        @keyframes pulse {
            0% { filter: drop-shadow(0 0 5px rgba(212,175,55,0.3)); transform: scale(0.95); }
            100% { filter: drop-shadow(0 0 20px rgba(212,175,55,0.7)); transform: scale(1.05); }
        }
        .title { 
            font-size: 1.5rem; letter-spacing: 6px; color: #d4af37; 
            margin-bottom: 15px; text-shadow: 0 0 10px rgba(212,175,55,0.3);
        }
        .subtitle { 
            font-size: 0.95rem; letter-spacing: 3px; color: rgba(255,255,255,0.6); 
            line-height: 2; margin-bottom: 45px;
        }
        .back-btn {
            padding: 14px 35px; border: 1px solid rgba(212,175,55,0.5);
            border-radius: 30px; color: #f3e5ab; cursor: pointer; text-decoration: none;
            font-size: 0.95rem; letter-spacing: 3px; transition: 0.3s;
            background: linear-gradient(135deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0) 100%);
            backdrop-filter: blur(5px);
        }
        .back-btn:active { 
            background: rgba(212,175,55,0.25); transform: scale(0.95); border-color: #d4af37;
        }
    </style>
</head>
<body>

    <svg class="icon" width="60" height="60" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="weishi-gold" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f3e5ab"/>
                <stop offset="50%" stop-color="#d4af37"/>
                <stop offset="100%" stop-color="#b8860b"/>
            </linearGradient>
        </defs>
        <circle cx="12" cy="12" r="10" fill="none" stroke="url(#weishi-gold)" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.8"/>
        <path d="M3 12 C3 12 7 5 12 5 C17 5 21 12 21 12 C21 12 17 19 12 19 C7 19 3 12 3 12 Z" fill="none" stroke="url(#weishi-gold)" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="3.5" fill="#020202" stroke="url(#weishi-gold)" stroke-width="1.2"/>
        <circle cx="12" cy="12" r="1.5" fill="#f3e5ab"/>
    </svg>

    <div class="title">法界醞釀中</div>
    
    <div class="subtitle">
        唯識之旅 ． 探輪迴之謎<br>
        <span style="font-size: 0.8rem; color: rgba(255,255,255,0.4);">法寶正待因緣具足，請行者先行積累資糧</span>
    </div>

    <a href="index.html？screen=3" class="back-btn">返回 ． 彌陀系統</a>

</body>
</html>
