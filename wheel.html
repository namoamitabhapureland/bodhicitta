<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華藏調頻 ‧ 轉法輪樞紐</title>
    <style>
        /* ✨ 大智已將 --cyan 換成明亮玉石色 (#9fdfc8)，徹底解決暗沉問題 ✨ */
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --gold-dark: #b8860b; --cyan: #9fdfc8; --bg-deep: #020202; }
        body { margin: 0; padding: 0; height: 100vh; background: var(--bg-deep); color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: "PingFang TC", "Microsoft JhengHei", serif; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }

        /* ✨ 換頁黑幕 ✨ */
        #page-curtain { position: fixed; inset: 0; background: #000; z-index: 999999; pointer-events: none; transition: opacity 0.8s ease-in-out; opacity: 1; }

        /* ✨ 左右對稱：高級玻璃金框導航按鈕 ✨ */
        .top-nav-btn {
            position: absolute; top: 20px; 
            background: rgba(0, 0, 0, 0.6); /* 透明黑底 */
            border: 1px solid rgba(212,175,55,0.6); /* 統一實線金框 */
            color: var(--gold); /* 統一明亮金字 */
            padding: 8px 16px; border-radius: 25px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; 
            display: flex; align-items: center; gap: 6px; z-index: 100; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.8), inset 0 0 10px rgba(212,175,55,0.15); 
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .top-nav-btn:active { transform: scale(0.95); background: rgba(212,175,55,0.25); border-color: var(--solid-gold); box-shadow: 0 0 20px rgba(212,175,55,0.5); }
        
        #back-btn { left: 20px; }
        #huayan-btn { right: 20px; }
        .mini-earth { width: 16px; height: 16px; filter: drop-shadow(0 0 4px rgba(243,229,171,0.5)); }

        /* ======= 法輪本體 ======= */
        #wheel-container { position: relative; width: 340px; height: 340px; cursor: pointer; filter: drop-shadow(0 0 15px rgba(212,175,55,0.25)); transition: filter 0.3s ease, opacity 1s, transform 1s; }
        #wheel-container:active { filter: drop-shadow(0 0 35px rgba(243,229,171,0.7)); }
        #dharma-wheel { width: 100%; height: 100%; transform-origin: center; transition: transform 2.8s cubic-bezier(0.1, 0.9, 0.2, 1); will-change: transform; }
        .spinning-glow { animation: wheel-glow 2.8s ease-out; }
        @keyframes wheel-glow { 0% { filter: drop-shadow(0 0 70px var(--solid-gold)) brightness(1.2); } 100% { filter: drop-shadow(0 0 15px rgba(212,175,55,0.25)); brightness(1); } }

        /* ======= 文字引導區 ======= */
        #instruction-text { margin-top: 40px; font-size: 1.15rem; color: var(--gold); letter-spacing: 5px; text-align: center; height: 65px; transition: opacity 0.5s; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .sub-text { font-size: 0.85rem; color: var(--cyan); letter-spacing: 2px; margin-top: 8px; opacity: 0.8; }

        /* ======= 結果區排版 ======= */
        #result-layout { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 94%; max-width: 420px; display: flex; align-items: stretch; justify-content: center; gap: 12px; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; z-index: 100; }
        #result-layout.show { opacity: 1; pointer-events: auto; }

        /* 金剛能量法棒 */
        #energy-bar-wrap { height: 320px; width: 75px; position: relative; display: flex; justify-content: center; flex-shrink: 0; }
        .floating-score { position: absolute; left: 62px; color: #fff; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; text-shadow: 0 0 10px var(--solid-gold); transition: top 2s cubic-bezier(0.2, 0.8, 0.2, 1), color 1s; white-space: nowrap; }

        /* 心理學籤詩卡片 */
        #hwkins-card { flex: 1; min-width: 0; background: rgba(8,8,8,0.96); border-radius: 16px; padding: 25px 15px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 1s; max-height: 80vh; overflow-y: auto; scrollbar-width: none; }
        .hwkins-title { font-size: clamp(1rem, 4vw, 1.15rem); letter-spacing: 3px; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; width: 100%; font-weight: bold; }
        .hwkins-desc { color: #ddd; font-size: clamp(0.85rem, 3.5vw, 0.95rem); line-height: 1.6; text-align: justify; margin-bottom: 15px; word-wrap: break-word; }
        .hwkins-action { font-weight: bold; letter-spacing: 1px; font-size: clamp(0.85rem, 3.5vw, 0.9rem); padding: 12px 10px; background: rgba(255,255,255,0.05); border-radius: 8px; width: 100%; text-align: left; word-wrap: break-word; }
        
        #close-btn { margin-top: 15px; padding: 10px 25px; background: transparent; border: 1px solid var(--cyan); color: var(--cyan); border-radius: 25px; cursor: pointer; letter-spacing: 3px; font-size: 0.85rem; transition: 0.3s; flex-shrink: 0; }
        #close-btn:active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }

        /* 擋客法語 */
        #wheel-blocked-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--gold); font-size: 1.2rem; letter-spacing: 4px; line-height: 2.5; text-align: center; opacity: 0; transition: 1.5s; text-shadow: 0 0 15px var(--solid-gold); pointer-events: none; display: none; }

        /* 碎片動畫層 */
        #fragment-theater { position: fixed; inset: 0; background: #000; z-index: 99999; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 1s ease; pointer-events: none; }
        .frag-zen-text { position: absolute; top: 50%; width: 100%; text-align: center; color: var(--gold); font-size: 1.3rem; letter-spacing: 6px; opacity: 0; transition: opacity 3s; text-shadow: 0 0 20px var(--solid-gold); transform: translateY(-50%); }
        .f-bodhi { position: absolute; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; opacity: 0; transform: scale(0.5); }
        .f-ring { position: absolute; width: 40vmin; height: 40vmin; border-radius: 50%; border: 2px solid rgba(243,229,171,0.8); box-shadow: 0 0 75px rgba(212,175,55,0.7), inset 0 0 45px rgba(212,175,55,0.5); opacity: 0; transform: scale(0.5); }
        .f-pillar { position: absolute; width: 6px; height: 50vmin; background: linear-gradient(to top, rgba(255,255,255,0.6) 0%, rgba(212,175,55,1) 40%, rgba(100,50,0,0.9) 100%); box-shadow: 0 0 50px var(--solid-gold); opacity: 0; transform: scale(0.5); }
    </style>
</head>
<body>

    <div id="page-curtain"></div>

    <div id="back-btn" class="top-nav-btn" onclick="navigateTo('index.html')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        回彌陀系統
    </div>

    <div id="huayan-btn" class="top-nav-btn" onclick="navigateTo('huayan.html')">
        去華藏世界
        <svg class="mini-earth" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="earth-glow" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#f3e5ab" stop-opacity="0.6"/><stop offset="100%" stop-color="#000000" stop-opacity="0.8"/></radialGradient>
                <linearGradient id="earth-lines" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f3e5ab"/><stop offset="100%" stop-color="#d4af37"/></linearGradient>
            </defs>
            <circle cx="12" cy="12" r="10" fill="url(#earth-glow)" stroke="url(#earth-lines)" stroke-width="1.5"/>
            <ellipse cx="12" cy="12" rx="4.5" ry="10" fill="none" stroke="url(#earth-lines)" stroke-width="1" opacity="0.75" transform="rotate(30 12 12)"/>
            <ellipse cx="12" cy="12" rx="10" ry="4.5" fill="none" stroke="url(#earth-lines)" stroke-width="1" opacity="0.75" transform="rotate(-30 12 12)"/>
        </svg>
    </div>

    <div id="wheel-container" onclick="triggerSpin()">
        <svg id="dharma-wheel" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f3e5ab" /><stop offset="50%" stop-color="#d4af37" /><stop offset="100%" stop-color="#b8860b" />
                </linearGradient>
                <pattern id="petal-pattern" patternUnits="userSpaceOnUse" width="12" height="24">
                    <path d="M 6 0 C 10 6, 10 18, 6 24 C 2 18, 2 6, 6 0 Z" fill="none" stroke="rgba(243,229,171,0.4)" stroke-width="0.5"/>
                </pattern>
            </defs>
            <circle cx="140" cy="140" r="130" fill="rgba(212,175,55,0.02)" />
            <g id="spokes-layer" transform="translate(140,140)"></g>
            <circle cx="140" cy="140" r="110" fill="none" stroke="url(#gold-grad)" stroke-width="5" />
            <circle cx="140" cy="140" r="98" fill="none" stroke="rgba(212,175,55,0.5)" stroke-width="1.5" />
            <g id="outer-bumps" transform="translate(140,140)"></g>
            <circle cx="140" cy="140" r="34" fill="var(--bg-deep)" stroke="url(#gold-grad)" stroke-width="4" />
            <g id="center-mandala" transform="translate(140,140)"></g>
            <circle cx="140" cy="140" r="12" fill="url(#gold-grad)" />
        </svg>
    </div>

    <div id="instruction-text">
        <div id="main-text">輕觸法輪 ‧ 啟動調頻</div>
        <div id="sub-text" class="sub-text">碾摧無明不善，轉念一觸即發</div>
    </div>

    <div id="wheel-blocked-msg">今日法界機緣已滿<br>菩提心恆常不滅<br>請行者安住當下，明日再啟</div>

    <div id="result-layout">
        <div id="energy-bar-wrap">
            <svg viewBox="0 0 60 320" style="width:100%; height:100%; filter: drop-shadow(0 0 10px rgba(212,175,55,0.2));">
                <path d="M 15 285 Q 30 310 45 285 L 38 270 L 22 270 Z" fill="url(#gold-grad)" />
                <path d="M 22 270 Q 30 260 38 270 Z" fill="#020202" />
                <path d="M 15 35 Q 30 10 45 35 L 38 50 L 22 50 Z" fill="url(#gold-grad)" />
                <path d="M 22 50 Q 30 60 38 50 Z" fill="#020202" />
                <rect x="25" y="50" width="10" height="220" fill="rgba(255,255,255,0.05)" stroke="rgba(212,175,55,0.3)" stroke-width="0.5" rx="2" />
                <rect id="bar-fill" x="26" y="269" width="8" height="0" fill="rgba(160,40,40,0.9)" rx="1" style="transition: all 2s cubic-bezier(0.2, 0.8, 0.2, 1);" />
            </svg>
            <div id="float-score" class="floating-score" style="top: 260px;">0 Hz</div>
        </div>

        <div id="hwkins-card">
            <div class="hwkins-title" id="hc-title">今日法界觀照</div>
            <div class="hwkins-desc" id="hc-desc"></div>
            <div class="hwkins-action" id="hc-action"></div>
            <button id="close-btn" onclick="resetWheel()">收攝心念</button>
        </div>
    </div>

    <div id="fragment-theater">
        <div id="f-bodhi" class="f-bodhi"></div>
        <div id="f-ring" class="f-ring"></div>
        <div id="f-pillar" class="f-pillar"></div>
        <div id="f-text" class="frag-zen-text"></div>
    </div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
        
        window.onload = () => {
            document.getElementById('page-curtain').style.opacity = '0';
            buildWheelSVG();
            checkDailyStatus();
        };

        function navigateTo(url) {
            document.getElementById('page-curtain').style.opacity = '1';
            setTimeout(() => { window.location.href = url; }, 800);
        }

        let db;
        try { db = JSON.parse(localStorage.getItem('PX_V15.0')); } catch(e) {}
        if (!db || typeof db !== 'object') db = {}; 
        if (db.hwkinsEnergyTotal === undefined) db.hwkinsEnergyTotal = 0;
        if (db.dailyWheelCount === undefined) db.dailyWheelCount = 0;
        if (db.lastWheelDate === undefined) db.lastWheelDate = "";
        
        function save() { localStorage.setItem('PX_V15.0', JSON.stringify(db)); }

        function checkDailyStatus() {
            const today = new Date().toLocaleDateString();
            if (db.lastWheelDate !== today) {
                db.dailyWheelCount = 0; db.lastWheelDate = today; save();
            }
            if (db.dailyWheelCount >= 1) {
                document.getElementById('wheel-container').style.display = 'none';
                document.getElementById('instruction-text').style.display = 'none';
                document.getElementById('wheel-blocked-msg').style.display = 'block';
                setTimeout(()=> { document.getElementById('wheel-blocked-msg').style.opacity = '1'; }, 100);
            }
        }

        let audioCtx;
        function initAudio() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playTick() {
            if(!audioCtx) return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(120, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.08);
        }

        function buildWheelSVG() {
            const svgNS = "http://www.w3.org/2000/svg";
            const spokesG = document.getElementById('spokes-layer'); spokesG.innerHTML="";
            for(let i=0; i<8; i++) {
                const g = document.createElementNS(svgNS, "g"); g.setAttribute("transform", `rotate(${(360/8)*i})`);
                const beam = document.createElementNS(svgNS, "rect"); beam.setAttribute("x", "-7"); beam.setAttribute("y", "-110"); beam.setAttribute("width", "14"); beam.setAttribute("height", "76"); beam.setAttribute("fill", "url(#gold-grad)"); beam.setAttribute("rx", "3"); 
                const pattern = document.createElementNS(svgNS, "rect"); pattern.setAttribute("x", "-7"); pattern.setAttribute("y", "-110"); pattern.setAttribute("width", "14"); pattern.setAttribute("height", "76"); pattern.setAttribute("fill", "url(#petal-pattern)");
                g.appendChild(beam); g.appendChild(pattern); spokesG.appendChild(g);
            }
            const bumpsG = document.getElementById('outer-bumps'); bumpsG.innerHTML="";
            for(let i=0; i<8; i++) {
                const g = document.createElementNS(svgNS, "g"); g.setAttribute("transform", `rotate(${(360/8)*i}) translate(0, -110)`);
                const orn = document.createElementNS(svgNS, "path"); orn.setAttribute("fill", "url(#gold-grad)");
                if(i % 2 === 0) orn.setAttribute("d", "M -18,0 C -18,-8 -12,-10 -8,-7 C -5,-16 5,-16 8,-7 C 12,-10 18,-8 18,0 Z"); else orn.setAttribute("d", "M -14,0 C -14,-10 -6,-15 0,-16 C 6,-15 14,-10 14,0 Z");
                g.appendChild(orn); bumpsG.appendChild(g);
            }
            const centerG = document.getElementById('center-mandala'); centerG.innerHTML="";
            for(let j=0; j<8; j++) {
                const path = document.createElementNS(svgNS, "path"); path.setAttribute("d", `M0 -26 C 13 -17.8, 13 7.8, 0 26 C -13 7.8, -13 -17.8, 0 -26`);
                path.setAttribute("transform", `rotate(${(360/8)*j})`); path.setAttribute("stroke", "rgba(212,175,55,0.7)"); path.setAttribute("fill", "rgba(243,229,171,0.15)"); centerG.appendChild(path);
            }
        }

        const hwkinsDB = [
            { 
                min: 0, max: 200, color: "rgba(160, 40, 40, 0.9)", border: "#ff4d4d", 
                contents: [
                    { desc: "法界之鏡映照出一絲隱微的波動。今日在某個瞬間，您的潛意識或許會升起不易察覺的急躁或擔憂。若逢此境，正是絕佳的覺察契機。", action: "【今日處方】當情緒即將湧現時，請試著深呼吸三次，延遲五秒開口。放過別人，就是放過自己。" },
                    { desc: "系統捕捉到您的心頻似乎正承載著些許壓力。大腦可能正在為「還未發生」的未來感到恐懼，這容易消耗您的生命動能。", action: "【今日處方】請在覺得焦慮時，把注意力完全拉回「腳下的這一步」。只專注做好眼前正在做的這件小事。" },
                    { desc: "今日您的潛意識中，或許隱藏著一絲對外在事物的攀比或不平。在法界看來，這可能是一團正在消耗您的虛妄雲霧。", action: "【今日處方】請在心中找出一件「自己目前擁有、且值得感恩」的微小事物。將心念定錨於感恩，雲霧自散。" },
                    { desc: "法界之鏡微光閃爍，提醒您今日的心場或許較容易與周遭產生摩擦。一點小事可能就會挑動您內在的防禦機制。", action: "【今日處方】若今日遇到不順眼的人事物，請在心中默念三聲佛號，並喝一杯溫水，暫時離開現場三分鐘。" },
                    { desc: "今日的您，或許在精神或身體上感到有些疲憊與無力。勉強支撐有時反而會讓心頻持續下降。", action: "【今日處方】請允許自己今天「暫時什麼都不做」。找個空檔閉目養神十分鐘，把這十分鐘當作最純粹的放下。" }
                ]
            },
            { 
                min: 201, max: 400, color: "rgba(210, 120, 30, 0.9)", border: "#ffa64d", 
                contents: [
                    { desc: "隨喜！法界之鏡顯示，您今日心場十分敞開，有極大的機會展現出接納萬物的勇氣與彈性。能量正由負轉正，生機盎然。", action: "【今日處方】請在今日試著主動且不求回報地幫助一個人，或真誠讚美身邊的人，傳遞這份正向動能。" },
                    { desc: "您今日的頻率似乎醞釀著「願意思考與解決問題」的優良彈性。過往覺得困難的事，今天看來或許不過爾爾。", action: "【今日處方】請把握這份動能，試著將一個擱置已久的小問題，在今日動手完成它。" },
                    { desc: "法界映照出您今日的心念中，可能正帶著一股溫暖的寬容。這正是菩薩「無緣大慈」的微小火苗。", action: "【今日處方】今日若有人對您犯了無心的小過錯，請用一個微笑與一句「沒關係」來化解。您的寬容會是他的救贖。" },
                    { desc: "您的頻率似乎有機會突破停滯，展現出「主動出擊」的光芒。這股力量若用在善處，能迅速累積菩提資糧。", action: "【今日處方】請對今日為您服務的人（如店員、司機）說一句真誠且帶有溫度的「謝謝您，辛苦了」。" },
                    { desc: "今日您的心場十分穩健，具備了「承擔」的力量。這股頻率能讓周遭的人感到安心。", action: "【今日處方】若今日遇到突發的工作或繁瑣的家務，請試著不帶一句抱怨地將遇到它完成。將此視為忍辱與精進的道場。" }
                ]
            },
            { 
                min: 401, max: 600, color: "rgba(40, 140, 160, 0.9)", border: "#4dd2ff", 
                contents: [
                    { desc: "極佳！今日您的心頻有極大的空間與法界的『清淨』產生共振。您可能會發現看許多事物都特別順眼，內在流淌著無條件的喜悅。", action: "【今日處方】切莫執著此份寧靜。請在睡前默默祝願一位『有隔閡的人』，願他也得此平靜。一念迴向即是法界。" },
                    { desc: "太美好了！您今日極有機會散發出如同琉璃般清透的頻率。若能保持，便能超越個人的得失，生起對萬物的慈悲共感。", action: "【今日處方】走在路上若看見流浪動物、老弱婦孺，請在心中默默為他們念誦三聲佛號，祝願他們早脫輪迴。" },
                    { desc: "法界映照出您今日的內在似乎極其「順流」。這種潛在的高頻率，讓您比較不容易被外界的順逆境界所牽動。", action: "【今日處方】今日若遇到原本會讓人生氣的阻礙，請試著在心中微笑，將其視為老天賜予的定心測驗。" },
                    { desc: "讚歎！您的頻率指標正趨近於「愛」的層級。今日的您非常有潛力展現出不帶條件、如同陽光普照般的善意。", action: "【今日處方】請不要將這份高頻能量獨享。請透過文字或聲音，真誠地讚美或鼓勵一位正處於低潮的朋友。" },
                    { desc: "這是一個積累無漏功德的絕佳時刻。您今日的心量，似乎足以包容整個法界。", action: "【今日處方】今晚就寢前，請作廣大觀想。將今日所有的善念與喜悅，毫無保留地迴向給一切正在受苦的眾生。" }
                ]
            },
            { 
                min: 601, max: 1000, color: "rgba(255, 255, 255, 0.95)", border: "#ffffff", 
                contents: [
                    { desc: "不可思議。法界映照出您當下的頻率似乎極為空靈。若能安住於此，將有機會超越世俗對立，與無量光佛本體相印。", action: "【今日處方】無所求，無所住。不因高頻而歡喜，不因低谷而排斥。只需安住當下，如如不動。" },

                    { desc: "您今日抽到的不是分數，而是一面沒有邊框的鏡子。它提醒您，真正的覺醒，在於看破一切「求取開悟」的執著。", action: "【今日處方】放下對「修行」本身的刻意追求。餓了吃飯，睏了睡覺，每一個動作都清清楚楚，這即是最高級的修行。" }

        let currentTurn = 0; let isSpinning = false; let currentRotation = 0; let tickInterval;

        async function triggerSpin() {
            if(isSpinning || currentTurn >= 3) return;
            initAudio(); isSpinning = true; currentTurn++;
            
            const wheel = document.getElementById('dharma-wheel');
            const mainText = document.getElementById('main-text');
            const subText = document.getElementById('sub-text');
            
            wheel.classList.remove('spinning-glow'); void wheel.offsetWidth; wheel.classList.add('spinning-glow');
            
            let tickDelay = 80;
            tickInterval = setInterval(() => { playTick(); tickDelay += 10; }, tickDelay);
            setTimeout(() => clearInterval(tickInterval), 2500);

            if(currentTurn === 1) { currentRotation += 1080; mainText.innerText = "初轉 ‧ 阿含"; subText.innerText = "碾摧粗重無明不善"; }
            else if (currentTurn === 2) { currentRotation += 1440; mainText.innerText = "二轉 ‧ 般若"; subText.innerText = "照見五蘊皆空"; }
            else if (currentTurn === 3) { currentRotation += 1800; mainText.innerText = "三轉 ‧ 唯識歸一"; subText.innerText = "萬法唯心，法界共振"; }
            
            wheel.style.transform = `rotate(${currentRotation}deg)`;
            await sleep(2800); clearInterval(tickInterval); isSpinning = false;

            if(currentTurn === 3) {
                await sleep(500);
                
                let score = Math.floor(Math.random() * 800) + 50; 
                if(Math.random() < 0.1) score += 200; if(score > 1000) score = 1000;
                
                db.hwkinsEnergyTotal = (db.hwkinsEnergyTotal || 0) + score;
                db.dailyWheelCount = 1; save();
                
                if (db.hwkinsEnergyTotal >= 12000) {
                    db.hwkinsEnergyTotal = 0; save(); 
                    await playFragment(); 
                }
                showEnergyResult(score);
            }
        }

        async function playFragment() {
            const t = document.getElementById('fragment-theater');
            const b = document.getElementById('f-bodhi'); const r = document.getElementById('f-ring'); const p = document.getElementById('f-pillar');
            const zen = document.getElementById('f-text');
            const quotes = ["凡所有相，皆是虛妄", "言語道斷，心行處滅", "無一物中無盡藏", "法本法無法，無法法亦法"];
            zen.innerText = quotes[Math.floor(Math.random() * quotes.length)];
            
            t.style.display = 'flex'; await sleep(50); t.style.opacity = '1';
            let type = Math.floor(Math.random() * 3); 
            
            if(type === 0) { b.style.opacity = '1'; b.style.transform = 'scale(3)'; b.style.boxShadow = '0 0 50px var(--solid-gold)'; await sleep(3000); b.style.opacity = '0'; }
            else if (type === 1) { r.style.transition = 'all 3s'; r.style.opacity = '1'; r.style.transform = 'scale(1.2)'; await sleep(3000); r.style.opacity = '0'; }
            else { p.style.transition = 'all 3s'; p.style.opacity = '1'; p.style.transform = 'scale(1.5)'; await sleep(3000); p.style.opacity = '0'; }

            zen.style.opacity = '1'; await sleep(3000); zen.style.opacity = '0'; await sleep(1000);
            t.style.opacity = '0'; await sleep(1000); t.style.display = 'none';
        }

        function showEnergyResult(score) {
            let preset = hwkinsDB.find(h => score >= h.min && score <= h.max) || hwkinsDB[1];
            let content = preset.contents[Math.floor(Math.random() * preset.contents.length)];
            
            const card = document.getElementById('hwkins-card');
            document.getElementById('hc-title').style.color = preset.border;
            document.getElementById('hc-title').style.textShadow = `0 0 10px ${preset.border}`;
            document.getElementById('hc-desc').innerText = content.desc;
            document.getElementById('hc-action').innerText = content.action;
            document.getElementById('hc-action').style.color = preset.border;
            card.style.boxShadow = `0 0 40px ${preset.color}, inset 0 0 15px #000`;
            card.style.border = `1px solid ${preset.border}`;
            
            document.getElementById('wheel-container').style.transform = 'scale(0.8)';
            document.getElementById('wheel-container').style.opacity = '0.1';
            document.getElementById('instruction-text').style.opacity = '0';
            document.getElementById('result-layout').classList.add('show');
            
            setTimeout(() => {
                const fill = document.getElementById('bar-fill');
                const scoreText = document.getElementById('float-score');
                let percentage = score / 1000; let targetHeight = percentage * 218; let targetY = 269 - targetHeight;
                fill.style.fill = preset.color; fill.style.height = targetHeight + "px"; fill.setAttribute("y", targetY);
                let textTop = 260 - (percentage * 210); scoreText.style.top = textTop + "px";
                scoreText.style.color = preset.border; scoreText.innerText = score + " Hz";
            }, 500); 
        }

        function resetWheel() {
            document.getElementById('result-layout').classList.remove('show');
            setTimeout(checkDailyStatus, 1000);
        }
    </script>
