<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一真法界 ． 終極實相</title>
    <style>
        :root { --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; --bg-deep: #000; }
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: var(--bg-deep); color: #fff; display: flex; justify-content: center; align-items: center; -webkit-tap-highlight-color: transparent; user-select: none; perspective: 2000px; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }

        /* ✨ 電影級法理引導字幕 ✨ */
        #cinematic-text {
            position: absolute; top: 15%; width: 100%; text-align: center;
            color: var(--gold); font-size: 1.3rem; letter-spacing: 6px; line-height: 1.8;
            opacity: 0; z-index: 1000; transition: opacity 2s ease-in-out;
            text-shadow: 0 0 20px rgba(212,175,55,0.8), 0 0 10px #000; font-weight: bold;
        }
        .text-sub { font-size: 0.9rem; color: var(--cyan); letter-spacing: 3px; font-weight: normal; margin-top: 10px; }

        /* ======= 1. 菩提明點 ======= */
        .bodhi-seed { position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; z-index: 100; opacity: 0; box-shadow: 0 0 20px #fff, 0 0 40px var(--gold); }
        .intense-pulse { animation: pure-light 4s forwards; }
        @keyframes pure-light {
            0% { transform: scale(0.5); opacity: 0; }
            20% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 50px #fff, 0 0 100px var(--solid-gold); }
            50% { transform: scale(2.5); box-shadow: 0 0 80px #fff, 0 0 150px var(--solid-gold); }
            80% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 50px #fff, 0 0 100px var(--solid-gold); }
            100% { transform: scale(0.1); opacity: 0; }
        }

        #infinite-light { position: absolute; inset: 0; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(243,229,171,0.9) 40%, rgba(212,175,55,0.8) 100%); mix-blend-mode: screen; opacity: 0; pointer-events: none; transition: opacity 2.5s; z-index: 20; }

        /* ======= 2. 【 0 】的神聖光暈 ======= */
        #ring-0 {
            position: absolute; width: 40vmin; height: 40vmin; border-radius: 50%;
            border: 2px solid rgba(243,229,171,0.8);
            box-shadow: 0 0 80px rgba(212,175,55,0.7), inset 0 0 50px rgba(212,175,55,0.5);
            opacity: 0; transform: scale(0.1); z-index: 15; transition: all 4s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        /* ======= 3. 【 1 】的行菩提中脈 ======= */
        #pillar-1 {
            position: absolute; width: 4px; height: 60vmin; 
            background: linear-gradient(to top, rgba(255,255,255,0.2) 0%, rgba(212,175,55,1) 50%, rgba(255,255,255,0.2) 100%); 
            box-shadow: 0 0 40px var(--solid-gold), 0 0 80px rgba(255,255,255,0.8); 
            border-radius: 2px; opacity: 0; transform: scaleY(0); z-index: 15; transition: all 3s cubic-bezier(0.1, 0.8, 0.2, 1);
            transform-origin: center;
        }

        /* ======= 華嚴大世界 3D ======= */
        #huayan-world { position: absolute; inset: 0; opacity: 0; display: none; transition: opacity 3s; z-index: 5; }
        .vairocana-light { position: absolute; inset: 0; background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.08) 0%, rgba(212,175,55,0.02) 40%, transparent 80%); animation: divine-breath 8s infinite alternate; }
        @keyframes divine-breath { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        #universe-container { position: absolute; inset: 0; transform-style: preserve-3d; transform: rotateX(75deg) scale(0.85); }
        #lotus-ocean { position: absolute; top: 65%; left: 50%; transform-style: preserve-3d; animation: slow-spin 45s infinite linear; }
        @keyframes slow-spin { from { transform: rotateZ(0deg); } to { transform: rotateZ(360deg); } }
        
        /* 蓮花與香水海共用樣式 */
        .ocean-rings circle { fill: none; stroke-width: 0.3; }
        .geometric-mandala path { fill: none; stroke-width: 0.5; }
        #standing-lotus { position: absolute; top: 0; left: 0; transform-style: preserve-3d; }
        .petal-3d { position: absolute; bottom: 0; transform-origin: bottom center; transform-style: preserve-3d; }
        .petal-svg { width: 100%; height: 100%; overflow: visible; }
        #world-tower { position: absolute; top: 0; left: 0; transform-style: preserve-3d; }
        .central-beam { position: absolute; top: 0; left: -1px; width: 2px; height: 500px; background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent); transform: rotateX(90deg); transform-origin: top center; box-shadow: 0 0 20px var(--gold); }
        .tier-layer { position: absolute; top: 0; left: 0; transform-style: preserve-3d; }
        .tier-disk { position: absolute; border-radius: 50%; border: 1.5px solid rgba(230,200,100,0.5); background: rgba(230,200,100,0.1); }

        /* ======= 4. 壞與空 ======= */
        #instant-black-screen { position: fixed; inset: 0; background: #000; opacity: 0; z-index: 9990; transition: opacity 0.2s ease-in; }
        #golden-flash { position: fixed; inset: 0; background: #fff; mix-blend-mode: screen; opacity: 0; z-index: 99998; }
        .seed-particle { position: fixed; background: var(--gold); border-radius: 50%; z-index: 99999; filter: drop-shadow(0 0 5px #fff); }

        /* ======= 5. 重生 ======= */
        #immortal-scene { position: fixed; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; background: #000; }
        #profound-text { margin-top: 50px; color: var(--gold); font-size: 1.3rem; letter-spacing: 8px; opacity: 0; transition: opacity 3s; text-shadow: 0 0 15px var(--solid-gold); text-align: center; line-height: 2.2; font-weight: bold; }
    </style>
</head>
<body>

    <div id="cinematic-text"></div>

    <div id="bodhi-dot" class="bodhi-seed"></div>
    <div id="infinite-light"></div>
    
    <div id="ring-0"></div>
    <div id="pillar-1"></div>

    <div id="huayan-world">
        <div class="vairocana-light"></div>
        <div id="universe-container">
            <div id="lotus-ocean">
                <svg style="position:absolute; width:800px; height:800px; left:-400px; top:-400px; filter:drop-shadow(0 0 15px rgba(212,175,55,0.2));" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <g id="ocean-rings" class="ocean-rings"></g>
                    <g id="base-mandala" class="geometric-mandala"></g>
                </svg>
                <div id="standing-lotus"></div>
                <div id="world-tower"><div class="central-beam"></div></div>
            </div>
        </div>
    </div>

    <div id="instant-black-screen"></div>
    <div id="golden-flash"></div>

    <div id="immortal-scene">
        <div id="immortal-dot" class="bodhi-seed" style="box-shadow: 0 0 30px #fff, 0 0 60px var(--solid-gold);"></div>
        <div id="profound-text">菩提之心 ． 歷劫不滅<br><span style="font-size:0.9rem; color:var(--cyan); letter-spacing:4px; font-weight:normal;">一真法界 ． 本自如如</span></div>
    </div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
        
        function updateSubtitle(mainText, subText) {
            const txtEl = document.getElementById('cinematic-text');
            txtEl.style.opacity = 0;
            setTimeout(() => {
                txtEl.innerHTML = `${mainText}<br><div class="text-sub">${subText}</div>`;
                txtEl.style.opacity = 1;
            }, 1000);
        }
        function hideSubtitle() { document.getElementById('cinematic-text').style.opacity = 0; }

        function buildWorld() {
            // 香水海與底座
            const rings = document.getElementById('ocean-rings');
            for(let i=1; i<=12; i++) {
                let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", "100"); c.setAttribute("cy", "100"); c.setAttribute("r", i*7.5);
                c.setAttribute("stroke", i%2===0 ? "rgba(139,168,156,0.6)" : "rgba(212,175,55,0.6)");
                rings.appendChild(c);
            }
            // 3D 蓮花
            const lotus = document.getElementById('standing-lotus');
            const makePetal = (ang, tilt, w, h, col) => {
                let p = document.createElement('div'); p.className = 'petal-3d';
                p.style.transform = `rotateZ(${ang}deg) rotateX(${tilt}deg)`; p.style.width = `${w}px`; p.style.height = `${h}px`; p.style.left = `-${w/2}px`;
                p.innerHTML = `<svg viewBox="0 0 120 320" class="petal-svg" preserveAspectRatio="none"><path d="M60 320 C60 320, 0 180, 0 80 C0 30, 60 0, 60 0 C60 0, 120 30, 120 80 C120 180, 60 320, 60 320 Z" fill="url(#grad)" stroke="rgba(212,175,55,0.4)" stroke-width="1.5"/><defs><linearGradient id="grad" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="rgba(212,175,55,0.8)"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs></svg>`;
                return p;
            };
            for(let i=0; i<16; i++) lotus.appendChild(makePetal(i*22.5, -25, 120, 300));
            for(let i=0; i<12; i++) lotus.appendChild(makePetal(i*30, -45, 90, 200));

            // 世界塔
            const tower = document.getElementById('world-tower');
            for(let i=1; i<=15; i++) {
                let tg = document.createElement('div'); tg.className = 'tier-layer'; tg.style.transform = `translateZ(${i*30}px)`;
                let r = 20+(i*8); let d = document.createElement('div'); d.className = 'tier-disk';
                d.style.width = `${r*2}px`; d.style.height = `${r*2}px`; d.style.left = `-${r}px`; d.style.top = `-${r}px`;
                tg.appendChild(d); tower.appendChild(tg);
            }
        }

        async function runDharmaEngine() {
            buildWorld();
            const dot = document.getElementById('bodhi-dot');
            const light = document.getElementById('infinite-light');
            const ring = document.getElementById('ring-0');
            const pillar = document.getElementById('pillar-1');
            const world = document.getElementById('huayan-world');

            await sleep(1000);
            updateSubtitle("【 ０ 】", "萬法皆空 ． 中觀之極");
            
            // 點亮無量光
            dot.classList.add('intense-pulse');
            await sleep(2500); 
            light.style.opacity = '1';
            await sleep(2000); light.style.opacity = '0';

            // 展現 0 的圓融
            ring.style.opacity = '1'; ring.style.transform = 'scale(1)';
            await sleep(4000);
            
            // 展現 1 的行願
            updateSubtitle("【 １ 】", "大悲不捨 ． 普賢行願");
            pillar.style.opacity = '1'; pillar.style.transform = 'scaleY(1)';
            await sleep(4000);

            // 0 + 1 融合
            updateSubtitle("０ ＋ １ ＝ 一真", "圓融無礙 ． 華嚴法界");
            ring.style.transform = 'scale(2.5)'; ring.style.opacity = '0';
            pillar.style.transform = 'scaleY(3)'; pillar.style.opacity = '0';
            
            await sleep(1500);
            hideSubtitle();

            // 華嚴世界顯化
            world.style.display = 'block';
            await sleep(100); world.style.opacity = '1';
            await sleep(12000); // 讓行者沉浸在華嚴宇宙中轉動

            // --- 壞與空 (系統崩解) ---
            updateSubtitle("成 住 壞 空", "剎那生滅 ． 歸於無相");
            for(let i = 0; i < 400; i++) {
                let dust = document.createElement('div'); dust.className = 'seed-particle';
                let startX = Math.random() * window.innerWidth; let startY = window.innerHeight * 0.8 - Math.random() * window.innerHeight * 0.4; 
                dust.style.left = startX + 'px'; dust.style.top = startY + 'px';
                let size = Math.random() * 3 + 1; dust.style.width = size + 'px'; dust.style.height = size + 'px';
                document.body.appendChild(dust); 
                dust.animate([
                    { opacity: 1, transform: `translate(0, 0) scale(${Math.random() + 0.5})` },
                    { opacity: 0, transform: `translate(${(Math.random() - 0.5) * 200}px, -${Math.random() * 800 + 500}px) scale(0)` }
                ], { duration: Math.random() * 3000 + 1500, easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)', fill: 'forwards' });
            }

            await sleep(1000);
            // 極速黑幕
            document.getElementById('instant-black-screen').style.opacity = '1';
            hideSubtitle();
            await sleep(300); 
            world.style.display = 'none'; // 徹底清空背景DOM
            
            await sleep(1000); 
            
            // 雙閃金光 (宇宙重啟)
            const flash = document.getElementById('golden-flash');
            flash.style.transition = 'opacity 0.1s ease-out'; flash.style.opacity = '1'; 
            await sleep(100); flash.style.transition = 'opacity 0.3s ease-in'; flash.style.opacity = '0';
            await sleep(300); 
            flash.style.transition = 'opacity 0.1s ease-out'; flash.style.opacity = '1'; 
            await sleep(100); flash.style.transition = 'opacity 3.5s ease-in'; flash.style.opacity = '0';
            
            await sleep(3500); 

            // --- 重生：菩提不滅 ---
            const immortalScene = document.getElementById('immortal-scene');
            immortalScene.style.display = 'flex'; 
            await sleep(1000); 
            
            document.getElementById('immortal-dot').style.opacity = '1';
            document.getElementById('immortal-dot').animate([
                { transform: 'scale(1)', opacity: 0.8, boxShadow: '0 0 20px #fff, 0 0 50px var(--solid-gold)' },
                { transform: 'scale(1.3)', opacity: 1, boxShadow: '0 0 40px #fff, 0 0 100px var(--solid-gold)' },
                { transform: 'scale(1)', opacity: 0.8, boxShadow: '0 0 20px #fff, 0 0 50px var(--solid-gold)' }
            ], { duration: 3000, iterations: Infinity, easing: 'ease-in-out' });
            
            await sleep(2000);
            document.getElementById('profound-text').style.opacity = '1'; 

            // 停留 8 秒後，圓滿歸座
            await sleep(8000); 
            
            // 平滑過場返回主系統
            flash.style.background = '#000'; flash.style.mixBlendMode = 'normal';
            flash.style.transition = 'opacity 1s'; flash.style.opacity = '1';
            await sleep(1000);
            window.location.href = 'index.html?screen=3'; 
        }

        window.addEventListener('load', runDharmaEngine);
    </script>
</body>
</html>
